l_german:
 STB_stortbeker:0 "Stortbeker"
 STB_STORTBEKER_DESC:0 "Was das Reich von den Mutanten und den Kommunisten im Rest der Metro trennt, das ist ihre Loyalität. Manche sind ihren Ideologien treu, andere dem Geld. Doch dann gibt es auch jene, die nur der Menschheit ergeben sind, jene die alles tun würden um sie zu verteidigen, jene denen kein Preis zu hoch ist. Die meisten von ihnen finden sich in der Polis, oder dem Spartanerorden der Ranger, doch manche von ihnen wählen auch einen anderen Weg...\n\nBekannt für seinen scharfen taktischen Verstand und seine zuverlässliche Art baute sich Stortbeker schnell einen beachtlichen Ruf im Reich auf. Doch wo andere für ihre Unfähigkeit oder ihre Hinterhältigkeit verbannt wurden, so wurde er verbannt, da er ein zu großes Risiko für den Führer darstellte.\n\nZu beliebt wurde er unter der SS, zu mächtig wurden seine Verbindungen. Egal wie aussichtlos die Mission auch schien, die der Führer seinem erfolgreichsten Stalker auch auftrug, stets kehrte er siegreich zurück. Bis er uns seine Männer eines Tages schließlich der Verschwörung beschuldigt und verbannt wurden. Ins Exil getrieben folgten ihm eine handvoll Männer, doch anstatt den Tod zu finden meisterte Stortbeker auch diese Herausforderung und überlebte, seine Brigade nistete sich in der südlichen Metro ein. Trotz seiner Verbannung blieb Stortbeker dem Reich und seinen Idealen immer treu."
 
 _STB_stortbeker_leader_trait:0 "Stortbeker's Brigade"

STB_bohren: "Peter Bohren"
_STB_bohren_trait: "Parasitärer Kapitalist"
STB_bohren_trait: "Obwohl er lukrative Schattenhandelsabkommen mit der Hansa und anderen zwielichtigen Geschäftsleuten vermittelte, galt Bohren selbst dort als „Parasit“. Sein Vermögen wurde eingezogen und sein aufstrebendes Handelsunternehmen zerstört. Die meisten wären dadurch von den Idealen des Reichs enttäuscht worden. Nicht jedoch Bohren. Stattdessen nahm er, was ihm von seinem Vermögen geblieben war, und floh an den einzigen Ort im Metro-System, an dem er noch Gleichgesinnte finden konnte."

STB_todorov: "Dr. Todorov"
_STB_todorov_trait: "Engel der Barmherzigkeit"
STB_todorov_desc: "Dr. Todorov war ein enger Vertrauter und Freund eines der vielen Anwärter auf den Titel des Führers. Wäre da nicht sein umfangreiches wissenschaftliches Wissen gewesen, hätte er höchstwahrscheinlich dasselbe Schicksal erlitten wie sie. Selbst die Rassenfanatiker des Reichs betrachteten Todorovs Theorien mit Unbehagen, bis er das Reich schließlich verließ, um seine Forschungen anderswo fortzuführen. Nun, frei von den ohnehin spärlichen moralischen Grundsätzen des Reichs, ist der Begriff „Barmherzigkeit“ nicht mehr leichtfertig zu vergeben."

STB_faust: "André Faust"
_STB_faust_trait: "Gefallener Gauleiter"
STB_faust_desc: "Der ehemalige Gauleiter von Twerskaja, Faust, verlor seine politische Karriere, nachdem er mit Führer Petrowitsch in Ungnade gefallen war. Gedemütigt floh er ins Exil und ließ sich schließlich in [STB.Capital.GetName] nieder, wo er als oberster Gauleiter und Vertrauensperson Stortbekers fungiert."

STB_orel: "Orel"
_STB_orel_trait: "Kollaborateur des Reichs"
_STB_orel_desc: "Als ehemaliges Mitglied der Konföderation von 1905 informierte Orel das Reich über die Bewegungen „untermenschlicher“ Feindtruppen in den Tunneln. Dieses Wissen brachte ihm lange Zeit Wohlstand ein, bis die Türen seiner Unterkunft in Barrikadnaja von einem wütenden Mob eingeschlagen wurden, der Selbstjustiz an einem Reichskollaborateur üben wollte. Aufgrund seiner zweifelhaften Herkunft blieb ihm selbst der Zugang zum Reich verwehrt. So suchte Orel am nächstbesten – oder vielleicht schlimmstmöglichen – Ort Zuflucht."

STB_tod: "Michael Todt"
_STB_tod_trait: "Rattenfänger"
STB_tod_desc: "Der ehemalige Oberrattenfänger von Puschkinskaja wurde wegen seines trunkenen und gesellschaftsfeindlichen Verhaltens verbannt. Seit seinem Beitritt zu Stortbekers zusammengewürfelter Brigade gehen weit mehr als nur Ratten seinen Fallen ins Netz."

STB_mykhailo: "Gleb Mychailo"
STB_mykhailo_desc: "Selbst unter Halsabschneidern, Mördern und Wahnsinnigen wirkt Mychailo fehl am Platz. Er war ein unerschütterlicher Anhänger der Ideale des Führers und galt einst als Vorzeigesoldat des Reichs. Wäre er nicht aufgrund seiner gemischten Abstammung ausgestoßen worden, hätte ihm zweifellos eine glänzende Karriere bevorgestanden. Stattdessen wurde er wegen seines „verunreinigten Blutes“ verurteilt. Während es [STB.GetName] an jeder Form von Disziplin mangelt, versucht Mychailo, Stortbekers Brigade in eine tatsächlich schlagkräftige – wenn auch chaotische – Streitmacht zu verwandeln."

_STB_mykhailo_trait: "Blutschande"