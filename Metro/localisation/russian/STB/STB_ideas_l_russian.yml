l_russian:
 STB_stortbekers_brigands: "Бригада Штёртебекера"
 STB_stortbekers_brigands_desc: "Отбросы из Рейха, которые, по его мнению, зашли слишком далеко, чтобы их можно было переделать. Неудачники Штёртебекера - это название, данное группе бывших солдат Рейха, которые были изгнаны за свою порочность.\n\nТеперь они воруют и совершают налеты на южную часть Метро. Их сомнительный лидер следит за тем, чтобы разношёрстный коллектив не скатился в абсолютный бедлам."

 STB_divide_against_fuhrer: "Отколовшаяся секта"
 STB_divide_against_fuhrer_desc: "В связи с недавним конфликтом с Рейхом, отношения между этими двумя организациями сильно осложнились."

 STB_genetic_supremacy: "Генетическое превосходство...?"
 STB_genetic_supremacy_desc: "Эти люди считают, что в Метро, если не во всём мире, сохранились последние по-настоящему «человечные» люди. Проводится безжалостная кампания по "удалению" любых признаков генетических уродств среди простолюдинов. Однако стандарты того, что считается «чистым», постоянно ужесточаются. Тех, кто имеет отклонения от нормы, просто изгоняют или уничтожают.\n\nНо несмотря на это, из-за нехватки рекрутов и удаленности от трех материнских станций Рейха, эта нация начала вербовку среди порабощенного населения."

