 GWC_focus_decrees_of_priest: "Dekrete des Wurms"
 GWC_focus_decrees_of_priest_desc: "Der Priester predigt uns, dass die Tunnel den Kindern des Wurms gehören und nur denen, die seinem Licht folgen. Lassen wir uns von den Worten des Priesters in eine bessere Zukunft führen."
 GWC_focus_decrees_of_priest_2: "Die Kinder des Wurms"
 GWC_focus_decrees_of_priest_2_desc: "Der Priester sagt uns, dass unsere Mühen nicht ohne Lohn bleiben werden. Wir sind die Erben der Erde, wir sind diejenigen, die der Liebe des Wurmes würdig sind. Schmerz, Elend und Not sind nur vorübergehend, wie der Priester selbst sagte. Jede Mühe, Mühe und Not wird nur ein besseres Morgen bringen."
 GWC_focus_decrees_of_priest_3: "Erlösung von der Dunkelheit"
 GWC_focus_decrees_of_priest_3_desc: "Der Priester selbst sagt, dass nicht alle Sünder verdammt sind. Abtrünnige, die sich weigern, auf die Worte des Wurms zu hören, werden gekocht, geschlachtet oder bei lebendigem Leibe gegessen, aber ihre Nachkommen? Die jungen Herzen und Köpfe, die die Welt ertragen müssen, die ihre Vorfahren rücksichtslos zerstört haben, sie werden von diesen Sünden befreit."
