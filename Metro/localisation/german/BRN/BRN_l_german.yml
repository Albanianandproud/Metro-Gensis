l_german:
 ## Ideas ##
 
  BRN_the_little_hanza: "Die kleine Hanse"
  BRN_the_little_hanza_desc: "Während sie ihre Unabhängigkeit gegenüber der mächtigen Hanse unter erpresster Vasallenschaft zu wahren versucht, ist die [BRN.GetName] ein Handelsvorposten, der aus vielen kleinen, aber eng miteinander vernetzten Händlern besteht.Seriöse Händler, denen es nicht gelingt, in der Hanza den großen Durchbruch zu erzielen, bieten ihre Waren meist auf den Gehwegen der Station feil."
  BRN_codependency: "Abhängig von der Hanse"
  BRN_codependency_desc: "Mit lediglich einer minimalen Grenzbesatzung als Verteidigung, verlässt sich die [BRN.GetName] stark darauf, dass sich seine Nachbarn angemessen verhalten, wenn der Handel weiterhin ungehindert fließen soll. Als Protektorat der [HNZ.GetName], können wir uns darauf verlassen dass gelegentliche Banditen oder Mutanten für uns verscheucht werden. Ob sich eine wesentliche Bedrohung irgendwann aufbauen wird, das bleibt abzuwarten."
  BRN_lack_of_stalkers: "Agoraphobie allgegenwärtig"
  BRN_lack_of_stalkers_desc: "[BRN.GetName] mangelt es vollkommen an fähigen Stalkern, um Einsätze an der Oberfläche durchzuführen."
  BRN_workshop_developments: "Werkstättenbau"
  BRN_workshop_developments_desc: "Die Leute zusammenzutrommeln, ist schon für sich genommen harte Arbeit. Aber sie tatsächlich dazu zu bringen, irgendwelchen Scheiß zu bauen? Ich würde noch viel mehr rummeckern, wenn ich weniger bezahlt bekäme."
  BRN_technician_developments_1: "Waffenschmiede"
  BRN_technician_developments_1_desc: "Es wird nichts von der Kusnezki-Brücke übertreffen, aber zumindest können wir unsere Waffen reparieren. Wieder wie neu."
  BRN_technician_developments_2: "Tunnelwaffenkammern"
  BRN_technician_developments_2_desc: "Abseits der ausgetretenen Pfade und fern von neugierigen Blicken haben wir alle Waffen eingelagert, die wir auftreiben konnten – für den Notfall."
  BRN_defensive_arms: "Die Ersatzteile aufbrauchen"
  BRN_defensive_arms_desc: "Wenn sie kaputtgehen haben wir jetzt mehr Ersatzteile."
  BRN_fireteam_ordinance: "Milizstellungen"
  BRN_fireteam_ordinance_desc: "Die Tunnel sind bewacht, die Kontrollpunkte beleuchtet und die Milizen auf Wache. Nichts wagt es uns anzugreifen."
  BRN_coop: "Managementgeführte Station"
  BRN_coop_desc: "So wie bei der Hanse haben unsere Händler genauso viel Mitspracherecht wie unsere Verwaltung."
  BRN_amenities: "Ein Nutzen für alle"
  BRN_amenities_desc: "An der [BRN.GetName] muss sich jeder nützlich machen"
  BRN_research: "Forschungsförderung"
  BRN_research_desc: ""
  BRN_hub_of_trade: "Ein Zentrum des Handels"
  BRN_hub_of_trade_desc: ""
  BRN_forced_neutrality: "Erzwungene Neutralität"
  BRN_roster_improvements: "Nachahmung der Hanza"
  BRN_mercenary_commanders: "Söldnerkommandanten"
  HNZ_alignment_with_Hanza: "Bündnis mit der Hanse"
  BRN_third_avenue: "Die Third Avenue"
  BRN_equal_member: "Gleichberechtigtes Mitglied der Liga"
  BRN_trader_unions: "Führungskräftegewerkschaften"
  BRN_surface: "Die Oberfläche nutzen"
  BRN_nazi_arms: "Faschistische Ausrüstung"

 ## Focuses  ##

  BRN_1: "Stärkung der Miliz"
  BRN_1_desc: "Obwohl unsere Streitkräfte recht schwach sind und kaum dem Anspruch einer echten Miliz genügen, finanziert die Hanse – angesichts ihrer strategischen Bedeutung – deren Ausbau: hier wird ein Faden gezogen, dort eine Gefälligkeit erwidert..."
  BRN_2: "Herumkramen"
  BRN_2_desc: "Obwohl [BRN.GetName] nur über begrenzte Mittel verfügt um eigene Schusswaffen herzustellen, lassen sich die wenigen Händler, die sich mit dem Waffenhandel befassen, womöglich dazu bewegen, ihre Tätigkeit auf die Reparatur und Instandsetzung von Waffen auszuweiten. Gegen eine geringe Gebühr, versteht sich."
  BRN_3: "Patrouille im Tunnel – Ein Wunsch nach einem nuklearen Sommer"
  BRN_3_desc: "Der Gang, der zur Ringlinie führt, ist – wie zu erwarten war – bis zum Bersten mit Verteidigungsanlagen vollgestopft und wird von den Hanse-Truppen schwer bewacht. Sie sind wortkarg und lassen sich von niemandem etwas gefallen. Vielleicht lässt sich ja das eine oder andere lernen, wenn man sie beobachtet."
  BRN_4: "Tunnelwaffenkammern"
  BRN_4_desc: "Abseits der Gleise, die nach Dinamo führen, befindet sich ein Korridor, der in eine Waffenkammer mündet – randvoll mit Schusswaffen und Rüstzeug, für den Fall, dass diese jemals benötigt werden sollten."
  BRN_5: "Beschaffung von Werkzeugen"
  BRN_5_desc: "Das richtige Werkzeug für die Aufgabe macht den Unterschied aus – zwischen einsatzbereit und einem Haufen verrosteten Schrotts."
  BRN_6: "Die erste Schmiede"
  BRN_6_desc: "Es war eine verdammte Plackerei, das Ding hierherzubekommen – der Rollwagen knickte unterwegs sogar ein und brach sich ein Rad –, aber der ganze Ärger hat sich gelohnt. Die erste – hoffentlich von vielen – Waffenschmieden wird nun eingerichtet; sie bietet unseren Büchsenmachern einen Ort, an dem sie ungestört ihrer Arbeit nachgehen können."
  BRN_7: "Kein Ersatzteil vergeudet"
  BRN_7_desc: "Jedes noch so kleine Reststück – von rostigen Kabeln und Nägeln bis hin zu hohlen Rohren und morschen Holzstücken – kann dazu verwendet werden, unsere Techniker zu unterstützen."
  BRN_8: "Installation neuer Stellungen"
  BRN_8_desc: "Das letzte Mal, dass unsere Maschinengewehre abgefeuert wurden, geschah versehentlich – und das Mal davor auf eine riesenhafte Ratte. Wenngleich Vorsicht geboten ist, sind unsere Waffen doch in einem miserablen Wartungszustand und schreien förmlich nach Ersatzteilen."
  BRN_8A: "Kaufkraft"
  BRN_8A_desc: "Gelegentlich versuchen die Grenzsoldaten der Hanse, uns während ihrer ungewöhnlich kurzen Rauchpausen ihre alten Maschinengewehre zu einem stark überhöhten Preis zu verkaufen. Gute Beziehungen zur Hanse zu pflegen, ist von entscheidender Bedeutung – für jene seltenen Fälle, in denen eine besonders wichtige Persönlichkeit eine schnelle Durchreise in das Gebiet der Hanse benötigt."
  BRN_9: "Kontrollmaßnahmen"
  BRN_9_desc: "An unserer Station können weitere Befestigungen vorgenommen werden. Bei Bedarf können wir unsere Station problemlos in eine ehrfurchtgebietende Festung verwandeln.."
  BRN_10: "Techniker-Kommune"
  BRN_10_desc: "Selbst unsere Werkstätten kommen mit der anfallenden Arbeitsmenge nicht mehr hinterher. Wir benötigen weitere Werkbänke, Tische und Behälter für Schrottteile, damit unsere Techniker nicht untätig bleiben."
  BRN_11: "Gemeindeplanung"
  BRN_11_desc: "Wir haben in der Station noch immer viel ungenutzten Platz – sei es für künftige Projekte, als Lagerfläche für Materialien oder zur Einrichtung bescheidener Wohnquartiere. Wir sollten nun zügig daran gehen, weiteren Raum zu schaffen und für die Zukunft zu planen."
  BRN_12: "Unsere Wirtschaft zukunftssicher machen"
  BRN_12_desc: "Mit einem Planungsausschuss, der sich aus ehemaligen Planern oder Beamten zusammensetzt, können wir deren Kompetenzen nutzen, um unsere Wirtschaft zu planen – und so dazu beitragen, den begrenzten Raum und die uns zur Verfügung stehenden Ressourcen besser zu nutzen."
  BRN_13: "Entrümpeln"
  BRN_13_desc: "Ein Großteil unserer Hauptstation und unserer Tunnel ist nach wie vor mit Trümmern aus Beton und Stahl sowie altem Müll übersät; wir könnten für diese Ressourcen eine Verwendung finden."
  BRN_14: "Gemeinschaftliche Initiativen"
  BRN_14_desc: "Der Erfolg der Station beruht auf unserer kollektiven Kompetenz. Wir sind wohlhabend – doch im Vergleich zur Hanse keineswegs reich. Wenn wir uns besser organisieren, könnten wir es eines Tages mit ihr aufnehmen.."
  BRN_15: "Teamster-Gewerkschaften"
  BRN_15_desc: "Da unsere Bau- und Produktionsaktivitäten mittlerweile ein beträchtliches Ausmaß erreicht haben, müssen wir deren Abläufe nun über ein Büro der Teamsters organisieren und autorisieren; angesichts unserer begrenzten räumlichen und personellen Ressourcen stellt dies eine absolute Notwendigkeit dar."
  BRN_16: "Gemeinschaftliche Werkstätten"
  BRN_16_desc: "Die Bereitstellung eines Ortes, an dem unsere Manager bei Bedarf Ressourcenkontingente festlegen oder Arbeitsaufträge vergeben können, würde maßgeblich dazu beitragen, das Ansehen unserer Station zu verbessern. Vielleicht gelingt es uns auf diese Weise sogar, die Bodenfliesen der Station schrubben zu lassen?"
  BRN_16A: "Der Große Basar"
  BRN_16A_desc: "An der Station lässt sich so gut wie alles erwerben; und angesichts seines Rufs reisen Händler von weit her an, um die Gelegenheit zu nutzen, Waren feilzubieten, einzukaufen oder um Preise zu feilschen – selbst von außerhalb des Ringes."
  BRN_17: "Workshop-Erweiterungen"
  BRN_17_desc: "Angesichts unserer aktuellen Prognosen werden wir zwangsläufig auf Produktionsstillstände oder Störungen bei unseren Bauvorhaben stoßen. Wir müssen unsere bestehenden Werkstätten massiv erweitern."
  BRN_17A: "Handel mit Hansekaufleuten"
  BRN_17A_desc: "Nur äußerst selten bekommt man an unserer Station einen Hanse-Händler zu Gesicht – doch wenn dies geschieht, ist die gesamte Gemeinschaft in heller Aufregung. Die gelegentlichen Händler vom Ring, die bei uns auftauchen, treiben Handel mit Vorkriegswaffen. Viele dieser Waffen sind noch nie abgefeuert worden und lagern nach wie vor in den originalen Fabrikverpackungen, in denen sie einst ausgeliefert wurden."
  BRN_18: "Die Organisation der Wirtschaft"
  BRN_18_desc: "Die Ausgabe von Rationen, die Verwaltung der Tageskontingente und die Sicherstellung, dass niemand Grund zur Klage oder Probleme hat, ist eine schwierige, aber machbare Aufgabe."
  BRN_19: "Managerorientierte Gemeinschaft"
  BRN_19_desc: "An der [BRN.Capital.GetName] arbeitet die Stationsverwaltung Hand in Hand mit den lokalen Händlern, die als „Manager“ bezeichnet werden. Jeder hat eine Stimme und eine Rolle zu spielen – zumindest die wirtschaftlich bessergestellten Manager."
  BRN_20: "Befriedigung aller Sinne"
  BRN_20_desc: "Die zärtliche Berührung von Fleisch und die Ekstase der Wärme sind das Beste, was sich eine einsame Seele wünschen kann – gegen Bezahlung, versteht sich."
  BRN_21: "Krankheitsprävention"
  BRN_21_desc: "Provisorische Kliniken sowie für Kranke vorgesehene Zelte können auf der Station zur Behandlung leichterer Erkrankungen genutzt werden."
  BRN_21A: "Forschungsbemühungen"
  BRN_21A_desc: "Mit genügend Einsatz und der Bereitstellung ausreichender Mittel könnten wir unsere eigenen Forschungsprojekte ins Leben rufen. Nichts in der Größenordnung von Polis – aber genug, für unsere eigenen Zwecke."
  BRN_22: "Kooperation mit der [HNZ.GetName]"
  BRN_22_desc: "Es ist besser, den Bären nicht zu wecken.."
  BRN_23: "Bruch der Neutralität"
  BRN_23_desc: "Die Hanse beansprucht, friedlich über unsere Station zu herrschen – doch was haben sie jemals für uns getan??"
  BRN_24: "Haltung der Neutralität"
  BRN_24_desc: "Als Protektorat der Hanse und dank unserer neutralen Haltung genießen wir zahlreiche Vorteile, die sich aus der Vermeidung von Konflikten ergeben."
  BRN_25: "Ausstellungen und Messen"
  BRN_25_desc: "Jedes Jahr veranstaltet die Station eine Messe, die exotische Waren aus der gesamten Metro zusammenführt – von Pilztee aus Pechatniki bis hin zu Wassermelonen und Tomaten von der Station Dinamo."
  BRN_26: "Chemikalien"
  BRN_26_desc: "Sorgfältig versiegelt, behutsam geborgen aus irgendeiner längst vergessenen Klinik oder einem Labor an der Oberfläche. Die Chemikalien sind nach wie vor von großem Nutzen."
  BRN_27: "Schrott und Krimskrams"
  BRN_27_desc: "Wie das Sprichwort sagt: Dem einen sein Müll, dem anderen ..."
  BRN_28: "Elektronik"
  BRN_28_desc: "Alte Radios können noch immer von Nutzen sein, selbst wenn außerhalb Moskaus kein Kontakt existiert."
  BRN_29: "Die Besatzung der Garnison"
  BRN_29_desc: "Offensichtlich kann nicht einfach jeder am Tor vorfahren und eintreten – schon gar nicht Mutanten, Mensch-Mutanten und Fremde. Wobei Fremde im Laufe der Zeit immer seltener anzutreffen sind. Der Kontrollpunkt ist rund um die Uhr mit wehrfähigen Bürgern besetzt. Jede Woche werden hierfür Strohhalme gezogen; ausgewählt werden dabei jene, die den am weitesten vom Stationszugang entfernten Dienst zugewiesen bekommen – mal entscheidet das kürzeste Stöckchen, mal das längste."
  BRN_30: "Unsere kleine Hanse"
  BRN_30_desc: "Jene, die weder über eine Genehmigung noch über Pässe für den Handel mit der Hanse verfügen, sind an unserer Station zu finden. Für manche sind sie bloßer Abschaum – für uns jedoch exotische und potenzielle Geschäftspartner."
  BRN_31: "Von der [RED.capital.GetName], mit Liebe"
  BRN_31_desc: "Politische Flüchtlinge, die von der Roten Linie geflohen sind, können zwar vorübergehendes Asyl beantragen – und damit ihr Glück versuchen in die Hanse zu gelangen –, doch bislang ist es keinem einzigen gelungen, den Kontrollpunkt zu passieren; geschweige denn, sich länger als nur wenige Tage zu verbergen, bevor er sich wehrend und schreiend zurück in den Sokol schleifen ließ.\nGelegentlich mag ein roter Stalker hier vorübergehend Erholung suchen und seine Filter auffüllen – doch ein solcher Anblick ist äußerst selten."
  BRN_32: "Das Gossen-Syndikat"
  BRN_32_desc: "Wie zu erwarten war, machen sich auch Banditen und Sträflinge die [BRN.capital.GetName] zu eigen – mit ihren simplen Machenschaften und kümmerlichen Schiebereien, die für unsere Verwaltung viel zu unbedeutend sind, um dagegen vorzugehen. Wenngleich es hin und wieder auch zu Versuchen kommt, Schmuggelware über die Hanse zu schleusen.."
  BRN_33: "Aus dem Herzen der Finsternis"
  BRN_33_desc: "Selbst Soldaten des Reichs sind an der [BRN.capital.GetName] anzutreffen – sei es, um ihre Munitionsrationen bei unserer Bank einzuzahlen oder um die vielen exotischen Waren zu durchstöbern, die hier zum Verkauf stehen. Wirtschaftlicher Handel muss nicht immer politisch sein."
  BRN_34: "Zwangsarbeit"
  BRN_34_desc: "Die Arbeitslosigkeit an der [BRN.capital.GetName] praktisch gleich null. Im Gegensatz zu anderen Stationen, an denen Obdachlose und Kranke die Bahnhofsrinnen säumen, sind unsere Bahnsteige stets gepflegt. Diejenigen, die über längere Zeit arbeitslos bleiben, scheinen an andere Orte abzuwandern – fast so, als wären sie Hals über Kopf aufgebrochen. Spurlos."
  BRN_35: "Vom Tellerwäscher zum Millionär"
  BRN_35_desc: "Mutanten stellen glücklicherweise kein Problem dar. Da die überwiegende Mehrheit der Bevölkerung – mit so gut wie keinen Ausnahmen – keine genetische Fehlbildungen aufweist, bleibt die Furcht vor mutierten Menschen in unserer Mitte gering. Jene Händler jedoch, die in Lumpen gehüllt eintreffen und sich am Kontrollpunkt weigern, ihre Atemmasken abzunehmen, erregen durchaus Argwohn. Hätten sie nicht ihre anständigen Waren und Taschen voller Munition im Gepäck, wären sie längst vertrieben worden."
  BRN_36: "Angriff auf die Oberfläche"
  BRN_36_desc: "Jetzt ist die Zeit gekommen. Unser Militär ist gewachsen, und wir verfügen auf der gesamten Station über ausreichend Expertise, um mit der Erschaffung unserer ganz eigenen Stalker zu beginnen."
  BRN_37: "Die Leitung unserer Station"
  BRN_37_desc: "Angesichts der Gerüchte über Konflikte in der Außenwelt scheint die Metro einmal mehr auf Zehenspitzen in einen Konflikt hineinzuschleichen. Wir müssen unseren Platz in der Welt mit Bedacht wählen – andernfalls laufen wir Gefahr, unter den Stiefeln von Eroberern zermalmt oder von der Natur selbst ausgelöscht zu werden.."
  BRN_38: "Winds of Change"
  BRN_38_desc: ""
  BRN_39: "Ein dritter Weg"
  BRN_39_desc: ""
  BRN_40: "Wirtschaftliche Autarkie"
  BRN_40_desc: ""
  BRN_41: "Wacht über die Wächter"
  BRN_41_desc: ""
  BRN_42: "Bündnis mit der Hanse"
  BRN_42_desc: ""
  BRN_43: "Gnehmigung für besondere Beziehungen"
  BRN_43_desc: ""
  BRN_44: "Gemeinsame Verteidigung"
  BRN_44_desc: ""
  BRN_45: "Manager-Gewerkschaft"
  BRN_45_desc: ""
  BRN_46: "Versorgungsarbeiten"
  BRN_46_desc: ""
  BRN_47: "Die Oberfläche nutzen"
  BRN_47_desc: ""
  BRN_48: "Erweiterung der Waffenkammern"
  BRN_48_desc: ""
  BRN_49: "Erweiterung der Werkstätten"
  BRN_49_desc: ""
  BRN_50: "Bewaffnung von Karawanen"
  BRN_50_desc: "Ein Krieg scheint so gut wie wahrscheinlich. Wir müssen sicherstellen, dass Händler nicht davor abgeschreckt werden, Geschäfte mit uns zu tätigen.."
  BRN_51: "Die neue Ordnung"
  BRN_51_desc: "Die Belorusskaya liegt gegenüber unserer Station. Rechtmäßig gehört sie uns."
  BRN_52: "Forschungsinvestitionen"
  BRN_52_desc: "Um es mit jeglichen Widersachern aufzunehmen, kann der Handel allein keine Kriege für uns gewinnen. Wir müssen in unsere eigene Forschung und Entwicklung investieren."

 ## Events ##

  nf_BRN.1.t: "Werwolf"
  nf_BRN.1.d: "Gelegentlich finden sich an unserer Station der eine oder andere Soldat des Reichs oder ein Stalker ein, die auf Befehle aus der Tverskaya warten. Manchmal treffen diese Befehle durch andere eintreffende Soldaten oder sogar durch Informanten der Station ein. Ein bestimmter Soldat des Reichs jedoch wartet nun schon – und wartet – auf den Befehl zur Rückkehr. Fast ein ganzes Jahr ist seither vergangen, doch noch immer gibt es keine Zuweisung. Er würde unverzüglich zu seiner Basis zurückkehren, wären da nicht die stetig strenger werdenden Standards des Reichs. Zweifellos würde er an ihnen scheitern."
  nf_BRN.1.a: "Vielleicht wäre er geneigt, unserer Station zu dienen?"
  nf_BRN.1.b: "Es gibt immer wieder eine Gelegenheitsarbeit, die man erledigen kann, um sich die Zeit zu vertreiben."
  nf_BRN.2.t: "Er soll es ruhig angehen lassen"
  nf_BRN.2.d: "Auf unserer Station lebt ein ehemaliger Stalker im Ruhestand. Seine späten Jahre nach dem Krieg verbrachte er damit, nach Arbeit zu suchen – oder nach dem einen oder anderen Stück Schrott oder Elektronik, das sich verkaufen ließ –, doch als er zu alt wurde, zog er sich bald zurück. Noch immer bewahrt er in seinen Quartieren ein großes Dynamitlager unter Verschluss auf – ein ziemlich beachtliches Arsenal, wenn man den Gerüchten Glauben schenken darf. Vielleicht ließe er sich mit etwas Überzeugungsarbeit dazu bewegen, es herauszugeben?"
  nf_BRN.2.a: "Raus dem Ruhestand – nur noch ein letzter Job"
  nf_BRN.2.b: "Immer mit der Ruhe, Pyotr.."
  nf_BRN.3.t: "Die drei Panzerfahrer"
  nf_BRN.3.d: "Der nur selten verkehrende Schienenwagen trifft an unserer Station ein – er verweilt nicht lange, und seine Besatzung tätigt auf den Märkten lediglich bescheidene Einkäufe. Berichten unserer Soldaten sowie von Händlern zufolge – denen es gelungen ist, ihnen mehr als nur ein paar knappe Worte zu entlocken –, handelt es sich bei ihnen um ehemalige Soldaten der Roten Linie. Des Regimes in [RED.Capital.GetName] überdrüssig, hatten sie sich einst auf ihren ganz eigenen Weg begeben. Doch schon bald darauf wurden sie auch von den Revolutionären enttäuscht, an deren Seite sie gekämpft hatten. Nun durchstreifen sie in ihrem behelfsmäßigen Schienenwagen die Metro; sie dienen jedem, der gut genug zahlt, und ringen dabei beständig mit der Versuchung, zur bloßen Räuberei und Gewaltkriminalität zurückzukehren, um ihren Lebensunterhalt zu bestreiten. Vielleicht finden sie ja hier ein Zuhause – und eine neue Aufgabe."
  nf_BRN.3.a: "Eine mobile Brigade? So etwas könnten wir gut gebrauchen ..."
  nf_BRN.3.b: "Ihre Einkäufe dienen uns mehr als angemessen.."
  nf_BRN.4.t: "Träume der Grausamkeit"
  nf_BRN.4.d: "Ein Landstreicher haust in den Tunneln und fängt hin und wieder ein überdimensionales Nagetier, um es unseren Metzgern als Nahrung zu verkaufen. Wenngleich es durchaus zu begrüßen ist, dass die Rattenpopulation dank ihm in Schach gehalten wird, bleiben sein schauriger Anblick und sein widerlicher Gestank doch eine zweifelhafte Bereicherung. Auf den ersten Blick hielt man ihn für verwildert oder gar für einen Mutanten; doch anhand der zerlumpten Fetzen und der aufgeschablonisierten Symbole auf seiner verschmutzten Kleidung wurde rasch klar, dass es sich um einen ehemaligen Satanisten handelte. Angesichts seiner betrunkenen, lallenden Grunzlaute muss man sich mit Schaudern ausmalen, was wohl unter seiner Kapuze verborgen liegt. Welche Träume mag er wohl von einer chronischen, unaufhörlichen Grausamkeit hegen – einer Grausamkeit, vor der selbst Satanisten zurückschrecken würden? Man kann froh sein, dass er auf unserer Seite steht."
  nf_BRN.4.a: "Wenn es die Mutanten in Schach hält ..."
  nf_BRN.4.b: "Vielleicht liegen ihm die hintersten Abschnitte der Tunnel besser."
  nf_BRN.5.t: "Rattenmenschen?"
  nf_BRN.5.d: "Manchmal ist ein Geheimnis weit mehr wert als eine Handvoll Patronen. Zwei fremde Händler wurden von unseren Streitkräften unter dem Verdacht festgesetzt, Mutanten zu sein. Es handelte sich um ganz gewöhnliche Händler, die etwa alle zwei Wochen zur Station kamen, um Vorräte oder hin und wieder ein Buch aus dem Angebot zu erwerben. Nach einem Streit – bei dem sich die Händler weigerten, ihre Atemmasken abzunehmen und den Autoritäten ihr Gesicht zu zeigen – wurden sie in Gewahrsam genommen. Nach einem knappen Hin und Her mit unserer Verwaltung wurden sie jedoch schon bald wieder auf freien Fuß gesetzt – aus der Furcht heraus, die Nachricht von der Festnahme der Händler könnte sich wie ein Lauffeuer verbreiten und andere Kunden abschrecken.."
  nf_BRN.5.a: "Vielleicht könnten einige ihrer Soldaten von Nutzen sein."
  nf_BRN.5.b: "Ihr Handel ist durchaus in Ordnung."
  nf_BRN.6.t: "Erweiterung des Militärausschusses"
  nf_BRN.6.d: "Da unsere ohnehin schon knappen Streitkräfte bis an ihre äußersten Grenzen beansprucht sind und die dunkle Wolke eines künftigen Konflikts immer näher heranrückt, müssen wir uns womöglich einer unkonventionellen Lösung zuwenden. Angelockt vom Versprechen auf Reichtum, werden diese kampferprobten Krieger aus der gesamten Metro unserem Ruf folgen. Gegen eine kleine Gebühr. Manch einer mag dies missbilligen – dass wir unsere eigenen Befehlslisten mit jenen füllen, deren Loyalität nicht weiter reicht als bis zur Aussicht auf die nächste Munition. Dennoch sind sie eine unverzichtbare Quelle an Erfahrung, die wir verzweifelt benötigen."
  nf_BRN.6.a: "Ihre Loyalität lässt sich kontrollieren – durch Kugeln, versteht sich."