l_german:

 nf_TRT.1.t:0 "Organisiert die Einwanderer"
 nf_TRT.1.d:0 ""
 nf_TRT.1.a:0 ""

 nf_TRT.2.t:0 "Flut!"
 nf_TRT.2.d:0 "Trotz unserer besten Vorbereitungen waren wir letztendlich der steigenden Flut ausgeliefert. Überschwemmungen forderten ihren Tribut von unserer Gemeinde und ein großer Teil unserer Infrastruktur liegt zerstört."
 nf_TRT.2.a:0 "Verdammt"

 nf_TRT.3.t:0 "Venedig"
 nf_TRT.3.d:0 "Während Venedig voller Vertreter der kriminellen Welt ist, gibt es immer noch einen großen Prozentsatz der einfachen Leute. In Venedig gibt es keine wirklich zentralisierte Macht, daher ist die Macht zwischen amtierenden Gangstern und zivilen Gruppen aufgeteilt. Am häufigsten beteiligen sich jedoch die venezianischen Gangster oder die „Tretjakow-Bruderschaft“ an Erpressung und Drohungen, um an die Macht zu gelangen, was den Zorn vieler in der Gemeinschaft auf sich gezogen hat."
 nf_TRT.3.a:0 "Notiert"
 
 nf_TRT.4.t:0 "Überschwemmungsprobleme"
 nf_TRT.4.d:0 "Wie Sie vielleicht wissen liegt Venedig auf einem erstklassigen Grundstück und die großen Fraktionen liegen um uns herum und beäugen sich gegenseitig, während sie sich auf den Zeitpunkt ihres Angriffs vorbereiten. Dennoch haben wir auch unsere eigenen Probleme, die Tretjakowskaja ist teilweise überflutet durch das Tauwetter an der Oberfläche. Wenn wir nicht ausreichend vorbereitet sind, besteht die Gefahr, dass die steigende Flut unsere Station noch mehr überschwemmt und unsere Gemeinschaft zerstört.\n\nZusammen mit anderen schwimmenden Mutanten, die von der Oberfläche kommen, stellt dies ein wachsendes Problem dar. Wir müssen ständig auf der Hut sein."
 nf_TRT.4.a:0 "Notiert"

 nf_TRT.5.t:0 "Eine Überschwemmung droht"
 nf_TRT.5.d:0 "Die Überschwemmungssaison steht vor der Tür, was bedeutet, dass wir geeignete Maßnahmen vorbereiten müssen, um das Wasser abzuleiten und die Überschwemmungen nach Venedig einzudämmen."
 nf_TRT.5.a:0 "Notiert"

 TRT_begin_flooding_mission:0 "Mission aktivieren: §YGegen die Fluten§!"

 nf_TRT.6.t:0 "Die Überschwemmungen lassen nach"
 nf_TRT.6.d:0 "Die Hochwassersaison ist vorbei. Es scheint, dass wir es geschafft haben, das Schlimmste davon zu überstehen. Unsere Gemeinschaft bleibt intakt."
 nf_TRT.6.a:0 "Das Schlimmste scheint überstanden zu sein, Gott sei Dank"

 nf_TRT.7.t:0 "Fluten"
 nf_TRT.7.d:0 "Die Hochwassersaison ist vorbei und wir konnten die wässrigen Massen nicht abwehren. Unsere Gemeinde liegt in Trümmern."
 nf_TRT.7.a:0 "Gruppieren Sie sich neu, überprüfen Sie den Schaden, wir bauen alles rechtzeitig wieder auf"

 nf_TRT.8.t:0 "Räumberichte"
 nf_TRT.8.d:0 ""
 nf_TRT.8.a:0 "Unsere Arbeit hier ist erledigt. Wer hat jetzt Lust auf ein oder zwei Bier? Die erste Runde geht auf mich!"

 TRT_preparedness_requirement_permanent_reduction:0 "\nReduiert dauerhaft die §YBereitschaftsanforderungen§! um §R20§!."

 nf_TRT.9.t:0 "Umgang mit den Garnelen"
 nf_TRT.9.d:0 "Die Garnelen befallen nicht nur Sümpfe und stehende Gewässer an der Oberfläche, sondern halten sich auch in den Tiefen der Metro auf. Während es nicht schwer ist, die jungen Garnelen zu töten, sind die größeren Artgenossen tödlicher, vor allem, wenn sie in großer Zahl gruppiert sind. Dann unterbrechen sie die Versorgungsleitungen und den Handels. Sie sind die größten Raubtiere in ihrer Umgebung und es kommt immer wieder zu Zusammenstößen mit Menschen, bis ihre Nester zerstört werden."
 nf_TRT.9.a:0 "Wir müssen einen Weg finden, mit ihnen umzugehen."

 TRT_unlock_shrimp_problems_decision:0 "Schaltet Entscheidung frei: §YRottet die Garnelen aus§!"

 nf_TRT.10.t:0 "Versunkene Spalte"
 nf_TRT.10.d:0 "Die Spalte selbst war nur einige Meter lang und hatte einen Durchmesser von etwa der Hälfte. Die erste Explosion, die in das Mauerwerk der Metro-Tunnel eindrang und Risse bekam, schien das Loch freigelegt zu haben, anstatt es zu erzeugen, als ob es schon die ganze Zeit hinter der Betonfassade gewesen wäre. Bei der Untersuchung der Wände des Lochs selbst schien es eher so, als ob der Boden selbst nachgegeben hätte, als dass es sich um eine natürliche Formation handelte. Das Werfen von Steinen in das Loch weist nachweislich darauf hin, dass es tatsächlich einen Boden gibt. Der Schallrückhall lässt jedoch erkennen, dass er sich etwa dreißig Meter in die Tiefe erstreckt und sich am Boden zu einer größeren Kammer ausdehnt. Ein ansonsten unscheinbares Loch, das Gennadys Fantasie beflügelt hat. Anfangs neugierig, entwickelte sich schnell eine wahnsinnige Obsession, die Tiefen zu erkunden, bevor die Gefahr einer Überschwemmung drohte. Er glaubte fest daran, dass er sich zusammen mit zwei anderen Freiwilligen durch das Loch zwängen und den Grund erreichen könnte.\n\nTrotz der Warnungen und Einwände, die er ignorierte, hatte alles was er im Abgrund schimmern sah, seine Neugier völlig entflammt.\nMit Vorräten im Gepäck stiegen sie 24 Stunden später den Spalt hinab, und da nichts von ihrer Rückkehr berichtet wurde, schien es, als wären sie noch immer dort unten. Wenn das Wasser irgendwann steigt, wird das Loch überflutet und Gennady und seine Expeditionsmitglieder werden vom Wasser weggespült. Und wenn man nun sein Ohr nah an die Öffnung hält, kann man fast ein leises Jammern oder Gemurmel hören."
 nf_TRT.10.a:0 "Den Spalt versiegeln, nichts rein oder rauslassen!"
 nf_TRT.10.b:0 "Schicken Sie eine Expedition, um zu sehen, was sich dort unten befindet"

 nf_TRT.11.t:0 "Wir haben zu tief gegraben"
 nf_TRT.11.d:0 "Da nur noch wenige Stunden zum handeln waren, wurde eine eilig organisierte Expedition zur Suche nach den vermissten Männern ins Leben gerufen. Unsere anfänglichen Vorhersagen für den Tunnel erwiesen sich als wahr, da sich die Felsspalte in eine große natürliche Höhlenkammer öffnete, mit verzweigten Tunneln, die vom Hauptabgrund abgehen. Ein natürliches Höhlensystem liegt hier direkt unter Moskau. Es gab keine Anzeichenvon Aktivität, selbst von Mutanten war keine Spur zu finden. Der Suchtrupp suchte in der näheren Umgebung nach den vermissten Mitgliedern der ersten Expedition ab und entdeckte diese wiederum in einer der Höhlen am Wegesrand.\n\nAnfangs völlig verstört brauchte die erste Expedition eine ganze Weile, um ihre Nerven zu beruhigen. Eines der Mitglieder hatte einen Oberschenkelknochenbruch erlitten, und ein anderes war gestolpert und hatte sich das Knie aufgeschürft, als es dem entging, was sie nur als Dämon bezeichnen konnten.\n\nDie Expedition wird jetzt zurück eskortiert, alle bis auf einen der jedoch noch fehlt: Gennady wird immer noch vermisst. Die Expedition behauptete er habe versucht den Dämon abzuwehren damit die Mitglieder entkommen konnten, und dabei führte er die Kreatur immer weiter in die Tiefen der Höhle, während er auf das dämonische Wesen schoss. Da das Wasser jedoch schnell ansteigt, muss seine Entdeckung schon bald gemacht werden, sonst wird die gesamte Besatzung von den Fluten mitgerissen."
 nf_TRT.11.a:0 "Reduzieren Sie unsere Verluste und ziehen Sie sich zurück. Er ist viel zu weit weg."
 nf_TRT.11.b:0 "Setzt die Suche nach ihm fort."

 nf_TRT.12.t:0 "Schwer fassbare Entdeckung"
 nf_TRT.12.d:0 "Nach einer weiteren mühsamen Stunde des Suchens gelang es uns endlich, Gennady zu finden. Blutig und verletzt saß er auf einem Felsen, während der Wasserspiegel um ihn herum anstieg. Er verblutete, war aber noch am Leben und konnte sich bis auf gelegentliche undeutliche Worte verständigen. Er erzählte uns, dass er dieser Dämonenkreatur tatsächlich begegnet sei. Eine große, schlanke humanoide Kreatur, die versuchte, die Gruppe anzugreifen. Gennady feuerte mehrere Schüsse auf die Kreatur ab – sie fiel zu Boden, stand jedoch unbeeinträchtigt von den Schüssen wieder auf. In Gennadys Gedanken hämmerte und dröhnte ein ohrenbetäubendes Klingeln, als die Kreatur versuchte, zu Gennady zu gelangen. Gennady erinnerte sich an längst vergessene Erinnerungen, von denen er glaubte, sie so gut wie verloren zu haben. Das Wasser reicht jetzt bis zur Hüfte – es war zu schwierig, die Leiche des fremden Wesens zu untersuchen.\n\nEs bleiebn nur noch wenige Augenblicke, bis die gesamte Höhle überflutet wurde, dann machte sich das Expeditionsteam zusammen mit dem Rettungsteam auf die Flucht. Viele missachten Gennadys Behauptung und glauben, seine Begegnung sei lediglich eine Halluzination gewesen. Gennady schweigt jedoch, um abzulehnen oder zu argumentieren. Er hat vielleicht das Leben seiner Freunde gerettet, aber er schwört, dass das, was er erschossen zu haben glaubte, nicht tatsächlich getötet wurde, sondern ihn bis heute verfolgt."
 nf_TRT.12.a:0 "Gennady, kehre zu uns zurück"

 nf_TRT.13.t:0 "Große Probleme in Chinatown"
 nf_TRT.13.d:0 "Kitay-Gorod liegt nicht weit vom Banditendreieck entfernt. Sie ist auch eine unabhängige Station, abseits von allen größeren politischen Einheiten in der Metro. Sie wird von zwei gegensätzlichen Banden regiert, was zu weitverbreiteter Anarchie und Gesetzlosigkeit geführt hat. Wegen seinen vielen Bewohnern asiatischer Abstammung wird die Station umgangssprachlich auch als „Chinatown“ bezeichnet. "
 nf_TRT.13.a:0 "Rassenkonflikte hin oder her, unter Dieben sind wir immer noch an einen Kodex gebunden"
 nf_TRT.13.b:0 "Wir müssen zusammenhalten"

 nf_TRT.14.t:0 "Die Gangster"
 nf_TRT.14.d:0 "Vier Banden plagen die Linie Kaluzhsko-Rizhskaya, im Inneren sind sie uneinig, doch nach außen hin scheinen sie als eine Einheit zu agieren. Dies ist jedoch nicht der Fall, da die Banditengruppen untereinander weitgehend unabhängig handeln. Eine andere Macht versucht bereits, die von ihm besetzten Stationen zu annektieren."
 nf_TRT.14.a:0 "Trotz unserer internen Konflikte halten wir immer noch an einem Eid fest"
 nf_TRT.14.b:0 "Wir Gangster bleiben bei uns"

 nf_TRT.15.t:0 "Silo-Expedition"
 nf_TRT.15.d:0 "Trotz der Spinnenwanzenplage ist es uns gelungen, die Mutanten direkt anzugreifen. Kämpfe von Tunnel zu Tunnel, von Raum zu Raum, sogar durch die Lüftungsschächte hindurch. Das betreffende Raketensilo befand sich in einem schlechten Zustand, schon vor dem Krieg schien es in einem heruntergekommenen Zustand gewesen zu sein. Leider waren die Raketen in den Silos selbst verschwunden. Aber was wir stattdessen fanden, war..."
 nf_TRT.15.a:0 "Die sowjetischen Forschungseinrichtungen sind noch intakt"
 nf_TRT.15.b:0 "Das postsowjetische Waffendepot ist noch intakt"

nf_TRT.16.t:0 "Depot-Entdeckung"
nf_TRT.16.d:0 "Es ist wahr, dass der Ort, den wir freigelegt haben, tatsächlich Bewohner beherbergte. Sie behaupten, Victor Tsoi zu verehren, ein längst verstorbenes legendäres Aushängeschild der russischen Musik. Sie folgen genau seinen Lehren und seiner Kernphilosophie."
nf_TRT.16.a:0 "Es steht ihnen frei, in Venedig zu wohnen"
nf_TRT.16.b:0 "Ich möchte Sie wissen lassen, dass dieses Depot nun uns gehört!"

 nf_TRT.17.t:0 "Blut und Eisen"
 nf_TRT.17.d:0 "Das Reich ist gegen die Rote Linie in den Krieg gezogen, und deshalb müssen wir uns nun zu unserem Teil des Deals bekennen ... Allerdings ..."
 nf_TRT.17.a:0 "Wir hatten einen Deal, in den Krieg!"
 nf_TRT.17.b:0 "Obwohl, vielleicht besser doch nicht."

nf_TRT.18.t:0 "Konfrontation an der Grenze"
nf_TRT.18.d:0 "Jüngsten Berichten zufolge sammeln die Banditen von Venedig Truppen an unseren Grenzen. Obwohl sie ihre Absichten noch nicht geäußert haben, ist es offensichtlich, dass sie versuchen, unsere Verteidigung auszuprobieren. Dies ist jedoch kein typischer Scan, da sie bereits versucht hatten, unsere Sicherheitskräfte auszutricksen. Sie planen etwas, was auch immer ihre dummen Köpfe erreichen könnten, ist für uns unerreichbar, aber wir müssen bereit sein."
nf_TRT.18.a:0 "Verdammte Banditen"

nf_TRT.19.t:0 "Sieg"
TRT_borderwar_RED_WIN:0 "Die Armee der Sokolnicheskaya blieb standhaft und schaffte es, die Banditen in bewaffneten Konflikten zu besiegen. Trotz ihrer hinterhältigen Taktik gelang es unseren Streitkräften, die Invasionstruppe in die Flucht zu schlagen. Wir werden ihre Angriffe in Zukunft sicherlich erneut erwarten."
TRT_borderwar_HNZ_WIN:0 "Die Soldaten der Hanse blieben standhaft und hielten den Banditenausfällen standhaft stand. Trotz Verlusten auf beiden Seiten entwickelte sich die Schlacht schließlich zu unseren Gunsten und gab unseren Truppen die dringend benötigte Initiative, einen entscheidenden Gegenangriff zu starten."
TRT_borderwar_TRT_WIN:0 "Der Plan funktionierte einwandfrei, die verdammten Kommunisten wussten nicht einmal, was ihnen widerfahren war, bevor es zu spät war. Wochenend-Rekruten sind für unsere Jungs kein Problem. Niemand legt sich mit Venedig an, das ist sicher."
nf_TRT.19.a:0 "Ok"

nf_TRT.20.t:0 "Niederlage"
TRT_borderwar_RED_LOSE:0 "Irgendwie wurde die Armee der Sokolnicheskaya im Kampf nur von einer zusammengewürfelten Banditenarmee besiegt. Die marodierende Gruppe aus Venedig schlüpfte durch unsere Verteidigung und besiegte unsere Streitkräfte. Wer auch immer für diese Peinlichkeit verantwortlich ist, steht mittlerweile sicherlich auf einer Checkliste des NKWD."
TRT_borderwar_HNZ_LOSE:0 "Irgendwie wurde die Hanse-Garnisonstruppe im Kampf nur von einer zusammengewürfelten Banditenarmee besiegt. Die marodierende Gruppe aus Venedig schlüpfte durch unsere Verteidigung und besiegte unsere Streitkräfte."
TRT_borderwar_TRT_LOSE:0 "Es war ziemlich klar, wie der Konflikt ausgehen würde: Ein Haufen Schläger gegen die größte Streitmacht der Metro. Machen Sie sich nichts vor, der Kampf war entschieden, bevor er überhaupt begonnen hatte. Obwohl wir ein paar dieser Roten Bastarde zurück in die Hölle geschickt haben, nicht wahr? Besser als auf Metallziele zu schießen, das versichere ich Ihnen."
nf_TRT.20.a:0 "Verdammt"

 nf_TRT.22.t:0 "Schlacht der Titanen"
 nf_TRT.22.d:0 "Die Rote Linie ist gegen die Hanse in den Krieg gezogen, und deshalb müssen wir uns zu unserem Teil des Deals bekennen … Allerdings …"
 nf_TRT.22.a:0 "Wir hatten einen Deal, in den Krieg!"
 nf_TRT.22.b:0 "Obwohl, vielleicht besser nicht."

 nf_TRT.23.t:0 "Coalition War 2: Electric Boogaloo"
 nf_TRT.23.d:0 "Die Hanse sind gegen die Rote Linie in den Krieg gezogen, und daher müssen wir uns aufgrund der vereinbarten Bedingungen zu unserem Teil des Deals verpflichten ... Allerdings ..."
 nf_TRT.23.a:0 "Wir hatten einen Deal... kommt Jungs, in den Krieg!"
 nf_TRT.23.b:0 "Obwohl, vielleicht besser nicht."



