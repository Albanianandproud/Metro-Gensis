  PLS_alexander_rasanov: "Alexander Rasanov"
  PLS_RASANOV_DESC: "Als junger Minister für die Außenbeziehungen von Polis ist er unter anderem für den Umgang mit der Hanse zuständig. Gilt als einer der jüngsten Politiker in der bewegten Geschichte der Metro."
  PLS_alexander_rasanov_trait: "Außenminister"

  PLS_colonel_sychev: "Oberst Sychev"
  PLS_COLONEL_SYCHEV_DESC: "Als Kshatriya und Mitglied des Polis-Rates umfasst Sychevs Aufgabe die Ausbildung und Überwachung neu eingesetzter Rekruten zur Verteidigung der Polis."
  PLS_colonel_sychev_trait: "Drill-Sergant"

  PLS_chukchi: "Chukotsky"
  PLS_CHUKCHI_DESC: "Der ehemalige Leiter des Turm-Simulator-Projekts bei D-6. Nach der Evakuierung des Komplexes floh er zusammen mit seinem Assistenten in die Polis, wo er später dem Polis-Rat beitrat. Mit der Wiederentdeckung von D6 ist er fest entschlossen, dort weiterzumachen, wo seine Arbeit kurzerhand aufgehört hat."
  PLS_chukchi_trait: "Ehemaliger D6-Wissenschaftler"

  PLS_anastasius: "Anastasius"
  PLS_ANASTASIUS_DESC: "Anastasius wird von seinen russischen Kollegen aufgrund seiner griechischen Herkunft humorvoll „Gek“ genannt und war die rechte Hand von Professor Chukotsky, dem Leiter der Entwicklung des Turm-Simulator-Projekts bei D-6. Aufgrund der Biomassegefahr zog er in die Polis, wo er Mitglied des Rates wurde"
  PLS_anastasius_trait: "Ehemaliger D6-Assistent"

  PLS_elder: "Alter Vitally"
  PLS_elder_trait: "Ehren-Ratsmitglied"
  PLS_ELDER_DESC: "Vitally, einer der wichtigsten Brahmanen von Polis und Ehrenmitglied des Ratssitzes, war einst Kernphysiker. Jetzt ist er einer der Stationsleiter der Polis. Seine Aufgabe besteht darin, die letzten spärlichen Teile der Menschheit aufzuräumen und aufzubewahren, bevor die endlose Entropie des letzten traurigen Klageliedes der Menschheit beginnt."

  PLS_ivashov: "Ivashov"
  PLS_ivashov_trait: "Stationsleiter der Borovitskaya"
  PLS_IVASHOV_DESC: "Der Leiter von Borovitskaya, Ivashov, befehligt den Umkreis der Sicherheitskräfte. Es wurde ihm anvertraut, alle Gefahren, die direkt von der Poljanka oder dem Reich kommen, abzuwehren. Um jeden Preis.."

  PLS_captain: "Der Captain"
  PLS_CAPTAIN_DESC: "Unterstützung von Professor Chukotsky und seinem Assistenten Anastasius bei der Berechnung der Wirksamkeit von Virtual-Reality-Kampfsimulatoren. Trotz Problemen mit der Simulation meisterte der Captain die Hürden erfolgreich. Nach dem Vorfall in D6, woraufhin die Wissenschaftler flohen, verschwand der Kapitän jedoch auf mysteriöse Weise spurlos. Es wird angenommen, dass er tot ist, doch mit der Wiederbesiedlung und Wiederbelebung von D6 ist der Captain zurückgekehrt. Jetzt bietet er der Polis erneut seine Treue an."
  PLS_captain_trait: "Meister des Turmes"




