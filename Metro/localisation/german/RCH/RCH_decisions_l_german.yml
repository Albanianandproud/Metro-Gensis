 RCH_depose_category_desc:0 "Wir müssen den §RFührer§! absetzen, und zwar schnell. Nachdem der feige Despot erledigt ist, werden wir damit beginnen unsere eigene Regierung einzuführen. Für §CKreipp§!! \n \n \n \n§RCoup-Chance: [ROOT.GetRCH_assassination]§!"

