### Military ###

  ARB_fireteam_emplacements: "Geschützstellungen"
  ARB_fireteam_emplacements_desc: " Diese befestigten Stellungen werden dazu beitragen, Eindringlinge abzuschrecken."

  ARB_seasoned_leaders: "Erfahrene Führung"
  ARB_seasoned_leaders_desc: "Der Krieg ist immer noch eine Erinnerung, wenn auch eine verblassende. Was wir daraus gelernt haben, muss in Erinnerung gerufen werden. Es sei denn, wir sind dazu verdammt, wieder in den Fleischwolf zu marschieren."

  ARB_theorist_hiring: "Militär-Komitee"
  ARB_theorist_hiring_desc: "Die Arbat-Konföderation verfügt immer noch über den Einfallsreichtum, der vielen zu fehlen scheint. Wir müssen unsere klugen Köpfe optimal nutzen."

