l_german:
 dry_station_bandits:0 "Banditen der Sukharevskaya"
 dry_station_bandits_desc:0 "Eine Station schwer bewaffneter und gut verschanzter Banditen. Viele ihrer Einwohner sind desertierte Soldaten der Roten Linie oder gescheiterte Glücksritter. Ab und zu überfallen sie die Rote Linie um Vorräte zu erbeuten, doch dank ihrem feigen Anführer wagen sie nie größere Aktionen. Vielleicht ist das auch besser so."
