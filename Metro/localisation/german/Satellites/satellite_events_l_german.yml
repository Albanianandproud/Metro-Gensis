l_german:

 nf_satellite.0.t: "[From.GetName] plant uns anzugreifen!"
 nf_satellite.0.d: "Aus den Grenztunneln sind Berichte eingetroffen, dass [From.GetName] schnell Truppen an unserer Grenze versammelt. Der erbärmliche mutierte Abschaum plant offenbar einen Grenzkonflikt gegen unser Territorium. Lasst sie kommen."
 nf_satellite.0.a: "Wir werden bereit sein, uns ihnen zu stellen. Tod den Meuterern!"

 nf_satellite.1.t:0 "Technisches Talent"
 nf_satellite.1.d:0 "Wir sollten unsere Talente bündeln und einen bestimmten Aspekt unserer Produktionslinien priorisieren. Es hat keinen Sinn, sie auf alle Arten von Spielereien aufzuteilen – wir müssen uns auf die eine Sache konzentrieren, die sich in Zukunft lohnen wird."
 nf_satellite.1.a:0 "Wir sollten uns auf unsere Waffen konzentrieren"
 nf_satellite.1.b:0 "Unsere Rail-Carts sollten Vorrang haben"
 nf_satellite.1.c:0 "Die Ausrüstung unseres Spezialtrupps muss umgerüstet werden"
 nf_satellite.1.e:0 "Spezialeinheiten sollten an erster Stelle stehen"

 nf_satellite.2.t:0 "Erfolgreicher Grenzkonflikt!"
 nf_satellite.2.d:0 "Nach Tagen erbitterter Kämpfe gelang es unseren Streitkräften endlich, sich einen Vorsprung gegenüber den feindlichen Streitkräften zu verschaffen. Eine triumphale Demonstration unserer Macht gegenüber den feindlichen Streitkräften wird sie sicherlich dazu bringen, ihre Expansion zu überdenken."
 nf_satellite.2.a:0 "Großer Erfolg"

 nf_satellite.3.t:0 "Unsere Streitkräfte werden zurückgedrängt!"
 nf_satellite.3.d:0 "Nach Tagen erbitterter Kämpfe wurden unsere Streitkräfte leider von den feindlichen Streitkräften zurückgeschlagen. Es scheint, dass unsere Bemühungen nicht ausgereicht haben. Der Feind, so sehr wir es auch hassen, dies zuzugeben, war zu stark für unsere Streitkräfte."
 nf_satellite.3.a:0 "Verdammt!"

 nf_satellite.4.t:0 "Grenzkonflikt – Patt"
 nf_satellite.4.d:0 "Es geht nicht vor und nicht zurück, wir müssen abbrechen"
 nf_satellite.4.a:0 "Verdammt"

 nf_satellite.5.t:0 "Hilfe gegen die faschistische Bedrohung gesucht!"
 nf_satellite.5.d:0 "Während sich die Faschisten auf den Krieg vorbereiten, drängen sich benachbarte Stationen dicht an ihre hermetischen Tore und achten auf jedes Geräusch in der Dunkelheit. Natürlich wissen die Bewohner der Metro, dass wir Russen vor vielen Jahren einst gegen die Nazis gekämpft und gewonnen haben – hoffentlich gelingt uns dies erneut. Wenn wir jedoch im gesamten Untergrund expandieren wollen, sollten wir diesen armen, mittellosen Bürgern vielleicht bei ihrer Verteidigung helfen?"
 nf_satellite.5.a:0 "Wir können es uns nicht leisten, sie zu unterstützen"
 nf_satellite.5.b:0 "Wir können ihnen Unterstützung schicken"
 nf_satellite.5.c:0 "Jeder, der sich gegen den Faschismus stellt, ist unser Freund"

 nf_satellite.6.t:0 "Die Rote Linie lehnt unsere Anfrage ab"
 nf_satellite.6.d:0 "Nach sorgfältiger Überlegung hat die Redline unseren Antrag auf Hilfe gegen das Reich abgewiesen. Es scheint, dass sie ihr Erbe als Sieger gegen den Nationalsozialismus vergessen haben oder dass sie zu feige sind, um uns bei der Verteidigung zu unterstützen. Wir stehen allein in diesem Kampf."
 nf_satellite.6.a:0 "Sie verfüttern uns an die Hunde!"

 nf_satellite.7.t:0 "Die Rote Linie sendet ihre Unterstützung!"
 nf_satellite.7.d:0 "Nach sorgfältiger Überlegung hat uns die Rote Linie Unterstützung gegen das Reich geschickt. Der Offizier der Rote Linie, der nun unsere Streitkräfte beaufsichtigt und unsere kommandierenden Offiziere sorgfältig in bewährten Taktiken ausbildet, wird uns lehren die faschistische Bedrohung aufzuhalten. Trotz der fragwürdigen Taktik der betreffenden Offiziere und der Vermutung, dass er kaum mehr als ein bloßer Ausgestoßener der Roten Linie ist, sind unsere Streitkräfte und die Bevölkerung mit der Unterstützung der Roten Linie mehr als zufrieden. Obwohl unsere Soldaten ihre Bestürzung über die Zunahme der durchgeführten Übungen zum Ausdruck bringen."
 nf_satellite.7.a:0 ""

 nf_satellite.8.t:0 "Die Rote Linie schickt Waffen!"
 nf_satellite.8.d:0 "Nach sorgfältiger Überlegung hat uns die Rote Linie Unterstützung in Form von Waffen und Ausrüstung geschickt. Bei näherer Betrachtung scheinen sie alt und abgenutzt zu sein und wurden höchstwahrscheinlich in früheren Kampfhandlungen verwendet oder es handelt sich um ausrangierte Ausrüstung, die von Kuznetsky-Technikern eigentlich recycelt werden soll. Unabhängig davon müssen sich unsere Streitkräfte nun keine Sorgen mehr machen, dass sie mit Speeren und Steinen in die Schlacht ziehen müssen."
 nf_satellite.8.a:0 "Danke, sie werden uns sehr nützen"

 nf_satellite.9.t:0 "Auseinandersetzung im [prev.GetNameDef] Gebiet ."
 nf_satellite.9.d:0 "Heute früh haben wir Berichte erhalten, dass unsere Händler offenbar von der Stationswache in [prev.GetNameDef] belästigt und gezwungen wurden, sich aus ihrem Gebiet zurückzuziehen. Während die Spannungen zwischen der Hanse und [prev.GetNameDef] zunehmen, wird dies Beziehungen zwischen uns nur noch weiter ruinieren."
 nf_satellite.9.a:0 "Verflucht sollen sie sein!"

 nf_satellite.10.t:0 "Kampf der Titanen"
 nf_satellite.10.d:0 "Die Rote Linie ist gegen die Hanse in den Krieg gezogen, und deshalb müssen wir uns zu unserem Teil des Deals bekennen … Allerdings "
 nf_satellite.10.a:0 "Wir hatten einen Deal, zum Krieg!"
 nf_satellite.10.b:0 "Wobei, besser nicht."

 nf_satellite.11.t:0 "Kampf der Titanen"
 nf_satellite.11.d:0 "Die Hanseaten sind gegen die Rote Linie in den Krieg gezogen, und deshalb müssen wir uns zu unserem Teil des Deals bekennen ... Allerdings ..."
 nf_satellite.11.a:0 "Wir hatten einen Deal, zum Krieg!"
 nf_satellite.11.b:0 "Wobei, besser nicht."

 
 









