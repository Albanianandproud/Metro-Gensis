 EUR_militarized_industries: "Militarisierte Industrie"
 EUR_militarized_industries_desc: "Rom war eine hochgradig militarisierte Autokratie, die eines der größten Einzelreiche der Antike regierte. Zehntausende loyale Legionen marschierten unter dem Banner des vergoldeten Adlers. Von den Sandstränden der Sahara bis zu den windgepeitschten Inseln Großbritanniens beherrschte das Römische Reich alles und jedes unter der Sonne.\n\nJetzt, da die Menschheit unter der Erde zugrunde geht, muss eine neue Ordnung entstehen, eine Ordnung der Stärke und der Ehre, wie sie einst Rom gründete. Sobald die Zeit reif ist, werden wir die Oberfläche zurückerobern und die neue Welt nach dem Vorbild der Alten aufbauen."

 EUR_crossing_the_rubicon: "Überquert den Rubikon"
 EUR_crossing_the_rubicon_desc: "Julius Cäsar überquerte die Ufer des Rubikon und löste damit einen Bürgerkrieg im gesamten Römischen Reich aus. Er hat diese unwiderrufliche Entscheidung getroffen, genau wie wir heute unsere Entscheidung treffen. Wir marschieren in die Stationen des Arbat ein und beanspruchen und erobern das, was uns rechtmäßig zusteht."

