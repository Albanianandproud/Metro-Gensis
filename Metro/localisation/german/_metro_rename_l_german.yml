 #Events#
 
  communist_rename_event.1.t: "Sovietisierungn: [330.GetName]"
  communist_rename_event.1.d: "Endlich wurden nun auch die letzten Kontrarevolutionäre aus dem Theater vertrieben. Nun ist es Zeit das Schicksal des Bolshoi per Abstimmung zu bestimmen.\nWie werden wir die Station nun benennen?"
  communist_rename_event.1.a: "Leninskaya"
  communist_rename_event.1.b: "Ploshchad' Sverdlova"

  communist_rename_event.2.t: "Sovietisierung: [244.GetName]"
  communist_rename_event.2.d: "Nach so vielen Jahren besitzen wir nun das Herz der Metro, die Polis erhellt von der Fackel der Revolution! Nein, erhellt von der Fackel einer §RNeuen Roten Welt!§! \nIm Gedenken an diesen Großen Tag werden wir diese Station umbennenen."
  communist_rename_event.2.a: "Lang lebe die Komintern!"
  communist_rename_event.2.b: "Lang lebe die Kalininskaya!"

  communist_rename_event.3.t: "Sovietisierung: [228.GetName]"
  communist_rename_event.3_berilag: "WAS IST DAS?! EIN KONZENTRATIONSLAGER?! SCHANDE AUF UNS, DEN VERTEIDIGERN DES SOZIALISMUS. SCHANDE AUF UNS; DIE WIR DAS PROLETARIAT DOCH BESCHÜTZEN SOLLTEN...Es wird Zeit für unser Versagen gerade zu stehen."
  communist_rename_event.3_trotskyist: "Wir haben diese trotzkistischen Banditen aus dieser Station vertrieben, jedoch ist sie nun kaum mehr als eine Ruine. Was sollen wir nun mit ihr tun?"
  communist_rename_event.3_desc: "Wir haben diese Station von den Feinden des Volkes zurückerobert, nun müssen wir uns an den Wiederaufbau machen."
  communist_rename_event.3.a: "Zeit das Berilag wiederzueröffnen."
  communist_rename_event.3.b: "Lasst uns diese Station vom ihrem stalisnistischem Unrat säubern."
  communist_rename_event.3.c: "Gebt ihr ihren alten Namen zurück und beginnt mit dem Wiederaufbau."
  communist_rename_event.3.d: "Baut die wieder auf und benennt sich nach Marschall Rokossovsky um."

  communist_rename_event.4.t: "Sovietisierung: [250.GetName]"
  communist_rename_event.4_communist: "Wir konnten die Station [250.GetName] erobern. Die erbärmlichen Kapitalisten sahen sich gezwungen feige zu fliehen und nun wird es Zeit diese Station im Lichte der Revolution zu erhellen."
  #communist_rename_event.4_socialist: "Wir konnten die Station [250.GetName] erobern. Auch wenn nun Frieden herrscht, so gibt es doch viel zu tun: Einige hier sind nun kommunistische Fanatiker, andere stehen kurz davor zu verhungern. Zeit dem Wahnsinn hier Einhalt zu gebieten..."
  #Why not give the opportunity to create a competitor to the Red Line (socialists who don't tolerate totalitarians/radicals/communists...; democratic socialists; moderates...)
  communist_rename_event.4.a: "Lang lebe die Kommunisticheskaya!"
  #communist_rename_event.4.b: "Ein neues Zeitalter für die Sportivnaya"

  communist_rename_event.5.t: "Sovietisierung: [329.GetName]"
  communist_rename_event.5_trotskyist: "Wir haben diese trotzkistischen Banditen aus dieser Station vertrieben, jedoch ist sie nun kaum mehr als eine Ruine. Was sollen wir nun mit ihr tun?"
  communist_rename_event.5_desc: "Wir haben diese Station von den Feinden des Volkes zurückerobert, nun müssen wir uns an den Wiederaufbau machen."
  communist_rename_event.5.a: "Lasst die Stalinskaya in ihrem alten Glanz erstrahlen!"
  communist_rename_event.5.b: "Bennent sie nach Trotzky!"
  communist_rename_event.5.c: "Gebt ihr ihren alten Namen zurück und beginnt den Wiederaufbau."

  communist_rename_event.6.t: "Sovietisierung: [264.GetName]"
  communist_rename_event.6.d: "Wir haben die Station [264.GetName] erobert, den Geburtsort der Roten Linie. Lasst sie durch unsere Hände wieder in ihrem alten Glanz ertrahlen, gesäubert von den Übeln des Kapitalismus."
  communist_rename_event.6.a: "Lang lebe die Znamya Revolyutsii!"

  communist_rename_event.7.t: "Sovietisierung: [245.GetName]"
  communist_rename_event.7.d: "Wir haben die Station [245.GetName] erobert, eine der ersten Stationen der Moskauer Metro. Hier befanden sich im großen Vaterländischen Krieg das Zentralkommando der UdSSR und nun werden wir die Station wieder in ihrem alten Glanz erstrahlen lassen."
  communist_rename_event.7.a: "Lang lebe Kirovskaya!"

  communist_rename_event.8.t: "Sovietisierung: [362.GetName]"
  communist_rename_event.8.d: "Wir haben die Station [362.GetName] von den Kapitalisten erobert, eine der ersten Stationen der Moskauer Metro!"
  communist_rename_event.8.a: "Lang lebe Prospekt Marksa!"

 communist_rename_event.9.t: "Sovietisierung:[288.GetName]"
  communist_rename_event.9.d: "Wir haben die Station den Volksfeinden wieder entrissen. In unseren Händen wird sie erneut erstrahlen, und ihr Licht wird all das übertreffen, was von den verdammten Kapitalisten geschaffen wurde."
  communist_rename_event.9.a: "Lang lebe Leninskiye Gory!"

