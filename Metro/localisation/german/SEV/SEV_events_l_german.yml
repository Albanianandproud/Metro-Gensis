l_german:
 nf_SEV.1.t:0 "Das Wasserkraftwerk Sewastopolskaja"
 nf_SEV.1.d:0 "Das Wasserkraftwerk Sewastopolskaja verfügt über eine Doppelstation: Sewastopolskaya und Kachowskaya. Die Station besitzt darüber hinaus mehrere leistungsstarke Wasserkraftturbinen, die das hier strömende Grundwasser zur Stromerzeugung nutzen. Sie ist eine der wichtigsten Energiequellen der Moskauer Metro und versorgt die gesamte südliche Hälfte der Hanse mit Strom. Im gegenzug dafür erhät die Station Waffen und Munition, um sich gegen die Mutanten zu wehren, welche ständig aus dem Süden herannahen."
 nf_SEV.1.a:0 "Wir werden uns bis zum letzten mann verteidigen!"

 nf_SEV.2.t: "Vermisste Karawane"
 nf_SEV.2.d: "Die Karawane, die wir zum Handel an die Serpuchowskaya schickten, ist seit Tagen verschwunden. Eine derartig lange Verzögerung hat es bei uns noch nie gegeben, was uns zur Schlussfolgerung führt, dass irgendetwas mit ihnen passiert sein muss. Die Telefonverbindung mit der Hanza funktioniert ebenfalls nicht. Ohne die Munition, die sie mitgebracht hätten, könnten wir den Mutanten nicht länger als ein bis zwei Wochen lang standhalten. Danach müssten wir unsere Südtore schließen, aber 2/3 unserer Generatoren befinden sich dort. Wir können die Hanse nicht länger mit Strom versorgen und unser Handel mit ihnen könnte zusammenbrechen."
 nf_SEV.2.a: "Schicken Sie eine Troika, um die Karawane zu suchen"

 nf_SEV.3.t: "Die Troika kehrt zurück"
 nf_SEV.3.d: "Die Troika die wir ausgesandt hatten, kehrte mit schlechten Nachrichten zurück: Das hermetische Tor and der Tulskaya wurde geschlossen, wir sind jetzt vollständig von der Hanse getrennt. Nach einer Dringlichkeitssitzung blieb uns nur eine Möglichkeit, zwei Leute in Schutzanzügen auszuschicken, die wir in Richtung Kashirskaya bringen und die dann versuchen müssen, die Hanse über die Zamoskvoretskaya-Linie zu erreichen, dann die Tulskaya und dort die Tore zu öffnen. Wenn dies nicht gelingt können wir immernoch versuchen, die Tulskaya von der Oberfläche aus zu erreichen oder unsere Südtore zu schließen und die Verbindung mit der Metro ganz aufzugeben."
 nf_SEV.3.a: "Hoffen wir, dass sie Erfolg haben werden"

 nf_SEV.4.t: "Keine Neuigkeiten von unseren Leuten"
 nf_SEV.4.d: "Tage sind vergangen, seitdem wir sie in die östlichen Tunnel geschickt haben, doch von unseren Leuten oder der Karawane fehlt jede Spur. Was auch immer der Grund ist, wir können kaum noch warten. Wir müssen einen Angriffstrupp an die Tulskaya schicken, um die hermetischen Tore mit Gewalt zu öffnen."
 nf_SEV.4.a: "Sie sind unsere letzte Hoffnung"

 nf_SEV.5.t: "Der Angriffstrupp kehrt zurück"
 nf_SEV.5.d: "Der Angriffstrupp kehrte zurück, ohne jedoch dazu zu kommen, seine Aufgabe zu erfüllen. Die Tulskaya ist tot, die ganze Station wurde niedergebrannt, niemand hat dort überlebt. Was könnte hier nur passiert sein?"
 nf_SEV.5.a: "Stellt den Kontakt zur Hanse wieder her"

 nf_SEV.6.t: "Verbindung wiederhergestellt"
 nf_SEV.6.d: "Es gelang uns, die Telefonverbindung mit der Hanse wiederherzustellen, eine Erklärung vom Stationsleiter der Dobryninskaya erhielten wir jedoch nicht. Es gibt jedoch Gerüchte über eine Kolone von unmarkierten Soldaten, die in Richtung Tulskaya fährt."
 nf_SEV.6.a: "Vielleciht werden wir die Wahrheit nie erfahren"

 nf_SEV.7.t: "Das Depot der Kakhovskaya-Linie"
 nf_SEV.7.d: "Der Eingang des Depots vom Tunnel aus ist mit Metallstangen mit einem Totenkopfschild verschweißt. Das bedeutet auf jeden Fall, dass das gefährlich werden kann. Unabhängig davon müssen wir herausfinden, was dahinter ist."
 nf_SEV.7.a: "Entfernt die Barrikade!"

 nf_SEV.8.t: "Mutanten im Depot"
 nf_SEV.8.d: "Die Metallbarrikade wurde abgerissen, um das Depot dahinter freizulegen. Und dann geschah es, hunderte Augen in der Dunkelheit stürmten auf unsere Soldaten zu. Es gab einen Grund, warum dieses Depot einst geschlossen wurde."
 nf_SEV.8.a: "Verdammt!"

 nf_SEV.9.t: "Nichts von Wert"
 nf_SEV.9.d: "Die Metallbarrikade wurde abgerissen, um den Tunnel dahinter freizulegen. Jenseits der absoluten Leere lag nichts, das Depot scheint schon vor langer Zeit verlassen worden zu sein."
 nf_SEV.9.a: "Na gut"

 nf_SEV.10.t: "Ein Lager seltener Rohstoffe"
 nf_SEV.10.d: "Die Metallbarrikade wurde abgerissen, um den Tunnel dahinter freizulegen Das Depot scheint schon vor langer Zeit verlassen worden zu sein, aber wir haben viele nützliche Metallgeräte gefunden

."
 nf_SEV.10.a: "Faszinierend"

 nf_SEV.11.t:0 "[From.GetNameDefCap] möchte sich [Root.GetFactionName] anschließen"
 nf_SEV.11.d:0 "Angesichts der zunehmenden Bedrohung der Freiheit und der demokratischen Werte betrachtet uns die [alliance_applicant.GetAdjective] als Verteidiger der Freiheit. Sie möchten nun in unser Bündnis aufgenommen werden, sowohl um unseren Schutz zu genießen als auch um uns gegen die Kräfte zu mobilisieren zu stehen, die die Demokratie bedrohen würden."
 nf_SEV.11.a:0 "Jeder der für Freiheit und Demokratie einsteht, soll sich uns anschließen."
 nf_SEV.11.b:0 "Ohne sie sind wir besser dran."
 nf_SEV.12.t:0 "[alliance_inviter.GetNameDefCap] begrüßt uns in der [alliance_inviter.GetFactionName]"
 nf_SEV.12.d:0 "[alliance_inviter.GetNameDefCap] hat unsere Einladung in [alliance_inviter.GetFactionName] angenommen. Von nun an stehen wir gemeinsam."
 nf_SEV.12.a:0 "Gemeinsam werden wir die Demokratie verteidigen."
 nf_SEV.13.t:0 "[alliance_inviter.GetNameDefCap] denies request to join the [alliance_inviter.GetFactionName]"
 nf_SEV.13.d:0 "[alliance_inviter.GetNameDefCap] leht die Einladung in [alliance_inviter.GetFactionName] ab. Wir werden wohl ohne sie auskommen müssen."
 nf_SEV.13.a:0 "Sie nennen sich Verteidiger der Demokratie?"