l_german:

 nf_DMD.1.t:0 "Der Staat der Domodedovskaya"
 nf_DMD.1.d:0 "Wir kontrollieren ein Bündnis aus drei Stationen: Domodedovskaya, Orekhovo und die Krasnogvardeyskaya, die als Wachposten zur Verteidigung gegen die Mutanten aus den Osttunneln dient. Das Hauptproblem hier ist die völlige Isolation, da es in der Nähe keine bewohnten Stationen gibt und eine Reise zur Inneren Metro aufgrund der starken Strahlung beinahe schon Selbstmord gleicht. Hinzu kommt, dass die Stationen nur noch von einem einzigen Generator an der Domodedowskaja versorgt werden, da der Generator von Orechowo ausgefallen ist. Teilweise aus diesem Grund werden die Stationen mit Fackeln anstatt mit Lampen beleuchtet. Orekhovo produziert Kartoffeln und Pilze, während die Domodedovskaya Schweine züchtet. Nördlich von Orechowo gibt es keinen Wachposten, da Zarizyno überflutet und durch seine hermetische Tore verschlossen ist ..."
 nf_DMD.1.a:0 "Wir müssen durchhalten, auch wenn wir allein sind!"

 nf_DMD.2.t:0 "Ein unerwarteter Besuch von der Pechatniki"
 nf_DMD.2.d:0 "Heute trafen drei Stalker unter der Führung von Oleg Nemov ein. Die Stationsleitung von Pechatniki hat ein Funksignal von einem Überlebenden der Kaluga empfangen. Und sie haben einen Plan, wie sie dorthin kommen – mit einem Luftschiff."
 nf_DMD.2.a:0 "Ein Luftschiff?"

 nf_DMD.3.t:0 "Einziger Überlebender der Militäreinheit Biryulevo"
 nf_DMD.3.d:0 "Stalker aus Petschatniki retteten einen Mann an der Oberfläche, der zufällig der letzte Überlebende der Militäreinheit Biryulevo war. Sergei Wilder, ein Arzt, der der Geschäftsleitung mitteilte, dass sich dort in einem Hangar ein intaktes Luftschiff befinde. Seitdem sind jedoch Jahre vergangen. Oleg Nemov weiß, wo der Arzt ist: Er lebt allein im Tunnel zwischen Krasnogvardeyskaya und Alma Atinskaya. Er wird als Führer benötigt, um die Militäreinheit zu erreichen. Es besteht auch die Möglichkeit, dass wir Teile für die Reparatur des Generators in Orechowo besorgen können."
 nf_DMD.3.a:0 "Lasst ihn uns dann finden."

 nf_DMD.4.t:0 "Der Arzt wurde gefunden"
 nf_DMD.4.d:0 "Oleg Nemov hatte Recht, der Arzt war da, obwohl es gefährlich war, von der Krasnogvardeyskaya zum Tunnel zu gelangen, da dort ein riesiger Mutantenfrosch lebte, der Säure spuckte."
 nf_DMD.4.a:0 "Gut, bereiten Sie die Expedition vor."

 nf_DMD.5.t:0 "Die Expedition kehrt erfolgreich zurück"
 nf_DMD.5.d:0 "Die Expedition fand das Luftschiff zusammen mit in Metallzylindern gespeichertem Helium, obwohl es einiger Reparatur bedarf. Darüber hinaus verfügt der Hangar über eine Verbindung zur Metro-2, die zufällig über einen Tunnel verfügt, der zu einem Luftschutzbunker neben der Station Orechowo führt. Einige Menschen starben und der Arzt wurde als Verräter entlarvt – er tötete damals jeden in der Militäreinheit nach einem Vorfall, bei dem er von etwas gestochen wurde, das ihn gelegentlich wahnsinnig machte. Er hinterließ eine Notiz über den Vorfall im Bunker der Militäreinheit, sodass die ganze Geschichte ans Licht kam. Offenbar starb er, als er versuchte, der Expedition zu entkommen. Doch am Ende fand die Expedition viele Dinge, die aus den Räumen der Metro-2 geborgen werden können."
 nf_DMD.5.a:0 "Gute Neuigkeiten! Schicken Sie Leute zur Bergung und Reparatur des Schiffes!"

 nf_DMD.6.t:0 "Die Bergungsteams finden Ersatzteile für den Generator"
 nf_DMD.6.d:0 "Am Tag nach der Rückkehr wurde der erste Kurbelwagen mit Ersatzteilen für den kaputten Dieselgenerator ausgestattet und zurückgebracht. Von diesem Moment an verfügt die Station wieder über elektrische Beleuchtung. Das Leben der Bewohner von Orechowo verbessert sich allmählich, sie erwerben Ausrüstung für Einsätze, Waffen und Munition. Auf den Gesichtern der Menschen ist nun häufiger ein Lächeln zu sehen. Der Erfolg inspirierte sie, das Leben wurde zumindest ein wenig einfacher. Jetzt ist es möglich, die Farmen dank Strom zu erweitern, die Station und die Wirtschaftsräume in Ordnung zu bringen."
 nf_DMD.6.a:0 "Erstaunlich, konzentrieren Sie sich auf die Bergung"
 nf_DMD.6.b:0 "Erstaunlich, denken wir jetzt an die Verteidigung der Stationen"

 nf_DMD.7.t:0 "Katastrophe an der Orekhovo"
 nf_DMD.7.d:0 "Wir wissen nicht genau, was passiert ist, aber wir hörten ein Grollen und Todesschreie aus Orechowo. Wir haben sofort Verstärkung aus der Krasnogvardeyskaya gerufen, doch als wir ankamen, war es schon zu spät. Aus den Tunneln von Orechowo kam es zu einer großen Überschwemmung, die viele Wassermutanten an die Domodedovskaya spülte. Wir haben sofort damit begonnen, Frauen und Kinder an die Krasnogvardeyskaya zu evakuieren und uns gegen die ankommende Flut zu verteidigen, doch unsere Position scheint unhaltbar zu sein. Was sollen wir tun??"
 nf_DMD.7.a:0 "Evakuieren Sie unsere Stationen sofort in Richtung Oberfläche. Wir müssen versuchen, Pechatniki zu erreichen! (Das Spiel endet für euch)"
 nf_DMD.7.b:0 "Wir müssen Domodedovskaya halten und auf die Verstärkung aus der Krasnogvardeyskaya warten!"

 nf_DMD.8.t:0 "Sobatageversuch in Orekhovo"
 nf_DMD.8.d:0 "Es gab einen Versuch, die hermetischen Tore zwischen Zarizyno und Orechowo zu zerstören. Die neu aufgestellten Wachen und Verteidigungsanlagen verhinderten die Katastrophe, es stellte sich jedoch die Frage, wie jemand dorthin gelangen konnte, da die Person aus der Zarizyno eingetroffen sein musste. In jedem Fall haben wir die hermetischen Tore repariert und können sie nun als Zugang nach Zarizyno nutzen."
 nf_DMD.8.a:0 "Gott sei Dank! Setzen Sie nun die Erkundung von Metro-2 und der Militäreinheit fort."
