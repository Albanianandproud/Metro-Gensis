l_german:

 backwards_industry: "Mangelhafte Industrie"
 backwards_industry_desc: "Das Fehlen einer nennenswerten industriellen Basis hat den Strombedarf auf ein Minimum beschränkt, wenngleich die Station Schwierigkeiten hat, den Fertigungsbedarf ihrer Bevölkerung zu decken.\n\nDer Besitz von §Y15 Werkstätten§! oder mehr entfernt diesen §YNationalgeist§!."
 backwards_industry_countdown: "Steigender Energieverbrauch"

 poor_and_backwards: "Verarmt"
 poor_and_backwards_desc: "Selbst die von Schimmel durchzogenen Fliesen und keramischen Kunstwerke, die die Wände der Station zieren, werden herausgerissen und gegen eine Handvoll Patronen verkauft – nur um zu verhindern, dass die Station die Alten verschlingt oder vollends in Barbarei versinkt."
 giant_enemy_spider: "Dunkle Spinne"
 giant_enemy_spider_desc: "In den Tunneln, die nach Trubnaja führen, lauert eine böse Präsenz. Sie ist derart berüchtigt und unheilvoll, dass viele Bewohner der Dostojewskaja es vorziehen würden, nackt und ohne Maske an der Oberfläche zu reisen, anstatt sich in die Tiefen zu wagen."

 metro_ruins:0 "Metro-Ruinen"
 metro_ruins_desc:0 "Ungezählte Meilen von Schienen (472Km) und eine schier endlose Zahl an Tunneln und Verbindungen in der Tiefe unter Moskau. Man weiß nie was man hinter der nächsten Abzweigung findet."

 hanza_redline_war:0 "Wunden des Koalitions-Krieges"
 hanza_redline_war_desc:0 "Der blutigste Konflikt den die Metro seit dem großen Krieg gesehen hat, von vielen auch der erste Metrokrieg genannt. Der Krieg wurde hauptsächlich zwischen der §BAnti-Kommunistischen Koalition§! unter Führung der §YHanse§! und den Kommunisten der §RSokolnicheskaya§!-Linie ausgetragen und nahm vielerorts mehr die Form eines Massakers, als eines geordneten Feldzuges an. Unzählige Tote für jeden gewonnenen Meter Tunnel, Kamikaze-Angriffe, Hinrichtung von Kriegsgefangenen, Flammenwerfereinsatz, alles auf beiden Seiten. Dennoch schaffte es keiner der Kriegsteilnehmer, ein Ziel von Wert einzunehmen und es auch dauerhaft zu halten, was die Kampfeinsätze und erbrachten Opfer als sinnlos erschienen ließ. Die Moral brach schnell zusammen, Desertationen und Korruption war der Alltag und ein Sieg wurde für beide Seiten unmöglich. Um zu verhindern dass ihre beiden Regierungen von ihren eigenen Soldaten gestürzt wurden, kam es zu einem Friedensabkommen, womit das bisher blutigste Kapitel der Metrogeschichte sein vorläufiges Ende fand. Doch noch sind die vielen Todesopfer noch nicht vergessen und es wird seine Zeit dauern, bis die Bevölkerung dieser beiden Nationen sich wieder freiwillig zum Dienst meldet."

 metro_thump_in_the_night: "Ein Klopfen in der Nacht"
 metro_thump_In_the_night_desc: "Auf der §YArbatsko-Pokrovskaya-Linie§! vom Rest der Metro getrennt, sind diese isolierten Gemeinschaften Banditen und Mutanten schutzlos ausgeliefert. Oft sind sie zu isoliert, um sich gegenseitig zu schützen."
 metro_thump_in_the_night_modifier: "\nEingeschränkte §RHandels-§! und §RGrenzkontroll-Gesetze§!. §Y[GWC.GetFlag][GWC.GetName]§! Darf nicht länger eine Bedrohung für uns sein, damit dieser Nationalgeist entfernt wird!\n"
 
