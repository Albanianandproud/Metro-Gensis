l_german:
  AVT_introduction:0 "Die erste interstationale Brigade von Che Guevara"
  AVT_introduction_desc:0 "Unter dem Kommando von Kommissar Russakow rollt die Brigade fast die gesamte Metro entlang, führt subversive Aktivitäten durch und trägt den Krieg bis vor die Haustür des Reiches."
  
  AVT_collectivization:0 "Kollektivierung"
  AVT_collectivization_desc:0 "Es sollten große Fortschritte bei der ordnungsgemäßen Organisation und Verwaltung unserer Station gemacht werden. Wie werden wir den Kampf gegen unsere finsteren Feinde  angehen, wenn wir nicht in der Lage sind, alle Facetten unserer Gesellschaft wirksam zusammenarbeiten zu lassen?"

  AVT_gas_lighting:0 "Gasbeleuchtung"
  AVT_gas_lighting_desc:0 "Es ist nicht bekannt, was genau hier draußen im Dunkeln lauert. Seien es jene, die die Revolution zerstören wollen, oder noch finsterere Gestalten. Wir müssen wachsam bleiben, die Installation einer geeigneten Beleuchtung würde den Bewachungsmissionen unserer Garnisonstruppen besser gerecht werden."

  AVT_preliminary_defences:0 "Äußere Barrikaden"
  AVT_preliminary_defences_desc:0 "Der Feind konnte jederzeit und an jedem Ort zuschlagen. Es wäre klug, Verteidigungsstellungen vorbereitet zu haben."

  AVT_tunnel_clearing:0 "Tunnelsäuberung"
  AVT_tunnel_clearing_desc:0 "Man kann mit Sicherheit davon ausgehen, dass sich unsere Aktivitäten einmal über die gesamte Metro erstrecken werden. Aber wir sollten uns nicht von Überraschungsangriffen erwischen lassen. Es wäre ein guter Plan, über detaillierte Kenntnisse unserer unmittelbaren Umgebung zu verfügen, damit wir nicht in den sprichwörtlichen heruntergezogenen Hosen von unseren Feinden erwischt werden."

  AVT_infrastructure_3:0 "Infrastrukturentwicklung"
  AVT_infrastructure_3_desc:0 "Seit der letzten routinemäßigen Wartung der Metro sind in etwa 20 Jahre vergangen, und im Beton beginnen sich Risse zu zeigen. Nach aktuellen Schätzungen könnte es jeden Moment zu einem Tunneleinsturz kommen, der unseren Betrieb erheblich einschränken und uns möglicherweise weitestgehend von der restlichen Metro abschneiden könnte. Es sollten umgehend geeignete Absperrungen und Stützen errichtet werden."

  AVT_population_build_slots:0 "Garantiert eine sichere Passage für Flüchtlinge"
  AVT_population_build_slots_desc:0 "Wir sind nicht nur eine revolutionäre Kraft – wir bauen eine Gesellschaft für morgen auf, die durch die Hände der Menschen von heute errichtet wird. Die Armen, die Hungrigen und die Müden können kommen und wissen, dass wir sie beschützen werden."

  AVT_1:0 "Industrielle Wiederbelebung"
  AVT_1_desc:0 ""

  AVT_2:0 "Militärische Wiederbelebung"
  AVT_2_desc:0 ""

  AVT_3:0 "Das Herz unserer Gemeinschaft"
  AVT_3_desc:0 "Der Arbeiter ist und bleibt das Zentrum unserer Gesellschaft, er ist es, von dem alles abhängt. Bei uns wird die Arbeit noch hoch geschätzt, auch wenn gewisse Stalinisten diese Lektion offenbar vergessen haben."

  AVT_4:0 "Waffen für den Krieg"
  AVT_4_desc:0 "Der Krieg wird kommen, das steht außer Frage. Wir müssen vorbereitet sein"

  AVT_industry_2:0 "Stations-Planung"
  AVT_industry_2_desc:0 "Natürlich können wir weitere Werkstätten und Quartiere nicht ohne ausreichenden Platz einrichten. Eine umfassende Planung über die Verwendung des uns zur Verfügung stehenden Platzes muss angegangen werden., wir müssen so viel wie möglich aus dem herausholen, was uns zur Verfügung steht."

  AVT_industry_3:0 "Technische Ausbildung"
  AVT_industry_3_desc:0 "Es wäre viel schneller und einfacher, mit einer Draisine von A nach B zu kommen, doch die meisten der Fahrzeuge die wir gefunden haben strotzen inzwischen nur so vor Rost. Zum Glück kennen wir genau die richtige Person, die uns bei der Reparatur helfen kann."

  AVT_using_the_terminal:0 "Knackt den Computer"
  AVT_using_the_terminal_desc:0 "Ein vorbeifahrender Händler bot uns als Schnäppchen diesen alten Computer an. Anscheinend stammt er noch vom alten Metrokommando und wohlmöglich ist er von unschätzbarem Wert: Der Zugang zum Rechner ist gesperrt, aber sein Speicher sollte umfassende Informationen zum Aufbau der Metro beinhalten. Wir müssen jetzt nurnoch das Passowrt knacken."

  AVT_scrapping_for_parts:0 "Nehmt ihn auseinander"
  AVT_scrapping_for_parts_desc:0 "Trotz seines Alters befindet er sich in einem bemerkenswerten Zustand. Und warum sollten wir diese Informationen überhaupt brauchen? Diese Teile werden woanders besser verwendet."

  AVT_industry_5:0 "Setzt den Computer ein"
  AVT_industry_5_desc:0 "Es ist unglaublich was diese alten Computer alles anstellen können. Von der Jugend wird er inzwischen fast wie ein uraltes mystisches Artefakt verehrt. Wir können ihn sicher sinnvoll einsetzen, um unsere Forschung zu unterstützen."

  AVT_industry_6:0 "Nutzt das alte Werkzeug"
  AVT_industry_6_desc:0 "Trotz ihres Alters behalten alte Werkzeuge und Geräte eine bemerkenswerte Haltbarkeit und Qualität. Wie das Sprichwort sagt: Wenn es nicht kaputt ist..."

  AVT_community_resource_share:0 "Gemeinsame Ressourcennutzung"
  AVT_community_resource_share_desc:0 "Durch die gemeinsame Nutzung von Ressourcen in allen Bereichen unserer Gemeinschaft könnten wir sie besser dort einsetzen, wo sie am meisten benötigt werden, und unsere Wirtschaft effektiver versorgen."

  AVT_equal_duty:0 "Gleiche Pflichten"
  AVT_equal_duty_desc:0 "Jeder muss in unserer Gemeinschaft mit anpacken, unabhängig von Alter oder Geschlecht."

  AVT_getting_the_good_stuff:0 "Das gute Zeug"
  AVT_getting_the_good_stuff_desc:0 "Unsere Stalker haben einen alten Schnappsladen an der Oberfläche ausmachen können. Das Zeug in ihm ist nicht lebensnotwendig, wird aber sicherlich die Moral erhöhen"

  AVT_equal_duty_2:0 "Radio-Propaganda"
  AVT_equal_duty_2_desc:0 "Unsere Stalker haben das Zuhause eines alten Hobbyfunkers ausmachen können. Wenn wir sein Equipment hier runter holen können wir sicherlich ein Stationsweites Radio einrichten. Da uns aber Musik fehlt, werden wir unsere ideen so verbreiten können"

  AVT_socialist_science:0 "Verbesserte Forschung und Entwicklung"
  AVT_socialist_science_desc:0 "Unser Bildungswesen erlaubt es uns inzwischen unsere Forschungsbemühungen zu intensivieren. Die Zukunft beginnt heute."

  AVT_socialist_science_2:0 "Plündert das Labor"
  AVT_socialist_science_2_desc:0 "Unweit des Schnapssladens fanden wir noch etwas Außergewöhnliches, ein echtes chemisches Labor aus der Vorkriegszeit. Sehen wir mal, welche Schätze wir dort finden werden"

  AVT_eco_buff:0 "Guerilla-Wirtschaft"
  AVT_eco_buff_desc:0 "Unsere Wirtschaft muss im Einklang mit unserer Art der Kriegsführung stehen, ansonsten wird das noch eine Katastrophe"

  AVT_eco_idea:0 "Sozialistische Wirtschaft"
  AVT_eco_idea_desc:0 "Den Sozialismus in seinem Lauf..."

  AVT_eco_idea_1:0 "Unterstützt die Gemeinschaft"
  AVT_eco_idea_1_desc:0 ""

  AVT_eco_idea_2:0 "Eine Gemeinschaft die unterstützt"
  AVT_eco_idea_2_desc:0 ""

  AVT_industry_tech_buff_1:0 "Renoviert die alten Quartiere"
  AVT_industry_tech_buff_1_desc:0 "Unsere klapprigen alten Barraken entsprechen nicht länger der Doktrin Lenins. Das Volk soll in modernen und sauberen Wohnungen leben können"

  AVT_industry_tech_buff_2:0 "Moderne Werkzeuge für moderne Menschen"
  AVT_industry_tech_buff_2_desc:0 "Eine neue Zeit braucht auch neue Werkzeuge. Wir wollen ja nicht ewig mit Messern und Feuersteinen herumhantieren"

  AVT_industry_tech_buff_3:0 "Geschmiedete Werkzeuge"
  AVT_industry_tech_buff_3_desc:0 "Schmieden ist, was uns von den Tieren unterscheidet"

  AVT_industry_tech_buff_4:0 "Ein nobles Handwerk"
  AVT_industry_tech_buff_4_desc:0 "Gibt es ein ehrbareres Handwerk als das Schmieden?"

  AVT_industry_tech_buff_5: "Ruhm für jene, die nach vorne blicken"
  AVT_industry_tech_buff_5_desc: "Um die Arbeiter der Faust haben wir uns gekümmert, doch was ist mit den Arbeitern der Stirn? Geben wir ihnen den Platz, der ihnen rechtmäßig zusteht"

  AVT_eco_idea_buff_1:0 "Gemeinsame Anstregungen"
  AVT_eco_idea_buff_1_desc:0 "Betont das 'Sozial' in Sozialismus"

  AVT_eco_idea_buff_2:0 "Inspirierte Werkstätten"
  AVT_eco_idea_buff_2_desc:0 "Ein Volk von Arbeitern, regiert von und für Arbeiter. Das sollte die Arbeitsmoral steigern können"

  AVT_eco_idea_buff_3:0 "Mehr Stationen, mehr Platz"
  AVT_eco_idea_buff_3_desc:0 "Mehr Stationen, mehr Platz für unsere glorreichen Arbeiter!"

  AVT_eco_idea_buff_4:0 "Industrielle Revolution"
  AVT_eco_idea_buff_4_desc:0 "Eine neue industrielle Revolution steht uns bevor, durch den unermüdlichen Einsatz unserer Arbeiter. Und mit ihm wird ein Zeitalter des Wohlstandes folgen!"

  AVT_world_tension_unlock:0 "Krieg zieht auf"
  AVT_world_tension_unlock_desc:0 "Krieg droht am Horizont, keine kleinen Guerilla-Gefechte wie in der Vergangenheit, sondern ein echter Krieg, der bis zum bitteren Ende ausgefochten wird. Wir müssen bereit sein, wenn er kommt."

  AVT_doctrine_1:0 "Analysiert unsere Kampftaktiken"
  AVT_doctrine_1_desc:0 "Wenn wir alles mal ganz nüchtern betrachten, so finden wir bestimmt einige Verbesserungsmöglichkeiten"

  AVT_mobilise_army:0 "Mobilisiert die Brigade"
  AVT_mobilise_army_desc:0 "Wer kämpfen will, der braucht auch Waffen. Los Männer, auf in den Kampf!"

  AVT_train_red_line:0 "Gemeinsame Operationen mit der Sokolnicheskaya"
  AVT_train_red_line_desc:0 "Nun da auf er Roten Linie nicht länger der Stalinismus herrscht, können wir unsere Beziehungen vielleicht wieder normalisieren. Sicherlich würden sie einen verwandten Geist wie den unsrigen unterstützen wollen?"

  AVT_REDLINE_support: "\nFolgende Effekte werden hinfällig, wenn unsere Beziehungen zu schlecht werden oder die Rote Linie jemand anderen als Andrey Moskvin zum Generalsekretär ernennt.\n"

  AVT_our_own_advisors:0 "Unser eigener Weg"
  AVT_our_own_advisors_desc:0 "Die Rote Linie hat die Ideale des Lenin verraten, dafür werden sie bezahlen! Tod den Kontrarevolutionären!"

  AVT_our_own_advisors_2:0 "Der Kundschafter"
  AVT_our_own_advisors_2_desc:0 "Mutanten in den eigenen Reihen zu wissen kann sich auch als einzigartiger Vorteil herausstellen. Wer sonst könnte dort hin gelangen, wo der kleine Nosov hinkommt?"

  AVT_our_own_advisors_3:0 "Der Büßer"
  AVT_our_own_advisors_3_desc:0 "Eine gegeißelte Seele, doch bereit unserer Sache zu dienen"

  AVT_train_red_line_2:0 "Standard-Übungen"
  AVT_train_red_line_2_desc:0 "Eines müssen wir der Roten Linie lassen, ihre Rote Armee ist ein echtes Heer, und nicht nur eine Bande von Saboteuren. Wir müssen unseren Stolz runterschlucken und von ihnen lernen"

  AVT_train_red_line_3:0 "Die Kriege von Übermorgen"
  AVT_train_red_line_3_desc:0 "Die Rote Linie hat während ihrer kurzen Geschichte in der Metro gegen zahlreiche Feinde gekämpft. Von einfachen Banditen bis hin zu Mutanten und Faschisten, obwohl die beiden letztgenannten durchaus identisch sein könnten. Die Untersuchung, wie die Rote Linie effektiv mit diesen Bedrohungen umgegangen ist, könnte unseren Kommandeuren wertvolle Erkenntnisse liefern, falls wir diesen Feinden jemals im Untergrund begegnen sollten."

  AVT_perfect_force:0 "Eine Armee des Volkes"
  AVT_perfect_force_desc:0 ""

