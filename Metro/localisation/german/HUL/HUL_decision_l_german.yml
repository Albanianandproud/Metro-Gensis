l_german:
 HUL_war_with_aviators_category: "Konflikt mit den Piloten"
 HUL_aviator_war_countdown: "Scharmützel-Countdown"
 HUL_aviator_war_countdown_desc: "Wir haben schon vor langer Zeit gegen die Piloten gekämpft und sie aus der Metro vertrieben. Doch während all dieser Jahre haben sie Pläne geschmiedet und heimlich darauf hingearbeitet, erneut in die Metro vorzustoßen."

 HUL_aviator_mission_category: "Unterstützung des Konstruktionsbüros"
 HUL_aviator_mission_give_electronics: "Elektronik bereitstellen"
 HUL_aviator_mission_give_electronics_desc: "Nachdem wir ihre Expeditionsstreitkräfte zurückgeschlagen hatten, wurden ihre Bemühungen zur Ressourcenbeschaffung praktisch auf null zurückgeworfen. Es ist erstaunlich, dass sie nicht einfach in die Barbarei zurückfielen; stattdessen rattern ihre Computer noch immer vor sich hin und führen Berechnungen durch. Sie versichern uns, dass ihre Absichten durchweg edel seien und dass ihre Forschung uns allen zugutekommen werde. Können wir ihnen wirklich vertrauen?"
 HUL_already_assisting_aviators: "Unterstützt bereits die §Y[AVV.GetName]§!"
 HUL_aviator_mission_give_fuel: "Unsere Generatoren bereitstellen"
 HUL_aviator_mission_give_fuel_desc: "Die Anlage der [AVV.GetName] wurde für ein langfristiges Leben unter der Erde errichtet. Einfach, aber im Vergleich zur Metro dennoch komfortabel. Doch da ihre Forschung in den letzten Monaten stark ausgeweitet wurde, geraten ihre Ressourcen zunehmend unter Druck. Sie mussten bereits Energie rationieren und teilweise wieder bei Kerzenlicht arbeiten, um ihre Studien fortzusetzen."
 HUL_aviator_mission_give_research: "Technische Unterstützung leisten"
 HUL_aviator_mission_give_research_desc: "Ihre unterirdischen Bunker werden erst seit Kurzem erweitert, um ihren immer umfangreicheren Forschungsprojekten gerecht zu werden. Keller, Abwassertunnel und Parkhäuser werden vereinnahmt und schwer befestigt. Dieses Wachstum bringt erhebliche Schwierigkeiten mit sich, weshalb sie um unsere Unterstützung bitten, damit ihre Zeitpläne eingehalten werden können."

 HUL_aviator_mission_final_research_mission: "Der letzte Schritt"
 HUL_aviator_mission_final_research_mission_desc: "Nur noch ein kleines Stück weiter... Eine letzte Hürde bleibt."

 HUL_aviator_assistance_give_guns: "Waffenlieferungen anfordern"
 HUL_aviator_assistance_give_guns_desc: "Die alten Stanzpressen und CNC-Maschinen stehen zwar still, wurden aber nicht vergessen. Wenn wir ein gutes Wort für uns einlegen, sind die Piloten bereit, uns Waffen zu liefern."

 HUL_aviator_assistance_produce_combat_ai: "Kampfroboter produzieren"
 HUL_aviator_assistance_produce_combat_ai_desc: "Einfach, grob, aber tödlich effizient. Diese Maschinen können unsere Streitkräfte erheblich verstärken."

 HUL_aviator_assistance_gear: "Unsere Ausrüstung verbessern"
 HUL_aviator_assistance_gear_desc: "Die Ingenieure meinen, dass wir überschüssige Verbundwerkstoffe der [AVV.GetName] nutzen könnten, um die Ausrüstung unserer Streitkräfte zu verbessern."

 HUL_aviator_assistance_industry: "Unsere Techniker unterstützen"
 HUL_aviator_assistance_industry_desc: "Die [AVV.GetName] könnten bereit sein, unseren Büchsenmachern und Technikern unter die Arme zu greifen. Sicherlich verfügen sie über technische Fachbücher oder sogar über eine alte Stanzmaschine, die wir studieren könnten."

 HUL_newpaper_category: "Freie Presse"
 HUL_newspaper_spread_mischief: "Falsche Gerüchte über [FROM.GetName] verbreiten"
 HUL_newspaper_spread_support: "Unterstützung für [FROM.GetName] verbreiten"