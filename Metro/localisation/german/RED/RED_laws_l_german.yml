 ### Laws ###
 RED_standing_army:0 "Stehende Streitkraft"
 RED_standing_army_desc:0 "Eine gut organisierte stehende Armee, die Mutanten und Feinde in Schach halten kann. Sie kann die Interessen der Revolution und der Roten Linie verteidigen."

 RED_forced_conscription:0 "Zwangsrekrutierung"
 RED_forced_conscription_desc:0 "In Zeiten kommender Konflikte müssen alle dem Ruf der Rodina folgen und an ihrer Seite stehen. Ob sie dazu bereit sind oder nicht, sie werden in einen Konflikt gezwungen, um ihre Häuser und Familien gegen den herannahenden Sturm zu verteidigen. Gewehr und Bajonett in der Hand."

 RED_mandatory_service:0 "Pflichtdienst"
 RED_mandatory_service_desc:0 "Der Krieg rückt näher, alle müssen als unzerbrechlicher Schutzschild gegen jene zusammenstehen, die die Rote Linie zerstören wollen. Gemeinsam stehen wir, gemeinsam kämpfen wir."

 RED_blood_for_the_rodnaya:0 "§RBlut für die Revolution!§!"
 RED_blood_for_the_rodnaya_desc:0 "Der Feind wird in seinem eigenen Blut ertrinken, bevor er unsere Stationen erreicht! Kein Rückzug. Keine Kapitulation. Kein Zentimeter Land. Für die Rote Linie!"

