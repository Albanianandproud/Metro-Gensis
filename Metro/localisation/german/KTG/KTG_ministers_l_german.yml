l_german:
 KTG_korolkov:0 "Sergey Korolkov"
 KTG_korolkov_desc_:0 "Ein ehemaliger Boxer der Trudovye Rezervy, einem Sportverein der noch in der Soviet-Union gegründet wurde. Korolkov führt die slavische Hälfte von Kitay Gorod und trotz seines Alters wird er nach wie vor von seiner Umgebung bewundert und gefürchtet."
 KTG_the_king:0 "Der King"
 KTG_the_king_desc:0 "Der King bleibt der King, selbst nach dem Ende der Welt."
 
 KTG_rasul:0 "Rasul"
 KTG_rasul_desc:0 "Rasul ist einer der Ringleiter in Kitay Gorod und dazu Anführer der kaukasischen Diaspora in der Metro, größtenteils jedoch die Aserbaijanis und die Tschetschenen. Unter seiner Führung hält man zum islamischen Glauben und seinen Traditionen."
 KTG_faith:0 "Gläubiger Muslim"

 KTG_yermolai:0 "Yermolai"
 KTG_yermolai_desc:0 "Jermolai steht dem slawischen Teil von Kitai-Gorod vor. Er ist ein ideologischer Anhänger der legendären Banditen Sylvester und Rospisi."
 KTG_the_true_bandit:0 "Der wahre Bandit"