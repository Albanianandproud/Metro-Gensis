l_russian:
 nf_STB.1.t: "В ночь"
 nf_STB.1.d: "Штёртебекер служил верно.\n\nКаждый приказ выполнялся без колебаний. Каждая директива исполнялась беспрекословно. Преданности, казалось, было достаточно, и она доказывалась снова и снова.\n\Штёртебекер читал отчёты, даже лично подписывал некоторые из них. Имя, которое слишком долго шепталось, а затем – исчезло. Как будто никогда и не существовало. Штёртебекер знал, к чему это приведет, и не колебался узнать.\n\nТе, кто последовал за ним, уже сделали свой выбор. Преданность, возможно, не было сильным словом, но в какой-то степени они были беспомощны. Они двигались быстро. Припасы, оружие, все, что можно было пронести в темноту, не привлекая внимания.\n\nЕсть станция, давно заброшенная. Забытая всеми. Вдали от рыскающих вылазок Рейха и теперь наш временный дом."
 nf_STB.1.a: "[STB.Capital.GetName], наш новый дом."
 nf_STB.2.t: "Закупка ресурсов"
 nf_STB.2.d: "Станция [STB.Capital.GetName] могла быть худшим местом, где наша бригада могла бы обосноваться. Просачивающаяся радиация, бесконтрольные мутанты и аномалии. Возможно, в какой-то степени это идеальное убежище, пока мы не залижем раны и не перегруппируемся. Никто не посмеет искать нас здесь.\n\nНеобходимость перегруппировки и консолидации сейчас как никогда остра. Запасы быстро истощаются: боеприпасы, медикаменты, снаряжение. Вскоре мы будем есть свои кожаные сапоги или друг друга."
 nf_STB.2.a: "Мы должны осторожно протянуть руку и обеспечить себя всем необходимым. Даже силой."
 nf_STB.2.a.tt: "§Y[STB.GetName]§! не «улучшает» свои исследования посредством реформ образования, в отличие от большинства стран. Без значительной исследовательской базы придётся «воровать» планы исследований со станций.\n\nПроверьте §YИсследовательский шпионаж§!, в правом нижнем углу экрана §C(во вкладке «Набеги»)§!, для проведения набегов."
 nf_STB.3.t: "Неограниченный потенциал"
 nf_STB.3.d: "Прибыв под пристальным взглядом четверти дюжины вооруженных охранников, казалось, будто они действуют как отряд, сопровождающий заключенного. Ученый, доктор Тодоров, по всем сохранившимся свидетельствам, был блестящим человеком. Его работы покорили Рейх, и если бы не его сомнительная этика и методы, граничащие с отвратительными даже для фюрера, то Рейхский треугольник мог бы соперничать с Полисом по уровню научного гениальности. Слухи, как всегда, следовали за ним. Шепотом рассказывали о ужасных экспериментах, которые стирали грань между медициной и дикостью, о подопытных, которые никогда не собирались выживать, но каким-то образом выжили... преобразились.\n\nОн охотно вошел в наши владения, его взгляд был прикован к нам с восхищением, словно он попал в величественную лабораторию, а не в разрушающиеся обломки. Он надеется значительно ускорить наши исследовательские усилия, однако сотрудничество имеет свою цену. Доступ к объектам исследования и возможность заниматься своим «любопытством», куда бы оно ни привело.\n\nНекоторые из наших рядов уже называют его чудовищем, и лишь немногие видят в нём перспективу."
 nf_STB.3.a: "Пусть работает. Мы решим, что необходимо."
 nf_STB.4.t: "Добровольное подчинение"
 nf_STB.4.d: "Запрос доктора Тодорова поступил официально, аккуратно оформленный в виде письменного конверта. Его могли бы высмеять как шутку, если бы более трети нашей бригады умело читали и писали. Доктор Тодоров, казалось, жаждал подопытных, вежливо попросил он. Не просто случайные образцы крыс, которые у него были раньше, нет. Он уточнил — живых подопытных. Сознательных, не больных, не старых и не немощных. Его записи были тщательными, полными аннотаций и диаграмм, которые предполагали болезненную ясность цели. Гораздо более тревожную, чем когда-либо могло представить себе безумие.\n\Как и следовало ожидать, посыпались вопросы. И без колебаний доктор ответил.\n\nЧеловеческая форма имеет свои пределы, сказал он нам. С пределами лучше всего наблюдать, когда они превышены.\n\nУ нас нет недостатка в заключенных, отбросах и других, кто мог бы стать подопытными. Бригада не всегда может позволить себе патроны для решающей казни, чтобы отсеять мякину... Может быть, скальпель — лучший из возможных методов?\n\nДоктор ждёт."
 nf_STB.4.a: "Позвольте ему проводить эксперименты."
 nf_STB.4.b: "Это полнейшее безумие."
 nf_STB.5.t: "Проект Суперсолдатен"
 nf_STB.5.d: ""
 nf_STB.5.a: ""
 nf_STB.6.t: ""
 nf_STB.6.d: ""
 nf_STB.6.a: ""
 nf_STB.7.t: "Человек-реплика"
 nf_STB.7.d: "Исследования доктора Тодорова значительно продвинулись с тех пор, как мы начали свою работу. Но нам еще предстоит преодолеть одно последнее препятствие. Если раньше его работа ограничивалась операционными столами и импровизированными деревянными хижинами, то теперь он ясно говорит о «производстве». Его заметки, наспех составленные и намеренно завуалированные, подробно описывают попытки воссоздать его прежний «успех» методами, которые, кажется, противоречат как разуму, так и порядочности.\n\nЧеловеческая форма — всего лишь шаблон. Что-то, что можно корректировать, а при необходимости... отбрасывать.\n\nНо теперь его амбиции превзошли наши нынешние возможности. Он ясно дал это понять. Эти туннели, заброшенные станции и ремонтные помещения, по его словам, — «оскорбление масштаба того, что требуется».\n\nДоктор Тодоров требует специализированного исследовательского комплекса. Контролируемые, стерильные условия. Надлежащее оборудование. Объект, где его работа может продолжать... Беспрепятственно.\n\nВзамен..?\n\nАрмия, которая не задает вопросов. Не дрогнет. Армия, которая ненавидит.."
 nf_STB.7.a: "Мы дадим ему то, что ему нужно."

 nf_STB_todorov.1.t: "Первые результаты"
 nf_STB_todorov.1.d: "Доктор Тодоров настаивал на том, что процесс «деликатный», что преждевременное воздействие может нарушить подготовку субъекта. Его заверения мало что сделали для того, чтобы развеять беспокойство, распространявшееся на станции. Охранники говорили приглушенным тоном. Некоторые просили дежурить в туннеле, а некоторые просто замолчали.\n\nСегодня Он представил свою работу.\n\nПеред нами предстало подобие человека. Судя по тому, что мы могли расшифровать по очертаниям человеческого тела. Но ужасно... Искаженное. Переделанное. Преувеличенное до неестественных пределов. Кожа растянута и отслоилась в неподходящих местах. Хирургические швы образуют хаотичную сеть по всему телу.\n\nИ всё же. Оно стояло по стойке смирно.\n\nКогда ему приказывали, оно подчинялось. Без колебаний. Ни капли страха. Оно выполняло каждый приказ с неестественная точность и медленная, неуклюжая походка. Доктор просто улыбнулся и заключил, что его эксперименты увенчались успехом."
 nf_STB_todorov.1.a: "Если оно сражается... значит, оно служит."

 nf_STB_supplies.1.t: "Невольные новобранцы"
 nf_STB_supplies.1.d: "В ряды нашей бригады пополняются изможденные тела. Изгои Рейха, которым некуда больше обратиться из-за страха перед возмездием, эти солдаты выглядят еще более неорганизованными и неряшливыми, чем даже наши собственные. Скоро они станут нашими рядовыми бойцами."
 nf_STB_supplies.1.a: "Наша бригада растет."
 nf_STB_supplies.2.t: "Огнестрельное оружие"
 nf_STB_supplies.2.d: "Мы сделали несколько важных шагов в развитии оружия. Хотя это все еще модифицированные ублюдочные ружья. Чем больше, тем лучше, не так ли?"
 nf_STB_supplies.2.a: "Мы можем использовать это."
 nf_STB_supplies.3.t: "Комплекты снабжения"
 nf_STB_supplies.3.d: "Украденные из караванов или тайников, эти припасы теперь в наших руках. Используй или потеряешь, как говорится..."
 nf_STB_supplies.3.a: "Они пригодятся."
 nf_STB_supplies.4.t: "Тяжелые орудия"
 nf_STB_supplies.4.d: "Старые контрольно-пропускные заграждения и разбитые тележки были списаны, и теперь орудия находятся в наших руках. После некоторых доработок и ремонта они станут желанным дополнением к нашему арсеналу."
 nf_STB_supplies.4.a: "Хорошо."