 ### Immigrant Collective and Council ###
  
 EUR_immigrant_collective: "Einwandererkollektiv"
 EUR_immigrant_collective_desc: "Der Großteil der Bevölkerung Europas besteht aus Einwanderern aus den ehemaligen Ländern Europas. Die breite Bevölkerung kommt hier zusammen, um über politische Entscheidungen abzustimmen"

 EUR_elective_council: "Gewählter Rat"
 EUR_elective_council_desc: "Europa hat einen Rat gewählt gebildet, dieser Rat funktioniert wie Wahlregierungen vor dem Krieg, z.B. dem britischen Parlament. Vertreter jeder Station kommen hier zusammen, um über nationale Angelegenheiten abzustimmen."

 ### Neutral Ministers and Advisors ###
 
 _head_chancellor: "Kanzler"
 
 EUR_head_chancellor_schulz: "Kanzler Schulz"
 
 EUR_luca_bianachi: "Luca Bianachi"
 EUR_luca_bianachi_desc: "Eine sehr willensstarke Person, die sich als Militärberater im Stationenbund einen Namen gemacht hat. Er ist oft mit der Taktik des Rates nicht einverstanden, weil dieser den Kult des Großen Wurms nicht als existenzielle Bedrohung für Europa anerkennt. Er ist oft sehr eingebildet und bezeichnet sich selbst als den letzten Augustus"

 EUR_council_of_generals: "Rat der Generäle"

 EUR_amsel: "Alita Amsel"
 EUR_AMSEL_DESC: "Geboren in einer unauffälligen §YStaatssicherheit§!-Familie in der späten §YDDR§!. Für viele war die Wiedervereinigung von Ost und West ein fruchtbarer Anfang, doch für Amsels Familie brachte sie nur Härte und Armut mit sich. Nachdem ihr Vater nach dem Fall der Berliner Mauer seinen Posten verloren hatte; und seinen Traum den wahren Sozialismus zu verwirklichen, verlor er auch seinen Lebenswillen. Da er Schwierigkeiten hatte, neue Arbeit zu finden, verfiel er schließlich den Lastern und erholte sich auch dem Rest seines Lebens nicht mehr von diesem Schlag.\n\nAlita hingegen teilt mit eiserner Entschlossenheit die Vision ihres verstorbenen Vaters, die wahren sozialistische Ideale zu verwirklichen. In der Metro gibt es nun Hoffnung auf eine neue §YEuropäische Arbeiterrepublik§! doch nur unter ihrem strategischen und kompromisslosen Kommando."
 EUR_amsel_trait: "Sehnsucht Ost"
 EUR_amsel_trait_2: "Sehnsucht Ost"
 
 EUR_marshal: "Marshal Bathelt"
 EUR_MARSHAL_DESC: "Ein distanzierter Bürokrat zu Zeiten der DDR, enthüllte Marschall Bathelt jedoch in der Metro eine unbekannte Seite seines Ichs. Jetzt löst er bei seinen Anhängern uneingeschränkte Hingabe und Angst aus."
 EUR_marshal_trait: "Standhaft für die Revolution"

