l_german:
 nf_AVT.1.t: "Der Anfang"
 nf_AVT.1.d: "Nach dem revolutionären Feuer, das auf der Sokolnitscheskaja-Linie ausbrach, wurde diese Revolution nicht nur von Russen, sondern von ganz verschiedenen Völkern aus der gesamten Metro getragen. Der erste Metrokrieg beerdigte den Traum einer schnellen, umfassenden Revolution in der gesamten Metro, die Flamme des Eifers erlosch und wich dem Alltag und dem Pragmatismus. Die Rote Linie wandte sich vom Ziel einer permanenten Revolution ab und nahm die Doktrin des Sozialismus auf einer Linie an. Wir von der ersten interstationalen Kämpferbrigade haben die Lehren des Lenin nicht vergessen, wie diese verfluchten Stalinisten, doch die Situation ist zu ernst, als dass wir uns weitere innere Streitigkeiten leisten könnten. Wir müssen uns vor allem auf unsere gemeinsamen Feinde konzentrieren"
 nf_AVT.1.a: "Zerstört die kapitalistischen Versorgungsroutens"
 nf_AVT.1.b: "Diskrete Operationen die ihr Heer schwächen"
 nf_AVT.2.t: "Unabhängigkeit"
 
 nf_AVT.2.d: "Allerdings war diese Interessens-Allianz nur von kurzer Dauer. Aufgrund ideologischer Differenzen darüber, wie genau die Prinzipien des Marxismus zwischen der Interstationalen Brigade und der Roten Linie umgesetzt werden sollten, die zu diesem Zeitpunkt zunehmend unter die eiserne Faust stalinistischer Sympathisanten geriet. Das Bündnis wurde aufgelöst und das Zentralkomitee verurteilte die Brigade zur Flucht. Sie gaben ihren Posten auf, da ihr ursprünglicher Stützpunkt auf der Partizanskaja zerstört wurde. Und so zogen die Trotzkisten nach Avtozavodskaya, eine von der Revolution unberührten Station. Als die Brigade eintraf..."
 nf_AVT.2.a: "Eroberte sie die Station mit Leichtigkeit"
 nf_AVT.2.b: "Besetzte sie die Station friedlich und ohne Blutvergießen"

 nf_AVT.3.t: "Die Trennung"
 nf_AVT.3.d: "Durch die unterschiedlichen Ansichten zwischen der Brigade und der Roten Linie brandmarkte uns die Rote Linie als Verräter und Dissidenten. Ausgestoßene, Außenseiter, die immer noch von der ewigen Revolution träumen. Doch es gibt immer noch jene innerhalb der Roten Linie, die uns unterstützen"
 nf_AVT.3.a: "Unsere Symphatisanten  schickten uns Waffen"
 nf_AVT.3.b: "Wir namen so viele Waffen mit wie wir tragen konnten, bevor wir flohen"
 nf_AVT.4.t: "Regelmäßige Waffenlieferungen"
 nf_AVT.4.d: "Trotz der Ignoranz der Roten Linie über die Wahrheit der Revolution existiert immer noch ein kleines Kollektiv von echten Trotzkisten innerhalb der Roten Linie. Obwohl ihre Zahl mit jeder weiteren Säuberung abnimmt."
 nf_AVT.4.a: "Ok"

 nf_AVT.5.t: "Die Interstationale Brigade wünscht ein Abkommen"
 nf_AVT.5.d: "Die Revolutionäre kommen zu uns, um an unser Waffenwissen zu gelangen. Als Gegenleistung für Kugeln sollen wir ihnen unser technisches Know-how zur Verfügung stellen."
 nf_AVT.5.a: "Sicher doch"
 nf_AVT.5.b: "Wir verhandeln nicht mit Banditen"

 nf_AVT.6.t: "Bericht von der Baumansky-Allianz"
 nf_AVT.6.d: "Nach Beratung haben die Baumans zugestimmt, unsere technischen Kapazitäten zu unterstützen. Zumindest fürs erste"
 nf_AVT.6.a: "Gute Arbeit"

 nf_AVT.7.t: "Berichte von der Baumansky-Allianz"
 nf_AVT.7.d: "Nachdem sie eine Weile über unser Angebot nachgedacht hatten, weigerten sich die Baumans schließlich, uns beim Aufbau unserer technischen Kapazitäten mitzuhelfen. Diese verdammten Kapitalisten..."
 nf_AVT.7.a: "Mist"

 nf_AVT.8.t: "Interstationale erbittet um Hilfe"
 nf_AVT.8.d: "Die Revolutionäre kommen zu uns, um an unseren Waffen mitzuarbeiten. Als Gegenleistung für Kugeln stellen wir ihnen so unser technisches Know-how zur Verfügung"
 nf_AVT.8.a: "Sicher"
 nf_AVT.8.b: "Wir unterstützen keine Banditen"

 nf_AVT.9.t: "Bericht vom Kuznetsky Most"
 nf_AVT.9.d: "Nach Beratung haben die Techniker der Waffenkammer zugestimmt, unsere technischen Kapazitäten zu unterstützen. Zumindest fürs erste"
 nf_AVT.9.a: "Guuuut"

 nf_AVT.10.t: "Bericht vom Kuznetsky Most"
 nf_AVT.10.d: "Nachdem die Techniker von Kuznetsky Most einige Zeit über unser Angebot nachgedacht hatten, weigerten sie sich schließlich, beim Aufbau unserer technischen Kapazitäten behilflich zu sein. Diese verdammten Stalinisten..."
 nf_AVT.10.a: "Das werden sie noch bereuen"

 nf_AVT.11.t: "Knackt den Computer"
 nf_AVT.11.d: "Scheiße. Man könnte meinen, wir wären mit all den Dummköpfen in unserem Kollektiv in die Altsteinzeit zurückversetzt worden. Ein einfaches Passwort, und doch konnten wir es schon seit langer Zeit nicht knacken"
 nf_AVT.11.a: "Forschungspapiere.. eine neue Art von Kampfchemikalien, die aus häufig vorkommenden Materialien hergestellt werden könnten"
 nf_AVT.11.b: "Forschungspapiere.. Forschung basierend auf einer neuen Formel der Strahlenschutzmedizin"

 nf_AVT.12.t: "Revolution, Revolution Revolution"
 nf_AVT.12.d: "Privet Tovarisch! Wir haben eine ziemlich schöne Station zum Aufbauen gefunden, finden Sie nicht? Die örtliche Bevölkerung ist mit unserer Notlage der interstationalen Revolution einverstanden, und abgesehen von der aus dem Süden austretenden Strahlung und der gelegentlichen Schar von Mutanten, die sich auf den nördlichen Gleisen herumtreiben, sind wir vor jedem faschistischen oder autoritären Abschaum sicher.\n\nObwohl ich gelegentlichen Klatsch zwischen unseren Revolutionären gehört habe; Einige unserer Trupps sind daran interessiert, dass wir woanders hinziehen. Vielleicht liegt es in unserem besten Interesse, unsere Operationsbasis näher an die anderen Politikbereiche der Metro zu verlegen? Oder vielleicht liegt es in unserem besten Interesse, uns bei [320.GetName] zu erholen und wieder zu Kräften zu kommen, bis der ideale Zeitpunkt zum Vorstoß gekommen ist?"
 nf_AVT.12.a: "[320.GetName] Passt hervorragend als unsere Operationsbasis"
 nf_AVT.12.b: "Vielleicht sollten wir an die  [291.GetName]umziehen?"
 nf_AVT.12.c: "Die Revolution an der Sokolnitscheskaya ist noch nicht zu Ende"
 nf_AVT.12.e: "[316.GetName] Scheint ein perfekter Außenposten für uns zu sein"
 AVT.12.tt: "OIhr Fokusbaum ändert sich durch die Bewegungen Umzug
 nf_AVT.13.t: "Oberfläche"
 nf_AVT.13.d: "In den Wracks unserer Expeditionen stecken jede Menge unschätzbare Vorräte. Bei der Suche zwischen den im Schnee verstreuten Ruinen und Trümmern sowie in den Gebäuden fanden wir zahlreiche Leichen. Sie sind zu einer einzigen gefrorenen Masse zusammengerollt, als ob diese Menschen kurz vor ihrem Tod versuchen würden, wenigstens ein bisschen Wärme zu finden. Wir können nichts für sie tun, sie nicht einmal begraben. Doch zwischen ihnen fanden wir zerfetzte Forschungsdokumente."
 nf_AVT.13.a: "Oh"

 nf_AVT.14.t: "[SSK.GetName]-Integration?"
 nf_AVT.14.d: "[SSK.GetName]hat sich gut in unseren Einflussbereich integriert. Ihre Bevölkerung nähert sich bereits stark unserer Seite und unserer Sichtweise auf die Welt, vielleicht sogar zu stark. Viele von ihnen sind offen bereit unsere Sache zu unterstützen. Auch wenn die Stationssverwaltung mit unseren Zielen einverstanden ist, blicken sie und die Metro insgesamt stark herab auf die Bevölkerung, die bereit ist, sich unserer Fraktion anzuschließen."
 nf_AVT.14.a: "Ja, das Proletariat muss sich als Einheit versammeln!"
 nf_AVT.14.b: "Es wäre klug für uns, zu zweit zu bleiben"

 nf_AVT.15.t: "[TRB.GetName]-Integration?"
 nf_AVT.15.d: "[TRB.GetName] hat sich gut in unseren Einflussbereich integriert. Ihre Bevölkerung nähert sich bereits stark unserer Seite und unserer Sichtweise auf die Welt, vielleicht sogar zu stark. Viele von ihnen sind offen bereit unsere Sache zu unterstützen. Auch wenn die Stationssverwaltung mit unseren Zielen einverstanden ist, blicken sie und die Metro insgesamt stark herab auf die Bevölkerung, die bereit ist, sich unserer Fraktion anzuschließen."
 nf_AVT.15.a: "Ja, das Proletariat muss sich als Einheit versammeln!"
 nf_AVT.15.b: "Es wäre klug für uns, zu zweit zu bleiben"

 nf_AVT.16.t: "Versuche, den Führer zu verleumden"
 nf_AVT.16.d: "Berichten der Gestapo zufolge hat der benachbarte mutierte Abschaum der Mayakovskaya versucht, unsere Stationen zu infiltrieren, und vergiftet nun die Gedanken unserer Bevölkerung mit ihrer abscheulichen Rhetorik. Sie nennen unsere Regierung und den Führer selbst unfähig. Wie absurd! Was noch schlimmer ist, ist, dass sich diese Worte offenbar in unserem Volk weit verbreitet haben und sich als schädlich erweisen werden, wenn wir nicht dagegen vorgehen."
 nf_AVT.16.a: "Beruhigt die Situation um jeden Preis!"
 nf_AVT.16.b: "Eine weitere Säuberung wartet wohl am Horizont"

 nf_AVT.17.t: "Sabotage im Reich"
 nf_AVT.17.d: "In einem gewagten Akt des Trotzes haben Spione die Tverskaya infiltriert. Porträts unseres geliebten Führers wurden zerstört, und auf seinem Gesicht waren grobe Zeichnungen verstreut, die zu widerlich waren, um sie zu beschreiben. Die Wände der Station sind nun mit Graffiti bedeckt, die in fetten Buchstaben den Führer und seinen engsten Kreis verspotten.\n\nWie es ihnen gelang, unentdeckt von der Wache unserer Station oder unseren Reichsbürgern durchzuschlüpfen, bleibt unbekannt. Diese dreiste Tat löste in den oberen Rängen der Reichsführung große Entrüstung aus. Die SS ist in Aufruhr; Jemand wird die Schuld auf sich nehmen und entlassen werden, während die Gestapo sich bemüht, einen Täter oder ein Opfer zu finden. Die Moral unter den Reichsbeamten gerät ins Wanken, und das Flüstern wird unterdessen immer lauter."
 nf_AVT.17.a: "Vertuschen Sie dies so weit wie möglich."
 nf_AVT.17.b: "Der Wachposten und seine Familien, ich will sie verbannt sehen!"