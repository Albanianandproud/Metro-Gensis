l_russian:
bandit_focus_1: "Воровская жизнь"
bandit_focus_1_desc: "Налёты, грабёж и воровство — это всё круто и всё такое, но уже в который раз грабить бедный грибной караван не принесёт нам никакой пользы. Нам нужно начинать думать масштабно. По-настоящему масштабно. Сегодня караваны, завтра? Кто знает."
bandit_focus_2: "Планирование снаружи"
bandit_focus_2_desc: ""
bandit_may_pursue_aims: "Мы можем стремиться к нашим целям — §YЗавершить консолидацию нашей власти§! Срочная миссия\n"
bandit_path_proper_banditry_tt: "С добрым старым модным насилием мы будем грабить и разорять, чтобы получить то, что хотим!\n\n"
bandit_coercion_decision_category: "Мы можем шантажировать соседние станции, используя запугивание и страх, чтобы заставить их платить нам дань.\n\n"
bandit_focus_bullets_1: "Вскрываем копилку!"
bandit_focus_bullets_1_desc: "Отчаянные времена требуют отчаянных мер. Пули заставляют мир крутиться, а нам отчаянно нужно вливание средств. Мы отправим парней на поиски всего и вся. Неважно чего."
bandit_focus_bullets_2: "Личный резерв [ROOT.GetLeader]"
bandit_focus_bullets_2_desc: "Ситуация требует этого, и, к сожалению, нашему собственному лидеру придётся залезть в свой кошелёк, чтобы наскрести достаточно патронов."
