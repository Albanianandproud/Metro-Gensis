 ## Events

 borderwar_introduction.0.t: "Gefechte an unserer Grenze!"
 borderwar_introduction.0.d: "Berichte von der Grenze bestätigen, dass der Feind seine Truppen für einen Anrgiff sammelt."
 borderwar_introduction.0.a: "Zerschlagt den Feind! Alle Einheiten zum Kampf bereit halten!"

 RED_RCH_borderwar_mechanic:0 "Die §Y[RED.GetFlag][RED.GetName]§! und das §Y[RCH.GetFlag][RCH.GetName]§! stehen sich in einem ewigen Konflikt gegenüber. beide Seiten können §YGrenzkonflikte§! auslösen, in dem Tunnel zwischen der §Y[306.GetID]§! und der §Y[330.GetID]§!. Ein erfolgreicher Angriff in einem solchen Konflikt führt zu einer Grenzverschiebung innerhalb dieses Tunnels. Sollte ein Grenzkonflikt die Übergabe einer Station zur Folge haben, eskaliert der Konflikt sofort zum §RKrieg§!" 

