l_german:
 military_inefficiency_tooltip: "\nAktuelle Kompetenz: §Y[?military_current_threshold]§!\nBenötigte Kompetenz: §Y[?military_competency_threshold]§!" 
 military_current_threshold_increase: "§YErhöht§! Militärische Kompetenz um §Y1§!\n"
 military_inexperience_category: "Verbessern Sie unsere technische Kapazität"
 military_inexperience_category_desc: "Wir haben uns viel zu sehr auf Importe verlassen, um unsere Stärke aufzubauen. Wir sitzen in einem eher ruhigen Teil der Metro, aber diese Sicherheit hält möglicherweise nicht  ewig an.\n\nWir müssen einen energischen Versuch unternehmen, unsere militärische Effizienz zu verbessern."
 inexperience_hire_technicians: "Stellen Sie Spezialisten ein"
 inexperience_hire_technicians_desc: "Die einfachste und einfachste Lösung besteht darin, Talente zu leasen. Jeder kann einen Schraubenschlüssel in der Hand halten und aufgefordert werden, ein undichtes Rohr zu reparieren. Wer nur über ein halbes Gehirn verfügt oder weiß, wie man entsprechende Fähigkeiten anwendet, ist viel besser."
 inexperience_seek_support_from_HNZ: "Suchen Sie Unterstützung von §Y[HNZ.GetFlag][HNZ.GetName]§!"
 inexperience_seek_support_from_HNZ_desc: "Lassen Sie sich nicht von der lethargischen Außenpolitik der Liga täuschen. Die Hanse ist vielleicht der wohlhabendste Staat in der Metropolregion und in der Lage, ihren Reichtum wahllos an ihre Elitetruppe zu verteilen."
 inexperience_seek_support_from_BAU: "Suchen Sie Unterstützung von §Y[BAU.GetFlag][BAU.GetName]§!"
 inexperience_seek_support_from_BAU_desc: "Die klugen und distanzierten Elektriker von Baumansky legen großen Wert darauf, Geräte zu reparieren, zu denen Techniker anderer Stationen nicht bereit oder nicht in der Lage sind."
 inexperience_seek_support_from_KUZ: "Suchen Sie Unterstützung von §Y[KUZ.GetFlag][KUZ.GetName]§!"
 inexperience_seek_support_from_KUZ_desc: "Die Techniker der Kuznetsky-Brücke gehören vielleicht zu den besten Technikern in der gesamten Metro."
