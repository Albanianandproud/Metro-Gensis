l_german:
 AVV_proctor_yusov: "Proktor Yusov"
 AVV_YUSOV_DESC: "Obwohl er wie ein Mann wirkt, der seine besten Jahre und seinen Zenit bereits hinter sich gelassen hat, beweist Yusov, dass das Alter – zumindest für manche – tatsächlich Weisheit mit sich bringt. Als er sich eigenhändig dazu entschließt, den Vorstoß in die eigentliche Metro anzuführen, ist Proctor Yusov fest entschlossen, dem „Büro“ jene dringend benötigten Ressourcen zu beschaffen, an denen es den dortigen „Eierköpfen“ so schmerzlich mangelt – sei es durch Handel, Drohungen oder Plünderung. Die Lieferungen werden zugestellt..."
 AVV_extranational_manager: "Extranationaler Manager"
 AVV_extranational_manager_desc: "Als leitender Manager für Außenbeziehungen des Mikojan-Konstruktionsbüros besteht seine Aufgabe darin, vorteilhafte Beziehungen zu ausländischen Organisationen aufzubauen und zu pflegen. Dabei liegen alle Karten offen auf dem Tisch – solange die „Eierköpfe“ mit den für sie unverzichtbaren Ressourcen ruhiggestellt sind.."

 AVV_baliff_name: "Tamás Lindemann"
 AVV_baliff_trait: "Agent für Wettbewerbsaufklärung"