l_german:
  PVL_frequent_attacks: "Ständige Mutantenangriffe"
  PVL_frequent_attacks_desc: "Irgend so ein Arschloch hat mal die hermetischen Tore der Station demontiert und an die Hanse verkauft, seitdem ist die Paveletskaya nahezu schutzlos den Gefahren der Oberfläche ausgesetzt. Die Bevölkerung leidet unter Mutationen, Armut und Angriffen von der Oberfläche. Der einzige Lichtblick in all dem ist, dass die hanse regelmäßig Waffen an die Station liefert, aber auch nur, damit sie selbst nicht von den Mutanten angegriffen wird, sollte die Paveletskaya fallen."