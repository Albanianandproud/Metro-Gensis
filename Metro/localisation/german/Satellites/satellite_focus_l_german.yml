 satellite_seek_help_from_the_redline:0 "Bitten Sie die Rote Linie um Unterstützung"
 satellite_seek_help_from_the_redline_desc:0 "Die Rote Linie und das Reich sind in einem ewigen Kampf um die Vorherrschaft festgefahren. Wie das Sprichwort sagt: Der Feind meines Feindes ... Vielleicht bietet die Rote Linie ja auch Hilfe gegen das Reich an?"

 satellite_seek_help_from_the_redline_2:0 "Gemeinsame Eindämmungsbemühungen"
 satellite_seek_help_from_the_redline_2_desc:0 ""

 satellite_commander_buff:0 "Lehren aus vergangenen Kriegen"
 satellite_commander_buff_desc:0 "Es ist bekannt, dass wir, Russland, diese Bedrohung vor fast 100 Jahren einst besiegt hatten. Es erforderte große Opferbereitschaft und Mühen, um diese Bedrohung von der Erdoberfläche auszurotten und in die Geschichte zurück zu verbannen. Es scheint, dass wir diese Anstrengung nun erneut auf uns nehmen müssen.\nDas Reich wird wahrscheinlich versuchen, die gleiche Taktik, den „Blitzkrieg“ oder die gleiche Blitzoffensive zu wiederholen, wie es ihre Zeitgenossen zuvor getan hatten."

