 #  Eco   #

 HNZ_slumbering_giant: "Schlummernder Riese"
 HNZ_slumbering_giant_desc: "Der große Reichtum der Hanse fließt in allen Stationen der Ringlinie frei umher. Täglich passieren unzählige Handelskarren und Kaufleute die hanseatische Gerichtsbarkeit, die Liga wahrt Neutralität gegenüber der kleinlichen Politik der Metro. Doch eines Tages könnte dieser schlafende Riese erwachen, und das wird Folgen für die gesamte Metro haben."

 HNZ_aloof_authority: "Zurückhaltende Autorität"
 HNZ_aloof_authority_desc: "Die Hanse hat strengere Vorschriften darüber erlassen, wer und was in ihrer Liga handeln darf, sie pflegen jedoch ein weitestgehend freies Marktsystem. Ein mäßiger Teil der Wirtschaftskraft wurde für die militärische Produktion und die Aufrechterhaltung ihrer Autorität aufgewendet, doch die Schleusen des Reichtums bleiben meist offen."

 HNZ_peaceful_cooperation: "Friedliche Zusammenarbeit"
 HNZ_peaceful_cooperation_desc: "Die Hanse hat ihre Vorschriften für die Stationen in ihrem Bund sowie für den Handel im Allgemeinen gelockert. Sie hat sich mit voller Kraft für Wirtschaftswachstum und innere Stabilität eingesetzt, hat jedoch militaristische Wirtschaftsangelegenheiten weitestgehend aufgegeben, die über das hinausgehen, was auf dem Markt verkauft werden soll."

 HNZ_subversive_hegemony: "Subversive Hegemonie"
 HNZ_subversive_hegemony_desc: "Die Liga hat ihre Militärindustrie und ihre Expansionsträume mit voller Kraft vorangetrieben, was jedoch zu wirtschaftlichen Auswirkungen in der gesamten Metroregion geführt hat, und die große Flut an Reichtum, die der Hanse einst zum Erblühen verholfen hat, geht langsam zur Neige."

 HNZ_restless_imperium: "Unruhiges Imperium"
 HNZ_restless_imperium_desc: "Russland selbst ist aus der Asche auferstanden. Eine neue Welt bricht an. Die Bürger der Metro leben unter Mutter Russland selbst und werden, wenn es sein muss, auch mit Gewalt in die Herde zurückkehren."

