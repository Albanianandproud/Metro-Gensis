  PLS_council_decision_category_desc: "Der immer murrende, oft streitsüchtige Polis-Rat ist der Ort, an dem die meisten Erlasse kodifiziert und dringliche Fragen zumindest gestellt werden. Das Leben und die Zukunft so vieler liegt in den Händen nur so weniger.\n"

