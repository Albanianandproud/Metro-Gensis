 flamethrower_restriction_treaty:0 "Die Waffen der Metro"
 flamethrower_restriction_treaty_abandon_enforce:0 "Erzwingt das Waffenverbot"
 flamethrower_restriction_treaty_abandon_enforce_desc:0 "Erzwingt das Waffenverbot"

 flamethrower_restriction_treaty_abandon_brute_force:0 "Lehnt das Verbot ab"
 flamethrower_restriction_treaty_abandon_brute_force_desc:0 "Dieses Verbot ist ein offensichtlicher Versuch der Hanse, der Metro ihren Willen aufzuzwingen. Wir lassen uns von ihnen nicht länger herumkommandieren!"
 
 flamethrower_restriction_treaty_abandon:0 "Verlasst das Abkommen"
 flamethrower_restriction_treaty_abandon_desc:0 "Unsere Feinde glauben sie können uns noch länger einschränken, doch damit ist jetzt Schluss!\n\n§gJe mehr Nationen das Abkommen verlassen, desto stärker werden die Kosten für diese Entscheidung§! §GReduced§!"

 flamethrower_restriction_treaty_abandon_silently:0 "Verlasst das Abkommen in aller Stille"
 flamethrower_restriction_treaty_abandon_silently_desc:0 "Nun da ein neuer Krieg am Horizont wartet, wenn kümmern dann noch diese albernen Verträge? Ignorieren wir sie einfach, während die Hanse anderweitig beschäftig ist."

 flamethrower_restrictions_timer_until_reapply:0 "Unterwarf sich den @HNZHanseatic Demands"
 flamethrower_restrictions_timer_until_reapply_desc:0 "Wir können den Vertrag nicht aufküngigen, bis die vorgeschriebene Zeit abgelaufen ist"

 flamethrower_restriction_ban_backdown:0 "Hielt sich an die @HNZHanseatic Demands"

 sanctity_of_life:0 "Unsere Art zu leben"
 sanctity_of_life_desc: " "

 military_signing: "Rekrutiert externe Kräfte"
 military_signing_desc: "Heuert Soldaten aus der Fremde an"

 allow_creation_faction:0 "Gründet ein Bündniss"
 allow_creation_faction_desc:0 "Die Welt steht am Abgrund, doch wir stehen nicht allein. Alle für Einen und Einer für Alle!"
 
 ration_food:0 "Nahrungsrationen"
 ration_food_desc:0 "Sichert die grechte Verteilung von Lebensmitteln in diesen schwierigen Zeiten. Auch wenn sich unsere Farmer beschweren werden, die erschöpften und hungrigen Massen brauchen einen Grund zur Hoffnung."

 hygiene_education:0 "Fangt die Ratten"
 hygiene_education_desc:0 "In der Enge der Metro können sich jederzeit alle Arten von Krankheiten ausbreiten, schlimmer wird dies, wenn sich auch Ratten auf den Stationen herumtreiben. Wir stellen Fallen aus und streuen Gift und so beseitigen wir wenigstens diese eine Gefahr."

 rouse_the_people:0 "Eine Rede für die Massen"
 rouse_the_people_desc:0 "Propaganda-Reden werden die Moral unserer Bevölkerung spürbar steigern, womit sie von uns auf die kommenden Konflikte vorbereitet wird."

 warfare_drastic_measures:0 "Drastische Maßnahmen"

 draw_short_straws:0 "Zieht die Strohhalme"
 draw_short_straws_desc:0 "Der Krieg nähert sich unserer Nation und wir müssen drastische Maßnahmen ergreifen. Versammelt jeden der eine Waffe halten kann und lasst sie Strohhalme ziehen. Jene die den kürzeren ziehen, gehen direkt an die Front."

 siphon_equipment:0 "Waffen aus jedem Material"
 siphon_equipment_desc:0 "Der Krieg kommt immer näher und unsere Vorräte schwinden. Wir müssen unsere noch verhandenen Ressourcen unbedingt direkt in einsatzfähige Waffen umwandeln!"

 extended_shifts:0 "Längere Schichten"
 extended_shifts_desc:0 "Wir brauchen mehr Arbeitskräfte. Da wir die nicht haben, müssen unsere Arbeiter eben länger arbeiten, solange, bis das pensum erreicht ist."

 scavenge_electronics:0 "Sucht Elektronik"
 scavenge_electronics_desc:0 "Entsendet ein Team an die Oberfläche und sammelt alle Elektronik ein, die ihr findet. Es könnte zwar etwas dauern, doch wir haben keine Wahl.

 rouse_the_people_2:0 "Eine Kriegsrede"
 rouse_the_people_2_desc:0 "Der Feind steht bereits vor unserer Türschwelle. Und sollten wir untergehen, dann nur im Eifer des Gefechtes!"

 give_back_to_the_people:0 "Wohltat für die Massen"
 give_back_to_the_people_desc:0 "Die Menschen haben lange genug gelitten. Lasst sie heute feiern, wie in den guten alten Tagen!"

 give_back_to_the_people_2: "Geschenk an die Gemeinschaft"
 give_back_to_the_people_2_desc: "Wir haben noch ein wenig Munition übrig. Warum sollten wir sie eigentlich nicht an unser Volk zurück geben?"

 construction_renovations:0 "Umfassende Renovationen"
 construction_renovations_desc:0 "Wieso liegt hier eigentlich noch Schrott rum? Macht endlich etwas daraus!"

