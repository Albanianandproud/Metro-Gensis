bandit_focus_1: "Das Leben eines Schlägers"
bandit_focus_1_desc: "Überfallen, plündern und stehlen ist ja schön und gut, aber zum hundertsten Mal eine arme Pilzkarawane auszurauben wird uns keine Freunde machen. Wir müssen anfangen, größer zu denken. Wirklich groß. Heute Karawanen, morgen? Wer weiß."

