 ## Political tree no specific 
 
 EUR_start_of_political_reform: "Unser Schicksal"
 EUR_start_of_political_reform_desc: "In unserem gegenwärtigen Zustand wird dieses Land nicht überleben, wir müssen über unser Schicksal entscheiden und darüber, was aus uns werden soll ..."
 
 EUR_foreign_arms_purchase: "Kauft fremde Waffen"
 EUR_foreign_arms_purchase_desc: "Um unsere militärische Bereitschaft zu erhöhen und auch unsere Beziehungen zu anderen Nationen zu verbessern, können wir von ihnen Rüstungsgüter kaufen"
 
 EUR_democratic_reforms: "Demokratische Reformen"
 EUR_democratic_reforms_desc: "Indem wir unsere Nation demokratisch reformieren, können wir die Popularität des Rates und seine kollektiven Ideale steigern"
 
 EUR_remove_undesirables_from_council: "Entfernt die 'Unerwünschten' aus dem Rat"
 EUR_remove_undesirables_from_council_desc: "Indem wir unerwünschte Personen aus dem Rat entfernen, können wir die Popularität oligarchischer und eher diktatorischer Ideale steigern"
 
 EUR_increase_budget: "Erhöhtes Budget"
 EUR_increase_budget_desc: "Indem wir das Budget bestimmter Dienste erhöhen, können wir diese Aspekte unseres Landes verbessern"
 
 ## Remain centralized
 
 EUR_remain_centralized: "Bleibt dezentralisiert"
 EUR_remain_centralized_desc: "Politisch gleichberechtigt zu bleiben, kann unserer Nation helfen. Wir sind vielfältig und müssen die Meinung jedes Einzelnen einbringen"
 
 EUR_settle_the_majorities: "Bestimmt die Mehrheiten"
 EUR_settle_the_majorities_desc: "Wir müssen die vorherrschenden und aktiven nationalen Mehrheiten bestimmen, bevor wir eine effiziente Nation sein können"
 
 EUR_head_of_council: "Vorsitzender des Rates"
 EUR_head_of_council_desc: "Ein prominentes Mitglied des Rates hat die Idee eines obersten Kanzlers vorgeschlagen"
 
 EUR_promote_immigration: "Fördert die Einwanderung"
 EUR_promote_immigration_desc: "Die Förderung von Einwanderung kann unsere Bevölkerung und damit auch unsere Arbeitskräfte vergrößern" 
 
 EUR_industrial_reforms: "Industrielle Reformen"
 EUR_industrial_reforms_desc:  "Durch industrielle Reformen können wir eine bessere Nation werden"
 
 EUR_gwc_rehabilitation: "Rehabilitiert die Wurmkultisten"
 EUR_gwc_rehabilitation_desc:  "Wenn wir unsere Bemühungen darauf konzentrieren, die Kultisten zu rehabilitieren, anstatt sie zu bestrafen, können sie wertvolle Mitglieder unserer Gesellschaft werden."
 
 EUR_the_schulz_project: "Das Schulz-Projekt"
 EUR_the_schulz_project_desc: "Gouverneur Schulz beharrt zunehmend auf einem Projekt, das unsere Wirtschaft grundlegend reformieren wird."
 
 EUR_bolster_national_ideals: "Stärkt die Nationalen Ideale"
 EUR_bolster_national_ideals_desc: "Um unsere Macht zu bewahren und die Mehrheiten zufrieden zu stellen, sollten wir zulassen, dass ihr Nationalismus in einem kontrollierteren Umfeld gedeiht"
 
 EUR_equal_party_representation: "Parteien-Repräsentation"
 EUR_equal_party_representation_desc: "Jede Partei in Europa verdient eine echte und gleichberechtigte Vertretung in unserem Wahlsystem!"
 
 EUR_lessons_from_the_reds: "Die Revolution ist §RROT!§!"
 EUR_lessons_from_the_reds_desc: ""

 EUR_lessons_from_the_reds_2: "Der Staub hat sich gelegt"
 EUR_lessons_from_the_reds_2_desc: "Wir haben die Schlacht gewonnen, aber der Krieg um unseren Einfluss tobt noch immer! Der Marschall der ursprünglich die Revolution anführte, zögert nun, die Führung selbst zu übernehmen und zieht es stattdessen vor, unsere revolutionären Kräfte zu befehlen. Stattdessen möchte er den Titel eines Generalsekretärs jemandem verleihen, der viel jünger ist."
 
