l_german:
 SPT_instigate_revolution_in_mobsters: "Provoziert Aufstände unter den Banditen"
 SPT_instigate_revolution_in_mobsters_desc: "Seit Jahren schon leben die Bürger der Kaluga unter der Herrschaft des organisierten Verbrechens. Zeit, dass wir die Banditen von Innen heraus schwächen."

 SPT_operation_MOB_phase_1: "Kontaktiert unsere Symphatisanten"
 SPT_operation_MOB_phase_1_desc: "Örtliche Unterstützer unserer Sache existieren im Verborgenen der Kaluga-Linie. Nehem wir Kontakt zu ihnen auf und machen sie zu unseren Agenten."
 SPT_operation_MOB_phase_1_outcome: "Die Örtliche Bevölkerung wird unsere Sache mehr und mehr unterstützen!" 

 SPT_operation_MOB_phase_2: "Streut die Saat der Unzufriedenheit"
 SPT_operation_MOB_phase_2_desc: "Ein wenig Geschmiere und ein paar erfundene Geschichten werden die Verbrecher in nächster Zeit beschäftigt halten. Ihre Illusion von Macht muss gebrochen werden!"
 SPT_operation_MOB_phase_2_outcome: "Die örtlichen Machthaber werdne aufeinander losgehen, die Spannungen wachsen!"

 SPT_operation_MOB_phase_3: "Hetzt die Gangster gegeneinander auf"
 SPT_operation_MOB_phase_3_desc: "Streut Lügen und Gerüchte in den Stationen."
 SPT_operation_MOB_phase_3_outcome: "Während sich die Banditen gegenseititg erschießen werden sich unsere Männer erheben!"