  ## Depreciate
  HNZ_production_shift: "Produktions-Schichten"

  HNZ_shift_increase: "Erhöhen Sie die Produktionsschichten"
  HNZ_shift_increase_desc: "Wir benötigen mehr Produktionsleistung, um die Nachfrage zu decken. Wir werden unsere erwarteten Quoten erhöhen, um hoffentlich den Anforderungen unserer Industrie gerecht zu werden. Unsere Belegschaft wird einfach mehr Überstunden ertragen müssen."
  HNZ_shift_in_effect: "Schichtanpassungen sind nicht wirksam"
  shift_increment_tt: "Erhöhen Sie die Produktionsschichtkosten um £pol_power_icon §Y15§!"

  HNZ_shift_decrease: "Reduzieren Sie die Produktionsschichten"
  HNZ_shift_decrease_desc: "Unsere Belegschaft murrt und stöhnt. Auch wenn sie ihr Unbehagen über die anstrengenden Stunden nicht äußerlich äußern, kann es doch sein, dass sie das irgendwann tun. Unsere Arbeitnehmer werden durch die Kurzarbeit entlastet, unsere Insdustrie wird jedoch darunter leiden."
  shift_subtract_increment_tt: "Reduziert die Produktionsschichtkosten um £pol_power_icon §Y15§!"

  HNZ_shift_industrial_reforms: "Industrielle Reformen"
  HNZ_shift_industrial_reforms_desc: "Nach der Apokalypse sind Arbeitsplatzvorschriften zu kaum mehr als bloßen Vorschläge verkommen. Vielleicht ist es am besten, sich wieder strenger an diese Sicherheitsgesetze zu halten und sie langsam wieder an den Arbeitsplätzen einzuführen?"

  HNZ_privatize_industrial_sectors: "Privatisiert die trägen Staatsunternehmungen"
  HNZ_privatize_industrial_sectors_desc: "Verkaufen Sie veraltete und nicht ausreichend genutzte Anlagen und Industrieanlagen an private Privatunternehmen."
  HNZ_appropriation_in_effect: "Die industrielle Aneignung ist nicht in Kraft"
  reappropriate_subtract_sectors_tt: "Verringert die industrielle Aneignungskosten um £pol_power_icon §Y10§!"

  HNZ_reappropriate_sectors: "Sektoren wieder aneignen"
  HNZ_reappropriate_sectors_desc: "Während die Hanse zwar auf der Grundlage des freien Marktes operiert, heißt das aber nicht, dass die Regierung kein Auge darauf hat, vielversprechende Vermögenswerte in den Zuständigkeitsbereich der Liga wieder einzugliedern. Wir stellen bedeutende Handelswege und Wohnsitze in unser Eigentum"
  reappropriate_sectors_tt: "Erhöht die industriellen Anschaffungskosten um £pol_power_icon §Y20§!"

  HNZ_extend_station_administration: "Erweitern Sie die Stationsverwaltung"
  HNZ_extend_station_administration_desc: "Ersetzen Sie die nachsichtigeren und korrupteren Anführer durch neue, jugendlichere ... und loyalere Unterstützer der Hanse-Regierung."
  extend_administration_length_tt: "Erhöht die Kosten für die Erweiterung der Stationsverwaltung um £pol_power_icon §Y20§!"

