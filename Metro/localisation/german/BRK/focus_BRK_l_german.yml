l_german:
  BRK_feeding_the_metro: "Ernährt die Metro"
  BRK_feeding_the_metro_desc: "Von den ewig hungernden Bewohnern der Roten Linie bis hin zu den hochmütigen Stationsverwaltern der Hanse – alle Menschen träumen davon, sich eine Hähnchenkeule oder einen Topf Pilzsuppe zu gönnen, die direkt aus der [BRK.GetNameDef]-Domäne stammt."

  BRK_our_collective_onus: "Unsere kollektive Verantwortung"
  BRK_our_collective_onus_desc: "Die verstreuten Überreste der Moskauer Bürger zu ernähren ist in der Tat keine leichte Aufgabe. Aber wir sind stolz darauf, nicht (nur) aus Profitgründen, sondern vielmehr darum, dass wir die Menschheit vor dem Hungertod bewahren."

  BRK_defensive_armored_brigades: "Draisinen-Flottille"
  BRK_defensive_armored_brigades_desc: "Anscheinend hat die Hanse damit begonnen mobile Brigaden einzusetzen, um Truppen zwischen ihren Stationen zu befördern.  Natürlich befinden wir uns in einer Position, in der keine Großmacht es je wagen würde, uns anzugreifen, aber das Gleiche gilt nicht für Banditen oder Mutanten. Unsere Streitkräfte sind klein, können aber durch die Anmut der Mobilität leicht verstärkt werden. Gerüchten zufolge soll es irgendwo am Rande unserer Grenze ein altes Straßenbahndepot geben. Vielleicht sollten wir es aufbrechen und einen Blick darauf werfen?"

  BRK_agriculture_of_scale: "Großlandwirtschaft"
  BRK_agriculture_of_scale_desc: "Kilometerlange Tunnel und technische Anlagen wurden in endlose Viehfarmen und Pilzfelder verwandelt, die die gesamte Hanse ernährten. Gleichzeitig ernähren sich auch die Angehörigen der Roten Linie und sogar die Bürger des Reichs."

  BRK_contact_kurchatov_institute: "Kontaktieren Sie das Kurtschatow-Institut“
  BRK_contact_kurchatov_institute_desc: "Das Kurchatov-Institut errichtete den ersten Kernreaktor in Europa. Unter dem Institut befindet sich noch immer ein riesiges Netzwerk aus Tunneln und Kammern, die tief in die Erde und sogar unter die Moskauer Metro reichen. Viele ehemalige Wissenschaftler und Studenten des Instituts flohen in den Untergrund, doch die Reaktoren liefen weiter. Ihre Kapazität reicht aus, um die gesamte Nordhälfte der Metro mit Strom zu versorgen."

  BRK_crush_republic: "Zerschlagt die Anarchisten"
  BRK_crush_republic_desc: "Man kann ihnen nie vertrauen, sie sind nichts weiter als Banditen und Schläger mit einer idealisierten Vorstellung von Solidarität gegenüber den Arbeitern. Ihre gesamte Gemeinschaft ist ein einziger großer Witz, in den sie selbst aber offenbar nicht eingeweiht sind. Solange wir sie jedoch nicht beseitigen, werden sie uns immer ein potenzieller Dorn im Auge bleiben."

  BRK_pig_farms: "Schweinefarmen"
  BRK_pig_farms_desc: "Eine der wichtigsten Proteinquellen in der Metro. Schweine können für vielfältige Zwecke eingesetzt werden; ihre Haut wird zur Leder, ihr Fett wird zur Seife."

  BRK_civilian_economy: "Wenn wir noch immer §YZivilwirtschaft§! aktiv haben, erhalten wir §Y2 Werkstätten§!."

  BRK_GUL_friendship: "Sonderabkommen mit [HUL.GetName]"
  BRK_GUL_friendship_desc: "Alles in allem ist Onkel Nestor ein ziemlich anständiger Mann. Die Schläger und Banditen die sich auf Unsinn einlassen, werden immer innehalten und auf sein Wort hören. Nestor sagt uns, solange wir seine Truppen durch unser Territorium lassen, werden sie unsere Bürger schützen und, was noch wichtiger ist, unser Handel mit anderen Stationen bleibt unversehrt."

  BRK_surface_stalking: "Oberflächenerkundung"
  BRK_surface_stalking_desc: "Die Flughafenstation heuert routinemäßig Stalker an, um die Oberfläche zu durchsuchen; nicht für Waffen oder Maschinen, sondern für Saatgut. Landwirtschaftshandbücher, Packungen mit allem, was die Bauern unter der Erde zur Steigerung der Produktivität ihrer Erträge nutzen könnten. Manchmal kehren die Stalker mit unberührtem Getreide oder sogar mutierten Varianten von Vorkriegspflanzen zurück, die dem rauen Klima standhalten können."

  BRK_contact_aviators: "Kontaktiert die Piloten"
  BRK_contact_aviators_desc: "Angeblich gelang es der Gruppe, Luftschutzbunker auszuheben und den [HUL.GetName] während ihrer gelegentlichen, aber oft erbarmungslosen Auseinandersetzungen standzuhalten. Einige behaupten sogar, dass es den Piloten sogar gelungen sei, humanoide Roboter aus überlebender Elektronik zu erschaffen, aber wenn Sie mich fragen, ist das völliger Unsinn."

  BRK_new_fertilizer: "Neuer Dünger?"
  BRK_new_fertilizer_desc: "Da jeder Zentimeter Land landwirtschaftlich genutzt wird, mangelt es eindeutig an Orten an denen man die Toten begraben kann. Es ist in der Tat ein Tabuthema, aber was wäre, wenn wir stattdessen den natürlichen Kreislauf des Lebens verlassen würden? Wie das Sprichwort sagt; Aus dem Staube kommst du, in dem Staub wirst du zurückkehren."

  BRK_annex_trade_outpost: "Annektiert [BRN.GetNameDef]"
  BRK_annex_trade_outpost_desc: "Die Belorusskaya bleibt eine unabhängige Station zwischen uns und der Hanse. Die gesamte Station besteht aus Managern, und ihre gesamte Wirtschaft ist auf den Handel angewiesen, um die Lichter der Station am Laufen zu halten. Auf unsere Waren schlagen sie dabei jedoch nochmal ordentlich was drauf, wollen wir dieses Schmarotzer-Dasein wirklich noch weiter tolerieren?"

  BRK_with_hanza_consent: "Mit Zustimmung der Hanse"
  BRK_with_hanza_consent_desc: "Mit ausdrücklicher Zustimmung der Hanse und mit ausreichender Ellenbogenfett werden die Händler des Handelsaußenpostens auf unser Wort hören. Wir bessern unsere Preise, dort ein oder zwei Marktstände, nur für unsere Waren. Schon bald wird unsere Autorität die ganze Station durchdringen."