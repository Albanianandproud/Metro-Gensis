l_german:
  PAG_yuriy: "Verkhovny Yuriy"
  PAG_yuriy_desc: "Oberster Anführer der Spartak-Station. Durch Repression, Indoktrination und Isolation von der Außenwelt behält er die Kontrolle über die Bewohner."
 PAG_dragomir: "Dragomir, Peruns Auserwählter"
  PAG_dragomir_desc: "Bedrängt von stinkenden Mutanten, schwor Dragomir einen Eid: Sollte er aus der Schlacht zurückkehren, würde er sich der Axt verschreiben und sein Leben Perun widmen. Trotz aussichtsloser Lage führte Dragomir seine Kriegerschar zum Sieg über die Bestien und trieb sie zurück in die Dunkelheit. Von diesem Tag an trug er den Namen „Der Auserwählte Peruns “, denn der Donnergott selbst hatte ihn für Großes auserkoren."