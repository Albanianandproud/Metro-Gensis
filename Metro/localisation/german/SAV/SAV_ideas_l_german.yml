l_german:
 SAV_alliance:0 "Eine Unvergängliche Allianz"
 SAV_alliance_desc:0 "Sie entstand schnell nach der Rattenplage von der Timiryazevskaya im Jahr 2014, die dank des massiven Einsatzes von Flammenwerfern abgewehrt werden konnte. Der Allianz ist es gelungen, den Einfluss der Hanse und der Roten Linie aufgrund ihrer eher primitiven Agrarindustrie abzuwehren und eine strenge Autonomie aufrechtzuerhalten. Die Drei-Stationen-Allianz stellt sich gerne als eine Bastion der Autonomie und der Freiheit abseits politischer Manipulation durch die größeren Feinde dar und rühmt sich auch damit, doch die Tatsache dass ihre Existenz im Gesamtplan der Metro keine Rolle spielt, ist für ihre Stationschefs eine schwer zu schluckende Pille."

 SAV_rock_and_hard_place:0 "Zwischen Pest und Cholera"
 SAV_rock_and_hard_place_desc:0 "Die Lage zwischen zwei rivalisierenden Großmächten, die sich in der Metro zusammenbrauen, ist nicht leicht zu bewältigen. Ganz zu schweigen von der Militarisierung der faschistischen Macht des Vierten Reiches, die das Bündnis im Visier hat. Keine noch so große Beschwichtigung oder Unterwerfung vor ihrem unersättlichen Appetit auf Lebensraum reicht hier aus. Nicht nur das, sondern auch das manische Gelächter und die alptraumhaften Schreie, die aus der zerstörten Station Timiryazevskaya kommen. Es werden mehr als nur Ratten sein, nach denen die Wachen Ausschau halten müssen"

