l_german:
  PLS_rangers_1: "Die Spartaner des Ordens"
  PLS_rangers_1_desc: "Die Rangers des Ordens wurden nicht mehr als ein Jahr nach dem 3. Weltkrieg gegründet und bestand größtenteils aus ehemaligen Mitgliedern der russischen Spezialeinheiten Speznas. Unter der Führung des damaligen Majors Melnikov versammelte er seine Soldaten und gründete die Rangers – eine paramilitärische Organisation, deren Aufgabe hauptsächlich darin besteht die Konflikte zwischen den einzelnen neu entstandenen Machtbereichen der Metro zu lösen."
  PLS_rangers_2: "Erlauben Sie Selbstautonomie"
  PLS_rangers_2_desc: "Während die Kshatriyas, die Polis-Regierung und die Ranger zusammenarbeiten, operieren die Spartaner mit einem hohen Maß an Autonomie außerhalb der Gerichtsbarkeit der Polis. Den Rangers mehr Unabhängigkeit bei der Durchführung ihrer Einsätze zu geben, wäre zweifellos für alle drei Parteien von Vorteil."
  PLS_allow_operation_outside_polis: "Erlauben Sie Operationen fernab der Polis"
  PLS_allow_operation_outside_polis_desc: "Nachdem ihnen Autonomie gewährt wurde besteht der nächste Schritt zur Entfesselung der Rangers darin, ihnen die ausdrückliche Erlaubnis zu erteilen, in Missionen zu operieren, die nicht direkt mit den Zielen der Polis zusammenhängen. Der Schutz der Bürger und das Eingreifen in Konflikte zwischen verfeindeten Stationen, wenn diese den Frieden gefährden, reicht als Begründung für mehr Unabhängigkeit."
  PLS_SPT_exchange_equipment_for_experience: "Ermöglicht uns den Austausch überschüssiger Ausrüstung gegen Militärdaten der Rangers"
  PLS_military_cooperation_pact: "Militärische Zusammenarbeit"
  PLS_military_cooperation_pact_desc: "Sowohl die Kshatriya als auch die Rangers arbeiten beim Austausch von Arbeitskräften und Ressourcen eng zusammen. Allerdings wird uns eine engere Angleichung an die der Polis-Regierung wird den Rangern mit Sicherheit die gleichen Sondervorteile bescheren."
  PLS_SPT_must_persevere: "§Y[SPT.GetFlag][SPT.GetName]§! müssen existieren, damit diese Nationalgeister bestehen bleiben."
  PLS_political_leverage: "Politischer Einfluss"
  PLS_political_leverage_desc: "Da die Ranger eine vorherrschende Militärmacht sind, können wir unseren bestehenden Einfluss nutzen, um unsere Nachbarn weiter zu beeinflussen."
  PLS_military_cooperation_pact_1: "Engere Bindungen"
  PLS_military_cooperation_pact_1_desc: "Vereinigt euch mit unseren Brüdern."
  PLS_military_cooperation_pact_2: "Verteidiger des Tores"
