 event_april_fools.1.d: "Heute wurde um 0800 unter unserer Hauptstation Schillerowskaja eine seismische Störung festgestellt. Der Geheimdienst war sich sicher, dass es sich hierbei um einen neuen heimtückischen Trick der Kommunisten handelte, und evakuierte den Führer sofort, während er die Einheiten der Metromarcht in Bereitschaft schickte. Um 0930 wurde diese Störung mobil, sie bewegte sich mit besorgniserregender Geschwindigkeit auf die Oberfläche zu und hatte um 0932 in einer Explosion die Oberfläche durchbrochen."
