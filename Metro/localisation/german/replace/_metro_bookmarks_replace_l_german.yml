 BM_HISTORY_TITLE:0 "Überblick"

 OTHER_GATHERING_STORM_DESC:0 "Fast zwei Jahrzehnte lang haben sich in der Metro verschiedene Gemeinschaften entwickelt. Alle mit ihrer eigenen Identität und der Fähigkeit, sich auf Handel, Diplomatie und Krieg untereinander einlassen. Viele von ihnen werden von den größeren politischen Unruhen im Großen und Ganzen ignoriert. Nur eines haben sie alle gemeinsam; Überleben. Sie alle kämpfen darum, in dieser verfallenden Welt zu bestehen."
