  PLS_a_mutual_goal: "Ein gemeinsames Ziel"
  PLS_a_mutual_goal_desc: "Die Rangers und Polis verbindet seit der Auflösung des Zentralen Metrokommandos nicht nur gegenseitiger Handel, beide Organisationen widmen sich auch der Erhaltung und Fortführung der Menschheit. Sei es durch die Feder oder das Schwert; Unsere Ziele gehen Hand in Hand."
