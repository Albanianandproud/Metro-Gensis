l_russian:
 huliaipole: "Гуляй-польская республика"
 huliaipole_desc: "§RГуляй-польская республика - анархо-коммунистическая группировка, дезертировавшая с Красной Линии после разрыва отношений с Андреем Москвиным и его соратниками. Они отреклись от Красной Линии и её сталинистской идеологии. Могут похвастаться большим количеством бойцов и сталкеров, а также внушительным запасом оружия."
 
 HUL_anarchist_republic: "Анархистская республика"
 HUL_anarchist_republic_desc: "§RСмерть всем, кто стоит на пути к свободе трудящихся!§!\n\nРожденная на основе идеалов Нестора Махно, §Y[HUL.GetNameDef]§! является §Rанархо-коммунистической§! республикой, состоящей в основном из бывших революционеров Красной Линии."

 HUL_beat_the_reds: "Бей красных"
 HUL_beat_the_reds_desc: "Из-за споров об идеологии и слабеющей уверенности в том, что Сокольническая привнесет в Московское Метро символ коммунизма, §Y[HUL.GetNameDef]§! откололась от Красной Линии, полагая, что нынешнее непостоянное правительство Красной Линии полностью пренебрегло революционными идеалами сообщества и равенства, а также отвергая Красную линию и её сталинистскую идеологию."

 HUL_narcotics: "Торговля наркотиками"
 HUL_narcotics_desc: ""

 BRN_aviator_harassment: "Наблюдатели в Белом"
 BRN_aviator_harassment_desc: "Наши Сталкеры приостановлены и не могут выполнять вылазки в обычном режиме."
 HUL_defense_against_aviators: "Защита от авиаторов"
 HUL_defense_against_aviators_desc: "Их можно победить еще раз."