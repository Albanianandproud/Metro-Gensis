l_german:
 war_justification.1.t:0 "[Root.GetLeader] spricht sich gegen [From.GetName] aus"
 war_justification.1.d:0 "'Gehört [From.GetName] zum [From.GetAdjective]? Stellen wir uns eine bessere Frage: Gehört die Zukunft dem [From.GetAdjective] oder gehört sie dem [Root.GetNameDef]?'\n\nDie heutige Rede von [Root.GetLeader] deutete darauf hin, dass [Root.GetName] auf dem Weg zum Krieg ist. Die politischen Spannungen haben im letzten Monat zugenommen und es scheint, dass die [Root.GetAdjective]-Leute allmählich akzeptieren, dass ein Krieg unvermeidlich ist."
 war_justification.1.a:0 "Die Zukunft gehört den [Root.GetName]!"
 war_justification.2.t:0 "[Root.GetLeader] denunziert die [From.GetAdjective] Ideale"
 war_justification.2.d:0 "„Die [From.GetAdjective] behaupten, Freiheit und Demokratie zu haben, behaupten, Frieden zu wollen, aber all diese Dinge, auf die sie stolz sind, sind hohl.“ Ihre Demokratie spaltet die Menschen dort, wo sie vereint sein sollten, und ihre Freiheit verrät nur einen Mangel an Disziplin. Wir [Root.GetAdjective]s durchschauen diese Lügen ... und wir können erkennen, dass dieser Frieden, Frieden zu ihren Bedingungen, ebenfalls eine Lüge ist.'\n\n[Root.GetRulingParty] hat sich lange über die Schwäche der [From.GetAdjective]-Nation lustig gemacht, aber in letzter Zeit ist die Rhetorik aggressiver geworden. Der Tag des bewaffneten Konflikts rückt näher."
 war_justification.2.a:0 "[Root.GetName] steht vereint unter [Root.GetLeader]."
 war_justification.3.t:0 "[Root.GetLeader] warnt vor dem [From.GetAdjective] Kommunismus"
 war_justification.3.d:0 "„Gibt es eine größere Bedrohung für unsere Lebensweise oder sogar das Leben selbst als den Kommunismus?“ Diese Seuche droht, die Sklaven und nicht die Herren dazu zu bringen, jede Nation zu regieren, die Nation selbst abzuschaffen, die Menschen und ihre Geschichte abzuschaffen. Wir werden [From.GetName] nehmen und die kommunistische Plage abschaffen.'\n\nDer Hass von [Root.GetLeader] auf Kommunisten war schon vor der Machtübernahme von [Root.GetRulingParty] bekannt, aber im konkreten Fall der [From.GetAdjective]-Regierung scheint er sich in letzter Zeit verstärkt zu haben. Unser Bestreben, den Marxismus von der Erdoberfläche zu tilgen, könnte dort beginnen."
 war_justification.3.a:0 "Diejenigen, die Nationen ablehnen, werden ihre eigenen untergehen sehen."
 war_justification.4.t:0 "[Root.GetName] bereitet sich auf den großen Kampf vor"
 war_justification.4.d:0 "'Die [From.GetAdjective] sind ein Volk, das sich nicht so leicht von der Macht trennen wird.' Sie müssen sich jedoch auch darüber im Klaren sein, dass der Weg unserer beiden Nationen nur in einem Zusammenstoß enden kann. Wir müssen uns für den kommenden Kampf wappnen. Denn [From.GetName] wird nicht kampflos eingenommen werden.'\n\nDie Möglichkeit einer Verständigung zwischen den gleichgesinnten Regierungen von [From.GetName] und [Root.GetName] ist einer Kampagne zur gewaltsamen Einnahme ihres Territoriums gewichen."
 war_justification.4.a:0 "Durch unseren Sieg wird Geschichte geschrieben."
 war_justification.5.t:0 "[Root.GetLeader] bringt die Revolution zur [From.GetName]"
 war_justification.5.d:0 "'Während wir die sozialistische Gesellschaft in [Root.GetName] gefestigt haben, leiden viele Nationen immer noch unter den Despoten der alten Zeit.“ Die Arbeiter von [From.GetName] haben keine Stimme, keine Möglichkeit, sich zu organisieren, und alle Versuche, den Sozialismus einzuführen, werden vom [From.GetLeader]-Regime brutal niedergeschlagen. Wir können es kaum erwarten, dass sich der Lauf der internationalen Revolution zum Wohle für das [From.GetAdjective]-Volk dreht. Mit der Revolution haben wir bewiesen, dass wir die kapitalistischen Unterdrücker hier vernichten können, und wir werden die Unterdrücker auch in [From.Capital.GetName] vernichten!'\n\n[Root.GetLeader] hat alle Versuche diplomatischer Rhetorik gegenüber dem von [From.GetRulingParty] kontrollierten [From.GetName] aufgegeben. Das Streben nach der Beseitigung aller Grenzen konzentriert sich nun ausschließlich auf die Beseitigung ihrer Grenzen."
 war_justification.5.a:0 "Arbeiter der [From.GetAdjective], eure Befreiung ist nah!"
 war_justification.6.t:0 "[Root.GetLeader] ruft nach den [From.GetAdjective] Arbeitern"
 war_justification.6.d:0 "'Gibt es eine größere Lüge als die angebliche Freiheit des [From.GetAdjective]-Volkes?“ Wo sie einst unter den Fürsten und Herzögen schufteten, die den Besitz des Bodens beanspruchten, sind sie nun gezwungen, ihre Arbeitskraft an diejenigen zu verkaufen, die Anspruch auf den Besitz der Fabriken erheben. Ihre Freiheit, einen Herrn einem anderen vorzuziehen, kann kaum als Freiheit bezeichnet werden. Ebenso ist ihre Freiheit, ihre Führer zu wählen, eine falsche Entscheidung, da die Propaganda niemals zulassen würde, dass die wahren Sozialisten die Macht übernehmen. Ein so gründlich indoktriniertes Volk kann nur durch eine [Root.GetAdjective]-Intervention gerettet werden.'\n\n[Root.GetLeader] hat in [From.GetName] lange Zeit auf Parteiversammlungen gegen die Regierung polemisiert, doch diese Rhetorik wird nun häufiger in der Öffentlichkeit verwendet. Es gibt wenig Grund zu der Annahme, dass dieser Konflikt friedlich gelöst werden könnte."
 war_justification.6.a:0 "Wir werden ihre bürgerliche Diktatur zerschlagen!"
 war_justification.7.t:0 "[From.GetAdjective]-Kommunismus scheitert"
 war_justification.7.d:0 "„Genossen, obwohl die größten Revolutionäre einst als Verräter bezeichnet wurden, ist es offensichtlich geworden, dass die Revolution selbst verraten wurde.“ Wie sonst würden Sie die Herrschaft der [From.GetRulingParty] von [From.GetName] erklären, die jede Spur marxistischer Ideen beiseite geschoben hat, um einen degenerierten Arbeiterstaat aufzubauen, in dem sie unter falschen Voraussetzungen regieren kann? Indem sie ihre eigene Macht um den Preis der internationalen Revolution stärkten, haben sie gezeigt, dass ihnen die Ideale, die sie angeblich vertreten, wenig am Herzen liegen. Wir müssen ihnen die wahre Revolution bringen.'\n\nObwohl [Root.GetLeader] die [From.GetAdjective]-Revolution zunächst unterstützte, äußerte er zunehmende Enttäuschung darüber, wie sie sich entwickelt hat. Die [Root.GetRulingParty] muss möglicherweise eingreifen, bevor es zu spät ist."
 war_justification.7.a:0 "Es bleibt noch Zeit, ihren Versuch des Sozialismus zu retten."
 war_justification.8.t:0 "[Root.GetLeader] ruft nach der Zerschlagung des [From.GetAdjective]-Nationalismus"
 war_justification.8.d:0 "'Gibt es eine Gesellschaft, die der Zukunft der Revolution abstoßender gegenübersteht und der Not der Arbeiter fremder gegenübersteht als das faschistische Regime von [From.GetName]?“ Indem sie das Volk auffordern, sich fanatisch der heruntergekommenen Institution des Nationalstaats zu widmen, haben sie uralte Formen der Grausamkeit in ein modernes Gewand gekleidet und versuchen, sich als alternative Zukunft zum unvermeidlichen internationalen Sieg der Arbeiterklasse darzustellen. Es ist nur eine Frage der Zeit, bis sie gegen uns oder unsere Verbündeten zuschlagen. Lasst uns zuerst zuschlagen.'\n\nNiemand hat weniger als gegenseitige Verachtung zwischen uns und dem [From.GetAdjective] erwartet, aber die Feindseligkeit hat sich in letzter Zeit verstärkt. Es scheint nun, dass es eher früher als später zu Konflikten kommen wird."
 war_justification.8.a:0 "Tod den Faschisten!"
 war_justification.9.t:0 "Die Diplomatie mit [From.GetName] bricht zusammen"
 war_justification.9.d:0 "'Trotz unserer Versuche, eine diplomatische Lösung für unseren Konflikt mit [From.GetName] zu finden, sind die Verhandlungen erneut gescheitert, so dass wir nur begrenzte Optionen haben.' Das autoritäre [From.GetLeader]-Regime hat die unvernünftige Herangehensweise an diese Angelegenheit gezeigt, die typisch für Führer ist, die ihrem Volk gegenüber keine Rechenschaft ablegen. Sofern es nicht zu einer völligen Kehrtwende in der Politik der [From.GetAdjective]-Führung kommt, bleibt uns keine andere Wahl, als zu kämpfen.'\n\nDie Intervention von [Root.GetAdjective] in [From.GetName] war ein heißes Thema, wobei einige Politiker in der Opposition behaupteten, dass [Root.GetRulingParty] von Anfang an eine aggressive Politik verfolgt habe. Was auch immer ihre ursprüngliche Absicht war, ein zukünftiger Krieg erscheint nun plötzlich sehr real und unvermeidlich."
 war_justification.9.a:0 "Manchmal muss man den Berg des Konflikts erklimmen."
 war_justification.10.t:0 "[Root.GetLeader] verlangt eine Intervention in [From.GetName]"
 war_justification.10.d:0 "'Mit schwerem Herzen müssen wir uns der Realität unserer Situation stellen: Eine Invasion von [From.GetName] könnte unser einziger Ausweg sein.' Es ist ein zu großer strategischer Vorteil, in unserer gegenwärtigen Situation eine andere Lösung zu versuchen. Obwohl wir darauf vertrauen, dass weder die [Root.GetAdjective]- noch die [From.GetAdjective]-Leute Krieg wollen, hat uns die Geschichte an diesen Punkt geführt und unsere Möglichkeiten sind begrenzt. Wir können nur hoffen, dass wir durch die Behauptung unserer militärischen Macht weiteres Blutvergießen in der Zukunft vermeiden können.'\n\nObwohl es eine populäre Theorie ist, dass Demokratien nicht gegen andere Demokratien in den Krieg ziehen, deuten jüngste Entwicklungen auf eine [Root.GetAdjective]-Invasion von [From.GetName] in der Zukunft hin. Die Geschichte könnte uns noch überraschen."
 war_justification.10.a:0 "[From.GetName] war schon immer eine fragwürdige Demokratie."
 war_justification.11.t:0 "[Root.GetLeader] verdamt die Rote Bedrohung"
 war_justification.11.d:0 "'Ohne Zweifel ist der [From.GetName] Kommunismus eine der größten Bedrohungen für Freiheit und Ordnung in dieser Zeit.' Unbarmherzig und rücksichtslos droht es nicht nur die Hoffnung der [From.GetAdjective] Menschen auf eine wohlhabende, demokratische Gesellschaft, sondern auch die ihrer Nachbarn zu zerstören. Wenn wir jetzt nicht handeln, kann es sein, dass dieser erste Dominostein zu spät fällt und weitere gescheiterte soziale Experimente zurückbleiben. Wie viele müssen noch sterben, bevor wir eingreifen?'\n\nDie Bedrohung durch subversive Aktivitäten, die unsere Demokratie untergraben, angetrieben durch [From.GetAdjective]-Ambitionen, ist in letzter Zeit zu einem heiß diskutierten Thema geworden. Während Oppositionsvertreter dies als einen „Roten Schrecken“ bezeichneten, der auf einen Krieg mit [From.GetName] abzielte, war die Rhetorik der [Root.GetRulingParty] bisher äußerst erfolgreich."
 war_justification.11.a:0 "Sie folgen einer gewalttätigen Ideologie. Welche Reaktion können sie außer Gewalt erwarten?"
 war_justification.12.t:0 "[Root.GetLeader] konfrontiert den [From.GetAdjective]-Faschismus"
 war_justification.12.d:0 "'In der modernen Geschichte, vielleicht sogar in der gesamten Geschichte, hat es keine schlimmere Tyrannei gegeben als den eisernen Griff, in dem [From.GetRulingParty] jetzt [From.GetName] festhält. Die Leute mögen argumentieren, dass wir keinen Konflikt provozieren sollten, dass wir darauf vertrauen sollten, dass [From.GetLeader] Verträge und Versprechen in der Zukunft einhält, aber diese Leute erkennen nicht, dass Verträge, die unter der Herrschaft des Faschismus geschlossen wurden, nutzlos sind. Diesen unehrenhaften Lügnern macht Macht Recht, und das Papier, auf dem eine Vereinbarung steht, brennt genauso leicht wie die Bücher ihrer Kritiker.'\n\nMenschen, die lange gehofft haben, eine direkte Konfrontation mit [From.GetName] zu vermeiden, werden nun von [Root.GetLeader] entschieden bekämpft, der argumentiert, dass wir in machiavellistischen Begriffen lediglich den Krieg zum Vorteil des Feindes hinauszögern. Bei diesem Tempo können wir vielleicht doch den ersten Schlag versetzen."
 war_justification.12.a:0 "Solange sie existieren kann es keinen Frieden geben."
 war_justification.13.t:0 "[Root.GetLeader] ruft nach Krieg gegen die [From.GetName]"
 war_justification.13.d:0 "'Obwohl wir ein friedliches Volk sind, bestimmt nicht unsere Natur allein den Kurs, den wir in der Geschichte einschlagen müssen.' Dies ist eine Zeit des Krieges. Zu lange verfügen die [From.GetAdjective] über die Mittel, die wir benötigen, um die Prüfungen zu überstehen, denen wir möglicherweise gegenüberstehen, und es ist offensichtlich, dass sie sich nicht friedlich von ihnen trennen werden. Trotz unserer besten Bemühungen, einen modernen Staat aufzubauen, können einige Angelegenheiten nur durch die alten Prüfungen des Kampfes geklärt werden.'\n\n[Root.GetLeader]s feindselige Rhetorik gegenüber [From.GetName] hat große Anstrengungen unternommen, um eine Invasion zu rechtfertigen. Ein Teil der Bevölkerung unterstützt diesen Kurs, aber die Entscheidung liegt im Land unseres Führers."
 war_justification.13.a:0 "Es mag eine schwierige Entscheidung sein, aber wir müssen dahinter stehen."
 war_justification.14.t:0 "[Root.GetLeader] hinterfragt die [From.GetAdjective] Existenz"
 war_justification.14.d:0 "'[From.GetName] hält sich vielleicht für moderner und fortschrittlicher als wir, aber die Wahrheit ist, dass ihre Nation nicht so auf die Probe gestellt wurde wie unsere, noch sind sie auf die Bedrohungen vorbereitet, die sich jetzt deutlich am Horizont abzeichnen.' Indem sie uns verachten und uns daran hindern, sich das anzueignen, was uns rechtmäßig zusteht, haben sie uns zu einer dieser Bedrohungen für sich selbst gemacht. Ihre schwache und gespaltene Nation wird unseren Ansprüchen kaum widerstehen.'\n\nDie seit langem von der [Root.GetRulingParty] vertretene spöttische Meinung von [From.GetName] hat sich von Kritik zu Feindseligkeit entwickelt. Obwohl die allgemeine Meinung ist, dass die [From.GetAdjective]-Leute einen Krieg vermeiden wollen, behauptet [Root.GetLeader], dass ihre gewählten Führer ihn durch ihre Arroganz provoziert haben."
 war_justification.14.a:0 "Sie wissen nicht, wie stark uns unsere Nöte gemacht haben."
 war_justification.15.t:0 "[Root.GetLeader] wünscht die Ordnung in [From.GetName] wiederherzustellen"
 war_justification.15.d:0 "'Der [Root.GetAdjective] Nationalgeist ist stark, aber nicht alle Nationen haben so viel Glück.“ [From.GetName] hat seine Traditionen zerstört und rechtmäßige Herrscher längst ermordet und begraben, alles im Namen der Idee der großen marxistischen Revolution. Es ist unsere Pflicht, die Ordnung in der von blutrünstigen Usurpatoren in die Irre geführten Metro wiederherzustellen und die Stärke von [Root.GetName] gegen diese Bedrohung zu behaupten.'\n\nWährend die [Root.GetRulingParty] schon immer gegen den Kommunismus war, war [From.GetName] in den letzten Reden das Ziel besonderer Angriffe. Unabhängig davon, ob der Angriff der Kommunisten auf die [Root.GetAdjective]-Nation eine echte Bedrohung darstellt oder nicht, ist der Präventivangriff auf den [From.GetAdjective]-Kommunismus bereits in Arbeit."
 war_justification.15.a:0 "Die in der Revolution Ermordeten werden gerächt!"
 war_justification.16.t:0 "[Root.GetLeader] verurteilt die [From.GetAdjective] Unterdrücker"
 war_justification.16.d:0 "'Meine Gegner möchten Sie glauben machen, dass meine Herrschaft der der [From.GetRulingParty] in [From.GetName] ähnelt. Sie könnten nicht falscher liegen. Während die Erfolge von [From.GetLeader] das Ergebnis einer aktuellen Modeerscheinung sind, einer zerstörerischen Massenbewegung, die darauf aus ist, andere Nationen zur Unterwerfung zu zwingen, steht die [Root.GetRulingParty] im Gegensatz zu dieser Bewegung als diejenigen, die sich nicht unterwerfen. Ich bin bereit, alles Notwendige zu tun, um diese Bedrohung zu beseitigen, auch wenn es Krieg bedeutet.'\n\nDas [Root.GetLeader]-Regime hat eine feindselige Politik gegenüber der [From.GetAdjective]-Nation verfolgt. Wie auch immer unsere Anführer heißen mögen, „faschistisch“ ist ein Wort, das unseren Feinden vorbehalten ist."
 war_justification.16.a:0 "Tradition und Pragmatismus werden immer über Fanatismus und Terror triumphieren."
 war_justification.17.t:0 "[Root.GetLeader] hinterfragt die [From.GetAdjective] Souveränität"
 war_justification.17.d:0 "'Wer legt die Grenzen einer Nation fest und wie werden sie festgelegt?' Welche Art und Weise die Menschen in der Vergangenheit auch immer gefunden haben, um zu rechtfertigen, wo [Root.GetName] endet und [From.GetName] beginnt, wir leben in einer neuen Ära. Die strategische Bedeutung dieser Grenze kann nicht genug betont werden, und wir haben durchaus das Recht, sie zu verschieben, um die anhaltende Sicherheit unseres Volkes zu gewährleisten.'\n\nWenn man sich die jüngsten Reden von [Root.GetLeader] anhört, scheint eine Invasion von [From.GetName] unmittelbar bevorzustehen. Andersdenkende haben Einwände erhoben, aber die öffentliche Unterstützung für den Krieg nimmt zu."
 war_justification.17.a:0 "Wir alle müssen uns dieser Sache verschreiben!"
 war_justification.18.t:0 "[Root.GetLeader] hinterfragt die Motive der [From.GetName]"
 war_justification.18.d:0 "„'Es besteht kein Zweifel, dass [From.GetName] sich auf einen Krieg vorbereitet.“ Die Veränderungen in der Wirtschaftspolitik machen deutlich, dass die [From.GetAdjective] kein Volk des Friedens sind, sondern vielmehr auf die richtige Gelegenheit warten, um gegen uns anzugreifen. Werden wir tatenlos zusehen, wie sie sich bewaffnen, während [Root.GetName] nicht verteidigt wird? Oder werden wir diese Bedrohung entwaffnen, bevor sie unsere Macht übersteigt?'\n\nDie Falken in der [Root.GetRulingParty] haben ihren Blick auf [From.GetName] gerichtet und argumentiert, dass Angriff die beste Verteidigung sei. Ihr Standpunkt gewinnt an Bedeutung und [Root.GetName] bereitet sich auf einen Krieg vor."
 war_justification.18.a:0 "Zumindest der Krieg wird diesen Konflikt beenden."
 war_justification.19.t:0 "[Root.GetLeader] von [From.GetAdjective] Getue verärgert"
 war_justification.19.d:0 "„Diese naiven Bürger der [Root.GetName], die sich das [From.GetAdjective] als ein Volk des Friedens vorstellen, haben keinen Bezug zur Realität.“ Diejenigen, die an unserer Grenze leben, können sich den Luxus solcher Wahnvorstellungen nicht leisten, wenn sie sehen, wie ihre Truppen auf der anderen Seite auf uns zukommen. Dies ist eine Bedrohung, die wir nicht unbeantwortet lassen können. Mit jedem Tag, der vergeht, bereitet sich [From.GetName] auf den Krieg vor. Es wäre Wahnsinn, wenn wir nicht dasselbe tun würden.'\n\nDie [From.GetAdjective]-Militärpräsenz in der Nähe unseres Territoriums hat zunehmende Besorgnis ausgelöst, da diese Nation immer mehr als Feind der [Root.GetRulingParty] erscheint. Ob es die Ursache oder die Wirkung ihrer Polemik ist, ist umstritten."
 war_justification.19.a:0 "Unabhängig davon müssen wir das Volk auf den Krieg vorbereiten."
 war_justification.20.t:0 "[Root.GetLeader] befürwortet die Invasion von [From.GetName]"
 war_justification.20.d:0 "„Wenn wir im absehbaren, um nicht zu sagen unvermeidlichen Krieg mit [From.GetName] einen strategischen Vorteil haben wollen, gibt es keinen Grund zum Zögern.“ Es geht darum, die Zukunft unserer Kinder zu sichern und sicherzustellen, dass [Root.GetName] morgen einen Platz in der Welt hat. Dies ist eine Frage der Hingabe an unsere Sache und die Ideale, die wir für selbstverständlich halten. Es ist Zeit zu handeln.'\n\nEine Reihe mitreißender Reden von Anführern der [Root.GetRulingParty], allen voran [Root.GetLeader], haben die Öffentlichkeit dazu aufgerufen, eine Invasion von [From.GetName] zu unterstützen. Die geopolitischen Motive hinter der Invasion stehen in der Rhetorik weniger im Vordergrund als patriotische Gefühle, aber diese Kampagne scheint äußerst effizient dabei zu sein, die Öffentlichkeit von ihrer Notwendigkeit zu überzeugen."
 war_justification.20.a:0 "Die Nation steht hinter dieser wichtigen Entscheidung."
 war_justification.201.t:0 "[From.GetLeader] spricht sich gegen [Root.GetName] aus"
 war_justification.201.d:1 "'Gehört [Root.GetName] zum [Root.GetAdjective]? Stellen wir uns eine bessere Frage: Gehört die Zukunft dem [Root.GetAdjective] oder gehört sie [From.GetName]?'\n\nDie heutige Rede von [From.GetLeader] deutete darauf hin, dass [From.GetName] auf dem Weg zum Krieg ist. Die politischen Spannungen haben im letzten Monat zugenommen und es scheint, dass die [From.GetAdjective]-Leute akzeptiert haben, dass ein Krieg unvermeidlich ist. [Root.GetName] muss sich ebenfalls vorbereiten."
 war_justification.201.a:0 "Warum dürfen wir nicht in Frieden leben?"
 war_justification.202.t:0 "[From.GetLeader] verurteilt die[Root.GetAdjective] -Ideale"
 war_justification.202.d:0 "„Die [Root.GetAdjective] behaupten, Freiheit und Demokratie zu haben, behaupten, Frieden zu wollen, aber all diese Dinge, auf die sie stolz sind, sind hohl.“ Ihre Demokratie spaltet die Menschen dort, wo sie vereint sein sollten, und ihre Freiheit verrät nur einen Mangel an Disziplin. Wir [From.GetAdjective]en durchschauen diese Lügen ... und wir können erkennen, dass dieser Frieden, Frieden zu ihren Bedingungen, ebenfalls eine Lüge ist.'\n\n[From.GetRulingParty] hat sich lange über die Schwäche der [Root.GetAdjective]-Nation lustig gemacht, aber in letzter Zeit ist die Rhetorik aggressiver geworden. Der Tag des bewaffneten Konflikts rückt näher."
 war_justification.202.a:0 "Wie von faschistischem Abschaum wie [From.GetLeader] erwartet."
 war_justification.203.t:0 "[From.GetLeader] warnt vor [Root.GetAdjective] Kommunismus"
 war_justification.203.d:0 "„Gibt es eine größere Bedrohung für unsere Lebensweise oder sogar die Lebensweise selbst als den Kommunismus?“ Diese Seuche droht, die Sklaven und nicht die Herren dazu zu bringen, jede Nation zu regieren, die Nation selbst abzuschaffen, die Menschen und ihre Geschichte abzuschaffen. Wir werden [From.GetName] nehmen und die kommunistische Plage abschaffen.'\n\nDer Hass von [From.GetLeader] auf Kommunisten war schon vor der Machtübernahme von [From.GetRulingParty] bekannt, aber im konkreten Fall der [Root.GetAdjective]-Regierung scheint er sich in letzter Zeit verstärkt zu haben. Unser Bestreben, den Marxismus von der Erdoberfläche zu tilgen, könnte dort beginnen."
 war_justification.203.a:0 "Wenn sie unsere Sache fürchten, fürchten sie ihr eigenes Volk."
 war_justification.204.t:0 "[From.GetName] bereitet sich auf den großen Kampf vor"
 war_justification.204.d:0 "„Die [Root.GetAdjective] sind ein Volk, das sich nicht so leicht von der Macht trennen wird.“ Sie müssen sich jedoch auch darüber im Klaren sein, dass der Weg unserer beiden Nationen nur in einem Zusammenstoß enden kann. Wir müssen uns für den kommenden Kampf wappnen. Denn [Root.GetName] wird nicht kampflos eingenommen werden.'\n\nDie Möglichkeit einer Verständigung zwischen den gleichgesinnten Regierungen von [Root.GetName] und [From.GetName] ist einer Kampagne zur gewaltsamen Einnahme ihres Territoriums gewichen."
 war_justification.204.a:0 "Lasst sie kommen!"
 war_justification.205.t:0 "[From.GetLeader] wird die Revolution nach [Root.GetName] bringen"
 war_justification.205.d:0 "„Während wir die sozialistische Gesellschaft in [From.GetName] gefestigt haben, leiden viele Nationen immer noch unter den Despoten der alten Zeit.“ Die Arbeiter von [Root.GetName] haben keine Stimme, keine Möglichkeit, sich zu organisieren, und alle Versuche, den Sozialismus einzuführen, werden vom [Root.GetLeader]-Regime brutal niedergeschlagen. Wir können es kaum erwarten, dass sich der Gang der internationalen Revolution für das [Root.GetAdjective]-Volk dreht. Wir haben bewiesen, dass wir die kapitalistischen Unterdrücker hier vernichten können, und wir werden die Unterdrücker auch in [Root.Capital.GetName] vernichten!'\n\n[From.GetLeader] hat alle Versuche einer Diplomatie mit unserer Regierung aufgegeben. Die kommunistische Aufgabe der Beseitigung aller Grenzen konzentriert sich nun ausschließlich auf die Beseitigung unserer Grenzen."
 war_justification.205.a:0 "[Root.GetLeader] ist ein besserer Herrscher als jeder revolutionäre Opportunist!"
 war_justification.206.t:0 "[From.GetLeader] Hilferufe für [Root.GetAdjective]-Arbeiter"
 war_justification.206.d:0 "„Gibt es eine größere Lüge als die angebliche Freiheit des [Root.GetAdjective]-Volkes?“ Wo sie einst unter den Fürsten und Herzögen schufteten, die den Besitz des Bodens beanspruchten, sind sie nun gezwungen, ihre Arbeitskraft an diejenigen zu verkaufen, die Anspruch auf den Besitz der Fabriken erheben. Ihre Freiheit, einen Herrn einem anderen vorzuziehen, kann kaum als Freiheit bezeichnet werden. Ebenso ist ihre Freiheit, ihre Führer zu wählen, eine falsche Entscheidung, da die Propaganda niemals zulassen würde, dass die wahren Sozialisten die Macht übernehmen. Ein so gründlich indoktriniertes Volk kann nur durch eine [From.GetAdjective]-Intervention gerettet werden.'\n\nDas kommunistische Regime in [From.GetName] ist nicht bereit zu akzeptieren, dass unser Volk ohne seine sozialen Experimente zufrieden sein könnte, und hat offen damit gedroht, unsere Nation anzugreifen. Es gibt wenig Grund zu der Annahme, dass dieser Konflikt friedlich gelöst werden könnte."
 war_justification.206.a:0 "Welche Vorzüge können ihre Überzeugungen haben, wenn sie sie uns aufzwingen müssen?"
 war_justification.207.t:0 "Der [Root.GetAdjective] Kommunismus scheitert"
 war_justification.207.d:0 "„Genossen, obwohl die größten Revolutionäre einst als Verräter bezeichnet wurden, ist es offensichtlich geworden, dass die Revolution selbst verraten wurde.“ Wie sonst würden Sie die Herrschaft der [Root.GetRulingParty] von [Root.GetName] erklären, die jede Spur marxistischer Ideen beiseite geschoben hat, um einen degenerierten Arbeiterstaat aufzubauen, in dem sie unter falschen Voraussetzungen regieren kann? Indem sie ihre eigene Macht um den Preis der internationalen Revolution stärkten, haben sie gezeigt, dass ihnen die Ideale, die sie angeblich vertreten, wenig am Herzen liegen. Wir müssen ihnen die wahre Revolution bringen.'\n\nObwohl [From.GetLeader] ursprünglich den Sieg von [Root.GetRulingParty] in [Root.Capital.GetName] unterstützte, hat er sich von der Philosophie von [Root.GetLeader] entfernt. Der Konflikt ist so weit eskaliert, dass sie eine Invasion vorbereiten, um uns ihre Art des Sozialismus aufzuzwingen."
 war_justification.207.a:0 "Sie verstehen nicht, was die Revolution für das [Root.GetAdjective]-Volk bedeutet."
 war_justification.208.t:0 "[From.GetLeader] fordert die Zerschlagung des [Root.GetAdjective]-Nationalismus"
 war_justification.208.d:0 "„Gibt es eine Gesellschaft, die der Zukunft der Revolution abstoßender gegenübersteht und der Not der Arbeiter fremder gegenübersteht als das faschistische Regime von [Root.GetName]?“ Indem sie das Volk auffordern, sich fanatisch der heruntergekommenen Institution des Nationalstaats zu widmen, haben sie uralte Formen der Grausamkeit in ein modernes Gewand gekleidet und versuchen, sich als alternative Zukunft zum unvermeidlichen internationalen Sieg der Arbeiterklasse darzustellen. Es ist nur eine Frage der Zeit, bis sie gegen uns oder unsere Verbündeten zuschlagen. Lasst uns zuerst zuschlagen.'\n\nNiemand hat weniger als gegenseitige Verachtung zwischen uns und dem [Root.GetAdjective] erwartet, aber die Feindseligkeit hat sich in letzter Zeit verstärkt. Wenn man [From.GetLeader] sprechen hört, scheint es, dass es eher früher als später zu Konflikten kommen wird."
 war_justification.208.a:0 "Tod den Kommunisten!"
 war_justification.209.t:0 "Die Diplomatie mit [Root.GetName] bricht zusammen"
 war_justification.209.d:0 "„Trotz unserer Versuche, eine diplomatische Lösung für unseren Konflikt mit [Root.GetName] zu finden, sind die Verhandlungen erneut gescheitert, so dass wir nur begrenzte Optionen haben.“ Das autoritäre [Root.GetLeader]-Regime hat die unvernünftige Herangehensweise an diese Angelegenheit an den Tag gelegt, die typisch für Führer ist, die ihrem Volk gegenüber keine Rechenschaft ablegen. Sofern es nicht zu einer völligen Kehrtwende in der Politik der [Root.GetAdjective]-Führung kommt, bleibt uns keine andere Wahl, als zu kämpfen.'\n\n[From.GetAdjective]-Einmischung in unsere inneren Angelegenheiten war ein heißes Thema, wobei einige Politiker in ihrer Opposition behaupteten, dass [From.GetRulingParty] von Anfang an eine aggressive Politik verfolgt habe. Was auch immer ihre ursprüngliche Absicht war, ein zukünftiger Krieg erscheint nun plötzlich sehr real und unvermeidlich."
 war_justification.209.a:0 "Ihre herablassende Rhetorik wird uns nicht einschüchtern."
 war_justification.210.t:0 "[From.GetLeader] ruft zum Eingreifen in [Root.GetName] auf"
 war_justification.210.d:0 "„Mit schwerem Herzen müssen wir uns der Realität unserer Situation stellen: Eine Invasion von [Root.GetName] könnte unser einziger Ausweg sein.“ Es ist ein zu großer strategischer Vorteil, in unserer gegenwärtigen Situation eine andere Lösung zu versuchen. Obwohl wir darauf vertrauen, dass weder die [From.GetAdjective]- noch die [Root.GetAdjective]-Leute Krieg wollen, hat uns die Geschichte an diesen Punkt geführt und unsere Möglichkeiten sind begrenzt. Wir können nur hoffen, dass wir durch die Behauptung unserer militärischen Macht weiteres Blutvergießen in der Zukunft vermeiden können.'\n\nObwohl es eine populäre Theorie ist, dass Demokratien nicht gegen andere Demokratien in den Krieg ziehen, deuten jüngste Entwicklungen auf eine [From.GetAdjective]-Invasion von [Root.GetName] in der Zukunft hin. Die Geschichte könnte uns noch überraschen."
 war_justification.210.a:0 "[From.GetName] ist ohnehin eine zweifelhafte Demokratie, wenn sie solch aggressive Maßnahmen verfolgt."
 war_justification.211.t:0 "[From.GetLeader] warnt vor der Roten Bedrohung"
 war_justification.211.d:0 "„Ohne Zweifel ist der [Root.GetName]-Kommunismus eine der größten Bedrohungen für Freiheit und Ordnung in dieser Zeit.“ Unbarmherzig und rücksichtslos droht es nicht nur die Hoffnung des [Root.GetAdjective]-Volkes auf eine wohlhabende, demokratische Gesellschaft, sondern auch die seiner Nachbarn zu zerstören. Wenn wir jetzt nicht handeln, kann es sein, dass dieser erste Dominostein zu spät fällt und weitere gescheiterte soziale Experimente zurückbleiben. Wie viele müssen noch sterben, bevor wir eingreifen?'\n\nDie entstehende Arbeiterbewegung hat [From.GetAdjective]-Führer eingeschüchtert. Während Vertreter ihrer Opposition dies als einen „Roten Schrecken“ bezeichnen, der darauf abzielt, einen Krieg mit uns zu führen, war die Rhetorik der [From.GetRulingParty] bisher äußerst erfolgreich."
 war_justification.211.a:0 "Solange es ihnen einen Gewinn bringt, werden die Kapitalisten einen Krieg inszenieren."
 war_justification.212.t:0 "[From.GetLeader] stellt sich dem [Root.GetAdjective]-Faschismus entgegen"
 war_justification.212.d:0 "„In der modernen Geschichte, vielleicht sogar in der gesamten Geschichte, hat es keine schlimmere Tyrannei gegeben als den eisernen Griff, in dem [Root.GetRulingParty] jetzt [Root.GetName] festhält. Die Leute mögen argumentieren, dass wir keinen Konflikt provozieren sollten, dass wir darauf vertrauen sollten, dass [Root.GetLeader] Verträge und Versprechen in der Zukunft einhält, aber diese Leute erkennen nicht, dass Verträge, die unter der Herrschaft des Faschismus geschlossen wurden, nutzlos sind. Für diese unehrenhaften Lügner gilt: Macht macht Recht, und das Papier, auf dem eine Vereinbarung steht, brennt genauso leicht wie die Bücher ihrer Kritiker.‘\n\nEifersüchtig auf die glorreiche Gesellschaft, die wir aufbauen, und auf das Erbe, auf dem sie gründet, scheinen die [From.GetAdjective] bereit zu sein, einen Krieg zu beginnen, um sie zu zerstören. Soviel zu ihren Friedensansprüchen."
 war_justification.212.a:0 "Unvermeidlich. Es ist besser, den Krieg endlich hinter sich zu bringen."
 war_justification.213.t:0 "[From.GetLeader] ruft zum Krieg gegen [Root.GetName] auf"
 war_justification.213.d:0 "„Obwohl wir ein friedliches Volk sind, bestimmt nicht unsere Natur allein den Kurs, den wir in der Geschichte einschlagen müssen.“ Dies ist eine Zeit des Krieges. Zu lange verfügen die [Root.GetAdjective] über die Mittel, die wir brauchen, um die Prüfungen zu bestehen, die uns möglicherweise bevorstehen, und es ist offensichtlich, dass sie sich nicht friedlich von ihnen trennen werden. Trotz unserer besten Bemühungen, einen modernen Staat aufzubauen, können einige Angelegenheiten nur durch die alten Prüfungen des Kampfes geklärt werden.'\n\nIn einer kürzlichen Rede vor dem Volk von [From.GetAdjective] hat sich die feindselige Rhetorik gegenüber [Root.GetName] verschärft und [From.GetLeader] hat große Anstrengungen unternommen, um eine Invasion zu rechtfertigen. Ein Teil der Bevölkerung unterstützt diesen Kurs, aber die Entscheidung liegt im Land ihres Anführers."
 war_justification.213.a:0 "Sie werden es bereuen, uns zu ihrem Feind gemacht zu haben."
 war_justification.214.t:0 "[From.GetLeader] stellt die [Root.GetAdjective] Ansprüche in Frage"
 war_justification.214.d:0 "„[Root.GetName] hält sich vielleicht für moderner und fortschrittlicher als wir, aber die Wahrheit ist, dass ihre Nation nicht so auf die Probe gestellt wurde wie unsere, noch sind sie auf die Bedrohungen vorbereitet, die sich jetzt deutlich am Horizont abzeichnen.“ Indem sie uns verachten und uns daran hindern, sich das anzueignen, was uns rechtmäßig zusteht, haben sie uns zu einer dieser Bedrohungen für sich selbst gemacht. Ihre schwache und gespaltene Nation wird unseren Ansprüchen kaum widerstehen.'\n\nDie seit langem von der [From.GetRulingParty] vertretene spöttische Meinung von [Root.GetName] hat sich von Kritik zu Feindseligkeit entwickelt. Obwohl die allgemeine Meinung ist, dass das Volk von [Root.GetAdjective] einen Krieg vermeiden will, behauptet [From.GetLeader], dass unsere gewählten Führer ihn durch ihre Arroganz provoziert haben."
 war_justification.214.a:0 "Die Friedensstimmen unter den [From.GetAdjective]-Leuten werden natürlich zum Schweigen gebracht."
 war_justification.215.t:0 "[From.GetLeader] möchte die Ordnung in [Root.GetName] wiederherstellen"
 war_justification.215.d:0 "„Der Geist der [From.GetAdjective] ist stark, aber nicht alle Nationen haben so viel Glück.“ [Root.GetName] hat seine Traditionen zerstört und rechtmäßige Herrscher längst ermordet und begraben, alles im Namen der Idee der großen marxistischen Revolution. Es ist unsere Pflicht, die Ordnung in der von blutrünstigen Usurpatoren in die Irre geführten Metro wiederherzustellen und die Stärke von [From.GetName] gegen diese Bedrohung zu behaupten.'\n\nWährend die [From.GetRulingParty] immer gegen den Kommunismus war, war [Root.GetName] in den letzten Reden das Ziel besonderer Angriffe. Aus Angst vor dem unvermeidlichen Übergang ihrer Nation in die nächste Phase der Geschichte ist bereits ein Präventivangriff auf den [Root.GetAdjective] Kommunismus in Planung."
 war_justification.215.a:0 "Es ist zu spät um die Fortschritte, die wir gemacht haben rückgängig zu machen."
 war_justification.216.t:0 "[From.GetLeader] ruft zum Kampf gegen die [Root.GetAdjective] Unterdrücker auf"
 war_justification.216.d:0 "„Meine Gegner wollen Sie glauben machen, dass meine Regel der der [Root.GetRulingParty] in [Root.GetName] ähnelt. Sie könnten nicht falscher liegen. Während die Erfolge von [Root.GetLeader] das Ergebnis einer aktuellen Modeerscheinung sind, einer destruktiven Massenbewegung, die darauf aus ist, andere Nationen zur Unterwerfung zu zwingen, steht die [From.GetRulingParty] im Gegensatz zu dieser Bewegung als diejenigen, die sich nicht unterwerfen. Ich bin bereit, alles Notwendige zu tun, um diese Bedrohung zu beseitigen, auch wenn es Krieg bedeutet.'\n\nDas [From.GetLeader]-Regime hat eine feindselige Politik gegenüber der [Root.GetAdjective]-Nation verfolgt. Unsere visionären Pläne für zukünftige Größe haben ihre Nation beschämt, und es überrascht nicht, dass sie sich bedroht fühlen."
 war_justification.216.a:0 "Wenn sie unsere Macht auf die Probe stellen wollen, werden sie es bereuen."
 war_justification.217.t:0 "[From.GetLeader] hinterfragt die [Root.GetAdjective] Souveränität"
 war_justification.217.d:0 "„Wer legt die Grenzen einer Nation fest und wie werden sie festgelegt?“ Welche Art und Weise die Menschen in der Vergangenheit auch immer gefunden haben, um zu rechtfertigen, wo [From.GetName] endet und [Root.GetName] beginnt, wir leben in einer neuen Ära. Die strategische Bedeutung dieser Grenze kann nicht genug betont werden, und wir haben durchaus das Recht, sie zu verschieben, um die anhaltende Sicherheit unseres Volkes zu gewährleisten.'\n\nWenn man sich die jüngsten Reden von [From.GetLeader] anhört, scheint eine Invasion von [Root.GetName] unmittelbar bevorzustehen. Andersdenkende haben Einwände erhoben, aber die öffentliche Unterstützung für den Krieg nimmt zu."
 war_justification.217.a:0 "Hat die Welt nichts aus den drei Weltkriegen gelernt?"
 war_justification.218.t:0 "[From.GetLeader] hinterfragt die Motive der [Root.GetName]"
 war_justification.218.d:0 "„Es besteht kein Zweifel, dass [Root.GetName] sich auf den Krieg vorbereitet.“ Die Veränderungen in der Wirtschaftspolitik machen deutlich, dass die [Root.GetAdjective] kein Volk des Friedens sind, sondern vielmehr auf die richtige Gelegenheit warten, um gegen uns anzugreifen. Werden wir tatenlos zusehen, wie sie sich bewaffnen, während [From.GetName] nicht verteidigt wird? Oder werden wir diese Bedrohung entwaffnen, bevor sie unsere Macht übersteigt?'\n\nDie Falken in der [From.GetRulingParty] haben ihren Blick auf [Root.GetName] gerichtet und argumentiert, dass Angriff die beste Verteidigung sei. Ihr Standpunkt gewinnt an Bedeutung und [From.GetName] bereitet sich auf einen Krieg vor."
 war_justification.218.a:0 "Genau dafür müssen wir bereit sein."
 war_justification.219.t:0 "[From.GetLeader] Verärgert über das [Root.GetAdjective]-Gehabe"
 war_justification.219.d:0 "„Diese naiven Bürger von [From.GetName], die sich das [Root.GetAdjective] als ein Volk des Friedens vorstellen, haben keinen Bezug zur Realität.“ Diejenigen, die an unserer Grenze leben, können sich den Luxus solcher Wahnvorstellungen nicht leisten, wenn sie sehen, wie ihre Truppen auf der anderen Seite auf uns zukommen. Dies ist eine Bedrohung, die wir nicht unbeantwortet lassen können. Mit jedem Tag bereitet sich [Root.GetName] auf den Krieg vor. Es wäre Wahnsinn, wenn wir nicht dasselbe tun würden.'\n\nUnsere Militärpräsenz in der Nähe des [From.GetAdjective]-Territoriums hat zunehmende Besorgnis ausgelöst, da sie unsere Truppenbewegungen als Beweis feindlicher Absichten interpretieren. Sie scheinen kaum darüber nachgedacht zu haben, dass ihre aggressive Rhetorik der Grund für unsere Abwehrmaßnahmen ist."
 war_justification.219.a:0 "Wir können uns nach diesen Drohungen wohl kaum entwaffnen."
 war_justification.220.t:0 "[From.GetLeader] befürwortet die Invasion von [Root.GetName]"
 war_justification.220.d:0 "„Wenn wir im absehbaren, um nicht zu sagen unvermeidlichen Krieg mit [Root.GetName] einen strategischen Vorteil haben wollen, gibt es keinen Grund zum Zögern.“ Es geht darum, die Zukunft unserer Kinder zu sichern und sicherzustellen, dass [From.GetName] einen Platz in der Welt von morgen hat. Dies ist eine Frage der Hingabe an unsere Sache und die Ideale, die wir für selbstverständlich halten. Es ist Zeit zu handeln.'\n\nEine Reihe mitreißender Reden von Anführern der [From.GetRulingParty], allen voran [From.GetLeader], haben die Öffentlichkeit dazu aufgerufen, eine Invasion von [Root.GetName] zu unterstützen. Die geopolitischen Motive hinter der Invasion stehen in der Rhetorik weniger im Vordergrund als patriotische Gefühle, aber diese Kampagne scheint äußerst effizient dabei zu sein, die Öffentlichkeit von ihrer Notwendigkeit zu überzeugen."
 war_justification.220.a:0 "Der Krieg wird kommen, wir bereiten uns besser vor."
 war_justification.301.t:0 "[Root.GetLeader] wird wegen seiner schwacher Außenpolitik kritisiert"
 war_justification.301.d:0 "„Wir hatten die Chance, gegen unsere Feinde vorzugehen, aber die [Root.GetRulingParty] ließ sie verstreichen.“ Dies ist nicht nur ein weiterer vernichtender Fall in einer Reihe verpasster Gelegenheiten, die Position von [Root.GetName] international zu stärken, es ist auch ein Zeichen dafür, dass ihre Behauptung, im Interesse der [Root.GetAdjective]-Leute zu handeln, größtenteils leere Rhetorik ist. Es ist Zeit für einen Politikwechsel.'\n\nUnser Versäumnis, den von vielen erwarteten Krieg fortzusetzen, wurde von unseren politischen Gegnern scharf kritisiert. Wenn wir unsere militärischen Pläne nicht in die Tat umsetzen, wird es für uns schwieriger, die Menschen davon zu überzeugen, in welche Richtung wir gehen [Root.GetName]."
 war_justification.301.a:0 "Wollen sie den den Krieg nicht verhindern?"
 war_justification.301.b:0 "Außerhalb von Parteiversammlungen gibt es keinen Raum für öffentliche Meinungsverschiedenheiten."
 war_justification.301.c:0 "Wir können nicht zulassen, dass die Menschen [Root.GetLeader] der Feigheit bezichtigen!"
