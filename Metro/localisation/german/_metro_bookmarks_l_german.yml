l_german:
 ### COMING SOON ###
 2033_NAME:0 "§R2033§!"
 2033_DESC:0 "§RCOMING SOON!§!"

 2028_NAME:0 "Genesis"
 2028_DESC:0 "15 Jahre sind seid dem Armageddon vergangen. Die wenigen Überlebenden zogen sich in die Moskauer Metro zurück und leben nun weiter, mit neuen Regeln und neuen Gesetzen leben sie in einer neuen Welt. Die zahlreichen Stationen führen nun einen ewigen Kampf gegen die Elemente, wehren sich gegen die verseuchten Mutanten der Oberfläche, und alte sowie neue Ideologien formieren sich und streben nach der Herrschaft über die gesamte Metro. Wird die Menschheit in dieser Welt überleben können?"

 RED_BOOKMARK_DESC:0 "§R...Und diese Linie, einst wurde sie die Sokolnicheskaya genannt, aber die meisten nannten sie einfach "Die Rote" - Denn für die Moskauer war es üblich, die Linien nach ihrer Farbe auf dem Plan zu benennen - Sie wurde dann ganz offiziell zur Roten Linie.\n\n§!Bestehend aus dem größten Teil der Sokol Linie, ist die Rote Linie die vielleicht letzte Bastion von Soviet-Nostalgie, wohlmöglich sogar in der ganzen Welt! Sie ist das ultimative Testament von Russlands glorreicher sozialistischer Vergangenheit und jede Mauer hier ist geschmückt mit der Propaganda dieses vergangenen Regimes.\n\nNostalgie wurde schon bald zur Verehrung und angetrieben von den antiken Symbolen um sie herum, begann eine Bewegung zur Wiederherstellung der Sovietunion die gesamte Linie zu erfassen. Überlebende alte Parteimitglieder, sowie eine neue Generation von Proletariern gründeten ein gemeinsames Komitee zur Steuerung und Verbreitung der Revolution in der ganzen Metro. Die einzelnen Stationen der Roten Linie schlossen sich diesem Flächenbrand schnell an und stürzten ihre frühere Administration. Die Sovietunion war wiedergeboren. Der Umsturz verlief bis dahin gewaltlos und die bewohner der Roten Linie unterwarfen sich freiwillig der neuen Herrschaft.\n\nMit einer Bevölkerung von über 15.000 Mann plante die mächtige Rote Linie einst, auch dem Rest der Metro die Revolution zu bringen, doch interne Machtkämpfe, Korruption, sowie das Ausbleiben der großen sozialistischen Versprechungen ließen den einstigen revolutionären Eifer dahinschwinden.\n\nDoch noch ist die Flamme der Revolution nicht vollends erloschen, zumindest offiziell hält die Rote Linie noch immer an der Maxime Lenins fest, doch ihre Feinde sind zahlreich und lauern in und außerhalb der Partei. Und währenddessen heilen die Wunden des letzten Krieges gegen die Hanse nur langsam und neue Kriege drohen bereits am Horizont. Wird der letzte Kampf den Sieg des Sozialismus mit sich führen? Oder wird die Flamme der Revolution endgültig von ihren Feinden erstickt werden?\n"

 MSU_BOOKMARK_DESC:0 "§R...Aber Yakov Iosifovich sagte dass, sie sagen, die Universität wurde nicht vernichtet. Sie schafften es die Tunnel zu blockieren, doch dort leben noch immer Menschen§!\n\nVerborgen am äußersten Rand der Metro liegt die mysteriöse Smaragdene Stadt. Gerüchte gehen um, das dort im geheimen die alte Welt von Wissenschaft und Kultur überlebt habe, und das ihr Wissen sogar das der Polis übertreffen soll! Eine verborgene Bastion des Friedens und der Harmonie in einer sonst barbarischen und ignoranten Welt. Was von diesen Geschichten jedoch wahr ist, kann niemand sagen, denn keine verlässlichen Informationen über diesen isolierten Ort gelangten je in das Herz der Metro.\n\nDoch wie lange noch wird die Stadt der Smaragde schweigen können? Und wie lange noch wird es dauern, bevor die innere Metro sich entschließt, diesen Gerüchten auf den Grund zu gehen?"
 
 HNZ_BOOKMARK_DESC:0 "§R...Die Handelsliga der Hanse war der Name der einzelnen Stationen der Ringlinie. Diese Stationen verbanden alle Linien miteinander und damit auch alle Handelslinien, die sich in der Metro gebildet hatten. Und so wurden sie zu den Treffpunkten für Geschäftsleute aus der ganzen Metro. In kürzester Zeit wurden diese Geschäftsleute unermesslich reich und schon bald zog ihr Wolhstand den Neid ihrer Nachbarn an. Um sich zu schützen vereinten sich die Stationen unter einer Flagge. Jemand verglich sie zutreffenderweise mit der mittelalterlichen Liga deutscher Handelsstädte,§! §OHanza,§! §RDer Begriff war einprägsam und blieb folglich hängen.§!\n\nDie Hanse ist die größte, reichste und vermutlich auch mächtigste Fraktion in der Metro, eine kapitalistische Allianz aus unabhängigen Stationen, welche nun die gesamte Ringlinie beinhaltet. Von hier aus dominieren sie die gesamte Wirtschaft der Metro, sowohl die der inneren als auch der äußeren Linien. Gemäß ihrer pazifistischen Art hält sich die Hanse aus Konflikten größtenteils heraus und sollte sie einmal eingreifen, so beschränkt sie sich meist auf Sanktionen und Embargos.\n\n Nichtsdestotrotz brachte ihr übermächtiger Status dennoch Konflikte hervor: Der blutige Krieg mit der Roten Linie in den 2020er Jahren ist noch immer in frischer Erinnerung und die Hanse zahlte einen hohen Blutzoll für ihre wirtschaftliche Dominanz. Auch wenn ein Frieden erreicht wurde, so ist dieser nur brüchig. Ein weiterer großer Krieg wird folgen und die Hanse wird in seinem Zentrum stehen. Ob sie will oder nicht."
 
 RCH_BOOKMARK_DESC:0 "§R...Und plötzlich vor einiger Zeit tauchten sie an der Pushkinskaya auf.§! §ODie Metro gehört den Russen§! §RHast du davon gehört? Oder davon?§! §OTuet Gutes, säubert die Metro!§! §RSie haben alle Nicht-Russen aus der Pushkinskaya rausgeworfen, dann von der Chekhovskaya und dann auch von der Tverskaya. Nun haben sie dort ihr Reich. Das Vierte oder Fünfte...§!\n\nGegründet aus einem Misch-Masch aus Nationalisten, Faschisten und anderen rechtsextremen Gruppierungen, war dem Reich von anfang an klar, dass der wahre Krieg erst begonnen hatte. Aus den Ruinen der alten Ordnung erhob sich eine neue Ordnung mit alter Maxime: "Ein Volk, ein Reich, ein Führer!" und erklärte sich damit zum Nachfolger von Hitlers drittem Reich.\n\nIn letzter Zeit schafften es die Faschisten ihre Herrschaft über die drei Stationen zu festigen. Die Macht ihres Führers ist nun unangefochten und seine Herrschaft absolut, sämtliche Dissidenten wurden liquidiert und die Loyalität seiner Anhänger ist gesichert. Nun beginnt der wahre Kampf, ein Krieg der totalen Vernichtung jeglicher Untermenschen und des Triumphes der Herrenrasse. Das Reich nimmt es auf sich, nun die gesamte Metro nun von jeglichen Mutanten und degeneriertem Abschaum zu säubern. Der Abschaum in geistiger und rassisscher From wird ein für alle mal von dieser Welt getilgt werden! Verborgen und verstoßen vom Rest der Metro, sind Metromacht und SS bereit, für ihr Tausendjähriges Reich zu töten und auch zu sterben."

 PLS_BOOKMARK_DESC:0 "§R...Der letzte Ort auf Erden, an dem Menschen noch wie Menschen leben, an dem sie sich erinnern was das Wort Mensch bedeutet und wie es klingen sollte...§!\n\nDie Polis ist ein recht junger Staat, gegründet nach dem verheerenden Krieg gegen die Rote Linie. Vermutlich der letzte Ort auf der Welt an welchem Menschen noch wie Menschen leben, wo die Flamme der menschheit noch nicht endgültig erloschen ist.\n\nDie Polis ist ein mächtiger Stadt-Staat bestehend aus 4 Stationen, mitten im Herzen der Metro. Ihre Macht stammt nicht aus ihrem Reichtum oder ihrem Militär, sondern aus ihrem Wissen, welches hier eifrig gesammelt und gehütet wird. Jene die diesen alten Idealen noch nacheifern strömen zur Polis, oder scheitern bei dem Versuch. Als Bollwerk des Wissens lebt die Polis noch in der alten Welt und ignoriert darum die neue Welt und wird darum auch von ihr gemieden.\n\Doch am Horizont zieht Krieg auf und mehr und mehr Neider sammeln sich rings um die Polis. Der Stift mag zwar mächtiger als das Schwert sein, aber er ist nicht mächtiger als eine Vollautomatische..."

 SPT_BOOKMARK_DESC:0 "§R...Diese Typen, das sind die echten Engel des Todes! Einhundert Mal tödlicher als die Soldaten der Hanse! Alle von denen sind zwei Meter groß und bewegen sich wie eine Einheit. Bis an die Zähne sind die bewaffnet!...§!\n\nEine Elite-Einheit aus kampferprobten Kriegern, welche zu keiner ideologie oder Nation gehören und die sich ausschließlich dem Überleben der Menschheit widmen. Die Spartaner, genau wie ihre historischen Vorbilder, sind die erfahrensten und tödlichsten Soldaten in der gesamten Metro. Die Bewahrung und der Schutz der Menschheit ist ihre alleinige Aufgabe. Viele ihrer Mitglieder dienten vormals der russischen Spezialeinheit, der SPETSNAZ, oder anderen Sondereinheiten. Der Orden der Spartaner ist eng mit der benachbarten Polis verbündet, verhält sich ansonsten jedoch ehern neutral. Doch wie lange noch wird der Orden seine Neutralität halten können, in den Kriegen die da kommen werden?"

 ARB_BOOKMARK_DESC:0 "§R...Dort gab es einen Schriftzug an der Wand:§!\n§YWillkommen in der Arbat-Konföderation!§!\n§RDie Buchstaben waren hab vergilbt und es war sofort klar, dass der Schriftzug für eine lange Zeit nicht instand gehalten worden war. Die Wachen flüsterten untereinander und eine unerklärliche Finsterniss begrüßte ihn aus der Tiefe. Die Linie war ruhig, nur ein paar entfernte Stimmen waren zu hören, vermutlich eine Patrouille. Es war eine der seltsamsten Staionen die Artjom je gesehen hatte....§!\n\n Die Arbat-Konföderation ist eine Gruppe von Stationen rund um die Kievskaya. Als früheres Mitglied kämpften sie in der Antikommunistischen Liga gegen die Rote Linie, heute jedoch ist die Konföderation beinahe in Vergessenheit geraten. Vom Konflikt stark geschwächt verlässt sich Arbat nun auf Händler die sich zu ihr verirren, um am Leben zu bleiben.\n\nVorrangig von Kaukasen und Nicht-Russen regiert hat die Gemeinschaft jedoch eine große Zahl ethnischer Minderheiten, sowie auch Stalker angelockt, die nun den größten Teil der Bevölkerung stellen. Doch besorgnisserregende Gerüchte kommen aus dem Westen, eine ungesehene Gefahr aus dem Park Pobedy. Weder Mensch noch Mutant, sondern, etwas gänzlich anderes..."

 BAU_BOOKMARK_DESC:0 "§R...Zum Beispiel die Baumans, die sind noch eine echte Macht hier unten. Bei den Stationen rund um die Bauman-Universität, die jedoch weniger Wissenschaftler, sondern mehr Ingenieure in ihren Reihen hatten. Dort bildeten sie ihre eigene Kommune und anstatt über irgendwelche Theoreme zu fantasieren begannen sie mit echter Arbeit an echten Maschinen. Eine Zeit lang sollen sie mit der Universität konkurriert haben, doch das sind wohl nur Gerüchte. Wir alle leben in einer Welt, die wohl nur noch aus Gerüchten besteht...\n\n§!Als eines der technischen Machtzentren in der Metro, ist die Bauman-Allianz eine technokratische Kommune, bestehend aus Technikern und Ingenieuren auf der Arbatsko-Pokrovskaya Line.Eine, wenn nicht die erste Nation, die Stalker an die Oberfläche schickte und bis heute hat sich daran nicht geändert. Die Station kam zu ihrem Wohlstand durch den Verkauf, der Reparatur und der Modifikation von Vorkriegs-Gegenständen.\n\nObwohl sie im Krieg gegen die Hanse neutral blieb, litt die Station doch sehr und entging nur knapp dem Untergang. Und nun nähern sich neue Gefahren und Bedrohungen von allen Seiten. Wie lange wird die Allianz noch neutral bleiben können?"

 GWC_BOOKMARK_DESC:0 "§R....Es existieren Gerüchte, darüber dass die Menschen vom Park noch am leben sind, doch sie haben aufgehört Menschen zu seien...§!\n\nDie meisten in der Metro sehnen sich nach Ordnung, doch es gibt auch jene, die die Zivilisation entschieden ablehnen. Jene, die nicht länger Mensch, aber auch keine Mutanten sind. Dürre, bleiche, skelettartige Wesen bewegen sich in den finsteren Tiefen, wartend, lauernd..."

 TRT_BOOKMARK_DESC:0 "§R...Das unterirdische Venedig... Eine Insel in den dunklen Gewässern der Untergrund-Flüsse...§!\n\nDas Gauner-Trio liegt dort, wo sich drei Tunnellinien treffen, eine Position strategischen Werts mit Wohlstand und Macht, jedoch teilweise überflutet, was ihm den Namen "Venedig" verschaffte, benannt nach jener großen Stadt der Vergangenheit. In Wahrheit ist es jedoch ein Loch voll Abschaum, darunter auch die übelsten Banditen, die die Metro kennt. Eine Stadt der Sünde, ein Ort der Möglichkeiten, regiert von Gangs und Gaunern und dem organisiertem Verbrechen.\n\nVenedig ist einzigartig in der Metro, ein gefährlicher Ort, aber auch ein Ort der Frteiheit, frei von den Ideologien und Gesetzen der umliegenden Stationen. Bis heute verlacht und ignoriert, so könnte Venedig doch eine mächtige Nation werden, sollten sich die Banditen zu einer echten Armee vereinigen können. Sie könnten eine bestimmende Macht in der Metro werden, ein Spieler, nicht nur eine Spielfigur..."

 ULI_BOOKMARK_DESC:0 "§R...Zuerst gab es die Konföderation, dann blieb jedoch nur der Name übrig...§!\n\nEine links-gerichtete Gemeinschaft besetzt die nordwestlichen Teile der Tagansko-Krasnopresnenskaya-Linie. Inzwischen ist sie stark geschwächt von internen Konflikten, wirtschaftlichem Niedergang und Mutanten-Angriffen und nun rückt die Hanse näher und droht, sie im ganzen zu verschlingen. Die Konföderation muss zu ihrer alten Stärke zurück finden, oder der kommende Sturm wird sie einfach hinfort fegen, als wären sie nie da gewesen."

 SEV_BOOKMARK_DESC:0 "Eine Station von Ingenieuren, aber vor allem Soldaten. Jeder Bürger wird hier im Abwehrkampf gegen die Mutanten geschult, die die Station aus dem Süden her bedrohen. Eine wichtige Station, welche die gesamte südliche Metro mit Energie versorgt."

 VDN_BOOKMARK_DESC:0 "§R...Denk an meine Worte, sie werden eine Allianz gründen und die VDNKh wird sie führen...§!\n\nDie VDNKh, auch Messe-Station genannt, ist eine friedliche Handelsgemeinschaft und in der ganzen Metro für ihren Pilztee bekannt. Durch ihre friedlichen Nachbarn geht es der Station ziemlich gut, sie hat sogar eine eigenen kleine Bibliothek und fast jeder hier kann sie auch lesen."

 MDR_BOOKMARK_DESC:0 "Ein kleiner isolierter Staat, der die letzten zwei Statioen im Osten der Arbatsko-Pokrovskaya-Linie einnimmt. Die Pervomayskaya-Republik wird nun von früheren Mitarbeitern des Innenministeriums regiert, welche zu ihrem Schutz versuchen, die Existenz der restlichen Metro geheim zu halten. Nur die höchste Führung weiß vom Rest der Metro und so soll es auch bleiben, so dass sich keine unfreundlichen Blicke auf die kleine Republik richten. Bis zum heutigen Tag hat sich diese Politik bezahlt gemacht, die Stationen leben in Frieden und Sicherheit und der Rest der Metro ahnt vermutlich nichteinmal, dass sie existieren. Doch wie lange noch kann dieses Geheimniss geheim bleiben? Und was werden sie tun, sollte die Wahrheit eines Tages doch ans Licht kommen?" 

 SCA_BOOKMARK_DESC:0 "§R...Aber wenn die nur ans Essen, Schlafen und Vermehren denkst, wofür brauchst du dann Museen, Schulen, Shakespear und so weiter? Was ist leichter als deinen Kopf im Sand zu vergraben und aufzuhören Mensch zu sein? Ich weiß nicht was die Menschen an deiner Station so treiben, doch wir stecken unseren Kopf nicht in den Sand!...§!\n\nRattenmenschen, Mutanten, Skaven. Rattenähnliche Menschen, die die nördlichen Metrolinien bevölkern. Einst waren sie Menschen, doch Mutationen und Krankheiten entstellten sie und ließen sie ihre neue Form annehmen, als Rattenmenschen. Geächtet vom Rest der Metro zogen sie sich in ihre abgelegenen Stationen zurück und trotz ihres wilden Aussehens wollen die Skaven doch nur allein und in Frieden leben.\n\nDie Skaven, obwohl sie wie wilde Mutanten aussehen, haben sich in Wahrhheit der Bewahrung des menschlichen Erbes verschrieben. Anstatt sich mit dem Rest der Metro zu befassen, fördern sie stattdessen Kultur, Wissenschaft und Kunst, denn auch wenn ihre menschlichen Körper gebrochen wurden, so bleibt ihr Geist doch unbesiegt."

 ISL_BOOKMARK_DESC:0 "Bevölkert von Skaven, ist das Kalifat bevölkert von jenen, die früher den kaukasischen Völkern angehörten und die noch immer zum Islam halten. Basierend auf Sklaverei und Kastenwesen strebt dieses Kalifat nun nach Reinheit, der Reinheit des Blutes sowie der Reinheit des Glaubens. Regiert von einem mysteriösen Kalifen befindet sich dieses Reich im ständigen Konflikt mit seinen Nachbarn."

 SAT_BOOKMARK_DESC:0 "§RIch fragte die Männer mit denen ich dort arbeiten musste und weißt du was sie mir sagten? Das hier seien Satanisten! Verstehst du? Sie glaubten, dass Ende der Welt sei schon gekommen und der Gehörnte habe gesiegt! Und sie glaubten auch, dass die Metro nun über einem Tor direkt zur Hölle liegt, also fingen sie an zu graben, so tief sie eben konnten. Irgendwas über Kreise haben sie auch erzählt, aber daran erinnere ich mich kaum.§!\n\nAls sich Himmel und Hölle im Armageddon bekämpften, so war es nur natürlich, dass sich neue Glauben formieren würden. Manche würden ihren Glauben an Gott bekräftigen oder sich zumindest einen neuen suchen. Andere jedoch verfielen dem Wahnsinn...\n\nNun lauern sie in der Timiryazevskaya und glauben, Satan habe gesiegt und die Hölle sei nun ein Teil dieser Welt. Und unter der Metro, da vermuten sie ihren Eingang. Und während sie immer tiefer und tiefer graben, so kann der Rest der Metro nur die Schreie ihrer Gefangener vernehmen..."

 AVT_BOOKMARK_DESC:0 "§R...Unter dem Kommando des Kommisars Rusakov rollt die Brigade durch die Metro und begeht dort Sabotage-Akte, meist gegen das Reich gerichtet.§!...\n\nNicht alle Kommunisten strömten zur Roten Linie, es gibt auch jene, die den Idealen Lenin's und Trotzki's treu geblieben sind. Nun bilden sie die erste Brigade des Che Guevara und während sie für manche mutige Freiheitskämpfer sind, so sind sie für andere nicht mehr als eine Bande von Banditen mit Flagge. Für die meisten jedoch bleiben sie ungesehen und ungehört, denn ihren Krieg führen sie heimlich und aus dem Hinterhalt heraus. Für ihre Anhänger jedoch sind die die wahren Erben der Revoluton, jene die die Ideale von Marx und Engels hoch leben lassen und die der ganzen Metro die Revolution bringen werden.\n\nVom Politbüro der Roten Linie werden sie geächtet, doch das macht nichts, die Brigade ächtet das Politbüro einfach zurück."

 EUR_BOOKMARK_DESC:0 "Ein seltsamer Anblick für die Bewohner der Metro, die Europäische Gemeinschaft auf der Filyovskaya-Linie. Hier leben mehrheitlich nichtrussische Europäer, die sich aus dem Geschäfts- und Botschaftsviertel an der Oberfläche hier her retten konnten. Abgerenzt vom Rest der Metro bleibt die Europäische Gemeinschaft lieber unter sich selbst, und so entstanden in ihrem Inneren ganz eigene, einzigartige europäische Strömungen und Bewegungen, meistens basierend auf der eigenen Volkszugehörigkeit. Kulturelle Spannungen sind hier Alltag und bis eine klare gemeinsame Linie gefunden wurde, wird sich dies auch kaum ändern können.\n\nDoch inmitten all der Streitigkeiten gehen neuerdings Gerüchte um, Gerüchte um ein Grauen in den Tunnels die zum Park Pobedy führen. Wird die Europäische Gemeinschaft dieser neuen Bedrohung gewachsen sein? Oder werden sich die Europäer erneut von ihren Streitigkeiten zerreißen lassen?"