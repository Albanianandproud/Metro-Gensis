l_german:
 europa:0 "Die Europäische Gemeinschaft"
 europa_desc:0 "Bestehend aus Einwanderern, Botschaftern und anderen §YEuropäern§!, strandeten sie in Moskau, als die Bomben fielen. Im Laufe der Zeit bauten sie sich hier eine Gemeinschaft auf, ein §YEuropa in der Metro§!. In erster Linie ziehen sie es nun vor, unter sich zu bleiben und weit, weit entfernt vom Rest der überwiegend russischen Bewohner der Moskauer Metro."
