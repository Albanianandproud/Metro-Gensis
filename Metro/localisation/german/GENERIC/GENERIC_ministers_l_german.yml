  _metro_electronics_manufacturer:0 "Elektro-Ingeneur"
  _metro_electronics_manufacturer_desc:0 "Als ehemaliger Ingenieur war es ihm ein Leichtes, Bürger der Baumansky-Allianz zu werden, wo aus er weiter ausgebildet wurde und lernte, sein Handwerk auf die Bedürfnisse der Metro anzupassen.\n\n Nach einem ungünstigen Skandal, bei dem ihm das Verschwinden streng geheimer Verarbeitungsmethoden vorgeworfen wurde, floh er aus der Allianz, bevor er vor Gericht gestellt werden konnte.\n\nVon da an bot er sein Handwerk für jeden an, der sich einen Ingenieur leisten konnte. Mit seinem gelehrten und seinem §Y'gefundenen'§! Wissen, um all das zu tun, was er am besten kann."
  
  _metro_industrial_manufacturer:0 "Industrie-Ingenieur"
  _metro_industrial_manufacturer_desc:0 "Vor dem Abwurf der Bomben arbeitete er als Werksleiter einer Fabrik gleich außerhalb von Moskau. Während seine Aufgabe oft darin bestand, die Maschinenauslastung und die verschiedenen Vorgänge zu überwachen, die dafür sorgten, dass das innere Rädchen einwandfrei funktionierte, ist er nun als Berater und Betreuer für die Implementierung und Nutzung heruntergekommener und nachgerüsteter Industrieprozesse in der Metro tätig."
  
