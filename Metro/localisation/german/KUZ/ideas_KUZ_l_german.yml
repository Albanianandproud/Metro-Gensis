l_german:
 kuznetsky_most:0 "Techniker des Kuznetsky Most"
 kuznetsky_most_desc:0 "Kuznetsky Most, oft auch einfach 'Die Waffenkammer' genannt, erhielt ihren Namen von der Waffenfabrik, die einst direkt über der Station lag. Ihre Arbeiter flohen im großen Krieg direkt hier her und nutzen ihr Handwerk, um die Waffen der Metro zu produzieren. Inzwischen ist die gesamte Station auf die Waffenproduktion spezialisiert."

 KUZ_socialist_sympathies: "Sozialistische Sympathien"
 KUZ_socialist_sympathies_desc: "Die Techniker und Waffenbauer des Kuznetsky Most sind allesamt stolze Arbeiter eines noblen Handwerks. Dazu kommt ihre Nähe zur Roten Linie und eine anhaltende Bedrohung durch das Reich, die Waffenkammer ´konnte gar nichts anders als Symphatien zum Sozialismus entwickeln..."