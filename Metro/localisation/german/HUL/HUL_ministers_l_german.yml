 HUL_karetnikov_desc: "Karetnikov ist in Woykowskaja stationiert und fungiert als Leiter der Spionageabwehr für [ROOT.GetNameDef]. Es ist kein Zufall, dass Karetnikov denselben Namen trägt wie Semjon Nikititsch Karetnikov, der während des Bürgerkriegs in der Rebellenarmee von Nestor Machno exakt dieselbe Position bekleidete. Es ist nicht einmal bekannt, ob Semjon tatsächlich sein richtiger Name ist oder ob er schlichtweg beschlossen hat, sich so zu nennen."

