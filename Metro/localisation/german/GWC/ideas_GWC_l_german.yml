l_german:
 GWC_bump_in_the_night: "Ein Poltern in der Dunkelheit"
 GWC_bump_in_the_night_desc: "Etwas mehr als nur die üblichen Ratten lauert in der Dunkelheit..."

 GWC_purged_cannibals:  "Vernichtete die Kannibalen"
 GWC_purged_cannibals_desc:  "Einst eine Bedrohung für die gesamte Metro, heute nur noch eine Legende, mit der Mütter ihre unartigen Kinder erschrecken. Doch niemand wird je ihr Vermächtnis vergessen: bleiche Gestalten, die lautlos durch die Dunkelheit huschten."

