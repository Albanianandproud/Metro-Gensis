l_german:
 ## [NNN.GetName] refers to ID of state
 ## [NNN.GetNameDef] refers to country name
 ## [Root.GetNameDef] is attacker
 ## [From.From.GetNameDef] is defender

 global_event.1.t:0 "Der Fall der[361.GetName]"
 global_event.1.d:0 "Auch wenn die Kämpfe in der [PLS.GetNameDef] noch immer toben, so erreichen uns nun Berichte, dass die [Root.GetNameDef] nun die [361.GetName] eingenommen haben. Stalker, Soldaten und auch Zivilisten versuchten so viele der kostbaren gelagerten Bücher wie möglich zu evakuieren, doch nur ein Bruchteil konnte dabei gerettet werden. Viele der zurückgebliebenen Bücher verbrannten anschließend im Laufe der folgenden Gefechte.\n\nDie große Ratskammer, in welcher einst der Frieden zwischen Hanse und der Roten Linie verhandelt worden war, steht nun in Flammen."
 global_event.1.a:0 "Die Menschheit muss standhalten, wir dürfen nicht aufgeben!"
 global_event.1.b:0 "Wir müssen die Polis verteidigen!"
 global_event.1.c:0 "[361.GetName] ist unser, die Polis wird schon bald fallen!"
 global_event.1.e:0 "Schnell, durchsucht ihre Aufzeichnungen!"
 global_event.1.f:0 "Das Wort 'Mensch' verliert nun all seine Bedeutung"

 global_event.2.t:0 "Die Schlacht um [304.GetName]"
 global_event.2.d:0 "[Root.GetNameDef] schafften es heute, die Station [304.GetName] einzunehmen. Auch wenn in der Ferne noch Schüsse zu vernehmen sind, so kam es doch zu keinem entschlossenen Gegenangriff der Hanse. Zu viele ihrer Soldaten fielen bei der Verteidigung der [304.GetName], oder beim Versuch, die Evakuierung der wohlhabensten Händler der Station zu gewährleisten. Berichte von Plünderungen durch [Root.GetNameDef]-Soldaten machen die Runde, bleiben jedoch unbestätigt. So oder so liegt die [304.GetName]  nun in Trümmern und es wird wohl Jahre dauern, um ihren alten Glanz wiederherzustellen."
 global_event.2.a:0 "Wir werden uns dafür zehnfach rächen!"
 global_event.2.b:0 "Die Wirtschaft!"
 global_event.2.c:0 "Tod den Kapitalisten!"
 global_event.2.e:0 "Plündert alles was ihr tragen könnt!"
 global_event.2.f:0 "Was wird nun aus dem zerbrochenen Ring??"

 global_event.3.t:0 "[275.GetName] steht in Flammen"
 global_event.3.d:0 "Obwohl das Reich es verneint, so wurde soeben die Einnahme der [275.GetName] bestätigt. Die Kämpfe hier waren wohl besonders brutal und Leichen liegen überall auf der Station verstreut, einer Station die nun in Schutt und Asche liegt. Das dunkle Herz des Reiches ist gefallen. Trotz ihrer drohenden Niederlage kämpften die Soldaten der Metromacht verbissen bis zum bitteren Ende, unbestätigten Schilderungen zufolge soll es auch zu vereinzelten Kamikaze-Operationen gekommen sein. Wie es aussieht waren ihre Opfer nun umsonst.\n\nKaum waren die Waffen auf der Station verstummt, da begannen die Kräfte der [Root.GetNameDef] bereits mit ihrer Denazifizierung, die Banner des Reiches stehen in Flammen und die Propaganda wird von allen Wänden gewaschen. Es sieht so aus, als würde sich die Geschichte wiederholen."
 global_event.3.a:0 "Das Reich steht bis zum letzten Menschen! Bis zum letzten Atemzug! Sieg Heil!"
 global_event.3.b:0 "Mit dem Angriff Krainers wird das ... alles in Ordnung kommen. Oder?"
 global_event.3.c:0 "Das Reich ist gefallen und so auch sein Führer!"
 global_event.3.e:0 "Das Reich zerfällt so schnell wie es entstanden ist."
 global_event.3.f:0 "Geschichte wiederholt sich nie, aber sie reimt sich."

 global_event.4.t:0 "Erstürmung des [330.GetName]"
 global_event.4.d:0 "Heute morgen brachen die Truppen der [Root.GetNameDef] durch das Bollwerk der Roten Linie und erstürmten die [330.GetName]\n Die ganze Station steht nun in Flammen. NKVD-Truppen sowie reguläre Einheiten verwandelten das Theater zuvor in eine Festung, doch vergebens, bis auf ein paar kleine Widerstandnester ist das [330.GetName] gefallen.\n\nEntgegen der Anweisunge [RED.GetLeader]'s, keine Zivilisten zu evakuieren, wurden von den Soldaten doch Ausnahmen für Frauen, Kinder und Schauspieler gemacht. Auch wenn die Kulturträger der Metro damit noch am Leben sind, wird es wohl eine Weile dauern bis das Theater wieder geöffnet ist."
 global_event.4.a:0 "Bleibt stark Kameraden, die Revolution muss standhalten!"
 global_event.4.b:0 "[330.GetName] mag fallen, doch die Flamme der Revolution erlischt nie!"
 global_event.4.c:0 "Die Rote Linie bricht zusammen."
 global_event.4.e:0 "[330.GetName] brennt, die Rote Linie wird nicht mehr lange durchhalten!"
 global_event.4.f:0 "Ein Fühl von Trauer, Wut und Nostalgie, alles ausgelöscht. Leb wohl."

 global_event.5.t:0 "Schlacht um die [228.GetName]"
 global_event.5.d:0 "Die [228.GetName] war nie eine Festung und so fiel die Station erwartungsgemäß beim Angriff der [Root.GetNameDef]. Die Garnison der [228.GetName] kämpfte so lange wie sie konnte und verteidigte die engen Gefängnisgänge verbissen, doch letztendlich wurden sie überwältigt. Zu dem Chaos dazu kamen die entflohenen Häftlinge, die kurz vor dem Angriff von einer kleinen Einheit der [Root.GetNameDef] freigelassen worden waren. Die meisten Gefangenen wurden jedoch schon zuvor gandenlos erschossen, um dem Feind nicht in die Hände zu fallen. Dokumente, die die Verbrechen der Roten Linie aufzeigten, wurden bereits vor dem Angriff vernichtet. Und so findet eines der schrecklichsten Kapitel der Metro sein Ende."
 global_event.5.a:0 "Rückzug Kameraden, wir müssen uns neu sammeln!"
 global_event.5.b:0 "Was wohl [RED.GetLeader] gerade denkt??"
 global_event.5.c:0 "Gute Arbeit Männer, die [228.GetName] liegt nun in unseren Händen!"
 global_event.5.e:0 "[228.GetName] ist unser, nun weiter!"
 global_event.5.f:0 "Sieht schlecht aus für [RED.GetLeader]"

 global_event.6.t:0 "[350.GetName] ist gefallen"
 global_event.6.d:0 "Auch wenn sie bis zum letzten Mann kämpften, so blieb der [From.From.GetNameDef] keine Alternative, als sich von der [350.GetName] zurückzuziehen. Die Station [350.GetName] wurde von der Roten Linie als Gefängniss für politische Gefangene genutzt, einige von ihnen wurden offenbar während der mehrstündigen Kampfhandlungen als menschliche Schutzschilde verwendet. Letztendlich evakuierten die Verteidiger die Station jedoch, nachdem ihr letzter Sabotageversuch vereitelt wurde."
 global_event.6.a:0 "Der Geist der Revolution wird niemals gebrochen werden!!"
 global_event.6.b:0 "Wir müssen der Roten Linie helfen!"
 global_event.6.c:0 "[350.GetName] ist unser, forwärts!"
 global_event.6.e:0 "Die Schrecken des Totalitarismus werden ersichtlich."
 global_event.6.f:0 "Vielleicht ist dies das Ende der Roten Linie?"

 global_event.7.t:0 "Erstürmung der [308.GetName]"
 global_event.7.d:0 "Nach Stunden des gnadenlosen Kampfes um jeden Raum, fiel die [308.GetName] nun an die [Root.GetNameDef]. Trotz ihres ehrenwerten Mutes sahen sich die Kräfte der Hanse heute zum Rückzug gezwungen.\n\nDiverse Sabotageakte und Fallen forderten auf beiden Seiten hohe Verluste, doch so schnell wird die Hanse keinen entschlossenen Gegenangriff starten können."
 global_event.7.a:0 "Die Schlacht ist verloren, doch der Krieg ist noch nicht vorbei."
 global_event.7.b:0 "Wir müssen der Hanse helfen."
 global_event.7.c:0 "Der Ring wird unter unseren Stiefeln zerbrechen!"
 global_event.7.e:0 "Die Schande des ersten Hansekrieges ist damit vergessen."
 global_event.7.f:0 "Die Hanse, erneut im Krieg."

 global_event.8.t:0 "Die Schlacht um den [359.GetName]"  # Prospekt Mira North
 global_event.8.d:0 "Heute Morgen fiel die [359.GetName] endgültig in die Hände der [Root.GetNameDef]-Streitkräfte. Damit besitzen diese nun eine der wichtigsten Stationen der Koltsevskaya-Linie. Diese einst wohlhabende Station liegt nun in Trümmern und die verbliebenden Wertgegenstände wurden bereits geplündert. Es ist fraglich, ob sie je zu altem Glanz zurückfinden wird."
 global_event.8.a:0 "Zieht euch zurück, wir werden [359.GetName] später zurückerobern."
 global_event.8.b:0 "Wir halten zur Hanse."
 global_event.8.c:0 "Die Hanse wird schon bald fallen."
 global_event.8.e:0 "Wie lange wird sich die Hanse noch halten können?"
 global_event.8.f:0 "Was bedeutet dies für die Metro?"

 global_event.9.t:0 "Invasion des [418.GetName]"
 global_event.9.d:0 "Die [From.From.GetNameDef] rechnete schon lange mit einem Angriff durch seine Nachbarn, doch ihre Befestigungen und Barrikaden liegen nun in Trümmern. nach mehreren vernichtenden Angriffswellen durch die Kräfte des [Root.GetNameDef], gab die Verteidigung letztendlich nach.\n\nDie Kämpfe um die Station sind zu ihrem Ende gekommen, das Reich hält nun die Kontrolle über die verbliebenen Ruinen. Und das Krankenhaus für welches die [418.GetName] einst berühmt war ist völlig verwüstet, die meisten seiner Patienten starben im Kreuzfeuer des Kampfes.\n\nNun da das Reich die Station hält, werden seine Eroberungen wohl kaum abnehmen."
 global_event.9.a:0 "Zurück! Wir müssen unsere Kräfte sammeln!"
 global_event.9.b:0 "Wir müssen ihnen helfen"
 global_event.9.c:0 "Seht wie die [418.GetName] an die [Root.GetNameDef] fällt!"
 global_event.9.e:0 "Die Imkompetenz des [ULI.GetLeader] offenbahrt sich nun, die Tage der Konföderation sind gezählt!"
 global_event.9.f:0 "Was wird aus der Konföderation nur werden?"

 global_event.10.t:0 "Annektion der [312.GetName]"
 global_event.10.d:0 "Heute wurde bekannt gegeben, dass die Station von [312.GetName] in die Hände von [Root.GetNameDef] gefallen ist. Auch wenn der Kampf am Ende aussichtslos erschien, so entschieden sie sich schließlich für einen trotzigen letzten Widerstand gegen die heranstürmenden Horden des Reiches. Enteschlossen, die überlebenden Soldaten zu versammeln und den Ausgangstunnel zu blockieren, der von der[312.GetName] führt. Die Kämpfe hörten erst auf, als der letzte [From.From.GetNameDef] fiel.\n\nEin Großteil der Station liegt jetzt in Trümmern – auseinandergerissen und zerstört von der angreifenden Streitmacht. Schutt liegt auf den Bahnsteigen und verstopft die Gleise. Der erbitterte Kampf hinterließ nichts als Leichen und Ruinen."
 global_event.10.a:0 "Wir müssen druchhalten"
 global_event.10.b:0 "Die Allianz braucht uns"
 global_event.10.c:0 "[312.GetName] gehört nun uns!"
 global_event.10.e:0 "Die Allianz wird sich wohl schon bald auflösen"
 global_event.10.f:0 "Was wird aus der Allianz nun werden?"

 global_event.11.t:0 "[326.GetName] fällt"
 global_event.11.d:0 "Überall auf der Station herrschte Chaos, als die verteidigenden Truppen in zwei Teile geteilt wurde. Als in den Reihen seiner Verteidiger ein Chaos ausbrach, griff [Root.GetNameDef] an. Der Kampf war erbarmungslos, von den baufälligen Gebäuden die einst die Bahnsteige säumten, ist nun nichts mehr erkennbar. Jetzt sind noch brennende Schornsteine und Leichen- und Trümmerhaufen übrig. Viele von [SAV.GetName] stellen nach der Einnahme von [326.GetName] nun die Kompetenz der Regierung infrage."
 global_event.11.a:0 "[326.GetName] ist gefallen, doch unser Kampfgeist steht"
 global_event.11.b:0 "Wir müssen ihnen helfen die Station zurückzuerobern"
 global_event.11.c:0 "[SAV.GetLeader] weiß dass es vorbei ist"
 global_event.11.e:0 "Die Allianz, unter unseren Stiefeln zerquetscht"
 global_event.11.f:0 "Was bedeutet dies für die nördliche Metro?"

 global_event.12.t:0 "Säuberung der [303.GetName]"
 global_event.12.d:0 "Trotz heftigen Widerstands gelang es [Root.GetNameDef], in die [303.GetName] vorzudringen. Zu ihrem Entsetzen wurden die Soldaten von [Root.GetNameDef] mit widerlichen Bildern von Hinrichtungen und Obzönitäten an den Tunnelwänden begrüßt. Die wahnsinnigen Schreie vieler ihrer Opfer dringen immer noch durch die Wände der Station, selbst nachdem [From.From.GetNameDef] in die Dunkelheit zurückgedrängt wurde.\n\n[Root.GetNameDef] hat beschlossen keine Gefangenen zu machen, selbst diejenigen der [From.From.GetNameDef], die ihre Kapitulation angeboten haben, wurden ohne Verhandlungen einfach abgeschlachtet. Durch die heftigen Kämpfe wurde die Station zwar von ihren grafischen Darstellungen befreit, doch nun beginnt der mühsame Prozess des Wiederaufbaus. Und so sehr die Fliesen und Wände von [368.GetName] auch geschrubbt werden, die Station wird die Schreie und grausamen Szenen die sie erlebt hat nie vergessen."
 global_event.12.a:0 "Die Armeen des Satans werden durchhalten."
 global_event.12.b:0 "Vielleicht ist dieser Satan doch kein so guter Typ."
 global_event.12.c:0 "Monstern zu vergeben ist die Aufgabe des Herrn, ich bringe sie zu ihm"
 global_event.12.e:0 "Der Herr vergibt, ich jedoch nicht."
 global_event.12.f:0 "SATANISCHE SCHWARZE MAGIE!"

 global_event.13.t:0 "Säuberung des [334.GetName]"
 global_event.13.d:0 "[Root.GetNameDef] metzelte sich heute morgen durch dutzende Kannibalen um den [334.GetName] einzunehmen. Offenbar war dieser von hunderten mutierter Kannibalen bevölkert, die mit Äxten und Blasrohren bewaffnet, verbissen um jeden Zentimeter ihrer Heimat kämpften. Die Kugeln der [Root.GetNameDef] streckten sie jedoch alle nieder. Als ihre Niederlage offensichtlich wurde, flohen viele dieser gestörten Wesen in die zahlreichen Tunnel der tieferen Metro.\n\nNun beginnt der Säuberungsprozess der Station, auch wenn einige empfehlen den Park einfach zum einsturz zu bringen."
 global_event.13.a:0 "Rückzug in die Tiefe, der Wurm wird uns schützen!"
 global_event.13.b:0 "Die Ungläubigen müssen getötet, die Gefallenen gerächt werden!"
 global_event.13.c:0 "Vernichtet diesen Abschaum, rottet die Kannibalen aus!"
 global_event.13.e:0 "Ich liebe den Gerusch von verbranntem Fleisch am Morgen"
 global_event.13.f:0 "Unsere Kinder werden nun wieder ruhig schlafen können"

 global_event.14.t:0 "Einnahme der [377.GetName]"
 global_event.14.d:0 "Es sind Berichte eingegangen, wonach [Root.GetNameDef]-Soldaten erfolgreich in die [377.GetName] vorgedrungen sind. Die letzten Trupps mutierter Verteidiger zogen sich in die dunklen Tiefen der Metrotunnel zurück. Der Hauptbahnsteig und die Boulevards des Bahnhofs lagen nun im völligen Verfall. [Root.GetNameDef] hat bereits mit der Beseitigung der Trümmer begonnen um Platz für potenzielle Kolonisten zur Station zu schaffen. Aber bleibt aber ungewiss ob die Station bewohnbar ist, wenn man ihre unmittelbare Nähe und geringe Tiefe zur bestrahlten Oberfläche bedenkt."
 global_event.14.a:0 "Ein trauriger Tag"
 global_event.14.b:0 "Schnell, wir müssen ihnen helfen!"
 global_event.14.c:0 "[377.GetName] gehört uns, ein schwerer Schlag gegen die Mutantenbedrohung!"
 global_event.14.e:0 "Dieser Abschaum bereitet uns nun keine Sorgen mehr"
 global_event.14.f:0 "Menschliche Mutanten sind nach wie vor Mutanten"

 global_event.15.t:0 "Niederlage an der [297.GetName]"
 global_event.15.d:0 "Das Hauptstation der [From.From.GetNameDef] fiel nun in die Hände von [Root.GetNameDef], wie in Berichten beschrieben wird. Der Sitz der einst mächtigen Arbat-Konföderation ist heute kaum mehr als ein Geisterbahnhof. Die wenigen Evakuierten wurden vor den Kämpfen geschützt, doch die meisten Zivilisten blieben zurück. Obwohl [From.From.GetNameDef] sich mit Zähnen und Klauen an jedem Zentimeter des Bodens festklammerte, wurden sie von der überwältigenden Angriffsmacht zurückgedrängt. Die zunehmenden Offensiven von [Root.GetNameDef] ließen den Verteidigern keine andere Wahl, als ihre Streitkräfte von der Station abzuziehen."
 global_event.15.a:0 "Wir werden unsere Station zurückerobern"
 global_event.15.b:0 "Neu sammeln und Gegenangriff starten"
 global_event.15.c:0 "[297.GetName] ist gefallen! Nun gehört sie uns!"
 global_event.15.e:0 "Arbat ist gefallen"
 global_event.15.f:0 "Einst eine Großmacht, nun ein Relikt"

 global_event.16.t:0 "Der Fall der [336.GetName]"
 global_event.16.d:0 "Auf der Station von [336.GetName] ist es endlich still geworden. [From.From.GetNameDef]-Soldaten waren trotz ihrer tapferen Versuche die Invasionstruppe aufzuhalten, letztendlich gezwungen sich zu ergeben. Als Barrikaden und provisorische Stellungen die Bahnsteige übersäten, wurde jede von ihnen durch die [Root.GetNameDef]-Kräfte in Stücke gerissen. Allerdings ist die Zahl der Opfer noch nicht vollständig bekannt, denn auf beiden Seiten liegen immer noch unzählige Leichen auf der Station. An abgelegenen Orten auf der anderen Seite des Bahnhofs kommt es noch immer zu sporadischen Schießereien, da es dort noch einige Verweigerer gibt. Jeder von ihnen wird stumm , einer nach dem anderen."
 global_event.16.a:0 "Wir werden siegen"
 global_event.16.b:0 "Die [336.GetName] darf nicht fallen."
 global_event.16.c:0 "Gute Arbeit, die [336.GetName] ist unser!"
 global_event.16.e:0 "Ihr Eigentum ist nun unsere Beute!"
 global_event.16.f:0 "Und wo bekommen wir jetzt unseren Tee her? Der von der [PEC.GetName] schmeckt scheiße."

 global_event.17.t:0 "Erstürmung der [273.GetName]"
 global_event.17.d:0 "Die uneinnehmbare südliche Bastion und die Hauptenergiequelle für einen Großteil der südlichen Metro ist nun gefallen. Die mehrschichtigen Verteidigungslinien, die bereits tausende an Mutanten aufgehalten haben, reichten letztendlich nicht aus, um die Flut der [Root.GetNameDef]-Truppen aufzuhalten, denen es gelang, die Verteidigungslinien zu zerschlagen und in die eigentliche Station vorzudringen. Viele der Turbinengeneratoren wurden bei den Kämpfen zerstört – ob sie durch Kugelfeuer oder durch einen vorsätzlichen Sabotageakt der [From.From.GetNameDef]-Kräfte zerstört wurden, bleibt jedoch ungewiss. Die teilweise noch immer wütenden Kämpfe scheinen vergebens zu sein, denn das kostbare Juwel des Südens liegt nun in Trümmern."
 global_event.17.a:0 "[273.GetName] mag fallen, doch wir halten noch stand!"
 global_event.17.b:0 "Wir müssenSevastopol, und zwar bald."
 global_event.17.c:0 "Die Kraft ihrer Turbinen wird unsere Werkstätten antreiben"
 global_event.17.e:0 "Was glaubst du wie viel uns diese kaputten Turbinen bringen werden?"
 global_event.17.f:0 "Wie wird dies die Metro als Ganzes beeinflussen?"

 global_event.18.t: "[Root.GetName] hat kapituliert"
 global_event.18_generic_capitulation: "[From.From.GetLeader] hat verkündet, dass die feige [Root.GetAdjective]-Regierung kapituliert hat. Seit Beginn des Krieges bröckelte der Widerstand bereits, doch nun konnte er dem Druck der [From.From.GetAdjective]-Kräfte nicht länger standhalten. Die Loyalistische [Root.GetAdjective]-Regierung entschied sich zur Flucht aus den eigenen Stationen, da diese bereits begonnen haben, mit dem Feind zu kollaborieren. Ihre Streitkräfte haben nach dieser peinlichen Flucht ihre Waffen niedergelegt und die letzten Verteidigungsstellungen an [From.From.GetNameDef] übergeben.\nAuch wenn hier und da noch vereinzelte Kämpfe stattfinden, so ist dies doch ein bedeutender Sieg für die Kräfte von [From.From.GetNameDef]."
 global_event.18_mutant_capitulation: "Berichte bestätigen nun, dass die [From.From.GetNameDeF] siegreich war, in ihrem Kampf zur Ausrottung der [ROOT.GetAdjective] an der [ROOT.Capital.GetName]. Der größte Teil der Station ist bereits gesäubert, womit die Grundlage für eine menschliche Neubesiedelung gelegt ist."
 global_event.18_bandit_capitulation: "Wir haben Informationen darüber erhalten, dass [From.From.GetNameDef] offenbar den kriminellen Abschaum [Root.GetAdjective] beseitigt haben. Unzweifelhaft werden Teile ihrer Organisation weiterhin aus dem Verborgenen heraus arbeiten, doch sie werden nie mehr ihre alte Stärke erreichen."
 global_event.18_savage_capitulation: "TBD"
 global_event.18_RED_capitulation: "TBD"
 global_event.18_HNZ_capitulation: "TBD"
 global_event.18_PLS_capitulation: "TBD"
 global_event.18_RCH_capitulation: "TBD"
 global_event.18.a: "Gute Nachrichten!"
 global_event.18.b: "Dies sind dunkle Zeiten."
 global_event.18.c: "Die Zukunft der Metro bleibt ungewiss"

 global_event.31.t: "Die Entdeckung der METRO-2"
 global_event.31.d: "In weiten Teilen der zivilisierten Metro kursieren Berichte, wonach die Entdeckung von METRO-2 ans Licht gekommen sei. [ROOT.GetName] Stalker sind angeblich in das Untergrundsystem eingedrungen und erkunden es nun.\n\nEs bleibt abzuwarten, inwieweit die alten Gerüchte noch wahr sind, aber der Fakt bleibt bestehen: METRO-2 existiert."
 global_event.31.a: "Eine ganz neue Metro, unter unseren Füßen??"

 global_event.33.t: "[Root.GetName] entdeckt D6"
 global_event.33.d: "Im Laufe der letzten Stunden kursierten Meldungen, dass [Root.GetName]-Truppen den Moskauer Militärbunkerkomplex, umgangssprachlich auch [106.GetName] genannt, erfolgreich entdeckt und die Kontrolle über ihn übernommen haben. Obwohl sie diese Gerüchte schnell zurückwiesen, weil sie befürchteten ein diplomatisches Debakel über die sagenumwobenen Reichtümer zu provozieren, können wir mit Sicherheit sagen, dass [Root.GetName] nun D6 kontrolliert. Und seine gewaltigen Reichtümer."
 global_event.33.a: "Die Büchse der Pandora wurde geöffnet"

 global_event.40.t: "Verkündung der slawischen Einigkeit"
 global_event.40.d: "Nach Monaten systematischer Säuberungen im abgeschotteten Twerskaja-Dreieck strebt das Reich nun eine Expansion nach außen an. Ihr Führer verkündet, dass alle rein slawischen Völker unterhalb des Reichsgebiets leben und arbeiten sollten. In ihren Augen wird nichts als die vollständige Unterwerfung der Metro genügen, wenn sie versuchen, die Metro zu militarisieren und nach außen zu verzweigen. Benachbarte unabhängige Stationen sehen bereits mit gezogener Waffe zu und verstärken als Reaktion ihre Verteidigungsanlagen und Rekrutierungsrunden."
 global_event.40.a: "Eine neue Macht erhebt sich!"
 global_event.40.b: "Für eine reine und sichere Metro!"
 global_event.40.c: "Die die sich nicht an Geschichte erinnern können..."
 global_event.40.e: "Tod den Faschisten!"
 global_event.40.f: "Als ob Mutanten nicht schon genug wären"

 global_event.51.t: "Gründung des VDNKh-Stationenbundes"
 global_event.51.d: ""
 global_event.51.a: ""

 # - # TO DO - Custom Localisation Event description for Each Ideology. # - #

 global_event.54.t: "[SSK.GetName] unterwirft sich der [RED.GetName]"
 global_event.54.d: "Berichten zufolge hat [SSK.GetName] nach einer Reihe von Verhandlungen beschlossen, sich friedlich in den Einflussbereich von [RED.GetName] zu integrieren. Die beiden Politikbereiche haben beschlossen, einen Pakt der gegenseitigen, vorteilhaften Zusammenarbeit und Unterstützung zu schließen. Die Stationsverwaltung behält ihre Aufgaben, operiert jedoch unter der Roten Gerichtsbarkeit. Die Streitkräfte von [SSK.GetName] werden vorerst weiterhin in der gesamten Station operieren, da [RED.GetName] zweifellos versuchen wird, die Ziele der Station näher an den Grundprinzipien des Kommunismus auszurichten."
 global_event.54.a: "Das ist nur der Anfang einer großartigen Freundschaft"
 global_event.54.b: "Annäherung an die Rote Linie bringt nichts als Vorteile"
 global_event.54.c: "Wenn sie ihr Bett gemacht haben, können sie darin sehr gut verhungern."
 global_event.54.e: "Der degenerierte Einfluss der Bolschewisten breitet sich aus"
 global_event.54.f: "Jene, die Freiheit für Sicherheit opfern, verdienen weder noch"

 global_event.60.t:0 "[Root.GetNameDef] kündigt den Vertrag"
 global_event.60.d:0 "Ob durch eine kühne Auflehnung gegen die sogenannten Machthaber oder aus schändlicheren Gründen, die [Root.GetNameDef] hat den Flammenwerfer-Beschränkungsvertrag aufgegeben. Nur die Zeit wird zeigen, ob [Root.GetNameDef] den Einsatz von Flammenwerfern im bewaffneten Kampf anstrebt oder nicht."
 global_event.60.a:0 "Das verheißt nichts Gutes"

 global_event.61.t:0 "[Root.GetNameDef] bricht den Vertrag"
 global_event.61.d:0 "Ab heute hat [Root.GetNameDef] gegen die Waffenbeschränkungen verstoßen, die am Ende des ersten Metrokrieges unterzeichnet wurden. Die Zeit wird zeigen, ob das Arsenal des Todes und der Zerstörung eine Rückkehr erlebt oder nicht. Obwohl es fast sicher ist, dass dies der Fall ist."
 global_event.61.a:0 "Das verheißt nichts Gutes"

 global_event.62.t:0 "[prev.GetNameDef] versucht, den Vertrag aufzugeben"
 global_event.62.d:0 "Heute früh haben wir die Nachricht erhalten, dass [Root.GetNameDef] den Restriktionsvertrag aufgeben will. [Root.GetLeader] hat zitiert, dass der vereinbarte Vertrag kaum mehr als ein Instrument der Hanse sei, um jegliche Verteidigungsfähigkeiten ihrer Stationsgemeinschaft zu unterdrücken."
 global_event.62.a:0 "So leicht kommen sie uns nicht davon"
 global_event.62.b:0 "Lasst sie, sie spielen ohnehin keine Rolle"

 global_event.63.t:0 "Die Hanse greift ein"
 global_event.63.d:0 "Die Hanse wurde schnell benachrichtigt und hat eine Missbilligungserklärung über unsere jüngsten Versuche abgegeben, den Vertrag zu missachten. Typischerweise ambivalent oder in seltenen Fällen unwissend gegenüber kleinlichen Vorgängen in der Metro, wird die Hanse versuchen, ihr schieres politisches und wirtschaftliches Gewicht zu nutzen, damit wir unsere jüngste Entscheidung 'überdenken'."
 global_event.63.a:0 "Vielleicht sollten wir die Hanse nicht verärgern"
 global_event.63.b:0 "Die Hanse hat ihre Stationen und wir haben unsere!"
 global_event.63.a_tt:0 "Wenn wir nachgeben, können wir für eine gewisse Zeit nicht gegen den Vertrag verstoßen."
 global_event.63.b_tt:0 "Die §Y@HNZHanse Handelsliga§! zu provoieren könnte §riskant§! sein."

 global_event.64.t:0 "[FROM.GetNameDef] gehorcht"
 global_event.64.d:0 "Es scheint, dass [FROM.GetNameDef] von der Aufgabe des Vertrags zurückgetreten ist und unseren Forderungen nachgegeben hat. Sie werden sich weiterhin an den Vertrag halten ... zumindest vorerst."
 global_event.64.a:0 "Gut"

 global_event.65.t:0 "[FROM.GetNameDef] verweigert den Gehorsam"
 global_event.65.d:0 "Abgeschreckt durch unseren Einfluss hat sich [FROM.GetNameDef] dennoch geweigert, von dem Bruch des Vertrags zurückzutreten. Unsere Bemühungen waren vergeblich."
 global_event.65.a:0 "Verdammt"

 global_event.66.t:0 "Der Polezhaevsky-Vorfall"
 global_event.66.d:0 "Die Führung von [ULI.GetNameDef] hat beschlossen, die Tunnel, die nach Polezhaevskaya und weiter nördlich ihres Territoriums führen, zum Einsturz zu bringen, nachdem alle Bürger der Polezhaevskaya plötzlich und auf mysteriöse Weise verschwunden waren.\n\nNach dem Verschwinden zweier Aufklärungseinheiten nördlich der Konföderation wurde eine große Truppe Soldaten versammelt und aus Angst vor einem Mutantenangriff mächtige Verteidigungsanlagen in der Nähe von Polezhaevskaya errichtet. Es wurde berichtet, dass die Verteidigungslinie ohne einen einzigen Schuss durchbrochen wurde und von der Garnison nur frische Blutlachen übrig geblieben waren. Die Führung von 1905 erkannte schließlich, dass es nutzlos war, die nördlichen Bereiche zu verteidigen, und beschloss, die verfluchten Stationen zu evakuieren und von der großen Metro abzuschneiden.\n\nEinige Erklärungen für das seltsame Verschwinden sind Erschütterungen, die durch die Bewegung einer riesigen Kreatur verursacht wurden, die sich ihren Weg durch den Untergrund bahnte und Menschen tötete. Andere Erklärungen beinhalten alles von faschistischen Sklavenüberfällen über Hare Krishnas bis hin zum Verschlucken der Opfer durch einen Zeitsprung, doch nichts von alledem konnte bewiesen werden."
 global_event.66.a:0 "Schlimmeres als Mutanten streift durch diese Tunnels"

 global_event.67.t:0 "Ein Attentat auf den Führer"
 global_event.67.d:0 "Berichte aus dem Vierten Reich deuten darauf hin, dass der Führer des Vierten Reiches erschossen wurde. Das Attentat erfolgte schnell und es gab kaum Widerstand gegen den Attentäter. Nach einem kurzen Kampf zwischen den Soldaten der Metromacht und Kreipps Clique konnte sich letztere durchsetzen und das Reich sichern. Sowohl die SS als auch die Sektenanhänger haben an der Bildung einer Regierung gearbeitet, in deren Mittelpunkt Danila Kreipp steht. \n\nObwohl das Vierte Reich schon immer ein Kollektiv degenerierter Nazi-Drecksäcke war, werden die Gräueltaten und Taten, die zuvor begangen wurden, nicht annähernd an die Dinge heranreichen, die unter Kreipps Regime geschehen werden. Gott schütze die Metro."
 global_event.67.a:0 "Ein Albtraum!"
 global_event.67.b:0 "Wer führt spielt keine Rolle, sie werden so oder so zerquetscht werden!"
 global_event.67.c:0 "Es werden sicherlich viele aus dem Reich fliehen..."
 global_event.67.e:0 "Was zum..."

 global_event.68.t: "Die Gerüchte sind wahr"
 global_event.68.d: "Den unsichtbaren Beobachtern zufolge flohen die ehemaligen Überreste der russischen Regierung in die Metro-2, ein U-Bahn-System unterhalb der Metro. Dort schmieden sie Pläne und lauern in der Dunkelheit, ziehen Fäden und manipulieren die Metro zu ihren unwissenden Zielen.\n\nEs stellte sich heraus, dass diese Gerüchte wahr waren."
 global_event.68.a: "Putin? Hier?!"

 global_event.69.t: "[HNZ.GetName] annektiert die [PVL.GetName]"
 global_event.69.d: "Berichte haben bestätigt, dass [HNZ.GetNameDef] nach Verhandlungen [PVL.GetName] friedlich annektiert und die Stationsbehörde in die Handelsliga integriert hat. Die Integrationsbemühungen werden kurz später an diesem Tag beginnen, wobei die Stationsverwaltung ihre Rollen behält, jedoch unter hanseatischer Gerichtsbarkeit operiert. Die [PVL.GetName]-Streitkräfte werden vorerst weiterhin in der gesamten Station operieren."
 global_event.69.a: "Die Integration wird sich auszahlen"
 global_event.69.b: "Eine Anbindung an die Hanse würde ihnen gut tun"
 global_event.69.c: "Die Hanse ist nicht so gutmütig wie sie vorgibt"
 global_event.69.e: "Der verrottende Arm der Hanse wird länger"
 global_event.69.f: "Jene die die Freiheit für Sicherheit opfern, werden beides verlieren"

 global_event.70.t: "[HNZ.GetName] annektiert die [BRN.GetName]-Station friedlich"
 global_event.70.d: "Berichte haben bestätigt, dass [HNZ.GetNameDef] nach Verhandlungen [PVL.GetName] friedlich annektiert und die Station in die Handelsliga integriert hat. Die Integrationsbemühungen werden kurz später am Tag beginnen, wobei die Stationsverwaltung ihre Aufgaben behält, jedoch unter hanseatischer Gerichtsbarkeit operiert. Die Kräfte von [BRN.GetName] werden vorerst weiterhin in der gesamten Station operieren."
 global_event.70.a: "Die Integration wird sich auszahlen"
 global_event.70.b: "Eine Anbindung an die Hanse würde ihnen gut tun"
 global_event.70.c: "Die Hanse ist nicht so gutmütig wie sie vorgibt"
 global_event.70.e: "Der verrottende Arm der Hanse wird länger"
 global_event.70.f: "Jene die die Freiheit für Sicherheit opfern, werden beides verlieren"

 global_event.71.t: "Zweiter Metro-Krieg zwischen Hanse und Roter Linie"
 global_event.71.d: "Die Beziehungen zwischen [HNZ.GetName] und [RED.GetName] sind nun nach all den Jahren erneut in einen offenen Krieg eskaliert. Die antikommunistische Koalition existiert nicht mehr und auch die Rote Linie hat viel von ihrem früheren Eifer verloren. Dennoch steht der Metro unzweifelhaft ein entsetzliches Blutbad bevor."
 global_event.71.a: "Schwere Zeiten für die Metro"

 global_event.72.t: "Gründung des [FROM.GetNameDef]"
 global_event.72.d: "Durch gemeinsame Anstrengung erhebt sich aus der Station [FROM.capital.GetName] ein neues Gemeinwesen. Derzeit wird eine neue Regierung gebildet, wobei [FROM.GetName] weiterhin seine Position als Oberhaupt des aufstrebenden Staates behält. Es bleibt abzuwarten, welche Auswirkungen eine neue aufstrebende Macht auf die Metro im Großen und Ganzen haben wird."
 global_event.72.a: "Die Geschichte wird sicherlich von jenen geschrieben werden, die schreiben können"

global_event.73.t: "[FROM.GetName] akzeptiert die [HNZ.GetName]-Herrschaft"
 global_event.73.d: "Sei es für das Wirtschaftswachstum oder die militärische Sicherheit, [FROM.GetName] hat der [HNZ.GetAdjective] die defacto Herrschaft über ihr Territorium übertragen. Beide Verwaltungen arbeiten nun eng zusammen, um einen reibungslosen Ablauf des Prozesses zu gewährleisten. Auch wenn [From.GetName] eine eigenständige Einheit bleibt, scheint dies nur noch dem Namen nach der Fall zu sein."
 global_event.73.a: "From.GetName] hat einen Rückzieher gemacht und die [HNZ.GetAdjective] Herrschaft akzeptiert. Was die Leute nicht alles für Sicherheit tun ..."