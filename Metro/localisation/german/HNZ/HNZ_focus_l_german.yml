HNZ_PVL_1: "Unterstützung für die Loch-Station zusichern"
HNZ_PVL_1_desc: "Die Bewohner von Paveletskaya sind verflucht, da ihre Hermetikpforte beschädigt ist und Mutanten ungehindert von der Oberfläche eindringen können. Die Menschen leben unter schlechten Bedingungen und müssen die Station jede Nacht verlassen. Wir könnten Hilfe leisten, Soldaten zur Bewachung entsenden und die Pforte durch unsere Techniker reparieren lassen."

