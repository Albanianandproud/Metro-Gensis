l_german:
  MED_station_of_stalkers: "Station der Stalker"
  MED_station_of_stalkers_desc: "Am hinteren Ende der §YKaluschsko-Rischskaja-Linie§!, sammeln sich Stalker in großer Zahl, angelockt von der verheißungsvollen Aussicht auf Beute und Ruhm. Sie diente als Ausgangspunkt, um die weit im Norden gelegenen Gebiete Moskaus zu erkunden – unberührt und frei von den schmutzigen Händen der Glücksritter. Die gesamte Station wird von Stalkern betrieben und organisiert, die dort ihren täglichen Geschäften nachgehen."
  MED_hates_skaven: "Startrampe in die Serpukhovsko-Timiryazevskaya"
  MED_hates_skaven_desc: "Ein weiterer Grund für die Besiedlung von §YMedvedkovo§! ist, dass sie als Stützpunkt für Vorstöße in die Linie §YSerpuchowsko-Timirjasewskaja§! dient – die seit dem Ratteneinfall an der §YTimirjasewskaja§! vom Rest der Metro abgeschnitten ist. Es kursieren Gerüchte, dass diese Stationen tatsächlich bewohnt seien. Nicht von Menschen oder Ratten, sondern von einer grauenhaften und unheiligen Mutation aus beidem."