 nf_STB.6.a: ""
 nf_STB.7.t: "The Replikated Man"
 nf_STB.7.d: "Dr. Todorovs research has come far since our early days. But we still have one final hurdle to across. Where once his work was confined to operating tables and improvised wooden shacks, now he speaks clearly about 'production'. His notes, hastily compiled and deliberately obscured, detail attempts to recreate his earlier 'success' through methods which seem to defy both reason and decency.\n\nThe Human form - merely a template. Something which can be adjusted, and when necessary.. discarded\n\nBut now his ambitions has outgrown our current capabilities. He has made this abundantly clear. These tunnels, abandoned stations and maintenance rooms, are to his words 'an insult to the scale of what is required'.\n\nDr. Todorov demands a dedicated research complex. Controlled, sterile conditions. Proper equipment. A facility where his work can proceed.. Unhindered.\n\nIn Return..?\n\nAn Army that does not question. Does not Falter. An army which hates."
 nf_STB.7.a: "We shall give him what he needs."

 nf_STB_todorov.1.t: "First Results"
 nf_STB_todorov.1.d: "Dr. Todorov insisted the process was 'delicate', that premature exposure may disturb the subject's conditioning. His reassurances did very little to distil the unease spreading amongst the station. Guards spoke in hished tones. Some requested tunnel duty, and some even simply stopped talking at all\n\nToday He unveiled his work.\n\nWhat stood before us, a simulcram of a man. Given what we could decipher from the outline of a human frame. But horribly.. Mishapen. Reworked. Exaggerated beyond natural limits. Skin stretched and peeled in all the wrong places. Surgical seams as a chaotic network across its body.\n\nYet. It stood to attention.\n\nWhen commanded, it obeyed. No hesitation. Not an ounce of fear. It followed every order with unnatural precision, and a slow, lumbering gait. The Doctor simply smiled, and concluded his experiments were a success."
 nf_STB_todorov.1.a: "If it fights... It Serves."

 nf_STB_supplies.1.t: "Unwilling Recruits"
 nf_STB_supplies.1.d: "More weary bodies join the ranks of our brigade. Outcasts of the Reich, with nowhere else to turn in fear of retribution, these soldiers look even more disorganized and skruffy than even our own. They'll become our rank and file, soon."
 nf_STB_supplies.1.a: "Our Brigade grows."
 nf_STB_supplies.2.t: "Firearms"
 nf_STB_supplies.2.d: "We have made a few major strides in the development of guns. Though they're still modified bastard guns nonetheless. More is always better yes?"
 nf_STB_supplies.2.a: "We can use these."
 nf_STB_supplies.3.t: "Supply Kits"
 nf_STB_supplies.3.d: "Stolen from caravans or hidden stashes, these supplies are now in hour hands. Use it or lose it, as they say..."
 nf_STB_supplies.3.a: "These will come in handy."
 nf_STB_supplies.4.t: "The Heavy guns"
 nf_STB_supplies.4.d: "Old checkpoint barriers and trashed trolleys have been scrapped, and the guns now lay in our hands. With some tinkering and repairs, they'll be a welcomed addition to our arsenal."
 nf_STB_supplies.4.a: "Good."