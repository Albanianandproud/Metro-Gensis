l_german:

 nf_ISL.1.t:0 "Das Islamische Kalifat lädt uns in ihr Bündniss ein"
 nf_ISL.1.d:0 "Wir wurden eingeladen uns der Allianz des Kalifates anzuschließen. Auch wenn wir nicht gerade beste Freunde sind, könnte sich dieses Bündniss für uns als nützlich erweisen."
 nf_ISL.1.a:0 "Gemeinsam sind wir stärker"
 nf_ISL.1.b:0 "Wir kommen allein klar"

 nf_ISL.2.t:0 "Die Skaven nehmen unsere Einladung an"
 nf_ISL.2.d:0 ""
 nf_ISL.2.a:0 "Diese Kooperation wird uns allen helfen!"

 nf_ISL.3.t:0 "Die Skaven lehnen unser Angebot ab"
 nf_ISL.3.d:0 ""
 nf_ISL.3.a:0 "Ohne sie sind wir ohnehin besser dran"

 nf_ISL.4.t:0 "Das Kalifat schlägt ein Skaven-Bündniss vor"
 nf_ISL.4.d:0 "Wir wurden eingeladen uns der Allianz des Kalifates anzuschließen. Auch wenn wir nicht gerade beste Freunde sind, könnte sich dieses Bündniss für uns als nützlich erweisen."
 nf_ISL.4.a:0 "Gemeinsam sind wir stärker"
 nf_ISL.4.b:0 "Wir kommen allein klar"

 nf_ISL.5.t:0 "Die freie Station schließt sich unserem Bündniss an!"
 nf_ISL.5.d:0 ""
 nf_ISL.5.a:0 "Diese Kooperation wird uns allen helfen!"

 nf_ISL.6.t:0 "Die freie Station lehnt ab"
 nf_ISL.6.d:0 ""
 nf_ISL.6.a:0 "Ohne sie sind wir ohnehin besser dran""

 nf_ISL.7.t:0 "Nach dem Vorbild Mohammeds"
 nf_ISL.7.d:0 "Durch seinen Eifer und seine Weisheit erscheint er uns wie ein Gesandter Gottes."
 nf_ISL.7.a:0 "Ein Vorbild für unseren Glauben!"
