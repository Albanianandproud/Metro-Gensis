l_russian:
 nf_GWC.1.t: "Нечто в Ночи"
 nf_GWC.1.d: "В последние дни с нашей станции пропадают люди. Сначала это было незаметно - пропажа вещей и движущиеся тени. Вскоре до нас дошли сообщения о пропавших без вести. Мужчины, женщины и даже дети пропадают из своих палаток. Без каких-либо сообщений где они и тем более без огорчительных сплетен о причинах их исчезновения. Говорят, что по какой-то причине они просто встали и перешли на другую станцию, что сомнительно, учитывая, что они оставили вещи на станции. В то время как другие опасаются, что это проявление призраков и духов умерших. Несмотря на возникшие в последнее время слухи, в Парке Победы есть люди, которые не пропали, а сумели выжить. Превратившись в злых и жестоких существ. И не человек, и не зверь.\n\n Наши люди боятся, что худшее впереди."
 nf_GWC.1.a: "Удвоить количество людей на постах!"

 nf_GWC.3.t: "Цикл Страшного Суда"
 nf_GWC.3.d: "Мы были там, когда мир рухнул. Когда небо сначала растаяло, а потом заволоклось облаками. Мы помним, как кипели реки, как деревья и вся природа превращались в пыль.\n\nМы мало что помним о той жизни, которой когда-то жили. Но то, что мы помним, мы не забываем.\n\nКогда-то мы жили при свете. Наш дом под землей когда-то был богато украшен и почтенен.\n\nКогда-то мы процветали. У нас были женщины, старики и дети. Мы были счастливы. Мы были довольны. Но это вызывало лишь презрение у наших соседей. Мы помним их злобу. Их ненависть. Мы редко стремились забыть времена изобилия, даже когда они пытались обречь нас на проклятие."
 nf_GWC.3.a: "Благодаря свету наши урожаи когда-то были обильными."
 nf_GWC.3.b: "Благодаря пространству наши люди когда-то были счастливы и довольными."

 nf_GWC.4.t: "Обречённый цикл"
 nf_GWC.4.d: "Мы помним все тяготы. Как нас заперли и обрекли на смерть. Несмотря на все наши протесты и мольбы. Казалось, только смерть слышала наши крики.\n\n\nНаши попытки пробиться на поверхность были практически бессмысленны. Со временем наш урожай погиб. Животные стали больными и истощенными. Пожилые люди и дети погибли мучительной смертью. Те, кто мог, ушли на поверхность или спустились еще глубже под землю, чтобы никогда не вернуться.\n\n\nВсё было безнадежно.\n\n\nНаши мольбы о спасении оставались без ответа, даже когда самые сильные, мудрые и умные из нас замолчали навсегда."
 nf_GWC_4.a: "Мы сопротивлялись каждому желанию выжить."
 nf_GWC.4.b: "Мы не смеем говорить о том, что влечёт за собой выживание."

 nf_GWC.5.t: "Цикл Великого Червя"
 nf_GWC.5.d: "Наши мольбы не остались без ответа, и к нам пришло спасение. «Жрец», как мы его называем, и мы, его паства. Наши голодающие люди были накормлены, а наши страхи развеяны. Наши заблуждения изначально обрекли нас на проклятие, но раскаяние позволило нам обрести искупление. Технологии, которые мы изобрели, чтобы бороться с природой, покорить мир и заявить на него свои права, когда он не принадлежал нам, стали нашим приговором и наказанием. Наши грехи были прощены, и блудные сыновья и дочери могут вернуться.\n\nМы забыли свои корни и отвергли так называемые учения Великого Червя, который создал Землю и человечество. \n\nНам обещают господство, конец эпохи людей-машин, тех, кто пытался предрешить нашу судьбу. Тех, кто отверг учение Великого Червя со своими технологиями и оружием. Тех, кто обрек нас на смерть! Мы должны чтить природу и жить в мире с ней, а также следовать заветам создателя, который обещает однажды вернуться."
 nf_GWC.5.a: "Великий Червь создает землю. Он создает мир, он создает человека."

 nf_GWC.5a.t: "Мерзкие распутники"
 nf_GWC.5a.d: "Мы должны быть начеку, как и говорит нам Жрец.\n\n\nТе, кто отвергает истину и отказывается от даров Великого Червя в виде машин и оружия, чтобы подчинить мир своим целям, — презренные злодеи, и их нужно наказать. Более того, нужно наказать этих злобных «людей-машин». \n\n\nСам Великий Червь желает, чтобы его любимые сыновья и дочери распространяли его культ за пределы нашей территории. Туннели, проложенные для нас, обагрятся кровью всех, кто отвергает Червя, ибо он — это все.\n\nВеликий Червь — это все. Великий Червь — это Жизнь!"
 nf_GWC.5a.a: "Враги Великого Червя, Люди-машины, - это смерть!"

 #nf_GWC.5.t: "Неверные Червя"
 #nf_GWC.5.d: "Теперь, когда появились сообщения о том, что язычники поселились неподалеку от наших владений, на близлежащих станциях Молодежная и Строгино. Это побудило Жреца издать указ о том, что наши усилия должны не ослабевать, а возрастать. Больше мяса в наших закромах. Еще больше тел, подтверждающих слова Червя."
 #nf_GWC.5.a: "Наши культисты будут лакомиться их плотью"
 #nf_GWC.5.b: "Наши воины будут лакомиться их костным мозгом"

 nf_GWC.6.t: "Воин"
 nf_GWC.6.d: "Хотя сам Пророк прибегает к пацифистским средствам, он понимает, что гуманитарное невежество слишком велико. Он хочет, чтобы все услышали, но знает, что этого никогда не будет. Технологии ведут к кровопролитию, но мы отвечаем им тем же. Один из его учеников умеет больше, чем кто-либо. Прозванный «Воином» возвышается над остальными. Язычники, которые вступают в наши владения, желая причинить вред, он убивает их в одиночку. Подходящая фигура, чтобы возглавить Слово Червя."
 nf_GWC.6.a: "Знания Воина о туннелях невероятны."
 nf_GWC.6.b: "Знания Воина о ведения войны невообразимы."

 nf_GWC.7.t: "Взлом Двери"
 nf_GWC.7.d: "Нам удалось найти проход по ту сторону металлической двери. Небольшое вентиляционное отверстие высоко на стене огибало периметр площадки. Звуки, доносившиеся из-за двери, оказались человеческими. Депо использовалось как импровизированный штаб для группы сталкеров, которые использовали это место как убежище для рейдов на поверхность. Сталкеры совершали вылазки туда и обратно, используя само место в качестве своего рода штаб-квартиры. Нашим разведчикам удалось открыть дверь. У их автоматов Калашникова не было шансов против нашего упорства."
 nf_GWC.7.a: "Мясо снова в меню, парни."

 nf_GWC.8.t: "За победителей..."
 nf_GWC.8.d: "Мы захватили много новых станций под именем Великого Червя, и хотя жители этих станций находятся под нашим контролем, они ничего не знают о его имени. Несмотря на то, что они порабощены и закованы в кандалы, чтобы выполнять наши приказы, они продолжают отрицать правду. Как нам следует поступить с ними?"
 nf_GWC.8.a: "Применяйте более решительный подход."
 nf_GWC.8.b: "Если наши гипнотизеры не смогут их сломить, это сделает кнут."

 nf_GWC.9.t: "Кто станет жертвой?"
 nf_GWC.9.d: "Мясо - это один из самых ценных ресурсов, которые есть в нашем распоряжении."
 nf_GWC.9.a: "Зачем выбрасывать хорошее мясо?"
 nf_GWC.9.b: "Посадите их в тюрьму, чтобы потом съесть."
 
 nf_GWC.10.t: "Болезнь"
 nf_GWC.10.d: "Ситуация ухудшается с каждой неделей. Радиация, просачивающаяся с поверхности, в сочетании с плохими запасами воды привела к атрофии наших последователей. Резкий рост заболеваемости и смертности среди населения Парка Победы уже достиг своего апогея и в последующие месяцы начал медленно снижаться. Те, кому удалось пережить смерть, болезненны, бледны и измождены. Почти все, за исключением самого священника, пострадали."
 nf_GWC.10.a: "Мы должны иметь веру."
 
 nf_GWC.11.t: "Адаптация"
 nf_GWC.11.d: "После нескольких месяцев скудного питания и водоснабжения, а также постоянного воздействия радиации, жители Парка Победы начали проявлять признаки странной адаптации. Они стали болезненными и медленно худеющими, но, что примечательно, больше не умирают от радиации или голода. Это явление было истолковано многими как знак от высшей силы, от самого червя. Священник утверждает, что жители Победы показали себя червю и получили от него дары."
 nf_GWC.11.a: "Несомненно, это дар от самого Червя!"

 nf_GWC.30.t: "Столкновение в ночи"
 nf_GWC.30.d: "За последние несколько дней с нашего участка стали пропадать граждане. Сначала это было незаметно: пропавшие предметы и движения в тени. Вскоре до нашего сведения стали доходить сообщения о пропавших людях. Мужчины, женщины и даже маленькие дети покинули свои жилища-палатки. И никаких сообщений об их местонахождении и ещё более тревожных слухов о причинах их исчезновения. По какой-то причине они просто встали и перешли на другую станцию, что сомнительно, учитывая, что они оставили свои записи на станции. в то время как другие опасаются, что это проявление призраков и духов умерших, которые восстают, чтобы вернуть погрязшие в грехах души человечества. Хотя в последнее время ходят слухи о людях из Парка Победы, которые не умерли, а сумели выжить. Превращаясь в злобных и жестоких чудовищ. Больше не человек и не зверь.\n\nНаши народы боятся, что худшее ещё впереди."
 nf_GWC.30.a: "О нет."

 nf_GWC.31.t: "Украденные ресурсы"
 nf_GWC.31.d: "На нашей станции пропало больше ресурсов. Целые склады оказались без ресурсов, которые были размещены всего несколько часов назад. Не похоже, что это дело рук бандитов, поскольку большинство головорезов заботятся только о том, как бы поскорее скрыться с ценностями. Быстрые сообщения и общее ухудшение ситуации наводят на мысль, что виновником является кто-то другой. Руководство нашей станции редко стремилось обнародовать что-либо, чтобы не вызвать панику среди нашего сообщества."
 nf_GWC.31.a: "Проклятье."

 nf_GWC.32.t: "Саботаж"
 nf_GWC.32.d: "Большая часть нашей основной инфраструктуры и объектов была выведена из строя невидимым субъектом. Нам потребуется время, чтобы устранить повреждения."
 nf_GWC.32.a: "Черт."

 nf_GWC.33.t: "Напуганные торговцы"
 nf_GWC.33.d: "Попали в засаду в самых тёмных закоулках туннелей или на перекрестках, где движение наиболее тихое. Торговцы неохотно заходят на нашу станцию, опасаясь нападения этих так называемых невидимых людей. Некоторые даже клянутся, что предпочли бы добираться между Севастополем и Ганзой по Серпуховско-Тимирязевской, чем терпеть протяженность железнодорожных путей между нашими территориями."
 nf_GWC.33.a: "Это нехорошо."

 nf_GWC.40.t: "Глаза в глубине"
 nf_GWC.40.d: "За последние несколько дней с нашего участка стали пропадать граждане. Сначала это было незаметно: пропавшие предметы и движения в тени. Вскоре до нашего сведения стали доходить сообщения о пропавших людях. Мужчины, женщины и даже маленькие дети покинули свои жилища-палатки. И никаких сообщений об их местонахождении и ещё более тревожных слухов о причинах их исчезновения. По какой-то причине они просто встали и перешли на другую станцию, что сомнительно, учитывая, что они оставили свои записи на станции. в то время как другие опасаются, что это проявление призраков и духов умерших, которые восстают, чтобы вернуть погрязшие в грехах души человечества. Хотя в последнее время ходят слухи о людях из Парка Победы, которые не умерли, а сумели выжить. Превращаясь в злобных и жестоких чудовищ. Больше не человек и не зверь.\n\nНаши народы опасаются, что худшее ещё впереди."
 nf_GWC.40.a: "О нет."

 nf_GWC.41.t: "Пропавшие дети"
 nf_GWC.41.d: "Худшее, как мы думали, было ещё впереди, и вот оно наступило. Детей, даже тех, кто едва может ходить, похищают в темноте! Их матери по праву огорчены. В связи с разразившимся столпотворением многие состоятельные граждане стремятся уехать, опасаясь похищения своих собственных детей. Мы заверили матерей, что будем искать и найдем их пропавших детей, но без каких-либо ощутимых зацепок, похоже, это будет сложно."
 nf_GWC.41.a: "Это нехорошо."

 nf_GWC.42.t: "Наше население напугано"
 nf_GWC.42.d: "Наше население получает все больше сообщений об активности, и на этот раз мы не можем просто замять это или спровоцировать массовую истерию. Наше население клянется, что краем глаза видит движущиеся фигуры среди теней и боится спать по ночам, опасаясь, что их похитят. На страже выставлены дополнительные часовые, но это мало чем успокоит наших людей."
 nf_GWC.42.a: "Проклятье."

 nf_GWC.43.t: "Ресурсы украдены"
 nf_GWC.43.d: "Ценные ресурсы были украдены прямо у нас из-под носа! Из-за нехватки этих ресурсов у наших специалистов возникнут проблемы с производством оборудования и выполнением наших квот на неделю."
 nf_GWC.43.a: "Черт возьми."

 nf_GWC.50.t: "Уборка парка Победы"
 nf_GWC.50.d: "Мерзких каннибалов из Парка Победы больше нет! Хотя некоторым удалось проникнуть глубже в темноту, многие лежали убитыми у наших ног. Теперь, когда их так называемый лидер мертв, а многие из его окружения также уничтожены, кажется очевидным, что у Культа Червя нет никаких шансов когда-либо восстановить силу, достаточную для того, чтобы снова наводить страх.\n\n Многие пленники были освобождены от оков, и, хотя они редко желают делиться своим ужасающим опытом они выстояли, приветствовали наши войска как героев. Мужчины, женщины и дети восхваляют название нашей станции. Несомненно, об этом событии разнесется слух, что стало бы многообещающим способом продемонстрировать нашу силу и могущество."

 nf_GWC_raid.1.t: "Шёпот из темноты"
 nf_GWC_raid.1.d: "Мы годами убеждали людей, что, каким бы мрачным ни стало метро, наша станция останется безопасным местом.\n\nНо после сегодняшних событий я уже не так в этом уверен.\n\nВсё началось с мелочей. Сначала пропал один часовой, которого обвинили в дезертирстве. Потом другой. Исчезла целая семья — просто взяли и ушли посреди ночи, бросив все свои вещи.\n\nМы попытались усилить патрулирование. Удвоили количество дежурных. Но это не помогло.\n\n\nВыжившие, те, кто еще остался, говорят обрывками, их голоса все еще дрожат. Они рассказывают о фигурах, мелькающих в свете фонарей, о фигурах, которые не разговаривают, а только наблюдают. Это не мрачные силуэты, не человеческие силуэты, а нечто совершенно иное.\n\nУтром мы обнаружили на стенах туннеля нацарапанные гротескные символы и неровные линии, которые никто из наших людей не смог опознать.\n\nОни не нападали на нас открыто. В этом не было необходимости. Исчезновения участились. Пропадали дети, рабочие, даже охранники. Всех уводили в темноту без единого звука. Они медленно, но верно настраивают станцию против самих себя. Никто больше не доверяет соседям. В каждой тени таится угроза, и страх распространяется все дальше."
 nf_GWC_raid.1.a: "Мы не можем бороться с тем, чего не видим своими глазами."
 nf_GWC_raid.1.b: "Полностью закройте станцию!"

 nf_GWC_raid.2.t: "Успешный рейд"
 nf_GWC_raid.2.d: "Наш рейд против еретических «людей-машин» увенчался успехом. Благодаря подрывной деятельности и использованию темноты для скрытного продвижения мы вселили страх в самые глубины их развращенных сердец."
 nf_GWC_raid.2.a: "Хороший успех."

 nf_GWC_raid.3.t: "Бойся темноты"
 nf_GWC_raid.3.d: "Жители одной из наших станций постепенно впадают в страх и паранойю! Целые районы станции пустеют, а наши сограждане прячутся на другой стороне. Единственная подсказка о том, что вызывает эти галлюцинации, — символ огромного клыкастого червя, выгравированный на стенах станции..."

 nf_GWC_raid.4.t: "Очертания безумия"
 nf_GWC_raid.4.d: "Сначала мы приняли это за страх. Одинокий гражданский, дрожа, заявил, что видел бледную фигуру, покачивающуюся на краю платформы, освещенной огнями. Худая, изможденная фигура, которая исчезла при приближении.\n\nЗатем поступило ещё одно сообщение, а за ним ещё одно. Все они говорят об одном и том же.\n\nЭти существа - не люди и не звери, они двигаются не так, как обычные существа. Они скрываются за пределами досягаемости света. Некоторые утверждали, что слышали их шепот. Не слова. Что-то более тихое. Гудящее.\n\nНаши охранники, которых сначала отправили на разведку, ничего не нашли. Но даже они не ушли далеко. Наши гражданские лица перестали работать. Целые секции станции простаивают. Никто не хочет выходить на улицу в темноте. Семьи жмутся друг к другу. Дети не отходят далеко от своих палаток. Сон кажется пугающим. Тем не менее, на станционных платформах царит тишина, как будто проклятие проявится, если его нарушить."
 nf_GWC_raid.4.a: "Заставьте их вернуться к работе. Паника никому не поможет."
 nf_GWC_raid.4.b: "Удвойте охрану. Не выключайте свет."

 nf_GWC_raid.5.t: "То, что осталось"
 nf_GWC_raid.5.d: "Мы нашли третий патруль. Недалеко от внешних туннелей, всего в нескольких шагах от последнего освещённого участка. Наша поисковая группа почти прошла мимо них. Сначала мы приняли их за обломки.\n\nЭто было не так.\n\nПатрульные лежали, разбросанные по полу туннеля, тела были скрючены в неестественных позах. Следов борьбы обнаружено не было. Ни гильз, ни отчаянной последней схватки. Только... Развалены. При осмотре их раны рассказали еще более странную историю.\n\nСледы порезов - зазубренные и неровные, как от зазубренных лезвий и оружия с зазубренными наконечниками у доисторических народов. Их тела были проткнуты грубыми стрелами. И даже хуже. Несколько тел были расчленены. Не чисто, не специально... Они были разорваны на части... и ими пировали. Плоть и сухожилия были содраны с их тел.\n\nМутанты этого не делали. Цивилизованный человек тоже не смог бы. На нашей станции царит тихая паника. Охранники крепче сжимают оружие, гражданские забаррикадировали свои участки станции. Те, кто был достаточно обеспечен, начали спасаться бегством. Те, кто остался, ничего не могут поделать, кроме как прислушиваться к шепоту."
 nf_GWC_raid.5.a: "Эти слухи слишком притянуты за уши, чтобы в них можно было поверить"
 nf_GWC_raid.5.b: "О вещах, которые находятся за пределами нашего понимания, мы никогда не узнаем."

 nf_GWC_raid.6.t: "Одни в темноте"
 nf_GWC_raid.6.d: "Мы знали, что туннели всегда были опасны, но не настолько.\n\nОбычный патруль из 6 человек, все хорошо вооруженны, не вернулся с патрулирования. Затем ещё один.\n\nТел найдено не было. Никаких следов перестрелки или крови. Только тишина... И знаки. Грубые символы, выгравированные на стенах туннеля в местах и закоулках, которые, казалось, не поддавались никакой логике. Никто из солдат не мог прийти к единому мнению о том, что они означают, но все настаивали, что видели их раньше. Где-то.\n\nСлухи распространились быстрее, чем наша администрация смогла их пресечь. Мирные жители перешептываются о «Людях-червях», рыскающих по самым глубоким и темным туннелям. Некоторые утверждают, что по ночам слышат звуки в стенах."
 nf_GWC_raid.6.a: "Люди-черви? Что дальше?! Люди-гномы?"
 nf_GWC_raid.6.b: "Есть вещи, которые бросают вызов всем известным рассуждениям, и нам лучше не лгать самим себе."

 nf_GWC.385.t: "Внутренние районы"
 nf_GWC.385.d: "Сильно пострадав от последствий ядерной войны и находясь в непосредственной близости от диких земель Поверхности, Жрец забрал со Славянского Бульвара многих своих самых преданных и сильных последователей. Те, кто остался, были полубезумными, мутировавшими от радиации существами, которые были родом с любой отдаленной окраины. Полная биологическая деградация привела к тому, что обитатели стали мутантами и по интеллекту были не более чем простыми животными. Но, несмотря на это, они по-прежнему обладают феноменальной физической силой, выносливостью и устойчивостью к холоду. Они все еще могут быть полезны этим людям в Стае Червя."
 nf_GWC.385.a: "С их помощью массы людей устремятся к Великому Червю."
