l_german:
 nf_MSU.1.t: "Jenseits der Ödniss"
 nf_MSU.1.d: "Die Isolation vom Rest der Metro hat sich für uns als wahrer Segen erwiesen. Dennoch haben unsere Späher in letzter Zeit vermehrte fremde Aktivitäten an der Oberfläche festgestellt. Auch wenn wir den Kontakt meiden, so könnten sie eines Tages versuchen unseren Stalkern zu folgen. Das dürfen wir nicht zulassen! Der Rektor empfiehlt, dass wir beginnen an einer umfassenden Verteidigung zu arbeiten während wir gleichzeitig unsere Behühungen verstärken, von diesen Barbaren unerkannt zu bleiben."
 nf_MSU.1.a: "Eine gefährliche, aber vielleicht auch notwendige Expedititon?"
 nf_MSU.1.tt: "\n§YDer Rektor§! empfiehlt, dass wir eine Expedition zum Spatzenhügel unternehmen. Sollte die Station noch immer von §YRuinen§! kontrolliert sein, so werden wir die §YEntscheidung§! treffen können, diese Station zu kolonisieren"

 nf_MSU.2.t: "Meldungen von Aktivitäten"
 nf_MSU.2.d: "Wir haben besorgnisserregende Meldungen darüber erhalten, dass kommunistische Späher rund um die Station [288.GetName] gesichtet wurden. Und nicht nur die üblichen Stalker, sondern voll ausgerüstete Aufklärungstruppen! Sollten diese Meldungen stimmen, so versucht die Rote Linie offenbar einen Weg über die Brücke zu finden, vermutlich um einen Angriff vorzubereiten. Wir dürfen das nicht zulassen!"
 nf_MSU.2.a: "Wir müssen uns auf sie vorbereiten"

 nf_MSU.3.t: "Funkstille"
 nf_MSU.3.d: "Die Rote Linie fängt den Funkverkehr mit unseren Stalkern ab. Bis aufs weitere müssen wir die Kommunikation mit ihnen einstellen, bis wir es schaffen unsere Nachrichten besser zu verschlüsseln."
 nf_MSU.3.a: "Diese Mistkerle!"

 nf_MSU.4.t: "Die [RED.GetName] bereitet einen Angriff vor!"
 nf_MSU.4.d: "Den Meldungen unserer Tunnelwachen zufolge steht uns das Schlimmste noch bevor. Die Rote Linie bereitet einen massiven Angriff auf die Spatzenhügel vor. Es wird nicht mehr lange dauern bis sie hier sind!"
 nf_MSU.4.a: "Lasst sie kommen"

 nf_MSU.5.t: "Die Rote Linie hißt die weiße Fahne"
 nf_MSU.5.d: "Nach unserem erfolgreichem Einsatz gegen die Rote Linie ziehen sich die Kommunisten endlich zurück!"
 nf_MSU.5.a: "Ein bedeutendes Ereigniss!!"


 nf.MSU_borderwar.1.t: "Sieg bei [288.GetName]"
 nf.MSU_borderwar.1.d: "Unsere Kräfte waren siegreich bei [288.GetName], wo unsere Kräfte mit denen des Feindes aufeinander stießen. Der Kämpf fand bis in die frühen Morgenstunden statt und obwohl das Schlachtfeld von Leichen und Patronenhüllsen gefüllt ist, konnten wir die Brücke halten. Der Feind wird lange brauchen um sich von dieser Niederlage zu erholen."
 nf.MSU_borderwar.1.a: "Gute Arbeit"

 nf.MSU_borderwar.2.t: "Niederlage bei [288.GetName]"
 nf.MSU_borderwar.2.d: "Trotz unserer Bemühungen wurden wir besiegt. Unsere Truppen wurden von den feindlichen Massen überwältigt und zum Rückzug gezwungen, womit wir [288.GetName] nun aufgeben mussten. Unsere Kräfte werden wohl sobald keinen Gegenangriff starten können, auch wenn sie sich zweifelsohne nach Rache sehnen."
 nf.MSU_borderwar.2.a: "Das lief nicht so gut"

 nf.MSU_borderwar.3.t: "Grenzkonflikt abgebrochen"
 nf.MSU_borderwar.3.d: ""
 nf.MSU_borderwar.3.a: "Oh nein"