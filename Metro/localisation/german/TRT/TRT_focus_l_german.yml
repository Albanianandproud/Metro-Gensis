l_german:

 TRT_big_happenings_in_little_venice:0 "Große Ereignisse im kleinen Venedig"
 TRT_big_happenings_in_little_venice_desc:0 "Venedig liegt auf einer Insel, umgeben von dunklem Wasser,  ein Zufluchtsort für Drecksäcke und für Kriminelle, aber für viele auch ihr Zuhause. Im Gegensatz zu organisierter Kriminalität und Leuten, die einfach nur über die Runden kommen wollen, sind beide Gruppen in einem ewigen Kampf festgefahren. Hier und da kam es zu kleinen Handgreiflichkeiten, aber offene Feindseligkeiten sind noch nicht entfacht."

 TRT_focus_4:0 "Rekrutierung von neuem Blut"
 TRT_focus_4_desc:0 "Venedig benötigt mehr Truppen für den Militärdienst. Ein wenig Druck auf die jungen Menschen, Straftäter und den anderen Abschaum wird dazu beitragen, unsere eigenen Streitkräfte mit den dringend benötigten Kräften zu versorgen, die sie verdienen."

 TRT_focus_3:0 "Der venezianische Kodex"
 TRT_focus_3_desc:0 "Venedig mag ein Zufluchtsort für Kriminelle und anderen von der Gesellschaft verstoßenen Abschaum sein, aber es gibt auch eine gewisse Grenze für diejenigen, die wir für akzeptabel halten, in unserer Gemeinschaft zu leben. Wer würde glauben, dass ein Schwarm Krimineller auch über Moral verfügt?"

 TRT_haven_of_crime:0 "Eine Oase der Kriminalität"
 TRT_haven_of_crime_desc:0 "Es gibt einen Grund, warum Venedig auch als „Banditendreieck“ bezeichnet wird, denn es ist eines der, wenn nicht sogar größten, kriminellen Unterfangen in der gesamten Metro … Sie sind hier genau im Zentrum, umgeben von Möglichkeiten sich schnell ein paar Kugeln zu verdienen."

 TRT_checking_stock:0 "Lagerbestand prüfen"
 TRT_checking_stock_desc:0 ""

 TRT_extortion:0 "Erpressung lokaler Unternehmen"
 TRT_extortion_desc:0 "Tatsächlich sind in Venedig auch kleinere zivile Unternehmen tätig. Die Organizatsiya führt ihre Geschäftstätigkeit parallel zu ihren eher legalen Aktivitäten durch. Stellen wir sicher, dass sie wissen, wer Venedig tatsächlich beherrscht."

