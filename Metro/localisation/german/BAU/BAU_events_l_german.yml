l_german:
 nf_BAU.1.t: "Folgen Sie der gelben Steinstraße"
 nf_BAU.1.d: "Berichten zufolge haben unsere Späher Tunnel in den Sperlingsbergen entdeckt, die direkt in die sagenumwobene Smaragdene Stadt führen. Sie hatten die Universitäts-Stalker auf ihrem Weg zu und von diesen Eingängen beobachtet und nach einem missmutigen ersten Kontakt begannen die beiden Gruppen, sich miteinander vertraut zu machen. Aus dem gedämpften Flüstern der smaragdenen Stalker geht hervor, dass sie glauben, dass der Rest der Metro von Idioten und Barbaren bewohnt sei. Für unser Kollektiv wurde jedoch eine Ausnahme gemacht

."
 nf_BAU.1.a: "Die Verbindung mit der Smaragdenen Stadt wird zweifellos ein Vorteil für uns sein"