l_german:
 infrastructure:0 "Infrastruktur"
 infrastructure_plural:0 "Infrastruktur"
 infrastructure_desc:1 "Ausbau des Staates mit einer Reihe von Verbesserungen, von Beleuchtung bis hin zu gewarteten Schienen. Verbessert die Mobilität unserer Armee sowie die allgemeine Baugeschwindigkeit."
 arms_factory:0 "Waffenkammer"
 arms_factory_plural:0 "Waffenkammern"
 arms_factory_desc:0 "Dieses Gebäude stellt der Station Industrieanlagen für die Produktion neuer militärischer Ausrüstung zur Verfügung. Bei Bedarf kann es auf zivile Produktion umgestellt werden."
 dockyard:0 "Naval Dockyard"
 dockyard_plural:0 "Naval Dockyards"
 dockyard_desc:0 "This building provides the state with industry for building new ships."
 industrial_complex:0 "Werkstatt"
 industrial_complex_plural:0 "Werkstätten"
 industrial_complex_desc:0 "Dieses Gebäude versorgt die Station mit Industrieanlagen zur Herstellung ziviler Güter oder zum Bau neuer Gebäude. Bei Bedarf kann es auf militärische Produktion umgestellt werden."
 air_base:0 "Air Base"
 air_base_plural:0 "Air Bases"
 air_base_desc:0 "This building provides the state with deployment for your air forces."
 naval_base:0 "Naval Base"
 naval_base_plural:0 "Naval Bases"
 naval_base_desc:1 "Extends the range of your fleet and provides repair services for it. Allows overseas supply and export of resources. Higher levels increases the supply throughput."
 coastal_bunker:0 "Coastal Fort"
 coastal_bunker_plural:0 "Coastal Forts"
 coastal_bunker_desc:0 "This building inflicts an attack penalty of $R-15%$! for each fort level on the attacker in naval invasion combat."
