 RED_lobby_the_politburo:0 "Beeinflusst das Politbüro"
 RED_lobby_the_politburo_desc:0 "Das dogamtische und stets unzufriedene Politbüro ist nur schwer zu zähmen. Auch wenn es gut gelaunt ist, so beschwert es sich oft und verfällt in inneren Streit. Seine Mitglieder bei Laune zu halten ist eine schwierige Aufgabe, aber die Macht die in einem bloßen Nicken von ihnen steckt sollte man nie unterschätzen."

 RED_lobby_the_politburo_andrey:0 "Beeinflusst das Politbüro"
 RED_lobby_the_politburo_andrey_desc:0 "Das dogamtische und stets unzufriedene Politbüro ist nur schwer zu zähmen. Auch wenn es gut gelaunt ist, so beschwert es sich oft und verfällt in inneren Streit. Seine Mitglieder bei Laune zu halten ist eine schwierige Aufgabe, aber die Macht die in einem bloßen Nicken von ihnen steckt sollte man nie unterschätzen."

