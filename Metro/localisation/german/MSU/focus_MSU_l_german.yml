l_german:
  MSU_effort_1: "Eine Nation der Wissenschaft...?"
  MSU_effort_1_desc: "Jenseits des eisigen Flusses und des Sperlingshügels liegt die ehemalige Moskauer Staatsuniversität. Weit abseits der restlichen Metro existieren nur fragwürdige Gerüchte über die Überlebenden an diesem Ort. Zuimindest bis jetzt."

  MSU_effort_2: "Eine Brücke am Flusse Moskau"
  MSU_effort_2_desc: "Der einzige garantierte Durchgang zur Moskauer Universität führt über die baufälligen Ruinen des Sperlingshügels, die heute hauptsächlich ein Revier für Mutanten sind – in einem verdrehten Sinne die Wächter der Metro. Allerdings ist ihre Zuverlässigkeit, Eindringlinge der Smaragdenen Stadt auf Abstand zu halten, bestenfalls dürftig ... wenn sie nicht gerade diejenigen sind, die bei uns herumschnüffeln."

  MSU_effort_3: "Wiederbelebte Forschung"
  MSU_effort_3_desc: "Die Apokalypse konnte die Faszination der Menschheit für das Unbekannte nicht schwächen, selbst sie konnte den Fortschritt auch nicht aufhalten. Der Dritte Weltkrieg dient als neuer Spielplatz für wissenschaftliche Experimente und Feldversuche. Tatsächlich kann die Wissenschaft dadurch nicht mehr an Konsequenzen gehindert werden."

  MSU_effort_5: "Aggressive Feldtests"
  MSU_effort_5_desc: "Mit mehreren entscheidenden Fortschritten im Bereich der Widerstandsfähigkeit gegen die schädlichen Auswirkungen der Strahlung. Unsere Spezialeinheiten-Ausrüstung hält mehr schädlicher Strahlung stand als bisher angenommen."

  MSU_effort_6: "Eine neue Richtung im Design"
  MSU_effort_6_desc: "Mehrere Fortschritte bei der Zusammensetzung unserer Spezialeinheiten-Ausrüstung haben zu erheblichen Verbesserungen des Gesamtdesigns geführt. Während sicherlich noch weitere Experimente erforderlich sind, um viele der Mängel in den oben genannten Designs auszubügeln, sind sie in ihrer jetzigen Form mehr oder weniger perfekt in der Lage, in unsere Stalker-Kits integriert zu werden."

  MSU_effort_7: "Elite Stalker"
  MSU_effort_7_desc: "Man würde erwarten, dass Wissenschaftler keine geeigneten Kämpfer darstellen. Obwohl dies sicherlich der Fall ist, machen unsere Stalker dieser Vorstellung einen Strich durch die Rechnung. Während unsere Einsätze an der Oberfläche in erster Linie auf der Erforschung der verschiedenen über Moskau verstreuten Anomalien bestehen, deutet einiges darauf hin, dass wir unsere erfahrenen Stalker rekrutieren könnten."

  MSU_effort_4: "Militärtechnik"
  MSU_effort_4_desc: "In der Zwischenzeit wird es in Ordnung sein, alte Waffen zu bergen, zu reparieren und auseinander zu nehmen, aber irgendwann wird auch diese Menge an Waffen versiegen. Es ist nicht so, als gäbe es eine unerschlossene Goldmine an Waffen an der Nähe. Oder vielleicht ja doch?"

  MSU_effort_8: "Maschinenteile"
  MSU_effort_8_desc: "We may of found one stockpile of guns in pristine condition, but that chance is unlikely to come once again. Fabricating parts doesn't need to be a hassle, with a nation of scientists surely a few brainiacs can figure out a way to make the process less arduous."

  MSU_effort_9: "Kunsthandwerk"
  MSU_effort_9_desc: "We may of found one stockpile of guns in pristine condition, but that chance is unlikely to come once again. We're not cavemen.We have technology, documents, a whole litany of scientific knowledge to back up our technicians."

  MSU_effort_10: "Schienenkanone"
  MSU_effort_10_desc: "Based upon pre-war designs. A novelty to most, and a disregarded piece of tat to anyone of actual concern. Several extensive modifications have been made to streamline energy cost whilst overall improving production."

  MSU_effort_11: "Schlagt zu!"
  MSU_effort_11_desc: "With [288.GetName] Now fully under our control it is time we reveal ourselves to the rest of the Metro. Our scientific reporting have thusly concluded, and deemed the rest of the Metro unfit."