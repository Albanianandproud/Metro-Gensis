l_german:

AVT_permanent_revolution: "Permanente Revolution"
AVT_permanent_revolution_desc: "Ein Grundglaube der Revolutionäre ist der an die Permanente Revolution. Sie streben danach, die Metro von jeglichem tyrannischen Dreck zu befreien. Ob sie Kapitalisten, Kommunisten oder Faschisten sind. Alle Diktaturen müssen untergehen!"

AVT_army_without_a_state: "Eine Armee ohne Staat"
AVT_army_without_a_state_desc: "Die Brigade von Che Guevara hüpft von einer Station zur nächsten und ist ständig auf dem Vormarsch. Der nahezu endlose Guerillakrieg gegen die Faschisten des Vierten Reichs oder die stalinistische Bedrohung durch die Rote Linie lässt nur sehr wenig Zeit, um sich zu verstecken und zu konsolidieren."

AVT_ammo_reserves: "Geplünderte  Munitionsreserven"
AVT_ammo_reserves_desc: "Während unseres 'Abspaltung' von der Roten Linie stahlen unsere Revolutionäre so viel Ausrüstung, wie sie tragen konnten, um sie bei ihrer Revolution zu unterstützen. Geheime Versorgungslager befinden sich überall in der Metro, an abgelegenen und versteckten Orten. Nur die Genossen der Revolution kennen diese Orte."

revolutionaries: "Revolutionäre"
revolutionaries_desc: "Die Revolutionäre oder Trotzkisten sind eine Gruppe von Kommunisten, die an eine permanente Revolution glauben. Dies bedeutet, dass jede Station und jede Gruppe innerhalb der Metro revoltieren und sich gegenseitig unterstützen sollte, um einen globalen Kommunismus zu erschaffen, anders als die stalinistische Sichtweise der Roten Linien über eine kommunistische Nation. Über ihre Organisation ist nach außen wenig bekannt und sie verbergen sich ständig vor der Öffentlichkeit. Obwohl sie ideologisch im Widerspruch zur Roten Linie stehen, sind sie entschlossener, an ihrer Seite einen Guerillakrieg gegen die Faschisten des Vierten Reichs zu führen."

