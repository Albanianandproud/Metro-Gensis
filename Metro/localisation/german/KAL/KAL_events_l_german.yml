l_german:

 nf_KAL.1.t:0 "Die Gulyai-Pole-Republik verleumdet uns"
 nf_KAL.1.d:0 "Die Kalininskaya-Konföderation wird von innen heraus belagert, da bösartige Gerüchte und Unwahrheiten, die von den Anarchisten in der Republik Gulyai-Pole inszeniert wurden, in der Bevölkerung kursieren. Diese heimtückische Flüsterkampagne hat das Vertrauen in die Regierung untergraben und Ängste vor Verrat und Instabilität geschürt. Während sich die Paranoia ausbreitet, müssen die Führer der Konföderation unermüdlich daran arbeiten, den Gerüchten entgegenzuwirken, das Vertrauen der Öffentlichkeit wiederherzustellen und die Solidarität ihres Volkes zu bekräftigen."
 nf_KAL.1.a:0 "Dreckige Anarchisten!"

 nf_KAL.2.t:0 "Unsere Zeitungsinvestion zahlt sich aus"
 nf_KAL.2.d:0 "In einem strategischen Schritt zur Stärkung ihres Einflusses und ihrer wirtschaftlichen Stabilität hat die Kalininskaya-Konföderation die Produktion ihrer Flaggschiffzeitung, des Kalinin Blattes, gesteigert. Dieser Anstieg der Verbreitung stärkt nicht nur die Verbreitung wichtiger Informationen, sondern führt auch zu einer erheblichen Aufstockung der Föderationskasse, was auf einen starken Anstieg der Gewinne und der wirtschaftlichen Vitalität zurückzuführen ist."
 nf_KAL.2.a:0 "Davon werden wir noch Jahre profitieren!"

 nf_KAL.3.t:0 "Außenpolitik"
 nf_KAL.3.d:0 "Die Kalininskaya-Konföderation befindet sich an einem Scheideweg: Während der Druck von außen zunimmt und die internen Debatten intensiver werden, steht die Führung vor einer monumentalen Entscheidung: Soll Kalininskaya seine Türen zur Welt öffnen, neue Allianzen schmieden und sich an einer größeren Politik beteiligen, oder soll sie weiterhin eine Haltung der Isolation einnehmen, sich auf Selbstversorgung konzentrieren und seine Souveränität vor äußeren Einflüssen schützen? Die heute getroffene Entscheidung wird noch in den kommenden Generationen durch die Korridore der Konföderation hallen."
 nf_KAL.3.a:0 "Unsere Zukunft liegt in Zusammenarbeit und Diplomatie"
 nf_KAL.3.b:0 "Unsere Stärke liegt in unseren Grenzen"

 KAL_peace_approach_tt:0 "§1Wir haben beschlossen, Kontakt mit der restlichen Metro aufzunehmen§!"
 KAL_nonpeace_approach_tt:0 "§0Wir haben beschlossen vom Rest der Metro isoliert zu bleiben§!"

 nf_KAL.4.t:0 "Kalininskaya verlangt die Rimskaya"
 nf_KAL.4.d:0 "Die Führung der Pechatniki-Konföderation steht vor einer plötzlichen und unerwarteten Forderung der Kalininskaya-Konföderation: der Übergabe der Kontrolle über die Station Rimskaya. Diese strategische Position, reich an Ressourcen und entscheidend für Pechatnikis Einfluss in der Region, steht nun auf dem Spiel."
 nf_KAL.4.a:0 "Wir müssen diese Forderungen vorerst akzeptieren"
 nf_KAL.4.b:0 "Wir dürfen diesen Forderungen nicht nachgeben!"

 nf_KAL.5.t:0 "Pechatniki tritt die Rimskaya ab"
 nf_KAL.5.d:0 "Wir erhalten die Nachricht, dass die Pechatniki-Konföderation ihren Forderungen nachgegeben und sich bereit erklärt hat, die Kontrolle über die Station Rimskaya zu übertragen. Diese unerwartete Handlung bringt sowohl Chancen als auch Herausforderungen mit sich, da wir nun das neue Territorium integrieren und die diplomatischen Folgen bewältigen müssen."
 nf_KAL.5.a:0 "Richtige Entscheidung"

 nf_KAL.6.t:0 "Pechatniki verweigert uns die Rimskaya"
 nf_KAL.6.d:0 "Die Führung der Konföderation erhält die Nachricht, dass die Pechatniki-Konföderation unsere Forderung nach der Rimskaya-Station abgelehnt hat. Diese trotzige Reaktion zwingt uns dazu, unsere Position zu Rimskaya zu überdenken und über die nächsten Schritte zur Verfolgung unserer Ziele zu entscheiden."
 nf_KAL.6.a:0 "Das werden sie noch bereuen"

 nf_KAL.7.t:0 "Armeereformen zahlt sich aus"
 nf_KAL.7.d:0 "Durch sorgfältige Bemühungen und strategische Investitionen hat die Kalininskaya-Konföderation ihre Streitkräfte erfolgreich modernisiert. Neueste Technologie, fortschrittliche Ausbildungsprogramme und umfassende Strukturreformen haben unsere Armee zu einer beeindruckenden Streitmacht gemacht. Dieser Meilenstein stärkt nicht nur unsere Verteidigungsfähigkeiten, sondern stärkt auch unseren Einfluss und unsere Sicherheit innerhalb der Metro."
 nf_KAL.7.a:0 "Hervorragend!"

 nf_KAL.8.t:0 "Geschichten eines alten Mannes"
 nf_KAL.8.d:0 "In einer schummrigen Ecke des Hauptbahnhofs von Kalininskaya versammelt sich eine Schar Kinder um einen alten Mann mit langem, ungepflegtem Bart und stechenden Augen. Mit einer Stimme, die vor Alter und Überzeugung zittert, erzählt er vom Glanz des Russischen Zarenreiches und behauptet, ein direkter Nachkomme der Romanow-Dynastie zu sein. Seine Geschichten sind voller anschaulicher Beschreibungen großer Paläste, edler Schlachten und der majestätischen Herrschaft seiner angeblichen Vorfahren.\n\n„Aber Vorsicht“, warnt er und seine Stimme senkt sich zu einem verschwörerischen Flüstern, „denn die moderne Technologie ist ein Fluch auf unserem Land. Sie ist ein Werkzeug des Teufels, das uns vom wahren Weg unserer Vorfahren abbringt. Die Maschinen und Geräte vergiften unsere Seelen und verderben unsere Kinder. Wir müssen zu den alten Wegen zurückkehren.“ Die Wege der Zaren, um unseren Ruhm zurückzugewinnen.“\n\nDie Kinder hören mit großen Augen und Faszination zu, fasziniert von seinen Geschichten und der Leidenschaft, mit der er spricht. Für sie ist er eine lebendige Verbindung zu einer vergessenen Vergangenheit, ein Geschichtenerzähler, dessen Worte ein Bild einer längst vergangenen Welt zeichnen. Für ihre Eltern und die Führer der Konföderation ist er jedoch eine besorgniserregende Figur, eine radikale Stimme, deren technikfeindliches und imperialistisches Geschwafel den Samen der Zwietracht und des Rückschritts säen könnte."
 nf_KAL.8.a:0 "Besorgnisserregend"

 nf_KAL.9.t:0 "Belästigung bei der Arbeit"
 nf_KAL.9.d:0 "Im Herzen des Kalininskaya-Werkstattviertels ist die Luft erfüllt von Hämmergeräuschen und dem Surren von Maschinen. An einer stabilen Werkbank montiert ein Handwerker fleißig Teile für ein wichtiges Projekt. Plötzlich wird der Frieden durch die wütenden Rufe des radikalen alten Mannes und seiner kleinen Gruppe von Anhängern zerstört.\n\n„Stoppt diesen Wahnsinn!“ Der alte Mann weint und zeigt mit seinem knorrigen Finger auf den Handwerker. „Diese Maschinen sind der Untergang unserer Gesellschaft! Sie verderben unsere Seelen und vertreiben uns vom wahren Weg unserer Vorfahren!“\n\nDer Handwerker blickt verwirrt und besorgt auf, als die Gruppe ihn umringt. „Ich mache nur meinen Job.“ er protestiert und wischt sich den Schweiß von der Stirn. „Diese Werkzeuge sind für unser Überleben und unseren Fortschritt unerlässlich.“\n\n„Fortschritt?“ Der alte Mann spottet. „Dieser sogenannte Fortschritt ist eine Lüge! Wir müssen zu den alten Gewohnheiten zurückkehren, den Gewohnheiten der Zaren und Romanows. Nur dann können wir unseren wahren Ruhm zurückgewinnen!“\n\nDie Unterstützer johlen und schreien, was eine angespannte und feindselige Atmosphäre schafft. Der Handwerker versucht, sie zu ignorieren und sich auf seine Arbeit zu konzentrieren, doch die Belästigung geht weiter. Arbeiter in der Nähe werfen einen nervösen Blick auf die Szene und sind sich nicht sicher, ob sie eingreifen oder Abstand halten sollen. Der Vorfall unterstreicht die wachsende Spannung zwischen dem Modernisierungsdrang des Bundes und dem leidenschaftlichen Widerstand des radikalen alten Mannes."
 nf_KAL.9.a:0 "Das gerät außer Kontrolle"

 nf_KAL.10.t:0 "Proteste in Perovo"
 nf_KAL.10.d:0 "Die sonst so geordnete Atmosphäre in der Nähe des Verwaltungszentrums wird durch die wütenden Gesänge des radikalen alten Mannes und seiner glühenden Anhänger erschüttert. Sie schwenken provisorische Transparente und rufen Slogans, verurteilen den Einsatz moderner Technologie und fordern eine Rückkehr zu den „reinen“ Methoden ihrer angeblichen Romanov-Vorfahren.\n\n„Nieder mit den Maschinen! Kehrt zu den alten Methoden zurück!“, schreit der alte Mann, seine Stimme ist von glühender Leidenschaft erfüllt, die die Menge in Aufruhr versetzt. Seine Unterstützer teilen seine Gefühle, ihre Stimmen werden mit jeder Minute lauter und aggressiver.\n\nWährend der Protest anschwillt, treffen die Behörden ein, deren Anwesenheit die Ordnung aufrechterhalten und verhindern soll, dass die Situation außer Kontrolle gerät. Sie bilden eine Linie zwischen den Demonstranten und dem Verwaltungszentrum und fordern die Menge auf, sich friedlich zu zerstreuen.\n\nAber der alte Mann lässt sich nicht beirren. „Wir lassen uns nicht zum Schweigen bringen! Das Reich lebt noch immer!“ er schreit und drängt vorwärts. Seine Anhänger folgen seinem Beispiel, die Konfrontation droht jederzeit in Gewalt auszuarten."
 nf_KAL.10.a:0 "Beruft den Rat ein, wir müssen handeln."

 nf_KAL.11.t:0 "Grund zur Sorge"
 nf_KAL.11.d:0 "Der radikale alte Mann, dessen Einfluss von Tag zu Tag zunimmt, steht nun vor einer großen Menge glühender Unterstützer. Seine Augen brennen vor Eifer, als er die Hände hebt und weitreichende Veränderungen im Gefüge der Kalininskaya-Gesellschaft fordert.\n\n„Brüder und Schwestern“, beginnt er und seine Stimme hallt durch die Menge. „Wir stehen am Rande eines neuen Morgens. Der Rat hat uns in die Irre geführt, indem er das Gift der modernen Technologie angenommen und unser wahres Erbe aufgegeben hat. Es ist Zeit für eine Rückkehr zu den heiligen Wegen der Orthodoxie, um unsere Seelen und unser Land zu reinigen.“\n\nDie Menge reagiert mit Jubel, ihr Glaube an die Vision des alten Mannes ist unerschütterlich. Er fährt fort, seine Rhetorik wird immer kühner und gefährlicher. „Wir müssen den korrupten Rat absetzen. Sie sind unwürdig, uns zu führen. Als wahrer Nachkomme der Romanows bin ich der rechtmäßige Erbe dieser Positionen. Unter meiner Herrschaft werden wir den Ruhm des Russischen Reiches wiederherstellen und unser Volk in eine Zukunft führen, die in den Traditionen unserer Vorfahren verwurzelt ist.“\n\n„Nieder mit dem Rat! Es lebe der Zar!“ seine Anhänger singen, ihre Stimmen sind ein ohrenbetäubendes Gebrüll.\n\nDie Führung von Kalininskaya beobachtet mit zunehmender Besorgnis, wie die Aufrufe des alten Mannes zur Revolution durch die Korridore der Macht hallten. Die Konföderation steht am Rande eines internen Konflikts und steht vor der Herausforderung, diesen Aufstand niederzuschlagen, bevor er einen Bürgerkrieg auslösen kann."
 nf_KAL.11.a:0 "Ein Bürgerkrieg ist nun unausweichlich..."

 nf_KAL.12.t:0 "Der letzte Tropfen"
 nf_KAL.12.d:0 "Die Luft an der Kalininskaya ist schwer vom Rauch brennender Gebäude und den Geräuschen der Schlacht erfüllt. Die eifrigen Anhänger des radikalen alten Mannes, vereint unter seinem Banner, haben zu den Waffen gegen den Konföderationsrat gerufen. Die Straßen sind erfüllt vom Lärm des Konflikts, während sich Bruder gegen Bruder in einem brutalen Kampf um die Macht wendet.\n\n„Wir kämpfen für unser Erbe, für die Orthodoxie und für die wahre Blutlinie der Romanows!“ Der alte Mann schreit von seinem provisorischen Kommandoposten aus und versammelt seine Truppen mit dem Versprechen einer Rückkehr in die glorreiche Vergangenheit.\n\nIm Gegensatz zu ihm sind die loyalistischen Kräfte entschlossen, die Stabilität und den Fortschritt der Konföderation zu bewahren. „Wir können nicht zulassen, dass dieser Wahnsinn uns zerstört. Für die Zukunft von Kalininskaya müssen wir standhaft bleiben!“ erklärt einen Ratsvorsitzenden, der Verteidigungsmaßnahmen und Strategien zur Niederschlagung des Aufstands leitet."
 nf_KAL.12.a:0 "Die Konföderation wird standhalten!"
 nf_KAL.12.b:0 "Ruhm und Ehre für das Russische Reich!"

 nf_KAL.13.t:0 "Das Massaker am Ploschad' Il'yicha"
 nf_KAL.13.d:0 "Die einst geschäftige und pulsierende Haupstation Ploschad' Il'yicha ist in den Schatten der Heiligen Hierarchie geraten. Mit rücksichtsloser Effizienz haben der Waffenmeister, der Großinquisitor und der Hohe Minister eine brutale Säuberung inszeniert, um jeden Widerstand gegen ihre Herrschaft zu eliminieren.\n\nAuf dem Hauptplatz wendet sich der Oberste Minister mit kalter und unerschütterlicher Stimme an die ängstliche Bevölkerung. „Diejenigen, die sich dem göttlichen Willen der Sonne widersetzen, diejenigen, die das Licht des Imperiums ablehnen, werden mit den Konsequenzen ihrer Häresie konfrontiert sein. Dies ist der Beginn einer neuen Ära, eine, die von Dunkelheit und Meinungsverschiedenheiten gereinigt wird.“\n\nDer in dunkle Gewänder gehüllte Großinquisitor führt die Säuberung mit gnadenloser Hand an. Personen, die als Verräter oder Ketzer gelten, werden aus ihren Häusern gezerrt, ihre Bitten um Gnade stoßen auf taube Ohren. Öffentliche Hinrichtungen werden zu einem alltäglichen Anblick und dienen als düstere Erinnerung an die absolute Autorität der Heiligen Hierarchie."
 nf_KAL.13.a:0 "Tod allen jenen, die gegen Sol stehen!"

 nf_KAL.14.t:0 "Kalininskaya lädt uns in die USE ein"
 nf_KAL.14.d:0 ""
 nf_KAL.14.a:0 "Wir werden uns ihnen anschließen!"
 nf_KAL.14.b:0 "Das machen wir ganz sicher nicht!"

 nf_KAL.15.t:0 "Ryazan lehnt unsere Einladung ab"
 nf_KAL.15.d:0 ""
 nf_KAL.15.a:0 "Verfluchte Bastarde!"

 nf_KAL.16.t:0 "Die Folgen des Bürgerkriegs"
 nf_KAL.16.d:0 ""
 nf_KAL.16.a:0 "Troshin's Stalkers werden die Macht ergreifen!"
 nf_KAL.16.b:0 "Der Rat der Konföderation bleibt standhaft!"

 KAL_confederation_choice_tt:0 "§4Wir stellen uns auf die Seite der Loyalisten!§!"
 KAL_russian_empire_choice_tt:0 "§8Wir stellen und auf die Seite der Zaristen!§!"
 KAL_army_modernization_tt:0 "§7Nach 2 langen Jahren zeigen unsere Armeereformen endlich Resultate§!"