  _metro_scientist:0 "Wissenschaftler der Polis"
  _metro_scientist_desc:0 "Ein ehemaliger Brahmane aus der Polis. Seine ausgefallenen, aber dennoch zweifelhaften Methoden wissenschaftliche Informationen zu sammeln und umzusetzen, erregten den Zorn vieler seiner ehemaligen Kollegen. Er wandte sich der weiteren Metro zu, um sein Verständnis wissenschaftlicher Erkenntnisse weiter zu vertiefen. Er bevorzugt die Freiheit und das Chaos gegenüber der endlosen Bürokratie der Polis." 
  
  _metro_strings_puller:0 "Fädenzieher"
  _metro_strings_puller_desc:0 "Da er wusste, wie man das politische Geschehen diskret und verdeckt manipuliert, um andere zu kontrollieren und in seine Denkweise einzubinden, fiel es ihm relativ leicht, sich an die innere Politik der Metro anzupassen. Hat keine Angst davor hinterhältige Taktiken anzuwenden, zieht es aber immer vor seine Hände sauber zu halten."
  
  _metro_accountant:0 "Ehemaliger Buchmacher"
  _metro_accountant_desc:0 "Vor der Apokalypse in der Sackgasse eines Bürojobs festgehangen zu haben, würde wahrscheinlich gleichbedeutend sein mit Überlebenschancen von Null in der Metro. Stattdessen stellte er aber fest, dass seine sparsamen und klugen Talente hier sinnvoll genutzt werden konnten: In der Verwaltung und Überwachung der logistischen Aspekte einer postnuklearen Gesellschaft. Allerdings bedeutet seine Arbeit dieses Mal das Überleben der Menschheit und nicht den Profit für ein fragwürdiges Unternehmen."
  _metro_veteran:0 "Veteran im Ruhestand"
 
