l_english:
 STB_focus_1: "The Long March"
 STB_focus_1_desc: "Exiled from the demense of the Reich, Stortebekers motley band had taken temporary refuge on [STB.GetName] station. After days of traveling through interior hallways and maintenance shafts until exhaustion had finally seeped in and forced them to halt."
 STB_focus_2: "Ammunition Conservation"
 STB_focus_2_desc: "What little equipment, and guns our forces could siphon as we were cast away from the Reich had mostly been used to get here. Theres hardly enough ammunition to go around, let alone firearms for every man in the squad.\nA drastic approach is necessary. All, whats left, ammunition is to be conserved for the meanwhile, until our situation improves."
 STB_focus_2a: "Whipped into Order"
 STB_focus_2a_desc: "The transformation of a band of thugs into an organized force, we fear, will take far longer than we initial expect. With supplies and equipment in short supply, additional training is required. Not just for our soldiers, but even to our commanders."
 STB_focus_3: "Temporary Construction"
 STB_focus_3_desc: "[STB.capital.GetName] lies in pretty rough shape. With some proper maintenance, the station might be considered atleast tolerable; far from bearable, but tolerable for now."
 STB_focus_4: "No Stone Unturned"
 STB_focus_4_desc: "We need bullets. Not just to shoot whatever mutant crawls from the dark, but to pay our own soldiers. People are growing restless, and eventually will begin to cut themselves loose if the situation doesn't improve. Scavenging will be our best bet for now."
 STB_focus_5: "Haven of the Damned"
 STB_focus_5_desc: "Criminals, Smugglers, Fugitives - All fill the dingy halls of [STB.capital.GetName]. If the wider world calls us these, and condemn us.. So be it."
 STB_focus_3A: "Medical Triages"
 STB_focus_3A_desc: "A far cry from the clean, sterile bays of the Reich. As long as the bleeding can be stemmed, and infection chances remain low, beggars can't be choosers."
 STB_focus_4A: "Wanderers"
 STB_focus_4A_desc: "We had travelled far to come to [STB.capital.GetName], predominantly across the surface of Moscow. Our experience of navigating the ruins and abandoned streets will aid us well."
 STB_focus_5A: "Promises of Loot"
 STB_focus_5A_desc: "Free from restraints, morals or consideration. Our Forces are free to do what they want with the loot they claim."
 STB_focus_5B: "Ammunition Reloading Benches"
 STB_focus_5B_desc: "Waste is no longer an option we may afford. Spent cartridges are carefully recovered and refilled"
 STB_focus_6: "Excursion Teams"
 STB_focus_6_desc: "Sporting their ragged armor and guns siphoned from the Reich, these soldiers tread the surrounding tunnels, seeking their next victims."
 STB_focus_7A: "Raiding Armories"
 STB_focus_7A_desc: "With ever successful raid brings more equipment and tools in our coffers."
 STB_focus_7B: "Defense Of The Demense"
 STB_focus_7B_desc: "If you build it, they will come."
 STB_focus_8C: "Störtebeker Reborn"
 STB_focus_8C_desc: "The legend of Klaus Störtebeker returns! The legendary pirate king of the Baltic, patron saint of raiders."
 STB_focus_8B: "End War"
 STB_focus_8B_desc: "Nuclear hellfire spelled the end of peace, and the beginning of the end. Victory can only result in peace. A twisted mockery of peace."
 STB_focus_8A: "The Cycle of Brutality"
 STB_focus_8A_desc: "As time has puported immemorial. Hard times breeds strength. Through strength arrives fortune."
 STB_focus_9A: "Break into [SEV.GetName]"
 STB_focus_9A_desc: "Hermetic doors permanently opened to allow the transfer of electricity in the form of cables into the Southern belly of the Ring Line, more than mutants will the forces of Sevastopolskaya have to be on the lookout for."
 STB_focus_9B: "Attack The [AVT.GetName]"
 STB_focus_9B_desc: "The Partisans of [AVT.capital.GetName] have been a relentless thorn in the [STB.GetName]s' side. With recent clashes between our squads culminating in a thirst for revenge, now is a good time to finally get rid of them once and for all."
 STB_focus_9A: "Push into [SEV.GetName]"
 STB_focus_9A_desc: "[SEV.GetName] Remains a vital arterial vessal for much of the Southern Metro, thanks in part to their in-tact hydroelectric power turbines. A suicide move in the past for our motley troops, but now with the strength and manpower, Sevastopol seems like a prime candidate for our expansion..."
 STB_focus_10C: "Cleansing Operations"
 STB_focus_10C_desc: "A new station is added to our growing territory."
 STB_focus_10B: "The Soldatens New Attire"
 STB_focus_10B_desc: "With [SEV.GetName] beneath our thumb, their arsenals and armories are forefit. They will come in handy to outfit our soldiers."
 STB_focus_10A: "Depot Yards"
 STB_focus_10A_desc: "With adequate space and facilities, we can now begin properly investing in repairing draisines for our army."
 STB_focus_10A: "Brutal Restructuring"
 STB_focus_10A_desc: "Conquest is the the."
 STB_focus_11: "Sinister Manufactories"
 STB_focus_11_desc: "Small tool-benches and loading machines will become our armories."
 STB_focus_12A: "Open the Armories"
 STB_focus_12A_desc: "Hidden bunkers and sealed depots still hold the weapons of the old world. Breaking them open may be dangerous, but it will arm our bands."
 STB_focus_12B: "Field Salvaging"
 STB_focus_12B_desc: "The bodies of the deceased, abandoned checkpoints, and forgotten abodes contain mountains of loot waiting to be reclaimed."
 STB_focus_12C: "Scrapyard Smithies"
 STB_focus_12C_desc: "Improvised factories will produce armor, uniforms, and equipment for our growing brigade."
 STB_focus_13A: "Death before Acceptance"
 STB_focus_13A_desc: "Once a mutant, always a mutant"
 STB_focus_13B: "Exeptions to the Mutant"
 STB_focus_13B_desc: "We can't afford to spare the hands, or bullet. Any depraved, wicked enough to join our ranks is one graciously accepted"
 STB_focus_14: "Annex [PVL.GetName]"
 STB_focus_14_desc: "Another threat than rampant mutants will the guards of [PVL.GetName] will have to be vigilant for. [PVL.GetName] is a prime target for our expansion, despite their broken hermetic gate."
 STB_focus_15: "Brutal Heartlands"
 STB_focus_15_desc: "Like a festering tumour, our influence expands and grows."
 STB_internal_focus_1A: "Law of the Strong"
 STB_internal_focus_1A_desc: "No courts, no ethics. In a world lost to itself, might is the only thing which determines who is right."
 STB_internal_focus_1B: "The Wolfpack"
 STB_internal_focus_1B_desc: "Honour does not exist amongst thieves. What binds us together is the thrill and promise of fortune and spoils. From this, unity is forged. Even if shaky."
 STB_internal_focus_2A: "Discipline of Terror"
 STB_internal_focus_2A_desc: "To bandits, mutiny is not a dirty word. Perhaps in some respect it is commonplace. The solution? Make examples."
 STB_internal_focus_2A_tt: "We will recieve additional manpower in approximately 180 days after this national focus is completed"
 STB_internal_focus_2B_tt: "We will recieve additional guns in approximately 180 days after this national focus is completed"
 STB_internal_focus_2C_tt: "We will recieve additional support equipment in approximately 180 days after this national focus is completed"
 STB_internal_focus_2D_tt: "We will recieve additional fireteam weaponry in approximately 180 days after this national focus is completed"
 STB_internal_focus_2B: "Economy of Fear"
 STB_internal_focus_2B_desc: "Everything has its price. However high."
 STB_internal_focus_2C: "The Black Markets"
 STB_internal_focus_2C_desc: "Ideology matters little, whatever colors merchant fleets fly, they're ripe for the plucking."
 STB_internal_focus_2D: "The Buzzsaw"
 STB_internal_focus_2D_desc: "Death has yet to be redefined, but fear has taken on a whole new meaning."
 STB_internal_focus_3: "The Hell of [STB.capital.GetName]"
 STB_internal_focus_3_desc: "Loot is plentiful. We will take what we need, and spare none. War will fund our aims."
 STB_internal_focus_3A: "Lead-Lined Jackets"
 STB_internal_focus_3A_desc: "Radiation is an invisible enemy. Lead-lined jackets offer some protection against the poisoned winds."
 STB_internal_focus_3B: "Salvaged Automatic Weapons"
 STB_internal_focus_3B_desc: "Old, and broken machine guns rusting in away can still roar if properly restored and treated."
 STB_internal_focus_4: "Brotherhood of Damnation"
 STB_internal_focus_4_desc: "Once criminals, now we are survivors free from morals or restraint."
 STB_internal_focus_5: "Salvaged Scrap Plate Armor"
 STB_internal_focus_5_desc: "Old metal plating can be hammered into crude armor. Heavy, ugly but nonetheless effective."
 STB_internal_focus_6A: "Reforged Barrels"
 STB_internal_focus_6A_desc: "Decades of neglect have left most weapons corroded and brittle, and those fabricated by the forgesmiths of Tverskaya are beginning to break. We must learn to revive them."
 STB_internal_focus_6B: "Strip and Rebuild"
 STB_internal_focus_6B_desc: "Three broken, shoddy rifles can often be turned into one working weapon. Not elegant. But it works."
 STB_internal_focus_6C: "Hoist the Black Flag!"
 STB_internal_focus_6C_desc: "Soon, the choking sounds of rollers and engines will become more feared than the whines of hungry mutants."
 STB_internal_focus_6D: "Rifles From the Ruins"
 STB_internal_focus_6D_desc: "Across shattered barriers and abandoned station checkposts lie the rifles of dead garrisons. Rusted, cracked, and forgotten.. But not beyond salvaging."
 STB_internal_focus_7: "Trophy Garments"
 STB_internal_focus_7_desc: "Armor taken from defeated enemies is worn proudly- Proof of our might in a hostile world."
 STB_internal_focus_8: "Volkolak Brigade"
 STB_internal_focus_8_desc: "A new fear lingers in the darkness."
 STB_internal_focus_9: "Discipline by the Rope"
 STB_internal_focus_9_desc: "Mutiny in a dying world only brings death."
 STB_internal_focus_11: "Raiders of the Dead World"
 STB_internal_focus_11_desc: "The old world still exists beneath the ash. Its skeletons hold machines, fuel, and technologies waiting to be reclaimed."
 STB_internal_focus_9A: "Strip - and Rebuild"
 STB_internal_focus_9A_desc: "Gun oil, springs, and makeshift pins keep our weapons barely functional. Sometimes that is enough."
 STB_internal_focus_9B: "Fire Superiority"
 STB_internal_focus_9B_desc: "Against poorly armed survivors, a single machine gun can reign supreme in the enclosed tunnels of the Metro."
 STB_internal_focus_10A: "Stamped Steel Methods"
 STB_internal_focus_10A_desc: "Complex machining is a luxury we can't afford. Stamped metal parts allow us to produce weapons far faster."
 STB_internal_focus_10B: "Simplified Mechanisms"
 STB_internal_focus_10B_desc: "The fewer moving parts a weapon has, the less likely it is to break. The easier it is to build and repair." 
 STB_political_focus_path_1: "The Rattenlinien"
 STB_political_focus_path_1_desc: ""
 STB_political_focus_path_2: "Questionable Ethics"
 STB_political_focus_path_2_desc: "Free from ethical restraints, Dr. Torodov can now conduct his research without concern. Dr. Todorov is willing to help us. The only thing he asks that the only thing we provide him is 'willing' test subjects..."
 STB_political_focus_path_3: "Adrenaline Stimulants"
 STB_political_focus_path_3_desc: ""
 STB_political_focus_path_4: "Performance Enhancer D-X"
 STB_political_focus_path_4_desc: ""
 STB_political_focus_path_5: "Sterility of Science"
 STB_political_focus_path_5_desc: ""
 STB_political_focus_path_6: "Pain Suppresants"
 STB_political_focus_path_6_desc: ""
 STB_political_focus_path_7: "Amphetamine Auto-Injectors"
 STB_political_focus_path_7_desc: ""
 STB_political_focus_path_8: "Projekt Ubermensch"
 STB_political_focus_path_8_desc: "The Perfect soldier, Novo Sapien, is only a step away.. We only need more research."
 STB_political_focus_path_9: "Projekt Supersoldaten"
 STB_political_focus_path_9_desc: ""
 STB_political_focus_path_10: "Projekt Cloning"
 STB_political_focus_path_10_desc: ""