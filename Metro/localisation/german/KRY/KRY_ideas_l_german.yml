 KRY_something_wicked_this_way_comes:0 "Etwas Verstörendes nähert sich..."
 KRY_something_wicked_this_way_comes_desc:0 "Durch unzählige Tunnelabschnitte getrennt, ist die §YKrylatskoye§! ist vom Rest der Metro isoliert; und da ihre Nachbarstationen im Norden abgeschnitten sind, muss die §YKrylatskoye§! auf der Hut bleiben. Es kursieren Geschichten über monströse, halb menschliche, halb mutierte Gestalten, die durch die südlichen Tunnel und die flach liegende Station §YMolodezhnaya§! schleichen. Es genügt zu sagen, dass sich die Station auf das Schlimmste vorbereitet."