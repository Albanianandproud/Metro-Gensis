 ## Tech Tooltips ##

 TOOLTIP_UNIQUE_TECH: "Einzigartige Technologien"
 TOOLTIP_UNIQUE_TECH_DESC: "§YForgotten Schematics§!, §YAntediluvian Knowledge§! or §YCutting-edge Technology§! lost to the passage of time. §YUnique technology§! is §RUNABLE§! to be researched naturally through conventional gameplay. §YUnique techs§! are §Gunlocked§! and are abled to be researched through certain §Gfocuses§! and §Gevents§!.\n\nDer beste Weg einzigartige Technologien freizuschalten ist durch §CStalker-Missionen§!"

 TOOLTIP_CONSTRUCTION_TECH: "Konstruktion"
 TOOLTIP_CONSTRUCTION_TECH_DESC:0 "§YConstructing§!, §YFabricating§! and §YRenovating§! structures to serve purpose and functionality. Researching §GImproves§! our overall §GConstruction§! and §GFactory Repair§! speed."

 TOOLTIP_TOOLING_TECH: "Werkzeuge"
 TOOLTIP_TOOLING_TECH_DESC: "§YSpecialised Equipment§! dedicated to streamlining and boosting §Yproductive processes§!. §GImproving§! our base and potential §YProduction Efficiency§!."

 TOOLTIP_SMITHING_TECH: "Schmieden"
 TOOLTIP_SMITHING_TECH_DESC: "The §YProduction§! of metallic objects and components required by our budding §YWorkshops§!. This ensures our productive §GGrowth§! remains constant."

 TOOLTIP_PUNCH_PRESS_TECH: "Stanzpressen"
 TOOLTIP_PUNCH_PRESS_TECH_DESC: "§YMachines§! dedicated to pressing and forming §GValuable materials§! from sheet metal. Improving our §YPunch Press§! technology overall improves our ability to produce §GEquipment§!, making our §GEquipment§! relatively easier to pump out."

 TOOLTIP_CASTING_TECH: "Metallguss"
 TOOLTIP_CASTING_TECH_DESC: "Whilst §YSmithing§! is the process of working metallic objects. §YMetal Casting§! is the method of forming workable metal from a liquid form. §YImproving§! our overall §YProduction§! capabilities whilst providing our stockpile with much needed §GResources§!."

 TOOLTIP_HYGIENE_TECH: "Hygiene"
 TOOLTIP_HYGIENE_TECH_DESC: "§YMaintaining§! a standard of cleanliness and §CScientific§! strives towards preventing §RDiseases§!.\n\nEverything from §Ywashing hands§! to §YGerm Theory§! this encompasses. As our overall §CHygiene Standards§! §GImprove§!, so will the §YHealth§! of our population and our §CScience Base§!."

 TOOLTIP_REFINERY_TECH: "Synthese"
 TOOLTIP_REFINERY_TECH_DESC: "§YInstallations§! where substances are refined into usable produce. Mainly §YFuel§! and highly-valuable §CChemicals§!"

 TOOLTIP_FARMING_TECH: "Landwirtschaft"
 TOOLTIP_FARMING_TECH_DESC: "§YGrowing§!, §YCultivating§! and maintaining foodstocks and livestock. §GImproving§! our §YAgricultural base§! is a no-brainer."

 TOOLTIP_ELECTRICITY_TECH: "Elektrizität"
 TOOLTIP_ELECTRICITY_TECH_DESC: "§YElectricity§! will be a §Cfuture mechanic§! where §OIndustrialised§! nations can significantly improve their §Yindustrial output§! through the usage of §OElectricity§!. §OElectrification§! would be a mechanic that all nations would seek to strive towards. §OElectricity§! would require §GFuel§! or from certain important §CStates§! which contained §CElectricity Nodes§!.\n\nThe §GBenefits§! of §OElectrification§! is a no brainer, and would be a §RVital§! resource to be maintained."

 TOOLTIP_ENERGY_TECH: "Strom"
 TOOLTIP_ENERGY_TECH_desc: "Was uns von den Tieren und den Mutanten unterscheidet ist, dass wir die Grundmächte des Universums beherrschen können!"

 tech_energy_1: "Handbetriebene Generatoren"
 tech_energy_1_desc: "Besser in 4-Stunden-Schichten kurbeln, als ewig im Dunkeln zu sitzen"

 tech_energy_2: "Verbesserte Speicher"
 tech_energy_2_desc: "Energie produzieren können wir. Nun müssen wir sie aber auch Speichern können"

 tech_energy_3: "Fortschrittliche Generatoren"
 tech_energy_3_desc: "Einfach was Brennbares rein und voila, nie wieder Kurbeln!"

 tech_energy_4: "Windgenerator"
 tech_energy_4_desc: "Die einzige wirklich zuverlässliche Energiequelle, die niemals versiegt"

 TOOLTIP_RECYCLING_TECH: "Recycling"
 TOOLTIP_RECYCLING_TECH_DESC: "Weniger Konsumieren, mehr Wiederverwenden!"

