 TRT_domestics_1_desc:0 ""

 TRT_domestics_2:0 "Brüder im Verbrechen"
 TRT_domestics_2_desc:0 ""

 TRT_defences:0 "Angemessene Verteidigungen"
 TRT_defences_desc:0 "Stacheldraht, Barrikaden und Kontrollpunkte können errichtet werden, um die von Venedig ausgehenden Tunnellinien zu überwachen. Nosalis sind nicht die einzigen schrecklichen Bedrohungen, die tief in den Tunneln der Metro lauern. Gerüchte oder nicht, es ist am besten, nicht darüber zu diskutieren."

 TRT_depot_tsoi:0 "Depotknacken"
 TRT_depot_tsoi_desc:0 "Die Pläne die wir von der Gegend entdeckt haben, zeigen ein Gleis, das von der Hauptstrecke tiefer in die Metro führt. Aufgerüttelt durch lebhafte Behauptungen über Beute und Vermögen planen viele unserer Soldaten, diese Linie zu durchsuchen. Wer weiß, was sie entdecken werden?"

 TRT_commander_option_1:0 "Loyalität gegenüber dem Rang"
 TRT_commander_option_1_desc:0 ""

 TRT_commander_option_2:0 "Verdienst geht vor Loyalität"
 TRT_commander_option_2_desc:0 ""

 TRT_doctrine_1:0 "Erinnern wir uns an unsere Wurzeln"
 TRT_doctrine_1_desc:0 ""

 TRT_doctrine_2:0 "Die Vergangenheit BLEIBT in der Vergangenheit"
 TRT_doctrine_2_desc:0 ""

 TRT_doctrine_3:0 "New-Age-Verbrecher-Outfit"
 TRT_doctrine_3_desc:0 ""

 TRT_doctrine_4:0 "Mehr als nur Kriminelle"
 TRT_doctrine_4_desc:0 ""

 TRT_city_on_stilts:0 "Die Gemeinschaft auf Stelzen"
 TRT_city_on_stilts_desc:0 "Benannt nach der alten italienischen Stadt Venedig, die zur Zeit der Ritter und Königreiche einst ein mächtiger Stadtstaat war. Kurz nach dem Krieg wurde die Station überschwemmt und auf Stelzen, die über den trüben Tiefen schwebten, wurde eine große Siedlung errichtet. Ein dunkler unterirdischer Zufluchtsort, nicht nur für Banditen oder Diebe, sondern für allerlei eigensinniger Moskauer."

 TRT_house_that_dirt_built:0 "Haus, das Dreck gebaut hat"
 TRT_house_that_dirt_built_desc:0 "Baufällige Fundamente, verrottende Holzrahmen und eine noch heruntergekommenere Planung haben der Stadt ein schäbiges Aussehen verliehen. Wenn wir die halbe Stadt niederreißen würden, würde die andere Hälfte sich auf unsere Verwaltung stürzen. Wir brauchen eine bessere und geeignete Lösung, um die fehlerhafte Infrastruktur zu reparieren. Zum Glück sinken die Wasserstände in den Wintermonaten. Möglicherweise eine Chance, geeignetere Stützrahmen zu etablieren?"

 TRT_floodgate_bulwarks:0 "Schleusenbollwerke"
 TRT_floodgate_bulwarks_desc:0 ""

 TRT_flooding_protection:0 "Hochwasserschutz"
 TRT_flooding_protection_desc:0 "Das größte Problem ist, wohin zum Teufel leiten wir das ganze Wasser? Zum Glück haben vorbeikommende Händler jedoch darauf bestanden, uns ein paar alte Wasserpumpen zu verkaufen. Wo zum Teufel sie sie herhaben, weiß niemand."

 TRT_logistic_canals:0 "Logistikkanäle"
 TRT_logistic_canals_desc:0 "Während die Überschwemmung zahlreiche Probleme mit sich bringt wie Strahlung, Mutanten, das Waschen von Igors Habseligkeiten, bietet es auch große wirtschaftliche Chancen. Wasserflöße und Kanus können problemlos auf dem Wasser hin- und herfahren."

 TRT_increase_minimum_preparedness_10:0 "\nErhöhen Sie unsere §YStartvorbereitung§! durch §R10§!\nUnsere §YMindestvorbereitung§! entspricht: [?TRT_minimum_preparedness|H0].\n\n"

 TRT_shipping_routes:0 "Versandwege"
 TRT_shipping_routes_desc:0 "Mit besseren Flößen müssen mehr Güter transportiert werden. Mehr zu verkaufen bedeutet, dass wir mehr Kugeln in den Schutz unserer Karawanen vor Mutanten investieren müssen. Es ist nicht schwer zu verstehen, Slobodan."

 TRT_modular_districts:0 "Palisaden"
 TRT_modular_districts_desc:0 "Klar, mit Mutanten umzugehen ist mühsam. Auch die Strahlung muss beachtet werden, und die Gefahr von unkontrollierten Wellen oder ungewöhnlichen Tauwettern ist eine ganz andere Sache. Aber das größte Problem? Andere Banditen wollen sich in unsere Operationen einmischen."

 TRT_public_works:0 "Öffentliche Kanäle"
 TRT_public_works_desc:0 "Venedig ist nicht durch wohlhabende Kaufleute, ideologisch fanatische Spinner oder snobistische Weicheier auf der Landkarte entstanden, es wurde von der Gemeinde erbaut. Leute, die nirgendwo anders hingehen konnten. Durch Arbeit und durch jede Menge Blei. Der Durchgang zwischen den Stationen sollte berechtigterweise Eigentum der Gemeinschaft sein."

 TRT_toil_the_toll:0 "Erhebt den Zoll"
 TRT_toil_the_toll_desc:0 "Denken Sie darüber nach: Besteuern Sie Menschen für das Kommen und Gehen. Diese Wasserstraßen sind eine Cash-Cow, die zum Melken bereit ist."

 TRT_venetian_determination:0 "Venezianische Entschlossenheit"
 TRT_venetian_determination_desc:0 "Banditendreieck oder Venedig, was auch immer Ihnen in den Sinn kommt, es ist bekannt, dass die Menschen die dort leben robuster sind und wissen, wie man ein Leben führt."

 TRT_what_lurks_beneath:0 "Was darunter lauert"
 TRT_what_lurks_beneath_desc:0 "Mutierte Garnelen kommen und gehen nach der Auftauzeit. Sie stören das Reisen und ihre Anwesenheit macht die Navigation auf dem Wasser tückisch. Irgendwann werden wir uns mit diesen Schädlingen auseinandersetzen müssen. Wir können ihre überschüssige Zahl nur so lange ausmerzen, bis uns der Treibstoff oder der Sprengstoff ausgeht. Wir müssen den Kern des Problems angehen und ihre Nester vernichten."

 TRT_depth_charges:0 "Wasserbomben"
 TRT_depth_charges_desc:0 "Igor, unser Vorratsquartiermeister und Teilzeit-Barfly, hat eine ideale Lösung gefunden. Behelfsmäßige Wasserbomben. Sicherlich ist es nichts, was etwas Größeres als ein Ruderboot versenken könnte. Aber Mutanten? Es wird sie in zwei Teile reißen. Jetzt muss ich nur noch Strohhalme ziehen und sehen, welcher unglückliche Mistkerl da draußen schwimmen und diese Sprengstoffe legen wird ..."

 TRT_improved_depth_charges:0 "Verbesserte Sprengkörper"
 TRT_improved_depth_charges_desc:0 ""

 TRT_deadly_depth_charges:0 "Macht ein paar Wellen"
 TRT_deadly_depth_charges_desc:0 ""

 TRT_cleansing_nests:0 "Aufräumpflicht"
 TRT_cleansing_nests_desc:0 "Viele der Garnelen kommen von der Oberfläche, aus trüben Gewässern und versunkenen U-Bahnlinien. Stalker, die von oben heranreisen, stoßen normalerweise auf solche Mutanten. Ihre sporadischen Nistmuster, insbesondere bei den Garnelen, erschweren uns das Töten. Aber solange wir ihre Zahlen ordnungsgemäß unter Kontrolle halten können. Wir werden kein Problem haben."

 TRT_hardcore_fishing:0 "Hardcore-Angeln"
 TRT_hardcore_fishing_desc:0 "Haben Sie schon einmal versucht, mit explosiven Ködern zu fischen? NEIN? Du solltest es versuchen."

 TRT_kabloooeyyy:0 "Kabloooeyy!!"
 TRT_babloooeyyy_desc:0 "Wer hätte gedacht, dass Sprengstoff Krater hinterlassen würde? Unsere Abbrucharbeiten haben kürzlich einen großen Spalt freigelegt, der tief in die Erde führt. Das Loch ist trocken. und frei von Wasser, aber die Überschwemmung wird das Loch irgendwann füllen. Aber Gennady schwört, er habe gesehen, wie sich etwas in dem Loch regte."

 TRT_draining_depths:0 "Die Tiefen ausbaggern"
 TRT_draining_depths_desc:0 "Sie werden überrascht sein, wie viel Müll und andere Dinge die Leute einfach ins Wasser werfen. Obwohl es sich um eine schnelle und relativ saubere Möglichkeit handelt, Müll loszuwerden, hat es die unangenehme Angewohnheit, sich auf dem Flussboden abzusetzen. Überstunden häufen sich mit Müll und Schutt. Siehst du, wohin das führt...? Wir müssen die Scheiße vom Boden aufräumen."
 TRT_able_to_use_decision_manpower:0 "Entscheidungsoption aktivieren: §YWasserstraßen von Trümmern räumen§!"
 TRT_flooding_decision_resources:0 "\nMit jeder abgewehrten Flut gibt es eine Chance das §YRessourcen§! angewaschen werden."

 TRT_fish_industry:0 "Nutzt die Wellen"
 TRT_fish_industry_desc:0 "Unterirdische Schluchten und Stauseen verbergen nicht nur Mutanten, sondern tatsächlich auch jede Menge Fische. Einige sind stärker mutiert als andere, aber gesund genug, um gegessen zu werden. Da die drohenden Schädlinge bekämpft werden ... Wer hat schon Hunger auf Kulebyaka??"

 TRT_a_sport:0 "Wie ein Fisch im Fass"
 TRT_a_sport_desc:0 "Die stärker radioaktiven Fische sind ungenießbar, könnten aber von unseren Handelsfischern als gute Zielübungen verwendet werden."

 TRT_sustenance:0 "Fischkonserven"
 TRT_sustenance_desc:0 "Eugene, einer unserer Fischer denkt, wir könnten versuchen unseren Fisch in Dosen einzumachen, um zu verhindern dass er verdirbt. Dafür könnten wir eine heimische Einmachmaschine verwenden, die er gerade repariert hat. Einige flüchtige Techniker von der Kusnezki-Brücke sind ebenfalls bereit, mitzuhelfen und bei der Reparatur der Maschine zu helfen und Material bereitzustellen, solange die Konserven nicht von den örtlichen Idioten gestohlen werden."

 TRT_shrimp_anyone:0 "Garnelen, irgendjemand?"
 TRT_shrimp_anyone_desc:0 "Die mutierten Garnelenarten sind viel zu radioaktiv, um sie zu verzehren, es gibt jedoch noch viel kleinere, nicht mutierte Arten, die vom nuklearen Fallout weitgehend verschont bleiben. Nicht so fleischig oder so zart im Vergleich zu seinen Vorkriegs-Gegenstücken aus Massentierhaltung."

 TRT_arms_in_the_arms_industry:0 "Waffen in der Rüstungsindustrie"
 TRT_arms_in_the_arms_industry_desc:0 "Unsere Streitkräfte sind in keiner besonders guten Verfassung. Die meisten unserer Reihen bestehen aus Gopniks; laut, jung und nicht sehr helle. Ein stereotypes Bild von Banditen. Was noch schlimmer ist: Sie stolzieren mit rostigen Waffen herum, die aus allen Nähten auseinanderfallen. Man muss wirklich befürchten, dass wir ernsthaft überdenken werden, womit wir unsere Streitkräfte ausrüsten."

 TRT_with_friends_like_these: "Mit solchen Freunden"
 TRT_with_friends_like_these_desc: ""

 TRT_something_of_note: "Einige richtige Maschinen"
 TRT_something_of_note_desc: "Klar, Rohrstücke zusammenzuschlagen und mit Klebeband zu befestigen, könnte der Mist sein, den man in der äußeren Metro sieht; Aber wir sind das verdammte Banditendreieck! Wir sollten zumindest gefürchtet werden, wenn die Leute nicht schon neidisch auf unsere Stadt am Meer sind."

 TRT_shooting_range:0 "Schießstand"
 TRT_shooting_range_desc:0 "Yobs, die herumstolzieren und erwarten, in einen Konflikt verwickelt zu werden sind sicherlich ein Pulverfass das darauf wartet, unweigerlich zu platzen. Indem wir diese Gopniks davon abhalten, ihren Frust an hilflosen Bürgern auszulassen, können wir ihre Ausbrüche stattdessen woanders hinschieben. Lassen Sie sie ihren Abzugsfinger trainieren und auf unbelebte statt auf belebte Objekte zielen."

 TRT_live_game:0 "Live-Spiel"
 TRT_live_game_desc:0 "Anstatt auf unbelebte Objekte zu schießen, könnten wir stattdessen Live-Spiele verwenden. Unsere Station hat schließlich ein Problem mit Ratten. Es würde schließlich helfen, ihre Zahl zu verringern."

 TRT_technicians_trades:0 "Technikerhandel"
 TRT_technicians_trades_desc:0 "Bei der Reparatur von Waffen geht es nicht nur darum, sie zu polieren und den Schaft auf Hochglanz zu halten. Eine Menge komplizierter technischer Mist, für den viele Leute weder die Geduld noch die Intelligenz haben."

 TRT_hideout_for_kuznetsky_most:0 "Flüchtlinge aus dem Kuznetsky Most verstecken"
 TRT_hideout_for_kuznetsky_most_desc:0 "Kuznetsky Most liegt relativ nah an Venedig, verglichen mit wilden Bolschewiken oder Mutantengarnelen als Nachbarn würde man sich vermutlich für Letzteres entscheiden. Die Rote Linie versucht, den Kuznetsky Most in ihren Einflussbereich zu ziehen, sehr zum Entsetzen vieler ihrer Bürger. Diejenigen, die nicht unter dem eisernen Stiefel der Tyrannei stehen wollen, versuchen ihre Sachen zu packen und woanders hin zu fliehen. Warum überzeugen wir sie nicht davon, in Venedig Zuflucht zu suchen?"

 TRT_armed_to_the_teeth:0 "Bis an die Zähne bewaffnet"
 TRT_armed_to_the_teeth_desc:0 "Wir müssen Waffen finden, stehlen oder herstellen, um unsere Streitkräfte auszurüsten. Wir sind von gemeineren Wichsern umgeben, die am liebsten ihr Banner über die Bögen unserer Gemeinschaft hissen würden. Von den örtlichen Mobniks erpresst zu werden, ist schon schlimm genug, aber die Hanse und die Rote Linie? Sie melken uns nicht nur, sondern würden uns auch gerne bei lebendigem Leibe häuten... im übertragenen Sinne hoffentlich."
 
 TRT_vigilante_path:0 "Vigilantentum"
 TRT_vigilante_path_desc:0 ""

 TRT_vigilante_3:0 "Säuberung von Banditenhöhlen"
 TRT_vigilante_3_desc:0 ""

 TRT_vigilante_4:0 "Uneingeschränkte lokale Unternehmen"
 TRT_vigilante_4_desc:0 ""

 TRT_vigilante_5:0 "Gangster-Versorgungslager aufdecken"
 TRT_vigilante_5_desc:0 ""

 TRT_vigilante_6:0 "Nachrüstung ziviler Arbeitsplätze"
 TRT_vigilante_6_desc:0 ""

 TRT_armed_to_the_teeth_option_1:0 "Premium-Lager"
 TRT_armed_to_the_teeth_option_1_desc:0 ""

 TRT_armed_to_the_teeth_option_2:0 "Brandneue Designs"
 TRT_armed_to_the_teeth_option_2_desc:0 ""

 TRT_armed_to_the_teeth_option_3:0 "Den Waffenschmied davon überzeugen, sich unseren Reihen anzuschließen"
 TRT_armed_to_the_teeth_option_3_desc:0 ""

 TRT_support_oktyabrskaya: "Unterstützen Sie die [OKT.GetName]-Nachfolge"
 TRT_support_oktyabrskaya_desc: "Mikhail erzählt uns, dass er einige Verbindungen zu den Händlern von [OKT.GetName] – der Hanse-Sklaven – hat. Mit etwas Strippenzieherei und ein paar gebrochenen Nasen glaubt er, dass er ein paar Leute dort drüben dazu bringen kann, zweimal über ihre Loyalität zur Hanse nachzudenken."

 TRT_oktyabrskaya_annex: "Außenposten bei der [OKT.GetName]"
 TRT_oktyabrskaya_annex_desc: "Da die Bürger von [OKT.GetName] frei von hanseischem Einfluss sind, haben unsere Jungs ungehinderten Zugang zur Station. Nicht ganz frei von Regeln, aber eher unter neuer Leitung"

 TRT_criminal_syndicate: "Verbrechersyndikat"
 TRT_criminal_syndicate_desc: ""