 #Events#

  generic_rename_event.1.t: "Benenne Station um: [330.GetName]"
  generic_rename_event.1.d: "Als Resultat des Friedensvertrages haben wir das Bolshoi-Theater bekommen, doch inzwischen ist es nurnoch ein Schatten seiner selbst: Überall die Rote Propaganda und endloses Geschwätz vom Sozialismus. Zur Hölle mit den roten Bannern, säubert diese Station endlich!"
  generic_rename_event.1.a: "An die Arbeit!"

  generic_rename_event.2.t: "Benenne Station um: [244.GetName]"
  generic_rename_event.2.d: "Den Sozialisten haben wir eine ihrer wertvollsten Stationen entrissen, doch hier steht noch viel Arbeit vor uns. Lasst die Aleksandrovsky Sad wieder von hellen Licht erleuchtet werden!"
  generic_rename_event.2.a: "URRAA!"

  generic_rename_event.3.t: "Benenne Station um: [228.GetName]"
  generic_rename_event.3_desc.a: "Wir haben die Kontrolle über die [228.GetName]-Station erlangt. Dennoch haben wir ein Problem, wir können die Station nicht nach einer Straße bennenen, die seit 1994 nicht länger existiert (Podbelskogo). Nun haben wir zwei Optionen:\n\nErstens die Station nach der Marschall-Rokossovsky-Straße benennen.\n\nZweitens die Station nach der Ivanteevskaya-Straße bennenen."
  generic_rename_event.3_desc.b: "Wir haben die Kontrolle über die [228.GetName]-Station erlangt. Dennoch haben wir ein Problem, sollen wir die Station umbenennen in die Ivanteevskaya, oder sollen wir den neuen Namen nach Rokossovsky beibehalten?"
  generic_rename_event.3_kill_soviet: "Endlich steht auch diese verfluchte Station unter unserer Kontrolle, auch sie wird von uns VOLLSTÄNDIG vom Kommunismus gesäubert werden."
  generic_rename_event.3.a: "In erinnerung an Marschall Rokossovsky, unseren Helden des großen Vaterländischen Krieges."
  generic_rename_event.3.b: "Nieder mit der UdSSR, lang lebe das ewige Russland!"

  generic_rename_event.4.t: "Benenne Station um: [250.GetName]"
  generic_rename_event.4.d: "Wir haben die Station [250.GetName] besetzt. Uns ist es schleierhaft weshalb die Kommunisten sie unbenannt haben, doch nichtsdestotrotz werden wir hier jetzt aufräumen und ihren alten Namen wiederherstellen."
  generic_rename_event.4.a: "Ausgezeichnet."

  generic_rename_event.5.t: "Benenne Station um: [329.GetName]"
  generic_rename_event.5.d: "Wir haben die Station [329.GetName] besetzt. Uns ist es schleierhaft weshalb die Kommunisten sie unbenannt haben, doch nichtsdestotrotz werden wir hier jetzt aufräumen und ihren alten Namen wiederherstellen."
  generic_rename_event.5.a: "Ausgezeichnet."

  generic_rename_event.6.t: "Benenne Station um: [264.GetName]"
  generic_rename_event.6.d: "Wir haben die Station [264.GetName] besetzt. Hier wurde die neue Rote Revolution geboren und hier wird sie nun sterben. Schafft diesen Müll endlich weg."
  generic_rename_event.6.a: "Ein neues Leben für die Preobrazhenskaya Ploshchad."

  generic_rename_event.7.t: "Benenne Station um: [245.GetName]"
  generic_rename_event.7.d: "Wir haben die Station [245.GetName] besetzt. Sie ist eine der ältesten Metro-Stationen und nun ein wichtiges Kulturerbe der Menschheit. Jedoch hat dies die Kommunisten nicht davon abgehalten, diese Station mit ihrem lächerlichen Schund zu überfluten. Und wieder müssen wir eine Station säubern..."
  generic_rename_event.7.a: "Kein Problem, Chistye Prudy wird zu neuen Leben finden."

  generic_rename_event.8.t: "Benenne Station um: [362.GetName]"
  generic_rename_event.8.d: "Wir haben die Station [362.GetName] besetzt. Sie ist eine der ältesten Metro-Stationen sowie das Zentrum der Sokolnicheskaya-Linie. An ihrer Oberfläche standen einst Museen und prächtige Plätze, sowie der Kremil. Diese wichtige Station muss schleunigst von Feinden gesäubert werden!"
  generic_rename_event.8.a: "Okhotny Ryad ist unser Tor zum Herzen Russlands."

  generic_rename_event.9.t: "Benenne Station um: [306.GetName]"
  generic_rename_event.9_desc: "Wir haben die Gor'kovskaya  (vom Reich vorher Darwinovskaya genannt) erobert. Die Station wurde von den Kommunisten umbenannt, doch nun soltle sie sollte richtigen Namen zurück bekommen."
  generic_rename_event.9_nostalgia: "Wir haben die Chekhovskaya erobert (vom Reich auch Darwinovskaya genannt). Die Herrschaft der Nazis findet hier nun ihr Ende."
  generic_rename_event.9.a: "Wir schreiten voran."
  generic_rename_event.9.b: "Ich hoffe wir werden hier kein neues Reich erschaffen.. Führt uns, oh Helden der Vergangenheit!"

generic_rename_event.10.t: "Benenne Station um: [288.GetName]"
  generic_rename_event.10.d: "Wir haben die Station [288.GetName] besetzt. Es ist nicht klar, warum die Kommunisten auf die Idee kamen, die Station umzubenennen ... Doch warum sich darüber den Kopf zerbrechen? Lassen Sie uns die Stationen lieber aufräumen und instand setzen – und ihr ihren historischen Namen zurückgeben."
  generic_rename_event.10.a: "Exzellent."

