HNZ_war_plans_desc: "Um Bedrohungen und zukünftige Feinde vorherzusehen, müssen wir eine Abteilung gründen, die sich gezielt mit potenziellen Gegnern der Hansa befasst – innerhalb wie außerhalb unserer Grenzen."

