SAV_makharadze: "Sergei Makharadze"
 SAV_makharadze_trait: "Wächter von Dimitrowskaja"
 SAV_makharadze_leader_trait: "Der Wächter von der Dimitrowskaja"
 SAV_makharadze_DESC: "Als womöglich einer der letzten verbliebenen Bewohner von Timirjasewskaja – aus jener Zeit, als die Station noch von Menschen bevölkert war – entging Macharadse an jenem Tag nur knapp seinem Schicksal, von der heranwogenden Rattenflut verschlungen zu werden; es gelang ihm, sich auf eine motorisierte Draisine zu retten, gerade als diese abfuhr. Seit diesem Tag hütet er verbissen sein karges verbliebenes Hab und Gut und bewacht – treu wie ein Hund – weiterhin die Tunnel, die zur Timirjasewskaja führen. Doch in seinem Inneren wuchert ein Tumor, der mit jedem Tag des Grübelns schlimmer wird, während die wenigen anderen Überlebenden längst weitergezogen sind und versucht haben, einen Neuanfang zu wagen. Vielleicht hätte man noch einen Menschen retten können. Wäre er schneller gewesen oder hätte er vor der wütenden Rattenflut gewarnt, wären womöglich mehr am Leben geblieben."
 SAV_ishchuk: "Anton Ishchuk"
 SAV_ishchuk_trait: "Doppelzüngiger Diplomat"
 SAV_ishchuk_leader_trait: "Ein Bastard von einem Bastard"
 SAV_ishchuk_DESC: "Als die Sowjetunion zusammenbrach und Russland lernen musste, mit dem Kulturschock des angesagten Marktkapitalismus zurechtzukommen, fand sich Ishchuk darin leichter zurecht als die meisten anderen. Durch Daytrading und zwielichtige, hinterhältige Geschäfte mit den aufstrebenden Oligarchen gelang ihm der Aufstieg zu Reichtum. Selbst nach der Apokalypse passte Ishchuk – wie eine Kakerlake – seine Taktik und seinen Tonfall an eine bescheidenere, niedergeschlagene Bevölkerungsschicht an. Da seine Worte ihre Schärfe verloren hatten, schlug Ishchuk eine kompromisslosere Gangart ein."
 SAV_bari_abramov: "Bari Abramov"
 SAV_bari_abramov_trait: "Bordellleiter"
 SAV_abramov_DESC: "§9Wer gut ruht, arbeitet gut – verstehen Sie, worauf es ankommt?§!\n\nAbramov, der derzeitige Stationsvorsteher des „Tsvetnoy Boulevard“ – und nebenbei Beschaffer „exotischer Waren“, die an seiner Station feilgeboten werden –, hat miterlebt, wie der Boulevard trotz seines zweifelhaften Rufs florierte; ebenso zwielichtig wie seine eigenen Machenschaften ist dabei auch das Umfeld, mit dem er sich umgibt."

