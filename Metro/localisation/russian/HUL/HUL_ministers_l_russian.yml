 HUL_misha: "Старый дядя Миша"
 HUL_BATKA_DESC: "Названный товарищами §Yдядей Мишей§!, Михаил своей простой внешностью и застенчивой натурой выдает большой гулкий огонь, который таится в нем. Его речи могут успокоить даже самую буйную голодную толпу и заставить замолчать самого сварливого охранника станции. Многие, кто следует его учению, провозглашают его Нестором, в честь самого Нестора Махно, и хотя Республика еще не видела никаких массовых движений за пределами северо-западной секты §YЗамоскворецкой§! линии, один факт остается совершенно ясным: §RСвобода или смерть!§!"
