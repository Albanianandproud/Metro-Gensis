 HNZ_poor_high_command: "Archaische Kommandostruktur"
 HNZ_poor_high_command_desc: "Obwohl der Hanse-Rotlinien-Krieg erst vor weniger als einem Jahrzehnt ausgetragen wurde, ist unsere Kommandostruktur noch immer primitiv und muss dringend renoviert werden."

 HNZ_exhausted_economy: "Erholung der Wirtschaft"
 HNZ_exhausted_economy_desc: "Ein Großteil unserer Wirtschaft war in den Krieg zwischen Hanse und der Roten Linie verwickelt. Während sich unsere Wirtschaft langsam erholt, werden die Narben dieses Konflikts noch lange zu sehen sein"

 ##   Laws   ## 
 
  civics_border_HNZ_1: "Ungefilterter Zugriff"
 civics_border_HNZ_1_desc: ""
 civics_border_HNZ_2: "Passkontrollen"
 civics_border_HNZ_2_desc: "Um ihre Interessen zu wahren und den Handelsfluss zu kontrollieren, hat die Hanse für Personen von ausländischen Stützpunkten eine Ausweispflicht eingeführt, um ihnen Zugang zur Ringlinie zu gewähren."

 HNZ_economy_law_1: "Expansionistisches Imperium"
 HNZ_economy_law_1_desc: ""
 HNZ_economy_law_2: "Subversive Hegemonie"
 HNZ_economy_law_2_desc: ""
 HNZ_economy_law_3: "Kriegführende Macht"
 HNZ_economy_law_3_desc: ""
 HNZ_economy_law_4: "Aufkeimende Stärke"
 HNZ_economy_law_4_desc: "Trotz ihrer ambivalenten Haltung gegenüber den unbedeutenden kleinen Stationen beobachtet die Hanse die Lage genau und wird auf jede Bedrohung, die ihre lukrativen Wirtschaftsbeziehungen gefährden könnte, entsprechend reagieren."
 HNZ_economy_law_5: "Distanzierte Autorität"
 HNZ_economy_law_5_desc: "Angesichts strenger Vorschriften und noch strengerer Identitätsprüfungen wählt die Hanse ihre Geschäftspartner fast nach Gutdünken aus. Der Einsatz ihrer enormen Wirtschaftsmacht hat einen hohen Preis, und eine Entscheidung, die das Gleichgewicht der Metro zu ihrem Nachteil verschieben könnte, wird nicht leichtfertig getroffen."
 HNZ_economy_law_6: "Schlummerndes Kraftpaket"
 HNZ_economy_law_6_desc: "Der enorme Wohlstand der Hanse stützt sich auf ihre wirtschaftliche Macht, mit der sie potenzielle Bedrohungen zerschlägt. Wirtschaftssanktionen und andere deutliche Worte sind die Mittel, mit denen sie ihre Vormachtstellung wahrt. „Haltet eure Probleme vom Tor fern“ – so lautet das Mantra. Vielleicht sind es Ignoranz oder schlicht die Unlust, sich mit dem Mist der anderen Metro-Stationen auseinanderzusetzen, die die Hanse so zögern lassen, ihre militärische Macht ins Feld zu führen."

