## External Relations ##
  HNZ_external_relations: "Außenbeziehungen"

  HNZ_pressure_reich_open_trade: "Ermutigen sie das Reich, sich für den Handel zu öffnen"
  HNZ_pressure_reich_open_trade_desc: "Das Reich verfügt über unzählige Vorkriegstechnologien, ganz zu schweigen davon, dass es sich um eine sich selbst tragende, isolierte Wirtschaft mit sehr geringer Interaktion mit der Außenwelt handelt. Ihr Militär ist unübertroffen, aber sie befinden sich im ständigen Kampf mit der Roten Linie und müssten die schwierige Entscheidung treffen, sich entweder unseren Forderungen zu unterwerfen oder es zu wagen sich auch sie zweite Großmacht in der Metro zum Feind zu machen."

  HNZ_reich_peaceful_trade_resources: "Handelsressourcen"

  HNZ_reich_peaceful_trade_guns: "Handel mit Waffen"

  HNZ_reich_treaty: "Vertrag mit dem Reich"
  HNZ_reich_treaty_desc: "Es ist keine Überraschung, dass das Reich von seiner Expansion träumt. In seiner Festungsstation sitzend planen und entwerfen sie ihre neuen Lebensräume. Was wäre, wenn wir ihnen hierfür die Durchfahrt gewähren würden? Fordern Sie, dass sie sich von der Polis und unserem Einflussbereich fernhalten und gewährt ihnen im Gegenzug ein kleines Stück der Metro für ihr Reich. Sie wären hervorragende Handelspartner ... und ein noch besserer Verbündeter gegen die mobilisierende Rote Linie!"

  HNZ_southern_reclamation_authority: "Gründen sie die südliche Rückgewinnungsbehörde"
  HNZ_establish_southern_reclamation_authority: "Gründung der Behörde"

## Production Shift ##

  HNZ_mandates: "Zentralisierte Vorgaben"
  HNZ_mandates_desc: " "
  HNZ_shift_in_effect: "§YSchicht-Änderungen§! sind nicht in Kraft."
  HNZ_mandate_production_shift_increase: "Produktionsschichten erhöhen"
  HNZ_mandate_production_shift_increase_desc: "Wir sind dringend darauf angewiesen, die erwarteten Produktionsziele zu erreichen. Eine Verlängerung der Schichtzeiten wird hoffentlich ausreichen, um die Anforderungen zu erfüllen. Allerdings wird unsere Belegschaft Überstunden leisten müssen."
  HNZ_mandate_production_shift_decrease: "Produktionsschichten reduzieren"
  HNZ_mandate_production_shift_decrease_desc: "Unsere Belegschaft ist durch zermürbende Arbeitszeiten und kargen Lohn erschöpft. Eine Verkürzung der Schichtdauer wird unsere Mitarbeiter vorübergehend vom Stress entlasten, wenngleich unsere Branchenmargen infolgedessen leiden werden."
  HNZ_shift_change_cost_bullet_tt: "§YSchicht-Änderungen§!-Kosten erhöht um §Y250§! £bullet_icon"
  HNZ_subsidies_in_effect: "§YHändler-Subventionen§! sind nicht in Kraft."
  HNZ_mandate_trader_subsidies: "Händler-Subventionen"
  HNZ_mandate_trader_subsidies_desc: "Wir können unsere Händler in schwierigen Zeiten entlasten, indem wir ihnen Tarifsenkungen gewähren oder ihnen sogar staatliche Beihilfen zukommen lassen. Auch die Subventionierung von Exporten wird unseren Händlern dabei helfen, ihre Waren außerhalb der Ringlinie zu reduzierten Preisen abzusetzen."
  HNZ_subsidies_cost_tt: "§YHändler-Subventionen§!-Kosten erhöht um §Y250§! £bullet_icon"
