 satellite_our_own_path:0 "Unser eigener Weg"
 satellite_our_own_path_desc:0 "Wie können wir jemand anderem folgen, wenn es für uns nicht richtig ist? Wir werden unser eigenes Schicksal gestalten. Ob dieses Schicksal in den Flammen des Krieges, im Wohlstand im Frieden oder in der pechschwarzen Dunkelheit des Untergrunds liegt. Wir sind die Herren unseres eigenen Schicksals."

 satellite_a_new_power_dawns:0 "Eine neue Macht erhebt sich"
 satellite_a_new_power_dawns_desc:0 "Da die Zukunft der Metro weiterhin ungewiss ist, wird die Geschichte von denen geschrieben, die das Schreiben nicht verlernt haben. Unsere Station wird trotz ihrer erschreckenden Alphabetisierungsraten nicht in die Vergangenheit bleiben. Ob hanseatisch oder sozialistisch, unsere Stationf wird zu einer aufstrebenden Macht in der Metro, die den Status quo verändern wird."

