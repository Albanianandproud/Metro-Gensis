l_russian:
 bandit_event.1.t: "[FROM.GetName] стремится присоединиться к нашей фракции"
bandit_event.1.d: "[FROM.GetName] предлагает нам свою верность — партнёры, более-менее. Они предлагают объединить наши цели и укрепить отношения, чтобы остальное метро дважды подумало, прежде чем связываться с нами."
bandit_event.1.a: "Вместе мы сильнее."
bandit_event.1.b: "Вместе мы сильнее как единое целое."
bandit_event.1.c: "Они нам не нужны."
bandit_event.2.t: "[FROM.GetName] ищет более тесные связи"
bandit_event.2.d: "Посланники [FROM.GetName] прибыли в [ROOT.Capital.GetName] с предложением, обёрнутым в двусмысленные угрозы и обещания одновременно.\n\nОни предлагают нашим силам как-то объединиться, делиться криминальными связями, контрабандными маршрутами и доступом к чёрному рынку. Вместо того чтобы драться за один и тот же кусок пирога, они предлагают, как и полагается настоящим цивилизованным бандам, разрезать его и поделить поровну.\n\nСотрудничество с [FROM.GetName] несёт риски: позволить им работать вместе с нашими рейдерами и делиться информацией в долгосрочной перспективе может стать катастрофой."
bandit_event.2.a: "Мы будем рады помочь."
bandit_event.2.b: "Мы не работаем с паразитами."
bandit_event.4.t: "[TRT.GetName] принимает нашу просьбу"
bandit_event.4.d: "После нашего посланника [TRT.GetName] принял нашу просьбу о более тесном сотрудничестве между нашими милициями."
bandit_event.4.a: "Отличные новости."
bandit_event.3.t: "[TRT.GetName] отклоняет нашу просьбу"
bandit_event.3.d: "После размышлений над нашей просьбой о более тесном сотрудничестве сил [TRT.GetName] отказался предоставить помощь."
bandit_event.3.a: "Чёрт с вами. Нам ваша помощь и не нужна, в любом случае.."
bandit_event.5.t: "Организованный бандитизм"
bandit_event.5.d: "Дни неорганизованного бандитизма закончились. То, что раньше было сборищем пьяных и грязных головорезов, теперь вымуштровано и превращено в куда более опасную банду.\nКонтрабандные сети наносятся на карту, наши парни планируют маршруты рейдов и отмечают важных людей для вымогательства. От самого мелкого жулика до правой руки босса — теперь каждый знает своё место.\nМетро скоро научится нас уважать, или пожалеет!"
bandit_event.5.a: "Наш порядок или никакого порядка!"
bandit_event_internal.1.t: "Где кнут…"
bandit_event_internal.1.d: "Парни совсем обленились — слишком заняты бабами или терроризируют жителей [ROOT.Capital.GetName], вместо того чтобы зарабатывать деньги. Им слишком комфортно сидеть у костра в своих самодельных укрытиях.\n\nЕсли мы хотим процветать и чтобы нас по-настоящему боялись в этом мире «кто сильнее, тот и прав», нужно выбить из них всю эту расслабуху.\n\nНужны чёткие приказы. Дисциплина. Хотят они того или нет. Каждый будет знать своё место и стоять в строю."
bandit_event_internal.1.a: "Вымуштровать парней — первая идеальная задача.."
bandit_event_internal.1.a.tt: "В зависимости от выбранного фокуса нам потребуется набрать достаточно высокий уровень поддержки войны или стабильности."
bandit_event_coercion.1.t: "[FROM.GetName] требует дань!"
bandit_event_coercion.1.d: "Бандиты из [FROM.GetName] пришли к нам со своей обычной тактикой «кулаки вместо слов» и хамским отношением, требуя платить дань [FROM.GetLeader].\nОни хорошо вооружены, и неизвестно, чем обернётся отказ от их ультиматума — военными последствиями или нет."
bandit_event_coercion.1.a: "У нас нет другого выбора, кроме как подчиниться."
bandit_event_coercion.1.b: "Пошли нахуй. Мы не договариваемся с отморозками."
bandit_event_coercion.2.t: "[FROM.GetName] предлагает дань"
bandit_event_coercion.2.d: "Наши парни либо нарисовали злые рожи, либо Игорь сумел наебать этих бедолаг и вытрясти из них патроны. [FROM.GetLeader] будет доволен новостями."
bandit_event_coercion.2.a: "Хорошо."
bandit_event_coercion.3.t: "[FROM.GetName] отвергает требования подчинения!"
bandit_event_coercion.3.d: "[FROM.GetName] отверг наш ультиматум о подчинении. Хорошо, что парни давно чешутся устроить нормальную драку."
bandit_event_coercion.3.a: "Жаль их. Игорь! Хватай дуплет!"
bandit_event_coercion.3.b: "С другой стороны, у нас есть проблемы поважнее."
bandit_event_coercion.4.t: "[FROM.GetName] требует полного подчинения!"
bandit_event_coercion.4.d: "Бандиты из [FROM.GetName] вернулись, но на этот раз их требования просты. Они ожидают, что наша станция перейдёт к ним в вассальную зависимость. Их «защита» в обмен на неограниченный доступ их бандитам. Предложение бы просто высмеяли, если бы у них не было сил и людей, чтобы подкрепить свои слова. Более того, похоже, они готовы ответить силой и даже больше, если мы не примем их ультиматум."
bandit_event_coercion.4.a: "У нас нет другого выбора, кроме как принять."
bandit_event_coercion.4.b: "Ну давай, попробуй!"
bandit_border_conflict_won_attacker.1.t: "[FROM.GetName] Пограничная стычка: Победа"
bandit_border_conflict_won_attacker.1.d: "С решительным прорывом обороны наши силы ворвались и быстро разделались с защитниками, которые уже через пару часов были полностью рассеяны. Эта победа точно принесёт нам большое уважение среди наших бойцов."
bandit_border_conflict_won_attacker.1.a: "Победителю достаётся добыча!"
bandit_border_conflict_won_defender.1.t: "[FROM.GetName] Пограничная стычка: Победа"
bandit_border_conflict_won_defender.1.d: "Наши защитники закопались по самые яйца, дрались зубами и ногтями и в итоге победили. Нападающие были выкошены при попытке углубиться, в конце концов сломались и отступили. Туннели остались в наших руках, и эта победа ясно даёт понять: с нашими бойцами лучше не связываться."
bandit_border_conflict_won_defender.1.a: "Мимолётная победа. Они вернутся раньше или позже."
bandit_border_conflict_lost_attacker.1.t: "[FROM.GetName] Пограничная стычка: Поражение"
bandit_border_conflict_lost_attacker.1.d: "Несмотря на все усилия наших солдат, оборона противника устояла. Уже через несколько минут наш штурм выдохся, и нас заставили отступить."
bandit_border_conflict_lost_attacker.1.a: "Мы ещё вернёмся."
bandit_border_conflict_lost_defender.1.t: "[FROM.GetName] Пограничная стычка: Поражение"
bandit_border_conflict_lost_defender.1.d: "Наши силы в итоге были сломлены и разбиты врагом, выжившие отступили глубже к более укреплённым позициям. Хотя сопротивление наших бойцов было впечатляющим, его оказалось недостаточно, чтобы остановить противника."
bandit_border_conflict_lost_defender.1.a: "В следующий раз мы их сделаем."