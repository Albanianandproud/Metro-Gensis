 satellite_envy_of_polis: "Der Neid der Polis"
 satellite_envy_of_polis_desc: "Wir haben gekämpft und gearbeitet, und doch werden unsere Nachbarn um unsere Forschungsleistungen beneidet, trotz der Schwierigkeiten, mit denen unsere Gemeinschaft konfrontiert ist. Polis mag die Bastion des Wissens der alten Welt sein, aber unsere wendet dieses Wissen dort an, wo es benötigt wird."

