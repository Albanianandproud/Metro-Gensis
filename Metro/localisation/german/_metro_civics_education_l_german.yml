 ### Events ###

 nf_metro_education.1.t:0 "Bildungsreformen"
 nf_metro_education.1.d:0 "Nach ordnungsgemäßer Umsetzung, Bevorratung und Sammlung von Wissen können wir nun mit der Einführung der Bildung in unserer gesamten Nation beginnen. Wir sind keine Analphabeten mehr, wie die Bürger der Nachbarstaion Ihnen weismachen wollen."
 nf_metro_education.1.a:0 "Eine gute Nachricht, Freunde!"

 nf_metro_education.2.t:0 "Bildungsreformen
 nf_metro_education.2.d:0 "Nach einer ermüdenden Woche haben die Penner in unserer Truppe endlich den Kern der Sache verstanden. Wer hätte gedacht, dass diese Trottel auf etwas anderes hinauslaufen könnten als auf Schießen und Trinken? Igor stottert nicht mehr so heftig, wenn er die verschiedenen Boulevardzeitungen mit Pop-Klatsch von vor über zwei Jahrzehnten liest. Und Piotr kann jetzt tatsächlich seinen Namen schreiben. Heute eine kunterbunte Gangsterbande, wer weiß schon, wie es morgen aussieht? Vielleicht bringen wir die Soldaten der hanse sogar dazu, es sich zweimal zu überlegen, was sie mit uns machen!"
 nf_metro_education.2.a:0 "Eine gute Nachricht, Freunde!"

 nf_metro_education.3.t: "Entfremdete Verwaltung"
 nf_metro_education.3.d: "Jüngsten Berichten zufolge arbeiten unsere Stationsbehörden gegen unsere Bildungsreformen. Anstatt Bücher und Broschüren, die wir an einzelnen Stationen verteilen, an die Bürger zu verteilen, verkaufen die Behörden sie stattdessen an vorbeikommende Händler oder untereinander. Einige alarmierende Nachrichten deuten sogar darauf hin, dass sie die Bücher als Brennstoff für Brandstiftung verwenden."
 nf_metro_education.3.a: "Da können wir wohl nichts tun"
 nf_metro_education.3.b: "Weisen sie die Stationsvorsitzenden zurecht"

 nf_metro_education.4.t: "Bildungsbericht"
 nf_metro_education.4.d: "Es scheint nur, dass unsere Bevölkerung das Memo nicht versteht. Vielleicht hat die eindringende Strahlung ihr Gehirn erreicht, oder der Gedanke, von Mutanten aus ihren Betten gerissen zu werden, hat die Angst vor der Alphabetisierung in ihren Herzen geweckt. So oder so, unsere Reformen scheinen länger zu dauern als ursprünglich erwartet"
 nf_metro_education.4.a: "Schlechte Nachrichten"

 nf_metro_education.5.t: "Bildungsbericht"
 nf_metro_education.5.d: "Es wird erwartet, dass die aktuellen Bildungsreformen den Plänen entsprechen. Wir sind jedoch davon überzeugt, dass wir den Prozess durch die Gunst der örtlichen Bahnhofsverwaltung über die ursprünglich erwarteten Fristen hinaus beschleunigen können."
 nf_metro_education.5.a: "Alles für den Fortschritt"
 nf_metro_education.5.b: "Überlasst das den örtlichen Kräften"
 

 







