 TRT_kicking_the_brodyaga_into_gear: "Den Brodyaga in Gang bringen"
TRT_kicking_the_brodyaga_into_gear_desc: "Diese Wichser eignen sich besser als Übungsziele anstatt als Verbrecherbande. Die Scheißkerle können nicht einmal geradeaus schießen. Wie sollen sie unser Revier schützen, wenn sie nicht einmal 15 Minuten lang nüchtern bleiben können?"

