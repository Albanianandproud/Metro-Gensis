l_german:
 RCH_random_event.1.t: "Desertation"
 RCH_random_event.1.d: "Unser Geheimdienst hat kürzlich einen Plan zur Desertation einer Gruppe unserer Soldaten aufgedeckt, und das gerade noch rechtzeitig. Diese Soldaten wurden beim Versuch erwischt, über die Grenze in das Gebiet der Mutanten zu fliehen, doch stattdessen haben wir diese mutmaßlichen Reichsverräter nun festgenommen. Die Frage ist, was wir nun mit ihnen machen sollen, immerhin sind sie der Verschwörung zum Verlassen des Reiches schuldig. Vielleicht können wir sie aber auch davon überzeugen, zu bleiben?"
 RCH_random_event.1.a: "Verrat am Führer wird mit dem Tode bestraft"
 RCH_random_event.1.b: "Übergeben Sie sie dem Hinrichtungskommando und machen sie es öffentlich"
 RCH_random_event.1.c: "Einige ... Überzeugungsarbeit könnte sie daran erinnern, wo ihre Loyalität liegen sollte"

 RCH_random_event.2.t: "Mutanten unter uns?"
 RCH_random_event.2.d: "Wir haben kürzlich Kenntniss darüber erhalten, dass einer unserer kommandierenden Offiziere in Wahrheit ein Mutant seien soll. Die Soldaten unter ihm stellten seine genetische Reinheit in Frage und glauben nun fest daran, dass seine Gene so degeneriert sind, dass dies an seinem Körper erkennbar ist. Natürlich wollen sie nicht unter das Kommando eines abscheulichen Mutanten geraten. Wie sollen wir mit diesen Gerüchten umgehen?"
 RCH_random_event.2.a: "Hinrichtet diesen Mutanten hin"
 RCH_random_event.2.b: "Diese Gerüchte sind zweifellos falsch."
 RCH_random_event.2.c: "Untersuchen Sie diese Gerüchte ganz genau."

 RCH_random_event.3.t: "Der Mutant ist enttarnt"
 RCH_random_event.3.d: "Wie unsere Soldaten schon vermutet hatten war der Offizier tatsächlich ein Mutant. Bei einer umfassenden Durchsuchung durch die Gestapo fanden unsere Beamten mehrere Deformitäten an seinem Körper, welche auch tatsächlich geburtsbedingt waren. Daraufhin richteten sie den Kommandanten ohne weitere Fragen hin. Die Soldaten die unter ihm standen sind erleichtert, obwohl in ihren Reihen noch immer der Gedanke an eine größere Inspektion auf mutantenbedingte Defekte schwebt."
 RCH_random_event.3.a: "Wie zu erwarten war, sofort hinrichten."

 RCH_random_event.4.t: "Anschuldigungen unbegründet"
 RCH_random_event.4.d: "Trotz umfangreicher Durchsuchungen durch unsere Gestapobeamten und seiner anfänglichen Ablehnung schien sein Körper keine Anzeichen genetischer Missbildungen aufzuweisen. Darüber hinaus entsprachen seine Körperproportionen perfekt dem, was man von einer reinrassigen Rasse erwarten kann. Es steht ihm frei, wieder zu seinen aktiven Pflichten zurückzukehren, doch die Soldaten unter ihm werden ihm wahrscheinlich nicht so schnell wieder trauen."
 RCH_random_event.4.a: "Wir müssen diese Gerüchte zerstreuen."
 RCH_random_event.4.b: "Obwohl er kein Mutant ist, so können wir dennoch unser Gesicht wahren."

 RCH_random_event.5.t: "Der mutmaßliche Mutantenoffizier flieht"
 RCH_random_event.5.d: "Der zur Inspektion festgehaltene Kommandant, dem Genetische Unreinheit vorgeworfen werden, ist an unseren Wachen vorbeigeschlüpft und entkommen. Die langwierige Suche nach seinem Aufenthaltsort ist ins Stocken geraten und vermutlich ist er endgültig aus dem Reich geflohen. Es gibt kaum Anhaltspunkte dafür, dass die Mutanten ihn aufnehmen werden, stattdessen wird er wohl zweifelslos von ihnen verschlungen werden."
 RCH_random_event.5.a: "Wo immer er ist, er kann dem Reich nichts mehr anhaben."

 RCH_random_event.6.t: "Ehemals Angeklagter getötet"
 RCH_random_event.6.d: "Wie angenommen, haben sich unsere schlimmsten Befürchtungen bewahrheitet: Dem Offizier wurde es erlaubt, zu seinen militärischen Aufgaben zurückzukehren, doch die Soldaten unter ihm waren immer noch nicht bereit, sich von einem vermeintlichen Mutanten anführen zu lassen. Letztendlich beschlossen unsere Soldaten, ihren Kommandanten selbst zu töten, während er in seinem Privatquartier schlief. Nach ihrer Festnahme und Befragung durch unsere Gestapo schwörten die Soldaten einen Schweigeid, damit dieser Skandal nicht weiter bekannt wird. Es hat jedoch wenig Sinn, eine Bestrafung anzustreben, da die Zahl der inhaftierten Soldaten zu groß wäre, um sie einzusperren oder unauffällig hinzurichten."
 RCH_random_event.6.a: "Es gibt sonst nichts mehr was wir tun können."

 RCH_random_event.7.t: "Anschuldigungen lösen sich auf"
 RCH_random_event.7.d: "Der betreffende Offizier, der zurückgeschickt wurde, um seine militärischen Pflichten zu übernehmen, hat keine weiteren Probleme seitens seiner Soldaten gesehen. Trotz des gelegentlichen Flüsterns und der gegen ihn gerichteten Verleumdung, scheint es, dass die ernsthaften Vorwürfe sich völlig aufgelöst sind haben. Vielleicht dienten die Anschuldigungen ja auch nur dazu, den befehlshabenden Offizier wegen seiner umfangreichen Übungsroutinen und seiner Vorliebe für die Motivation seiner Männer durch Körperstrafen, zu verärgern?"
 RCH_random_event.7.a: "Gut zu wissen."

 RCH_random_event.8.t: "Stranger at the Gates"
 RCH_random_event.8.d: "Vor unserem Toren steht eine verhüllte Gestalt. Obwohl er in unser Territorium eingedrungen ist und wiederholt die Salven unserer Wachen unbeschadet überstanden hat, bleibt er hartnäckig. Er sei nur auf der Suche nach einer sicheren Passage durch unsere Domäne, so behauptet er, und es werde auf lange Sicht nur den Wünschen des Reiches dienen."
 RCH_random_event.8.a: "Er soll sich verziehen."
 RCH_random_event.8.b: "Erlaubt ihm die Durchreise."

 RCH_random_event.9.t: "Rekrutenmangel"
 RCH_random_event.9.d: "Plötzlich mangelt es an fähigen und willigen Kräften, die sich unseren Streitkräften anschließen könnten. Für unsere Rekrutierer wird es immer schwieriger die erwarteten monatlichen Quoten zu erfüllen, selbst mit den Mitteln der Zwangsrekrutierung."
 RCH_random_event.9.a: "Ok."

 RCH_random_event.10.t: "Rekrutenüberschuss"
 RCH_random_event.10.d: "Es gibt eine Fülle von Personen, die bereit sind, in unsere Streitkräfte eingezogen zu werden. Ob aufgrund von Gerüchten über zunehmende Mutantenaktivitäten in der Ferne oder aufgrund unserer umfangreichen Propagandakampagnen, unsere Rekrutierer haben festgestellt, dass sie die monatlich erwarteten Quoten bereits jetzt überschritten haben."
 RCH_random_event.10.a: "Gut zu wissen."

 RCH_random_event.11.t: "Unsere Bürger wollen Krieg!"
 RCH_random_event.11.d: "Ob durch ausgeschmückte Berichte über grassierende Mutantenaktivitäten im Hinterland unserer Grenzen oder durch einen ausgeklügelten Plan des Propagandaministers, unsere Bürger geloben ihre bedingunsglose Unterstützung für den Krieg gegen die Mutanten. Ob unsere Bürger wirklich wissen, was Opfer bedeuten, ist ungewiss."
 RCH_random_event.11.a: "Sie schwören Treue bis in den Tod."