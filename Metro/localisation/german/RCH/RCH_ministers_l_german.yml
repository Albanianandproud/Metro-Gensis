  RCH_stortbeker:0 "Hauptmann Stortbeker"
  RCH_stortbeker_desc:0 "Was das Reich von den Mutanten und den Kommunisten im Rest der Metro trennt, das ist ihre Loyalität. Manche sind ihren Ideologien treu, andere dem Geld. Doch dann gibt es auch jene, die nur der Menschheit ergeben sind, jene die alles tun würden um sie zu verteidigen, jene denen kein Preis zu hoch ist. Die meisten von ihnen finden sich in der Polis, oder dem Spartanerorden der Ranger, doch manche von ihnen wählen auch einen anderen Weg...\n\nBekannt für seinen scharfen taktischen Verstand und seine zuverlässliche Art baute sich Stortbeker schnell einen beachtlichen Ruf im Reich auf. Doch wo andere für ihre Unfähigkeit oder ihre Hinterhältigkeit verbannt wurden, so wurde er verbannt, da er ein zu großes Risiko für den Führer darstellte.\n\nZu beliebt wurde er unter der SS, zu mächtig wurden seine Verbindungen. Egal wie aussichtlos die Mission auch schien, die der Führer seinem erfolgreichsten Stalker auch auftrug, stets kehrte er siegreich zurück. Bis er uns seine Männer eines Tages schließlich der Verschwörung beschuldigt und verbannt wurden. Ins Exil getrieben folgten ihm eine handvoll Männer, doch anstatt den Tod zu finden meisterte Stortbeker auch diese Herausforderung und überlebte, seine Brigade nistete sich in der südlichen Metro ein. Trotz seiner Verbannung blieb Stortbeker dem Reich und seinen Idealen immer treu."

  RCH_stalker_captain:0 "Stalker-Hauptmann"
