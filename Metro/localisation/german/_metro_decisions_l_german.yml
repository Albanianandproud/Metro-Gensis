  conduct_war_games:0 "Unternimmt eine Manöverübung"
  conduct_war_games_desc:0 "Alle unsere Streikräfte werden an einem umfasenden Manöver teilnehmen, was ihre Einsatzbereitschaft erheblich verbessern wird."

  military_theory_analysis:0 "Militäranalysen"
  military_theory_analysis_desc:0 "Aus den Kriegen von Heute und Gestern kann ein kluger Mann lernen, die Kriege von Morgen zu gewinnen."

  conduct_r_and_d:0 "Forschung direkt im Felde"
  conduct_r_and_d_desc:0 "Wir haben nicht mehr wie früher weitreichende Areale in denen wir beliebig unsere neusten Waffen testen können. Dafür können wir jedoch unsere Schlachtfelder nutzen. Sogar mit echten Testpersonen!"

  train_the_troops:0 "Bildet die Rekruten aus"
  train_the_troops_desc:0 "Bildet die Rekruten aus"
