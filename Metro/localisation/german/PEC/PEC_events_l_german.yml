 nf_PEC.3.t: "Schlechte Gesundheit"
 nf_PEC.3.d: ""
 nf_PEC.3.a: "Stepanov scheint nicht mehr viel Zeit zu haben"

 nf_PEC.4.t: "An der Tür des Todes"
 nf_PEC.4.d: "Denn was viele befürchtet hatten, ist endlich eingetroffen. Stepanov hat nach Jahren des Kampfes gegen den körperlichen Verfall endlich sein Ende gefunden. Im Vertrauen darauf, bettlägerig zu sein, wartet der alte Mann auf seine Abreise. Da nur noch wenige Tage zu leben sind, trauern viele Mitglieder seiner Regierung und der Konföderation und erweisen ihm ihren Respekt. Die Frage, die weiterhin in aller Munde ist, bleibt bestehen."
 nf_PEC.4.a: "Wer wird nun die Konföderation führen?"

 nf_PEC.5.t: "Verjüngung"
 nf_PEC.5.d: ""
 nf_PEC.5.a: ""

 nf_PEC.6.t: "Bormanns Bande"
 nf_PEC.6.d: "Bormanns Aktivitäten haben in den letzten Monaten immer weiter zugenommen, als die Autorität der Konföderierten nach Stepanovs Tod zerfiel. Da sein Nachfolger noch immer in Frage steht, haben Bormanns Punks ihre Operationen langsam aus ihrem Revier von [409.GetName] ausgeweitet. Bormanns anfängliches Faible für die Petschatniki-Konföderation ist in den letzten Wochen schwächer geworden; Aber den Bürgern unter seinem Herrschaftsgebiet hält er noch immer die Treue."
 nf_PEC.6.a: "Machen Sie Bormann ein Angebot, das er nicht ablehnen kann"
 nf_PEC.6.b: "Die Konföderation ist gefallen"

 nf_PEC.7.t: "Die Feuertaufe"
 nf_PEC.7.d: "Mit dem Zerfall der Petschatniki-Regierung haben die Banditen auf der Koschuchowskaja beschlossen, ihre Operationen auf außerhalb der Station auszuweiten. Anstatt die Beamten von Pechatnikov fürs Wegschauen zu bezahlen, setzen sie nun stattdessen auf Drohungen und Provokationen, um ihre Ziele zu verfolgen."
 nf_PEC.7.a: "Und er entsagte Satan."

 nf_PEC.8.t: "Der esoterische Herold"
 nf_PEC.8.d: "Teilweise aufgrund des kürzlichen Tods von Stepanov hat Golubev seine Anhänger in fanatische Raserei versetzt. Wir vertreten den Standpunkt, dass der Tag gekommen ist, an dem die südliche Metro freigelegt werden muss. Ihr Gott ruft ihn, und irgendwo im tiefen Süden wird seine Person in unserem Universum Gestalt annehmen. Seine Lakaien weigern sich, Arbeitseinsätze anzunehmen und bereiten sich darauf vor."
 nf_PEC.8.a: "Es ist viel zu außer Kontrolle geraten. Werdet ihn einfach los."
 nf_PEC.8.b: "..."
 nf_PEC.8.b.tooltip: "Die Entscheidung für diese Option könnte ÜBLE Konsequenzen für die Konföderation haben"

 nf_PEC.9.t: "Die Ankunft von Hastur"
 nf_PEC.9.d: "Ob er aus dem zerfallenden Zustand der Konföderation Kapital schlagen wollte oder ob er einen unbekannten Zweck verfolgte, Golubev hat seine Anhänger in Aufruhr versetzt. Sein Gesindel schießt nun äußerlich auf Petschatnikow-Soldaten, sobald sie sie sehen. Treueschwur nicht gegenüber den Pechatniki, sondern gegenüber Golubev und der Bruderschaft selbst."
 nf_PEC.9.a: "Bald wir er kommen, bald kommt unsere Zeit."

 nf_PEC.10.t: "Pechatniki-Konföderation"
 nf_PEC.10.d: "Das Dezentralisierungsproblem der Konföderation dürfte nur ein Nebenthema sein; im Vergleich zu den Mutanten aus dem Süden und dem Vordringen der Hanse im Norden. Mit der Führung der Konföderation durch Stepanow werden diese Probleme jedoch hoffentlich gelöst."
 nf_PEC.10.a: "Hoffentlich steht die Konföderation das durch"
 PEC_civil_war_warning: "Wenn unsere £stability_icon §YStabilität§! unter §Y25%§! sinkt, oder wir in einen §YKrieg§! mit einer anderen Nation der Metro gezogen werden, während wir den §YStabile Republik§! Nationalgeist besitzen, wird unser Volk sicherlich gegen uns §Raufbegehren§!."

 nf_PEC.11.t: "Unser Ding"
 nf_PEC.11.d: "Angeführt wird das Gesindel von einem Mann namens Bormann. Als Pakhan des örtlichen Verbrechersyndikats belästigt und erniedrigt seine Verbrechertruppe regelmäßig Händler und versucht, für den „Schutz“, der durch Kozhukhovskaya fährt, eine exorbitante Summe zu verlangen. Im Gegensatz zu anderen Banditenstationen hält Bormann seine Räuber jedoch davon ab, die Bewohner der Pechatniki zu belästigen oder überhaupt größere Verbrechen zu begehen. Unsere Versuche sie zu beseitigen, eskalierte die Spannungen mit unseren Streitkräften nur."
 nf_PEC.11.a: "Das ist nicht gut"

 nf_PEC.12.t: "Umgang mit der Narco-Mafia"
 nf_PEC.12.d: "Bormanns Bande hat sich auf der Kozhukhovskaya niedergelassen und ist dort nun fest verankert, verkauft Drogen und zwingt vorbeikommende Händler, eine hohe Maut zu zahlen. Obwohl sie scheinbar den Frieden wahren wollen und schwören, dass sie der Konföderation nichts Böses wollen, ist unsere Autorität gegenüber der Kozhukhovskaya erheblich gesunken."
 nf_PEC.12.a: "Sie werden mit Sicherheit ein ständiger Dorn im Auge sein."

 nf_PEC.13.t: "Bruderschaft des Gelben Zeichens"
 nf_PEC.13.d: "Die unglücklichen Gerüchte, welche die Station Petschatniki heimsuchen, haben tatsächlich eine gewisse Wahrheit. Die Mehrheit der Bevölkerung besteht, wie in den meisten Stationen, aus guten, fleißigen Leuten; Aber ein paar faule Äpfel verderben den ganzen Ruf der Gruppe.\n\nSie nennen sich selbst einfach die Bruderschaft in Gelb und sie sind in zerfetzte Lumpen gehüllt – die eher den Eindruck von Pissflecken als von gelbem Pigment erwecken. Golubevs Pöbel hat keine Lust mehr auf seine wilden Streifzüge, während sie auf die nächste warme Mahlzeit warten. Sie glauben, dass die Apokalypse der erste Schritt zur Umsetzung ihrer Pläne war, ihren vermeintlichen Gott in unser Reich zu bringen. Unsere Sicherheitskräfte sind sich nicht ganz sicher, wann dieser Golubev aufgetaucht ist und ob er schon immer auf der Station Petschatniki gelebt hat. Einige glauben stattdessen, dass er direkt aus den südlichen Tunneln hier her kam. Was auch immer der Fall sein mag, seine Anhänger vergöttern ihn, und noch mehr seine Ideale.\n\nGolubev hat sich ein ziemlich großes Arsenal an Waffen und Munition angesammelt, wie unsere Sicherheitskräfte vermuten lassen. Er Versteckt sie an geheimen Orten, um sie vor unseren neugierigen Blicken zu schützen. Golubev schwört Gewissheit, dass ihr „Gott“ in körperlicher Form im Süden erscheinen wird, sobald diese Stationen ausgegraben sind."
 nf_PEC.13.a: "Unabhängig von diesen Gerüchten könnten wir diese Waffen gebrauchen"
 nf_PEC.13.a.tooltip: "\nWir werden diesen Golubev-Typen kontaktieren. Solange wir nicht den Zorn dieses kleinen Pöbels auf uns ziehen, möchte Golubev vielleicht unserem Militär mit seinem Überschuss helfen.,..\n\n...Hoffentlich fordert er seine Anhänger vorher auf, einmal zu duschen."
 nf_PEC.13.b: "Vertreiben Sie diesen alten Mann, sein Geschwafel hat in der Konföderation keinen Platz"
 nf_PEC.14.t: "Ziel von Verleumdung"
 nf_PEC.14.d: "Aufgrund dieser Gerüchte und in Verbindung mit dem sich verschlechternden Gesundheitszustand unseres Anführers meiden Händler unsere Stationen. Noch wichtiger ist, dass Händler aus der Rimskaja-Region und aus der Ferne ihr Interesse an Pechatnikov-Waren richten."
 nf_PEC.14.a: "Das ist nicht gut"

 nf_PEC.15.t: "Druck auf die [416.GetName]"
 nf_PEC.15.d: "Die Regierung von Pechatniki hat uns unter Druck gesetzt, [416.GetName] und angrenzende Stationen ihrem Einflussbereich zu überlassen. Sie lehnen die Legitimität der derzeit eingesetzten Regierung ab, obwohl wir diese Positionen schon seit geraumer Zeit innehaben. Abgesehen von dem Versuch, unsere Streitkräfte zu erpressen und ihre Dorhungen mit einem Krieg, ist uns nicht bekannt wie sie sich verhalten würden, wenn sie ihren Willen nicht bekämen."
 nf_PEC.15.a: "Wir haben keine andere Wahl, als zu akzeptieren"
 nf_PEC.15.b: "Wir werden ihren Forderungen nicht nachgeben"

 nf_PEC.16.t: "Druck zeigt Erfolgt"
 nf_PEC.16.d: "Nachdem die örtlichen Stationsbehörden Druck auf die [416.GetName] ausgeübt hatten, hatten sie keine andere Wahl, als unseren Forderungen nachzugeben. Der Annexionsprozess ist derzeit im Gange und unsere Truppen rücken ein, um etwaige gesellschaftliche Störungen zu beseitigen."
 nf_PEC.16.a: "Wir sind siegreich"

 nf_PEC.17.t: "[From.GetNameDefCap] weigert sich [416.GetName] aufzugeben "
 nf_PEC.17.d: "Unsere Versuche, von [From.GetNameDef] den Austausch von [416.GetName] zu verlangen, wurden abgelehnt, so dass [416.GetName] weiterhin in ihrer Hand bleibt. Offensichtlich teilt [From.GetLeader] nicht unser Verständnis dieser Station als unserer rechtmäßigen Domäne. \n[Root.GetLeader] ist wütend und die diplomatischen Möglichkeiten, [416.GetName] zurückzuerhalten, scheinen ausgeschöpft zu sein."
 nf_PEC.17.a: "Das ist bedauerlich"
 nf_PEC.17.b: "Wir haben keine Wahl, es ist Krieg."

 nf_PEC.20.t: "Bürgerkrieg"
 nf_PEC.20.d: "Unzufrieden mit dem aktuellen Zustand der Konföderation haben sich mehrere Gruppen abgespalten und stehen unserer aktuellen Regierung nun offen feindlich gegenüber. Sie sammeln sich unter einer neuen Führung, die davon überzeugt ist, dass unsere Regierung die Konföderation ineffizient führt."
 nf_PEC.20.a: "Zu den Waffen!"

 nf_PEC.21.t: "Wahlen"
 nf_PEC.21.d: "Zwei prominente Persönlichkeiten haben sich von den anderen abgehoben und sich für die Führung der Petschatniki-Konföderation entschieden. Der Chef der bewaffneten Sicherheitskräfte Vedeneev. und der Leiter unserer Stalker Operationen Danilov. Beide hat einen großen Zuspruch gefunden, und es scheint, dass beide in der Lage seien wären, die Konföderation durch diese schwierigen Zeiten zu führen."
 nf_PEC.21.a: "Unsere Streitkräfte schlagen Vedeneev als nächsten Anführer vor"
 nf_PEC.21.b: "Die Stalker schlagen Danilov als nächsten Anführer vor"
 nf_PEC.21.c: "Stepanov erholt sich langsam"

 nf_PEC.22.t: "Provisorische Regierungsführung"
 nf_PEC.22.d: "Da jeder Vertreter der Provisorischen Regierung immer noch berechtigt ist, Steuern an die Petschatniki zu zahlen, verfügt der Provisorische Rat in den letzten Monaten durch die verbesserten Pilzerträgen und einer stetig wachsenden Pilzwirtschaft über weitaus mehr Ressourcen, die er für das Wachstum unseres Militärs delegieren kann."
 nf_PEC.22.a: "Diese Ressourcen sollten für unser Militär verwendet werden"
 nf_PEC.22.b: "Wir können die Ressourcen nutzen, um unsere eigene Industrie zu unterstützen"

 nf_PEC.23.t: "Mittel für Petschatniki"
 nf_PEC.23.d: "Unter der provisorischen Regierung wurden während der Wahlen viele der früheren Entscheidungen und Handlungen Stepanows vor seiner Krankheit beibehalten, bis ein lebensfähiger Führer gewählt werden konnte. Es wurden jedoch eine Reihe von Vorrechten in Anspruch genommen, insbesondere die Neuausrichtung auf zugewiesene Mittel für Petschatniki selbst. Zwei Befürworter vertreten die Idee, wie die Ressourcen entweder für unsere Streitkräfte oder für unsere Stalker ausgegeben werden sollten. Beide Entscheidungen haben ihre Befürworter und ihre jeweiligen Vor- und Nachteile."
 nf_PEC.23.a: "Verwenden Sie das Geld, um bessere Waffen zu kaufen"
 nf_PEC.23.b: "Verwenden Sie das Geld, um bessere Stalker-Ausrüstung zu kaufen"

