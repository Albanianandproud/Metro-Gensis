 STB_focus_14: "Присоединить станцию [PVL.GetName]"
 STB_focus_14_desc: "Стражам [PVL.GetAdjective] придется быть начеку не только из-за свирепых мутантов, но и из-за другой угрозы. [PVL.GetName] — главная цель нашего расширения, несмотря на сломанные герметичные ворота."
