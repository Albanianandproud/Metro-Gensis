l_german:
  DRY_anarchy: "Anarchie"
  DRY_anarchy_desc: "Auch wenn es hier von banditen wimmelt, wirklich das Sagen hat hier keiner."
  DRY_the_godfather: "Herr"
  DRY_pakhan: "Der Herr der Sukharevskaya"
  DRY_pakhan_desc: "Er nennt sich selbst der 'Herr der Sukharevskaya', auch wenn ihn sonst kaum einer ernst nimmt. Feige, manipulativ und grausam, kann er den Abschaum dieser Station dennoch manchmal in die von ihm gewünschte Bahn lenken."
  DRY_khan: "Khan"
  DRY_khan_desc: "Khan ist ein mystischer Philosoph und Reisender, der vermutlich bereits die gesamte Metro bereist hat. Oft spricht er in seltsamen Rätseln, oder in Begriffen, die seit dem großen Krieg in Vergessenheit geraten sind. Von sich selbst behauptet er die Reinkarnation von unter anderem Dschingis Khan zu sein, des weiteren scheint er hypnotische und fast schon telephatische Kräfte zu besitzen, sowie die Fähigkeit, in die Nähere Zukunft zu sehen."
 












