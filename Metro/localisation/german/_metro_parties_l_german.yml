 #community_desc:0 "Durch regelmäßige Wahlen und Abstimmungen entscheiden hier alle Bewohner gleichermaßen."

 council:0 "Räterepublik"
 council_noun:0 "Rat"
 council_desc:0 "Rat"
 #council_desc:0 "Aus der Masse der Bevölkerung stellen die klügsten Köpfe den Rat, der wiederum die Politik lenkt."

 oligarch:0 "Oligarchie"
 oligarch_noun:0 "Oligarchie"
 oligarch_desc:0 "Oligarchie"
 #oligarch_desc:0 "Eine kleine Gruppe wohlhabender und einflussreicher Leute kontrolliert diese Nation und duldet keine Einmischung seitens des Pöbel"

 dictatorial:0 "Diktatur"
 dictatorial_noun:0 "Diktatur"
 dictatorial_desc:0 "Diktatorisch"
 #dictatorial_desc:0 "Ein einzelner Herrscher übt in dieser Nation absolute Macht aus."

 ### community ####
 
 peoples_council:0 "Volkspartei"
 peoples_council_desc:0 "getreu den alten Soviet-Idealen wählen diese Bürger einen Rat, der ihre Politik durch Beratung und Volksentscheide umsetzt."

 militia_council:0 "Militärrepublik"
 militia_council_desc:0 "Eine militaristische Republik mit einer Zweiklassengesellschaft, nur wer im Militär gedient hat, ist ein vollwertiger Bürger. Das Militär regiert über das Volk, doch den Vollbürgern wird Mitsprache gewährt."

 democratic_republic:0 "Demokratische Republik"
 democratic_republic_desc:0 "Eine Demokratie gemäß den Idealen der alten Welt, ein seltener Anblick in der Metro."

 communal_party:0 "Kommune"
 communal_party_desc:0 "Hier gibt es keine Anführer und auch keinen Besitz, diese Gemeinschaft ist eine zivilisierte Form der Anarchie."

 ### council ###

 technocracy:0 "Technokratie"
 technocracy_desc:0 "Demokratie und Diktatur werden hier beide streng abgelehnt, diese Gesellschaft unternimmt den Versuch eine reine Meritokratie zu sein."

 labour_council:0 "Arbeiterrat"
 labour_council_desc:0 "Inspiriert von den frühen Soviets werden hier Arbeiter organisiert, um ein wahres Arbeiterparadies zu erschaffen."

 confederation:0 "Konföderation"
 confederation_desc:0 "Eine lose Organisation vieler verschiedener Gruppen, meist entstanden durch die Existenz eines gemeinsamen Feindes."

 military_junta:0 "Junta"
 military_junta_desc:0 "Eine reine Militärregierung, meist nur eine Übergangsform, in der Metro jedoch ein Konzept welches dauerhafte Stabilität gewährleisten kann."

 ### oligarch ###

 trade_alliance:0 "Handelsliga"
 trade_alliance_desc:0 "Eine Gruppierung zahlreicher Händler, deren einziger Zweck der Schutz des Wohlstandes seiner Mitglieder ist."

 plutocracy:0 "Plutokratie"
 plutocracy_desc:0 "Eine Regierung, in welcher nur die Reichen etwas zu sagen haben, jegliche Illusionen wurden hier einfach fallen gelassen."

 vanguard_party:0 "Populismus"
 vanguard_party_desc:0 "Die erfolgreichsten Aufwiegler der Massen haben hier die Regierung übernommen und sie tuen alles, damit ihnen das Volk gewogen bleibt."

 mafia_state:0 "Verbrechersyndikat"
 mafia_state_desc:0 "Eine lose Vereinigung an Gangstern verschiedener Gruppierungen. Ihr Syndikat ist nur dann effektiv, wenn sie tatsächlich mal ein gemeinsames Interesse verfolgen."

 ### dictatorial ###

 despot:0 "Despotismus"
 despot_desc:0 "Alle Macht liegt in der Hand eines Alleinherrschers, sein Wort ist Gesetz und Tyrannei ist hier die Regel, nicht die Ausnahme. Entgegen dem Totalitarismus herrscht hier keine besondere Ideologie, soindern das reine Faustrecht."

 king_desc:0 "Ein ungewohnter Anblick, doch diese Fraktion hat ihren Herrscher zum König erhoben. Damit ist er aber auch nur wenig mehr als ein Despot mit Titel."

 bandit:0 "Banditen"
 bandit_desc:0 "Eine kriminelle Bande hat hier das Sagen und hält ihre Hierarchie mit Brutalität aufrecht."

 totalitarianism:0 "Totalitarismus"
 totalitarianism_desc:0 "Eine Gesellschaft in welcher der Staat und seine Ideologie absolut sind. Persönlichkeitsrechte und Privatleben gibt es hier nicht, der Mensch gehört seiner Regierung."

