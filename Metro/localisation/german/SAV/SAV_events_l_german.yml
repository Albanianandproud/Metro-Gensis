l_german:
 nf_SAV.2.t: "Satanistische Überfälle"
 nf_SAV.2.d: "Die satanistischen Kräfte der Timiryazevskaya haben einen verdeckten Angriff auf unsere Station gestartet. Indem sie durch die Dunkelheit schlichen, gelang es ihren Streitkräften, durch unsere Verteidigungsanlagen zu schlüpfen, nur um in unserer Station Chaos anzurichten. Obwohl es uns gelang, die Schläger letztendlich zurückzudrängen, gelang es ihnen nicht auch nur einen von ihnen zu töten. Stattdessen töteten sich mehrere der Kultisten lieber selbst, als uns in die Hände zu fallen.\nObwohl es sich um einen Sieg gegen die Mächte der Dunkelheit handelte, hat die Tatsache, dass sie unentdeckt blieben, unsere Bevölkerung verstört und viele fühlen sich nun unsicher."
 nf_SAV.2.a: "Sie werden schon bald bezahlen."

 nf_SAV.3.t: "Die Allianz zerfällt"
 nf_SAV.3.d: "Gezeichnet von Streitigkeiten und Kontroversen, hat das Bündnis seinen Belastungspunkt längst überschritten. Die Station Tsvetnoy Bulvar hat angesichts der Sinnlosigkeit des Experiments „Savyolovskaya-Allianz“ heute beschlossen, sich aus dem Bündnis zu lösen."
 nf_SAV.3.a: "Einige weinten, aber die meisten schauten einfach nur zu."

 #nf_SAV.4.d: ""
 #nf_SAV.4.t: ""
 #nf_SAV.4.a: ""

 nf_SAV.5.t: "Wieder im Sattel"
 nf_SAV.5.d: "Nach einiger Überzeugungsarbeit und gegen eine finanzielle Entschädigung für seine Mühen konnte einer der ursprünglichen Erfinder des ersten Flammenwerfers dazu bewegt werden, seine Arbeit wieder aufzunehmen und die Konstruktion fortzusetzen. Sobald wir die für seine Tätigkeit erforderlichen Werkzeuge und Ausrüstungsgegenstände beschafft haben, kann er mit der Arbeit beginnen."
 nf_SAV.5.b: "Hoffentlich werden diese Bemühungen Früchte tragen."
 nf_SAV.5.b.tt: "Es wird Zeit für die Arbeit an einem neuen, iterativen Design des Flammenwerfers aufgewendet."

 nf_SAV.6.t: "Der erste Maßstab"
 nf_SAV.6.d: "Auch wenn zwanzig Jahre einen Mann verändern können, machte sich unser Techniker schon bald wieder an die Arbeit, um die Konstruktion jener ersten, vor Jahren eingesetzten improvisierten Flammenwerfer zu verbessern. Dies ist natürlich ein weitaus langwierigerer Prozess, da nur ein einziger Schmied an der Entwicklung arbeitet und kein halbes Dutzend. Es wurden bereits erste Entwürfe für überarbeitete Prototypen ausgearbeitet, die Konstruktion und Effizienz weiter steigern sollen; die entsprechenden Tests stehen jedoch noch aus."
 nf_SAV.6.a: "Dieser Entwurf reicht fürs Erste."
 nf_SAV.6.b: "Fahren Sie mit diesem Projekt fort."
 nf_SAV.6.b.tt: "Es wird mehr Zeit darauf verwendet, das Design des Flammenwerfers zu verfeinern."

 nf_SAV.7.t: "Weitere Designs"
 nf_SAV.7.d: "Durch zusätzliche Zeit, die in die weitere Optimierung der Effektivität des ursprünglichen Flammenwerfer-Designs aus dem Jahr 2014 investiert wurde, ist eine noch leistungsfähigere Konstruktion entstanden. Obwohl das Gerät nach wie vor aus herumliegenden Schrott- und Ersatzteilen zusammengebaut ist, hat es sich als weitaus zuverlässiger erwiesen als frühere Ausführungen; und auch wenn der Kraftstoffverbrauch nach wie vor ein zentrales Problem darstellt, ermöglicht die Bauweise einen einfachen Austausch des Brennstoffs."
 nf_SAV.7.a: "Wir werden diese gut nutzen."

 nf_SAV.8.t: "Bildung der Savyolovskaya-Allianz"
 nf_SAV.8.d: "Das Streben nach Einheit hat Früchte getragen, und heute haben sich unsere Stationen zusammengeschlossen, um eine Gemeinschaft gemeinsamer wirtschaftlicher und militärischer Interessen zu bilden."
 nf_SAV.8.a: "Das ist ein herrlicher Tag!"

 nf_SAV_trade.1.t: "Händler von der Mendelejewskaja"
 nf_SAV_trade.1.d: "Obwohl die Allianz durch die Kolzewskaja-Linie zweigeteilt wurde, war es ihr gelungen, mit der Station Mendelejewskaja eine Vereinbarung über die freie Durchfahrt sowie den Zugang zu vielen der dort angebotenen Waren zu treffen. Angesichts der zunehmenden Zentralisierung der Hansa in den letzten Monaten ist es jedoch höchstwahrscheinlich, dass Mendelejewskaja in die Allianz eingegliedert wird. Damit dürften die steuerfreien Vorteile, die die Hansa mit Sicherheit voll ausschöpfen würde, für uns der Vergangenheit angehören."
 nf_SAV_trade.1.a: "Gut zu wissen."

 nf_SAV_dimitrovskaya.1.t: "Erkundung von Dimitrowskaja"
 nf_SAV_dimitrovskaya.1.d: "Unsere Einsatztrupps haben Dimitrowskaja von jeglichen Bedrohungen gesäubert, die unsere Kolonisierungsbemühungen hätten behindern können. Die Station ist nach wie vor verlassen; es gibt keinerlei Anzeichen für jüngste Aktivitäten oder auch nur für die sonst häufig anzutreffenden überdimensionalen Ratten. Die Station wirkt unheimlich leer; lediglich die Ruinen aufgegebener Behausungen säumen noch die Bahnsteige. Unsere Soldaten sind bereits dabei, Barrikaden zu errichten und die Station für eine künftige Wiederbesiedlung durch unsere Bevölkerung zu sichern."
 nf_SAV_dimitrovskaya.1.a: "Das ist gut zu wissen."

 nf_SAV_dimitrovskaya.2.t: "Wiederbesiedlung von Dimitrowskaja"
 nf_SAV_dimitrovskaya.2.d: "Während die Wiederbesiedlung von Dimitrowskaja voranschreitet, kommen die neuen Bewohner der Station gut mit ihrer neuen Umgebung zurecht. Es sind weder Ratten noch Mutanten in Sicht – so seltsam das auch erscheinen mag. Die Ruinen verlassener Behausungen sind weitgehend intakt geblieben und können von unserer Bevölkerung einem neuen Nutzen zugeführt werden."
 nf_SAV_dimitrovskaya.2.a: "Alles scheint gut zu laufen."

 nf_SAV_dimitrovskaya.3.t: "Schreie der Verdammten"
 nf_SAV_dimitrovskaya.3.d: "In den letzten Monaten hat sich Dimitrowskaja einen weitaus übleren Ruf eingehandelt. Zwar kamen und gingen die Geschichten von Rattenhorden, und um die düsteren, feuchten Gänge und Bahnsteige ranken sich unzählige Schauergeschichten, mit denen man unartige Kinder erschreckt, doch mittlerweile scheint die gesamte Bevölkerung in helle Aufregung versetzt worden zu sein.\n\nBerichten zufolge ist Trommellärm zu vernehmen, und aus dem Tunnel in Richtung Timirjasewskaja steigt ein kränklich roter Dunst auf; wer ganz still ist, kann zudem das tiefe Raunen von Sprechchören aus jener verfluchten, verlassenen Station herüberdringen hören. Unsere Bürger meiden es, sich allein zu bewegen, und halten sich lieber in der Nähe der wenigen, spärlich brennenden Lagerfeuer auf – weit weg von der Dunkelheit."
 nf_SAV_dimitrovskaya.3.a: "Diese sich entwickelnde Situation muss gelöst werden – und zwar schnell."
 nf_SAV_dimitrovskaya.3.a.tt: "Schaltet „Schreie aus der Timirjasewskaja“-Fokuss-Zweig frei."

 nf_SAV_dimitrovskaya.4.t: "Entführungen an der Dimitrowskaja"
 nf_SAV_dimitrovskaya.4.d: "Es häufen sich Berichte über Entführungen an der Station Dimitrowskaja. Während das Verschwinden von Bürgern zunächst auf lauernde Mutanten oder auf Menschen zurückgeführt wurde, die sich still und heimlich auf die Suche nach einem besseren Leben gemacht hatten, scheinen nun weitaus perfidere Ursachen dahinterzustecken.\n\nInnerhalb weniger Wochen sind fast ein Dutzend unserer Bürger verschwunden; einige wurden offenbar mitten in der Nacht direkt aus ihren Zelten und Unterkünften geholt – als wären sie entführt worden. Unsere Garnison schiebt Sonderschichten, um die bislang erfolglosen Suchaktionen zu bewältigen."
 nf_SAV_dimitrovskaya.4.a: "Diese Farce der satanischen Panik endet hier!"
 nf_SAV_dimitrovskaya.4.a.tt: "Ermöglicht uns die Wahl des Fokus „Weder Heilige noch Sünder“ und gewährt uns ein Kriegsziel gegen die Satanisten."

 nf_SAV_puppet.1.t: "[SAV.GetName] verlangt die Unterwerfung"
 nf_SAV_puppet.1.d: "[SAV.GetName] hat uns ein Ultimatum gestellt: Wir sollen uns ihnen unterwerfen und unserer Regierung gestatten, vor ihrem Regime zu kuschen – oder uns bei einer Weigerung wirtschaftlichen und womöglich militärischen Maßnahmen stellen."
 nf_SAV_puppet.1.a: "Wir müssen uns ihrem Willen beugen."
 nf_SAV_puppet.1.b: "Wir werden uns vor niemandem beugen!"

 nf_SAV_puppet.2.t: "[From.GetName] lehnt das Ultimatum ab"
 nf_SAV_puppet.2.d: "[From.GetName] hat sich geweigert, unserer Forderung nachzukommen, unser Untertan zu werden."
 nf_SAV_puppet.2.a: "Sie werden lernen, ihre Entscheidung zu bereuen."

 nf_SAV_politics.1.t: "Unsichere Horizonte"
 nf_SAV_politics.1.d: "Angesichts wachsender Spannungen und der zahlreichen Probleme, mit denen die Allianz konfrontiert ist, bezweifeln viele, dass wir die Lage im Griff behalten und die Allianz als Einheit zusammenhalten können. Auch wenn diese Gerüchte bislang nicht über bloßes Gerede unter Kameraden hinausgehen und niemand es wagt, seinen Unmut öffentlich zu äußern, deutet die zunehmend gedrückte Stimmung darauf hin, dass diese Probleme früher oder später ans Licht kommen werden. Vasyurkov steht ein langer Weg bevor, wenn seine Bemühungen Früchte tragen sollen."
 nf_SAV_politics.1.a: "Die Dinge werden besser werden ... oder?"

 nf_SAV_politics.2.t: "Wahl eines neuen Amtsträgers"
 nf_SAV_politics.2.d: "Die Entscheidung, Wasjurkow abzulösen, ist bereits in Gang gesetzt worden; nun gilt es zu bestimmen, wer seine Nachfolge antreten soll. Abramow, der Stationschef des „Zwetnoi Bulwar“, begnügt sich damit, die zahlreichen zwielichtigen Etablissements seiner Station zu führen, und überlässt die Entscheidung darüber, wer die Allianz regieren soll, ganz den Führungspersönlichkeiten von der „Sawjolowskaja“. Drei aussichtsreiche Kandidaten kommen für die Übernahme der Führungsrolle infrage:"

 nf_SAV_politics_2.a: "Makharadze"
 nf_SAV_politics_2.b: "Ishchuk"
 nf_SAV_politics_2.c: "Reznitsyn"

 nf_SAV_politics.3.t: "Vertrauensbruch"
 nf_SAV_politics.3.d: "Gerüchte über Wasjurkow und das Privatleben seiner Frau verbreiten sich in Sawjolowskaja wie ein Lauffeuer. Schon lange kursieren Geschichten über die Untreue seiner Frau, doch nun scheinen sie den Kritikern des Anführers als Munition zu dienen. Berichte über heimliche Treffen und Affären stehen zunehmend im Fokus der öffentlichen Aufmerksamkeit und schaden Wasjurkows Ansehen.

Insbesondere seine Gegner befeuern dieses Gerede mit der Behauptung, ein Anführer, der seinen eigenen Haushalt nicht im Griff habe, sei womöglich auch nicht geeignet, die Allianz zu führen."
 nf_SAV_politics.3.a: "Kindischer Klatsch wird unsere Entscheidungen nicht beeinträchtigen."

 nf_SAV_politics.4.t: "Zweifel in der Allianz"
 nf_SAV_politics.4.d: "Nach den jüngsten Spannungen um Vasyurkovs Führung der Allianz haben sich die kritischen Stimmen zu seiner Amtsführung verstärkt. Zwar äußern nur wenige Zweifel an seiner Kompetenz, die Allianz voranzubringen und vor dem völligen Zusammenbruch zu bewahren, doch sind diese öffentlichen Stimmen inzwischen zu laut geworden, um sie gänzlich zu ignorieren."
 nf_SAV_politics.4.a: "Diese Situation muss gelöst werden."
 nf_SAV_politics.4.a.tt: "Politischen Zweig freischalten"