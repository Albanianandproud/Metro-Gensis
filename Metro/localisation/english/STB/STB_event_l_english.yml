l_english:
 nf_STB.1.t: "Into the Night"
 nf_STB.1.d: "Stortebeker had served faithfully.\n\nEvery order had been executed without hesitation. Every directive enforced without question. Loyalty seemed enough, and proven time and time again.\n\nStortebeker had read the reports, even personally signed some of them. A name whispered for too long and then - no longer. As if they had never existed at all. Stortebeker knew where it would lead, and did not hesitate to find out.\n\nThose who followed, already made their choice. Loyal may not have been a strong word, but helpless to some extent. They moved quickly. Supplies, weapons, anything which could be carried into the dark without prompting attention.\n\nThere is a station, long abandoned. Forgotten by all. Far from the prowling sorties of the Reich and now our temporary home."
 nf_STB.1.a: "[STB.Capital.GetName], our new home."
 nf_STB.2.t: "Resource Procurement"
 nf_STB.2.d: "[STB.Capital.GetName] might have been the worst place our Brigade could have set up ourselves in. Seeping radiation, rampant mutants and anomalies. Perhaps to some extent, it is the perfect hideaway until we can lick our wounds and regroup. Nobody would dare look for us here.\n\nThe need to regroup and consolidate could never not be more dire as it stands. Supplies are quickly running out; ammunition, medicine, gear. We'll be eating our leater boots, or eachother not before long."
 nf_STB.2.a: "Carefully, we must reach out and procure our needs. Even by force."
 nf_STB.3.t: "Unbound Potential"
 nf_STB.3.d: "Arriving under the observant gaze of a quater of a dozen armed guards, it almost appeared as though they acted like the sortie escorting a convict. The Scientist in question, Dr. Todorov is by all surviving accounts, a brilliant man. His work had enraptured the gleam of the Reich, and had it not been his questionable ethics and methods bordering the abhorrent even for the Fuhrer, then the Reich Triangle may have even rivaled Polis in terms of scientific brilliance. Rumours, as always followed his footsteps. Whispered accounts of wretched experiments that blurred the line between medicine and savagery, of subjects who never meant to survive and yet somehow did.. transformed.\n\nHe walked willingly into our domain, eyes affixed with fascination, like stepping into a grand laboratory rather than the crumbling wreckage of a broken station seeping with radiation. With his hopes that he may accelerate our research efforts significantly, however cooperation comes with a cost. Access to subjects and to pursue his 'curiosity' wherever it may lead.\n\nSome amongst our ranks already call him a monster, and only few see promise."
 nf_STB.3.a: "Let him work. We shall decide what is necessary."
 nf_STB.4.t: "Willing Obedience"
 nf_STB.4.d: "Dr. Todorovs request came formally, neatly documented in the form of a written envelope. It may have been mocked as a joke, if more than a third of our Brigade could read or write. Dr. Todorov seemed eager for subjects, he asked politely. Not simply random samples of rats he had initially had before no. He clarified - living subjects. Conscious, not sickly nor old or infirm. His scribbles were meticulous, filled with annotations and diagrams which suggested a morbid clarity of purpose.. Far more unsettling than madness ever could conceptualize.\n\nAs natural, questions arrived. And without hesitation, the Doctor answered.\n\n. The human form, came with limits, he told us. With limits, are best observed when exceeded.\n\n We have no shortage of prisoners, dregs and others who could be subjects. With the Brigade always unable to afford the bullets for a decisive execution to cut the chaff, perhaps the scapel may be the next best method?\n\nThe Doctor waits."
 nf_STB.4.a: "Allow his experiments."
 nf_STB.4.b: "This is absolute madness."
 nf_STB.5.t: "Supersoldaten Projekt"
