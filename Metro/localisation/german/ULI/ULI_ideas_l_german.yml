l_german:
 ULI_1905_confederation: "§Y1905 Konföderation§!"
 ULI_1905_confederation_desc: "Eine gemäßigt linksgerichtete Gemeinde auf der §YTagansko-Krasnopresnenskaya§!-Linie. Sie streben nach kollektivistischen Idealen und halten an marxistischen Überzeugungen von Gleichheit und Wohlfahrt fest, um die Konföderation als Ganzes zu stärken. Die Konföderation von 1905 war nach dem plötzlichen Zusammenbruch des §CZentralen Metrokommandos§! sich selbst überlassen. Ursprünglich wurde versucht, engere Beziehungen zur neu gegründeten §RRoten Linie§! anzustreben, jedoch wurde zuvor die Macht in der gesamten Konföderation durch ihren derzeitigen Herrscher, §YIlya Zotov§!, ergriffen!, der so zum selbsternannten und selbstgewählten Oberhaupt der Konföderation wurde und einer Übernahme durch die Rote Linie so zuvor kam."

 ULI_1905_station_factionalism: "Stations-§RZersplitterung§!"
 ULI_1905_station_factionalism_desc: "Diese Fraktion ist praktisch eine Konföderation und wird intern durch politische Widersprüche und kleinliche Streitigkeiten zerrissen. Da die Verhandlungsschwierigkeiten zwischen den Stationen zum Teil aus wirtschaftlichen Gründen bestehen, sind sinnvolle Kooperationsbemühungen zwecklos."

 ULI_1905_station_hanseatic_troubles: "Probleme mit der Hanse"
 ULI_1905_station_hanseatic_troubles_desc: "Direkt neben der §YRinglinie§ zu liegen bietet lukrative wirtschaftliche Perspektiven. Allerdings dient es auch als Schleusentor für hanseatische Kaufleute und unabhängige Handelskarawanen. Feinere Waren, größere Waffen, weniger kaputte Schmuckstücke. In Zeiten solch wirtschaftlicher Aussichten werden ideologische Prinzipien beiläufig auf der Strecke gelassen – die Vorteile machen die Vernachlässigung sicherlich wett. Oder?"

 ULI_polezhaevsky_incident: "Polezhaevsky-Vorfall"
 ULI_polezhaevsky_incident_desc: "Nach dem überraschenden Verschwinden von über 100 Bürgern der Konföderation beschlossen die Stationsleiter, das nördliche Territorium aufzugeben. Dies hatte den unbeabsichtigten Effekt, dass die Führung nur noch weiter in Frage gestellt wurde. Ihre Autorität wurde durch diesen Vorfall erheblich geschwächt."

 ULI_1905_aftermath_coup: "Gescheiterte Machtübernahme"
 ULI_1905_aftermath_coup_desc: "Früher pflegte die Konföderation von 1905 enge Beziehungen zur Roten Linie. Tatsächlich kamen sie sich dabei so nah, dass es Diskussionen über eine Vereinigung zwischen den beiden Staaten gab. Diese Gespräche scheiterten jedoch schnell als bekannt wurde, dass die Rote Linie ihre eigenen Beamten in unsere Regierung eingeschleust hatte und plante, die Macht vollständig zu übernehmen. Ohne auf eine Intervention zu warten, übernahm Zotov schnell die Macht und wurde zum selbstgewählten Oberhaupt der Konföderation. Die Beziehungen zwischen der Roten Linie und der Konföderation sind seitdem kalt."

