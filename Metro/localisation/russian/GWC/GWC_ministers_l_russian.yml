GWC_herald_of_the_worm: "Великий Молот"
GWC_herald_of_the_worm_desc: "Взяв на себя смелость донести слово Червя, Великий Молот сумел выстоять, несмотря на все невзгоды и опасности, когда многие из его собратьев в конечном итоге погибли. С возрастом к нему пришло уважение многих наших членов, которые боготворили его невероятные подвиги."
_GWC_herald_of_the_worm_trait: "Вестник о приближении червей"

GWC_kulak: "Кулак"
GWC_kulak_desc: "Один из первых, кто прислушался к слову Великого Червя, Кулак является одним из самых преданных отступников Червя. Подчиняясь приказам Жреца, он полностью подчиняется ему. Благодаря этому многие в рядах: новички или погребенные слушаются самого Жреца."
_GWC_hypnotizer: "Гипнотизер"
_GWC_hypnotizer_2_trait: "Гипнотизер"

GWC_vartan: "Вартан"
GWC_vartan_desc: "Вартан - согбенный и тощий человек в одних лохмотьях, от которого пахнет испорченным мясом, он следит за соблюдением надлежащего ритуала употребления мяса в пищу."
