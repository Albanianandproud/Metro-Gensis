l_german:
 nf_SAT.1.t: "Sieg gegen das Kalifat"
 nf_SAT.1.d: "Unsere Kultisten schafften es im Schutze der Dunkelheit die Wachen des Kalifates zu überwältigen un die restlichen Kräfte zurückzustoßen. Der Wachposten sowie der gesamte Tunnel gehören nun uns."
 nf_SAT.1.a: "Sie werden niederknien und ihren toten Gott verleugnen"

 nf_SAT.2.t: "Niederlage"
 nf_SAT.2.d: "Trotz allen Einsatzes den unsere Kräfte zeigten, reichte es nicht um den Feind zu besiegen. Wir wurden geschlagen"
 nf_SAT.2.a: "Sammelt unsere Kräfte von Neuen, wir kommen wieder"
 nf_SAT.2.b: "Ihre Zeit wird kommen"

 nf_SAT.3.t: "Grenzkonflikt abgebrochen"
 nf_SAT.3.d: "Beide Seiten haben noch keinen Schuss abgegeben und niemand will den Ersten Schritt wagen. Vielleicht verfolgen sie aber auch...größere Pläne."
 nf_SAT.3.a: "Es gibt Dringlicheres für uns"

 nf_SAT.4.t: "Sieg gegen die Satanisten"
 nf_SAT.4.d: "Unsere Kräfte haben die Wahnsinnigen von der Timiryazevskaya erfolgreich zurückgestoßen. Wie es aussieht verrät Satan noch immer jene, die ihm am Nächsten stehen."
 nf_SAT.4.a: "Wir drängen diese Ungläubigen zurück!"

 nf_SAT.5.t: "Schüler des Shaitan" 
 nf_SAT.5.d: "Geduldig warteten wir auf den richtigen Momemtn zum Zuschlagen. In der Dunkleheit sammelten wir unsere Kräfte und bald schon ist es soweit. Die gesamte Metro wird vor uns niederknien!" 
 nf_SAT.5.a: "Mit diesen Werkzeugen werden wir den Südlingen das Fürchten lehren...." 

 nf_SAT.6.t: "Krieger des Moloch"
 nf_SAT.6.d: "Unsere Krieger werden Furcht in die Herzen der Südlinge treiben. Sobald die Rattenmenschen getilgt wurden, richten wir unseren Blick nach Süden. Einen Pfad des Todes werden wir durch die Linien unserer Feinde schlagen und unsere Feinde werden die Wände an der Timiryazevskaya schmücken."
 nf_SAT.6.a: "Stolz und furchtlos werden wir Unaussprechliches begehen...."

 nf_SAT.7.t: "Die Schwächlinge vertreiben"
 nf_SAT.7.d: "Es war einfacher als ursprünglich angenommen, die Vagabunden zu provozieren und sie aus ihren Wohnsitzen zu vertreiben. Die Lichter ihrer provisorischen Lagerfeuer und Lichter beleuchteten die Tunnel und machten sie dadurch umso leichter zu erkennen. Das Geschützfeuer hielt mehrere Augenblicke an, als unser Stoßtrupp auf seine Wachposten traf, und in dieser Zeit wurde der Ausgang entscheidend vorhergesagt. Nachdem ihre Soldaten getötet worden waren, huschten viele weiter in die Tiefe, und diejenigen, die zu krank oder nicht schnell genug waren ..."
 nf_SAT.7.a: "Unsere Schläger lernten, wie man auf sich bewegende Ziele schießt"
 nf_SAT.7.b: "Unsere Schläger brachten sie als Gefangene zurück zur Timiryazevskaya"

 nf_SAT.8.t: "Vertreibt die Ratten" 
 nf_SAT.8.d: "Unsere Sorgen waren wahr. Unsere Wachposten legte einen großen frischen Köder zum Verweilen in die Dunkelheit und berichtete, dass eine riesige Gruppe Ratten gesehen wurde, die an dem Köder nagte. Der Boden unter ihnen krabbelte schwarz, und sobald die Taschenlampe eingeschaltet wurde, huschte die Horde augenblicklich zurück in die Dunkelheit. Der Köder wurde bis auf Knochen und alles abgestreift, und nur eine Pfütze Blut blieb zurück.\n\nSo wie die Rattenflut vor Jahren mit Flammenwerfern bekämpft wurde, können wir sie vielleicht noch einmal für einen guten Zweck einsetzen. Locken Sie die Ratten heraus und entfesseln dann die Flammen, um so ihre Körper zu Asche zu verbrennen."
 nf_SAT.8.a: "Da waren sie, so groß wie Hunde, und doch drängten wir sie zurück in die Tiefen"
 nf_SAT.8.b: "Ratten? Die Größe von Hunden? Igor, mein Freund, du musst dich von den Pilzen fernhalten.."

 nf_SAT.9.t: "Orte, die die Zeit vergaß" 
 nf_SAT.9.d: "An den vielen vergessenen Orten verweilte einst unsere Sekte. Viele haben unseren Namen und unsere Taten vergessen, aber irgendwann werden sich viele wieder daran erinnern, uns zu fürchten. In der Zwischenzeit konnten wir uns vorbereiten und sammeln. Als wir die Metro betraten, ließen wir viele Habseligkeiten zurück. Diese noch verlassenen Orte können nun geplündert werden. Dort finden wir sicherlich:" 
 nf_SAT.9.a: "Profane Texte, die zu widerlich sind, um sie laut vorzulesen" 
 nf_SAT.9.b: "Manuskripte, die die Herzen der Menschen erzittern lassen" 

 nf_SAT.10.t: "Versammelt den Kult" 
 nf_SAT.10.d: "Es wird angenommen, dass es noch andere Sekten von Satanisten gibt.An Orten, die unbekannt sind, die sogar uns unbekannt sind. Mit mehreren Versuchen und Stalker-Teams stießen wir auf eine Bande von Satanisten, zusammengekauert in der Krypta einer Kirche. Sie hatten sich in der Erde selbst eingegraben, in der Hoffnung, so in das Metro-System einzubrechen. Es war ihnen mit begrenztem Erfolg gelungen, Pilze zu züchten, obwohl sie letztendlich auf die Kannibalisierung von Oberflächenpirschern zurückgreiffen mussten. Die Wände und Gänge ihrer Behausung waren voller Blut und Beute, die sie davon mitgenommen hatten, als sie eigensinnige Stalker von der Oberfläche in ihre Fallen lockten.\n\nSie wurden überzeugt, sich unserer Herde anzuschließen." 
 nf_SAT.10.a: "Willkommen daheim" 

 nf_SAT.11.t: "Die Tiefen unter Kitay-Gorod" 
 nf_SAT.11.d: "Unterhalb der Banditenstation Kitay-Gorod liegt ein schier endloses Labyrinth aus Versorgungstunneln und Wartungsschächten. Viele unserer Anhänger leben noch immer dort, ausgestoßen, selbst unter den Ausgestoßenen. Wie werden wir mit dieser einzigartigen Gelegenheit umgehen?" 
 nf_SAT.11.a: "Bringt diese Kultisten nach Hause" 
 nf_SAT.11.b: "Die Macht über sie ist unser" 
 nf_SAT.11.c: "Zwingt ihnen unseren Willen auf" 

 nf_SAT.12.t: "Vernichtet die Allianz" 
 nf_SAT.12.d: "Im Süden liegt die Savyolovskaya-Allianz. Während sie mit inneren Angelegenheiten beschäftigt sind und die Fluten der Nazis abwehren, sind ihre nördlichen Stationen beinahe unbewacht. Allerdings sind auch ihre geringen Wachposten im Gegensatz zu den Kalifensoldaten nicht zu unterschätzen. In der Savyolovskaya lagern weiterhin viele Waffen, vor allem Flammenwerfer, die ihnen zur Verfügung stehen." 
 nf_SAT.12.a: "Beginnt den Überfall" 
 SAV_excursion_tt: "Wir werden einen Ausflug nach Savyolovskaya starten und in den benachbarten Stationen Chaos anrichten"

 nf_SAT.13.t: "In die Tiefen" 
 nf_SAT.13.d: "Je tiefer wir graben, desto näher können wir es durch die Ritzen hören. Das Flüstern. Es schreit. Suchend, wollend, dass wir näherkommen.\n\nWir sind nah.\n\nWir müssen tiefer graben.\n\nTiefer." 
 nf_SAT.13.a: "Es ist ein Zeichen, wir nähern un. Wir sind schon ganz nah" 
 nf_SAT.13.b: "Jetzt ist es nicht mehr weit. Wir müssen unsere Bemühungen fortsetzen." 

 nf_SAT.14.t: "Engel der Verdammnis" 
 nf_SAT.14.d: "Gangster, Gauner und sonstiger Abschaum hätten in jeder anderen Armee keinen Platz, doch für die Legionen des Gehörnten sind sie wie geschaffen. Hier überleben nur die stärksten, die brutalsten und die gnadenlosesten Schläger, die die Metro zu bieten hat. Was sie hier erleben werden wird ihnen den Verstand rauben und sie so zu treuen Dienern Satans machen." 
 nf_SAT.14.a: "Sie sind nur ein Vorgeschmack von Luzifers Zorn" 

 nf_SAT.15.t: "An den Toren..." 
 nf_SAT.15.d: "Wir haben es geschafft, endlich. Eine ensetzliche Finsternis liegt vor uns, dunkel und grauenvoll, doch an ihrem Ende brennen sie, die Feuer der Hölle. Endlose Schreie der Verdammten sind zu vernehmen, der Geruch von Schwefel umgibt uns. Ja, die Gerüchte waren wahr, nach so viel Arbeit ist es getan. Entfesseln wir die Hölle auf Erden." 
 ## Kingdom of the Ratmen / Actual skaven April Fools
 nf_SAT.15.a: "Eine Flut schwarzer Ratten kroch hervor und verschlag die Station." 
 ## Hell on Earth
 nf_SAT.15.b: "Die Tore der Hölle wurden geöffnet!" 