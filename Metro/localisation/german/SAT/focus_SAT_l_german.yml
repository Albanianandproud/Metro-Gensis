l_german:
SAT_1: "Der Pfad zur Verdammniss"
SAT_road_to_hell: "Um uns direkt in die Hölle graben zu können, braucht es Vorbereitung. Die Timiryazevskaya muss ausgebaut werden um dieses große Vorhaben durchführen zu können, auf dass wir endlich die Hölle auf Erden entfesseln können!\n\n"
SAT_2a: "Fanatischer Wahnsinn"
SAT_2a_desc: "Fanatismus und Wahnsinn sind die beiden Säulen, auf die unser Glauben beruht"
SAT_2b: "Wächter der Unterwelt"
SAT_2b_desc: "Das Tor zur Hölle befindet sich genau unter uns. Einen solch heiligen Ort können wir doch nicht einfach unbewacht lassen!"
SAT_3a: "Andere in der Finsternis"
SAT_3a_desc: "Noch andere Menschen leben nahe der Timiryazevskaya, weder die Muslime, noch die Menschen des Südens. Es scheint, als wären diese unglücklichen Seelen von anderswo verstoßen worden, doch nun wird es Zeit ihnen die Wahrheit etwas näher zu bringen..."
SAT_3b: "Von Ratten und Menschen"
SAT_3b_desc: "Es ist kein Geheimniss, dass sie Timiryazevskaya einst von einer regelrechten Flut von Ratten überspült worden ist. Selbst viele Jahre danach sind noch immer ihre Spuren zu sehen, ihre Verwüstung. Und sie sind zu hören, in den Wänden, in den Rohren..."
SAT_4a: "Ketzerisches Gedankengut"
SAT_4a_desc: "Unser Netz der Verderbtheit reicht weit über die Timiryazevskaya hinaus, Ketzer und Satanisten aller Art lassen sich noch im Verborgenen der Metro finden. Vielleicht haben sie auch etwas, das unserer Ausgrabung nützen könnte?"
SAT_4b: "Ruf des Kultes"
SAT_4b_desc: "Als das Ende aller Tage kam, so wussten unsere Anhänger, was dies bedeutete: Der Triumph Satans, sowei die völlige Vernichtung des Himmels. Der Rest der Metro wollte es nicht wahrhaben, doch wir alle wussten es, in unseren Herzen da spürten wir es, Satan hatte gesiegt. Und Charon, sein erster Diener, er rief nach uns und versammelte die Gläubigen an der Timiryazevskaya. Seine Visionen waren unzweideutig, genau unter dieser Station lag das Tor zu Hölle. Und während die Narren der restlichen Metro versuchten ihre alte Zivilisation wiederaufzubauen, da begannen wir im Stillen zu graben..."
SAT_5a: "Wo die Dämonen ruh'n"
SAT_5b: "Kampf gegen die Südlinge"
SAT_5b_desc: "In der Inneren Metro heißt es wohl, die Dimitrovskaya sei die letzte Grenze der Zivilisation. Viel wissen sie dort nicht über uns, nur von unserer großen Rattenplage von vor so vielen Jahren haben sie gehört. Es wird Zeit, dass sie eine neue Bedrohung aus dem Norden kennenlernen..."
SAT_6a: "Verdammnis"
SAT_6a_desc: "Die Verdammnis ist die einzig wahre Erlösung, die uns Menschen bevorsteht. Zweifelt jetzt nicht, denn wir sind fast am Ziel!"
SAT_6b: "Bewacht die Tore"
SAT_6b_desc: "Die Dämonen des Herrn erwarten uns, ewig wachend so wir wir. Grabt tiefer!"
SAT_7: "Eine unheilige Entdeckung"
SAT_7_desc: "HEIL SATAN! HEIL SATAN! HEIL SATAN!"
SAT_armies_of_satan: "Die Armeen des Satans"
SAT_armies_of_satan_desc: "Die Legionen des Gehörnten marschieren, so wie es geweissagt wurde"
SAT_death_before_honor: "Tod vor Ehre"
SAT_death_before_honor_desc: "Irdische Konzepte wie Stolz und Ehre beschäftigen uns nicht länger. Satan allein herrscht über die Welt und der Tod ist sein Geschenk"
SAT_promotion_of_devotion: "Fördert den Fanatismus"
SAT_promotion_of_devotion_desc: "Unser Glaube ist stark und er muss stark bleiben, um uns mit unserem Herren zu vereinen. Und unsere Anhänger müssen seine Lehren verstehen, sonst werden wir alle vernichtet, wenn es soweit ist"
SAT_drugged_up_thugs: "Indoktrination durch Drogen"
SAT_drugged_up_thugs_desc: "Diverse Substanzen der alten Welt lassen uns Dinge sehen, die Jenseits des Irdischen liegen. Bis unsere Grabung abgeschlossen ist, sind sie der einzige direkte Weg zur Kommunikation mit der Unterwelt"
SAT_taking_stock: "Legt Lager an"
SAT_taking_stock_desc: "Wir brauchen ein System effizienter Lagerung um unsere Produktionskapazitäten voll auszuschöpfen"
SAT_upgrading_the_arsenal: "Verbessert unser Arsenal"
SAT_upgrading_the_arsenal_desc: "Womit sollen wir den kämpfen, wenn die "Krieger Gottes" sich hier zeigen? Mit Besenstielen?"
SAT_taking_stock_2: "Verbesserte Waffen"
SAT_taking_stock_2_desc: "Satans Geschenk ist der Tod und wir werden ihn der gesamten Metro bringen"
SAT_army_5: "Brutal und Hinterhältig"
SAT_army_5_desc: "Felik der Gottlose zeigt in letzter Zeit ungeahnte Talente im Einsatz für unsere Sache. Geben wir ihm etwas mehr Freiheit um seine...Vorlieben weiter auszutesten"
SAT_army_doctrine: "Blutdürstige Mörder"
SAT_army_doctrine_desc: "Neue, blutige Rituale zeichnen unsere Kämpfer inzwischen aus und machen sie zu echten Kriegern Satans"
SAT_barbed_armor: "Unheilige Rüstungen"
SAT_barbed_armor_desc: "Die Krieger des Gehörnten wird man schon von Weitem kommen sehen"
SAT_forboding_attire: "Bedrohliche Ausstattung"
SAT_forboding_attire_desc: "Wir sind die Dämonen des Gehörnten, wo wir wandeln, dort folgt der Tod."
SAT_fuel_stores: "Lagert Treibstoff ein"
SAT_fuel_stores_desc: "Öl und Diesel treibt unsere Maschinen des Todes an, etwas davon auf Vorat zu haben kann nicht schaden..."
SAT_cohorts_of_the_fallen: "Kohorte des Gefallenen"
SAT_cohorts_of_the_fallen_desc: "Unser Glaube ist stark und er kennt keinen Zweifel. Und wer keinen Zweifel kennt, der kennt auch keine Furcht"
SAT_thralls_of_sin: "Knechte der Sünde"
SAT_thralls_of_sin_desc: "Unsere verdorbenen Krieger haben Dinge gesehen, die schwächeren Menschen den Verstand rauben würden. Doch wir kämpfen ohne Furcht"
SAT_vile_forces_of_darkness: "Die Kräfte der Finterniss"
SAT_vile_forces_of_darkness_desc: "Die Finterniss ist unser Schild und unser Mantel, das Geschenk unseres herrn an seine treuen Diener. Wir werden sie zu nutzen wissen"
SAT_promotion_of_devotion2: "Verdorbene Mächte"
SAT_promotion_of_devotion2_desc: "Wir sind nun die Kräfte des Bösen und der Finsterniss. Sich daran zu gewöhnen braucht jedoch eine Weile"
SAT_hell_tanks: "Höllenpanzer"
SAT_hell_tanks_desc: "Feuer und Stahl, sowie absolute Gnadenlosigkeit. Diese neuen Panzer auf Schienen werden unsere Ideale in die gesamte Metro tragen"
SAT_satans_maw: "Satans Schlund"
SAT_satans_maw_desc: "Jeder unserer Panzer soll eine Manifestation Satans Macht und Grausamkeit darstellen, sowie seinen unstillbaren Hunger nach menschlichen Seelen "
SAT_darkness_stirs: "Finsternis zieht auf"
SAT_darkness_stirs_desc: "Licht ist der Urfeind allen Bösens, diesen Idealen müssen wir so treu sein, wie es uns technisch möglich ist"
SAT_satans_strongest: "Das Ende und seine Lehren"
SAT_satans_strongest_desc: "Die Oberfläche mag vernichtet sein, doch noch beherbergt sie wertvolle Ressourcen, ein Geschenk unseres Herren. Wir müssen uns nur nehmen, was uns rechtmäßig zusteht."
SAT_satans_strongest_2: "Vile Profligates"
SAT_satans_strongest_2_desc: ""
SAT_inner_sphere: "Ein neuer Innerer Zirkel"
SAT_war_against_the_caliph: "§RSchlag gegen das Kalifat§!"
SAT_war_against_the_caliph_desc: "Unsere Zeit ist gekommen. Die Krieger Gottes versammeln sich zu unserem Norden und es wird Zeit sie ein für alle mal zu tilgen. Erhebt euch, ihr Mächte der Finsternis!"
SAT_inner_sphere_desc: "Der Innere Zirkel rund um Charon braucht eine Neuausrichtung, immerhin wird es eine Weile dauern, bis wir die Tore der Hölle erreicht haben. Und in dieser Zeit brauchen wir nun einmal soetwas Ähnliches wie eine Regierung..."
SAT_the_godless: "Die Gottlosen"
SAT_the_godless_desc: "Ruft unsere Anhänger zusammen, es gibt Arbeit für sie"
SAT_and_the_unclean: "..und die Unreinen"
SAT_and_the_unclean_desc: "Verstoßen und Verachtet vom Rest der Metro gibt es viele Menschen und Mutanten da draußen, die nirgendwo sonst hinkönnen. Doch Satan sind alle willkommen..."
SAT_the_sacred: "Die Gesegneten"
SAT_the_sacred_desc: "Viele verstehen den Wahnsinn nicht, denn sie sind selbst nicht vom Wahnsinn gesegnet. Er ist ein Geschenk unseres Herren, ein Tropfen reiner unverdorbener Erkenntniss, ja ja"
SAT_and_propane: "... und die Frevler"
SAT_and_propane_desc: "Wer hätte geahnt was man aus einem menschlichen Körper alles so machen kann..."
SAT_trade_with_the_hanza: "Handelt mit [HNZ.GetName]"
SAT_trade_with_the_hanza_desc: "Wir können sie nicht leiden, sie können uns nicht leiden. Doch wenn Geld zu verdienen war hat sich die Hanse noch nie um Moral gekümmert und wir könnten einige ihrer Güter wirklich dringend gebrauchen..."
SAT_trade_with_the_hanza_2: "Waffenhandel"
SAT_trade_with_the_hanza_2_desc: "Wir brauchen Waffen, richtet unseren Handel danach aus"
SAT_borderwar_with_ISL: "Beginnt einen Grenzkonflikt"
SAT_borderwar_with_ISL_desc: "Vielleicht sind wir bereit für einen Krieg gegen das Kalifat. Vielleicht auch nicht. Wie wäre es zuerst mit einem Test?"
SAT_inner_industry_1: "Vergrößert die Waffenkammer"
SAT_inner_industry_1_desc: "Mehr ist immer besser, mehr Blut, mehr Tod, mehr Zerstörung!"
SAT_industry_timed_idea_lock: "Fokus wird §Rgesperrt§! falls wir den Nationalgeist §YIndustrielle Neuordnung§! verlieren\n"
SAT_hell_forges: "Höllenschmiede"
SAT_hell_forges_desc: "Vermutlich nichts im Vergleich zu den echten Schmieden der Hölle, doch ein guter Anfang"
SAT_slavery_industry: "Sklavenarbeit"
SAT_slavery_industry_desc: "Lasst sie schuften bis sie bluten, lasst sie bluten bis sie sterben. Ihr Leben hat keinen Wert, nur ihre Arbeit!"
SAT_slavery_industry_resource_gain: "Jeder bereits abgeschlossene Fokus im Industreizweig fügt dem Staat §Y2 Schrott§! und §YKomponenten§! hinzu."
SAT_rapid_cycle_labour: "Erschöpfende Arbeit"
SAT_rapid_cycle_labour_desc: "Jeder muss arbeiten jeder, nur so beweisen wir Satan unsere Treue."
SAT_nine_finger_production: "Der Neunfinger"
SAT_nine_finger_production_desc: "Der Neunfinger, ein Flammenwerfer benannt nach der Tatsache, dass jeder unserer Soldaten der einen bedienen will, zuvor einen Finger opfern muss. Leistungsstark und zerstörerisch ist er das Opfer wert."
SAT_inner_industry_4: "Schneller!"
SAT_inner_industry_4_desc: "Peitscht diese faulen Nichtsnutze in Form und lasst sie Arbeiten bis sie umkippen"
SAT_inner_industry_5: "NOCH SCHNELLER!"
SAT_inner_industry_5_desc: "PEITSCHT DIESES UNGEZIEFER SOLANGE, BIS DIE QUOTEN ERFÜLLT SIND. PEITSCHT SIE BIS SIE TOT UMFALLEN, ARBEITER SIND ENTBEHRLICH, WAFFEN SIND ES NICHT!"
SAT_inner_industry_6: "Vorsorgliche Einlagerung"
SAT_inner_industry_6_desc: "Es ist egal ob wir mehr Waffen als Soldaten haben, ein Krieg verschlingt ohnehin Material in enormen Außmaßen. Steigert die Produktion weiter"
SAT_scary_effigies: "Götzen des Schreckens"
SAT_scary_effigies_desc: "Lasst jeden Eindringling wissen, dass ihn hier Schlimmeres als den Tod erwartet"
SAT_inner_sphere_1: "Interne Neuordnung"
SAT_inner_sphere_1_desc: "Es gibt ab sofort klare Anweisungen, wer zu kämpfen und wer zu arbeiten hat. "
SAT_sacrifices: "Opfergaben"
SAT_sacrifices_desc: "Es wird Zeit für ein großes Opfer, doch unser Herr akzeptiert nur eine Gabe und das ist Blut"
SAT_sacrifices_1: "Hinrichtungsrituale"
SAT_sacrifices_1_desc: "Eine Hinrichtung ist ein heiliges Ritual, Töten ist heilig, Schmerzen sind heilig. Unsere Soldaten als Krieger Satans müssen Leid und Terror über die gesamte Metro bringen können"
SAT_blood_altars: "Blutige Altare"
SAT_blood_altars_desc: "Wir können unsere heiligen Rituale nicht länger im Schmutz und im Dreck abhalten. Wo bleibt unser Sinn für Schönheit und Dramatik?"
SAT_sacrifices_decision_improvement: "Verbessert die §YOpfert Gefangene§! Entscheidung"
SAT_rites_of_initiation: "Initiationsriten"
SAT_rites_of_initiation_desc: "Nur wer wahrhaftig bewiesen hat, Leid und Tod zu verkörpern, der kann auch zu uns gehören. Nur wer wahrlich kein Gewissen mehr hat, der wird auch ein Jünger Satans"
SAT_sacrifices_rites_improvement: "Erlaubt uns einen Ritus um unsere Kommandanten §Ydauerhaft§! zu verbessern"
SAT_sacrifices_2: "Dunkle Zeremonien"
SAT_sacrifices_2_desc: "Jeder Kult braucht Zeremonien, Riten und auch Geheimnisse"
SAT_enslavement_desc: "Jeder Mensch ist nur ein Sklave Satans und je ehern er das begreift, desto höher kann er in der Hierarchie aufsteigen"
SAT_enslavement: "Versklavung"
SAT_whipped_into_servitude: "Erpeitschter Gehorsam"
SAT_whipped_into_servitude_desc: "Es ist egal ob die Sklaven an unseren Herren glauben oder nicht, an die Peitsche glauben sie"
SAT_kidnap_technicians: "Entführt Techniker"
SAT_kidnap_technicians_desc: "Unsere "Techniker" sind doch absoluter Mist, entführen wir uns ein paar kompetentere Personen aus den benachbarten Stationen und zwingen sie an die Arbeit."
SAT_thralls: "Knechte der Hölle"
SAT_thralls_desc: "Konstante monotone Arbeit, Schläge bei kleinsten Verfehlungen. Eine wahre Hölle auf Erden, ich bin überglücklich..."
SAT_enslavement_2: "Sklavenquartiere"
SAT_enslavement_2_desc: "Auch wenn es uns nicht gefällt, Sklaven sterben leider wenn man sie nicht schlafen lässt, da hilft dann auch kein Peitschen mehr. Wir brauchen Quartiere für sie und müssen ihnen auch etwas Schlaf gönnen."
SAT_inner_sphere_5: "Hölle auf Erden"
SAT_inner_sphere_5_desc: "Unser Endziel liegt in greifbarer Nähe. Ein letzter Krfatakt und wir unterwerfen unsere wertlosen Nachbarn"
SAT_inner_sphere_5_1: "Herr der Ratten"
SAT_inner_sphere_5_1_desc: "Satan trägt viele Namen und einer davon lautet "Herr der Ratten" Erfüllen wir diese Prophezeiung"
SAT_inner_sphere_5_2: "Beendet die Allianz"
SAT_inner_sphere_5_2_desc: "Diese Narren, Anhänger des Geldes und der Zivilisation. Es gibt nur einen Gott in dieser Welt und sein name lautet SATAN!"
SAT_inner_sphere_5_3: "Das Tor ins Herz der Metro"
SAT_inner_sphere_5_3_desc: "Dieses bizzarre Reich wird unsere Eintrittkarte in das Herz der Metro"

SAT_inner_sphere_1a: "Dunkle Messen in unseren Reihen"
SAT_inner_sphere_1a_desc: "Unsere Krieger dürfen die unumstößliche Wahrheit über unsere Welt nie vergessen, selbst wenn sie ihre Heimat verlassen"
SAT_inner_sphere_1b: "Pilger der Zerstörung"
SAT_inner_sphere_1b_desc: "Unsere Krieger müssen mehr sein als nur Soldaten. Wir sind Pilger auf einer heiligen Reise, einer Reise des Todes und der Vernichtung."
SAT_inner_sphere_1c: "Pfad zur Verdammnis"
SAT_inner_sphere_1c_desc: "Unsere Boten des Krieges bringen Tod und Leid über die gesamte Metro, ein Schwarzer Kreuzzug des Bösen!"

SAT_and_propane_and_propane_accessories: "Erkundet die Tiefen unter [SAT.Capital.GetName]"
SAT_and_propane_and_propane_accessories_desc: "Propan! Hier, unter Moskau! Das kann kein Zufall sein, dies ist der Beweis, die Hölle liegt genau unter uns. Macht euch bereit, schon bald brechen wir durch!"

SAT_and_the_unclean_unclean: "...und die Ungläubigen"
SAT_and_the_unclean_unclean_desc: ""

SAT_war_against_the_caliph_2: "Entfesselt die Kriegsknechte"
SAT_war_against_the_caliph_2_desc: ""

SAT_war_against_the_caliph_3: "Vernichtet die Ratten"
SAT_war_against_the_caliph_3_desc: ""

SAT_war_against_the_caliph_4: "Exkursion in die Tiefen"
SAT_war_against_the_caliph_4_desc: ""

SAT_war_against_the_caliph_5: "Sklaven für die [SAT.Capital.GetName]"
SAT_war_against_the_caliph_5_desc: ""
