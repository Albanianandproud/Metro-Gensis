HNZ_satanists_trade: "Handel mit den Satanisten"
HNZ_satanists_trade_desc: "Die Satanisten sind eine Gruppe kannibalischer Schläger im Norden der Metro. Wenn sie nicht gerade halluzinogene Pilze konsumieren, versklaven sie die Bewohner anderer Stationen, um einen Tunnel zu graben, der ihrer Meinung nach direkt in die Hölle führt. So fanatisch sie auch sein mögen, sie verfügen über eine bemerkenswerte Brennstoffquelle. Sicherlich finden wir etwas, das wir dagegen eintauschen können."

HNZ_north_trade_diminish: "Verringerte Fokusbelohnungen, falls wir sowohl mit §Y[SAT.GetFlag][SAT.GetName]§! als auch mit §Y[SAV.GetFlag][SAV.GetName]§! Handel treiben.\n\n"

