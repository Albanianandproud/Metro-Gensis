 RED_maxim_oligarch_tarnish_brother_desc: "Andreys Herrschaft war in den letzten Jahren von der Unzufriedenheit derjenigen geprägt, die hartnäckig an der sozialisitischen Doktrin festhielten. Er hat den Idealen des Marxismus den Rücken gekehrt und versucht, unsere Feinden zu gefallen."

