l_german:
 PEC_1: "Pechatnikov-Konföderation"
 PEC_1_desc: "Um den Pilzhandel auszuweiten und um Übergriffe der ewig hungrigen Hanse abzuwehren, wurde an ihrer Mutterstation Petschatniki die Konföderation Petschatniki gegründet."
 PEC_the_rot_within: "Die Fäulnis im Inneren"
 PEC_the_rot_within_desc: "Die Punks aus der Kozhukhovskaya, die ihre Drogen in der Pechatniki-Konföderation verkaufen wollen, werden ein böses Erwachen erleben wenn unsere Streitkräfte erst einmal versuchen sie rauszuwerfen. Zumindest wäre dem so, würden unsere Soldaten ihren Sold nicht für besagten Stoff ausgeben würden. Mit Stepanovs entspannter Einstellung bei der Führung der Konföderation können wir nur mit den Gangstern verhandeln und hoffen, dass sie irgendwann verschwinden."
