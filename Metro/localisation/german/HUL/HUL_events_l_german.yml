  nf_HUL.6.b: ""
 nf_HUL.17.t: "Verschwundene Stalker"
nf_HUL.17.d: "Inzwischen dürfte klar sein, dass es um unsere Stalker nicht besonders gut steht. Entweder wurden sie von außergewöhnlichem Pech verfolgt oder sie sind der Aufgabe schlicht nicht gewachsen. Immer wieder verschwinden unsere Stalker während ihrer Einsätze an der Oberfläche und kehren nicht nach [HUL.Capital.GetName] zurück."
nf_HUL.17.a: "Irgendetwas stimmt hier nicht."

nf_HUL.18.t: "Beobachter im Weiß"
nf_HUL.18.d: "Es wird zunehmend deutlich, dass unsere Stalker gezielt von einer unsichtbaren Bedrohung ausgeschaltet werden. Was wir zunächst für tragische Unfälle oder vereinzelte Mutantenangriffe hielten, entpuppt sich nun als das Werk menschlicher Gegner. Die Faschisten von Tverskaja wagen sich nicht so weit hinaus, und die ideologisch verblendeten Stalker der Roten Linie bleiben meist in der Innenstadt oder an Orten von kultureller Bedeutung."
nf_HUL.18.a: "Wir müssen unsere Stalker schützen. Wir können es uns nicht leisten, sie zu verlieren."

nf_HUL.19.t: "Ein alter Feind kehrt zurück"
nf_HUL.19.d: "Wie sich herausstellt, lagen wir richtig. Es waren weder faschistische noch kommunistische Stalker, die unsere Leute verschwinden ließen, sondern eine völlig andere Gruppierung. Man nennt sie die Piloten – ehemalige Mitglieder des Mikojan-Konstruktionsbüros, die den Krieg in ihren tiefen Bunkeranlagen nahezu unbeschadet überstanden haben. Dort setzen sie ihre Forschungen fort, als hätte die nukleare Apokalypse nie stattgefunden. Wir haben bereits vor vielen Jahren gegen sie gekämpft. Damals errichteten sie eine Operationsbasis in [HUL.Capital.GetName], doch letztlich gelang es uns, sie zu vertreiben. Seitdem haben sie sich erholt, ihre Kräfte gesammelt und auf den richtigen Moment gewartet, um erneut Kontakt mit der Metro aufzunehmen.\nDie Gerüchte, sie hätten menschenähnliche Robotersoldaten erschaffen, scheinen zwar stark übertrieben zu sein. Doch was sie in all den Jahren tatsächlich entwickelt haben, möchten wir lieber nicht herausfinden."
nf_HUL.19.a: "Sie können besiegt werden. Wir werden sie erneut schlagen."

nf_HUL.20.t: "Entlang des Wachturms"
nf_HUL.20.d: "Die Einsätze der Piloten werden von Woche zu Woche aggressiver. Alle Anzeichen deuten darauf hin, dass sie einen Durchbruch in die Metro planen und unsere Stationen angreifen wollen. Wir müssen vorbereitet sein."
nf_HUL.20.a: "Besetzt die Wachposten! Alle Mann auf ihre Positionen!"

nf_HUL.21.t: "Nachtrag"
nf_HUL.21.d: "Die von den Piloten entsandten Kräfte haben sich vorerst zurückgezogen. Nachdem wir ihren besten Truppen standhalten konnten, können wir endlich aufatmen. Es wird lange dauern, bis sie erneut genug Kräfte sammeln können, um unsere Stalker oder unsere Stationen zu bedrohen. Von nun an sollten wir wieder in der Lage sein, Stalker sicher an die Oberfläche zu entsenden, ohne befürchten zu müssen, dass sie von den Piloten abgefangen werden."
nf_HUL.21.a: "Endlich einmal gute Nachrichten."

nf_HUL.22.t: "Von hier aus in die Zukunft"
nf_HUL.22.d: "Nach unserem Konflikt mit den Piloten bleibt eine Frage offen. Eines ist jedoch klar: Die Republik kann nicht für immer untätig in ihrer Ecke der Metro verharren. Was wäre gewesen, wenn die Piloten stattdessen Faschisten gewesen wären? Oder Kapitalisten, die die letzte Bastion der Freiheit der Arbeiter zerschlagen wollen? Oder die Rote Linie auf Rachefeldzug?\nGeschichte wird von denen geschrieben, die schreiben können – doch die Sieger entscheiden letztlich, was darin steht."
nf_HUL.22.a: "Die Zukunft der Republik muss entschieden werden."

HUL_can_pick_leadership_path_tt: "Freigeschaltet: §YPfad zur Wahl der politischen Führung.§!"

nf_HUL.24.t: "Ziel einer Verleumdungskampagne von [HUL.GetName]"
nf_HUL.24.d: "Wir sind Ziel übler Gerüchte geworden, die von den [HUL.GetName] verbreitet werden. Ihre Zeitungen haben sich weit durch die Metro verbreitet, und die Nachrichten erreichten rasch auch unsere Stationen. Selbst wenn die Behauptungen völlig falsch und frei erfunden sind, entfalten sie dennoch ihre Wirkung. Die kursierenden Gerüchte haben viele Händler davon abgehalten, unsere Stationen aufzusuchen."
nf_HUL.24.a: "Dummes Geschwätz."
nf_HUL.24.b: "Sperrt den Zugang zu diesen Informationen sofort!"
nf_HUL.24.c: "Gut, dass ohnehin kaum jemand lesen kann."

nf_HUL.23.t: "[HUL.GetName] bieten Unterstützung an"
nf_HUL.23.d: "Ob durch unsere jüngsten Aktionen motiviert, aus Feindschaft gegenüber einem ihrer Rivalen oder schlicht aus Eigeninteresse – die [HUL.GetName] haben uns ihre volle Unterstützung angeboten und beschlossen, die Kommunikation mit uns wiederaufzunehmen."
nf_HUL.23.a: "Sie könnten sich als nützliche Verbündete erweisen..."

nf_HUL.25.t: "Gelobt von [HUL.GetName]"
nf_HUL.25.d: "Einfache Anarchisten, Banditen oder Schläger – nun auch mit der Fähigkeit, Zeitungen zu drucken. Glücklicherweise sind wir diesmal nicht Ziel ihrer spöttischen Kritik geworden, sondern Gegenstand ihres Lobes. In ihren Artikeln berichten sie von den stetig steigenden Lebensstandards in unseren Stationen. Wer lesen kann, wird unsere Gemeinschaften dadurch sicherlich in einem positiveren Licht sehen."
nf_HUL.25.a: "Zumindest das ist erfreulich."
nf_HUL.25.b: "Wir brauchen eure leeren Lobeshymnen nicht."

nf_HUL_aviators.0.t: "Forschung über alles"
nf_HUL_aviators.0.d.a: "Während Moskau in rauchenden Ruinen liegt, bestehen noch immer Überreste der alten Welt fort. Tief unter Schichten aus Stahlbeton und Metall arbeiten die Piloten unbeirrt weiter. Wissenschaftler und Ingenieure setzen ihre Arbeit mit beinahe wahnhafter Besessenheit fort. Ihre Forschung schreitet nun ohne jede Einschränkung voran – frei von politischen Vorgaben, moralischen Bedenken oder äußeren Zwängen. Die Apokalypse hat die Neugier nicht ausgelöscht. Sie hat sie lediglich in etwas Kälteres, Entschlosseneres verwandelt."
nf_HUL_aviators.0.d.b: "Da all ihre Bedürfnisse erfüllt sind, können die [AVV.GetName] ihre Projekte ungehindert fortsetzen und ihre Forschungsprogramme bis zur praktischen Umsetzung vorantreiben. Vorerst benötigen sie nichts von uns."
 nf_HUL_aviators.0.a: "Falls nötig, können wir unsere Hilfe sicherlich entbehren."
nf_HUL_aviators.0.b: "Vorerst lassen wir sie ungestört arbeiten."

HUL_AVV_improved_guns: "Die §Y[AVV.GetName]§! haben dank unserer Hilfe ihre Ausrüstung verbessert. Die Effekte von §Y[?HUL_aviator_assistance_give_guns]§! wurden verstärkt."

HUL_can_help_aviators_again: "Wir können die §Y[AVV.GetName]§! erneut bei ihrer Forschung unterstützen."

HUL_aviator_cooldown: "Die §Y[AVV.GetName]§! sind derzeit mit Forschungsarbeiten beschäftigt. Für den Moment können keine Entscheidungen im Zusammenhang mit den §Y[AVV.GetNameAdj]§! getroffen werden."

nf_HUL_aviators.1.t: "Fortschritt nach dem Tod"

nf_HUL_aviators.1.d: "Abgesehen von ihrem undankbaren Auftreten scheinen sie mit der Lieferung von Elektronik vorerst zufrieden zu sein. Wofür genau sie diese benötigen? Die Ingenieure weigerten sich, unsere Fragen zu beantworten. »Das würdet ihr ohnehin nicht verstehen«, murmelten sie herablassend vor sich hin. Was auch immer sie damit vorhaben – unsere Unterstützung zeigt Wirkung. Und zwar beeindruckende.

Die umgänglichsten Ingenieure zeigten zumindest ein wenig Dankbarkeit, auch wenn ihre Lächeln zunehmend distanziert wirken. Als Gegenleistung erlaubten sie uns einen Blick in ihre Lagerbestände. Nichts Außergewöhnliches, aber allein diese Geste bedeutet viel, wenn man bedenkt, dass wir ihre Reihen vor Jahren beinahe halbiert hätten."

nf_HUL_aviators.1.a: "Wir hoffen, die Elektronik war von Nutzen."

HUL_aviator_can_purchase_firearms: "Entscheidung freigeschaltet: §Y[?HUL_aviator_assistance_give_guns]§!. Waffen können von den §Y[AVV.GetName]§! erworben werden."

nf_HUL_aviators.2.t: "Früchte des Wissens"

nf_HUL_aviators.2.d: "Dank unserer Bemühungen leuchten die Lampen in ihren Bunkern nun etwas heller. Das Büro verlangte Energie für seine Forschung, und wir lieferten sie. Nun können ihre Projekte Tag und Nacht mit maximaler Effizienz fortgeführt werden. Ihre Berechnungen versprechen enorme Fortschritte, und die erwarteten Entwicklungszeiten wurden drastisch verkürzt.

Die Ingenieure seien schwer beschäftigt, sagen sie – doch was genau sie tun, verraten sie uns nicht. Es kursieren Gerüchte über Experimente, die sich normale Menschen kaum vorstellen können. Dinge, die vielleicht besser unbekannt bleiben. Doch sie lassen uns nicht näher heran; das würde die Effizienz nur beeinträchtigen."

nf_HUL_aviators.2.a: "Wir freuen uns, hilfreich gewesen zu sein."

nf_HUL_aviators.3.t: "Atomare Erleuchtung"

nf_HUL_aviators.3.d: "Keine Befehle. Keine Verträge. Keine Nationen, denen sie dienen müssten. Nur Technik und Wissenschaft – völlig ungezügelt. Ohne moralische Grenzen. Ohne Fragen.

Sie erklären uns offen, dass all dies letztlich dem Wohl der Menschheit dienen werde, sobald ihre Gleichungen vollendet sind. Simulationen laufen weiter, Analysen werden ausgewertet. Denn die Wissenschaft muss voranschreiten. Die Welt mag vor Jahren untergegangen sein, doch das Wissen bewegt sich unbeirrt weiter.

So viel Unsinn die Eierköpfe auch von sich geben mögen – einige von ihnen haben uns angeboten, alte Elektronik zu »leihen«, die sie nicht mehr benötigen. Computer und Diskettenlaufwerke aus der Zeit vor dem 21. Jahrhundert ließen sich problemlos ausschlachten, doch sie scheinen sehr darauf bedacht zu sein, dass wir sie einer »besseren Verwendung« zuführen. Was auch immer das bedeuten soll."

nf_HUL_aviators.3.a: "Wir können sicherlich noch weitere Hilfe leisten."

nf_HUL_aviators.4.t: "Jagd nach dem Fortschritt"

nf_HUL_aviators.4.d: "Sie behaupten, kurz vor dem Ziel zu stehen. Näher als je zuvor. Selbst ihre eigenen Prognosen hätten nicht vorausgesehen, dass sie es so weit schaffen würden. Hinter ihren nüchternen Anfragen verbirgt sich eine kaum zu unterdrückende Begeisterung.

Alles läuft für sie zusammen: Jahre voller fruchtloser Forschung, Rückschläge und Katastrophen. Die letzten Variablen müssen nur noch in Einklang gebracht werden. Aus Spekulation wurde Theorie – und aus Theorie wird bald Realität.

Zum ersten Mal haben sie sich bereit erklärt, uns von ihrer Forschung zu erzählen.

Es ist kein Geheimnis, dass sie bei ihrem Angriff vor Jahren Maschinen einsetzten. Damals waren es lediglich einfache Drohnen, die aus alten Bombenentschärfungsrobotern zusammengebaut worden waren. Doch ihr Scheitern zwang sie zurück ans Reißbrett. Rückblickend erwies sich dies eher als Chance denn als Fluch.

Statt einfacher Maschinen wollen sie nun vollständig autonome Einheiten erschaffen – fähig zur Kommunikation, Aufklärung und eigenständigen Entscheidungsfindung. Selbstständigkeit, ohne die störenden Begleiterscheinungen echter Empfindungsfähigkeit.

Niemand kann ermessen, welchen Nutzen dies nicht nur für uns, sondern für die gesamte Zukunft der Menschheit haben könnte. Eine künstliche Intelligenz, die den Menschen dient und ihre Werte vertritt – nicht gelenkt von kapitalistischen oder imperialistischen Interessen.

Doch das Büro stößt an seine Grenzen. Das Personal ist erschöpft. Sie benötigen mehr. Mehr von allem. Die Spielräume werden immer kleiner und die Einsätze immer größer.

Sie versichern uns, dass sich jedes Opfer lohnen wird.

Wir müssen nur noch ein kleines Stück weitergehen..."

nf_HUL_aviators.4.a: "Wir werden ihnen helfen. Hoffentlich lohnt sich das."

HUL_aviator_final_decision_tooltip: "Wir müssen den §Y[AVV.GetName]§! ein letztes Mal helfen. Für die letzte Phase benötigen sie mehr Energie und mehr Ressourcen ... Vielleicht enthält §Y[106.GetName]§! genau das, was wir brauchen...?"

nf_HUL_aviators.5.t: "Gedanken aus Stahl"

nf_HUL_aviators.5.d: "Es lebt. Nun ja ... irgendwie.

Sie haben die erste Prototypenserie ihrer Roboter vorgestellt. Sie stolpern häufiger, als dass sie aufrecht gehen, ihre Zielgenauigkeit reicht nicht an die unserer Veteranen heran und ihre Reaktionszeiten sind deutlich verzögert.

Sie können nicht denken wie wir. Aber das müssen sie auch nicht.

Sie folgen Befehlen. Sie gehorchen. Und sie töten.

Die Prototypen sind primitiv – mehr Zahnräder und Maschinen als tatsächliche Intelligenz. Sie wirken eher roboterhaft als menschlich. Doch sie benötigen keinen Schlaf, keine Nahrung und kennen keine Erschöpfung.

Diese erste Generation ist nicht einfach nur eine neue Waffe.

Sie ist der Entwurf einer neuen Zukunft."

nf_HUL_aviators.5.a: "Die Schwelle wurde überschritten. Nun ruft uns die Revolution."

HUL_aviators_can_produce_combat_robots_tt: "Entscheidung freigeschaltet: §Y[?HUL_aviator_assistance_produce_combat_ai]§!. Zusätzliche Kampfmaschinen können bei den §Y[AVV.GetName]§! angefordert werden."