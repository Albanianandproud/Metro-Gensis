l_german:
 
 nf_RED.0.t: "Niederlage gegen die Universität"
 nf_RED.0.d: "Wir haben an Boden verloren und die Soldaten der Moskauer Universität sind in die Metro eingedrungen. Wir können nichts mehr tun."
 nf_RED.0.a: "Wir müssen um Frieden bitten"
 
 nf_RED.1.t:0 "Revolution"
 nf_RED.1.d:0 "Es ist kein Zufall, dass die Rote Linie aus der Sokolnitscheskaja-Linie hervorgegangen ist. Jedes Gebäude und jede Fassade der Linie ist detailliert mit Statuen von Stalin, Lenin und anderen sozialistischen Helden verziert. Denkmäler einst verehrter Heiliger zeugen von der Welt von einst. Wie die ägyptischen Gräber früherer Zeiten zog ihre vergangene Aura der Macht Menschen aus aller Welt an; Pilger, um Zeuge des Geschehens zu werden und ihren Respekt zu erweisen. Mit der Zeit wurde aus dieser Ehrfurcht schließlich Hingabe. Die Welt, wie wir sie kannten, ist verschwunden und nur noch die verblassten Erinnerungen an die Vergangenheit existierten. Es gab Hoffnung und eine Gelegenheit, eine neue sozialistische Bastion zu errichten, befreit von den Lasten der Vergangenheit.\n\nÜberlebende Komsomol-Führer und diejenigen, die unter der Herrschaft des Sozialismus lebten, begannen, eine sozialistische Wiederbelebung in Gang zu setzen. Der Sturz lokaler Stationsführungen und die Einrichtung von Revolutionsräten überall in der Sokolnitscheskaja führten zur Ausrufung einer ersten Interstationalen; Ihr Ziel war es, die gesamte Metro unter dem Kommunismus zu vereinen. Andrey Moskvin war einer dieser Revolutionäre, der mit seiner Robustheit und Tatkraft die Revolution persönlich anführte und sich bald als Leiter der neu gegründeten Revolution wiederfand."
 nf_RED.1.a:0 "Andrey Moskvin erfreute sich bald großer Beliebtheit bei seinen Anhängern."
 nf_RED.1.b:0 "Andrey Moskvin wurde zum Symbol der Revolution."

 future_paths_unlock:0 "Diese Eigenschaften können §CSpezialfokusse§! freischalten.\n§OWählen Sie mit Bedacht!§! - Die scheinbar bessere Eigenschaft ist später möglicherweise nicht immer die beste Wahl."

 nf_RED.2.t:0 "Fallout"
 nf_RED.2.d:0 "Doch was zunächst als sozialer Aufruhr begann, entwickelte sich zu einem umfassenden Krieg mit dem Rest der Metro. Viele Stationen widersetzten sich den Wünschen der neu eingerichteten Roten Linie. Der sich bildende Handelsbund der Hanse stand der Roten Linie diametral gegenüber und führte eine Koalition von Stationen an, um gegen die Aufrührer der Revolution zu kämpfen. Damit begann der blutigste Konflikt in der gesamten Metro. Soldaten wurden zu tausenden in den Fleischwolf geworfen und kostbare Ressourcen für die Kriegsanstrengungen aufgebraucht. Der heruntergekommene Zustand der Metro ist zu guten Teilen auf diesen Krieg zurückzuführen. Eine Pattsituation im Zermürbungskrieg, bei der keine Seite nachgab, sondern alles gab und so im Laufe des Krieges immer schwächer wurde. Als man erkannte, dass der Traum einer geeinten Metro im Sozialismus verblasste, kam es im Inneren zu Unruhen und Meutereien. Ideologische Differenzen lösten einen umfassenden Aufstand aus, bei dem diejenigen den Kampf verließen und ihre eigenen Stationen gründeten, wodurch die Unterstützung der Roten Linien für den Krieg geschwächt wurde."
 nf_RED.2.a:0 "Ihre Ideale wurden zu ehrgeizig."
 nf_RED.2.b:0 "Unsere Ideale schrumpften im Laufe des Krieges."

 nf_RED.3.t:0 "Frieden"
 nf_RED.3.d:0 "Während sich der Krieg hinzog, sahen weder die Rote Linie noch die Hanza eine Möglichkeit, einander zu besiegen. Sie gaben jede Ressource aus, die sie aufbringen konnten, um die andere Seite zu vernichten zerstören, doch das Endergebnis war der bevorstehende Zusammenbruch beider Parteien. Bürger und Soldaten protestierten gegen den Krieg, doch beide Seiten waren zu arrogant, um vor dem Mob niederzuknien. Sie waren eine lange Zeit zu hartnäckig, um Frieden zu schließen, und wollten nur den Sieg über die andere Seite verkünden.\n\nSchließlich wurde der jedoch Frieden im absoluten Geheimen geschlossen. Es wurde Andrey klar, dass der Krieg gegen die Koalition niemals gewonnen werden konnte. Mit jedem weiteren Tag häuften sich die Leichen an, und noch mehr Ressourcen wurden verschwendet. Letztendlich gab er dem Drang seines Bruders nach, einen Frieden zu schließen.\n\nSein jüngerer Bruder Maxim Moskvin, der die Friedensgespräche zunächst ohne Andreys Wissen begann, fädelte einen Deal ein: Der Ploshchad Revolyutsii sollte von Arbat an die Rote Linie übergeben werden. Arbat erhielt die Biblioteka Imeni Lenina und wurde schließlich an Polis übergeben. Alle Parteien einigten sich auf eine Garantie des freien Zugangs. Die Rote Linie wurde halbiert, erhielt aber freies Geleit durch die Bibliothek. Andrej setzte sich sowohl beim Volk als auch bei der Partei für den Frieden ein. Der innere Kreis der „hartnäckigen“ Sozialisten verachtete das, was sie als „Verrat“ an der Revolution betrachten. Maxim war letztendlich der wahre Vermittler des Friedens, auch wenn seine Leistung bis heute im Schatten verborgen liegt."
 nf_RED.3.a:0 "Andrey wurde zum Helden des Volkes."
 nf_RED.3.b:0 "Andrey wurde zum Helden der Partei."

 nf_RED.4.t:0 "Zustand der Linie"
 nf_RED.4.d:0 "Andrej, Mitglied des Revolutionsrates, sah sich nun als Generalsekretär der Roten Linie. Obwohl es andere Konkurrenten auf diesem Posten gab, gelang es ihm aufgrund seines Willens und seiner Hartnäckigkeit, den Posten der Führung zu übernehmen. Seine Herrschaft wurde bald unbestritten. Doch jetzt, im Jahr 2028, beginnen sich die Trümmer des Koalitionskrieges zu legen. Die Rote Linie gerät währenddessen zunehmend in eine immer schlimmere Situation. Die Sokolnitscheskaja befindet sich in einer prekären Lage, die mit Fingerspitzengefühl angegangen werden muss. Viele Probleme plagen die Nation, mehr im Inneren als im Äußeren. Die Wirtschaft stagniert; Nach wie vor wird eine Politik der Beschlagnahmung von Ressourcen praktiziert, die für die Versorgung unseres Militärs benötigt werden, wodurch unsere Wirtschaft nicht in der Lage ist, auf der Grundlage der Subsistenz zu wachsen und sich zu entwickeln. Der Unwillen der Regierung, sich mit diesem Thema auseinanderzusetzen, hat, angespornt durch die aufgeblähte Kontrolle des Militärs über alle Bereiche der Wirtschaft und der täglichen Industrie, dazu geführt, dass das einfache Volk langsam die zentralen Mächte verabscheut. Dieses Problem ist in den letzten Monaten nur noch schlimmer geworden.\n\nDies sind jedoch nicht die einzigen Probleme, mit denen wir konfrontiert sind. Die faschistischen Schweine von Twerskaja sind dank ihres neuen Führers kürzlich gestärkt worden. Die Auseinandersetzungen in den Tunneln zwischen uns haben durch sporadische Konflikte in den letzten Wochen nur zugenommen. Einst im Großen Vaterländischen Krieg haben wir sie bekämpft und gesiegt. Aber es erforderte große Opfer. Eine monumentale Anstrengung aus Blut und Eisen. Etwas, das wir uns derzeit möglicherweise nicht leisten können.\n\nAber wir müssen uns daran erinnern, Generalsekretär. Wir sind die Erben der Sozialistischen Sowjetunion. Lenins Wille wird geschehen!"
 nf_RED.4.a:0 "Ura!"

 nf_RED.5.t:0 "Frage der Ökonomie"
 nf_RED.5.d:0 "Unsere Wirtschaft hat ganz einfach einen Kipppunkt erreicht. Trotz unserer besten Bemühungen, die Wirtschaft zu reformieren und zu sanieren, hat sich dieses Vorgehen als ineffizient erwiesen. Die meisten Ressourcen, die nicht dem Militär zugewiesen oder an unsere Forschung und Entwicklung verteilt wurden, werden zum Erhalt unserer stagnierenden Wirtschaft verwendet. Es ist ein direkterer Ansatz erforderlich; Anstatt Ressourcen dafür aufzuwenden, das Blähungsproblem einfach „aufzuschieben“, ist eine neue Methode erforderlich.\n\n Es wurden zwei Lösungen vorgeschlagen: Erstens geht es um die Umsetzung von Zuschüssen und anderen Programmen, die darauf abzielen, die Effektivität unserer Stationsverwaltungen bei der Bewältigung lokaler Probleme zu verbessern. Zweitens besteht eine grundlegendere Lösung darin, Mitteln Vorrang einzuräumen, die auf das Wachstum unserer Primärindustrien wie Baugewerbe und Landwirtschaft abzielen. Wir müssen in der Lage sein, autark zu bleiben und uns selbst und zukünftiges Wachstum zu unterstützen."
 nf_RED.5.a:0 "Verbessert die Linie."
 nf_RED.5.b:0 "Das Leben verbessern."

 nf_RED.6.t:0 "Eine Frage des Militärs"
 nf_RED.6.d:0 "Unser Militär. Vor dem Krieg verfügte die Sowjetunion über eine der größten und stärksten Armeen der Welt. Seine Streitkräfte waren mit den neuesten und tödlichsten Kriegswaffen ausgestattet und unübertroffen ausgebildet. Von der Taiga Sibiriens bis zum Baltikum war Russland die größte Militärmacht auf dem Planeten. Die Armee schützte und bewahrte ihre Arbeiter und ihre Ideale. Aber heute scheint es umgekehrt zu sein\n\n Im Laufe einer langen Reihe innerer Zersetzung ist das Militär langsam verkümmert und in streitende Fraktionen innerhalb des Militärs zerfallen. Trotz der schieren Menge an Rekruten, die ihm zur Verfügung stehen, sorgen das Fehlen angemessener Ausbildungsverfahren und sogar die dringende Missachtung jeglicher gemeinsamer Kommunikation zwischen Kommandeuren dafür, dass das Militär isoliert und ineffizient bleibt. Ein Militär, das nicht von Verdiensten oder Fähigkeiten, sondern von Arroganz geprägt ist."
 nf_RED.6.a:0 "Ihre Macht muss entfernt werden."
 nf_RED.6.b:0 "Trotz ihrer Macht sind sie wichtig."

 RED_removing_army_bloat_tt:0 "§gEs werden Anstrengungen unternommen, die Macht des Militärs einzuschränken.§!"

 RED_appease_the_dissenters:0 "§gDie Andersdenkenden der Roten Linie werden besänftigt und ihre Eigenschaften werden gestärkt.§!"

 nf_RED.7.t:0 "Eine Frage der Pilzanforderung"
 nf_RED.7.d:0 "Die Beschlagnahmung von Getreide ist ein zweischneidiges Schwert. Wir versorgen unsere Truppen in Krisenzeiten wie dem Koalitionskrieges mit den dringend benötigten Vorräten. Ein Krieg, der ausschließlich in engen Tunneln ausgetragen wurde und überall in der Metro Chaos auslöste. Angesichts der linearen Natur des Krieges war es schwierig, Vorräte auf organisierte Weise hin und her zu transportieren. Daher beschlagnahmte die Armee Pilze und andere Ressourcen, um ihre Vorräte aufzustocken.\n\nDies erwies sich zwar als erfolgreich, war jedoch zu effizient. Das Vertrauen auf diese bewährte Methode blieb lange bestehen. Doch obwohl der Krieg zu einer fernen Erinnerung geworden ist, praktiziert das Militär ihn bis heute. Ein Faktor, der dazu beiträgt, dass sich unsere Wirtschaft in einer solchen Krise befindet.\n\nEs wäre vielleicht klug, die Beschlagnahmungsrate zu senken."
 nf_RED.7.a:0 "Verringern Sie die Intensität, aber behalten Sie weiterhin die erwarteten Quoten bei."
 nf_RED.7.b:0 "Wir müssen jetzt alle Requirierungen einschränken."

 nf_RED.8.t:0 "Eine Frage der Bruderschaft"
 nf_RED.8.d:0 "Maxim Moskvin, Andreys jüngerer Bruder, war schon immer eifersüchtig auf seinen älteren Bruder, Andreys Charme, seinen Erfolg und seine Macht. Ihre brüderliche Beziehung schwand dahin und wurde zu nicht mehr als einfache Rivalität.\n\nHatte Maxim noch irgendwelche Gefühle für seinem Bruder übrig? Schwer zu sagen, aber es schien jegliche Bande wären über die Jahre hinweg in Vergessenheit geraten.\n\nTrotzdem hält Maxim an seinen eigenen Talenten fest. Er wird vielleicht nie auch nur annähernd so talentierter sein wie sein Bruder, doch an seinen Zielen hält er mit einer Entschlossenheit fest, die nur wenige in sich tragen. Ein starker Wille und eine unbestrittene Autorität, gegen die sich nur wenige zu stellen wagen. Arrogant? Möglicherweise, aber jemand, der auf der Roten Linie die Führung übernimmt, geradezu Pflicht."
 nf_RED.8.a:0 "Seine Kenntnisse im Kampf werden von Nutzen sein."
 nf_RED.8.b:0 "Seine Erfahrung in der Kriegsführung wird von Nutzen sein."
 nf_RED.8.c:0 "Mitglied des Politbüros passt am besten zu ihm."

 RED_moskvin_q_theorist_role:0 "§gEuer Bruder,§! §YMaxim Moskvin§! §gwird ein Militär-Theoretiker.§!"

 RED_moskvin_q_general_role:0 "§gEuer Bruder,§! §YMaxim Moskvin§! §gwird ein Berater für unsere Streitkräfte.§!"

 RED_moskvin_q_no_role:0 "§YMaxim Moskvin§!§gbleibt Mitglied des Politbüros, bekommt aber keine besondere Rolle.§!"

 RED_generals_will_be_unhappy:0 "§gUnser§! §YMilitärkommando§! §gwird sehr§! §Runglücklich§! §güber diese Entscheidung sein!§!"

 RED_moskvin_future_career:0 "\n§gMoskvin behält weiterhin die Chance, durch zukünftige Fokusbäume und Events General oder Kommandeur zu werden§!"

 ### REDUNDANT ### nf_RED.9.t:0 "Gründet das Ministerium für Wirtschaft"
 ### REDUNDANT ### nf_RED.9.d:0 "[EINRICHTUNG NEUER MINISTERIEN NACH DEM KRIEGSENDE]"
 ### REDUNDANT ### nf_RED.9.a:0 "Das Ministerium wird gegründet"

 RED_ministry_departments_tt:0 "§gDurch§! §YFokusse§!, §YEntscheidungen§! §gund§! §YEvents§! §gwerden§! §YBerater§! §g freigeschaltet und einem §GMinisterium zugeordnet.§! Diese §YBerater§! können über Entscheidungen verbessert werden, was ihre Boni erhöht.\n\n Bestimmte§! §YFokusse§!, §YEntscheidungen§! §gund§! §YEvents§! §g-Belohnungen werden durch einzigartige §GEntscheidungen§! verbessert§!!"
 RED_minister_of_economics_departments_tt:0 "\n§YStepan Markelov§! §g Wird rekrutiert und soll als Leiter des Wirtschaftsministeriums fungieren.§!"

 nf_RED.10.t:0 "Neues Wirtschaftsmodul"
 nf_RED.10.d:0 "Es ist völlig klar, dass unsere Wirtschaft langsam, aber sicher verkümmert--\n\n warte.. \n\n... Du hättest den Fokus nicht abschließen sollen--\n\n DU SOLLTEST DIESEN FOKUS NICHT ABSCHLIEßEN KÖNNEN,CHEATER"
 nf_RED.10.a:0 "Ok."

 nf_RED.11.t:0 "Agitation"
 nf_RED.11.d:0 "Distressing, Reports call in that our own armed forces are disobeying orders directly from Revolution Square. Military command is fumbling and breaking apart by the seams as we speak, as the higher echelon has seemingly crumbled into two drastically opposing camps; Loyalists to the General Secretary and those stand defiant. Heralded by Kovshov who has assumed the mantle of leadership amongst the fractured ranks, his hears that inner reforms has made the Redline appear meek and fragile. Taking his most loyal soldiers into the deep recesses of the Metro to setup a base of operations to command and direct distraught cells of agitators.\n\nCaught between the crossfire, ordinary everyday soldiers and militias are stranded. As soldiers desert their posts, others take up arms and are cordoning entrances to and from stations. Blocking vital trade and access of people. When ordered by NKVD or Sokol administers to stand down they refuse, and instead threaten to open fire. The situation worsens by the hour, and whilst blood has yet to spill the fuse to the powder-keg fizzles down, and will inevitably explode sooner or later."
 nf_RED.11.a:0 "Kovshov, Damn you!"

 nf_RED.12.t:0 "Pilz_Revolte"
 nf_RED.12.d:0 "Erschwerend kommt hinzu, dass die jüngsten Unruhen innerhalb des Militärs ein Kollektiv unserer Bürger dazu veranlasst haben, massenhaft zu protestieren. Das einfache Volk und die Arbeiter sind müde vom Rückgang unserer Wirtschaft, dem dürftigen Lebensstandard und der Nahrungsmittelknappheit. Zum Glück konnten die Proteste vorerst von loyalen Streitkräften eingedämmt werden, es wächst jedoch die Befürchtung, dass sich diese Demonstrationen tatsächlich auf andere Stationen ausweiten und den gesamten Abzweig Sokol'niki verschlingen könnten. Die Produktionsquoten wurden gekürzt, und es ist zu befürchten, dass sich diese Proteste nur mit der Zeit und Untätigkeit verschlimmern werden. Der Zentralregierung geht langsam die Geduld aus."
 nf_RED.12.a:0 "Feinde der Revolution, so scheint es. Wir werden Sie rechtzeitig zurückdrängen."

 RED_unlock_mushroom_revolt_tt:0 "§gSchaltet die §!§YPilz-Revolte §! §g-Zweig im Fokusbaum frei.§!\n"
 RED_mushroom_revolt_countdown:0 "§gWenn der Nationalgeist abläuft bevor der§! §YPilz-Revolte§! §g-Fokusbaum abgeschlossen wurde, wird es zu einem§! §RBÜRGERKRIEG§! §gkommen!§!"

 nf_RED.13.t:0 "Korbut"
 nf_RED.13.d:0 "Für manche sind es Schimpfwörter: KGB, NKWD, Geheimpolizei, die Liste geht weiter. Ungeachtet dessen was die Menge sagen mag, ist ihre Rolle für die Aufrechterhaltung der Ordnung im Staat von entscheidender Bedeutung. Dies ist bei der Roten Linie mehr als überall sonst der Fall, und die aktuelle Situation zeigt, dass ihre Dienste von entscheidender Bedeutung sind.\n\nDas Staatssicherheitsbüro KGB wurde kurz nach der Gründung der Sokolnitscheskaja gegründet. Viele seiner Mitglieder waren ehemalige Mitarbeiter der russischen Staatssicherheit, und sogar eine Handvoll waren ehemalige KGB-Mitglieder während der kommunistischen Zeit Russlands. Seine Hauptaufgabe bestand damals darin, Spione innerhalb des Staates zu suchen und bei der Unterdrückung von Dissidenten und antirevolutionären Persönlichkeiten zu helfen. Von da an blieb ihre Macht durch ihre Nützlichkeit erhalten. Tschekisten bewachen viele Eingänge zur und von der Roten Linie und spüren potenzielle Terroristen und Spione auf.\n\nIhr neu ernannter Anführer, ein Mann namens Korbut, ist mit unglaublicher Geschwindigkeit durch die Ränge aufgestiegen, nicht zuletzt dank seiner List und Skrupellosigkeit. Somit wurde er zu einer der wichtigsten Persönlichkeiten des Staates, zumindest hinter verschlossenen Türen.\n\n Ein persönlicher Berater von Andrey zu werden, wäre von Vorteil, da ein persönlicher Berater sicherlich dazu beitragen würde, die zunehmenden Probleme innerhalb der Roten Linie zu steuern."
 nf_RED.13.a:0 "Korbut ist kein vertrauenswürdiger Mann, aber die Rote Linie ist auf ihn angewiesen..."

 RED_korbut_control_mechanic_tt:0 "§gIm Laufe des Spiels wird,§! §RKorbut§! §g versuchen seinen Einfluss innerhalb der §! §YRoten Linie.§! zu erweitern. §gBestimmte§! §YEntscheidungen§! §gund§! §YEvents§! §gwerden seine Macht anwachsen lassen. Seien Sie vorsichtig, denn es gibt keinen guten oder idealen Weg, ihm seine Macht zu entziehen...§! §YZumindest fürs Erste.§!"

 nf_RED.14.t:0 "Militär-Meutereien"
 nf_RED.14.d:0 "Die Situation mit unserem Militär hat sich verschlechtert. Soldaten weigern sich inzwischen völlig, die Befehle von ihren Kommandeuren entgegenzunehmen und die Kommandeure weigern sich, Befehle von unseren Offizieren entgegenzunehmen, und Offiziere weigern sich, dem Generalsekretär zuzuhören. Die Störung hat sich in der gesamten Roten Linie ausgebreitet. Die Kommunikation zwischen Kowschow, seinen Anhängern und der Zentralregierung ist unterbrochen. Beschwichtigung wird nicht funktionieren, aber vielleicht Moskvins Kopf. Die Frage ist nur wann wir zuschlagen werden."
 nf_RED.14.a:0 "Das gerät außer Kontrolle."

 RED_unlock_mutiny_path_tt:0 "§gSchaltet das §!§YMilitäre Meuterei§!-Zweig des Fokusbaums frei.§!"
 RED_mutiny_countdown:0 "§gWenn der Nationalgeist abläuft bevor der §YMilitär-Meutereien§! §g-Fokusbaum abgeschlossen ist, wird es zu einem§! §RBürgerkrieg§! §gkommen!§!"

 nf_RED.15.t:0 "Annäherung an die Andersdenkenden"
 nf_RED.15.d:0 "Diejenigen, die sich noch nicht für eine Seite entschieden haben, blieben bisher still. Während die Wippe von einer Seite zur anderen kippt, wagt die neutrale Gruppe, sich nicht für eine Seite zu entscheiden, aus Angst dass die Gegenseite gewinnt. Es geht weniger um Motive als vielmehr ums Überleben mit intakter Position und intaktem Kopf. In früheren Zeiten wären sie erschossen worden, dafür dass sie dem Generalsekretär keine absolute Unterwürfigkeit geschworen haben, aber dringende Angelegenheiten und die Wahrscheinlichkeit eines Aufstandes machen dieses Vorgehen nun schwierig, wenn nicht sogar unmöglich. Es muss ein subtilerer und indirekterer Ansatz gewählt werden. Wenn wir ihnen zeigen können, dass es keine Zweifel daran gibt, dass Andrey und seine Partei die Nase vorn haben, würden sie unserer Sache mit Sicherheit die Treue schwören. Treffen wir uns heimlich mit jedem der neutralen Generäle, um ihre Emotionen einzuschätzen und ihre Unterstützung zu gewinnen."
 nf_RED.15.a:0 "Wir können es uns nicht leisten, noch mehr potenzielle Loyalisten zu verlieren."
 nf_RED.15.b:0 "Maxim näherte sich den Kommandanten und unterdrückte jeden Gedanken an Gewissheit."

 RED_maxim_moskvin_is_a_general:0 "§CVerfügbar§!§g weil§! §YMaxim Moskvin§! §Gein General ist.§!"
 RED_maxim_becomes_resolute:0 "§gDie Kunde von§! §YMaxim Moskvin's§! §Ceiserner§! §gEinstellung verbreitet sich im Militär!§!"
 RED_recruit_generals_tt:0 "§GZwei§! §gneue Generäle werden verfügbar!§!"

 nf_RED.16.t:0 "Märtyrer verschwinden"
 nf_RED.16.d:0 "Die Lubjanka-Zellen sind voll. Einst beherbergte die Station nicht mehr als ein paar Kulaken, denen vorgeworfen wurde, illegale Waren im Ausland von der Roten Linie aus gehandelt zu haben. Ein Großfall reiht sich nun an den nächsten, die Staatssicherheit der Roten Linie schlägt mit voller Härte zu. Die schwindende Unterstützung für die Kontra-Revolution ist teilweise auf die Effizienz unseres KGB zurückzuführen."
 nf_RED.16.a:0 "Es ist geschafft"

 nf_RED.17.t:0 "Annäherung an die Hanse"
 nf_RED.17.d:0 "Die letzte Fraktion, an die wir uns wenden möchten. Wir beobachten unsere Aktionen nach dem Koalitionskrieg mit Ambivalenz und aufmerksamem Blick. Während die Hanse zum unangefochtenen Hegemon der äußeren der Metro wurde, mussten wir in unseren eigenen Grenzen schwelgen. Umschlossen von antikommunistischen Kräften rund um die Linie. Wir wurden isoliert.\n\nOb durch das Versprechen eines wirtschaftlichen Handels oder dem tatsächlichem Willen zur Deeskalation, die Hanse stimmte einem für beide Seiten vorteilhaften Handelsabkommen zu. Der Deal wird unter absoluter Geheimhaltung stattfinden."
 nf_RED.17.a:0 "Es ist geschafft"

 nf_RED.18.t:0 "Befreien Sie sich von den Ringführern"
 nf_RED.18.d:0 "Durch gesammelte und zusammengestellte Informationen der Staatssicherheit haben wir die sogenannten Brandstifter dieser sogenannten „Revolution“ aufgedeckt. Der Pöbel besteht überraschenderweise aus nicht mehr als eine Handvoll verärgerter Arbeiter und Bürger. Kein revolutionärer Agent, der von den Anarchisten oder Hanse angestellt wurde. Unsere Befürchtungen konnten jedoch nicht vollständig ausgeräumt werden, da es den Anschein hat, dass die Unruhen durch ihre Anführer nur noch mehr angeheizt werden. Wir feuern die Menge an, die immer größer wird. Obwohl es sich bei jeder einzelnen Station eigentlich nur um wenige lokalisierte Zellen handelt, gibt es keinerlei Organisation oder Kommunikation zwischen ihnen. Zumindest im Moment.\n\nWürden die Anführer der Gruppe beseitigt, würde das Gesindel bald auseinanderbrechen."
 nf_RED.18.a:0 "Nicht mehr als bloße Randalierer"

 nf_RED.19.t:0 "Unterdrücken Sie die Beweise"
 nf_RED.19.d:0 "Die Proteste wurden ziemlich schnell aufgelöst. Wenn man bedenkt, dass sich der durchschnittliche Bürger nicht sonderlich viel bewegt, vor allem angesichts der Natur der Metro, ist es schwierig, sich zu verbreiten. Nur durch Hetze oder den Klatsch umherziehender Händler kann sich die Nachricht von Aufständen tatsächlich verbreiten. Nachrichten darüber, dass die Regierung Lebensmittel in der benachbarten Station beschlagnahmt hat, wird die Unruhen nur noch verschlimmern.\n\nNach ein paar netten Worten wollen diese Handwerker nur ungern ihre Lippen über das Geschehen auf der Roten Linie lockern. Die Verschärfung der Sicherheit zwischen den Stationen hat die Sache verbessert. Allerdings sind Vermögenswerte, die von „störenden“ Händlern beschlagnahmt wurden, unter mysteriösen Umständen verschwunden. Die Tschekisten haben keine Ahnung, wohin sie gegangen sind."
 nf_RED.19.a:0 "Beweise? Für was? Kein Wort, kein Ton. Die Angelegenheit ist so gut wie tot"

 nf_RED.20.t:0 "Verschwörung"
 nf_RED.20.d:0 "Aslan Kostojew, einer von Andrejs engsten Beratern, ist vor der Roten Linie geflohen. Nach den jüngsten Berichten über militärische Kräfte, die sich gegen Andrejs Regierung stellen, scheint es, dass seine eigenen Beamten ihm gegenüber eine Abneigung hegen. Aslan nahm auf seiner Flucht wichtige Dokumenten mit, die bei einer Razzia in seinem Büro heute fehlten. Die Artikel, die nicht gefunden werden konnten, können die gesamte Linie gefährden, wenn sie in die falschen Hände geraten. Er muss gefangen werden."
 nf_RED.20.a:0 "Diese verdammte Ratte!"

 nf_RED.21.t:0 "Neue Wirtschaftspolitik"
 nf_RED.21.d:0 "WIP"
 nf_RED.21.a:0 "WIP"

 nf_RED.22.t:0 "Konsularischer Rat"
 nf_RED.22.d:0 "Das Militär ist von den derzeit laufenden Reformen alles andere als begeistert. Genauer gesagt ist der Oberbefehlshaber unserer Streitkräfte – ein Held des Hanse-Krieges – zutiefst unzufrieden mit den vorgenommenen Änderungen. Er hat sich insbesondere unter den rangniedrigeren Kommandeuren einen beachtlichen Ruf erworben und wird innerhalb des Militärs als populäre Galionsfigur verehrt. Kovshov ist, ganz ähnlich wie Moskvin, ein überzeugter Kommunist, und ihre Ideale decken sich weitgehend. Doch während Kovshov fest an die Macht des Schwertes glaubt, setzt Andrey seit einigen Jahren verstärkt auf die Kraft der Feder. Und so wird der Einfluss des Militärs beschnitten und durch eine zentralisierte Machtstruktur ersetzt, die dem Generalsekretariat und dessen Funktionären untersteht. Es existieren nun nicht mehr zwei getrennte Gewalten, sondern eine untrennbare Einheit. Kovshov fürchtet eine Wiederholung der Geschichte: erst Perestroika, dann Glasnost – und schließlich der Zerfall des Staates unter einer Flut der Ungewissheit. Er fürchtet den Moment, *falls* – und *wann* – die Regierung von ihren eigenen Idealen abweichen wird. Und genau dies, so Kovshovs Befürchtung, ist bereits geschehen.."
 nf_RED.22.a:0 "Zur Kenntnis genommen – vielen Dank."

 nf_RED.23.t:0 "Großer Schauprozess"
 nf_RED.23.d:0 "Ein umfunktionierter Wartungsraum in der Ploschtschad Rewoljuzii – einst eine notdürftige Zuflucht für Kranke und Sterbende, nun ein Gerichtssaal für jene, die die Revolution verraten haben. Kovschow steht dort vor Gericht, inmitten seiner einst prominentesten Generäle, und erwartet sein Todesurteil. Der Vorwurf: Hochverrat und Heimtücke – eine Verschwörung gegen Lenin persönlich aus reinem Eigennutz. Seine Taten: Komplotte gegen den Staat sowie konterrevolutionäre und antikommunistische Rhetorik. Die Verhandlung zog sich bis tief in die Nacht und weit in die darauffolgenden Tage hinein. Viele prominente Mitglieder des Politbüros, die als Zeugen aufgetreten waren, hatten den Saal bereits verlassen; nur wenige waren noch geblieben. Maxim Moskwin war einer von ihnen, an seiner Seite Korbut vom Staatssicherheitsdienst. Der Eingang wurde schwer bewacht – ausschließlich von jenen, die dem Generalsekretär am treuesten ergeben waren; während DSchK-Maschinengewehre und Patrouillenteams routinemäßig ihre Runden zogen, um etwaige Saboteure abzuwehren, die versuchten, der Gerechtigkeit entgegenzuwirken. Das Urteil erging rasch und unmissverständlich: Die Angeklagten wurden für schuldig befunden. Kein Heldenbegräbnis sollte ihnen zuteilwerden; stattdessen sollten sie im Morgengrauen des nächsten Tages in der Lubjanka hingerichtet werden. Der Staatssicherheitsdienst würde die Hinrichtung sowie die anschließende „Säuberung“ abwickeln. Jegliche Spuren ihres Vermächtnisses sollten rücksichtslos ausgelöscht werden. Ihre Leichen sollen verbrannt werden, damit sie keine Märtyrerverehrung inspirierten. Andrey und Kovschow tauschten einen flüchtigen Blick, als NKWD-Offiziere den Ex-General eilig in seine Zelle abführten. Vielleicht – in einer anderen Zeit, an einem anderen Ort – hätte ihre Freundschaft kein solches Ende gefunden. Vielleicht war der Interessenkonflikt nur ein Missverständnis gewesen. Vielleicht.."
 nf_RED.23.a:0 "Ihr Vermächtnis stirbt mit ihnen. Niemand wird von ihrem Verrat erfahren.."

 nf_RED.24.t:0 "Generäle verweigern neue Befehlshaber"
 nf_RED.24.d:0 "Es fällt uns zunehmend schwerer, neue, aufstrebende Kommandeure und Generäle für unsere Armee zu finden und auszubilden. Die Bereitschaft, den Befehlen unseres Oberkommandos Folge zu leisten, ist erheblich gesunken. Erschwerend kommt hinzu, dass unsere Militärführung begonnen hat, eigenmächtig und ohne entsprechende Fachkenntnis Rollen und Positionen innerhalb ihrer Korps zu vergeben – ein Zustand, der allerdings bereits seit geraumer Zeit Bestand hat.

Befehle aus der Zentrale werden dabei willkürlich befolgt. Während man früher den meisten Anweisungen und Ersuchen üblicherweise nachkam, ist dies heute nicht mehr der Fall – ganz im Gegenteil zu den Wünschen des Oberkommandos. Anstatt bei der Personalauswahl Ideale wie Leistung, Kompetenz und Loyalität gegenüber dem Sozialismus in den Vordergrund zu stellen, werden nun jene bevorzugt, die den jeweiligen einzelnen Generälen am treuesten ergeben sind. So gedeiht gewissermaßen ein kleiner Personenkult um jeden einzelnen Kommandeur. Ein solches „Warlordtum“ unter unseren Generälen ist niemals ein gutes Zeichen – ein Problem, das wir dringend angehen müssen."
 nf_RED.24.a:0 "Darum werden wir uns schließlich kümmern."

 nf_RED.25.t:0 "Generäle zweigen Arbeitskräfte ab"
 nf_RED.25.d:0 "In der Roten Linie wird Personal angesichts der jüngsten Ereignisse zunehmend zu einer knappen Ressource. Die größte Militärmacht der Metro sieht sich nun mit einem akuten Mangel an einsatzbereiten Kräften konfrontiert. Während die regionale Befehlsstruktur bröckelt und ins Wanken gerät, zweigen die gerisseneren Köpfe der Heeresführung Personal und wertvolle Ressourcen ab, um ihre eigenen Reihen aufzufüllen – wobei es sich dabei eher um abgeworbene Zwangsrekrutierte handelt als um echte Soldaten. Jene Generäle, die Andreys Herrschaft ansonsten skeptisch oder zweifelnd gegenüberstehen, sehen sich in einer Zwickmühle gefangen: Sie stehen zwischen dem amtierenden Generalsekretär – dem hinter vorgehaltener Hand ein Ruf als blasser, kraftloser Kommunist anhaftet – und dessen fragwürdigen Versuchen, das Militär zu reformieren. Auf der Gegenseite formiert sich eine abtrünnige Riege von Generälen und Kommandeuren unter der Führung von Kovshov. Diese Gruppe ist mittlerweile eher wie ein kriminelles Syndikat organisiert als wie eine vollwertige militärische Institution. Auch wenn es bislang noch zu keinen offenen Feindseligkeiten gekommen ist, spitzt sich die Krise bei der Zwangsrekrutierung unweigerlich zu, da die Bevölkerung entweder nicht gewillt oder schlicht nicht in der Lage ist, in die Reihen des Militärs einzutreten. Derweil ziehen die einzelnen Kommandeure so viel Personal wie möglich zusammen – für den Fall, dass tatsächlich ein Bürgerkrieg ausbricht.."
 nf_RED.25.a:0 "Wir können uns damit nicht befassen – sonst entzünden wir das Pulverfass."
 nf_RED.25.b:0 "Moskvin traf sich mit den Generälen. Nach zähen Verhandlungen schworen sie ihm die Treue."
 nf_RED.25.c:0 "Andrey erneuerte mit einer inspirierenden Rede das Vertrauen des Militärs in ihn als Vorsitzenden."
 nf_RED.25.e:0 "Finde die Anwerber und zerschlag ihnen die Kniescheiben."

 RED_has_maxim_resolute_trait:0 "§GVerfügbar§! sobald §YMaxim Moskvin§! folgende Eigenschaft besitz: §CEntschlossen§! Es folgen keine negativen Eigenschaften!"
 RED_has_andrey_war_support_trait:0 "§GVerfügbar§! sobald §YAndrey Moskvin§! folgende Eigenschaft besitz: §CSymbol der Revolution§!\nEs folgen keine negativen Eigenschaften!"

 nf_RED.26.t:0 "Verschwörung aufgedeckt"
 nf_RED.26.d:0 "Ein weiteres Komplott wurde von unseren staatlichen Sicherheitskräften aufgedeckt – und das buchstäblich in letzter Minute. Abtrünnige Unzufriedene aus den Reihen unseres eigenen Militärs haben heimlich Ausrüstung und Personal abgezweigt, um die Agitatoren zu versorgen. Quotenunterlagen und Logistikaufzeichnungen wurden vorsätzlich verfälscht, um den Anschein zu erwecken als würden keinerlei derartige Pläne geschmiedet. Nun jedoch ist das Komplott aufgeflogen – und das direkt vor unseren Augen. Wir haben nun die Wahl: Entweder wir greifen unverzüglich hart durch und bestrafen die schuldigen Offiziere und Soldaten, oder wir setzen die Staatssicherheit ein, um die Dissidenten mit einem einzigen Schlag auszuräumen."
 nf_RED.26.a:0 "Wir können uns offene Feindseligkeiten nicht leisten."
 nf_RED.26.b:0 "Die Staatssicherheit kann sich darum kümmern."
 nf_RED.26.c:0 "Verweisen Sie die Verbrecher unverzüglich wegen ihrer Verbrechen zurecht."

 nf_RED.27.t:0 "Bürgeraufstände"
 nf_RED.27.d:0 "Zunächst führten Bauern die Demonstrationen an, dann gesellten sich Menschen aus allen Gesellschaftsschichten hinzu: Studenten, Ältere und schlicht jene, die lediglich auf Krawall aus waren. Die Revolution – wie sie von ideologisch fanatischen oder auch nur leicht beeinflussbaren Mitgliedern dieser sogenannten „Bewegung“ bezeichnet wird, verblasst völlig im Vergleich zu jener, die einst den Grundstein für die Gründung der Union der Sozialistischen Sowjetstationen gelegt hatte. Dennoch droht diese Unruhe nun, die Rote Linie erneut in die Knie zu zwingen. Ein noch weitaus größeres Desaster wäre es, sollten Nachrichten über diese Proteste zu den benachbarten Stationen – oder schlimmer noch – durchsickern. Die Situation erfordert ein überlegtes und äußerst behutsames Vorgehen. Wir können es uns nicht leisten, dass uns sowohl das Militär als auch das Volk in feindseliger Haltung gegenüber der Regierung gegenüberstehen."
 nf_RED.27.a:0 "Wir müssen die Partei reformieren."
 nf_RED.27.b:0 "Wir haben keine Wahl ... wir müssen uns für Unterstützung an die Hanse wenden."

 nf_RED.28.t:0 "Treffen mit den Revoluzern."
 nf_RED.28.d:0 "Nach zähen Debatten unter den Andrey noch immer loyalen Mitgliedern seines Kabinetts einigten sich alle Parteien darauf: Sollte diese Angelegenheit beigelegt werden, müssten sowohl die Regierung als auch die Protestierenden aufeinander zugehen und eine gemeinsame Lösung finden. Selbst mit seinen leidenschaftlichen Argumenten fiel es Andrey schwer, die Meinung selbst seiner treuesten Anhänger zu ändern. Für Andrey waren diese Getreideaufständischen nichts weiter als einfache Leute aus dem Volk, die sich – angestachelt durch Geschichten aus alten Zeiten – als revolutionäre Rebellen aufspielten. Sie hatten keine Ahnung, wie man auch nur einen Schweinezuchtbetrieb ordentlich führt – geschweige denn eine Regierung. Die Debatten zogen sich bis tief in die Nacht hin; dabei hielten jene Kabinettsmitglieder, die Andrey widersprachen, dagegen, dass die „Rote Linie“ es sich nicht leisten könne, ihre Ideale weiter auszuhöhlen und ihre moralischen Grundsätze dem Autoritarismus zu opfern – genau so, wie es einst die Sowjetunion nach Lenins Tod getan hatte..\n\nNach stundenlangen Debatten und einem ständigen Hin und Her der Argumente wurde schließlich ein Konsens erzielt: Es war offensichtlich, dass diese Aufständischen nichts anderes waren, als Amateure: berauscht vom Hype und den Parolen der kranken und verzweifelten Massen, die sie bejubelten. Nichts als fanatisch dreinblickende Manipulatoren mit einer Vorliebe für große Reden. Ihnen fehlte schlichtweg die Dreistigkeit – oder der Fanatismus –, die „Rote Linie“ frontal herauszufordern; hätten sie dies vor, hätten sie es längst getan. Doch wie immer würden sie einfach immer weiter fordern und fordern. So wurde beschlossen, ein Treffen mit den Anführern der Demonstranten zu arrangieren. Es gestaltete sich nicht sonderlich schwierig, die Galionsfiguren ausfindig zu machen – wenngleich deren anfängliche Zurückhaltung gegenüber einem Treffen es zunächst fast so aussehen ließ, als würde der Plan scheitern. Doch Andrey hatte noch ein Ass im Ärmel …"
 nf_RED.28.a:0 "Ein verstecktes DShK machte kurzen Prozess mit den Aufwieglern. Ein Exempel sollte statuiert werden."
 nf_RED.28.b:0 "Ein Ass ist kein Gegner für eine Kugel.."
 nf_RED.28.c:0 "Beide Parteien trennten sich in Einigkeit. Das Ass war Korbut."

 nf_RED.29.t:0 "Annäherung an die Hanse"
 nf_RED.29.d:0 ""
 nf_RED.29.a:0 "Wenn wir müssen, haben wir keine andere Wahl."

 nf_RED.30.t:0 "Der Staub hat sich gelegt."
 nf_RED.30.d:0 "Während die letzten Demonstranten verstummen, versinken die meuternden Militärs in ihren eigenen Reihen im Chaos und werden vollständig von NKWD-Funktionären geschluckt. Der aufgewirbelte Staub beginnt sich zu legen und wird sich schließlich setzen. Aslan Kostoyev ist noch immer auf freiem Fuß und muss erst noch festgenommen werden. Andrey und sein Ministerium können sich nun auf vernünftigere politische Maßnahmen der Roten Linie konzentrieren.."
 nf_RED.30.a:0 "Es ist endlich vorbei."

 nf_RED.31.t:0 "Kunst und Kultur"
 nf_RED.31.d:0 "Das Sowjetrussland nahm in Kunst und Kultur eine Vorreiterrolle ein – untrennbar verknüpft mit der staatlichen Propagandamaschinerie und dazu angetan, die Völker zu Leistungen anzuspornen, die weit über das gewöhnliche menschliche Maß hinausgingen. Selbstverständlich sind wir keine bloßen Wilden; und so liegt es auf der Hand dass die „Rote Linie“ erneut eine Vorreiterrolle übernehmen könnte – indem sie gezielt Mittel in Kunst und kulturelle Institutionen investiert."
 nf_RED.31.a:0 "Ein kleiner Beitrag zur Kunst"
 nf_RED.31.b:0 "Massive Förderung von Kunst und Kultur."
 nf_RED.31.c:0 "Ich hatte noch nie ein Auge für Kunst."

 nf_RED.32.t:0 "Proteste"
 nf_RED.32.d:0 "Nicht nur das einfache Volk protestiert massenhaft, sondern nun auch unsere eigenen Gewerkschaften. Derzeit befinden sich lediglich einige wenige, aufgebrachte Gewerkschaften jenseits der „Roten Linie“ im offenen Protest. Angestachelt durch jüngste Vorfälle, erheben sie nun Einspruch – in der Forderung nach weiteren Reformen."
 nf_RED.32.a:0 "Möchtegern-Demonstranten sind bloße Staatsfeinde!"
 nf_RED.32.b:0 "Wir können dagegen nicht viel ausrichten."
 nf_RED.32.c:0 "Schieß in die Menge – oder so etwas!"

 nf_RED.33.t:0 "Maxims Talente"
 nf_RED.33.d:0 "Dies ist zu einem Gegenstand heftiger Debatten innerhalb von Andreys engstem Beraterkreis geworden: Sein Bruder hat sich einerseits einen beachtlichen Ruf unter den unteren militärischen Führungsebenen erworben; sein jüngster Umgang mit dem Militär hat dies nur noch bestätigt. Neue Rekruten verehren ihn ebenso sehr wie es das einfache Volk bei Andrey tut. Maxim mag für sich genommen kein außergewöhnlicher Mann sein – doch seine Loyalität zur „Roten Linie“ steht außer Frage. Die brüderlichen Bande zwischen Andrey und Maxim würden zudem sicherstellen, dass kein Verrat stattfinden kann. Maxim hat wiederholt den Wunsch geäußert und darauf hingearbeitet, eine Position der Macht und des Einflusses zu bekleiden – um zu führen. Ihm die Rolle des Generals der Streitkräfte zu übertragen könnte ihm genau dies verschaffen."
 nf_RED.33.a:0 "Maxim wird sich als unschätzbarer Verbündeter erweisen."
 nf_RED.33.b:0 "Maxims aktuelle Position passt ihm gut."

 nf_RED.34.t:0 "Meuterer aus externen Quellen finanziert"
 nf_RED.34.d:0 "Während die Meuterer ins Wanken geraten, haben unsere Sicherheitskräfte eine jüngste Verschwörung aufgedeckt: Es existieren nach wie vor zahlreiche Tunnel und Versorgungsschächte, die bislang weder in Besitz genommen noch erkundet wurden – manche von ihnen verseucht mit Mutanten, Leichen oder anderen derartigen Schrecken. Ein beträchtlicher Teil dieser Gänge dient zudem als Versorgungslinie, um die Meuterer zu versorgen und finanzieren. Es liegt auf der Hand, dass diese außerstande sind, ihre eigenen Streitkräfte vollständig auszurüsten und zu versorgen; dies wird zusätzlich durch Berichte untermauert, wonach ihre Truppen von einer externen Quelle beliefert werden, die geheime Tunnel nutzt, um Waffen hin und her zu transportieren. Die Frage lautet nun: Wer versorgt sie?"
 nf_RED.34.a:0 "Wahrscheinlich kein Grund zur Sorge."
 nf_RED.34.b:0 "Diese verdammten Banditen!!"
 nf_RED.34.c:0 "Diese verdammten Revolutionäre!"

 nf_RED.35.t:0 "Meutereien innerhalb der Meuterei"
 nf_RED.35.d:0 "Jene Meuterer haben sich vom gemeinen Pöbel der übrigen abgespalten und verlegen sich nun auf das Plündern und Überfallen der abgelegenen Tunnel. Da sie sich lediglich mit kargen Resten über Wasser halten können, verfallen sie allmählich dem Banditentum, um ihr Überleben zu sichern. Während die Hauptgruppe der Meuterer zunehmend an Bedrohlichkeit einbüßt, könnten diese Banditen zu einem weitaus dringlicheren Problem heranwachsen, das es zu gegebener Zeit zu bewältigen gilt."
 nf_RED.35.a:0 "Schicken Sie unsere Truppen, um mit ihnen fertigzuwerden."
 nf_RED.35.b:0 "Wenn sie sich stellen, werden sie fair behandelt."
 nf_RED.35.c:0 "Lass sie unter dem Vorwand abziehen, sie würden freigesprochen werden."

 nf_RED.36.t:0 "Kuznetsky Most"
 nf_RED.36.d:0 "Die Waffenstation bestreitet ihren Lebensunterhalt durch den Verkauf von Rüstungsgütern an das übrige Metronetz. Dabei handelt es sich nicht nur um Waffen, sondern auch um medizinische Hilfsgüter, Munition und sonstige Ausrüstung, die dafür sorgen, dass das Kriegsgetriebe reibungslos läuft. Die Rote Linie hat die Techniker von Kusnezki Most seit jeher als Freunde betrachtet, und zwischen den beiden Stationen findet reger gegenseitiger Handel statt: Die Rote Linie liefert Nahrungsmittel und Rohstoffe, während die Techniker – wenig überraschend – unsere Truppen mit Waffen versorgen. Innerhalb von Kusnezki Most gibt es viele, die mit der schwierigen Lage der Roten Linie sympathisieren; insgesamt genießen die beiden Stationen einen vergleichsweise hohen Grad an gegenseitigem Respekt."
 nf_RED.36.a:0 "Ein guter Deal"


 nf_RED.40.t:0 "L.P. Beria-Besserungsarbeitslager eingerichtet"
 nf_RED.40.d:0 "Das Besserungsarbeitslager „Genosse Beria“ – oder kurz: das Berilag. Es befindet sich an der Station „Ulitsa Podbelskogo“. Konzipiert zur Inhaftierung von Feinden der Roten Linie, kann es jedoch auch für andere, ähnliche Zwecke genutzt werden: zur Stärkung unserer eigenen Forschungs- und Entwicklungskapazitäten sowie als Mittel, um – fernab der öffentlichen Augen – in eher unkonventionelle Forschungsgebiete vorzustoßen."
 nf_RED.40.a:0 "Das Berilag soll eingerichtet werden."

 RED_berilag_system_tt:0 "§YAktiviert Mechanik§! : §OBerilag§!\n"
 RED_berilag_system_desc_tt:0 "Wir werden in der Lage sein, eine gewisse Menge an politischer Macht, §YForschungsgüter§! and §OGefangene§! im Austausch für §CForschungspunkte§! einzusetzen, welche für Forschungs- §YBoni§! eingetauscht werden können. Solange [228.GetName] unter unserer Kontrolle bleibt, steht uns diese Mechanik zur Verfügung."


 nf_RED.52.t:0 "Die Banditen der Sucharewskaja"
 nf_RED.52.d:0 "Die Banditen der Sucharewskaja – ehemalige Soldaten der Roten Linie und anderer Abschaum, den das Militär während des Hansa-Krieges zwangsrekrutiert hatte. Eher Schläger als eine disziplinierte Streitmacht, rüsteten sie sich dennoch mit Waffen und Kriegsgerät aus, die sie der Roten Linie entwendet hatten, als sie der Revolution zugunsten ihres eigenen Profits den Rücken kehrten.\n\nIhr Anführer – schlicht „Meister“ genannt – war einst ein rangniederer Offizier, wenngleich die Informationen diesbezüglich lückenhaft sind. Im Vergleich zu seinen damaligen Kameraden verfügte er über ein ausgeprägteres ideologisches Rückgrat – oder hegte schlicht eine größere Faszination für die Sache. Er führte seine eigene Station eher wie ein Ausbildungslager als wie eine lose Bande von Brigadieren. Ob sich diese Disziplin jedoch auch in der Standhaftigkeit seiner Truppen widerspiegelt, bleibt abzuwarten. Da sie von unseren Streitkräften völlig überrascht wurden, dürften sie keine allzu große Bedrohung darstellen. Ihre Sprengausrüstung hingegen ist eine Macht, mit der unbedingt zu rechnen ist.."
 nf_RED.52.a:0 "Die Überläufer der Roten Linie in jedem Falle zu töten."

 nf_RED.53.t:0 "Die Beseitigung der Banditen von Sucharewskaja"
 nf_RED.53.d:0 "Die Leiche des Meisters wurde allein und ausgestreckt inmitten der Trümmer seiner Privatgemächer aufgefunden. Eine Kugel muss von einer nahegelegenen Wand abgeprallt sein und ihn direkt in die Brust getroffen haben. Er verblutete und erlag seinen Wunden, während der Schusswechsel weiterhin die Hölle über die Station hereinbrechen ließ. Kurioserweise starb er genau so, wie er gelebt hatte: feige und erbärmlich..\n\nTrotz des Todes ihres Anführers leisteten die Banditen weiterhin erbitterten Widerstand. Sie riegelten weite Teile der Station ab und zogen sich – während die Streitkräfte der Roten Linie vorrückten – Stufe um Stufe in die jeweils nächste Ebene zurück. Die Befürchtung, die Banditen könnten als letztes Mittel die gesamte Station zum Einsturz bringen, erwies sich als unbegründet, als diese ihren Rückzug in ihre letzte Zufluchtsstätte antraten. Einer nach dem anderen wurde ausgeschaltet; als schließlich nur noch die letzten Überlebenden verblieben, gelang es lediglich einer Handvoll Flüchtlinge, in die tiefe Dunkelheit der Tunnel zu entkommen – um nie wieder gesehen zu werden."
 nf_RED.53.a:0 "Das war's dann wohl."

 nf_RED.54.t:0 "Positives Heldentum"
 nf_RED.54.d:0 "Diszipliniert und heldenhaft selbst angesichts von Widrigkeiten, sind die Bürger der Roten Linie unermüdlich; weder Schweiß noch Hunger können sie entmutigen. Es sind jene, die die Olivenbäume an jenen Orten pflanzen, unter denen sie selbst niemals werden sitzen können – um eine sozialistische Utopie für die Menschen von morgen zu errichten."
 nf_RED.54.a:0 "Für jene, die die Fackel des Sozialismus tragen"
 nf_RED.54.b:0 "Für jene, die die UdSSR wiederaufbauen"
 nf_RED.54.c:0 "Für die Arbeiter der Sokolnitscheskaja"

 nf_RED.66.t:0 "Explosion auf den Sperlingsbergen"
 nf_RED.66.d:0 "Ob nun einer unserer Soldaten versehentlich einen Sprengsatz auslöste oder ob die Explosion durch die Hand der „Universität“ herbeigeführt wurde – auf der Sperrlingshügel-Brücke ereignete sich eine Detonation. Ein großes Brückenstück stürzte daraufhin in die eisigen Fluten nach unten. Eine geordnete Evakuierung war nicht möglich, da sich die Explosion völlig unvermittelt ereignete. Die Brücke befand sich bereits zuvor in einem schlechten Instandhaltungszustand, was die logistische Belastung für unsere Einheiten vor Ort zusätzlich verschärft. Zwar ist die Brücke nicht vollständig eingestürzt; dennoch wird es auf absehbare Zeit schwierig bleiben, Truppen sicher über sie zu verlegen.."
 nf_RED.66.a:0 "Verdammt!"

