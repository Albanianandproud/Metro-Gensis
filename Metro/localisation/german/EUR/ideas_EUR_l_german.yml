 EUR_diversity_is_weakness_desc: "§YEuropa§! besteht aus einem Mischmasch verstreuter Gruppen von §YEuropäern§! - Jede Station ist durch einen eigenen Mikrokosmos europäischer Sprachen und Kulturen zersplittert.\n§YDie 2. Pariser Kommune§! - entstand kurz nach der nuklearen Apokalypse un übernahm die vollständige Herrschaft über die drei isolierten Stationen. Rücksichtslos versuchte sie, die unterschiedlichen Gruppen in einer kollektivierten Identität zu vereinen, und scheiterte schließlich völlig unter ihrer eigenen eingebildeten Sicherheit. Seit dem Zusammenbruch haben sich diese Unterschiede zwischen den einzelnen Stationen nur noch verschärft."
