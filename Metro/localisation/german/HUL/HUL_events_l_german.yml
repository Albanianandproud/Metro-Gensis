l_german:
 nf_HUL.1.t: "Handel mit Anarchisten...?"
nf_HUL.1.d: "Die [HUL.GetName] sind bei uns eingetroffen und möchten Handel treiben. Normalerweise sitzen sie lieber herum und diskutieren über universelle Solidarität und ähnlichen Kram, anstatt ihre Ideen tatsächlich in die Tat umzusetzen. Dennoch sollten wir ihr Angebot in Betracht ziehen – vielleicht können wir davon profitieren."
nf_HUL.1.a: "Ein gutes Geschäft."
nf_HUL.1.b: "Für so etwas haben wir keine Zeit."

nf_HUL.2.t: "General Nestor...?"
nf_HUL.2.d: "Nun, da sich der Staub langsam legt und der Feind weit von der Republik zurückgedrängt wurde, feiern die Menschen unserer Stationen ihren hart erkämpften Sieg. Der Feind wurde besiegt – dank unseres Anführers, dessen entschlossene Führung und eiserner Wille unsere Kräfte in ihrer dunkelsten Stunde zusammengeführt haben. Er wird von allen gelobt, selbst von den alten Nörglern unter unseren Genossen.\n\nMit seinem Charisma und seinem scharfen Verstand könnte Onkel Nestor unsere Streitkräfte vielleicht noch weiter führen – hinaus über die Grenzen unseres Territoriums, vielleicht sogar durch die gesamte Metro unter der schwarz-roten Fahne. Nicht als Eroberer ... sondern als Befreier."
nf_HUL.2.a: "General Nestor ... das hat doch einen gewissen Klang, oder?"
nf_HUL.2.b: "Nestor würde lieber zurücktreten und jemand anderem die Führung überlassen."

nf_HUL.3.t: "Zugedröhnte Anarchie"
nf_HUL.3.d: "Was einst als harmlose Gewohnheit oder Mittel gegen Erschöpfung begann, hat sich zu einer weit verbreiteten Abhängigkeit entwickelt. Vom einfachen Milizionär bis hin zu unseren Kommandanten scheint jeder irgendeiner Droge verfallen zu sein. Drogenmissbrauch ist allgegenwärtig, und die Folgen – Sucht, Abhängigkeit und allerlei unberechenbares Verhalten – sind kaum noch zu übersehen.\n\nWir stehen vor einem Dilemma: Greifen wir hart durch und riskieren, dass unsere Streitkräfte praktisch zum Stillstand kommen? Oder schauen wir einfach weg?"
nf_HUL.3.a: "Vorerst müssen wir wegsehen."
nf_HUL.3.b: "Wir müssen sofort dagegen vorgehen!"

nf_HUL.4.t: "Anzeichen der Besserung"
nf_HUL.4.d: "Monate nachdem das Oberkommando eine umfassende Kampagne gegen den Drogenmissbrauch innerhalb der Streitkräfte eingeleitet hat, zeigen sich erste Erfolge. Entzugserscheinungen und sinkende Moral belasteten die Truppe zunächst erheblich, doch dank strengerer Kontrolle, Beratungsprogrammen und der Rückkehr zu militärischer Disziplin gewinnen die Einheiten langsam ihre Geschlossenheit zurück.\n\nTruppführer berichten von besserer Koordination, weniger Zusammenbrüchen im Einsatz und einem erneuerten Vertrauensverhältnis zwischen Führung und einfachen Soldaten. Einige murren zwar noch über die neuen Vorschriften, doch das Schlimmste scheint überstanden zu sein. Wir haben vielleicht kurzfristig an Schlagkraft eingebüßt, aber die Miliz steht nun wieder auf festeren Beinen."
nf_HUL.4.a: "Gut."

nf_HUL.5.t: "Das gute Zeug"
nf_HUL.5.d: "Die Soldaten der Republik haben den Ruf, nichts weiter als krimineller Abschaum und Vollidioten zu sein. Abgesehen davon, dass sie gelegentlich verstümmelte Zitate von Kropotkin oder Bakunin vor sich hinmurmeln, ist an diesem Vorurteil sogar etwas Wahres dran.\n\nAllerdings verdanken wir diesen Ruf nicht unserem Hang zum Rowdytum. Nein, vielmehr liegt es an den beinahe tödlichen Mengen an Drogen und Rauschmitteln, die in unseren Reihen kursieren. Wenn unsere Soldaten nicht gerade völlig zugedröhnt sind oder bereits den nächsten Schuss herbeisehnen, taumeln sie in einem permanenten Nebel aus Betäubungsmitteln umher.\n\nSolange wir nur Mutanten bekämpfen müssen, mag das noch funktionieren. Doch bisher sind das die einzigen Ziele gewesen, auf die wir schießen mussten. Sollte sich jemals eine ernsthafte Patrouille des Reichs oder der Hanse dazu entschließen, genügend Kräfte gegen uns aufzubringen, könnten sie uns in einem einzigen Schlag auslöschen, bevor unsere Soldaten überhaupt wieder nüchtern werden."
nf_HUL.5.a: "Sagt NEIN zu Drogen. Zumindest zu den schlechten."
  nf_HUL.6.t: ""
