  nf_HUL.17.t: "Исчезновения сталкеров"
  nf_HUL.17.d: "К настоящему моменту должно быть ясно, что наши сталкеры справляются не так хорошо, как следовало бы. Либо им не повезло, либо они просто не справляются с поставленной задачей. Во время вылазок наши сталкеры то и дело исчезают и не возвращаются в столицу [HUL.Capital.GetName]."
  nf_HUL.17.a: "Что-то не так."
  nf_HUL.18.t: "Наблюдатели в Белом"
  nf_HUL.18.d: "Становится ясно, что наши сталкеры намеренно подвергаются нападкам со стороны невидимой угрозы. То, что мы поначалу принимали за несчастные случаи или случайных мутантов, теперь оказывается более человечным виновником. Фашисты с Тверской не заходят так далеко, а идеологически фанатичные сталкеры с Красной черты держатся в центре города или в любых местах, имеющих культурное значение."
  nf_HUL.18.a: "Мы должны удержать наших Сталкеров, мы не можем позволить себе их потерять."
  nf_HUL.19.t: "Бывший враг снова появляется"
  nf_HUL.19.d: "Как оказалось, мы были правы. Наших солдат убивали не фашисты и не коммунисты, а совершенно другая группа. Их называют Авиаторами – бывшими сотрудниками ОКБ Микояна, которым удалось пережить войну, практически невредимыми в своих землянках. Они продолжают свои исследования, невзирая на ядерный армагеддон. Мы сражались с ними однажды, много лет назад. Они создали базу на станции [HUL.Capital.GetName], но в конце концов мы их прогнали. С тех пор они восстанавливаются, выжидают удобного момента, готовясь к нападению и восстановлению связи с Метро.\nСлухи о том, что им удалось создать человекоподобных роботов-солдат, по большей части были выдумкой, но что именно им удалось построить и разработать за какой период времени, мы не хотим знать."
  nf_HUL.19.a: "Их можно победить. Мы можем победить их снова."
  nf_HUL.20.t: "По всей Сторожевой Башне"
  nf_HUL.20.d: "Вылеты «Микояна» становятся всё агрессивнее с каждой неделей. Всё очевидно: они планируют прорваться в Метро и атаковать наши станции. Мы должны быть готовы."
  nf_HUL.20.a: "Приготовьтесь к бою, все на палубу!"
  nf_HUL.21.t: "Дополнение"
  nf_HUL.21.d: "Похоже, силы, отправленные авиаторами, пока отступили. Теперь мы можем вздохнуть с облегчением, поскольку нам удалось противостоять их лучшим силам. Им потребуется огромное количество времени, чтобы начать какие-либо интенсивные стычки с нашими силами или нашими сталкерами. Теперь мы сможем безопасно отправлять сталкеров на поверхность, не опасаясь, что их перехватят авиаторы."
  nf_HUL.21.a: "Наконец-то хорошие новости."
  nf_HUL.22.t: "Отсюда в будущее"
  nf_HUL.22.d: "После нашей битвы с авиаторами возникла неопределённость, но одно остаётся ясным. Республика не может вечно сидеть сложа руки, довольствуясь своим уголком в метро. Что, если бы авиаторы были фашистами? Капиталистами, стремящимися уничтожить последний оплот свободы трудящихся, или Красной чертой, вершившей месть? Историю пишут те, кто пишет, но победители имеют право писать всё, что им вздумается."
  nf_HUL.22.a: "Необходимо решить будущее Республики."
  HUL_can_pick_leadership_path_tt: "Разблокировано: §YПуть выбора политического лидера.§!"


  nf_HUL_aviators.0.t: "Исследования превыше всего"
  nf_HUL_aviators.0.d.a: "Пока Москва лежит в дымящихся руинах, остатки старого мира всё ещё сохраняются. Глубоко под стенами железобетона и металла ОКБ Микояна остаётся непреклонным – учёные и инженеры продолжают неустанную работу, движимые почти безумной одержимостью. Их исследования теперь идут вперёд, без каких-либо ограничений, без каких-либо внушений или моральных принципов. Апокалипсис не заглушил любопытство – он лишь отточил его, превратив во что-то более холодное и решительное."
  nf_HUL_aviators.0.d.b: "Удовлетворив все свои потребности, [AVV.GetName] могут продолжить свою деятельность, выполняя планы и внедряя прототипы своих исследований. Пока им от нас ничего не нужно."
  nf_HUL_aviators.0.a: "При необходимости мы наверняка сможем оказать помощь."
  nf_HUL_aviators.0.b: "Пока что мы позволим им спокойно работать.."
  HUL_AVV_improved_guns: "Благодаря нашей помощи §Y[AVV.GetName]§! улучшили свою технику. Улучшены эффекты §Y[?HUL_aviator_assistance_give_guns]§!."
  HUL_can_help_aviators_again: "Мы можем снова помочь §YАвиаторам§! с их исследованием."

  HUL_aviator_cooldown: "Группа §Y[AVV.GetName]§! занята проведением исследований. Решения, связанные с группой §Y[AVV.GetNameAdj]§!, в настоящее время не могут быть приняты."

  nf_HUL_aviators.1.t: "Посмертный прогресс"
  nf_HUL_aviators.1.d: "Если оставить в стороне неблагодарную службу, они пока довольствуются поставками электроники. Зачем? Инженеры не осмелились ответить на наши вопросы. «Вы не поймёте» и другие снисходительные слова бормотали себе под нос. Что бы это ни было, наша помощь даёт результаты. По крайней мере, впечатляющие.\nБолее дружелюбные инженеры, по крайней мере, проявили некоторую благодарность, пусть даже их улыбки стали более отстранёнными. В ответ они позволили нам ознакомиться с их запасами. Ничего особенного, но демонстрация удовлетворенности — это нечто, учитывая, что мы несколько лет назад сократили их число вдвое."
  nf_HUL_aviators.1.a: "Мы надеемся, что эта электроника окажется полезной."
  HUL_aviator_can_purchase_firearms: "Разблокировано решение: §Y[?HUL_aviator_assistance_give_guns]§!. Может купить оружие у §YАвиаторов§!"

  nf_HUL_aviators.2.t: "Знания приносят пользу"
  nf_HUL_aviators.2.d: "Свет в их бункерах загорелся чуть ярче благодаря нашим усилиям. Бюро запросило энергию для своих исследований, и мы её предоставили. Теперь их усилия могут осуществляться с максимальной эффективностью и днем, и ночью. Их модели предсказывают лишь колоссальный прогресс, а теперь ожидаемые сроки резко сократились. Инженеры, по их словам, усердно трудятся, но вряд ли станут рассказывать нам, над чем именно. Ходят слухи об экспериментах, о которых можно только мечтать, о том, что лучше оставить в тайне. Но они не смеют нас пускать в это дело, это лишь снизит эффективность."
  nf_HUL_aviators.2.a: "Рады, что смогли быть полезны."

  nf_HUL_aviators.3.t: "Атомное просвещение"
  nf_HUL_aviators.3.d: "Никаких приказов, никаких контрактов, никаких государств, которые бы ими управляли. Безграничная инженерия и наука. Без морали и вопросов. Они бормочут, но прямо говорят нам, что это ради блага человечества, как только уравнения будут закончены. Остаётся лишь запустить симуляции и обдумать анализ. Потому что наука должна продолжаться. Мир, возможно, и закончился много лет назад, но знание неуклонно катится вперёд.\n\nКак бы ни сентиментальничали эти умники, некоторые из них предлагают нам «одолжить» старую электронику, которая им не нужна. Конечно, компьютеры и дисководы, выпущенные до начала XXI века, можно легко разобрать на запчасти, но они всячески подталкивают нас найти им «лучшее применение». Что бы это ни значило."
  nf_HUL_aviators.3.a: "Мы, безусловно, можем оказать дальнейшую помощь."

  nf_HUL_aviators.4.t: "В погоне за прогрессом"
  nf_HUL_aviators.4.d: "Они говорят нам, что близки. Ближе, чем когда-либо. Даже их предсказания не предвещали им такого успеха. За их завуалированной просьбой скрывается зарождающееся волнение. Всё для них сходится: годы бесплодных научных поисков, неудач и катастроф. Необходимо привести в соответствие последние переменные. Догадки превратились в теорию и почти стали реальностью. Им нужна помощь в этом.\n\nНаконец, они согласились рассказать нам о своих исследованиях. Не секрет, что когда много лет назад на нас напали их войска, им помогали машины. Хотя это были простые дроны, собранные из уже существующих машин для обезвреживания бомб, украденных ими много лет назад, их неудачная атака отбросила их на круги своя, к чертежной доске. Гораздо больше возможностей, чем проклятия, как они изначально думали. Вместо механических дроидов они могли бы создавать полностью автономные единицы, способные общаться, вести разведку, мыслить и принимать решения самостоятельно. Самосознание, без навязчивых соображений, которые сопровождают разум. Неизвестно, какую пользу это может принести не только нам, но и будущему человечества. ИИ, который служит человеческим потребностям и ценностям, а не направляется капиталистическими или империалистическими пальцами.\n\nНо Бюро работает в напряжении. Персонал достигает своего предела, им требуется больше. Больше всего. Возможности всё больше сужаются, а ставки теперь невообразимы.\nОни уверяют нас, что это того стоит. Остаётся только немного продвинуться вперёд..."
  nf_HUL_aviators.4.a: "Мы им поможем. Надеюсь, это того стоит."
  HUL_aviator_final_decision_tooltip: "Мы должны помочь §YАвиаторам§! в последний раз. Им нужно больше энергии и ресурсов для финального рывка... Возможно, этот так называемый §Y[106.GetName]§! содержит то, что нам нужно...?"

  nf_HUL_aviators.5.t: "Мысль из стали"
  nf_HUL_aviators.5.d: "Он живой. Ну… вроде как. Они представили первую партию прототипов роботов. Они спотыкаются чаще, чем ходят прямо, их прицеливание несовершенно по сравнению с нашими опытными бойцами, а время реакции значительно замедлено. Он не может думать так, как мы, но ему это и не нужно. Он следует за нами, подчиняется и убивает.\n\nПрототипы примитивны, больше похожи на машины и шестерёнки, чем на настоящий интеллект, и по конструкции больше напоминают роботов и гуманоидов. Но они действуют без сна, без еды и без ограничений. Первая партия — это не просто способ ведения войны, это проект будущего."
  nf_HUL_aviators.5.a: "Порог перейден. Революция сейчас зовёт нас."
  HUL_aviators_can_produce_combat_robots_tt: "Разблокировано решение: §Y[?HUL_aviator_assistance_produce_combat_ai]§! могут запросить дополнительные боевые машины от §Y[AVV.GetNameAdj]§!."