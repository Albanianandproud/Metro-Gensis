l_german:
  nf_MDR.1.t: "Kontakt mit Moskau"
  nf_MDR.1.d: "Grüße, Präsident [ROOT.GetLeader], unter Ihrer Amtszeit ist die Republik allen Widrigkeiten zum Trotz floriert. Ihre Soldaten bleiben Ihrer Sache standhaft treu, und durch Überzeugungsarbeit wird der zivile Sektor Ihrer Sache mit Sicherheit folgen. Darf ich vorschlagen, dass es jetzt an der Zeit ist, Kontakt aufzunehmen? Wir haben Berichte gehört, dass die südlichen Stationen tatsächlich bewohnt sind. Nicht von Mutanten, sondern tatsächlich von Menschen. Wir zweifeln nicht daran, dass NATO- und US-Streitkräfte immer noch Moskau und einen Großteil des Mutterlandes umgeben."
  nf_MDR.1.a: "Vielleicht ist es jetzt an der Zeit?"

  nf_MDR.2.t: "Die Kolonisierung von [283.GetName]"
  nf_MDR.2.d: "Die Berichte von [283.GetName] scheinen wahr zu sein. Es ist direkt vor unseren verdammten Gesichtern, um ehrlich zu sein, Herr Präsident. Auf beiden Seiten der Plattform lag ein tiefes, verworrenes Netz aus Bäumen und Laub. Es ist im wahrsten Sinne des Wortes ein Dschungel. Gott weiß, welche widerlichen Mutanten darin lauern, und zum einen möchte ich es nicht herausfinden. Vielleicht waren die Maulwürfe der Meinung, sie sollten sich verdammt noch mal von der Oberfläche fernhalten, hmm? Unsere Förster planen bereits die Errichtung einer dauerhaften Basis auf der eigentlichen Plattform. Vorausgesetzt natürlich, dass sie über genügend Gasmasken und Filter verfügen, die von unserer Bevölkerung bereitgestellt werden. Vielleicht bringen wir einen dieser Trolleys zum Laufen, damit der arme alte Yuri sich beim Hin- und Hertragen von Baumstämmen nicht den Rücken bricht, oder? Es wird eine Weile dauern, bis wir einen Weg durch das dichte Dickicht frei gemacht haben ... Gott, ich vermisse die Kettensägen."
  nf_MDR.2.a: "Ausgezeichnete Arbeit, Soldaten."

  nf_MDR.3.t: "Die Kolonisierung von [291.GetName]"
  nf_MDR.3.d: "Nachdem wir einen Großteil der Trümmer beseitigt hatten, gelang es uns, einen kleinen Schacht durch die Trümmer zu durchbrechen, und auf der anderen Seite gelang es den Maulwürfen, in die eigentliche [291.GetName] einzudringen. Ich sage es ganz klar, Herr Präsident, ich hasse das Gefühl auf der Station verdammt noch mal. Irgendwie ist es mir unheimlich, wenn ich sehe, wie einfach und leer dieser Ort ist. Ein entflohener Sklave aus dem Tscherkizon erzählte uns, dass dieser Ort einst bewohnt war. Ich kann mir beim besten Willen nicht vorstellen, dass irgendein armer Kerl hier leben möchte. Unsere Soldaten behalten ihre Defensivstellung bei, während wir den Rest des Trupps zusammenstellen. Hoffentlich schaffen wir es mit etwas Stacheldraht und Sandsäcken, vielleicht einem Lagerfeuer hier und ein paar Kojen da drüben diesen Ort im Handumdrehen bewohnbar zu machen."
  nf_MDR.3.a: "Gute Arbeit, meine Herren."

  nf_MDR.4.t: "Sie sind in den Bäumen!"
  nf_MDR.4.d: "Es muss gesagt werden, wer auch immer uns gesagt hat, dass es halb Tier, halb Pflanze, halb was auch immer sonst Mutanten gibt, die draußen im Dschungel herumschlüpfen, der hat nicht gelogen. Die Mistkerle haben heute Morgen in der Pause einen unserer Soldaten ausgeschaltet und den Rest der Abteilung bei [283.GetName] in Alarmbereitschaft versetzt. Ich wünschte wirklich, wir hätten jetzt ein paar Flammenwerfer oder so etwas."
  nf_MDR.4.a: "Es braucht mehr als nur mutierten Kohl, um uns abzuschrecken"

  nf_MDR.5.t: "Kontakt mit [BAU.GetNameDef]"
  nf_MDR.5.d: "Sie werden einfach als Bauman Allianze bezeichnet und sind ein Zusammenschluss von Technikern und Ingenieuren, deren Schwerpunkt auf der Reparatur von Elektronik und Ausrüstung aus der Vorkriegszeit liegt. Sie bestehen aus Ingenieuren und Maschinisten aus der Vorkriegszeit und führen auch Stalker-Expeditionen an der Oberfläche durch. Einige von ihnen haben wir in der Vergangenheit schon einmal aus der Ferne gesehen, indem sie einfach hin- und herstarrten, bevor das Wetter sich zum Schlimmsten wendete. Vielleicht dürfen wir einen Olivenzweig reichen?"
  nf_MDR.5.a: "Gerne arrangieren wir ein gegenseitiges Handelsabkommen"
  nf_MDR.5.b: "Eure NATO-Tricks sind leicht zu durchschauen, westlicher Abschaum!"

  nf_MDR.6.t: "Oberflächenerkundungen"
  nf_MDR.6.d: "Abgesehen von dem elenden Wetter und den umherstreifenden Mutantenrudeln könnte die Oberfläche fast idyllisch sein. Wäre da nicht die klirrende Kälte, fast malerisch. Bis Ihr Geigerzähler durcheinander gerät und Sie bemerken, dass Ihnen ein zusätzlicher Arm aus der Brust wächst. An der Oberfläche gibt es nicht viel zu sammeln, aber der wahre Gewinn besteht darin, auf alle unglücklichen Kerle zu stoßen, die den Elementen ausgeliefert waren und anschließend umkamen. Wir haben einen dieser unglücklichen Bastarde gefunden. Der Leichnam schien schon seit geraumer Zeit tot zu sein und in keinem Zustand, der der Temperatur oder den Bedingungen an der Oberfläche standhalten konnte, und hatte sein Schicksal schon erwartet. In seinen schmutzigen Händen schien sich eine bunte Sammlung von Papieren und Dokumenten zu befinden, die dicht an seiner Brust aufbewahrt wurden."
  nf_MDR.6.a: "Forschungsarbeiten"
  nf_MDR.6.b: "Waffenbaupläne"

  nf_MDR.7.t: "Forschungsinstitut für Epidemiologie"
  nf_MDR.7.d: "Tief im Dickicht des Izmailovo-Dschungels steht ein baufälliges Gebäude. Es überrascht niemanden, dass der Ort bereits geplündert war, als wir die Expedition starteten. Viele Wertgegenstände waren bereits entwendet worden, und alles, was noch übrig war, war im Laufe der Zeit verrottet. Die meisten Laborgeräte sind viel zu alt und heruntergekommen, um repariert zu werden, aber unsere Expedition hat uns bei ausreichender Durchsuchung versichert, dass sie alles zurückbringen werden, was sie finden können."
  nf_MDR.7.a: "Es gibt nicht viel zu erkennen, aber wir könnten etwas von dieser Maschinerie gebrauchen"
  nf_MDR.7.b: "Forschung, die vielleicht vergessen werden sollte"

  nf_MDR.8.t: "Jenseits der Ringstraße"
  nf_MDR.8.d: "Über die Scherkovskoe-Straße gelang es unserer Expedition, die fernen Außenbezirke von Moskau zu erreichen. Von Betonhügeln und Stahlruinen zerfiel die Landschaft in baufällige Häuser und verlassene Straßen. Es scheint, dass die ökologischen Auswirkungen des Atomkriegs, obwohl Moskau einen Großteil der anfänglichen Strahlung erhielt, anhaltende Auswirkungen auf das Land hatten. Immer noch kaum bewohnbar; von grassierenden Mutanten und Strahlung bis hin zu Überschwemmungen und überwucherter Tierwelt. Aber eines bleibt: Das Leben außerhalb Moskaus geht weiter. Unsere Kundschafter wurden von anderen Moskauern begrüßt."
  nf_MDR.8.a: "Dörfer im äußersten Hinterland von Moskau"
  nf_MDR.8.b: "Waffenschmiede Kirzhach"
  nf_MDR.8.c: "Ehemalige Militäreinheiten strandeten am Stadtrand"

  nf_MDR.10.t: "Ein geteiltes Haus"
  nf_MDR.10.d: "Die Revolution hat einen Wendepunkt erreicht. Interne Streitigkeiten drohen, das Gefüge unserer Gemeinschaft in zwei Teile zu reißen."
  nf_MDR.10.a: "Die Republik muss bestehen"

  nf_MDR.11.t: "Wehrpflicht?"
  nf_MDR.11.d: ""Du! Haben Sie sich schon bei den Freiwilligen angemeldet?" Oder wie auch immer die Propagandaplakate früher lauteten. Sie werden überrascht sein, wie viele nicht bereit sind, dem Militär zu dienen. Wer würde das auch schon? Es ist kein Heldentum, den ganzen Tag herumzusitzen und zuzusehen, wie die Welt um einen herum langsam verfällt. Natürlich können wir den Leuten einen Anreiz geben, „die Welt zu sehen“ oder was davon übrig ist. Aber wenn wir nicht genügend Leute finden, um sie anzuwerben, können wir immer alternative Maßnahmen ergreifen."
  nf_MDR.11.a: "Nur Freiwillige"
  nf_MDR.11.b: "„Ermutigen“ wir sie zur Freiwilligkeit"
  nf_MDR.11.c: "Obligatorisch für jeden Gesunden"

  nf_MDR.12.t: "Lieferungen?"
  nf_MDR.12.d: "Natürlich können wir eine Blechpfanne als Helm verwenden, aber nur sehr wenige sind dumm genug, sich auf die Idee einzulassen, dass eine Blechplatte schweres Feuer stoppen kann. Die Versuche, unsere Soldaten mit den Besten der Besten auszustatten, haben uns hier her gebracht, aber an der Oberfläche gibt es nur noch eine begrenzte Anzahl von Lagerhäusern und Depots, die noch nicht geplündert wurden. Wenn wir das Zeug nicht selbst machen können, müssen wir uns mit den Vorräten und dem Zeug begnügen, die wir hier herumliegen haben."
  nf_MDR.12.a: "Alles, was wir erbeuten können"
  nf_MDR.12.b: "Wir bemühen uns, unsere Soldaten mit hochwertiger Ausrüstung auszustatten"
  nf_MDR.12.c: "Nur das Beste wird genügen"

  nf_MDR.13.t: "Schichtwechsel?"
  nf_MDR.13.d: "Militärdienst zu leisten ist scheiße. Aber im Militärdienst zu sein und keine Chance zu haben, zu seinen Lieben zurückzukehren, ist eine ganz andere Sache. Abnutzung und Ermüdung belasten einen Soldaten ebenso wie der direkte Beschuss. Die Rotation von Soldaten vom aktiven Dienst zum Garnisonsdienst reicht nur bis zu einem gewissen Grad."
  nf_MDR.13.a: "3-Monats Rotation"
  nf_MDR.13.b: "6-Monats Rotation"
  nf_MDR.13.c: "12-Monats Rotation"

  nf_MDR.14.t: "Bezahlung?"
  nf_MDR.14.d: "Das ist die Frage, die die meisten unserer Soldaten auf den Lippen haben, aber nur wenige wagen es, sie zu stellen. Es ist das Lebenselixier unserer Wirtschaft und schließlich unseres Militärs. Aber wenn man bedenkt, dass wir unsere Armee nicht mehr mit Banknoten und Bankgebühren finanzieren, wie sollten wir dann unser Militär bezahlen??"
  nf_MDR.14.a: "Eine Bezahlung des Soldaten wird erwartet, aber nicht immer garantiert"
  nf_MDR.14.b: "Soldaten werden direkt von unserer Verwaltung bezahlt"
  nf_MDR.14.c: "Auch nach dem Dienst sollen ehemalige Soldaten bezahlt werden"

  nf_MDR.15.t: "Wem gehorchen wir?"
  nf_MDR.15.d: "Der Republik natürlich, aber inwieweit wissen unsere Truppen das? Wissen sie, was sie schützen? Ohne angemessene Moral oder Ethik sind wir nur ein Haufen nichtsnutziger Schläger mit coolen Waffen und Rüstungen. Den Reihen muss nicht nur Disziplin, sondern auch das Bedürfnis nach einem höheren Zweck vermittelt werden."
  nf_MDR.15.a: "Wir dienen der Republik"
  nf_MDR.15.b: "Wir dienen den Idealen"
  nf_MDR.15.c: "Menschen über alles andere"

  nf_MDR.16.t: "Unwissenheit ist ein Segen"
  nf_MDR.16.d: "Seit über einem Jahrzehnt steht unsere Republik standhaft. Russland ist vielleicht nicht mehr da, aber die Menschheit existiert noch immer. Unsere Bevölkerung ist zufrieden und es scheint, dass sich in den Köpfen unserer Bürger endlich eine neue Vorstellung vom Leben festgesetzt hat. Allerdings verlief dies nicht ohne Schmerz und Streit. So sehr wir auch Worte erfinden, um unser Volk satt und glücklich zu machen, wir können unsere Bevölkerung nicht davon in Kenntnis setzen, dass die Welt noch da draußen ist. Unbestätigten Berichten zufolge könnte der Rest der Metro möglicherweise von Menschen bewohnt sein. Jegliche Interaktionen mit den anderen Politikbereichen der Moskauer Metro müssen geheim gehalten werden. Unsere Regierungsbeamten können unsere Aktivitäten leicht vor der Öffentlichkeit verbergen, aber am Ende wird es doch immer einigen unserer Leute auffallen."
  nf_MDR_16.a.tt: "Wenn unsere £stability_icon §YStabilität§! unter einen bestimmten Wert fällt, oder wir in einen §YGroßen Konflikt§! mit einer anderen Macht der Metro gezogen werden, werden die Menschen gegen die §CRepublik§! rebellieren."
  nf_MDR.16.a: "Um unser Volk zu schützen"

  nf_MDR.17.t: "Uneinigkeit in der Republik"
  nf_MDR.17.d: "Während die Perwomajskaja-Republik ein vereinter Staat ist, gibt es zwei klar umrissene Kasten, die angeblich unterhalb des Staates agieren. Die Zugehörigkeit zu einer Kaste wird von jedem Bürger der Republik gewählt und von dort aus wird er auf Lebenszeit in diesen Beruf eingeführt. Im Laufe der Zeit und aufgrund endloser Meinungsverschiedenheiten und Spannungen zwischen diesen beiden Sekten haben beide Organisationen ihre eigene Identität entwickelt.\n\nDie Maulwürfe sind diejenigen, die die endlosen Metro-Tunnel auf der Suche nach wertvoller Technologie oder Elektronik erkunden. Die meisten ihrer Operationen finden unter der Erde statt und von der Gruppierung der Förster werden sie des öfteren mit dem verächtlichen Stereotyp eines hermetischen Feiglings behaftet.\n\nAm anderen Ende des Spektrums sind die Förster, diejenigen, die sich an die Oberfläche wagen und Streifzüge in den Izmailovo-Dschungel unternehmen, um dort Feuerholz oder Baumaterialien zu gewinnen. Manche wagen es sogar, noch weiter über die Moskauer Ringstraße hinauszuwandern. Oft wirken sie arrogant gegenüber jenen, die sie für feige oder schwächer halten.\n\nDiese beiden Parteien existieren nun schon seit über einem Jahrzehnt nebeneinander, und obwohl unsere Bemühungen, die Beziehungen zwischen den beiden Gruppen aufzubessern, erfolglos blieben, scheint unsere beste Option darin zu bestehen, alle Flammen zu löschen, die zwischen ihnen auszubrechen drohen, es sei denn, wir wollen ihre internen Auseinandersetzungen weiter ertragen."
  nf_MDR_17.a.tt: "Die Maulwürfe und die Förster bilden die inneren Mitglieder der §CRepublik§!. Es ist am besten, beide Parteien glücklich zu halten, denn wenn eine der Gruppen einen beträchtlichen Einfluss in der §CRepublik§ hat, kann sie im schlimmsten Fall einen Bürgerkrieg auslösen, falls unsere £stability_icon §YStabilität§! zu niedrig ist."
  nf_MDR.17.a: "Es wird keine leichte Aufgabe sein, die Spannungen zwischen diesen Parteien beizulegen ..."

  nf_MDR.18.t: "Geschleppte Vorräte"
  nf_MDR.18.d: "Yuri, der alte Bastard selbst, hat unglaublich viel Glück gehabt. Zuerst dachten wir, der arme alte Trottel hätte den Verstand verloren, nachdem er nicht zu seiner Schicht zurückgekehrt war. Einige der Jungs scherzten, er sei gestolpert und hätte sich im Dickicht verlaufen, aber zum Glück kam der alte Mann dann doch durch. Das tat er tatsächlich. Doch als er sich im Dschungel verirrte, stieß er auf ein Lagerhaus, das immernoch intakt war. Um dem schlechten Wetter zu entkommen, gelang es ihm, durch eine der unverschlossenen Türen zu schlüpfen. Das Lagerhaus muss ein Armeedepot oder so etwas gewesen sein. Ein Großteil der Regale ist immer noch voll mit MREs und Konserven aus der Vorkriegszeit. Nichts Besonderes, aber genug, um die nukleare Apokalypse zu überstehen. Die meisten Wachen glaubten Yuri zunächst nicht, doch sein Gesichtsausdruck und seine mit Dosen gefüllten Taschen sagten alles."
  nf_MDR.18.a: "Wir essen heute Abend gut, Männer!"

  nf_MDR.19.t: "Krankheitsepidemie"
  nf_MDR.19.d: "Vielleicht waren die MREs, auf die wir gestoßen sind, doch nicht so gut wie wir gedacht hatten. Leute, die die Lebensmittel die wir im Lagerhaus gefunden haben, zu sich genommen haben, scheinen massenhaft Fieber zu bekommen. Nichts Schlimmes, aber es hat viele wichtige Leute für einige Zeit arbeitsunfähig gemacht. Yuri auch, wenn ich darüber nachdenke. Hoffentlich kehren die meisten bald zu ihrer Schicht zurück."
  nf_MDR.19.a: "Sie werden hoffentlich bald wieder gesund"
  nf_MDR.19.b: "Sperren Sie die Infizierten schnell ein und beobachten Sie die Symptome aus der Ferne genau!"

  nf_MDR.20.t: "Infektionsausbruch"
  nf_MDR.20.d: "Immer mehr unserer Bevölkerung erkrankt an der Seuche. Was wir für einen einfachen Grippefall hielten, ist nun auf all unseren Stationen ausgebrochen. Viele sind der Krankheit bereits erlegen, Männer, Frauen und Kinder, alle unter dem Einfluss der Krankheit. Wir müssen bald ein Heilmittel finden oder der Bevölkerung anderweitig Abhilfe schaffen."
  nf_MDR.20.a: "Hoffentlich zieht das bald über"
  nf_MDR.20.b: "Sperren Sie lebenswichtige Bereiche ab, trennen Sie Infizierte und Nichtinfizierte und verhindern Sie eine schnelle Ausbreitung der Krankheit!"

  nf_MDR.21.t: "Kranke Bevölkerung"
  nf_MDR.21.d: "Die Situation verschlechtert sich. Selbst die Gesündesten in unserer Gemeinschaft erkranken jetzt an der Krankheit. Die Bürger schließen sich in ihren Unterkünften ein und weigern sich nun, zur Arbeit zu gehen, aus Angst, die Ausbreitung der Infektion zu fördern. Unsere Ärzte sind inzwischen weit über ihre Belastungsgrenze hinaus, wenn uns kein Wunder gelingt, wird sich die Infektion mit der Zeit sicherlich verschlimmern."
  nf_MDR.21.a: "Das ist gar nicht gut"

  nf_MDR.22.t: "Krankheits-Ausbruch"
  nf_MDR.22.d: "Die Situation wird immer schlimmer. Unsere Ärzte und unser medizinisches Personal werden durch die große Zahl der behandelten Patienten zunehmend überlastet. Sie sind bei weitem überlastet, und diejenigen, die viel zu krank oder kränklich sind, um ihrem grausamen Schicksal überlassen zu werden."
  nf_MDR.22.a: "Wir müssen schnell ein Heilmittel finden"

  nf_MDR.23.t: "Krankheitsepidemie"
  nf_MDR.23.d: "Die Situation verschlechtert sich, immer mehr unserer Bevölkerung erkrankt schwer an der Krankheit. Unsere Krankenhaus- und Krankenbetten sind bei Weitem über ihrer Kapazität, während auf dem Stationsboden Tote und Sterbende lagern. Wir müssen eine Heilung finden oder diese Patienten bald behandeln."
  nf_MDR.23.a: "Wir brauchen dieses Heilmittel dringend!"

  nf_MDR.24.t: "Der Ausbruch scheint nachzulassen"
  nf_MDR.24.d: "Es wurden keine Neuinfektionen gemeldet. Wir sind uns nicht sicher, ob das Virus vollständig abgewehrt wurde oder ob es sich verbrannt hat und so viele Menschen infiziert hat, wie es konnte, bevor die natürliche Immunität einsetzte. Allerdings wird dieses traumatische Ereignis in der Geschichte der Republik so schnell nicht vergessen werden."
  nf_MDR.24.a: "Gott sei Dank ist es vorbei"

  #nf_MDR.25.t: "Zielübungen"
  #nf_MDR.25.d: "Es wird ziemlich ermüdend, an einem schmutzigen Lagerfeuer zu sitzen und darauf zu warten, dass sich die Action entfaltet. Anstatt sich also in den Schlaf zu langweilen, warum nicht stattdessen die Action suchen? Es ist sowieso nicht so, dass wir unsere Stellungen aufgeben."
  #nf_MDR.25.a: "Jungs bleiben eben Jungs" 

  nf_MDR.26.t: "Kontakt mit der Kalininskaya"
  nf_MDR.26.d: "Eine eher friedliche Ansammlung von Stationen an der Kalininskaya, nach der die Konföderation benannt ist. Das relativ ruhige und beschauliche Kollektiv hat sich in den letzten Jahren zu einem Wirtschaftszentrum im östlichen Teil der Metro entwickelt. Anscheinend haben sie eine eigene Zeitung, obwohl Berichten zufolge sie das Ziel böser Gerüchte und Gerüchte sind, die ihren Ruf schädigen wollen."
  nf_MDR.26.a: "Ich weiß, was ihr seid"
  nf_MDR.26.b: "Jungs bleiben eben Jungs"

  nf_MDR.27.t: "Versöhnung mit der Roten Linie"
  nf_MDR.27.d: "Manche Dinge bleiben einfach nicht tot. Ob Nostalgie oder altruistische Ideale: Der Sozialismus ist in Moskau wieder zurück. Humorvollerweise kontrolliert die Redline einen Großteil der Sokol-Linie. In der Vergangenheit hatten sie Pläne, die gesamte Metro unter dem Banner der Revolution zu vereinen, doch nach einem erbitterten Krieg mit der Hanse einigten sich beide Staaten auf einen Waffenstillstand und legten ihre aktuellen Grenzen fest."
  nf_MDR.27.a: "Die Perlentore werden für Ihresgleichen nicht geöffnet sein"
  nf_MDR.27.b: "Wir hoffen auf eine Versöhnung und Wiedergutmachung"

  nf_MDR.28.t: "Kontakt mit der Hanse"
  nf_MDR.28.d: "Sie werden von einer Organisation aus vergangenen Zeiten als [HNZ.GetNameDef] bezeichnet und sind einhellig der wirtschaftlich mächtigste Staat im Rest der Metro. Da sie Eigentümer der gesamten Koltsevskaya-Linie sind, können sie gegenüber vorbeikommenden Händlern, die ihr Territorium betreten, höchste Autorität ausüben."
  nf_MDR.28.a: "Ich mag Kapitalisten nicht besonders"
  nf_MDR.28.b: "Gemeinsam werden wir erfolgreich sein!"

  nf_MDR.29.t: "Die Lüge wird ungeschehen gemacht"
  nf_MDR.29.d: "Jetzt, da die Autorität von [MDR.GetLeader] an oberster Stelle steht, sollte jetzt ein angemessener Zeitpunkt sein, der Republik die Wahrheit zu verkünden. Moskau lebt tatsächlich. Zu lange ist die Bevölkerung der Republik ihrem täglichen Leben nachgegangen und davon überzeugt, dass sie tatsächlich die letzten lebenden Moskauer sind."
  nf_MDR.29.a: "Moskau ist hier! Sie sind am Leben! Moskau §YLebt!§!"
  nf_MDR.29.b: "NATO-Truppen haben Moskau infiltriert!! Wir müssen §YRUSSLAND BEFREIEN!§!"

  nf_MDR.30.t: "Die Cherkizon"
  nf_MDR.30.d: "Unsere Späher berichten, dass dieser Ort in Cherkizon tatsächlich real ist und nicht irgendein Mythos, der von Oberflächenhändlern verbreitet wird, um ihre fehlerhaften Waren zu verkaufen. Anscheinend existierte der Ort schon vor dem Krieg, und die Moskauer Behörden versuchten, den Markt zu entfernen, scheiterten jedoch. Erst nach der Katastrophe erstand es aus der Asche und erhielt eine neue Fassade. Ein riesiges Netzwerk aus unterirdischen Tunneln und Katakomben, das sich verdammt weit erstreckt. Hier kann man so ziemlich alles und jeden kaufen. Waffen, Sklaven, sogar ein oder zwei Killer, wenn der Preis stimmt."
  nf_MDR.30.a: "Ihr schmutziges Verhalten ist ein Affront gegen die Republik!"
  nf_MDR.30.b: "Vielleicht können unsere beiden Gemeinden friedlich nebeneinander existieren?"

  nf_MDR.31.t: "Polis"
  nf_MDR.31.d: "Die letzte Bastion der Menschheit, oder wie man im Rest der Metro sagt. Offenbar bestehend aus Vorkriegswissenschaftlern, Lehrern und jedem, der etwas wert ist. Den Geschichten zufolge versuchen sie, die letzten Gedanken der Menschheit in der Dunkelheit der Nacht zu bewahren. Ihr Aufwand ist, gelinde gesagt, bewundernswert."
  nf_MDR.31.a: "Bloße NATO-Propaganda..."
  nf_MDR.31.b: "Unsere beiden Nationen können friedlich koexistieren"

  nf_MDR.32.t: "Entführung"
  nf_MDR.32.d: "In der Nacht wurden einige unserer Bürger gestohlen."
  nf_MDR.32.a: "Das klingt nicht gut"

  nf_MDR.33.t: "Eingestürzter Tunnel"
  nf_MDR.33.d: "[283.GetName] führt nicht in eine Sackgasse, wie viele normalerweise sagen würden. Durch die Schutt- und Geröllhaufen führt tatsächlich ein Gleis. Die Führungsspitze meint, wenn wir uns anstrengen, den Müll zu durchsuchen, könnten wir vielleicht ein Loch bohren, das groß genug ist, um Menschen hineinzupassen, und in die eigentliche Metro einzudringen."
  nf_MDR.33.a: "Ausgezeichnete Idee"













