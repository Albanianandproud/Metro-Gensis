 TRB_zolotukhin: "Kamil Zolotukhin"
 TRB_ZOLOTUKHIN_DESC: "Die Rolle des Stationschef's wurde ihm ehern aufgezwungen, als dass er selbst darum gebeten hätte. Er ist der Älteste, also ist er vermutlich auch der Weiseste unter ihnen, so die Logik´. Und obwohl er das Kommando hat scheut sich Kamil auch nicht davor, sich die Hände schmutzig zu machen, anstatt den ganzen Tag nur in seinem Büro zu sitzen."