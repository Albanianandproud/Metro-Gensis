l_german:
  ### Country Leaders ###
  RCH_fuhrer:0 "Evgeny Petrovich"
  RCH_FUHRER_DESC:0 "Allgemein nur als „Führer“ bezeichnet, hat sein brutaler Aufstieg zur Macht dazu geführt, dass die fragmentierten rechten Gruppen in der Metro zu einem kollektiven Block vereint wurden. Sein Ziel ist es, die zurückgezogenen Faschisten des Vierten Reichs über die gesamte Metro herrschen zu lassen."
  
  RCH_danila_kreipp:0 "Danila Kreipp"
  RCH_KREIPP_DESC:0 "Einst in seiner Blütezeit ein gutaussehender Mann hat der Zahn der Zeit in seinem Gesicht gewütet. Machtgierig wurde er wegen seines Verrats an dem Führer an die Oberfläche verbannt. Kreipp hat das Unglaubliche gemeistert und ist zurückgekehrt. Sein Gesicht vernarbt und verletzt, aber sein Geist ungebrochen. Seine hartnäckige Entschlossenheit, gepaart mit seinen übernatürlichen Erlebnissen, hat ihn für immer verändert.\n Jetzt, da seine Herrschaft unbestritten ist, versucht er, sich mit dem Okkultismus zu beschäftigen, einer Mischung aus Wissenschaft und Aberglaube mit übernatürlichen Kräften."
  
  RCH_vadim_tulpanov:0 "Vadim Tulpanov"
  RCH_TULPANOV_DESC:0 "Nachdem der Führer beseitig war, wurde ihm das Kommando von unterhalb der Befehlskette aufgedrängt. Zunächst zögerte Tulpanov, das verzweifelte Reich zu führen und nun versucht er, das ursprünglich Verlorene zurückzugewinnen und die Überreste wieder zusammenzusetzen."
  RCH_vadim:0 "Vadim"
  RCH_vadim_tulpanov_trait:0 "Vadim Tulpanov"

  RCH_roman_orlov:0 "Roman Orlov"
  RCH_roman_orlov_desc:0 "Er war sowohl Vorsitzender der Gestapo als auch des Hinrichtungskommandos. Ihm steht die gewaltige Aufgabe zu, sämtliche Meinungsverschiedenheiten innerhalb und außerhalb der Partei auszumerzen. Eine Rolle, die er nicht auf die leichte Schulter nimmt. Ideologisch fanatisch verfolgt den Idealen des Reiches und ist nur ihnen gegenüber loyal."
  RCH_ORLOV_DESC:0 "Da er im Reich eine immense Macht inne hielt, war es für ihn nur eine natürliche Weiterentwicklung, die Führung selbst zu übernehmen. Mit dem Tod des Führers ist die Macht Orlows erheblich gewachsen, einst war er nicht mehr als ein hagerer Teenager, der wie viele andere nach dem Dritten Weltkrieg ums Überleben kämpfte, nun ist er einer der mächtigsten Männer der Metro."

  ### Semi Important Advisors ###

  RCH_chairman_of_ministry:0 "Georg Davydov"
  RCH_chairman_of_ministry_desc:0 "Ein unauffälliger Mann der sich aus der Politik raushält, aber ein stolzer Handwerker"
  _RCH_industry_minister:0 "Vorsitzender des Handwerks"

  RCH_volkov:0 "Gauleiter Volkov"
  RCH_volkov_desc:0 "Gauleiter Wolkow, auch einfach „der Wolf“ genannt, ist einer der angesehensten Vertrauten des Führers. Wolf leitet und überwacht alle Aktivitäten innerhalb der Puschkinskaja-Station. Ohne seine wachsamen Augen und sein Einverständnis geschiet hier nichts."
  
  RCH_kommandant:0 "Gauleiter Taras"
  RCH_kommandant_desc:0 "Gauleiter Taras ist der derzeitige Leiter der Tverskaya-Station und erklomm die politische Leiter vor allem durch sein „slawisches“ Aussehens."

  RCH_taras_bannyi:0 "Gauleiter Bannyi"
  RCH_taras_bannyi_desc:0 "Bannyi, der Gauleiter der Chekhowskaya, stammt aus der Westukraine und ist ein glühender Anhänger des Nationalsozialismus. Dank seiner Grausamkeit hält er seine blutige Herrschaft aufrecht, eine, von der er sehr profitiert."

  RCH_propaganda_minister:0 "Vitaliy Rogulsky"
  RCH_propaganda_minister_desc:0 "Vitaliy wurde irgendwann Mitte bis Ende der 80er Jahre geboren und wuchs in einer Militärfamilie auf. Es fiel ihm schwer dem Erbe seiner Familie gerecht zu werden, denn drei Generationen überzeugter Sowjet-Krieger wurden in Stücke gerissen, als in Rogulskys Jugend schon früh eine Bronchiektasie diagnostiziert wurde.\nObwohl Rogulsky nicht in der Lage war, das Erbe des Berufes seiner Familie fortzusetzen, entdeckte er ein Interesse an Literatur und strebte eine Karriere als Schriftsteller an. Trotz der anfänglichen Missbilligung seines Vaters, die Rogulsky beinahe täglich zu spüren bekam, gelang es dem jugendlichen Rogulsky, eine erste Anstellung in einer Schreibfirma und später als Journalist zu ergattern, der rechtsgerichtete Boulevardartikel mit mäßigem Erfolg schrieb.\n\nIn seinen frühen Zwanzigern wurde er Mitglied der RNU, sehr zum Entsetzen seiner Familie. Mit seinem glühenden Fanatismus gegenüber dem rechten Dogma stieg er schnell in der Organisation auf. Als die Bomben fielen, suchte er Unterschlupf unter seinesgleichen, von dort aus wanderten sie zwischen den Stationen hin und wieder zurück und versuchten, andere für ihre Ideologie zu begeistern.\n\nTeilweise dank seiner natürlichen Sprechfähigkeiten, aber vor allem dank seiner Loyalität gegenüber Petrowitsch, wurde Rogulsky als Propagandaminister vereidigt. Seine Krankheit wird geheim gehalten und vor neugierigen Blicken geschützt. Seine Rolle stellt sicher, dass die zahlreichen Bürger des Reichs loyal und vor allem gehorsam bleiben."
  ### Military Advisors ###

  RCH_karl_krainer:0 "Karl Krainer"
  RCH_karl_krainer_desc:0 "Karl Krainer wurde 2011 geboren, nur zwei Jahre vor dem Atomkrieg, der die Welt zerstörte. Seine Eltern waren baltische Einwanderer, die vor dem großen Krieg nach Russland zogen. Sie waren fleißig und vermittelten ihrem Sohn Disziplin und starke Werte. Karls Kindheit verlief ereignislos, aber er war ein kluges und ehrgeiziges Kind. In der Schule war er hervorragend, insbesondere in Geschichte und Politik, und träumte davon, eines Tages Politiker zu werden. Doch das Reich brauchte Kommandanten, keine weiteren Politiker und so stellte sich Krainer in den Dienste der Metromacht. Hier gibt er seine anerzogenen Tugenden weiter, auch wenn ihn das nicht gerade beliebt macht"
  RCH_KRAINER_DESC:0 "Trotz seiner Loyalität gegenüber dem Reich hatte Karl auch seine eigenen Ambitionen. Er sah sich als zukünftiger Anführer des Reiches, der Ordnung in die Metro bringen und der Menschheit ihren früheren Glanz zurückgeben würde. Er war bereit, alles zu tun was nötig war um dieses Ziel zu erreichen, auch wenn dies den Verrat an seinen Reichskameraden bedeutete.\nIm Laufe der Jahre wurde Karl immer desillusionierter von der Führung des Reiches. Überall, wohin er blickte, sah er Korruption und Inkompetenz, und er wusste, dass das Reich langsam von innen heraus verrottete. Karl begann, seinen eigenen Aufstieg zur Macht zu planen, indem er den richtigen Zeitpunkt abwartete und auf die richtige Gelegenheit zum Angriff wartete. Er wusste, dass er eines Tages derjenige sein würde, der das Reich in eine neue Ära von Größe führen würde."

