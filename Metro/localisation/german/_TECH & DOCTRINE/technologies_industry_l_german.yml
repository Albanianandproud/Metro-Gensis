 ### Industry ###

 # Construction #
 tech_construction_rag_tents:0 "Lumpenzelte"
 tech_construction_rag_tents_desc:0 "Die Menschen verwenden alles mögliche, um sich ein eigenes Zuhause zu schaffen, so primitv es auch seien mag."

 tech_construction_tarpaulin:0 "Planen"
 tech_construction_tarpaulin_desc:0 "Schwerer als Stoff, aber dafür reißfest und wasserdicht. Früher wurden daraus ebenfalls Zelte gefertigt."

 tech_construction_wood:0 "Holz"
 tech_construction_wood_desc:0 "Ein Gutes Baumaterial, welches in der Metro jedoch schwer zu finden ist. Stalker bringen es manchmal mit, wenn der Preis stimmt."

 tech_construction_scrap_metal:0 "Metallschrott"
 tech_construction_scrap_metal_desc:0 "Metall ist stärker und in der Metro häufiger zu finden als Holz. Abgesehen davon hat es auch militärischen Nutzen."

 tech_construction_bricks:0 "Ziegelstein"
 tech_construction_bricks_desc:0 "Billig, widerstandsfähig und wortwörtlich zum Bauen gemacht. Ziegelbauten gelten in der Metro als Zeichen des Fortschritts."

 tech_construction_concrete:0 "Beton"
 tech_construction_concrete_desc:0 "Leicht zu transportieren und in jede Form zu bringen. Kein Wunder dass ihn schon die Römer verwendeten."

 tech_construction_graphene_concrete: "Carbon-Beton"
 tech_construction_graphene_concrete_desc: "Graphen ist flexibel und Beton ist hart. Wenn beides kombiniert wird, kann man tatsächlich das Beste von beidem erhalten!"

 # Tooling # 
 tech_tooling_campfire: "Lagerfeuer"
 tech_tooling_campfire_desc: "Spendet Wärme, Licht, lässt einen darauf Kochen oder Braten, entsorgt Müll, verbrennt Leichen...Feuer leistet dem Menschen seit Jahrtausenden gute Dienste."

 tech_tooling_primitive_tools:0 "Primitve Werkzeuge"
 tech_tooling_primitive_tools_desc:0 "Hämmer, Äxte und Messer, Werkzeuge die so alt sind wie die Menschheit selbst. Diese Primitiven Geräte, gebaut aus Schrott und Müll erinner uns daran, wie tief wir doch gefallen sind."

 tech_tooling_basic_tools:0 "Grundlegende Werkzeuge"
 tech_tooling_basic_tools_desc:0 "Spezialisierte Werkzeuge für spezielle Spezialaufträge."

 tech_tooling_simple_tools:0 "Einfache Werkzeuge"
 tech_tooling_simple_tools_desc:0 "Rohrzangen, Wasserwaagen, Maßband. Die Werkzeuge an unserer Station ähneln denen von vor dem Krieg mehr und mehr."

 tech_tooling_modern_tools:0 "Moderne Werkzeuge"
 tech_tooling_modern_tools_desc:0 "Die Kunst des Schweißens hat Einzug in die Metro gefunden. Mit erbeutetem Gas können wir unsere Metalle nun bearbeiten wie wir wollen."

 tech_tooling_power_tools:0 "Elektrische Werkzeuge"
 tech_tooling_power_tools_desc:0 "Mit der Elektrizität kommen auch ihre schier endlosen Anwendungen."

 tech_tooling_specialised_tools:0 "Spezialwerkzeuge"
 tech_tooling_specialised_tools_desc:0 "Hier kommen jetzt die echten Spezialwerkzeuge, für wirklich spezifische Aufgaben."

 tech_tooling_advanced_tools:0 "Fortgeschrittene Werkzeuge"
 tech_tooling_advanced_tools_desc:0 "Endlich sind wir an einem Punkt, an dem wir wirklich komplizierte Geräte brauchen, um unsere Produktion zu verbessern."

 tech_tooling_cutting_edge_tools: "Weiterentwickelte Werkzeuge"
 tech_tooling_cutting_edge_tools_desc: "Die Welt mag untergegangen sein, doch selbst das hält uns Menschen nicht auf. Nun haben wir sogar Werkzeuge, wie es sie selbst vor dem Krieg nicht gab."

 # Smithing # 

 tech_smithing_basic_smithing:0 "Grundlegenes Schmieden"
 tech_smithing_basic_smithing_desc:0 "Das Prinzip ist einfach: Metall erhitzen und dann in Form schlagen. Ohne vernünftige Werkzeuge braucht dies jedoch viel Zeit und Arbeit."

 tech_smithing_anvil_smithing:0 "Schmiedeamboss"
 tech_smithing_anvil_smithing_desc:0 "So ein Amboss ist ein wirklich nützliches Ding, auf ihm kann man das Metall in viele Formen schlagen."

 tech_smithing_trip_hammer:0 "Hammerschmiede"
 tech_smithing_trip_hammer_desc:0 "Die Schwerkraft lässt den Hammer automatisch fallen, das erspart viel Kraftaufwand."

 tech_smithing_power_hammer:0 "Lufthammer"
 tech_smithing_power_hammer_desc:0 "Ein elektrisch angetriebener industrieller Hammer. Bald schon werden wir keine Arbeiter mehr brauchen."

 tech_smithing_hydraulic_press:0 "Hydraulische Presse"
 tech_smithing_hydraulic_press_desc:0 "Die hydraulische Presse ist in der Lage enorme Kräfte aufzubauen, genug um selbst Stahl beliebig in Form zu bringen, auch ohne ihn vorher zu erhitzen."

 tech_smithing_machine_pressing:0 "Maschinen-Presse"
 tech_smithing_machine_pressing_desc:0 "Eine weiterentwickelte Presse, wie sie auch schon in der Vorkriegszeit in modernen Fabriken verwendet wurde."

 # Pressing #

 tech_pressing_punch_pressing:0 "Stanzpressen"
 tech_pressing_punch_pressing_desc:0 "Stanzpressen lassen Material mit Leichtigkeit verformen, damit können wir Waffenteile sehr schnell produzieren."

 tech_pressing_hydraulic_punch_press:0 "Hydraulische Stanzpresse"
 tech_pressing_hydraulic_punch_press_desc:0 "Mit hydraulischen Kräften lässt sich der Druck der Stanzpressen weiter vergrößern, was sie noch leistungsfähiger macht."

 tech_pressing_laser_machining:0 "Laser-Bearbeitung"
 tech_pressing_laser_machining_desc:0 "Hochenergielaser sind in der Lage mechanische Teile in Sekundenschnelle abzufertigen. Und mit einem clever angelegtem Stromkreis braucht es hierfür überraschend wenig Strom!"

 # Casting # 

 tech_casting_basic_casting:0 "Grundlagen des Gießens"
 tech_casting_basic_casting_desc:0 "Beim Gießen von Rohmetallen fallen geringe Mengen an verwertbarem Schrott und ein hoher Grad an Verunreinigungen an. Es ist ziemlich verschwenderisch, aber besser als nichts."

 tech_casting_scrap_casting:0 "Schrottguss"
 tech_casting_scrap_casting_desc:0 "Die Umformung von Altmetall in Barren mit höherer Reinheit hat die Ausbeute, die wir aus gesammelten und geförderten Metallen erzielen, verbessert, lässt aber immer noch viel zu wünschen übrig."

 tech_casting_alloy_casting:0 "Legierungsguss"
 tech_casting_alloy_casting_desc:0 "Das Gießen von Legierungen anstelle von reinem Material sorgt für stärkere und zuverlässlichere Metalle, obwohl wir ohne den Einsatz von Elektrizität nur begrenzte Ergebnisse erzielt werden können."

 tech_casting_electrolysis:0 "Elektrolyse"
 tech_casting_electrolysis_desc:0 "Wenn die Elektrolyse nicht gerade medizinisch eingesetzt wird, können wir Materialien von chemischen Verunreinigungen befreien, die andernfalls unsere Metalle schwächen würden."

 tech_casting_laser_casting:0 "Laserschneiden"
 tech_casting_laser_casting_desc:0 "Laser sind unglaublich präzise und unterliegen nicht dem gleichen Verschleiß wie Hämmer und Klingen, wodurch sie sich perfekt für die gleichmäßige Formung von Metall eignen."

 tech_casting_3d_printing:0 "3D-Drucken"
 tech_casting_3d_printing_desc:0 "Als der Krieg ausbrach, steckte der 3D-Druck noch in den Kinderschuhen, aber seitdem erlebt er innerhalb unserer Grenzen eine Art Renaissance. Von Schnickschnack bis hin zu technischen Geräten eignen sich diese Maschinen hervorragend für die Herstellung spezieller Teile aus Harz."

 # Recycling # 

 tech_recycling_1:0 "Recycling I"
 tech_recycling_1_desc:0 "In der Metro lässt sich fast alles doppelt und dreifach wiederverwenden, unsere Bevölkerung muss anfangen dies zu begreifen."

 tech_recycling_2:0 "Recycling II"
 tech_recycling_2_desc:0 "Unsere Bevölkerung meint dass es wertloser Müll ist, doch unsere Techniker können selbst daraus noch etwas machen."

 tech_recycling_3:0 "Recycling III"
 tech_recycling_3_desc:0 "Material wiederzuverwerten ist ein universelles Naturgesetz. Früher streubte sich der mensch oft dagegen, doch hier in der Metro hängt unser Überleben davon ab, eine nahezu perfekte Kreiswirtschaft aufzubauen."

 # Hygiene # 

 tech_hygiene_basic_hygiene:0 "Grundlegende Hygiene"
 tech_hygiene_basic_hygiene_desc:0 "Unsere Brunnen geben uns in der Theorie unbegrenzte Mengen an Wasser, es wird Zeit endlich Händewaschen und regelmäßige Duschen zur Pflicht zu machen."

 tech_hygiene_food_standards:0 "Lebensmittelstandards"
 tech_hygiene_food_standards_desc:0 "Ernährung ist keine reine Privatangelegenheit, wenn es um Lebensmittelverseuchung geht. Wenn die Leute unbedingt Ratten essen wollen, dann bitte, doch nur gereinigt und gut durchgekocht."

 tech_hygiene_germ_theory:0 "Keimtheorie"
 tech_hygiene_germ_theory_desc:0 "Wir wissen von unserer älteren Generation, dass kleine keime verantwortlich für die meisten Krankheiten in der Metro sind. Dieses Wissen wird es uns leichter machen sie zu töten."

 tech_hygiene_sterilised_supplies:0 "Sterilisertes Werkzeug"
 tech_hygiene_sterilised_supplies_desc:0 "Hitze und Alkohol können Keime vervorragend abtöten und wir haben beides. Damit sind auch tiefere EIngriffe in Zukunft möglich."

 tech_hygiene_designated_triages:0 "Quarantäne-Zonen"
 tech_hygiene_designated_triages_desc:0 "Ein kleiner Raum den wir entbehren konnten, Kranke können hier isoliert werden um niemanden anzustecken."

 tech_hygiene_medical_wards:0 "Krankenstuben"
 tech_hygiene_medical_wards_desc:0 "Ein ort an welchem Kranke dauerhaft behandelt und isoliert werden können."

 tech_hygiene_immunisation:0 "Immunisierung"
 tech_hygiene_immunisation_desc:0 "Die Kunst der vorsorgenden Schutzimpfung hält wieder Einzug! Eine kleine Impfung eines abgetöteten Keimes sorgt für eine, meist vollkommende, Immunisierung."

 # Refinery #

 tech_refinery_1:0 "Raffinerien"
 tech_refinery_1_desc:0 "Raffinieren sind eine Art chemische Schmiede, nur dass hier Chemikalien statt Metalle hergestellt werden."

 tech_refinery_2:0 "Raffinerie-Kapazität"
 tech_refinery_2_desc:0 "Unsere Chemiker brauche umfangreiche Lager an allem Möglichen, um vernünftig arbeiten zu können."

 tech_refinery_fuel_1:0 "Treibstoff-Produktion"
 tech_refinery_fuel_1_desc:0 "Viele Fahrzeuge in der Metro nutzen Verbrenner-Antrieb. Echtes Benzin gibt es nicht mehr, doch unsere Chemiker können einen ausreichenden Ersatz herstellen."

 tech_refinery_fuel_2:0 "Verbesserter Treibstoff"
 tech_refinery_fuel_2_desc:0 "Technische Verbesserungen erhöhten den Reinheitsgehalt unseres synthetischen Treibstoffes."

 tech_refinery_chemical_1:0 "Chemische Prozesse"
 tech_refinery_chemical_1_desc:0 "Nahezu jeder chemischer Prozess kennt Alternativen, um zum Endziel zu kömmen. Früher wurden sie aus einfachen Kostengründen verworfen, doch die Welt der Metro funktioniert nach anderen Regeln."

 tech_refinery_chemical_2:0 "Fortgeschrittene Produktion"
 tech_refinery_chemical_2_desc:0 "Unsere Labore sind nun so groß, dass sie auf nahezu industrieller Kapazität laufen können."

 # Farming # 

 tech_farming_1:0 "Unterirdische Farmen"
 tech_farming_1_desc:0 "Landwirtschaft ohne Sonne und ohne Licht ist eine herausfordernde Angelegenheit, denn hier unten wachsen nur Pilze."

 tech_farming_2:0 "Grundlegende Landwirtschaft"
 tech_farming_2_desc:0 "Größere Farmflächen, Exkremente als Dünger, Schweine und Hühner als Nutztiere. Immerhin sind wir wieder auf mittelalterlichem Niveau angekommen."

 tech_farming_3:0 "Fortgeschrittene Landwirtschaft"
 tech_farming_3_desc:0 "Ein teil unserer Landwirtschaft kann industrialisert werden, elektrisches Licht für die Zucht echter Früchte, Technische Aufbereitung und Trocknung, Kühlung, etc."

 tech_farming_4:0 "Pilzrotation"
 tech_farming_4_desc:0 "Früher hielt man sich an eine Reihenfolge von Getreiderotation, um so die Qualität des Bodens zu schonen. Die gleiche Logik kann man doch auch mit Pilzen anwenden, oder?"

 tech_farming_5:0 "Bewässerungssystem"
 tech_farming_5_desc:0 "Pilze brauchen zwar kein Licht, doch Wasser brauchen alle Lebewesen. Ein einfaches Bewässerungssystem wird dafür sorgen, dass jeder Pilz gesund wachsen kann."

 tech_farming_6:0 "Dünger"
 tech_farming_6_desc:0 "Wenn man etwas Arbeit reinsteckt bekommt man besseren Dünger zusammen, als nur die einfachen Exkremente von Mensch und Tier."

 tech_farming_7:0 "Verbesserter DüngerImproved Fertilizer"
 tech_farming_7_desc:0 "Früher waren chemische Zusätze im Dünger verpöt, in der Metro werden sie überlensnotwendig."

 tech_farming_8:0 "Genmodifikation"
 tech_farming_8_desc:0 "Durch selektive Züchtung stellen wir sicher, dass nur die besten Pflanzen und Tiere sich in unseren Farmen vermehren
