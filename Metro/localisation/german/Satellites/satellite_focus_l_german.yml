 satellite_antifascist_army_2: "Bis zum letzten Atemzug"
 satellite_antifascist_army_2_desc: "Mit Faschisten lassen sich keine Lösungen, kein Frieden und keine Abschlüsse erzielen, die ohne Blutvergießen zustande kommen."

 satellite_antifascist_army_3: "Vergieße Blut mit jedem Zentimeter."
 satellite_antifascist_army_3_desc: "Wir werden nicht stillschweigend kämpfen; wie ein in die Enge getriebener Hund werden wir zerren, zerreißen und zubeißen – mit all dem Mut, den wir aufbringen können."

