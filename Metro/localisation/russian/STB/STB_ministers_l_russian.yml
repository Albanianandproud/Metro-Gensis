l_russian:
  STB_stortbeker: "Штёртебекер"
  STB_STORTBEKER_DESC: "То, что отличает дисциплинированный упорядоченный строй Рейха от диких орд мутантских чудовищ или коммунистов – это их верность. Некоторые преданы идеологии, другие стремятся избавить мир от дегенерации и разложения, а кто-то жаждет власти и богатства. Но несмотря на верность своим идеям, даже среди рядовых членов Рейха многие плюют и ругаются, когда произносят его имя.\n\nЗнаменит своим хитрым умом и, что самое важное, своими результатами. Он труслив и жесток, командует ещё более извращенными солдатами, чем он сам.\n\nОсужденные преступники Рейха или наказанные бывшие солдаты Метромахта, отправленные в бригаду Штёртебекера и не стремящиеся вернуться в пределы Рейха. Однако Штёртебекер потакал этим неудачникам, и зажёг в каждом из них что-то гораздо более коварное и грешное, чем догмы, распространяемые министерством пропаганды рейха."
 
  _STB_stortbeker_leader_trait: "Бригада Штёртебекера"

  STB_faust: "Бывший гауляйтер Тверской области Фауст лишился политической карьеры из-за конфликта с фюрером Петровичем. Опальный Фауст бежал из страны и поселился на станции [STB.Capital.GetName], где стал главным гауляйтером и доверенным лицом самого Штёртебекера."
  STB_orel: "Орёл"
  _STB_orel_trait: "Коллаборационист Рейха"
  _STB_orel_desc: "Бывший член Конфедерации 1905 года, Орёл информировал Рейх о передвижениях «недочеловеческих» вражеских войск в туннелях. Его знания сослужили ему хорошую службу, когда разъяренная толпа, жаждавшая самосуда над коллаборационистом, снесла петли с его баррикадной двери. Изгнанный из Рейха за свое сомнительное прошлое, Орёл стал искать новое пристанище — возможно, лучшее, а может, и худшее."
  STB_tod: "Михаэль Тодт"
  _STB_tod_trait: "Крысолов"
  STB_tod_desc: "Бывший главный крысолов с Пушкинской, сосланный за пьянство и антиобщественное поведение. С тех пор как он присоединился к разношерстной бригаде Штёртебекера, в его ловушки попадало больше крыс, чем он мог себе представить."
  STB_mykhailo: "Глеб Михайло"
  STB_mykhailo_desc: "Пожалуй, даже для Рейха он был бы неуместным номинальным главой среди головорезов, убийц и психопатов. Михайло был непоколебимым приверженцем идеалов фюрера, даже после того, как власти обвинили его в «запятнанной крови». Несмотря на то, что Бригаде Штёртебекера не хватает дисциплины, Михайло пытается превратить бригаду Штёртебекера в по-настоящему боеспособную, пусть и неорганизованную, воинскую часть."
  _STB_mykhailo_trait: "Блутшанде"