 satellite_guarantee_polis:0 "Eine Garantie auf die Polis"
 satellite_guarantee_polis_desc:0 "Der letzte Ort auf dieser Erde, der sich an die Welt davor erinnert. Es wäre klug, sie vor Bedrohungen aus der Nähe und aus der Ferne zu schützen."

 access_polis_education_decision:0 "Schaltet die Möglichkeit frei, auf die Bibliotheken von Polis zuzugreifen, um unser §GEBildungsniveau§ zu verbessern!"

 satellite_assist_the_rangers:0 "Unterstützen Sie die Rangers"
 satellite_assist_the_rangers_desc:0 "Die Rangers des Ordens sind eine paramilitärische Truppe, die keiner höheren Macht dient als dem Überleben der Menschheit. Petrov schwört, dass er einmal gesehen hat, wie ein einzelner Spartaner es mit einem halben Dutzend Banditen aufnahm und unversehrt davonkam. Natürlich war Pavel betrunken, als er das miterlebte. Aber was auch immer der Fall ist, mit den Rangers ist nicht zu spaßen."

 _satellite_receive_spartan_character:0 "Die Rangers werden uns einen Militärberater schicken, der uns bei der Ausbildung unserer Armee hilft."

