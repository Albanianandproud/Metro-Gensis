HNZ_old_comrades1_desc: ""

HNZ_old_comrade_arbat: "\nSollte §Y[ARB.GetFlag][ARB.GetName]§! zu stark destabilisiert werden, können wir sie friedlich in die Einflusssphäre des §Y[HNZ.GetFlag][HNZ.GetName]§! eingliedern."

HNZ_reaffirm_polis_state: "Unser Bekenntnis zu Polis"
HNZ_reaffirm_polis_state_desc: "Unsere Beziehungen zu Polis waren schon immer eng. Warum sollten wir sie nicht noch enger gestalten? Mit ihrem Verstand und unserer Stärke können wir gemeinsam Großes erreichen."

HNZ_deal_with_PRT: "Die Banditen von Proletarskaya"
HNZ_deal_with_PRT_desc: "Die Hansa verhandelt nicht mit Banditen. In den letzten Wochen haben die Grenzzwischenfälle mit [PRT.GetName] jedoch einen neuen Höchststand erreicht. Die Situation muss bald gelöst werden."

HNZ_deal_with_PRT_1B: "Die militärische Lösung"
HNZ_deal_with_PRT_1B_desc: "Mit Mördern und Räubern, die ohne jedes Prinzip handeln, kann es keine Verhandlungen geben. Eine solche Krankheit muss ausgerottet werden."

HNZ_deal_with_PRT_2B: "Operation Flammenwerfer"
HNZ_deal_with_PRT_2B_desc: "Wir dürfen nicht vergessen, weshalb die Hanseatische Liga gegründet wurde: um Händler und den Handel vor neidischen Blicken zu schützen."

HNZ_deal_with_PRT_1A: "Der undenkbare Weg"
HNZ_deal_with_PRT_1A_desc: "Wie das Sprichwort sagt: Mit Honig fängt man mehr Fliegen. Wenn die Banditen von Proletarskaya bereit sind zuzuhören, könnten wir vielleicht eine Vereinbarung treffen."

HNZ_deal_with_PRT_2A: "Legitimierte Freibeuter"
HNZ_deal_with_PRT_2A_desc: "Die Banditen von Proletarskaya scheinen klüger zu sein als erwartet. Sie haben nicht nur unseren Forderungen zugestimmt, sondern unterstützen die Hansa nun sogar freiwillig. Natürlich bleiben die Karawanen der Hansa und ihrer Vasallen tabu. Aber alle anderen? Das ist nicht unser Problem."

HNZ_deal_with_PRT_3: "Der Osten gesichert"
HNZ_deal_with_PRT_3_desc: "Nachdem die Stationen [253.GetName] und [416.GetName] gesichert wurden, ist ein Stück Normalität zurückgekehrt. Zwar sind ihre Bewohner noch keine vollwertigen Bürger des Gemeinwesens – doch wer weiß, was die Zukunft bringt?"

HNZ_assistance_to_the_rangers: "Die Spartaner unterstützen"
HNZ_assistance_to_the_rangers_desc: "Unterstützen wir die Ranger. Vielleicht erwidern sie den Gefallen eines Tages."

HNZ_support_the_VDNKh_commonwealth: "VDNKh unterstützen"
HNZ_support_the_VDNKh_commonwealth_desc: ""

HNZ_external_sphere_7: "Die Bande, die verbinden"
HNZ_external_sphere_7_desc: "Unsere Nachbarn verhalten sich neutral, was angesichts ihrer Nähe zur mächtigen Hansa kaum überrascht. Durch wirtschaftlichen und politischen Einfluss können wir sie schrittweise an uns binden."

HNZ_spartan_military_tie: "\nWir erhalten die Möglichkeit, §Y[SPT.GetFlag][SPT.GetName]§! zu unterstützen und im Gegenzug Hilfe oder Ausbildung für unsere Spezialkräfte zu erhalten."

