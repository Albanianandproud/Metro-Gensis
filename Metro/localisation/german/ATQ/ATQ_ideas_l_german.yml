l_german:
 ATQ_arms_vendor: "Waffenhändler"
 ATQ_arms_vendor_desc: "Das §YStarokachalovsko-Donskoy-Konglomerat§!, auch bekannt als §YDie Antiquare§!, sind eine Gruppe von Stationen, die auf den Export von Schusswaffen in weite Teile der südlichen, bewohnten Stationen der Moskauer Metro spezialisiert sind. Sie operieren unter dem Deckmantel eines Antiquitätengeschäfts, in dem allerlei exotische und seltene Kuriositäten gegen Bezahlung erworben werden können. Die Antiquitäten selbst werden entweder durch Expeditionen an die Oberfläche beschafft oder direkt in den Stationen gefertigt.."
 ATQ_falling_into_poverty: "In den Seilen"
 ATQ_falling_into_poverty_desc: "Nach dem jüngsten und unerwarteten Tod ihres früheren, beliebten Anführer, der dem Konglomerat Wohlstand beschert hatte, rutschten die Stationen der §YDonskaya§! und der §YUlitsa Starokachalovskaya§! immer tiefer in die Armut."
 ATQ_kuznetsov_cache: "§YKusnezows Versteck?§!"
 ATQ_kuznetsov_cache_desc: "Die Bevölkerung ist fest davon überzeugt, dass ihr verstorbener Anführer ein verborgenes Versteck voller seltener und wertvoller Kostbarkeiten angelegt hat. Manche sind sogar der Ansicht, dass dort – verborgen unter all diesen Schätzen – ein Mittel gegen Strahlenkrankheit liegt, dessen Entdeckung den Lauf der Geschichte verändern könnte. Stalker werden in Scharen zwangsverpflichtet und auf die Suche nach diesem verborgenen Hort geschickt. Doch während die Wochen ins Land ziehen, erscheint der Jagd zunehmend wie ein sinnloses Unterfangen; die Stalker werden auf eine vergebliche Suche geschickt, anstatt dabei zu helfen, den rapide schwindenden Wohlstand der Station zu sichern."