 ## Decisions ##

 RCH_RED_border_war: "Blut und Eisen"
 RCH_RED_border_war_desc: "So wie schon in der Vergangenheit, bekämpfen sich auch heute die Eiserne Legion des Reichs und die Söhne des Lenin in einem ewigen Krieg. Kein Krieg um Land oder Ruhm, ein Krieg um die totale Auslöschung ihres Feindes. Nicht weniger wird sie je zufrieden stellen.\n\nGrenzkonflik-Kosten - §t[?initiate_borderwar_cost]§!\nGrenzkonflikt-Cooldown - §t[?borderwar_base_cooldown]§! Tage"
 RED_RCH_borderwar_cost: "£command_power [?initiate_borderwar_cost|Y]"
 RED_RCH_borderwar_cost_blocked: "£command_power [?initiate_borderwar_cost|R]"

 border_conflict_initiate_incident: "Beginnt einen Grenzkonflikt"
 border_conflict_initiate_incident_desc: "Wir dürfen nicht zulassen, dass der Feind die Initative ergreift. Wir müssen das Eisen schlagen solange es heiß ist und dafür werden wir die feindlichen Grenzposten überfallen. Sobald unsere Truppen bereit sind, werden wir beginnen."

