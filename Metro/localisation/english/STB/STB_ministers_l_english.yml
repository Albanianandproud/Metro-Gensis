l_english:
 STB_stortbeker:0 "Stortbeker"
 STB_STORTBEKER_DESC:0 "What separates the disciplined structured order of the Reich, and the savage hordes of mutant beasts or communists is where their loyalty lies. Some to ideology, others bound only to see the world cast of degeneracy. Whilst others crave power and fortune. Even to many amongst the ranks of the Reich, who spit phlegm and swear over his name being passed.\n\nRenowned for his cunning amplitude and most importantly, his results. He is craven and cruel, commandeering even more depraved soldiers than himself.\n\nConvicted criminals of the Reich, or punished former soldiers of the Metromacht who have been sent to Stortbeker's brigade and not expected to ever return to the confines of the Reich. Instead however Stortbeker has coddled, or rather sparked a flame inside each one. Something far more insidious and far more wicked than even the spoused dogma from the Propaganda Ministry could coin up."
 _STB_stortbeker_leader_trait:0 "Stortbeker's Brigade"

 STB_bohren: "Peter Bohren"
 _STB_bohren_trait: "Parasitärer Kapitalist"
 STB_bohren_trait: "Deemed as a 'parasite' even in spite of brokering lucrative, shadow trade deals with the likes of the Hanza and other unsavoury businessmen, Bohren had his fortunes slashed and his burgeoning trade enterprise burnt. Most would've become disillusioned with the ideals of the Reich. But not Bohren. Instead, he took what little fortunes he had left, and fled to the only place in the Metro of likeminded kin."
 STB_todorov: "Dr. Todorov"
 _STB_todorov_trait: "Angel of Mercy"
 STB_todorov_desc: "Dr. Todorov had been a sworn confidant and friend of one of the numerous figureheads seeking the mantle of Fuhrer. Had it not been his extensive scientific knowledge, Todorov most likely would have suffered a similar fate as to them. Even the racial supremacists of the Reich looked at Todorovs theories with unnease, eventually culminating to Todorov leaving the Reich entirely in order to conduct his research. Now free from what scant amount of morals and principles the Reich already lacked, the term 'Mercy' is not one to be given lightly."
 STB_faust: "André Faust"
 _STB_faust_trait: "Disgraced Gauleiter"
 STB_faust: "The former Gauleiter of Tverskaya, Faust had is political career slashed when he fell out with the Fuhrer Petrovich. Disgraced, Faust fled in exile where he took up residence in [STB.Capital.GetName], acting as chief Gauleiter and vertrauensperson of Stortbeker himself."
 STB_orel: "Orel"
 _STB_orel_trait: "Reich Collaborator"
 _STB_orel_desc: "A former Collective of the 1905 confederation, Orel would inform the Reich on movements of 'subhuman' enemy troops in the tunnels. His knowledge paid him well, had the hinges of own abode barrikadnaya knocked down by an angry mob seeking to ennact mob-justice on a Reich Collaborator. Having been barred from the Reich, from his dubious heritage, Orel sought the next best.. or perhaps worst place of refuge."
 STB_tod: "Michael Todt"
 _STB_tod_trait: "Rattenfänger"
 STB_tod_desc: "The former chief rat-catcher of Pushkinskaya, and exiled on his drunken, anti-social perverses. Since joining with Stortbeker motley brigade, more than rats have been snared in his traps."
 STB_mykhailo: "Gleb Mykhailo"
 STB_mykhailo_desc: "Arguably an out-of-place figurehead amongst cutthroats, killers and psychos even for the Reich. Mykhailo had been an unwavering loyalist to the Fuhrers ideals, an otherwise idealized soldaten of the Reich. Had it not been he was ousted for his mixed heritage, a promising career would undoubtedly of seen him prosper. Even still in the aftermath the condemned of his 'tainted blood'. For what [STB.GetName] lacks in any discipline, Mykhailo attempts organizing Stortebekers brigade into a truly capable, if disorderly, fighting force."
 _STB_mykhailo_trait: "Blutschande"