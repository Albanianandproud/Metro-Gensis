 nf_RED.73.t: "Kommende Wahlen"
 nf_RED.73.d: "Der Wahltermin rückt näher.\nWährend der Revolution gegen das Zentrale Metrokommando wurden überall auf der Roten Linie revolutionäre Organisationen gegründet. Es wurde beschlossen, alle zehn Jahre von diesen jungen Stationen aus den nächsten Vorsitzenden zu bestimmen, der die Revolution anführen sollte. Nach dem Koalitionskrieg wurde dieses Mantra weiterhin beibehalten. Andrey gewann die letzte Wahl mit großem Vorsprung. Nun soll er erneut kandidieren."
 nf_RED.73.a: "Hoffen wir, dass unsere Gruppierung die Nase vorn hat."

 nf_RED_election_system.1.t: "Kommende Wahlen"
 nf_RED_election_system.1.d: "Der Wahltermin rückt näher. Nach dem Ende des Koalitionskrieges wurde festgelegt, dass jeder nachfolgende Generalsekretär zehn Jahre lang im Amt bleiben würde, und außerdem würden Wahlen unter den verschiedenen Stationschefs und Mitgliedern des Politbüros stattfinden, um ihre Stimmen abzugeben. Dieser Tag rückt näher"
 nf_RED_election_system.1.a: "Hoffen wir, dass unsere Gruppierung die Nase vorn hat."
 RED_2033_election_tt: "Ungefähr im Jahr 2033 soll eine Wahl zur Bestimmung des nächsten Anführers der Roten Linie beginnen."

 nf_RED_election_system.2.t: "Maxim Moskvin will als Generalsekretär kandidieren"
 nf_RED_election_system.2.d: "Es scheint, dass Moskvin, der Bruder des Generalsekretärs, versucht, für das Amt des Generalsekretärs der Roten Linie zu kandidieren. Ein relativ neues Gesicht, das in der oberen Schicht der kommunistischen Partei auftaucht. Er hatte sich bei den jüngeren Mitgliedern des Komsomol, insbesondere beim Militär, einen guten Ruf erworben. Seine Aktionen gegen die geschwächte Junta trieben seine neu entdeckte politische Karriere voran. Wenn man jedoch bedenkt, dass jetzt Bruder gegen Bruder antritt, ist es ungewiss, ob die Freundschaft zwischen den beiden zerfallen wird."

 nf_RED_election_system.2.a: "Andrey hat sich verirrt, es ist die Zeit für einen neuen Anführer"
 RED_plan_taking_maxim_route: "§CDies ist die historische Route!§!"
 RED_allow_maxim_moskvin_decisions: "Aktivieren Sie Maxim Moskvin-Entscheidungen"

 nf_RED_election_system.2.b: "Maxim weiß nicht, wie man einen Schweinestall betreibt, geschweige denn die Rote Linie!"
 RED_plan_taking_andrey_route: "Aktivieren Sie Andrey Moskvin-Entscheidungen"

 nf_RED_election_system.3.t:  "Brüder, in Waffen"
 nf_RED_election_system.3.d: "Es sieht so aus, als hätten sich Maxim und Andrey zerstritten. Nach einer hitzigen Debatte, die sich über mehrere Stunden hinzog gerieten die beiden in Andreys Büro aneinander. Die beiden stritten bis spät in die Nacht über die Politik und die Zukunft der Roten Linie. Obwohl die Semantik des Augenblicks tobte, war es offensichtlich klar dass der Dialog von der Politik zu bitterem Groll zwischen den beiden führte. Seitdem haben sich die beiden nicht mehr wie früher getroffen und diskutiert. Unabhängig davon, ob Maxim aus Bosheit oder aus eigenen Ambitionen davongelaufen ist, scheint er nun entschlossen zu sein, seinen Bruder an der Wahlurne zu besiegen."
 nf_RED_election_system.3.a: "Das ist bedauerlich"

 RED_ability_tarnish_andrey_rule: "Aktiviert Entscheidungen die Authorität der Brüder zu untergraben"

 # ELECTION EVENTS 
  nf_RED_election.1.t: "Die Wahlen stehen vor der Tür"
  nf_RED_election.1.d: "Nach dem Ende des Koalitionskrieges wurde fest vereinbart, dass jeder nachfolgende Generalsekretär ein Jahrzehnt lang im Amt bleiben würde. Nicht mehr und nicht weniger. Nach Ablauf ihrer Amtszeit würde eine Wahl unter den verschiedenen Stationsleitern und Mitgliedern des Politbüros stattfinden, um über den nächsten Generalsekretär zu entscheiden. Andrey ist entschlossen, dem Proletariat der Roten Linie weiterhin treu zu dienen und möchte erneut für diese Position kandidieren. Doch in den letzten Monaten wächst die Unzufriedenheit mit seiner Herrschaft."
  nf_RED_election.1.a: "Andreys Herrschaft über die Rote Linie war katastrophal. Er muss abgewählt werden"
  nf_RED_election.1.oligarch: "Oligarch Maxim Pfad"
  nf_RED_election.1.b: "Hoffen wir, dass unsere Partei triumphiert"
  nf_RED_election.1.council: "Andreys Ratsregierung"
  nf_RED_election.1.election_mechanic: "\nDie Wahlen entscheiden über den nächsten §YGeneralsekretär§! im Jahr §C2033§!. §YAndrey Moskvin§! und sein Bruder §YMaxim Moskvin§! werden gegeneinander antreten, um zu entscheiden, wer der fähigere Bruder ist, um die §R[RED.GetName]§! zu führen. Die Option, die Erfolgsaussichten beider Brüder zu erhöhen, ist über die Registerkarte §CEntscheidungen§! verfügbar."

  nf_RED_election.2.t: "Bruderkrieg"
  nf_RED_election.2.d: "Wie es scheint, bleiben Maxim und Andrey zerstritten. Nach einer hitzigen Debatte, die sich über mehrere Stunden hinzog gerieten die beiden in Andreys Büro aneinander. Die Brüder stritten bis spät in die Nacht über die Politik und die Zukunft der Roten Linie und Maxims Schachzug, für das Amt des Generalsekretärs zu kandidieren. Es war angeblich so, dass der Dialog von der Politik zu einer erbitterten Schmährede zwischen den beiden überging. Maxim verließ dann in einem Wutanfall das Büro. Seitdem weigern sich die beiden, einander zu sehen. Maxim scheint entschlossen zu sein, seinen Bruder an der Wahlurne zu besiegen."
  nf_RED_election.2.a: "Andrey ist als Generalsekretär nicht mehr fit, seine Zeit ist vorbei!"

  nf_RED_election.3.t: "Das Ziel von Verleumdung"
  nf_RED_election.3.d: "Bei einem kürzlichen Vorfall hat Maxim versucht, die Führungslegitimität seines Bruders zu beeinträchtigen. Anstatt seine eigenen Eigenschaften als geeigneter Kandidat für das Amt des Generalsekretärs zu untermauern, schmähte er stattdessen Andreys frühere Amtszeit. Vielleicht ist diese Rhetorik nach dem jüngsten Streit zwischen den beiden Brüdern bitterer Ernst. Seitdem strömten viele, die mit Andrejs Herrschaft unzufrieden waren, zu Maxim und sammelten ihre Unterstützung für seine Kandidatur."
  nf_RED_election.3.a: "Wenn sogar sein eigener Bruder ihn verurteilt, muss seine Herrschaft wahrlich schrecklich sein"

  nf_RED_election.11.t: "Sicherstellung der Loyalität des Militärs"
  nf_RED_election.11.d: "Es ist klar dass die Rote Linie von ihrem vorgesehenen Pfad abgekommen ist. Das Militär begreift dies und Maxim hält zum Militär. Sollte das Militär auch zu ihm halten, so könnte dies seine Chancen bei den vorausliegenden Wahlen signifikant erhöhen."
  nf_RED_election.11.a: "Andreys Freunde in der Armee sind rar gesät"
  nf_RED_election.11.b: "Moskwin fand Verbündete unter den Befehlshabern der Armee"
  nf_RED_election.11.c: "Maxims unerschütterliche Entschlossenheit verschaffte dem Militär seinen Respekt"

  nf_RED_election.12.t: "Loyalität des Apparatchik"
  nf_RED_election.12.d: "Der Rotlinien-Apparat arbeitet Tag und Nacht unermüdlich daran sicherzustellen, dass die inneren Mechanismen von Partei und Staat reibungslos funktionieren. Es dürfte niemanden überraschen, dass ihre Unterstützung den Ausgang der Wahl zweifellos zu Gunsten derjenigen beeinflussen würde, die sie für fähig halten. Ihre Unterstützung zu gewinnen scheint fast so notwendig zu sein wie die Unterstützung des Proletariats."
  nf_RED_election.12.a: "Zu jedermanns Überraschung fand der Apparatchik in Moskwins Unterstützung"
  nf_RED_election.12.b: "Überraschenderweise fanden viele Gefallen in Moskwins Schachzug"

  nf_RED_election.14.t: "FSB und ihre Unterstützung"
  nf_RED_election.14.d: "Der KGB, der FSB oder einfach die Staatssicherheit sind die Hauptapparate des Staates, um die Bewohner der Roten Linie in Schach zu halten. Sie sind entscheidend für die Arbeit des Generalsekretärs und des Militärs. Der FSB ist eine lebenswichtige Arterie zur Aufrechterhaltung der Macht, die er im Handumdrehen frei ausübt. Ihre Unterstützung ist möglicherweise wichtiger als alles andere. Vor allem ihr aktueller Anführer, Tscheslaw Andrejewitsch Korbut, der in der Vergangenheit seine Sympathien für Moskwins Bestreben um den Posten des Generalsekretärs zum Ausdruck gebracht hat."
  nf_RED_election.14.a: "Wir benötigen keine Korbut-Unterstützung."
  nf_RED_election.14.b: "Die Hilfe des FSB ist sehr willkommen.
  nf_RED_election.14.b_korbut: "Korbut wird Maxim dabei helfen, die Gunst der Roten Linie zu gewinnen und so seine Chancen bei der Wahl verbessern!"

  nf_RED_election.15.t: "Korbut möchte Hilfe leisten"
  nf_RED_election.15.d: "Da der FSB offenbar seine Unterstützung für Andrey aufgegeben hat, scheint Korbut großes Interesse an der Wahlkandidatur zu zeigen. Sei es, dass er seine eigene politische Agenda verfolgt oder ernsthaft versucht, Maxim bei den kommenden Wahlen zu unterstützen. Korbut hat Maxim und nicht seinem Bruder seine Unterstützung gegeben. Er bietet an dabei zu helfen, das Gleichgewicht der Wahlen zu „optimieren“, indem er einen Großteil des Politbüros zugunsten Maxims beeinflusst."
  nf_RED_election.15.a: "Korbuts Hilfe könnte in der Tat nützlich sein"
  nf_RED_election.15.a_tt: "Korbut soll Maxim dabei helfen, die Wahl zu gewinnen. Für diese Einmischung muss jedoch ein Preis gezahlt werden. Ein hoher Preis."
  nf_RED_election.15.b: "Ich kann diese Wahl alleine gewinnen."
  nf_RED_election.15.b_tt: "Maxim wird versuchen, die Wahl durch eigene Kraft gewinnen. Allerdings wird Korbut immer noch im Schatten lauern."

  nf_RED_election.16.t: "Die Iden der Revolution"
  nf_RED_election.16.d: "Korbut ging noch einmal auf Maxim zu. Er kennt die aktuelle Situation der Roten Linie genau und hat Andrey selbst fest als Wurzel und Ursache allen Übels erkannt.\n\n§tIch habe ein Gespräch zwischen Ihrem Bruder und seinem Berater belauscht … über die Bedrohung, die Sie darstellen, und Möglichkeiten, sie zu beseitigen.§! Damit usurpierte Korbut Maxims Geist und sättigte ihn mit Wahnvorstellungen. Aber Korbut wollte ihm die Lust nach Macht nur vermitteln, nur um seine eigene Karriere voranzutreiben. Sein Plan, Andrey zu entfernen, wird in die Tat umgesetzt.\n\n"
  nf_RED_election.16.a: "Diese Dokumente werden Andrey verdammen"
  nf_RED_election_16.a_tt: "§YKorbut§! wird seine Fäden ziehen, um §YMaxim§! zu unterstützen, der nächste Generalsekretär zu werden. Die Wahl wird in §YMaxim§! erheblich favorisieren!"
  nf_RED_election.16.b: "Auf Korbuts Rat hin stattete Maxim seinem Bruder einen Besuch ab"
  nf_RED_election_16.b_tt: "§R...Von dieser Entscheidung gibt es kein Zurück mehr§!."

  nf_RED_election.17.t: "Blutsbrüder"
  nf_RED_election.17.d: "Endlich trafen sich die beiden Brüder. Es war eine Ewigkeit her, dass die beiden das letzte Mal so miteinander gesprochen hatten. Nicht in einem stickigen Heizungskeller, der über das Schicksal von Verrätern entscheidet, oder auf einem Balkon sitzend und Paraden vorbeiziehender Soldaten beobachtend. Nur die beiden. Zum Plaudern und Essen wie Brüder. Und am Ende? Trotz all der Intrigen und hinterhältigen Spiele zwischen den Geschwistern liebte Andrey seinen Bruder immer noch. Er erinnerte sich gern an die Zeit, als die beiden Kinder waren. Eine glückliche Jugend, an die sich nur wenige erinnern, und noch weniger könnten sie jemals wieder haben.\n\n§tMaxim, Bruder! Ich bin so froh, dass wir uns endlich versöhnt haben. Es war ein Kampf um nichts! Lass uns darauf etwas trinken!§!\n\nAls sein Bruder sein Glas zum Toast erhob und an dem Pilztee nippte, blieb Maxims Gesicht fest. Durch die 20 Jahre des Kampfes und der Mühe, immer im Schatten von Andrey zu stehen. Der unüberwindliche Neid, mit dem er zu kämpfen hatte, manifestierte sich bis zu diesem Moment. Aber er zuckte nicht einmal mit der Wimper, als er zusah, wie sein Bruder dem Gift erlag. Würgend und keuchend stieß Andrey am Boden die letzten Atemzüge seines Lebens aus. Und kein Wort. Es war geschafft."
  nf_RED_election.17.a: "Et tu, Frater?"