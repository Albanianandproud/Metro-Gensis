 nf_YAS.1.t:0 "Der Zustand der Yasenevskaya-Gemeinschaft"
 nf_YAS.1.d:0 "Über das Leben in der Gemeinschaft von Jasenewo ist nicht viel bekannt. Gerüchten zufolge geht es ihren Mitgliedern jedoch finanziell recht gut. Kaluschskaja fungiert als Handelsstützpunkt, an dem Karawanen aus anderen Teilen der Metro Waren kaufen und verkaufen können, denen es jedoch untersagt ist, weiter vorzudringen. Die Gemeinschaft besteht hauptsächlich aus Zivilisten. Sie wird von dem ehemaligen Militärangehörigen Pjotr ​​Iwanowitsch Britwin geleitet – was kaum überrascht, befand sich doch die Zentrale des russischen Auslandsgeheimdienstes unweit von Jasenewo. Der frühere Anführer dieser Fraktion kam während einer Epidemie im Jahr 2020 ums Leben. Vor 2020 kontrollierte die Gemeinschaft von Jasenewo sieben Stationen – Kaluschskaja, Beljajewo, Konkowo, Teply Stan, Jasenewo, Nowojasenewskaja und Bitsewski Park –, wobei Nowojasenewskaja als Hauptstadt der Gemeinschaft diente. Doch in Nowojasenewskaja brach eine unbekannte Infektion aus, die von Stalkern von der Oberfläche eingeschleppt worden war. Dies zwang die Bewohner von Jasenewo und den anderen Stationen dazu, den Tunnel nach Nowojasenewskaja zu blockieren und die Station – ebenso wie den Bitsewski Park, auf den sich die Infektion ebenfalls ausgebreitet hatte – vom Rest des Netzwerks abzuschneiden. Infolgedessen verblieben der Gemeinschaft fünf Stationen, und Jasenewo wurde zur neuen Hauptstadt."
 nf_YAS.1.a:0 "Wir werden uns durchsetzen – selbst gegen alle Banditen in der Metro oder irgendwelche Krankheiten!"