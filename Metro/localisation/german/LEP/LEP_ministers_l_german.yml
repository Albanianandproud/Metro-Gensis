l_german:
  LEP_bulat_meladze: "Bulat Meladze"
  LEP_bulat_meladze_desc: "Obwohl er für einen Stationsverwalter ungewöhnlich jung wirkt, fungiert Meladze als leitender Chef der Lesoparkowaja. Trotz seines verwahrlosten Äußeren und seines sanften Wesens hat er sich als ebenso kompetenter Verwalter erwiesen wie jeder andere; er zieht es vor, sich durch seine Taten zu beweisen. Meladze spricht nur, wenn es etwas zu sagen gibt, und handelt nur, wenn es notwendig ist. Manche mögen ihm einen Mangel an Weitblick unterstellen oder glauben, er hinke den Entwicklungen stets hinterher – doch tatsächlich ist Bulat fest in der Realität verankert und weitaus pragmatischer, als er sich nach außen hin zeigt."
  LEP_bulat_meladze_trait: "Bewacht"
  LEP_hagop: "Hagop"
  LEP_hagop_desc: "Fasziniert von der Anti-Mutanten-Rhetorik der „Großen Metro“ hat Hagop es sich zur Herkulesaufgabe gemacht, die §YLesoparkovaya§! vom Makel des Mutanten-Ungeziefers zu befreien. Die Station soll zu neuem Glanz erwachen – wie in den glorreichen Tagen. Eine reine, ordentliche und anständige Station, um die sie selbst weit entfernte Stationen beneiden dürften."
  LEP_hagop_trait: "Hasst Mutanten"
  LEP_daga: "Bastard Daga"
  LEP_daga_desc: "Einst der einsame Anführer einer bunt zusammengewürfelten Bande von Schlägern, heute Stationsverwalter. Für den alten Daga wendet sich das Blatt zum Guten, nicht wahr? Anstatt zufrieden zu altern und seine Zeit damit zu verschwenden, gelegentlich Karawanen oder Vagabunden zu überfallen, warten in der Ferne Reichtümer und Beute darauf, geplündert zu werden."
  LEP_daga_trait: "Anführer einer Diaspora-Gang"
