 RCH_racial_supremacy_desc:0 "Das Reich glaubt daran, das sie die letzten wahrhaftig §t'menschlichen'§! Menschen in der gesamten Metro sind, vielleicht sogar in der ganzen Welt. Die Bevölkerung des Reiches wird durch konstante Überwachung und Säuberung §t'reingehalten'§! und die Standards werden ständig angepasst. Jene mit Anomalien werden einfach ausradiert."
 
 RCH_a_final_war:0 "Ein letzter Krieg"
 RCH_a_final_war_desc:0 "Ein Kernglaube des Reiches ist der an einen letzten, alles entscheidenden Krieg, in welchem das Reich danach trachtet jegliche Mutanten aus der Metro zu tilgen. Die Bewohner des Reiches werden bereits auf diesen letzten Kampf eingeschworen."

 RCH_metromacht:0 "Die Metromacht"
 RCH_metromacht_desc:0 "Die Soldaten deas Reiches sind überraschend gut ausgebildet und bewaffnet. Durch ihre zahlenmäßige Unterlegenheit müssen ise dies auch sein, um in der Metro bestehen zu können."

 fourth_reich:0 "Das Vierte Reich"
 fourth_reich_desc:0 "Geboren aus der moskauer Neonazi-Szene entwickelte sich an der Pushkinskaya eine totalitäre Diktatur mit dem festen Willen, jeglichen, echten oder vermeintlichen, Mutanten in der Metro zu tilgen. Oft sehr auf das Russische fixiert, verehren sie jedoch Hitlers drittes deutsches Reich und benannten danach ihr nun viertes Reich."

