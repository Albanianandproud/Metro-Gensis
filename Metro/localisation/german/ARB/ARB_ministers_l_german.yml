l_german:

 ARB_tvaltvadze: "Giorgi Tvaltvadze Kolpakov"
 ARB_TVALTVADZE_DESC: "Ein strenger, schwerer Mann, der derzeit als Präsident der Arbat-Konföderation fungiert. Tvaltvadze ist kaukasischer Abstammung und überwacht das Wohlergehen der Konföderation."

 ARB_semyonovich: "Arkadiy Semyonovich"
 ARB_SEMYONOVICH_DESC: "Der derzeitige Stationsleiter von Kiewskaja, trotz des beginnenden Alters ein rasierter, gepflegter Mann. Nachdem er vor vielen Jahren in der Armee gedient hat, überwacht er nun die alltäglichen Aktivitäten, die erforderlich sind, um die Funktionsfähigkeit seiner Gemeinde aufrechtzuerhalten.\n\nEine Handvoll Leute wissen, dass Semjonowitsch eine Vorliebe für Alkohol hat, und zwar die teure Variante. Es heißt, dass er gute Kugeln für makellosen Wein bezahlen wird und nicht für den billigen Fusel, den die Stalker routinemäßig von oben mitbringen."

 ARB_arman: "Arman"
 ARB_ARMAN_DESC: "Arman, ein Kaufmann armenischer Abstammung, tritt als strenge Figur auf. Viele, die ihn treffen, erzählen von seinem fokussierten Blick. Nach dem Metrokrieg hatte er seinen Lebensunterhalt damit verdient, viele der an der Oberfläche gefundenen Waren zu reparieren. Uhren, Doo-Dads mit Gelenkmechanismus. Als er damit genügend Kugeln verdiente, gelang es ihm die Stalker davon zu überzeugen, an die Oberfläche zu gehen und nach ansonsten irrelevanten Objekten zu suchen, die sie zu ihm zurückbringen sollten.\n\nTrotz seines Wohlstands bevorzugt Arman einen altruistischen Lebensstil. Sein Zuhause ist bescheiden nd er hilft viel lieber dort, wo es nötig ist, als auf seinem Elfenbeinturm zu sitzen und sein Geld zu horten. Allerdings richtet sich sein Wohlwollen eher an andere Kaukasier als an Russen."

 ARB_khandukht: "Khandukht"
 ARB_KHANDUKHT_DESC: "Rache ist ein Akt der Leidenschaft; Rache ist ein Akt der Gerechtigkeit\n\nKhandukht ist eine Frau armenisch-russischer Abstammung. Sie floh wie viele andere während des Dritten Weltkriegs in die Arbat-Konföderation. Khandukht heiratete einen Veteranen des Metrokrieges und die beiden zogen ein Kind groß.\n\nIhr Leben würde zusammenbrechen, nachdem ihr Mann in seinen Wohnräumen vorzeitig ermordet und ihr Sohn anschließend entführt wurde. Anstatt sich geschlagen zu geben, riss sie, getrieben von reiner Rache, all ihre Habseligkeiten zusammen und verkaufte sie, um sich genug Ausrüstung und Munition leisten zu können, um sich als Stalker an die Oberfläche zu wagen. Sie traf auf eine Gruppe von Stalkern, die zunächst auf sie herabblickten. Sie fand schnell Fuß im Beruf und erwies sich als ebenso einfallsreich und mutig wie ihre männlichen Kollegen, was ihnen Respekt einbrachte. Entschlossen, endlich einen Abschluss ihrer Trauer und ein Ende der schlaflosen Nächte zu finden, die sie bis zu diesem Zeitpunkt durchgemacht hatte."

