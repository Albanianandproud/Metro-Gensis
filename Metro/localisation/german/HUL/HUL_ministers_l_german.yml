 HUL_BATKA_DESC:0 "Von seinen Kammeraden §YOnkel Misha§! genannt, täuscht der Ersteindruck den Mikhails bescheidenes Aussehen vermittelt. Seine mitreißenden Reden sind voll von Eifer und Fanal und selbst die zynischen 'Alten' der Station wagen es nicht ihn zu unterbrechen. Viele seiner Anhänger nennen ihn auch 'Nestor' benannt nach Nestor Makhno und folgen seinem Mantra; §RFreiheit oder Tod!§!"
