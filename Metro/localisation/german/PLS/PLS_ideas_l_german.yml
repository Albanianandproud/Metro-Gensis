l_german:
 PLS_old_world_bastion:0 "Die letzte Stadt"
 PLS_old_world_bastion_desc:0 "Die Polis liegt mitten im Herzen der Metro und ist der letzte Ort in Russland, möglicherweise sogar der Welt, an dem seine Bewohner den Geist und die Höflichkeit der alten Welt nicht vergessen haben.\n\nSie fungiert als kulturelle und wirtschaftliche Hauptstadt der Metro. Die Polis genießt relative Stabilität und fungiert als letzte Bastion des Wissens und der Zivilisation.\n\nDie Polis wird durch ein Kastensystem organisiert. Jeder Bürger kann, wenn er achtzehn wird, nach Belieben eine Kaste wählen, anstatt in eine vordefinierte Position hineingeboren zu werden. Allerdings sind alle Schichten gleich an Macht und Verantwortung, mit Gleichheit und Freiheit für jeden Bürger, unabhängig von seiner Kaste."

 PLS_kshatriya_defenders_of_polis:0 "Kshatriya"
 PLS_kshatriya_defenders_of_polis_desc:0 "Die Militärkaste der Polis. Zu ihrer Organisation gehören größtenteils ehemalige Angehörige der russischen Armee, die nach dem Bombenabwurf in die Metro evakuiert wurden. Ihre Aufgabe ist es nun, die Polis vor unzähligen Bedrohungen zu schützen und zu verteidigen. Ob Mutanten, Banditen oder neidische Blicke des Reichs oder der Roten Linie.\n Oft gehen Mitglieder der Kshatriya fort, um sich den Rangers des Ordens anzuschließen."

 polis_council:0 "Rat der Polis"
 polis_council_desc:0 "Das Zentrum der Polis, das die vier verschiedenen Stationen regiert und leitet. Seinem Ausschuss gehören führende Persönlichkeiten an, die einst prestigeträchtige Rollen der russischen Gesellschaft hatten. Darunter auch Mitglieder des Verteidigungsministeriums und der Wissenschaftler der Universitäten von Moskau.\n\n Sie sind zwar um das Überleben und den Erhalt der Menschheit besorgt, aber nicht so sehr um die trivialen und ansonsten unbedeutenden Streitigkeiten, die innerhalb der Metro als Ganzes stattfinden zu beachten."

 PLS_ignorance: "Letzte Bastion der Zivilisation"
 PLS_aloof: "Distanziert"
 PLS_aloof_desc: "Die Polis ist der Erhaltung der Menschheit verpflichtet; Es ist einfach so, dass wir von unnützen Idioten umgeben sind."

