 BRN_byalkevich:0 "Syarhey Byalkevich"
 POLITICS_BRN_BYALKEVICH_DESC:0 "Im Einverständniss mit der Hanse hat Byalkevich einige Sonderrechte für die Station erwirkt, denn dank ihm hat sie trotz ihrer geringen Größe große Bedeutung für die Ringlinie."

 BRN_petrovich:0 "Leonid Petrovich"
 POLITICS_BRN_PETROVICH_DESC:0 "Einer der vielen Händler an der Belorusskaya, die dort auch "Manager" genannt werden. Petrovich ist einer der erfolreichsten Manager der Station, der sein Vermögen mit Farmen und Werkstätten erarbeitet hat und der auch nicht vom Handel mit dem Reich oder mt den Anarchisten bei der Gulyai-Pole im Norden zurückschreckt."

