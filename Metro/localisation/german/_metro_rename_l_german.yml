### Denazification ###

 #Decisions#
  denazification_decisions: "Entnazifizierung"

  denazification_tverskaya: "Entnazifiziere die Station: §O[306.GetName]§!"
  denazification_pushkinskaya: "Entnazifiziere die Station: §O[275.GetName]§!"
  denazification_chekhovskaya: "Entnazifiziere die Station: §O[337.GetName]§!"

 #Events#

  denazification_event.1.t: "Entnazifizierung der Station [306.GetName]"
  denazification_event.1.d: "Nach heftigen kämpfen haben wir die [306.GetName] gesichert. Der Naziabschaum hatte sie bisher als Konzentrationslager verwendet und hier fanden wir auch das Massengrab all jener "Mutanten", die von ihnen hingerichtet worden waren. Säubern wir diesen tragischen Ort ein für alle Mal."
  denazification_event.1.a: "Säuberung der Tverskaya."
  denazification_event.1.b: "Maxim Gorky wird nun endlich Ruhe finden..."

  denazification_event.2.t: "Entnazifizierung der Station [275.GetName]"
  denazification_event.2.d: "Nach heftigen kämpfen haben wir die [275.GetName] gesichert. In dieser Station wurde das Reich geboren, hier befanden sich auch die SS- und Metromacht-hauptquartiere, sowie die Residenz des Führers. Zeit diese Geschichte sterben zu lassen"
  denazification_event.2.a: "A.S. Pushkin wird heute Nacht in Frieden ruhen..."

  denazification_event.3.t: "Entnazifizierung der Station [337.GetName]"
  denazification_event.3.d: "Nach heftigen kämpfen haben wir die [337.GetName] gesichert. Die Gestapo sowie die Baracken der Metromacht befanden sich hier. Tja, jetzt nicht mehr."
  denazification_event.3.a: "A.P. Chekhov, du wirst nun wieder Frieden finden..."

