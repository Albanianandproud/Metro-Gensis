HNZ_mercenary_army_tt: "Schaltet §YSöldner-Wehrgesetze§! frei"

HNZ_army_centralization_2: "Regelmäßige Manöver"
HNZ_army_centralization_2_desc: ""

HNZ_army_centralization_2_tt: "Mehr als §Y600 Infanterieausrüstung§! in der Armee\n\n"

HNZ_army_centralization_3: "Berufssoldaten"
HNZ_army_centralization_3_desc: ""

HNZ_army_centralization_3_tt: "Mehr als §Y1000 Infanterieausrüstung§! in der Armee\n\n"

HNZ_mercenary_army_2: "Die Condottieri der Hansa"
HNZ_mercenary_army_2_desc: ""

HNZ_mercenary_army_3: "Glücksritter"
HNZ_mercenary_army_3_desc: "Wo Krieg herrscht, fließt Geld – oder in unserem Fall Patronen. Und wo Patronen verdient werden können, folgen die Soldaten."

HNZ_grand_army_of_the_league: "Große Armee des Bundes"
HNZ_grand_army_of_the_league_desc: ""

HNZ_establish_war_committee: "Das Kriegskomitee gründen"
HNZ_establish_war_committee_desc: "Während des Krieges zwischen der Hansa und der Roten Linie wurde innerhalb der antikommunistischen Koalition ein Kriegskomitee gebildet, um Operationen besser zu koordinieren und Strategien zu entwickeln. Glücklicherweise mussten wir seitdem keine Organisation dieser Größenordnung mehr aufstellen. Doch angesichts der wachsenden Spannungen im Metro-System wäre ein Komitee aus Stationsvorstehern und Militärs eine sinnvolle Maßnahme."

HNZ_general_grizzled_veteran_oob: "Zurück in die Reihen"
HNZ_general_grizzled_veteran_oob_desc: "Sergei versucht, viele ehemalige Soldaten des Hansa-Roten-Linie-Krieges wieder in den Dienst zu holen. Frisches Blut wird stets benötigt, doch es sind die Veteranen, die den Krieg kennen. Ihr Wissen und ihre Erfahrung werden heute mehr denn je gebraucht."

HNZ_grizzled_better_arms: "Bessere Bewaffnung"
HNZ_grizzled_better_arms_desc: "Ein Soldat ist nur so gut wie seine Waffe. Der Unterschied zwischen einer zusammengewürfelten Miliz und einer professionellen Armee liegt in der Ausrüstung ihrer Kämpfer. Größere Anstrengungen sollten darauf verwendet werden, bessere Waffen zu bergen oder vorhandene Modelle aufzurüsten."

HNZ_grizzled_not_another_bloodbath: "Lehren aus dem Krieg zwischen Hansa und Roter Linie"
HNZ_grizzled_not_another_bloodbath_desc: "Der Krieg war ein einziges Gemetzel. Die Tunnel waren mit Leichen verstopft, während Männer und Jungen ohne Rücksicht in den Fleischwolf geworfen wurden. Sergei stand mitten im Inferno und verlor viele seiner Kameraden. Über seine Kriegserlebnisse spricht Jasnow nur selten. Er möchte verhindern, dass sich ein solcher Abnutzungskrieg jemals wiederholt."

HNZ_general_conscription_reforms: "Wehrdienstreformen"
HNZ_general_conscription_reforms_desc: "Bessere Soldaten, bessere Ausbildung und bessere Rekruten. Wir sind nicht die Rote Linie. Wir drücken nicht irgendeinem Narren vom Straßenrand ein Gewehr in die Hand. Wir sind besser als das."

HNZ_an_elite_army: "Eine Elitearmee"
HNZ_an_elite_army_desc: "Eine Elitearmee der Hanseatischen Liga. Diszipliniert und hervorragend ausgebildet. Eine Streitmacht, die selbst mit den Spartanern oder den Kshatriya von Polis konkurrieren könnte."

HNZ_general_foreign_mercenary_oob: "Ausländische Söldner anwerben"
HNZ_general_foreign_mercenary_oob_desc: "De Vries' erste Amtshandlung besteht darin, verschiedene Söldnergruppen anzuwerben, die noch immer in der Metro operieren. Seine Kontakte reichen bis ins Europäische Commonwealth, wo er Berichten zufolge Zuflucht suchte, als die Bomben fielen. Dort kennt er einige Leute, die bereit wären, sich unserer Armee anzuschließen. Ihr Russisch ist zwar immer noch ziemlich miserabel, aber das lässt sich verschmerzen."

HNZ_mercenary_war_never_changes: "Der Krieg bleibt immer gleich"
HNZ_mercenary_war_never_changes_desc: "Eines weiß De Vries genau: Der Krieg verändert sich nie. Ob im dichten Dschungel des Kongo oder in den windgepeitschten Wüsten des Irak – Krieg ist ein Kampf der Köpfe und des Willens. Andere mögen sich über Ideologien oder das Gute im Menschen Gedanken machen. Für De Vries zählt nur die Bezahlung."

HNZ_lessons_from_conflict: "Lehren aus dem Koalitionskrieg"
HNZ_lessons_from_conflict_desc: "Der Koalitionskrieg war erbarmungslos. Gegen Ende wurde er zu einem reinen Fleischwolf, in dem das Leben der Soldaten keinerlei Rolle mehr spielte. Geschichten von Heldentum und Siegen wurden von gewaltigen Verlusten und Nachlässigkeit überschattet."

HNZ_planning_first: "Planung an erster Stelle"
HNZ_planning_first_desc: "Bewaffnete Konflikte müssen mit ausreichender Vorbereitung und durchdachten Strategien angegangen werden."

HNZ_planning_military_advisor_3: "Der Tunnelläufer"
HNZ_planning_military_advisor_3_desc: "Er kennt die hektische und düstere Dunkelheit der Metro wie kaum ein anderer. Fast scheint es, als besäße er einen sechsten Sinn. Versteckte Durchgänge und Versorgungstunnel findet er mühelos und ermöglicht so überraschende Angriffe mit blitzartiger Präzision."

HNZ_planning_military_advisor_2: "Schattenkämpfer"
HNZ_planning_military_advisor_2_desc: "Während die Metro in ewiger Dunkelheit liegt, bewegt er sich darin wie ein Fuchs oder eine Eule. Er durchdringt die Finsternis und erkennt Feinde lange bevor diese ihn bemerken."

HNZ_planning_military_advisor_1: "Planungsexperte"
HNZ_planning_military_advisor_1_desc: "Ein akribischer Planer, der innerhalb kürzester Zeit detaillierte Schlachtpläne erstellen kann. Er denkt schnell und verliert dabei niemals die logistischen Herausforderungen der Metro aus den Augen."

HNZ_logistics_first: "Logistik über alles"
HNZ_logistics_first_desc: "Die Kriegsführung wird konsequent unter dem Gesichtspunkt effizienter Logistik betrachtet."

HNZ_logistics_military_advisor_3: "Der Kommandant"
HNZ_logistics_military_advisor_3_desc: "Ein ehemaliger Truppführer des Reichs, der beim Führer in Ungnade fiel, weil er Außenseitern den Eintritt in die Reihen gestatten wollte. Als der Führer Ende 2027 die Macht übernahm, floh er in hanseatisches Gebiet und erwies sich dort als äußerst fähiger Kämpfer."

HNZ_logistics_military_advisor_2: "Wintersoldat"
HNZ_logistics_military_advisor_2_desc: "Selbst in den härtesten und kältesten Monaten des Jahres ist er in der Lage, seine Soldaten zu organisieren und zu führen. Auch dann, wenn selbst die tiefe Metro zufriert und Erfrierungen allgegenwärtig sind."

HNZ_logistics_military_advisor_1: "Genialer Freigeist"
HNZ_logistics_military_advisor_1_desc: "Unkonventionell in seinen Methoden. Er setzt auf ungewöhnliche Taktiken und Strategien. Der Feind kann unsere Pläne nicht durchkreuzen, wenn er nicht weiß, was unser nächster Schritt sein wird."

HNZ_planning_general_boost: "Große Pläne"
HNZ_planning_general_boost_desc: "Nicht zu planen bedeutet, das Scheitern zu planen. Oder wie manche sagen: Planung ist unverzichtbar, doch oft nutzlos. Wie auch immer man es ausdrückt – für jede größere Offensive ist Planung von entscheidender Bedeutung."

HNZ_logistics_general_boost: "Logistischer Ansatz"
HNZ_logistics_general_boost_desc: "In der Metro ist der Kampf nur die halbe Miete – die andere Hälfte ist die Logistik. Es muss sichergestellt werden, dass Nachschub und Ausrüstung unsere Frontlinien erreichen und unsere Truppen zuverlässig versorgen."

HNZ_establish_reclamation_bureau: "Gründung des Wiedererschließungsbüros"
HNZ_establish_reclamation_bureau_desc: "Große Teile der Koltsevaya-Linie sind trotz ihrer Lage innerhalb unseres Territoriums noch immer unerforscht. Dieser Tunnelabschnitt besitzt enorme strategische Bedeutung, da jeder, der von außerhalb des Metro-Rings ins innere Metrogebiet gelangen will, ihn passieren muss. Es wäre ratsam, eine Behörde oder Organisation zu schaffen, die die Linie kartiert, die Verkehrswege verbessert und gleichzeitig Trümmer sowie Wracks beseitigt."

HNZ_reclamation_train_technicians: "Ausbildung von Technikern"
HNZ_reclamation_train_technicians_desc: "Neue Techniker müssen angeworben und ausgebildet werden, um die nächste Generation der Metro zu unterstützen."

HNZ_reclamation_clearing_tunnels: "Tunnelräumung"
HNZ_reclamation_clearing_tunnels_desc: "Säubern wir die Tunnel und Durchgänge von Mutanten und Trümmern. Dadurch werden sie für Händler und militärische Nutzung deutlich sicherer."

HNZ_reclamation_organise_workforce: "Organisation der Arbeitskräfte"
HNZ_reclamation_organise_workforce_desc: "Unsere Arbeitskräfte müssen besser organisiert werden, um ihre Effizienz zu steigern."

HNZ_reclamation_engineering_academy: "Ingenieursakademie"
HNZ_reclamation_engineering_academy_desc: "Eine Ingenieursakademie soll neue Ingenieure ausbilden und das Wissen der Alten Welt bewahren und weitergeben."

HNZ_engineering_academy_2: "Schrottverwertungsorganisationen fördern"
HNZ_engineering_academy_2_desc: "In der Liga existieren zahlreiche Schrottverwertungsorganisationen. Während die Bergung meist den Stalkern überlassen wird, liegt die Verwendung der geborgenen Ressourcen gewöhnlich in den Händen der örtlichen Stationen und ihrer Verwaltungen."

HNZ_engineering_academy_1: "Standardisierte Planung"
HNZ_engineering_academy_1_desc: "Wohnraum, Pilzplantagen und andere Einrichtungen unter Tage effektiv zu planen ist keine leichte Aufgabe. Der begrenzte Platz erfordert sorgfältige und effiziente Planungsverfahren."

HNZ_engineering_academy: "Schwerere Bewaffnung"
HNZ_engineering_academy_desc: "Es ist offensichtlich, dass einfache Schrottwaffen keine Schlachten gewinnen werden. Unser Militär benötigt hochspezialisierte Unterstützungstrupps für den aktiven Kampfeinsatz."

HNZ_engineering_academy_5: "Verbesserte Bewaffnung"
HNZ_engineering_academy_5_desc: "Schrottgewehre und minderwertige Rohrpistolen gewinnen keine Kriege. Unser gewaltiger wirtschaftlicher Einfluss mag Konflikte abschrecken, doch was bringt die Zukunft? Unsere Waffen sollten unsere wirtschaftliche Stärke widerspiegeln."

HNZ_reclamation_engineering_chemicals: "Chemische Laboratorien"
HNZ_reclamation_engineering_chemicals_desc: "Wir haben die Mittel entdeckt – oder wiederentdeckt –, um Chemikalien zur Herstellung unserer Waffen und Ausrüstung zu produzieren."

HNZ_engineering_academy_4: "Bemühungen um synthetischen Brennstoff"
HNZ_engineering_academy_4_desc: "Brennstoff ist eine seltene und wertvolle Ressource. Die meisten Vorräte sind längst erschöpft. Wir müssen Wege finden, neuen Brennstoff zu entdecken oder synthetisch herzustellen, um unsere Wirtschaft und unser Militär am Leben zu erhalten."

HNZ_reclamation_bureau_2_civilian: "Zivile Fördermittel"
HNZ_reclamation_bureau_2_civilian_desc: "Fördergelder sollen unseren Kernindustrien die nötigen Mittel verschaffen, um konkurrenzfähig zu bleiben und ausländischen Waren die Stirn zu bieten."

HNZ_reclamation_bureau_2_civilian_2: "Interstationäre Fuhrmannsverbände gründen"
HNZ_reclamation_bureau_2_civilian_2_desc: "Fuhrmannsverbände müssen im gesamten Einflussgebiet präsent sein. Sie sollen schnell von Ort zu Ort reisen können und sich um logistische Probleme sowie andere Herausforderungen kümmern."

HNZ_reclamation_bureau_2_military: "Vorbereitung auf den nächsten Konflikt"
HNZ_reclamation_bureau_2_military_desc: "Ob der nächste Krieg in fünf Jahren oder morgen beginnt – wir müssen vorbereitet sein."

HNZ_reclamation_bureau_2_military_2: "Strategische Arsenalreserven"
HNZ_reclamation_bureau_2_military_2_desc: "Bereiten wir uns auf künftige Konflikte vor, indem wir Ressourcen und Materialien für die Waffenproduktion einlagern."

HNZ_reclamation_bureau_2_civilian_3: "Vereinigte Handwerkerräte"
HNZ_reclamation_bureau_2_civilian_3_desc: "Führen wir unsere Handwerkerräte und Organisationen zu einer gemeinsamen Struktur zusammen."

HNZ_reclamation_bureau_2_military_3: "Industrielle Rüstungsvorbereitungen"
HNZ_reclamation_bureau_2_military_3_desc: "Bereiten wir unsere Arsenale auf zukünftige Expansionen und Konflikte vor."

HNZ_reclamation_bureau_2_improve: "Erweiterung des Wiedererschließungsbüros"
HNZ_reclamation_bureau_2_improve_desc: "Wir können das Wiedererschließungsbüro ausbauen, um die zunehmenden Anforderungen der Verwaltung der Ringlinie zu bewältigen."

HNZ_reclamation_bureau_2_research_slot: "Forschungs- und Entwicklungsprogramm"
HNZ_reclamation_bureau_2_research_slot_desc: "Vielleicht verfügen wir nicht über die besten Labore wie Polis, aber dieses wird seinen Zweck erfüllen."

HNZ_reclamation_repair_rail_carts: "Reparatur von Nutzdraisinen"
HNZ_reclamation_repair_rail_carts_desc: "Viele Draisinen können repariert und durch Umrüstung zu Kampffahrzeugen umgebaut werden."

HNZ_reclamation_railcart_2: "Improvisierte Umbauten"
HNZ_reclamation_railcart_2_desc: "Man nehme eine einfache Handdraisine, schweiße Metallplatten an den Rahmen und montiere ein DsHK-Maschinengewehr an die Front. Das Ergebnis ist ein primitiver, aber wirkungsvoller Angriffswagen, der feindliche Linien durchbrechen kann."

HNZ_reclamation_railcart_3: "Bergung von Versorgungswagen"
HNZ_reclamation_railcart_3_desc: "Viele Depots liegen verlassen im Untergrund der Metro. Zwar wurden die meisten bereits von Plünderern ausgeräumt, doch einige nützliche Ausrüstungsgegenstände sind noch vorhanden."

HNZ_reclamation_railcart_1: "Schnelle Eingreiftruppen"
HNZ_reclamation_railcart_1_desc: "Wenn uns die Geschichte eines gelehrt hat, dann dass schnelle Truppenverlegung und Beweglichkeit entscheidend für den Erfolg im Kampf sind. Besonders während des Koalitionskrieges wurden viele Armeen festgesetzt. Geschwindigkeit und Mobilität bedeuten Sieg."

HNZ_reclamation_railcart_4: "Kriegsmaschinen"
HNZ_reclamation_railcart_4_desc: "In den Tagen der Alten Welt wurden Armeen von riesigen motorisierten und mechanisierten Verbänden getragen. Heute können die meisten Menschen froh sein, überhaupt ein Paar Lederstiefel zu besitzen. Nur die wohlhabendsten und mächtigsten Staaten der Metro können sich solche beeindruckenden Streitkräfte leisten."

HNZ_reclamation_rail_carts_boost: "Technisches Wissen über Draisinen"
HNZ_reclamation_rail_carts_boost_desc: "Die verschiedenen Handbücher und Dokumente enthalten wertvolles Wissen über Draisinen, insbesondere über deren Reparatur und Verbesserung."

HNZ_reclamation_railcart_5: "Linienbrecher"
HNZ_reclamation_railcart_5_desc: "Nur wenige erinnern sich noch an die Zeit, als Züge und Waggons regelmäßig durch die Tunnel der Metro fuhren. Nun sollen diese verfallenen Fahrzeuge erneut einem Zweck dienen."

HNZ_reclamation_railcart_34: "Bauman-Hanza-Technikkonzern"
HNZ_reclamation_railcart_34_desc: "Bauman ist ein hochspezialisierter, wenn auch oft verschlossener Bund von Technikern, die sich auf die Wiederherstellung und Reparatur empfindlicher Maschinen und Werkzeuge spezialisiert haben. Im Austausch für benötigte Ressourcen und gemeinsame Sicherheitsgarantien könnten sie uns beim Umbau und der Modernisierung von Militärdraisinen unterstützen."

HNZ_baumansky_joint_trade: "Wir werden technische Unterstützung von §Y[BAU.GetFlag][BAU.GetName]§! anfordern, um unsere §YAusrüstungsproduktion§! zu verbessern."
HNZ_reclamation_railcart_36: "Gemeinsame Anstrengungen"
HNZ_reclamation_railcart_36_desc: "Die Bauman-Allianz ist enger in die hanseatische Einflusssphäre gerückt und pflegt nun deutlich engere Beziehungen zur Regierung in Prospekt Mira. Während viele der älteren Mitglieder der Allianz darüber murren und ihren Unmut nur schwer verbergen, zeigen sich zahlreiche jüngere Techniker begeistert über diese Entwicklung."

HNZ_amble_crops: "Diversifizierung der Ernteerträge"
HNZ_amble_crops_desc: "Vor sechstausend Jahren begannen die Menschen erstmals mit dem Ackerbau. Der Übergang von Jägern und Sammlern zu sesshaften Bauern war ein mühsamer Prozess. Nutzpflanzen sind in der Metro ein seltener Anblick. Nur wenige Arten haben den Krieg überlebt, und selbst diese liefern in ihrem geschwächten Zustand nur geringe Erträge."

HNZ_reclamation_electric_cables: "Elektrifizierung der Ringlinie"
HNZ_reclamation_electric_cables_desc: "Wir verlegen Stromkabel durch unsere Tunnel und verbinden sie mit unseren Stationen. Elektrizität wird nicht nur den Alltag unserer Bürger angenehmer machen, sondern auch die Produktionsleistung unserer Werkstätten und Fabriken steigern."

HNZ_reclamation_tools_of_the_trade: "Werkzeuge des Handwerks"
HNZ_reclamation_tools_of_the_trade_desc: "Nicht nur die wertvollen Rohstoffe zum Herstellen und Reparieren unserer Ausrüstung sind wichtig, sondern auch die Werkzeuge, mit denen aus Schrott und Metallteilen brauchbare Ausrüstung gefertigt wird. Solche präzisen und hochspezialisierten Werkzeuge sind in der Metro selten und werden eifersüchtig bewacht. Wir sollten unseren bestehenden Werkzeugbestand sorgfältig erhalten."

HNZ_reclamation_train_stalkers: "Stalker ausbilden"
HNZ_reclamation_train_stalkers_desc: "Die Oberfläche ist ein lebensfeindlicher Ort. Strahlung, Mutanten und eisige Temperaturen machen jeden Ausflug gefährlich. Dennoch bleibt sie eine wahre Goldgrube für findige Plünderer. Wir sollten eine zentrale Stalker-Einheit aufstellen, die Ressourcen von der Oberfläche sichert, bevor andere sie bergen."

HNZ_reclamation_stalker_combat_training: "Kampfausbildung"
HNZ_reclamation_stalker_combat_training_desc: "Es reicht nicht aus, wenn unsere Stalker Gefahren lediglich ausweichen können. Sie müssen ausgerüstet und ausgebildet werden, um Bedrohungen aktiv zu bekämpfen – seien es Mutanten oder feindliche Fraktionen."

HNZ_reclamation_call_stalkers_military_duty: "Zum Militärdienst einberufen"
HNZ_reclamation_call_stalkers_military_duty_desc: "Sollte der Krieg eines Tages die Metro erreichen, können wir unsere Stalker zum Dienst an der Waffe einberufen."

HNZ_reclamation_survey_posts: "Erkundungsposten"
HNZ_reclamation_survey_posts_desc: "Wenn wir rohstoffreiche Gebiete sowie Orte mit wertvollen Werkzeugen oder anderer Beute markieren, können spätere Bergungsmissionen deutlich effizienter durchgeführt werden."

HNZ_reclamation_stalker_scour_north: "Nordmoskau durchsuchen"
HNZ_reclamation_stalker_scour_north_desc: "Die nördlichen Bezirke Moskaus bieten trotz ihrer Verwüstung noch immer zahlreiche Möglichkeiten zur Bergung wertvoller Ressourcen. Die Frage ist nur: Wer ist mutig – oder töricht – genug, die Ruinen zu durchstreifen?"

HNZ_reclamation_stalker_scour_south: "Südmoskau durchsuchen"
HNZ_reclamation_stalker_scour_south_desc: "Auch Südmoskau verspricht noch lohnende Beute. Zwar wurden die meisten offensichtlichen Fundorte bereits geplündert, doch zwischen all dem Schutt finden sich noch immer wahre Schätze."

HNZ_reclamation_stalker_jackpot: "Den §CJackpot§! finden"
HNZ_reclamation_stalker_jackpot_desc: "Unsere Stalker kehren zurück – und mit ihnen etwas von außerordentlicher Bedeutung..."

HNZ_renovate_vehicles: "Wracks restaurieren"
HNZ_renovate_vehicles_desc: "Unsere Stalker berichten von Fahrzeugen an der Oberfläche, die sich in überraschend gutem Zustand befinden. Wenn wir diese Wracks bergen, könnten unsere Techniker sie womöglich wieder instand setzen. Das würde Transporte schneller, einfacher und sicherer machen."

HNZ_getting_an_upgrade: "Ein Upgrade erhalten"
HNZ_getting_an_upgrade_desc: "Mit den Reparaturen an den Oberflächenfahrzeugen erhalten unsere Stalker zusätzliche Transportkapazitäten und können künftig mehr Ressourcen für unsere Sache bergen."

HNZ_salvage_haul_depot: "Versorgungsfahrt zum Bergungsdepot"
HNZ_salvage_haul_depot_desc: "Dank unserer Fahrzeuge können wir nun deutlich weiter vordringen, als dies zu Fuß jemals möglich gewesen wäre."

HNZ_burn_tire: "Gummi auf die Schienen"
HNZ_burn_tire_desc: "Unsere Oberflächenfahrzeuge sind einsatzbereit – Zeit, sie auf die Probe zu stellen!"
HNZ_external_sphere: "Äußere Einflusssphäre"
HNZ_external_sphere_desc: "Zahlreiche Handelskarawanen passieren täglich unsere vielen Stationen. Von weit entfernten Außenposten bis hin zu den entlegensten Winkeln, in denen die Menschheit beinahe vergessen wurde – die Hansa empfängt jeden Tag Menschen aus allen Teilen der Metro. Der freie Personenverkehr macht unsere Stationen jedoch anfällig für Sabotage und subversive Aktivitäten. Ausweisdokumente oder Reisepässe für jeden Reisenden ermöglichen es uns, potenzielle Gefahren frühzeitig zu erkennen."

HNZ_passport_projection: "Wir werden benachbarte §YStationen§! dazu bewegen können, Reisepässe als wichtigstes Mittel zur Kontrolle und Dokumentation des Personenverkehrs einzuführen."

HNZ_redline_stance: "Eine Stellungnahme zu Sokol"
HNZ_redline_stance_desc: ""
HNZ_redline_relation_decisions: "Wir werden entscheiden, wie wir mit der §Y[RED.GetFlag][RED.GetName]§! umgehen und möglicherweise Handel treiben."

HNZ_reich_stance: "Unsere Haltung zum Reich"
HNZ_reich_stance_desc: ""
HNZ_reich_relation_decisions: "Wir werden entscheiden, wie wir mit dem §Y[RCH.GetFlag][RCH.GetName]§! umgehen und möglicherweise Handel treiben."

HNZ_trade_with_MOB: "Handel mit den Gangstern"
HNZ_trade_with_MOB_desc: "Die Gangster der Kaluzhsko-Rizhskaya-Linie bestehen aus vier Banden, die Schabolowskaya, Leninski Prospekt und Nowye Tscherjomuschki kontrollieren. Noch stellen sie keine Bedrohung für unser Regime dar. Dennoch könnten sie nützliche Handelspartner sein. Wer sagt denn, dass man Freundschaft nicht mit Patronen kaufen kann?"

HNZ_old_comrades3: "Die Reichweite des Gemeinwesens ausdehnen"
HNZ_old_comrades3_desc: ""

HNZ_bind_to_influence: "§YBenachbarte Stationen§! mit §Ypositiven§! Beziehungen zu uns werden schrittweise wirtschaftlich vom §Y[HNZ.GetFlag][HNZ.GetName]§! abhängig gemacht."

HNZ_new_friends: "Unterstützt [PEC.GetName]"
HNZ_new_friends_desc: ""

HNZ_new_friends_2: "Unterstützt [KAL.GetName]"
HNZ_new_friends_2_desc: ""

HNZ_new_friends_3: "Technisches Wissen bündeln"
HNZ_new_friends_3_desc: "Der Osten ist ein vergleichsweise ruhiger Abschnitt der Metro. Zwei Mächte dominieren diese Region: [PEC.GetName] und [KAL.GetName]. Beide Staaten pflegen gute Beziehungen zur Hanseatischen Liga."

HNZ_PEC_KAL_relations_factory: "Bei mehr als §Y35§! Beziehungen zu §Y[PEC.GetFlag][PEC.GetName]§! oder §Y[KAL.GetFlag][KAL.GetName]§! werden §Y2§! zivile Werkstätten in unserer Hauptstadt und der Hauptstadt unseres Verbündeten errichtet.\n\n"

HNZ_unbound_influence: "Den Osten sichern"
HNZ_unbound_influence_desc: "Obwohl der Osten nicht für größere Mutanten- oder Menschenbedrohungen bekannt ist, können wir nicht ausschließen, dass dort neue Mächte entstehen. [PEC.GetName] könnte durch die Altersschwäche seines langjährigen Anführers in eine Krise geraten, oder politische Extremisten könnten in [KAL.GetName] die Kontrolle übernehmen. Wir müssen unseren Einfluss in dieser Region ausweiten."

HNZ_PEC_KAL_relations_military: "Bei mehr als §Y40§! Beziehungen zu §Y[PEC.GetFlag][PEC.GetName]§! oder §Y[KAL.GetFlag][KAL.GetName]§! werden §Y2§! Militärwerkstätten in unserer Hauptstadt und der Hauptstadt unseres Verbündeten errichtet. Zusätzlich laden wir sie in die Hanseatische Liga ein.\n\n"

