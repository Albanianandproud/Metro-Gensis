l_german:

 education_cooldown: "Cooldown"
 education_cooldown_finished: "Solange diese Abkühlphase andauert, werden wir keine weiteren Bildungsreformen durchführen können."

 education_reform_state_cost_reduction_modifier: "Beschleunigt Bildungsreform"
 education_practise: "Bildungsreform"
 education_practise_desc: "\n\n\n\n\n\n\nAktiviert eine Entscheidung, welche eine §OMission auf Zeit beginn.§! Sobald der Timer §R0§! erreicht, wird unser §OBildungsgesetz.§! automatisch verbessert. Die Zeit hierfür steigt pro Stufe exponentiell an, abhängig von unserer §YBevölkerung§! und der Größe unseres §YTerritoriums§!, kann jedoch auch durch verschiedene Entscheidungen reduziert werden. Zwischen den Verbesserungen gibt es einen ca. 10-monatigen Cooldown.§!"

 is_not_bandit_nation:0 "Keine Banditen"
 not_currently_under_education_reforms:0 "Unternimmt keine Bildungsreform"
 not_education_cooldown: "Momentan Bildungsreform Cooldown"

 education_reform_increase_cost_and_duration_tt:0 "§YKosten und Dauer§! dieser Entscheidung wird sich mit jeder weiteren Verwendung erhöhen\n"

 improve_education_normal:0 "Verbesserung des Bildungssystemes"
 improve_education_normal_desc:0 "Angesichts des Zustands unserer Stationen wurde deutlich, dass es unseren Bürgern durch die zusätzliche Umsetzung von Bildungspraktiken viel leichter fallen wird, einfache, normale Alltagsaktivitäten durchzuführen. Mit dem zusätzlichen Vorteil, dass wir unser eigenes F&E-Verhalten verbessern können.[metro_education_reforms_cost_tooltip]"

 improve_education_normal_advanced: "Verbessert Bildung"
 improve_education_normal_advanced_desc: "Wir stehen am Rande einer wissenschaftlichen Revolution. Die alte Welt konnte von dem, was wir gerade erreichen wollten, nur träumen!"

 improve_education_efforts_mission:0 "Bemühung um Bildung"
 improve_education_efforts_mission_desc:0 "Umfassenden Unterricht in der Metro auf die Beine zu stellen ist eine monumentale Aufgabe. Es wird lange dauern bis wir die Früchte unserer Arbeit sehen werden.[metro_education_reforms_cost_tooltip]"

 metro_education_reforms_cost_tooltip: "\n\nKosten durch Bevölkerung : §Y[?education_reforms_population_cost_tooltip]§!\nKosten von Territorium : §Y[?education_reforms_state_cost_tooltip]§!\nKostenmodifikator : §Yx[?education_reforms_cost_from_modifiers_factor|0..2]§!\nKostenmodifikator durch Stufe §Y: x[?education_reform_tier_multiplier]§!\nKostenreduktion von Staaten §Y-[modifier@education_reform_state_cost_reduction_modifier]%§!"

 education_efforts_mission_tooltip:0 "\n§gDies wird eine lange Zeit dauern, abhängig von der Zahl der§! §YStationen§! §gdie wir besitzen.§!\n"

 education_efforts_mission_completed:0 "\nSobald der Timer §R0§! erreicht, werden wir ein neues §CForschungslevel!§!§Yfreischalten§!"

 improve_education_efforts_administrate_station_chiefs:0 "Zusammenarbeit mit den Stations-Vorsitzenden"
 improve_education_efforts_administrate_station_chiefs_desc:0 "Das Treffen mit unseren Stationsverwaltern zur Formulierung und Konzeption des Verfahrens zur Umsetzung dieser Reformen wird einige Zeit in Anspruch nehmen, auch dann, wenn sie mit unseren Vorschlägen einverstanden sind. Nur wenn wir die Autorität der örtlichen Häuptlinge respektieren, können wir die gewünschten Reformen ordnungsgemäß vorantreiben und gleichzeitig die gewünschten Änderungen umsetzen."

 improve_education_efforts_collect_books:0 "Gründet Bibliotheken"
 improve_education_efforts_collect_books_desc:0 "Wie wäre es, wenn wir die Bücher lesen, anstatt dass wir sie als Brennstoff verwenden? Lagern wir sie in eine zentrale Bibliothek ein, bevor sie noch mehr Schaden erleiden."

 improve_education_efforts_soapbox:0 "Ermutigt Bürgerbeteiligung"
 improve_education_efforts_soapbox_desc:0 "Da die wichtigen Dinge des täglichen Lebens in den Köpfen der Menschen immer stärker zum Ausdruck kommen, werden einfache Dinge wie Schreiben und Lesen immer weniger alltäglich. Wenn wir diese Vorstellung radikal ändern wollen, müssen wir alle Facetten unserer Bürger ins Visier nehmen. Nicht nur innerhalb der Jugend."

 improve_education_efforts_purchase_amenities:0 "Kauft Bücher"
 improve_education_efforts_purchase_amenities_desc:0 "Da Händler zu und von unserer Station kommen und ihre zahlreichen Waren feilbieten, wird der Kauf und die Bevorratung aller Manuskripte und Bücher, die sie möglicherweise verkaufen, dazu beitragen, unsere Fähigkeit zur Wissensvermittlung zu verbessern. Von Kinderbüchern bis hin zu Enzyklopädien ist alles geeignet."

 improve_education_efforts_establish_schoolhouses:0 "Baut Schulhäuser"
 improve_education_efforts_establish_schoolhouses_desc:0 "Von Kindergärten bis hin zu Universitäten, es braucht geeigente Räume zum Lehren."

  ### U N I Q U E   D E S C I S I O N S ###

 improve_education_efforts_RED_social_science: "LikBez"
 improve_education_efforts_RED_social_science_desc: "LikBez - kurz für Likvidatsya Bezgramotnosti - Die Beseitigung des Analphabetismus ist ein Programm, das in den frühen Tagen der Sowjetunion umgesetzt wurde, um die Alphabetisierungsrate in der gesamten Union zu erhöhen. Spezielle Propagandawagen können entworfen und in weit entfernte Regionen unserer Verwaltung geschickt werden, um der unterschiedlichen Bevölkerung das Lesen oder Schreiben beizubringen."

 improve_education_efforts_RED_pursuit_of_lenin: "Investiert in die öffentliche Bildung"
 improve_education_efforts_RED_pursuit_of_lenin_desc: "Die Sowjetunion verfügte über ein robustes Bildungssystem. Die Alphabetisierung und vor allem die Bildung selbst wurden in allen Aspekten des täglichen Lebens instrumentalisiert. Eine gute Ausbildung ist entscheidend, um die Vorteile des Marxismus zu verstehen."

 improve_education_efforts_RCH_1: "Organisiert die Jugend"
 improve_education_efforts_RCH_1_desc: "Die Jugend ist die Zukunft und unsere Zukunft wird nicht verlernen zu Lesen und zu Schreiben, wie es die Mutanten tun"

 improve_education_efforts_RCH_2: "Verpflichtende Bildungsprogramme"
 improve_education_efforts_RCH_2_desc: "Es ist die Jugend, die die Erde erben wird. Wahre Hingabe an das Vaterland und an die Reinheit unserer Nation muss ihnen von Geburt an vermittelt werden. Darüber hinaus erhalten sie durch umfassende Ausbildung, Bildung und Alphabetisierung die notwendigen Werkzeuge."

 improve_education_efforts_RCH_3: "Rassenforschung"
 improve_education_efforts_RCH_3_desc: "Zu wissen wer Freund und wer Feind ist wird unseren Bürgern noch oft nützen"
 RCH_unlock_science: "Schaltet Entscheidung frei : Rassenforschung"

 improve_education_access_polis_repository:0 "Zugang zu den Biliotheken der Polis"
 improve_education_access_polis_repository_desc:0 "Wir sitzen hier im Dunkeln und versuchen, die Glühbirne neu zu erfinden, während die Polis alle Informationen enthält, nach denen wir suchen. Anstatt Stöcke und Steine zusammenzuschlagen, könnten wir höflich fragen, ob wir Zugang zu ihren Wissensreserven erhalten?"

 improve_education_efforts_HANZA_unique_1: "Investiert in unsere Forschung"
 improve_education_efforts_HANZA_unique_1_desc: "Geld ist nicht alles im Leben, doch macht es so viele Dinge einfacher. Mit ihm bekommt man sogar die besten Mittel zur Forschung zusammen."

 improve_education_efforts_HANZA_unique_2: "Gründet Lesegruppen"
 improve_education_efforts_HANZA_unique_2_desc: "Einige Administratoren argumentieren, dass wir, wenn wir die Bildung unserer Bevölkerung ernsthaft verbessern wollen, wir wahrscheinlich ganz unten anfangen und der Bildung unserer Jugend Priorität einräumen müssen. Es ist keine leichte Aufgabe, Mittel für den Alphabetisierungsunterricht für die Jugendlichen an jeder Station bereitzustellen, aber es wird diese Kinder zweifellos auf zukünftige Karrieren vorbereiten und ihnen Chancen eröffnen, die vielen, vielen anderen verschlossen bleiben."

 allow_access_polis_education_decision:0 "Wurde Zugang zu den Polis-Bibliotheken gewährt"

 ## Bandit ##

 is_bandit_nation: "Banditen"
 is_savage_nation: "Barbaren"

 improve_education_bandit:0 "Verbessert die Bildung"
 improve_education_bandit_desc:0 "Das Wort „schlau“ oder „klug“ kommt einem nicht in den Sinn, wenn es um eine Bande von Schlägern und Gangstern geht. Klar, straßenschlau, aber wie viele Gangster braucht man, um eine Glühbirne einzuschrauben? Das fragt man in dieser Gegend besser nicht. Obwohl es klar ist, dass wir besser irgendwo anfangen sollten, wenn wir den Untergrund beherrschen wollen. Die Jungs in Form zu bringen, nachdem sie eine ungleiche Bande von Dummköpfen waren."

 improve_education_efforts_bandit_mission:0 "Verstärkt die Bildungsbemühungen"
 improve_education_efforts_bandit_mission_desc:0 "Es wird eine ganze Weile dauern, bis wir erste Verbesserungen sehen. Wenn wir das Wissen und die Weitsicht unserer Crew verbessern, sind sie vielleicht nicht in der Lage, selbst die grundlegendsten mathematischen Probleme zu lösen, aber es wird ihre Straßenklugheit auf jeden Fall verfeinern."

 improve_education_efforts_bandit_disceting_equipment:0 "Ein direkter Ansatz
 improve_education_efforts_bandit_disceting_equipment_desc:0 "Werf einem Schlaumeier ein Buch von Tolstoi vor die Nase, und er wirft es dir entgegen. Es wird mehr Spucke und Ellenbogenfett erfordern, als zu versuchen, die Jungs dazu zu bringen, sich weiterzubilden. Es wird ein direkterer Ansatz erforderlich sein"

 improve_education_efforts_bandit_sleezy_books:0 "Verteilt etwas Material"
 improve_education_efforts_bandit_sleezy_books_desc:0 "Lesen lernen kann man nur, indem mnan auch etwas liest."

 improve_education_efforts_bandit_forced:0 "Keine halben Sachen"
 improve_education_efforts_bandit_forced_desc:0 "Wenn sie nicht lernen wollen, dann zwingt sie halt dazu."

 improve_education_efforts_bandit_pp_spend:0 "Lernt von den Besten"
 improve_education_efforts_bandit_pp_spend_desc:0 "Natürlich sind alle Gangster im Grünen bestrebt, sich ihre Sporen zu verdienen. Sie wollen der nächste Mikhailov- oder Kurgan-Terminator sein. Zum Glück sind viele der alten Jungs in unserer Truppe ehemalige Gangster, deren Spuren sogar bis in die vorsowjetische Zeit zurückreichen. Es gibt keinen besseren Ort für Wissen und Weisheit als diejenigen, die dort waren, dies und das getan haben und was auch immer."

 improve_education_efforts_bandit_pinch_it_someplace_else:0 "Ein alternativer Ansatz"
 improve_education_efforts_bandit_pinch_it_someplace_else_desc:0 "Natürlich ist es für uns einfacher, ein paar andere Vieraugen zu finden, die all die langweiligen Sachen erledigen. Wer muss schon etwas über Computer wissen, wenn wir einfach jemandem drohen können, unseren Mist zu machen? Ist das nicht unsere Pflicht??"

