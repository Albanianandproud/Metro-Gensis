l_german:
 nf_HNZ.1.t:0 "Einführung"
 nf_HNZ.1.d:0 "Ich erinnere mich gerne an diese Tage zurück. Auch wenn sich Asche und Strahlung noch nicht vollständig gelegt hatten, herrschte trotzdem eine gewisse Ruhe. Die Menschen haben natürlich sehr gelitten, aber nicht so sehr wie heute, sie achteten ihre Mitmenschen und es herrschte Ordnung. Frieden.\n\nWoran ich mich aus diesen frühen Jahren, während der Zeit des Zentralen Metrokommandos, am meisten erinnere, war ..."
 nf_HNZ.1.a:0 "Meine Position als Komiteemitglied der Polis"
 nf_HNZ.1.b:0 "Als ehemaliger Bewohner der Komsomolskaya"

 nf_HNZ.2.t:0 "Ein gewählter Präsident"
 nf_HNZ.2.d:0 "Aus meiner teilnehmenden Rolle während der Koalitionskriege; als aktiver Vertreter auf der Seite der Koalition während der Friedensgespräche mit der Roten Linie: Meine politische Karriere wurde vorangetrieben, als ich erst kürzlich zum Vorstand gewählt wurde. Aufgrund meines Hintergrunds als Veteran waren meine Wahlversprechen, die.."
 nf_HNZ.2.a:0 "Gewinnmargen zu erhöhen"
 nf_HNZ.2.b:0 "Beziehungen zum Rest der Metro zu stabilisieren"
 nf_HNZ.2.c:0 "Ringlinie gegen alle Bedrohuungen zu verteidigen"

 HNZ_agenda_introduction: "Dieses Event schaltet eine §YAgenda§! frei. §YAgendas§! sind §YZeitbegrenzte Entscheidungen§! mit bestimmten Voraussetzungen zum Bestehen. Sobald ihre Anforderungen erfüllt sind, gewähren sie erhebliche Boni. Diese §YEntscheidungen§! abzuschließen wird unsere politische Kontrolle im gesamten §YStationenbund§ stärken!"

 nf_HNZ.3.t:0 "Diese Dämonen"
 nf_HNZ.3.d:0 "Aber dieser Krieg... dieser verdammte Krieg. Blut befleckte die Tunnel und Leichen verstopften die Tore. Warum? Vorstellungen von Gleichheit und Gerechtigkeit? Demokratie? Wenn Sie auf die Berge von Leichen blicken, die Sie willentlich getötet haben, beginnen Sie zu verzweifeln. Das Leben von mehreren Dutzend, wenn nicht Hunderten von Frauen, Kindern? Ergebnisse eines Ultimatums. Nicht mehr als eine kurz vergessene Statistik. Meine eigenen Handlungen führten zum zahllosen Tod unschuldiger Zivilisten. Als wir auf das Territorium der Koalition zurückkehrten, wurden wir als Helden gefeiert. Aber ich habe an diesem Tag keine Champions gesehen."
 nf_HNZ.3.a:0 "Der Krieg verfolgt mich"

 nf_HNZ.4.t:0 "Fünfjähriger Stationenbund"
 nf_HNZ.4.d:0 "Ein neues Jahr steht vor der Tür, General. Der Zustand der Metro ist vorerst stabil. Aber wir können nicht sicher sein, dass sich dieses Gleichgewicht für immer aufrechterhalten wird. Während wir den Ring besetzen und das letzte Wort darüber haben, wer auch immer ... oder was auch immer, die Ringlinie betritt oder verlässt, werden viele uns um unsere Position beneiden. Die Rote Linie hegt immer noch einen bitteren Groll gegen uns, weil wir ihre Träume von der Vereinigung der Roten Linie zerschlagen haben; Sie könnten versuchen, ihren Einfluss auf ihre benachbarten Stationen [281.GetName] und [349.GetName] auszubauen, von denen wir befürchten, dass letztere bereits kurz davor stehen, in die Hände der wachsenden bolschewistischen Bedrohung zu fallen. Allerdings steckt die Rote Linie vorerst in einem ewigen Krieg mit dem Vierten Reich fest; eine neonazistische paramilitärische Truppe, die kürzlich die Stationen [306.GetName], [275.GetName] und [337.GetName] für sich beansprucht hat. Die Nazis begnügen sich derzeit damit, in ihren Stationsfestungen zu sitzen, werden aber irgendwann versuchen, ihren vernichtenden Einfluss auf die benachbarten Stationen auszuweiten. Wir können den Bewohnern von [418.GetName] und [312.GetName] zu Hilfe kommen, wenn das passiert, oder wir lassen es geschehen. Das Reich könnte auch ein adäquater Handelspartner sein, wenn es nur seine Feindseligkeiten einstellen würde ... Vielleicht aus einem höheren Grund, wie die Flut des Kommunismus einzudämmen?\n\nLassen Sie uns das in Erinnerung rufen. Wir sind der Bund der Ringlinie. Die wohlhabendste und mächtigste Gemeinde der gesamten Nation. Unser Wort und unsere wirtschaftliche Macht bleiben unübertroffen."
 nf_HNZ.4.a:0 "Eine neue Zukunft für die Hanse!"

 nf_HNZ.5.t:0 "Druck durch die Hanse"
 nf_HNZ.5.d:0 "Die Hanse hat uns unter Druck gesetzt, unseren Handelsbereich für sie zu öffnen. Sie werden nicht mehr zulassen, dass unsere Waren an ihren Stationen verkauft werden, und außerdem werden sie uns die Durchfahrt durch ihr Territorium nicht gestatten, es sei denn, wir kommen ihren Forderungen nach. Das nachgeben des Reiches könnte weitreichende Auswirkungen auf die Legitimität unserer Herrschaft haben."
 nf_HNZ.5.a:0 "Wir Handeln nicht mit Untermenschen."
 nf_HNZ.5.b:0 "Wir müssen gehorchen"

 nf_HNZ.6.t:0 "Der Druck auf das Reich scheiterte"
 nf_HNZ.6.d:0 "Es überrascht nicht, dass sich das Reich geweigert hat, unseren Forderungen nach einer Öffnung seiner Wirtschaftssphäre nachzugeben. Empört über einen solchen Vorschlag zogen sie sich schnell in ihre drei Stationen zurück, da unser Versuch, sie zu einer engeren Beziehung zu uns zu überreden, gescheitert ist."
 nf_HNZ.6.a:0 "Ok"

 nf_HNZ.7.5.t:0 "Der Druck auf das Reich war erfolgreich!"
 nf_HNZ.7.d:0 "Das Reich hat das Angebot überraschenderweise angenommen. Die Diplomaten beider Seiten vereinbarten, sich außerhalb des Reichsgebiets in einem Tunnel zu treffen, um nicht die Aufmerksamkeit ideologisch fanatischer Reichsmitglieder zu erregen. Karawanen werden von der Hanse aus geschickt und mit Reichsgütern aus der Twerskaja zurückkehren. Während die Feindseligkeiten seitens der Faschisten bestehen bleiben, haben sie ihr Mantra zumindest vorerst beiseite gelegt."
 nf_HNZ.7.a:0 "Ok"

 nf_HNZ.8.t:0 "Handel ins Reich"
 nf_HNZ.8.d:0 "Die Handelskarawanen treffen aus Twerskaja ein, bestückt mit den Waren des Reiches. Überraschenderweise ist die interne Wirtschaft dieser isolierten Gemeinschaft ziemlich stark, mit Handwerkern die sich auf Haushaltswaren wie Kleidung und Werkzeug konzentrieren. Überraschend für eine Gemeinschaft, die auf einem so kleinen Lebensraum fixiert ist."
 nf_HNZ.8.a:0 "Eine vielversprechende Handelsmöglichkeit"
 nf_HNZ.8.b:0 "Wir handeln nicht mit Untermenschen"

 nf_HNZ.9.t:0 "Der Handel mit dem Reich war erfolgreich!"
 nf_HNZ.9.d:0 "Das Reich hat die Bedingungen des Deals akzeptiert. Sie haben auf einem Vorrat hochmoderner Elektronik und hochwertiger Legierungen gesessen, den sie aus der umliegenden Oberfläche geborgen wurden. Während sie diese Waren nur ungern an sogenannte „Mutanten“ verkaufen, haben sie uns stattdessen erlaubt, ihre zweitklassigen Ressourcen zu kaufen und einzutauschen, was immer noch genauso gut ist. Der Durchschnittsmensch wird einen Aluminiumstab nicht von einem haltbaren Carbon-Verbundwerkstoff unterscheiden.
 nf_HNZ.9.a:0 "Großartig"

 nf_HNZ.10.t:0 "Waffenhandel mit dem Reich"
 nf_HNZ.10.d:0 "Die Hanse hat uns ein weiteres Angebot geschickt. Sie möchten, dass wir einen Teil ihrer hochwertigen Waffen kaufen. Handelskarawanen werden kurz nach der Unterzeichnung des Handels eintreffen. Die Karawane wird während der Rotation einige hundert Fuß vor der Reichsgrenze anhalten, um die Wache der Soldaten nicht zu stören. Die Karawanen müssten dann nur noch mit Hanse-Bedarf beladen werden und würden dann in ihr Territorium zurückgeschickt."
 nf_HNZ.10.a:0 "Für uns scheint es eine Win-Win-Situation zu sein"
 nf_HNZ.10.b:0 "Wie oft wirst du noch fragen, Mutant??"

 nf_HNZ.11.t:0 "Der Waffenhandel war erfolgreich"
 nf_HNZ.11.d:0 "Die Karawanen kehrten zurück, beladen mit Reichsgütern aus ihrer Hälfte des Vertrags. Ein wenig enttäuschend für das, was wir ihnen verkauft haben. Allerdings ist dies das Reich, über das wir hier sprechen, ich bin mir sicher, dass irgendwann auch Faschisten mit dem Geruch eines guten Handelspartners vertraut werden."
 nf_HNZ.11.a:0 "Sie werden in kürzester Zeit vielversprechende Handelspartner sein!"

 nf_HNZ.12.t:0 "Polis-Abkommen"
 nf_HNZ.12.d:0 "Ein weiterer Hanse-Diplomat kehrt mit einem Angebot zu uns zurück. Polis liegt direkt außerhalb unseres Territoriums, und das Reich träumt davon, die Station der widerlichen Mutanten zu annektieren und damit den letzten Arm der Glorreichen Achse hinzuzufügen. Die Hanse bietet jedoch ein anderes Angebot an. Als Gegenleistung für unser Versprechen, uns von der Polis fernzuhalten und unsere Aufmerksamkeit anderen Dingen zuzuwenden, werden sie wegschauen, wenn wir in die Sawjolowskaja einmarschieren. Sie zeigten uns sogar Pläne für geheime Versorgungswege und Tunnel, die zu dieser Station führten, als Gegenleistung dafür, dass wir uns an unsere Abmachung einhalten."
 nf_HNZ.12.a:0 "Wir können unsere Aufmerksamkeit vorerst woanders hinwenden"
 nf_HNZ.12.b:0 "Polis gehört zum Reich"

 HNZ_nf_HNZ.12_tt:0 "§gAls Gegenleistung dafür, dass wir den Fokus umgehen, werden wir die Entscheidung freischalten, in Sawjolowskaja einzumarschieren, wenn wir gegen die Dimitrowskaja in den Krieg ziehen§!"

 nf_HNZ.13.t:0 "Reich akzeptiert den Deal"
 nf_HNZ.13.d:0 "Während Reich davon träumt, in die Polis einzumarschieren, hat es sich entschieden unseren Deal anzunehmen und wird stattdessen seinen rasenden Fiebertraum vom Lebensraum anderswo wahr machen. Ich hoffe, wir haben nicht die ganze Metro dem Untergang geweiht ..."
 nf_HNZ.13.a:0 "Großartig!"

 nf_HNZ.14.t:0 "Das Reich lehnt ab"
 nf_HNZ.14.d:0 "Das Reich hat beschlossen, unser Angebot abzulehnen."
 nf_HNZ.14.a:0 "Verdammt!"

 nf_HNZ.15.t:0 "Handel mit den Gangstern"
 nf_HNZ.15.d:0  "Die Hanse hat uns ein Handelsangebot geschickt. Sie hoffen, dass wir unsere Handelsmärkte für sie zum Kauf von Waren öffnen würden, der ganze übliche Jargon, den kapitalistische Bürokraten gerne verwenden. Obwohl es sich um einen zweifelhaft geschriebenen Brief handelt, bilden sie doch einen interessanten Handelspartner."
 nf_HNZ.15.a:0 "Mit der Hanse handeln? Natürlich! Wie könnten wir das ablehnen?"
 nf_HNZ.15.b:0 "Nein danke"

 nf_HNZ.16.t:0 "Der Handel mit den Gangstern war erfolgreich"
 nf_HNZ.16.d:0 "Während sich die Gangster oft nur um ihre eigenen Männer kümmern und in die große Metro gehen, um Karawanen zu überfallen, waren sie unserem Handelsabkommen doch überraschend aufgeschlossen."
 nf_HNZ.16.a:0 "Großartig!"

 nf_HNZ.17.t:0 "Hanse bietet Werkzeuge"
 nf_HNZ.17.d:0 "Die Hanse kommt mit einem weiteren Handelsabkommen zu uns. Sie werden uns alle Industriewerkzeuge verkaufen, die sie in ihrem ziemlich großen Vorrat wiedergefunden haben. Elektrowerkzeuge, Handwerkzeuge und sogar eine Nähmaschine haben sie aus einer Waffenfabrik an der Oberfläche geborgen. Im Gegenzug möchten sie einige unserer besten Verbrecher anheuern – ich meine … unserer Soldaten."
 nf_HNZ.17.a:0 "Sicher! Wir brauchten Pavel und Arkady sowieso nicht."
 nf_HNZ.17.b:0 "Ihr schon wieder? Geht weg!"

 nf_HNZ.18.t:0 "Der Handel mit den Gangstern war erfolgreich"
 nf_HNZ.18.d:0 "Der Handel mit den Gangstern gelang, im Gegenzug schickten sie eine Abteilung ihrer Truppen, um uns vorerst zu unterstützen. Sie sehen ziemlich ungepflegt aus, aber was ihnen an Gelassenheit fehlt, machen sie durch Effizienz wett."
 nf_HNZ.18.a:0 "Großartig!"

 nf_HNZ.19.t:0 "Ressourcenhandel"
 nf_HNZ.19.d:0 "Die Hanse kommt und schlägt ein weiteres Angebot vor. Im Laufe der Jahre hat die Hanse zahlreiche Waren von Kaufleuten und Handwerkern beschlagnahmt und einen ziemlich großen Vorrat an illegalen Waren aufgebaut. Sie bieten uns die besagten Vorräte als Gegenleistung für alle Ressourcen an, mit denen wir sie bezahlen können. Scheint eine Win-Win-Situation zu sein, oder?"
 nf_HNZ.19.a:0 "Natürlich!"
 nf_HNZ.19.b:0 "Deine leeren Angebote fangen an mich zu nerven..."

 nf_HNZ.20.t:0 "Der Handel mit den Gangstern war erfolgreich"
 nf_HNZ.20.d:0 "Die Handelskarawanen der Gangster stehen bereits vor unserem Tor. Überraschenderweise kann mit Gangstern und Schlägern gehandelt werden."
 nf_HNZ.20.a:0 "Großartig"

 nf_HNZ.21.t:0 "Gangster abgelehnt"
 nf_HNZ.21.d:0 "Die Gangster haben unsere Bitte abgelehnt und bleiben lieber gegenüber unserem Handelsangebot distanziert."
 nf_HNZ.21.a:0 "Verdammt"

 nf_HNZ.22.t:0 "Untertan erbittet industrielle Hilfe"
 nf_HNZ.22.d:0 "Einer unserer Satelliten hat die Hanse um einen Leihvertrag zur Fabrikunterstützung gebeten. Ob militärische Aufrüstung oder Mutanteneinfälle, sie suchen unsere sofortige Hilfe bei ihrer militärischen Produktion."
 nf_HNZ.22.a:0 "Helfen wir ihnen"
 nf_HNZ.22.b:0 "Lieber nicht"

 nf_HNZ.23.t:0 "Waffenanfrage fehlgeschlagen"
 nf_HNZ.23.d:0 "Die Hanse hat sich geweigert, unsere Sache zu unterstützen. Sei es, weil sie das Gefühl hatten, dass wir die Hilfe nicht brauchten, oder weil sie sich einfach weigerten. Es scheint, als wären wir im Moment auf uns allein gestellt"
 nf_HNZ.23.a:0 "Dann scheiß drauf!"

 nf_HNZ.24.t:0 "Waffenanfrage erfolgreich"
 nf_HNZ.24.d:0 "Die Hanse hat sich bereit erklärt, unseren Waffenkammern zu helfen und Werkzeuge und Hilfe zur Verfügung zu stellen. Während dies gewisse unvorhergesehene Folgen für unsere Wirtschaft haben wird, wird es sicherlich dazu beitragen, unser Militär besser auszurüsten."
 nf_HNZ.24.a:0 "Gute Nachrichten!"

 nf_HNZ.25.t:0 "Annullierte Waffenanfrage"
 nf_HNZ.25.d:0 "Unser Satellit hat unsere Waffen wieder zu uns zurückgebracht. Sie brauchen unsere Hilfe wohl nicht mehr. "
 nf_HNZ.25.a:0 "Ok"

 nf_HNZ.26.t:0 "Gemeinsame Spezialoperationen"
 nf_HNZ.26.d:0 "Die Hanseaten sind mit einem Vorschlag zu uns gekommen. Mit der Mobilisierung der Roten Linie und der wachsenden Macht des Reiches ist die Stabilität der Metro in Gefahr. Neugierige Blicke wollen den freien Völkern der Metro ihren Willen aufzwingen. Ganz zu schweigen von der wachsenden Bedrohung durch Mutanten. Sie möchten unser Militär bündeln und Waffenübungen und Spezialoperationen kombinieren, um unsere Streitkräfte besser gegen jede entgegenkommende Bedrohung zu unterstützen und zu bündeln."
 nf_HNZ.26.a:0 "Unsere Streitkräfte können viel voneinander lernen"
 nf_HNZ.26.b:0 "Der Hanse kann man nicht trauen"

 nf_HNZ.27.t:0 "Hanza Musters"
 nf_HNZ.27.d:0 "Die Hanse würde ihre Gegner lieber mit Wirtschaftssanktionen und Embargos unter Druck setzen, allerdings versuchen sie auch, die Legitimität ihrer Nachbarstationen durch wirtschaftliche und politische Subversion zu untergraben. Unsere Heimatmärkte sind voller ausländischer Hansewaren, denn sie wollen sicherstellen, dass ihre Nachbarn zum Überleben auf ihre Güter angewiesen sind. Langsam schmälern sie ihre Unabhängigkeit, bis sie nicht mehr in der Lage sind, sich selbst zu versorgen, und schließlich zu einer bloßen Marionette der Hanse werden."
 nf_HNZ.27.a:0 "Oh man"

 nf_HNZ.28.t:0 "Die Hanse möchte unsere Station kaufen"
 nf_HNZ.28.d:0 "Die Hanseaten kommen mit einem interessanten Vorschlag auf uns zu, dem Wunsch, unsere Handelsstation Belorusskaya zu erwerben. Sie scheinen sehr hartnäckig an diesem Deal festzuhalten und sind sogar bereit sind, im Rahmen der Abmachung eine größere Menge an Ressourcen zu bezahlen."
 nf_HNZ.28.a:0 "Sie verhandeln gut... wir akzeptieren"
 nf_HNZ.28.b:0 "Diese Station gehört uns"

 nf_HNZ.29.t:0 "Männer des Adlers"
 nf_HNZ.29.d:0 "Männer aus dem Süden kamen mit einem Vorschlag auf uns zu, denn irgendwie haben sie von unserem großen Treibstoffvorrat gehört. Sei es von einem entflohenen Sklaven oder von einem der Schläger, der Klatsch weitergibt. In jedem Fall verlangen sie den Kauf der Treibstoffquelle aus unseren Händen als Gegenleistung für Sklaven, die Kriminellen, Landstreicher oder einfach jene die zu krank sind, um ihrer Verwaltung von Nutzen zu sein. Sie werden uns Menschen schicken als Gegenleistung für den Treibstoff, den sie so dringend brauchen."
 nf_HNZ.29.a:0 "Klar, mehr Kämpfer für die Grube!"
 nf_HNZ.29.b:0 "Geht weg!"

 nf_HNZ.30.t:0 "Satanisten-Deal abgeschlossen"
 nf_HNZ.30.d:0 "Die Satanisten haben unseren Deal angenommen und werden uns als Gegenleistung für den Austausch einer anständigen Anzahl von Ausgestoßenen aus unserer Gesellschaft mehrere Fässer ihres Treibstoffs geben."
 nf_HNZ.30.a:0 "Großartig"

 nf_HNZ.31.t:0 "Der satanistische Deal ist gescheitert"
 nf_HNZ.31.d:0 "Die Satanisten haben unseren Deal abgelehnt. Sie befehlen unserem Diplomatenkonvoi, die Grenzen ihrer Station zu verlassen, sonst ziehen sie sich die Rache Satans selbst zu."
 nf_HNZ.31.a:0 "Verdammt"

 nf_HNZ.32.t:0 "Industrieausrüstung entdeckt"
 nf_HNZ.32.d:0 "Unsere Stalker sind von ihrem Ausflug an die Oberfläche zurückgekehrt. Bei sich trugen sie verschiedene Mengen an Industrieausrüstung und mechanischen Teilen, die sie aus einem verlassenen Werks-Komplex geborgen hatten. Sie fanden auch ein verlassenes und heruntergekommenes Lagerhaus, dessen Inhalt noch immer von einer verschlossenen Stahltür verborgen liegt."
 nf_HNZ.32.a:0 "Valentin, sprengt diese Tür auf!"

 nf_HNZ.33.t:0 "Werkzeugbaupläne entdeckt"
 nf_HNZ.33.d:0 "Unsere Stalker sind kürzlich zurückgekehrt. Auf den ersten Blick schienen ihre Hände frei von Gegenständen zu sein, doch einer von ihnen hatte einen bis zum Rand gefüllten Rucksack mit verschiedenen Manuskripten unterschiedlicher Qualität; Anleitungen und Handbücher. Leider lässt der Zustand der Bücher sehr zu wünschen übrig, und einige von ihnen wirken eher rudimentär und simpel. Dennoch werden sie unseren angehenden Ingenieuren und Technikern wertvolle Informationen liefern."
 nf_HNZ.33.a:0 "Dieses hier hat sogar Bilder!"

 nf_HNZ.34.t:0 "Werkzeuge entdeckt"
 nf_HNZ.34.d:0 "Unsere Stalker kehrten mit verschiedenen Kisten und Werkzeugkoffern zurück. Schrauben, Hämmer, Bohrer und andere Werkzeuge unterschiedlicher Größe und Kaliber. Offenbar hatten sie einen großen Erfolg gehabt, als das Plünderungsteam mitten in einem Schneesturm erwischt wurde. Auf der Suche nach der nächsten Deckung müssen sie auf eine alte Werkstatt oder eine Art Autohändler gestoßen sein. Sie brachten so viel zurück wie sie tragen konnten."
 nf_HNZ.34.a:0 "Großartig"

 nf_HNZ.35.t:0 "Industriemaschinen entdeckt"
 nf_HNZ.35.d:0 "Unsere Stalker sind zurückgekehrt. Sie tragen etwas bei sich, das wie eine Art Pressmaschine aussieht. Während Herstellungsdetails wie Datum und Ort des Baus längst abgenutzt sind. Es sieht alt aus; definitiv vor Chruschtschow oder sogar vor Stalin. Wie alt auch immer es ist, es funktioniert trotz deutlicher Alters- und Anlaufspuren durch die Elemente immer noch bemerkenswert gut."
 nf_HNZ.35.a:0 "Stell es da drüben hin! Die Ecke bei den Schweinefarmen!"


 nf_HNZ.36.t:0 "Durchsucht den Norden"
 nf_HNZ.36.d:0 "Beim durchsuchen der Trümmer der nördlichen Bezirke Moskaus stießen unsere Stalker auf einen scheinbar ziemlich großen Vorrat an Metalldetektoren. Möglicherweise können wir sie sinnvoll einsetzen, um nach weiteren Ressourcen zu suchen. Oder man könnte sie stattdessen in ihre Einzelteile zerlegen"
 nf_HNZ.36.a:0 "Wir können sie sinnvoll nutzen"
 nf_HNZ.36.b:0 "Wir können sie verschrotten und die Materialien retten"


 nf_HNZ.37.t:0 "Durchsucht den Süden"
 nf_HNZ.37.d:0 "Unsere Stalker sind an der Oberfläche auf etwas gestoßen, das wie ein verlassener Stalker-Konvoi aussieht. Zahlreiche gefrorene, halb zerkaute Körper lagen im Kreis eines umgebauten Wohnmobils. Keine der Leichen konnte identifiziert werden, da ihre Überreste dafür zu unkenntlich waren. Es schien, dass die Schlacht vor mehreren Wochen stattgefunden hatte. Entweder gerieten sie in die Kälte und sind erfroren, oder fielen einem Ansturm von Nosalis zum Opfer. Wie dem auch sei, in einem der Ablagefächer ihres Transporters fanden wir verschiedene Schaltpläne. Mit etwas Kraftaufwand und einem lauten Klirren hatten sie es geschafft das Fach zu öffnen. Wir können diese Blaupausen verwenden, um die Feuerkraft unserer Schusswaffen zu verbessern, oder sie stattdessen nutzen, um sie effizienter zu entwerfen und sie mit besser nutzbaren und leichter zu findenden Ressourcen zu versehen."
 nf_HNZ.37.a:0 "Billigere Waffen"
 nf_HNZ.37.b:0 "Bessere Waffen"

 nf_HNZ.38.t:0 "Eine bemerkenswerte Entdeckung"
 nf_HNZ.38.d:0 "Als unsere Stalker an der Oberfläche auf ein verlassenes Depot stießen, das in die Metro führte, stießen sie auf etwas, das man fast als einen Panzer auf Schienenrädern bezeichnen könnte. Der Panzer sieht einigermaßen modern aus, aus den 70er oder 80er Jahren. Er war nachgerüstet worden, um anstelle herkömmlicher Straßen Eisenbahnlinien zu nutzen. Wie es scheint, flossen bei der Herstellung dieses Modells modernste Fertigungsverfahren und Präzision ein. Möglicherweise vor dem dritten Weltkrieg, wenn man bedenkt, wie modern die Werkzeuge waren, die dafür nötig waren. Möglicherweise auch die Arbeit des Zentralen Metrokommandos? Wir können diesen Panzer immer noch verwenden, wenn man bedenkt, dass er bereits auf Schienen steht. Das einzige Problem besteht darin, ihn wieder in die Metro zu bringen."
 nf_HNZ.38.a:0 "Wir können den Panzer für unsere Zwecke nachrüsten"
 nf_HNZ.38.b:0 "Verschrotten Sie ihn für Ersatzteile"

 nf_HNZ.38_tt:0 "§gEine Schienen-Panzer-Brigade erscheint in unserer Hauptstadt§!"

 nf_HNZ.39.t:0 "Hanseatische Einmischung"
 nf_HNZ.39.d:0 "Die Hanse hat erklärt, dass sie unsere Station nicht mehr vor Eindringlingen von außen schützen wird und stattdessen Pläne zur Mobilisierung unserer Wirtschaft und Streitkräfte ausarbeiten wird. Dies wird sicherlich Auswirkungen auf unsere Legitimität und Autorität in der Station haben."
 nf_HNZ.39.a:0 "Wir müssen gehorchen"
 nf_HNZ.39.b:0 "Verzieht euch endlich"

 nf_HNZ.40.t:0 "Stalker kehren zurück"
 nf_HNZ.40.d:0 "Die Stalker sind zurückgekehrt und haben Glück gehabt, sie kehren zurück mit reichlich Ausrüstung."
 nf_HNZ.40.a:0 "Gute Arbeit"

 nf_HNZ.41.t: "Agenda abgeschlossen"
 nf_HNZ.41.d: "Die Agenda wurde abgeschlossen und wir konnten die angestrebten Ziele erreichen. Unser Einfluss wächst bei den Händlern und den örtlichen Stationsverwaltungen. Der Vorstand wird Loginov zweifellos auch in den kommenden Jahren unterstützen."
 nf_HNZ.41.a: "Unser Einfluss wächst" 

 nf_HNZ.42.t: "Agenda gescheitert"
 nf_HNZ.42.d: "Unsere Agenda ist gescheitert, weshalb der Vorstand seine Unterstützung für die Regierung Loginov in Frage stellte"
 nf_HNZ.42.a: "Das ist nicht gut"

 nf_HNZ.43.t: "Agenda : Jahr 2"
 nf_HNZ.43.d: "Ein neues Jahr steht vor der Tür und somit auch ein weiteres Ziel, das wir anstreben sollten. Der Vorstand hat untereinander diskutiert und ist der Meinung, dass die Hanse Prioritäten setzen sollte..."
 nf_HNZ.43.a: "Erweiterung unseres stehenden Heeres"
 nf_HNZ.43.b: "Bevorratung militärischer Waffen"
 nf_HNZ.43.c: "Unsere Bergungsaktionen"
 nf_HNZ.43.e: "Forschung"

 nf_HNZ.44.t: "Agenda : Jahr 3"
 nf_HNZ.44.d: "Ein neues Jahr steht vor der Tür und somit auch ein weiteres Ziel, das wir anstreben sollten. Der Vorstand hat untereinander diskutiert und ist der Meinung, dass die Hanse Prioritäten setzen sollte..."
 nf_HNZ.44.a: "Unsere motorisierten Streitkräfte"
 nf_HNZ.44.b: "Säuberung des Untergrunds von Mutanten"
 nf_HNZ.44.c: "Unsere Beziehung zur Polis"

 nf_HNZ.45.t: "Agenda : Jahr 4"
 nf_HNZ.45.d: "Ein neues Jahr steht vor der Tür und somit auch ein weiteres Ziel, das wir anstreben sollten. Der Vorstand hat untereinander diskutiert und ist der Meinung, dass die Hanse Prioritäten setzen sollte..."
 nf_HNZ.45.a: "Unsere Militärkommandeure"
 nf_HNZ.45.b: "Machtausgleich in der Metro"
 nf_HNZ.45.c: "Den Einfluss der Hanse ausweiten"
 nf_HNZ.45.e: "Unsere industrielle Macht entwickeln"

 nf_HNZ.46.t: "Agenda : Jahr 5"
 nf_HNZ.46.d: "Ein neues Jahr steht vor der Tür und somit auch ein weiteres Ziel, das wir anstreben sollten. Der Vorstand hat untereinander diskutiert und ist der Meinung, dass die Hanse Prioritäten setzen sollte..."
 nf_HNZ.46.a: "Nachbarn in unserem Einfluss ziehen"
 nf_HNZ.46.b: "Erweiterung der Hanse außerhalb des Rings"
 nf_HNZ.46.c: "Schutz vor dem Bolschewismus"

 nf_HNZ.47.t: "Agenda : Jahr 6"
 nf_HNZ.47.d: "Ein neues Jahr steht vor der Tür. Sechs Jahre sind vergangen, seit Loginov zum ersten Mal zum amtierenden Präsidenten der Handelsliga gewählt wurde. Die Hanse erlebte unter seiner Amtszeit einen Aufschwung, aber während die Metro schnell in Unruhen gerät, diskutieren die Direktoren untereinander, ob Loginov diese neuen Probleme richtig angehen kann."
 nf_HNZ.47.a: "Hoffen wir, dass die Direktoren schnell zu einer Schlussfolgerung kommen."

 nf_HNZ.48.t: "Agenda : Ergebnis"
 nf_HNZ.48.d: "Die Gespräche innerhalb des Vorstandes sind abgeschlossen. Trotz ihrer wachsenden Sorge um die Metro und die Macht der Hanse in dem vernichtenden Konflikt wird die Handelsliga voranschreiten. Sie kommen zu dem Schluss, dass..."
 nf_HNZ.48.a: "die Hanse die Metro gegen diese Bedrohungen führen muss"
 nf_HNZ.48.b: "Frieden zwischen allen Parteien erreicht werden muss."
 nf_HNZ.48.b.tt: "§RSind Sie sicher, dass das eine gute Idee ist??§!"
 nf_HNZ.48.c: "Loginov soll weiterhin führen"

 nf_HNZ.49.t: "Hanse strebt ein Handelsabkommen an"
 nf_HNZ.49.d: "Die Hanse ist mit einem Handelsvorschlag an uns herangetreten. Als Gegenleistung für die lebenswichtigen Ressourcen, die uns in unseren Produktionslinien fehlen, bitten sie um unsere Unterstützung bei der Reparatur und Bergung von Schienenfahrzeugen. Dies würde zweifellos unsere Beziehung zur Handelsliga stärken, aber viele befürchten, dass die Hanse dadurch einen „Fuß in der Tür“ haben könnte, um unser Bündnis zu untergraben."
 nf_HNZ.49.a: "Wir brauchen diese Ressourcen, wir akzeptieren."
 nf_HNZ.49.b: "Die Allianz durchschaut eure Pläne, Hanse."

 nf_HNZ.50.t: "Bauman Allianz akzeptiert den Handel"
 nf_HNZ.50.d: "Die Verhandlungen zwischen der Bauman Allianz und der Hanse sind zu Ende. Die Allianz hat unseren Vertragsbedingungen zugestimmt und wird im Gegenzug bei der Reparatur und Wartung unserer Schienenfahrzeuge helfen."
 nf_HNZ.50.a: "Tolle Neuigkeiten"

 nf_HNZ.51.t: "Bauman Allianz lehnt Handel ab"
 nf_HNZ.51.d: "Die Verhandlungen zwischen der Baumansky-Allianz und der Hanse sind abrupt ins Stocken geraten, was zu der Entscheidung der Allianzen geführt hat, unser Angebot abzulehnen."
 nf_HNZ.51.a: "Sie werden diese Entscheidung bereuen"

 nf_HNZ.52.t: "Der Ring aus Stahl"
 nf_HNZ.52.d: "Die Ringlinie ist das Lebenselixier der Handelsliga. Keine fremde Bedrohung kann sie durchdringen, noch kann eine Station aus ihr herausbrechen. Viele Nationen sind wirtschaftlich an uns gebunden und müssen sich durch unsere Stationen bewegen, um miteinander Handel zu treiben. Angesichts der schieren Menge an Menschen, die unsere Stationen passieren ist es für unsere Wachen eine überwindbare Aufgabe, jeden Passagier auf Spione oder potenzielle Saboteure zu überprüfen. Eine vorgeschlagene Idee ist die Einführung eines Passsystems. Es wird jedoch etwas schwierig sein, sicherzustellen, dass jede Station diesem Konzept zustimmt."
 nf_HNZ.52.a: "Sie müssen unserer Autorität Folge leisten"
 NF_HNZ.52.a.tooltip: "Wir werden §Y20 Politische Macht§ gewinnen! für jede §YNNachbarstation§! die sich daran hält."

 nf_HNZ.53.t: "Frage der Passanforderungen?"
 nf_HNZ.53.d: "Da die Hanse mit der Einrichtung eines Passsystems für die Navigation durch und zwischen ihren Stationen beginnt, haben sie auch eine Erklärung abgegeben. Alle benachbarten Stationen müssen diesem System entsprechen, um Handel und Bewegung durch die Hanse zu ermöglichen. Obwohl dies scheinbar dazu dient, Kriminelle abzuschrecken und Reisende leichter zu verifizieren, wird dies zweifellos von der Hanseverwaltung genutzt, um benachbarte Stationen noch stärker an ihren Einfluss zu binden."
 nf_HNZ.53.a: "Das wäre eine gute Idee"
 nf_HNZ.53.b: "Nein, die Hanse wird uns nicht herumschubsen und schikanieren"

 nf_HNZ.54.t: "Hanse fordert Gehorsam"
 nf_HNZ.54.d: "Die Hanse hat uns eine Stellungnahme zugesandt; Wir stellen unseren Bürgern identifizierbare Pässe aus, damit sie zwischen und über Hanse-Stationen reisen und Handel treiben können, sonst riskieren wir, völlig von den Hanse-Stationen ausgeschlossen zu werden. Wie sollen wir reagieren?"
 nf_HNZ.54.a: "Wir sollten gehorchen"
 nf_HNZ.54.b: "Nein, wir lassen uns nicht von der Hanse schikanieren"

 nf_HNZ.55.t: "[PREV.GetNameDef] Stimmt den Passanforderungen zu"
 nf_HNZ.55.d: "Ob durch überzeugende politische Verhandlungen oder aus Angst vor harten wirtschaftlichen Repressalien, [PREV.GetNameDef] hat unserer Idee eines Pass-Identifikationssystems zugestimmt."
 nf_HNZ.55.a: "Das ist gut zu hören"

 nf_HNZ.56.t: "[PREV.GetNameDef] lehnt die Pass-Idee ab"
 nf_HNZ.56.d: "Ob nicht von unseren überzeugenden politischen Verhandlungen ohnmächtig geworden oder zu unwissend, um wirtschaftliche Repressalien vorherzusehen, [PREV.GetNameDef] hat unsere Idee eines einheitlichen Pass-Identifikationssystems höflich abgelehnt. Nur die Zeit wird zeigen, ob sie bei ihrer Sache bleiben oder letztendlich zugeben."
 nf_HNZ.56.a: "Sie werden nicht mehr lange durchhalten."

 nf_HNZ.57.t: "Besondere Beziehungen"
 nf_HNZ.57.d: "Die im Feuer der Koalitionskriege entstandene Hanza war schon immer ein enger Freund der Arbat-Konföderation.\n\nMit der Stärkung unserer beiden Volkswirtschaften werden sie eng miteinander integriert."
 nf_HNZ.57.a: "Unsere Bürger haben viel gemeinsam"
 nf_HNZ.57.b: "Aus der Koalition entwickelte sich eine tiefe Freundschaft"
 nf_HNZ.57.c: "Unsere Streitkräfte sind immer noch unübertroffen"

 nf_HNZ.58.t: "Militärische Beziehungen"
 nf_HNZ.58.d: "Während die Hanse unzählige Hunderte stehende Truppen aufstellt, steht die Zentralregierung unserer Sache ambivalent gegenüber. Während die Zentralregierung in Prospekt Mira an unserer Leistungsfähigkeit zweifelt, hat das Militär der Hanse Respekt vor unserer Streitmacht.\n\nMeistens tun sie alles, um unsere Streitmacht und unsere Truppen zu unterstützen."
 nf_HNZ.58.a: "Unsere Waffenschmiede können Schaltpläne und Techniken weitergeben"
 nf_HNZ.58.b: "Unsere Handwerker haben viel miteinander zu teilen"
 nf_HNZ.58.c: "Als Gegenleistung für Ressourcen stellen wir unsere Taktiken bereit"

 nf_HNZ.59.t: "Das Reich"
 nf_HNZ.59.d: "Während der Führer seine Untertanen in fanatische Raserei versetzt, sind die Eisernen Legionen des Reiches auf ewig in einem Krieg gegen die Horden der Roten Armee festgefahren. Während das Reich selbst keinem Nicht-Arier den Zutritt gestattet, ist unser Kontakt mit einigen Personen innerhalb des Reiches nicht völlig verschwunden und könnte ein guter Ausgangspunkt für Gespräche und sogar für den Handel mit den Faschisten sein. Der Feind meines Feindes..."
 nf_HNZ.59.a: "Zwar gab es einige Handelsgeschäfte, aber es gab kaum Nennenswertes."
 nf_HNZ.59.b: "Die beiden handelten mit zivilen Gütern, dachten sich aber nichts Besonderes."
 nf_HNZ.59.c: "Die beiden Streitkräfte teilten wertvolle Geheimnisse im Panzerkampf."

 nf_HNZ.60.t: "Die Rote Linie"
 nf_HNZ.60.d: "Die glorreichen Tage der Sowjetunion sind längst verblasst,doch die alten Köpfe im oberen Politbüro schwelgen immer noch in vergangenen Tagen. Ihre eigenen Bürger hungern und doch konnten sie unzählige Fußsoldaten für ihren blutigen Krieg gegen das Reich aufstellen. Trotz unserer Unterschiede in der Ideologie kommt die Rote Linie nun demütig zu uns, um Handel zu treiben und Unterstützung zu leisten."
 nf_HNZ.60.a: "Zwar gab es einige Handelsgeschäfte, aber es gab kaum nennenswertes."
 nf_HNZ.60.b: "Ziviler Handel, obwohl nichts Auffälliges zu erkennen ist."
 nf_HNZ.60.c: "Die beiden Streitkräfte tauschten wertvolle Informationen zur Rüstungsproduktion aus."

 nf_HNZ.61.t: "Die Hanse beeinflusst unsere Nachbarn!"
 nf_HNZ.61.d: ""
 nf_HNZ.61.a: "Wir müssen etwas tun, und zwar schnell!"

 nf_HNZ.62.t: "Die Hanse rüstet sich zum Krieg!"
 nf_HNZ.62.d: "In einem gewagten Angriff haben die Streitkräfte der Hanse unsere Grenzposten angegriffen und dringen nun in unser Revier vor. Es scheint, als hätten wir jetzt einen Krieg vor uns."
 nf_HNZ.62.a: "Bewaffnet die Jungs. Wir ziehen in den Krieg."

 nf_HNZ.64.t: "Die Unsichtbaren Beobachter übernehmen die Kontrolle"
 nf_HNZ.64.d: "Ausländische Spione haben die Hanse infiltriert und planen, Mutter Russland von innen heraus zu zerstören! Das darf nicht zugelassen werden! Loginov wurde seines Amtes enthoben und der Moskauer Verteidigungsrat leitet nun den Vorstand. Das Schicksal der Metro liegt nun in unseren Händen. Die russische Regierung ist zurück."
 nf_HNZ.64.a: "Direkte Kontrolle übernehmen. Russland muss zurückerobert werden."

 nf_HNZ.65.t: "Treibstoff gegen Sklaven?"
 nf_HNZ.65.d: "Gerüchten zufolge sind die Satanisten eine grausame Bande, die in den tiefsten, dunkelsten Winkeln der Metro lauert. Sie sind bekannt für ihr sadistisches Wesen und ihre grausamen Foltermethoden. Es wird jedoch angenommen, dass sie die letzten Benzintröpfchen liefern könnten, die noch nicht in Lack umgewandelt wurden. Wie? Wir wissen es nicht, aber in der Hanse sind derzeit viele Sträflinge inhaftiert. Vielleicht könnten wir ihnen unseren Abschaum verkaufen, um im Gegenzug etwas von ihrem Treibstoff zu bekommen?"

 nf_HNZ.66.t: "Flammenwerfer für unsere Truppen?"
 nf_HNZ.66.d: "Während der Einsatz von Flammenwerfern in jüngster Zeit zu einer weit verbreiteten Praxis geworden ist, waren es Dimitrovskayas eigene Techniker, die diese Waffe erstmals während der Rattenplage der Timiryazevskaya im Jahr 2014 entfesselten. Es ist bekannt, dass sie ständig Streit mit den Bewohnern des Reiches haben, und Berichten zufolge lauern nun menschengroße Rattenmenschen in den nördlichen Tunneln. Fast jede arbeitsfähige Person der Allianz wird in den Dienst eingezogen. Auf die Kranken und Verwundeten müssen auch Schuljungen und alte Menschen Rücksicht nehmen. Vielleicht können wir ihnen als Gegenleistung für die Flammenwerfer, die sie vor all den Jahren eingesetzt haben, einige der besten Truppen der Hanse anbieten?"

 nf_HNZ.67.t: "Kräfte des Adlers – Treibstoff gegen Sklaven"
 nf_HNZ.67.d: "Die Hanse ist zu uns. Als Gegenleistung für die Versorgung mit unseren Treibstoffvorräten werden sie uns ausreichend Sklaven zur Verfügung stellen um tiefer in die Erde vorzudringen. Sie sehen dürr aus, es sieht so aus als hätte die Hanse nicht ihre reichlichsten und langlebigsten Sträflinge zur Verfügung gestellt."
 nf_HNZ.67.a: "Lassen Sie diese Sklaven arbeiten. Schnell!"

 nf_HNZ.68.t: "Hanse stellt als Gegenleistung für Flammenwerfer Arbeitskräfte zur Verfügung"
 nf_HNZ.68.d: "Die Hanse ist zu uns gekommen, als Gegenleistung für die Lieferung von Ersatzflammenwerfern und Bauplänen werden sie uns Arbeitskräfte und Soldaten zur Verfügung stellen."
 nf_HNZ.68.a: "Diese Truppen werden für das Überleben der Allianz benötigt."

 nf_HNZ.69.t: "Rattenmenschen im Norden?"
 nf_HNZ.69.d: "Gerüchten zufolge treiben sich Rattenmenschen in den nördlichen Winkeln der Metro herum. Auch wenn man sich diese Geschichten nur hinter vorgehaltener Hand und mit ängstlicher Miene erzählt, versetzen sie die Stammgäste der Bar zweifellos in Angst und Schrecken – oder liefern zumindest reichlich Stoff für den allgemeinen Klatsch und Tratsch.\n\nUm diese Gerüchte ein für alle Mal auszuräumen, wurden Pläne zur Erkundung der weiteren Metrotunnel-Linien ausgearbeitet. Ob Rattenmenschen tatsächlich existieren, ist nach wie vor umstritten – doch diese Expedition soll endgültig Klarheit schaffen."
 nf_HNZ.69.a: "Starten Sie die Expedition."
 nf_HNZ.69.b: "Ob sie existieren oder nicht, spielt keine Rolle. Die Expedition wird letztendlich erfolglos bleiben."

 HNZ_SCA_expedition_1: "Es wird einige Wochen dauern, bis die Expedition nennenswerte Ergebnisse liefert."

 nf_HNZ.70.t: "Rattenmenschen-Expedition"
 nf_HNZ.70.d: "Die Expedition bahnte sich ihren Weg von der Station Mendelejewskaja nach Norden; die Tunnel erwiesen sich als tückisch zu durchqueren – wenngleich der Erfolg der Mission letztlich nicht ernsthaft gefährdetet wurde. Was jedoch sonst noch in der Dunkelheit lauerte, fügte unseren Truppen schweren Schaden zu. Von Mutanten angegriffen, entging die Gruppe nur knapp einem grausamen Schicksal. Sie suchten Zuflucht in der Station Dimitrowskaja, brachen jedoch schon wenige Stunden später wieder auf."
 nf_HNZ.70.a: "Suche fortsetzen"
 nf_HNZ.70.b: "Dieser Einsatz ist den Aufwand nicht wert – zieht euch zurück!"

 nf_HNZ.71.t: "Rattenmenschen-Expedition: Rückschlag"
 nf_HNZ.71.d: "Die Expedition zog weiter nach Norden und näherte sich rasch der verfluchten Station Timirjasewskaja. Man hatte sie für verlassen gehalten, doch die Expedition entdeckte, dass die Station von Satanisten bewohnt war."
 nf_HNZ.71.a: "Wir müssen weiter suchen."
 nf_HNZ.71.b: "Wir müssen die Verluste begrenzen und uns jetzt zurückziehen!"

 nf_HNZ.72.t: "Rattenmenschen-Expedition: Skaven"
 nf_HNZ.72.d: "Gerüchten zufolge treiben sich Rattenmenschen in den nördlichen Winkeln der Metro herum. Auch wenn man sich diese Geschichten nur hinter vorgehaltener Hand und mit ängstlicher Miene erzählt, versetzen sie die Stammgäste der Bar zweifellos in Angst und Schrecken – oder liefern zumindest reichlich Stoff für den allgemeinen Klatsch und Tratsch.\n\nUm diese Gerüchte ein für alle Mal auszuräumen, wurden Pläne zur Erkundung der weiteren Metrotunnel-Linien ausgearbeitet. Ob Rattenmenschen tatsächlich existieren, ist nach wie vor umstritten – doch diese Expedition soll endgültig Klarheit schaffen.\n\nDiese Gerüchte bewahrheiteten sich. Tatsächlich existieren im Bereich der nördlichen Linie mutierte Rattenmenschen. Offenbar haben sie eine Gesellschaft mit Schulen und gut instand gehaltenen öffentlichen Einrichtungen aufgebaut. Sie begegnen Menschen, die in ihr Grenzgebiet eindringen, mit Distanz und geben lediglich vor, wilde Mutanten zu sein, um all jene abzuschrecken, die es wagen, in ihr Territorium vorzudringen."
 nf_HNZ.72.a: "Wir sehen nur Geschäftsmöglichkeiten."
 nf_HNZ.72.b: "Deinesgleichen ist eine Beleidigung für unsere Rasse, Ratte."

 nf_HNZ.73.t: "Pestausbruch in der Tulskaya"
 nf_HNZ.73.d: "Wir haben es zu spät bemerkt. Aus unbekannten Gründen gab es einen Ausbruch an der Station Tulskaja, der sich möglicherweise auch auf Serpuchowskaja ausbreiten könnte. Wenn wir nichts unternehmen, wird er sich über die gesamte Metro ausbreiten, und wir werden alle sterben."
 nf_HNZ.73.a: "Tulskaya und Serpukhovskaya sofort unter Quarantäne stellen!"

 HNZ_SCA_expedition_2: "Es wird noch eine Weile dauern, bis die Expedition etwas Substanzielles entdeckt."
 
 nf_HNZ.75.t: "Die Hanse strebt ein Vasallenverhältnis an."
 nf_HNZ.75.d: "Die Hanza hat uns ein Ultimatum gestellt. Entweder wir unterwerfen uns ihren Launen und erkennen die Gerichtsbarkeit der Hanza über unsere Station als Gesetz an, oder sie verhängen ein Embargo gegen unsere Station und unterbinden die Durchreise von Handelskarawanen."

 nf_HNZ.75.a: "Vasallentum garantiert Sicherheit."
 nf_HNZ.75.b: "Wir werden uns nicht der Hanse beugen"

 nf_HNZ.76.t: "[FROM] lehnt Ultimatum ab"
 nf_HNZ.76.d: "[FROM] hat unser Ultimatum abgelehnt und die Chance ausgeschlagen, ein Protektorat unserer Liga zu werden. Wie bedauerlich."
 nf_HNZ.76.a: "Sie werden es sich zweimal überlegen, sobald ihren Konvois die Einreise verweigert wird."

 nf_HNZ.85.t: "Streitkräfte der Ringlinie"
 nf_HNZ.85.d: "Wir stehen vor der Wahl, welche Richtung wir bei der Organisation unserer Armee einschlagen sollen. Einerseits können wir dank unseres enormen wirtschaftlichen Reichtums und unserer Machtstellung private Militärunternehmen anheuern, die der Gerichtsbarkeit von [ROOT.Capital.GetName] unterstehen. Auch wenn diese Truppen vor allem durch das Versprechen von Beute und Belohnung zu gewinnen sind, steht außer Frage, dass sich ihre Kompetenz als erfahrene Kämpfer als nützlich erweisen wird.\n\nAndererseits können wir – ganz nach dem Vorbild vergangener Zeiten – die einzelnen Niederlassungen dazu anhalten, eigene Aufgebote auszuheben und so Arbeitskräfte sowohl für die lokalen Verteidigungskräfte als auch für unsere eigene Hansearmee bereitzustellen. Dies ist zwar weit von einer einheitlichen Berufsarmee entfernt, könnte sich jedoch mit der Zeit zu einer solchen entwickeln."
 nf_HNZ.85.a: "Eine Berufsarmee für einen professionellen Staat"
 nf_HNZ.85.a.tt: "Schaltet den Zweig „Armeezentralisierung“ frei."
 nf_HNZ.85.b: "Söldner – das passt doch ziemlich gut zur Hanse, findest du nicht?"
 nf_HNZ.85.b.tt: "Schaltet den Zweig „Söldnerarmee“ frei."

