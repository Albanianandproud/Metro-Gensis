 satellite_economy_desc:0 ""

 satellite_construction_1:0 "Rekonstruktion der Station [ROOT.capital.GetName]."
 satellite_construction_1_desc:0 "Seit dem Armageddon sind etwa 15 Jahre vergangen, und doch leben unsere Bürger noch immer in Schmutz und Armut. Wenn überhaupt, dann braucht [ROOT.capital.GetName] dringend eine Aufräumaktion. Die Wiederaufbaumaßnahmen würden nicht mehr erfordern als die Beseitigung von Trümmern und die Beseitigung der Müllmengen, die die Gleise der Station verstopfen, sie würden aber das Image unser Hauptstation enorm verbessern. Das schlagende Herz unserer Gemeinschaft."

 satellite_defend_the_bulwark:0 "Das Bollwerk verteidigen"
 satellite_defend_the_bulwark_desc:0 "Wer weiß, was in den dunklen Tiefen der Metro noch so alles lauert, dort wo kilometerlange Gleise weit in die Finsternis reichen? Sicherlich haben Sie von den Berichten über Mutantenhorden gehört, die die Sewastopolskaya heimsuchen, oder von den Geistern, die die Arbat-Konföderation heimsuchen, oder sogar von den seltsamen Gerüchten über schlaksige und dunkle unheimliche Wesen, die die weit entfernte Linie Tagansko-Krasnopresnenskaja heimsuchen. Und dabei sind die menschlicheren Bedrohungen durch umherziehende Banden von Satanisten oder Neonazis noch nicht eingerechnet. Durch die Errichtung maßvoller Verteidigungslinien wird sichergestellt, dass [ROOT.capital.GetName] nicht zum neuen Gerüchtetisch wird."

 satellite_defensive_1:0 "Besetzung der Wachposten"
 satellite_defensive_1_desc:0 "Mit einer Begrenzungslinie wird es nicht viel ausrichten, ein blutrünstiges Rudel Nosalis aufzuhalten – wir brauchen mehr als nur Stacheldraht, um jeden der neugierigen Blicke abzuwehren. Es werden mehr Augen benötigt, um in die dunklen Tiefen der Metro zu blicken ... Beten wir einfach, dass ihnen nichts entgegenstarrt."

 satellite_military_emplacements:0 "Militärische Stellungen"
 satellite_military_emplacements_desc:0 "Bemannt, mit routinemäßigen Wachposten und Rotationsaufgaben. Für unsere Stellung fehlen jetzt nur noch ein oder zwei Geschütze übrig. Vielleicht ein Flammenwerfer oder sogar ein DshK-Maschinengewehr, das von oben geborgen wurde? Es wird nicht billig sein, wie so oft, aber wir werden uns wünschen, wir hätten die zusätzlichen Kugeln ausgegeben, sobald unser Territorium einmal angegriffen wird."

