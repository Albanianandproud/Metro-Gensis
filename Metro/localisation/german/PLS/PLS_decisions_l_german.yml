  PLS_mission_dictatorial_1: "§lKshatriya§!: Baut mehr Werkstätten!"
  PLS_mission_dictatorial_1_desc: "Unsere Soldaten fordern demütig, dass wir mit dem Bau weiterer Waffenwerkstätten beginnen. Die Kshatriya sollen die Tunnel ja nicht mit Stöcken verteidigen, oder??"
  PLS_mission_dictatorial_2: "§lKshatriya§!: Kommandozentrale"
  PLS_mission_dictatorial_2_desc: "Unsere Kommandeure und unser Generalstab fordern uns dringend auf, mit der Ausarbeitung vorbereitender Pläne für die Verteidigung der Polis zu beginnen. Hierzu gehört auch die Heranziehung von Reservisten aus der fitten Bevölkerung, sofern dies wirklich erforderlich ist. Wir sind die Bastion der Menschheit, aber ein Jurastudium wird uns nicht dabei helfen, den Graben auszuheben." 
  PLS_mission_dictatorial_3: "§lKshatriya§!: Beginnen Sie mit den Kriegsübungen"
  PLS_mission_dictatorial_3_desc: "Die Polis mag ein neutraler Staat sein, aber diese Neutralität existiert nur auf dem Papier. Mutanten, Faschisten und diejenigen, die einfach nicht lesen können, werden sich nicht die Mühe machen unsere Vorschriften zu befolgen. Wir müssen auf Konflikte vorbereitet sein, denn sie werden auftreten."
  PLS_mission_dictatorial_4: "§lKshatriya§!: Weitere Kriegsübungen"
  PLS_mission_dictatorial_4_desc: "Vielleicht besteht der Rest der Metro aus mehr Analphabeten, als wir bisher dachten. Unsere Soldaten kommen zusammen, um weitere Trainingssimulationen durchzuführen. Es wäre klug, ihnen so viel Ausrüstung wie möglich zu geben."
  PLS_mission_council_1: "§iBrahmin§!: Forschungsstipendien"
  PLS_mission_council_1_desc: "Immer basteln, immer grübeln und immer mehr erwarten; Die Brahmanen sind in einer schwierigen Lage. In ihren Augen ist der menschliche Fortschritt nicht stehengeblieben, sondern taumelte einfach ziellos weiter. Wenn wir erwarten, dass die Menschheit wieder Menschen auf den Mond bringt; Oder besser gesagt, unter diesen Umständen an die Oberfläche, dann benötigen sie mehr als nur diese mageren Reste, um ihre Forschungsbemühungen fortzusetzen."
  PLS_mission_council_2: "§iBrahmin§!: Forschen Sie immer mehr!!"
  PLS_mission_council_2_desc: "Wenn wir all unsere Forschungs- und Entwicklungsanstrengungen in die neueste Automatikpistole oder die neueste Tötungsmaschine stecken, darf dies nicht dazu führen, dass der menschliche Anstand vernachlässigt wird. Polis mag zwar die Bastion der Zivilisation sein, aber die meisten Menschen kommen noch immer wochenlang ohne Baden aus! Hier muss schnellstmöglich etwas unternommen werden."
  PLS_mission_council_3: "§iBrahmin§!: Führen Sie Oberflächenexperimente durch"
  PLS_mission_council_3_desc: "Die Oberfläche soll erst zu Beginn des nächsten Jahrhunderts wieder bewohnbar werden, aber unsere Brahmanen geben sich nicht damit zufrieden, hier nur untätig herumzusitzen. An der Oberfläche liegt eine ganz neue Goldgrube wissenschaftlicher Erkenntnisse, reif für unsere Ernte. Wir müssen nur ein, zwei oder ein Dutzend arme Kerle da hochschicken."
  PLS_mission_council_4: "§iBrahmin§!: Oberflächenexperimente; Nachtrag"
  PLS_mission_council_4_desc: "Die erste Versuchsrunde erwies sich als vielversprechend, doch letztlich verfehlte sie in den Augen unserer Wissenschaftler den erwarteten Ertrag. Ihr Vorschlag? Zu diesem Zeitpunkt müssen weitere Experimente abgeschlossen werden!"
  PLS_mission_community_1: "§yShudra§!: Der Zivile Bereich"
  PLS_mission_community_1_desc: "Polis Aufgabe besteht darin, die Menschheit zu schützen und zu bewahren. Aber wir dürfen auch unsere Menschlichkeit nicht vergessen. Das Ignorieren der Bedürfnisse der Menschen wird nur noch mehr Unmut hervorrufen."
  PLS_mission_community_2: "§yShudra§!: Schienenverkehr"
  PLS_mission_community_2_desc: "Anstatt zu Fuß hin und her zu laufen, wäre es viel einfacher unsere Ressourcen mit Handwagen zu transportieren. Der Versuch, unsere Logistikkapazität so zu überarbeiten, dass wir uns endlich mal auf den Transport verlassen können, ist dringend erforderlich."
  PLS_mission_community_3: "§yShudra§!: Bauen Sie mehr Infrastruktur auf"
  PLS_mission_community_3_desc: "Obwohl unsere Bemühungen, den Zustand unserer Stationen zu erhalten, weitgehend erfolgreich waren, könnte noch mehr getan werden, um sie zu verbessern."
  PLS_mission_community_4: "§yShudra§!: Bausanierungen"
  PLS_mission_community_4_desc: "Die Polis kann zwar danach streben, Wissenschaft und Kunst fortzuführen; aber was ist mit den Leuten? Kultur und Wissenschaft allein werden die Flamme der Zivilisation, nicht wieder entfachen. Wir dürfen die Bedürfnisse und Anliegen unseres Volkes nicht vernachlässigen, damit wir die Geschichte nicht vergessen und sie nicht noch einmal wiederholen müssen."
  PLS_mission_oligarch_1: "§hVaishya§!: Bauen Sie weitere zivile Werkstätten"
  PLS_mission_oligarch_1_desc: "Unsere verfügbaren zivilen Werkstätten sind in einem entmutigenden Zustand. Wir sollten uns bemühen, unsere Beziehungen zur Vaishya-Kaste zu verbessern und mehr von ihnen aufzubauen."  
  PLS_mission_oligarch_2: "§hVaishya§!: Wirtschaftliche Suffizienz"
  PLS_mission_oligarch_2_desc: "In den turbulenten Zeiten von heute muss die Polis erkennen, dass sie sich nicht auf die Unterstützung einer anderen Macht verlassen kann. Die distanzierte Hanse, die tyrannische Rote Linie und andere bleiben eine stille Bedrohung unserer Festung. Die Polis muss mehr denn je autark werden."
  PLS_mission_oligarch_3: "§hVaishya§!: Aufbau der [PLS.CAPITAL.GetName]"
  PLS_mission_oligarch_3_desc: "[PLS.CAPITAL.GetName] sollte auch nicht vernachlässigt werden. Wie die alte Welt zuvor sollte sie den unbezwingbaren menschlichen Geist der Vergangenheit und der Zukunft widerspiegeln. Die Welt soll wissen, dass das Licht der Menschheit noch nicht erloschen ist, solange die Polis existiert."
  PLS_mission_oligarch_4: "§hVaishya§!: Herz der Metro"
  PLS_mission_oligarch_4_desc: "Eingebettet im Epizentrum der Metro verfügt die Polis nicht nur über immense politische Macht. Mit genügend Anstrengung, Geschäftssinn und dem ein oder anderen festen Händedruck könnte es auch ein Zentrum wirtschaftlicher Macht werden. Nichts, was mit der Hanse mithalten könnte, aber die Tunnel die in und aus Polis führen reichen aus, um ein sicheres und, was noch wichtiger ist, ein profitables Gefühl zu vermitteln."


  PLS_surface_stalk_decisions: "Durchsucht die Oberfläche"
  PLS_surface_stalk_decisions_desc: "Wie das Sprichwort sagt; Füttere einen Mann mit einem Fisch, und er wird einen Tag lang satt sein. Wenn man einem Mann das Fischen jedoch beibringt, so wird er ein Leben lang satt sein. Die Mission der Polis entspricht dem Sprichwort. Im Gegensatz zu unseren kleinen Nachbarn sind wir nicht auf der Suche nach Waffen oder Dingen, die uns nur über die Woche bringen. Wir sind auf der Suche nach Objekten von großer Bedeutung, die uns ein Leben lang begleiten."
  PLS_scavenge_mission: "Beginnt die Suche"

