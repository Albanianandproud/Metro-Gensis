l_german:

 fascist_communist_skirmishes_tt: "\nWir werden dafür sorgen, dass der Faschismus vom Angesicht der Erde getilgt wird. Keine andere Option als bedingungslose Kapitulation wird genügen!"

 RED_bulwark_of_socialism: "Bollwerk des Sozialismus"
 RED_bulwark_of_socialism_desc: "Geboren in der Sokolnitscheskaja; Als Zeugnis und Ruhm des Sowjetstaates selbst entstand die Rote Linie. Gegründet aus Komsomol-Persönlichkeiten, überlebenden Veteranen und vielen anderen, die Nostalgie für die sozialistische Vergangenheit Russlands hegten. Nirgendwo sonst wird die Majestät und Macht der Sowjetunion besser nachgeahmt als an der Roten Linie."

 RED_state_of_the_line: "Stand der Linie"
 RED_state_of_the_line_desc: "Obwohl er für alle Beteiligten katastrophal war, sind die Auswirkungen des Koalitionskrieges noch besonders innerhalb der Roten Linie deutlicher zu spüren. Andreys Träume von einer einheitlichen Metro wurden zerschlagen. Der Frieden hat das nur ein Gefühl der inneren Schwäche geschaffen, Meutereien politischer Dissidenten und Revolutionäre drohen in der Ferne. Die Situation muss angegangen werden."

 RED_question_of_economy: "Eine Frage der Wirtschaft"
 RED_question_of_economy_desc: "Unsere Wirtschaft hat ganz einfach einen Kipppunkt erreicht. Es bedarf mehr Pragmatismus als nur einer bloßen Finanzspritze, um den maroden Zustand zu beheben, in dem sie sich befindet."

 RED_economic_demobilization: "Wirtschaftliche Demobilisierung"
 RED_economic_demobilization_desc: "Während der Koalitions-Krieg eine verblassende Erinnerung im Leben unserer Bürger ist, so bleibt ihr tägliches Überleben eine konstante Herausforderung. Wir verfolgen immer noch die gleichen Wirtschaftspolitiken und Produktionsquoten wie während des Krieges vor nicht mehr als einem halben Jahrzehnt. Trotz Andreys Bemühungen, die ansonsten wirtschaftlich stagnierende Rote Linie zu erneuern, sind wir nachweislich auf mehrere Hindernisse gestoßen. Jetzt erfordert sie konstante Aufmerksamkeit."

 RED_formalize_ministry_of_economics: "Formalisierung des Wirtschaftsministeriums"
 RED_formalize_ministry_of_economics_desc: "Um den wachsenden Unmut in unserer Bevölkerung zu bekämpfen, muss die Ökonomie der Roten Linie offiziell angegangen werden. Andrey und seine eng verbundene Gruppe von Ministern und Sekretären können nicht den Überblick über jede Station, jeden Rückstauhof und jeden Schweineschlachtstall auf der Roten Linie behalten. Nachdem wir unsere Getreidebeschlagnahmung im militärischen Stil zurückgefahren haben, können wir uns nun auf das Wachstum unserer Wirtschaft konzentrieren."

 RED_assume_kulak_property: "De-Kulakisierungskampagnen"
 RED_assume_kulak_property_desc: "Die Gewährung wirtschaftlicher Rabatte für unsere Bürger, die sich insbesondere an unsere Landwirte richten, wird unserer Wirtschaft einen dringend benötigten wirtschaftlichen Überschuss bescheren. Mit der zunehmenden Unabhängigkeit wächst jedoch die Sorge, dass es einigen unserer Landwirte tatsächlich zu gut gehen könnte. Landwirte, die bereits begonnen haben, „zu viele“ Pilze zu verkaufen. Eine aufstrebende verschwiegene Mittelschicht der Kulaken. Kapitalistische Profitgier direkt vor unserer Nase."

 RED_unionize_inefficient_sectors: "Gewerkschaften in ineffizienten Sektoren"
 RED_unionize_inefficient_sectors_desc: "Stagnierende Löhne und Arbeitsbedingungen haben zu unserem Abschwung geführt. Die ineffizienten Sektoren unserer Wirtschaft müssen verbessert werden. Während des Koalitionskrieges war es den lokalen Verwaltungen gestattet, interstationäre Industrien ohne unsere Beteiligung direkt zu kontrollieren. Aber jetzt ist der Krieg vorbei. Da unsere Mobilität zur Produktion und Aufrechterhaltung der Linie zunimmt, wird der Bedarf an Arbeitskräften zunehmen."

 RED_question_of_prodrazvyorstka: "Die Frage der Prodrazvyorstka"
 RED_question_of_prodrazvyorstka_desc: "Prodrazvyorstka oder die Beschlagnahmung von Getreide auf der Grundlage staatlicher Quoten hat uns während des Koalitionskrieges enorm geholfen, unsere Armee zu unterstützen und zu versorgen, aber wir kämpfen nicht mehr an allen Fronten. Unsere Wirtschaft stagniert und unsere Bevölkerung ist durch die ständige Beschlagnahmung von Nahrungsmitteln ausgelaugt. Unsere Lebensmittelquoten sollten überdacht werden."

 RED_question_of_military: "Fragen des Militärs"
 RED_question_of_military_desc: "Unser Militär ist weiterhin aufgebläht und bedarf dringend einer raschen umfassenden Überarbeitung. Das einzige Problem ist die absurde Macht, die das militärische Oberkommando über die Rote Linie ausübt. Bei der Entfernung ihrer Macht ist Vorsicht geboten, damit sie nicht Gefahr laufen, zweimal über ihre Loyalität gegenüber dem Generalsekretariat nachzudenken."

 RED_command_reforms: "Kommandoreformen"
 RED_command_reforms_desc: "Während des Krieges war ein Großteil unserer Streitkräfte sporadisch über die Sokolnitscheskaja-Linie verteilt, gemeinsame Operationen waren angesichts der Art des Krieges selten. Mit einer umfassenderen und einheitlicheren Kommandostruktur könnten unsere Streitkräfte effektiver eingesetzt und durch ein organisiertes Komitee verbessert werden."

 RED_military_renovations: "Militärische Renovierungen"
 RED_military_renovations_desc: "Obwohl wir derzeit über eine der größten Streitkräfte in der Metroregion verfügen, beweist der Zustand unserer Streitkräfte das Gegenteil. Mehr ein zusammengewürfeltes Gesindel mit Rohrgewehren, als eine vollwertige Streitmacht. Es muss etwas gegen diesen Zustand unternommen werden."

 RED_establish_officer_academy: "Richten Sie eine Offiziersakademie ein"
 RED_establish_officer_academy_desc: "Die neuen Generationen junger Beamter werden die harten Realitäten der Metro ertragen müssen. Dies muss die sich ständig verändernde und weiterentwickelnde Landschaft der Kriegsführung einschließen."

 RED_new_officer_corps: "Junges Offizierskorps"
 RED_new_officer_corps_desc: "Die Jugend ist die Zukunft. Wir müssen sie führen und sie lehren, die Erde zu erben, die sie schließlich erhalten werden. Wir müssen ihnen auch das nötige Wissen vermitteln, um die Rote Linie und die Interessen der Revolution zu wahren."
 RED_future_officers_tt: "Der Aufbau einer Offiziersakademie wird einige Zeit in Anspruch nehmen, aber unsere künftigen Kommandeure wesentlich kompetenter machen."

 RED_young_officer_academy: "Gründung einer Akademie für junge Offiziere"
 RED_young_officer_academy_desc: "Die angehenden jungen Offiziere von heute und die Generäle und Kommandeure von morgen. Mit Feuer, Stahl und sehr viel Mut werden sie die Welt zurückerobern. In den Flammen der Revolution und diesmal nicht in Strahlung."

 RED_question_of_brotherhood: "Eine Frage der Bruderschaft"
 RED_question_of_brotherhood_desc: "Er ist wichtig für Andrey und trifft näher am Ziel. Sein Bruder. Er hat sich in den letzten Jahren als kompetenter Stratege erwiesen, als jemand, dem Andrey in dieser Zeit des Verrats am meisten vertrauen konnte. Dies wäre jedoch wahr, wenn Maxim seinem älteren Bruder gegenüber keine heimliche Abneigung hegte."

 RED_new_economic_draft: "Neuer Wirtschaftsentwurf"
 RED_new_economic_draft_desc: "Nachdem dringende Angelegenheiten geklärt sind, können nun Anstrengungen unternommen werden, um die eingebrochene Wirtschaft wieder in Ordnung zu bringen. Andrey glaubt, dass die Rote Linie durch die Einführung neuer Wirtschaftspolitiken wirtschaftlich erneuert werden kann. Wenn nicht sogar in der Lage, mit der der Hanse zu konkurrieren."
 RED_new_economic_draft_tt: "Basierend auf Ihren getroffenen Entscheidungen wird ein Wirtschaftsplan erstellt. Dadurch wird der nächste nachfolgende Fokusbaum freigeschaltet.\n\n§REs gibt keine Möglichkeit, den Fokus abzubrechen, bis er abgeschlossen ist.§!"

 RED_move_the_capital: "Verlegt die Hauptstation"
 RED_move_the_capital_desc: "Während die [264.GetName] das Epizentrum der Revolution war, wurde ein Großteil der Sokol-Linie unter dem roten Banner konsolidiert. Um unseren Einfluss vollständig und effizient auf die gesamte Linie auszudehnen, wird vorgeschlagen, dass wir unsere Hauptstadtstation irgendwo näher an die Mitte der Linie selbst verlegen."

## Crisis ##
 
 RED_crisis: "Rote Linie in Gefahr"
 RED_crisis_desc: "Die Rote Linie ist von Gefahr bedroht und bis ins Mark erschüttern. Andrey muss vorsichtig vorgehen, um den Erhalt der gesamten Linie sicherzustellen."

 RED_inaugurate_korbut: "Korbut einweihen"
 RED_inaugurate_korbut_desc: "Mit ungehorsamen Militärangehörigen und der zunehmenden Angst vor gewalttätigen Aufständen unserer Bevölkerung. Ganz zu schweigen von denen innerhalb unserer eigenen Partei, die geflohen sind und über geheime Dokumente verfügen, die die gesamte Rote Linie verdammen könnten wenn sie in falsche Hände geraten. Andreys Regierung ist in Gefahr. Der KGB bleibt weiterhin treu und kann sinnvoll eingesetzt werden. Allerdings ist ihr Anführer die letzte Person, die Andrey gewollt hätte.\n\nLieber der Feind, den du kennst, als der Feind, den du nicht kennst."
 RED_korbut_inaugurate_tt: "Das §YKomitee für Staatssicherheit§!, oder auch §YKGB§! genannt, wird Sonderbefugnisse bekommen. Die Situation mit dem Überläufer wird geklärt und belastende Dokumente sichergestellt."
 
 ####Military Mutinies####
 RED_deal_with_military_mutinies: "Kümmert euch um die Meutereien"
 RED_deal_with_military_mutinies_desc: "Gegen die Militärdemonstranten muss sofort vorgegangen werden. Die Möchtegern-Meuterer müssen gestoppt werden. Das soll denjenigen eine Lehre sein, die der Roten Linie den Rücken gekehrt haben"
 RED_military_mutinies_decisions_tt: "Dies wird die Fähigkeit freischalten, mit Ungehorsam innerhalb unseres Militärs durch §CEntscheidungen§ umzugehen!"

 RED_rid_mutinies: "Beendigung der Meutereien"
 RED_rid_mutinies_desc: "Überall um uns herum liegen Feinde der Revolution, und doch kämpfen wir untereinander. Diese militärischen Meutereien sind nicht mehr als ein Hindernis auf dem unausweichlichen Weg des Kommunismus. Ein Krebstumor unter unserer Herrschaft. Das Militär dient sich selbst und nicht den wahren Idealen Lenins. Sie müssen entfernt werden."
 RED_military_rid_mutinies_tt: "Wir werden in der Lage sein, die §YMilitärischen Meutereien§! durch §CEntscheidungen§! zu entfernen"

 RED_nkvd_divisions: "Stellen Sie NKWD-Bataillone auf"
 RED_nkvd_divisions_desc: "Der NKWD ist immer noch loyal, im Gegensatz zum das Militär. Unabhängig von Korbuts Absichten bleibt sein Herz der Roten Linie zweifelsohne treu und er wird dafür sorgen, dass diese Konterrevolutionäre zerschlagen werden. Damit soll der NKWD umgerüstet und erweitert werden; zur gemeinsamen Durchführung von Hauptkampfaufgaben."
 RED_NKVD_oob_tt: "\n§C2§! In unserer Hauptstadt werden NKWD-Divisionen entstehen!"

 RED_approach_dissenters: "Annäherung an die Mitte"
 RED_approach_dissenters_desc: "Es gibt immer noch einen Prozentsatz derjenigen, die dem Sokol trotz zweifelhafter Loyalitätsbekundungen keine absolute Autorität geschworen haben. Machen Sie ihnen klar; Entweder marschieren Sie neben dem Banner der Revolution; oder dagegen. Nicht mehr als die kapitalistischen oder faschistischen faulen Eindringlinge. Viele sind immer noch der Autorität von Andrey treu und der Roten Linie noch treuer. Ihre Unterstützung muss bestätigt und gestärkt werden."
 RED_approach_commanders_tt: "Wir werden auf diejenigen zugehen, die sich nicht offen auf die Seite von Andrey oder Kovshov gestellt haben, und ihre Unterstützung gewinnen"

 RED_out_of_sight: "Außer Sichtweite"
 RED_out_of_sight_desc: "Wie man so schön sagt: Die Straße zur Lubjanka geht nur in eine Richtung. Jetzt wird sie als politisches Gefängnis genutzt, um diejenigen unterzubringen, die dem Staat böses wollen. Jetzt kann es zur Unterbringung von Streitkräften genutzt werden, die sich Andreys Herrschaft widersetzen. Trotz wird hier nicht geduldet."

 RED_martyrs_disappear: "Märtyrer verschwinden"
 RED_martyrs_disappear_desc: "Man kann über den NKWD sagen, was man will, aber sie sind die Besten in dem, was sie tun. Diejenigen, die im Rest der Linie noch für Kovshov arbeiten, verschwinden einer nach dem anderen und hinterlassen nichts.\n\nKein Erbe, dem man folgen kann, keine Leiche, die man finden kann"
 RED_mutiny_is_crumbling: "Die §RMeutereien§! müssen aufhören!"

 RED_rallying_cry: "Ein Sammelruf"
 RED_rallying_cry_desc: "Wer der Roten Linie treu bleibt, muss auch für sie einstehen. Man muss wissen, dass diejenigen, die der Arbeiterrevolution im Weg stehen, nicht besser sind als abscheuliche Faschisten oder aufgeblähte Kapitalisten. Der Feind lauert nicht nur draußen, sondern auch drinnen. Beide Feinde müssen vernichtet werden."
 RED_rallying_cry_tt: "\n§CZwei§! §YInfanterie-Divisionen§! werden erschaffen!"

 RED_name_and_shame: "Benennt die Feinde"
 RED_name_and_shame_desc: "Sie müssen gehört werden. Laut und deutlich. Wer dem Generalsekretär nicht treu ist, der ist der Roten Linie nicht treu. Sie sind nicht mehr als lästige Verschwörer gegen die Revolution."

 RED_squash_dissidents: "Zerschlagt die Dissidenten"
 RED_squash_dissidents_desc: "Diejenigen, die Kowschow ursprünglich loyal gegenüberstanden, beginnen Zweifel zu bekommen und wenden sich von ihm ab. Ungeachtet dessen sind sie immer noch Feinde der Revolution und müssen getötet werden."

 RED_promote_loyalty: "Fördern Sie Loyalität"
 RED_promote_loyalty_desc: "Denjenigen, die dem Kommunismus und der Zentralregierung treu geblieben sind, gilt es zu beweisen, dass wir ihnen größten Respekt und Dank entgegenbringen."

 RED_the_great_show_trial: "Beginnen Sie den großen Schauprozess"
 RED_the_great_show_trial_desc: "Die Macht Kowschows beginnt zu schwinden."

 RED_staff_purge: "Beginnen Sie mit der Säuberung!"
 RED_staff_purge_desc: "Nachdem die Dissidenten unterdrückt wurden, wäre jetzt ein besserer Zeitpunkt denn je, den Makel der Korruption innerhalb des Militärs vollständig zu beseitigen. Wir müssen die Kontrolle von der Korruption zurückgewinnen. Das Militär dient der Zentralregierung, nicht umgekehrt."
 RED_staff_purge_removal_prerequisites_tt: "Wir werden unser §RMilitärgesetz§! nicht ändern können bis die Idee entfernt wird."

 RED_unlock_next_focus_tree_tt: "\n\nSobald §GPersonalsäuberungen§! und §GDie Menge verstummt§! abgeschlossen sind, wird in Kürze ein Ereignis ausgelöst, das den nächsten Fokusbaum freischaltet."
 
 ####Mushroom Revolts####
 RED_dismantle_mushroom_revolts: "Zerschlagt die Pilzrevolte"
 RED_dismantle_mushroom_revolts_desc: "Diese Aufständischen sind nicht mehr als hungernde Bürger, die die Flammen ersticken und die ganze Linie zum Einsturz bringen wollen. Sie machen sich die aktuellen Probleme zunutze und verschärfen sie noch weiter. Es muss damit umgegangen werden"
 #########
 
 #########
 RED_approach_hanza: "Annäherung an die Hanse"
 RED_approach_hanza_desc: "Es ist so ziemlich der letzte Staat mit dem wir kooperieren sollten, wenn man bedenkt, dass der erste größere Metrokrieg zwischen unseren Nationen statt fandt. Und eine Kooperation mit unserem ideologischen Erzfeind? Einem kapitalistischen Unrechtstaat? Unvorstellbar."
 RED_approaching_hanza: "Wir entschieden uns für die Hanse."
 
 RED_new_polis_treaty: "Neuer Vertrag in Polis"
 RED_new_polis_treaty_desc: "Wie zuvor werden sich die Delegationen der Hanse und der Roten Linie unter dem Deckmantel der Korrektur des vorherigen Vertrags in Polis treffen. Die Hanse wird die Rote Linie mit Lebensmitteln versorgen, während sich die Rote Linie für den Ausgleich der Neutralität innerhalb der Metro einsetzen wird. Zumindest fürs erste."
 RED_new_polis_treaty_tt: "\nWir werden §Ounfähig§! sein unser §CHandelsgesetz§! für die Dauer dieses §ONationalgeistes§! zu ändern"

 RED_mushroom_trades: "Pilzhandel"
 RED_mushroom_trades_desc: "Versorgungszüge und Waggons fahren in die Hanse ein und aus und werden nur von den treuesten Soldaten bewacht, um keine Unruhe zu verursachen."

 RED_deal_well_made: "Ein guter Deal"
 RED_deal_well_made_desc: "Die gegenseitige Vereinbarung zwischen der Linie und der Hanse hat sich im Handel als äußerst lukrativ erwiesen. Die beiden Nationen sind trotz ihrer Differenzen zumindest in der Lage, diplomatisch Handel zu treiben. Allerdings mit angehaltenem Atem und unterdrückten Zweifeln aneinander."
 
 #########
 RED_reforms: "Innere Reformen"
 RED_reforms_desc: "Die Rote Linie ist von ihren revolutionären Idealen des Klassensozialismus und der Gleichheit abgewichen. Sie hat sich militarisiert und von den Menschen entfernt, die sie vor all den Jahren gegründet haben. Um die Liebe und Loyalität des einfachen Volkes zurückzugewinnen, ist eine umfassende Reform der Partei und ihrer Arbeitsweise erforderlich."
 RED_inner_reforms: "Wir beschlossen, die Partei zu reformieren."
 
 RED_military_industry_scale_back: "Verkleinert das Militär"
 RED_military_industry_scale_back_desc: "Eine der größten Hürden, die wir überwinden müssen, um die Ringführer für uns zu gewinnen, ist die Menge an Ressourcen, die die Regierung aufbringen muss, um den Bedarf der Armee zu decken. Wir können die Ausgaben nicht weiter erhöhen, bis die Gespräche beendet sind und wir wieder die Kontrolle über unsere Farmen haben. Wir müssen uns mit einer Verkleinerung unserer Streitkräfte und einer Steuersenkung begnügen. Vorübergehend natürlich"
 RED_military_industry_scale_back_lock_tt: "§RWir werden nicht in der Lage sein, unsere§! §YMobilisierungsgesetze§! §Rfür die Dauer dieser Idee zu ändern!§!"
 
 RED_reintroduce_workers_councils: "Wiedereinführung der Betriebsräte"
 RED_reintroduce_workers_councils_desc: "Während des Koalitionskrieges mussten wir in der Lage sein, schnell und entschlossen zu handeln, was bedeutete, dass wir die Arbeiterräte suspendieren mussten um unsere Befehlskette zu rationalisieren. Wir haben sie zwar suspendiert um zu verhindern, dass sie unsere Aufmerksamkeit mit unwichtigen Dingen ablenken, aber das hat zu dieser aktuellen Situation geführt. Sie zurückzuholen wird die Revolte befriedigen, da sie jetzt glauben ein Mitspracherecht in der Regierung zu haben.\n\nAuch wenn das nicht unbedingt stimmt"
 RED_worker_councils_law_lock_tt: "§RWir werden unfähig sein unsere§! §YWirtschaftsgesetze§! §Rfür die Dauer dieser Idee zu ändern!§!"
 
 RED_meet_with_the_revolters: "Treffen Sie sich mit den Aufständischen"
 RED_meet_with_the_revolters_desc: "Nach zähen Gesprächen wurde ein Treffen zwischen der Zentralregierung und den Aufständlern in einem abgelegenen Gebiet vereinbart. Hoffen wir, dass alles gut geht..."
 
 #########
 RED_sabotage_the_revolution: "Sabotieren Sie die Revolution"
 RED_sabotage_the_revolution_desc: "Die Revolution fängt gerade erst an und wenn sie nicht aufgehalten wird, wird der Schneeball zu einer Lawine anwachsen. Eine Idee der Staatssicherheit besteht darin, Spione in die eigenen Reihen einzuschleusen und von innen heraus Zerstörung anzurichten."
 RED_sabotage_the_revolution_tt: "Wir nutzen das NKWD, um den wachsenden Unmut zu infiltrieren und mittels §YEntscheidungen§! zu untergraben."

 RED_crackdowns: "Razzien"
 RED_crackdowns_desc: "Jede subversive Aktivität schwächt die Rote Linie, egal ob ein Spion oder ihre eigenen Kräfte sie tätigen. Schnell und ohne Gnade"
 RED_has_completed_sabotaged_revolution: "Hat mit militärischen Razzien begonnen"
 RED_crackdowns_tt: "Schaltet eine weitere §YEntscheidung§! frei um mit den Pilzaufständischen umzugehen."
 
 RED_repress_the_evidence: "Unterdrücken Sie die Beweise"
 RED_repress_the_evidence_desc: "Über diese Proteste und die Massenverhaftungen, die stattgefunden haben, sollte nie etwas bekannt werden. Die Demonstrationen haben nie stattgefunden."
 
 RED_rid_the_ring_leaders: "Befreien wir uns von den Ringführern"
 RED_rid_the_ring_leaders_desc: "Wenn man einen Schritt zurücktritt und die Revolte betrachtet, unterscheidet sie sich kaum von der Vorgehensweise der Regierung. Charismatische Individuen mobilisieren die Machthaber der Gesellschaft, um mit dem Versprechen einer besseren Zukunft ihren Willen durchzusetzen. Der Hauptunterschied besteht darin, dass wir über Gefängnisse, die Armee und die Macht verfügen, während dies bei ihnen nicht der Fall ist.\n\nDiese Tatsache werden wir ausgiebig ausnutzen"
 RED_has_infiltrated_revolution: ""
 
 #########
 RED_the_crowd_stills: "Die Menge schweigt"
 RED_the_crowd_stills_desc: "Wenn wir mehr Essen bereit stellen und die Anführer des Rings erledigt sind, verliert die Revolution an Schwung und die Dinge beginnen sich wieder zu normalisieren"
 
## After the crisis ##
 
 RED_2030: "2030"
 RED_2030_desc: "Da die Krisen hinter uns liegen und unsere Zukunft vor uns liegt, ist es Zeit für eine Wahl."
 
## Berilag ##
 
 RED_development_the_berilag: "Entwicklung des Berilag"
 RED_development_the_berilag_desc: "Nachdem unsere Position nun gesichert ist, können wir uns auf die Verbesserung unserer Fähigkeiten konzentrieren und einer unserer Forschungsmitarbeiter hat einen interessanten Vorschlag gemacht ..."

 RED_allow_volunteers: "Erlaubt 'Freiwillige'"
 RED_allow_volunteers_desc: "Viele der Männer in diesem Gefängnis sind entweder zu lebenslanger Haft verurteilt oder warten auf unbestimmte Zeit auf ihre Verurteilung. Viele würden die Chance auf verkürzte Strafen im Austausch für die Teilnahme an Experimenten nutzen. Die Angebote sind echt, wenn sie es zumindest schaffen, sie zu überleben, was nach unseren aktuellen Ergebnissen jedoch unwahrscheinlich ist."

 RED_additional_funding: "Zusätzliche Finanzierung"
 RED_additional_funding_desc: "Obwohl unsere Ressourcen und unser Einfluss riesig sind, gibt es doch Grenzen für das, was wir in die Finger bekommen. Indem wir den Wissenschaftlern von Berilag mehr Mittel zur Verfügung stellen, können sie exotische Materialien und „Freiwillige“ beschaffen, die außerhalb unseres Einflusses liegen."

 RED_self_autonomy: "§CSelbstautonomie§!"
 RED_self_autonomy_desc: "Indem wir der Berilag-Verwaltung mehr Freiheit geben, die Dinge so zu regeln wie sie es für richtig halten, werden wir mit Sicherheit höhere Erträge aus unserer Investition erzielen. Denn wer weiß besser als die Forscher, wie man recherchiert?"
 RED_berilag_self_autonomy_tt: "\n§OBerilag-§! §CEntscheidungen§! haben nun bessere §GBoni!§!"

 RED_under_jurisdiction: "§RUnter wachsamen Blicken§!"
 RED_under_jurisdiction_desc: "Wissenschaftlern reichlich Ressourcen und keine Aufsicht zu überlassen, ist ein Rezept für eine Katastrophe. Das Berilag wird darum von unseren Regierungsvertretern genau überwacht, um verschwenderische oder gefährliche Forschung zu verhindern. Die Vertreter verstehen die Forschung vielleicht nicht, aber Korruption und Vetternwirtschaft sind in jedem Bereich gleich."
 RED_berilag_under_jurisdiction_tt: "\n§OBerilag§! -Entscheidungen sind nun §Ggünstiger!§!"

 RED_further_volunteers: "Weitere Freiwillige"
 RED_further_volunteers_desc: "Angesichts des Erfolgs des aktuellen Programms ist es durchaus sinnvoll, es zu erweitern. Das einzige Problem scheint zu sein, dass ihnen die bereitwilligen Freiwilligen ausgehen und nur so wenige überleben. Allerdings sind wir sicher, dass die Freiwilligen mit etwas „Ermutigung“ wieder ausreichend bereitstehen werden. Schließlich ist es besser, für den Wohlstand der Roten Linie zu sterben, als für nichts."
 RED_further_volunteers_tt: "\n§OBerilag§! §RGefangenen-§! §CEntscheidungen§! §Gverdoppelt!§!"

 RED_station_renovations: "Stationsrenovationen"
 RED_station_renovations_desc: "Während es leicht war, diesen Ort verrotten zu lassen, wie es sich für ein Gefängniss auch gehört, erweist sich jetzt, da wir hier hochmoderne Forschung betreiben, die erwähnte Verrottung als störend. Wir müssen die Station unbedingt reparieren und renovieren, um den Platz effizienter zu nutzen."

 RED_scientific_amenities: "Wissenschaftliche Einrichtungen"
 RED_scientific_amenities_desc: "Da in absehbarer Zukunft viele der klügsten Köpfe der Metro hier stationiert sind, könnte es sich als klug erweisen, die Wohnstationen zu verbessern, um sowohl die Moral zu stärken als auch sie an die hohen Erwartungen an diese Einrichtung zu erinnern."

 RED_retained_guards: "Feste Wachen"
 RED_retained_guards_desc: "Derzeit bewachen wir die Anlage abwechselnd mit unseren treuesten Soldaten. Da die Anlage nun einige unserer größten Geheimnisse birgt, müssen wir eine spezielle Wachabteilung bilden, die ausschließlich zu dem Zweck überprüft, geschult und untergebracht wird, um sicherzustellen, dass diese Geheimnisse hier bleiben."

 RED_scientific_reportings: "Wissenschaftliche Berichterstattung"
 RED_scientific_reportings_desc: "Das Berilag hat sich von einem dunklen Ort des Vergessens in ein Zentrum der Wissenschaft verwandelt, in dem jeden Tag bahnbrechende Fortschritte erzielt werden. Jetzt können wir die Früchte unserer Arbeit ernten und in eine neue Ära des sowjetischen Lernens eintreten."

