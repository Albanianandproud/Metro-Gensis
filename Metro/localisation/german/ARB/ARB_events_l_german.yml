l_german:

  nf_ARB.1.t: "Europa schlägt ein gemeinsames Bündniss vor"
  nf_ARB.1.d: "Europa bietet uns ein Bündniss an, und argumentiert, dass der große Wurmkult sie gleichermaßen bedroht. Doch auch andere Argumente stehen im Raum, sowohl wir als auch der Europäische Stationenbund bestehen größtenteils aus Nichtrussischen Minderheiten. Trotz unserer Differenzen könnte uns dieses Bündniss noch einmal nützen."
  nf_ARB.1.a: "Vorerst angenommen"
  nf_ARB.1.b: "Niemals!"
 
  nf_ARB.2.t: "Eine Garantie für Europa"
  nf_ARB.2.d: "Europa schlägt engere Verbindungen mit uns vor, getrieben aus Furcht vor dem großen Wurmkult."
  nf_ARB.2.a: "Vorerst angenommen"
  nf_ARB.2.b: "Niemals!"

  nf_ARB.3.t: "Ökonomische Überlegungen"
  nf_ARB.3.d: "Während des Metrokrieges wurden viele unserer Ressourcen für die Kriegsführung verbraucht. Lebensmittel, Kleidung und medizinische Hilfsgüter wurden zur Unterstützung der Kriegsanstrengungen abgegeben und ganze Gemeinden verarmten dadurch, materiell und geistlich. Es spielte damals keine Rolle, wer oder was du warst; Ingenieure, Ärzte und Elektriker wurden zu Soldaten, Spähern und Sanitätern ausgebildet, um die Rote Flut aufzuhalten. Unsere Verluste waren dabei jedoch so hoch, dass sich die Konföderation davon bis heute nicht erholt hat.\n\nEs wird einiges an Kraft erfordern, um zu alter Stärke zurückzufinden, wenn dies überhaupt möglich ist. Eine der wenigen Tätigkeiten die wir nicht verlernt haben ist die der Stalker, und noch immer ist die Oberfläche reich an ungeborgenen Schätzen des früheren Nobelviertels von Moskau. Jede Wirtschaftsmacht in der Metro ist auf etwas spezialisiert und wir müssen unsere Stärken richtig ausspielen, wenn wir zurück an die Spitze wollen. Mit dem Geld dass die Stalker für uns verdienen können wir dann den weiteren Wiederaufbau finanzieren. Hier gibt es mehrere Schweineställe und in der Nähe eine Waffenwerkbank. Arbat wird nicht länger eine vergessene Nation sein, wie Sie die Leute vom Prospekt Mira glauben machen wollen."
  nf_ARB.3.a: "Hoffentlich beginnt damit ein neuer Aufschwung."

  nf_ARB.4.t: "Kreuzzug gegen die Finsternis"
  nf_ARB.4.d: "Dieser im Park Pobedy hausende Kannibalenkult wurde entdeckt, und das Militär beginnt bereits mit aktiven militärischen Einsätzen um ihn niederzuringen. Wir haben bereits einige Geheimgänge entdeckt, von denen man annimmt, dass sie von der Sekte genutzt wurden, um ungehindert an unseren Patrouillen vorbeizuschleichen. Aus den Rohren und eingestürzten Tunneln, die zu diesem Teil der Metro führen, werden schon bald keine Schreie mehr zu hören sein."
  nf_ARB.4.a: "Wir werden sie schon bald erledigen."

  nf_ARB.5.t: "Eine gute Ausbeute"
  nf_ARB.5.d: "Es kommt nicht jeden Tag vor, dass die Stalker mit guten Nachrichten zurückkommen, doch heute tun sie es. Die Stalker haben mehrere Gegenstände mitgebracht, die unser Station sehr helfen werden"
  nf_ARB.5.a: "Mehrere Lager hochwertiger Chemikalien."
  nf_ARB.5.b: "Einige vielversprechende Waffenpläne."

  nf_ARB.6.t: "Vielversprechende Entdeckung"
  nf_ARB.6.d: "Unsere Stalker-Teams sind mit großartigen Neuigkeiten zurückgekehrt: Bei einer routinemäßigen Plünderung wurden mehr als nur die üblichen Stücke Stahl und Schrott entdeckt."
  nf_ARB.6.a: "Auf Papierfetzen geschriebene Arbeitshandbücher der Nachkriegszeit. Möglicherweise von Baumansky? Nein... VIEL zu saubere Handschrift."
  nf_ARB.6.b: "Eine alte CnC-Maschine, unsere Bastardpistolen werden von nun an keine Bastarde mehr sein, oder?"

  nf_ARB.7.t: "Angebot für die Kurskaya"
  nf_ARB.7.d: "Die Arbat-Konföderation ist mit einem Vorschlag zu uns gekommen: Sie wollen die Station Kurskaja-Ost von unserer Behörde kaufen. Als Gegenleistung für einen festen Platz in unserer Handelsliga. Die Beziehungen zwischen uns und Arbat sind erst in den letzten Monaten herangewachsen, doch uns verbinden viele Gemeinsamkeiten und unsere gemeinsame Geschichte im Metrokrieg."
  nf_ARB.7.a: "Einverstanden."
  nf_ARB.7.b: "Die Stationen der Handelsliga sind keine Ware, die man kaufen und verkaufen kann."
  nf_ARB.7.c: "Wir erlauben den Kauf, erwartet aber nicht,dass unsere Händler einfach ihre Sachen packen und woanders hinziehen."

  nf_ARB.8.t: "Kurskaya gesichert"
  nf_ARB.8.d: "Die Geschäftsleute der Hanse sind tatsächlich zusammengekommen, um unser Angebot zu diskutieren. Nach längeren Gesprächen und Verhandlungen, die sich über ganze zwei Tage zogen, haben sie dem Vorschlag letztendlich zugestimmt. Ein kurzes Zeitfenster wird die beliebige Versetzung des Stationspersonals und der Bewohner von der Kurskaja in die Hanza ermöglichen, da den Bürgern sichergestellt wurde dass die Übergabe der Führung schnell und reibungslos erfolgen wird."
  nf_ARB.8.a: "Ein großer Tag für die Arbat-Konföderation!"

  nf_ARB.9.t: "Angebot abgelehnt"
  nf_ARB.9.d: "Es kam nicht einmal zu Verhandlungen über unser Angebot, die Geschäftsleute der Hanse haben beinahe einstimmig beschlossen unser Angebot abzulehnen. Von überall hörte man die gleiche, fadenscheinige Begründung: Die Hanse verhandelt nicht über ihre Stationen."
  nf_ARB.9.a: "Das war ein gutes Angebot, verflucht sollen sie sein!"
  nf_ARB.9.b: "Kurskaya gehört uns, die Übergabe wird friedlich oder durch Gewalt erfolgen."

  nf_ARB.10.t: "Verwüstung"
  nf_ARB.10.d: "Während das gelegentliche Verschwinden von unseren Stationsbehörden als auswandernde Bürger abgeschrieben werden kann, ist es diesmal ist es etwas ganz anderes: Immer mehr Bürger werden vermisst, kein subtiles Abhauen mehr, sondern jetzt verschwinden Menschen links, rechts und in der Mitte, als ob die Metro sie ganz und gar verschlungen hätte, ohne eine Spur zu hinterlassen. Unsere Bürger haben Angst."
  nf_ARB.10.a: "Fürchtet die Dunkelheit."

  nf_ARB.11.t: "Was soll aus ihnen werden?"
  nf_ARB.11.d: "Während sich viele ihrer Mitglieder tief in das Innere der Metro zurückgezogen haben, so lebt doch ein Großteil der Kultisten noch immer im Park Pobedy, unter unserer Kontrolle. Auf den Plattformen liegen noch immer die Leichen aus den Schlachten. Viele der Überlebenden sind dürr und deformiert, hagere und blasse Gestalten, die nicht mehr viel Menschliches in sich tragen. Die Frage ist, was machen wir jetzt mit ihnen??"
  nf_ARB.11.a: "Tötet die Erwachsenen, verschont die Kinder, sie können wir noch retten."
  nf_ARB.11.b: "Tötet sie alle, lasst niemanden von ihnen entkommen."

  nf_ARB.13.t: "Eine Allianz mit Arbat"
  nf_ARB.13.d: "Die Arbat-Konföderation schlägt ein Bündniss mit uns vor, da der wirtschaftliche und militärische Nutzen angeblich enorm wäre. Trotz unserer Differenzen könnte sich dies lohnen."
  nf_ARB.13.a: "Vorerst."
  nf_ARB.13.b: "Niemals!"

  nf_ARB.14.t: "Die Arbat-Konföderation fordert unsere Unterwerfung"
  nf_ARB.14.d1: "Nach mehreren Wochen fieberhafter Aktivität im Militär der Arbat-Konföderation hat [VDN.GetLeader] eine Proklamation herausgegeben, in der er erklärt, dass die aktuelle Situation in der Baumansky-Allianz ein ernstes Problem für die Arbat-Konföderation darstellt. Daraufhin hat er bestimmte Garantien von uns verlangt. \n\nUnter anderem müssten wir sie konsultieren, bevor wir Allianzen eingehen oder Verträge unterzeichnen, und wir müssten ihnen die Kontrolle über unser Militär übergeben. Essentiell würden sie dann über uns herrschen."
  nf_ARB.14.d2: "Eine Delegation der Arbat-Konföderation ist bei uns eingetroffen, um die Frage der Baumansky-Allianz zu besprechen. Sie betrachten die Nation als in ihrem Einflussbereich liegend und sind sehr besorgt über den Einfluss, den wir auf die Politik der Baumansky-Allianz haben.\n\nDer Leiter der Delegation ging sogar so weit, vorzuschlagen, dass das Territorium der Baumansky-Allianz als Sprungbrett für eine Invasion der Arbat-Konföderation genutzt werden könnte.\n\nSie schlagen vor, dass die Regierung der Arbat-Konföderation einen ähnlichen Einfluss auf die Baumansky-Allianz ausüben sollte, wie wir ihn derzeit genießen."
  nf_ARB.14.a: "Na gut."
  nf_ARB.14.b: "Kommt nicht in Frage."

  nf_ARB.15.t: "Die Baumansky-Allianz steht unter unserer Kontrolle"
  nf_ARB.15.d: "Unser Bevollmächtigter hat sich in der Baumansky-Station niedergelassen und sorgt dafür, dass die Regierung der Allianz ihre Politik eng an die unsere anpassen wird."
  nf_ARB.15.a: "Gut. Sehr gut."

  nf_ARB.16.t: "Kontrolle über die Allianz abgelehnt"
  nf_ARB.16.d: "Trotz unserer besten Bemühungen hat sich die Regierung der Baumansky-Allianz geweigert, ihre unterwürfige Rolle uns gegenüber zu akzeptieren. Wir müssen jetzt die Möglichkeit einer militärischen Aktion zur Sicherung unserer Ostgrenze in Betracht ziehen."
  nf_ARB.16.a: "Wir werden sie bekommen, auf die eine oder die andere Art."

  nf_ARB.17.t: "Die Arbat-Konföderation verlangt die Baumansky-Allianz"
  nf_ARB.17.d: "Die Regierung der Arbat-Konföderation hat sich bezüglich des zukünftigen Status der Baumansky-Allianz an uns gewandt. Sie glauben fest daran, dass sie die volle Kontrolle über das Schicksal der Baumansky-Allianz haben sollten, da die Baumansky-Allianz zur Arbat-Konföderation gehören sollte, da sie auch an der Orangen Linie liegt.\n\nWährend die Delegation der Arbat-Konföderation davor zurückschreckte, explizite Drohungen auszusprechen, meldet unser Geheimdienst ein beunruhigendes Ausmaß an Aktivitäten innerhalb des Militärs der Arbat-Konföderation."
  nf_ARB.17.a: "Wir haben keine andere Wahl."
  nf_ARB.17.b: "Wir weichen nicht einen Meter zurück."

  nf_ARB.18.t: "Baumansky-Allianz übergeben"
  nf_ARB.18.d: "Die Baumansky-Allianz steht unter unserer Kontrolle, die einzige Frage bleibt nun, wie nun weiter vorgehen sollen. Während viele in der Regierung eine völlige Annexion befürworten, sind andere besorgt über die Auswirkungen des Versuchs, eine Halbbanditenstation in unser Gemeinwesen zu integrieren. Ihre bevorzugte Option wäre die Einrichtung einer dezentralen Regierung in der Baumansky- Station mit einigen Befugnissen über ihre internen Richtlinien, aber in allen anderen Angelegenheiten an uns weisungsgebunden."
  nf_ARB.18.a: "Wir werden die Linie annektieren."
  nf_ARB.18.b: "Eine Marionettenregierung währe vorteilhafter."

  nf_ARB.19.t: "[From.GetNameDefCap] lehnt die Übergabe der Baumansky-Allianz ab"
  nf_ARB.19.d: "Die Verhandlungen über die Übertragung der Baumansky-Allianz sind beinahe sofort ins Stocken geraten. Die [From.GetAdjective]-Delegation hat ihre Position als im Wesentlichen den Status quo dargelegt, ohne dass größere Änderungen vorgeschlagen wurden. Unsere Delegation bekräftigte natürlich noch einmal, dass wir die Baumansky-Allianz als unser Territorium betrachten, da sie sich auf der Orangen Linie befindet, was jedoch als irrelevant abgetan wurde.\n\nEs wurden keine Fortschritte erzielt, und die zunehmende Frustration auf beiden Seiten des Tisches macht es unwahrscheinlich, dass sich daran noch etwas ändern wird."
  nf_ARB.19.a: "Lasst es gut sein."
  nf_ARB.19.b: "Wir nehmen uns, was uns gehört."

  nf_ARB.20.t: "Leninbibliothek gegen den Ploschad Revolutsii"
  nf_ARB.20.d: "Die Arbat-Konföderation ist mit einem Vorschlag zu uns gekommen: Sie wollen den Ploschad Revolutsii zurück, dafür erhalten wir die Biblioteka Imeni Lenina. Normalerweise würde wir nicht einmal daran denken den Platz der Revolution herzugeben, doch seitdem Arbat die Leninbibliothek besetzt hat ist unsere Linie in zwei geteilt, eine strategisch sehr bedenkliche Situation. Sein pragmatisch gedacht sollten wir annehmen"
  nf_ARB.20.a: "Einverstanden."
  nf_ARB.20.b: "Niemals werden wir unser Heiligtum hergeben!"

  nf_ARB.21.t: "Ploschad Revolutsii ist wieder Teil der Konföderation"
  nf_ARB.21.d: "Nach Gesprächen stimmten die Roten schließlich dem Vorschlag zu. Ein kurzes Zeitfenster ermöglicht den Transfer des Stationspersonals und der Bürger vom Ploschad Revolutsii zur Biblioteka imeni Lenina und umgekehrt."
  nf_ARB.21.a: "Ein guter Tag für Die Arbat-Konföderation!"

  nf_ARB.22.t: "Angebot abgelehnt"
  nf_ARB.22.d: "Nach stundenlangen Debatten und Gesprächen haben die Roten unseren Vorschlag abgelehnt. Sie entgegnen, dass der Ploschad Revolutsii zu wichtig für sie sei, und obwohl die Biblioteka Imeni Lenina eine strategische Station sei, werden sie die für sie heilige Station nicht hergeben."
  nf_ARB.22.a: "Das war ein faires Angebot."
  nf_ARB.22.b: "Ploschad Revolutsii gehört uns, ob ihr wollt oder nicht."

  ARBnews.1.t: "Die Arbat-Konföderation beansprucht die Herrschaft über die Baumansky-Allianz"
  ARBnews.1.d.a: "Die Arbat-Konföderation hat Forderungen erhoben, dass die Baumansky-Allianz ein Teil ihrer Konföderation sein sollte, entweder als integraler Bestandteil oder als autonome Stationen. Es wurde ein entsprechendes Ultimatum gestellt, das mit der Androhung von Gewalt untermauert wurde. Die Diplomaten der Hanse-Handelsliga versuchen unterdessen verzweifelt, eine friedliche Lösung für diese jüngste Krise zu finden."
  ARBnews.1.d.b: "Die Arbat-Konföderation hat Forderungen erhoben, dass die Baumansky-Allianz ein Teil ihrer Konföderation sein sollte, entweder als integraler Bestandteil oder als autonome Stationen. Es wurde ein entsprechendes Ultimatum gestellt, das mit der Androhung von Gewalt untermauert wurde. Die Diplomaten der baumansky-Allianz versuchen unterdessen verzweifelt, eine friedliche Lösung für diese jüngste Krise zu finden."
  ARBnews.1.a: "Lasst uns hoffen dass das friedlich endet."
  ARBnews.1.b: "Dies ist keine geringe Forderung..."
  ARBnews.1.c: "Sind wir bereit unsere Unabhängigkeit aufzugeben?"
  ARBnews.1.d: "Lasst uns hoffen dass das friedlich endet."

  ARBnews.2.t: "[From.GetName] unterwirft sich der Arbat-Konföderation"
  ARBnews.2.d.a: "Nach ausführlichen Überlegungen hat die [From.GetAdjective]-Regierung unter [From.GetLeader] beschlossen, den Forderungen von [ARB.GetAdjective] nachzugeben. Sie haben [ARB.GetAdjective] die Kontrolle über die Baumansky-Allianz übergeben und ziehen es vor, [ARB.GetLeader] zu beschwichtigen, wenn damit der Frieden gewahrt wird. Zweifellos wird dies die Entschlossenheit von [ARB.GetAdjective] im künftigen Umgang mit ihren geschwächten Nachbarn stärken."
  ARBnews.2.d.b: "Nach ausführlichen Überlegungen hat die Baumansky-Allianz beschlossen, den Forderungen der Arbat-Konföderation nachzugeben. Da sie keine Alternative sahen, gaben sie ihre Unabhängigkeit auf, um das Leben ihres Volkes zu retten. Zweifellos wird dies die Entschlossenheit der Arbat-Konföderation im künftigen Umgang mit ihren geschwächten Nachbarn stärken."
  ARBnews.2.a: "Die Baumansky ist so besser dran."
  ARBnews.2.b: "Ein notwendiges Opfer."
  ARBnews.2.c: "Wir hatten keine Wahl."
  ARBnews.2.d: "Wenisgtens wird so der Frieden gewahrt."

  ARBnews.3.t: "[From.From.GetName] lehnt das Ultimatum der Arbat ab"
  ARBnews.3.d.a: Zwischen der Arbat-Konföderation und der Hanse ist eine diplomatische Krise ausgebrochen, die das Schicksal der Baumansky-Allianz betrifft. [ARB.GetLeader] hatte zuvor erklärt, dass die Baumansky-Allianz aufgrund ihrer historischen Verbindungen zur Arbat-Konföderation ein zentrales Interesse von [ARB.GetNameDef] sei. Seine Regierung erwartete, zu allen Maßnahmen bezüglich der Baumansky-Allianz konsultiert zu werden.\n\nHanza-Führer [HNZ.GetLeader] weigerte sich, derartige Forderungen anzunehmen und bezeichnete sie als „törichte und gefährliche Einmischung in die inneren Angelegenheiten einer souveränen Station“.\n\nAngesichts der hohen Spannungen fragen sich immer mehr Beobachter, ob die Arbat-Konföderation möglicherweise zu Gewalt greift, um nun ihre Ziele zu erreichen."
  ARBnews.3.d.b: "Die Baumansky-Allianz hält hartnäckig an ihrer Unabhängigkeit fest und lehnt die Forderungen der Arbat-Konföderation ab. Inzwischen befestigt sie bereits ihre Grenze. Die Arbat-Konföderation hat keine Anstrengungen unternommen, um die Situation zu entschärfen, und beide Nationen scheinen auf Kriegskurs zu gehen."
  ARBnews.3.a: "Wenn sie nur auf Stärke hören..."
  ARBnews.3.b: "Wir stehen gemeinsam. lasst sie nur kommen!"
  ARBnews.3.c: "Sture Idioten, alle beide..."
 