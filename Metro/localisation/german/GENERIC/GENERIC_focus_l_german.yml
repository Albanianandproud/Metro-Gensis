l_german:
 militia_formation: "Gründung einer Miliz"
 militia_formation_desc: "Um unsere Station richtig zu verteidigen. Die Anstellung eines Teilzeit-Militärs muss eingerichtet werden. Wir müssen rudimentäre Trainingsübungen und Übungen entwickeln, um sie in Topform zu halten."

 military_doctrine: "Miliz-Taktiken"
 military_doctrine_desc: "Unsere Männer kämpfen wie wütende Bestien, was gegen andere, viel besser organisierte menschliche Feinde meist nutzlos ist. Es wäre klug, unsere Soldaten in grundlegenden Taktiken und Strategien zu schulen, bevor wir die Kriegshunde loslassen."

 military_leader_boost: "Miliz-Anführer"
 military_leader_boost_desc: "Einige Mitglieder unserer zusammengewürfelten Miliz beweisen, dass sie ein überraschendes Gespür für Kriegslist haben. Wenn wir sie einstufen und ihnen die Führung separater Trupps übertragen würden, würden wir unsere eigenen Streitkräfte besser verwalten können."

 military_doctrine_II: "Fortgeschrittene Miliz-Taktiken"
 military_doctrine_II_desc: "Durch das Studium alter Romane und der Erinnerungen derjenigen, die in der Miliz gedient haben, konnten wir einige Taktiken grob rekonstruieren, die in der Metro eingesetzt werden können. Sie ist nichts im Vergleich zur Polis, aber sie ist besser als nichts."

 militia_experience: "Lehren der vergangenen Kriegen"
 militia_experience_desc: "Der Große Vaterländische Krieg und Afghanistan sind lange her, aber wir dürfen sie nicht vergessen, damit wir nicht die gleichen Fehler machen."

 bolstering_forces: "Verstärkt unsere Reihen"
 bolstering_forces_desc: "Wir müssen wachsam bleiben, denn wer weiß schon so genau, was sich in der endlosen Dunkelheit der Metro noch verbergen könnte? Unsere Armeen müssen mit mehr Truppen ausgestattet werden, daher werden wir Söldner anheuern und mehr unserer Männer rektrutieren."
 
regimental_training: "Regelmäßige Übungen"
 regimental_training_desc: "Die Kombination aus richtigen Übungen, Beweglichkeitstraining und gründlicher Vorbereitung verleiht unseren Soldaten Kompetenz im Kampf. Sie werden vielleicht nie mit den Rangers oder den Kshatriya aus Polis mithalten können, aber unsere Truppen wissen genau, was hinter ihnen liegt, wenn sie kämpfen."

 guerilla_tactics: "Guerilla-Taktiken"
 guerilla_tactics_desc: "Die Bevölkerung der Metro ist begrenzt. Indem wir direkte Konfrontationen, Täuschungen und begrenzte Scharmützel vermeiden, können wir den Feind ermüden und übermächtige Gegner und große, wenn auch menschliche Bedrohungen überwinden."

 military_tactics: "Militär-Taktiken"
 military_tactics_desc: "Vorkriegsveteranen und alte Armeehandbücher haben es unseren Offizieren ermöglicht, tatsächlich über das taktische Know-how zu verfügen, um als solche zu funktionieren, und in ihren Reihen ein Gefühl von Professionalität vermittelt"

 militia_equipment: "Füllt die Lager"
 militia_equipment_desc: "Durch den Kauf von Waffen von vorbeikommenden Händlern und das Aufräumen der in der Metro verstreuten Vorräte sind wir in der Lage, einen Überschuss an Schusswaffen für unser Militär bereitzustellen."

 gun_research_boost: "Unsere eigenen Waffen"
 gun_research_boost_desc: "Der Kauf von Waffen bei vorbeikommenden Händlern reicht nicht für eine stehende Armee aus. Wir müssen Raum für Handwerker und Techniker schaffen, um unsere eigenen Waffen herzustellen"

 gun_production_boost: "Handgefertigte Waffen"
 gun_production_boost_desc: "Bisher waren wir auf die Verwendung zumindest einiger speziell angefertigter Schusswaffenteile angewiesen. Indem wir Methoden entwickeln, diese selbst herzustellen, können wir unsere Abhängigkeit vom Handel oder Plündern verringern und die Effizienz steigern."

 clearing_clutter: "Aufräumkommando"
 clearing_clutter_desc: "Ein Großteil unserer Primärstation und unserer Tunnel ist nach wie vor mit Trümmern aus Beton, Stahl und altem Müll übersät. Indem wir unsere Bevölkerung für die Restaurierung des Bahnhofs mobilisieren, können wir beginnen, diese Flächen effizienter zu nutzen."

 industrial_research_effort: "Sammelt technisches Wissen"
 industrial_research_effort_desc: "Bücher in der Metro sind ein Luxus und eine Seltenheit, ebenso wie die Fähigkeit, viele der Dinge zu schaffen und zu tun, die eine Ausbildung erfordern. Indem wir unsere technischen Informationen ezusammentragen und in einer Bibliothek bündeln und unsere eigenen Handbücher schreiben, können wir diese Fähigkeiten für zukünftige Generationen bewahren."

 infrastructure_effort_3: "Bemannte Wachposten"
 infrastructure_effort_3_desc: "Auch wenn es naheliegend erscheint, Wachposten am Rande einer Station zu haben, haben wir diese noch nicht regelmäßig besetzt. Durch einen rotierenden Wachdienstplan können wir rund um die Uhr Sicherheit und Handel an unseren Toren gewährleisten."

 workshops: "Gemeinsame Werkstationen"
 workshops_desc: "Eine alte sowjetische Tradition: Indem wir Gemeinschaftswerkstätten haben, in denen Handwerker und Kunsthandwerker ihre Arbeit mit Unterstützung der Station erledigen können, können wir die Produktion von denen verdrängen, die sich vorher nicht darum gekümmert oder es nicht versucht hätten."

 workshops_2: "Ministerium für Arbeit und Produktion"
 workshops_2_desc: "Da unsere Bau- und Produktionskapazitäten ein angemessenes Ausmaß erreicht haben, müssen wir weitere Bemühungen nun mithilfe eines Arbeits-Ministeriums organisieren und autorisieren, da wir nur über begrenzte Räume und Ressourcen verfügen und keinen weiteren Wildwuchs dulden können."

 gunsmith: "Heuert Waffenschmiede an"
 gunsmith_desc: "Wir verfügen derzeit weder über das technische Wissen noch über die Produktionsressourcen oder können unsere eigenen Schusswaffen ordnungsgemäß herstellen. Daher werden wir eine Reihe von Experten einstellen, die es uns ermöglichen, eine Grundlage für die Waffenproduktion zu schaffen."
 
 gunsmith_2: "Unsere eigene Waffenkammer"
 gunsmith_2_desc: "Durch den Einsatz der angeheuerten Experten und der Werkzeuge, die wir durch den Handel erworben haben, ist es uns gelungen, unser eigenes lokales Produktionszentrum für Schusswaffen zu schaffen. Obwohl es nach den Maßstäben der Vergangenheit äußerst grob wäre, bleibt die Fähigkeit, Waffen und Munition herzustellen, von unschätzbarem Wert."

 infrastructure_focus: "Effiziente Planung"
 infrastructure_focus_desc: "Es ist selten, Männer zu finden, die in der staatlichen Planungsabteilung oder im öffentlichen Dienst gedient haben, bevor die Oberfläche unbewohnbar wurde, aber es ist uns gelungen, eine solche Person einzustellen. Unter seiner Anleitung haben wir ein Planungskomitee gebildet, damit wir unseren Raum und unsere Ressourcen besser nutzen können."

 gunsmith_3: "Fokus auf Bewaffnung"
 gunsmith_3_desc: "Die weitere Entwicklung und Investition in unsere Militärwerkstätten hat es uns ermöglicht, dass es einen Bereich unser Hauptstation gibt, der der militärischen Entwicklung gewidmet ist, beispielsweise der Schaffung von Schusswaffen und Kriegswagons, die es unseren Soldaten ermöglichen sollen, mit Waffen in Hülle und Fülle in die kalten Tunnel der Metro zu marschieren."

 gunsmith_4: "Distrikt der Waffenschmiede"
 gunsmith_4_desc: "In jeder Station, in jeder Ecke gibt es mittlerweile einen ganzen Bezirk, der ausschließlich der Produktion militärischer Waffen und Ausrüstung gewidmet ist, man fühlt sich an manchen Tagen fast wie im alten Moskau! Dies ist ein gewaltiger Fortschritt in unserer Branche und festigt uns als bedeutenden Hersteller von Schusswaffen in der Metro."

 workshops_3: "Fokus auf Industrie"
 workshops_3_desc: "Die weitere Entwicklung und Investition in unsere zivilen Werkstätten hat es ermöglicht, dass es einen Bereich unserer Hauptstadtstation gibt, der der zivilen Entwicklung gewidmet ist, wie zum Beispiel der Herstellung von Gütern und dem Bau, der es unseren Leuten ermöglichen soll, mit reichlich Handelsgütern in die kalte Metro zu marschieren."

 workshops_4: "Arbeiterviertel"
 workshops_4_desc: "In jeder Station, in jeder Ecke gibt es mittlerweile einen ganzen Bezirk, der der Arbeitsverwaltung und der Produktion von Gütern gewidmet ist, man fühlt sich an manchen Tagen fast wie im alten Moskau! Dies ist ein gewaltiger Fortschritt in unserer Branche und festigt uns als bedeutender Warenproduzent in der Metro."

 workforce: "Mobilisiert unsere Arbeitskräfte"
 workforce_desc: "Die Organisation unserer Arbeiter wird es uns ermöglichen, die Produktion enorm zu steigern, da den Einzelnen kaum Anweisungen oder Ziele gegeben werden, was kein Erfolgsrezept ist. Wir werden öffentliche Arbeits- und Arbeitstrupps bilden, um ihre Fähigkeiten richtig zu nutzen."

 industry_boost: "Produziert Industrielle Ausrüstung"
 industry_boost_desc: "Obwohl wir über eine gewisse Produktionsbasis verfügen, fehlen uns noch die richtigen industriellen Werkzeuge und Geräte, um unser volles Potenzial zu nutzen. Mit anderen Worten: Wir haben das Holz, aber nicht die Säge. Durch Handel und Plünderung könnten wir versuchen, die richtigen Werkzeuge zu erwerben, um die vollständige Industrialisierung zu ermöglichen."

 infrastructure_projects: "Infrastruktur-Projekte"
 infrastructure_projects_desc: "Obwohl viele unserer Hauptsektoren, Stationen und Tunnel bereits geräumt und einige sogar wieder funktionsfähig gemacht wurden, gibt es noch viel zu tun. Wir können unsere öffentliche Arbeitsorganisation erneut mobilisieren, um die Trümmer zu beseitigen und kleine Transportsysteme einzurichten, um Menschen zwischen unseren großen Stationen zu befördern, und einen Teil der Armee einsetzen, um gefährliche Abschnitte der Tunnel zu säubern."

 mobilise_the_labour: "Födert das Handwerk"
 mobilise_the_labour_desc: "Indem wir den Handwerkern, die in unseren Stationen tätig sind, jeden Monat einen kleinen Bonus gewähren und weiterhin öffentliche Werkstätten und günstige Ressourcen schaffen, können wir sowohl unsere Bevölkerung als auch die Qualität der Waren und der Handwerkerklasse verbessern."

 strongarm_caravans: "Schwer bewaffnete Karawanen"
 strongarm_caravans_desc: "Die Karawanen werden nicht länger mit rücksichtsloser Hingabe durch unsere Station ziehen, entweder sie handeln dort, wo sie durchkommen, oder sie handeln überhaupt nicht. Wir können sie mit einem kalten Stahllauf nach hinten höflich daran erinnern, wenn sie die Botschaft nicht sofort verstehen."

 bastion_of_trade: "Ein Zentrum des Handels"
 bastion_of_trade_desc: "Von allen Stationen ist ein Flüstern zu hören, das Flüstern darüber, dass unsere Stationen zu den besten für den Handel in der Metro gehören! Auch wenn dies wahr sein mag oder auch nicht durch gewalttätige Methoden beeinflusst werden kann, steht unsere Auswahl an Waren nur an zweiter Stelle, idrekt nach der Hanse."

 laboratory: "Gründet ein Labor"
 laboratory_desc: "Die Einrichtung eines Labors würde bessere Forschungs- und Entwicklungsanstrengungen ermöglichen. Auch wenn dies nichts im Vergleich zu den Testeinrichtungen in Polis ist, würde es die Qualität und Quantität unserer Forschungskapazitäten verbessern."

 scavenging_efforts: "Oberflächen-Expeditionen"
 scavenging_efforts_desc: "Durch die Organisation und Entsendung offizieller Erkundungsteams an die Oberfläche sind wir in der Lage, Vorräte und Plünderungen im gesamten zerstörten Moskau zu finden und zu sichern."

 scavenging_scrap: "Sammelt Schrott"
 scavenging_scrap_desc: "Wir werden Plünderer an die Oberfläche schicken, um nach Ansammlungen von Altmetall zu suchen, und sie werden mit dem zurückkehren, was sie dort oben finden können."

 scavenging_electronics: "Sammelt Elektronik"
 scavenging_electronics_desc: "Wir werden Plünderer an die Oberfläche schicken, um nach elektronischen Geräten zu suchen, und sie werden mit dem zurückkehren, was sie dort oben finden können."

 scavenging_electricity: "Sammelt Stromspeicher"
 scavenging_electricity_desc: "Indem wir Plünderungstrupps an die Oberfläche schicken, um nach Generatoren oder Batterien zu suchen, können wir unsere Stromversorgung und den Strom insgesamt in unseren Stationen aufrechterhalten."

 scavenging_fuel: "Sammelt Treibstoff"
 scavenging_fuel_desc: "Wir werden damit beginnen, Stalker an die Oberfläche zu schicken, um nach Benzin oder Treibstoff zu suchen, indem wir sie aus Autowracks oder Tankstellen absaugen, und mit dem, was sie finden, zurückkehren."

 scavenging_alloys: "Sammelt Legierungen"
 scavenging_alloys_desc: "Legierungen sind langlebige Materialien, die für eine Vielzahl von Spezialgeräten benötigt werden."

 scavenging_components: "Sammelt Bauteile"
 scavenging_components_desc: "Komponenten sind feiner, detaillierter und ebenso kostbare Materialstücke, die für hochspezialisierte Geräte oder Werkzeuge benötigt werden."

 community_1: "Herrschaft des Volkes"
 community_1_desc: "Menschen sind dazu geschaffen, zusammenzuarbeiten. In der Zeit nach dem Krieg und davor sind viele Tyrannen auf- und abgestiegen mit dem Versprechen, die Menschen in ihrem Kampf zu vertreten und ihnen zu helfen. In diesen neuen Zeiten können wir uns eine radikal neue Lösung leisten, für die Menschen, für die Menschen und durch die Menschen."

 community_2: "Die Massen erheben sich"
 community_2_desc: "Die Unterdrückten und Besitzlosen, die Sanftmütigen und die Armen, das sind unsere Reihen. Aber aus den Abgründen des Vergessenen wird die neue Welt auferstehen, gib uns deine Müden und deine Armen, und möge das Volk ohne Herren oder Tyrannen voranschreiten!"

 community_3: "Ideale von Freiheit"
 community_3_desc: "Unsere Freiheit ist nicht die Freiheit der Hanse, denn wir glauben nicht, dass Freiheit nur die des Eigentums ist, sondern unsere Freiheit ist das Recht, ein Leben ohne Elend, ohne Blutvergießen, ohne Not und ohne Hunger zu führen. Wir streben nach Freiheit, sowohl in unseren Funktionen als auch in unserem Amt und heißen alle willkommen, die unsere Vision einer freien und gerechten Menschheit teilen."

 council_1: "Ein Rat der Mächtigen"
 council_1_desc: "Wir erinnern uns an die Sowjets und die Macht, die sie innehatten, an die Arbeiterräte und die Führung durch Experten. Dies ist der Weg nach vorn, der weder durch kleinliche Demokratie im westlichen Stil noch durch Tyrannei oder Unterdrückung aufgehalten wird. Unser einziges Ziel ist Entwicklung und Menschlichkeit, und unser Rat hat gelebt, lebt und wird leben, bis unsere Tat vollbracht ist. 

 council_2: "Arbeiterräte"
 council_2_desc: "Der Arbeiter ist der Eckpfeiler jeder Gesellschaft, daran erinnern wir uns noch aus unserer Zeit unter den Sowjets. Ohne Arbeit kann unser Fortschritt nicht erreicht werden, und ohne Fortschritt ist unsere Vision unerreichbar. Wir garantieren das Recht auf einen 8-Stunden-Tag, die Einrichtung eines kleinen Rates für jede Branche und die Verankerung der Arbeitnehmerrechte in unserem Gesetz."

 council_3: "Träume von Fortschritt"
 council_3_desc: "Wir werden die Zukunft erreichen, der Himmel steht uns vielleicht nicht offen, aber eines Tages werden wir wieder Raketen in die Galaxis abschießen, die mit Menschen und nicht mit Atombomben bewaffnet sind. Wie die Polis werden wir Wissenschaftler und Visionäre an jeder Wand haben, Künstler der neuen Welt vor uns und unsere Industrie und die Arbeiter, die dem Ganzen zugrunde liegen. Zur Sonne! Zu den Sternen!"

 oligarch_1: "Herrschaft der Wenigen"
 oligarch_1_desc: "Ein Mann allein kann nicht regieren, aber auch nicht die gesamte Metro, ihre Räte sind wirkungslos und zu ineffizient, daher gibt es nur noch eine Wahl: Unsere Elite, sei sie wirtschaftlich, politisch oder beides, wird die Politik unserer Stationen kontrollieren und uns mit ihren überlegenen Methoden und Fähigkeiten voranbringen. Schließlich braucht es nur ein paar gute, starke Männer, um eine ganze Nation zu inspirieren und wie schwer könnte es mit nur ein paar tausend Männern wirklich sein?

 oligarch_2: "Reichtum durch Macht"
 oligarch_2_desc: "Unsere Stärke liegt in unserem Reichtum, und unser Reichtum resultiert aus der Macht unserer Elite und den Geschäftsvorhaben, die sie organisiert und betreibt. Möglicherweise müssen wir unserer Bevölkerung Zugeständnisse machen, aber im Großen und Ganzen können wir unseren Betrieb ohne viel Zutun des Staates selbst aufrechterhalten."

 oligarch_3: "Ökonomisches Machtzentrum"
 oligarch_3_desc: "Wir haben vielleicht nicht die glücklichste Bevölkerung, aber hier finden Sie alles, was Sie sich wünschen können! Männer werden sich nicht beschweren, solange sie genug Dinge zum Kaufen und Besitzen oder genug Arbeit haben, die sie erledigen können. Von dieser Wirtschaft aus können wir unseren Einfluss Stück für Stück auf die gesamte Metro ausdehnen."

 dictatorial_1: "Der Despot"
 dictatorial_1_desc: "Demokratie ist eine Lüge, die Menschheit hat noch nie Sicherheit und Fortschritt in den Händen der Vielen gefunden. Der erbärmliche bolschewistische Abschaum verbreitet dieses Gefasel, und bald werden sie im Namen unseres großen Führers den Stich unserer Schwerter spüren."

 dictatorial_2: "Überleben des Stärksten"
 dictatorial_2_desc: "Seit jeher konkurriert das Leben erbittert ums Überleben. Die Menschheit hat die Oberhand gewonnen, und bald werden wir wieder die Einzigen sein, die noch übrig sind, während unsere Feinde vor uns liegen, denn wir sind der Homo Superior."

 dictatorial_3: "Der ewige Kampf"
 dictatorial_3_desc: "Es gibt kein Leben, ohne mit dem Schmutz und der Degeneration von Hunden und Menschen zu kämpfen. Viele Menschen vor uns haben erkannt, dass es einen ewigen Kampf zwischen der reinen Rasse und dem Mutanten gibt. Wir sind die reine Rasse, und in unserem Kampf, meinem Kampf und ihrem Kampf werden wir alle Widrigkeiten durch den Sieg des Willens überwinden.“

 building_slot_effort: "Wohnraum organisieren"
 building_slot_effort_desc: "Wir haben den Platz, den wir in unseren Stationen haben, deutlich unzureichend ausgenutzt, und aus diesen Gründen konnten wir nur eine begrenzte Menge Industrie aufbauen. Mit einer alten sowjetischen Weisheit können wir unsere Wohnungen und unsere Industrie verdoppeln, um den Raum, der für die Schaffung von Industrien und Produktion nutzbar ist, erheblich zu vergrößern."

 dictatorial_ideology_change: "Diktatur der Mehrheit"
 dictatorial_ideology_change_desc: "Die Notwendigkeit von mehr als einem Führer ist ein falscher Impuls von Bolschewiki und anderen Lügnern. Das Volk ist unter der Herrschaft eines einzigen Führers vollkommen glücklich. Schließlich ist der Wille des Führers der Wille der Mehrheit, jeder andere Wille ist falsch."

 oligarch_ideology_change: "Die herrschaft der Wenigen"
 oligarch_ideology_change_desc: "Es ist schwierig, die Macht in den Händen eines einzelnen Mannes zu halten. Die Eliten, die Crème de la Crème, das sind die Menschen, die die neue Welt und ihre vielen Schwierigkeiten realistisch meistern können. Manche nennen uns vielleicht korrupt, aber wir nutzen einfach nur unsere Position aus."

 council_ideology_change: "Der Rat triumphiert"
 council_ideology_change_desc: "Ein Rat der Besten und Klügsten, ohne die kleinlichen Zwänge der Demokratie, so werden wir in ein neues goldenes Zeitalter der Menschheit vordringen. Unsere Vorfahren blicken stolz auf uns, während wir das Erbe der Räte von vor langer Zeit fortführen."

 community_ideology_change: "Herrschaft der Massen"
 community_ideology_change_desc: "Wir brauchen weder Könige noch Herrscher auf unseren Stationen, wir arbeiten ganz gut alleine! Die Versuchung zur Autokratie und Konsolidierung hat über Jahrtausende nur zu Leid unter den Werktätigen geführt, wir werden den Kreislauf durchbrechen und frei leben!"

 gun_spec_ops_effort_1: "Stalker-Operationen"
 gun_spec_ops_effort_1_desc: "Stalker sind diejenigen, die den Mut haben, sich an die Oberfläche zu wagen. Die Geschichten über schneidige, mit Gasmasken bekleidete Truppen, die Wächtern ausweichen oder auf Türmen gegen Dämonen kämpfen, zeigen die wilde Faszination der Bevölkerung für diese mutigen Helden. Andere Stationen haben bereits damit begonnen, eigene Stalker-Truppen aufzustellen. Warum tun wir das nicht?“
 military_tactics_2: "Organisierte Streitmacht"
 military_tactics_2_desc: "Unser Gemeinwesen hat viele Jahre voller Streit und Konflikte überdauert. Von einfachen Milizen bis hin zu einer vollwertigen Streitmacht, die jede paramilitärische Brigade aus der alten Welt erröten lassen würde. Unsere Soldaten haben durch dick und dünn gegangen und jetzt ist es an der Zeit, geeignete Kandidaten für ihre Führung zu finden."

 gun_draisines_effort_1: "Chop Shops"
 gun_draisines_effort_1_desc: "Viele Nachbarn haben es inzwischen geschafft, klapprige Wartungskarren und -wagen wieder funktionstüchtig zu machen. Mit einem Satz Räder können wir Männer und Vorräte in nur wenigen Minuten und nicht in Stunden über unser Territorium transportieren. Wir wissen, dass private Kaufleute und Handwerker diese Buggys bereits nutzen, aber jetzt beginnen Nationen wie die Hanse oder die Rote Linie, auf eine motorisierte Streitmacht umzusteigen. Diejenigen unter uns mit zweifelhaften Kenntnissen im Ingenieurwesen sind der Meinung, dass wir versuchen sollten, diese Idee zu reproduzieren. Die beste Lösung wäre, ein altes Wartungsdepot aufzubrechen, obwohl einige sogar der Meinung sind, dass wir über genügend Mittel verfügen, um mit der vollständigen Rekonstruktion von Draisinen aus alten, unbenutzten Teilen zu beginnen."


