  AVT_mayakovskaya: "Mayakovskaya Station"
  AVT_mayakovskaya_desc: ""
  AVT_moved_mayakovskaya: "Wir ernennen die Mayakovskaya zu unserer Operationsbasis."

  AVT_mayakovskaya_1: "Die faschistische Bedrohung"
  AVT_mayakovskaya_1_desc: "Das Reich wurde vor langer Zeit besiegt, ist nun aber wieder auferstanden. Eine grobe Verhöhnung seines früheren Ichs. Wir müssen es noch einmal auslöschen."
  AVT_mayakovskaya_1a: "Waffenverteilung"
  AVT_mayakovskaya_1a_desc: "Eine bewaffnete Bevölkerung ist eine höfliche Bevölkerung. Da Faschisten und verdammt noch mal was sonst noch an den Türen von Majakowskaja hämmert, ist es klug, den Abschaum dieser erbärmlichen Station zu bewaffnen."
  AVT_mayakovskaya_1b: "Trainiert die Bevölkerung"
  AVT_mayakovskaya_1b_desc: "Diese armen Kerle schaffen es gerade noch, den Hungertod zu verhindern. Wie soll man sie dem Reich gleichstellen? Abgesehen von einigen warmen Mahlzeiten könnten einige Trainingseinheiten helfen. Oder noch besser – bessere Waffen?"
  AVT_mayakovskaya_1e: "Waffenvorräte aufstocken"
  AVT_mayakovskaya_1e_desc: "Wir haben derzeit nicht genug Schrottgewehre oder auch nur Messer, um mit dem Reich auf Augenhöhe zu sein. Wir müssen unseren Vorrat vergrößern."
  AVT_mayakovskaya_1c: "Panzerbüchsen"
  AVT_mayakovskaya_1c_desc: "Schrottgeschosse könnten einen Nosalis zuverlässig ins Wanken bringen. Aber es prallt direkt von allem ab, was stärker ist als eine Holzplatte. Wir brauchen stärkere Waffen, wenn wir Schmiedeeisen oder Stahl durchdringen wollen."
  AVT_mayakovskaya_1d: "Dosenöffner"
  AVT_mayakovskaya_1d_desc: "Reich Panzers are no match for a perfectly aimed bullet. Watch as their 25 tonne kampfmachine engulfs into flames."
  AVT_mayakovskaya_1f: "Panzerstopper"
  AVT_mayakovskaya_1f_desc: "Ka-booom!"
  AVT_mayakovskaya_2: "Unser eigener Hof"
  AVT_mayakovskaya_2_desc: "Mit Nazis im Süden und abscheulichen Kapitalisten im Norden stecken wir in einer wirklich beschissenen Lage fest. Es gibt jedoch weitaus schlechtere Orte, an denen wir unsere Operationsbasis aufbauen können"
  AVT_probe_reich_defences_desc: "Wenn wir ernsthaft vorhaben, es mit dem Reich aufzunehmen."
  AVT_mayakovskaya_scrappers: "Plünderer der Mayakov"
  AVT_mayakovskaya_scrappers_desc: "Einmal verlassen, ist die Mayakovskaya mit Müll und ausgedienten Schrottstücken übersät. Der Müll des einen..."
  AVT_mayakovskaya_22: "Geteilte Zugeständnisse"
  AVT_mayakovskaya_22_desc: "Wenn wir die Mayakov von einem Drecksloch in einen Palast verwandeln wollen, brauchen wir viel mehr Leute die ihren Beitrag hierzu leisten. Noch nicht mit vorgehaltener Waffe, aber mit einem Schubs und mit diesem Schubs werden mehr Leute bereit sein, mitzumachen."
  AVT_mayakovskaya_trade_outpost_1: "Werft die Faschisten-Unterstützer raus"
  AVT_mayakovskaya_trade_outpost_1_desc: "Nachdem das Reich erledigt und entstaubt ist, ist es nun an der Zeit die Revolution weiter auszuweiten. Der distanzierte kapitalistische Außenposten im Norden scheint ein perfekter nächster Schritt auf dem Weg zum metroweiten Sozialismus zu sein."
  AVT_mayakovskaya_trade_outpost_2: "Von Gleichgesinnten"
  AVT_mayakovskaya_trade_outpost_2_desc: "Der Handelsaußenposten Belorusskaya hegt gewisse Sympathien für unsere Sache. Während die Oberschicht der Bahnhofsverwaltung ein Leben in opulentem Luxus führt, verdient die untere Bevölkerung kaum ihren Lebensunterhalt."
  AVT_covert_sorties: "Verdeckte Einsätze"
  AVT_covert_sorties_desc: "Bei all diesen offenen Feindseligkeiten vermissen einige der Jungs die guten alten Zeiten, in denen sie im Dunkeln herumschlichen und einem ahnungslosen Faschisten oder Tankie hinterrücks umlegten. Einen Ausflug, der alten Zeit zuliebe?"
  AVT_dregs_to_our_assistance: "Unterstützung vom Gesindel"
  AVT_dregs_to_our_assistance_desc: "Die Menschen der Mayakovskaya scheinen sich unserer Sache anzuschließen. Der Versuch, Arbeiterrevolution und internationale Arbeitersolidarität in ihre dicken Schädel zu bohren, hat sich gelohnt. Natürlich wurde dabei auch die Grundprinzipien verwässert."
  AVT_incite_stalag_uprising: "Zettelt Aufstände im Reich an"
  AVT_incite_stalag_uprising_desc: "Die Vernichtungslager des Reiches kann man nur als Hölle auf Erden bezeichnen. Selbst die Erwähnung ihrer Existenz erzeugt eine unangenehme Aura um unsere Kameraden. Einige der Jungs kennen sogar geheime Tunnel, die zum Stalag selbst führen. Wenn wir einige unserer selbstbewussteren Agenten durchschmuggeln können: Stellen Sie sich nur das Blutbad vor, das wir anrichten könnten!"
  AVT_incite_tension: "Erhöht die Spannungen"
  AVT_incite_tension_desc: "Es könnte zu kostspielig sein die Verteidigung des Reiches mit Gewalt zu testen. Warum von außen angreifen, wenn wir die Saat der Revolution von innen heraus säen können?"
  AVT_der_fuhrers_face: "Das Gesicht des Führers"
  AVT_der_fuhrers_face_desc: "[RCH.Leader.GetName]s' Bild hängt an jeder Wand und jedem Gebäude ihrer Stationen. Stellen Sie sich vor wie viel Chaos entstehen würde, wenn wir ein oder zwei davon beschmutzen würden? Wie Wölfe werden sie anfangen, sich gegenseitig zu zerfleischen."
  AVT_mayakovskaya_3: "Waffenausgabe"
  AVT_mayakovskaya_3_desc: "Wenn es mehr Waffen als Menschen gibt, sollten alle davon profitieren"
  AVT_mayakovskaya_3a: "Krieg der Klassen"
  AVT_mayakovskaya_3a_desc: "Der Arbeiter kann nie wirklich frei sein, solange er gezwungen ist, mit der Bourgeoisie zusammenzuarbeiten, oder noch schlimmer, mit den Faschisten. Nur ein kompromissloser Klassenkampf kann uns die Freiheit bringen, die wir uns wünschen, auch wenn dies den gleichzeitigen Kampf gegen die Kapitalisten und die Faschisten bedeutet."
  AVT_mayakovskaya_3b: "Bis zum Ende"
  AVT_mayakovskaya_3b_desc: "Die Geschichte wiederholt sich, erstens als Tragödie, zweitens als Farce. Beide Male stürzte der Turm des Elends und Leids in Flammen ein."
  AVT_mayakovskaya_3c: "Interstationale Armee"
  AVT_mayakovskaya_3c_desc: "Angesichts der faschistischen Bedrohung spielt die Klasse keine Rolle. Wir werden eine Armee bilden, in der alle willkommen sind."

