l_german:
 STG_strogino:0 "Strogino Station"
 STG_strogino_desc:0 "Von ihren Nachbarn abgeschnitten, ist es fast schon überraschend zu sehen dass die Station es geschafft hat eine recht hohe Lebensqualität zu halten. Vor allem liegt das wohl an der geringen Bevölkerungsdichte, die das Leben hart, aber erträglich macht."