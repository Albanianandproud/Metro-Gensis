  RCH_commander_3:0 "Ulrich'"
  RCH_commander_3_desc:0 "Es gibt niemanden, NIEMANDEN, der die Kommunisten so sehr hasst wie Ulrich. Niemand weiß genau woher dieser unbändige Hass kommt, doch man ist sich einig darüber, er hasst die Kommunisten mehr als der Führer selbst es tut"

