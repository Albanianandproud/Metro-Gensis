l_german:
 ratfolk:0 "Skaven"
 ratfolk_desc:0 "Mutierte Menschen, die die nördlichen Stationen der Serpukhovsko-Timiryazevskaya-Linie bewohnen. Als 2014 eine gewaltige Rattenhorde durch Timiryazevskaya fegte, waren diejenigen, die nicht an die Dmitrovskaya fliehen konnten, den wilden Rattenhorden schutzlos ausgesetzt.\n\nDiejenigen die überlebten, infizierten sich jedoch mit allerhand Krankheiten und wenn sie an nahegelegenen Stationen Zuflucht suchten, wurde ihnen jegliche Hilfe verweigert, um die Ausbreitung der Infektion zu verhindern. Die Menschen waren gezwungen, dort inmitten der Ratten zu bleiben. Sie gewöhnten sich langsam an das Virus und veränderten sich dabei immer. Nun werden sie mit jeder neuen Generation viel „rattenähnlicher“ in ihrem Aussehen; schwarze Iris, dickere Nägel und ausgeprägtere Gesichtszüge.\n\nTrotz dieser Veränderungen sind sie in Intellekt, Sprache und Kultur sehr wohl noch menschlich. Aber die „sauberen“ Menschen aus der inneren Metro denken anders und betrachten sie im Allgemeinen kaum mehr als abscheuliche Mutanten."

 skaven:0 "Vereinigung der Skaven-Stationen"
 skaven_desc:0"Die Vereinigung der Skaven-Stationen besteht ausschließlich aus Skaven und ist ein Stationenbund, der aus der Bibirevo, der Otradnaya und der Vladykino besteht. Das Triple C stellt ein Biogefährdungssymbol dar und dient auf amüsante Weise dazu, Nicht-Skaven aus ihrem Reich zu „vertreiben“. Oft stellen sie auch ihre mutierte Veranlagung zur Schau, um von den 'normalen' Menschen in Ruhe gelassen zu werden. Dennoch unternimmt die Führung große Anstrengungen zur Erhaltung und Fortführung ihrer „Menschlichkeit“. Bildung, Kultur und Lernen werden allesamt gelebt und gefördert. Man könnte sogar argumentieren, dass die Skaven viel mehr von ihrer Menschlichkeit bewahrt haben als die meisten Gemeinschaften der restlichen Metro."

 caliphate:0 "Das nördliche Kalifat"
 caliphate_desc:0 "Eine feudale islamische Gesellschaft, die strikt einer Kaste ethnischer Reinheit folgt. Das nördliche Emirat liegt auf der Linie Petrovsko-Razumovskaya und wird von Skaven bevölkert. Sie befinden sich aktuell in einem Heiligen Krieg – Gaswat – gegen die Satanisten von der Timiryazevskaya."