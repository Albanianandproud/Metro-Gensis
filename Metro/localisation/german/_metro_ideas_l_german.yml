 ## Flamethrower Ban System ## 

 flamethrower_restriction_ban:0 "Geltendes Flammenwerfer-Verbot"
 flamethrower_restriction_ban_desc:0 "Auch wenn die Verwendung von §YFlammenwerfern§! nicht direkt verboten ist, so ist ihr Einsatz gegen menschliche Gegner in der ganzen MEtro verpönt.\nNach ihrem grausamen Einsatz während des §C@HNZHanse - @REDRotlinien-Krieges§! auf beiden Seiten, verbot der Vertrag von §Y[361.GetName]§! ihre Verwendung im Krieg."

 flamethrower_ban: "\nAls Unterzeichner des Abkommens ist unsere §YFlammenwerfer§!-Forschung §Reingeschränkt!§!\n"

 lifting_flamethrower_restriction_ban: "\nNationen werden §Rnegativ§! darauf reagieren!\n\n"

