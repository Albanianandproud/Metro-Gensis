### Starting Ideas ###

  arbat: "Arbat-Konföderation"
  arbat_desc: "


Die Arbat-Konföderation ist eine gemäßigt kapitalistische Gemeinschaft.Sie wird sowohl von russischen als auch von kaukasischen Nationalitäten bewohnt. Einst verfügte die Gemeinde über beträchtliche Macht und Bevölkerung, doch von dem verheerenden ersten Metrokrieg hat sie sich bis zum heutigen Tage nicht erholt. Stattdessen hat sich die Konföderation inzwischen auf Stalker-Aktivitäten spezialisiert, da Arbats Einfluss und Ruhm heute kaum mehr als nur ein Traum vergangener Zeiten sind."

  bump_in_the_night: "Ein Klopfen in der Nacht"
  bump_in_the_night_desc: "Berichte über das Verschwinden von Bewohnern aus der Kiewskaya haben die Konföderation erschüttert. Besonders Kinder scheinen im Schutze der Dunkelheit entführt worden zu sein, was zu geradezu panischen Zuständen an der Station geführt hat. Viele der wohlhabenderen Bürger flüchteten bereits in die Nachbarstationen.\n\n§gWenn wir herausfinden, wer oder was unsere Kinder stiehlt, und wir diese Bedrohung beseitigen, würde das unserer Bevölkerung Sicherheit geben§!"

  ARB_lack_of_expertise: "Mangel an Expertise"
  ARB_lack_of_expertise_desc: "Seit dem Metrokrieg fehlt es uns an Fachkräften. Unsere Büchsenmacher und Administratoren suchten nach kompetenten, neuen Mitarbeitern, die uns bei den täglichen Aktivitäten unterstützen."

  ARB_swords_to_ploughs: "Praktische Anstrengungen"
  ARB_swords_to_ploughs_desc: ""

  ARB_new_expertise: "Neue Expertise"
  ARB_new_expertise_desc: ""

