l_english:
 MSU_mythical_city: "Emerald City"
 MSU_mythical_city_desc: "Rumours circulated across the breadth of crummy-bars of the Metro tell about an illusive station community across the deep waters of the Moskva river. This community primarily of scientists and students originating from Moscow University, were shielded from nuclear armageddon hunkered in their fortress-stations of University, Prospekt Vernadskogo and Yugo-Zapadnaya. The known current extent, or even its existance, is shrouded in mystery - only existing in fables told through tall tales; accounts from friends of a friend or simply gossip by travelling merchants. As truth and myth blurs and devolves further into legend one thing still remains. There exists SOMETHING... or SOMEONE living across Vorobyovy Gory station."


MSU_isolation_tt: "£trigger_no Reclaim Abandoned States."

MSU_science_directorate: "Nation of Scientists"
MSU_science_directorate_desc: ""
MSU_free_scavenging_tt: "\n§YScavenging Decisions are Free§!"

MSU_isolationism: "Isolationist"
MSU_isolationism_desc: "Partitioned across the Moskva river, [MSU.GetName] has secured itself a impregnable bulwark against any potential threats from the rest Metro. Whether that be man, beast or anything else entirely. Revealing themselves at this current point in time would ultimately give up their safety and security."

