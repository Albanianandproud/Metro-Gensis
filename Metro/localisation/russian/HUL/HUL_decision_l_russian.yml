l_russian:
 HUL_war_with_aviators_category: "Конфликт с авиаторами"
 HUL_aviator_war_countdown: "Обратный отсчет до схватки"
 HUL_aviator_war_countdown_desc: "Мы давным-давно сражались с авиаторами и вытеснили их из Метро. Однако всё это время они строили планы, тайно планируя снова прорваться в Метро."

 HUL_aviator_mission_category: "Помощь конструкторскому бюро"
 HUL_aviator_mission_give_electronics: "Кредитование электроники"
 HUL_aviator_mission_give_electronics_desc: "После того, как мы отбросили их экспедиционные силы, их усилия по добыче ресурсов свелись к нулю. Удивительно, что они не скатились до простого варварства, но их компьютеры продолжают чирикать, выполняя расчёты. Они клянутся, что их намерения изначально благие, и что они значительно помогут нам заключить сделку. Можем ли мы им доверять?.."
 HUL_already_assisting_aviators: "Уже помогаем §YАвиаторам§!"
 HUL_aviator_mission_give_fuel: "Аренда наших генераторов"
 HUL_aviator_mission_give_fuel_desc: "[AVV.GetName] были выкопаны для долгосрочного проживания. Простая жизнь, но условия значительно превосходят условия Метро. Но в последние месяцы их исследования значительно активизировались, и они оказались в затруднительном положении. Им даже пришлось прибегнуть к нормированию электроэнергии и вернуться к свету свечей, чтобы продолжить учёбу."
 HUL_aviator_mission_give_research: "Оказание технической поддержки"
 HUL_aviator_mission_give_research_desc: "Их подземные бункеры лишь недавно начали расширяться, чтобы компенсировать бурно развивающиеся расследования. Подвалы, канализационные туннели, парковки захватываются и тщательно баррикадируются. Они столкнулись с серьёзными трудностями роста и обращаются к нам за помощью, чтобы обеспечить соблюдение сроков выполнения своих планов."

 HUL_aviator_mission_final_research_mission: "Финальный отрезок"
 HUL_aviator_mission_final_research_mission_desc: "Осталось еще немного... Последнее препятствие."
 HUL_aviator_assistance_give_guns: "Запрос на поставку оружия"
 HUL_aviator_assistance_give_guns_desc: "Старые штамповочные прессы и станки с ЧПУ лежат без дела, но не забыты. Если мы замолвим за них словечко, они готовы прислать оружие."
 HUL_aviator_assistance_produce_combat_ai: "Производство боевых роботов"
 HUL_aviator_assistance_produce_combat_ai_desc: "Простые, примитивные, но невероятно эффективные. Мы можем использовать их для укрепления наших вооружённых сил."
 HUL_aviator_assistance_gear: "Улучшение нашей брони"
 HUL_aviator_assistance_gear_desc: "Инженеры утверждают, что мы могли бы использовать запасные композитные материалы, взятые у Авиаторов, для улучшения снаряжения наших вооруженных сил."
 HUL_aviator_assistance_industry: "Помощь нашим техническим специалистам"
 HUL_aviator_assistance_industry_desc: "[AVV.GetName] могут быть готовы помочь нашим оружейникам улучшить свои навыки. Наверняка у них есть какие-нибудь технические книги или даже запасной штамповочный пресс, с которыми мы могли бы ознакомиться."

 HUL_newpaper_category: "Свободная Пресса"
 HUL_newspaper_spread_mischief: "Распространять ложные слухи о государстве [FROM.GetName]"
 HUL_newspaper_spread_support:  "Оказание поддержки государству [FROM.GetName]"