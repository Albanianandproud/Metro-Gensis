 RED_virus_desc: ""

 RED_long_arm_of_the_state: "Der lange Arm des Staates"
 RED_long_arm_of_the_state_desc: ""

 RED_armored_train: "Panzerzug"
 RED_armored_train_desc: ""
 RED_super_soldaten: "Super-Soldaten-Projekt"
 RED_super_soldaten_desc: ""
 RED_socialist_arms: "Fortgeschrittene Waffen"
 RED_socialist_arms_desc: ""
 
## Sokolnicheskaya ##
 
 RED_development_of_the_red_line: "Entwicklung der Sokolnicheskaya"
 RED_development_of_the_red_line_desc: "Die Rote Linie ist einer der ausgedehntesten und ressourcenreichsten Staaten im gesamten Metroraum, wir haben jedoch Mühe, unseren PLatz voll auszunutzen. Unsere Führung hat beschlossen, dass es nun Zeit ist diesen Fehler zu korrigieren."
 RED_minister_of_reclamation_departments_tt: "Das Ministerium für Rekultivierung wird eingerichtet."

 RED_agricultural_demand: "Agrarnachfrage"
 RED_agricultural_demand_desc: "Ein ständiger Dorn im Auge ist uns der allgegenwärtige Mangel an Nahrungsmitteln. Wenn wir dieses Problem lösen können, machen wir nicht nur unsere Bevölkerung glücklich, sondern erleichtern auch die Versorgung unserer riesigen Armee. Es ist Zeit zu entscheiden, wie dieses Problem gelöst werden kann."

 RED_kolkhozes: "Kolchosen – Kollektivfarmen"
 RED_kolkhozes_desc: "Die Organisation unserer Bauern und Landwirte in Kollektivwirtschaften würde die landwirtschaftliche Produktion verbessern."

 RED_sovkhozes: "Sowchosen – Staatsfarmen"
 RED_sovkhozes_desc: "Der staatseigene Bauernhof und die landwirtschaftlichen Grundstücke würden eine einfachere Verwaltung der Produktion und der für die Befriedigung der Bedürfnisse eingesetzten Arbeitskräfte ermöglichen. Darüber hinaus wird die Macht des Staates innerhalb jeder einzelnen Station durch die Zuteilung von Arbeitskräften und die Überwachung der Produktion erhöht."

 RED_allow_station_autonomy: "Stationsautonomie zulassen"
 RED_allow_station_autonomy_desc: "Obwohl wir es vorziehen am Ende des Tages ein vollständig sowjetisches Denken zu fördern, kümmern wir uns nicht wirklich um das spezifische Tagesgeschehen an unseren Außenstationen, solange sie die Erträge pünktlich liefern. Wenn wir die Augen vor einigen ihrer weniger sowjetischen, aber nicht subversiven, Politiken verschließen, können wir bessere Zusammenarbeit erwarten."

 RED_intergrate_agriculture: "Stationslandwirtschaft integrieren"
 RED_intergrate_agriculture_desc: "Unsere Lebensmittelproduktion leidet seit langem unter ineffizienten Praktiken und einer ungleichen Verteilung der Ressourcen. Indem wir unsere Farmen unter einer einheitlichen Befehlsstruktur vereinen, können wir sicherstellen, dass die richtigen Ressourcen und Menschen am richtigen Ort landen, um die größtmögliche Menge an Nahrungsmitteln zu produzieren. Sie mögen mit der verstärkten Aufsicht nicht zufrieden sein, aber niemand wird hungern müssen."

 RED_increased_pig_output: "Schweinefraß"
 RED_increased_pig_output_desc: "Heutzutage sind Schweine die größte Quelle komplexer Proteine ​​und schmackhafter Nahrung. Während sie nominell mit Essensresten gefüttert wurden, die noch übrig waren, würden sie bei Futterknappheit unterernährt oder jung geschlachtet werden, was zu weniger Fleischertrag führen würde. Da wir nun über ausreichend Nahrung verfügen, können wir spezielle Versorgungsleitungen für Lebensmittelabfälle einrichten, um sicherzustellen, dass die Schweine gut ernährt sind, und damit wiederum sicherzustellen, dass unsere Leute gut ernährt sind."
 RED_increased_pig_output_tt: "Baut §Y1 Zivile Werkstatt§! in jedem Staat mit §Y4§! oder mehr §YInfrastruktur§! auf der §YSokolnicheskaja-Linie§!."
 
 RED_increased_pig_output_2: "Besserer Schweinefraß"
 RED_increased_pig_output_2_desc: "Da die Nahrungsmittelknappheit immer weiter zurückgeht, können wir nun unsere Betriebe auf Schweinefutter umstellen. Da sie für den Menschen nicht so genießbar sind wie Lebensmittel, können wir durch die Gewährleistung, dass das Futter sauber und nahrhaft ist, gesündere und größere Schweine haben, was mehr Fleisch bedeutet."
 RED_increased_pig_output_2_tt: "Baut §Y1 Zivile Werkstatt§! in jedem Staat mit §Y6§! oder mehr §YInfrastruktur§! auf der §YSokolnicheskaja-Line§!."
 
 RED_pig_feed: "Schweinefarmen"
 RED_pig_feed_desc: "Nachdem unsere Schweinefutterprobleme nun gelöst sind, sind wir auf ein neues Problem gestoßen: Unsere derzeitigen Schweinemastbetriebe sind bis auf den letzten Platz gefüllt. Um die Produktion weiter zu steigern, werden wir neue Betriebe auf leeren Flächen eröffnen, die nicht für menschliche Besiedlung geeignet sind. Dadurch wird sichergestellt, dass jeder seinen Speck bekommt!"
 RED_increased_pig_output_3_tt: "Baut §Y1 Zivile Werkstatt§! in jedem Staat mit §Y8§! oder mehr §YInfrastruktur§! auf der §YSokolnicheskaja-Linie§!."

 RED_food_issue: "Autarke Landwirtschaft"
 RED_food_issue_desc: "Da der Viehbestand und die landwirtschaftliche Produktion gestiegen sind, müssen wir nicht mehr auf unzuverlässige Importe zurückgreifen, um unsere Bevölkerung zu ernähren, und wir müssen auch keine Hungersnöte mehr befürchten, nur weil isolierte Kleinbetriebe zusammenbrechen. Die Rote Linie hat jetzt die am besten ernährten Menschen in der gesamten Metro!"

 RED_state_controlled_plots: "Staatliche Grundstücke"
 RED_state_controlled_plots_desc: "Durch die Eröffnung vollständig eigener und betriebener staatlicher Grundstücke können wir jeden Aspekt der Lebensmittelproduktion kontrollieren. Dies wird es uns ermöglichen, unsere Prozesse weiter zu standardisieren und unsere Farmen auf geeignete Standorte auszuweiten, die derzeit nicht genutzt werden."
 
 #########
 RED_collectivization: "Kollektivierungsbemühungen"
 RED_collectivization_desc: "Unsere derzeitige Industrie ist verstreut und unzusammenhängend. Und welche Produktion wir haben, hat Schwierigkeiten, die gesamte rote Linie zu beliefern. Damit wir in dieser neuen Welt überleben können, muss dies behoben werden."
 RED_reclamation_minister_choice_tt: "Fokus-Pfad für Rekultivierungsminister freigeschaltet."
 #########
 
 #########
 RED_central_planning: "Zentralisierte Planung"
 RED_central_planning_desc: "Derzeit erfolgt die Produktion auf der Grundlage des lokalen Bedarfs der Stationen. Dies ist jedoch ineffizient und führt zu einer Überproduktion einiger Waren und einem Mangel anderer Waren. Um diese Ineffizienzen zu verhindern, erhalten alle Fabriken ihre Quoten von einem Standort, der den Bedarf der gesamten Linie abwägt."

 RED_central_planning_2: "Anschluss der Sokolnitscheskaja"
 RED_central_planning_2_desc: "Einst war die Metro in der Lage, Tausende von Menschen in einer Stunde zu bewegen. Auch wenn wir nicht hoffen können, mit der alten Metro mithalten zu können, müssen wir unsere Schienenstrecken verbessern, damit Menschen und Produkte schneller reisen können"

 RED_central_planning_3: "Urbanisierung im Kopf"
 RED_central_planning_3_desc: "Wir haben die größte Population in der gesamten Metro, leider haben wir nicht viele Orte, an denen wir sie unterbringen können. Deshalb müssen wir das, was wir haben, nutzen und überall in unseren Stationen Wohnraum bauen. Lassen Sie kein Atrium, keinen Keller und keinen Schrank ungenutzt, bis wir für jeden Mann ein Bett haben!"

 RED_central_planning_4: "Sitz der Macht wie kein anderer"
 RED_central_planning_4_desc: "Obwohl wir möchten, dass die gesamte roten Linien glänzt und gedeiht, sind unsere Ressourcen begrenzt. Durch die Erneuerung unserer Hauptstation können wir unsere Ressourcen optimal nutzen und als leuchtendes Beispiel dafür dienen, wie eine Modellstation aussehen und funktionieren sollte."

 RED_central_planning_5: "Unbegrenzte Schienen"
 RED_central_planning_5_desc: "Die gesamte Produktion und die Menschen auf der Welt sind bedeutungslos, wenn wir sie nicht dorthin bringen können, wo wir sie brauchen. Es ist an der Zeit, den Überschuss unseres Budgets für die Reparatur von Eisenbahnen und die Wiedereröffnung von Tunneln auszugeben, um so viel wie möglich Material in der Metro zu bewegen."

 RED_map_out_the_gosplan: "Entwerfen Sie den Gosplan"
 RED_map_out_the_gosplan_desc: "Da sich unsere Kollektivierungsbemühungen auszahlen, ist es an der Zeit, sie weiter zu organisieren und zu einer offiziellen Politik zu machen. Es gibt zufällig einen Namen aus unserer Vergangenheit, der perfekt passt."
 
 #########
 RED_unionize_artisans: "Handwerker gewerkschaftlich organisieren"
 RED_unionize_artisans_desc: "Es gibt sehr viele Leute, die sehr viel über die Herstellung der Dinge in der Roten Linie wissen. Aber die Linie ist so groß, dass sie ihr ganzes Leben ohne einen anderen Experten auskommen müssen und sie ihr Wissen nicht weitergeben können. Dieser Informationsverlust ist geradezu kriminell und muss verhindert werden. Deshalb werden wir diese Personen finden und sie in einer Gewerkschaft unterbringen, damit sie zusammenarbeiten und ihr Wissen zur Verbesserung der Roten Linie sammeln können."

 RED_military_plant: "Errichten Sie eine Militäranlage"
 RED_military_plant_desc: "Derzeit werden unsere Waffen entweder in großen Mengen in der Waffenkammer oder von verstreuten Waffenschmieden entlang der Roten Linie hergestellt. Um unsere massiven Streitkräfte auszurüsten, müssen wir eine eigene Militärfabrik errichten, um sicherzustellen, dass wir über eine starke inländische Produktion verfügen und unsere eigenen Waffendesigns entwickeln können."

 RED_retooling_artisans_for_war: "Umrüstung für den Krieg"
 RED_retooling_artisans_for_war_desc: "Obwohl es viele Werkstätten für Waffen gibt, gibt es auch viele Werkstätten, die mit geringfügigen Modifikationen Waffen herstellen könnten. Und wir müssen Waffenvorräte anlegen, wenn wir den kommenden Krieg überleben wollen."

 RED_transformation_of_industry: "Transformation der Industrie"
 RED_transformation_of_industry_desc: "Der unbeugsame Wille Lenins ist unauslöschlich. Wir müssen die Sokolnitscheskaja nicht nur in eine kommunistische Utopie verwandeln, sondern in eine Utopie aus geschmiedetem Stahl, geschmiedet von den Arbeitern. Wir werden die Erde erben."

 RED_military_plant_2: "Militärisch-industrieller Komplex"
 RED_military_plant_2_desc: "§CVerteidigungsminister§! bekommt eine §Gneue Eigenschaft!§!"
 
## Ministry of Production ##
 
 RED_department_of_production: "Richten Sie das Produktionsministerium ein"
 RED_department_of_production_desc: "Auch wenn wir über die Produktionsmittel verfügen, müssen wir entscheiden, was und wie wir produzieren. Genau hier kommt das Produktionsministerium ins Spiel."
 RED_minister_of_labour_departments_tt: "Das Ministerium für Produktion wird eingerichtet."

 RED_military_engineering: "Militärtechnische Verträge"
 RED_military_engineering_desc: "Durch den Abschluss von Produktionsverträgen mit kleineren Drittanbietern können wir die Belastung unseres Liefernetzwerks verringern und einen Teil der Produktion für andere, komplexere Anforderungen freigeben."

 RED_cutting_edge_developments: "Modernste Entwicklung"
 RED_cutting_edge_developments_desc: "Die von der Roten Linie eingesetzten Waffen gelten als grob und schlecht verarbeitet. Obwohl dies historisch gesehen zutrifft, liegt es nicht daran, dass wir nicht in der Lage sind Verbesserungen herbeizuführen. Mit unseren Bemühungen zur Steigerung der Produktionskapazität werden wir der Welt zeigen, wozu wir wirklich in der Lage sind."

 RED_quotas_of_production: "Produktionsquoten"
 RED_quotas_of_production_desc: "Obwohl es schön wäre, über hochwertige Ausrüstung zu verfügen, ist es eine Tatsache, dass wir eine Menge Ausrüstung brauchen und es uns nicht leisten können, darauf zu warten. Aus diesem Grund werden wir unsere Hersteller dazu verpflichten, mit allen Mitteln höhere Quoten einzuhalten. Auch wenn unsere Waffen nicht von höchster Qualität sind, ist Quantität sicherlich eine ganz eigene Qualität."

 RED_foster_positive_heroism: "Fördern Sie positives Heldentum"
 RED_foster_positive_heroism_desc: "Während es den Anschein hat, als ob die Rote Linie nur glaubt, dass jeder entweder ein Verräter oder ein Spion ist, wissen wir dass es Helden im Proletariat gibt, und wir möchten von Zeit zu Zeit ihre Arbeit loben. Jetzt scheint ein guter Zeitpunkt dafür zu sein, die Frage ist nur, welche Gruppe von Helden wir jetzt loben möchten."

 RED_a_world_for_tomorrow: "Eine Welt für morgen"
 RED_a_world_for_tomorrow_desc: "Da unsere Fabriken größer und besser als je zuvor sind, können wir unsere neu gewonnene Produktion nun auf die Erforschung neuer Wege zur Verbesserung des Lebensunterhalts und der Sicherheit unserer Menschen konzentrieren."
 
## Workers Culture ##
 ############
 RED_workers_culture: "Arbeiterkultur"
 RED_workers_culture_desc: "Viele kapitalistische Schweine verbreiten Lügen, dass es in der Roten Linie keine Kultur gäbe, dass wir unseren Leuten diese geraubt hätten, damit es ihnen nicht an Größerem mangele. Das ist einfach falsch, es fällt ihnen schwer, unsere farbenfrohe Kultur zu sehen, weil es die Kultur der Arbeiter ist!"
 RED_minister_of_domestics_departments_tt: "Das Innenministerium wird eingerichtet."
 ############
 
 #####Bolshoi Theatre######
 RED_bolshoi_theatre: "Öffnen Sie das Bolschoi-Theater"
 RED_bolshoi_theatre_desc: "Viele Künstler und Künstler überlebten den Weltuntergang in der Station des Bolschoi-Theaters. Jahrelang waren sie für andere Stationen tätig, aber ihre wahren Talente blieben vergeudet. Wir werden ihnen eine Bühne bauen, auf der sie die gesamte Metro gerne sehen wird!"
 
 RED_getting_the_band_back_together: "Die Band wieder zusammenbringen"
 RED_getting_the_band_back_together_desc: "Viele Musiker begannen im Bolschoi, wechselten dann aber zu anderen Stationen, um dort mit weniger Konkurrenz aufzutreten. Nachdem wir nun ein Theater organisiert haben, ist es an der Zeit, diese Musiker wieder zusammenzubringen und die größte Konzertband zu gründen, die die Metro je gesehen hat!"

 RED_question_of_arts_and_culture: "Eine Frage von Kunst und Kultur"
 RED_question_of_arts_and_culture_desc: "Während es unseren Experten weiterhin schwerfällt, zu definieren, was genau „Kunst“ eigentlich ist, ist es eine Tatsache, dass unsere Leute sie mögen und es uns an ihr mangelt, sodass wir jetzt einfach mehr davon brauchen."

 RED_propaganda_in_art: "Propaganda in der Kunst"
 RED_propaganda_in_art_desc: "Ein alter Trick der Sowjetunion bestand darin, die Regierung mithilfe der Kunst in einem „idealistischeren“ Licht darzustellen. Eine Idee, mit der wir einige unserer schärferen Kritiken abschwächen können, schließlich sind wir nun wirklich die letzte Bastion der Freiheit und Hoffnung. Auch wenn andere ein wenig Hilfe dabei benötigen, dies zu erkennen"

 RED_repair_socialist_facades: "Reparieren Sie sozialistische Fassaden"
 RED_repair_socialist_facades_desc: "Die ursprünglichen Inspirationen der Roten Linie waren die beeindruckenden Überreste unserer Vorfahren in der Metro, die so mächtig waren, dass nicht einmal die Bomben sie zerstören konnten. Allerdings ist die Zeit nicht spurlos an ihnen vorbeigegangen und sie müssen repariert werden. Genau das werden wir tun, damit zukünftige Generationen sie mit der gleichen Ehrfurcht betrachten wie wir"
 
 RED_scouring_lenins_tomb: "Durchsucht Lenins Grab"
 RED_scouring_lenins_tomb_desc: "Unsere Geschichte lehrt uns, dass unser größter Führer bewahrt wurde, damit alle ihn sehen können, ihn, der die Menschheit gerettet hat. Unsere Experten sagen, dass es möglich ist, dass er immer noch draußen ist und nicht einmal der Weltuntergang könnte seinen Schlaf stören. Wenn das der Fall ist, so müssen wir unseren Genossen nach Hause bringen."
 RED_unlock_lenin_tomb_tt: "\n§oDies wird eine Entscheidung zur Durchsuchung von Lenins Grab freischalten!§!"
 
 ######Socialist Radio######
 RED_socialist_radio: "Sozialistisches Radio"
 RED_socialist_radio_desc: "Während unser Wort in der gesamten Metro Widerhall findet, können wir jedoch nicht jederzeit in den Ohren unserer Bürger liegen. Wenn wir jedoch ein Radioprogramm starten können, könnten sie unsere Weisheit immer in Reichweite haben, wo auch immer ihr Radio ist."
 ############
 
 RED_tap_into_radio_transmissions: "Wagt euch an Radio-Übertragungen"
 RED_tap_into_radio_transmissions_desc: "Unser Radioprogramm war ein voller Erfolg! Aber unsere Feinde sind ebenso schlau wie heimtückisch und beschränken die Radios ihrer Bevölkerung nur auf bestimmte genehmigte Frequenzen. Glücklicherweise haben unsere Spezialisten einen Weg in diese genehmigten Frequenzen gefunden, sodass ihre Mitarbeiter jetzt unsere Botschaft hören können und die Verantwortlichen nichts davon mitbekommen."

 RED_fund_an_education_department: "Finanzieren Sie eine Bildungsabteilung"
 RED_fund_an_education_department_desc: "Wir hatten nie einen Mangel an Arbeitskräften, aber da unsere Fabriken und Prozesse immer komplexer werden, fällt es uns schwer, diejenigen zu finden, die in der Lage sind, diese fortschrittlichen Konzepte zu verstehen. Einige von ihnen können nicht einmal lesen! Wir müssen eine neue Abteilung gründen, um sicherzustellen, dass unsere Belegschaft nicht nur riesig, sondern auch intelligent und gut ausgebildet ist."

 RED_children_schools: "Grundschulbildung"
 RED_children_schools_desc: "Viele unserer Kinder wurden entweder kurz vor oder nach dem Bombeneinschlag geboren und haben nie eine formelle Schulbildung genossen. Wir müssen sicherstellen, dass ihnen allen die Grundlagen beigebracht werden, sonst riskieren wir, dass Wissen wieder zu einem Privileg der Bourgeoisie wird"

 RED_fitness_schools: "Enthüllung des Sportivnaya Fitness-Gymnasiums"
 RED_fitness_schools_desc: "Während das Training des Geistes von größter Bedeutung ist, ist es auch wichtig, den Körper zu trainieren. Viele unserer Bürger leben in beengten Bahnhöfen und bewegen sich nicht viel, was für den Staat nun ein großes Problem darstellt, da es dazu führt, dass die Rekruten weniger sportlich sind. Um dies zu korrigieren, müssen wir sicherstellen, dass unsere Bevölkerung lernt, Sport zu treiben und ihn zu lieben. Diese Fitnesscenter sind unter diesem Gesichtspunkt gebaut."

 RED_engineering_academy: "Ingenieurakademien"
 RED_engineering_academy_desc: "Die Metro war schon vor dem Ende der Welt ein Wunderwerk moderner Ingenieurskunst. Jetzt haben wir viel Wissen darüber verloren, wie man sie pflegt, geschweige denn, wie man sie erweitert. Durch die Einrichtung spezialisierter Akademien können wir erneut beginnen, die Mittel zum Bau weiterer Tunnel zu entdecken. Auch wenn es einige Zeit dauern wird, werden wir hoffentlich eines Tages in der Lage sein, ein Haus außerhalb der Metro zu bauen."

 RED_fund_an_education_department_4: "Eine bessere Welt aufbauen"
 RED_fund_an_education_department_4_desc: "Die Alphabetisierungsrate steigt, unsere Genossen zeigen großes Interesse an persönlicher Weiterentwicklung und unsere ersten Ingenieurstudenten erweisen sich als schnelle Lerner. Wir sind vielleicht noch nicht in der Lage, die Außenwelt zu einem Paradies zu machen, aber wir können die Rote Linie zu einem Paradies machen."
 
 RED_project_socialist_nostalgia: "Projekt Sozialistische Nostalgie"
 RED_project_socialist_nostalgia_desc: "Während die Weisheit unserer Anführer den größten Teil des Luftraums unserer Funkgeräte einnahm, haben wir eine ganze Reihe erhaltener Aufzeichnungen unserer Vorfahren angesammelt. Wir werden damit beginnen, sie in die Rotation aufzunehmen, damit die Leute Geschichten aus unserer glorreichen Vergangenheit hören können."
 
 ############
 RED_preach_the_word_of_lenin: "Predigen Sie das Wort Lenins"
 RED_preach_the_word_of_lenin_desc: "Während die Worte Lenins für unser Volk aus zweiter Hand sind, wissen viele derjenigen außerhalb der roten Linie weder von seinen Kämpfen noch von seiner Weisheit. Eine Tragödie, die wir mithilfe unseres Funknetzes korrigieren müssen"

 RED_propaganda_tune: "Propagandamelodien"
 RED_propaganda_tune_desc: "Seit wir Den Roten Kanal gegründet haben, haben viele sowohl innerhalb als auch außerhalb des Sokol eingeschaltet, und obwohl unser Wort richtig und gerecht ist, kann es noch etwas eintönig sein. Mehrere Berater haben vorgeschlagen, unsere Segmente mit Musik zu füllen, sowohl zum Wohle unserer Mitarbeiter als auch um mehr externe Zuhörer anzulocken. Dies ist ein Vorschlag, auf den viele in der Regierung gespannt sind."

 RED_radio_relations: "Radionachrichten"
 RED_radio_relations_desc: "Obwohl unsere Bemühungen, unser Volk über unser glorreiches Erbe zu informieren, Früchte getragen haben, wissen die meisten immer noch nicht, wie erstaunlich die Leistungen unserer Vorfahren sind. Auch wenn es schwierig sein mag, sie alle auf einmal aufzuzählen, haben unsere Leute doch viel, viel Zeit."

 RED_radio_subvert_populace: "Radios als Werkzeug gegen Subversion"
 RED_radio_subvert_populace_desc: "Viele unserer Leute sind sich nicht bewusst, wie verzweifelt unsere Feinde uns vernichten wollen. Wir werden dafür sorgen, dass unsere Leute immer genau darüber informiert sind, wie viele Feinde es noch zu vernichten gilt."

## NKVD ##
 
 RED_nkvd_primacy: "NKWD-Vorrang"
 RED_nkvd_primacy_desc: "Der NKWD und Korbut haben sich als unsere loyalsten und effektivsten Kräfte erwiesen. Um sie sowohl zu belohnen als auch ihre Fähigkeiten weiter zu nutzen, sollten wir prüfen, ob wir ihnen unsere wichtigsten Rollen anvertrauen können."
 RED_korbut_influence_tt: "§RKorbuts§! Einfluss wird leicht zunhemen."
 
 RED_nkvd_military_units: "Militärische Unterstützung des NKWD"
 RED_nkvd_military_units_desc: "NKWD-Offiziere gehören zu unseren Besten. Sie erweisen sich als umfassend ausgebildet und ein wahrer Segen für das NKWD. Wir stellen jedoch fest, dass sie im Feld zur Beobachtung der Standard-Rekruten ihre Zeit verschwenden, indem sie damit beschäftigt sind, ihre Loyalität sicherzustellen. Um sie bestmöglich einzusetzen, werden wir in Zukunft ausschließlich NKWD-Militäreinheiten bilden, die sich als einige unserer effektivsten erweisen dürften."
 
 RED_nkvd_exceptions: "NKWD-Ausnahmen"
 RED_nkvd_exceptions_desc: "Während die Wehrpflicht das Lebenselixier unserer Armee ist, hat das NKWD um die Befugnis gebeten, Ausnahmen für diejenigen zu gewähren, von denen sie glauben, dass sie gute Agenten werden können. Dies wird es dem NKWD ermöglichen, seine Reihen zu erweitern, was wiederum dazu führen dürfte, dass es effektiver wird und diejenigen mit Potenzial aus dem Fleischwolf herausgehalten werden."
 
 RED_secret_police_roles: "Rollen der Geheimpolizei"
 RED_secret_police_roles_desc: "Obwohl das NKWD schon immer sehr gut darin war, diskret zu bleiben, würde es seinen Ermittlungen und damit auch uns nützen, wenn sie unbemerkt blieben. Wir werden dem NKWD erlauben, eine Geheimpolizei zu betreiben, die unsere Leute von ihrer Ebene aus überwacht, solange sie nichts davon wissen."
 
 RED_allow_special_jurisdiction: "Besondere Gerichtsbarkeit"
 RED_allow_special_jurisdiction_desc: ""
 
 RED_allow_administration_roles: "Erlauben Sie administrative Rollen"
 RED_allow_administration_roles_desc: "Wenn wir NKWD-Aktivisten bestimmte Rollen in der Regierung gestatten, können wir ein Auge auf unsere Bürokraten haben und sie daran erinnern, dass sie nicht von den Regeln ausgenommen sind."

 RED_permit_military_roles: "Militärische Rollen zulassen"
 RED_permit_military_roles_desc: "Obwohl das NKWD immer mit dem Militär zusammengearbeitet hat, ist es technisch gesehen von diesem getrennt. Indem wir NKWD-Offizieren Führungspositionen überlassen, können wir sowohl ihren Erfahrungsschatz nutzen als auch die kontinuierliche Kontrolle über das Militär sicherstellen."

 RED_no_227: "No.227"
 RED_no_227_desc: "Da der Einfluss des NKWD in der Armee ausgeweitet und gefestigt wurde, wird es nun möglich sein, sicherzustellen, dass jedes einzelne Mitglied der Armee jedem unserer Befehle folgt. Sogar bis zum Tod, sei es durch die Hand des Feindes oder die seines Kommissars."
 RED_unlock_ability_tt: "Schalte die Befehlsfähigkeit frei: §CBefehl Nummer. 227§! - §RKeinen Schritt zurück!§!"

 RED_spy_network: "Spionagenetzwerke"
 RED_spy_network_desc: "Das NKWD hat bei der Ausspionierung unserer Leute hervorragende Arbeit geleistet, um subversive Elemente und feindliche Spione auszumerzen. Mit ihrer Vertrautheit mit solchen Dingen werden wir sie damit beauftragen, unsere Feinde auszuspionieren. Etwas, wozu sie mehr als fähig sind."

 RED_court_martial_roles: "Kriegsgerichte"
 RED_court_martial_roles_desc: "Auch wenn das NKWD und die Armee zwangsläufig eng zusammenarbeiten, werden wir sicherstellen, dass es weiterhin eine klare Abgrenzung zwischen den beiden gibt. Davon abgesehen ist das NKWD bestens geeignet, als unparteiische Richter zu fungieren. Sie werden dafür sorgen, dass unsere Befehle unverzüglich und buchstabengetreu ausgeführt werden und dass jeder, der zögert, bestraft wird."
 
 RED_anti_corruption_force: "Anti-Korruptions-Kraft"
 RED_anti_corruption_force_desc: "Obwohl sich das NKWD als nützlich erwiesen hat, zögern wir, es an die Schalthebel der Macht heranzulassen. Dennoch sind sie hervorragend darin, Korruption in unserer Regierung aufzuspüren. Eine Rolle, die wir ausbauen und fokussieren werden."
 
 RED_korbut_general: "Was ist mit Korbut?"
 RED_korbut_general_desc: "Korbut hat das NKWD mit rücksichtsloser Effizienz zu einem unserer mächtigsten und wichtigsten Staatsorgane aufgebaut. Man kann sich nur vorstellen, welche Wirkung er auf eine Armee haben könnte. Genau aus diesem Grund befördern wir ihn zum General."

## Military Tree ##
 
 RED_the_might_of_the_soviet_union: "Die Macht der Roten Linie"
 RED_the_might_of_the_soviet_union_desc: "Da wir von Feinden umgeben sind, müssen wir schnell unsere Streitkräfte aufbauen, um zu überleben. Allerdings ist dies nicht das erste Mal, dass sich das russische Volk einer solchen Hürde gegenübersieht. So wie die Sowjetunion die größte Militärmacht der Welt aufgebaut hat, werden auch wir die größte Armee in der Metro aufbauen!"

 RED_general_standardization: "Allgemeine Standardisierung"
 RED_general_standardization_desc: "Derzeit sind die einzigen Orte, aus denen wir neue Generäle beziehen, entweder Vetternwirtschaft oder die Abordnung durch bereits etablierte Generäle (auch Vetternwirtschaft). Wenn wir unsere Streitkräfte erweitern wollen, werden wir viel mehr Offiziere brauchen. Um diesem Bedarf gerecht zu werden, werden wir einen standardisierten Prozess einführen, den alle neuen Kommandeure durchlaufen müssen. Dadurch wird sichergestellt, dass alle Neuen Kandidaten fähig sind und dass diejenigen, die zwar fähig sind, aber keine Verbindungen haben, dennoch an die Position gelangen können, an der sie die Rote Linie am besten verteidigen können."
 RED_new_generals: "Dem Kommandopool werden 2 neue Generäle hinzugefügt"

 RED_vinogradov_nf: "Vermächtnis der Macht"
 RED_vinogradov_nf_desc: "Wir haben einen Mann aus einer bekannten Familie ausfindig gemacht, der einst echte Armeen befehligte. Bisher blieb er von der Metro-Welt unberührt, aber nachdem er unsere Fortschritte gesehen hatte, beschloss er, seinen unglaublichen Wissens- und Könnensreichtum auf der Roten Linie einzubringen."
 
 ############
 RED_in_defence_of_the_mother_line: "Verteidige das Hauptquartier der Revolution"
 RED_in_defence_of_the_mother_line_desc: "Obwohl die Armeen leistungsfähig sind und wachsen, müssen wir sicherstellen, dass die Verteidigung der Roten Linie nicht auf die vereinzelte, isolierte Verteidigungsarbeit einzelner Trupps hinausläuft. Unsere Verteidigung muss einheitlich, vielschichtig und uneinnehmbar sein. Um dies zu gewährleisten, werden wir ein neues Ministerium schaffen, dessen alleinige Verantwortung darin besteht, Verteidigungsanlagen zum Schutz unseres Volkes aufzubauen."
 RED_minister_of_defence_departments_tt: "Das Verteidigungsministerium wird gegründet."

 RED_conscription_standardization: "Standardisierung der Rekrutierung"
 RED_conscription_standardization_desc: "Um unsere Armee zu dem Giganten zu machen, den wir uns wünschen, müssen wir die Zahl unserer Rekruten erhöhen. Wir werden uns nicht länger auf isolierte pensionierte Soldaten verlassen, um weitere Unterstützung zu gewinnen. Wir werden über einen gut geölten, standardisierten Rekrutierungsprozess mit speziell ausgebildeten Beamten verfügen, die in der Lage sind jeden jungen Mann in unseren Stationen zu begeistern."
 
 RED_conscription_standardization_the_loyal_conscript: "Der treue Rekrut"
 RED_conscription_standardization_the_loyal_conscript_desc: "Auch wenn ein Rekrut allein vielleicht nicht viel bringt, so sind viele von ihnen doch in der Lage, Großes zu leisten. Es ist wichtig sicherzustellen, dass selbst unsere unterste Einheit der Roten Armee bis zum Tod treu bleibt. Deshalb werden wir sicherstellen, dass unseren Männern regelmäßig gelehrt wird, dass sie nicht nur die beste Überlebenshoffnung der Roten Linie sind, sondern auch die einzige Überlebenshoffnung der Menschheit."

 RED_conscript_1: "Eine Patrone für jeden Kameraden"
 RED_conscript_1_desc: "Eine einfache, aber sehr effektive Lösung besteht darin, neuen Mitarbeitern Einstiegsprämien anzubieten. Obwohl dies ein kostspieliger Prozess sein kann, kann es auch sein, dass sich die Auszahlung des Bonus einige Monate nach der Anmeldung verzögert. Vielleicht sterben die Rekruten in der zwischenzeit auch und wir können uns die Auszahlung so ganz sparen."

 RED_conscript_2: "Dienst ohne Zweifel"
 RED_conscript_2_desc: "Auch wenn Kleinstarbeit nicht die schönste Beschäftigung ist, so ist sie doch eine wichtige. Entweder erledigt jeder einzelne genau seinen Job, oder wir alle sterben hier. Die wahren Soldaten in unseren Reihen erkennen die Bedeutung dieser Worte und widmen sich voll und ganz ihrer Pflicht."

 RED_to_the_bitter_ends: "Bis zum bitteren Ende"
 RED_to_the_bitter_ends_desc: "Unsere Soldaten verstehen, dass ihr Beruf der Tod ist und dass sie ihn entweder unseren Feinden austeilen müssen oder dass er ihnen zuteil wird. Jeder Soldat, der im Kampf stirbt, wird als Held in Erinnerung bleiben, jeder, der zögert, wird als Feigling und vergessen sterben. Unsere Soldaten kennen ihre Möglichkeiten und stürzen sich ohne Zögern in die Schlacht."

 RED_to_the_bitter_means: "Der Zweck heiligt die Mittel"
 RED_to_the_bitter_means_desc: "Wir können es uns nicht leisten, unsere Männer sinnlos wegzuwerfen. Wir müssen sicherstellen, dass jeder Schlachtplan umfangreich und gut durchdacht ist. Wenn er jedoch auf den Weg gebracht wird, können wir uns keine halbherzigen Aktionen leisten. Wir müssen sicherstellen, dass jede Einheit ihre Ziele erreicht, unabhängig von den Kosten oder dem Risiko aller an der Schlacht beteiligten Einheiten."

 RED_ura_ura_ura: "Das größtmögliche Opfer"
 RED_ura_ura_ura_desc: "Jetzt, da jeder unserer Soldat entschlossen ist zu siegen, können wir unsere Feinde vollständig vernichten. Wo einst ein Maschinengewehrnest als undurchdringliche Mauer stand, können wir sie nun zerschlagen. Wo einst schwere Verluste unsere Streitkräfte zerstreuten, geben sie ihnen jetzt Mut. Wo einst die feindliche Armee als Einheitsfront stand, können wir sie mit der Wucht unseres Schlachtrufs zerschlagen.\n§RDURCHBRUCH! FÜR DIE ROTE LINIE! URAAAAAAA!§!"

 RED_coordinated_force: "Koordinierte Kräfte"
 RED_coordinated_force_desc: "Mit unserer Büro- und Soldatenreform können wir das wahre Potenzial einer großen, qualifizierten integrierten Armee erreichen. Wenn eine Einheit nicht über die Mittel oder das Wissen verfügt, um einen Feind zu besiegen, wird es eine Einheit in der Nähe tun. Wir tappen nicht länger im Dunkeln darüber, was wir tun sollen, sondern wissen jetzt, was hinter uns liegt, was vor uns liegt und vor allem, wie viele dort sind."

 ############
 RED_accentuate_heroic_deeds_of_soviets: "Heldentaten vergangener Zeiten"
 RED_accentuate_heroic_deeds_of_soviets_desc: "Jetzt, wo wir gegen einen so gefährlichen Gegner antreten, ist es wichtig, unsere Leute daran zu erinnern, dass wir schon einmal hier waren und gewonnen haben! Die Sowjetunion stand dem größten Feind gegenüber, den die Welt je gesehen hatte, und siegte am Ende. Alles, was wir tun müssen, ist, es unseren Vorfahren gleich zu tun und der Sieg ist sicher."
 
 RED_conscription_reforms_1: "Leistest §RDU§! deinen Beitrag?"
 RED_conscription_reforms_1_desc: "Da unsere Rekrutenzahlen stetig steigen, haben wir nun einen selbstverstärkenden Effekt festgestellt: Je mehr Soldaten wir ausbilden, desto mehr ausgebildete Soldaten haben wir zur Ausbildung weiterer Soldaten. Dadurch können nun noch nie gekannte Massen an die Front verlegt werden!"
 
 RED_conscription_reforms_2: "Erlauben Sie den Wehrdienst für Frauen"
 RED_conscription_reforms_2_desc: "In den Jahren seit die Bomben fielen war es das Wichtigste, vor allem die Zukunft der Menschheit zu sichern, und obwohl es uns missfiel bedeutete dies, dass unsere Frauen vernachlässigt werden mussten. Jetzt, da die Zukunft der Menschheit gesichert ist, die der Roten Linie jedoch nicht, müssen wir diese Politik umkehren und allen Mitgliedern der Metro erlauben, sich für den Kampf zu melden. Ein Mann stirbt genauso gut durch die Kugel aus der Waffe einer Frau wie durch die eines Mannes."
 
 ############
 RED_equipment_standardization: "Standardisierung der Ausrüstung"
 RED_equipment_standardization_desc: "Bisher war es so, dass unsere Soldaten jede Waffe benutzen, die sie in die Finger bekamen. Dies machte aus der Versorgung unserer Soldaten jedoch einen logistischen Albtraum. Jetzt, wo wir unsere Armee aufbauen wollen, müssen wir entscheiden, wie wir dieses Problem lösen."

 RED_equipment_standardization_option_1: "Das Symbol der Befreiung"
 RED_equipment_standardization_option_1_desc: "Die Kalasch ist seit ihrer Gründung das Symbol unserer Nation. Sie ist einfach, zuverlässig, tödlich und bleibt trotz ihres Alters eine der hochwertigsten Waffen in der gesamten Metro. Sie ist nicht nur die perfekte Waffe zur Standardisierung unserer Armee, sie wird auch in der Roten Linie in Massenproduktion hergestellt. Die Metro wird eines Tages wieder Frieden haben, und zwar wegen der Kalash."

 RED_equipment_standardization_option_1_1: "Rüstungsbetriebe"
 RED_equipment_standardization_option_1_1_desc: "Der wichtigste Teil der Armeeversorgung sind die Kugeln. Ohne sie hätte man vielleicht nicht einmal eine Armee, aber mit ihnen ist man eine Macht. Obwohl sie nicht der einzige Grund zur Sorge sind, müssen wir unsere Produktion sofort ausweiten."

 RED_equipment_standardization_option_1_2: "Verbesserungen der Support-Ausrüstung"
 RED_equipment_standardization_option_1_2_desc: "Während Angriffswaffen (wie Kugeln) immer wichtiger sein werden, dürfen wir die anderen Teile der militärischen Versorgung nicht vernachlässigen. Wir haben sicherzustellen, dass jeder Soldat ein Reinigungsset, Ersatzteile und taktisches Zubehör erhält. Unsere Bemühungen werden viel bewirken, ohne dass dafür völlig neue Werkstätten erforderlich sind."

 RED_equipment_standardization_option_3: "Räuchert sie aus"
 RED_equipment_standardization_option_3_desc: "Von all unseren Waffengattungen erreichen nur wenige die brutale Wirksamkeit der Flammenwerfer, die speziell dafür entwickelt wurden, verschanzten Gegnern in geschlossenen Räumen den Tod zu bringen. Sie werden in der gesamten Metro gleichermaßen gefürchtet und gehasst. Wir müssen diese grausamen Waffen schneller verfeinern als unsere Feinde, sonst sind es am Ende unsere Soldaten, die brennen."

 RED_equipment_standardization_exploit_kuznetsky_most: "Den Kuznetsky Most verwenden"
 RED_equipment_standardization_exploit_kuznetsky_most_desc: "Während die inländische Produktion gut ist und die Waffenkammer bereits der Hauptproduzent von Waffen ist, können ihre Fähigkeiten mit geringem Aufwand erheblich erweitern. Es ist an der Zeit, dass die Waffenkammer ihrem Namen alle Ehre macht!"

 RED_equipment_standardization_scorched_earth: "Brennende Brücken"
 RED_equipment_standardization_scorched_earth_desc: "Die Waffenkammer war schon immer einer der wichtigsten Standorte in der Metropolregion, und nach unserer Investition ist sie definitiv der wertvollste. Wir müssen unsere Investitionen sichern und ihre Verteidigung ausbauen. Wenn der Feind sie uns wegnehmen will, muss er sie erst zerstören."

 RED_surface_recovery_exploitation: "Stalker-Expeditionen"
 RED_surface_recovery_exploitation_desc: "Obwohl die Oberfläche um Größenordnungen gefährlicher ist als die schlimmsten Tunnel, bleibt die Tatsache bestehen, dass sie unglaublich reich an verlorenen Ressourcen und Technologie ist. Wir werden jeden Winkel systematisch erkunden. Selbst wenn wir die Oberfläche nicht zurückgewinnen können, so sollten wir doch in der Lage sein, eine Station für die Organisation der Suche einzurichten."

 RED_equipment_standardization_weapon_arms: "Designs standardisieren"
 RED_equipment_standardization_weapon_arms_desc: "Da die Waffenkammer erweitert wurde und unter unserer Kontrolle steht, können wir ihre Waffen nun in unseren Fabriken herstellen. Mit ihrem Fachwissen können wir Waffen schneller und besser produzieren als alle anderen."
 
 ############
 RED_the_supreme_soviet: "§YDer Oberste Sowjet§!"
 RED_the_supreme_soviet_desc: "Mit unseren Reformen haben wir jetzt eine der besten Armeen der Metro, eine Armee auf Augenhöhe mit der Sowjetunion! Nachdem wir nun unsere Stärke aufgebaut haben, können wir uns an die Entwicklung neuer Strategien machen."

 RED_schors_brigade: "Schors Brigade"
 RED_schors_brigade_desc: "Ein Offizier hat mit der Idee einer Schockkavallerie experimentiert. Während wir selbstverständlich keine Pferde haben, hat eine Horde Eisenbahnkarren, die durch die Tunnel rasen, einen ganz ähnlichen Effekt."
 
 RED_soviet_tankists: "Die sowjetischen Panzer"
 RED_soviet_tankists_desc: "Die Nazis glauben, sie hätten durch die Entwicklung ihres Schienenpanzers bereits gewonnen, doch während wir nur ihre verkohlten Panzer bergen konnten, haben wir dennoch unseren eigenen entwickelt. Und wenn die Geschichte etwas dazu zu sagen hat, so haben sie vielleicht das erste Wort bei Panzeroffensiven, wir hingegen werden das letzte Wort haben!"
 
 RED_spetsnaz_spec_ops: "Spetsnaz-Spezialeinheiten"
 RED_spetsnaz_spec_ops_desc: "Die Spetsnaz war schon immer das Beste Einheit der Armee, und ihre Ausbildung und ihr Qualitätsniveau nach dem Weltuntergang intakt geblieben sind. Das liegt zum einen an der großen Anzahl an Originalmitgliedern, die wir in unserem Dienst haben, zum anderen aber auch daran, dass sich die anstrengende Ausbildung in ihnen eingeprägt hat und nicht so schnell vergessen wird. Das einzige Problem, mit dem wir konfrontiert waren, war, dass unsere Produktion nicht mit der Ausrüstung übereinstimmt, die sie früher besaßen. Vor kurzem haben wir jedoch ein GRU-Versteck gefunden, welches in der Metro versteckt lag und einige Originalrüstungen enthält. Wir verfügen nun über Ausrüstung, die ihren Fähigkeiten entspricht."

 RED_riot-shields: "Schutzschilde"
 RED_riot-shields_desc: "Mit der Rückgewinnung ihrer Rüstung können wir auch einen Teil ihrer Ausbildung nutzen, der zuvor aufgrund von Knappheit ungenutzt blieb. Durch den Einsatz von Schutzschilden haben wir festgestellt, dass unsere Truppen vernichtender Feuerkraft standhalten können. Obwohl sie keinen Militärkugeln standhalten, verblassen viele der Waffen in der Metro im Vergleich zu dem, was zum Zeitpunkt ihrer Herstellung im Umlauf war, was bedeutet, dass sie nun einen sonst tödlichen Treffer abwehren können."

 RED_red_army_maxim: "Feuerkraft des Sieges"
 RED_red_army_maxim_desc: "Wir haben bei den Waffen, mit denen wir unsere Soldaten ausstatten, sehr darauf geachtet, unsere guten Kugeln zu schonen. Jetzt, da Kugeln leichter ersetzt werden können, fühlt sich das Oberkommando wohler mit dem Einsatz der Maxims, die wir auf Lager haben. Die Geschütztrupps werden weiterhin genau überwacht, um sicherzustellen, dass sie mit ihrem Unterdrückungsfeuer nicht übereifrig sind."

## Foreign policy ##
 
 RED_cemented_authority: "Zementierte Autorität"
 RED_cemented_authority_desc: "Nachdem wir unsere innere Krise für den Moment überwunden haben, können wir nun wieder nach außen blicken."
 RED_minister_of_foreign_affairs_departments_tt: "Errichten Sie das Außenministerium"

 ######MSU######
 RED_MSU_bridge: "Brücke über unruhige Gewässer"
 RED_MSU_bridge_desc: "Während wir den größten Teil der Sokol-Linie kontrollieren, gibt es Gerüchte über eine unberührte Oase voller Wissen, aber vor allem über Ressourcen und Menschen, die direkt außerhalb unserer Reichweite liegt. Wenn wir die Passage Worobjowy Gory reparieren würden, können wir es selbst sehen."
 RED_vorobyovy_gory: "Erlaubt es und, die §Y[288.GetName]§! zu reparieren und für uns zu beanspruchen, und so in die entferntesten Winkel der Sokol-Linie zu kommen."

 RED_bridge_over_troubled_waters: "Setzen Sie spezialisierte Stalker ein"
 RED_bridge_over_troubled_waters_desc: "Um den Weg zu kreuzen und der Hauptstreitmacht den Weg zu bereiten, werden wir in der Vergangenheit Stalker ausbilden, die mit dem Gelände vertraut sind."
 RED_bridge_over_trouble_waters_oob_TT: "Wir werden eine §YSpezialeinheit§! bilden, um §Y[288.GetName]§! zu sichern."

 RED_battering_rams: "Rammbock-Draisinen"
 RED_battering_rams_desc: "Aufgrund ihrer langen Isolation sind die meisten Verteidigungsanlagen der Smaragd-Stadt Mauern und Blockaden. Indem wir unsere Draisinen mit verstärkten Rammböcken ausstatten, können wir ihre Verteidigung durchbrechen, bevor sie Zeit haben, die Tunnel zum Einsturz zu bringen."

 RED_emerald_city: "Die Fassade knacken"
 RED_emerald_city_desc: "Es ist Zeit für die distanzierte Smaragdstadt, das Knie zu beugen. Unsere Stalker- und Spreng-Teams brechen bereits ihre hermetischen Türen ein. Nur die Zeit wird zeigen, bis die Flammen der Revolution sie befreien."
 RED_crack_the_facade_tt: "Sobald §Y[288.GetName]§! ein Kern der §Y[ROOT.GetName]§! ist, werden wir unsere Truppen darauf vorbereiten, §Y[288.GetName]§! zu überqueren und einen bewaffneten Konflikt mit der [MSU.GetFlag]§Y[MSU.GetName]§! zu beginnen"

 RED_to_the_victors: "Und an die Sieger..."
 RED_to_the_victors_desc: "Die Smaragdstadt hätte nie gedacht, dass irgendjemand sie erreichen, geschweige denn erobern könnte. Wir haben diese törichte Illusion zerstört. Jetzt ist die smaragdgrüne Stadt in Rot getaucht und ihre Menschen setzen ihr Wissen für die Verbesserung der Roten Linie ein."

 ######One and Indivisible Red Line######
 RED_march_onto_polis: "Marsch auf die [PLS.GetNameDef]"
 RED_march_onto_polis_desc: "Mit unserem gesicherten Übermacht in der Metro ist es nun an der Zeit, die alleinstehenden schwächelnden Stationen endlich zu vereinen. Brüder, Söhne und Töchter, zurück in den Kampf! Euer Mutterland ruft euch nach Hause! Unser erstes Ziel ist die arrogante Technokratie der Polis."

 RED_red_line_secured: "Sokolnitscheskaja gesichert"
 RED_red_line_secured_desc: "Da die gesamte Rote Linie der Metro vollständig unter unserer Kontrolle steht, haben wir unserem Namen alle Ehre gemacht und unsere Grenzen gefestigt. Möge die ganze Welt auf uns schauen und sehen, dass die gesamte Metro die Rote Linie sein wird."
 own_all_states_on_red_line: "Wir besitzen §YALLE Staaten§! der §RSokolnicheskaja-Linie§!.

 RED_bastion_of_socialism: "Bastion des Sozialismus"
 RED_bastion_of_socialism_desc: "Nachdem wir nun die Stationen, die der Roten Linie am nächsten liegen, unter unserer Kontrolle haben, können wir mit deren Integration beginnen. Familien, die seit dem Zusammenbruch der Zentralregierung getrennt waren, wurden nun wieder zusammengeführt!"

 RED_rebuild_line_proper: "Den Grundstein für morgen legen"
 RED_rebuild_line_proper_desc: "Da unsere Schwesterstationen nun unter unserer Kontrolle stehen, werden wir ihre Produktionskapazitäten erweitern. Da sie sich direkt neben unseren Industriestationen befinden, ist es am einfachsten, sie in unsere Wirtschaft zu integrieren."
 
 #####War Against The Fascism######
 RED_RCH_frontline: "Verstärken Sie die Front"
 RED_RCH_frontline_desc: "Während sich unsere Kämpfe gegen die Faschisten auf Scharmützel beschränkten, ist es eine Tatsache, dass wir dazu bestimmt sind, sie zu bekämpfen und zu zerstören, so wie es unsere Vorfahren einst taten. Wir müssen sicherstellen, dass die Faschisten, wenn sie unser Volk wieder einmal versklaven wollen, uns mehr als vorbereitet vorfinden werden."

 RED_RCH_frontline_aggressive: "Keinen Zentimeter an Boden!"
 RED_RCH_frontline_aggressive_desc: "Die beste Verteidigung ist eine gute Offensive! Wir werden sie weiter drängen, ohne dass sie Zeit haben, sich neu zu formieren, genau wie damals, als wir den ganzen Weg nach Berlin gefahren sind!"

 RED_RCH_frontline_defensive: "Tiefenverteidigung"
 RED_RCH_frontline_defensive_desc: "Vor langer Zeit haben wir die Stärke der Faschisten unterschätzt und teuer dafür bezahlt. Millionen von Soldaten starben in unvorbereiteten Verteidigungsanlagen und unsere Zivilisten litten schrecklich unter den Händen ihrer herzlosen Unterdrücker. Obwohl wir sie vernichten werden, müssen wir zunächst sicherstellen, dass sie unsere Verteidigung dieses Mal nicht überwältigen können."

 RED_RCH_frontline_sabotage: "Sabotage faschistischer Vorräte"
 RED_RCH_frontline_sabotage_desc: "Unser Wissen über die Metro ist unübertroffen, wir kennen viele Durchgänge und Zugangskorridore, die andere nicht kennen. Auch wenn wir vielleicht nicht in der Lage sind, eine Armee durch sie hindurchzubringen, sind sie doch perfekt, um sich ins Nazi-Territorium einzuschleichen, dort Chaos anzurichten und dann schnell wieder zu verschwinden."
 RED_frontline_sabotage_decision_tt:0 "Schaltet §GEntscheidungen§! frei, im Krieg mit dem Reich die feindliche Infrastruktur und Versorgung zu stören."

 RED_RCH_frontline_barricades: "Vorläufige Verteidigung"
 RED_RCH_frontline_barricades_desc: "In diesem Krieg reicht es nicht aus, Land zu erobern, wir müssen es auch halten. Jeder Zentimeter, den wir erobern, wird mit Blut bezahlt. Wir werden im besetzten feindlichen Gebiet Verteidigungsanlagen errichten. Wenn sie also versuchen wollen, es zurückzuerobern, müssen sie zehnmal so viel bezahlen wie wir."
 RED_frontline_hunker_down_tt: "In jedem Staat zwischen uns und dem faschistischen Reich, den wir besetzen, errichten wir §YBunker§! und §YInfrastruktur!§!"

 RED_RCH_frontline_AT: "Panzerabwehrausrüstung"
 RED_RCH_frontline_AT_desc: "Die Faschisten haben eine Armee wie keine andere, der wir in der Metro begegnet sind. Sie setzen ausgiebig Schienenbahnpanzer ein, die gegen alle außer unseren stärksten Waffen immun sind. Wir müssen unsere Streitkräfte mit mehr Panzerabwehrwaffen ausstatten, aber wir müssen ihnen auch beibringen, wie sie die Schwachstellen in der feindlichen Panzerung gezielt angreifen können. Sorgen wir dafür, dass jeder Schuss sitzt."

 RED_RCH_frontline_reinforce: "Verstärkt die Front"
 RED_RCH_frontline_reinforce_desc: "Verluste in diesen Schlachten sind ebenso unvermeidlich wie unser Sieg. Wir müssen jedoch sicherstellen, dass sie so schnell wie möglich ersetzt werden. Um dies zu gewährleisten, werden wir in der Nähe der Tunnel gut ausgebildete und ausgerüstete Soldaten bereithalten, damit jede Verstärkung sofort seinen Platz einnehmen kann."

 RED_RCH_frontline_war: "Krieg gegen den Faschismus"
 RED_RCH_frontline_war_desc: "Das Dritte Reich war einer der größten Feinde der Menschheit, den unsere Vorfahren mit großem Aufwand niederstrecken mussten. Doch anstatt tot zu bleiben, haben einige verblendete Fanatiker ihn wieder aus seinem Grab geholt. Es ist an der Zeit, sie daran zu erinnern, wohin ihr großes Reich und ihre perfekte Rasse gehören, in den Mülleimer der Geschichte. Solange es Faschisten gibt, die der Freiheit und dem Frieden im Wege stehen, wird der Kommunismus sie besiegen!"

 RED_flag_above_tverskaya: "Die Rote Fahne über der [275.GetName]"
 RED_flag_above_tverskaya_desc: "Es ist endlich geschafft, obwohl es uns so viel gekostet hat, hierher zu gelangen, haben wir endlich den Sieg errungen. Jetzt weiß die gesamte Metro, dass wir die wahren Erben der Menschheit sind, die Erben der Sowjetunion."

 RED_RCH_frontline_protect_reich_border: "Verteidigen Sie sich gegen faschistische Einfälle"
 RED_RCH_frontline_protect_reich_border_desc: "Wir müssen sicherstellen, dass sowohl unsere Verbündeten als auch wir selbst auf den langen Kampf gegen die Faschisten vorbereitet sind. Wir müssen eine Schlinge um das Reich legen und diese langsam aber sicher festziehen, wir können und werden nicht zulassen, dass einer von ihnen noch einmal entkommt."

 RED_RCH_frontline_support_containment: "Eliminiert die [RCH.GetNameADJ] Bedrohung"
 RED_RCH_frontline_support_containment_desc: "Wenn wir uns dazu entschließen, mit dem Reich in den Krieg zu ziehen, darf es keine halben Sachen geben. Unser Bündnis muss bereit sein, alles zu tun, um ihre rasche Zerstörung sicherzustellen, koste es, was es wolle."

 ######Hanza######
 RED_HNZ_enemy: "Krieg gegen die [HNZ.GetNameDef]"
 RED_HNZ_enemy_desc: "Während das Reich unser größter Feind ist, stehen die Kapitalisten der Hanse nicht weit dahinter. Sie haben neben so vielen anderen Verbrechen, die sie begangen haben, so viele unserer Leute getötet, eine friedliche Vereinigung der Metro verhindert und aus dem Leid ihrer Arbeiter Wohlstand geschaffen. Wir werden ihre Existenz nicht länger dulden, es ist an der Zeit, das Gespenst des Kapitalismus ein für alle Mal zu vernichten. Jetzt ist die Zeit für den 2. und letzten Koalitions-Krieg gekommen."

 ######Friends######
 RED_breakaways: "Ausländische Freunde"
 RED_breakaways_desc: "Bisher haben wir Beziehungen zu den verschiedenen existierenden sozialistischen Fraktionen gemieden, weil diese sich weigerten, unserer Ideologie zuzustimmen. Jetzt, da sich viele der stärksten Fraktionen der Metro gegen uns aufgestellt haben, ist es wichtig, so viele Freundschaften wie möglich zu schließen. Schließlich ist es besser, mit einem verwirrten Kommunisten umzugehen als mit einem Kapitalisten oder Faschisten."

 ############
 RED_1905: "[ULI.GetNameDef]"
 RED_1905_desc: "Die Konföderation von 1905 ist eine Koalition, die sich für einen friedlichen marxistischen Kollektivismus einsetzt. Leider läuft es auch darauf hinaus, dass es sich um eine Gruppe lose organisierter Menschen handelt, die sich nicht einmal auf die gleiche Terminologie für die von ihnen verwendeten Ideen einigen können, geschweige denn, für ein umfassenderes Ziel zusammenzuarbeiten. Wir haben einmal versucht, ihnen die Fehler ihres Verhaltens aufzuzeigen, die sie gnadenlos abgelehnt haben, und jetzt stecken sie zwischen dem Vierten Reich und Hanza fest, eine wenig beneidenswerte Position. Trotz unserer Differenzen in der Vergangenheit versuchen sie, den Lehren von Marx zu folgen und haben es nicht verdient, unter der Hand der Faschisten zu leiden. Lassen Sie uns noch einmal Kontakt aufnehmen."

 RED_1905_civ_1: "Gemeinsamer Werkzeughandel"
 RED_1905_civ_1_desc: "Auch wenn es der 1905 an wirklich herausragenden Qualitäten mangelt, gibt es doch eine beträchtliche Anzahl von Werkzeugherstellern, die ihnen einen stetigen Überschuss liefern. Obwohl ihr Markt zu klein ist, um innerhalb der Roten Linie etwas zu bewirken, würde der Handel ihre Wirtschaft verbessern und uns in ein besseres Licht rücken."

 RED_1905_civ_2: "Vereint die Tunnelgräber"
 RED_1905_civ_2_desc: "Im Jahr 1905 gibt es, wie in vielen anderen Staaten der Metro auch, Grabungsteams, deren einzige Aufgabe darin besteht, Tunnel auszuheben und sie zu sichern. Im Gegensatz zu den meisten anderen haben sie jedoch Schwierigkeiten, ihre Tunnel instandzuhalten, geschweige denn sie zu erweitern. Dies scheint zu einem großen Teil darauf zurückzuführen zu sein, dass viele der Teams genauso fraktioniert sind wie ihre Regierung. Wenn wir eine kleine (aber für sie große) Arbeitsmannschaft schicken würden, um Teile der Stationen von 1905 zu reparieren, würde das ihnen nicht nur zeigen, wie sie für ein gemeinsames Ziel zusammenarbeiten können, sondern auch ihre Regierung stärker an uns binden."

 RED_1905_flavor_1: "Sozialistische Einheit predigen"
 RED_1905_flavor_1_desc: "Der 1905 hat stets an gewissen Qualitäten, einem Kern sozialistischer Ideologie und einem uneinigen politischen System festgehalten. Indem wir den geringen Einfluss, den wir in der Regierung nun haben, nutzen, um gemeinsam auf ein Ziel hinzuarbeiten, können wir ihre größten Sorgen etwas lindern und uns bei ihnen einschmeicheln."

 RED_1905_flavor_2: "Nur nominell unabhängig"
 RED_1905_flavor_2_desc: "Unsere Bemühungen haben Früchte getragen und die verschiedenen Stationsvertreter schreien sich weniger an, obwohl sie noch nicht in einem staatswürdigen Zustand sind. Ein großer Vorstoß unserer Vertreter sollte ihnen endlich klar machen, dass eine Zusammenarbeit in ihrem besten Interesse ist, auch wenn die Arbeit nicht genau ihren Wünschen entspricht."

 RED_1905_2: "Freundschaft mit der Konföderation"
 RED_1905_2_desc: "Nachdem sie ihre Wirtschaft gestärkt und ihre Regierung geeint haben, ist die 1905 endlich bereit, mit uns zusammenzuarbeiten. Gemeinsam werden wir heute eine sozialistischere Welt aufbauen, anstatt bis zum zweiten Ende der Welt über Semantik und Unterschiede zu streiten."

 ############
 RED_trotskyists: "Die Internationale Brigade"
 RED_trotskyists_desc: "Es gibt eine kleine, aber hartnäckige Ansammlung von Kommunisten außerhalb unseres Einflussbereichs. Die Erste Internationale Brigade von Che Guevara, wie sie allgemein genannt werden, haben sich Trotzkis Lügen über Stalin angeschlossen und betrachten uns zusammen mit den Kapitalisten und Faschisten als Feinde der Revolution. Auch wenn wir es ablehnen, mit ihnen zusammenzuarbeiten, haben sie trotz aller Widrigkeiten, einschließlich der Arbeit des NKWD, überlebt. Das macht sie zu einem wertvollen Aktivposten, selbst wenn wir nicht einer Meinung sind."

 RED_trotskyists_civ_1: "Lieferungen von Vorräten"
 RED_trotskyists_civ_1_desc: "Glauben sie den falschen Lügen eines Verrückten?- §RYJa§!./nHaben sie ihre Arbeiter befreit?- §RAuch Ja. Zumindest sollten wir ihnen die Produktionsmittel zur Verfügung stellen, denn sie sind dieser mehr würdig als jeder andere Staat in der Metro.§!"

 RED_trotskyists_civ_2: "Den Kampf finanzieren"
 RED_trotskyists_civ_2_desc: "Während die Einzelheiten dieser Revolution Gegenstand von Diskussionen sind, ist es richtig, dass die Revolution derzeit noch nicht vorbei ist. Viele Arbeiter müssen noch von ihren Fesseln befreit werden, und es gibt nur wenige außerhalb der Revolutionäre, die mehr daran interessiert sind, sie zu befreien. Da dies der Fall ist, werden wir ihnen die Werkzeuge zur Verfügung stellen, mit denen sie ihre Ketten sprengen können."

 RED_guns_for_you_guns_for_me: "Waffen für dich... Waffen für mich"
 RED_guns_for_you_guns_for_me_desc: "Die Abgabe von Waffen an einen instabilen feindlichen Staat kann als Selbstsabotage angesehen werden. Wenn man es jedoch aus einer anderen Perspektive betrachtet, haben wir effektiv mehr Soldaten gewonnen, solange sie auf den wahren Feind ausgerichtet sind. Das ist Geopolitik oder besser, Metropolitik, nehme ich an."
 
 RED_trotskyists_flavour_2: "Gemeinsame Produktionskooperationen"
 RED_trotskyists_flavour_2_desc: "Da sie es sich nun zur Gewohnheit gemacht haben, nicht mit unseren eigenen Waffen auf uns zu schießen, können wir uns wohler fühlen, wenn wir die Revolutionäre mit Waffen versorgen. Obwohl wir alle Waffen brauchen, die wir bekommen können, verfügen wir über jede Menge Ersatzteile und waffenfähiges Material. Durch das Versenden dieser Informationen dürfte es für sie viel einfacher machen, ihre eigenen Waffen zu bauen."

 RED_trotskyists_2: "Eine lohnende Freundschaft"
 RED_trotskyists_2_desc: "Obwohl es noch immer einige Unstimmigkeiten gibt, stehen uns die Revolutionäre nun politisch sehr nahe, und wenn wir über diese letzten Ungenauigkeiten hinweg schauen können, werden wir in ihnen einen geeigneten Verbündeten finden. Jetzt kommt, liebe Kommunisten, auf zur Revolution!"
 
 ############
 RED_anarchists: "Anarchisten"
 RED_anarchists_desc: "Es gibt einen dummen, abtrünnigen Staat, weit entfernt von den wichtigen Ereignissen der Metro, der beschlossen hat, von den kindischen Idealen des Anarchokommunismus besessen zu sein. Was uns am meisten ärgert ist die Tatsache, dass sie als Kommunisten immernoch zu uns gehören und wir sie deshalb in unseren Schoß holen sollten. Sie stehen für die Befreiung der Arbeiter und hassen Hanse und das Reich genauso wie wir."

 RED_anarchists_2: "Gegenseitiger Handel"
 RED_anarchists_2_desc: "Auch wenn die Anarchisten weit weg sind und der Handel mit ihnen aufgrund ihrer Abgeschiedenheit schwierig ist, müssen wir in der Lage sein, reguläre Militärabteilungen zu entsenden, um zumindest über alle Bedrohungen informieren und etwas Wissen „austauschen“ zu können."

 RED_anarchists_3: "Kampf gegen den Faschismus"
 RED_anarchists_3_desc: "Es war tatsächlich überraschend einfach, sie mit einer Allianz in unser Boot zu holen. Während sich unsere Bemühungen, sie dazu zu bringen ihre anarchistischen Wege aufzugeben, als erfolglos erwiesen, waren sie begierig darauf ihre Kräfte zu bündeln, als wir anfingen über die Tötung von Kapitalisten und Faschisten zu sprechen."

 ############
 RED_technicians: "[KUZ.GetNameDef]"
 RED_technicians_desc: "Die Waffenkammer war schon immer ein enger Verbündeter, und wo andere uns im Stich gelassen haben, sind sie standhaft geblieben. Auch wenn sie noch näher sein könnten, müssen wir angesichts der feindseligen Metro um uns herum darauf achten, unsere Freunde in der Nähe zu halten."

 RED_technicians_subvert: "Engere Verbindungen mit dem [KUZ.GetNameDef]"
 RED_technicians_subvert_desc: "Die Waffenkammer hat uns immer richtig behandelt und es ist nur fair, den Gefallen zu erwidern. Indem wir sie mit Lob und Aufträgen überschütten, machen wir ihnen mit Sicherheit klar, wie viel wir von ihnen halten."

 RED_technicians_puppet: "Unter den Augen der [RED.GetNameADJ]"
 RED_technicians_puppet_desc: "Wir werden zwar immer zu schätzen wissen, was die Waffenkammer für uns getan hat, aber Tatsache ist, dass sie ohne uns nichts sind. Nach einer Diskussion mit ihnen über diese Tatsache kamen sie auf die Idee, sich enger in uns zu integrieren. Mit der Waffenkammer unter uns gibt es nichts, das die Rote Linie nicht erreichen kann."

 RED_technicians_factories: "Schicken sie Lebensmittel"
 RED_technicians_factories_desc: "Waffen haben schon immer Essen auf die Tische der Waffenkammer gebracht. Indem wir ihnen regelmäßige Lieferungen aus unseren großzügigen Körben anbieten, können wir einerseits die Sorgen der Techniker lindern, sodass sie sich auf die Produktion konzentrieren können, und andererseits der Bevölkerung zeigen, dass wir nicht hier sind, um ihnen zu schaden."

 RED_technicians_supply_our_arms: "Gemeinsame Waffengeschäfte"
 RED_technicians_supply_our_arms_desc: "Während die Waffenkammer mit Sicherheit am meisten über Waffen in der Metro weiß, mangelt es uns selbst nicht an Wissen. Durch die Kombination dessen, was wir beide wissen, werden wir mit Sicherheit mehr als die Summe unserer Teile erreichen."

 RED_technicians_faction_member: "Mitglied der Union"
 RED_technicians_faction_member_desc: "Während wir auf andere Stationen herabblicken, denen unser nobles Erbe fehlt, bildet die Waffenkammer eine Ausnahme. Sie hätten ihre Waffenproduktion leicht zu ihrem persönlichen Vorteil monopolisieren können. Stattdessen haben sie ihre Waffen nur im Austausch für das, was sie brauchen, mit uns geteilt. Es ist an der Zeit, unsere Bindungen in einem Bündnis zu formalisieren. Mit der Waffenkammer an unserer Seite gibt es nichts, das wir nicht erreichen können!"

 RED_rail_vehicle_designs: "Schaltpläne für Schienenfahrzeuge"
 RED_rail_vehicle_designs_desc: "Mithilfe ihrer umfassenden Verbindungen in der gesamten Metro haben unsere Freunde in der Waffenkammer einen nahezu vollständigen Schaltplan für einen Schienenpanzer zusammengestellt. Wenn wir diese Schaltpläne studieren, können wir unser eigenes Projekt durch jahrelange Forschung vorantreiben."

 RED_joint_arms_deal: "Gemeinsamer Waffenpakt"
 RED_joint_arms_deal_desc: "Um die Vorteile unserer neuen Marionetten nutzen zu können, müssen wir die ihnen zur Verfügung stehenden Ressourcen erweitern. Wir werden damit beginnen, alle unsere alten oder nicht mehr genutzten Waffen einzusammeln und an die Waffenkammer zu versenden. Dort beginnen die Arbeiter dann damit, die Waffenberge nach guten Teilen zu durchsuchen, aus denen dann neue, bessere Waffen hergestellt werden."

 RED_technicians_2: "Die Kenntnisse eines Technikers" #Upgrade RED_technicians_1_idea --> RED_technicians_2_idea
 RED_technicians_2_desc: ""
 
 ############
 RED_pact_of_friendship: "Freundschaftspakt"
 RED_pact_of_friendship_desc: "Wir stehen nicht mehr allein in der Metro, wir haben viele Verbündete und gemeinsam sind wir stark. Obwohl wir ursprünglich einige Vorbehalte gegen sie hatten, haben sie sich für unsere Zeit als lohnenswert erwiesen und wir würden sie nicht gegen die Armeen der Sowjetunion eintauschen! (hauptsächlich, weil wir es nicht können)."

 RED_pact_of_friendship_choice_1: "Glorreiche Union"
 RED_pact_of_friendship_choice_1_desc: "Unsere Völker sind geeinter als je zuvor und der NKWD kann derzeit nicht einmal Theorien über Subversion aufstellen. Auch wenn in den kommenden Tagen noch viel zu tun sein wird, lehnen wir uns zunächst einmal zurück und genießen den Glanz unserer glorreichen Union."

 RED_pact_of_friendship_choice_2: "Für die Welt von morgen"
 RED_pact_of_friendship_choice_2_desc: "Jetzt, da wir Verbündete haben, denen wir vertrauen können, können wir unsere klügsten Köpfe zusammenbringen um nicht nur verlorenes Wissen wiederherzustellen, sondern auch die alte Welt darin zu übertreffen. Sie hätten nie gedacht, dass Menschen in diesen Tunneln leben könnten, noch hätten sie gedacht, dass wir hier unten gedeihen könnten. Wir werden uns eine Welt vorstellen, die besser ist als das gestern."

 RED_pact_of_friendship_choice_3: "Aufbau der Welt von morgen"
 RED_pact_of_friendship_choice_3_desc: "Unser Bündnis verfügt nun über den größten Pool an qualifizierten Arbeitskräften seit den Tagen der Zentralregierung. Wir sind in der Lage, Bauprojekte durchzuführen, von denen sie dachten, dass es Generationen dauern würde, bis wir die Kapazität dafür hätten. Wir sind vielleicht nicht in der Lage, das Ende der Welt ungeschehen zu machen, aber wir sind versucht, zu versuchen eine neue Welt aufzubauen."
 
 ######Minors######
 RED_puppet_kitay_gorod: "Spült die Degenerierten aus"
 RED_puppet_kitay_gorod_desc: "Es gibt eine Abschaumhöhle, die vorgibt, ein Staat namens §YVenedig§! zu sein. Eine Ansammlung überschwemmter Bahnhöfe, die Verbrecherbanden beherbergen, wo man alles kaufen kann und jeder seinen Preis hat. Während sie böse sind und unseren Zorn erfahren werden, gibt es in ihrem Norden eine noch schlimmere Gruppe. Wir werden diese Gangster vertreiben und eine Botschaft nach Venedig senden, dass ihre Tage gezählt sind."

 RED_annex_the_hole: "Annektiert die [338.GetName]"
 RED_annex_the_hole_desc: "Nachdem wir uns um diese kleine Station gekümmert haben, sind wir in einer interessanten Lage: Mit minimalem Aufwand könnten wir eine angrenzende Station restaurieren und verstärken. Dadurch können wir die Kontrolle über unsere neue Marionette stärken und so viel Platz gewinnen."

 RED_SSK_1: "Unterstützt die [SSK.GetName]"
 RED_SSK_1_desc: "Der Sretenskiy Bul'var ist eine kleine, unauffällige Station auf einer unwichtigen Strecke, mit der wir zufällig eine gemeinsame Grenze haben. Obwohl sie uns keinen wirklichen Nutzen bietet, ist ihr größter Anreiz das Fehlen von Anreizen. Es gibt keine großen Mächte, die sie umwerben oder sich überhaupt um sie kümmern könnten, was bedeutet dass wir sie beeinflussen können und es der Metro als Ganzes das egal sein wird."

 RED_SSK_2: "Integriert die [SSK.GetName] in unsere Machtsphäre"
 RED_SSK_2_desc: "Während die Bul'var positiv auf unsere Investition reagiert haben, fragt sich unsere Auslandsabteilung im Laufe der Zeit immer wieder, warum wir uns überhaupt die Mühe machen. Wir könnten unsere Armee ohne Widerstand in ihre Station marschieren lassen, und niemand würde sich darum kümmern. Genau das werden wir tun, natürlich zum Wohle ihrer Bevölkerung."

## Politics ##
 
 ######Maxim's Path######
 RED_moskvin_path: "Moskvin als Generalsekretär"
 RED_moskvin_path_desc: "Mein Bruder dachte immer, er sei mir so überlegen, aber jetzt ist die Wahrheit ans Licht gekommen. Ich bin der überlegene Bruder, ICH!"

 RED_inheritor_of_secretary: "Der Erbe des Sekretärs"
 RED_inheritor_of_secretary_desc: ""

 RED_an_oath_to_communism: "Eid auf den Sozialismus"
 RED_an_oath_to_communism_desc: "Der Sozialismus ist der wahre Weg und diese Tatsache kann nicht vernachlässigt werden. Die Rote Linie ist dem Sozialismus verpflichtet!"

 RED_chief_of_the_force: "Chef der Streitkräfte"
 RED_chief_of_the_force_desc: ""

 RED_old_soviet_methods: "Bewährte und wahre Methoden"
 RED_old_soviet_methods_desc: "Warum sollten wir uns die Mühe machen, das Rad neu zu erfinden? Massenverurteilungenhaben bei unseren Vätern funktioniert, sie werden auch in Zukunft funktionieren, und sie werden mit uns zusammenarbeiten."

 RED_head_the_politburo: "Leiter des Politbüros"
 RED_head_the_politburo_desc: ""
 
 RED_cult_of_personality: "Personenkult"
 RED_cult_of_personality_desc: "Wenn die Alternative darin besteht, im Gulag zu verschwinden, ist es ziemlich einfach, die Verehrung der Menschen zu gewinnen."

 RED_father_of_the_line: "Vater der Roten Linie"
 RED_father_of_the_line_desc: "Schauen Sie sich an, was ich an der Stelle meines Bruders erreicht habe, weil er zu schwach war, um das zu tun, was getan werden musste. Alle in der Roten Linie wissen, wer hier der wahre Anführer ist."
 
 RED_rapid_industrialization: "Beginnen Sie mit der schnellen Militarisierung"
 RED_rapid_industrialisation_desc: "Nachdem die alte Garde verschwunden ist, können wir unsere Leute jetzt direkter kontrollieren und sie dort einsetzen, wo wir sie brauchen. Und wir brauchen sie, um in den Krieg zu ziehen."

 RED_annex_armory: "Annexion der Kusnezki-Brücke"
 RED_annex_armory_desc: "Obwohl sie uns in der Vergangenheit viel Unterstützung zukommen ließen, dürfen wir uns nicht von der Vergangenheit fesseln lassen. Tatsache ist, dass wir wissen, wie wir ihre Fabrik am besten nutzen können, und sie wissen, dass sie uns nicht in einen Kampf verwickeln können."

 ######Andrey's Path######
 RED_andrei_path: "Andreys Position gesichert"
 RED_andrei_path_desc: "Auch wenn es immer Menschen geben wird, die über alle Maßen nach Macht streben, haben wir uns vorerst mit den Schlimmsten von ihnen befasst. Da meine Position nun gesichert ist, können wir uns woanders umsehen."

 RED_take_back_the_politburo: "Erobern Sie das Politbüro zurück"
 RED_take_back_the_politburo_desc: "Das Politbüro agiert oft gegen unsere Interessen, um kleinliche politische Auseinandersetzungen zu fördern. Es ist an der Zeit, sie daran zu erinnern, dass sie den Menschen dienen und was passieren wird, wenn sie ihren Dienst nicht leisten."

 RED_drain_the_swamp: "Legen sie den Sumpf trocken"
 RED_drain_the_swamp_desc: "Die Bürokraten haben die schlechte Angewohnheit, neue Abteilungen und Positionen zu schaffen, um sich politische Gunst oder die Entledigung eines Rivalen zu sichern. Es ist an der Zeit, diese Krebsarten aus unseren Apparat zu entfernen und sie für ihre Rationen arbeiten zu lassen."

 RED_eye_of_the_snake: "Das Auge der Schlange"
 RED_eye_of_the_snake_desc: "Korbut war bis jetzt sehr nützlich, doch sein Plan mich zu ersetzen, zeigte, dass er seine Nützlichkeit überlebt hat. Leider wissen wir, wie leistungsfähig er in seinem Dienst sein kann, deshalb werden wir ihm keine Chance geben zu entkommen. Er wird eine Kugel und ein unmarkiertes Grab an der Seite eines Tunnels bekommen. So wie es eine Schlange verdient."

 RED_reform_the_nkvd: "Rehabilitieren Sie den NKWD"
 RED_reform_the_nkvd_desc: "Der NKWD ist zu wertvoll, um ihn ganz zu verschrotten, aber wir müssen sicherstellen, dass es nicht zu einem weiteren Korbut kommt. Wir werden sie reformieren, damit sie für den Rest der Regierung transparenter sind. Dadurch verlieren sie vielleicht etwas an Stärke, sind aber leichter zu befehligen."

 RED_a_brothers_fate: "Das Schicksal eines Bruders"
 RED_a_brothers_fate_desc: ""

 RED_lenins_descendant: "Der Erbe Lenins"
 RED_lenins_descendant_desc: "Auch wenn ich den Vergleich nicht aus Selbstüberschätzung ziehe, ist es wahr, dass ich der Lenin der Roten Linien bin. Es ist wichtig, sich daran zu erinnern, dass die Entscheidungen, die ich für die Rote Linie treffe, noch lange nach meinem Tod weiterleben werden. Und ich muss dankbar sein, dass mein Leben nicht wie seines ausgelöscht wurde."

 RED_one_unified_socialist_state: "Ein vereinter sozialistischer Staat"
 RED_one_unified_socialist_state_desc: "Es gibt keine Generäle oder Abteilungen mehr, die sich gegenseitig um Einfluss streiten, und unsere Leute streiten sich nicht mehr um Fetzen. Wir sind jetzt in Ziel und Absicht vereint."

 RED_fist_of_lenin: "Die Faust Lenins"
 RED_fist_of_lenin_desc: "Wenn Lenin jetzt  unsere Panzer sehen könnte, wäre er sicherlich stolz auf uns."

 RED_lenins_fury2: "Lenins Zorn entfesselt"
 RED_lenins_fury2_desc: "Es war Lenin, der die erste Sowjetarmee zur Befreiung unseres Volkes aufstellte. Wir werden dafür sorgen, dass wir genauso erbittert kämpfen wie sie."

 ######Korbut's Path######
 RED_korbut_path: "Korbut übernimmt die Kontrolle"
 RED_korbut_path_desc: "Die Zeit der nutzlosen Marionetten ist vorbei, und obwohl ich nicht gerne im Rampenlicht stehe, wird meine direkte Kontrolle Wunder für die Rote Linie bewirken."

 RED_government_roles_for_nkvd: "Regierungsrollen für das NKWD"
 RED_government_roles_for_nkvd_desc: "Wir müssen den NKWD-Mitgliedern hochrangige Posten in der Regierung geben um loyalität und Kompetenz sicher zu stellen."

 RED_cheslav_mihaylovich_nf: "Vetternwirtschaft"
 RED_cheslav_mihaylovich_nf_desc: "Auch wenn manche auf das Wort herabschauen, bleibt die Tatsache bestehen, dass der Einzige, der mit meinem Intellekt mithalten kann, mein Kind ist. Ein Intellekt, den ich nutzen sollte."

 RED_gearing_up_for_war: "Bereiten Sie sich auf den Krieg vor"
 RED_gearing_up_for_war_desc: "Während unsere Feinde bleiben, ist Frieden nur eine Lüge, die wir uns selbst erzählen, um uns zu trösten. Wir müssen bereit sein, bei Bedarf gegen jede andere Person in der Metro zu kämpfen."

 RED_great_terror: "Der Beginn des Großen Terrors"
 RED_great_terror_desc: "Als die Menschen begannen sich gegen mich zu vereinen, vereinten sie dabei eine Stärke, die unüberwindbar schien. Wir müssen sicherstellen, dass sie einander nie wieder vertrauen, und das beste Mittel dafür ist Angst."

 RED_mind_control_serum: "Gedankenkontrollserum"
 RED_mind_control_serum_desc: ""

 RED_future_updates_tt: "\n§CDieser Fokus wird in zukünftigen Updates verfügbar sein§!"

 RED_recruit_spartan_spy: "Turncoat schließt sich den Reihen an"
 RED_recruit_spartan_spy_desc: ""

 RED_spy_networks_increase: "Spionagenetzwerke intensivieren"
 RED_spy_networks_increase_desc: "Unsere Spionagenetzwerke gehörten schon immer zu den besten in der Metro, aber jetzt, wo ich das Sagen habe, müssen wir sie weiter ausbauen. Ich sollte wissen, wann und wo jeder meiner Feinde schläft."

