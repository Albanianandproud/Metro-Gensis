 ### Сообщество ####

  peoples_council: "Народная Партия"
  peoples_council_noun: "Народная Партия"
  peoples_council_desc: "Верные старым советским идеалам, эти люди напрямую избирают эгалитарный совет, который утверждает свою политику на всенародном референдуме, и стремятся отказаться от частной собственности."
  militia_council: "Милицейская Республика"
  militia_council_noun: "Милицейская Республика"
  militia_council_desc: "Милитаристская форма республиканизма, основанная на воинственном, но свободном обществе. Границы между гражданской и военной администрацией размыты, при этом военные чаще всего выступают в качестве выборных представителей. К военнослужащим относятся с большим почтением, поскольку их работа заключается в защите и сохранении общества в периоды конфликтов."
  democratic_republic: "Демократическая Республика"
  democratic_republic_noun: "Демократия"
  democratic_republic_desc: "Будучи убеждённой в демократических ценностях, эта фракция избирает своих лидеров или ассамблею на открытых выборах с тайным голосованием, что является редкостью для Метро."
  communal_party: "Коммуна"
  communal_party_noun: "Коммунальная Партия"
  communal_party_desc: "Эта фракция, живущая без частной собственности и правителей, может представлять собой либо общину фермеров, живущих большой семьей, либо быть откровенно анархической."

 ### Совет ###

  technocracy: "Технократия"
  technocracy_noun:0 "Технократический Совет"
  technocracy_desc: "Технократия, отвергающая как демократию, так и деспотизм, верит в общество, которым правят эксперты, а не выборы, политика или религия."
  labour_council: "Трудовой Совет"
  labour_council_noun: "Трудовой Совет"
  labour_council_desc: "Черпая вдохновение из довоенных Советов, эти трудовые советы организуют общество, основанное на советах работников, избранных из широких слоев населения."
  confederation: "Конфедерация"
  confederation_noun: "Собрание Конфедерации"
  confederation_desc: "Являясь свободной организацией, состоящей из множества групп, эта фракция избирает членов из каждой группы-члена, которые будут представлены в Совете Конфедерации."
  military_junta: "Военная Хунта"
  military_junta_noun: "Военная Хунта"
  military_junta_desc: "Фракция, в которой вся политическая власть сосредоточена в руках военной олигархии, часто носит авторитарный характер."
 
 ### Олигархат ###

  trade_alliance: "Торговый Альянс"
  trade_alliance_noun: "Торговый Конгломерат"
  trade_alliance_desc: "Организация, объединяющая множество различных торговых групп и кланов, которые объединились в первую очередь ради взаимной выгоды или защиты."
  plutocracy: "Плутократия"
  plutocracy_noun: "Плутократия"
  plutocracy_desc: "В этой фракции, где правят исключительно богачи, среди высшего сословия царит демократия, но остальным остается только надеяться на достойное обращение."
  vanguard_party: "Авангардная Партия"
  vanguard_party_noun: "Революционный Авангард"
  vanguard_party_desc: "Во главе движения стоят наиболее компетентные и политически одаренные члены, которые, в свою очередь, мобилизуют простых людей для достижения важных целей. Самые активные члены движения призваны защищать и, что еще важнее, сохранять идеалы Станции, способствуя политическому воплощению ее целей и добиваясь их достижения любыми средствами."
  mafia_state: "Преступный синдикат"
  mafia_state_noun: "Преступный синдикат"
  mafia_state_desc: "Слабо связанные между собой гангстеры или преступники, объединенные под предлогом консолидации власти и богатства для всех членов партии."

 ### Диктатура ###

  despot: "Деспотизм"
  despot_noun: "Клика Деспотов"
  despot_desc: "При деспотизме вся власть сосредоточена в руках одного человека, который считает себя выше других. Его правление не подвергается сомнению благодаря страху, промыванию мозгов или бессмысленной жестокости. В отличие от тоталитаризма, при котором власть предоставляется на основании занимаемой должности, например фюреру или генеральному секретарю, которые, в свою очередь, направляют нацию к достижению идеологических целей, деспоты сами являются воплощением власти. У них нет альтернативы или предвестников грядущей смены власти. Как только их кровавое правление закончится, все, что они построили, рухнет."
  bandit: "Бандитизм"
  bandit_noun: "Клика Бандитов"
  bandit_desc: "Преступная группировка, организованная исключительно ради наживы и грабежа, держится на страхе и запугивании."
  totalitarianism: "Тоталитаризм"
  totalitarianism_noun: "Деспотическое собрание"
  totalitarianism_desc: "Общество, в котором государство является абсолютным и стремится полностью контролировать все аспекты повседневной жизни. Частные сферы власти стремятся раздавить, поскольку тоталитарные режимы управляются под идеологическими предлогами."

  community_acceptance: "Общественное признание"
  council_acceptance: "Признание советом"
  oligarch_acceptance: "Признание олигархией"
  dictatorial_acceptance: "Диктаторское признание"
