l_german:
 nf_SPT.1.t:0 "Ressourcenmangel"
 nf_SPT.1.d:0 "Hallo Herr Oberst. Aktuell liegen unsere Aktivitäten nach außerhalb der Kontrolle der Polis, dennoch sind wir inzwischen von ihrer politischen Unterstützung abhängig und nun müssen wir sie wohl auch um Ressourcen bitten. Unsere Arbeiter haben kein Material mehr mit denen sie arbeiten könnten und folglich werden unseren Rangern die Waffen ausgehen! Auch wenn wir mit Arbat oder der Hanse Handel treiben können, so wäre es doch viel leichter die benötigten Ressourcen einfach von der Oberfläche zu holen.\n\nWir haben mehrere wichtige Positionen mit vielversprechenden Vorkommen gefunden. Wir hoffen euer Plan geht auf, Herr Oberst."
 nf_SPT.1.a:0 "Ein guter Plan"
 SPT_salvaging_duties_tt: "Schaltet Entscheidung frei: §YStalker-Expeditionen§!"
 SPT_balanceofpower_tt:0 "§YDer nächste Anführer wird über das Schicksal des Ordens bestimmen!§!"

 nf_SPT.2.t:0 "Stalkeroperation: Nachtrag"
 nf_SPT.2.d:0 "Auch wenn eine Expedition an die Oberfläche jedesmal aufs Neue eine Herrausforderung darstellt, so waren unsere Spartaner dennoch erfolgreich. Die von uns gefundenen Vorkommen blieben intakt und können nun genutzt werden. Wir sichern die Positionen mit einem rudimentären Außenposten und machen uns dann wieder an die Arbeit. Unsere Ressourcenprobleme sollten wir so lösen können."
 nf_SPT.2.a:0 "Hilfreich, aber wir brtauchen mehr"
 nf_SPT.2.b:0 "Eine ordentliche Beute, doch nicht genug"
 nf_SPT.2.c:0 "Unsere Lager sind voll, das sollten vorerst genug Ressourcen sein."

 nf_SPT.3.t:0 "Die Charta des Ordens - 2028"
 nf_SPT.3.d:0 ""
 nf_SPT.3.a:0 "Unser Orden muss stärker werden"
 
 nf_SPT.4.t:0 "Übertragt unsere Territorien"
 nf_SPT.4.d:0 ""
 nf_SPT.4.a:0 "Rechtmäßig gehört es ihnen."

 nf_SPT.5.t:0 "Unsere Veteranen kehren zurück"
 nf_SPT.5.d:0 ""
 nf_SPT.5.a:0 "Ausgezeichnet!"

 nf_SPT.6.t:0 "Tushino kapituliert bedingungslos"
