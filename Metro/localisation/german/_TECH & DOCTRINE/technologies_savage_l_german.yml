l_german:
   ## TAG aligned are unique Techs. Stored here to cut down on filesize bloat

   ## Equipment Modifiers
   savage_ranged_equipment: "Barbaren Fernkampf-Ausrüstung"

   savage_society_tech_1: "Feuersteine"
   savage_society_tech_1_desc: "Nicht nur kann man mit ihnen Feuer machen, sie sind auch allgemein sehr scharf."

   savage_society_tech_2: "Spezialwerkzeuge"
   savage_society_tech_2_desc: "Den gleichen Stein zu verwenden, um andere Steine wegzuschlagen, ist gut genug, aber die Anschaffung einer vielfältigeren Auswahl an Steinwerkzeugen, die für eine bestimmte Aufgabe konzipiert sind, würde unser effektives Werkzeugsortiment und die Effizienz unserer Handwerker weiter verbessern."

   savage_society_tech_3: "Feuersteinhacke"
   savage_society_tech_3_desc: "Ähnlich wie eine Axt, nur viel schärfer."

   savage_society_tech_4: "Fleischkonservierung"
   savage_society_tech_4_desc: "Wenn man Fleisch räuchert anstatt es nur zu kochen hält es viel länger."

   savage_society_tech_5: "Verbesserte Taue"
   savage_society_tech_5_desc: "Stärkere Seile bewegen größere Kräfte."

   savage_society_tech_6: "Fiedelbohrer"
   savage_society_tech_6_desc: "Ein Bogen dreht ein Stück Holz so schnell, dass es Feuer fängt."

   savage_tech_1a: "Wetzstein"
   savage_tech_1a_desc: "Einen Stein leicht befeuchten und schon kann man ihn als Wetzstein verwenden, so einfach."

   savage_tech_2a: "Umwickelte Griffe"
   savage_tech_2a_desc: "Nur wer eine Waffe gut greifen kann, der kann auch ihr volles Potenzial entfalten."

   savage_tech_3a: "Durchbohrter Stein"
   savage_tech_3a_desc: "Anstatt den Stein oder die Klingenkante brutal in ein Stück Holz zu rammen, können wir ein passendes Loch in den Stein selbst bohren. Die Befestigung mit Tauwerk oder anderen Materialien verbessert die Wirksamkeit."

   savage_tech_4a: "Knochensplitter"
   savage_tech_4a_desc: "Normalerweise sollen Waffen ihren Angriffen standhalten, doch was wenn nicht? Wenn wir Knochensplitter an ihnen befestigen gelangen diese ins Fleisch des Feindes."

   savage_military_tech_1: "Kräutermedizin"
   savage_military_tech_1_desc: "Hier in der Tiefe wachsen alte und neue Pflanzen und Pilze, viele mit medizinischen Wirkungen"

   savage_military_tech_2: "Rituelle Gesichtsbemalung"
   savage_military_tech_2_desc: "Als Symbol ihrer Tapferkeit werden unsere besten Krieger mit einer heiligen Gesichtsbemalung verziert, dies wird die Moral der Truppe deutlich erhöhen."

   savage_military_tech_3: "Verzauberte Talismane"
   savage_military_tech_3_desc: "Mit ihnen können wir nicht mehr verlieren, hat der Priester gesagt."

   savage_military_tech_4: "Kriegstrommeln"
   savage_military_tech_4_desc: "Trommeln trommeln in der Finsternis"

   savage_military_tech_5: "Fährtenleser"
   savage_military_tech_5_desc: "Was lesen sie?"

   savage_military_tech_6: "Militärische Rückentwicklung"
   savage_military_tech_6_desc: "Krieg heißt töten, dafür braucht es keine hübschen Umschreibungen"

   savage_spec_ops_equipment_tech_2: "Die guten Pilze"
   savage_spec_ops_equipment_tech_2_desc: "Lassen einen die Zwischenwelt sehen und keinen Schmerz spüren. Beides sehr hilfreich im Kampf"

   savage_spec_ops_equipment_tech_4: "Gesegnete Waffen"
   savage_spec_ops_equipment_tech_4_desc: "+20% Holy Damage"

   savage_ranged_equipment_2_tech: "Lähmendes Gift"
   savage_ranged_equipment_2_tech_desc: "Gift für die Pfeile unserer Blasrohre, entscheiden wir später was wir mit den Feinden machen."

   savage_ranged_equipment_3_tech: "Gefiederte Pfeile"
   savage_ranged_equipment_3_tech_desc: "Fliegen damit besser, fast wie ein Vogel. Halt warte, was ist ein Vogel?"

   savage_ranged_equipment_5_tech: "Passendes Mundstück"
   savage_ranged_equipment_5_tech_desc: "Kein Atemzug wird verschwendet, alles wir auf den Feind geschleudert."

   underzealot_worm_rail_equipment_tech_1: "Wurmbrut"

