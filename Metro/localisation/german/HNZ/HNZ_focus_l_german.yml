HNZ_BRN_2: "Den Handelsposten annektieren"
HNZ_BRN_2_desc: "Belorusskaya (Nord) ist ein bedeutender Handelsplatz unmittelbar außerhalb des Hansegebiets. Zahlreiche Händler kommen hierher, um ihre Waren anzubieten. Die Gewinne dieser Station wecken natürlich das Interesse unserer Verwaltung. Wir sollten den Freien Farmen und Fabriken ein Angebot zum Kauf der Station unterbreiten."

