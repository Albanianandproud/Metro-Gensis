scavenge_poi_category_uncommon: "Ereignis erhalten: §7Ungewöhnlicher§! interessanter Ort"
scavenge_poi_category_rare: "Ereignis erhalten: §4Seltener§! interessanter Ort"
scavenge_poi_category_exotic: "Ereignis erhalten: §2Exotischer§! interessanter Ort"
scavenge_poi_category_unique: "Ereignis erhalten: §0Einzigartiger§! interessanter Ort"

scavenge_poi_common_unmarked_building.1.t: "Das unmarkierte Gebäude"
scavenge_poi_common_unmarked_building.1.d: "Ein Stalker-Trupp wurde ausgesandt. Während er sich im Schutz der Dunkelheit von einer eingestürzten Ruine zur nächsten bewegte, entdeckte er ein unmarkiertes Gebäude, das auf unheimliche Weise vollkommen intakt geblieben war. Weder Bomben noch Witterung hatten sichtbare Spuren hinterlassen; es wirkte, als wäre die Zeit selbst daran vorbeigegangen.\n\nIm Inneren war die Luft noch immer giftig. Die Gänge waren eng und der Boden von Staub bedeckt. Weit davon entfernt, Schutz vor der Kälte und den Bedingungen der Oberfläche zu bieten, machten sich unsere Stalker dennoch an die Arbeit.\n\nNichts. Keine Anzeichen von Bewohnern, keine Leichen. Vermutlich handelte es sich einst um einen Bürokomplex oder ein Verwaltungsgebäude, schlossen unsere Stalker. Doch keine Geräusche waren zu hören, nicht einmal das Flüstern des Windes. Unsere Männer nahmen mit, was sie finden konnten. Die Ausbeute war zwar bescheiden, doch das Gebäude besaß immerhin einen gewissen Wert."
scavenge_poi_common_unmarked_building.1.a: "Wenigstens konnten wir etwas Brauchbares bergen."

scavenge_poi_common_unmarked_building.2.d: "Ein Stalker-Trupp wurde ausgesandt. Im Schutz der Dunkelheit bewegte sich die Expedition von einer eingestürzten Struktur zur nächsten, bis sie schließlich das unmarkierte Gebäude erreichte. Wobei die Bezeichnung „Gebäude“ wohl übertrieben wäre – lediglich Trümmer und Ruinen waren geblieben. Unsere Stalker vermuten, dass es sich einst um einen Wohnkomplex handelte, doch selbst die wenigen Hinweise aus den Überresten werfen mehr Fragen auf, als sie beantworten.\n\nUnter einem Haufen verbogener Stahlträger fanden unsere Männer eine Luke, die in die unteren Bereiche des Komplexes führte. Zu flach, um damals Schutz vor Strahlung oder den Elementen geboten zu haben, falls jemand versucht hätte, dort Zuflucht vor den Bomben zu suchen. Stattdessen fanden die Stalker in dem engen Raum mehrere Kisten mit Munition und einige Schusswaffen ... leider waren sie viel zu stark verrostet und beschädigt, um noch brauchbar zu sein."
scavenge_poi_common_unmarked_building.2.a: "Kein Regierungsbunker, aber besser als nichts."

scavenge_poi_common_unmarked_building.3.d: "Ein Stalker-Trupp wurde ausgesandt. Von Trümmerfeld zu Trümmerfeld schleichend näherte sich der Einsatztrupp dem unmarkierten Gebäude, das schief im Wind stand. Als sie sich näherten, legte sich eine unheimliche Stille über die Umgebung. Im Inneren waren Lichter zu erkennen.\n\nUnmöglich, dachten sie. Ein tiefes Gefühl von Beklemmung und Unbehagen erfasste die Männer, als sie versuchten einzudringen. Mit jeder Minute wurde dieses Gefühl stärker. Da sie keinen Zugang fanden, versuchte einer unserer Stalker gewaltsam einzudringen. Die Lichter im Inneren brannten jedoch unbeirrt weiter – trotz der Stille und entgegen jeder vernünftigen Erklärung. Nur wenige Minuten später kam der Mann wieder heraus, erschüttert und wie betäubt vor Angst. Unmittelbar darauf begannen die Lichter zu erlöschen. Was er dort gesehen hatte, wollte er nicht verraten; doch offensichtlich hatte ihn das Erlebnis für immer verändert."
scavenge_poi_common_unmarked_building.3.a: "Wahrlich ein bemerkenswerter Fund."

scavenge_poi_common_construction_yard.1.t: "Baustelle"
scavenge_poi_common_construction_yard.1.d: "Eine Baustelle, deren Arbeiten lange vor dem Einschlag der Bomben eingestellt worden waren. Der Ort war bereits vielfach geplündert worden, und alles von Wert war längst verschwunden. Maschinen, Werkzeuge und sonstige Geräte waren bei der Ankunft unserer Stalker nur noch verrosteter Schrott. Dennoch fanden sie unter einigen Planen noch Baumaterialien. Zwar kaum noch für Bauzwecke geeignet, aber immerhin verwertbar."
scavenge_poi_common_construction_yard.1.a: "Dieser Schrott wird unserer Station nützen."

scavenge_poi_common_construction_yard.2.d: "Die Bauarbeiten scheinen unmittelbar mit dem Beginn des Bombardements eingestellt worden zu sein. Die Leichen der Arbeiter liegen noch immer unter Bergen aus Asche und Trümmern begraben. Alles, was leicht zu bergen gewesen wäre, wurde längst von früheren Stalkern mitgenommen. Die schweren Baumaschinen hingegen waren bereits vor Jahren zu rostenden Wracks verkommen.\n\nDennoch gelang es unseren Männern, einen elektrischen Dynamo zu bergen, der sich noch in erstaunlich gutem Zustand befand. Mit einigen Reparaturen könnte er sich als äußerst nützlich erweisen."
scavenge_poi_common_construction_yard.2.a: "Endlich wieder Licht!"

scavenge_poi_common_warehouse.1.t: "Verlassenes Lagerhaus"
scavenge_poi_common_warehouse.1.d: "Ein riesiges Lagerhaus aus Wellblech wäre in den ersten Tagen nach dem Krieg zweifellos eines der ersten Ziele von Plünderern gewesen – und sein leerer Innenraum bestätigte genau das.\n\nDoch so einfallsreich unsere Stalker sind, gelang es ihnen dennoch, einiges zusammenzutragen. Bauteile, Schrott, Rohstoffe – praktisch alles, was noch irgendwie verwertbar war. Sogar die Stahlträger und Stützbalken wurden geborgen."
scavenge_poi_common_warehouse.1.a: "Diese Ressourcen werden wir gut nutzen können."

scavenge_poi_common_warehouse.2.d: "Ein riesiges Lagerhaus aus Wellblech wäre in den ersten Tagen nach dem Krieg zweifellos als Erstes geplündert worden, und sein leerer Innenraum ließ daran keinen Zweifel.\n\nWas jedoch in halb geöffneten Containern zurückgelassen wurde, waren Bücher, technische Dokumente und Anleitungen. Zwar richteten sie sich eher an gewöhnliche Verbraucher als an ausgebildete Ingenieure, doch da unser Wissensstand stetig schwindet, können selbst einfache Möbelbauanleitungen oder Handbücher zur Holzbearbeitung von großem Nutzen sein."
 scavenge_poi_common_warehouse.2.a: "Hoffentlich können unsere Gräber diese Informationen sinnvoll nutzen."

scavenge_poi_common_warehouse.3.d: "Ein riesiges Lagerhaus aus Wellblech wäre in den ersten Jahren nach dem Krieg sicherlich als eines der ersten Gebäude geplündert worden, und sein leerer Innenraum bestätigte dies eindrucksvoll.\n\nDoch unsere Stalker ließen keine Kiste ungeöffnet und keinen Schrank unangetastet, und ihre Gründlichkeit zahlte sich aus. Sie entdeckten einen wahren Schatz aus Büchern und Wissen, der selbst einen Bücherwurm aus der Polis neidisch gemacht hätte – und das alles in bemerkenswert gutem Zustand."
scavenge_poi_common_warehouse.3.a: "Unsere Industrie wird von diesem Fund profitieren!"

scavenge_poi_common_police_station.1.t: "Verlassene Polizeistation"
scavenge_poi_common_police_station.1.d: "Dieser Ort wäre mit Sicherheit als Erstes geplündert worden – entweder von den örtlichen Sicherheitskräften während der ersten Tage des Dritten Weltkriegs oder später von den Stalkern des Zentralkomitees. Entsprechend erwarteten wir keine wertvolle Beute.\n\nWie erwartet waren Waffen und Ausrüstung längst verschwunden. Allerdings war nur das Erdgeschoss und die Hauptbereiche der Station durchsucht worden; der Keller blieb weitgehend unangetastet. Bei ihrer Suche fanden unsere Stalker dort die Waffenkammer, die selbst nach all den Jahren noch verschlossen war. Mit einiger Mühe gelang es ihnen, die Tür aufzubrechen. Im Inneren befanden sich alte Polizeiausrüstung, Gürtel, Helme und Winteruniformen aus vergangenen Zeiten. Vermutlich wurden sie zurückgelassen, als modernere und effektivere Ausrüstung beschlagnahmt wurde."
scavenge_poi_common_police_station.1.a: "Diese Ausrüstung wird uns gute Dienste leisten."

scavenge_poi_common_police_station.2.d: "Dieser Ort wäre mit Sicherheit als Erstes geplündert worden – entweder von lokalen Kräften während der ersten Kriegsmonate oder später von den Stalkern des Zentralkomitees. Deshalb erwarteten wir kaum etwas von Wert.\n\nLeider wurden weder Waffen noch Munition gefunden, doch das erwies sich keineswegs als Enttäuschung. Unsere Stalker entdeckten einen unversehrten Raum, geschützt vor Wind und Wetter, der noch immer voller alter Polizeiausrüstung und Ausrüstungsgegenstände war. Trotz ihres schlechten Zustands nahmen sie mit, was sich noch transportieren ließ."
scavenge_poi_common_police_station.2.a: "Blau ist also wieder in Mode...?"

scavenge_poi_common_hospital.1.t: "Verlassene Klinik"
scavenge_poi_common_hospital.1.d: "Zu unserer Überraschung – und sehr zum Leidwesen der Hoffnungen unserer Verwaltung – stellte sich die entdeckte „Klinik“ nicht als medizinische Einrichtung, sondern als Tierarztpraxis heraus. Erstaunlicherweise schien nur selten jemand diesen Ort gründlich durchsucht zu haben. Zwar waren viele Materialien und Medikamente längst unbrauchbar geworden, doch unsere Stalker fanden dennoch einige interessante Dinge. Auch wenn unsere Ärzte wohl kaum in nächster Zeit Hunde oder Katzen operieren werden, enthielten die gefundenen Unterlagen ausführliche Informationen über chirurgische Präzision, die richtige Lagerung von Blutkonserven und die Sterilisation medizinischer Geräte. Es mag kein Werk von I. M. Setschenow sein – aber es wird genügen."
scavenge_poi_common_hospital.1.a: "Kaum zu glauben, dass selbst das Wissen über Bakterien und Parasiten langsam in Vergessenheit gerät..."

scavenge_poi_common_hospital.2.d: "Wie wir bereits vermutet hatten, gehörten Apotheken, Krankenhäuser und Kliniken zu den ersten Orten, die von Stalkern geplündert wurden. Das Innere dieser Klinik bestätigte dies eindrucksvoll. Alles war entfernt worden – bis hin zu den Operationskitteln und selbst den Bodenfliesen. Allerdings bezweifeln wir, dass hier jemals größere chirurgische Eingriffe durchgeführt wurden. Dennoch stießen unsere Stalker auf einen alten Autoklaven, der offenbar bereits teilweise von der Wand gelöst worden war. Obwohl der Transport äußerst mühsam war, gelang es ihnen schließlich, das schwere Gerät zurückzubringen."
scavenge_poi_common_hospital.2.a: "Unsere Ärzte werden sich über diesen Fund freuen."

scavenge_poi_common_hardware_store.1.t: "Zerstörter Eisenwarenladen"
scavenge_poi_common_hardware_store.1.d: "Ein Eisenwarenladen – zumindest dem Namen nach. Der Großteil des Inventars war bereits geplündert oder den Elementen zum Opfer gefallen. Holz war verfault, Metall verrostet und Werkzeuge längst stumpf geworden. Dennoch fanden sich noch einige technische Dokumente, auch wenn viele Seiten beschädigt oder kaum noch lesbar waren."
scavenge_poi_common_hardware_store.1.a: "Hoffentlich haben wir noch genug Schrott herumliegen, um daraus etwas zu machen."

scavenge_poi_common_hardware_store.2.d: "Ein altes Kaufhaus wäre zweifellos eines der ersten Ziele von Plünderern gewesen, weshalb unsere Stalker keine großen Erwartungen hatten. Dennoch fanden sie einige technische Unterlagen sowie verschiedene Werkzeuge, die zwar längst stumpf geworden waren, aber noch repariert werden könnten. Mit etwas Pflege könnten unsere Techniker und Arbeiter sie vielleicht wieder einsatzfähig machen."
scavenge_poi_common_hardware_store.2.a: "Hoffentlich haben unsere Ingenieure das Lesen nicht verlernt."

scavenge_mission_horror.2.t: "Mutantenhorde zerschlagen!"
scavenge_mission_horror.2.d: "Unsere Stalker stellten sich der heranstürmenden Mutantenhorde entschlossen entgegen. Die Schlacht tobte bis in die frühen Morgenstunden, und als die schwache Sonne schließlich über den Horizont kroch, waren sämtliche Mutanten vernichtet. Erschöpft kehrten unsere Stalker nach Hause zurück – nicht ohne zuvor die Beute einzusammeln, die sie vor Beginn des Angriffs versteckt hatten."
scavenge_mission_horror.2.a: "Gut gemacht."
scavenge_mission_horror.2.tt: "Unterstützungswaffen müssen erneut an unsere Stalker-Teams ausgegeben werden."

scavenge_mission_horror.3.t: "Bis zum letzten Atemzug"
scavenge_mission_horror.3.d: "Unsere Stalker hielten der Angriffswelle stand. Der Kampf zwischen Klauen und Kugeln war erbittert und dauerte bis tief in die Nacht hinein. Als die blasse Sonne schließlich über dem Horizont erschien, waren nur noch wenige unserer Stalker am Leben – doch sie hatten einen hart erkämpften Sieg errungen. Die Gefallenen wurden an der Oberfläche würdig bestattet, bevor die Überlebenden den Heimweg antraten."
scavenge_mission_horror.3.a: "Den Gefallenen zum Gedenken..."
scavenge_mission_horror.3.tt: "Zu erschöpft, um weiterzumachen; wir müssen unser Stalker-Team neu aufstellen."

scavenge_mission_horror.4.t: "Überstürzter Rückzug"
scavenge_mission_horror.4.d: "Hinter einer hastig errichteten Barrikade aus Trümmern und Schutt stemmten sich unsere Stalker mit aller Kraft gegen die anstürmende Horde widerwärtiger Mutanten. Doch es war nicht genug. Als die blasse Sonne über den Horizont stieg, hatten unsere Männer bereits die Flucht ergriffen und die Leichen ihrer gefallenen Kameraden zurücklassen müssen."
scavenge_mission_horror.4.a: "Diese abscheulichen Kreaturen..."
scavenge_mission_horror.4.tt: "Wir müssen unser Stalker-Team von Grund auf neu aufbauen."

scavenge_poi_uncommon_church.1.t: "Verlassene Kirche"
scavenge_poi_uncommon_church.1.d: "Das Haus Gottes, dem Verfall preisgegeben. Säulen und Bögen waren in sich zusammengestürzt und hatten das gesamte Gebäude in einen Trümmerhaufen verwandelt. Unsere Stalker suchten das Gelände gründlich nach einem Keller oder ähnlichem ab und wurden gerade in dem Moment belohnt, als sie beinahe aufgeben wollten. Sie entdeckten eine Krypta auf dem Gelände der Kirche. Hinter einem überfluteten Vorraum fanden sie einige wenige kirchliche Artefakte. Zwar war es weit davon entfernt, der Heilige Gral zu sein, doch diese Gegenstände lassen sich sicherlich an jemanden verkaufen, der noch sentimentale Gefühle für die alte Welt hegt."
scavenge_poi_uncommon_church.1.a: "Es fühlt sich falsch an, die Kirche zu bestehlen ... aber wer sollte uns dafür verurteilen?"

scavenge_poi_uncommon_church.2.d: "Das Haus Gottes, zurückgelassen in einer Welt, die von Feuer und Zerstörung gezeichnet wurde. Als unsere Stalker die Kirche entdeckten, war sie überraschend gut erhalten, und ihr Inneres noch mehr. Zwar war das Dach an einigen Stellen eingestürzt und sämtliche Fensterscheiben zerbrochen, doch die vier Mauern standen noch immer fest. Selbst die großen Holztüren waren noch brauchbar.\n\nBei einer ersten Untersuchung fanden unsere Männer nichts von unmittelbarem Wert, doch sie schlugen vor, das Gebäude als temporären Stützpunkt zu nutzen – vorausgesetzt, wir investieren in einige Instandsetzungsarbeiten. Die Kirche bietet eine gut zu verteidigende Position und könnte unseren Stalkern ermöglichen, weiter in die Oberfläche vorzudringen, während sie gleichzeitig einen Zufluchtsort vor den harschen Bedingungen dort oben erhalten."
scavenge_poi_uncommon_church.2.a: "Wie in vergangenen Zeiten werden wir erneut Zuflucht im Haus Gottes suchen."
scavenge_poi_uncommon_church.2.a.tt: "Unsere Bergungstrupps können diesen Ort als Operationsbasis nutzen."

scavenge_mission_poi.1.t: "Interessanter Ort entdeckt"
scavenge_mission_poi.1.d: "Interessante Nachrichten erreichen uns. Unsere Stalker berichten, dass sie zwischen den Ruinen und von Einschlagkratern übersäten Straßen Moskaus einen vielversprechenden Fundort entdeckt haben. Einer von ihnen konnte sogar hastig eine grobe Wegbeschreibung auf ein Stück Papier kritzeln.\n\nVielleicht sollten wir der Sache nachgehen?"
scavenge_mission_poi.1.a: "Notiert es! Das könnte sich als wertvoll erweisen."

scavenge_poi_uncommon_parkinglot.1.t: "Unterirdisches Parkhaus"
scavenge_poi_uncommon_parkinglot.1.d: "Ein Meer aus Rost, soweit das Auge reichte. Was für viele lediglich ausgebrannte, korrodierte und ausgehöhlte Fahrzeugwracks gewesen wären, stellte für einen erfahrenen Plünderer eine wahre Schatzkammer dar."
scavenge_poi_uncommon_parkinglot.1.a: "Automotoren? Jetzt wird es interessant. Endlich echte Pferdestärken!"

scavenge_poi_uncommon_parkinglot.2.d: "Das Parkhaus war erstaunlich gut erhalten, wenn auch viel zu oberflächennah, um Schutz vor der Strahlung zu bieten. Für seine einstigen Bewohner wurde diese Erkenntnis allerdings erst offensichtlich, als es bereits zu spät war. Etwa zwei Dutzend Menschen hatten hier Zuflucht gesucht. Ob sie an der Strahlenkrankheit oder an schwindenden Vorräten starben, konnten unsere Stalker nicht feststellen. Sicher ist nur, dass ihre letzten Tage von Leid geprägt gewesen sein müssen."
scavenge_poi_uncommon_parkinglot.2.a: "Das Andenken an die Verstorbenen darf nicht vergessen werden."

scavenge_poi_uncommon_parkinglot_inhabited.1.t: "Unterirdischer Parkhauskomplex"
scavenge_poi_uncommon_parkinglot_inhabited.1.d: "Der Parkhauskomplex reichte weit tiefer hinab, als unsere Stalker zunächst angenommen hatten. Durch die Dunkelheit tasteten sie sich bis in die untersten Ebenen vor und wurden dort überraschend von Bewohnern angegriffen. Keine Mutanten und keine Tiere – echte Menschen. Unsere Stalker waren überrascht, doch die Bewohner offenbar noch mehr.\n\nNachdem sich die Lage beruhigt hatte und beiden Seiten klar wurde, dass sie nicht gegen Mutanten kämpften, begann ein Gespräch.\n\nDie Menschen erklärten, dass sie sich hierher retten konnten, als die Bomben fielen, und seitdem unter der Erde überlebt hatten. Sie filterten Eiswasser aus undichten Rohren und ernährten sich gelegentlich von Ratten. Irgendwann hatten sie es sogar geschafft, einige der Fahrzeugwracks zu provisorischen Dynamos umzubauen, um einen kleinen Garten mit Strom zu versorgen, bis schließlich auch die letzten Energiereserven erschöpft waren. Ihre ohnehin knappen Vorräte wurden streng rationiert. Außerdem berichteten sie, dass sie einst mehrere Freiwillige hatten, die erfolgreich die Oberfläche erkundeten, bevor die Strahlung zu stark wurde.\n\nIn jüngster Zeit jedoch verschwanden ihre eigenen „Stalker“, und die Vorräte gehen zur Neige. Da sie keinen anderen Zufluchtsort mehr haben, bitten sie uns, ihnen bei der Evakuierung in die Metro zu helfen, wo sie deutlich sicherer wären."
scavenge_poi_uncommon_parkinglot_inhabited.1.a: "Wir werden ihnen helfen, in unsere Stationen zu gelangen."

scavenge_poi_uncommon_parkinglot_inhabited.2.d: "Der Parkhauskomplex war deutlich flacher, als wir zunächst angenommen hatten. In völlige Dunkelheit gehüllt, überraschte er unsere Stalker mit unerwarteten Bewohnern. Keine Mutanten, sondern Menschen. Menschen, die sofort das Feuer eröffneten, weil sie uns für Mutanten hielten. Für einige Augenblicke entwickelte sich ein Feuergefecht, bis beide Seiten gleichermaßen überrascht innehielten. Aus einzelnen Zurufen entwickelte sich schließlich ein Gespräch.\n\nEs stellte sich heraus, dass diese Menschen keine Banditen waren, sondern Überlebende von außerhalb Moskaus. Sie berichteten unseren Stalkern, dass sie sich einst auf einer Art „heiligen Pilgerreise“ befunden hätten und Nachkommen einer religiösen Gemeinschaft seien. Über ihre Glaubenslehren wollten sie allerdings nur wenig verraten. Was unsere Stalker jedoch erfuhren, war, dass ihr früherer Anführer eine beunruhigende Präsenz in dieser Welt gespürt hatte – und zwar direkt in Moskau. Welche Bedrohung dies auch sein mochte, sie sollte angeblich selbst den Dritten Weltkrieg verblassen lassen. Ihre Mission bestand darin, diese Gefahr zu vernichten.\n\nSie boten an, sich unseren Kräften anzuschließen, sofern wir ihnen Zugang zur Metro gewähren. Als Gegenleistung überließen sie uns einen Teil ihrer Ausrüstung. Obwohl sie diese als überschüssig bezeichneten, befand sie sich in außergewöhnlich gutem Zustand und war mit einer handwerklichen Präzision gefertigt worden, die weit über die Fähigkeiten der meisten Techniker der Metro hinausging."
scavenge_poi_uncommon_parkinglot_inhabited.2.a: "Willkommen in der Metro."

scavenge_poi_uncommon_parkinglot_inhabited.3.d: "Das Parkhaus erwies sich als weit weniger beeindruckend, als es zunächst den Anschein hatte. Große Teile der unteren Ebenen waren überflutet und praktisch unzugänglich. Eine Ebene jedoch war noch intakt und beherbergte ein improvisiertes Lager. Zunächst schien es verlassen zu sein, doch die Bewohner kehrten zurück, während unsere Stalker gerade ihre Habseligkeiten durchsuchten. Beinahe wäre es zu einem Feuergefecht gekommen. Einer ihrer Stalker, der offenbar verletzt war, schaffte es jedoch, beide Seiten zu beruhigen.\n\nNach vorsichtiger Annäherung erfuhren unsere Männer, dass es sich um ehemalige Bewohner des Parks Pobedy handelte, die tief in die Tunnel geflohen waren, als die Verbindung zur Station abriss. Jahrelang hatten sie von Ort zu Ort gelebt – manchmal in tiefen Kellern an der Oberfläche –, wo sie aus Schrott Atemschutzmasken bauten und ihre Schutzanzüge reparierten. Im Laufe der Zeit schlossen sich weitere Stalker unterschiedlichster Herkunft ihrer Gemeinschaft an, darunter auch Ausgestoßene und Gescheiterte aus anderen Stationen."
scavenge_poi_uncommon_parkinglot_inhabited.3.a: "Willkommen in der Armee."

scavenge_poi_uncommon_research_institute.1.t: "Geheimnisse des Instituts"

scavenge_poi_uncommon_research_institute.1.d: "Weit entfernt von einem hochmodernen Forschungsinstitut scheint unser Stalker-Team lediglich auf eine gewöhnliche Schule oder Hochschule gestoßen zu sein. Das bedeutete jedoch keineswegs, dass die Expedition erfolglos bleiben musste. Unsere Stalker durchsuchten Lagerräume, Vorratsschränke und alles andere, was von Wert sein könnte. Versiegelte Chemikalienflaschen, einfache Chemiebaukästen – alles konnte mitgenommen und irgendwo nützlich eingesetzt werden."
scavenge_poi_uncommon_research_institute.1.a: "Schwefel... was bitte?"

scavenge_poi_uncommon_research_institute.2.d: "Offenbar waren diesem Institut bereits zu Beginn des 21. Jahrhunderts die finanziellen Mittel ausgegangen. Geplagt von Personalmangel und Ressourcenknappheit kämpfte die Einrichtung ums Überleben und führte Forschungsarbeiten im Auftrag anderer Staaten und privater Organisationen durch. Große wissenschaftliche Durchbrüche blieben dabei aus; stattdessen konzentrierte man sich auf Produkte für den Verbrauchermarkt.\n\nUnsere Stalker ließen sich davon jedoch nicht abschrecken. Sie stellten das gesamte Gebäude auf den Kopf und sammelten Manuskripte, Dokumente sowie alte Geräte und Laborausrüstung ein. Alles, was irgendwie nützlich sein könnte, wurde mitgenommen. Der Großteil der Unterlagen bestand allerdings aus einfachen Lehrbüchern und wissenschaftlichen Grundlagen, die einst selbst Schüler beherrschten. Für den durchschnittlichen Moskauer sind Begriffe wie Thermodynamik oder Biologie heutzutage jedoch längst in Vergessenheit geraten."
scavenge_poi_uncommon_research_institute.2.a: "Diese Manuskripte mögen unvollständig sein, aber sie werden unseren Fortschritt fördern."

scavenge_poi_uncommon_research_institute.3.d: "Welchem Zweck dieses Institut ursprünglich auch gedient haben mag – mit dem Ausbruch des Dritten Weltkriegs wurde seine Arbeit abrupt beendet. Die Regierung übernahm die Kontrolle und versuchte hastig, die Einrichtung auf militärische Forschung auszurichten, in der Hoffnung, den Krieg doch noch zu gewinnen. Die meisten Bemühungen erwiesen sich allerdings als vergeblich.\n\nDen Unterlagen zufolge erzielte man dennoch einige bemerkenswerte Fortschritte auf dem Gebiet von Anti-Strahlen-Medikamenten und Kampfstimulanzien. Offenbar arbeitete das Institut dabei mit einer weiteren Forschungseinrichtung in Nowosibirsk zusammen.\n\nVon den tatsächlichen Ergebnissen dieser Projekte war bei der Ankunft unserer Stalker nichts mehr übrig. Doch die Vielzahl wissenschaftlicher Berichte, Notizen und Dokumente, die glücklicherweise kopiert oder schriftlich festgehalten worden waren, könnte für unsere eigene Forschung von unschätzbarem Wert sein – vorausgesetzt, wir finden jemanden, der sie lesen und verständlich auswerten kann."
scavenge_poi_uncommon_research_institute.3.a: "Nichts wird unseren Fortschritt aufhalten."

scavenge_poi_rare_embassy.1.t: "Erkundung der Internationalen Botschaft"
scavenge_poi_rare_embassy.1.d: "Unsere Stalker vermuteten zunächst, dass es sich um eine westliche Botschaft handelte. Der verblasste dreifarbige Banner, dessen ursprüngliche Farben kaum noch zu erkennen waren, sprach dafür. Tatsächlich verbrachten unsere Männer mehr Zeit damit zu diskutieren, ob die Botschaft einst französisch, italienisch oder etwas ganz anderes gewesen war, als den Ort systematisch zu durchsuchen.\n\nViel Wertvolles schien es zunächst nicht zu geben. Doch unter den Dielen des zweiten Stockwerks entdeckten sie mehrere Kisten voller westlicher Handfeuerwaffen. Warum diese Waffen ausgerechnet hier versteckt worden waren, blieb ein Rätsel. Vielleicht dienten sie Spionageoperationen oder anderen geheimen Zwecken. Dem Zustand des Gebäudes nach zu urteilen, war die Botschaft bereits vor Ausbruch des Dritten Weltkriegs aufgegeben worden. Die Waffen, die womöglich zur Unterstützung von NATO-nahen Aufstandsbewegungen vorgesehen waren, scheinen nie zum Einsatz gekommen zu sein."
scavenge_poi_rare_embassy.1.a: "Diese Waffen werden uns gute Dienste leisten. Sie brauchen nur ein wenig Überarbeitung."

scavenge_poi_rare_embassy.2.d: "Was zunächst wie eine gewöhnliche Botschaft aussah, entpuppte sich als etwas völlig anderes, als unsere Stalker es sich hätten vorstellen können. Unter dem Gebäude fanden sie ein weitläufiges Netzwerk aus Kellern und alten Abwasserkanälen.\n\nUnd tatsächlich lebten dort noch Menschen – ehemalige Botschaftsmitarbeiter. Die erste Begegnung verlief angespannt, doch schließlich tauschten beide Seiten Grüße aus und begannen miteinander zu sprechen.\n\nDie Überlebenden berichteten, dass sie zusammen mit einigen Moskauer Übersetzern unter die Erde geflohen waren, als die Bomben fielen. Mithilfe der Tunnel und Katakomben hatten sie sich durch die Ruinen bewegt. Viele von ihnen starben im Laufe der Jahre an den Folgen der Strahlung, doch einige wenige überlebten. Sie ernährten sich von Ratten, Konserven und gelegentlich von dem, was sie auf der Oberfläche oder an verlassenen Stalker-Leichen finden konnten.\n\nNun scheint ihre lange Isolation ein Ende zu finden. Sie wünschen sich, Teil der Metro zu werden und unserer Station beizutreten."
scavenge_poi_rare_embassy.2.a: "Willkommen in der Metro. Es ist nicht viel, aber es ist ein Zuhause."

scavenge_poi_rare_embassy.3.d: "Die amerikanische Botschaft ... oder vielleicht die Vertretung eines anderen bedeutenden NATO-Mitglieds. Die Einrichtung war bereits lange vor dem Dritten Weltkrieg geschlossen worden, doch das hielt offenbar niemanden davon ab, die Räumlichkeiten weiter zu nutzen.\n\nNach allem, was unsere Stalker herausfinden konnten, dienten die Keller und Versorgungsräume unter dem Gebäude als improvisierte Kommandozentren für NATO-freundliche Gruppen. Es handelte sich jedoch keineswegs um ein echtes Hauptquartier, sondern eher um eine lose Ansammlung von Russen, die mit dem damaligen Regime unzufrieden waren. Einige Dokumente deuten sogar darauf hin, dass sie Kontakt zu NATO-Agenten unterhielten – sofern die verblassten und beschädigten Unterlagen korrekt interpretiert wurden.\n\nOffenbar glaubten manche Kreise innerhalb der NATO, sie könnten die Moskauer Bevölkerung zu Unruhen und Protesten anstacheln und dadurch den Krieg gewinnen. Von diesem Ort aus versuchte man wohl, ein entsprechendes Netzwerk aufzubauen. Doch angesichts chronischen Mangels an Geld und Personal kam das Projekt nie über einige wenige fragwürdige Beteiligte hinaus.\n\nDie Ausrüstung, die diese Leute erhielten, war dagegen bemerkenswert hochwertig. Kurzstrecken-Kommunikationsgeräte und andere technische Hilfsmittel befanden sich noch immer vor Ort. Zwar sind sie stark gealtert und längst nicht mehr mit ihren ursprünglichen Netzwerken verbunden, doch vielleicht können wir sie noch sinnvoll nutzen."
scavenge_poi_rare_embassy.3.a: "Moment mal ... was war die NATO eigentlich noch gleich?"

 scavenge_poi_rare_bunker.1.t: "Bunkeranlage"
scavenge_poi_rare_bunker.1.d: "Obwohl unser erstes Stalker-Team den Ort entdeckt und das Gelände untersucht hatte, stellte sich heraus, dass es sich entgegen ihrer Vermutung nicht um eine militärische Bunkeranlage handelte. Vielleicht eher um einen privaten Weltuntergangsbunker – wenn überhaupt.\n\nNach allem, was unsere Stalker feststellen konnten, bestand die Anlage aus ehemaligen Kellerräumen, die zu einem Schutzraum umgebaut worden waren. Es gab improvisierte Wasseraufbereitungsanlagen und sogar eigene Stromgeneratoren. Aufgrund der fieberhaften Kritzeleien und religiösen Parolen, die mit weißer Kreide an die Wände geschrieben worden waren, vermuteten unsere Männer zunächst, dass hier einst ein Weltuntergangskult gelebt hatte.\n\nWas auch immer sich in den frühen Tagen dieser Anlage ereignet haben mag – ihre Bewohner waren verschwunden. Ihre Habseligkeiten lagen noch dort, als hätten sie den Ort überstürzt verlassen. Selbst der große Tisch in der Mitte des Hauptraumes war noch mit Tellern und Besteck gedeckt, als hätte man eine feierliche Zusammenkunft erwartet.\n\nUnd das Besteck war aus Silber. Irgendwo wird sich schon noch jemand finden, der solche Wertgegenstände zu schätzen weiß, selbst wenn sie ihren ursprünglichen Wert längst verloren haben."
scavenge_poi_rare_bunker.1.a: "Wie wäre es mit einer neuen Jacke? Stell dir vor, was wir mit all diesen Kugeln machen könnten."

scavenge_poi_rare_bunker.2.d: "Der Standort war einst eines der vorrangigen Ziele der NATO. Von den Überresten wollte heute weder Frost noch Mutant etwas wissen. Die meisten Bereiche sind noch immer stark verstrahlt.\n\nSelbst mit der besten verfügbaren Schutzausrüstung konnten unsere Stalker sich nur kurze Zeit in der Anlage aufhalten. Offenbar hatten bereits andere Stalkergruppen versucht, in die Anlage vorzudringen – und waren gescheitert.\n\nEine Gruppe wurde offensichtlich nicht durch die Strahlung getötet. Unsere Männer konnten jedoch nicht feststellen, zu welcher Fraktion sie gehörte. Ihre Schutzanzüge waren in einem grellen fluoreszierenden Rot gehalten, was sie wie einen wunden Fleck in der verschneiten Landschaft hervorstechen ließ. Vielleicht war genau das ihr Verhängnis. Allerdings fanden unsere Stalker weder Einschusslöcher noch Schäden an den Anzügen."
scavenge_poi_rare_bunker.2.a: "Nichts wird uns an der Oberfläche aufhalten!"

scavenge_poi_rare_bunker.3.d: "Zur Hälfte in einem morastigen Sumpf aus Schlamm und Wasser der Moskwa versunken, war selbst den mutierten Garnelen dieser Komplex unheimlich genug, um ihn zu meiden.\n\nVielleicht aus gutem Grund. Unter Schlamm und Trümmern fanden unsere Stalker zahlreiche aufgedunsene Leichen, deren Zustand keine Rückschlüsse mehr auf ihren Todeszeitpunkt zuließ.\n\nJe tiefer sie in die Anlage vordrangen, desto mehr Tote fanden sie, bis sie schließlich eine versiegelte Tür am Ende einer ölverschmierten Rampe erreichten.\n\nWas die Verstorbenen erreichen wollten, war eine verschlossene Waffenkammer tief im Inneren des Komplexes. Ein Großteil ihrer Bestände war bereits geplündert worden, doch das hielt die Menschen offenbar nicht davon ab, ihr Leben für den Zugang zu riskieren. Hätte das Wassersystem des Bunkers nicht versagt, wäre dieser Ort vermutlich uneinnehmbar gewesen ... wenn nur."
scavenge_poi_rare_bunker.3.a: "Unsere Armee wird unbesiegbar werden. Nein – unaufhaltsam."

scavenge_poi_exotic_labyrinth.1.t: "Das Labyrinth"
scavenge_poi_exotic_labyrinth.1.d: "Schon während des Zusammenbruchs der Sowjetunion kursierten Gerüchte über geheime Tunnel unter Partei- und Regierungsgebäuden, die vom KGB genutzt wurden. Selbst nach dem Dritten Weltkrieg schwören manche, dass die letzten Überreste des Moskauer Oberkommandos tief in diese Tunnel geflohen seien – in das sogenannte „Labyrinth“, ein endloses Netz aus Gängen und Stationen.\n\nUnsere Stalker glauben, einen solchen Zugang entdeckt zu haben. Bröckelnde Wände, zerbrochene Fliesen und weit verzweigte Tunnel, die in Sackgassen enden oder Wege einschlagen, die jeder Logik zu widersprechen scheinen. Gelegentlich fanden sie sogar schwarze Telefonkästen, die in die Wände eingelassen waren, auch wenn diese längst außer Betrieb sind."
scavenge_poi_exotic_labyrinth.1.a: "Sucht weiter. Es muss einen Weg geben, diese verfluchten Hallen zu durchqueren."

scacenge_poi_exotic_labyrinth.2.t: "Haus aus Blättern"
scavenge_poi_exotic_labyrinth.2.d: "Mit Schnüren und zerknüllten Papierfetzen als Wegmarkierungen erkundeten unsere Stalker das Labyrinth. Verblasste Beschriftungen an den Wänden gaben gelegentlich Hinweise auf ihren Standort, reichten jedoch nicht aus, um das verwirrende Tunnelsystem zuverlässig zu navigieren.\n\nEine bemerkenswerte Entdeckung waren jedoch die zahlreichen Beobachtungsposten, die zu Metrostationen führten. Hinter getarnten Lüftungsgittern und Lampen verbargen sich geheime Aussichtspunkte, von denen aus die Stationen unbemerkt überwacht werden konnten.\n\nBislang kennen wir nur wenige solcher Standorte, und noch weniger verfügen über intakte Lüftungsschächte. Dennoch stellt diese Entdeckung einen enormen Vorteil für uns dar."
scavenge_poi_exotic_labyrinth.2.a: "Unsere Augen reichen nun über die gesamte Metro."

scavenge_poi_exotic_military_base.1.t: "Der Militärkomplex"
scavenge_poi_exotic_military_base.1.d: "Man vermutet, dass dieser Komplex kurz vor dem Dritten Weltkrieg als Waffenlager für die Verteidigung Moskaus diente, falls NATO-Fallschirmjäger direkt über der Hauptstadt abgesetzt würden. Die Anlage war streng abgeschirmt und der Öffentlichkeit vollkommen unbekannt.\n\nSelbst unsere Stalker hatten große Schwierigkeiten, überhaupt einen Zugang zu finden – vermutlich der Grund, weshalb der Ort bislang nicht geplündert worden war.\n\nWie die Grabkammern der ägyptischen Pharaonen wurden die dort arbeitenden Männer eingeschlossen, als die Bomben fielen und die Steuerung der Tore versagte. Ihre Vorräte an Nahrung, Medikamenten und Ausrüstung hielten eine Zeit lang vor. Doch wie die letzten Überlebenden starben, als Nahrung und Wasser zur Neige gingen, möchte man sich lieber nicht vorstellen."
scavenge_poi_exotic_military_base.1.a: "Die Macht der alten Welt liegt nun in unseren Händen."

scavenge_poi_exotic_missile_silo.1.t: "Geheimnisse des Silos"
scavenge_poi_exotic_missile_silo.1.d: "Wie wir vermutet hatten, war das Raketensilo noch immer hermetisch verschlossen. Unsere Stalker hatten große Schwierigkeiten, sich Zugang zu verschaffen, doch schließlich gelang ihnen der Durchbruch.\n\nIm Inneren fanden sie einen Ort vor, der nahezu von der Zeit vergessen worden war. Keine Trümmer, keine Spuren des Verfalls. Obwohl die Anlage nur spärlich eingerichtet war, deutete alles darauf hin, dass das Silo eigentlich außer Dienst gestellt werden sollte. Erst mit dem Ausbruch des Dritten Weltkriegs wurde es hastig wieder in Betrieb genommen.\n\nSeine Raketen erhielten jedoch niemals den Befehl zum Abschuss.\n\nNun befindet sich dieses Erbe der alten Welt in unseren Händen."
scavenge_poi_exotic_missile_silo.1.a: "Mit Feuer und Stahl werden wir uns unsere Welt zurückholen!"


 reclamation_event.2.t: "Gebiet wurde annektiert"
 reclamation_event.2.d: "Unser Team von Kolonisten meldet, dass sie ihre Mission erfolgreich abgeschlossen haben und dass dieses Gebeit nun dauerhaft uns gehört."
 reclamation_event.2.a: "Stellt eine dauerhafte Präsenz her, ich will dieses Gebiet gesichert sehen."
 reclamation_event.2_tt: "Wir halten diesen Staat nun besetzt, doch um ihn nun auch dauerhaft halten zu können braucht es einige Arbeit. Ein §YExpansions-Timer§! wurde nun gestartet, und wir müssen einen gewissen Fortschritt in dieser Station erzielen, um sie dauerhaft halten zu können. Schaffen wir dies nicht, so geht uns dieser §YStaat wieder verloren§!."
 
 reclamation_event.mutants.t: "Mutantenangriffe"
 reclamation_event.mutants.d: "Unsere Kolonisten wurden von wilden Mutanten angegriffen und nahezu niemand von ihnen überlebte und die die es schafften zu entkommen, sind nun für den Rest ihres Lebens gezeichnet. Ihr Opfer wird nicht umsonst gewesen sein!"
 reclamation_event.mutants.a: "Ein trauriger Tag für uns alle"
 
 reclamation_event.3.t: "Verloren in der Metro"
 reclamation_event.3.d: "Zu unseren Kolonisten brach jeglicher Kontakt ab, sobald sie durch unsere Tunnel verschwunden sind. Mehrere Tage sind vergangen und wir müssen davon ausgehen, dass sie alle den Tod gefunden haben."
 reclamation_event.3.a: "Wir werden sie nie vergessen!"

 reclamation_event.4.t: "Kolonisation des Fili-Depots"
 reclamation_event.4.d.a: "Wie wir vermutet hatten haben sich keine Mutanten, sondern Menschen im Fili-Depot eingenistet und sogar sehr freundliche Menschen. Nachdem unser Erstkontakt mit ihnen beinahe in Gewalt endete, wirkten die Fremden deeskalierend ein und luden unsere Stalker sogar zum essen ein.\n\nDiese früheren Einwohner des Park Pobedy verließen ihre Station noch bevor der Tunnel zur Kievskaya gesprengt wurde und siedelten sich hier an, in der Hoffnung dem Chaos der restlichen Metro so zu entgehen. Inzwischen haben sie sich hier ziemlich gut eingerichtet, mit eigenen Wasserfiltern und Stalker-Teams sowie einer eigenen kleinen Pilzzucht. Der Anführer der sie einst aus dem Park Pobedy führte ist nun aber schon seit einer Woche verschwunden und ohne seine Führung steht die kleine Gemeinschaft kurz vor ihrem Ende."
 reclamation_event.4.d.b: "Wie wir vermutet hatten haben sich keine Mutanten, sondern Menschen im Fili-Depot eingenistet und zwar feindliche Menschen! Sofort eröffneten sie auf unsere Truppen das Feuer, vermutlich um sie zu fressen und zu bestehlen."
 reclamation_event.4.a: "Begrüßen wir sie mit offenen Armen!"
 reclamation_event.4.b: "Zu den Waffen!"

###EVENTS###

 scavenge_mission.1.t:0 "Stalker kehren erfolgreich zurück"
 scavenge_mission.1.d:0 "Unsere Expedition an die Oberfläche war ein Erfolg, unsere Stalker sind mit ihrer Beute in die sichere Metro zurückgekehrt und sie vermelden auch, drei Stellen von Wert in den Ruinen ausgemacht zu haben. Jedoch ist zu erwarten dass wir aufgrund der chaotischen Zustande an der Oberfläche nur einen dieser drei Funde werden nutzen können, bevor sie von Strahlung, Wetter oder Monster wieder unzugänglich werden. Wir müssen nun entscheiden, an welchen dieser drei Orte wir unsere Stalker schicken werden."
 scavenge_mission.1.a:0 "Zu den Ressourcen"
 scavenge_mission.1.b:0 "Zur Technologie"
 scavenge_mission.1.c:0 "Zur Ausrüstung"

 scavenge_mission.2.t:0 "Expedition gescheitert"
 scavenge_mission.2.d:0 "Unsere Stalker sind zurückgekehrt, doch ohne etwas von Wert gefunden zu haben. Wetter, Strahlung und Mutanten haben ihren Tribut gefordert und das sie überhaupt den Weg zurück fanden grenzt schon an ein Wunder."
 scavenge_mission.2.a:0 "Schlecht"

