l_german:
 BAU_technocratic_alliance:0 "Technokratische Allianz"
 BAU_technocratic_alliance_desc:0 "Während jede Station über eine eigene Verwaltung verfügt, wird die Hauptmacht durch den Chef der Baumansky-Allianz ausgeübt. Ihr Anführer leitet die Allianz, teilweise dank seines technischen Fachwissens."

 BAU_specialised_industry:0 "Spezialisierte Industrie"
 BAU_specialised_industry_desc:0 "Der Hauptexport der Bauman-Allianz ist die Wiederherstellung und Rettung von Vorkriegstechnologie und der anschließende Weiterverkauf der Ausrüstung an andere Stationen. Dies hat es uns ermöglicht, den Bewohnern der Allianz auch einen recht wohlhabenden Lebensunterhalt zu ermöglichen. Da die Wirtschaft dieser Nation jedoch spezialisiert und auf einen bestimmten Zweck zugeschnitten ist, erweist es sich als schwierig das Angebot zu diversifizieren, ohne im Gegenzug einen wirtschaftlichen Einbruch herbeizuführen."

 BAU_specialised_industry_2: "Unangefochtene Expertise"
 BAU_specialised_industry_2_desc: "Technologie ist der Hauptexport der Bauman-Allianz und ein professionelles Geschäft, das die Allianz ernst nimmt. Sie nutzt ihre wirtschaftliche Macht, um ihre Wirtschaft noch weiter zu zu stärken, und verzeichnete so ein rekordverdächtiges Wirtschaftswachstum."

 BAU_stalker_waypoints:0 "Erfahrene Stalker"
 BAU_stalker_waypoints_desc:0 "Anders als ihre benachbarten Stationen verlässt sich die Bauman-Allianz zur Versorgung fast ausschließlich auf Stalker, die an die Oberfläche geschickt werden um dort wertvolle Ausrüstung für ihre Techniker einzusammeln. Die Allianz ist von ihrem Erfolg auf diesem Gebiet abhängig"

 BAU_HNZ_joint_trade_liaison: "Gemeinsames Handelsabkommen"
 BAU_HNZ_joint_trade_liaison_desc: "Eine spezielle Beziehung zwischen der Bauman-Allianz und der Hanse ermöglicht es der Allianz, Waren zu einem reduzierten Preis zu erhalten und Kredite ohne Zins aufzunehmen."

 BAU_fuel: "Verbesserte elektrische Turbinen"
 BAU_synthetics: "Verbesserte Kunststoffe"
 BAU_MDR_friendship_pact: "Freunde der OMON"
