PLS_vitaly_misko: "Vitaly Misko"
  PLS_vitaly_misko_trait: "Premierminister der Polis"
  PLS_vitaly_misko_desc: "§9Ein kleiner Mann mit Glatze; seine Brille unterstrich den Eindruck von Autorität, den er ausstrahlte. Er trug Anzug und Krawatte und hatte keine Tätowierungen an den Schläfen, die auf seine Kaste hätten hinweisen können.§!\n\nAls ehemaliger Berater des russischen Präsidenten weiß Misko, auf wen er hören muss – seien es Kshatriyas oder Brahmanen –, und er versteht es, Streitigkeiten bei Bedarf zu beenden.\n\nErnst und bisweilen autoritär, zeichnet sich Vitaly durch einen Pragmatismus aus, der für Leichtfertigkeit nichts übrig hat. Weggefährten behaupten, ihn noch nie auch nur ein einziges Mal lächeln gesehen zu haben – und das ist durchaus glaubhaft. Schwer muss es sein, die erdrückende Last der letzten Tage der Menschheit auf seinen Schultern zu tragen, während eine verzweifelte Stimme in seinem Inneren flüstert, dass all seine Bemühungen das Unvermeidliche nur hinauszögern. Ein Schicksal, dem er nicht entgehen kann – wie sehr er auch versuchen mag, ihm zu entfliehen."


