 nf_SPT.27.d:0 ""
 nf_SPT.27.a:0 "Wir sind hier! D6 gehört uns!"

 nf_SPT_FLAVOR.1.t:0 "Der Monolog eines Gefreiten"
 nf_SPT_FLAVOR.1.d:0 "In den unheimlichen Tiefen der Arbatskaya gehöre ich zu jener Elitegruppe von Rangern, die mit einer Aufgabe betraut ist, die sie als „Säuberung“ bezeichnen. Es ist der Befehl des Colonels – und wer bin ich schon, ihn infrage zu stellen? Im großen Ganzen betrachtet bin ich doch nur ein einfacher Soldat.\n\nIch kann die Angst nicht leugnen, die mich beschleicht, während wir uns durch diese Tunnel bewegen. Wir sollen Elitesoldaten sein – niemandem nachstehend –, und doch spüre ich eine tiefe Unruhe. Die Luft ist schwer, erfüllt von einer Mischung aus abgestandener Schwere und dem Gestank dessen, was schiefgelaufen ist. Mutanten lauern hinter jeder Ecke, ihr unheimliches Knurren hallt durch die Dunkelheit. Wir schleichen vorsichtig voran – die Waffen im Anschlag, die Augen weit geöffnet.\n\nDer Colonel spricht davon, die Ordnung wiederherzustellen und Arbatskaya für die Menschheit zurückzuerobern. Es ist eine edle Sache, doch hier unten fällt es schwer, sich angesichts der erdrückenden Übermacht nicht wie ein winziger Punkt im Nichts zu fühlen. Jeder Schritt gleicht einem Wagnis, und die Last der Mission drückt schwer auf meinen Schultern.\n\nJe tiefer wir vordringen, desto mehr scheinen die Schatten um uns herum zu tanzen; und ich kann nicht umhin, mich zu fragen, ob wir tatsächlich etwas bewirken – oder ob wir lediglich in ein Wespennest stechen. Der Ausgang dieser Mission ist ungewiss, und als Rekrut bleibt mir nichts anderes übrig, als Befehlen zu folgen und darauf zu hoffen, dass Colonel Millers Entschlossenheit uns sicher durch den Abgrund der Arbatskaya führen wird."
 nf_SPT_FLAVOR.1.a:0 "Ranger gehen voran."

 nf_SPT_FLAVOR.2.t:0 "Der Beste der Ranger"
 nf_SPT_FLAVOR.2.d:0 "Im rauen Herzen der Kämpfe um die Arbatskaja fand sich ein junger, noch völlig unerfahrener Rekrut inmitten eines grausamen, schonungslosen Spektakels wieder. Inmitten des Chaos fiel der Blick des Gefreiten auf eine Gestalt, die zugleich furchterregend und abstoßend wirkte – jenen spartanischen Krieger, der schlicht als „Hunter“ bekannt war.\n\nGehüllt in seine schmutzige Stalker-Ausrüstung, die die Spuren unzähliger Gefechte trug, bewegte sich Hunter mit einer wilden und ungezähmten Energie durch die Dunkelheit. Sein Gesicht war von Narben und Schmutz gezeichnet – ein Anblick, der die Aura der Wildheit, die ihn umgab, nur noch verstärkte. Dies stand in krassem Gegensatz zum Klischee des gutaussehenden, stets gepflegten Spartiaten; und doch strahlte Hunter eine unbestreitbare Kompetenz aus, die vom Überleben in den härtesten Tiefen der Metro zeugte.\n\nIm brutalen Ballett des Kampfes führte Hunter seine VSV mit Zielfernrohr, an deren Lauf ein blutgetränktes Bajonett befestigt war. Jeder Stoß mit dem Bajonett verwandelte die Mutanten um ihn herum in ein blutiges Gemetzel. Der verwundete Gefreite, hinter Trümmern geduckt, beobachtete, wie Hunter jeden Mutanten dezimierte, der es wagte, ihn auch nur zu berühren. Auf ironische Weise wirkte er dabei wilder und tierischer als jeder der Mutanten, die sich ihm entgegenstellten. Der Gefreite bewunderte Hunters Kampfgeist – ein Erlebnis, das zweifellos einen bleibenden Eindruck bei ihm hinterlassen würde."
 nf_SPT_FLAVOR.2.a:0 "Wahre spartanische Tüchtigkeit."

 nf_SPT_FLAVOR.3.t:0 "Der Oberst uns sein bester Mann"
 nf_SPT_FLAVOR.3.d:0 "Die Luft ist von Anspannung erfüllt, als Hunter und seine Mäner wieder einmal ihre Unzufriedenheit äußern, diesemal darüber, dass der Oberst nun Tushino gegenüber der Mayday-Republik bevorzugt hat. Aus seiner Ablehnung des Oberst macht Hunter inzwischen nicht länger einen Hehl, als er ihn konfrontiert\n\nHunter argumentiert, dass die Mayday-Republik durch ihren Militarismus ideologisch viel näher am Orden liegt als die freie Stadt Tushino und dass sie folglich als potentieller Verbündeter viel größeren Wert inne hätte. Seine Anhänger, allesamt narbenübersähte Veteranen des Ordens, bekräftigen seine Position und ihre Loyalität gegenüber dem Oberst scheint mit jeder weiteren Sekunde dahinzuschwinden.\n\nDas Gespräch eskaliert als Hunter dann argumentiert, dass Tushino als Verbündeter wertlos sei und der Oberst mit seiner Entscheidung das Überleben des Ordens gefährde, woraufhin sie von diesem des Raumes verwiesen werden.\n\nDer Oberst beharrt weiterhin auf seiner Position, auch wenn er dabei die Einheit des Ordens aufs Spiel stellt. Das Resultat dieses Konfliktes wird ohne Zweifel die Zukunft der gesamten Metro beeinflussen."
 nf_SPT_FLAVOR.3.a:0 "Eine schwierige Zeit für den Orden."

 nf_SPT_FLAVOR.4.t:0 "Waffen vom Abgrund"
 nf_SPT_FLAVOR.4.d:0 "In den rauen, engen Gängen der Smolenskaya sitzen wir hier und warten auf Befehle – oder eigentlich auf irgendetwas, das uns beschäftigt. Plötzlich tritt Hunter aus den Schatten hervor, schreitet herein wie eine lebende Legende – Narben und alles, was dazugehört. Er trägt eine zusammengebundene Plane bei sich, die vermutlich randvoll mit Waffen ist. Hinter ihm schleppt seine Crew eine beeindruckende Beute an Waffen heran – Gewehre, Sprengstoff; was immer man sich vorstellen kann.\n\nIch bin nur einer der einfachen Soldaten, geduckt inmitten der anderen; und als Hunter beginnt, die Ausrüstung zu verteilen, nicke ich dem Typen neben mir zu – ein stiller Moment des Einverständnisses, der zu sagen scheint: „Verdammt, Hunter hat es schon wieder geschafft.“ Seine Stimme – tief und rau – erfüllt den Raum, während er von den Strapazen erzählt, diese Waffen aus den Tiefen der Metro zu bergen. „Ich hab mir diese Schätzchen aus den dunkelsten Winkeln geholt“, knurrt Hunter, seine Augen blitzen dabei vor wilder Intensität auf. „Banditen, rivalisierende Fraktionen – nenn sie, wie du willst; wir haben uns ihnen allen gestellt. Aber seht nur, was wir jetzt haben!“\n\nSeine Leute beginnen, Gewehre, Sprengstoff und sogar ein paar ramponierte Schrotflinten auszugeben. Ich schnappe mir ein Gewehr und mustere es, als wäre es der Heilige Gral. „Verdammt, Hunter, du bist ein Lebensretter“, murmele ich vor mich hin. Hunter fängt meinen Blick auf – ein seltener Augenblick, in dem der Mann fast zufrieden wirkt. „Überleben ist keine schöne Sache, Soldat. Diese Waffen sind Werkzeuge für den Kampf, der vor uns liegt. Setz sie mit Bedacht ein.“ Ein Gefühl der Kameradschaft macht sich breit, während wir uns zusammenfinden, Geschichten austauschen und unser neues Arsenal bewundern. Hunter legt mir mit jenem grimmigen Grinsen, das so typisch für ihn ist, die Hand auf die Schulter. „Wir stecken da gemeinsam drin, Kumpel. Die Metro gibt sich nicht kampflos geschlagen – und wir uns auch nicht.“\n\nWährend die Waffen den Besitzer wechseln und das Klappern der geladenen Magazine die Luft erfüllt, entsteht ein neues Gefühl von Bestimmung. Hunters Rückkehr brachte uns nicht bloß Waffen; sie entfachte einen neuen Funken in unseren Reihen. Inmitten der Dunkelheit der Metro steht Hunter als Mahnung dafür, dass selbst in dieser düsteren Realität ein wahrer Krieger aus den Schatten treten kann – die Arme beladen mit Hoffnung für all jene, die die Metro ihr Zuhause nennen."
 nf_SPT_FLAVOR.4.a:0 "Ein dreifaches Hurra für Hunter!"

 nf_SPT_FLAVOR.5.t:0 "Die Rede des Oberst"
 nf_SPT_FLAVOR.5.d:0 "Im Herzen des Sparta-Kontrollzentrum haben sich die Ranger heute versammelt, um voller Erwartungen die Rede des Oberst zu vernehmen. Die Anspannung ist geradezu spürbar als der Oberst seinen großen Plan enthüllt - Eine Allianz mit der militaristischen Mayday Republik, um die Bedrohung durch die Mutanten zurückzuschlagen\n\nDer Oberst steht aufrecht und strahlt dabei jene Authorität aus, mit der er die Ranger bisher durch ihre dunkelsten Zeiten führte. Seine Worte hallen durch die weiten Hallen und beschreiben den Ernst der Lage und die Notwendigkeit, gemeinsam gegen die Bedrohung der Mutanten zu stehen. The Mayday Republic, with its martial strength, is revealed as the chosen ally to bolster the Spartan Rangers' defences.\n\nAs the soldiers absorb the weight of the decision, Hunter observes in the background. His feral gaze, usually inscrutable, flickers with a mixture of approval and determination. Dressed in his characteristic battle-worn attire, Hunter stands as a silent observer, his loyalty to the cause evident but shrouded in a layer of uncertainty.\n\nThe Colonel's speech echoes with rallying cries, extolling the virtues of cooperation and the strength forged through alliances.The chamber is silent as the Colonel concludes, the weight of their decision settling on the soldiers. Hunter, standing at the fringes, remains an enigma, his reactions hidden behind the mask of a feral warrior. The fate of the Spartan Rangers, entwined with the Mayday Republic, hangs in the balance, and as the soldiers disperse, the Metro's future is left to unfold in the wake of the Colonel's call to arms."
 nf_SPT_FLAVOR.5.a:0 "Mit Worten konnte er schon immer umgehen."
 
