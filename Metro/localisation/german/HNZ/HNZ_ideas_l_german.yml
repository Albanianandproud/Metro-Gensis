 hanza_red_war_victor_desc: "Es war kein vollständiger Sieg, doch unser Hauptziel, das Aufhalten des bolschewistischen Vormarsches, haben wir erreicht. Doch nur so lange, bis ein neuer Krieg beginnt. Viele seiner ehemaligen Teilnehmer tragen noch immer seine Narben, die Schrecken dieses Krieges sind noch lange nicht vergessen."

