 PEC_brotherhood_in_yellow: "Bruderschaft in Gelb"
 PEC_brotherhood_in_yellow_desc: "Von jenen außerhalb von [ROOT.GetNameADJ] wird gemunkelt, dass diejenigen, die [ROOT.Capital.GetNameDef] bewohnen, in Elend leben. Im Süden liegen die versunkenen Südstationen, wo jeder Atemzug tödlich ist und grässliche Mutanten, aus dem schlammverseuchten Wasser auftauchen.\n\nWährend das im Süden vielleicht der Wahrheit entspricht, so ist die Vorstellung, dass auch unsere Bewohner ihr menschliches Aussehen verloren haben oder durch Mutationen befleckt sind, nachweislich falsch. Das ist falsch... §RMeistens§!"
