l_german:
 BRK_farming_collective:0 "Farmen und Werkstätten"
 BRK_farming_collective_desc:0 "Ein Handelsverband bestehend aus 3 Stationen. Die Gemeinschaft freier Farmer ist das große Viehzuchtzentrum in der Metro und produziert alle Arten tierischer Produkte und Lebensmittel. Ihre Farmen sind für die Metro von größter Bedeutung, denn wir ernähren einen nicht gerade kleinen Teil der restlichen Menschheit. Großen Wohlstand erlangte die Gemeinschaft nachdem ihre Stalker Weizenkörner entdeckten, die es der Station Aeroport ermöglichten, Brot zu produzieren, worauf sie nun ein Monopol haben."

 BRK_feeding_the_metro_idea:0 "Bauerngemeinschaft"
 BRK_feeding_the_metro_idea_desc:0 "Von der klugen Liga Hanse bis hin zu den ewig hungerten Bewohnern der Roten Linie versorgt diese Gemeinschaft alle. Im Gegenzug erhält sie Waren von den Stationen, an die sie verkauft. Angesichts der Bedeutung der drei Stationen als Kornkammer der Metro hält bis heute ein instabiler Frieden an, solange ihre Bauern weiterhin eine konstante Produktion aufrechterhalten."

 BRK_reliance_on_the_hanza:0 "Abhängigkeit von der Hanse"
 BRK_reliance_on_the_hanza_desc:0 "Direkt neben der §YKoltsevskaya§! gelegen - oder der Ringlinie, bieten sich dieser Station lukrative wirtschaftliche Perspektiven. Allerdings dient sie auch als Schleusentor für Hansehändler und Handelskarawanen. Feinere Waren, Größere Waffen, weniger kaputte Schmuckstücke. Die Bevölkerung ist von dem vielfältigen Angebot neuer Waren noch mehr fasziniert als von den Werken der bereits heimischen Produzenten."

