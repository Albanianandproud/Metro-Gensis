 HUL_karetnikov: "Семён Каретников"
 HUL_head_of_counter_intelligence: "Начальник контрразведки"
 HUL_karetnikov_desc: "Каретников, дислоцированный на станции Войковская, служит начальником контрразведки Гуляйполя. Неслучайно Каретников носит то же имя, что и Семён Никитич Каретников, который служил в повстанческой армии Нестора Махно во время Гражданской войны на той же должности. Неизвестно даже, настоящее ли это имя — Семён, или он просто решил так себя называть."

