l_german:
 nf_GWC.3.t:0 "Anhänger des Wurms"
 nf_GWC.3.d:0 "Der Park Pobedy blieb nach dem Krieg intakt, mehr als seine benachbarte Stationen, was es zu einer wohlhabenden Macht in der Region machte. In der Vergangenheit waren wir eng mit dem Arbat befreundet. Als die Arbat-Konföderation jedoch beschloss, gegen die aufziehende Bedrohung durch den Kommunismus zu kämpfen, beschloss Park Pobedy, seinen ehemaligen Freund, trunken von grandiosen Machtwahnvorstellungen, in den Rücken zu fallen. Was wie ein schmutziger Kampf aussah, wurde bald ein bitteres Schicksal. Der Arbat traf eine voreilige Entscheidung, den Tunnel der in den Park Pobedy führte, zu sprengen, wodurch seine Bürger hier gefangen und vom Rest der Metro abgeschnitten wurden.\n\n Die Bewohner waren dem Untergang geweiht. Unfähig, sich selbst zu versorgen oder sich an die Oberfläche zu retten. Alle, die versuchten, über die Oberfläche zu fliehen, kamen nie zurück. Mit der Zeit wurde der Park Pobedy verwüstet; Es kam zu Unruhen, Plünderungen und Kannibalismus an den Verstorbenen. Anführer kamen und gingen, unfähig, die wilde Horde kämpfender Überlebender zu kontrollieren.\n\n Bis sich einer von ihnen erhob, um die Menge zu führen: Sich selbst nannte er „Priester“, denn er schaffte es, die hoffnungslose Menschenmenge zu belehren und so zum Anführer zu werden. Sein Glaube war, dass die Metro von einem riesigen Wurm geschaffen wurde und dass die Menschheit von ihm geboren wurde. Die nukleare Apokalypse war der große Wurm, der die Menschheit für ihre Ignoranz und ihre Technologie bestrafte. Indem er die Bevölkerung mit seinem Wort beherrschte, löste er eine Rebellion und einen Kult aus, der sich um die Verehrung des Wurms drehte. Sein erster Erlass lautete:."
 nf_GWC.3.a:0 "Heiden sollen bei lebendigem Leibe gekocht werden"
 nf_GWC.3.b:0 "Der Park Pobedy sollte seine neue, finstere Form annehmen."

 nf_GWC.4.t:0 "Anführer des Wurms"
 nf_GWC.4.d:0 "Der Priester besänftigt und nährt die Ängste seiner Herde, im Laufe der Zeit folgten sie jedem seiner Befehle und Gebote ohne Fragen. Seine Jünger konnten aus dem Wort des Wurms selbst ihre Lehren ziehen und als Bote seines Willens fungieren. Die Entwicklung von Technik führt immer zwangsläufig zur Herstellung von Kriegswaffen. Die Menschheit muss den Lehren des Wurms Beachtung schenken, doch die Erwachsenen sind nicht in der Lage, vernünftig zu denken oder auch nur kindliche Fragen zu stellen, sie müssen deshalb entfernt werden. Währenddessen sollen die Kinder jedoch mitgenommen und ihnen der wahre Weg des Wurms beigebracht werden."
 nf_GWC.4.a:0 "Der Priester lehrt uns die Sünden der Technologie"
 nf_GWC.4.b:0 "Der Priester lehrt uns die Heiligkeit des Wurms"

 nf_GWC.5.t:0 "Ungläubige des Wurms"
 nf_GWC.5.d:0 "Jetzt gibt es Berichte über Heiden, die sich in der Nähe unserer Domäne in den nahegelegenen Stationen Molodezhnaya und Strogino niedergelassen haben. Dies hat Priester dazu bewogen, zu verfügen, dass unsere Bemühungen nicht ins Stocken geraten, sondern verstärkt werden dürfen. Mehr Fleisch für unsere Speicher´, mehr Stimmen, die das Wort des Wurms verkünden. Der Große Wurm selbst möchte, dass seine bevorzugten Söhne und Töchter das schlagende Herz seines Kults über unser Territorium hinaus ausdehnen. Die Tunnel werden rot leuchten vom Blut derer, die den Wurm ablehnen, denn er ist alles. Der große Wurm ist das Leben!"
 nf_GWC.5.a:0 "Unsere Kultisten werden sich von ihrem Fleisch ernähren"
 nf_GWC.5.b:0 "Unsere Krieger werden sich an ihrem Mark weiden"

 nf_GWC.6.t:0 "Der Krieger"
 nf_GWC.6.d:0 "Während der Priester selbst zu pazifistischen Mitteln greift, versteht er auch, dass die Geisteswissenschaften allein nicht den Sieg bringen werden. Er wünscht sich, dass die Heiden ihm zuhören würden, weiß aber, dass dem niemals so seien wird. Technologie führt zu Blutvergießen und Feuer muss mit Feuer bekämpft werden. Einer seiner Schüler weiß das mehr als jeder andere. Mit dem Spitznamen „Krieger“ überragt er alle anderen. Die Heiden, die das Reich betreten um hier Schaden anzurichten, werden von ihm im Zweikampf gnadenlos getötet. Eine passende Figur, um das Heer des Wurmes anzuführen."
 nf_GWC.6.a:0 "Das Wissen der Kriegers über die Tunnel ist unübertroffen"
 nf_GWC.6.b:0 "Das Wissen der Krieger über die Kriegsführung ist unübertroffen"

 nf_GWC.7.t:0 "Depotknacken"
 nf_GWC.7.d:0 "Es war uns gelungen, auf der anderen Seite der Metalltür einen Weg hindurch zu finden. Eine kleine Lüftungsöffnung hoch oben an der Wand umgab das Gelände. Es stellte sich heraus, dass die Geräusche, die von jenseits der Tür kamen, menschlichen Ursprungs waren. Das Depot diente als provisorisches Hauptquartier einer Stalkerbande und nutzte das Gelände als Startrampe, um von hier aus die Oberfläche zu plündern. Stalker machten ihre Hin- und Rückreisen und nutzten dabei das Depot selbst als eine Art Hauptquartier. Unseren Scouts gelang es, die Tür mit Gewalt zu öffnen. Ihre Kalaschnikows hatten gegen unsere Stärke keine Chance."
 nf_GWC.7.a:0 "Ab sofort steht wieder Fleisch auf dem Speiseplan"

 nf_GWC.8.t:0 "An den Sieger"
 nf_GWC.8.d:0 "Wir haben viele neue Stationen im dem Namen des Großen Wurms beansprucht, und obwohl die Bewohner dieser Stationen unter unserer Unterwerfung stehen, kennen sie seinen Namen nicht. Obwohl sie versklavt und gefesselt sind und unseren Befehlen gehorchen müssen, leugnen sie weiterhin die Wahrheit. Wie sollen wir mit ihnen verfahren??"
 nf_GWC.8.a:0 "Vielleicht hilft ein wenig mehr Gewalt"
 nf_GWC.8.b:0 "Wenn unsere Hypnotiseure sie nicht brechen können, dann wird es die Peitsche tun"

 nf_GWC.9.t:0 "Wer wird unser Fleisch?"
 nf_GWC.9.d:0 "Fleisch ist eine der wertvollsten Ressourcen, die uns zur Verfügung stehen."
 nf_GWC.9.a:0 "Warum gutes Fleisch verschwenden??"
 nf_GWC.9.b:0 "Sperren Sie sie ein, damit sie später gegessen werden können"

 nf_GWC.10.t: "Seuche!"
 nf_GWC.10.d: "Die Situation verschlechtert sich von Woche zu Woche weiter. Von der Oberfläche eindringende Strahlung und schlechte Wasserreserven haben zur Atrophie unserer Anhänger geführt. Der dramatische Anstieg von Krankheiten und Todesfällen unter der Bevölkerung von Park Pobedy hatte bereits seinen Höhepunkt erreicht und begann in den folgenden Monaten langsam nachzulassen. Diejenigen, die die Krankheit überlebt haben, sind noch immer kränklich, blass und hager. Fast jeder, bis auf den Priester selbst, wurde befallen."
 nf_GWC.10.a: "Wir müssen den Glauben wahren"
 
 nf_GWC.11.t: "Adaptation"
 nf_GWC.11.d: "Nach Monaten schlechter Nahrungs- und Wasserversorgung und ständiger Strahlenbelastung zeigen die Bürger von Park Pobedy erste Anzeichen einer seltsamen Anpassung. Sie sind krank und abgemagert, aber erstaunlicherweise gehen sie nicht länger an Strahlung oder Hunger zugrunde. Das Phänomen wurde von vielen als Zeichen einer höheren Macht, des Wurms selbst, interpretiert. Der Priester behauptet, die Bürger von Pobedy hätten sich dem Wurm gezeigt und ihnen seien seine Geschenke zuteil geworden."
 nf_GWC.11.a: "Sicherlich ein Geschenk des Wurmes selbst!"

 nf_GWC.30.t:0 "Bump in the Night"
 nf_GWC.30.d:0 "In den letzten Tagen wurden auf unserer Station immer mehr Bürger vermisst. Es begann zunächst subtil; verlegte Gegenstände und Bewegungen im Schatten. Es dauerte nicht lange, bis uns Berichte über vermisste Personen erreichten. Männer, Frauen und sogar kleine Kinder verschwinden plötzlich aus ihren Zelthäusern. Ohne Berichte über ihren Aufenthaltsort und noch beunruhigenderen Gerüchten über die Gründe für ihr Verschwinden. Aus irgendeinem Grund sind sie einfach aufgestanden und zu einer anderen Station gegangen. Ihre Sachen haben sie dabei zurück gelassen. Während andere befürchten, dass es sich um die Manifestation von Geistern und Geistern der Verstorbenen handelt, die aufstehen, um die von Sünden erfüllten Seelen der Menschheit zurückzugewinnen. Allerdings gibt es in letzter Zeit Gerüchte, dass es noch viele Menschen im Park Pobedy gibt, die nicht gestorben sind, sondern überlebt haben. Stattdessen sollen sie sich in böse und grausame Monstrositäten verwandelt haben, weder Mensch noch Tier.\n\nUnsere Völker befürchten, dass das Schlimmste noch bevorsteht."
 nf_GWC.30.a:0 "Oh Nein"

 nf_GWC.31.t:0 "Gestohlene Ressourcen"
 nf_GWC.31.d:0 "Auf unserer Station sind weitere Ressourcen verloren gegangen. Ganze Lagerräume sind inzwischen geplündert, obwohl sie erst vor wenigen Stunden gefüllt wurden. Dies scheint nicht das Werk von einfachen Banditen zu sein. Schnelle Meldungen und die allgemein sich verschlechternde Situation lassen darauf schließen, dass jemand anderes die Schuld trägt. Etwas, das unsere Stationsleitung nur selten erwähnt, um in unserer Gemeinde keinen Aufruhr auszulösen."
 nf_GWC.31.a:0 "Verdammt"

 nf_GWC.32.t:0 "Sabotage"
 nf_GWC.32.d:0 "Ein Großteil unserer Infrastruktur wurde von einer unsichtbaren Instanz sabotiert. Es wird einige Zeit dauern, bis wir den Schaden behoben haben."
 nf_GWC.32.a:0 "Verdammt"

 nf_GWC.33.t:0 "Verängstigte Händler"
 nf_GWC.33.d:0 "Überfallen wurden sie in den dunkelsten Abschnitten der Tunnel oder Kreuzungen, wo die Gleise sonst am ruhigsten sind. Die Händler zögern nun, unsere Station zu betreten, aus Angst, von diesen sogenannten unsichtbaren Männern angegriffen zu werden. Einige schwören sogar, dass sie lieber den Transport zwischen Sewastopol und Hanse durch die Serpukhovsko-Timiryazevskaya-Linie machen würden, als die verfluchten Gleise zwischen unserem Territorium zu ertragen."
 nf_GWC.33.a:0 "Das ist nicht gut"

 nf_GWC.40.t:0 "Augen in der Tiefe"
 nf_GWC.40.d:0 "In den letzten Tagen wurden auf unserer Station immer mehr Bürger vermisst. Es begann zunächst subtil; verlegte Gegenstände und Bewegungen im Schatten. Es dauerte nicht lange, bis uns Berichte über vermisste Personen erreichten. Männer, Frauen und sogar kleine Kinder verschwinden einfach aus ihren Häusern. Ohne Berichte über ihren Aufenthaltsort und noch beunruhigenderen Gerüchten über die Gründe für ihr Verschwinden. Aus irgendeinem Grund sind sie einfach aufgestanden und zu einer anderen Station gegangen, dabei haben sie sogar all ihr Hab und Gut zurück gelassen. Während andere befürchten, dass es sich um die Manifestation von Geistern und Geistern der Verstorbenen handelt, die aufstehen um die von Sünden erfüllten Seelen der Menschheit zurückzugewinnen. Allerdings gibt es in letzter Zeit Gerüchte, dass es noch immer viele Menschen im Park Pobedy gibt, die nicht gestorben sind, sondern überlebt haben. Inzwischen seien sie jedoch verwandelt, in böse und grausame Monstrositäten, die weder Mensch noch Tier mehr sind.\n\nUnser Volk befürchten, dass das Schlimmste noch bevorsteht."
  nf_GWC.40.a:0 "Oh Nein"

 nf_GWC.41.t:0 "Vermisste Kinder"
 nf_GWC.41.d:0 "Das Schlimmste ist eingetreten. Kinder, von denen einige kaum erst laufen können, werden in die Dunkelheit entführt! Ihre Mütter sind verzweifelt und mit dem Ausbruch dieses Tumults versuchen immer mehr wohlhabende Bürger wegzuziehen, aus Angst vor der Entführung ihrer eigenen Kinder. Wir haben den Müttern zugesichert, dass wir ihre vermissten Kinder suchen und finden werden, aber ohne konkrete Hinweise dürfte das schwierig werden."
 nf_GWC.41.a:0 "Das ist nicht gut"

 nf_GWC.42.t:0 "Unsere Bevölkerung hat Angst"
 nf_GWC.42.d:0 "Aus unserer Bevölkerung wurden weitere Berichte über Aktivitäten gemeldet, und dieses Mal können wir sie nicht einfach unter den Teppich kehren oder eine Massenhysterie auslösen. Unsere Bevölkerung schwört, dass sie in den Schatten und aus den Augenwinkeln sich verändernde Formen sieht und Angst hat, nachts zu schlafen, aus Angst, entführt zu werden. Es wurden zusätzliche Wachen aufgestellt, aber das wird unser Volk wohl kaum beruhigen."
 nf_GWC.42.a:0 "Verdammt"

 nf_GWC.43.t:0 "Gestohlene Ressourcen"
 nf_GWC.43.d:0 "Wertvolle Ressourcen wurden direkt vor unserer Nase gestohlen! Wenn diese Ressourcen aufgebraucht sind, werden unsere Techniker Schwierigkeiten haben, Geräte herzustellen und unsere Quoten für die Woche einzuhalten."
 nf_GWC.43.a:0 "Mist"

 nf_GWC.50.t: "Säuberung des Park Pobedy"
 nf_GWC.50.d: "Die abscheulichen Kannibalen von Park Pobedy gibt es nicht mehr! Während es einigen gelang, tiefer in die Dunkelheit zu fliehen, liegen viele erschlagen vor unseren Füßen. Da ihr sogenannter Anführer tot ist und viele seiner inneren Bande ebenfalls getötet wurden, scheint es sicher keine Chance zu geben, dass der Wurmkult jemals wieder seine alte Stärke aufbauen wird, um wieder Furcht einzuflößen.\n\nViele Gefangene wurden aus ihren Fesseln befreit, und obwohl sie ihre schrecklichen Erfahrungen, die sie erlitten haben, selten mit uns teilen möchten, feierten sie unsere Streitkräfte als Helden. Männer, Frauen und Kinder loben den Namen unserer Station. Dieses Ereignis wird sich zweifellos herumsprechen und wäre eine vielversprechende Möglichkeit, um unsere alte Stärke und Macht zu demonstrieren."