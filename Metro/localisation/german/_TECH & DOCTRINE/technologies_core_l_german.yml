l_german:
  
  SQUADRON_TITLE: "Truppen-Taktiken"
  SQUADRON_DESC: "Die SOldaten der Vergangenheit waren das Beste, was ihr Land zu bieten hatte. Unsere Soldaten müssen das Beste sein, was die Metro zu bieten hat."

  COMMAND_TITLE: "Kommando-Integration"
  COMMAND_DESC: "Alte, verstaubte Anführer zerstörten die alte Welt, neue und Talentierte Anführer werden eine neue erschaffen."

  ## Doctrine ##
  doctrine_C_threshold_met: "\nRequires §Y7§! previous Doctrines of tier §YB§!. We currently have §Y[?doctrine_C_threshold]§! Unlocked."
  doctrine_B_threshold_met: "\nRequires §Y7§! Previous Doctrines of tier §YA§!. We currently have §Y[?doctrine_B_threshold]§! Unlocked."
  commander_1_tooltip: "Reduziert die Wahrscheinlichkeit, dass neue Kommandanten§Rnegative Eigenschaften§! haben.\n"

  doctrine_A_1: "Stufe I"
  doctrine_A_1_desc: "Menschen waren schon immer besser im Töten als jedes andere Lebewesen. Und das ist auch gut so."
  doctrine_A_2: "Improvisierter Kampf"
  doctrine_A_2_desc: "In der Metro können Kämpfe unvorhergesehen und auf engem Raum stattfinden, unsere Soldaten müssen bereit sein."  
  doctrine_A_3: "UNterdrückungsfeuer"
  doctrine_A_3_desc: "The aim is to not hit the enemy, while that would indeed be an added benefit. The goal is to degrade the enemies ability to hurl back fire. Allowing our squads to complete their objectives."
  doctrine_A_4: "Hindernistraining"
  doctrine_A_4_desc: "Selbst ein Haufen Schutt kann zu einer ernsthaften Herausforderung werden, wenn man nicht weiß was man tut."  
  doctrine_A_5: "Taktische Beförderung"
  doctrine_A_5_desc: "Unsere Truppen können nicht isoliert voneinander kämpfen. Es braucht zuverlässliche Kommunikation."
  doctrine_A_6: "Verschanzte Positionen"
  doctrine_A_6_desc: "Wenn ein Angriff scheitert ist das eine Sache, wenn jedoch eine Verteidigung scheitert... UNsere Soldaten müssen verstehen was es bedeutet, eine Position zu halten."  
  doctrine_A_7: "Feldversorgung"
  doctrine_A_7_desc: "Wenn unsere Streitkräfte eine Chance haben, sich jenseits der hermetischen Tore unserer Siedlungen zu behaupten, müssen grundlegende Schulungen zum Rationieren von Vorräten, zur optimalen Ausnutzung schlechter oder kaputter Ausrüstungsteile und zu übereilten Reparaturen vor Ort durchgeführt werden."
  doctrine_A_8: "Improvisierte Munition"
  doctrine_A_8_desc: "Wenn es die Situation erfordert, kann im Notfall auch improvisierte Munition zum Einsatz kommen. Diese schmutzigen Patronen beschädigen die Schusswaffen schneller, sorgen aber dafür, dass der Kampf weitergeht."  
  doctrine_A_9: "Sammelpunkt"
  doctrine_A_9_desc: "Trupps sollten in der Lage sein, wichtige Verteidigungsstandorte oder Vorteilspunkte auszuwählen, um sie besser auszukundschaften und die notwendigen Informationen zu sammeln, um ihre Operationen besser durchführen zu können."
  doctrine_A_10: "Menschlicher Eifer"
  doctrine_A_10_desc: "Für das Überleben der Menschheit sind wir bereit jeden Presi zu zahlen, verstehst du? Jeden Preis!"  
  doctrine_A_11: "Bürgerverpflichtungen"
  doctrine_A_11_desc: "Wenn die Freiwilligen nicht ausreichen, dann kommen die Zwangsrekrutierungen. Wer in Sicherheit leben will, der muss auch bereit sein, dafür zu kämpfen."
  doctrine_A_12: "Nationalistischer Eifer"
  doctrine_A_12_desc: "Die Zeit der kleinlichen Regime und Kämpfe der alten Welt ist vorbei. Aus ihrem Grab erheben sich neue Politiken und neue Ideologien. Wir müssen sicherstellen, dass unsere Nation nicht fällt."  
  doctrine_A_13: "Positionierung"
  doctrine_A_13_desc: "Wir haben weder viele Männer, noch gute Ausrüstung, doch es gibt auch immaterielle Dinge, die eine Armee auszeichnen. Eine gute Organisation und Taktik zum Beispiel."
  doctrine_A_14: "Furor Muscovite"
  doctrine_A_14_desc: "Die Russen waren schon vor dem großen Krieg bekannt für ihre Sturheit, ihre Härte, das Feuer, das in ihnen lodert. Bringen wir dieses Feuer wieder hervor, auf dass unsere Feinde in ihm verbrennen mögen!"  

  doctrine_B_1: "Stufe II"
  doctrine_B_1_desc: "Egal wie sehr sich der Krieg auch entwickelt, es heißt immer töten oder getötet werden."
  doctrine_B_2: "Geländevorteil"
  doctrine_B_2_desc: "Die Tunnel sind unser Heim, hier kämpfen wir nach unseren Regeln"  
  doctrine_B_3: "Disziplinarstrafen"
  doctrine_B_3_desc: "Wenn das Zuckerbrot nicht mehr lockt gibt es ja immernoch die Peitsche."
  doctrine_B_4: "Ersetzbare Teile"
  doctrine_B_4_desc: "Je leichter ein Fahrzeug zu reparieren ist, desto schneller kann es in den Kampf zurück"  
  doctrine_B_5: "Gepanzerte Formation"
  doctrine_B_5_desc: "Eine Wand aus Stahl die den Feind überrollt, fast schon bekommt man Mitleid mit ihnen."
  doctrine_B_6: "Verschanzte Aufklärer"
  doctrine_B_6_desc: "Trotz der statischen Natur der Metro können viele Mittel zur Aufklärungn eingesetzt werden: Infrarot-, Nachtsicht- und Ähnliches kann ankommende Feinde auskundschaften. Oder noch praktischer: Flutlichter."  
  doctrine_B_7: "Grundlegende Feldversorgung"
  doctrine_B_7_desc: "Sie werden keine medizinischen Wunder vollbringen, doch lange genug überleben, um zu einem echten Arzt zu gelangen."
  doctrine_B_8: "Blutgruppe"
  doctrine_B_8_desc: "Wer seine Blutgruppe auf den Arm tätowiert hat, der kann schnell und leicht Spenderblut erhalten."  
  doctrine_B_9: "Professionelle Soldaten"
  doctrine_B_9_desc: "Der Großteil unseres Heeres mag eine Miliz aus Zivilisten sein, doch einige von uns sind auch echte Berufskrieger"
  doctrine_B_10: "Unerwarteter Stoß"
  doctrine_B_10_desc: "Sie glauben gar nicht was ein konzentrierter und entschlossener Überraschungsangriff so alles bewirken kann"  
  doctrine_B_11: "Gnadenloser Angriff"
  doctrine_B_11_desc: "Egal wie mächtig ihre Verteidigungen auch sind, ihre Waffen und ihre Munition sind begrenzt"
  doctrine_B_12: "Ausgewogener Ansatz"
  doctrine_B_12_desc: "Pläne müssen sowohl umfassend, als auch flexibel sein"  
  doctrine_B_13: "Grand Plans"
  doctrine_B_13_desc: "Wenn wir alles durchplanen, sollte alles nach Plan verlaufen"
  doctrine_B_14: "Flexible Pläne"
  doctrine_B_14_desc: "Der beste Plan nützt nichts, wenn er Morgen schon veraltet ist" 
  doctrine_B_15: "Geplanter Angriff"
  doctrine_B_15_desc: "Planen wir unsere Angriffe umfassend und sie werden besser" 

  doctrine_C_1: "Stufe III"
  doctrine_C_1_desc: "Selbst die Apokalypse hat uns nicht davon abgehalten uns wegen ideologien gegenseitig umzubringen."
  doctrine_C_2: "Bewaffnete Logistik"
  doctrine_C_2_desc: "Logistik ist zu wichtig um sie von Zivilisten erledigen zu lassen."  
  doctrine_C_3: "Einfallsreichtum"
  doctrine_C_3_desc: "Wieso liegen hier eigentlich Waffen rum? Ach ja, die gehörten dem Feind. Warum nutzen wir sie nicht?"
  doctrine_C_4: "Fokuspunkte"
  doctrine_C_4_desc: "Jeder Feind hat eine Schwachstelle, man muss sie nur finden und dann konzentriert angreifen."  
  doctrine_C_5: "Verzweifelter Kampf"
  doctrine_C_5_desc: "Der Krieg läuft nicht so gut, doch das ist unser Land, unsere Tunnel! Hier haben wir das Sagen!"
  doctrine_C_6: "Nachtangriffe"
  doctrine_C_6_desc: "Tag und Nacht existieren in der Metro nicht, doch Schalf schon. Überraschen wir unseren Feind im Schlaf"  
  doctrine_C_7: "Tiefeninfiltration"
  doctrine_C_7_desc: "Wenn wir mal durchbrechen, dann müssen wir so tief eindringen, wie wir nur können"
  doctrine_C_8: "Schlachtaufklärung"
  doctrine_C_8_desc: "Beobachtet den Feind mal mitten im Kampf und seine Schwächen werden offensichtlich"  
  doctrine_C_9: "Führen mit Auftrag"
  doctrine_C_9_desc: "Überlassen wir allen unseren Generälen doch etwas mehr Initiative"
  doctrine_C_10: "Befehlskette"
  doctrine_C_10_desc: "Eine klare Befehlskette, damit im Kampf alles klar bleibt"  
  doctrine_C_11: "Die Menschen von Moskau"
  doctrine_C_11_desc: "Gibt es ein zäheres Volk als uns Russen? Wer sonst als wir könnte die Apokalypse noch überlebt haben?"
  doctrine_C_12: "Unmittelbarer Gegenangriff"
  doctrine_C_12_desc: "Der Feind rennt sich an unserer Defensive tod, und wenn er geschwächt ist gehen wir direkt in die Offensive"  
  doctrine_C_13: "Elastische Verteidigung"
  doctrine_C_13_desc: "Der Feind blaubt er bricht durch, doch hinter uns liegt einfach nur eine noch stärkere Verteidigungslinie"
  doctrine_C_14: "Hinterhalte"
  doctrine_C_14_desc: "Unehrenhaft, aber unzweifelhaft effektiv" 
  doctrine_C_15: ""
  doctrine_C_15_desc: "" 

  squadron_1: "Ausgebildete Ausbilder"
  squadron_1_desc: "Es gibt jene in der Metro, die schon vor dem Krieg in der Armee gedient haben. Ihre Erfahrung ist für uns Gold wert, nur sie können aus unseren Rekruten echte Soldaten machen."
  squadron_2: "Truppenrotation"
  squadron_2_desc: "Unsere Männer sind keine Bestien auf Streifzug, sie sind Menschen mit Freunden und Familien. Natürlich ist dies ein enormer Moralvorteil, denn unsere Männer wissen wofür sie kämpfen, doch klüger wäre es, sie auch regelmäßig daran zu erinnern. Ein System der Rotation sorgt für regelmäßige Heimbesuche unserer Truppen."  
  squadron_3: "Einberufungsstandards"
  squadron_3_desc: "Nur die Besten dürfen in unsere Armee, denn auf jeden Mann muss man sich verlassen können."
  squadron_4: "MYOG"
  squadron_4_desc: "MYOG - Oder auch 'Make Your Own Gear' ist eine spezialisierte Form von Improvisation im Felde. Mit besonderen Werkzeugen können Waffen selbst im Felde angepasst, repariert und modifiziert werden."  
  squadron_5: "Überlebenstraining"
  squadron_5_desc: "Überleben ist das A und O in der Metro. An unseren Stationen mag das noch einfach erscheinen, doch auf feindlichem Gebiet oder an der Oberfläche? Zeit, unsere Truppen auszubilden."
  squadron_6: "Pflichtübungen"
  squadron_6_desc: "Die individuellen Stärken und Schwächen eines Jeden offenbaren sich im Felde und die Schwachen werden nicht überleben, wenn wir sie nicht ausbilden."  
  squadron_7: "Großoperationen"
  squadron_7_desc: "Der Einsatz eines unkomplizierten Führungsstils ermöglicht es unseren Streitkräften, vor Ort direkte und wirkungsvollere Entscheidungen zu treffen."
  squadron_8: "Irreguläre Kriegsführung"
  squadron_8_desc: "Der Schwerpunkt liegt auf kleinen, unabhängigen Kräften zur Durchführung kleiner Scharmützel, wodurch die Ressourcen des Feindes nach jedem Kampfeinsatz allmählich erschöpft werden."  
  squadron_9: "Konzentriertes Feuer"
  squadron_9_desc: "Die Amerikaner perfektionierten ein System um im Pazifik die japanischen Verteidiger zu vernichten, ihre Stellungen wurden mit intensivstem Feuer vernichtet und anschließend von allen Seiten erstürmt."
  squadron_10: "Manöver-Kriegsführung"
  squadron_10_desc: "Kriege entscheidet man nicht mit Frontkämpfen, sondern mit Manövern wie Einkesselungen."  
  squadron_11: "Kriegslektionen"
  squadron_11_desc: "Jeder kennt die Heldentaten der Napoleonischen Kriege, den Grabenkrieg in Verdun, den großen Vaterländischen Krieg. Doch was ist mit den Metrokriegen? Wir müssen detailierte Aufzeichnungen vornehmen, nicht nur für die Geschichtsbücher, sondern auch um zu lernen."
  squadron_12: "Der neue Krieg"
  squadron_12_desc: "In der Dunkelheit und Ungewissheit der Zukunft ist Krieg zur Routine geworden. Es geht nicht mehr um Nationen, Religion oder ethnische Zugehörigkeit, der Krieg ums Überleben ist zu einer gut geölten Maschine geworden."  
  squadron_13: "Krieg, Krieg bleibt immer gleich"
  squadron_13_desc: "Von dem Moment an, an dem sich die ersten Menschen mit bloßen Steinen gegenseitig totschlugen, hat sich Krieg im Kern nie gewandelt. Er ist das ewige Spiel des Todes."

  commander_1: "Herausragender Kommandant"
  commander_1_desc: "Nicht jeder Nichtsnutz aus unserer Station kann eine Armee führen. Hierfür braucht es besonders talentiertes Personal."
  commander_2: ""
  commander_2_desc: ""  
  commander_3: "Ausbildung in Militärsprache"
  commander_3_desc: "Ein funktionierende Militär braucht klare verständliche Anweisungen, die von oben nach unten gegeben werden."
  commander_4: "Befehls-Standards"
  commander_4_desc: "Um Befehle ausführen zu können muss man sie zuerst verstehen können. Haltet sie folglich so einfach wie möglich, so dass es keinen Raum für Interpretationen gibt."  
