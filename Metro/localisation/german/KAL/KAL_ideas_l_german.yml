l_german:
 kalininskaya:0 "Kalininskaya-Konföderation"
 kalininskaya_desc:0 "Die Konföderation befindet sich in einem ziemlich friedlichen Teil der Metro, weit entfernt von den Unruhen in der inneren Metro, wobei die einzige drohende Gefahr die seltenen Anomalien sind, die unvorhersehbar unsere Stationen heimsuchen.\n\nFriedlich und fleißig, der Großteil der Bevölkerung sind einfache Arbeiter."

 KAL_young_confederation:0 "Junge Konföderation"
 KAL_young_confederation_desc:0 "Die Konföderation ist auf die entlegenste Ecke der U-Bahn an der §YKalininskaya-Linie§! beschränkt und besetzt einen ziemlich friedlichen Abschnitt der U-Bahn. Abgesehen von verstreuten Banditenbanden und der gelegentlichen Anomalie finden viele der Unruhen und Konflikte die den Rest der Metro heimsuchen, weit entfernt von ihrer Haustür statt."

 KAL_peaceful_economy:0 "Friedenswirtschaft"
 KAL_peaceful_economy_desc:0 "Wegen des relativen Friedens ist die Wirtschaft der §YKalininskaya§! hauptsächlich auf die inländische Produktion konzentriert. Halten Sie den Mangel an Waffenwerkstätten jedoch nicht für Faulheit, die Bevölkerung von §YKalininskaya§! sind fleißig und jeder Bürger ist in irgendeiner Funktion aktiv."

 KAL_anomalies:0 "Anomalien"
 KAL_anomalies_desc:0 "Das größte Problem für Kalininskaya sind die Anomalien, die in den Tunneln zu finden sind. Die spontane Flamme mit dem Namen §Y'Drachenatem'§! in der Nähe der §YPerovo§! und dann noch die mysteriöseren §Y'Sirenenlieder'§!, die neugierige Reisende auf ihrem Weg durch die Tunnel in der Nähe von §YAviamotornaya§ in ihren vorzeitigen Tod lockt."

 KAL_the_mad_king:0 "Das Gerede eines Verrückten"
 KAL_the_mad_king_desc:0 "Ein eher zweifelhafter Bewohner der Konföderation ist ein Einsiedler, der an der §YPerovo§ lebt! Von anderen Bürgern der Station wird er als verrückt bezeichnet, und sein gestörtes Geschwafel deutet darauf hin, dass er glaubt der körperlose Nachkomme der Romanows zu sein; die vor über hundert Jahren Russland regierten. Er verschmelzt die Lehren der Vierten Politischen Theorie und des Neo-Luddismus hin zu einer New-Age-Philosophie. Die Synthese von §CLiberalismus§!, §RMarxismus§! und §gFaschismus§! mit der Ablehnung „böser“ Technologie, um eine Utopie im Untergrund zu schaffen.\n\nDie Leute lachen und lehnen seinen Unsinn völlig zu Recht ab, aber zeigen sie dem armen alten Mann auch ihr Mitgefühl. Doch irgendwann könnten die Menschen auf seine Ideale hören. Angesichts der vielen Fehler und Mängel der Konföderation wäre dies zweifellos möglich."

 KAL_anarchist_rumors:0 "Anarchistische Gerüchte"
 KAL_anarchist_rumors_desc:0 "Die Kalininskaya-Konföderation wird von innen heraus bedroht, bösartige Gerüchte und Unwahrheiten die von den Anarchisten in der Republik Gulyai-Pole inszeniert wurden. Diese heimtückische Flüsterkampagne hat das Vertrauen in die Regierung untergraben und Ängste von Verrat und Instabilität geschürt. Während sich die Paranoia ausbreitet, müssen die Führer der Konföderation unermüdlich daran arbeiten, den Gerüchten entgegenzuwirken, das Vertrauen der Öffentlichkeit wiederherzustellen und die Solidarität ihres Volkes zu bekräftigen."

 KAL_news:0 "Das Kalinin-Blatt"
 KAL_news_desc:0 "Im geschäftigen Herzen der Konföderation steht das Kalinin-Blatt als unerschütterliche Stimme des Volkes. Als Hauptquelle für Nachrichten und Informationen spielt diese angesehene Zeitung eine entscheidende Rolle bei der Bildung der öffentlichen Meinung, der Bekämpfung von Fehlinformationen und der Förderung eines Gefühls der Einheit und Widerstandsfähigkeit unter den Bürgern der Eidgenossenschaft."

 KAL_news2:0 "Das Kalinin-Blatt"
 KAL_news2_desc:0 "Im geschäftigen Herzen der Konföderation steht das Kalinin-Blatt als unerschütterliche Stimme des Volkes. Als Hauptquelle für Nachrichten und Informationen spielt diese angesehene Zeitung eine entscheidende Rolle bei der Bildung der öffentlichen Meinung, der Bekämpfung von Fehlinformationen und der Förderung eines Gefühls der Einheit und Widerstandsfähigkeit unter den Bürgern der Eidgenossenschaft."

 KAL_news_cost:0 "Steigende Produktionskosten"
 KAL_news_cost_desc:0 ""

 KAL_peace:0 "Uneingeschränkte Diplomatie"
 KAL_peace_desc:0 "Wir haben beschlossen unsere Türen diplomatisch und politisch für die restliche Metro zu öffnen. Dieser strategische Wandel zielt darauf ab, neue Allianzen zu schmieden, interstationale Beziehungen zu stärken und die politische Zusammenarbeit zu fördern und damit den Beginn einer neuen Ära des Engagements und der Chancen für die Konföderation einzuläuten."

 KAL_nonpeace:0 "Diplomatische Isolation"
 KAL_nonpeace_desc:0 "Wir haben beschlossen eine Haltung der diplomatischen und politischen Isolation einzunehmen, uns aus interstationalen Angelegenheiten möglichst zurückzuziehen. Diese Innenorientierung soll die Konföderation vor ausländischem Einfluss schützen, die nationale Sicherheit stärken und die Selbstständigkeit fördern. Indem wir unseren Blick nach Innen richten, wollen wir unsere Ressourcen bündeln und den inneren Zusammenhalt stärken."

