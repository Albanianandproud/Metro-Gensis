 TRT_bandit_enterprise:0 "Banditentum"
 TRT_bandit_enterprise_desc:0 "An der Kreuzung der Linien Kaluzhsko-Rizhskaya, Kalininskaya und Zamoskvoretskaya liegt Venedig. Ein Zusammenschluss von drei ansonsten unabhängigen Stationen. Eine Bevölkerung ansonsten langweiliger, mürrischer Leute, die jedoch unter der rücksichtslosen Herrschaft von Kriminellen und Schmugglern steht. Ein Zufluchtsort voller Abschaum und Schurken."

