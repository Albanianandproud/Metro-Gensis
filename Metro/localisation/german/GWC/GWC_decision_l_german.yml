l_german:
  GWC_burn_technology:0 "§RVerbrennt Technologie§!"
  GWC_burn_technology_desc: "Diese korumpierten Ungläubigen klammern sich noch immer an die verdorbenen Artefakte der alten Welt. Die Wahrheit ist jedoch, dass Technologie eine Sünde ist, ein Frevel gegen den großen Wurm höchstselbst. Jegliche Technologie muss vernichtet werden, zum Wohle der Menschheit.\n\nErbeutetes Equipment zerstören, Elektronik und CHemikalien zu verbrennen gibt uns Eifer, den wir wiederrum für diverse Boni eintauschen können!"
  GWC_deploy_the_cultists_into_field:0 "Kultisten-Krieger"
  GWC_deploy_the_cultists_into_field_desc:0 "Während unser Priester Frieden predigt und Krieg verachtet, so betont er doch die Notwendigkeit unser Heim zu verteidigen. Sollte die Situation aussichtlos erscheinen, so werden seine Priester unseren Kämpfern doch zur Seite stehen, was sicherlich die Moral heben wird."
