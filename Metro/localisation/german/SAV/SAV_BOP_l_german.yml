 SAV_power_balance_push_centralization_small: "Geringfügige Zentralisierungsbemühungen"
 SAV_power_balance_push_centralization_small_desc: "Durch die Bündelung der gemeinsamen Interessen unserer Stationsleiter können wir unsere Verwaltungen enger miteinander verknüpfen."
 SAV_power_balance_push_centralization_large: "Umfangreiche Zentralisierungsbemühungen"
 SAV_power_balance_push_centralization_large_desc: "Loyalität darf nicht bloßen Aushängeschildern gelten, sondern der Institution selbst. Wir müssen den Belangen des Staates Vorrang vor den Interessen lokaler Eliten einräumen."
 SAV_power_balance_gather_support_station_bureaucrats: "Stationsbürokraten einsetzen"
 SAV_power_balance_gather_support_station_bureaucrats_desc: "Wir müssen eine Hierarchie von Amtsträgern schaffen, die sich über die kleinlichen Streitigkeiten lokaler Dienststellen hinwegsetzen können, um den Staatsapparat durchzusetzen."
 SAV_power_balance_station_unity: "Lokale Interessen ausgleichen"
 SAV_power_balance_station_unity_desc: "So entscheidend es auch ist, eine einheitliche politische Autorität zu schaffen, dürfen wir nicht riskieren, den Prozess zu überstürzen. Ein besonnenes, stetiges Vorgehen sowie das Gewinnen von Herz und Verstand der Menschen sind dabei ausschlaggebend."
 SAV_power_balance_seek_compromise_with_bulvar: "Streben Sie eine Kompromisslösung an."
 SAV_power_balance_seek_compromise_with_bulvar_desc: "Es besteht zudem ein gewisser Bedarf an lokaler Autonomie. Wir können über kleinere Bedenken hinwegsehen und etwaige Probleme am Tsvetnoy-Boulevard beheben. Sie können ihre Bordelle, Bars und sonstigen zwielichtigen Etablissements behalten, solange sie ihren Anteil zahlen."

