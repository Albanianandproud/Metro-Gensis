l_german:
 GWC_followers_of_the_worm: "Diener des Wurmes"
 GWC_followers_of_the_worm_desc: "Wir sind seine Kinder. Wir sind diejenigen, die auf seinen Willen hören und ihn befolgen."

 GWC_worm_military_1: "Kriegerruf"
 GWC_worm_military_1_desc: "Es gibt nur wenige in unserer Herde, die unseren Krieger im Kampf besiegen könnten. Es ist nicht bekannt, woher er kam. Einige glauben, dass er vom Großen Wurm selbst zu uns gebracht wurde. Nur der Priester und der Krieger selbst wissen es, und sie versuchen nicht darüber zu sprechen. Keiner der Menschen, weder gut noch böse, wurde jemals von seinem wahnsinnigen Zorn getroffen und hat überlebt."

 GWC_worm_military_2: "Vergorene Pilze"
 GWC_worm_military_2_desc: "Die Pilze, die in unseren Tunnelnetzwerken wachsen besitzen besondere Eigenschaften. Obwohl sie verwelkt und verfallen aussehen, besitzen sie hypnotische, ja fast schon magische Eigenschaften. Die Menschen die sie gegessen haben, beschreiben, wie sie lebendige Bilder sahen und laute, fast ohrenbetäubende Stimmen hörten. Handelt es sich möglicherweise um eine direkte Kommunikationsverbindung zum Wurm selbst? Der Priester glaubt das nicht, aber unsere Krieger bestehen darauf, diese Pilze zu sich zu nehmen bevor sie in die Schlacht ziehen. Sie glauben, dass die Bilder zukünftige Ergebnisse künftiger Schlachten vorhersagen könnten."

 GWC_worm_military_3: "Krieg am Horizont"
 GWC_worm_military_3_desc: "Versteckt hinter den Heiden und sicher vor Blicken hatten wir Zeit, unsere Verluste auszugleichen und mit dem Wiederaufbau nach dem Bild zu beginnen, das sich der Große Wurm wünscht. So sehr auch gesagt wird, dass Krieg bedeutungslos ist, so müssen wir doch alles verteidigen was uns heilig ist, und zwar von jenen denen Nichts heilig ist. Sie töten einander im Namen längst vergessener Persönlichkeiten und für materiellen Reichtum, und doch sind für wir nichts weiter als blutrünstige Wilde."

 GWC_worm_military_4: "Eine beeindruckende Gestalt"
 GWC_worm_military_4_desc: ""

 GWC_worm_military_5: "Ein verstörter Verstand"
 GWC_worm_military_5_desc: ""

 GWC_purchase_buffs_for_XP:0 "Ermöglicht Entscheidungen zum erhalten von Militär-Boni zum Preis von £army_experience §GArmee-Erfahrung§!"

 GWC_worm_military_5a: "Führt mit Beispiel"
 GWC_worm_military_5a_desc: ""

 GWC_worm_military_6: "Unbändiger Zorn"
 GWC_worm_military_6_desc: "In ihrer Kernform tragen alle unsere Anbeter die Worte des Wurms selbst in sich. Ein Hass auf die Ungläubigen und eine Wut, um ihre dekadente Zivilisation zu zerstören, die die gesamte Welt befällt, das Haus des Wurmes."

 GWC_worm_military_7: "Eine Kultur des Konflikts"
 GWC_worm_military_7_desc: "Die Menschheit war und bleibt eine Gesellschaft, die ausschließlich auf den Knochen und dem Kadaver ihrer selbst aufgebaut ist. Kein anderes Wesen ist in der Lage, Kriege so vollständig und effektiv zu führen wie der Mensch. Aber wir sind weder Menschen noch Tiere. Wir sind mehr als das."

 GWC_worm_military_8: "Kriegsführung auf unsere Art"
 GWC_worm_military_8_desc: "Die Kriege von heute werden mit Steinen und Stöcken ausgefochten"

 GWC_worm_military_9: "Eine brutale Angelegenheit"
 GWC_worm_military_9_desc: "Durch Streit wird der Einzelne stärker. Durch Stärke gewinnen wir Perspektive und mit einer neuen Perspektive sind wir begabt, im Namen des Wurms selbst zu wandeln."
 GWC_exchange_XP_for_bonuses: "EnErlaubt Entscheidungen um £army_experience §GArmee_Erfahrung§! in Militärische §tBoni§! einzutauschen."

 GWC_worm_military_10: "Tödliches Handwerk"
 GWC_worm_military_10_desc: "Unorthodox im Vergleich zur Technologie der Sünder, doch unsere Werkzeuge sind groß und grob, effektiv und gefährlich. Ihre Gewehre haben keine Chance gegen den schnellen Schwung einer scharfen Klinge oder den Pfeil, der von einem Blasrohr ausgeht."

 GWC_worm_military_armaments_1: "Waffenhandwerk"
 GWC_worm_military_armaments_1_desc: "Ungeachtet dessen, was der Priester uns gelehrt hat, nähmlich dass die Produktion von Technologie immer zu Krieg und Zerstörung führt, hat er docj die begrenzte Produktion von Waffen und Werkzeugen wie Blasrohren und Keulen zugelassen."

 GWC_worm_military_armaments_2: "Waffenproduktion"
 GWC_worm_military_armaments_2_desc: "Unter der Aufsicht des Priesters dürfen rudimentäre Werkzeuge und Blasrohre hergestellt werden. Unsere Krieger im Feld oder in den Tiefen müssen ausgerüstet sein, für den Fall, dass sie sich gegen ketzerische Kräfte durchsetzen."

 GWC_worm_military_armaments_3: "Stachelkeulen"
 GWC_worm_military_armaments_3_desc: "Mehr Spikes bedeuten mehr Wunden."

 GWC_worm_military_armaments_4: "Verstärkte Griffe"
 GWC_worm_military_armaments_4_desc: ""

 GWC_worm_military_armaments_5: "Geheiligte Kriegswaffen"
 GWC_worm_military_armaments_5_desc: ""

 GWC_worm_military_generals_1: "Die Lehren des Wurms"
 GWC_worm_military_generals_1_desc: ""

 GWC_worm_military_generals_2: "Krieger des Wurmes"
 GWC_worm_military_generals_2_desc: ""

 GWC_worm_military_generals_3: "Urteil des Wurms"
 GWC_worm_military_generals_3_desc: ""
 GWC_worm_military_generals_3_tt: "Das Verbrennen von Technologie gibt ihnen nun Befehlsmacht"
 
 GWC_focus_1: "Der Wurm wandelt um uns herum"
 GWC_focus_1_desc: "Es ist eine Zeit großer Veränderungen. Unser Anführer blickt aus der Ferne auf den Rest des Untergrunds und die Menschheit hat sich noch nicht von ihren Sünden befreit. Nur durch die heilige Taufe durch das Wort des Wurms kann die Erlösung erreicht werden. Durch den Einsatz von Technologie greifen sie jedoch auf die verblassende Erinnerung an die alte Welt zurück. Nur durch unser Wort können wir sie und uns selbst von der Unwissenheit befreien."
 GWC_call_to_war: "\nErlaubt §YVerbrennt Technologie§!-Entscheidungen - um dauerhaft §YStartegische Ressourcen§! zu zerstören um §RKriegsunterstützung§! zu erhalten.\n"

 GWC_supremacy_of_force: "Überlegenheit der Gewalt"
 GWC_supremacy_of_force_desc: "Die bösen Ungläubigen klammern sich an die Technologie und glauben, dass sie ihnen Kraft gibt – wie bedauerlich. Unsere Stärke ist um ein Vielfaches größer als jedes Stück ihrer verdorbenen Technologie! Unseres beruht auf unserer Hartnäckigkeit und unserer Macht, während sie, verhätschelt durch die Technologie, schwach und reif für die Zerstörung macht."

 GWC_supremacy_of_wit: "Überlegenheit des Verstandes"
 GWC_supremacy_of_wit_desc: ""

 GWC_focus_4: "Lagern Sie konserviertes Fleisch"
 GWC_focus_4_desc: "Es sollten Lagerräume geschaffen werden, um Fleisch für Krisenzeiten haltbar zu machen."

 GWC_focus_4a: "Was mein ist ist mein"
 GWC_focus_4a_desc: "Durch die Unterwerfung heidnischer Stationen kann der unterirdische Raum dieser Welt weitergenutzt werden. Es ist ein heiliger Raum, denn während das schlagende Herz des Wurms immer größer wird, müssen mehr Feuer und Trommeln im Einklang mit dem Ruf und der Ehrfurcht seines Namens schlagen."

 GWC_focus_5: "Der Wurm ruft"
 GWC_focus_5_desc: "Der Wurm verlangt von den Kindern, seinen Kindern, den Untergrund von den Ungläubigen zu befreien. Die Zeit der Untätigkeit ist vorbei, denn es soll geschehen. In Ehrfurcht wird sein Name in unseren Gesängen gelobt. Die Trommeln hallten von den verfallenden Wänden des Untergrunds und verwandelten sich in schwaches, gedämpftes Heulen und Quietschen. Aus dem Park des Sieges ist das Stöhnen unzähliger Kehlen abscheulicher Wesen zu hören. Die Trommeln schlagen und schlagen, und die Fackeln brennen. Benachbarte Stationen zittern vor Angst vor dem, was ihnen bevorsteht."

 GWC_focus_6: "Markierung unseres Territoriums"
 GWC_focus_6_desc: "Unser Reich ist heilig, ebenso wie der gesamte Untergrund. Aber um potenzielle Eindringlinge abzuschrecken, müssen wir Angst und Schrecken in die Herzen und Gedanken derer einflößen, die uns Schaden zufügen wollen."

 GWC_focus_6a: "Unsere Ansprüche"
 GWC_focus_6a_desc: "Diese Tunnel gehören zu Recht uns. Alle Tunnel und unterirdischen Netzwerke die vor uns liegen, gehören zu Recht den Kinder des Wurms, so sagte es der Priester. Sie können von uns beansprucht werden."

 GWC_focus_6b: "Abscheulichkeiten gegen den Wurm"
 GWC_focus_6b_desc: ""

 GWC_focus_6c: "Keine Reue, keine Gnade"
 GWC_focus_6c_desc: ""

 GWC_focus_6d: "Gegen alle Widrigkeiten"
 GWC_focus_6d_desc: "Sie glauben, mit ihrer Technologie und ihrer sogenannten Ignoranz die Erde zurückzuerobern und die „Zivilisation“ wiederherzustellen. Vergeblicher Stolz"

 GWC_focus_7: "Baut Werkzeuge"
 GWC_focus_7_desc: "Für unsere angehenden Krieger müssen mehr Äxte und Blasrohre hergestellt werden. Wir können sie nicht einfach den Heiden überlassen."

 GWC_focus_7a: "Einlagerung von Fleisch"
 GWC_focus_7a_desc: "Und darum heißen die..."

 GWC_focus_8: "Macht schafft Recht"
 GWC_focus_8_desc: "In einer perfekten Welt gäbe es weder Krieg noch Konflikt. Aber dies ist keine perfekte Welt und es gibt keine perfekten Wesen (außer dem Wurm). Das Einzige, was offensichtlich ist, ist die Herrschaft der Mächtigen über die Schwachen."

 GWC_focus_8a: "Kampfgrund"
 GWC_focus_8a_desc: "Mutanten dringen ständig von der Oberfläche in den Untergrund ein, indem sie den Tunnel passieren. Es gibt keinen besseren Ort, als unsere immer größer werdende Schar von Kriegern auszubilden."

 GWC_focus_8b: "Adrenalin-Rausch"
 GWC_focus_8b_desc: "Die Hektik des Kampfes und das reine, heiße Gefühl des Konflikts durchströmen unsere Anbeter. Die Katharsis einer Jagd, die Gefangenen werdfen geopfert und die Heiden werden gefressen."

 GWC_focus_8c: "Versammelt den Stamm"
 GWC_focus_8c_desc: "Es müssen mehr unserer Anhänger gerufen werden, um den Kampf gegen die Feinde des Wurmes aufzunehmen und vorzubereiten. Ihr Untergang steht nun vor der Tür."

 GWC_focus_8d: "Alle werden gemustert"
 GWC_focus_8d_desc: "Wir Gläubigen müssen dem Ruf des Wurms folgen. Da Feinde von überall um uns herum eindringen, ist auch unsere Lebensweise in Gefahr. Wir kanalisieren den instrumentellen Willen des Wurms in uns. Wir müssen alles schützen, was heilig auf dieser Welt ist"

 GWC_focus_9: "Infiltrieren Sie die nördlichen Linien"
 GWC_focus_9_desc: "Strogino versteckt sich in seinem eigenen Versteck in den Tunneln. Von Krylatskoje durch einen langen Abschnitt eines kargen Tunnels getrennt, hat sich die Station recht gut behauptet, sie besitzt eine eigene Bibliothek und ein Arsenal. Ihr Anführer, ein Mann namens Voronin, stammt jedoch aus einer ganz anderen Station. Doch Berichte über hagere Gestalten, die aus dem Schatten zuschauen, setzen die Station unter Druck. Die Bücher und Manuskripte der alten Welt sind ihnen nun nicht mehr von Nutzen."

 GWC_enable_northern_infiltration: "Erlaubt Entscheidungen um die Tunnel nördlich der §Y[GWC.capital.GetName]§ zu infiltrieren!"

 GWC_focus_10: "Infiltrieren Sie die östlichen Linien"
 GWC_focus_10_desc: "Im äußersten Hinterland der Metro befindet sich der Europäische Stationenbund, eine instabile Nation die im Streit und Konflik versinkt und abseits der restlichen Metro liegt. Nicht dass sie je eine Aussicht darauf hätten, ihre Stationen überhaupt vor uns retten könnten."

 GWC_enable_eastern_infiltration: "Erlaubt Entscheidungen um die Tunnel östlich der §Y[GWC.capital.GetName]§ zu infiltrieren!"

 GWC_focus_11: "Entführt ihre Kinder"
 GWC_focus_11_desc: ""
 GWC_kidnapping: "Erlaubt es uns einen Teil der §YBevölkerung§! der Heiden zu stehlen!"

 GWC_focus_11a: "Verwüstung und Plünderung"
 GWC_focus_11a_desc: ""
 GWC_resource_stealing: "Erlaubt es uns §YStrategische Ressourcen§! von den Heiden zu stehlen!"

 GWC_focus_12: "Verkünder des Wurms"
 GWC_focus_12_desc: ""

 GWC_focus_north_1: "Einen Konflikt mit dem Norden anzetteln"
 GWC_focus_north_1_desc: "Die Krylatskoje steht unter dem wachsamen Auge von Wischin, dem Stationssvorsteher und Chef. Der Betrieb der Station ähnelt mehr einem Militärlager als einer funktionierenden Station. Angst und Paranoia vor der Dunkelheit sind weit verbreitet, während Sichtungen von Mutanten aus dem Süden den Bewohnern Angst einflößen. Aber jetzt haben sie noch mehr zu befürchten."
 GWC_enable_northern_conflict: "Erlaubt es folgende Stationen zu infiltrienen: §Y[KRY.GetFlag][KRY.GetName]§!, §Y[HMS.GetFlag][HMS.GetName]§! §Y[STG.GetFlag][STG.GetName]§! und §Y[MIT.GetFlag][MIT.GetName]§!"
 GWC_focus_north_3: "Töten für den Großen Wurm"
 GWC_focus_north_3_desc: "Reißt, beißt, verstümmelt und tötet im Namen der Würmer; Geht hinaus und bringt den Heiden den Tod!"
 GWC_focus_north_3_tt: "Technologie zu verbrennen bringt nun Armee-Erfahrung"
 GWC_focus_north_2: "Die Mutanten der [377.GetName]"
 GWC_focus_north_2_desc: "Die Molodezhnaya beherbergt jene Menschen, die das Pech hatten, nicht an der Strahlung zu sterben, sondern viel Schlimmerem zu erliegen: Entstellt und in Disharmonie mit dem Rest der Metro zogen sie sich in ihren kleinen Teil zurück, in der Hoffnung, sich von allen möglichen Eindringlingen fernzuhalten."
 GWC_focus_north_2a: "Krieg mit Strogino"
 GWC_focus_north_2a_desc: ""
 GWC_focus_north_3a: "Beginnt einen Konflik mit [377.GetName]"
 GWC_focus_north_3a_desc: "Die Mutanten-Bedrohung klammert sich noch immer an die Vorstellung von Menschlichkeit, sie lesen hierfür sogar aus längst vergessenen Manuskripten und Gedichten. Wie bedauerlich, man könnte davon ausgehen, dass die Mutantenmenschen würdige Verbündete des Wurms werden könnten. Aber leider ist dem wohl nicht so."
 GWC_focus_north_5: "Infiltriert [MIT.GetNameDef]"
 GWC_focus_north_5_desc: "Der Stationenbund lebt in der entlegensten Ecke der Metro, seine Bewohner führen ein einfaches, eher ereignisloses Leben und Mutantenangriffe sind für sie eher selten. Aber wir werden ihnen einen neuen Grund geben, die Dunkelheit zu fürchten."
 GWC_focus_north_4: "Brutales Vorgehen"
 GWC_focus_north_4_desc: ""

 GWC_focus_east_1: "Krieg gegen den Osten führen"
 GWC_focus_east_1_desc: "Der Arbat liegt direkt hinter dem zerstörten Tunnel. Die profanen Bewohner ernähren sich von der Technologie und dem ketzerischen Wissen der alten Welt, indem sie Expeditionen an die Oberfläche schicken."
 GWC_enable_eastern_conflict: "Erlaubt die Infiltration folgender Stationen: §Y[ARB.GetFlag][ARB.GetName]§! und §Y[EUR.GetFlag][EUR.GetName]§!"
 GWC_focus_east_3: "Vorbereitung auf das Metzeln"
 GWC_focus_east_3_desc: ""
 GWC_focus_east_2: "Entfesselter Krieg"
 GWC_focus_east_2_desc: ""
 GWC_focus_east_3a: "Vorstoß in die [ARB.GetName]"
 GWC_focus_east_3a_desc: ""
 GWC_focus_east_2a: "Europas letzte Schlacht"
 GWC_focus_east_2a_desc: ""
 GWC_focus_east_4: "Der Osten wartet"
 GWC_focus_east_4_desc: ""
 GWC_focus_east_5: "Sturm auf die letzte Zuflucht"
 GWC_focus_east_5_desc: ""


 GWC_focus_133: "Den Gläubigen verliehen"
 GWC_focus_133_desc: ""

 GWC_focus_14aa: "Karte der unterirdischen Tunnel"
 GWC_focus_14aa_desc:  "Geheime Wege und Tunnel, die einst der Wurm gegraben hat, liegen direkt unter unseren Füßen. Ein verworrenes Netz aus Wegen und Löchern, die durch den unbekannten Untergrund führen. Wir können diese mit unseren Streitkräften nutzen, um zu reisen und nach neuen Opfern zu suchen."

 GWC_focus_15_ARB: "Rache an der [ARB.GetNameDef]"
 GWC_focus_15_ARB_desc: ""


 GWC_heart_of_darkness:0 "Herz der Finsternis"
 GWC_heart_of_darkness_desc:0 "Hier im Park Pobedy liegt der Tod und die Zerstörung der Menschheit und das offensichtliche Wiederaufleben der Wurmanbeter. Eine düstere Geburt des Untergangs der Menschheit."

 GWC_rid_the_machines:0 "Befreiung von den Maschinen"
 GWC_rid_the_machines_desc:0 "Es ist ketzerisch, dieselben Maschinen und Teile der Technologie innerhalb der Wurmkult-Gesellschaft mitzuführen, und sie müssen gefunden und zerstört werden. Wir werden diese Teile entweder weggewerfen oder sie in ihre Einzelteile zerlegen und woanders verwenden. Der Priester macht unmissverständlich klar, dass Technologie in ihrer Gesamtheit ein Feind unserer Lebensweise ist."
 GWC_rid_machines_improve_decision: "Die Effekte der §YTechnologie-Verbrennung§! werden §Gverbessert!§!"

 GWC_sharper_sticks:0 "Schärfere Stöcke"
 GWC_sharper_sticks_desc:0 "Durch das schärfen der Pfähle, die wir zur Markierung unseres Territoriums setzen, wird es für Eindringlinge schwieriger werden bei uns einzudringen. Ein Hindernis, das ihre Bewegung verlangsamt, wodurch sie bessere Ziele für unsere Blasrohre bieten."

 GWC_scarier_stakes:0 "Ein Anblick des Schreckens"
 GWC_scarier_stakes_desc:0 "In die Erde eingelassene Gräben und Stacheln sind kein Grund für den Feind zu zögern. Aber geschmückt mit den verwesenden, verstümmelten Leichen derer, die wir gefangen nehmen konnten? Sie werden es sich zweimal überlegen, bevor sie unsere Domäne betreten."

 GWC_ind_3:0 "Steinzeitliche Produktion"
 GWC_ind_3_desc:0 "Überraschenderweise ist die Herstellung von guten Steinwerkzeugen recht aufwendig. Man kann nicht einfach irgendeinen Stein oder Felsen aufheben und ihn auch dazu verwenden, den Schädel eines ahnungslosen Gegners zu Brei zu zerschlagen. Bestimmte Gesteine ​​haben natürliche Eigenschaften, die gut zu bestimmmten Verwendungen passen."

 GWC_ind_4:0 "Ein echtes Handwerk"
 GWC_ind_4_desc:0 "Die Verwendung eines größeren, haltbareren Steins und dessen Verwendung zum Absplittern eines anderen kleineren Steinstücks durch Abplatzen von Stücken ist bei der Herstellung von Klingenspitzen recht effektiv."

 GWC_ind_5:0 "Erhöht die Reichweite"
 GWC_ind_5_desc:0 "Da sich unser schlagendes Herz immer weiter ausdehnt, werden wir unweigerlich mit anderen Menschen in Kontakt kommen. Wir müssen sicherstellen, dass sie wissen, dass sie in unsere Domäne eindringen. Stachelfallen, Bildnisse und Pfähle werden sie dazu bringen, es sich zweimal zu überlegen."

 GWC_toolmaking_smiths:0 "Eine Kultur der Arbeit"
 GWC_toolmaking_smiths_desc:0 "Es wurden ziemlich aufwändige Werkzeuge hergestellt, die unser Wissen über die recht mühsame Aufgabe erweitern. Unsere Arbeiter sind ständig damit beschäftigt, ihr Wissen über die Steinbearbeitung zu verfeinern und zu erweitern."

 GWC_cave_fungus:0 "Höhlenpilze"
 GWC_cave_fungus_desc:0 "Ein Geschenk des Wurmes an seine Kinder? Der Priester glaubt es, und wir werden es auch glauben."

 GWC_medicinal_wonders:0 "Medizinische Wunder"
 GWC_medicinal_wonders_desc:0 "Während der Priester uns lehrt, dass wir uns am Mark und Fleisch der Ungläubigen laben müssen, erlaubt er uns nur bei Bedarf, uns an den Pilzen zu erfreuen, die am Wegesrand unter den Tunnelplattformen wachsen."

 GWC_ind_6:0 "Neolithische Fertigung"
 GWC_ind_6_desc:0 "Beton und Bewehrungsstahl sind kaum mehr als Abfall am Wegesrand, aber die Steine ​​und die Erde unter unseren Füßen? Sie können zu feinen und aufwändigen Werkzeugen konstruiert und geschliffen werden, um unseren Bedürfnissen gerecht zu werden."

 GWC_ind_7:0 "Kunsthandwerker"
 GWC_ind_7_desc:0 "Die Herstellung aufwändiger Verzierungen und feiner handwerklicher Kunstwerke erfordert nur mit Händen und einfachen Werkzeugen große Anstrengung und Geschicklichkeit."

 GWC_ind_9:0 "Verteidigung unserer Heimat"
 GWC_ind_9_desc:0 "Diejenigen, denen der Wurm fremd ist, und diejenigen, die seine Liebe und Gnade verabscheuen, sollen sich befürchten, in unser Reich einzudringen. Sie kommen in bösen Absichten und sind bereit, der Herde des Priesters Schaden zuzufügen. Wir müssen wachsam sein und versprechen, dass wir diesen Gefallen mit Grausamkeit erwidern werden."

 GWC_into_the_earth:0 "Grabt in die Erde"
 GWC_into_the_earth_desc:0 "Die Erde birgt Reichtümer, die uns der Große Wurm geschenkt hat. Wir als seine Kinder werden diesen Lohn ernten"

 GWC_worm_provides:0 "Der Wurm beschützt"
 GWC_worm_provides_desc:0 "Wir, seine Kinder, werden vom großen Wurm über alles geliebt. Lasst uns ihm mit unseren Opfergaben danken."

 GWC_worm_punishes:0 "Der Wurm bestraft"
 WC_worm_punishes_desc:0 "Der Wurm bestraft diejenigen, die von seinem Wort abweichen und diejenigen, die sich seinen so heiligen Gaben an alle seine Kinder entziehen."

 GWC_heart_of_darkness1:0 "Heilige Schmuckstücke"
 GWC_heart_of_darkness1_desc:0 "Es heißt, dass die religiösen Führer des Wurmkults unsere zeremoniellen Schmuckstücke und Halsketten mit dem persönlichen Segen des Wurms segnen. Dadurch können sie Strahlung und sogar die eisige Kälte in der Metro abwehren."

 GWC_heart_of_darkness0:0 "Militärischer Einsatz"
 GWC_heart_of_darkness0_desc:0 "Als immer größer werdendes Ziel, die Heiden zu besiegen, die immer noch auf ihre Technologie angewiesen sind, müssen wir gegen sie kämpfen."

 GWC_heart_of_darkness2:0 "Militärischer Einsatz II"
 GWC_heart_of_darkness2_desc:0 "Die Steigerung unserer Militärproduktion ist eine mühsame Aufgabe, die jedoch langfristig von Nutzen sein wird."

 GWC_mil_1:0 "Schädelspalter"
 GWC_mil_1_desc:0 "Stöcke und Steine ​​brechen Fleisch und machen Knochen zu Splittern. Die Feinde des Großen Wurms werden bei unserem Anblick verzweifeln!"

 GWC_mil_2:0 "Verstärkte Griffe"
 GWC_mil_2_desc:0 "Holzgriffe sind unhandlich. Aber sie in die Haut unserer Feinde zu hüllen, sorgt für einen besseren Halt und damit für eine größere Zuverlässigkeit."

 GWC_mil_3:0 "Knochenknüppel"
 GWC_mil_3_desc:0 "Steine ​​und Felsbrocken sind schwer. Es ist nicht schwer zu erkennen, wie umständlich der Umgang mit unseren Steinwerkzeugen ist. Aber Knochen? Sie sind einfach und leicht; viel einfacher zu basteln und zu gestalten."

 GWC_mil_4:0 "Grausige Schmuckstücke"
 GWC_mil_4_desc:0 "Gesegnete Schmuckstücke unserer gefallenen Feinde, die an den Waffen unserer besten Krieger befestigt sind, werden ein Zeichen für die Gunst des Großen Wurmes sein. Trophäen der Jagd und gefallener Feinde erhöhen wiederum die Tödlichkeit unserer Werkzeuge."

 GWC_ind_4a:0 "Köpfe auf Spießen"
 GWC_ind_4a_desc:0 "Der Station liegt in Sichtweite. Ihre quecksilberfarbenen Leuchtstofflampen leuchten schwach aus der Tiefe des Tunnels. Die Mutanten sind jetzt ihr geringstes Problem."

