 satellite_militarization: "Wir rüsten unsere Waffenschmiede neu aus"
 satellite_militarization_desc: "Es ist nicht abzusehen, wann die Reichsstreitkräfte vor unserer Tür stehen werden. Vielleicht morgen, nächste Woche? Oder sie planen bereits den Eintritt in unsere Station. Unsere Waffenschmiede müssen Überstunden machen, wenn wir genug produzieren wollen. Eine Waffe für jeden Mann, oder besser noch, drei."

