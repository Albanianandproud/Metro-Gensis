 satellite_construction_military_1:0 "Bau von Waffenschmieden"
 satellite_construction_military_1_desc:0 "Natürlich können wir AKs und andere Geschütze von der Oberfläche bergen, aber was passiert, wenn die Vorräte einmal knapp werden? Wir werden unsere Feinde ganz sicher nicht mit Steinen und Speeren bewerfen, oder??"

 satellite_construction_military_2:0 "Waffenschmiedeprojekte"
 satellite_construction_military_2_desc:0 "Zwei Läufe zusammenzusetzen und alles mit Klebeband zu verkleben ist eine sichere Methode, aber was passiert, wenn Igors Finger in der Hektik des Kampfes zerschossen werden? Wir brauchen zuverlässigere Waffen, wenn wir wollen, dass unsere Soldaten ihre Finger behalten."

 satellite_construction_military_3:0 "Waffenschmied-Festgehalt"
 satellite_construction_military_3_desc:0 "Wenn wir unsere Waffenschmiede persönlich statt nach Produkt bezahlen, sind sie eher geneigt, weiter für uns zu arbeiten."

 satellite_self_reliance_autarky:0 "Autarkie"
 satellite_self_reliance_autarky_desc:0 "Wenn wir als Station weiterhin erfolgreich sein wollen, müssen wir autark werden. Wir können uns nicht auf externe Quellen verlassen, die vielleicht in unserer Not zu uns kommen könnten. Um stark zu werden, müssen wir unabhängig werden."

 satellite_specialized_technical_production:0 "Spezialisierte technische Produktion"
 satellite_specialized_technical_production_desc:0 ""

 satellite_technical_infantry_bonus:0 "Das Handwerk der Waffenbauer"
 satellite_technical_infantry_bonus_desc:0 "Kuznetsky Most produziert vielleicht die besten Schrottwaffen in der Metropole, aber können sie genug produzieren? Ich bezweifle das."

 satellite_technical_draisine_bonus:0 "Herstellung von Schienenfahrzeugen"
 satellite_technical_draisine_bonus_desc:0 "Bring mich näher an den Feind, ich möchte sie mit meinem Schwert treffen."

 satellite_technical_support_weapons_bonus:0 "Beschaffung schwerer Waffen"
 satellite_technical_support_weapons_bonus_desc:0 "So etwas wie zu viele Waffen gibt es nicht, sie schaffen und sie lösen Waffen."

 satellite_technical_specops_bonus:0 "Konstruieren von Spec-Ops-Ausrüstung"
 satellite_technical_specops_bonus_desc:0 "Nichts wie die Spartaner-Ausrüstung, aber können die sagen, dass ihre Kevlar-Weste aus der Seitenwand eines Zuges hergestellt wurde? Hah, nein!"

 satellite_redline_support:0 "Unterstützung durch die Rote Linie"
 satellite_redline_support_desc:0 "Unterstützung direkt vom Sokol, höchstwahrscheinlich ein Werbegag, der nicht aus reinem Altruismus entstammt"

 _satellite_expunged_merchants:0 "Ausgelöschte Händler"
 _satellite_expunged_merchants_desc:0 "Ihre überteuerten Waren haben mir sowieso nie gefallen. Allerdings vermisse ich den Pilztee."

 satellite_tunnel_supply:0 "Mehr Waffen für die Front"
 satellite_tunnel_supply_desc:0 "Während der Krieg die Metro erneut in seinen Bann zieht, müssen wir sicherstellen, dass unsere Streitkräfte angemessen ausgerüstet sind. Wir sind ja keine Wilden."

 satellite_stake_our_claim_in_the_world:0 "Unser Platz im Untergrund"
 satellite_stake_our_claim_in_the_world_desc:0 "Es gibt viele Orte in der Metro, aber keiner von ihnen riecht nach der Heimat. Dieses Stück dieser verfluchten Welt gehört uns, und wir werden es mit unserem Leben verteidigen."
 
 satellite_stand_firm_against_fascism:0 "Stehen Sie standhaft gegen den Faschismus"
 satellite_stand_firm_against_fascism_desc:0 "Gemeinsam stehen wir, geteilt fallen wir"

 satellite_rapid_production: "Schnelle Produktion"
 satellite_rapid_production_desc: "Sie mögen schäbig sein, aber eine schäbige Waffe ist besser, als überhaupt keine Waffe zu haben, Igor."

