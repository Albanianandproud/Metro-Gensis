l_russian:
  GWC_burn_technology: "§RСожжение технологий§!"
  GWC_burn_technology_desc: "Развращённые неверующие все еще цепляются за свои пожитки Старого мира, как будто это спасёт их от жизни, полной греха и страданий. Все технологии должны быть сломаны и уничтожены, а всё, что осталось от тёмных веков человечества, растрачено впустую!\n\nСжигание оборудования, добытого на безнравственных станциях, сжигание электроники и химикатов или даже принесение в жертву пленных принесут нам благосклонность. Благосклонность можно обменять на временные модификаторы или улучшенные бонусы!"
  GWC_deploy_the_cultists_into_field: "Боевые отряды культистов"
  GWC_deploy_the_cultists_into_field_desc: "Хотя Жрец проповедует мир и отвергает любую идею войны, защита нашего дома от угроз - это совершенно другое дело. Если ситуация когда-нибудь станет настолько тяжелой, проповедники Червя могут помочь нам в битве, что поднимет моральный дух наших воинов."
