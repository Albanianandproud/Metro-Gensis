scavenge_mission_success.1.t: "Erfolgreicher Einsatz"
scavenge_mission_success.1.d: "Erfreuliche Nachrichten haben uns erreicht. Wochen nachdem unsere Stalker aufgebrochen waren, sind sie nun zu unserer Station zurückgekehrt – ihre Taschen und Rucksäcke gefüllt mit wertvollen Fundstücken von der Oberfläche."
scavenge_mission_success.1.a: "Wahrlich eine erfolgreiche Bergungsmission."

scavenge_mission_failure.1.t: "Erfolgloser Einsatz"
scavenge_mission_failure.1.d: "Unsere Bergungstrupps kehren mit leeren Händen von ihrer Expedition zurück. Ob schlechtes Wetter oder feindliche Bedrohungen den Einsatz scheitern ließen – immerhin sind unsere Stalker lebend und unversehrt zurückgekehrt."
scavenge_mission_failure.1.a: "Zumindest sind sie heil zurückgekehrt."

scavenge_mission_colossal_failure.1.t: "Verschwinden eines Stalker-Teams"
scavenge_mission_colossal_failure.1.d: "Schwere Nachrichten erreichen uns. Es ist bereits Wochen her, seit unser Stalker-Team die Oberfläche betreten hat, doch von ihrer Rückkehr fehlt jede Spur. Kurzfristig zusammengestellte Suchtrupps aus freiwilligen Stationsbewohnern konnten keine entscheidenden Hinweise finden. Da die Lage immer ernster wird, fordern unsere Verantwortlichen die Ausrüstung eines vollwertigen Rettungstrupps, der an die Oberfläche entsandt werden soll, um unsere Vermissten zu suchen.\n\nMöglicherweise ist es bereits zu spät, sie lebend und unversehrt zu finden. Doch selbst wenn wir nur ihre sterblichen Überreste entdecken sollten – so sehr wir hoffen, dass unsere Stalker ein anderes Schicksal erlitten haben –, würde dies unseren Stationen zumindest Gewissheit verschaffen."
scavenge_mission_colossal_failure.1.a: "Bringt unsere Leute nach Hause."

 scavenge_mission_colossal_failure.2.t: "Rettungsoperation für Bergungstrupp"
scavenge_mission_colossal_failure.2.d: "Durch Glück oder die Gnade Gottes ist es unserem hastig zusammengestellten Rettungsteam gelungen, unser vermisstes Stalker-Team zu finden. Ihren Berichten zufolge geriet der Trupp in einen Hinterhalt von Mutanten und hatte während des überstürzten Rückzugs keine andere Wahl, als sich in einem verlassenen Keller zu verschanzen. Mit schwindenden Vorräten und Filterbeständen, die sie untereinander aufteilen mussten, schien ihre Lage aussichtslos – bis unser Suchtrupp auf sie stieß."
scavenge_mission_colossal_failure.2.a: "Gut gemacht, Männer."

scavenge_mission_colossal_failure.3.t: "Von der Ödnis verschlungen"
scavenge_mission_colossal_failure.3.d: "Unsere Rettungsoperation wurde umgehend an die Oberfläche entsandt und überprüfte mehrfach sämtliche bekannten Pfade durch Asche und Ruß. Selbst die streng gehüteten Wegpunkte unserer eigenen Stalker lieferten keinerlei brauchbare Hinweise. Trotz unserer tapferen Bemühungen bleibt das Schicksal unserer Vermissten ungeklärt.\n\nDa unser Rettungstrupp erschöpft ist und die Hoffnung auf das Überleben ihrer Kameraden zunehmend schwindet, wäre es wohl ratsam, die Suche einzustellen."
scavenge_mission_colossal_failure.3.a: "Wieder eine Gruppe mutiger Seelen, verloren an die Umarmung des Todes."

scavenge_mission_horror.1.t: "Mutantenhinterhalt!"
scavenge_mission_horror.1.d: "Unsere Stalker wurden angegriffen! Widerwärtige Kreaturen der Oberfläche fielen über unsere Männer her. Trotz ihres unerschütterlichen Mutes wurde schnell klar, dass Feuerkraft allein nicht ausreichen würde, also..."
scavenge_mission_horror.1.a: "Da sie wussten, dass der Kampf aussichtslos war, traten sie den Rückzug an."
scavenge_mission_horror.1.a.tt: "Unsere Stalker überleben, verlieren jedoch jede Möglichkeit auf Beute."
scavenge_mission_horror.1.b: "Sie leisteten einen heldenhaften letzten Widerstand."
scavenge_mission_horror.1.b.tt: "Mutanten treffen auf Schießpulver; unsere Stalker kämpfen weiter und riskieren dabei ihr Leben."
#scavenge_mission_horror.1.c: "FRESST FEUER, IHR HÄSSLICHEN MISTVIECHER!"

