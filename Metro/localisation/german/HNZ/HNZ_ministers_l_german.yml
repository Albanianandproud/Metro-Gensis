  HNZ_taubman:0 "Kommandant des OVMSB"

  HNZ_taubman_desc:0 "Kommandeur des als OVMSB bekannten Stoßbataillons, Oberstleutnant Jakow Borisowitsch. Für seine Rolle ist er mit besonderen Privilegien ausgestattet."

  HNZ_rauschenbach: "Simon Rauschenbach"
  HNZ_rauschenbach_trait: "Außenminister"
  HNZ_kornievsky: "Mikhail Kornievsky"
  HNZ_kornievsky_trait: "Wirtschaftsminister"
  
  HNZ_logistic_minister_3:0 "Kuzma Lavrentyev"
 HNZ_logistic_minister_3_trait: "Ehemaliger Reichs-Soldat"
  HNZ_logistic_minister_3_desc:0 "Ein ehemaliger Truppenkommandeur im Reich, der beim Führer aufgrund des Beitritts von Außenstehenden in Ungnade fiel. Als der Führer Ende 2027 die Macht übernahm, floh er auf Hansegebiet. Er beweist regelmäßig, dass er ein großartiger Kämpfer ist."
  
  HNZ_logistic_minister_2:0 "Emil Ryasin"
HNZ_logistic_minister_2_trait: "Organisationsgenie"
  HNZ_logistic_minister_2_desc:0 "Kann seine Soldaten auch in den dichtesten und kältesten Monaten des Jahres planen und organisieren. Wenn selbst die Metro zufriert und die Angst vor Erfrierungen grassiert."
 
  HNZ_logistic_minister_1:0 "Artashes Lyubilkin"
  HNZ_logistic_minister_1_desc:0 "Unorthodox in der Art und Weise, wie er kämpft. Der Einsatz unkonventioneller Taktiken und Strategien verhindert, dass der Feind gegensteuert."
  
  HNZ_planning_minister_1:0 "Yakov Yushina"
  HNZ_planning_minister_1_desc:0 "Ein akribischer Planer, der in der Lage ist, innerhalb weniger Augenblicke detaillierte Schlachtpläne auszuarbeiten. Ein schneller Denker und unter Berücksichtigung des logistischen Albtraums in den Tiefen der Metro."
  
  HNZ_planning_minister_2:0 "Sokolov" 
  HNZ_planning_minister_2_desc:0 "Während sich die dunklen Winkel der Metro in einem ständigen Zustand der Finsternis befinden kann er wie ein Fuchs oder eine Eule die Leere durchdringen und in der Dunkelheit lauernde Feinde entdecken."
  
  HNZ_planning_minister_3:0 "Borys Borysenko"
  HNZ_planning_minister_3_desc:0 "Versiert darin, die hektische und schmuddelige Dunkelheit der Metro selbst zu durchqueren. Es ist fast so, als hätte er einen sechsten Sinn. Er kann Geheimgänge und Versorgungstunnel relativ leicht entdecken."

