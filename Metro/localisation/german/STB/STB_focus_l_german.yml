l_german:
 STB_focus_1: "Der lange Marsch"
STB_focus_1_desc: "Aus den Herrschaftsgebieten des Reichs verbannt, fand Stortbekers bunt zusammengewürfelte Truppe vorübergehend Zuflucht in der Station [STB.GetName]. Nach Tagen des Marsches durch Versorgungsgänge und Wartungsschächte zwang schließlich die völlige Erschöpfung sie dazu, Halt zu machen."

STB_focus_2: "Munitionssparmaßnahmen"
STB_focus_2_desc: "Die wenigen Waffen und Ausrüstungsgegenstände, die unsere Leute bei ihrer Verbannung aus dem Reich mitnehmen konnten, wurden größtenteils bereits auf dem Weg hierher verbraucht. Es gibt kaum genug Munition für alle, geschweige denn genügend Waffen für jeden Mann.\nEin drastischer Schritt ist notwendig. Die verbliebene Munition wird vorerst streng rationiert, bis sich unsere Lage verbessert."

STB_focus_2a: "In Form gebracht"
STB_focus_2a_desc: "Die Verwandlung eines Haufens Schläger in eine organisierte Streitmacht wird wohl deutlich länger dauern als ursprünglich erwartet. Da Ausrüstung und Vorräte knapp sind, ist zusätzliche Ausbildung erforderlich – nicht nur für unsere Soldaten, sondern auch für unsere Kommandeure."

STB_focus_3: "Provisorische Bauarbeiten"
STB_focus_3_desc: "[STB.Capital.GetName] befindet sich in einem erbärmlichen Zustand. Mit etwas ordentlicher Instandsetzung könnte die Station zumindest erträglich werden – weit entfernt von komfortabel, aber fürs Erste ausreichend."

STB_focus_4: "Keinen Stein ungewendet lassen"
STB_focus_4_desc: "Wir brauchen Patronen. Nicht nur, um die Mutanten abzuwehren, die aus der Dunkelheit kriechen, sondern auch, um unsere eigenen Soldaten zu bezahlen. Die Menschen werden unruhig, und wenn sich die Lage nicht bessert, werden viele ihren eigenen Weg gehen. Plünderungen und Bergungsexpeditionen sind vorerst unsere beste Hoffnung."

STB_focus_5: "Zuflucht der Verdammten"
STB_focus_5_desc: "Kriminelle, Schmuggler und Flüchtige bevölkern die düsteren Hallen von [STB.Capital.GetName]. Wenn die Welt uns dafür verurteilt und uns genau so nennt – dann soll es eben so sein."

STB_focus_3A: "Medizinische Notversorgung"
STB_focus_3A_desc: "Ein gewaltiger Unterschied zu den sauberen und sterilen Krankenstationen des Reichs. Solange die Blutungen gestoppt werden können und das Infektionsrisiko gering bleibt, dürfen Bettler keine Ansprüche stellen."

STB_focus_4A: "Wanderer"
STB_focus_4A_desc: "Der Weg nach [STB.Capital.GetName] führte uns größtenteils über die Oberfläche Moskaus. Unsere Erfahrung beim Durchqueren der Ruinen und verlassenen Straßen wird uns noch von großem Nutzen sein."

STB_focus_5A: "Versprechen auf Beute"
STB_focus_5A_desc: "Frei von Einschränkungen, Moralvorstellungen und Rücksichtnahme können unsere Truppen mit ihrer Beute verfahren, wie es ihnen beliebt."

STB_focus_5B: "Nachladewerkbänke"
STB_focus_5B_desc: "Verschwendung können wir uns nicht länger leisten. Leere Hülsen werden sorgfältig eingesammelt und erneut befüllt."

STB_focus_6: "Expeditionstrupps"
STB_focus_6_desc: "In ihren zerlumpten Rüstungen und mit Waffen aus Beständen des Reichs durchstreifen diese Kämpfer die umliegenden Tunnel auf der Suche nach ihrem nächsten Opfer."

STB_focus_7A: "Waffenkammern plündern"
STB_focus_7A_desc: "Jeder erfolgreiche Überfall bringt neue Ausrüstung und Werkzeuge in unsere Lagerbestände."

STB_focus_7B: "Verteidigung des Revieres"
STB_focus_7B_desc: "Wenn du etwas aufbaust, werden sie kommen."

STB_focus_8C: "Stortbeker wiedergeboren"
STB_focus_8C_desc: "Die Legende von Klaus Störtebeker kehrt zurück! Der sagenumwobene Piratenkönig der Ostsee und Schutzpatron aller Plünderer."

STB_focus_8B: "Krieg ohne Ende"
STB_focus_8B_desc: "Das nukleare Höllenfeuer bedeutete das Ende des Friedens und den Anfang vom Ende. Sieg kann allein Frieden bringen – eine verdrehte Karikatur dessen, was Frieden einst bedeutete."
 STB_focus_8A: "Der Kreislauf der Brutalität"
STB_focus_8A_desc: "Seit unvordenklichen Zeiten gilt dieselbe Wahrheit: Harte Zeiten schaffen Stärke. Und aus Stärke erwächst Wohlstand."

STB_focus_9A: "In [SEV.GetName] einbrechen"
STB_focus_9A_desc: "Die hermetischen Tore wurden dauerhaft geöffnet, um Stromkabel in den südlichen Abschnitt der Ringlinie zu verlegen. Doch die Streitkräfte von Sewastopolskaja werden sich künftig vor mehr als nur Mutanten in Acht nehmen müssen."

STB_focus_9B: "Die [AVT.GetName] angreifen"
STB_focus_9B_desc: "Die Partisanen von [AVT.Capital.GetName] sind den [STB.GetName] seit Langem ein Dorn im Auge. Nach den jüngsten Zusammenstößen zwischen unseren Trupps und ihrem daraus entstandenen Durst nach Vergeltung ist nun der richtige Zeitpunkt gekommen, sie ein für alle Mal zu beseitigen."

STB_focus_9A: "Nach [SEV.GetName] vorstoßen"
STB_focus_9A_desc: "[SEV.GetName] bleibt dank seiner intakten Wasserkraftturbinen eine lebenswichtige Schlagader des südlichen Metro-Netzes. Für unsere zusammengewürfelten Truppen wäre ein Angriff früher Selbstmord gewesen, doch nun verfügen wir über die nötige Stärke und Manneskraft. Sewastopol scheint ein ideales Ziel für unsere Expansion zu sein."

STB_focus_10C: "Säuberungsoperationen"
STB_focus_10C_desc: "Eine weitere Station wird unserem wachsenden Territorium hinzugefügt."

STB_focus_10B: "Die neue Uniform des Soldaten"
STB_focus_10B_desc: "Nun, da [SEV.GetName] unter unserer Kontrolle steht, fallen uns ihre Arsenale und Waffenkammern zu. Sie werden sich als äußerst nützlich erweisen, um unsere Soldaten auszurüsten."

STB_focus_10A: "Depotanlagen"
STB_focus_10A_desc: "Mit ausreichend Platz und geeigneten Einrichtungen können wir nun damit beginnen, Draisinen für unsere Streitkräfte fachgerecht zu reparieren und instand zu setzen."

STB_focus_10A: "Stetige Patroullien"
STB_focus_10A_desc: "Land erobern ist einfach. Es zu halten, ist eine ganz andere Sache."

STB_focus_11: "Unheilvolle Manufakturen"
STB_focus_11_desc: "Kleine Werkbänke und Nachladepressen werden zu unseren Waffenschmieden."

STB_focus_12A: "Die Waffenkammern öffnen"
STB_focus_12A_desc: "Versteckte Bunker und versiegelte Depots bergen noch immer die Waffen der alten Welt. Sie zu öffnen mag gefährlich sein, doch es wird unsere Banden bewaffnen."

STB_focus_12B: "Bergung im Feld"
STB_focus_12B_desc: "Die Leichen der Verstorbenen, verlassene Kontrollpunkte und vergessene Behausungen bergen Berge von Beute, die nur darauf warten, eingesammelt zu werden."

STB_focus_12C: "Schrottplatz-Schmieden"
STB_focus_12C_desc: "Improvisierte Werkstätten werden Rüstungen, Uniformen und Ausrüstung für unsere wachsende Brigade herstellen."

STB_focus_13A: "Tod statt Akzeptanz"
STB_focus_13A_desc: "Ein Mutant bleibt ein Mutant."

STB_focus_13B: "Ausnahmen für Mutanten"
STB_focus_13B_desc: "Wir können es uns nicht leisten, Arbeitskräfte oder Munition zu verschwenden. Jeder Verdorbene oder Verkommene, der bereit ist, sich unseren Reihen anzuschließen, ist willkommen."

STB_focus_14: "[PVL.GetName] annektieren"
STB_focus_14_desc: "Die Wachen von [PVL.GetName] werden sich künftig vor mehr als nur den allgegenwärtigen Mutanten in Acht nehmen müssen. Trotz ihres beschädigten hermetischen Tores ist [PVL.GetName] ein ideales Ziel für unsere Expansion."

STB_focus_15: "Brutales Kernland"
STB_focus_15_desc: "Wie ein wuchernder Tumor breitet sich unser Einfluss immer weiter aus."

STB_internal_focus_1A: "Das Recht des Stärkeren"
STB_internal_focus_1A_desc: "Keine Gerichte, keine Ethik. In einer Welt, die sich selbst verloren hat, entscheidet allein die Stärke darüber, wer im Recht ist."

STB_internal_focus_1B: "Das Wolfsrudel"
STB_internal_focus_1B_desc: "Unter Dieben gibt es keine Ehre. Was uns zusammenhält, ist die Aussicht auf Beute, Reichtum und Nervenkitzel. Daraus entsteht Zusammenhalt – wenn auch ein brüchiger."

STB_internal_focus_2A: "Disziplin durch Terror"
STB_internal_focus_2A_desc: "Für Banditen ist Meuterei kein Schimpfwort. In gewisser Weise gehört sie sogar zum Alltag. Die Lösung? Exempel statuieren."

STB_internal_focus_2A_tt: "Wir erhalten etwa 180 Tage nach Abschluss dieses Nationalen Schwerpunkts zusätzliches Rekrutenpotenzial."

STB_internal_focus_2B_tt: "Wir erhalten etwa 180 Tage nach Abschluss dieses Nationalen Schwerpunkts zusätzliche Waffen."

STB_internal_focus_2C_tt: "Wir erhalten etwa 180 Tage nach Abschluss dieses Nationalen Schwerpunkts zusätzliche Unterstützungsausrüstung."

STB_internal_focus_2D_tt: "Wir erhalten etwa 180 Tage nach Abschluss dieses Nationalen Schwerpunkts zusätzliche Feuerteam-Waffen."

STB_internal_focus_2B: "Ökonomie der Angst"
STB_internal_focus_2B_desc: "Alles hat seinen Preis. Ganz gleich, wie hoch er sein mag."

STB_internal_focus_2C: "Die Schwarzmärkte"
STB_internal_focus_2C_desc: "Ideologie bedeutet wenig. Ganz gleich, welche Flaggen die Händlerkonvois führen – sie sind reif zum Ausplündern."

STB_internal_focus_2D: "Die Kreissäge"
STB_internal_focus_2D_desc: "Der Tod mag derselbe geblieben sein, doch die Angst hat eine völlig neue Bedeutung angenommen."
 STB_internal_focus_3: "Der Höllenschlund von [STB.Capital.GetName]"
STB_internal_focus_3_desc: "Beute gibt es im Überfluss. Wir nehmen, was wir brauchen, und verschonen niemanden. Der Krieg wird unsere Ziele finanzieren."

STB_internal_focus_3A: "Bleigefütterte Jacken"
STB_internal_focus_3A_desc: "Strahlung ist ein unsichtbarer Feind. Mit Blei gefütterte Jacken bieten zumindest etwas Schutz vor den vergifteten Winden."

STB_internal_focus_3B: "Geborgene Automatikwaffen"
STB_internal_focus_3B_desc: "Alte, verrostete Maschinengewehre mögen längst aufgegeben scheinen, doch mit der richtigen Pflege können sie noch immer ihr tödliches Lied singen."

STB_internal_focus_4: "Bruderschaft der Verdammten"
STB_internal_focus_4_desc: "Einst Verbrecher, heute Überlebende – frei von Moral und ohne jede Zurückhaltung."

STB_internal_focus_5: "Geborgene Schrottplattenrüstung"
STB_internal_focus_5_desc: "Alte Metallplatten lassen sich zu primitiven Rüstungen umformen. Schwer, hässlich, aber dennoch wirksam."

STB_internal_focus_6A: "Neu ausgeschmiedete Läufe"
STB_internal_focus_6A_desc: "Jahrzehnte der Vernachlässigung haben die meisten Waffen korrodieren und spröde werden lassen. Selbst die Erzeugnisse der Büchsenmacher von Tverskaja beginnen zu versagen. Wir müssen lernen, ihnen neues Leben einzuhauchen."

STB_internal_focus_6B: "Zerlegen und Neuaufbauen"
STB_internal_focus_6B_desc: "Drei kaputte Gewehre lassen sich oft zu einer funktionierenden Waffe zusammensetzen. Nicht elegant, aber effektiv."

STB_internal_focus_6C: "Hisst die Schwarze Flagge!"
STB_internal_focus_6C_desc: "Schon bald werden das Rattern von Rädern und das Dröhnen von Motoren mehr Furcht auslösen als das Heulen hungriger Mutanten."

STB_internal_focus_6D: "Gewehre aus den Ruinen"
STB_internal_focus_6D_desc: "Hinter eingestürzten Barrikaden und verlassenen Wachposten liegen die Waffen gefallener Garnisonen. Verrostet, beschädigt und vergessen – aber noch lange nicht verloren."

STB_internal_focus_7: "Grausige Trophäen"
STB_internal_focus_7_desc: "Rüstungen gefallener Feinde werden mit Stolz getragen – sichtbare Beweise unserer Stärke in einer feindseligen Welt."

STB_internal_focus_8: "Volkolak-Brigade"
STB_internal_focus_8_desc: "Eine neuer Schrecken breitet sich in der Dunkelheit aus."

STB_internal_focus_9: "Disziplin durch den Strick"
STB_internal_focus_9_desc: "Meuterei bringt in einer sterbenden Welt nur den Tod."

STB_internal_focus_11: "Plünderer der Toten Welt"
STB_internal_focus_11_desc: "Die alte Welt existiert noch immer unter Asche und Trümmern. Ihre Skelette bergen Maschinen, Treibstoff und Technologien, die nur darauf warten, geborgen zu werden."

STB_internal_focus_9A: "Zerlegen und Neuaufbauen"
STB_internal_focus_9A_desc: "Waffenöl, Federn und improvisierte Bolzen halten unsere Waffen gerade noch funktionsfähig. Manchmal genügt das."

STB_internal_focus_9B: "Überlegene Feuerkraft"
STB_internal_focus_9B_desc: "Gegen schlecht bewaffnete Überlebende kann ein einziges Maschinengewehr in den engen Tunneln der Metro ganze Abschnitte beherrschen."

STB_internal_focus_10A: "Methoden aus Prägestahl"
STB_internal_focus_10A_desc: "Komplexe Fertigungsverfahren können wir uns nicht leisten. Gepresste Stahlteile erlauben uns eine wesentlich schnellere Waffenproduktion."

STB_internal_focus_10B: "Vereinfachte Mechanismen"
STB_internal_focus_10B_desc: "Je weniger bewegliche Teile eine Waffe besitzt, desto geringer ist die Wahrscheinlichkeit eines Defekts. Außerdem wird sie einfacher herzustellen und zu reparieren."

STB_political_focus_path_1: "Die Rattenlinien"
STB_political_focus_path_1_desc: ""

STB_political_focus_path_2: "Fragwürdige Ethik"
STB_political_focus_path_2_desc: "Befreit von allen ethischen Einschränkungen kann Dr. Todorov seine Forschungen nun ohne Gewissensbisse fortsetzen. Er ist bereit, uns zu unterstützen. Das Einzige, worum er bittet, sind „freiwillige“ Testpersonen..."

STB_political_focus_path_3: "Adrenalin-Stimulanzien"
STB_political_focus_path_3_desc: ""

STB_political_focus_path_4: "Leistungssteigerer D-X"
STB_political_focus_path_4_desc: ""

STB_political_focus_path_5: "Die Sterilität der Wissenschaft"
STB_political_focus_path_5_desc: ""

STB_political_focus_path_6: "Schmerzunterdrücker"
STB_political_focus_path_6_desc: ""

STB_political_focus_path_7: "Amphetamin-Autoinjektoren"
STB_political_focus_path_7_desc: ""

STB_political_focus_path_8: "Projekt Übermensch"
STB_political_focus_path_8_desc: "Der perfekte Soldat, der Novo Sapien, ist nur noch einen Schritt entfernt ... Wir benötigen lediglich weitere Forschung."

STB_political_focus_path_9: "Projekt Supersoldaten"
STB_political_focus_path_9_desc: ""

STB_political_focus_path_10: "Projekt Klonung"
STB_political_focus_path_10_desc: ""