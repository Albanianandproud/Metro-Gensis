 nf_SPT.23.t:0 "Die Suche nach D6"
 nf_SPT.23.d:0 "In den dämmrig beleuchteten Tiefen des Ranger-Hauptquartiers liegt eine greifbare Spannung in der Luft, als eine waghalsige neue Mission verkündet wird: die Suche nach dem legendären Bunker D6. Die labyrinthartigen Tunnel der Metro – ohnehin schon voller Gefahren – versprechen nun noch größere Herausforderungen, während sich die Ranger darauf vorbereiten, die Geheimnisse jener längst verschollenen Militäreinrichtung zu lüften, der man nachsagt, sie berge unvorstellbare Macht und Ressourcen.

In den Reihen der Kämpfer huschen Gerüchte voller Hoffnung und Spekulationen durch die Menge. Die einen sprechen von den Gefahren, die vor ihnen liegen, während andere von den Möglichkeiten träumen, die D6 eröffnen könnte. Eines jedoch ist gewiss: „D6 wird uns gehören!“"
 nf_SPT.23.a:0 "Dieser Bunker gehört so gut wie uns!"

