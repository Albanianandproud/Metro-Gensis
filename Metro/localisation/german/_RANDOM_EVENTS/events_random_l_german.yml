l_german:
 random_event_vagrants.01.t: "Herumtreiber in den Tunneln"
 random_event_vagrants.01.d: "Wir hören Geräusche aus den Tunneln direkt an der Grenze, doch immerhin sind sie menschlicher Natur, Stimmen und Getuschel. Unsere Wachtruppen nahmen Kontakt auf und fanden ein Lager aus Herumtreibern und Heimatlosen. Auch wenn sie eine fremde Sprache sprechen so erscheinen sie uns doch freundlich und durch rudimentäre Verständigung konnten wir in Erfahrung bringen, dass sie aus der südlichen Metro stammen. Des Wanderns müde suchen sie nun nach einer neuen Heimat."
 random_event_vagrants.01.a: "Nehmt sie auf."
 random_event_vagrants.01.b: "Schickst sie weg."
 random_event_vagrants.01.c: "Mir kommt eine Idee, Zielübung!"

 random_event_vagrants.a_tt: "Auch wenn sie Fremde sind, so scheinen sie doch gutherzige Menschen zu sein. Öffnen wir unseren neuen Freunden die Tore!"
 random_event_vagrants.b_tt: "Unsere Bürger kommen zuerst und unsere Ressourcen sind knapp. Schickt sie fort."

 random_event_glitters.01.t: "Ein Schimmern in der Finsterniss"
 random_event_glitters.01.d: "Einer unserer Wachen sieht ein Schimmern in der Dunkelheit aufflackern, im Inneren eines alten verlassenen Wartungstunnels. Da der Tunnel verbarrikadiert ist, konnte er dem nicht auf eigene Faust nachgehen, nun verlangt er jedoch, dass die Sache in für alle Mal geklärt wird."
 random_event_glitters.01.a: "Entfernt die Barrikade."
 random_event_glitters.01.b: "Besser nicht."

 random_event_glitters.02.t: "Mutant im Tunnel"
 random_event_glitters.02.d: "Kaum entfernten wir die Absperrung, so wurden wir sofort von einem großen Mutanten überfallen und nur mit größten Mühen konnten wir ihn letztendlich töten. Es sieht so aus als hätte es einen guten Grund gegeben, weshalb dieser Tunnel einst versiegelt worden war."
 random_event_glitters.02.a: "Verdammt!"

 random_event_glitters.03.t: "Nichts von wert"
 random_event_glitters.03.d: "Die hölzernen Barrikaden wurden entfernt und wir durchsuchten den Tunnel dahinter gründlich, doch wir fanden nichts, nur absolute Finsternis. Nachdem wir den Tunnel wieder versperrten wurde das Licht nie wieder gesehen und der Vorfall wurde schnell wieder vergessen."
 random_event_glitters.03.a: "Immerhin"

 random_event_glitters.04.t: "Ein Schatz in der Dunkelheit"
 random_event_glitters.04.d: "Die hölzernen Barrikaden wurden entfernt und nach längerem Suchen fanden wir..."
 random_event_glitters.04.a: "Ein Lager seltener Metalle."
 random_event_glitters.04.b: "Ein verstecktes Waffenlager."
 random_event_glitters.04.c: "Eine Sammlung von Wertgegenstände."

 random_event_station_babbler.01.t: "Der Schwätzer"
 random_event_station_babbler.01.d: "Ein seltsamer Mann verbreitet nun schon seit geraumer Zeit sein unsinniges Geschwätz auf unserer Station. In seiner Freizeit stellt er sich einfach auf den zentralen Platz und legt los: Von seinen Plänen zur Vereinigung Eurasiens bis hin zu seiner Vorstellung eines Königreiches Arghata im Zentrum der Erde, natürlich mit geheimer Verbindung zur Metro, sind allesamt unsinniger Natur. Dass er den Kindern erzählt, die Metro sei bereits im 4. Jahrhundert von unsichtbaren Gnomen errichtet worden, die hier nur ihren Vodka verstecken wollten, ist hierbei nur der neueste Skandal. Die Station ist gespalten, manche finden den mann unterhaltsam, andere machen sich Sorgen über den Einfluss, welchen seine Geschichten auf die Station haben könnten."
 random_event_station_babbler.01.a: "Werft ihn heraus."
 random_event_station_babbler.01.b: "Lasst ihn bleiben."

 random_event_station_babbler.a_tt: "§gAuch wenn er harmlos wirkt, so verängstigt oder verwirrt er unsere Jugend mit seinen absurden Lügengeschichten. Werdet ihn endlich los.§!"
 random_event_station_babbler.b_tt: "§gEr ist ein harmloser alter Mann und seine Gesichten sorgen für Unterhaltung in unserem monotonen Alltag. Lasst ihn bleiben, auch wenn er vielleicht etwas zu viel über die §! §OMetro-Gnome§! §g weiß...§!"

 random_event_scientist.01.t: "Forschung, die zu weit geht?"
 random_event_scientist.01.d: "Einer unserer Wissenschaftler hat einen etwas ... unorthodoxen Vorschlag um unsere Forschung voran zu bringen. Auch wenn er beteuert dies nur zum Wohle unserer Nation zu tun, so könnten unsere Bürger anderer meinung sein..."
 random_event_scientist.01.a: "Dies wird unsere Forschung enorm voran bringen."
 random_event_scientist.01.b: "Diese Grenze werden wir nicht überschreiten."

 random_event_printers.01.t: "Druckerei streut Gerüchte"
 random_event_printers.01.d: "Unsere Stations-Druckerei veröffentlichte vor kurzem einige Artikel, die offen unser Regime kritisieren. Viele unserer Bürger haben sie gelesen, was sollen wir nun tun?"
 random_event_printers.01.a: "Schlachtet den Drucker für seine Teile aus."
 random_event_printers.01.b: "Verbietete ihnen für eine Weile das Drucken."
 random_event_printers.01.c: "Wir sollten uns nicht einmischen."

 ## Education events##

 random_event_civics.01.t: "Ein Kind wurde ernsthaft bei der Arbeit verletzt"
 random_event_civics.01.d: "Während seiner Arbeit wurde ein Kind offenbar abgelenkt und hat sich daraufhin schwer verletzt. Erneut ist damit die Diskussion aufgeflammt, ob die Kinderarbeit nicht doch abgeschafft werden sollte. Unterwerfen wir uns den Forderungen des Pöbels?"
 random_event_civics.01.a: "Vielleicht sollten wir unsere Politik überdenken?"
 random_event_civics.01.b: "Wir brauchen die Arbeitskräfte, also nein."

 random_event_civics.02.t: "Eine verzweifelte Mutter"
 random_event_civics.02.d: "Eine Mutter weigert sich ihr Kind zur Arbeit zu schicken. Sollten wir sie nun dazu zwingen, so wird dies zweifelsohne Aufsehen in der ganzen Station mit sich führen. Sollten wir vielleicht eine Ausnahme machen?"
 random_event_civics.02.a: "Vielleicht sollten wir unsere Politik überdenken?"
 random_event_civics.02.b: "Unter diesen Umständen machen wir mal eine Ausnahme."
 random_event_civics.02.c: "Wir machen keine Ausnahmen."

 random_event_civics.03.t: "Ein Dankesbrief"
 random_event_civics.03.d: "Von all den Briefen die unsere Verwaltung erhält, stand einer sofort heraus, ein Brief der Mutter von [ROOT.GetName]. In ihrem Brief schildert die Frau, wie sie in ihrer Jugend nie Bildung erhalten habe und wie sie auch diesen Brief habe von jemand anderen schreiben lassen musste. Dann dankt sie uns für unsere Bemühungen, ihrem Kind Zugang zur Bildung verschaffen."
 random_event_civics.03.a: "Gern geschehen."

 random_event_civics.04.t: "Kind bei Arbeitsunfall getötet"
 random_event_civics.04.d: "Es gab einen furchtbaren Unfall! Ein Kind wurde bei der Arbeit schwer verletzt und verstarb nur wenig später im Lazaret. Wenig überraschend ist damit die Debatte rund um Kinderarbeit in unserer Station wieder aufs neue entflammt und nun haben wir sogar handfeste Unruhen. Einige Unbekannte schrieben sogar "Kindermörder" an eine Wand in der Nähe des betreffenden Arbeitsplatzes. Was sollen wir nun tun?"
 random_event_civics.04.a: "Wir sollten unsere Politik sofort ändern."
 random_event_civics.04.b: "Entfernt das Geschmiere und dann zurück an die Arbeit."

  ### War ###

  random_event_war.1.t: "Gerüchte der Kriegsdienstverweigerung!"
  random_event_war.1.d: "Ein neuer Skandal macht auf unserer Station die Runde, es heißt dass einige Mitglieder unserer Administration ihre Macht ausnutzen, um ihre eigenen Nächsten nicht zum Wehrdienst einziehen zu lassen. Diese Gerüchte verbreiten sich nun in windeseile und wir müssen reagieren, um unser Ansehen wiederherzustellen."
  random_event_war.1.a: "Schändlich, schickt sie sofort an die Front."
  random_event_war.1.b: "Verteidigt unsere Verwaltung."
  random_event_war.1.c: "Der Feind steht vor unserer Türschwelle, wir haben gerade Besseres zu tun!"

  random_event_war.2.t: "Die Rationierung wird hinterfragt"
  random_event_war.2.d: "Die Frage beschäftigt inzwischen jeden einzelnen unserer Bewohner, die endlose Rationierung von nahrung und anderen Grundbedürfnissen in unserer Station. Unsere Bevölkerung ist inzwischen an schwere Zeiten gewöhnt, doch nun scheint eine Grenze erreicht zu sein. Entscheiden müssen wir nun ob wir die Rationen lockern wollen, auch wenn uns das den Krieg kosten könnte."
  random_event_war.2.a: "Die Rationen sind ein Opfer, das wir alle erbringen müssen."
  random_event_war.2.b: "Der Krieg läuft gut genug um die Rationen für eine Weile auszusetzen."

  random_event_war.3.t: "Ablehnung der Rationierung"
  random_event_war.3.d: "Mit der umfangreichen Rationierung lebensnotwendiger Güter haben wir den Unmut unserer Bevölkerung auf uns gezogen. Berichte über einen Schwarzmarkt kursieren und sie Sinnhaftigkeit all dieser Entbehrungen wird inzwischen offen hinterfragt, vielleicht wird es Zeit zu handeln."
  random_event_war.3.a: "Hört auf euch zu beklagen, dies geschieht zu eurem eigenen Wohl."
  random_event_war.3.b: "Vielleicht lockern wir die Rationen ein wenig."

  random_event_war.4.t: "Besorgnisserregende Berichte von der Front"
  random_event_war.4.d: "Die jüngsten Berichte von der Front sind in der Tat beunruhigend. Während der Krieg weiter wütet und kein klares Ende in Sicht ist, stehen unsere belagerten Soldaten jeden Tag vor schwierigeren Einsätzen und die Verluste nehmen zu. Die Schlachtfront kann nur als Blutbad beschrieben werden. Schrapnelle und Kugeln ersticken und bedecken die U-Bahn-Gleise und Leichen, die viel zu verwest und verrottet sind, um identifiziert zu werden und dann eitern und von Ratten gefressen werden. Ist dies die Hölle auf Erden?"
  random_event_war.4.a: "Wenn unsere Bürger diese Berichte sehen, werden sie ein Ende des Krieges fordern!"
  random_event_war.4.b: "Lasst die Bevölkerung im Unklaren!"

  random_event_war.5.t: "Berichte von der Front"
  random_event_war.5.d: "Neue Meldungen von der Front erreichen uns: Während der krieg weiter tobt und sein Ende noch in weiter Entfernung liegt, demonstrieren unsere Soldaten geradezu vorbildlichen Mut und Einsatzbereitschaft. Würden sich diese Berichte in unserer ZivilBevölkerung verbreiten, so könnte vielleicht auch diese zu neuen Höchstleistungen motiviert werden."
  random_event_war.5.a: "Genau das haben wir jetzt gebraucht."
  random_event_war.5.b: "Das können wir doch auch sicherlich anders verwerten."

  ## detained

  random_event_detained.1.t: "Diplomatischer Vorfall"
  random_event_detained.1.d: "Es gab einen "Vorfall" rund um den Botschafter einer anderen Nation an unserer Station. Offenbar hat er es als Teil seiner diplomatischen Mission gesehen sich an unserer Bar zu betrinken und eine Schlägerei anzufangen. Da er unter diplomatischem Schutz steht können wir ihn nicht einfach bestrafen, doch wenn wir Nichts tun, wird das bei unserer Bevölkerung auf Unmut stoßen."
  random_event_detained.1.a: "Wir können hier nichts tun."
  random_event_detained.1.b: "Werft den Botschafter heraus und fordert einen neuen an."
  random_event_detained.1.b_tt: "Die betreffende Nation wird über diesen Umgang nicht erfreut sein."

  ## Peace ##

  random_event_victory.1.t: "Der Lohn des Sieges"
  random_event_victory.1.d: "Der Krieg ist vorbei! Nun ist die Zeit gekommen mit der Heilung zu beginnen, die Stationen und Tunnel wiederaufzubauen und unsere Toten zu betrauern. Unsere ranghöchsten O haben nun vorgeschlagen, die Leistungen von [ROOT.GetLeader] zu würdigen, der uns so vorbildlich zum Sieg geführt hat. Diskutiert wird über eine Militärparade an der [ROOT.Capital.GetName], so wie in den alten Zeiten. Der Moral unserer Bevölkerung würde dies nach all den Verlusten sicherlich gut tun."
  random_event_victory.1.a: "Unsere Gesamten Streitmächte werden an dieser glorreichen Parade teilnehmen!"
  random_event_victory.1.b: "Ein kleiner Marsch wird genügen."
 
  ### Disappearance Event Line ###

 random_event_disappearance.01.t: "Verschwunden"
 random_event_disappearance.01.d: "Einer unserer Außenposten meldet das Verschwinden einer unserer Patrouillen, welche in der Nähe eines verlassenen Metrotunnels eigentlich hätte Wache halten sollen. Seit mehreren Tagen nun fehlt von ihnen jegliche Spur und die Zeit drängt, falls wir eine Untersuchung vornehmen wollen.\n\nVom Ausbilder der verschollenen Truppe wissen wir, dass sie zu Loyal sind um zu desertieren, also muss ihnen etwas zugestoßen sein. Der örtliche Kommandant bittet um die Erlaubniss, einen weiteren Suchtrupp in den verlassenen Tunnel zu entsenden, um die Männer zu finden."
 random_event_disappearance.01.a: "Schickt den Suchtrupp los, wir bergen diese Männer, tot oder lebendig!"
 random_event_disappearance.01.b: "Wir gehen auf Nummer sicher, keine Suche, verdreifacht die Wachen."

 random_event_disappearance.02.t: "Ausrüstung entdeckt"
 random_event_disappearance.02.d: "Das Untersuchungsteam hat eine unheilvolle Entdeckung gemacht: Nach mehreren Stunden fanden sie die Ausrüstung der verschollenen Patrouille versteckt in einem Spalt. Offenbar wurden sie hier in aller Eile verstaut und auch kein bisschen getarnt, weshalb unser Team sie auch mühelos finden konnte.\n\nWir können nicht mit Sicherheit sagen was hier geschehen ist, wieso unsere Männer zuerst ihren Posten und dann auch ihre Waffen aufgegeben haben. Alles was unser Untersuchungsteam anmerkte, war ein starker Geruch von Moschus und Schwefel in dem Tunnel."
 random_event_disappearance.02.a: "Verdammt, brecht die Suche ab"

 random_event_disappearance.03.t: "Verlorene Wache gefunden"
 random_event_disappearance.03.d: "Gute Nachrichten aus unseren Tunneln: Nach mehreren Stunden fand unser Untersuchungsteam die verschollene Patrouille, versteckt in einem Spalt des verlassenen Tunnels. Sie waren so verängstigt, dass sie kaum sprechen konnten, weshalb sie auf schnellstem Wege zurück in ihre Station gebracht wurden.\n\nUnsere Befragung der Patrouille brachte uns jedoch kaum weitere Erkenntnisse ein, so berichteten sie zwar etwas von großen schwarzen, menschlichen Wesen vor denen sie flohen, mehr konnten wir aus ihnen jedoch nicht herausbekommen.\n\nDiese Erklärung hinterlässt uns mehr Fragen als Antworten, wir wissen nicht wer diese Wesen waren oder was sie hier wollten. Und vermutlich werden wir dies auch nie erfahren, es sei denn sie sollten sich erneut zeigen..."
 random_event_disappearance.03.a: "Unheimlich, kehrt schleunigst zur Station zurück."

 ######################################################################
 ## BAD ##

 random_event_bad.1.t: "Ratten!"
 random_event_bad.1.d: "Dies sind keine gewöhnlichen Ratten, sie sind riesig, fast so groß wie ein Hund und mit Fell, so schwarz wie die Tunnels aus denen sie gekrochen kommen. Sie nagen sich durch alles was sie zu beißen kriegen, fressen unsere Vorräte, töten unsere Schweine... Noch besorgnisseregener ist jedoch, dass sie offenbar völlig unbeeindruckt sind von den versuchen der Zivilisten, sie zu vertreiben. Unbeeindruckt machen sie einfach weiter und selbst Kinder und Leichen sollen sie versucht haben zu fressen. Wir müssen dringend etwas unternehmen!"
 random_event_bad.1.a: "So ein Mist!"

 random_event_bad.2.t: "Banditenüberfall!"
 random_event_bad.2.d: "Eine unserer Karavanen wurde von Banditen überfallen, als sie Güter von einer Station zur anderen transportierte. Da sie keine Chance zu sehen schienen, flöhen die Händler uns ließen ihre Waren kampflos zurück. Unsere Soldaten werden keine Probleme damit haben diese Banditen zu finden, doch für eine Weile wird sich wohl kein Händler mehr auf diese Linie trauen."
 random_event_bad.2.a: "Verdammt!"

 random_event_bad.3.t: "Brache"
 random_event_bad.3.d: "Egal ob durch schlechte Pflege, überanspruchter Boden oder eine Seuche, unsere Ernteerträge sind dahin, die Felder liegen brach. Wenn wir nichts unternehmen, werden wir bald nicht mehr genug für unsere Bevölkerung haben."
 random_event_bad.3.a: "Verdammt."
 random_event_bad.3.b: "Nutzt unsere Streitkräfte, so viele Arbeiter stellen unsere Felder in nu wieder her."
 random_event_bad.3.c: "Nehmt etwas Geld und kauft Vorräte von unseren Nachbarn."
 random_event_bad.3.e: "Rationiert die übrigen Vorräte"

 random_event_bad.5.t: "Besetzte Station zeigt Ungehorsam"
 random_event_bad.5.d: "Ein kürzlich besetzter Bahnhof wurde von Partisanen bei Sabotageaktionen heimgesucht! Sie versuchen, unser Regime zu schwächen und die Spannungen in der Bevölkerung anzuheizen. In den letzten Tagen wurden ihre Aktionen ausschließlich mit dem Ziel vorangetrieben, eine aktive Rebellion anzuzetteln. Die Bevölkerung hat ihren Reden zugehört und sich zunehmend von ihrer abscheulichen Rhetorik inspirieren lassen. Aktuell herrscht noch kein offener Konflikt in der Station, doch die aktuelle Entwicklung wirft die Frage auf wann dies passieren wird und nicht ob."
 random_event_bad.5.a: "Unsere Geduld hat Grenzen."

 random_event_bad.6.t: "Sabotage in besetzter Station!"
 random_event_bad.6.d: "In einer unserer kürzlich besetzten Station kam es in letzter Zeit zu vermehrten Guerilla-Aktionen. Vor allem auf die Werkstätten scheinen sie es abgesehen zu haben, wo mehrfach Feuer gelegt wurde. nach einem neuerlichen Brand sind nun ernste Schäden entstanden, die eine Weile zur Reparatur benötigen werden."
 random_event_bad.6.a: "Nicht gut."

 random_event_bad.7.t: "Alarm! Alaarm!"
 random_event_bad.7.d: "Ein Feuer brach an einer unserer Stationen aus und konnte geradeso eingedämmt werden, bevor die ganze Station abbrannte. Die Schäden sind dennoch erheblich."
 random_event_bad.7.a: "Beginnt den Wiederaufbau."

 random_event_bad.8.t: "Unter Hochspannung"
 random_event_bad.8.d: "Einer unserer Generatoren bereitete uns nun schon seit geraumer Zeit Sorgen und nun ist es passiert, zwar keine spektakuläre Explosion, aber das Ding hat einfach den Geist aufgegeben. Unsere Techniker sagen, der Generator muss umfassend erneuert werden und das braucht Zeit."
 random_event_bad.8.a: "Holt die Kerzen raus."

 random_event_bad.9.t: "Entgleisung"
 random_event_bad.9.d: "Beunruhigende Nachrichten kommen aus unseren Grenzgebieten, wo eine Eisenbahnkarawane in einem Tunnel von Widerstandsgruppen entgleist wurde, die sich unserer Besetzung ihres Territoriums widersetzten. Angeblich jedenfalls, den nahegelegenen Wachposten zufolge. Abgesehen davon, dass die erwartete Ausrüstung es nicht an die Front schafft, muss nun auch die U-Bahn in diesem Tunnel wiederhergestellt werden."
 random_event_bad.9.a: "Nicht gut."

 random_event_bad.10.t: "Wachen angegriffen!"
 random_event_bad.10.d: "Nicht weit von der Frontlinie kam es zu einem grausamen Angriff von Feinden unserer Besatzungsmacht. Bei unserer Untersuchung entdeckten wir blutüberströmte Leichen unserer Soldaten, deren Ausrüstung und Waffen zusammen mit dem inzwischen geplünderten Munitionslager mitgenommen wurden. Die Täter dieses verabscheuungswürdigen Angriffs sind Guerillakrieger einer der größten Widerstandszellen in unserem eroberten Gebiet."
 random_event_bad.10.a: "Bastarde!"

 random_event_bad.11.t: "Korruptionsskandal"
 random_event_bad.11.d: "Einer unserer Bürokraten hat schädliche Aktivitäten begangen, die die Stabilität und Rechtmäßigkeit unseres Staates gefährden. Offenbar ist er dafür verantwortlich, dass ein Teil unseres aus Steuergeldern angesammelten Staatshaushalts verschwunden ist. Obwohl er die Verantwortung für diese verräterische Tat ablehnte, müssen wir schnell handeln, wenn wir in den Augen unserer Öffentlichkeit gut dastehen wollen."
 random_event_bad.11.a: "Inakzeptabel, entlasst diesen Mann!"
 random_event_bad.11.b: "Das ist nie passiert..."

 random_event_bad.12.t: "Ein Schaden für unser Ansehen"
 random_event_bad.12.d: "Kürzlich wurde eines unserer Regierungsmitglieder in einen Skandal verwickelt: Anfang dieser Woche kam es vor einer Bar in unserer Hauptstation zu einer Schlägerei zwischen ihm und einem politischen Rivalen. Das Chaos wurde durch eine schnelle Reaktion unserer Wachen beendet, die bemerkten, dass beide Männer unter starkem Alkoholeinfluss standen. Jedoch wurde alles von den beistehenden Passanten gesehen. Gerüchte verbreiteten sich wie ein Lauffeuer und ihr kleiner Vorfall wurde zu einem Klatschgespräch in der ganzen Station. Die Gerüchte werden im Laufe der Zeit verschwinden, allerdings bleibt die Frage, welches Maß an Strafe den beiden Männern auferlegt werden sollte. Nachdem wir über die Entscheidung nachgedacht hatten, beschlossen wir ..."
 random_event_bad.12.a: "ihnen ein Monat lang kein gehalt zu zahlen."
 random_event_bad.12.b: "sie einen Monat lang von der Regierung auszuschließen."

 ## Protests ##

 random_event_bad_protests.1.t: "Zivilisten beginnen einen Generalstreik!"
 random_event_bad_protests.1.d: "Außerhalb eure Arbeitsraumes drängen sie sich bereits, selbst hinter der verschlossenen Tür könnt ihr ihre Parolen vernehmen. Die Arbeiter eurer Station haben zum Generalstreik aufgerufen, von den höheren Quoten bei geringerer Bezahlung haben sie nun endgültig genug.\n\n Da sie planen auf absehbare Zeit ihren Streik aufrecht zu erhalten bricht die Produktion an unserer Station nun endgültig zusammen, mit dem Risiko, dass sich dieser Protest auch auf andere Stationen ausweiten könnte. Wie sollen wir verfahren?"
 random_event_bad_protests.1.a: "Schickt die Soldaten, sie sollen sie wieder an die Arbeit zwingen."
 random_event_bad_protests.1.a.tt: "Das wird schwerwiegende Folgen haben!"
 random_event_bad_protests.1.b: "Ignoriert sie, sollen sie doch 5 Minuten Revolution spielen."
 random_event_bad_protests.1.c: "Konfrontiert ihre Anführer und geht auf ihre Sorgen ein."
 random_event_bad_protests.1.c.tt: "Sie kommen den Massen entgegen und akzeptieren ihre vernünftigsten Forderungen. Zumindest behaupten sie das."

 random_event_bad_protests.2.t: "Zivilisten setzen den Streik fort"
 random_event_bad_protests.2.d: "Unbeeindruckt von ihren leeren Versprechungen gehen die Proteste weiter. jetzt bleibt nur zu hoffen, dass sich ihre Anführer gegenseitig an die Gurgel gehen, oder sich die Teilnehmer zumindest zu langweilen beginnen werden."
 random_event_bad_protests.2.a: "Verdammt."
 random_event_bad_protests.2.a.tt: "Der Protest geht weiter."

 random_event_bad_protests.3.t: "Generalstreik abgebrochen"
 random_event_bad_protests.3.d: "Entweder waren es ihre Versprechungen, oder dem Pöbel wurde das alles selbst zu dumm, so oder so, der Generalstreik wird abgebrochen und die Menschen gehen wieder an die Arbeit."
 random_event_bad_protests.3.a: "Gut, zurück an die Arbeit."

 ######################################################################
 ## GOOD ##

 random_event_good.1.t: "Glücksritter"
 random_event_good.1.d: "Eine Gruppe kampferprobter Reisender ist heute bei unserer Station aufgetaucht und bittet nun um Einlass. Das Herumirren in der Metro reichte ihnen nicht länger zum leben und sie bitten darum, bei uns leben zu können. Im Gegenzug sind sie bereit für uns zu kämpfen."
 random_event_good.1.a: "Willkommen daheim."

 random_event_good.2.t: "Das gute Zeug"
 random_event_good.2.d: "Eine unserer Wachen fand beim Durchsuchen einiger Trümmer einen regelrechten Schatz: Mehrere Flaschen gut erhaltenen Vodkas aus der Zeit vor dem Krieg! Wir wissen nicht wer genau dieses Lager hier angelegt hat, doch nun ist es unser. Der Wachmann bekam zur Belohnung die Woche frei und unsere Regierung verteilte den Schatz großzügig an die Bevölkerung."
 random_event_good.2.a: "Lasst uns heute mal wie echte Menschen leben!"

 random_event_good.3.t: "Geheimen Raum entdeckt"
 random_event_good.3.d: "Eine Routineuntersuchung offenbarte vor kurzem den Eingang zu einem weiteren kleinen Raum, den wir zuvor nicht kannten."
 random_event_good.3.a: "Ein weiterer Raum für die Menschheit!"

 random_event_good.4.t: "Ein außergewöhnlicher Fund"
 random_event_good.4.d: "Gestern fanden wir einen geheimen Raum an unserer Station. Auch wenn dieser zu klein ist um ihn für irgendetwas zu nutzen, so war dort ein kleines Arsenal an Vorkriesgwaffen gelagert."
 random_event_good.4.a: "Eine gute Nachricht, Freunde!"

 random_event_good.5.t: "Heureka!"
 random_event_good.5.d: "Unseren talentiertesten FWissenschaftlern gelang ein faszinierender Durchbruch, der unsere Forschung immens vorranbringen wird!"
 random_event_good.5.a: "Faszinierend."

 ### MILITARY ###

 random_event_military.1.t: "No Harm no Foul"
 random_event_military.1.d: "In unseren Truppen sind sportliche Keilerreien inzwischen so üblich, dass die Männer sogar das ein oder andere dabei lernen."
 random_event_military.1.a: "So kann man sich auch die Zeit vertreiben."

 random_event_military.2.t: "Ein Geistesblitz"
 random_event_military.2.d: "In einem Anflug spontaner Genialität hat dieser Kommandant eigenständig neue Taktiken und Trainingseinlagen entwickelt."
 random_event_military.2.a: "Schön dass mal jemand mitdenkt."

 random_event_military.3.t: "Eine sanfte Seele"
 random_event_military.3.d: "Die Soldaten sind um ein Lagerfeuer versammelt und genießen Ruhe und eine warme Mahlzeit, als der Kommandant aufsteht. Angesichts der Tatsache, dass der Rest der Soldaten sitzt, scheint er das Wort ergriffen zu haben und sein neu gewonnenes Privileg zu nutzen. Der Kommandant regt sich scheinbar zu einem unzusammenhängenden Geschwafel darüber auf, dass Männer den Mutanten ähnlich wären, wenn sie Angst vor Mutanten hätten. Sie verfielen immer mehr in die Behauptung, sie seien diejenigen mit Häusern, Feuer und Familien, und versuchten, ihre Situation mit der von Höhlenmenschen zu vergleichen. Während der bizarre Ausbruch scheinbar kaum dazu beitrug, wie erhofft, applaudierenden Jubel auszulösen, heben einige der Soldaten ihre Hände und grinsen einfach."
 random_event_military.3.a: "Wenisgtens etwas."

 random_event_military.4.t: "Wächst ihm ein Rückgrat?"
 random_event_military.4.d: "Kann man sich ein Rückgrat wachsen lassen? Einige unserer Soldaten glauben, dass das geht. Am Lagerfeuer wird gestritten, während der Wachmann spuckt und aus fernen Erinnerungen an den Biologieunterricht schwört, dass tatsächlich neue Knochen wachsen könnten. Die Meinungsverschiedenheit erreicht einen Siedepunkt, wie der Kommandant sagt; Er scheint sich strikt gegen die Idee zu stellen, Knochenmasse nachwachsen zu lassen, und steht aufrecht. Als wollte er seinen Standpunkt näher erläutern, ruft der Kommandant einen Schweinekadaver aus dem Kühlhaus hervor und breitet ihn vor den Soldaten aus, um seinen Punkt zu demonstrieren. Mit einem Messer beginnt der Kommandant, an den Knorpel- und Sehnenstücken entlangzufahren, die immer noch an den knöchernen Vorsprüngen des Schweinerückens haften. Welchen naturwissenschaftlichen Unterricht der Kommandant auch immer seinem Publikum zeigen wollte, verwandelte sich schnell in Witze und Geplänkel wie Schulkinder, als der Kommandant den Kadaver auseinanderriss und seinen Standpunkt über die Knochenanatomie veranschaulichte."
 random_event_military.4.a: "Endlich ist er darüber hinweg."

 random_event_military.5.t: "Ein klarer Verstand"
 random_event_military.5.d: "Einer Ihrer Kommandanten geht mit ausgestreckter Hand und ausgestreckten Fingern auf dem Bahnsteig auf und ab, als würde er über ein Seil balancieren. Er nickt vor sich hin, während er einen Fuß vor jeden Fuß stellt. So marschiert er seinen Weg hinüber. Als er dem Kommandanten begegnet, bietet er eine Erklärung für seine Tat an: Es scheint, als ginge es ihm gut, und alles, was dem Kommandanten zu schaffen gemacht hatte, schien verschwunden zu sein. Vielleicht hat er eine nette Frau von der Station kennengelernt?"
 random_event_military.5.a: "Gut für ihn."

 random_event_military.6.t: "Paranoid"
 random_event_military.6.d: "Ein einsamer Soldat betritt Ihr Zelt mit fest gekreuzten Händen und klopft sanft gegen seine Uniform, als würde er Fasern aus ihr herausreißen. Auch wenn Sie kein Wort gesagt haben, nickt der Mann wütend und seine Augen schweifen umher, als suche er nach den passenden Worten.\n\nSie fragen ihn, was das Problem ist. Während seine Augen zucken, nickt er erneut und beginnt zu erklären. Die Worte kommen schnell, aber schließlich kommt er zum Punkt: Als er und seine Truppe ihre routinemäßigen Streifzüge durch die Tunnel unternahmen, näherten sie sich einem alten Wartungsschacht, der vom Haupttunnel abzweigte. Hinter den verworrenen Netzen und verknoteten Hainen mutierter Pflanzen sahen sie eine überwältigend große Gestalt, die hinter der Dunkelheit hervorlugte. Unbeeindruckt von den albernen Befürchtungen machte sich der Kommandant mit geladenem Gewehr auf den Weg, um die Sache zu untersuchen. Zwei, drei, vier Stunden vergingen und als die Soldaten beschlossen, einen Streifzug zu unternehmen um den Kommandanten in der trüben Dunkelheit zu finden, tauchte er von selbst wieder auf. Gebrochen. Es waren keine Schüsse zu hören und dennoch blieb sein Gewehr leer. Was auch immer passiert ist, der Kommandant weigerte sich, dazu Stellung zu nehmen. Scheinbar hat er sich seit der Begegnung verändert."
 random_event_military.6.a: "Hat wohl einen schlechten Tag gehabt."

 random_event_military.7.t: "Mutlos"
 random_event_military.7.d: "Ein Soldat kommt mit einem schmerzerfüllten Gesichtsausdruck auf Sie zu. Den Helm in den Händen, während er sich die Stirn wischt. Seine Stimme knistert als er versucht, die sich abzeichnende Situation zu erklären. Obwohl der Soldat nur unverständliches zeuig sprucht, ist er, seinem Gesichtsausdruck nach zu urteilen, verstört.\n\nDer Soldat führt Sie zu einer Schar von Wachen, die sich um etwas oder jemanden scharen. Während Sie sich einen Weg durch die Menge bahnen, verstummt die Gruppe, als Sie auf die Lichtung kommen und eine bewusstlose Leiche auf dem Boden finden.\n\nEin.. Mann? NEIN? Ein Mutant? Das Bild war unmöglich zu beschreiben. Seine Haut war durchscheinend und kränklich, einen Lichtstrahl durch sie hindurch und sie konnten seine geschwärzten Organe erkennen. Rote Flecken ziehen sich über die Schulter des Wesens und eine dicke Hautkruste hängt wie ein Tumor an der Unterseite seiner Arme und seines Bauches. Es ist tot, aus einer Wunde an der Schläfe strömt Blut. Kopfschüttelnd befehlt ihr den Männern die Leiche aufzuräumen und wegzuwerfen, und ihr fordert den Mann zu sprechen, der den Mutanten erlegt hat. Eine unheimliche Stille breitet sich über der Menge aus, die schließlich von einer leisen Stimme unterbrochen wird, die aus dem Hintergrund ertönt. Der Mutant hatte sich zunächst dem diensthabenden Kommandanten genähert, der ihn anschließend neiderschoss. Der Kommandant war dan offenbar geflohen und wurde zuletzt dabei gesehen, wie er sich über den Anblick der Kreatur im hinteren Teil der Station verkroch. Tatsächlich hatte er wohl geglaubt, der Mutant sei in Wahrheit ein Mensch gewesen."
 random_event_military.7.a: "Darüber kommt er hinweg, oder??"

 random_event_military.8.t: "Kommandant des Irrsins"
 random_event_military.8.d: "Ein Kommandant betritt ihr Büro wenige Stunden nach der Sperrung der Station. Mit großen Augen und starkem Schweiß schreckt er geistesabwesend vor dem Schein der Petroleumlampe neben Ihrem Schreibtisch zurück. Ihr fragt ihn, was das Problem sei, und er fängt an zu plappern. Man muss seine Worte erst ordnen um sie zu verstehen, aber es klingt so, als wäre er aufgewacht und hätte entsetzliche Schreie gehört. Er erzählt ihnen dass ihn diese Schreie nun schon zum dritten Mal in diesem Monat geweckt haben."
 random_event_military.8.a: "Unzuverlässig."

 random_event_military.9.t: "Grausamkeit"
 random_event_military.9.d: "Ihr verlasst euer Zelt und blickt auf die hier stationierten Männer. Viele von ihnen wurden erst vor kurzem rekrutiert und sie verbringen ihre Zeit nun mit dem Training oder dem Reinigen ihrer Waffen. Soweit alles wie gewohnt, doch alles rührt sich als plötzlich ihr Kommandant auf den Plan tritt. Lauthals schreiend verteilt er seine Befehle an die verängstigten jungen Soldaten und eifrig rennen sie los, als der Kommandant mit ihnen fertig ist. Ein Stalker im Ruhestand erklärt ihnen schließlich die Situation: Der Kommandant habe sich in letzter Zeit einen gewissen Ruf aufgebaut, denn er plant, dass die Truppe letztendlich seinen Zorn mehr fürchtet als das feindliche MG-Feuer."
 random_event_military.9.a: "Mit ihm legt man sich besser nicht an."

 random_event_military.10.t: "Unfall mit Verletzung"
 random_event_military.10.d: "Auch wenn ein Kommandant zu Führungsaufgaben befördert wird, so heißt das nicht, dass er sich nicht gemeinsam mit seinen Soldaten in den Kampf stürzen kann. Oder nicht mit ihnen üben kann. Unser Kommandant trainiert unermüdlich gemeinsam mit seinen Truppen, er lehrt seine Soldaten, wie man richtig Muskeln aufbaut, während er aber nicht aufpasst, wohin er geht. Ein Trümmerhaufen kreuzt den Weg mit seinen Füßen und einen Moment später stürzt der Kommandant in die Bewusstlosigkeit.\n\nDer Versuch des Kommandanten seine Soldaten zu unterrichten war gescheitert, doch eine Lehre die seinen Landsleuten vermittelt wurde, ist, zumindest nach unten zu schauen und auf ihre Schritte zu achten."
 random_event_military.10.a: "Wenigstens hat er sich nicht das Genick gebrochen."

 random_event_military.11.t: "Kommandant verliert alle Furcht"
 random_event_military.11.d: "Sie treffen auf einen Ihrer Kommandeure, der inmitten seiner Truppkameraden um ein offenes Feuer herum sitzt. Die Diskussionen der Männer reichen von früheren Konfrontationen im Kampf gegen die Mutanten bis hin zu eher unbeschwerten Gesprächen bei einer warmen Mahlzeit. Das Geplauder verläuft so reibungslos, wie das Feuer knistert, wird aber schließlich wieder feierlich, als der Kommandant anfängt, über seine Ängste zu sprechen. Er erklärt, dass er Angst vor einem schmerzhaften Tod hat oder davor, dass sein Tod sinnlos sei. Er hat viele Männer sterben sehen, die meisten heldenhaft, aber einige letztlich vergebens. Am Lagerfeuer herrscht in diesem Moment eine unheimliche Stille, bevor die Soldaten beginnen, den eher scheuen Kommandanten aufzumuntern. Erklären, dass es nichts zu befürchten gibt.\n\nDie Soldaten tauschen ihre scheinbar trivialen Sorgen hin und her, doch schließlich mündet das Gespräch wieder in seinen alten Humor."
 random_event_military.11.a: "Gut. Denke ich"

 random_event_military.12.t: "Loyal"
 random_event_military.12.d: "Sie nähern sich einem Ihrer Kommandeure, der auf einem wackligen Stuhl sitzt und die Außenverteidigung der Station überblickt. Unter ihm stehen seine Kameraden, während sie untereinander plaudern. Als die Gruppe Ihre Anwesenheit bemerkt, verfällt sie in ein angespanntes Schweigen, als würde sie ungeduldig darauf warten, dass Sie die Stille zerstreuen. Als sich der Kommandant von seinem wackligen Stuhl lehnt und aufrecht steht, normalisiert sich die Atmosphäre unter den Soldaten wieder und ignoriert Ihre Anwesenheit fast, während der Kommandant Sie begrüßt.\n\nDer Kommandant führt Sie zur Seite und erklärt Ihnen, dass es rund um die Station lange Zeit nicht besonders gut aussah. Sogar einmal hörte er zufällig die Idee einer Desertion unter seinen Soldaten, die zuvor geplant hatten, zu einer benachbarten Station zu fliehen. Da Ihre jüngsten Aktionen jedoch zu einem starken Wandel in den Ansichten und Ansichten der Soldaten geführt haben, wird er geschätzt."
 random_event_military.12.a: "Sehr gut."

 ## Bandit ##

 random_event_military_bandit.1.t: "Der Stunt"
 random_event_military_bandit.1.d: "Etwas Aufruhr lockt Sie aus Ihrem Zelt. Männer drängen sich hinter einer Feuertonne unweit des Bahnsteigs und beobachten gespannt etwas in der Ferne. Als Sie Ihre Augen zusammenkneifen, bemerken Sie, dass einer Ihrer Kommandeure und einer der neu eingestellten Gopniks etwas Seltsames tun. Auf dem Kopf des Mannes steht eine Blechdose, während sich der andere mit der Waffe in der Hand langsam entfernt.\n\nAls Sie Ihre rechte Hand fragen was los ist, erklärt er ihnen, dass die beiden Männer eine Art Stunt versuchen werden, bei dem sie die Dose vom Kopf des Mannes abschießen."
 random_event_military_bandit.1.a: "Endlich, Unterhaltung!"
 random_event_military_bandit.1.b: "Hört mit dem Scheiß auf!"

 random_event_military_bandit.2.t: "Der Stunt"
 random_event_military_bandit.2.d: "Der Bratok jubelt, während Sie zustimmend nicken. Der Kommandant setzt sich zwischen sie und bereitet sich auf die Aufnahme vor, während der Gopnik die Blechdose auf seinem Kopf balanciert. Als die Dose fertig ist, zieht der Kommandant seine Pistole zurück und blickt mit schmalem Blick auf den Lauf. Der Rest ihrer Bande tauscht Wetten aus und spekuliert wild darüber, ob er verfehlt oder nicht. Manche wenden ihren Blick ab, für sie ist das Spektakel zu viel.\n\nAuf das Geräusch des Bleifeuers folgt ein lautes Keuchen. Männer taumeln auf ihren Sitzen zurück, zucken, und beißen die Zähne zusammen. Die Blechdose explodiert und Trümmer verstreuen sich über den Boden. Nach der kurzen Stille bricht die Menge in Jubelrufe aus, die der Kommandant begrüßt und der bescheidene Gopnik lockert seine Haltung und sieht erleichtert aus."
 random_event_military_bandit.2.a: "Getroffen!"

 random_event_military_bandit.3.t: "Der Stunt"
 random_event_military_bandit.3.d: "Sie denken über die sich entwickelnde Situation nach. Zweimal, dreimal vorbei. Die Bratok schauen alle zu Ihnen und erwarten, dass Sie die sich abzeichnende Situation stoppen, doch stattdessen entscheiden Sie sich, zwischen ihnen Platz zu nehmen. Dies löst einen kurzen Jubelruf in der Menge aus, der jedoch schnell in ein leises Flüstern übergeht, während der Kommandant und die Gopnik sich bereit machen.\n\n\n'„Achten Sie darauf, die Dose zu treffen!“, schreit einer der Schläger. Das Lachen breitet sich aus und verstummt genauso schnell, wie es ausbricht. Das Gelächter wiederholt sich erneut in nervöser Vorfreude. Das Geräusch der Bleientladung löst die angespannte Menge in Stille auf, gefolgt von einem abrupten Knall, als der Bratok auf den Boden fällt."
 random_event_military_bandit.3.a: "Tja, einer weniger."

 ### Circus ###

 random_event_circus.01.t: "Reisende Schauspieler"
 random_event_circus.01.d: "Ein farbenfroher Konvoi rollt mit einer Art klirrender, klingender musikalischer Unbescheidenheit an unsere Station heran. Man hätte die Karavane nicht für besonders groß gehalten, aber aus unerklärlichen Gründen strömten etwa fünfzehn Männer und Frauen aus ihm heraus. Bemalte Gesichter, Musikinstrumente, Jonglierbälle, die Entertainertruppe schwärmt aus und führt Mini-Talentshows vor, als hätten wir für ihre Dienste bereits bezahlt. Wenn sie fertig sind, klatschen sie, stampfen mit den Füßen und erstarren vor Ihnen, strecken die Hände aus und lächeln auf ihrem Gesicht. Ironsicherweise ist es der Pantomime der sie als erster anspricht:n\nWas sagen Sie, Lust auf eine Show? Nur 100 Kugeln, und wir unterhalten sie den gesamten Abend!"
 random_event_circus.01.a: "Bezahlt sie für eine Show, vielleicht wird es gut."
 random_event_circus.01.b: "Sie sollen verschwinden."
 random_event_circus.01.c: "Raubt sie aus!"
 
 random_event_circus.02.t: "Reisende Schauspieler"
 random_event_circus.02.d: "Ihr bezahlt für die Show, die die Truppe auch ganz gut hinbekommt. Die Narren reißen Witze, die Jongleure jonglieren, was etwas altmodisch wirkt, zumal ihre Bälle drohen, die ganze Bahnhofsdecke auf die Darsteller einstürzen zu lassen. Der Pantomime scheint die Station zu spalten, in jene die Lachen und jene die sich gelangweilt abwenden.\n\nALs das Schauspiel vorbei ist habt ihr immerhin nicht das gefühl euer Geld verschwendet zu haben, ist das denn nicht das Wichtigste?"
 random_event_circus.02.a: "Ein großartiger Abend."

 random_event_circus.03.t: "Reisende Schauspieler"
 random_event_circus.03.d: "Bevor die Truppe starten kann, steht einer der Stationsleiter auf und fragt, ob sie ein bestimmtes Lied aus seiner Zeit beim Militär kennen. Sie haben es immer gesungen, als er noch ein kleiner Junge war. Es ist Jahre her, seitdem er es zuletzt gehört hatte, und summte der Truppe nur die Melodie vor. Der Pantomime, der erneut die Figur bricht, grinst laut und verkündet ihnen, dass er es auswendig kannte. Mit den Fingern schnippend greifen die Musiker der Gruppe zu ihren Instrumenten. Beim Start ist der Ton sofort griffig, der Rythmus ist mitreißend und die Melodie findet beim Publikum sofort Anklang.\n\nNachdem die Truppe fertig ist, fragen Sie, wie viel Sie ihnen schulden. Der Pantomime schüttelt den Kopf und bemerkt, dass eine Bezahlung nicht notwendig sei und es tatsächlich eine Ehre gewesen sei, dieses besondere Lied."
 random_event_circus.03.a: "Gute Show!"

 random_event_circus.04.t: "Reisende Schauspieler"
 random_event_circus.04.d: "Sie befehlen, die Karawane zu überfallen. Während einige der Darsteller zunächst scherzhaft mitspielen, verschwinden ihre spielerischen Gesichtsausdrücke schnell, als einer Ihrer Soldaten auf Sie zukommt und einem der Darsteller direkt aufs Kinn schlägt. Der Darsteller lässt sich mit einem katzenartigen Kreischen zu Boden fallen und miaut im Dreck, während er sich an den Kiefer klammert.\n\nDer Rest der Soldaten schubst die Truppe herum, während sie ihren Konvoi nach Wertgegenständen durchsucht. Ein Jongleur wird mitten in die Eier getreten und ein Sänger wird von einem anderen Soldaten zu Boden gedrosselt.\n\nLetzten Endes gab es wirklich nicht viel zu nehmen. Wer hätte gedacht, dass es kein profitables Geschäft ist, Narren und Gaukler zu verprügeln? Zumindest wird der Pantomime mit seinem gebrochenen Kiefer seine Arbeit besser machen."
 random_event_circus.04.a: "Was für Verlierer."