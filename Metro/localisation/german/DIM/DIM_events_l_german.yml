l_german:
 nf_DIM.2.t: "Satanistische Überfalle"
 nf_DIM.2.d: "Die satanischen Kräfte von der Timiryazevskaya haben ihre verdeckten Angriffe gegen uns begonnen und auch schon erste Schäden angerichtet. Auch wenn wir es schaffen ihre Kräfte zurückzustoßen, so schleichen sie sich doch immer wieder aufs neue zurück, auf Wegen die uns bisher unbekannt sind. Ihr Fanatismus ist dabei beunruhigend, es wurde beobachtet wie sich der Feind ohne zu zögern das Leben nimmt, um sich so unserer Gefangennahme zu entziehen.\nObwohl wir die Kräfte der Finsternis auf dem Schlachtfeld bezwingen können, sorgen ihre Attentate doch für Misstrauen und Angst."
 nf_DIM.2.a: "Dafür werden sie bezahlen."