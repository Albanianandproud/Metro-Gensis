l_german:

 EUR_organise_the_immigrants: "Organisiert die Europäer"
 EUR_organise_the_immigrants_desc: "Ein erheblicher Teil der Einwohner des Europäischen Stationenbundes sind Einwanderer, ehemalige Geschäftsleute und Angestellte des Moskauer Finanzzentrums. Wir müssen diese Einwanderer zu arbeitenden Zivilisten organisieren."
 
 EUR_industrial_drive: "Industrieller Fortschritt"
 EUR_industrial_drive_desc: "Da sich unsere Bevölkerung in Industriearbeiter umstrukturiert hat, müssen wir sie auch insetzen. Unsere Fraktion wird sich nicht weiterentwickeln, wenn wir uns nicht zu einem funktionierenden Industriestaat entwickeln."

 EUR_establish_a_full_government: "Gründet eine echte Regierung"
 EUR_establish_a_full_government_desc: "Die Menschen in Europa fordern eine funktionierende Regierung. Das derzeitige Kollektiv ist zu langsam und ineffizient, wenn es darum geht, politische Entscheidungen zu treffen. Eine Reform ist unerlässig."

 EUR_increase_military_drive: "Vergrößert die Armee"
 EUR_increase_military_drive_desc: "Während wir uns auf unseren industriellen Antrieb konzentriert haben, sind wir durch ein ineffizientes Militär anfälliger für Angriffe von außen geworden. Eine weitere Reform ist nötig"

 EUR_scavenging_runs: "Metro-Expeditionen"
 EUR_scavenging_runs_desc: "Wir können eine kleine Truppe in die Metrotunnel schicken, um sie nützliche Ressourcen suchen zu lassen."
 
 EUR_the_new_prussia: "Eine vereinte Armee"
 EUR_the_new_prussia_desc: "Europa war in seinem Kern immer ein Kontinent des Krieges und der Zerstörung. Wenn überhaupt, dann müssen wir aus dieser Zerstörung lernen und eine Nation mit einem starken Militär aufbauen, damit wir die Zerstörungen der Vergangenheit in Zukunft verhindern können."

 EUR_tt_1: "Fügt §G1§! §YDivision§! hinzu." ### LEAVE THIS
 EUR_tt_2: "Entsendet ein Team, welches viele §YVorräte§! finden wird"
 
 EUR_westernisation: "Westernisierung"
 EUR_westernisation_desc: "Unsere Nation besteht aus Menschen des Westens. Was ist also falsch daran, etwas mehr westlicher Kultur in die Metro zu bringen??"

 EUR_a_standing_force: "Eine stehende Wache"
 EUR_a_standing_force_desc: "Eine Gruppe von Betrunkenen und alten Fürzen könnte eine übergroße Ratte abschrecken, aber andere Menschen? Wir sind hier nichts als Hundefutter, wir brauchen eine tatsächliche, seriöse und kompetente Streitmacht, wenn wir wirklich durchhalten wollen."

 EUR_q_democracy: "Demokratie"
 EUR_q_democracy_desc: "Die Menschen plädieren für eine Demokratie, wir werden sie ihnen geben"
 
 EUR_invest_in_military: "Investiert in das Heer"
 EUR_invest_in_military_desc: "Es wäre klug von uns nicht zu vergessen, auch in unsere militärische Macht zu investieren. Um in der Metro zu überleben, muss man auch in der Lage sein, jegliche auftretenden Gefahren zu bekämpfen."
 
 EUR_establish_a_trading_hub: "Gründet einen Markt"
 EUR_establish_a_trading_hub_desc: "Wir sind eine friedlichere Nation, die nur diejenigen angreift, die uns zuerst angreifen. Um unse friedlichen Absichten zu beteuern, könnten wir uns als Handelszentrum etablieren."
 
 EUR_further_westernisation: "Weitere Verwestlichung"
 EUR_further_westernisation_desc: "WIr sind Menschen aus dem Westen, leben wir auch so."
 
 EUR_formalize_the_militias: "Formalisiert die Milizen"
 EUR_formalize_the_militias_desc: "Jetzt ist die Zeit für eine echte Armee gekommen. Wir können in der Metro nicht untätig bleiben, sonst werden wir hier bei lebendigem Leibe aufgefressen. Die Bildung einer Miliz wird uns vor Banditen und anderen Schrecken schützen."
 
 EUR_neutrality: "Neutralität"
 EUR_neutrality_desc: "Wir schaden nur jenen, die uns schaden."
 
 EUR_interventionism: "Interventionismus"
 EUR_interventionism_desc: "Die Degradierung der Menschheit in Monster werden wir, notfalls über Jahre hinweg, verhindern."
 
 EUR_increase_military_spending: "Erhöhte Militärausgaben"
 EUR_increase_military_spending_desc: "Das Militär ist für den Schutz des Stationenbundes von entscheidender Bedeutung und daher müssen wir mehr unserer Ressourcen hinein investieren."
 
 EUR_an_economy: "Eine Wirtschaft"
 EUR_an_economy_desc: "Mit hochwertigen Kugeln als Währung können wir eine nachhaltige Wirtschaft aufbauen."
 
 EUR_finalisation_of_peoples_militia: "Finalisiert die Volksmilizen"
 EUR_finalisation_of_peoples_militia_desc: "Wenn alle Vorbereitungen getroffen sind, können wir unsere Miliz fertigstellen und zu einer besser geschützten Nation innerhalb der Metro werden."
 
 EUR_army_recruitment: "Armeerekrutierungen"
 EUR_army_recruitment_desc: "Um eine Armee zu haben, brauchen wir Leute, die in ihr dienen!"
 
 ### WORM PEOPLE FOCUSES
 
 EUR_realise_the_threat: "Nehmt die Bedrohung ernst"
 EUR_realise_the_threat_desc: "Die Wurmkultisten stellen schon seit einiger Zeit eine Bedrohung für uns dar. Wir müssen uns der wahren Bedrohung bewusst werden, der wir hiergegenüberstehen."
 
 EUR_scavenge_old_armouries: "Durchsucht die alten Waffenkammern"
 EUR_scavenge_old_armouries_desc: "Das Durchsuchen alter Waffenkammern und die Analyse dessen, was wir dort finden, kann uns die Möglichkeit geben unsere eigenen Standard-Militärwaffen herzustellen."
 EUR_unique_weapon_tt: "Forschungsteams werden ausgesandt und können mit unterschiedlicher Ausrüstung oder Technologie zurückkommen"
 
 EUR_defensive_line: "Verteidigungslinie"
 EUR_defensive_line_desc: "Wir können eine Verteidigungslinie bilden, die verhindern word, dass der Große Wurmkult oder andere Feinde in unser Territorium eindringen"
 
 EUR_start_bunker_construction: "Beginnt die Bunker-Konstruktion"
 EUR_start_bunker_construction_desc: "Durch den Bau befestigter Bunker können wir es dem Feind praktisch unmöglich machen, in unser Land einzudringen."
 
 EUR_fortify_the_capital: "Befestigt die Hauptstation"
 EUR_fortify_the_capital_desc: "Ehre sei Europa! Unsere Hauptstation wird nicht fallen."
 
 EUR_holding_the_line: "Haltet die Linie"
 EUR_holding_the_line_desc: "Wir sollten uns mehr auf die Abwehr ausländischer Angriffe konzentrieren"
 
 EUR_the_best_defence_is_a_good_offence: "Die beste Verteidigung ist eine gute Offensive"
 EUR_the_best_defence_is_a_good_offence_desc: "Die beste Verteidigung besteht darin, den Feind zurückzudrängen und in seinem eigenen Blut zu ertränken."
 
 EUR_constructing_a_good_defence: "Aufbau einer guten Verteidigung"
 EUR_constructing_a_good_defence_desc: "Durch den Aufbau einer guten Verteidigung können wir verhindern, dass unsere Feinde jemals die Grenze überschreiten"
 
 EUR_rallying_the_men: "Versammelt die Männer"
 EUR_rallying_the_men_desc: "Jeder Mann muss seiner Pflicht nachkommen und Europa vor den barbarischen Feinden an unseren Grenzen verteidigen"
 
 EUR_improved_doctrine: "Verbesserte Doktrin"
 EUR_improved_doctrine_desc: "Die Erforschung alter Militärtaktiken aus der Zeit von vor dem Krieg kann uns Aufschluss darüber geben, wie wir unsere Schlachten besser gewinnen können."
 
 EUR_create_our_own_weapons: "Unsere eigenen Waffen"
 EUR_create_our_own_weapons_desc: "Durch die Erforschung alter Waffenbaupläne können wir effizientere und besser auf unsere Bedürfnisse abgestimmte Waffen entwickeln"
 
 EUR_manufacture_our_own_weapons: "Stellen Sie unsere eigenen Waffen her"
 EUR_manufacture_our_own_weapons_desc: "Nachdem wir nun die Pläne haben, müssen wir sie auch in die Tat umsetzen und die Waffen nach unseren genauen Spezifikationen herstellen."
 
