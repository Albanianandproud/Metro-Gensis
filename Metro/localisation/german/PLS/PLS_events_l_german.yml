l_german:
   nf_PLS.1.t: "Ausschlachten"
  nf_PLS.1.d: "Unser Stalker-Chef überreicht uns einen Bericht über die jüngsten Entdeckungen, bei denen an der Oberfläche landwirtschaftliche Bücher oder medizinische Vorräte und Bücher gefunden wurden. Beides wäre hilfreich, aber wir müssen uns für eines von beiden entscheiden."
  nf_PLS.1.a: "Nehmt die Medizin"
  nf_PLS.1.b: "Das landwirtschaftliche Wissen ist zu wertvoll, um es zu verpassen"

  nf_PLS.2.t: "Ausschlachten"
  nf_PLS.2.d: "Der Bericht über die jüngsten Erkundungsbemühungen der Stalker erwähnt eine alte Werkzeugwerkstatt. Ausgestattet mit alten Werkzeugen, Ambossen, einem Ofen und allem und vor allem Elektrowerkzeugen, welche unsere Bemühungen enorm unterstützen könnten. Alles sieht etwas schwer aus, aber mit etwas roher Gewalt sollten wir so einiges davon bergen können."
  nf_PLS.2.a: "Schmiedekunst"
  nf_PLS.2.b: "Werkzeug-Herstellung"

  nf_PLS.3.t: "Ausschlachten"
  nf_PLS.3.d: "Wieder einmal gelang es unseren erfahrenen Stalkern, sich Zugang zu einem Trainingsdepot an der Oberfläche zu verschaffen. Es ist ein kleines Gebäude, aber es gibt hier so einige Vorräte. Die meisten Waffen sind bereits geplündert oder unbrauchbar verrostet, aber es gibt einige Trainings- und Bedienungsanleitungen in gutem Zustand. Oder wir sammeln die Reste der Ausrüstung in den alten Schließfächern."
  nf_PLS.3.a: "Taktiken"
  nf_PLS.3.b: "Infanterieausrüstung"

  nf_PLS.4.t: "Ausschlachten"
  nf_PLS.4.d: "Einige herumstreunende Kinder (zum Teufel mit ihren Eltern) sind in ein altes Lagerhaus geklettert. Wir konnten die Türen aufbrechen und sie ihren Eltern zurückgeben, aber glücklicherweise fanden wir dabei noch mehr Gegenstände, die wir verwenden konnten. Verschiedene Ersatzmaterialien wie Metall, Stoff und Werkzeuge. Wir haben nun die Möglichkeit, diese überall dort anzuwenden, wo wir es für nötig halten."
  nf_PLS.4.a: "Wir können sie nutzen, um unsere Streitkräfte zu verbessern"
  nf_PLS.4.b: "Wir können dies nutzen, um unsere Ziele voranzutreiben"

  nf_PLS.5.t: "Kulturhilfe"
  nf_PLS.5.d: "[PLS.GetName]. Viele nennen es den letzten Ort auf der Erde, an dem Menschen noch wie Menschen leben, aber ich verstehe nicht worum es bei der ganzen Aufregung geht. Wer möchte schon in der Nähe dieser Eierköpfen und Weicheiern leben? Sei es aus Mitleid oder um ihre enorme intellektuelle Kraft zu entfalten, haben sie unserer Verwaltung eine umfangreiche Büchersammlung geschenkt. Manuskripte, Dokumente und alles Mögliche. Wir hoffen, dass wir diese Lesematerialien unter unserer Bevölkerung verbreiten können, denn ich bezweifle ernsthaft, dass irgendjemand unserer Bürger Tolstoy lesen, geschweige denn verstehen kann."
  nf_PLS.5.a: "Wir werden akzeptieren"
  nf_PLS.5.b: "Tolstoy? Seine Literatur wird unserer Situation überhaupt nicht helfen"
  nf_PLS.5.c: "Ab ins Lagerfeuer mit ihnen"

  nf_PLS.6.t: "Die Kasten der Polis"
  nf_PLS.6.d: "Genau wie im alten Indien sind die Bewohner von Polis einem Kastensystem unterworfen: Die Wissenschaftler sind die Brahmanen, die Soldaten sind die Kshatriyas, die Kaufleute sind die Vaishyas und einfache Arbeiter und Ingenieure sind die Shudras. Die Menschen werden einmal Mitglied einer Kaste und bleiben für den Rest ihres Lebens in dieser Kaste, mit besonderen Übergangsriten für die Kshatriyas und Brahmanen.\n\nDie Kasten werden durch ihre jeweiligen ideologischen Gruppierungen repräsentiert, die Aufrechterhaltung eines Gleichgewichts zwischen den vier Kasten und die Sicherstellung, dass keine von ihnen einen ungleichen Machtanteil innerhalb der Polis erlangt, hat eine hohe Priorität."
  nf_PLS.6.a: "Gut zu wissen"
  nf_PLS.6.a.tt: "Die Kasten der Polis werden durch íhre Ideologie repräsentiert. Wenn wir alle vier Kasten im Gleichgewicht halten, können wir ihre jeweiligen Zweige verfolgen!"

  nf_PLS.7.t: "Polis strebt nach Integration"
  nf_PLS.7.d: "Seit geraumer Zeit operiert [SPT.GetName] mit einem gewissen Maß an Autonomie außerhalb der Polis. Interne Streitigkeiten und die innere Politik der Polis haben bisher nur selten unsere Missionen beeinträchtigt. Allerdings haben sich die Dinge nun geändert. Die Polis verlangt, dass wir uns wieder der Gerichtsbarkeit ihrer Behörden unterstellen. Dazu gehört auch der Verlust eines Teils unserer Autonomie. Wenn wir dies nicht tun, könnte dies zu negativen Beziehungen zwischen uns führen."
  nf_PLS.7.a: "Die Polis bleibt unsere Priorität"
  nf_PLS.7.b: "Sparta wird sich keiner Ideologie oder Gruppe beugen, sondern nur der Menschheit"

  nf_PLS.8.t: "Polis schickt Hilfe"
  nf_PLS.8.d: "[PLS.GetName] hat eine weitere Welle der Unterstützung in die entlegensten Regionen der Metro geschickt. Diesmal schickten sie uns jedoch keine Bücher, sondern einen Berater. Er wird uns bei den täglichen Abläufen auf unseren Stationen unterstützen. Wie wir frisches Trinkwasser desinfizieren und unserer Bevölkerung grundlegende Hilfe und Hygiene vermitteln."
  nf_PLS.8.a: "Wir erlauben ihnen, uns zu helfen"
  nf_PLS.8.b: "Packen Sie seine Koffer und schicken Sie ihn wieder nach Hause"

  nf_PLS.9.t: "Wahlen"
  nf_PLS.9.d: "Jedes Jahr wird der Rat der Polis neu besetzt und erfahrenen Mitgliedern der Brahmanen oder der Kshatriya wird die Möglichkeit gegeben, einen Sitz im Rat der Polis einzunehmen. Hier werden viele wichtige Themen diskutiert und umgesetzt, oder die Gesetze und Richtlinien bezüglich der Zukunft der Menschheit werden heftig debattiert."
  nf_PLS.9.a: "Zur Kenntnis genommen"

  nf_PLS.10.t: "Machtverteilung"
  nf_PLS.10.d: "Die Macht in der Polis ist zwischen zwei Kasten aufgeteilt; die Brahmanen (Wissenschaftler) und die Kshatriya (Soldaten). Diejenigen, die Bücher sammeln und das letzte menschliche Wissen bewahren, und diejenigen, die diese Bücher vor der Dunkelheit der Nacht schützen. Der Rat der Polis besteht überwiegend aus diesen beiden Sekten, die wiederum die Entscheidung treffen, Polis zu sinnvollen Zielen zu führen und in schwierigen Zeiten nach Lösungen zu suchen.\n\nEs liegt in unserem besten Interesse, ein perfektes Gleichgewicht zwischen Brahmanen und Kshatriya-Mitgliedern im Rat sicherzustellen."
  nf_PLS.10.a: "Gut zu wissen"

  PLS_council_mission: "§YRatsmissionen§! sind §Yzeitlich begrenzte Entscheidungen§! für deren Vervollständigung bestimmte Parameter erforderlich sind. Das Abschließen dieser zeitgesteuerten Entscheidungen wird uns §YPolitischen Einfluss§ verschaffen!"
  nf_PLS.41.t: "Kshatriya: Fordert mehr Werkstätten"
  nf_PLS.41.d: "Es ist Jahre her, dass die kommunistischen Kriege ihr Ende erreichten, und in dieser Zeit hat sich langsam ein Dissens gebildet, der Löcher in den dauerhaften Frieden bohrt. Die Bibliothek der Polis war der Ort, an dem die meisten Kämpfe stattfanden. Unsere Streitkräfte drängen darauf, dass wir unsere militärischen Fähigkeiten erhöhen. Die Einrichtung mehrerer weiterer militärischer Werkstätten wird unsere Streitkräfte in der Zwischenzeit beruhigen."
  nf_PLS.41.a: "Notiert"

  nf_PLS.42.t: "Kshatriya: Regionalkommando einrichten"
  nf_PLS.42.d: "Wir können uns nicht mehr darauf verlassen, dass die Hanse oder die Spartaner das Hauptbollwerk unserer Verteidigung bilden. Unsere Generäle fordern uns auf, unsere Kommandostruktur weiterzuentwickeln. Die Sicherstellung einer starren und dennoch flexiblen Militärstruktur wird bei der Aufrechterhaltung unserer Streitkräfte wirksamer sein."
  nf_PLS.42.a: "Notiert"

  nf_PLS.43.t: "Kshatriya: Kampfübungen"
  nf_PLS.43.d: "Unsere Streitkräfte bilden das wichtigste Bollwerk gegen potenzielle Bedrohungen. Sie müssen ständig auf der Hut sein und wachsam gegenüber unseren Feinden sein. Unser Generalstab ist bestrebt, sowohl bei unseren Streitkräften als auch bei unseren Reservisten Übungen durchzuführen."
  nf_PLS.43.a: "Notiert"

  nf_PLS.44.t: "Kshatriya: Kriegsmanöver durchzuführen"
  nf_PLS.44.d: "Die erste Kampfübungsserie verlief besser als erwartet. Unsere Mitarbeiter sind bestrebt, so schnell wie möglich eine weitere Charge durchzuführen. Es wäre klug, sie mit allen benötigten Ressourcen zu unterstützen."
  nf_PLS.44.a: "Notiert"
  nf_PLS.45.t: "Brahmane: Suche nach Forschungsstipendien"
  nf_PLS.45.d: "Selbst als die Feuer der Armageddon Land und Meer erstickten, blieb der faustische Geist des Menschen bestehen. Abgesehen von der Philosophie führt unsere Wissenschaftsbasis immer noch Experimente und Forschung durch, fast so, als hätte der Dritte Weltkrieg nie stattgefunden. Bis unsere Forschung eingestellt wird. In letzter Zeit haben wir eine unerwartete Verlangsamung der Forschungsbemühungen erlebt. Unser Brahmane drängt uns, mehr Mittel für unsere Forschungsbasis bereitzustellen. Der menschliche Fortschritt muss weitergehen; was auch immer es kostet."
  nf_PLS.45.a: "Notiert"

  nf_PLS.46.t: "Brahmane: Verbessert die Gesellschaft"
  nf_PLS.46.d: "Wir leben in einer Gesellschaft, einer menschlichen Gesellschaft. Bei einem Spaziergang durch [PLS.Capital.GetName] könnte man jedoch daran zweifeln, ob der Homo Sapiens den nuklearen Holocaust wirklich überlebt hat. Unsere Wissenschaftler fordern uns zunächst auf, die Rahmenbedingungen rund um unsere Stationen zu verbessern; vielleicht sogar ein zweiwöchentliches Bademandat durchsetzen. Das würde die Sache für den Anfang viel erträglicher machen."
  nf_PLS.46.a: "Notiert"

  nf_PLS.47.t: "Brahmane: Wissenschaftliche Fortschritte"
  nf_PLS.47.d: "Die Oberfläche wartet auf uns, auch wenn sie von Strahlung verseucht, mit Mutanten gefüllt und durch das raue Wetter verwüstet ist. Unsere Wissenschaftler sind neugierig darauf, wie genau das Leben auf der Oberfläche weiterhin existiert; Auch wenn die Entnahme einer lebenden Probe oder eines solchen nach dem letzten Mal völlig ausgeschlossen ist, versucht unsere Laborgemeinschaft, die neue Landschaft mit all ihren Geheimnissen zu begreifen. Ob trivial oder nicht."
  nf_PLS.47.a: "Notiert"

  nf_PLS.48.t: "Brahmane: Wissenschaftliche Fortschritte vorantreiben"
  nf_PLS.48.d: "Die ersten Experimente führten zu wertvollen Forschungsergebnissen, scheiterten jedoch in den Augen unserer Wissenschaftler. Weitere Experimente müssen durchgeführt werden, wenn sie zufrieden und in unserer Gunst bleiben wollen."
  nf_PLS.48.a: "Notiert"


  nf_PLS.49.t: "Erkundung erfolgreich"
  nf_PLS.49.d: "Unsere Stalker sind kürzlich erfolgreich von ihrem Einsatz an der Oberfläche zurückgekehrt. Bei sich tragen sie Wertgegenstände, die sie geplündert haben. Mit diesem Wissen werden wir es nutzen, um unsere Ziele zu unterstützen und voranzutreiben."
  nf_PLS.49.a: "Gute Arbeit"


  nf_PLS.51.t: "Shudra: Forschungsgrundlagen"
  nf_PLS.51.d: "Wenn wir dafür sorgen, dass die meisten Menschen ein richtiges Bett und ein Dach über dem Kopf haben, werden wir unsere Beziehungen zu den Shudra deutlich verbessern. Oft übersehen, überlastet und den vielen wichtigen Aspekten der Führung eines Nachkriegsstaates ausgesetzt."
  nf_PLS.51.a: "Notiert"

  nf_PLS.52.t: "Shudra: Schienentransport"
  nf_PLS.52.d: "Versuchen Sie, ein paar Tage lang mehrere Kilo auf Ihrem Rücken zu schleppen, und sehen Sie, ob Sie nicht zu einem mürrischen Stück Scheiße werden. Die Shudra haben es satt, mit mühsamen Mengen an Material durch die Tunnel reisen zu müssen. Tatsächlich schlagen sie vor, dass wir uns darauf konzentrieren, einige der alten Waggons zu reparieren und sie als mobile Gütertransporter einzusetzen. Wir haben zahlreiche Draisinen auf Lager. Mit etwas Geschick können wir diese Maschinen wieder zum Laufen bringen."
  nf_PLS.52.a: "Notiert"

  nf_PLS.53.t: "Shudra: Reparaturaufgaben"
  nf_PLS.53.d: "Es ist keineswegs eine leichte Aufgabe, aber die Shudra fordern uns auf, mehr in die Reparatur und den Wiederaufbau unserer Zugstrecken zu investieren."
  nf_PLS.53.a: "Notiert"

  nf_PLS.54.t: "Shudra: Vergesst es nicht"
  nf_PLS.54.d: "Wir können nicht der gleichen Ignoranz gegenüber dem Rest der Metro verfallen. Wissenschaft, Kunst und Fortschritt sollten nicht auf Kosten der menschlichen Bedürfnisse gehen. Wir dürfen nicht vergessen, was das Wort „Menschlich“ bedeutet."
  nf_PLS.54.a: "Notiert"

  nf_PLS.55.t: "Vaishya: Mehr Zivil wagen"
  nf_PLS.55.d: "Die Vaishya fordern uns auf, mehr in den Bau ziviler Werkstätten zu investieren. Wir sollten die Bedürfnisse oder Anliegen der anderen Kasten nicht negieren, insbesondere derjenigen, die das wirtschaftliche Rückgrat der Polis-Gesellschaft bilden."
  nf_PLS.55.a: "Notiert"

  nf_PLS.56.t: "Vaishya: Wirtschaftliche Selbstversorgung"
  nf_PLS.56.d: "Da die turbulenten Zeiten der letzten Zeit dazu beigetragen haben, das wachsende Bedürfnis nach Selbstversorgung zu verstärken, ist es jetzt an der Zeit, dieses Ziel ernsthaft anzustreben. Wir können uns nicht darauf verlassen, dass Hanse, Rote Linie oder irgendein anderes Land uns wirtschaftliche Hilfe gewährt."
  nf_PLS.56.a: "Notiert"

  nf_PLS.57.t: "Vaishya: Baue die Hauptstadt auf"
  nf_PLS.57.d: "Die altruistischen Ziele der Polis sollten sich vor allem in ihrer Hauptstadt widerspiegeln. Wir sollten unser Zentrum aufbauen und nicht nur die zerkratzten Wände und die undichten Decken reparieren. Sie sollte nicht nur das Wunder Moskaus sein, sondern der Menschheit selbst!"
  nf_PLS.57.a: "Notiert"

  nf_PLS.58.t: "Vaishya: Herz der Metro"
  nf_PLS.58.d: "Mitten im Herzen der Metro gelegen könnte die Polis könnte nicht nur eine politische, sondern auch eine wirtschaftliche Großmachtsein. Die Vaishyas fordern uns auf, mehr in unsere zivilen Arbeitsplätze zu investieren. Wenn wir mehr Geld in unsere Wirtschaft stecken, wird unsere Macht insgesamt dadurch zunehmen"
  nf_PLS.58.a: "Notiert"

  nf_PLS.59.t: "Folgen Sie dem gelben Weg"
  nf_PLS.59.d: "Zwischen all den Gerüchten und Spekulationen bleibt nur eines klar: Es gibt Stationen auf der anderen Seite der Sperlingsberge. Ob sie bewohnt sind oder nicht, blieb abzuwarten.\n\nDa wilder Klatsch unser einziger Beweis für die sagenumwobene Smaragdstadt ist, gab es nur sehr wenige Anhaltspunkte, mit denen wir diesen angeblichen Überresten der Moskauer Universität in Kontakt treten können. Abgesehen von den noch selteneren Gerüchten über ihre eigenen Expeditionen an die Oberfläche."

  nf_PLS.59.a: "Die Smaragdene Stadt ist nur ein Gerücht"
  nf_PLS.59.b: "Wir werden friedlich zusammenarbeiten"
  nf_PLS.59.c: "Sie sind ein Affront gegen die Welt"


  nf_PLS.60.t: "Nation der Wissenschaft... und des Krieges?"
  nf_PLS.60.d: "Es ist keine Überraschung, dass die Polis im militärischen Vergleich zu Roten Linie oder der Hanse keinen Vorsprung hat, und auch keine enormen Reserven an Arbeitskräften bzw. Wirtschaftskraft. Die Polis mag beide in puncto Technologie in den Schatten stellen, aber eine Nation von Wissenschaftlern und Dichtern ist ihren tapferen Truppen nicht gewachsen.\n\nEs genügt zu sagen, dass wir dauerhaft im Nachteil bleiben werden, bis unsere Forschungs- und Entwicklungsbemühungen uns einen vollständigen Vorsprung verschaffen, wenn wir uns, Gott behüte, dazu entschließen, als Militärmacht im Mittelpunkt zu stehen.\n\nDenken wir jedoch daran: Polis bleibt ein Leuchtfeuer in der Dunkelheit. Wir sind der Neid unserer Nachbarn, und sie werden zweifellos noch zweimal darüber nachdenken, ob sie versuchen, unsere Stellung zu beschlagnahmen oder unseren Reichtum zu plündern."
  nf_PLS.60.a: "Hoffentlich wird sich die Situation schnell lösen!"

  nf_PLS.61.t: "Ein typisches Beispiel"
  nf_PLS.61.d: "Unsere Techniker sind bereits damit beschäftigt, alte, beschädigte Geräte zu reparieren, die wir im Laufe der Jahre auf Lager gesammelt haben. Es ist jedoch unwahrscheinlich, dass die Vorräte die wir haben, die Mehrheit unserer Stalker vollständig ausrüsten können. Wir können es noch nicht ganz von Grund auf selbst herstellen, zumindest noch nicht. Einige der Techniker schlagen jedoch vor, dass wir unsere Spezialeinheitsausrüstung um einige modifizierte Ergänzungen erweitern. Wir können Ressourcen sparen, wenn wir bei den Anzugdesigns auch nur ein wenig Abstriche machen. Sie sind immer noch genauso gut gegen Witterungseinflüsse oder Strahlung isoliert. Erwarten Sie allerdings nicht, dass es dem Kugelhagel standhält. Wir gehen nicht davon aus, dass die Mutanten Waffen erfunden haben, oder??"
  nf_PLS.61.a: "Das wird sich als nützlich erweisen"

  nf_PLS.62.t: "[PLS.GetName] sendet Waffen!"
  nf_PLS.62.d: "Ob um ihr Ansehen bei uns zu verbessern oder eine echte Geste des guten Willens [PLS.GetName] hat uns eine Karawane voller Militärgüter geschickt, die uns bei unseren militärischen Bemühungen helfen soll."
  nf_PLS.62.a: "Danke sehr"

  nf_PLS.63.t: "[PLS.GetName] sendet Unterstützungs-Ausrüstung!"
  nf_PLS.63.a: "Danke sehr"
  
  nf_PLS.64.t: "[PLS.GetName] sendet Spezialausrüstung!"
  nf_PLS.64.a: "Danke sehr"


  PLS_random_event.5.t: "Unsere Kaste erscheint zum Treffen"
  PLS_random_event.5.d: "Obwohl Sie und der Rest Ihrer Kaste scheinbar uneingeladen zu dem Treffen erschienen, konnte Ihre Anwesenheit die anderen kaum davon abhalten, ihre Beschwerden zu äußern."
  PLS_random_event.5.a: "Das ist bedauerlich"

  PLS_random_event.4.t: "Unsere Kaste zeigt sich zum Treffen"
  PLS_random_event.4.d: "Ihr und einige weitere aus ihrer Kaste entschieden sich dennoch zu dem Treffen zu erscheinen, auch uneingeladen. Das Treffen selbst offenbahrte wenig über die genauen Gründe ihrer Ausladung, denn ihre Anwesenheit verhinderte wohl, dass man schlecht über sie sprach."
  PLS_random_event.4.a: "Das ist gut"

  PLS_random_event.3.t: "Andere Mitglieder möchten sich ohne uns treffen!"
  PLS_random_event.3.d: "Es liegen Berichte vor, dass die anderen Ratsmitglieder ein Treffen später in dieser Woche planen. Allerdings haben sie unserer Kaste offenbar keine Einladung zum Beitritt gegeben. Diese bizarre Entscheidung hat nur dazu geführt, dass die wildesten Gerüchte in unserer eigenen Kaste zirkulieren. Ob sie eine Verschwörung gegen uns planen, bleibt abzuwarten. Wie soll mit diesem Wissen weitergegangen werden?"
  PLS_random_event.3.a: "Lassen Sie sie ohne unsere Partei zusammenkommen"
  PLS_random_event.3.b: "Erscheinen Sie trotzdem zu ihrem Treffen"
  PLS_random_event.3.c: "Nutzen Sie unsere Macht, um ihnen das Treffen zu verbieten"

  PLS_random_event.2.t: "Der Rat gewährt seine Unterstützung"
  PLS_random_event.2.d: "Der Polis-Rat ist meist streitlustig und ein schwer zu beherrschendes Biest. Die jüngsten Ereignisse im Zusammenhang mit unserer Verwaltung der Polis haben die Unterstützung des Rates erhalten."
  PLS_random_event.2.a: "Das ist gut zu hören"

  PLS_random_event.1.t: "Opposition im Rat"
  PLS_random_event.1.d: "Der Polis-Rat ist meist streitlustig und auf der Suche nach einem Grund zum Murren und er ist auch ein schwer zu beherrschendes Biest. Die jüngsten Ereignisse im Zusammenhang mit unserer Verwaltung der Polis haben den Zorn des Rates nur noch mehr auf sich gezogen. Manche äußern sich jetzt äußerlich negativ über unsere Herrschaft."
  PLS_random_event.1.a: "Das ist nicht gut zu hören"
  PLS_random_event.1.b: "Einige unterschwellige Worte werden sie zum Nachdenken bringen"