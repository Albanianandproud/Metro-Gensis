  AVT_military_3: "Das Recht Waffen zu tragen"
  AVT_military_3_desc: "Unter keinem Vorwand sollten Waffen jemals abgegeben werden. Jeder Versuch die Arbeiter der Metro zu entwaffnen, muss letztlich mit Gewalt vereitelt werden."

