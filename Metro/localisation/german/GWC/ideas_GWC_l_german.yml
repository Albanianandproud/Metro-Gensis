 GWC_infiltrated_medium_desc: ""

 GWC_infiltrated_sabotage: "Sabotage"
 GWC_infiltrated_sabotage_desc: ""

 GWC_infiltrated_frighten: "Verängstigte Bevölkerung"
 GWC_infiltrated_frighten_desc: "Ungesehene Dinge belauern unsere Station, unsere Bevölkerung ist erstarrt vor Angst."

 GWC_infiltrated_stolen_resources: "Ressourcen Gestohlen"
 GWC_infiltrated_stolen_resources_desc: ""

 GWC_infiltrated_kidnapped_children: "Vermisste Kinder"
 GWC_infiltrated_kidnapped_children_desc: ""

 GWC_blowgun_1: "Blasrohr-Handwerk"
 GWC_blowgun_2_desc: "Tödliche Spitzen"

 GWC_infiltrated_trade_stall: "Überfallene Karawanen"
 GWC_infiltrated_trade_stall_desc: "Unsere Händler wurden überfallen, doch nicht von Banditen oder Mutanten. Von etwas ganz anderem...Unsere Händler weigern sich vorerst, diesen Tunnel noch einmal zu betreten."

 savage_cannibals: "Kannibalen des großen Wurmes"
 savage_cannibals_desc: "Die Kinder des großen Wurmes sind eine technophobe, kannibalistische Gruppe, die sich am Park Pobedy verschanzt hat. Größtenteils besteht sie aus den entführten und gehirngewaschenen Kindern anderer Stationen. Sie folgen den Lehres des 'Großen Wurmes', einer Gottheit welche angeblich die gesamte Metro und die menschheit selbst erschafffen hat. Ihre Priester machen Technologie alleine für den großen Krieg verantwortlich und nennen ihre Feinde darum auch "Maschinenmenschen"

 GWC_priest_will: "\nWir werden von den Lehren des §tGroßen Wurmes§! geführt, welche uns von§Y[GWC.GetLeader]§! vorgetragen werden. Er verkündet uns den Willen des §tGroßen Wurmes§! in Form von §YZufallsereignissen§!, mal in §YPositiver§!, mal in §RNegativer§! Form."

 GWC_technophobes: "Technophob"
 GWC_technophobes_desc: "Der Große Wurm lehrt, dass Technologie an sich sündhaft ist, da sie immer zur Entwicklung von Kriegswaffen führt. Dies trifft ebenso zu auf die verwüsteten Abfälle von der Oberfläche. Der Kult ist misstrauisch gegenüber jeglichem technologischen Wachstum, auch wenn es nur geringfügig seien sollte.\n\n§RWWir werden diesen Nationalgeist niemals beseitigen können.§!"

 GWC_sickened_3: "Seuchenausbruch"
 GWC_sickened_3_desc: "Die Bewohner des Park Pobedy haben keinen Zugang zu frischem Trinkwasser oder gereinigter Luft. Sie sind den Elementen und der eindringenden Strahlung völlig schutzlos ausgeliefert"
 GWC_sickened_2: "Erholende Bevölkerung"
 GWC_sickened_2_desc: ""
 GWC_sickened_1: "Immunität"
 GWC_sickened_1_desc: "Diese Bevölkerung hat eine Generation lang mit ungereinigter Luft und schmutzigem Wasser gelebt und ist gegen einige Auswirkungen der Strahlung resistent geworden."

 GWC_supremacy_of_force_1: "Überlegener Wille"
 GWC_supremacy_of_force_1_desc: "Wir werden vielleicht nie mit der profanen Technologie der Heiden mithalten können, aber unser unbeugsamer Wille und unsere Wildheit werden ihre Waffen nutzlos machen."

 GWC_supremacy_of_force_2: "Das Recht des Stärkeren"
 GWC_supremacy_of_force_2_desc: "Richtig und Falsch sind subjektiv; moralisch und unmoralisch sind irrelevant. Am wichtigsten ist, dass die Starken unweigerlich über die Schwachen triumphieren. Gewalt ist die neue Sprache der Diplomatie."

