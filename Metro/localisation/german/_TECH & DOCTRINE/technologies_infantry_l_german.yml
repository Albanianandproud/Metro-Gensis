  ### Infantry Technologies ###
  increase_scavenge_odds_5: "Stalker-Mission-Erfolg §G+5%§!"
  gas_mask_2013: "Grundlegende Gasmaske"
  gas_mask_2013_desc: "Eine Gasmaske für Zivilisten von vor dem Krieg. Schützt gegen die einfachsten Verseuchungen."
  gas_mask_2029: "Verbesserte Gasmaske"
  gas_mask_2029_desc: "Ein verbessertes Model einer Gasmaske, erlaubt das Betreten gefährlicherer Orte."
  gas_mask_2030: "Militär-Gasmaske"
  gas_mask_2030_desc: "Eine Gasmaske speziell für das Militär und Kampfeinsätze entwickelt. Schützt sogar gegen ABC-Kampfstoffe."
  gas_mask_2031: "Kalter-Krieg-Gasmaske"
  gas_mask_2031_desc: "Gasmake des kalten Krieges, speziell angefertigt um gegen radioaktiven Staub zu schützen"
  gas_mask_2033: "Spezialeinheiten-Gasmaske"
  gas_mask_2033_desc: "Eine Gasmaske für die Vorkriegs-Spezialeinheiten. Sie wurde entwickelt um gegen Alles zu schützen, was Terroristen so einsetzen konnten."
  gas_mask_2034: "Spartaner-Gasmaske"
  gas_mask_2034_desc: "Diese Gasmasken wurden im Vergleich zum Vorgänger verstäkrt, um auch längeren Kampfeinsätzen standzuhalten."
  gas_mask_2036: "Vorkriegs-Gasmaske"
  gas_mask_2036_desc: "Das Gasmaksen-Modell, welches speziell von der russischen Regierung kurz vor dem Krieg in Auftrag gegeben wurde. Entwickelt von den klügsten Köpfen der Vorkriesgzeit."

  scrap_infantry_equipment_tech_1: "Ubonik"
  shotgun_infantry_equipment_tech_1: "Duplet"
  
  scrap_infantry_equipment_tech_2: "Geriffelter Lauf"
  scrap_infantry_equipment_tech_2_desc: "Geriffelte Läufe sorgen für eine stabilere Flugbahn der Geschosse und für eine stärkere Kühlung des Laufes." 
  shotgun_infantry_equipment_tech_2: "Verbesserter Griff"
  shotgun_infantry_equipment_tech_2_desc: "Ein verbesserter Griff stabilisert die Waffe nach jedem Rückstoß."
  conventional_infantry_equipment_tech_2: "Erweitertes Magazin"
  conventional_infantry_equipment_tech_2_desc: "Ein größeres Magazin heißt weniger Nachladen, heißt weniger Risiko für unsere Soldaten und längeren Feuerschutz."
  conventional_infantry_equipment_tech_4: "Holograpfisches Visier"
  conventional_infantry_equipment_tech_4_desc: "Erlaubt klarere Sicht auf das Ziel und weiteren Blick an die Ränder."
  conventional_infantry_equipment_tech_6: "Militärmunition"
  conventional_infantry_equipment_tech_6_desc:0 "Endlich können wir Munition wie vor dem Krieg reprouzieren. Zwar ohne Gewinn, doch mit militärischem Nutzen"

  pneumatic_infantry_equipment_tech_2: "Stahlbolzen"
  pneumatic_infantry_equipment_tech_2_desc: "Um die Zukünftige Helsing militärisch einsetzen zu können braucht es Stahlbolzen, die Glas und Körperpanzer durchdringen können."
  
  pneumatic_infantry_equipment_tech_1: "Tihar"
  conventional_infantry_equipment_tech_3: "VSK-94"
  
  pneumatic_infantry_equipment_tech_4: "Sprengpfeile"
  pneumatic_infantry_equipment_tech_4_desc:0 "Es ist wie eine Granate an den Feind zu heften, einfach genial."
  
  entrench_kits_2027: "Einfache Armeedrills"
  entrench_kits_2027_desc: "Das Wichtigste für einen Soldaten in der MEtro ist Disziplin, und dass er Befehle befolgen kann. kann er dies, so ist bereits viel gewonnen."
  entrench_kits_2028: "Grundlegende Armeedrills"
  entrench_kits_2028_desc: "Koordination ist der Schlüssel zum Erfolg und sie kommt nicht von allein. Den Männern muss beigebracht werden, Befehle zu verstehen und auch Befehle zu erteilen. Wenn das funktioniert, können sie in kleinen Gruppen zusammenarbeiten."
  entrench_kits_2029: "Fortgeschrittene Armeedrills"
  entrench_kits_2029_desc: "Der größte Teil unserer Armee wäre nach Vorkriegsstandards kaum mehr als eine organisierte Miliz. Was wir jetzt brauchen dass ist größere Fitness: Die Männer müssen lange Märsche durch die Tunnel und die Arbeit an der Draisine durchstehen können und danach auch noch kampfbereit sein."
  entrench_kits_2030: "Rudimentäre Armeedrills"
  entrench_kits_2030_desc: "Um aus unserer Truppe eine echte Armee zu machen braucht es nun einheitliche Abzeichen. Die Soldaten können nicht jedesmal nachfragen, wer welchen Rang hat."
  entrench_kits_2031: "Zusätzliche Armeedrills"
  entrench_kits_2031_desc: "Unsere Armee muss mehr können als nur Kämpfen. Sich hinter Sandsäcken und Beton zu verschanzen, auch ohne eigenen Pioniertrupp, muss in Zukunft vorrausgesetzt werden."
  entrench_kits_2032: "Umfassende Armeedrills"
  entrench_kits_2032_desc: "Das volle Equipment das eine Armee braucht, von vollständigen Uniformen, über Nähmaterial für Kleidung und Wunden bis hin zur Ausrüstung für Waffenpflege. Unsere Einheiten sehen nicht nur aus wie eine echte Armee, sie kämpft auch wie eine."
  entrench_kits_2033: "Grundlegende Spezialkräfte-Ausbildung"
  entrench_kits_2033_desc: "Die Soldaten unserer neuen Spezialeinheit werden das beste sein was die Menschheit (der Metro) zu bieten hat. Dementsprechend hart muss das Training sein, Ausdauerlauf in leeren Tunneln, Krafttraining, bessere Ernährung. Wir erschaffen menschen aus Stahl."
  entrench_kits_2034: "Komplexe Spezialkräfte-Ausbildung"
  entrench_kits_2034_desc: "Unsere Spezialeinheit genießt größere Handlungsfreiheit als eine gewöhnliche Einheit. Mit dieser Freiheit kommt auch größere Verantwortung: Unsere Sonderkräfte müssen in der Lage sein überall Alles zu können."
  entrench_kits_2035: "Strenge Spezialkräfte-Ausbildung"
  entrench_kits_2035_desc: "Unsere Spezialeinheit muss die Beste der Besten sein. Normalerweise würde dies bedeuten, dass hierfür weniger Soldaten in Frage kämen, doch stattdessen können wir auch einfach das Training verstärken."
  
  clothing_kits_2027: "Isolierte Kleidung"
  clothing_kits_2027_desc: "Die Kälte ist oft der größte Feind in der Metro, vor allem da an der Oberfläche seit über 20 Jahren nuklearer Winter herrscht. Doch dies ist ein Feind vor dem wir unsere Soldaten leicht schützen können: Mehrlagige Kleidung, Wollhandschuhe und ausgepolsterte Helme."
  clothing_kits_2029: "Gepolsterte Kleidung"
  clothing_kits_2029_desc: "Kein Schutz gegen Kugeln, aber gegen Stöße und Schläge reicht es allemal. Natürlich auch gut gegen die Kälte."
  clothing_kits_2031: "Grundlegender Körperpanzer"
  clothing_kits_3021_desc: "Dünne Stahlplatten können bereits die ein oder andere Kugel aufhalten, ein Unterschied von Leben und Tod."
  clothing_kits_2033: "Verbesserter Körperpanzer"
  clothing_kits_2033_desc: "Erbeutetes Kevlar aus Vorkriegspanzerungen kann von uns mit Leichtigkeit in unsere Kleidung oder Helme eingearbeitet werden."
  clothing_kits_2035: "Schwerer Panzer"
  clothing_kits_2035_desc: "Ganzkörperpanzer aus Keramik oder Stahl machen aus unseren Soldaten einen Ein-Mann-Panzer. Sperrig und schwer zu bewegen, hält jedoch nahezu allen Waffenarten stand."

 special_forces_equipment_1_tech:0 "Basic Special Forces Equipment" #I don't think this is used.
 
 special_forces_cap_1:0 "Spezialeinheit Kapazität I"
 special_forces_cap_1_desc:0 "Administrative improvements in the military allow for a greater amount of special operations units."
 
 special_forces_support_role:0 "Aktive Unterstützung"
 special_forces_support_role_desc:0 "Spezialeinheiten die die Versorgungsrouten freilegen oder die INfanterie unterstützen können von unschätzbarem Wert sein."
 
 special_forces_bulwark:0 "Eisernes Bollwerk"
 special_forces_bulwark_desc:0 "Unsere Spezialeinheiten müssen verstehen, dass sie die erste Verteidigungslinie gegen den Feind darstellen."
 
 special_forces_organised_detachments:0 "Organisierte Einzelkommandos"
 special_forces_organised_detachments_desc:0 "Spezialkommandos, besonders mit Stalker-Hintergrund, haben eine Tendenz ehern allein zu operieren. Während die natürlich Vorteile bringt, so müssen diese Einsätze dennoch koordiniert werden, für maximalen Effekt."
 
 special_forces_tunnel_training:0 "Unterirdisches Training"
 special_forces_tunnel_training_desc:0 "Die Tunnel sind unser Zuhause, und genauso müssen sich unsere EInheiten hier fühlen."
 
 special_forces_main_attack:0 "Hauptangreifer"
 special_forces_main_attack_desc:0 "Unsere Spezialkommandos werden die Speerspizte unserer Infanterie stellen und nicht ihre Talente im Wachdienst verschwenden."
 
 special_forces_ready_and_willing:0 "Allzeit bereit"
 special_forces_ready_and_willing_desc:0 "Eiserner Wille und erschütterliche Loyalität fallen nicht vom Himmel, diese Ideale müssen erlernt und weitergegeben werden."
 
 special_forces_front_of_the_fray:0 "Im Zentrum des Kampfes"
 special_forces_front_of_the_fray_desc:0 "Besondere Ausrüstung und bessere Waffen bringen nichts, wenn der Geist ihres Trägers nicht befreit ist."
 
 special_forces_former_spetsnaz:0 "Ehemalige Spetsnaz"
 special_forces_former_spetsnaz_desc:0 "Noch immer gibt es ehemalige Angehörige der Spetsnaz verstreut in der Metro. Für den direkten kampfeinsatz mögen viele zu alt sein, doch ihre Erfahrung ist von unschätzbarem Wert."
 
 special_forces_equipment_2_tech:0 "Improved Special Forces Equipment" #I dont think this is used.
 
 special_forces_cap_2:0 "Spezialeinheit Kapazität II"
 special_forces_cap_2_desc:0 "Unsere Erfahrung reicht nun für eine Ausweitung unserer Sonderkommandos."
 
 special_forces_equipment_heavy_tech:0 "Heavy Spec Ops Gear" #I dont think this is used.
 
 special_forces_plated_armor:0 "Plattenpanzer"
 special_forces_plated_armor_desc:0 "Schusssichere Westen können mit geringem Aufwand weiter verstärkt werden, entweder mit Stahl oder mit Keramik."
 
 special_forces_all_eyes_on_me:0 "Schutzschilde"
 special_forces_all_eyes_on_me_desc:0 "Große schwer gepanzerte Schilde, welche früher von der Terrorabwehr eingesetzt wurden. Sie halten den meisten Beschussarten stand und lenken das Feuer auf sich."
 
 special_forces_equipment_light_tech:0 "Light Spec Ops Equipment" #I dont think this is used.
 
 special_forces_subversive_activities:0 "Subversive Aktivitäten"
 special_forces_subversive_activities_desc:0 "Unsere Spezialeinheiten können mehr Aufklärung leisten als der gewöhnliche Soldat."
 
 special_forces_skulking_darkness:0 "Skulking Darkness"
 special_forces_skulking_darkness_desc:0 "Mit den richtigen Fähigkeiten in Survival und Stealth braucht es weniger Wartung und Munition."
 
 special_forces_cap_3:0 "Spezialeinheit Kapazität III"
 special_forces_cap_3_desc:0 "Unsere Spezialeinheiten genießen inzwischen einen guten Ruf unter den Soldaten und unserer Führung, dementsprechend groß ist inzwischen die Nachfrage."
 
 special_forces_equipment_light_tech_2:0 "Improved Light Spec Ops Equipment" #I dont think this is used.
 
 special_forces_war_redefined:0 "Neue Kriegsführung"
 special_forces_war_redefined_desc:0 "Die Geschwindigkeit mit welcher unsere Stalker vorrücken werden wird die Kriegsführung an der Oberfläche für immer revolutionieren."
 
 special_forces_equipment_heavy_tech_2:0 "Improved Heavy Spec Ops Equipment" #I dont think this is used.
 
 special_forces_the_heavy:0 "MG-Schütze"
 special_forces_the_heavy_desc:0 "MG-Schützen brauchen vor allem eines: Ausdauer."
 
 special_forces_cold_training_3:0 "Winter Training III"
 special_forces_cold_training_3_desc:0 "Bevor sie in unsere Spezialeinheiten dürfen, mussen die Anwärter erst einmal eine Woche in den kältesten Tunneln überleben. Wer es nicht schafft, kommt zurück in die normale Infanterie."
 
 special_forces_cold_training_2:0 "Winter-Training II"
 special_forces_cold_training_2_desc:0 "Ein paar Ausflüge an die Oberfläche bringen unseren Soldaten den ewigen Winter näher."
 
 special_forces_cold_training_1:0 "Winter-Training I"
 special_forces_cold_training_1_desc:0 "Bringt ihnen bei wie man die Ausrüstung trocken hält, dann ist schon viel geschafft."

 nkvd_equipment:0 "NKVD-Ausrüstung"
 nkvd_equipment_desc:0 "Equipment und Schutzausrüstung um die lange Hand des Staates zu schützen"

spec_ops_equipment_2_tech:0 "Keramik-Panzerung"
spec_ops_equipment_2_tech_desc:0 "Eine Panzerung wie aus der Vorkriesgzeit. Keramik ist leichter, härter und splittert weniger als Stahl."

spec_ops_equipment_3_tech:0 "Patronengurt"
spec_ops_equipment_3_tech_desc:0 "Ein Schultergurt um Patronen, aber auch Granaten oder Zubehör einfach mit sich führen zu können, immer griffbereit für einen Einsatz."

spec_ops_equipment_5_tech:0 "Geiger-Zähler
spec_ops_equipment_5_tech_desc:0 "Wir haben nicht genug Geigerzähler für alle unsere Soldaten, doch unsere Spezialeinheiten werden gut eingedeckt sein."

spec_ops_equipment_6_tech:0 "Polymer-Fasern"
spec_ops_equipment_6_tech_desc:0 "Bedeutend reißfester als konventionelle Fasern. Ihre synthetische Produktion macht sie wasserfest und dennoch leicht."

spec_ops_equipment_8_tech:0 "Autoinjector"
spec_ops_equipment_8_tech_desc:0 "Eine konstante Überwachung der Biologie unsere Spezialeinheiten erlaubt es automatisch festzustellen, wann sie eine Dosis Morphium brauchen."

spec_ops_equipment_9_tech:0 "Kampfsimulation"
spec_ops_equipment_9_tech_desc:0 "VR war die Zukunft, als der Große Krieg ausbrach. Die Zukunft ist jetzt."

