l_german:
 PEC_stepanov: "Stepanov Metchnikoff"
 PEC_STEPANOV_DESC: "Mit dem Alter kommt auch die Weisheit. Aber nichts davon konnte den Zusammenbruch und den Rückschritt der Moskauer Gesellschaft vorhersehen. Stepanov, der anfangs glaubte, er könnte langsam seinen Lebensabend genießen, fand sich nach dem Krieg knietief in der sprichwörtlichen Scheiße wieder. Trotz seiner anfänglichen Zurückhaltung stellte er fest, dass in ihm eine starke, natürliche Begabung für die Führung steckte. Seine friedliche und liebenswürdige Führung der Republik löste in seinem kleinen Teil der Metro schnell ein Zeitalter des Friedens aus, obwohl sich sein Geisteszustand in den letzten Jahren leicht verschlechtert hat. Die Republik rutscht nun ganz langsam wieder in die Dunkelheit zurück. Aber Stepanow strahlt immer noch eine kühne Aura aus, eine die selbst seine hartnäckigsten Kritiker nicht ignorieren können."
 
