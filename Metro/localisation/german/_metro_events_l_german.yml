l_german:
 nf_metro.1.t:0 "BETA BETA BETA BETA!!!!!!!!!!!!"
 nf_metro.1.d:0 "Welcome to the Metro HOI4 Mod! If you see this message then you are playing the BETA branch of the Metro Mod. This is not the final draft. Not everything is completed for a release to main.\nAs expected you will most likely encounter many, many bugs and errors. Player discretion is advised. Please report any errors or glitches you encounter on the discord. Or to HEAVY through steam. Thankyou \n-Metro Genesis Dev Team"
 nf_metro.1.a:0 "Thank you"

 nf_metro.4.t:0 "Faschisten in der Tiefe"
 nf_metro.4.d:0 "Es gibt Bewegungen in unseren Metrotunneln, die uns Sorge bereiten. Es ist nicht das gewöhnliche Ungeziefer, nein es sind Menschen und sie tragen Uniformen!"
 nf_metro.4.a:0 "Hier gibt es mehr als die Ratten, die uns Sorgen bereiten"

 nf_metro.5.t:0 "Vom Reich abgetrennt"
 nf_metro.5.d:0 "Nachdem wir Stortbeker die Heimkehr ins Reich verweigerten, zog es ihn nach Süden, um dort mit seinen Operationen fortzufahren. Die Kommunikation mit seiner Brigade war aufgrund der großen Distanz schon immer schwierig, doch nun wird sie nahezu unmöglich."
 nf_metro.5.a:0 "Ok"

 nf_metro.6.t: "Industrielles Wachstum"
 nf_metro.6.d: "Mit dem Ausbau unserer industriellen Basis ist auch unser Energieverbrauch in jüngster Zeit gestiegen. Unsere Techniker und Werkbänke benötigen mehr Strom, um den wachsenden Anforderungen gerecht zu werden. Wir müssen sicherstellen, dass die Energieversorgung aufrechterhalten und Engpässe vermieden werden – sei es durch den Bau weiterer Raffinerien, den Energiehandel mit benachbarten Stationen oder alternative Methoden."
 nf_metro.6.a: "Wir werden das im Hinterkopf behalten."