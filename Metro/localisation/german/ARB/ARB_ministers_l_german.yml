 ARB_islam: "Islam"
 ARB_ISLAM_DESC: "Die tapfersten Herzen sind jene, die sich an Allah halten; selbst wenn dies schwer fällt.\n\nIslam war der einzige Sohn eines Imams, der Zuflucht in der Moskauer Metro suchte, als Islam gerade einmal 15 Jahre alt war. Sein Vater wurde in Tschetschenien geboren und erlebte beide Tschetschenienkriege. Trotz Berichten aus erster Hand über Gräueltaten, die auf beiden Seiten während des Krieges begangen wurden, scheute sein Vater nicht davor zurück, das Gewehr zur Hand zu nehmen, sehr zum Entsetzen der Bewohner seines Dorfes.\n\nIm erste Metrokrieg dann von den Roten als "Kontrarevolutionäre Kraft" angeklagt und hingerichtet, sehnt sich Islam nun nach Rache und fanatisierte seinen eigenen Glauben."

