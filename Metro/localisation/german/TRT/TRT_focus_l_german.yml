 TRT_hanza_friendship: "Freunde des Adlers"
 TRT_hanza_friendship_desc: "Sicher, diese Hanse-Wichser haben auf unsere Jungs geschossen, aber wir haben jetzt einen Insider, der bereit ist dafür zu sorgen, dass die Hanse von unserem Geschäft absieht. Solange wir nicht ihre Karawanen überfallen werden diese Hanse-Wichser wegschauen."

 TRT_a_tunnel_too_far:0 "Ein Tunnel zu weit"
 TRT_a_tunnel_too_far_desc:0 "Die Hanse? Wer zum Teufel soll uns sagen, was wir tun sollen? Unsere Jungs gehen, wohin sie wollen; Scheißen, trinken und ficken, wie es ihnen gefällt. Kein hochnäsiger und noch so machtgeladener Stationschef wird uns herumschubsen!"
 TRT_borderwar_hanza:0 "Ermöglicht eine §YEntscheidung§! einen §RGrenzkonflikt§! gegen die [HNZ.GetNameWithFlag] zu entfachen"
