  #Decisions

  hunt_for_D6: "Die Suche nach §C D-6§!"
  hunt_for_D6_desc: "The race is on! Whether or not this supposed government installation exists, we must be the first one to uncover its secrets!\n\nWe need §Y10§! £D6_clue_texticon Leads to launch an expedition.\n\nOur Current amount of £D6_clue_texticon Leads we have:  §Y[?D6_discovery_threshold]§!."

  execute_scavenge_D6_search: "Die Suche nach £D6_clue_texticon führt uns zur §CMetro-2§!"
  execute_scavenge_D6_search_desc: ""
  D6_participant: "Sucht aktiv nach §C Д-6 §!"
  D6_activate: "Die Suche nach Д-6 ist aktiv"
  D6_meet_required_threshold: "Der erforderliche Schwellenwert wurde nicht erreicht"

  execute_scavenge_METRO_2_search: "Sucht nach der §CMETRO-2§!"
  execute_scavenge_METRO_2_search_desc: "Angeblich existiert tief unterhalb der Moskauer Metro selbst eine weitere Metro., die §CMETRO-2§!, die von Geheimnissen und Mysterien umgeben ist. In erster Linie zur Unterbringung von Regierungsbeamten im Falle eines nuklearen Armageddons während des Kalten Krieges konzipiert, liegen angeblich kilometerlange unerforschte Gleise und Räume im Verborgenen, reif für uns zum Plündern."
  D6_METRO_2_available: "Kann nach der §CMETRO-2§! suchen"
  can_now_find_D6: "Hat bereits die §CMETRO-2§! gefunden"
  execute_scavenge_METRO_2_search_mission_first_reward: "\nWir haben einen §YVorteil§! wenn wir die ersten sind die die §CMETRO-2§! entdecken"
  execute_scavenge_METRO_2_search_mission_tt: "Schaltet eine §YEntscheidung auf Zeit§ frei! woraufhin wir Expeditionen schicken werden, um einen Weg zur §CMETRO-2§ zu finden!."

  METRO_2_search_mission_send_sorties: "Beauftragen Sie erfahrene Stalker"
  METRO_2_search_mission_send_sorties_desc: "Stellen Sie Personen ein, die über umfassende Kenntnisse darüber verfügen, wie man jeden Winkel und jede Ritze richtig durchsucht, um unsere Bemühungen zu unterstützen"
  METRO_2_search_mission_fund_expeditions: "Finanziert eine Expedition"
  METRO_2_search_mission_fund_expeditions_desc: "Warum nur einen Einsatzhaben, wenn wir tatsächlich mehrere haben könnten??"

  execute_scavenge_METRO_2_search_mission: "Sucht nach einem Weg in die §CMETRO-2§!"
  searching_has_cancelled: "Unsere Suche ist abgeschlossen!"

  execute_scavenge_D6_lead: "Findet §CD6§!"
  execute_scavenge_D6_lead_desc: "Das ist es. Wir wissen, wo D6 liegt und müssen es jetzt ein für alle Mal finden. Wir können es uns nicht leisten, mit leeren Händen zurückzukehren – wir werden mit wertvollen Reichtümern nach Hause zurückkehren, oder gar nicht."

  execute_scavenge_D6_buy_from_collector: "Kauft es von einem Sammler"

  #Events

  nf_D6_discovery.1.t: "Pandoras Büchse"
  nf_D6_discovery.1.d: "Legenden erzählen von einem äußerst weitläufigen U-Bahn-System, welches unterhalb der öffentlichen Metro errichtet seien soll. Zu Stalins Zeiten wurde sie vom KGB mit dem Codenamen D-6 versehen und sie war bis 2013 noch voll funktionsfähig. Gerüchten zufolge ist ihre Länge und Breite sogar noch größer als die der Moskauer U-Bahn und tiefer als die Sokolnitscheskaja-Linie. Tief unter der Erde vergrabene Anlagen, Kommandoposten und sogar ganze Städte. In all seiner Pracht einfach leer zurück gelassen.\n\nEs scheint, als ob andere U-Bahn-Stationen ihr Interesse an der Suche nach dieser angeblichen Metro-2 bekräftigt hätten. Nur die Zeit wird zeigen, ob diese Legenden nun wahr sind oder nicht."
  nf_D6_discovery.1.a: "Wir werden dieses Unterfangen in Angriff nehmen!"
	nf_D6_discovery.1_tt: "Schaltet die Entscheidungen frei, nach §C Д-6§! zu suchen. Seien Sie jedoch gewarnt, Sie sind nicht der einzige Aktive, der danach sucht!"

  nf_D6_discovery.1.b: "Besser noch, lassen Sie uns diesen Vorbehalt nicht näher untersuchen"
	nf_D6_discovery_refusal_tt: "Wir werden uns an der Suche nach §C Д-6 §! nicht beteiligen"

  nf_D6_discovery.2.t: "Unsere Suche trägt Früchte!"

  nf_D6_discovery.2.d_1: "Unsere erste Expedition, die gestartet wurde, um Spuren der METRO-2 zu entdecken, hat nun endlich Früchte getragen!\nAngebliche Berichte von ehemaligen Metro-Arbeitern und Zugfahrern scheinen auf die Existenz von METRO-2 oder zumindest auf ein schwer fassbares privates Metro-System hinzuweisen, das der Öffentlichkeit nicht zugänglich ist. Quellen zufolge wurden tief unten mehrere Kommunikationskomplexe für den Fall eines Atomkrieges errichtet. Allerdings verschlechterte sich die Ausstattung und wurde altersbedingt unbrauchbar. Insbesondere ein System unterirdischer U-Bahn-Tunnel und Schächte unter bestimmten Stationen, vor allem unter der Roten Linie, die Berichten zufolge überflutet und teilweise eingestürzt sind."
  nf_D6_discovery.2.d_2: "Unsere erste Expedition, die gestartet wurde, um Spuren der METRO-2 zu entdecken, hat nun endlich Früchte getragen!\nDie Metro-2 ist nun in aller Munde, aber das tatsächliche Wissen darüber, was es enthält, bleibt mit Sicherheit abzuwarten. Angeblich sind die Metro-Linien mit hermetischen Toren und Filtern zur Luftreinigung ausgestattet. Eine Zeit lang war METRO-2 tatsächlich bewohnt, obwohl das wahre Ausmaß seiner Besiedlung immer noch ein unglaubwürdiges Gerücht bleibt. Die überlebende Führung des Landes suchte Zuflucht in einigen der METRO-2-Unterkünfte – jenen, die näher an den Verkehrsadern Moskaus lagen. Wissenschaftler, Militärbeamte und Regierungsvertreter suchten hier Zuflucht. Anscheinend wurde METRO-2 von einer feindlichen Einheit überrannt, was eine Notevakuierung dieser Flüchtlinge in die zivile U-Bahn zur Folge hatte. Das Schicksal dieser Überlebenden bleibt unbekannt, obwohl es Berichte gibt, dass einige nach Polis geflohen sind, wo sie als amtierende Mitglieder des Rates tätig sind."
  nf_D6_discovery.2.d_3: "Unsere erste Expedition, die gestartet wurde, um Spuren der METRO-2 zu entdecken, hat nun endlich Früchte getragen!\nAngeblich soll ein solcher Eingang zu D6 unterhalb des Kremls selbst existieren. Die unausgesprochene Regel unter den Stalkern macht es jedoch nahezu unmöglich, in den Ruinen des Kremls herumzustöbern. Es scheint jedoch, dass es viele andere Orte gibt, an denen wir einen Zugang zu D6 finden können, beispielsweise durch Regierungskomplexe aus der Vorkriegszeit. Sogar weit draußen in den Vororten von Moskau gibt es angeblich Zugänge zur Metro 2 selbst. Es ist nicht bekannt, ob diese Zugänge gefunden wurden oder noch sicher verschlossen sind.\n"
  nf_D6_discovery.2.d_4: "Unsere erste Expedition, die gestartet wurde, um Spuren der METRO-2 zu entdecken, hat nun endlich Früchte getragen!\nAus der Zusammenstellung fragmentierter Berichte und vager Beweise für METRO-2 sind wir zu einer groben Vorstellung der einzelnen Linien gekommen, die METRO-2 miteinander verbinden. Es gibt 4 Eingänge;  Wnukowskaja, Tschechowskaja, Balaschichinskaja und Rubljowskaja. Alle vier münden in den Kreml und führen durch die verschiedensten Teile der Stadt, direkt unter den wichtigsten Gebäuden Moskaus hindurch. Der erste führt nach Ramenki und zum geheimen Regierungsterminal Wnukowo-2, der zweite nach Süden zum alternativen Kommandoposten des Generalstabs, der dritte zur Untergrundstadt Sarja und der vierte nach Rubljowka und Stalins Datscha in Kunzevo."
  nf_D6_discovery.2.a: "Gute Arbeit"
	D6_lead_add_tt: "Fügt Hinzu: 2 £D6_clue_texticon Hinweise"

  nf_D6_discovery.3.t: "Suche führt in eine Sackgasse"
  nf_D6_discovery.3.d: "Unsere erste Expedition die gestartet wurde um Spuren der METRO-2 zu entdecken, stieß auf unerwartete Probleme. Die Hinweise, die unsere Regierung offenbar hatte, führten zu ihrem vorzeitigen Abschluss und sind von keinem Wert mehr für uns. Es scheint, als müssten wir wieder ans Zeichenbrett gehen und unsere Suche mit neuen Hinweisen noch einmal versuchen."
  nf_D6_discovery.3.a: "Verdammt"

  nf_D6_discovery.4.t: "§C Д-6§!-Durchbruch!"
  nf_D6_discovery.4.d: "Unsere erste Expedition, die gestartet wurde, um Spuren von METRO-2 zu entdecken, hat Früchte getragen! Und mehr, als wir zunächst erwartet hatten. Wir haben genügend Informationen gesammelt, um mehr über die METRO-2 zu erfahren."
  nf_D6_discovery.4.a: "Gute Arbeit!"

  nf_D6_discovery.5.t: "METRO-2 entdeckt!"
  nf_D6_discovery.5.d: "Die heruntergekommenen Überreste der METRO-2 wurden entdeckt und wir fanden nicht das was wir erwartet hatten. Scheinbar heruntergekommener als die Moskauer U-Bahn selbst ist es noch unklar, ob die sagenumwobenen Kommunikationsbunker und unterirdischen Städte tief im Inneren existieren oder nicht."
  nf_D6_discovery.5.a: "Wir müssen noch tiefer gehen..."
  D6_now_can_search_for_D6: "Da die METRO-2 definitiv existiert, können wir jetzt mit der Suche nach D6 beginnen ..."

  nf_D6_discovery.6.t: "§C Д-6§! Buch gefunden!"
  nf_D6_discovery.6.d: "TADA"
  nf_D6_discovery.6.a: "Gute Arbeit!"

  nf_D6_discovery.10.t: "METRO-2: Nachtrag"
  nf_D6_discovery.10.d: "Nach intensiver Untersuchung aller fragmentierten Beweise für die Existenz der METRO-2 ist es uns gelungen, mehrere vage Stellen herzuleiten, an denen wir möglicherweise in die METRO-2 selbst eindringen können. Wir sollten so schnell wie möglich eine Expedition starten, bevor uns jemand anderes zuvorkommt."
  nf_D6_discovery.10.a: "Alle Einheiten bereit halten!"
	nf_D6_discovery_lead_tt: "Nun da wir genügend Hinweise gesammelt haben, müssen wir eine Expedition starten, um einen Weg in Metro-2 selbst zu finden. Lassen Sie keine dunkle Ecke undurchsucht!"

  nf_D6_discovery.11.t: "Sackgassen"
  nf_D6_discovery.11.d: "Es scheint, dass sich unser Expeditionsteam bei der Suche nach einem Eingang zu D6 verirrt hat. Oder sie haben ihre Koordinaten falsch angegeben. In jedem Fall gehen wir zurück zum Zeichenbrett, um unsere Expeditionspläne neu zu entwerfen."
  nf_D6_discovery.11.a: Verdammt"

  nf_D6_discovery.12.t: "Der Weg nach D-6"
  nf_D6_discovery.12.d: "D6 liegt in unserem Visier. Unseren Streitkräften ist es gelungen, den genauen Standort von D-6 zu ermitteln – der Militärbunkeranlage, in der angeblich die russische Nachkriegsregierung untergebracht werden sollte. Wir sollten eine Expedition zu diesem System starten, bevor uns jemand anderes zuvorkommt"
  nf_D6_discovery.12.a: "Kontaktieren Sie umgehend alle Einheiten!"

  nf_D6_discovery.13.t: "Entdeckung von D-6"
  nf_D6_discovery.13.d: "Wir haben D6 in einem völlig verlassenen und extrem vernachlässigten Zustand vorgefunden. Es scheint tatsächlich, dass dieser Ort einst bewohnt war. Die Hauptanlage ist jedoch mit giftigem Gas gefüllt, sodass die Verwendung einer Gasmaske erforderlich ist. Der Anlage mangelt es völlig an Strom und es wimmelt in den tieferen Teilen der Anlage von seltsamen amöbenähnlichen Kreaturen, die sich zu einer einzigen gewaltigen Biomasse vereint zu haben scheint. Was auch immer diese Kreaturen erschafft, muss zuerst gestoppt werden, bevor wir ordnungsgemäßen Zugriff auf die Installation erhalten können."
  nf_D6_discovery.13.a: "Stürmt hinein, alle Waffen feuer!"
  nf_D6_discovery.13.b: "Versuchen Sie, die Biomasse zu sprengen"

  nf_D6_discovery.14.t: "D6 Biomasse greift an!"
  nf_D6_discovery.14.d: "D6 ist befallen! Eine große mutierte Masse aus Fleisch und fauliger Biomasse lag tief im Kernreaktor im Epizentrum von D6. Riesige Tentakel ragen aus der von Pusteln übersäten Masse hervor und dienen dazu, jeden oder alles zu töten, das in ihr Reich gelangt. Die Biomasse muss abgetötet werden, wenn wir die Kontrolle über D6 übernehmen wollen"
  nf_D6_discovery.14.a: "Stürmt hinein, alle Waffen feuer!"
  nf_D6_discovery.14.b: "Nehmen Sie eine vorsorgliche Haltung ein"

  nf_D6_discovery.15.t: "Aktivierung des D6-Generators"
  nf_D6_discovery.15.d: "Nachdem die Biomasse schnell erledigt wurde, kommt nun offensichtlich der schwierigere Teil der Operation. Der Reaktor muss schnell und manuell reaktiviert werden. Wenn die Biomasse erst einmal verschwunden ist, wer weiß, welche anderen Kreaturen noch in der Dunkelheit auf uns lauern."
  nf_D6_discovery.15.a: "Schließen Sie die Leistungsschalter an, löten Sie die Leitungen; Es ist wirklich ganz einfach..."
  nf_D6_discovery.15.b: "Das wird einige Zeit dauern ... Hat jemand Licht?"

  nf_D6_discovery.16.t: "D6 gehört nun uns"
  nf_D6_discovery.16.d: "Da die Biomasse nun neutralisiert und das Stromnetz eingeschaltet ist, scheint D-6 in Ordnung zu sein. Ein großer Teil der Anlage bleibt jedoch immer noch ungesichert und weitere Bedrohungen bleiben abzuwarten. Aber vorerst ist der Komplex jetzt in Betrieb und wir können jetzt die Basis richtig aufbauen."
  nf_D6_discovery.16.a: "Gute Arbeit"
  # Random Event

  nf_D6_discovery_random_event.1.t: "Händler bietet Artefakt an"
	nf_D6_discovery_random_event.1.d: "Berichten zufolge ist ein Händler in unserer Station Eigentümer einer fragmentierten Karte der Metro-2. Trotz unseres Drucks, die Karte herauszugeben und unsere Suche zu unterstützen, hat der Händler bisher hartnäckig gezögert, es herauszugeben. Vielleicht können wir ihn dazu bringen, sich von seiner Kuriosität zu trennen?"
	nf_D6_discovery_random_event.1.a: "Kaufen Sie die Kuriosität beim Händler"
	nf_D6_discovery_random_event.1.b: "Wir können uns den Kauf im Moment nicht leisten"
  nf_D6_discovery_random_event.1.b_tt: "Schaltet die Entscheidung frei, die Karte zu einem späteren Zeitpunkt zu kaufen"
  nf_D6_discovery_random_event.1.c: "Konfisziert die Kuriosität von ihm!"

  nf_D6_discovery_random_event.2.t: "Fremder gibt Ratschläge"
  nf_D6_discovery_random_event.2.d: "Während wir durch die Tunnel fahren, taucht bei einem unserer Einsätze plötzlich ein alter Mann aus einem der Seitenschächte auf. Er richtete sich auf, als er die Männer sah, und sprach in einem verzweifelten Murmeln, während seine Hand unregelmäßig in der erstickten Luft wedelte, als würde er nach etwas greifen. Als würde er versuchen, etwas zu schreiben, gibt ihm einer Ihrer Soldaten einen Stift und Papier, und er beginnt einfach, grobe Kringel aus Linien und Kreisen zu zeichnen und verschwindet in der Dunkelheit, sobald der Vorfall zu Ende ist. Auf den zweiten Blick enthüllte das Papier eine Skizze der nahegelegenen Tunnel. Einige davon waren unserer Verwaltung bisher tatsächlich unbekannt"
  nf_D6_discovery_random_event.2.a: "Was für eine seltsame Begegnung"

  #

 nf_D6_advisor.1.t: "Unwahrscheinliche Hilfe"
 nf_D6_advisor.1.d: "Es scheint, dass die Besetzung von D-6 viel Aufmerksamkeit erregt hat. Kürzlich hatten unsere Einsätze einen, wie wir glaubten, feindlichen Agenten festgenommen, der sich in der Nähe von D6 befand. Im Verhör behauptet der Soldat jedoch, kein Spion irgendeiner Art zu sein, sondern tatsächlich ein ehemaliger Überrest des D6-Komitees. Er lobte uns für die Beseitigung der Biomasse, die den Bunker befallen hatte. Seine Arbeit diente ursprünglich der Berechnung der Effektivität von Virtual-Reality-Kampfsimulationen und wurde später eingestellt, als D6 evakuiert wurde. Anstatt zusammen mit dem Rest des Wissenschaftsteams nach Polis zu fliehen, verschwand der Soldat jedoch spurlos in der Metro. Der Soldat möchte offenbar wenig darüber verraten, wo er sich in der langen Zeitspanne aufgehalten hat, wünscht sich aber sehr, sich nun unseren Reihen anzuschließen, nachdem D6 neu besiedelt und wieder funktionstüchtig gemacht wurde. Er bietet uns Treue an

."
 nf_D6_advisor.1.a: "Champion des Turms, willkommen zu Hause"
 nf_D6_advisor.1_tt: "Solange wir §Y[106.GetName]§! besitzen, wird der Kapitän unsere Truppen anführen"

 nf_D6_advisor.2.t: "Der Kapitän ist fort"
 nf_D6_advisor.2.d: "Ob er in der anschließenden Schlacht um D6 getötet wurde, ausrutschte, bevor die Schlacht überhaupt begonnen hatte, oder ob er bis zum bitteren Ende kämpfte, der Kapitän ist tod. Ein unpassendes Ende, um es gelinde auszudrücken."
 nf_D6_advisor.2.a: "Bis dann, Kapitän"



