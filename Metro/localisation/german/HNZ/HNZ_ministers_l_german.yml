  ### Country Leaders ###

  HNZ_invisible_observer: "Moskauer Verteidigungsrat"
  HNZ_russia_government_remnants: "Moskauer Überreste"

  HNZ_kovalenko: "Denis Kovalenko"
  HNZ_kovalenko_desc: "§9«Die Zeit hatte ihre Hand auf sein ergrauendes Haar gelegt, doch seinen Geist unberührt gelassen. Er trug sein Alter, wie ein Gelehrter seine Bücher trägt; denn seine Kampfnarben trug er wie glänzende Orden aus einem Krieg, der in ferne Erinnerung zu entschwinden begann.»§!\n\nKowalenko, der ehemalige Leiter der Station Komsomolskaja und derzeitige erste amtierende Präsident des Vereinigten Stationen der Ringlinie, wurde von antikommunistischen Kräften aufgrund seines politischen Geschicks einstimmig als Held gefeiert. Er hatte sich durch seinen mutigen Schritt ausgezeichnet, einen vorübergehenden Waffenstillstand mit der Roten Linie auszuhandeln, um das Leben der in Komsomolskaja-Radialnaja eingekesselten Soldaten zu retten. Schließlich handelte er auch die ersten Friedensbedingungen aus – eine Leistung, die seine Kandidatur für das Präsidentenamt so gut wie sicher machte.\n\n"

  HNZ_zvorykine: "Vladislav Zvorykine"
  HNZ_zvorykine_desc: "§9«Groß und hager, mit kahlgeschorenem Kopf und einer kompromisslosen Ausstrahlung, ist er ein Familienvater von etwas über fünfzig Jahren – geprägt von puritanischen Moralvorstellungen und auf seine ganz eigene Weise religiös.»§!\n\nZvorykin, der kürzlich zum amtierenden Präsidenten der Hanseatischen Liga aufgestiegen ist, verfolgt das Ziel, das Bündnis auf einen unerwarteten Kurs zu lenken: weg von bescheidener Zurückhaltung, hin zu Gewinnmaximierung und aggressiver Optimierung. Dennoch üben sein ernster Gesichtsausdruck, sein Mangel an Humor und sein unbedingter Drang, sich ausschließlich auf wesentliche politische Belange zu konzentrieren, eine unbestreitbare Anziehungskraft aus, die ihm die volle Aufmerksamkeit seiner Zuhörer sichert. Sollte der Teufel persönlich jemals einen Trick zur Steigerung der Produktivität feilbieten – Zvorykin würde zweifellos keine Sekunde zögern."



  ## Loginov ##

  HNZ_loginov:0 "Valeri Petrovich Loginov"
  HNZ_LOGINOV_DESC:0 "Der derzeit amtierende Präsident des Stationenbundes der Ring Linie. Unter seiner Aufsicht führt er die relativ junge Nation durch die knifflige Politik der Metro. Doch unter seiner sorgfältigen Gelassenheit wird ein gebrochener Mann von den Seelen derer heimgesucht, denen er während des blutigen Hanse-Rotlinien-Krieges eine falsche Hoffnung auf Asyl gegeben hat. Die Entscheidung, sogenannte „antirevolutionäre“ Andersdenkende nach dem Krieg der Roten Linie zu übergeben, um damit seine eigenen Truppen zu retten, war zwar der Auslöser für seine politische Karriere, doch das Blut von Männern, Frauen und Kindernklebtbefleckt noch heute seine Hände."
  loginov_polis_committee_member:0 "Ehemaliges Ausschussmitglied"
  loginov_arbat_resident:0 "Ehemalige Bewohner der Sokolnitscheskaja-Linie"
  loginov_pursuit_of_profit:0 "Gewählt – Streben nach Gewinn"
  loginov_neutrality:0 "Gewählt – Zustand der Neutralität"
  loginov_defender:0 "Gewählt – Verteidigung des Rings"
  loginov_haunted:0 "Vom Bedauern heimgesucht"

  ## General Manager ##

  HNZ_general_manager:0 "Hauptgeschäftsführer"
  HNZ_MANAGER_DESC:0 "Der Repräsentant der herrschenden Elite der Hanse befindet sich in einem privaten Bunker unter der Station Polyanka. Ein wirklich unauffälliger Mann mit einer bemerkenswert mächtigen Position. Unter seinem Deckmantel orchestriert er die Wünsche und Forderungen der illustren Elite und führt ihre geheimnisvollen Befehle aus."
  
  ## Donator Exclusive ##

  HNZ_whataburger_will:0 "Der Yankee"
  HNZ_whataburger_will_desc:0 "Obwohl er aus den Vereinigten Staaten stammt, wird er oft als gütig und liebenswürdig beschrieben. Ein Mann mit sanfter Stimme, trotz seines umfangreichen Wissens über manipulierte Schusswaffen und nachgerüstete Kleinwaffen. Auch wenn die Sprachbarrieren weiterhin bestehen, ist er in der Lage und willens, unsere Waffenproduktion zu überwachen. Obwohl die Leute ihn noch immer wegen seiner Nationalität misstrauen; er stammt aus der Nation, die den Dritten Weltkrieg auslöste."

  ## Advisors ##

  HNZ_foreign_soldier:0 "Rutger De Vries"
  HNZ_FOREIGN_SOLDIER_DESC:0 "Ein niederländischer Söldner, der zahlreiche Touren im tiefen, dunklen Herzen Afrikas unternahm. Rutger De Vries trägt seine Weisheiten von einem chaotischen Krieg zum nächsten. Krieg ist für ihn nur ein Spiel, und alles was zählt, ist, dass die Bezahlung angemessen ist."
  
  HNZ_russian_badass:0 "Viktorovich Bochkarev"
  HNZ_RUSSIAN_BADASS_DESC:0 "Ein rein russischer Draufgänger im wahrsten Sinne des Wortes. Seine Heldentaten erfüllen neue Rekruten mit Ehrfurcht und Inspiration. Er hat mit nichts weiter als einem halb leeren Magazin und einem breiten Lächeln durch die düstere Tiefe des Gefechts gestanden.
  
  HNZ_dedushka:0 "Sergei Yasnov"
  HNZ_DEDUSHKA_DESC:0 "Von jüngeren Rekruten „Dedushka“ genannt, war Yasnov ein Veteran, der Mitte der 90er Jahre in den Tschetschenienkriege mit Auszeichnung diente. Mit dem Alter kommt die Weisheit, und Yasnov ist sicherlich ein Beispiel dafür. Er vermisst nicht nur das, was die Welt vorher war, er vermisst auch den Kampf. Das Einfangen von Kugeln und der Regen von Schüssen. Er kehrt zurück, um sich ein letztes Mal in den Kampf zu stürzen, bevor er endgültig zu alt wird."
  
  HNZ_pavel_nikolaevich:0 "Pavel Nikolaevich"

