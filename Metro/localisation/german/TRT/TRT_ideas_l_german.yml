l_german:
 
 TRT_mere_thugs:0 "Nichts als Gangster"
 TRT_mere_thugs_desc:0 "Von außen betrachtet wirkt Venedig wie eine geeinte Gemeinschaft, dabeiist sie nur eine bloße Ansammlung von Banditen und armen Leuten. Die Aufrechterhaltung einer ansonsten geeinten Gruppe ist nur eine Illusion. Struktur und Alltag sind an den einzelnen Stationen im Banditendreieck völlig unterschiedlich."

 TRT_city_on_stilts_idea:0 "Ein Dorf auf Stelzen"
 TRT_city_on_stilts_idea_desc:0 "Wie die italienische Stadt, nach der Venedig benannt ist, handelt es sich auch hier um eine auf Stelzen errichtete Siedlung. Das Banditendreieck hat kürzlich die eigenen Stationen überschwemmt. Nun stehen die Überlebenden vor der langen und mühsamen Aufgabe, ihre Gemeinden wieder aufzubauen."

