l_german:
 RCH_future_update_tt:0 "This focus will be expanded upon in Future Updates!"
 RCH_not_SS_aligned_tt:0 "Kein SS-Einfluss"
 RCH_not_metromacht_aligned_tt:0 "Kein Metromacht-Einfluss"
 RCH_incompleted_subtree_tt:0 "This focus branch is still WIP!"

 RCH_uncontested_authority:0 "Unangefochtene Authorität"
 RCH_uncontested_authority_desc:0 "Russland ist erwacht! Unsere widerwärtigen Feinde schweigen an diesem glorreichen Tag, an dem wir verkünden, dass unser geliebtes Vaterland nun von neuem zu leben beginnt. Eine glorreiche Zeit liegt vor uns, die alte Welt mag vergangen sein, doch sie ist nicht vergessen! Russland lebt nicht von allein, es lebt durch uns, durch uns wahre Russen. Und wie unsere Vorfahren zuvor schon werden wir unser Vaterland bis zum letzten Tropfen reinen Blutes verteidigen!"

 RCH_cannot_be_cancelled:0 "Dieser Fokus §Rkann nicht§! abgebrochen werden!\n"

 RCH_campaigns_of_terror:0 "Terror-Kampagnen"
 RCH_campaigns_of_terror_desc:0 "Absolute Reinheit in Körper und geist muss auf unseren Stationen sichergestellt werden. Es wird Zeit unser 'Volk' genauer unter die Lupe zu nehmen."

 RCH_movements_against_the_fuhrer:0 "Kräfte gegen den Führer"
 RCH_movements_against_the_fuhrer_desc:0 ""

 RCH_dabble_into_occult:0 "Das Ahnenerbe rührt sich..."
 RCH_dabble_into_occult_desc:0 ""

 RCH_depose_the_fuhrer:0 "Stürzt den Führer"
 RCH_depose_the_fuhrer_desc:0 ""
 RCH_assassination_tooltip:0 "§YDieser Weg wird es uns erlauben den Führer abzusetzen!§!"

 RCH_assassinate_rudolf:0 "Attentat auf Rudolf"
 RCH_assassinate_rudolf_desc:0 ""

 RCH_rudolf_tooltip:0 "Beseitigen wir als erstes den Leibwächter des Führers, auf das dieser in ständiger Paranoia leben wird..."
 
 RCH_false_flag_pushkinskaya: "False Flag auf die Hauptstation"
 RCH_false_flag_pushkinskaya_desc: ""

 RCH_assassinate_the_fuhrer: "Das Reich gehört Kreipp"
 RCH_assassinate_the_fuhrer_desc: ""

 RCH_consolidate_power: "Sichert die Macht"
 RCH_consolidate_power_desc: ""

 RCH_cult_recruitment: "Rekrutierung in den Kult"
 RCH_cult_recruitment_desc: ""

 RCH_dreams_of_cult_realized:0 "Kreipps Traum"
 RCH_coup_succeed:0 "Der Coup war erfolgreich!"
 RCH_assassinate_warning:0 "§REine geringe Erfolgswahrscheinlichkeit für den Coup lässt ihn automatisch scheitern!§!"

 RCH_definition_of_human:0 "Definiert das Wort 'Mensch'"
 RCH_definition_of_human_desc:0 "Auch wenn die Dehnbarkeit dieses Wortes uns oft gute Dienste geleistet hat, so wird es nun Zeit aufzuräumen. Es braucht eine genaue Definition, was es bedeutet einer von uns zu sein."

 RCH_earth_for_the_russians:0 "Die Metro gehört den Russen!"
 RCH_earth_for_the_russians_desc:0 "Die alte Welt ging unter, da sie von Untermenschen regiert wurde. Das neue Reich wird diesen Fehler nicht wiederholen!"

 RCH_fortify_the_borders: "Festung Reich"
 RCH_fortify_the_borders_desc: "Unsere Kräfte sind wenig, unsere Feinde endlos. Hiermit erkläre ich das Reich zur Festung, die um jeden Preis gehalten wird!"

 RCH_burn_the_dissident:0 "Verbrennt die Abweichler"
 RCH_burn_the_dissident_desc:0 "Es gibt tatsächlich jene, die zwar genetisch menschlich sind, und die doch unsere Nationalistische Politik verachten. Dieser geistige Abschaum ist ebenso wertlos wie der genetische und ein paar öffentliche Exekutionen mit Flammenwerfern werden diese Erkenntniss zementieren."

 RCH_executioner_squads: "Gründet die Waffen-SS"
 RCH_executioner_squads_desc: "Ursprünglich hat die Metromacht nichts anderes gemacht als den genetischen Unrat unserer Stationen zu vernichten, doch inzwischen sollten wir dafür eine eigene Truppe zusammenstellen. Eine Kooperation mit der SS wird sich sicherlich als nützlich erweisen."

 RCH_secure_loyalties: "Sichert die Treue der inneren Partei"
 RCH_secure_loyalties_desc: "Der Streit zwischen SS und Metromacht um Befugnisse lähmt unseren ganzen Staat und droht sogar unser Reich ganz in zwei zu reißen. Wir lösen dieses Problem jetzt, ein für alle mal!"
 RCH_remove_BOP_effects: "Der Machtkampf im Reich wird enden, SS und Metromacht werden ihre Kompetenzen klar definiert bekommen."
 RCH_secure_loyalties_tooltip: "Wir werden jegliche...unangenehmen Aufzeichnungen über den Führer einfach entfernen, um so sein Ansehen makellos zu halten."

 RCH_loyal_zealotry: "Fördert den Fanatismus"
 RCH_loyal_zealotry_desc: "Absolute Hingabe für das eigene Volk, ohne Rücksicht auf das eigene Leben"

 RCH_zealotry_loyalist: "Der Eifer des Führers"
 RCH_zealotry_loyalist_desc: "Der unbändige Fanatsimus, den der Führer beim Kampf um sein Volk demonstriert, soll für uns alle ein Vorbild sein."

 RCH_cult_of_personality: "Führerkult"
 RCH_cult_of_personality_desc: "Ein Volk! Ein Reich! Ein Führer! Diese alte Losung wird uns in ein neues Zeitalter russischen Ruhmes führen."

 RCH_sweep_the_filth:0 "Weg mit dem Dreck"
 RCH_sweep_the_filth_desc:0 "Unsere Wissenschaftler haben den Prozess zur Gen-Kontrolle vereinfacht, was es uns erlaubt regelmäßige, schnelle Kontrollen vorzunehmen"

 RCH_eradicate_the_impure:0 "Vernichtet die Unreinen"
 RCH_eradicate_the_impure_desc:0 "Endlich, nachdem wir alles dreimal geprüft haben können wir sagen: Unsere Stationen sind sauber. Weiterhin haben wir Methoden entwickelt um neu eroberte Gebiete schnell vom genetischen Unrat zu befreien. Es wird Zeit den Terror zu beenden, denn im Reich leben nur noch wahre Menschen."

 RCH_the_mutant_threat:0 "Die Mutantenbedrohung"
 RCH_the_mutant_threat_desc:0 "Während die Kapitalisten und die Kommunisten natürlich unsere ideologischen Feinde sind, so sind jedoch die meisten ihrer Bürger noch Menschen, echte Menschen und echte Russen. Es ist unsere heilige Pflicht, unsere Brüder und Schwestern aus den Klauen dieser Untermenschen-Ideologien zu befreien. Doch abgesehen von diesen ideologischen Gegnern existieren noch jene, die selbst auf fundamentalster biologischer Ebene unser Feind sind, die Mutanten. Sie sind unser Hauptgegner und sie müssen um jeden Preis eliminiert werden."

 RCH_the_mutant_threat_2:0 "Totale Mutantenausrottung"
 RCH_the_mutant_threat_2_desc:0 "Die Menschheit wird erst dann sicher sein, wenn der letzte Mutant ausgerottet wurde. Wenn auch nur eine Handvoll von ihnen überleben, so werden sie sich vermehren und noch zahlreicher zurückkehren. Wir müssen die Dringlichkeit dieser Tatsache jedem einzelnen unserer Soldaten klar machen."


 RCH_superiority_of_the_slavs: "Überlegenheit der Slawischen Rasse"
 RCH_superiority_of_the_slavs_desc: "Kein Volk wie das unsere hat eine solche Stärke und eine solche Überlegenheit demonstriert, wie das unsere. Nicht nur sind wir den Mutanten überlegen, selbst den anderen Menschenrassen sind wir weit vorraus. Es wird Zeit voller Stolz unser wahres Erbe anzutreten."
 RCH_hubris_tooltip: "We will convince the population that we are the new masters of the Earth. As long as we are not engaged in a losing war, or go below 40% war support."
 unlock_RCH_education_decision_3: "Unlocks Education Decision: §Y$improve_education_efforts_RCH_3$§!"

 campaign_of_terror_length_30_tt: "\nReduziert die Länge der §Y$RCH_campaign_of_terror_countdown_mission$§! um §Y30 Tage§!."
 RCH_purge_first_flag:0 "Hat folgenden Fokus absolviert: §Y$RCH_burn_the_dissident$§!"
 RCH_purge_second_flag:0 "Hat folgenden Fokus absolviert: §Y$RCH_sweep_the_filth$§!"
 RCH_purge_third_flag:0 "Hat folgenden Fokus absolviert: §Y$RCH_eradicate_the_impure$§!"
 RCH_first_purge_focus_days_tt:0 "Momentane Tage: [?RCH_purge_first_flag:days|Y0]"
 RCH_second_purge_focus_days_tt:0 "Momentane Tage: [?RCH_purge_second_flag:days|Y0]"
 RCH_third_purge_focus_days_tt:0 "Momentane Tage: [?RCH_purge_third_flag:days|Y0]"

 RCH_counter_operations: "Gründet das Wolfsnetzwerk"
 RCH_counter_operations_desc: "Da draußen verstreut in der Metro gibt es viele Symphatisanten, die sich im geheimen unserer Sache verschrieben haben. Von ihren eigenen Nationen in die Bedeutungslosigkeit gedrängt sind diese einsamen Wölfe ein bisher ungenutztes Potenzial."

 RCH_concession_to_non_slavs: "Zugeständnisse für Nichtslawen"
 RCH_concession_to_non_slavs_desc: "Verdammt noch eins, auf der ganzen Welt leben keine Hunderttausend Menschen mehr und diese elendigen Fanatiker wollen den Rest auch noch dezimieren. Die menschheit kann sich dies nicht erlauben, wir brauchen jeden einzelnen Menschen, wenn wir uns den endlosen Mutantenhorden stellen wollen."
 RCH_concessions_denazification_decisions: "Erlaubt £boost_popularity_texticon §YEntscheidungen§! um unsere Beziehungen zu anderen Nationen zu verbessern."
 RCH_denazify_warning: "Dieser Fokus könnte einen §YBürgerkrieg§! auslösen, sollte die SS zu viel Einfluss im Reich haben."

 RCH_open_spheres: "Öffnet den politischen Diskurs"
 RCH_open_spheres_desc: ""

 RCH_old_rightist_campaigns: "Alte Kampagnen"
 RCH_old_rightist_campaigns_desc: ""

 RCH_question_of_non_slavs: "Die Frage der Nicht-Weißen"
 RCH_question_of_non_slavs_desc: "Bevor die Tverskaya von uns besetzt wurde, war sie das Heim vieler Nichtweißer. Sollten wir unsere Politk weiter überdenken?"

 RCH_permit_outside_recruitment:0 "Erlaubt Rekrutierung von Außen"
 RCH_permit_outside_recruitment_desc:0 ""

 RCH_foreign_support:0 "Äußere Unterstützung"
 RCH_foreign_support_desc:0 ""

 RCH_outside_generals:0 "Erlaubt Nicht-Russen als Kommandanten"
 RCH_outside_generals_desc:0 ""

 RCH_fight_against_bolshevism: "Kampf gegen den Bolschewismus"
 RCH_fight_against_bolshevism_desc: ""

 RCH_metromacht_volunteers: "Metromacht-Freiwillige"
 RCH_metromacht_volunteers_desc: ""
 RCH_request_volunteer_campaigns_twice_tooltip: "AErlaubt die §Y$RCH_permit_outside_recruitment_decision_category$§! erneut zu tätigen"

 RCH_denazify_internal_politics: "Entnazifiziert die Innenpolitik"
 RCH_denazify_internal_politics_desc: ""

 RCH_establish_stalags:0 "Gründet die Strafarbeitslager (Stalag)"
 RCH_establish_stalags_desc:0 "Es gibt nur wenige Gründe einen Mutanten am Leben zu erhalten, doch solange sie arbeiten können, können sie Waffen bauen, Waffen mit denen wir ihre Artgenossen ausrotten werden! Mathemtisch ist das System Stalag damit gerechtfertigt."
 RCH_stalags_unable_to_be_removed: "§Y$civics_work_ethics_6$§! Gesetz kann in Zukunft nicht mehr entfernt werden."
 occupy_noncore_station: "Besetzt eine §YNicht-Kern§! Station."

 RCH_war_economics_labour: "Zwingt die Mutanten zur Arbeit"
 RCH_war_economics_labour_desc: "Das Leben von Mutanten hat einen Wert von Null, der ihrer Arbeit jedoch nicht. Vielleicht sollten wir noch nicht alle umbringen."
 
 RCH_mass_slavery_of_lesser_races: "Versklavte Mutanten"
 RCH_mass_slavery_of_lesser_races_desc: "Überdenken wir unsere Position nocheinmal: Es gibt eine Menge an Arbeiten im Reich, die keinem Menschen zugemutet werden sollten. Und gerade haben wir eine ganze Menge Kriegsgefangener gemacht..."

 RCH_establish_stalags_work_the_mines:0 "Work the Mines"
 RCH_establish_stalags_work_the_mines_desc:0 "While their efforts are needed in several places the most dangerous and breakbacking of them are in the mines. While the attrition rate is pretty bad, they are able to extract resources at an incredible speeds despite shoddy tools and minimal support."

 RCH_establish_stalags_work_the_forges:0 "Toil in the Forges"
 RCH_establish_stalags_work_the_forges_desc:0 "You may think the forges are a better fate then the mines, but you'd be wrong. By removing a bunch of unnecessary safety equipment and increasing the temperature of the forges past safe limits, one would have a hard time between choosing between the both.Which is precisely what we've done."

 RCH_yield_power_to_gestapo:0 "Macht für die Gestapo"
 RCH_yield_power_to_gestapo_desc:0 "Nun da sich unsere Innenpolitk etwas stabilisert hat, können wir Kräften wie der geheimen Staatspolizei mehr Spielraum gewähren."

 RCH_gestapo_jurisdiction:0 "Sonderbefugnisse"
 RCH_gestapo_jurisdiction_desc:0 "Die SS verlangt nach neuen Befugnissen um ihrer Arbeit nachzugehen. Da sie ihre Effektivität und ihre Loyalität in der Vergangenheit bereits unter Beweis gestellt hat, sehen wir keinen Grund weshalb wir sie ihnen nicht gewähren sollten."

 allow_ss_integration_tree:0 "\nSchaltet den Fokus 'SS-Integration' frei!"

 RCH_domestic_role_1:0 "Kompetent politisch"
 RCH_domestic_role_1_desc:0 "Viele unserer Offiziere stammen aus SS oder Gestapo, ihre Erfahrung wird unsere Besatzungen erleichtern."

 RCH_domestic_role_2:0 "Politisch kompetent"
 RCH_domestic_role_2_desc:0 "Poltik ist oft zu komplex und vielschichtig für die einfachen Bürger unter unserer Besatzung. Die Gestapo weiß schon was sie tut."

 RCH_military_roles: "Neue Truppen für ein neues Regime"
 RCH_military_roles_desc: "Die SS wird in zukünftigen Kriegen eine wichtige Rolle spielen, nicht nur hinter der Front, sondern auch im direkten Kampfeinsatz."

 RCH_slavic_aryanism:0 "Slavic Aryanism"
 RCH_slavic_aryanism_desc:0 "While other humans may exist in our society the truth is they will all be lesser then the true aryan race. We are destined to inherit the earth and now our government has accepted this fact, so too must our people."

 RCH_slavic_aryanism_character_1:0 "Rassenforschung"
 RCH_slavic_aryanism_character_1_desc:0 "Unser Rassenbild braucht eine wissenschaftliche Untermauerung um wirklich zukunftsfähig und überzeugend zu sein. Abgesehen davon ist es für uns auch wichtig, die niederen rassen zu verstehen und genau definieren zu können, was uns von ihnen trennt."
 
 RCH_slavic_aryanism_character_2:0 "Evolutionary Ubermensch"
 RCH_slavic_aryanism_character_2_desc:0 "An army is only as good as the stock it pulls from and our army includes the greatest examples of genetic perfection. It would only benefit us to promote these Ubermensch into positions befitting their abilities."
 #who is slava?
 RCH_slavic_aryanism_choice_1:0 "Into the Field"
 RCH_slavic_aryanism_choice_1_desc:0 "Our number of pure aryans are limited so we must decide how best to use them, clearly leading our lesser humans into battle is the most effective way to apply them"

 RCH_slavic_aryanism_choice_2:0 "Doctrinal Study"
 RCH_slavic_aryanism_choice_2_desc:0 "Our number of pure aryans are limited so we must decide how best to use them, clearly researching in the safety of our academies is best, let the lesser humans fight and die."
 #should probably work on giving this part of the tree modifiers or at least larger buffs.
 RCH_RNU_leanings:0 "RNU Leanings"
 RCH_RNU_leanings_desc:0 "Aryanism is a dead pseudoscience that will only get in the way of our efforts to cleanse the world of mutants. We must stand united against our common foe, we need only answer who that is."

 RCH_RNU_character_1:0 "Return to Our Roots"
 RCH_RNU_character_1_desc:0 "We have stood weak as a nation due to the outsider who can never be truly one of us. It is time to acknowledge that only the russian people are worthy of our attention and that only russian people can lead us to a new world."

 RCH_RNU_character_2:0 "Synthesis of Nationalism"
 RCH_RNU_character_2_desc:0 "Russia is not a single people but a group of people who believe in something greater then themselves. From the Baltic to Primorsky many have lived and die for Russia. And we shall do so forever more!"

 RCH_RNU_character_3:0 "The Eagle Soars"
 RCH_RNU_character_3_desc:0 "We know the truth we are from Russia, made by Russia, for Russians!"

 RCH_RNU_choice_2:0 "Spirit of the Russian People"
 RCH_RNU_choice_2_desc:0 "A russian is a russian no matter their skin color or origin (as long as they aren't mutant). Our people fight alongside complete strangers united in a singular purpose, the defence of their motherland."

 RCH_RNU_choice_1:0 "The National Union Prospers"
 RCH_RNU_choice_1_desc:0 "Our enemies are great and everywhere, we cannot afford to be divided amongst ourselves. The Russian people have set aside their differences so we may focus on our strength and overpowering our enemies through our combined might."

 RCH_establish_the_ministry_of_culture:0 "Gründet das Kulturministerium"
 RCH_establish_the_ministry_of_culture_desc:0 "Nicht nur unsere Rasse, nein auch unsere Kultur werden bedroht. Wir brauchen ein Ministerium dass sich dem Erhalt unserer Art zu Leben verpflichtet."

 RCH_moc_path_2:0 "Entwickelt kulturelle Institutionen"
 RCH_moc_path_2_desc:0 "Die Kultur in unserem Reich muss gefördert und überwacht werden, damit wir eine bessere Zukunft formen können."

 RCH_moc_path_1:0 "Verlangt absoluten Gehorsam"
 RCH_moc_path_1_desc:0 "Die Propaganda an den Wänden nachplappern reicht nicht, die Bürger müssen verstehen was wir tun uns warum wir es tun"

 RCH_moc_path_3:0 "Ministerium für Volksaufklärung und Propaganda"
 RCH_moc_path_3_desc:0 "Es reicht nicht dem Volk nur einmal unsere Politik zu erklären, es muss regelmäig aufgeklärt und informiert bleiben. Nur so erschaffen wir einen Staat, in welchem Jeder seinen Teil dazu beiträgt, das Reich zu verbessern."

 unlock_RCH_education_decision_1: "Schaltet Entscheidung frei: §Y$improve_education_efforts_RCH_1$§!"
 unlock_RCH_education_decision_2: "Schaltet Entscheidung frei: §Y$improve_education_efforts_RCH_2$§!"
 #RCH_unlock_economy_laws:0 "Schaltet höhere Bildungsstufen frei!\n\n"

 RCH_moc_path_4:0 "Startet die Schmieden"
 RCH_moc_path_4_desc:0 "Unsere Schmieden arbeiten nicht auf voller Kapazität, das muss sich ändern!"

 RCH_moc_path_5:0 "Fördert Handel und Handwerk"
 RCH_moc_path_5_desc:0 "Kleinunternehmen stellen die Basis unserer Wirtschaft dar, wir müssen ihr weiteres Wachstum fördern."

 RCH_moc_path_6:0 "Verlangt Gehorsam von allen Stationen"
 RCH_moc_path_6_desc:0 "Wenn wir unseren Gauleitern erlauben, ihre eigenen Cliquen zu bilden, so werden sie unsere eigenen Macht in Zukunft untergraben. Wir müssen sicherstellen, dass sie verstehen, wo ihre Loyalität wirklich liegen sollte"

 RCH_moc_path_7:0 "Erlaubt Autonome Stationen"
 RCH_moc_path_7_desc:0 "Unsere Gauleiter haben ihre Loyalität bewiesen und sollten die Möglichkeit bekommen, sich an ihre jeweiloigen politischen Situationen anzupassen. Dies wird sich für uns langfristig auszahlen"

 RCH_moc_path_8:0 "Gemeinsamer Handel mit der Hanse"
 RCH_moc_path_8_desc:0 "Das Reich braucht unbedingt mehr Ressourcen, um seine Kriegsanstrengungen voranzutreiben. Mehr Schrott, mehr Energie, mehr Hände. Diese dreckigen Kapitalisten von der Hanse könnten uns vielleicht weiter helfen...."
  war_will_cancel_deal_with_Hanza_tt: "Ein Krieg mit der [HNZ.Getflag] [HNZ.GetName] bricht dieses Abkommen!"

 RCH_moc_path_9:0 "Diesel-Synthese"
 RCH_moc_path_9_desc:0 "Treibstoff ist in der Metro schwer zu bekommen, aber unglaublich wertvoll, da er das Einzige ist was unsere Panzer antreiben kann. Wir sind kürzlich darauf gekommmen, wie wir Diesel aus Quellen in der Metro raffinieren können, was uns sicher einen Vorsprung vor unseren Feinden verschafft."
 
 RCH_moc_path_10:0 "Beleuchtung des Vaterlandes"
 RCH_moc_path_10_desc:0 "Die Reichsbürger sollen nicht länger im Schein von Öllampen oder Feuertonnen leben. Der Fortschritt wird in Kilowatt und der Leuchtkraft unserer Stationsbeleuchtung gemessen"
 #should make this focus do something funny
 RCH_wunderwaffen_project:0 "Wunderwaffen-Projekt"
 RCH_wunderwaffen_project_desc:0 "Unsere Industrie ist die Größte in der gesamten Metro und unsere Forscher sind die Intelligentesten. Wir können jetzt Projekte verfolgen, die bisher außerhalb unserer Möglichkeiten lagen und technologien entwickeltn,  die das Gesicht der Erde verändern werden."

 RCH_infrastructure_path_1:0 "Tunnel-Erneuerung"
 RCH_infrastructure_path_1_desc:0 "Einige unserer Tunnel sind in schlechter Verfassung, manche von ihnen könnten bald einstürzen. Das dürfen wir nicht zulassen!"

 RCH_infrastructure_path_2:0 "Infrastruktur-Netz"
 RCH_infrastructure_path_2_desc:0 "Unsere Infrastruktur zu verbessern erlaubt es unseren Truppen sich schneller von Front zu Front zu bewegen."

 RCH_infrastructure_path_3:0 "Erneuert die Schienen"
 RCH_infrastructure_path_3_desc:0 "An einigen Stellen haben wir früher Schienen rausgerissen und den Stahl verkauft. Rückblickend keine so gute idee, bringen wir das wieder in Ordnung."

 RCH_infrastructure_path_4:0 "Erkundet die Tiefen"
 RCH_infrastructure_path_4_desc:0 "There are places in our control that we haven't fully mapped due to issues with traversing the terrain. If we are to find any resources not currently being leveraged we must build the means to explore every nook and cranny."

 RCH_military_industry_unique:0 "Erneuert alte Ausrüstung"
 RCH_military_industry_unique_desc:0 "Wir haben ganze Lager voller altem Militärschrott, doch bisher nutzt er niemandem. Unsere Techniker sollten zumindest einiges davon wiederherstellen können."

 RCH_rearmament:0 "Waffen für das Heer"
 RCH_rearmament_desc:0 "Jeder unserer Soldaten muss so viel Wert sein wie 10 aus dem Rest der Metro, doch dafür reichen unseren bisherigen Schrottwaffen einfach nicht aus. Die Metromacht braucht nicht weniger als die besten Waffen der gesamten Metro!"

 RCH_rearmament_construction_choice:0 "Industreiller Wiederaufbau"
 RCH_rearmament_construction_choice_desc:0 "Jeder Aspekt unserer Werktätten wird darauf ausgelegt, den Bau weiterer Anlagen zu beschleunigen. Von den Schmieden, die direkt auf Eisenbahnwaggons verladen werden, bis hin zu speziellen Gleisen für Zementwagen, damit diese problemlos nachgefüllt werden können. Wir sind hier vor allem im Baugewerbe tätig"

 RCH_rearmament_tech_choice:0 "Die Zukunft beginnt heute"
 RCH_rearmament_tech_choice_desc:0 "Unter der Leitung unserer wenigen, aber dafür umso klügeren Wissenschaftler hat das Reich recht einzigartige Waffen und Werkzeuge hervorgebracht. Unsere Techniker sollten mit der Entwicklung nicht aufhören."

 RCH_rearmament_factory_choice:0 "Industrialisiert das Reich"
 RCH_rearmament_factory_choice_desc:0 "Ein wenig härtere Arbeit, kürzere Arbeitswege, Essenslieferungen an den Arbeitsplatz... Es gibt viele Möglichkeiten wie wir unsere Produktion steigern können."

 RCH_military_industry_be:0 "Versammelt unsere Arbeiter"
 RCH_military_industry_be_desc:0 "Indem wir unsere klügsten Köpfe im Herzen des Reiches versammeln, können sie hier gemeinsam neue Lösungen für unsere Probleme finden."

 RCH_military_industry_ce:0 "Schwerindustrie"
 RCH_military_industry_ce_desc:0 "Indem wir unsere Aufmerksamkeit auf unsere am häufigsten genutzten Ressourcen richten, können wir diese mit größtmöglicher Effizienz produzieren."

 RCH_military_industry_de:0 "Komplexe Industrien"
 RCH_military_industry_de_desc:0 "Auch wenn wir seltenere Ressourcen in geringerem Umfang produzieren, sie sind schwerer zu finden und darum umso wertvoller"

 RCH_four_year_plan:0 "Ein Vierjahresplan"
 RCH_four_year_plan_desc:0 "Es reicht nicht aus, uns an unseren aktuellen Bedürfnissen zu orientieren. Wir müssen unsere zukünftigen Bedürfnisse bereits in unseren aktuellen Projekten berücksichtigen, damit wir unsere Pläne für die Zukunft nicht bereits jetzt einschränken."

 RCH_air_vent_discovery:0 "Entdeckung eines Lüftungsschachtes"
 RCH_air_vent_discovery_desc:0 "Eine Entlüftungsöffnung die wir gefunden haben, scheint zur Oberfläche zu führen. Wir fragen uns, was wir dort finden werden."

 RCH_depot:0 "Depot-Umgestaltung"
 RCH_depot_desc:0 "Nachdem wir unser Gebiet gründlicher erkundet hatten, haben wir viele Ressourcen gefunden. Leider haben wir derzeit aber nicht viel Platz, um sie aufzubewahren. In der Nähe gibt es jedoch ein verlassenes Depot, das wir mit nur wenig Aufwand für uns sichern können."

 RCH_internal_civilian_3:0 "Massenindustrialisierung"
 RCH_internal_civilian_3_desc:0 "Durch die Feinabstimmung unserer Produktionsmethoden und deren Anwendung in jeder Fabrik können wir unsere Fertigungsindustrie rationalisieren und schnell erweitern."

 RCH_internal_civilian_2:0 "Ein gezielter Ansatz"
 RCH_internal_civilian_2_desc:0 "Indem wir unsere Produktionsmethoden auf eine begrenzte Anzahl von Fabriken anwenden und von dort aus weiter skalieren, können wir Optimierungen erst dort vornehmen, bevor sie auf jede einzelne Fabrik angewendet werden. Dies wird uns auf lange Sicht Kopfschmerzen ersparen."

 RCH_internal_civilian_6:0 "Nachrüstung unserer Turbinen"
 RCH_internal_civilian_6_desc:0 "Das Reich besitzt eine keline Menge an Wasserturbinen, die aus einem örtlichen unterirdischen Fluss gespeist werden. Indem wir unsere Bemühungen auf die Steigerung unserer Leistung an einem Standort konzentrieren, können wir ihre Effizienz sicherlich maximieren."

 RCH_internal_civilian_8:0 "Elektrifizierung"
 RCH_internal_civilian_8_desc:0 "Wir müssen unseren Strom über unser gesamtes Territorium verteilen. Während die Gesamtkapazität sicherlich darunter leidet, können wir die Vorteile auf ein größeres Gebiet verteilen."

 RCH_internal_civilian_5:0 "Technische Anwendungen"
 RCH_internal_civilian_5_desc:0 "Durch die Einführung eines neuen Satzes kleinerer, kompakter Werkzeuge können wir sicherstellen, dass unsere Fähigkeit, verschiedene Artikel herzustellen, nicht darunter leidet."

 RCH_internal_civilian_4:0 "Gesteigerte Produktion"
 RCH_internal_civilian_4_desc:0 "Wir werden gewaltige Industriemaschinen in unseren Fabriken installieren, damit wir mehr und mehr produzieren können."

 RCH_internal_civilian_7:0 "Arbeitsdistrikte"
 RCH_internal_civilian_7_desc:0 "Wir können die Arbeiter lokal organisieren, indem wir alte Räume für Werkstätten und Fabriken freimachen. Durch die Schaffung eines nahegelegenen Wohnviertels können sie schneller zur Arbeit kommen."

 RCH_military_industry_ge:0 "Industrieller Fortschritt"
 RCH_military_industry_ge_desc:0 "Wir sind kürzlich auf einige neue Möglichkeiten zum Bau von Munitionsfabriken gestoßen. Dies wird sicherlich die Zeit verkürzen, die für den Bau benötigt wird."

 RCH_inaugurate_the_new_blood:0 "Neues Blut für das Reich"
 RCH_inaugurate_the_new_blood_desc:0 "Jetzt, da unsere Innenpolitik stabil ist, können wir unserem Militär die dringend benötigte Aufmerksamkeit widmen."

 RCH_defence_against_bolsheviks: "Mutanten an unseren Toren"
 RCH_defence_against_bolsheviks_desc: "Die kommunistischen Mutantenhorden stehen vor unseren Toren, wir müssen ihr Vordringen mit allen Mitteln verlangsamen. Wir werden Kommandos entsenden, um ihre Linien zu stören und auch einige Mutanten zu töten, während sie schon dabei sind."

 RCH_bulwark_against_the_red: "Bollwerk gegen den Bolschewismus"
 RCH_bulwark_against_the_red_desc: "Nachdem der Feind verlangsamt wurde, können wir nun mit dem Aufbau unserer Verteidigung beginnen und diesen Tunnel in eine Todesfalle verwandeln. Selbst wenn es ihnen gelingt, einige Gewinne zu erzielen, wird dies mit so hohen Kosten verbunden sein, dass sie verbluten werden, bevor sie das Reich erreichen."

 RCH_the_iron_legion:0 "Die eiserne Legion"
 RCH_the_iron_legion_desc:0 "Die Metromacht ist eine der besten Streitkräfte in der gesamten Metro, mit präziser, geübter Ausbildung und einer einheitlichen Führung mit geschlossener Ideologie. Sie ist nicht die größte Streitmacht, kann es mit den wilden Horden der Hanse oder der Roten Linie jedoch aufnehmen."

 RCH_the_iron_legion_1:0 "Metromacht-Oberkommando"
 RCH_the_iron_legion_1_desc:0 "Die Metromacht ist eine pragmatische Organisation, die die höheren Ideale der SS zwar nicht ganz versteht, sie aber dennoch mit ihrem Leben und ihren Blut verteidigt. Niemand kann ihre Loyalität anzweifeln, und im Gegenzug dafür verdient sie unser vollständiges Vertrauen."

 RCH_the_iron_legion_flavour_3:0 "Strenge Übungen"
 RCH_the_iron_legion_flavour_3_desc:0 "Die abscheulichen Mutanten der Roten Linie sind uns zahlenmäßig 10 zu 1 überlegen, unsere Truppen sind jedoch besser ausgebildet und diszipliniert, was die Rote Flut bisher abgewehrt hat. Wir müssen jedoch eine noch bessere Ausbildung anstreben, mit gründlicheren und regelmäßigeren Übungen wird jeder unserer Soldaten 100 Mutanten wert sein."

 RCH_the_iron_legion_flavour_6:0 "Elite-Aufgebote"
 RCH_the_iron_legion_flavour_6_desc:0 "Die Rote Linie versucht immer wieder, uns unter der Last ihrer Kräfte zu zermalmen. Ein neues Aufgebot frisch ausgebildeter und ausgerüsteter Soldaten der modernisierten Metromacht werden an die Front entsandt, um unseren abgenutzten Verteidigern neues Leben einzuhauchen."

 RCH_the_iron_legion_flavour_5:0 "Nie endender Krieg gegen den Kommunismus"
 RCH_the_iron_legion_flavour_5_desc:0 "Die kommunistische Bedrohung hat einmal mehr ihre grässliche Fratze offenbart, doch nun gibt es keine Verbündeten mehr, die sie retten könnten. Bis auch der letzte Kommunist tot ist, werden wir einen endlosen Krieg gegen sie führen, bis jeder unserer Feinde ausgerottet ist."

 RCH_the_iron_legion_flavour_7:0 "Sorgt für Loyalität in unseren Reihen"
 RCH_the_iron_legion_flavour_7_desc:0 "Obwohl uns die Metromacht als Ganzes immer loyal war, so müssen wir doch sicherstellen, dass auch der einzelne Soldat keinen Raum für Zweifel hat. Lassen Sie die mutierten Kommunisten ihre Posten aufgeben, wenn ihr Angriff ins Wanken gerät. Kein einziger von uns wird desertieren, selbst im Angesicht der Vernichtung."

 RCH_the_iron_legion_flavour_8:0 "Ein gemeinsamer Krieg"
 RCH_the_iron_legion_flavour_8_desc:0 "Alle Facetten der Gesellschaft müssen im Krieg zusammengeführt werden. Das Reich marschier vorwärts und hinter ihm stehen seine treuen Bürger, die bereit sind jedes noch so große Opfer für den Sieg zu erbringen!"

 RCH_the_iron_legion_flavour_1:0 "Nachgefertigter Körperpanzer"
 RCH_the_iron_legion_flavour_1_desc:0 "Da das Leben jedes wahren Menschen so kostbar ist, müssen wir es sorgfältig schützen. Neue Körperpanzerung und umfassendes Training für ihre effiziente Handhabung werden es unseren Truppen ermöglichen, Treffer einzustecken, die andere erledigen würden."
 #NVG should be untied from training to be really worth it.
 RCH_the_iron_legion_flavour_2:0 "Was im Dunkeln lauert"
 RCH_the_iron_legion_flavour_2_desc:0 "Tunnel sind von Natur aus dunkel und die Truppen müssen Taschenlampen benutzen, um zu sehen, wohin sie gehen. Dadurch wird unser Soldat jedoch gezieltem feindlichem Feuer ausgesetzt. Wir müssen uns der Suche nach Möglichkeiten widmen, in der Dunkelheit zu sehen, damit wir den Feind sehen können und er uns nicht sehen kann."

 RCH_the_iron_legion_flavour_4:0 "Improve Filtration Devices"
 RCH_the_iron_legion_flavour_4_desc:0 "Some outside stalkers we recruited have some interesting techniques to get the most out of their gas masks. If we were to research how these could be applied en mass we could equip every soldier with higher quality gas masks."

 RCH_ss_integration:0 "SS-Integration"
 RCH_ss_integration_desc:0 "Während die SS eine fast eigenständige Armee ist, handelt es sich bei ihr in erster Linie um eine politische und polizeiliche Organisation. Durch die Ausweitung ihrer Geschäftstätigkeit können wir ihre besonderen Fähigkeiten nun besser nutzen."

 RCH_ss_integration_1:0 "SS-Oberkommando"
 RCH_ss_integration_1_desc:0 "Die SS sieht ein Ziel, das über einfache militärische Errungenschaften hinausgeht, sie sieht die Seele des Reichsvolkes und möchte dafür sorgen, dass sie auch rein bleibt. Welche taktischen Fähigkeiten und Erfahrungen auch immer die Metromacht besitzt, sie wird immer hinter der völligen Hingabe der SS an die Sache zurückbleiben."

 RCH_ss_integration_flavour_3:0 "Befördert Dobryivechir zum Untersturmführer"
 RCH_ss_integration_flavour_3_desc:0 "Bohdan Dobryivechir ist ein wichtiges Mitglied der SS und trägt wesentlich dazu bei, dass sie unsere Bevölkerung so gut auf Mutationen überwachen. Wir sollten ihn befördern, um seinen Machtbereich weiter auszudehnen."

 RCH_ss_integration_flavour_4:0 "Unbestrittene Loyalität"
 RCH_ss_integration_flavour_4_desc:0 "Bohdan ist dem Reich bedingungslos treu, es ist kaum zu glauben, dass er das alles gelernt hat und dass er nicht als Befehlshaber der SS geboren wurde."

 RCH_ss_integration_flavour_6:0 "Beförderung zum SS-Hauptsturmführer"
 RCH_ss_integration_flavour_6_desc:0 "Dobryivechir hat bewiesen, dass er über unsere kühnsten Erwartungen hinaus fähig ist. Eine Beförderung kommt uns nicht nur dabei zugute, dass wir seinen Einfluss weiter ausbauen können, sondern ist auch eine natürliche Folge seines Ausnahmeverhaltens"

 RCH_ss_integration_flavour_1:0 "Battlefield Deployment"
 RCH_ss_integration_flavour_1_desc:0 "Beim Einsatz von SS-Formationen vor Ort können wir neben dem militärischen Zielen auch die Erfüllung politischer Ziele erwarten."

 RCH_ss_integration_flavour_2:0 "Exklusive operative Vorrechte"
 RCH_ss_integration_flavour_2_desc:0 "Die SS ist durch die traditionelle militärische Hierarchie festgefahren, die ihr enormes Potential beschränkt. Indem wir sie von der regulären Armee mit einem eigenen Kommando trennen, können sie entschlossener handeln. Außerdem wird ein wenig Konkurrenz auch dazu beitragen, dass die Metromacht auf Trab bleibt."

 RCH_ss_integration_flavour_5:0 "Sichert die Integration"
 RCH_ss_integration_flavour_5_desc:0 "Obwohl sich die SS als willkommene Ergänzung zum Krieg erwiesen hat, können wir es uns nicht leisten, dass zwei getrennte Armeen mit widersprüchlichen Befehlen einander im Weg stehen. Die SS soll sich dem Standardmilitär unterwerfen und dessen Kräfte entlang der Breite des Heeres ergänzen."

 RCH_ss_integration_flavour_21:0 "Die Frage der Rekrutierung von Außen"
 RCH_ss_integration_flavour_21_desc:0 "Während die SS normalerweise zu den schärfsten Gegnern von Außenstehenden gehört, hat die Realität des Krieges ihr Verständnis getrübt. Sie haben sogar die Idee geäußert, selbst von Außen zu rekrutieren. Wie reagieren wir darauf?."

 RCH_ss_integration_flavour_55:0 "Gebt Orlov das Feldkommando"
 RCH_ss_integration_flavour_55_desc:0 "Ein vielversprechendes Mitglied der SS hat sich als sehr fähig erwiesen und sich sogar den Respekt der Metromacht erworben. Wir werden ihn mit einer Beförderung belohnen."

 RCH_military_research_and_development:0 "Waffen der Zukunft"
 RCH_military_research_and_development_desc:0 "Der Dritte Weltkrieg wurde mit Atombomben und Interkontinentalraketen ausgetragen, aber der Vierte Weltkrieg wird nicht mit Stöcken und Steinen ausgetragen, nicht wenn wir da noch was mitzureden haben."

 RCH_draisine_production:0 "Schienenräder-Produktion"
 RCH_draisine_production_desc:0 "Obwohl unsere Streitkräfte kleiner sind als die der Hanse und der Roten Linie müssen wir doch sicherstellen, dass unsere Präsenz genauso groß ist. Durch die Steigerung unserer Draisinenproduktion können unsere Männer größere Gebiete patrouillieren und schneller reagieren als unsere Feinde."

 RCH_draisine_salvaging:0 "Draisinen-Bergung"
 RCH_draisine_salvaging_desc:0 "Wer auch immer die Schienen kontrolliert, der kontrolliert die Metro. Unsere Produktion reicht nicht aus, wir müssen die vielen verlassenen Draisinen in den Tunneln bergen und wieder instand setzen. Bald wird die ganze Metro vom Lärm unserer Armee erzittern."

 RCH_rail_armor:0 "Projekt "Untergrund-Fahrzeug"
 RCH_rail_armor_desc:0 "Während unsere Bemühungen zur Mechanisierung der Streitkräfte gute Fortschritte gemacht haben, wurden unser Wissenschaftler nun mit einer viel größeren Aufgabe beauftragt: Selbstfahrende gepanzerte Fahrzeuge für den Einsatz auf der Schiene. Dies könnte die Konflikte in der Metro, wie wir sie kennen, für immer verändern."

 RCH_test_out_rail_tanks:0 "Entwicklung des §CSturmpanzerwagens§!"
 RCH_test_out_rail_tanks_desc:0 "Unseren Ingenieuren ist ein Durchbruch gelungen! Durch die Untersuchung früherer Panzerkonstruktionen haben wir ein Maß an mechanischer Komplexität erreicht, das im Rest der Metro beispiellos ist. Es ist möglich, dass die Mutanten ihre eigenen ;aschinen auf Rädern herstellen können, aber sie werden niemals mit unseren Panzern mithalten können."

 RCH_blitzkrieg_tactics:0 "Blitzkrieg-Taktiken"
 RCH_blitzkrieg_tactics_desc:0 "Es war das Dritte Reich selbst, das die Panzer-Kriegskunst perfektionierte, den „Blitzkrieg“. Der Einsatz schneller Manöver und aggressiver Taktiken führte im Idealfall zu einem schnellen, beeindruckenden und letztlich für den Feind furchteinflößenden Sieg."

 RCH_fist_of_the_reich:0 "Die Faust des Führers"
 RCH_fist_of_the_reich_desc:0 "Unsere Panzer sind nicht nur unser stärkstes Werkzeug im Krieg, sie sind auch ein Symbol unserer Macht in der Metro. Wir müssen jeden Aspekt unserer Produktion ihrer Herstellung und Verbesserung widmen."

 RCH_stormwind_project:  "Kriegsökonomische Maximierung"
 RCH_stormwind_project_desc: "Wir müssen die knappen Ressourcen, über die das Reich derzeit verfügt, maximieren. Alle Ressourcen müssen für unsere Panzerbemühungen eingesetzt werden, auch wenn die Qualität unserer anderen Draisinen darunter leidet."

 RCH_kampfmachine: "Kriegsmaschinen Überlegenheit"
 RCH_kampfmachine_desc: "Nachdem wir nun unser Design perfektioniert und unsere Truppen in deren Einsatz geschult haben, ist es an der Zeit, unsere erste Panzereinheit einzusetzen. Sie werden wie eine Naturgewalt auf dem Schlachtfeld sein, ein Wirbelsturm aus Tod und Zerstörung, der das Leben unserer Feinde mit einem Stoß beenden wird"

 RCH_firearms_development:0 "Waffenentwicklung"
 RCH_firearms_development_desc:0 "Obwohl unser aktuelles Arsenal tödlich und effektiv ist, könnte es doch immernoch tödlicher und effektiver sein. Genau diesen Gedanken werden wir unseren Ingenieuren und Maschinisten anvertrauen."

 RCH_firearms_choice: "Feuerwaffen-Entscheidung"
 RCH_firearms_choice_desc: "Wir befinden uns an einem Scheideweg, und obwohl wir mehr Waffen brauchen, würde dies bedeuten, dass wir unsere hohe Qualität, die uns bisher ausgezeichnet hat, opfern müssten."
 RCH_firearms_choice_tooltip: "Wir werden entscheiden, wie wir die Entwicklung von Schusswaffen weiter vorantreiben wollen."

 RCH_gasoline_siphoning:0 "Effizientere Treibstoffversorgung"
 RCH_gasoline_siphoning_desc:0 "Unsere Mechanisierung der Streitkräfte hat zu großartigen Ergebnissen geführt, wurden jedoch durch die langsam einkehrende Treibstoffknappheit gebremst. Auch wenn es uns leider nicht gelingt, Treibstoff aus dem Nichts erscheinen zu lassen, so können wir die Priorität für Treibstoff weg von den Flammenwerfervorräten hin zu unseren mobilen Truppen verlagern."

 RCH_gasoline_siphoning_2: "Energieeinspaarungen"
 RCH_gasoline_siphoning_2_desc: "Um unsere Armee weiter zu versorgen, müssen wir Notfallmaßnahmen zur Stromeinsparung ergreifen."

 RCH_flammenwerfer_teams:0 "Flammenwerfer-Spezialisten"
 RCH_flammenwerfer_teams_desc:0 "Der Flammenwerfer ist eine elegante Lösung für unsere Probleme. Es tötet nicht nur unsere Feinde, sondern reinigt die Tunnel auch auf einen Schlag von ihrem mutierten Einfluss. Wir sollten uns mit der weiteren Verfeinerung dieser Waffe befassen."

 RCH_hanz_get_ze_flamethrower:0 "Hans, hol den Flammenwerfer!"
 RCH_hanz_get_ze_flamethrower_desc:0 "Feuer hat etwas Reines, es kümmert sich nicht darum, was es verbrennt, sondern nur darum, was es tut. Eine reine Waffe für ein reines Volk. Wir müssen noch bessere Flammenwerfer bauen, um diese Welt zu reinigen."

 RCH_gattling_production:0 "LMG-Entwicklung"
 RCH_gattling_production_desc:0 "Während Kugeln im Reich genauso wertvoll sind wie anderswo, verfügen wir über einen viel kleineren Personalpool. Daher ist es kostengünstiger, Kugeln gegen Tötungen einzutauschen, statt das Leben unserer Männer. Das bedeutet, dass eine Waffe mit der ein Mann Dutzende Feinde töten kann, in unserem besten Interesse ist, auch wenn der Mehraufwand an Kugeln etwas höher ist. Es ist eine einfache Rechnung."

 RCH_gattling_production_2:0 "Standardisierte Designs"
 RCH_gattling_production_2_desc:0 "Unsere Maschinengewehrentwicklungen waren sehr vielversprechend, aber wir brauchen noch mehr Feuerkraft für den Einsatz auf Distanz. Dadurch, dass unsere Waffen gemeinsame Konstruktionsprinzipien aufweisen, wie Schnellwechselläufe und offene Bolzenanordnungen, können sie ein anhaltendes Feuer mit minimaler Ausfallzeit erzeugen."

 RCH_german_authenticity:0 "Repliziert Deutsche Qualität"
 RCH_german_authenticity_desc:0 "Die Deutschen verfügten auf dem Höhepunkt ihrer Macht über einige der fortschrittlichsten Waffen der Welt. Wir haben einige Beispiele aus den Moskauer Museen geborgen, die, obwohl sie so alt sind, alles übertreffen, was heute noch in der Metro genutzt wird. Durch die Untersuchung dieser Waffen können wir ihre herausragende Qualität in unsere Designs kopieren."

 RCH_integrated_support_teams: "Interierte Unterstützung"
 RCH_integrated_support_teams_desc: "Armeen marschierten noch nie alleine, sie wurden schon immer von Dutzenden Unterstützungsspezialisten begleitet, die alle eng zusammenarbeiteten, um die Hauptarmee an der Front zu unterstützen."
 RCH_precision_arms:0 "Präzisionswaffen"
 RCH_precision_arms_desc:0 "Wir sind an einem Punkt angelangt, an dem wir nicht mehr versuchen müssen, die präzise Produktion nachzuahmen, die wir uns einfach nicht leisten können. Obwohl unsere Fließbänder möglicherweise nicht gleich aussehen, unterliegen sie demselben Standard."

 RCH_superior_armaments:0 "Überlegene Waffen für Überlegene Menschen"
 RCH_superior_armaments_desc:0 "Wir müssen noch schneller neue Waffen erforschen, wenn wir den Rest der Metro übertreffen wollen. Entwürfe, die auch für kleinere Leute ausreichen würden, sind nicht einmal eines Schrottplatzes würdig."

 RCH_sturmgewehr_2033:0 "Sturmgewehr '2033"
 RCH_sturmgewehr_2033_desc:0 "Endlich haben wir es geschafft! Wir haben nun eine Waffe, die die Spitze aller Waffen in der Metro darstellt. Präzise, zuverlässig und vor allem tödlich. Und das Beste ist, dass sie sogar in Massenproduktion hergestellt werden kann! Obwohl sie unglaublich komplex und teuer in der Herstellung ist, ist sie ihr Gewicht an Kugeln wert. Wir haben beschlossen, es nach dem Modell zu benennen, das sein Design am meisten beeinflusst hat, auch da es sich tatsächlich um ein Sturmgewehr handelt."
 RCH_unlock_sturmgewehr_tt: "Schaltet den Bauplan zur Erforschung des Sturmgewehr' 33 frei"

 RCH_draisine_fitting: "Effizienz der Umrüstung"
 RCH_draisine_fitting_desc: "Wir müssen betonen, wie wichtig es ist, unsere Panzerproduktion zu rationalisieren. Wir müssen uns auf die Sammlung von Ressourcen von der Oberfläche verlassen, um unsere wachsenden Motorisierungsbemühungen voranzutreiben."

 RCH_rail_carts: "Motorisierte Kriegsführung"
 RCH_rail_carts_desc: "Mechanisierung der Wehrmacht = Unsere Streitkräfte müssen jederzeit und problemlos umschichtbar sein. Um dies widerzuspiegeln, müssen unsere Schienenwagen in Topform sein."

 RCH_draisine_armaments:  "Stahl und Feuer-Initiative"
 RCH_draisine_armaments_desc:  "Unsere Fahrzeuge müssen mit stärkeren, imposanten Waffen ausgestattet werden. Wie die unbesiegbaren Armeen des Reiches muss auch unsere Rüstung brutal und effektiv sein."  

 RCH_rail_bikes: "Bewegungskrieg"
 RCH_rail_bikes_desc: "Unsere Schienenräder müssen wendig und schnell sein und jederzeit zuschlagen können. Unsere Streitkräfte müssen die Notwendigkeit schneller, zangenartiger Frontalangriffe betonen."

 RCH_economies_of_scale:0 "Massenproduktion"
 RCH_economies_of_scale_desc:0 "Der ganze schillernde Schnickschnack ist sinnlos, wenn wir am Ende nur für jeden zehnten Mann eine Waffe herstellen können. Wir müssen jede einzelne Fabrik und jeden einzelnen Arbeiter nutzen, um genügend Kugeln zu produzieren, um unsere Feinde zu besiegen, auch wenn sie nicht perfekt sind. Sonst riskieren wir, von denen zerstört zu werden, die es tun."

 RCH_streamlined_production:0 "Rationalisierte Produktion"
 RCH_streamlined_production_desc:0 "Unsere aktuellen Designs können vereinfacht werden, um die Herstellungskosten zu senken. Wir werden überflüssige Ergänzungen entfernen und unsere Waffen auf das beschränken, was nötig ist. Unsere Soldaten mögen sich darüber beschweren, dass ihre Waffen nicht sehr angenehm sind, aber dank dieser Änderungen werden sie immerhin alle eine haben."

 RCH_simple_arms_for_simple_people:0 "Einfache Waffen für ein einfaches Volk"
 RCH_simple_arms_for_simple_people_desc:0 "Unsere Waffen sind vielleicht nicht die schönsten in der Metropole und auch nicht die am besten gebauten. Aber während unsere Feinde darum kämpfen, ihre Soldaten zu versorgen, werden unsere keinen Bedarf an weiteren Kugeln haben. Und wenn sie durch unser endloses Feuer unweigerlich abgenutzt werden, werden wir diese unvollkommenen Waffen in Ehren halten."

 RCH_volkssturm_arms:0 "Volkssturm-Bewaffnung"
 RCH_volkssturm_arms_desc:0 "Der Krieg hat sich nciht unebdingt zu unseren Gunsten entwickelt. Wir müssen im Namen des Überlebens aus allem und jedem eine Waffe herstellen. Die Wasserleitung soll zu einem Gewehr werden, das Fahrrad zur Schrotflinte und die Brotdose zur Mine."

 RCH_superiority_of_the_reich: "Überlegenheit des Reiches"
 RCH_superiority_of_the_reich_desc: "Unsere Überlegenheit war schon immer eine bekannte Tatsache, aber bei diesen Waffen ist es eine kalte, harte Realität, die man auch spüren kann. Unsere Soldaten wissen es, wenn sie diese Waffen führen, und unsere Feinde wissen es, wenn sie durch sie niedergestreckt werden."

 RCH_would_you_like_total_war:0 "Ruft den Totalen Krieg aus"
 RCH_would_you_like_total_war_desc:0 "Ich aber frage euch, wollt ihr den Totalen Krieg? Wollt ihr ihn noch totaler und radikaler, als wir ihn uns bisher auch nur vorstellen konnten?! Wenn JA, dann erhebt euch und schwört dem Führer eure unsterbliche Treue!"

 RCH_ss_integration_2:0 "Endsieg"
 RCH_ss_integration_2_desc:0 "Wir werden den Geschmack des Sieges erst wirklich erfahren, wenn jeder unserer Feinde besiegt ist. Vom Mutanten über den Kommunisten bis hin zum Gesindel der Metro. Wir werden nicht aufhören, bis sie alle tot sind."

 RCH_ss_integration_2_1:0 "Töten mit Stil"
 RCH_ss_integration_2_1_desc:0 "Es reicht nicht sich selbst überlegen zu fühlen, wir müssen auch so aussehen. Während manche es als Ressourcenverschwendung bezeichnen, erhebt die Ss den Anspruch, die Elite der Menschheit zu stellen. Als solche kann sie einfach nicht länger in Lumpen herummarschieren."

 RCH_waffen_ss:0 "SS-Dominanz"
 RCH_waffen_ss_desc:0 "Die Zeit der SS als Attaché der Metromacht ist vorbei. Wir werden ihnen das Oberkommando über unsere militärischen Operationen übertragen und das wird ihre Vormachtstellung sichern."

 RCH_military_ss_1:0 "SS-Akademie"
 RCH_military_ss_1_desc:0 "Wir werden der SS auch die Kontrolle über die Offiziersausbildung übertragen. Damit wird allen zukünftigen Kommandanten vor allem ein unerschütterlicher Eifer vermittelt."

 RCH_military_ss_2:0 "Gründet das Totenkopf-Kommando"
 RCH_military_ss_2_desc:0 "Die Totenkopf-Divisionen waren eine der am meisten gefürchteten und effektivsten Formationen im Zweiten Weltkrieg, und jetzt, nach dem Dritten Weltkrieg, werden sie es wieder sein."

 RCH_military_ss_3:0 "Loyalität bis in den Tod"
 RCH_military_ss_3_desc:0 "SS-Offiziere haben noch nie kapituliert, und jetzt, wo unsere Armee von SS-Offizieren geführt wird, ist es nicht einmal mehr vorstellbar."

 RCH_military_ss_4:0 "§RWerwolf§!-Brigade"
 RCH_military_ss_4_desc:0 "Das uneingeschränkte Bekenntnis der SS zur Ideologie hat alle Ebenen unserer Gesellschaft durchdrungen. Einige besonders engagierte Zivilisten haben sich freiwillig in Formationen organisiert und bewaffnet. Diese Hingabe sollte belohnt werden und wir werden sie im Militär offiziell anerkennen."

 RCH_volkssturm:0 "Der Volkssturm"
 RCH_volkssturm_desc:0 "Während der Krieg bereits im Gange ist, sollten nicht nur unsere Soldaten den ganzen Ruhm für sich horten, das Volk sollte auch Teil daran haben! Es gibt wirklich keinen anderen Grund, warum wir jeden fähigen Mann einziehen, den wir finden können."

 RCH_old_and_decrepit:0 "Die Alten und die Schwachen"
 RCH_old_and_decrepit_desc:0 "Die Alten verfügen über einen reichen Erfahrungsschatz, der auf dem Schlachtfeld eingesetzt werden kann, und selbst die Verstümmelten sind vollwertige Mitglieder unserer Gesellschaft und können ebenso ihren Beitrag leisten. Hoffentlich können sie unsere Feinde auch nur ein wenig verlangsamen."

 RCH_volkssturm_permit_children_recruitment:0 "Kindersoldaten"
 RCH_volkssturm_permit_children_recruitment_desc:0 "Sie wissen, dass Kinder klüger sein können als Erwachsene, und sie sollten sich wirklich an der Gestaltung ihrer eigenen Zukunft beteiligen. Alles ist in Ordnung, alles ist vollkommen in Ordnung!"

 RCH_SS_overview:0 "Direkter Befehle von der Pushkinskaya"
 RCH_SS_overview_desc:0 "Angesichts des Zustroms von nicht vollständig ausgebildeten Armeeangehörigen gab es einige Bedenken, sich in den Kampf zu stürzen. Um sie zu besseren Leistungen zu ermutigen, werden SS-Mitglieder jede Formation überwachen und diejenigen bestrafen, die unsere Kriegsanstrengungen sabotieren würden."

 RCH_the_last_redoubt:0 "Das letzte Aufgebot"
 RCH_the_last_redoubt_desc:0 "Okay genug von der Propaganda, der Feind steht vor unseren Toren und selbst die Tunnel im Blut der Feinde zu fluten hat nichts gebracht. Wir ziehen jetzt jeden ein der aufrecht gehen kann um unsere Verteidigung auszubauen. Wir dürfen von diesen Untermenschen nicht besiegt werden, UND DAS WERDEN WIR AUCH NICHT, EGAL WIE HOCH AUCH DER PREIS IST.."

 RCH_the_iron_legion_2:0 "Fels in der Brandung"
 RCH_the_iron_legion_2_desc:0 "Die Metromacht ist seit ihrer Gründung unser Bollwerk, eine Mauer, die bisher kein Mutant überwinden konnte. Jetzt haben sie auch eine angemessene Verteidigung."

 RCH_the_iron_legion_2_1:0 "Entschlossen bis zum Tode"
 RCH_the_iron_legion_2_1_desc:0 "Wir haben beim Aufbau der Verteidigung großartige Arbeit geleistet, aber wir können noch mehr bauen. Kilometerlange überlappende Feuerzonen, unzählige Fallen und ein Stützpunkt nach dem anderen. Wenn es in der Metro einen Feind gäbe, der diese Verteidigungsanlagen durchbrechen könnte, wäre er tot, bevor er auch nur einen Fußbreit unseres Gebietes sichern könnte."

 RCH_the_iron_legion_3:0 "Bollwerk aus Stahl"
 RCH_the_iron_legion_3_desc:0 "Unsere Feinde sind zahllos. Obwohl sich unsere Verteidigung bisher als ausreichend erwiesen hat, müssen wir sie doch weiter verbessern. Lass den Feind kommen, niemals wird er unsere Verteidigung durchbrechen."
 RCH_til_1:0 "Lokalisiertes Kommando"
 RCH_til_1_desc:0 "Indem wir unsere Streitkräfte in übergreifende Divisionen umgruppieren und ihrem Kommando operative Flexibilität verleihen, können wir unsere Truppen dazu bringen, die Bedingungen auf dem Schlachtfeld auszunutzen, ohne auf das Oberkommando warten zu müssen, wobei sich diese Bedingungen möglicherweise wieder ändern."

 RCH_til_2:0 "Direkter Gegenschlag"
 RCH_til_2_desc:0 "Indem wir mobile Fabriken näher an der Front bereitstellen, können wir die sich zurückziehenden Streitkräfte schneller neu ausrüsten, als unsere Feinde ihre Verteidigung festigen können. Die Truppen, die sie gerade ohne Munition abziehen sahen, werden bald mit nachgefüllter Munition zurückkehren."

 RCH_til_4:0 "Tiefeninfiltration"
 RCH_til_4_desc:0 "Unsere Kommandos gehören zu den am besten ausgebildeten in der Metro, ihre Ausrüstung entspricht jedoch nicht immer diesem Niveau. Kürzlich sind sie jedoch in die Lagerbestände unserer Feinde eingebrochen und kamen mit Ausrüstung der Spezialeinheiten aus der Vorkriegszeit zurück. Eine würdige Belohnung für unsere Besten."

 RCH_til_3:0 "Mobile Verteidigung"
 RCH_til_3_desc:0 "Viele der Waffen unserer Feinde haben genug Kraft, um einen Menschen zu töten, aber nicht viel mehr. Wenn wir unsere Spezialeinheiten mit verstärkten Schilden einsetzen, sind sie plötzlich unempfindlich gegenüber den meisten Feuerangriffen, die auf sie zukommen. Damit sich unsere Investition auch auszahlt, müssen wir sofort mit deren Einsatz beginnen."

 RCH_outwards:0 "Das Reich erwacht"
 RCH_outwards_desc:0 "Während wir auch im Inneren immer wachsam bleiben müssen, so müssen wir doch nun unseren Blick nach Außen richten. Die größte Bedrohung sind die unzähligen Mutanten um uns herum, die sich tagtäglich vermehren. Wir können zwar noch nicht mit der Säuberung der gesamten Metro beginnen, aber wir können damit beginnen, kleine Schritte zu unserem Ziel zu unternehmen."

 RCH_outwards_into_mayakovskaya: "Eine vergessene Station"
 RCH_outwards_into_mayakovskaya_desc: "Es gibt hier eine Station von geringem Wert, niemand kümmert sich um sie und es gibt nicht einmal nennenswerte Verteidigungsanlagen. Es würde niemanden interessieren, wenn sie einfach verschwinden würden."

 RCH_mayakovskaya_1a:0 "Säubert die Mayakovskaya"
 RCH_mayakovskaya_1a_desc:0 "Jetzt, da die Station uns gehört, ist es nur natürlich, dass wir auch hier die Menschen von den Mutanten trennen. Obwohl unsere Hoffnungen für diese Leute nicht gerade groß sind, so liegt es in unserer Verantwortung, uns um die wahren Menschen zu kümmern. Immerhin sind wir ja keine Monster."

 RCH_mayakovskaya_1b:0 "Sklavenarbeit"
 RCH_mayakovskaya_1b_desc:0 "Auch wenn wir es ablehnen Mutanten in unseren Grenzen zu dulden, so ist es doch eine Tatsache, dass wir nur wenige Mutanten bei uns haben und dass sie dennoch einen gewissen Wert für uns haben, nähmlich den ihrer Arbeit. Indem wir sie zur Arbeit zwingen, können wir unsere Produktion steigern, obwohl unsere Bevölkerung über diese Änderung der Politik nicht gerade glücklich sein wird."

 RCH_mayakovskaya_2a:0 "Aufbau"
 RCH_mayakovskaya_2_desc:0 "Unabhängig davon, was wir den Menschen antun, müssen wir entscheiden, was wir mit der Station selbst tun. Sie mag zwar nie so hell leuchten wie unsere Heimatstationen, aber wenn wir den Schmutz beseitigen, so könnte sie ein wertvolles Mitglied unserer Wirtschaft sein."

 RCH_mayakovskaya_2b:0 "Verteidigungsstellungen"
 RCH_mayakovskaya_2b_desc:0 "Dieser Ort wird nie wirklich unser Zuhause sein, aber er kann zu seiner Verteidigung beitragen. Durch die Verbesserung der Bahnlinie und den Aufbau von Verteidigungsanlagen können wir uns gegen jeden Angriff aus dem Norden schützen."

 RCH_mayakov_a: "§Y[316.GetName]§! beherbergt Menschen"
 RCH_mayakov_b: "§Y[316.GetName]§! ist verlassen"
 RCH_anti_capitalist_dogma:0 "Antikapitalistisches Dogma"
 RCH_anti_capitalist_dogma_desc:0 "Auch wenn die schmutzigen Roten das dringlichere Problem darstellen, verblasst ihre Stärke im Vergleich zur Hanse. Wir sollten damit beginnen, unser Volk auf den Kampf gegen sie vorzubereiten, damit dieser harte Krieg einfacher wird."

 RCH_anti_communist_dogma:0 "Antikommunistische Rethorik"
 RCH_anti_communist_dogma_desc:0 "Die Kommunisten werden immer unseren größten Feind darstellen. Ohne sie würden wir wahrscheinlich nicht in dieser Metro festsitzen! Unser Volk soll sie mit jeder Faser seines Wesens verachten."

 RCH_surface_expeditions_1: "Oberflächenplünderung"
 RCH_surface_expeditions_1_desc: "Wenn wir uns darauf konzentrieren, oberirdische Ressourcen unter die Erde zu bringen, so werden wir Dinge erhalten, die wir in den Tunneln nicht bekommen könnten. Während sich unsere Feinde damit abmühen, die Tunnel zu durchsuchen, werden wir alles unter dem Himmel ernten."

 RCH_surface_expeditions_2: "Oberflächenfeldtests"
 RCH_surface_expeditions_2_desc: "Die Erforschung von Möglichkeiten zur Verbesserung unserer Überlebensausrüstung für die Oberfläche würden auch unsere Spezialeinheiten unter der Erde verbessern. Alles, was die harte Realität der Oberfläche überstehen kann, wird auch im Tunnel standhalten."

 RCH_surface_expeditions_3: "Das Auge des Sturmes"
 RCH_surface_expeditions_3_desc: "Nach Monaten der Oberflächenerkundung glauben unsere Stalker, geheime Wege entdeckt zu haben, die direkt in das Territorium der Roten Linie führen!"

 RCH_infiltrate_paveletskaya:0 "Infiltriert die Paveletskaya"
 RCH_infiltrate_paveletskaya_desc:0 "Eine weit entfernte, abgelegene Station bietet uns eine recht einzigartige Gelegenheit. Das Loch ist schwach und wird ständig von Mutanten bedroht, wenn wir dort eine Regierung wie die unsere aufbauen würden, würde dies den Menschen in der Metro nicht nur zeigen, dass wir gütig sind, sondern auch, dass wir der Weg zur Stärke sind"
 RCH_recruit_stortbeker: "Stortbeker wurde nicht verbannt."

 RCH_hole_alliance: "Kraftwerke"
 RCH_hole_alliance_desc: "Jetzt, wo sie unsere Ideologie akzeptiert haben, ist es nur fair, sie dafür auch zu belohnen. Unsere Stalker werden mit Industrieteilen die tückische Reise über die Oberfläche antreten, um ihre Industrie aufzubauen."

 RCH_hole_alliance1:0 "Stellt ihnen Ausrüstung"
 RCH_hole_alliance1_desc:0 "Trotz der neuen Werkstätten hat das Loch einiges an Ausrüstungsdefekten auszugleichen. Wir sollten ihnen eine Menge alter Waffen schicken, zur Unterstützung."

 RCH_hole_alliance2:0 "Berater-Attache"
 RCH_hole_alliance2_desc:0 "Das Militär des Lochs (wenn man das überhaupt so nennen kann) ist unorganisiert und ineffektiv. Wir werden einige Offiziere zu ihnen schicken, damit sie sie beim Wiederaufbau ihrer elenden Streitkräfte unterstützen können."

 RCH_hole_alliance3:0 "Kein Malarky mehr!"
 RCH_hole_alliance3_desc:0 "Mit unserer Hilfe ist es dem Loch gelungen, die verlorene Sicherheit in ihrer Station zurückzugewinnen, einschließlich verlorener Munitionsfabriken. Lassen Sie die ganze Metro wissen, dass das Loch nun sicher ist, natürlich durch unsere großzügigen Hilfe."

 RCH_proclamation_of_slavic_unity:0 "Verkündung der Slawischen Einigkeit"
 RCH_proclamation_of_slavic_unity_desc:0 "Innerhalb unserer Grenzen gedeihen die Slawen, aber im Rest der Metro gibt es auch noch echte Menschen, die unter den Mutanten schuften müssen. Der Gedanke allein ist inakzeptabel! Wir verkünden hiermit, dass das Reich nicht reichen wird, bis jeder Mensch in unserer Obhut sicher ist. Und bis jeder Mutant tot ist."
 RCH_cult_of_personality_tooltip: "Der Führer herrscht über allem"

 RCH_lebensraum: "Lebensraum"
 RCH_lebensraum_desc: "Unsere Leute vegetieren in unseren Tunneln zusammengepfercht dahin, während die Mutanten einen für sie ungebührlichen Luxus genießen. Wir müssen den Lebensraum unseres Volkes sichern, auch wenn wir zuerst die Mutantenhorden vertreiben müssen."
 
 RCH_expansion3: "Erweitert unseren Einfluss"
 RCH_expansion3_desc: "Eine benachbarte Macht hat von unseren Methoden gehört und beginnt sie nachzuahmen. Auch wenn es nur eine schlechte Immitation der Arbeit unserer SS ist, so beweist ihr Einsatz doch, dass an dieser Station noch echte Menschen das Sagen haben. Warum sollten wir gutes Blut vergießen, wenn wir es auch friedlich in unsere Sphäre aufnehmen könnten?"

 RCH_expansion4: "Besetzung der Belorusskaya"
 RCH_expansion4_desc: "Eine weitere erbärmliche Mutantenstation an unserer Grenze, lasst uns sie mit genau der geringen Anstrengung erobern, die sie verdient."

 RCH_expansion5: "Invasion der [BRK.GetName]"
 RCH_expansion5_desc: "Die Freien Farmen sind voll von fruchtbarem Boden und züchten Getreide, welches ein Mutant nicht einmal säen könnte. Wir müssen diese Güter von ihnen befreien und sie unserem Volk geben, das es weitaus mehr verdient."

 RCH_expansion6: "Kampf gegen die Techniker"
 RCH_expansion6_desc: "Die Waffenkammer ist voller abscheulicher kommunistischer Mutanten, die den Großteil der Waffen in der Metro produzieren, insbesondere für die widerliche Rote Linie. Indem wir Scharmützel entlang unserer Grenze beginnen, können wir die Munition abbauen, die unserem größten Feind zugute kommen würde."

 RCH_expansion7: "Marsch in die [TRB.GetName]"
 RCH_expansion7_desc: "Eine weitere Mutantenstation an unseren Grenzen, eine weitere Kampagne, um sie zu töten."

 RCH_expansion8: "Invasion der Kuznetsky-Brücke"
 RCH_expansion8_desc: "Unsere Vorbereitungen gegen die Waffenkammer sind in vollem Gange, um den größten Verbündeten der Roten Linie auszuschalten und auf einen Schlag einen Berg von Waffen zu sichern."

 RCH_expansion2: "Expansion in die Konföderation"
 RCH_expansion2_desc: "Die Konföderation von 1905 ist ein weiteres Nest mutierter Kommunisten. Allerdings mangelt es ihnen im Gegensatz zur Roten Linie an Geschlossenheit und Koordination, was sie zu einem viel einfacheren Ziel und einem guten Übungslauf für die Rote Linie macht."

 RCH_expansion: "Expansion in die Allianz"
 RCH_expansion_desc: "Die Allianz glaubt an solch einen schrecklichen Wahnsinn wie „Demokratie“ und „Freie Meinungsäußerung“. Die größte Lüge an die sie glauben ist jedoch, dass sie in der Geschichte der Metro eine Rolle spielen. Es ist an der Zeit, sie über die harte Wahrheit aufzuklären."
 
 RCH_expansion_trubnaya_core: "Illusionen zerstreuen"
 RCH_expansion_trubnaya_core_desc: "Nachdem ihre Verteidigungsanlagen zerschlagen und ihre Soldaten getötet wurden, fängt die kalte, harte Wahrheit an, bei den Menschen durchzudringen. Dass sie keine Rolle spielen und es auch nie wirklich gespielt haben. Geben wir ihnen endlich einen dringend benötigten Zweck."

 RCH_expansion_barrikadnaya_core: "Bereitet die Kolonisation des Westens vor"
 RCH_expansion_barrikadnaya_core_desc: "[418.GetName] gehört nun dem Reich. Während die Leichen der Mutanten und anderer übler Sympathisanten von den Bahnsteigen eingesammelt werden, schmiedet das Reich bereits Pläne für die Ansiedlung von Reichsbürgern an der Station. [418.GetName] wird zu gegebener Zeit eine stolze Station des Reiches sein."

 RCH_finish_off_SAV: "Zerschlagt die Allianz"
 RCH_finish_off_SAV_desc: "Da die Allianz kaum sie selbst in ihrem jetzigen Zustand ist, wird es uns nicht viel Mühe kosten, sie endgültig zu vernichten. Beginnen wir damit, sie vor sich selbst zu retten."

 RCH_finish_off_1905: "Erledigt den Rest"
 RCH_finish_off_1905_desc: "Was von der 1905'er übrig geblieben ist, löst sich nun schnell auf, und alle beschuldigen sich gegenseitig für ihre Niederlage in unserem Krieg. Lassen Sie uns diese erbärmliche Entschuldigung einer Nation aus ihrem Elend befreien."

 RCH_targetreds: "Angriff auf die Rote Linie"
 RCH_targetreds_desc: "Jetzt ist es an der Zeit, dass wir uns mit unserem ältesten Feind auseinandersetzen. Wir befinden uns nicht mehr in dem traurigen Zustand von vor ein paar Jahren und werden jetzt den letzten Nagel in den Sarg des Kommunismus schlagen."

 RCH_targetreds_2: "Todesschwadronen"
 RCH_targetreds_2_desc: "Es gibt so viele Mutanten in ihrer Armee, dass wir die Personenkontrollen bei Kriegsgefangenen vorerst aussetzen und sie für die Dauer des Krieges in großen Mengen töten. Die Wachen und Reinheitsinspektoren, die über sie wachen würden, werden in Formationen mobilisiert, um schneller Mutanten zu töten."

 RCH_targetreds_3: "Integration der Linie in das Reich"
 RCH_targetreds_3_desc: "Wir haben es geschafft! Die kommunistische Bedrohung existiert nicht mehr, und jetzt gehört uns sogar die größte Bevölkerung in der gesamten Metro. Wir müssen jetzt mit der Entkommunisierung und Entmuntanisierung der Roten Linie beginnen. Es ist eine Schande, dass leider so viele von Mutanten sind, aber na ja, wir haben ja jetzt eine Menge Munition übrig."

 RCH_expansion_pls_tunnel: "Expansion in die Außenbezirke der Polis"
 RCH_expansion_pls_tunnel_desc: "Polis ist die Heimat einiger der letzten großen Werke der Menschheit. Obwohl sie möglicherweise perfide Mutanten hereinlassen, zeigen unsere Untersuchungen, dass die Polis-Eingeborenen zu den reinsten Menschen in der gesamten Metro gehören. Wir müssen uns bereitmachen, sie zu erobern."

 RCH_expansion_pls_annex: "Ein vierter Arm für das Reich"
 RCH_expansion_pls_annex_desc: "Mit der Polis unter unserer Kontrolle haben wir unserem Vermächtnis alle Ehre gemacht und sind nun mit einigen der klügsten und stärksten verbliebenen Menschen nicht mehr aufzuhalten."

 RCH_war_against_the_capitalists: "Krieg gegen den Kapitalismus"
 RCH_war_against_the_capitalists_desc: "Jetzt ist es an der Zeit, die letzte Großmacht in der Metro auszuschalten. Die Hanse ist gut bewaffnet und gut vorbereitet, aber dem Reich kann jetzt nichts mehr im Wege stehen."

 RCH_thousand_year_reich: "Tausendjähriges Reich"
 RCH_thousand_year_reich_desc: "Mit unserer jüngsten Eroberung der Polis ist die Existenz unseres Reiches gesichert. Wo Kommunisten, Kapitalisten und Mutanten ihr Bestes gegeben haben, da bleiben nur wir. Wo die Welt versucht hat, uns mit Atomwaffen vom Erdboden zu vertreiben, da bleiben wir. Und in tausend Jahren werden wir bleiben, ungeachtet dessen, was die Welt versuchen mag, uns entgegenzuwerfen!"