 nf_RED.74.d:0 ""
 nf_RED.74.a:0 "Zur Kenntniss genommen"

 nf_RED.78.t:0 "Bruder"
 nf_RED.78.d:0 "Was blieb ihm am Ende all der Leichen, die die Schächte der Station säumten, und all des Elends, das er verursacht hatte? Er war einsam und dazu degradiert, ein bloßes Werkzeug zu sein – manipuliert von den höheren Mächten, die das Sagen hatten. Sein eigener Sohn empfand Abscheu vor seinem Vater und hegte tiefen Groll gegen ihn. Der korrupte, zum Gespött verkommene sozialistische Staat war noch immer genauso korrupt wie an jenem Tag, als er zum Generalsekretär aufgestiegen war. Überall lauerten Feinde – innerhalb wie außerhalb –, die die Revolution endgültig auslöschen würden. Maxims gesamtes Leben war von Trauer und Bitterkeit gegenüber seinem Bruder verschlungen worden. Stets strebte er nach mehr im Leben, doch weder seine Macht noch seine Arroganz vermochten diese Leere zu füllen. Er besaß keine glorreichen Tage, an die er sich wehmütig hätte erinnern können; denn niemals hatte er im Leben Erfüllung gefunden. Weder an der Seite seines Bruders noch in der Zeit vor dem Krieg. Ein erbärmlicher Verlierer. Einer, der sich schließlich vor der Mündung der Waffe eines aufstrebenden Rivalen wiederfinden würde.."
 nf_RED.78.a:0 "Vergib mir, Bruder..."

 nf_RED.79.t:0 "Die Wahl"
 nf_RED.79.d:0 "Mit dem nahenden Abschluss der Wahl war der Konsens zwischen dem Politbüro und den Stationschefs besiegelt. Doch dann kam Maxim mit seinem Joker ins Spiel. Er trat gegen seinen eigenen Bruder an. Die Entdeckung belastender Informationen beendete Andreys politische Karriere jäh und auf der Stelle."
 nf_RED.79.a:0 "Die erdrückenden Beweise ruinierten Andreys Glaubwürdigkeit. Er wurde in einer Zelle der Lubjanka dem Verfall preisgegeben."

 nf_RED.80.t:0 "Korbut übernimmt das Ruder"
 nf_RED.80.d:0 "Sich durch Intrigen und Ränkespiele an die Spitze zu arbeiten – das fiel ihm leicht. Nun sollen all die Früchte seiner Arbeit reifen. Andrey musste lediglich aus dem Weg geräumt werden."
 nf_RED.80.a:0 "Mit Andreys Tod übernahm Korbut die Kontrolle."

 nf_RED.85.t:0 "Wahltag"
 nf_RED.86.d:0 ""
 nf_RED.85.a:0 "Einstimmig wurde Andrey zum Generalsekretär wiedergewählt ."
 nf_RED.85.b:0 "Maxim wurde zum neuen Generalsekretär gewählt.."