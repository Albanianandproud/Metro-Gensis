l_english:
nf_STB.1.t: "In die Nacht"
nf_STB.1.d: "Stortbeker hatte treu gedient.

Jeder Befehl war ohne Zögern ausgeführt worden. Jede Anweisung ohne Fragen durchgesetzt. Loyalität schien auszureichen, und sie war immer wieder unter Beweis gestellt worden.

Stortbeker hatte die Berichte gelesen, einige sogar persönlich unterzeichnet. Ein Name, der lange genug hinter vorgehaltener Hand geflüstert wurde – und dann nicht mehr. Als hätte diese Person niemals existiert. Stortbeker wusste, wohin das führte, und zögerte nicht, seine eigenen Schlüsse daraus zu ziehen.

Diejenigen, die ihm folgten, hatten ihre Entscheidung bereits getroffen. Loyalität war vielleicht nicht das richtige Wort, aber sie waren in gewisser Weise ebenso hilflos. Sie handelten schnell. Vorräte, Waffen, alles, was sich unauffällig in die Dunkelheit schaffen ließ.

Es gibt eine Station, längst verlassen. Von allen vergessen. Weit entfernt von den umherstreifenden Einsatzkommandos des Reichs – und nun unsere vorübergehende Heimat."
nf_STB.1.a: "[STB.Capital.GetName], unsere neue Heimat."

nf_STB.2.t: "Ressourcenbeschaffung"
nf_STB.2.d: "[STB.Capital.GetName] könnte der schlimmste Ort gewesen sein, an dem unsere Brigade hätte Unterschlupf finden können. Durchdringende Strahlung, wuchernde Mutanten und Anomalien. Vielleicht macht genau das diesen Ort zu einem perfekten Versteck, bis wir unsere Wunden geleckt und uns neu gesammelt haben. Niemand würde es wagen, uns hier zu suchen.

Die Notwendigkeit, uns neu zu organisieren und zu festigen, könnte kaum dringlicher sein. Die Vorräte gehen rasch zur Neige: Munition, Medikamente, Ausrüstung. Wenn sich die Lage nicht bald bessert, werden wir eher unsere Lederstiefel – oder einander – essen müssen."
nf_STB.2.a: "Vorsichtig müssen wir unseren Bedarf decken. Wenn nötig auch mit Gewalt."
nf_STB.2.a.tt: "§Y[STB.GetName]§! verbessern ihre Forschung nicht durch Bildungsreformen wie die meisten Nationen. Ohne eine nennenswerte Forschungsbasis müsst ihr Forschungspläne von anderen Stationen 'beschaffen'.

Prüft §YForschungsspionage§! unten rechts auf dem Bildschirm §C(unter dem Reiter Überfälle)§!, um entsprechende Operationen durchzuführen."

nf_STB.3.t: "Ungebundenes Potenzial"
nf_STB.3.d: "Begleitet von kaum mehr als einem halben Dutzend bewaffneter Wachen wirkte seine Ankunft beinahe wie die Überführung eines Gefangenen. Der betreffende Wissenschaftler, Dr. Todorov, gilt nach allen verbliebenen Berichten als brillanter Mann. Seine Arbeit hatte selbst die Führung des Reichs beeindruckt, und wären da nicht seine fragwürdigen Methoden und seine Ethik gewesen – selbst für den Führer zu abscheulich –, hätte das Reichsdreieck wissenschaftlich vielleicht sogar Polis Konkurrenz machen können.

Gerüchte folgten ihm überallhin. Geschichten über grauenhafte Experimente, die die Grenze zwischen Medizin und Barbarei verwischten. Von Versuchspersonen, die niemals hätten überleben sollen und es dennoch taten ... verändert.

Er betrat unser Gebiet freiwillig, die Augen voller Faszination, als würde er ein hochmodernes Labor betreten und nicht die verstrahlten Ruinen einer zerfallenden Station. Seine Hoffnung ist es, unsere Forschung erheblich zu beschleunigen. Doch Zusammenarbeit hat ihren Preis. Zugang zu Versuchspersonen und die Freiheit, seiner „Neugier“ nachzugehen, wohin sie ihn auch führen mag.

Manche in unseren Reihen nennen ihn bereits ein Monster. Nur wenige sehen in ihm eine Chance."
nf_STB.3.a: "Lasst ihn arbeiten. Was notwendig ist, werden wir entscheiden."

nf_STB.4.t: "Freiwilliger Gehorsam"
nf_STB.4.d: "Dr. Todorovs Anfrage erreichte uns in bemerkenswert ordentlicher Form – sauber dokumentiert und in einem versiegelten Umschlag. Man hätte es für einen Scherz halten können, wenn mehr als ein Drittel unserer Brigade lesen oder schreiben könnte.

Der Doktor schien begierig auf Versuchspersonen zu sein. Höflich fragte er danach. Nicht nach den Ratten, mit denen er bisher gearbeitet hatte. Nein. Er stellte klar, dass er lebende Menschen benötigte. Bei Bewusstsein. Weder krank noch alt oder gebrechlich.

Seine Notizen waren penibel ausgearbeitet, voller Anmerkungen und Diagramme, die auf eine beunruhigende Klarheit seines Vorhabens schließen ließen. Weitaus verstörender als bloßer Wahnsinn.

Natürlich wurden Fragen gestellt. Und ebenso selbstverständlich beantwortete der Doktor sie ohne Zögern.

Der menschliche Körper, erklärte er, habe Grenzen. Und Grenzen würden am besten verstanden, wenn man sie überschreitet.

An Gefangenen, Abschaum und anderen Unglücklichen mangelt es uns nicht. Da die Brigade ohnehin selten genug Munition besitzt, um jeden Verurteilten durch eine Kugel loszuwerden, könnte das Skalpell vielleicht die bessere Alternative sein.

Der Doktor wartet."
nf_STB.4.a: "Genehmigt seine Experimente."
nf_STB.4.b: "Das ist blanker Wahnsinn."

nf_STB.5.t: "Projekt Supersoldaten"
 nf_STB.5.d: ""
 nf_STB.5.a: ""
 nf_STB.6.t: ""
 nf_STB.6.d: ""
 nf_STB.6.a: ""
 nf_STB.7.t: "Der replizierte Mensch"
nf_STB.7.d: "Dr. Todorovs Forschungen haben seit unseren Anfangstagen große Fortschritte gemacht. Doch noch immer liegt eine letzte Hürde vor uns. Einst war seine Arbeit auf Operationstische und improvisierte Holzbaracken beschränkt, nun spricht er offen von „Produktion“. Seine hastig zusammengestellten und absichtlich verschleierten Aufzeichnungen beschreiben Versuche, seine früheren „Erfolge“ durch Methoden zu reproduzieren, die sowohl Vernunft als auch Anstand zu verhöhnen scheinen.\n\nDie menschliche Gestalt – lediglich eine Vorlage. Etwas, das angepasst und, wenn nötig... verworfen werden kann.\n\nDoch inzwischen sind seine Ambitionen über unsere derzeitigen Möglichkeiten hinausgewachsen. Das hat er mehr als deutlich gemacht. Diese Tunnel, verlassenen Stationen und Wartungsräume seien, wie er es ausdrückte, „eine Beleidigung für das Ausmaß dessen, was erforderlich ist“.\n\nDr. Todorov verlangt einen eigenen Forschungskomplex. Kontrollierte, sterile Bedingungen. Angemessene Ausrüstung. Eine Einrichtung, in der seine Arbeit... ungehindert voranschreiten kann.\n\nUnd im Gegenzug...?\n\nEine Armee, die nicht fragt. Nicht zögert. Eine Armee, die hasst."
nf_STB.7.a: "Wir werden ihm geben, was er braucht."

nf_STB_todorov.1.t: "Erste Ergebnisse"
nf_STB_todorov.1.d: "Dr. Todorov bestand darauf, dass der Prozess „empfindlich“ sei und eine vorzeitige Enthüllung die Konditionierung des Subjekts stören könne. Seine Versicherungen taten wenig, um das Unbehagen zu lindern, das sich in der Station ausbreitete. Wachen sprachen nur noch im Flüsterton. Manche baten um Tunneldienst, andere hörten schlicht auf zu reden.\n\nHeute präsentierte er uns sein Werk.\n\nVor uns stand etwas, das einem Menschen ähnelte. Zumindest soweit man die Umrisse einer menschlichen Gestalt noch erkennen konnte. Doch es war schrecklich... entstellt. Umgeformt. Über jede natürliche Grenze hinaus verändert. Die Haut spannte und riss an den falschen Stellen. Chirurgische Nähte zogen sich wie ein chaotisches Netz über den gesamten Körper.\n\nUnd doch stand es stramm.\n\nAuf Befehl gehorchte es. Ohne Zögern. Ohne die geringste Spur von Angst. Es führte jeden Befehl mit unnatürlicher Präzision aus und bewegte sich in einem langsamen, schwerfälligen Gang. Der Doktor lächelte lediglich und erklärte seine Experimente für einen Erfolg."
nf_STB_todorov.1.a: "Wenn es kämpft... dient es."

nf_STB_supplies.1.t: "Unfreiwillige Rekruten"
nf_STB_supplies.1.d: "Weitere erschöpfte Gestalten schließen sich den Reihen unserer Brigade an. Ausgestoßene des Reiches, die aus Angst vor Vergeltung keinen anderen Zufluchtsort mehr haben. Diese Soldaten wirken noch ungeordneter und verwahrloster als unsere eigenen Leute. Schon bald werden sie das Rückgrat unserer Truppe bilden."
nf_STB_supplies.1.a: "Unsere Brigade wächst."

nf_STB_supplies.2.t: "Schusswaffen"
nf_STB_supplies.2.d: "Wir haben einige bedeutende Fortschritte bei der Entwicklung unserer Waffen gemacht. Auch wenn es immer noch zusammengeflickte Bastardgewehre sind. Mehr ist schließlich immer besser, oder?"
nf_STB_supplies.2.a: "Die können wir gebrauchen."

nf_STB_supplies.3.t: "Versorgungspakete"
nf_STB_supplies.3.d: "Gestohlen von Karawanen oder aus versteckten Vorratslagern geplündert – diese Vorräte befinden sich nun in unseren Händen. Benutz sie oder verlier sie, wie man so schön sagt..."
nf_STB_supplies.3.a: "Die werden sich als nützlich erweisen."

nf_STB_supplies.4.t: "Die schweren Geschütze"
nf_STB_supplies.4.d: "Alte Kontrollposten, Barrikaden und zerstörte Handwagen wurden ausgeschlachtet, und nun liegen die Waffen in unseren Händen. Mit etwas Arbeit und einigen Reparaturen werden sie eine willkommene Verstärkung unseres Arsenals sein."
nf_STB_supplies.4.a: "Gut."