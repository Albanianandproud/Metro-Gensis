l_german:
 the_order:0 "Ranger des Ordens"
 the_order_desc:0 "Auch 'Spartaner' genannt, sind die Ranger des Ordens eine Gruppe von Elitesoldaten, gegründet aus den Überresten der Spetsnaz, die den Krieg überlebt haben. Jeder von ihnen ist ein kampferfahrener Soldat und hat die beste Ausbildung erhalten, die in der Metro zu finden ist."

 protectors:0 "Beschützer der Menschheit"
 protectors_desc:0 "Die Ranger des Ordens kämpfen weder für Ideologie, noch Wohlstand, ihr Ziel ist einzig und allein dem Überleben der Menschheit gewidmet. Meist kooperieren sie hierfür eng mit der Polis, oft helfen sie jedoch auch kleineren Stationen in ihrem Kampf gegen Banditen und Mutanten. Von ihren Feinden werden sie in der gesamten Metro gefürchtet"

 rigorous_training:0 "Umfassendes Training"
 rigorous_training_desc:0 "Die Natur des Ordens verlangt die Besten der Besten und selbst die Rektruten werden nach strengen Kriterien auserwählt, bevor dann erst das eigentliche Training beginnt."
 
 SPT_ranger_recruitment:0 "Ranger-Rekrutierung"
 SPT_ranger_recruitment_desc:0 "Nur wenige vielversprechende Kandidaten werden in den Orden als Rekruten aufgenommen, bevor sie dazu gedrillt werden die Besten der Besten zu sein."


 SPT_ranger_recruitment_extensive:0 "Umfassende Rekrutierung"
 SPT_ranger_recruitment_extensive_desc:0 "Düstere Zeiten verlangen nach drastischen Maßnahmen. Wir brauchen mehr Soldaten um unsere Reihen zu füllen, denn §YWenn nicht wir, wer dann?§!"

 SPT_ranger_recruitment_station_auxiliary:0 "Stationäre Hilfskräfte"
 SPT_ranger_recruitment_station_auxiliary_desc:0 "Jene die sich der Menschheit verpflichtet haben müssen nun zusammenstehen. Einberufene Milizen werden die einfacheren Aufgaben unserer Ranger übernehmen und so eine noch schlagkräftigere Streitmacht aufbauen." 

