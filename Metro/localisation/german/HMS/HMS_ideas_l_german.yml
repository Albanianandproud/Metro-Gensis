 molodezhnaya:0 "Mensch-Mutanten-Gemeinschaft "
 molodezhnaya_desc:0 "Eine Gemeinschaft bestehend aus Menschen und Mutanten gleichermaßen. Die Mutanten entstammen aus der Strahlung und der schlechten Luft der Station, welche nicht tief genug liegt um echten Schutz zu bieten. Die kleine Station wurde somit zu einem Zufluchtsort für zahlreiche mutierte Menschen aus der gesamten Metro.\n\nIsoliert vom Rest der Metro haben die Bewohner der Molodezhnaya hier ein sicheres Zuhause gefunden. Zwar starben durch die Strahlung auch viele Menschen, doch jene die überlebten entwickelten oft telephatische oder andere übernatürliche Fähigkeiten.\n\nRTrotz ihrer oft grotesken Erscheinung halten die Mutanten ihre Station sauber und ordentlich, vermutlich in einem Versuch so wenigstens ihren Geist 'menschlich' zu halten."
