l_german:

### New Quarter ###

  HNZ_rebuild_koltsevskaya: "Wiederaufbau der Ringlinie"
HNZ_rebuild_koltsevskaya_desc: "Trotz ihres weitgehend intakten Zustands gibt es entlang der Koltsevaya-Linie noch viel zu tun. Trümmer müssen beseitigt, Vagabunden vertrieben und Mutantennester ausgeräuchert werden ... und dabei haben wir die Stationen selbst noch nicht einmal berücksichtigt."


HNZ_Skaven-wth: "Ein Gerücht über Ratten..."

HNZ_south_arc_1: "Instandsetzung des Südabschnitts"
HNZ_south_arc_1_desc: "Der südliche Abschnitt blieb von den Schrecken der Kriege zwischen der Hanse und der Roten Linie größtenteils verschont. Auf den ersten Blick wirkt er friedlich, doch dieser Eindruck täuscht. Ersetzt man die Mutanten und Faschisten des Nordens durch Banditen und Anomalien, befindet sich der Süden beinahe in derselben Lage wie der Nordabschnitt."

must_complete_centralisation_tt: "Nach Abschluss dieses Fokus muss zunächst der Fokus §YZentralisierung des Abschnitts§! abgeschlossen werden, bevor der nächste Zentralisierungszweig verfolgt werden kann.\n\n"

HNZ_south_arc_military_1: "Die Waffenkammern von Taganskaya"
HNZ_south_arc_military_1_desc: "Das Taganski-Dreieck zählt zu den sichersten und am stärksten befestigten Gebieten des gesamten Metros. Viele würden bereitwillig für eine Sicherheit bezahlen, wie sie anderswo kaum zu finden ist. Händler und Militärtransporte strömen hierher und machen die Region zu einem bedeutenden Handelszentrum auf dem Weg zur Kalininskaya-Linie."

HNZ_south_arc_military_2: "Verteidigung gegen die Mutanten des Südens"
HNZ_south_arc_military_2_desc: "Auch wenn die Mutantenbedrohung hier geringer ausfällt, stellt sie weiterhin eine erhebliche Gefahr dar – insbesondere jenseits der Tul'Skaya und in der Nähe von Paveletskaya."

HNZ_south_arc_industry_1: "Vereinigung der Technikerteams"
HNZ_south_arc_industry_1_desc: "Unsere technischen Fachkräfte sind über die gesamte Hanse verstreut. Manche arbeiten in großen Handwerkerkomitees, andere in kleinen Familienbetrieben leidenschaftlicher Techniker. Ihre Zusammenführung in einer einzigen Organisation wäre die ideale Lösung."

HNZ_south_arc_industry_2: "Protektionismus durchsetzen"
HNZ_south_arc_industry_2_desc: "Der Handel floriert, doch wir dürfen nicht vergessen, unsere kleinen heimischen Betriebe vor der Konkurrenz außerhalb der Liga zu schützen. Besteuerung oder notfalls die Durchsetzung durch Stationswachen sollten dieses Ziel erreichen."

HNZ_south_arc_trade_1: "Den Handelsfluss sichern"
HNZ_south_arc_trade_1_desc: "Deutlich sicherer als der nördliche Abschnitt der Ringlinie ist die südliche Koltsevaya leichter zu bereisen, wodurch Händlerkarawanen weitgehend unbehelligt von Mutanten passieren können. Dies hat zahlreichen südlichen Stationen Wohlstand gebracht, insbesondere jenen entlang der Kalininskaya sowie den angrenzenden hansischen Gebieten."

HNZ_south_arc_trade_2: "Festungswirtschaft"
HNZ_south_arc_trade_2_desc: "Außenhandel kann leicht dazu genutzt werden, Einfluss im Ausland auszuüben oder andere Stationen zu unterwandern. Deshalb müssen wir ausländische Waren und Händler stärker einschränken. Unsere Handwerker sollen sich ohne fremde Konkurrenz entwickeln können."

HNZ_south_arc_trade_3: "Bergungsorganisationen gründen"
HNZ_south_arc_trade_3_desc: "Gemeinsam finanzierte Bergungsaktionen sollen die zahllosen Schrotthalden des Metros erschließen. Das geborgene Material kann wiederverwendet und weiterverarbeitet werden."

HNZ_south_arc_centralize: "Zentralisierung des Südabschnitts"
HNZ_south_arc_centralize_desc: "Auch wenn die Stationen in Verteidigungs- und Lokalangelegenheiten eigenständig handeln, bleibt die Hanse unbestritten die rechtmäßige Autorität. Alle Stationsvorsteher schwören unserem Regime oberste Loyalität."

HNZ_south_arc_centralize_factory_tt: "Errichtet in jedem südlichen §YKoltsevaya-Gebiet§! mit mindestens §Y5 Infrastruktur§! §Y1 Zivile Werkstatt§!."

HNZ_north_arc_centralize_factory_tt: "Errichtet in jedem nördlichen §YKoltsevaya-Gebiet§! mit mindestens §Y5 Infrastruktur§! §Y1 Zivile Werkstatt§!."

HNZ_north_arc_1: "Wiederaufbau des Nordabschnitts"
HNZ_north_arc_1_desc: "In vielerlei Hinsicht bildet der Nordabschnitt die schlagende Hauptader der gesamten Hanse. Er ist hervorragend befestigt und schützt seine Reichtümer zuverlässig vor neugierigen Blicken."

HNZ_north_arc_trade_1: "Der Handel muss fließen"
HNZ_north_arc_trade_1_desc: "Der Handel ist die Grundlage der Macht der Hanse und unverzichtbar für das Überleben des gesamten Metros. Zwischen Waffen und einem Rest von Zivilisation ist es das gemeinsame Interesse am Gewinn, das die Liga zusammenhält."

HNZ_north_arc_trade_2: "Feste Zölle"
HNZ_north_arc_trade_2_desc: "Stationsvorsteher dürfen die Zölle für ankommende Händler grundsätzlich selbst festlegen, doch nicht jeder nutzt diese Freiheit verantwortungsvoll. Ein gewisses Maß an Kontrolle ist notwendig, solange dadurch der Handel mit Drogen oder Menschen unterbunden wird."

HNZ_north_arc_trade_3: "Energieunabhängigkeit"
HNZ_north_arc_trade_3_desc: "Energie ist nicht nur für unsere Wirtschaft, sondern für das Leben selbst unverzichtbar. Wir müssen sicherstellen, dass unsere wachsenden Bedürfnisse jederzeit gedeckt werden können."

HNZ_north_arc_industry_1: "In den Wohlstand investieren"
HNZ_north_arc_industry_1_desc: "Eine florierende Gemeinschaft beginnt mit einer wohlhabenden Bevölkerung. Durch gezielte Investitionen können wir die Kaufkraft stärken, unseren Binnenmarkt ausbauen und den Wohlstand von morgen sichern."

HNZ_north_arc_industry_2: "Private Banken"
HNZ_north_arc_industry_2_desc: "Die Händler der Ringlinie sind derart wohlhabend geworden, dass unabhängige Banken gegründet wurden, um ihre Vermögen sicher zu verwalten."

HNZ_north_arc_military_1: "Die Angst vor Rot bleibt"
HNZ_north_arc_military_1_desc: "Obwohl die kommunistischen Kriege längst der Vergangenheit angehören, bleibt die Möglichkeit eines erneuten Konflikts bestehen – sei es durch einen verbitterten Generalsekretär oder ein einfaches Missverständnis. Trotz aller Handelsbeziehungen zur Roten Linie bleibt die Lage angespannt."

HNZ_north_arc_military_2: "Initiative zur Heimatverteidigung"
HNZ_north_arc_military_2_desc: "Die Sicherheit von Handel und Wirtschaft hängt davon ab, dass die Hanse bereit ist, sich selbst zu bewaffnen. Wir müssen unsere Abhängigkeit von ausländischen Waffenhändlern verringern und unsere Rüstungsproduktion ausbauen. Jede Waffe, jede Patronenhülse und jede Kugel sollte aus unseren eigenen Werkstätten stammen."

HNZ_north_arc_centralize: "Zentralisierung des Nordabschnitts"
HNZ_north_arc_centralize_desc: "Auch wenn die Stationen in Verteidigungs- und Lokalangelegenheiten eigenständig handeln, bleibt die Hanse unbestritten die rechtmäßige Autorität. Alle Stationsvorsteher schwören unserem Regime oberste Loyalität."

HNZ_internal_branch_1: "Der Sitz der Macht"
HNZ_internal_branch_1_desc: "Die Regierung der Hanse wird direkt von der Station [HNZ.Capital.GetName] aus gelenkt."

HNZ_internal_branch_2: "Reform des Inneren Rates"
HNZ_internal_branch_2A: "Vagabunden eindämmen"
HNZ_internal_branch_3: "Vorstandsquoten wieder einführen"
HNZ_internal_branch_3A: "Betteln verbieten"

HNZ_internal_branch_4: "Sicherheit durch Feuerkraft"
HNZ_internal_branch_4_desc: "Die Hanse gilt als Bollwerk militärischer Effizienz und Überlegenheit im Moskauer Metro-System. Nur wenige haben ihre Streitkräfte jemals im Einsatz gesehen. Und noch weniger würden es wagen, sich auszumalen, wie ein Konflikt mit ihnen ausgehen würde."

HNZ_internal_branch_5: "Nachkriegswohlstand"
HNZ_internal_branch_5_desc: "Natürlich werden jene reich, die die wichtigsten Handelszentren kontrollieren. Doch die Hanse ist keineswegs träge geworden – ganz im Gegenteil. Ihre Stabilität und politische Strahlkraft haben sie zu einer der dominierenden Mächte des gesamten Metros gemacht."

HNZ_all_power_to_general_manager: "Alle Macht dem Generaldirektor"
HNZ_all_power_to_general_manager_desc: "Die gesamte politische Autorität soll dem Generaldirektor übertragen werden."

HNZ_all_power_to_the_board: "Alle Macht dem Vorstand"
HNZ_all_power_to_the_board_desc: "Die gesamte politische Autorität soll gemeinschaftlich beim Vorstand liegen."

HNZ_new_quarter: "Das Neue Quartier"
HNZ_new_quarter_desc: "Fünf Jahre sind vergangen, seit der Friedensvertrag zwischen dem Arbat, Polis und der Roten Linie unterzeichnet wurde und das hervorbrachte, was wir heute als den Ringlinienbund kennen. In dieser kurzen Zeit hat sich der Bund zum wohlhabendsten – und einflussreichsten – Stationsstaat des gesamten Metros entwickelt."

HNZ_agenda_once_completed: "\nSobald die erforderliche Agenda abgeschlossen ist:"
HNZ_gain_political_control: "Erhalte §C1§! £political_authority_texticon §OPolitische Autorität§!"
HNZ_agenda_missions: "Dieser Fokus ist ein §YAgenda-Fokus§!. Nach Abschluss wird eine §Yzeitlich begrenzte Entscheidung§! aktiviert. Wir haben dann eine bestimmte Zeit, um die Anforderungen dieser Entscheidung zu erfüllen. Im Gegenzug erhalten wir Unterstützung von verschiedenen §GHändler-§! und §Cpolitischen§! Institutionen innerhalb des §YBundes§!, wodurch die Position von §Y[HNZ.GetLeader]§! gestärkt wird.\n\n"

HNZ_year_1_defensive_priority: "§0Jahr 1§! Verteidigung der Ringlinie"
HNZ_year_1_defensive_priority_desc: "Drei Jahre sind seit dem Koalitionskrieg vergangen. Während dieser Krieg langsam zur Erinnerung verblasst, bleibt die Zukunft ungewiss. Früher oder später wird der Krieg zurückkehren. Von nah und fern gibt es Kräfte, die den Bund seiner Reichtümer berauben wollen. Wir müssen vorbereitet sein."
HNZ_agenda_defensive_priority: "Um diese §CAgenda§! abzuschließen, müssen wir §YVerteidigungsanlagen§! in unserem gesamten Territorium errichten.§!\n\n"

HNZ_year_1_economic_priority: "§0Jahr 1§! Wirtschaftlicher Wohlstand"
HNZ_year_1_economic_priority_desc: ""
HNZ_agenda_economic_priority: "Um diese §CAgenda§! abzuschließen, müssen wir unsere §YIndustriebasis§! ausbauen.\n"

HNZ_year_1_neutrality_priority: "§0Jahr 1§! Fokus auf Neutralität"
HNZ_year_1_neutrality_priority_desc: "Mit großer Macht kommt große Verantwortung. Der Hansebund besitzt die strategisch wichtigste Position des gesamten Metros: die Ringlinie. Sich aus den kleinlichen Konflikten unabhängiger Stationen herauszuhalten, ist wirtschaftlich die sinnvollere Option. Außerdem sind die Schrecken des Antikommunistischen Krieges noch lange nicht vergessen – es wäre besser, keinen weiteren verheerenden Konflikt zu provozieren."
HNZ_agenda_neutrality_priority: ".\n"

