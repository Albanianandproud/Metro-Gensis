l_german:
 LOADING_TIP_0:0 "Der, der einen Krieg aus Liebe für seine Mitmenschen führt, wird seine Feinde besiegen. \n- §YEin weiser Mann§!"
 LOADING_TIP_1:0 "Ohne Hoffnung zu leben bedeutet, gar nicht zu leben.\n- §YDostoevsky§!"
 LOADING_TIP_2:0 "Wenn wir den Krieg nicht beenden, so wird der Krieg uns beenden. \n-§Y H.G. Wells§!"
 LOADING_TIP_3:0 "Und hier ist sie, die Tote Stadt. Wilkkommen zuhause, Artjom! \n- §YBourbon§!"
 LOADING_TIP_4:0 "Ein seltsames Phänomen, nicht wahr? Aber weißt du, es ist nicht «bösartiger» als, sagen wir mal Feuer. Es hängt alles von deinem Standpunkt ab. versuche die Dinge besser zu verstehen, bevor du dir ein Urteil bildest.\n- §YKhan§!"
 LOADING_TIP_5:0 "Manche nennen sie Dämonen, ich nenne sie Mistkerle! \n- §YBourbon§!"
 LOADING_TIP_6:0 "Mit Feuer und Schwert werden wir unsere Welt zurück erobern! \n- §YMiller§!"
 LOADING_TIP_7:0 "Wenn es feindlich ist, töte es! \n- §YHunter§!"
 LOADING_TIP_8:0 "Und dann, nach Fünf Minuten der Stille, beinahe unhörbar, seufzte der alte Mann und sagte, mehr zu sich selbst als zu Artjom: "Gott, was für eine schöne Welt wir doch zerstört haben...!""
 LOADING_TIP_9:0 "jener der mutig und geduldig genug ist um sein Leben lang in den Abgrund zu starren, wird der erste sein der an seinem Grund ein Licht erkennt. \n- §YKhan§!"
 LOADING_TIP_10:0 "Wow, was ist das dort oben...? Warte, Onkel hat mir mal ein Bild gezeigt. Das.. Das ist der Himmel, nicht wahr? Wie eine bemalte Decke... Ich werde berühmt, ich habe den Himmel gesehen!"
 LOADING_TIP_11:0 "Whoa! So macht man das! Genau wie die drei Musketiere, nicht wahr? - Wenn es nur zwei von ihnen gegeben hätte. Bah-Ha!. \n- §YPavel Morozov§!"
 LOADING_TIP_12:0 "Wenn du lange genug in den Abgrund starrst, so starrt der Abgrund auch zurück in dich. \n -§YFriedrich Nietzsche.§!"
 LOADING_TIP_13:0 "Weiter Junge, alles hängt jetzt von dir ab! \n -§YMiller§!"
 LOADING_TIP_14:0 "Menschen waren schon immer besser darin zu töten als jedes andere Lebewesen."
 LOADING_TIP_15:0 "Willkommen bei der ersten Interstationalen Roten Kämpferbrigade der Moskauer Metro, im Namen von Ernesto Che Guevara!"
 LOADING_TIP_16:0 "Der letzte Ort an dem Menschen noch wie echte Menschen leben, wo sich sich daran erinnern was das Wort ´Mensch´ bedeutet und wie es klingen sollte."
 LOADING_TIP_17:0 "Besser stehend sterben als auf Knien zu leben! \n -§YErnesto Guevara§!"
 LOADING_TIP_18:0 "Wir müssen uns auf einen großen Krieg vorbereiten, den letzten Krieg, den Krieg, den unsere Rasse gewinnen wird!  \n -§YDer Führer§!"
 LOADING_TIP_19:0 "ich bin ganz allein... \n §R...Du bist nicht allein, du bist der Erste.§!"
 LOADING_TIP_20:0 "Es braucht mehr als nur Intelligenz um Intelligent zu handeln. \n §YFyodor Dostoyevsky§!"
 LOADING_TIP_21:0 "Hier ist Moskau, hört ihr mich? St. Petersburg? Vladivostok? Voronezh? Novisibirsk? Hört ihr mich? Hier ist Moskau! Wir leben!"
 LOADING_TIP_22:0 "Ich werde überleben! Verstehst du mich?! Ich §RWERDE§! überleben! \n -§YHunter§!"
 LOADING_TIP_23:0 "Ich sehe die Gegenwart, doch die Zukunft ist ungewiss. Du wirst unerwartete Hilfe erhalten, aber glaub nicht, dass mit seinem Tod die Welt zu einem besseren Ort wird.§R Die Hydra hat viele Köpfe und neue werden nachwachsen§!. \n- §YZhabdar§!"
 LOADING_TIP_24:0 "Die älteste und stärkste Emotion des Menschen ist Furcht und die stärkste Furcht ist die Furcht vor dem Unbekannten. \n-  §YH.P. Lovecraft§!"
 LOADING_TIP_25:0 "Mein Kampf ist hoffnunglos? Du sagst wir stehen am Rande des Abgrundes? ich spucke in deinen Abgrund! Wenn du glaubst dein Platz sei dort unten, dann atme tief ein und marschier vorwärts! \n -§YHunter§!"
 LOADING_TIP_26:0 "Im Geheimen graben sie große Löcher, dort wo die Erde nachgibt, und Wesen haben gelernt aus diesen Löchern hinaus zu laufen und zu kriechen. \n §YH.P. Lovecraft§!"
 LOADING_TIP_27:0 "Er sagte dem Falken, dem sterbenden Träumer - "Komm schon, geh zur Klippe und wirf deinen verwundeten Körper hinab! Mögen deine Flügel vom Wind getragen werden, mögest du wieder die Freuden des Fliegens erlernen!» \n- §YMaxim Gorky§!"
 LOADING_TIP_28:0 "Zu meiner Rechten, da stand weit entfernt von mir das Haus der Stille, auf einem kleinen Hügel. Und in diesem Haus, da brannten viele Lichter, doch kein Geräusch war zu vernehmen. Und so stand es da, seit einer unendlichen Ewigkeit. \n- §YWilliam Hope Hodgson§!"
 LOADING_TIP_29:0 "Für eine Zeit lang dachte ich, die Menschheit wäre vernichtet und dass ich hier allein stand, als letzter Mensch auf Erden\n-§Y H.G. Wells§!"