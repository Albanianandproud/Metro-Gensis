l_russian:
 STB_focus_1: "Долгий марш"
 STB_focus_1_desc: "Exiled from the demense of the Reich, Stortebekers motley band had taken temporary refuge on [STB.GetName] station. After days of traveling through interior hallways and maintenance shafts until exhaustion had finally seeped in and forced them to halt."
 STB_focus_2: "Сохранение боеприпасов"
 STB_focus_2_desc: "То немногое снаряжение и оружие, которое наши войска смогли вывезти, когда нас изгнали из Рейха, в основном было использовано для того, чтобы добраться сюда. Боеприпасов едва хватает, не говоря уже о том, чтобы обеспечить огнестрельным оружием каждого члена отряда.\nНеобходим радикальный подход. Все, что осталось, — боеприпасы — нужно приберечь до тех пор, пока ситуация не улучшится."
 STB_focus_2a: "Приведение в порядок"
 STB_focus_2a_desc: "Мы боимся, что превращение банды головорезов в организованную силу займет гораздо больше времени, чем мы предполагали. Из-за нехватки припасов и снаряжения требуется дополнительная подготовка. Не только для наших солдат, но и для командиров."
 STB_focus_3: "Временная постройка"
 STB_focus_3_desc: "[STB.capital.GetName] находится в довольно плачевном состоянии. При должном уходе станцию можно было бы назвать хотя бы сносной. Не то чтобы она была пригодна для жизни, но пока что сойдет."
 STB_focus_4: "Не оставить камня на камне"
 STB_focus_4_desc: "Нам нужны патроны. Не только для того, чтобы отстреливаться от мутантов, которые выползают из темноты, но и для того, чтобы платить нашим солдатам. Люди начинают волноваться и в конце концов взбунтуются, если ситуация не улучшится. Пока что лучший выход для нас — мародерство."
 STB_focus_5: "Прибежище проклятых"
 STB_focus_5_desc: "Преступники, контрабандисты, беглые преступники — все они заполняют мрачные залы станции [STB.capital.GetName]. Если остальной мир называет нас так и осуждает за это... Что ж, так тому и быть."
 STB_focus_3A: "Медицинская сортировка"
 STB_focus_3A_desc: "Далеко не так чисто и стерильно, как в рейхстагах. Пока кровотечение можно остановить, а риск заражения невелик, нищим не до выбора."
 STB_focus_4A: "Странники"
 STB_focus_4A_desc: "Мы проделали долгий путь, чтобы добраться до станции [STB.capital.GetName], в основном по территории Москвы. Наш опыт передвижения по руинам и заброшенным улицам сослужит нам хорошую службу."
 STB_focus_5A: "Обещанная добыча"
 STB_focus_5A_desc: "Наши силы свободны от ограничений, морали и предрассудков. Они вольны делать с добычей, на которую претендуют, все, что захотят."
 STB_focus_5B: "Стенды для перезарядки боеприпасов"
 STB_focus_5B_desc: "Мы больше не можем позволить себе выбрасывать отходы. Стреляные гильзы тщательно собирают и перезаряжают."
 STB_focus_6: "Экспедиционные отряды"
 STB_focus_6_desc: "Эти солдаты в рваной броне и с оружием, позаимствованным у Рейха, бродят по окрестным туннелям в поисках новых жертв."
 STB_focus_7A: "Набеги за оружием"
 STB_focus_7A_desc: "Каждый успешный набег пополняет наши запасы снаряжения и инструментов."
 STB_focus_7B: "Оборона подземелья"
 STB_focus_7B_desc: "Если вы его построите, они придут."
 STB_focus_8C: "Штёртебекерское Возрождение"
 STB_focus_8C_desc: "Легенда о Клаусе Штёртебекере возвращается! Легендарный балтийский король пиратов, покровитель рейдеров."
 STB_focus_8B: "Конец войны"
 STB_focus_8B_desc: "Ядерная война положила конец миру и стала началом конца. Победа может привести только к миру. К извращенному подобию мира."
 STB_focus_8A: "Цикл жестокости"
 STB_focus_8A_desc: "Так было испокон веков. В трудные времена закаляется характер. А закаленный характер приносит удачу."
 STB_focus_9A: "Проникнуть в государство [SEV.GetName]"
 STB_focus_9A_desc: "Герметичные двери, навсегда открытые для передачи электричества по кабелям в южную часть Кольцевой линии, — вот что придётся охранять силам Севастопольской, а не мутантов."
 STB_focus_9B: "Атаковать [AVT.GetAdjective]"
 STB_focus_9B_desc: "Партизаны из станции [AVT.capital.GetName] были постоянной головной болью для Бригады Штёртебекера. Недавние столкновения между нашими отрядами привели к жажде мести, и сейчас самое время избавиться от них раз и навсегда."
 STB_focus_10C: "Операции по зачистке"
 STB_focus_10C_desc: "К нашей растущей территории добавлена ​​новая станция."
 STB_focus_10B: "Солдаты облачаются в новую форму"
 STB_focus_10B_desc: "С [SEV.GetAdjective] под нашим контролем их арсеналы и оружейные склады в выигрыше. Они пригодятся для оснащения наших солдат."
 STB_focus_10A: "Складские площадки"
 STB_focus_10A_desc: "Имея достаточно места и инфраструктуры, мы теперь можем начать вкладывать средства в ремонт повозок для нашей армии."
 STB_focus_10A: "Жестокая реструктуризация"
 STB_focus_10A_desc: "Завоевание - это...."
 STB_focus_11: "Зловещие мануфактуры"
 STB_focus_11_desc: "Небольшие верстаки и погрузочные машины станут нашими оружейными складами."
 STB_focus_12A: "Открыть оружейные склады"
 STB_focus_12A_desc: "В скрытых бункерах и запечатанных складах до сих пор хранится оружие Старого мира. Взломать их может быть опасно, но это вооружит наши отряды."
 STB_focus_12B: "Полевая добыча"
 STB_focus_12B_desc: "Тела погибших, заброшенные контрольно-пропускные пункты и забытые жилища содержат горы добычи, ожидающей возвращения."
 STB_focus_12C: "Кузницы на свалках"
 STB_focus_12C_desc: "Импровизированные заводы будут производить броню, униформу и снаряжение для нашей растущей бригады."
 STB_focus_13A: "Смерть прежде принятия"
 STB_focus_13A_desc: "Однажды мутант — всегда мутант"
 STB_focus_13B: "Исключения из правил для мутантов"
 STB_focus_13B_desc: "Мы не можем позволить себе жалеть ни рук, ни пуль. Любой достаточно развращенный, злой, чтобы присоединиться к нашим рядам, будет принят с благодарностью"
 STB_focus_14: "Присоединить [PVL.GetAdjective]"
 STB_focus_14_desc: "Еще одна угроза, помимо разгула мутантов, — охранникам [PVL.GetAdjective] придется быть бдительными. [PVL.GetName] — главная цель для нашей экспансии, несмотря на сломанные герметичные врата."
 STB_focus_15: "Жестокие сердца земель"
 STB_focus_15_desc: "Подобно гноящейся опухоли, наше влияние расширяется и растет."
 STB_internal_focus_1A: "Закон сильных"
 STB_internal_focus_1A_desc: "Нет судов, нет этики. В мире, погрязшем в собственных проблемах, сила — единственное, что определяет, кто прав."
 STB_internal_focus_1B: "Волчья стая"
 STB_internal_focus_1B_desc: "Честь не существует среди воров. Нас объединяет азарт и обещание богатства и добычи. Из этого выковывается единство. Даже если оно шаткое."
 STB_internal_focus_2A: "Дисциплина террора"
 STB_internal_focus_2A_desc: "Для бандитов мятеж — не ругательство. Возможно, в некотором смысле это обычное явление. Решение? Показать пример."
 STB_internal_focus_2A_tt: "Мы получим дополнительные людские ресурсы примерно через 180 дней после завершения этого национального фокуса"
 STB_internal_focus_2B_tt: "Мы получим дополнительное вооружение примерно через 180 дней после завершения этого национального фокуса"
 STB_internal_focus_2C_tt: "Мы получим дополнительное вспомогательное оборудование примерно через 180 дней после завершения этого национального фокуса"
 STB_internal_focus_2D_tt: "Мы получим дополнительное вооружение для огневых групп примерно через 180 дней после завершения этого национального фокуса"
 STB_internal_focus_2B: "Экономика страха"
 STB_internal_focus_2B_desc: "У всего есть своя цена. Какой бы высокой она ни была."
 STB_internal_focus_2C: "Черные рынки"
 STB_internal_focus_2C_desc: "Идеология мало что значит, какие бы цвета ни носили торговые флоты, они готовы к захвату."
 STB_internal_focus_2D: "Циркулярная пила"
 STB_internal_focus_2D_desc: "Смерть ещё не переосмыслена, но страх приобрел совершенно новое значение."
 STB_internal_focus_3: "Ад станции [STB.capital.GetName]"
 STB_internal_focus_3_desc: "Добычи предостаточно. Мы возьмем то, что нам нужно, и никого не пожалеем. Война будет финансировать наши цели."
 STB_internal_focus_3A: "Свинцовые куртки"
 STB_internal_focus_3A_desc: "Радиация — невидимый враг. Свинцовые куртки обеспечивают некоторую защиту от отравленного ветра."
 STB_internal_focus_3B: "Спасенное автоматическое оружие"
 STB_internal_focus_3B_desc: "Старые и сломанные пулеметы, ржавеющие изнутри, все ещё могут реветь, если их правильно восстановить и обработать."
 STB_internal_focus_4: "Братство Проклятия"
 STB_internal_focus_4_desc: "Когда-то преступники, теперь мы выжившие, свободные от морали и ограничений."
 STB_internal_focus_5: "Броня из металлолома"
 STB_internal_focus_5_desc: "Старые металлические пластины можно превратить в грубую броню. Тяжелая, некрасивая, но тем не менее эффективная."
 STB_internal_focus_6A: "Перекованные стволы"
 STB_internal_focus_6A_desc: "Десятилетия пренебрежения привели к тому, что большинство видов оружия проржавело и стало хрупким, а те, что были изготовлены кузнецами Тверской, начинают ломаться. Мы должны научиться их восстанавливать."
 STB_internal_focus_6B: "Разобрать и собрать заново"
 STB_internal_focus_6B_desc: "Три сломанных, некачественных ружья часто можно превратить в одно рабочее оружие. Не изящно. Но работает."
 STB_internal_focus_6C: "Поднимите чёрный флаг!"
 STB_internal_focus_6C_desc: "Скоро удушающие звуки катков и двигателей станут страшнее, чем вой голодных мутантов."
 STB_internal_focus_6D: "Винтовки из руин"
 STB_internal_focus_6D_desc: "За разрушенными заграждениями и заброшенными контрольно-пропускными пунктами станций лежат винтовки погибших гарнизонов. Ржавые, потрескавшиеся и забытые... Но их всё же можно спасти."
 STB_internal_focus_7: "Трофейные доспехи"
 STB_internal_focus_7_desc: "Доспехи, взятые у побежденных врагов, носят с гордостью — доказательство нашей мощи во враждебном мире."
 STB_internal_focus_8: "Бригада Волколаков"
 STB_internal_focus_8_desc: "Новый страх витает во тьме."
 STB_internal_focus_9: "Дисциплина за веревку"
 STB_internal_focus_9_desc: "Мятеж в умирающем мире приносит только смерть."
 STB_internal_focus_11: "Рейдеры мертвого мира"
 STB_internal_focus_11_desc: "Старый мир все еще существует под пеплом. В его скелетах хранятся машины, топливо и технологии, ожидающие своего возвращения."
 STB_internal_focus_9A: "Разборка и сборка"
 STB_internal_focus_9A_desc: "Оружейное масло, пружины и самодельные штифты поддерживают работоспособность нашего оружия на минимальном уровне. Иногда этого достаточно."
 STB_internal_focus_9B: "Огневое превосходство"
 STB_internal_focus_9B_desc: "Против плохо вооруженных выживших один пулемет может править в замкнутых туннелях Метро."
 STB_internal_focus_10A: "Методы штамповки стали"
 STB_internal_focus_10A_desc: "Сложная механическая обработка — это роскошь, которую мы не можем себе позволить. Штампованные металлические детали позволяют нам производить оружие гораздо быстрее."
 STB_internal_focus_10B: "Упрощённые механизмы"
 STB_internal_focus_10B_desc: "Чем меньше движущихся частей у оружия, тем меньше вероятность его поломки. Тем проще его изготовить и отремонтировать."
 STB_political_focus_path_1: "Линии крыс"
 STB_political_focus_path_1_desc: ""
 STB_political_focus_path_2: "Сомнительная этика"
 STB_political_focus_path_2_desc: "Освободившись от этических ограничений, доктор Тородов теперь может проводить свои исследования без опасений. Доктор Тородов готов нам помочь. Единственное, о чем он просит, это предоставить ему только «добровольных» испытуемых..."
 STB_political_focus_path_3: "Стимуляторы адреналина"
 STB_political_focus_path_3_desc: ""
 STB_political_focus_path_4: "Улучшитель производительности D-X"
 STB_political_focus_path_4_desc: ""
 STB_political_focus_path_5: "Бесплодие науки"
 STB_political_focus_path_5_desc: ""
 STB_political_focus_path_6: "Обезболивающие"
 STB_political_focus_path_6_desc: ""
 STB_political_focus_path_7: "Автоинъекторы амфетамина"
 STB_political_focus_path_7_desc: ""
 STB_political_focus_path_8: "Проект Ubermensch"
 STB_political_focus_path_8_desc: "Идеальный солдат, Ново Сапиен, всего в шаге... Нам нужно лишь больше исследований."
 STB_political_focus_path_9: "Проект Суперсолдатен"
 STB_political_focus_path_9_desc: ""
 STB_political_focus_path_10: "Проект Клонирование"
 STB_political_focus_path_10_desc: ""
