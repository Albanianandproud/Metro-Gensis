  ### Doctrines ###
  ELITE_DOCTRINE_LABEL:0 "Elite-Doktrin"
  ELITE_DOCTRINE_DESC:0 "Kugeln sind billig, Blut ist es nicht. Überlegene Taktik, disziplinierte Truppen und effiziente Logistik sind der Schlüssel zum Erfolg."

  BALANCED_DOCTRINE_LABEL:0 "Ausgewogene Doktrin"
  BALANCED_DOCTRINE_DESC:0 "Vorbereitung und die Lehren der Vorkriegsführung werden uns den Sieg bringen."

  OVERWHELM_DOCTRINE_LABEL:0 "Massen-Doktrin"
  OVERWHELM_DOCTRINE_DESC:0 "Was uns an Erfahrung und Ausbildung fehlt, das haben wir an zahlenmäßiger Überlegenheit. Der Zweck heiligt die Mittel."

