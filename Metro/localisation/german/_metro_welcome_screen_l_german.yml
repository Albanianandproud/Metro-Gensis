 METRO_TAB_1_HEADER: "Willkommen zu METRO: Genesis !"
 METRO_TAB_1_TXT: "Willkommen beim Metro-Mod. Dieser Mod wird derzeit von einem kleinen Team leidenschaftlicher Entwickler erstellt. Aktuell befindet sich das Projekt noch in der Beta-Phase. Zahlreiche grundlegende Spielmechaniken werden derzeit hinzugefügt oder überarbeitet. Der Mod befindet sich daher in einer Übergangsphase, in der sich die zentralen Spielabläufe deutlich vom ursprünglichen Hearts of Iron IV unterscheiden. Aus diesem Grund können weiterhin Fehler, Glitches und andere unbeabsichtigte Probleme auftreten. Diese werden nach und nach behoben, während gleichzeitig regelmäßig neue Inhalte veröffentlicht werden. Größere Updates erscheinen in der Regel etwa alle zwei Monate. Solltet ihr auf Fehler oder technische Probleme stoßen, würden wir uns sehr freuen, wenn ihr uns diese über unseren Discord-Server oder die Steam-Seite meldet. Auch Vorschläge, konstruktive Kritik oder allgemeines Feedback sind jederzeit willkommen und helfen uns dabei, den Mod weiter zu verbessern. Wir hoffen, dass euch der Mod gefällt und ihr viel Spaß beim Spielen habt! Viel Erfolg bei der Jagd, STALKER! – Das Metro Genesis Entwicklerteam \n\n Wilhelm Petzold, deutscher Übersetzer und Teil des Entwicklerteams"


METRO_TAB_2_HEADER: "Mechaniken"

METRO_TAB_2_TXT: "§YPlündern§!\n\nDie von Narben gezeichneten Ruinen der Moskauer Metro wurden bereits gründlich geplündert und nach Wertgegenständen durchsucht, doch noch immer warten einige Schätze darauf, von mutigen Abenteurern entdeckt zu werden. §YPlündern§! ist eine Spielmechanik, die den meisten Nationen zur Verfügung steht und die beinahe unermüdliche Arbeit der §RStalker§! darstellt, die an der Oberfläche Relikte aus der Zeit vor dem Krieg bergen. §YStalkermissionen§! können über den §CEntscheidungen-Reiter§! gestartet werden. Die Erfolgschancen lassen sich durch verschiedene £research_icon §CTechnologien§! verbessern. Erfolgreiche Expeditionen können £infantry_equipment_text_icon §YAusrüstung§! liefern, die noch nicht erforscht wurde, £research_bonus_texticon §YForschungsboni§!, £resources_texticon §YRessourcen§! oder sogar seltene und oft schwer auffindbare §CBaupläne für einzigartige Technologien§!!\n\n\n§YKolonisierung§!\n\nIn den anderthalb Jahrzehnten seit die Menschheit Zuflucht unter der Erde suchte, ist die §RMoskauer Metro§! zunehmend verfallen. Viele Linien und Stationen wurden aufgegeben, zerstört oder durch Strahlung unbewohnbar gemacht. Einige Nationen können jedoch §CKolonisierungsmissionen§! in benachbarte §Yzerstörte§! Staaten entsenden und dort provisorische Außenposten errichten, um diese Stationen ihrer Verwaltung einzugliedern. Manche Nationen, wie beispielsweise das §Y[RCH.GetName]§!, verfügen zu Spielbeginn jedoch nicht über die Möglichkeit zur §YKolonisierung§! und müssen diese erst durch §CFokusbelohnungen§! oder §CEntscheidungen§! freischalten.\n\n\n§YKernstaaten§!\n\nJede Nation kann §RNicht-Kernstaaten§! in ihre Verwaltung integrieren. Dies kostet eine große Menge an £political_power_texticon §YPolitischer Macht§! und erfordert, dass der betreffende §RNicht-Kernstaat§! über mehr als §Y95 %§! £compliance_texticon §YGefügigkeit§! verfügt.\n\n\n§YBildung§!\n\nEine neue Gesetzeskategorie wurde eingeführt, um Analphabetismus und wissenschaftlichen Fortschritt in der Metro darzustellen. Bildung misst den Grad, zu dem Wissen aus der Zeit vor dem Krieg in einer Gesellschaft bewahrt wurde. Niedrige Bildungsstufen verringern die £research_speed_texticon §YForschungsgeschwindigkeit§! und erhöhen die £army_doctrine_cost_texticon §YDoktrinkosten§!. Bildungsstufen können über §YBildungsreformen§! im §YEntscheidungen-Reiter§! verbessert werden. Einige Nationen, insbesondere §RPrimitive§! Gesellschaften wie §Y[GWC.GetName]§! oder §Y[PAG.GetName]§!, können ihre Bildung jedoch überhaupt nicht verbessern. §RBanditen§!-Nationen wie §Y[MOB.GetName]§! oder §Y[TRT.GetName]§! können zudem nicht über die Grundschulbildung hinaus aufsteigen.\n\n\n§YPatronenwirtschaft§!\n\nNach dem Ende des §YDritten Weltkriegs§! brach das Wirtschaftssystem §YRusslands§! zusammen. Das Geld aus der Zeit vor dem Krieg verlor jeglichen Wert und wurde bestenfalls noch als Brennmaterial verwendet. Stattdessen wurden £bullet_income §CPatronen§! zur universellen Währung der §RMoskauer Metro§!. £bullet_income §CPatronen§! werden für nahezu alles verwendet: zur Bezahlung von Soldaten, zum Kauf von Waffen oder zur Finanzierung von Expeditionen an die Oberfläche. Einnahmen und Ausgaben von £bullet_income §CPatronen§! werden monatlich berechnet. Einnahmen und Kosten wie §YWerkstattabgaben§! oder §CTechnikerlöhne§! können außerdem durch bestimmte §YNationalgeister§! oder §CZivile Gesetze§! beeinflusst werden. Alle Nationen verfügen derzeit über eine unbegrenzte Lagerkapazität für £bullet_income §CPatronen§!.\n\n\n§YForschung§!\n\nAuch die §YForschung§! wurde im Vergleich zum Vanilla-HOI4-System überarbeitet, um die Verhältnisse der §RMoskauer Metro§! besser darzustellen. §YUnterstützungswaffen§! wie §YFlammenwerfer§! oder §YLeichte Maschinengewehre§! werden nun als §YUnterstützungsausrüstung§! behandelt, während die §YInfanterieausrüstung§! deutlich erweitert wurde. £industry_texticon §YIndustrietechnologien§! wurden grundlegend überarbeitet und spiegeln nun sowohl den industriellen Fortschritt als auch die Verbesserung des Lebensstandards der Bevölkerung wider.\n\nForschung kann außerdem von besiegten Nationen übernommen werden. Nach Abschluss einer Friedenskonferenz erhalten die Sieger die Möglichkeit, £research_bonus_texticon §YForschungsboni§! auf £research_icon §YTechnologien§! zu erhalten, die von der besiegten Nation erforscht wurden."

