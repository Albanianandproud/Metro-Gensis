l_german:
 SEV_hep:0 "Wasserkraftwerk"
 SEV_hep_desc:0 "Wir besitzen mehrere Wasserkraftturbinen, die das strömende Grundwasser zur Stromerzeugung nutzen. Sewastopol ist damit eine wichtige Station, die einen Großteil der südlichen Metro mit Strom versorgt."

 SEV_hanseatic_reliance:0 "Abhängig von der Hanse"
 SEV_hanseatic_reliance_desc:0  "Direkt neben der Ringlinie zu liegen, bietet lukrative wirtschaftliche Perspektiven. Allerdings dient es auch als Schleusentor für hanseatische Kaufleute und Handelskarawanen. Hinzu kommen die nahezu ständigen Mutantenangriffe auf Sewastopol von RIchtung Süden. Außerdem ist die Gemeinde auf die regelmäßigen Vorräte angewiesen, die von hanseatischen Kaufleuten zur Station gebracht werden."

 SEV_mutants:0 "Mutantenangriffe"
 SEV_mutants_desc:0 "Die Einwohner von Sewastopolstehen im ständigen Krieg gegen die Horden von Mutanten, die aus dem Süden und von der Oberfläche herbeiströmen. Ohne einem Ende der Angriffe in Sicht, ist dies eine weitere Herausforderung im brutalen Kampf gegen die Natur."

