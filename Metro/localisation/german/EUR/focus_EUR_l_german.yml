 EUR_a_pax_romana: "Pax Romana"
 EUR_a_pax_romana_desc: "Pax Romana oder römischer Frieden war eine Zeit, in der das Römische Reich eine so große Landfläche kontrollierte, dass ihnen keine andere Nation Konkurrenz machen konnte. In dieser Zeit herrschte im gesamten Reich beispielloser Frieden und Wohlstand. Um unsere Existenz zu sichern, müssen alle unsere inneren und äußeren Bedrohungen beseitigt werden."

