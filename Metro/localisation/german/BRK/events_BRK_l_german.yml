l_german:
 nf_BRK.1.t: "Lambda-Kern"
 nf_BRK.1.d: "Die Wissenschaftler des Kurtschatow-Instituts helfen sicher gerne dabei, uns im Gegenzug für Lebensmittel mit Strom zu versorgen. Allerdings verbreiteten sich unter den Überlebenden Gerüchte, dass die Hare-Krishna-Anhänger, die sich in der Station Oktyabr'skoe Pole verschanzt hatten, eines Tages in das Institut selbst einbrechen und versuchen würden, den Reaktor in die Luft zu jagen. Einfache Gerüchte, wenn Sie mich fragen, Dr. Freemann."
 nf_BRK.1.a: "Ihre Unterstützung wäre sehr willkommen"
 nf_BRK.1.tt: "Solange wir nicht in einen Krieg verwickelt werden, werden wir ihren Strom erhalten."

 nf_BRK.2.t: "Lasst die Tage verstreichen"
 nf_BRK.2.d: "Die Piloten sind offenbar bereit uns zu helfen, obwohl sie Außenstehenden gegenüber sonst so distanziert waren. Als Gegenleistung für die dringend benötigten Lebensmittel sind sie bereit, bei der Modernisierung unserer Militärwerkstätten zu helfen. Obwohl wir keinen großen Einblick in ihre sogenannte „fortgeschrittene“ Gesellschaft bekomen, wirkt die Technologie, die sie uns zur Verfügung stellen, geradezu bizarr. Scheinbar alte Stücke sowjetischer Elektronikgeräte, deren Design jedoch unvorstellbar komplex ist. Nicht einmal die Elektronik von der Baumansky kann sich mit der Komplexität der Geräte messen, die sie uns geliefert hatten. Dennoch gibt es keine Anzeichen von Robotern oder den sogenannten Androiden."
 nf_BRK.2.a: "Ihre Hilfe wäre sehr willkommen. Warten Sie, wer sind die Baumans??"

 nf_BRK.3.t: "Ärger in Sokol"
 nf_BRK.3.d: "Uns ist kürzlich ein Vorfall direkt an der Grenze zwischen uns und der Republik Gulyai-Pole aufgefallen. Seit Wochen bewegen sich anarchistische Kräfte über die Grenze, dabei beachten sie die Vereinbarung der beiden Seiten nicht. Unhöflich und arrogant treten die anarchistischen Kräfte auf unseren Feldern herum und wenn sie von Bauern befragt werden, ignorieren sie unsere Bürger einfach oder bedrohen sie direkt mit ihren Gewehren. Anstatt sich den Schlägern ausliefern zu lassen, versammelten sich unsere Bürger zu einer Truppe, und warteten darauf, dass die gleiche Bande von Anarchisten wieder betrunken hereintrampelt. Als das nicht geschah, ergriffen sie die Initiative und überquerten die Grenze, um Rache zu üben.\n\nEs gibt Gerüchte, dass sich anarchistische Kräfte zusammenschließen und versuchen, nun gegen unsere Bauern zurück zu schlagen."
 nf_BRK.3.a: "Lasst uns die Situation nicht weiter eskalieren"
 nf_BRK.3.b: "Die Anarchisten haben zuerst geschossen!"