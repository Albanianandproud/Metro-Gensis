l_german:
 MSU_emerald_city: "Smaragdene Stadt"
 MSU_emerald_city_desc: "Die Stationen Universität, Prospekt Wernadskogo und Jugo-Zapadnaja bilden die geheimnisvolle Smaragdene Stadt. Die anschließende Zerstörung der Station Worobjowy Gory und die eingestürzte Brücke über die Moskau haben die Universität vom Rest der Metro isoliert.\n\nHeute existiert sie nur noch in Märchen, den Berichten von Freunden eines Freundes oder dem Klatsch von reisenden Händlern; die sich in Halbwahrheiten und unvollständige Gerüchte verwandelt haben. Allerdings gibt es auch Berichte darüber, dass Stalker an der Oberfläche auf wissenschaftliche Expeditionen gestoßen sind, die von der Universität aus geschickt wurden.\n\nOb sie nun wirklich existieren oder nicht, steht zur Debatte. Allerdings weigert sich die Rote Linie, auch nur die bloße Vorstellung ihrer Existenz anzuerkennen."

MSU_isolation_tt: "§RUnfähig zu:§! £trigger_no Reclaim Ruin States."

MSU_nation_of_scientists: "Nation der Wissenschaft"
MSU_nation_of_scientists_desc: "Die Universität widmet sich ausschließlich der Forschung und des Fortschrittes"
MSU_free_scavenging_tt: "\n§gStalker-Mission sind§! §Ckostenlos§! §gmit§! §Chöherer§! §g Wahrscheinlichkeit auf Erfolg!§!"

MSU_isolationism: "Isolationisten"
MSU_isolationism_desc: "Vom Rest der Metro durch den Fluss Moskau getrennt, hat sich [MSU.GetName] isoliert und verteidigt sich nun gegen Eindringlinge, egal ob in menschlicher oder in mutierter From. Sich der Welt zu offenbaren würde der Universität ihren Frieden und ihre Sicherheit kosten."

MSU_stalkers: "Erfahrene Stalker"