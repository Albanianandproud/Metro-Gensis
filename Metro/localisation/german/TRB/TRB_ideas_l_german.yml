 trb_cloth_industry_desc:0 "Obwohl Trubnaja eine ansonsten unbedeutende und rückständige Metro-Station ist, besteht Trubnajas Hauptberuf darin, alte, abgenutzte Kleidung zu reparieren und zu nähen. Webstühle und andere Webmaschinen säumen die Seitenplattformen des Bahnhofs, während die Näherinnen den ganzen Arbeitstag damit verbringen, Kleidung aller Größen zu nähen und neu zu nähen. Passend für normale Leute. Allerdings ist es besser, nicht zu fragen, wer der vorherige Träger war."