 EUR_one_chain_one_aim: "One Chain, One Aim..."
 EUR_one_chain_one_aim_desc: "Eine Nation ist an ihre etablierten Ideale und ihr Volk gebunden, und aus der Verpflichtung heraus, diese Ideale aufrechtzuerhalten. Vom einfachen Werkstatttechniker bis hin zum Stationsverwalter; Jeder ist durch die gleiche kollektive Kette verbunden. Alle fordern ein gegenseitiges, offenes Miteinander, den Frieden zu wahren und auf das gemeinsame universelle Ziel hinzuarbeiten. Von ihrem Ziel aus wird dieser Zweck unermüdlich vorangetrieben. Dieser Zweck wird zu unserer zweiten Natur werden."

 EUR_reeducation_1: "Deutsch... oder §RSONST!§!"
 EUR_reeducation_1_desc: "In [EUR.GetName] spricht man weiterhin Russisch, Französisch, Belgisch und eine Vielzahl anderer Sprachen. Vor allem anderen aber spricht man hier Deutsch. Alle Kulturen sind gleich, aber einige sind eben gleicher als andere. Wir erlauben Französisch und Russisch; aber Deutsch... unser Deutsch wird unter allen anderen bevorzugt werden."

 EUR_reeducation_2: "Dienst ist §YVERPFLICHTEND!§!"
 EUR_reeducation_2_desc: "Individualität ist bedeutungslos. Unter der Ordnung sind alle gleich."

 EUR_reeducation_3: "Kulturelle Assimilation"
 EUR_reeducation_3_desc: ""

 EUR_reeducation_4: "Die Zukunft ist jetzt!"
 EUR_reeducation_4_desc: "Die Apokalypse konnte den Willen der Ordnung nicht abschrecken. Wie ein Phönix aus der Asche erhebt sich nun Disziplin aus dem Ruß. Nach einer roten Morgendämmerung entsteht ein rosafarbener Sonnenuntergang."
