HNZ_ring_line_secured: "Koltsevaya gesichert"
HNZ_ring_line_secured_desc: "Die Ringlinie – die Lebensader der Metro. Die Hanse kontrolliert die gesamte Koltsevaya und profitiert von ihrem enormen wirtschaftlichen Potenzial.\n\nDieser §YNationale Geist§! geht verloren, falls irgendein Gebiet der §YKoltsevaya§! verloren geht."

 hanseatic_league: "Gemeinschaft der Stationen der Ringlinie"
 hanseatic_league_desc: "Der Stationenbund der Ringlinie, auch 'Hanse' genannt, ist ein kapitalistischer Handelsverbund mehrerer einst unabhängiger Stationen. Sie sind der vollständiger Eigentümer der Ring Linie und verfügen darum innerhalb der Metro über eine enorme Macht und Wohlstand. Ihre Ideologie orientierte sich an der der Vereinigten Staaten und führte eine freie Marktwirtschaft mit sehr wenigen Vorschriften ein."

