# SAT_satanists:0 "Satanisten an der Timiryazevskaya"
# SAT_satanists_desc:0 "Eine Ansammlung wilder, degenerierter und bösartiger Menschen. Ihr Kult beruht auf dem Glauben, der große Krieg sei bereits das biblische Ende der Welt gewesen, der Kampf des Himmels gegen die Mächte der Hölle. Und die Hölle habe gewonnen. Nun verehren sie Satan als Sieger über das Gute und trachten danach, sein Reich in diese Welt zu bringen. Direkt unterhalb der Moskauer Metro vermuten die Satanisten das Tor zur Hölle und sie als Überlebende seien dazu auserkoren, dieses Tor aufzustoßen. So versklaven sie jeden den sie zu fassen kriegen und zwingen ihre Opfer in endloser Arbeit zu graben, immer tiefer, um endlich ihm selbst gegenüberzustehen, Satan, dem Gehörnten."

 SAT_domain_of_hell_idea:0 "Reich der Hölle"
 SAT_domain_of_hell_idea_desc:0 "Eine Bande degenerierten Abschaums die an die Lehren des Satans glauben. Sie versklaven ihre Nachbarn und zwingen sie ein Loch in die Tiefe zu graben, wo sie die Tore der Hölle vermuten."

 SAT_armies_of_shaytan:0 "Armeen des Satan"
 SAT_armies_of_shaytan_desc:0 "Die Armee des Gehörnten, wenn man sie denn so nennen will, ist kaum mehr als eine Ansammlung geisteskranker Verbrecher unter konstantem Drogeneinfluss. Zwar nahezu völlig undiszipliniert, jedoch bis an die Zähne bewaffnet und völlig unempfinglich sollte man sie nicht unterschätzen."

 SAT_utter_conviction:0 "Absolute Überzeugung"
 SAT_utter_conviction_desc:0 "In den Herzen der Satanisten gibt es keinen PLatz für Zweifel. Wer sich einmal auf dem Pfad der Sünde begeben hat, der verlässt ihn auch nie wieder. Wer einmal dem Wahnsinn verfallen ist, für den gibt es keine Hoffnung mehr."

 SAT_brutal_restructuring:0 "Brutale Neuordnung"
 SAT_brutal_restructuring_desc:0 "Zu lange schon waren wir ein unorganisierter Haufen, doch nun steht die Timiryazevskaya unter unserer Kontrolle und unser Schicksal erwartet uns. Leider wird unsere Grabung wohl eine Weile andauern und das bedeutet, wir brauchen Gesetze und Ordnung, zumindest solange bis unser Ziel erreicht ist."

