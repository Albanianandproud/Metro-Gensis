l_german:
 RYZ_unorganized:0 "Unorganisierter Bund"
 RYZ_unorganized_desc:0 "Vom Rest der Metro durch eine Oberflächenlinie getrennt weiß tatsächlich kaum jemand dass diese Nation hier existiert. Die drei Stationen sind offiziell eine Nation, in Wahrheit sind sie dies jedoch nur auf dem Papier. Nichteinmal auf einen gemeinsamen Namen hat man sich einigen können, da jede Station die Nation nach sich selbst benennen wollte. Sollte sich jedoch einmal eine Station über die anderen zwei erheben, so könnte sich dieses Chaos in Luft auflösen..."

 RYZ_organized_community:0 "Organisierte Gemeinschaft"
 RYZ_organized_community_desc:0 "Nach langen Verhandlungen haben sich diese Stationen inzwischen unter einem banner vereint, was sie bedeutend stärker macht."

 RYZ_ryazan_community:0 "Organisierte Gemeinschaft"
 RYZ_ryazan_community_desc:0 "Diese Nation hält zusammen, auch wenn sie aus mehreren Stationen besteht."
