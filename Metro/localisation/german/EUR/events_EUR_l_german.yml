l_german:

 nf_EUR.1.t:0 "Organisation"
 nf_EUR.1.d:0 "Ein erheblicher Teil der Einwohner des Europäischen Stationenbund sind Einwanderer, ehemalige Geschäftsleute und Angestellte des Moskauer Geschäftszentrums. Wir müssen diese Einwanderer zu arbeitenden Zivilisten organisieren."
 nf_EUR.1.a:0 "Bringt sie zur Armee"
 nf_EUR.1.b:0 "Bringt sie in die Industrie"

 nf_EUR.2.t:0 "Eine neue Regierung"
 nf_EUR.2.d:0 "Die Gründung dieses neuen Systems auf Wahlsystemen aus der Vorkriegszeit wie dem britischen Parlament hat den Menschen eine besser organisierte und effizientere Regierung gegeben und gleichzeitig die wahre Demokratie bewahrt"
 nf_EUR.2.b:0 "Demokratie und Frieden für das Volk."
 europe_has_council:0 "§YDer Stationenbund Europas§! hat eine §YRatsregierung§!"
 
 nf_EUR.3.t:0 "Erfolgreiche Expedition"
 nf_EUR.3.d:0 "Die von uns ausgesandten Stalker sind mit reichlich Vorräten zurückgekehrt."
 nf_EUR.3.a:0 "Ein guter Tag!"
 
 nf_EUR.4.t:0 "Gescheiterte Expedition"
 nf_EUR.4.d:0 "Die Stalker, die wir ausgesandt haben, werden nicht zurückkehren. Einer unserer Männer kam schwer verletzt zurück und berichtete von dem Tod der anderen. Er kam nur mit einigen Resten zurück."
 nf_EUR.4.a:0 "Ein furchtbarer Tag für uns alle"
 
 nf_EUR.5.t:0 "Steigende Industrialisierung"
 nf_EUR.5.d:0 "Während wir uns auf unseren industriellen Fortschritt konzentriert haben, sind wir durch ein ineffizientes Militär anfälliger für Angriffe von außen geworden. Eine Reform ist dringend nötig"
 nf_EUR.5.a:0 "Militär-Propaganda"
 nf_EUR.5.b:0 "Zwingt die Arbeiter in die Armee"
 nf_EUR.5.c:0 "Jeder tut seine Pflicht"
 
 nf_EUR.6.t:0 "Westerniserung"
 nf_EUR.6.d:0 "Europa ist im Kern eine westliche Nation, Europa war eine industrielle Großmacht, und warum sollten wir dies nicht in unsere Kultur integrieren?"
 nf_EUR.6.a:0 "Heißt sie willkommen"
 
 nf_EUR.7.t:0 "Weitere Westernisierung"
 nf_EUR.7.d:0 "Europa ist im Kern eine westliche Nation, Europa war eine industrielle Großmacht, und warum sollten wir dies nicht in unsere Kultur integrieren?"
 nf_EUR.7.a:0 "Heißt sie willkommen"
 
 nf_EUR.8.t:0 "Die Bedrohung an unserer Grenze"
 nf_EUR.8.d:0 "Der Große Wurmkult stellt schon seit einiger Zeit eine Bedrohung für uns dar. Indem wir die wahre Gefahr erkennen, die er für uns darstellt, können wir die potenzielle Gefahr minimieren oder sie vollständig beseitigen"
 nf_EUR.8.a:0 "Wir müssen uns vorbereiten"
 
 ## Titles
 nf_EUR.9.t:0 "Die Expedition"
 nf_EUR.10.t:0 "Die Expedition"
 nf_EUR.11.t:0 "Die Expedition"
 ## Descriptions
 nf_EUR.9.d:0 "Unsere Forscher und Stalker haben erfolgreich eine Sammlung von Saiga-12-Schrotflinten gefunden, die wir zerlegt und erforscht haben, sodass wir sie selbst herstellen konnten."
 nf_EUR.10.d:0 "Unsere Forscher und Stalker haben erfolgreich eine Sammlung russischer Revolver gefunden, die wir unserer Waffenkammer hinzufügen"
 nf_EUR.11.d:0 "Unsere Forscher und Stalker haben erfolgreich eine Sammlung von Schrottgewehren gefunden, die wir unserer Waffenkammer hinzufügen"
 ## Okay!
 nf_EUR.9.a:0 "Ein guter Fund!"
 nf_EUR.10.a:0 "Ein guter Fund!"
 nf_EUR.11.a:0 "Ein guter Fund!"
 
 nf_EUR.12.t:0 "Politische Reformen"
 nf_EUR.12.d:0 "Unsere Politik braucht dringend Reformen. Es gibt zwar eine Regierung, aber bisher nur auf dem Papier. Der Rat wurde gerade erst eingesetzt und die Leute streiten und streiten sich, ohne dass etwas erledigt wird. Wir müssen hier und jetzt über unser Schicksal entscheiden!"
 nf_EUR.12.a:0 "Der Beginn von etwas Großem"
 
 europe_worm_is_threat:0 "Wir haben die volle Bedrohung des §YGroßen Wurm Kultes§! erkannt"
 nf_EUR.14.t:0 "Das Problem allgemein"
 nf_EUR.14.d:0 "General Bianachi ist schon seit einiger Zeit eine Plage, er widerspricht oft den Ratsmitgliedern und besteht darauf, dass der benachbarte Große Wurmkult eine Bedrohung darstellt. Mit seinen ständigen Belästigungen muss man sich auseinandersetzen."
 nf_EUR.14.a:0 "Lasst uns auf die Vernunft hören"
 nf_EUR.14.b:0 "Er ist wahnsinnig!"
 
 nf_EUR.13.t:0 "Oberster Kanzler Schulz"
 nf_EUR.13.d:0 "An diesem Tag wählte der Rat einen neuen Kanzler, der die Arbeit selbst in die Hand nehmen und der Nation die Unterstützung bieten kann, die sie braucht!"
 nf_EUR.13.a:0 "Ruhm für Europa!"
 
 nf_EUR.15.t:0 "Eine Europäische Union"
 nf_EUR.15.d:0 "Europa hatte seine Probleme mit der Vertretung seiner Bürger, aber heute haben wir uns endlich zu einer wohlhabenden Nation vereint!"
 nf_EUR.15.a:0 "Ruhm für Europa!"
 
 nf_EUR.16.t:0 "Ein Allierter gegen den Kult"
 nf_EUR.16.d:0 "Gemeinsam können wir uns gegen den Großen Wurmkult vereinen, um zu verhindern, dass er zu weit in unser Territorium vordringt, und hoffentlich können wir ihn sogar vernichten"
 nf_EUR.16.a:0 "Zusammen sind wir stärker"
 
 nf_EUR.17.t:0 "Sie lehnen ab"
 nf_EUR.17.d:0 "Sie haben unser Bündnisangebot abgelehnt, vielleicht werden sie in Zukunft klug genug sein, die Vorteile eines Bündnisses zu erkennen."
 nf_EUR.17.a:0 "Tragisch!"
 
 nf_EUR.18.t:0 "Wo legen wir unseren Fokus?"
 nf_EUR.18.d:0 "Wir müssen entscheiden, wo wir unsere industrielle Kraft einsetzen. Wenn wir uns für eine bessere Konstruktion entscheiden, könnte es zu Einbußen bei unserem Output kommen und umgekehrt"
 nf_EUR.18.a:0 "Unser Bauwesen"
 nf_EUR.18.b:0 "Unsere Produktion"
 
 nf_EUR.19.t:0 "Die Rede von Schulz"
 nf_EUR.19.d:0 "Gestern hielt Kanzler Schulz eine Rede, in der er die Menschen dazu inspirierte, zu den Waffen zu greifen und unsere Nation zu verteidigen. Ein Zitat von ihm erregte die Aufmerksamkeit der Menschen: „Europa wird niemals fallen, wir werden niemals kapitulieren. Wir werden kämpfen, wenn nötig, allein, wenn nötig ... bis zum letzten Atemzug.“"
 nf_EUR.19.a:0 "Ein starker Anführer"
 
 nf_EUR.20.t:0 "Hanse-Handelsabkommen"
 nf_EUR.20.d:0 "Die Hanse hat einem Geschäftsabkommen zugestimmt, mit dem sie gegen eine vorübergehende Zahlung entweder die zivile oder die militärische Industrie verbessern werden. Es liegt an uns zu wählen..."
 nf_EUR.20.a:0 "Eine Militärinvestition"
 nf_EUR.20.b:0 "Eine Zivilinvestition"
 
 nf_EUR.21.t:0 "Entlarvte europäische Minister"
 nf_EUR.21.d:0 "Die neuen militaristischen Randalierer haben Geheimnisse über europäische Minister preisgegeben. Dies hat den Ruf der Demokraten stark geschädigt, da es beweist, wie leicht sie korrumpiert werden können."
 nf_EUR.21.a:0 "Für Europa!"

 nf_EUR.22.t:0 "Militärische Darstellung"
 nf_EUR.22.d:0 "Die militaristischen Randalierer zeigten ihre Macht gegenüber dem Rat und zeigten, wie schwach der Rat ist, den Bund zu kontrollieren."
 nf_EUR.22.a:0 "Für Europa!"

 nf_EUR.23.t:0 "Aufstände gegen den Rat"
 nf_EUR.23.d:0 "Menschen versammelten sich in den Metro-Tunneln und protestierten gegen die Herrschaft des Rates"
 nf_EUR.23.a:0 "Für Europa!"

 nf_EUR.25.t:0 "Bianachi's Coup"
 nf_EUR.25.d:0 "Bianachi stürmte den Rat und erklärte sich zum Alleinherrscher. Er sieht in Europa einen neuen Militärstaat mit Ideen, um daraus ein "neues Rom“ zu machen.."
 nf_EUR.25.a:0 "Für Europa!"

 nf_EUR.24.t:0 "Militär-Coup"
 nf_EUR.24.d:0 "Militaristische Randalierer stürmten den Rat und traten an seine Stelle, mit dem Wunsch, Europa zu einem mächtigeren, überlebensfähigen Staat in der Metro zu machen"
 nf_EUR.24.a:0 "Für Europa!"

 nf_EUR.26.t:0 "Vergesst den Geist von Rom"
 nf_EUR.26.d:0 "Wenn wir uns auf uns selbst und unseren Fortschritt als Militärmacht konzentrieren wollen, müssen wir uns von diesen dummen Vorstellungen von Rom trennen"
 nf_EUR.26.a:0 "Auf Wiedersehen"

 ### Dance Dance Revolution Larp

 nf_EUR.27.t: "DD-Revolution!!"
 nf_EUR.27.d: "Nostalgie und Sympathie gegenüber der alten Welt haben den Zeitgeist sozialistischer Sympathien in ganz Europa beflügelt. Nur wenige erinnern sich an die Tage der deutschen Demokratischen Republik, und noch weniger unserer Altersgenossen versuchen, diese Gefühle ebenfalls zu bewahren. Wir müssen ihre Herzen und Köpfe gewinnen."
 nf_EUR.27.a: "Für Europa! Für den Sozialismus! Für die Zukunft!"

 nf_EUR.28.t: "Fünfjahresplan: Addendum"
 nf_EUR.28.d: "Es hieß, es sei unmöglich; Aber jetzt, am Ende unseres ursprünglichen Plans, sind diese Zweifler verstummt. Wir haben einen großen industriellen Wandel erlebt. Von einer zurückgebliebenen Ansammlung von Stationen bis hin zum Neid der Metro. Mit deutschem Einfallsreichtum sind wir erneut erfolgreich geworden."
 nf_EUR.28.a: "Die früchte unserer Arbeit tragen nun eigene Früchte."

 nf_EUR.29.t: "Die Piloten"
 nf_EUR.29.d: "Die Piloten waren angeblich ehemalige Mitarbeiter des Mikoyan Design Bureau und flüchteten tief in ihre bereits errichteten Bunker. Sie führten einen Krieg gegen die Anarchisten, und stemmten sich auch im inneren gegen die verschiedenen anarchistischen Strömungen. Ursprünglich handelten wir mit den Bürgern der [342.GetName] um Ersatzlebensmittel und Kleidung, aber unsere Besetzung der Station hat ihre Bereitschaft zum Handeln offenbar geschadet.\n\nDie Gerüchte über humanoide Maschinen, die ursprünglich von den Piloten hergestellt wurden, waren unwahr; nur gemacht, um Interesse zu wecken und ihre fehlerhafte Elektronik an unwissende Kunden weiterzuverkaufen ... Nun ja, zumindest die halbe Wahrheit. Es gelang ihnen jedoch tatsächlich, humanoide Maschinen herzustellen. Ein Androide... Oder besser gesagt, ihre Bagger hatten einen ausgegraben; Während einer routinemäßigen Ausgrabungsmission. Dort lag es unter einem Brocken Erde und Schrott und einer Eisdecke. Ob vor dem Krieg oder nach der Apokalypse gebaut, die Piloten waren sich nicht sicher. Die Maschine konnte sprechen, wenn auch nur in Bruchstücken, die für ihre Techniker unverständlich waren. Natürlich hatten die Piloten früher versucht, den Android an das Reich zu verkaufen, aber sei es als Geste des guten Willens oder einfach nur, um ihn schnell aus ihren Händen zu bekommen, sie überließen uns das Eigentum an der Maschine. Scheinbar auch von der Maschine so gewünscht."
 nf_EUR.29.a: "Wir werden einen Nutzen für dich finden, mein armes verlorenes Kind."

 nf_EUR.30.t: "Heim und davon"
 nf_EUR.30.d: "Der Marschall genießt bei unseren revolutionären Kräften hohes Ansehen, er strebt jedoch nicht danach, die anspruchsvolle Aufgabe des Generalsekretärs zu übernehmen. Mit 60 Jahren hätte sich der alte Mann nicht vorstellen können, dass er seine goldenen Jahre als Galleonsfigur in der sozialistischen Revolution verbringen würde, geschweige denn ein elendes Dasein in den Ruinen der Moskauer U-Bahn fernab seiner Heimat fristen würde.\n\nDa Amsel seinen Schützling direkt auswählt, ist seine Vergangenheit voller Gerüchte. Es ist lediglich bekannt, dass ihr Vater vor ihrem Untergang ein ehemaliger Apparatschik der DDR war. Was auch immer die Wahrheit sein mag, Amsel hat gezeigt, dass er äußerst kompetent und engagiert für die Wiederbelebung der DDR ist."
 nf_EUR.30.a: "Alle Welt sehnt sich nach Frieden, Reicht den Völkern eure Hand!"

 nf_EUR.31.t: "[RED.GetName] sendet Militärhilfe"
 nf_EUR.31.d: "Die [RED.GetName] haben kürzlich von unserem Kampf gehört, die kapitalistische, imperialistische Herrschaft über die Europäische Gemeinschaft zu stürzen, und haben in Anerkennung unserer Notlage militärische Hilfe geschickt, um uns in diesem Kampf zu unterstützen."
 nf_EUR.31.a: "Bleiben wir getreu bis in den Tod."