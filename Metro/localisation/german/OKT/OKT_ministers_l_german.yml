l_german:
  OKT_leander_nekrasov: "Leander Nekrasov"
  OKT_NEKRASOV_DESC: "Wenn Sie im Sicherheitsteam die ruhigste Hand und einen noch präziseren Schuss haben, erweisen Ihnen die meisten ihren Respekt. Da er de jure Verwalter von Oktjabrskaja ist, seit er die Verteidigung der Station gegen die Tretjakow-Überfälle organisiert hat, herrscht in Oktjabrskaja ein Gefühl der Normalität, nicht zuletzt dank Nekrasovs starkem Engagement für die Aufrechterhaltung der Ordnung um jeden Preis. Obwohl der Tunnel, der zum Tretjakow-Dreieck führt, stets unter  Aufsicht steht, unternehmen Woche für Woche mehr Männer ihre Ausflüge von dort aus."
  OKT_oleg_sorokin: "Oleg Sorokin"
  OKT_SOROKIN_DESC: "Being a professional freelance shooter tends to have its perks. Perhaps being able to shoot a gun possesses few administrative qualities, but when problems have inevitably been brought to him, Sorokin has found himself to have a knack for de-escalation. With dozen notches to his name, nobody has yet to go against his word or his orders."

  OKT_guarded: "Behütet"
  OKT_free_stalker: "Unabhängige Stalker"

