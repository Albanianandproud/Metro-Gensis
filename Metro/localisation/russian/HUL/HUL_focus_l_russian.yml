 HUL_63: "Ох, вот это были деньки"
 HUL_63_desc: "Когда-то чёрно-красный флаг внушал убеждённость и солидарность, вселял страх в злые сердца тех, кто шёл под ливнем. Теперь же он стал синонимом бандитизма и простого хулиганства. В какой-то степени огонь рабочей солидарности ещё не погас, но в него уже почти не вершатся…"