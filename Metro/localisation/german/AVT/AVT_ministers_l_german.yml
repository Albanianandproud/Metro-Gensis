l_german:
  AVT_rusakov: "Kommissar Rusakov"
  AVT_commissar_rusakov: "Kommissar Rusakov"
  AVT_RUSAKOV_DESC: "Rusakov wurde vor dem nuklearen Feuer geboren, mehr ist über seine Jugend jedoch nicht bekannt. Jung und voller Eifer versammelten er eine Schar fanatischer Kämpfer und ergriff die Macht an der Awtosawodskaya, Ein Aufbruch, der das Banner der Revolution erneut hell flattern ließ. Er nannte sich selbst „Kommissar“ und gründete die Erste Internationale Kampfbrigade, benannt nach Ernesto che Guevara."
  _commissar_rusakov: "Kommandant der ersten interstationalen Kämpferbrigade"
  _communist_rusakov: "§RKommandant der ersten interstationalen Kämpferbrigade§!"

  AVT_tomsky: "Anatoly Tomsky"
  AVT_anatoly_tomsky: "Anatoly Tomsky"
  AVT_TOMSKY_DESC: ""
  _anatoly_tomsky: "Militanter Anarchist"

  AVT_lumumba: "Maxim Lumumba"
  _AVT_lumumba: "Schienentechniker"
  AVT_lumumba_desc: "Mit seinem Wissen über Schienenfahrzeuge hat sich Lumumba als Cheftechniker etabliert. Persönlich überwacht er die Reparatur und Nachrüstung der Draisinen für den Einsatz durch die Brigade."

 AVT_karatsyupa: "Karatsyupa"
 _AVT_karatsyupa: "Brigade-Maskotchen"
 AVT_karatsyupa_desc: "Unterschätze niemals einen trotzkistischen Hund"

 AVT_fyodor: "Fyodor"
 _AVT_fyodor: "Saboteur"
 AVT_fyodor_desc: "Das älteste Mitglied der Brigade. Während Fjodor wie der stereotype Russen-Idiot aussieht, ein undisziplinierter Alkoholiker, so ist doch das genaue Gegenteil der Fall. Er hat viele Konflikte miterlebt und ist dadurch zu einem erfahrenen Krieger geworden."

 AVT_banzai: "Banzai"
 _AVT_banzai: "Brigade-Kämpfe"
 AVT_banzai_desc: "Wie so viele andere in eine Welt voller Scheiße hineingeboren. Banzai wurde Anfang 20 ein revolutionärer Kämpfer und schloss sich Rusakovs Brigade an. Aufgrund seines blutrünstigen „Kamikazee“-Charakters wird er von seinen Kollegen als „Banzai“ bezeichnet."

 AVT_vladimir_koltsov: "Vladimir Koltsov"
 AVT_koltsov: "Vater Vladar"
 _AVT_koltsov: "Bußesuchender"
 AVT_koltsov_desc: "Ein ergrauter alter Mann, der einst biologische Waffen für die UdSSR entwickelte. Nachdem er die Konsequenzen seines Handelns erkannt hatte, verließ er das Projekt und wurde Priester. Er schwört, niemals Schaden anzurichten und um Vergebung für seine Taten zu bitten. Aus der Lubjanka gerettet bot er unserer Brigade seine Dienste an. Vladar versucht nun in seiner Freizeit ein Gegenmittel gegen genau diesen Virus zu entwickeln, in einem vergeblichen Versuch Erlösung zu finden."

 AVT_nikolai_nosov: "Nikolai Nosov"
 AVT_nosov: "Nosov"
 _AVT_nosov: "Kundschafter"
 AVT_nosov_desc: "Geboren in Polezhaevskaya zusammen mit seinem Zwillingsbruder Grischa. Ihre Mutter litt an Strahlenkrankheit und sie beide litten an Kleinwuchs aufgrund einer angeborenen Wachstumskrankheit. Trotzdem wurden sie wie jeder andere normale Bürger der Station behandelt. Nachdem ihre Mutter nach dem mysteriösen Tod ihres Vaters wahnsinnig geworden war, wurden sie zur Awtosawodskaya geschickt, um etwas aus sich selbst zu machen. Sie nutzen ihren Zwergwuchs als Fähigkeit, um an schwer zugängliche Orte zu gelangen und so nützliche Vorräte für die Station zu finden."

 AVT_perebezhchik: "Grigorev"
 _AVT_perebezhchik: "Perebezhchik"
 AVT_perebezhchik_desc: "Geboren einige Jahre vor dem Armageddon lebte er in der Chekhovskaya und diente dem Reich als Stalker. Nach einem 'Vorfall' wurde er jedoch wie aus dem nichts als Mutant bezichtigt und musste fliehen. Nach einem langen Marsch über die Oberfläche schaffte er es schließlich an die Awtosawodskaya, wo er für seine Kenntnisse über den Feind mit offenen Armen aufgenommen wurde. Nun träumt er nur noch davon, eines Tages das Reich stürzen zu können, damit er seine Familie wiedersehen kann."

 AVT_kadyrov: "Kadyrov"
 AVT_kadyrov_desc: "Als Verbindungsmann der Roten Linie wird Kadyrow dafür sorgen, dass unsere Streitkräfte den Standards der Roten Linie gerecht werden."
 _AVT_kadyrov: "Drill-Sergant"

  AVT_mayakovskaya_character: "Boron"
  AVT_mayakovskaya_character_desc: "Es gibt viele Verwendungsmöglichkeiten für eine Ratte. Sie können sie essen, schmoren, daraus einen schönen Kebab zubereiten, die Haut abziehen um daraus ein bequemes Paar Schuhe zu machen, oder sie ins Wettrennen schicken. Aber sie fangen? Eine ganz andere Tortur. Bor hat das Talent, Ratten einzufangen, inzwischen ist er darin so gut, dass er tatsächlich ab und zu den eine oder andere Reich-Spion oder Mutanten gefangen hat. Leider nützt deren ihr Fleisch nicht viel. Und seine schlechten Witze helfen da auch nicht."
	_AVT_mayakovskaya_character: "Rattenfänger"
  
  AVT_turgenevskaya_character: "Yakau"
  AVT_turgenevskaya_character_desc: "Yakau war dazu verdammt, die letzten elenden Tage seines Lebens in den kaputten Gängen der Turgenevskaya zu verbringen. Er musste mitangesehen, wie die Station durch die schwelenden Anomalien, die die Bahnhofsgleise und tiefen Tunnel heimsuchen, zerstört und verlassen wird. Nur er ist übrig geblieben."
	_AVT_turgenevskaya_character: "Der letzte Mann"
  
  AVT_partizanskaya_character: "Hunter"
	_AVT_partizanskaya_character: "Mutierter Gnom"
  AVT_partizanskaya_character_desc: "Hunter lebt an der Station Partizanskaya und ist ein entstellter Mutant, der eine Hockeymaske trägt um das Ausmaß seiner Missbildungen zu verbergen. In den langen Wartungsschächten und geheimen Tunneln kann Hunter unsere Soldaten auf ihren Einsätzen unterstützen."
  
  AVT_avtozavodskaya_character: "Ferrum"
	_AVT_avtozavodskaya_character: "Chemiker"
  AVT_avtozavodskaya_character_desc: "Ein Chemiker von vor dem Krieg, redet jedoch meist unverständliches Zeug."