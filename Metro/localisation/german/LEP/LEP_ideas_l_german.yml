l_german:
  LEP_disease_legacy: "[?YAS_plague_legacy]"
  LEP_disease_legacy_desc: "Eine absolute Katastrophe wurde an der §YNovoyasenevskaya§! gerade so abgewehrt, als die Infektion endlich eingedämmt werden konnte. Der Preis hierfür war es die Medizin nur für sich zu behalten und den Nachbarstationen nicht zu helfen. Nun erleidet die Station die wirtschaftlichen Folgen dieser Entscheidung, vielleicht eine Art göttlicher Gerechtigkeit für ihre vergangene Selbstsucht."
  LEP_mutant_population: "Mutantentoleranz"
  LEP_mutant_population_desc: "Aufgrund der geringen Tiefe unter der Erdoberfläche und der Tatsache, dass die Station bei Bombenabwurf nur teilweise fertiggestellt war, weist die §YLesoparkovaya§! einen ungewöhnlich hohen Anteil an Bewohnern mit mutationsbedingten Anomalien auf. Es wurde eine strenge Ausgangssperre verhängt, die den Kontakt zwischen Menschen und Mutanten einschränkt, um deren Anzahl zu begrenzen und die wenigen verbliebenen positiven Beziehungen zu den Nachbarn zu bewahren."
 