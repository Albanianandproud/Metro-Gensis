 nf_TSH.1.t:0 "Heidnische Angriffe"
 nf_TSH.1.d:0 "Die Heiden greifen immer weiter an, wir müssen sie aufhalten!"
 nf_TSH.1.a:0 "Blyat! Wir müssen etwas unternehmen!"

 nf_SPT_LR.1.t: "Banditen an der Kaluga"
 nf_SPT_LR.1.d: "Vier Gangs machen die Kalugalinie unsicher, doch untereinander sind sie so zerstritten, dass es ein Leichtes wäre sie gegeneinander aufzuhetzen.?"
 nf_SPT_LR.1.a: "Die Bürger müssen vor den Banditen geschützt werden"
 SPT_LR_MOB_hostile: "Erlaubt uns subversive Operationen an der Kaluga durchzuführen, welche dort zu einem Bürgerkrieg führen könnten!"
 nf_SPT_LR.1.b: "Ignorieren wir die Angelegenheit lieber, wir haben Wichtigeres zu tun"