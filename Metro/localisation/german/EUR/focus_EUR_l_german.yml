 EUR_europan_nation: "Ein Heim fern der Heimat"
 EUR_europan_nation_desc: "Sie sagten, es sei unmöglich! Russland konnte niemals gezähmt oder erobert werden, doch genau das haben wir getan. Im bitteren ewigen Winter entstand ausgerechnet in der Moskauer Metro eine neue Nation. Wenn das Eis schließlich zurückgeht und wir unter der Erde hervorkommen, wird der Rest Russlands unser Anspruch sein. Eine Nation. Die europäische Nation."

