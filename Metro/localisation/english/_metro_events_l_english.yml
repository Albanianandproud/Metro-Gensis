l_english:
 nf_metro.1.t:0 "BETA BETA BETA BETA!!!!!!!!!!!!"
 nf_metro.1.d:0 "Welcome to the Metro HOI4 Mod! If you see this message then you are playing the BETA branch of the Metro Mod. This is not the final draft. Not everything is completed for a release to main.\nAs expected you will most likely encounter many, many bugs and errors. Player discretion is advised. Please report any errors or glitches you encounter on the discord. Or to HEAVY through steam. Thankyou \n-Metro Genesis Dev Team"
 nf_metro.1.a:0 "Thank you"

 nf_metro.4.t:0 "Fascists in the Depths"
 nf_metro.4.d:0 "We have received reports of movement within the Metro tunnels, These are not the irregular movement; lumbering shambles or ratty tip-toes. Instead they uniform.. too uniform. Clearly human in origin. Although said reports few and far between."
 nf_metro.4.a:0 "We have more than the rats to worry about"

 nf_metro.5.t:0 "Breakaway Sect"
 nf_metro.5.d:0 "Following the Fuhrers refusal to permit Stortebeker with leniency, and allow him back into the Reich, he has instead chosen to flee. That cursed wretch! Taking as many 'loyal' subjects of his he could along with him.. Though perhaps thats one saving grace. Stortebekers ilk are far from what the reich could consider desirable. Our scouts indicate that he and his band of misfits have established a base of operations somewhere in the southern portion of the Metro."
 nf_metro.5.a:0 "That Wretch!"

 nf_metro.6.t: "Industrial Growth"
 nf_metro.6.d: "With our Industrial base growing, our energy consumption has also seen a recent increase. Our technicians, and workbenches will require more electricity to keep up with our growing demands. We must ensure we source means maintain our energy flow, and cease any short-falls. Whether constructing more refineries, trading energy with neighbouring stations or alternative means."
 nf_metro.6.a: "We will keep that in mind."