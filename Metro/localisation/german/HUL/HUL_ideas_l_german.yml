l_german:
 huliaipole:0 "Gulyai-Pole Republik"
 huliaipole_desc:0 "§RTod den Feinden der Freiheit!§!\n\nDie Republik von  Gulyai-Pole ist eine anarcho-kommunistische Kommune, die sich mit dem Erstarken Andrey Moskvins immer weiter von der Roten Linie distanziert hat. Fest im Glauben die wahren Werte der Revolution zu verkörpern, kämpfen sie gegen staatliche Strukturen in der ganzen Metro und haben hierfür bereits ein beachtliches Arsenal aufgebaut."

 HUL_anarchist_republic:0 "Anarchistische Republik"
 HUL_anarchist_republic_desc:0 "§RTod den Feinden der Freiheit und der Arbeiterklasse!§!\n\nGeboren aus den Idealen des Nestor Makhno, ist die §Y[HUL.GetNameDef]§! eine §Ranarcho-kommunistische§! Republik, hauptsächlich bestehend aus enttäuschten Revolutionären der roten Linie"

 HUL_beat_the_reds:0 "Weg mit dem Roten"
 HUL_beat_the_reds_desc:0 "Im ewigen Streit um die Ideologie distanzierte sich die Republik von der Roten Linie und ihrer stalinistischen Politik."

