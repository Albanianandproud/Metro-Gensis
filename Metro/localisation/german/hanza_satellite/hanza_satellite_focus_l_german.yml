l_german:
hanza_satellite_1: "Mit Nachbarn wie den unseren"
hanza_satellite_1_desc: "Die Radialstationen des Rings – die erste Hürde auf dem Weg zum reichen Herzen der Hansa und der großen Metro. Händler aus allen Richtungen kommen hier zusammen und bringen Waren aus allen Ecken des Metrosystems mit. Vielleicht nicht ganz so »wohlhabend« wie die Umsteigestationen des Rings, doch das Leben geht weiter. Es könnte schließlich immer schlimmer sein."

hanza_satellite_2: "Die Grenzmärkte"
hanza_satellite_2_desc: "Mehr als das Commonwealth gerne zugibt, fungieren die Radialstationen als Arterien, die den Warenstrom direkt in den Ring leiten. Alltägliche Güter, die Erzeugnisse der Stationen und vor allem Waffen aller Art werden auf den Marktständen feilgeboten."

hanza_satellite_3: "Versorgung der Garnison"
hanza_satellite_3_desc: "Wenn man den Bewohnern der Großen Metro glauben würde, wären unsere Stationen keine Bastionen der Zivilisation am Rand der bekannten Welt. Und die »Barbaren« jenseits davon seien nichts weiter als vielversprechende Handelspartner. Doch Überfälle geschehen, und wie jede andere Station leben auch wir ständig in der Angst vor Mutantenangriffen – vielleicht sogar etwas mehr als gewöhnlich."

hanza_satellite_4: "Banditenjagd"
hanza_satellite_4_desc: "Mehr als alles andere sind es die Menschen selbst, die die größte Gefahr darstellen. Wer hätte gedacht, dass dort, wo Milch fließt, immer jemand versucht, sich heimlich etwas von der Oberfläche abzuschöpfen?"

hanza_satellite_5: "Ein Knotenpunkt der Möglichkeiten"
hanza_satellite_5_desc: "Nicht nur Waren, sondern auch Menschen strömen durch unsere Stationen. Angelockt von der Hoffnung auf ein besseres Leben oder Arbeit anderswo. Für viele ist selbst der Anblick elektrischer Glühlampen etwas Neues – oder etwas, das schmerzhafte Erinnerungen weckt. Vielleicht sogar zu schmerzhafte für ihre Augen."

hanza_satellite_5_A: "Neutraler Boden"
hanza_satellite_5_A_desc: "Manchmal, wenn die Spannungen für Verhandlungen in Polis oder Belorusskaja zu groß werden, treffen sich die Parteien stattdessen auf unserer Station. Von einfachen Streitigkeiten zwischen Karawanen bis hin zu hitzigen Debatten, die wegen eines Missverständnisses jederzeit in Gewalt umschlagen könnten."

hanza_satellite_6: "Verpflichtung gegenüber der Hansa"
hanza_satellite_6_desc: "Die Radialstationen gelten nicht ohne Grund als Anhängsel der Hansa. Während sich der Generaldirektor um wichtigere Angelegenheiten kümmert, werden dennoch Anstrengungen unternommen, Einfluss und Kontrolle über unsere Station auszuüben. Schutz hat schließlich immer seinen Preis."

hanza_satellite_5_B: "Fragwürdige Besucher"
hanza_satellite_5_B_desc: "Schläger, Abschaum und Banditen wird der Zutritt zur Station verweigert – wenn sie nicht gleich auf Sicht erschossen werden. So lautet zumindest die Vorschrift an den meisten Kontrollpunkten der Hansa. Das entscheidende Wort ist jedoch »die meisten«. Gegen den richtigen Preis schauen manche Wachen gern einmal in die andere Richtung – vorausgesetzt, sie sind gut gelaunt."

hanza_satellite_7: "Wirtschaftlicher Austausch"
hanza_satellite_7_desc: "Handel kann äußerst lukrativ sein – zumindest für jene mit dem richtigen Gespür dafür. Ein Mantel für 200 Patronen. Eine Schachtel Zigaretten für 60. Und wenn man lange genug sucht, findet man vielleicht sogar einen legendären Stalker, der bereit ist, Leib und Leben zu riskieren und die Oberfläche zu betreten."

 hanza_satellite_8: "Organisation der Arbeitskräfte"
hanza_satellite_8_desc: "Neue Schweineställe, Pilzplantagen und Wohnunterkünfte werden täglich errichtet, um der stetig wachsenden Bevölkerung gerecht zu werden. Gruppen verfügbarer Arbeitskräfte stehen stets bereit – gegen Bezahlung natürlich."

hanza_satellite_8_A: "Waffenhandel"
hanza_satellite_8_A_desc: "Um der Hansa nicht auf die Füße zu treten, ist der Handel mit Waffen eher selten ... zumindest mit solchen, die besser sind als ein zusammengeklebtes Gewehr. Aber hin und wieder stößt man auf ein wirklich lohnendes Angebot."

hanza_satellite_9: "Bearbeitung der Einwanderer"
hanza_satellite_9_desc: "Kein Pass – kein Zutritt. Zumindest lautet so die offizielle Regelung. Manchmal lassen sich die Wachen jedoch zu Ausnahmen überreden. Für die meisten bleibt die Registrierung jedoch eine mühsame Angelegenheit – vorausgesetzt, man hält sie überhaupt für den Aufwand wert."

hanza_satellite_9_A: "Patronen... Patronen! PATRONEN!"
hanza_satellite_9_A_desc: "Eine gut bewaffnete Gesellschaft ist eine höfliche Gesellschaft."

hanza_satellite_10: "Der Handel muss fließen"
hanza_satellite_10_desc: "Niemand hätte überlebt, wenn er sein Leben still und bescheiden in irgendeiner Stationsnische verbracht hätte. Der Handel muss weitergehen, denn er ist lebenswichtig für unser Fortbestehen. Wer den Handel kontrolliert, kontrolliert die Macht."

hanza_satellite_11: "Wenn du es baust..."
hanza_satellite_11_desc: "Unser Wohlstand hängt unmittelbar vom Strom der Karawanen ab, doch wir können nicht immer davon ausgehen, dass sie einen freundlichen Empfang vorfinden. Ein freies Bett, ein Ort zum Sitzen und Trinken und vielleicht etwas Warmes zu essen können einen gewaltigen Unterschied machen."

hanza_satellite_12: "Der Hansa-Weg"
hanza_satellite_12_desc: "Wir leben an gut instand gehaltenen Gleisen, und die Nachbarschaft zur Hanseatischen Liga bringt mehr Vorteile als Nachteile. Solange wir unsere Station befestigt und gepflegt halten, werden die Händler schon kommen. Ganz bestimmt."

hanza_satellite_13: "Ordentliche Stationsplanung"
hanza_satellite_13_desc: "Den Schweinestall stellen wir neben die Arbeiterunterkünfte, und das Verwaltungszelt direkt neben das Wirtshaus..."

hanza_satellite_14: "Aus dem Lauf einer Waffe"
hanza_satellite_14_desc: "Mit Reichtum kommt Macht. Und Macht kommt aus dem Lauf einer Waffe. Nicht ohne Grund hat bisher niemand ernsthaft versucht, sich mit der Hansa anzulegen – es sei denn, man wollte in Stücke gesprengt werden. Oder erleben, wie die eigene Bevölkerung die Tore einrennt, weil die Hansa die Lebensmittellieferungen eingestellt hat."

hanza_satellite_15: "Verkörperung des Kapitals"
hanza_satellite_15_desc: "In der linken Hand ein »Snickers«, in der rechten ein »Mars« – und mein PR-Manager heißt Karl Marx."

hanza_satellite_16: "Jagd nach Profit"
hanza_satellite_16_desc: "Eine Patrone für dich ... eine für mich. Zwei für die Stationswachen ... eine für mich. Eine für den Schestyorka, der die Räuber von unseren Karawanen fernhält ... und noch eine für mich."

hanza_satellite_17: "Leben mit einem Lied"
hanza_satellite_17_desc: "Manchmal besteht das Leben einfach darin, schwierige Zeiten zu überstehen. Vielleicht werden diese Zeiten nie vorübergehen, aber das bedeutet nicht, dass man sich geschlagen geben muss. Trotz aller Schwierigkeiten erleben wir einen weiteren Tag."

hanza_satellite_18: "Die Bevölkerung mobilisieren"
hanza_satellite_18_desc: "Es gibt immer gute Gründe dafür, warum so viele Wachen in der Station herumstehen. Doch im Notfall können wir auf die Bevölkerung selbst zurückgreifen. Eine Mobilisierung wird schwer zu schlucken sein – aber bevor die halbe Station niederbrennt, greifen die meisten lieber zum Gewehr."

hanza_satellite_19: "Aufbau eines Generalstabs"
hanza_satellite_19_desc: "Unsere Soldaten können zwar Befehle befolgen und sich in Reihen aufstellen, wenn man ihnen genug Zeit lässt. Doch wir brauchen eine richtige Führung, um aus einem zusammengewürfelten Haufen Wachen eine kompetente Streitmacht zu machen."

hanza_satellite_20: "Gemeinsame Verteidigung mit der Hansa"
hanza_satellite_20_desc: "Auch wenn die Liga unsere Station noch nicht direkt kontrolliert und sich derzeit damit begnügt, ihre geschätzten Zölle auf durchreisende Waren einzutreiben, muss sie ihren Teil der Abmachung erfüllen. Natürlich werden sie unsere Miliz nicht mit Kalaschnikows und Raketenwerfern ausrüsten – wahrscheinlich nicht einmal mit ein paar Ersatzgewehren. Aber zumindest können sie uns einige erfahrene Kommandeure schicken, um unsere Verteidigung zu stärken."
hanza_satellite_22: "Ansatz: »Erst schießen«"
hanza_satellite_22_desc: "Erst schießen, später Fragen stellen. Und wenn sie zurückschießen – nun, dann waren sie von Anfang an nicht besonders friedlich, oder?"

hanza_satellite_23: "Käufe bei »privaten« Händlern"
hanza_satellite_23_desc: "Oh ja, unsere Waffen sind von bester Qualität! Achten Sie nur darauf, den Abzug nicht zu fest zu ziehen, den Handschutz nicht zu kräftig anzufassen ... und berühren Sie auf keinen Fall den Staubdeckel."

hanza_satellite_23_A: "Handloren-Reparaturen"
hanza_satellite_23_A_desc: "Eine deutlich sicherere Möglichkeit, die Tunnel zu durchqueren, als zu Fuß. Unsere Händler und Transportdienste sollten dringend auf Draisinen setzen, statt sich allein den Tiefen der Metro auszusetzen."

hanza_satellite_24: "Bollwerk-Station"
hanza_satellite_24_tooltip: "Ermöglicht Entscheidungen, Handelskarawanen zu benachbarten befreundeten Stationen zu entsenden."
hanza_satellite_24_desc: "Gegen die Schrecken der Nacht und die Gefahren der Dunkelheit wird unsere Station zu einem Bollwerk ausgebaut – einer Verteidigungslinie der letzten Überreste der Zivilisation in Moskau."

hanza_satellite_25: "Handelszentrum"
hanza_satellite_25_desc: "Die Grundlagen einer geschäftigen Gemeinschaft werden geschaffen. Nicht nur Waren, sondern auch Gerüchte, Nachrichten und Kultur werden mit der Zeit von unserer Station ausgehen."

hanza_satellite_26: "Handelsstation"
hanza_satellite_26_desc: "Indem wir den Warenfluss kontrollieren und sicherstellen, dass die Hanse ihren Anteil erhält, wird unsere Station gewiss zu einem florierenden Markt heranwachsen."

hanza_satellite_26_A: "Arbeitslosigkeit verringern"
hanza_satellite_26_A_desc: "Mit dem Knallen der Peitsche und der Drohung, aus der Station geworfen zu werden, werden Faulenzer und Nichtsnutze zur Arbeit gezwungen. Denkt daran – kein Herumlungern!"

hanza_satellite_26_B: "Investitionsbehälter"
hanza_satellite_26_B_desc: "Schrott und Abfälle können hier abgegeben werden. Des einen Müll ist des anderen Schatz."

hanza_satellite_26_C: "Vermietete Werkplätze"
hanza_satellite_26_C_desc: "Schraubstock, Maßband und Feilen können für eine Stunde Ihnen gehören ... gegen eine entsprechende Gebühr."

hanza_satellite_26_D: "Zustrom von Arbeitskräften"
hanza_satellite_26_D_desc: "Wie so oft nutzen Menschen unsere Station nur als Zwischenstopp auf dem Weg in die Tiefen der Großen Metro, auf der Suche nach Arbeit oder einem besseren Leben. Aber warum nicht in [ROOT.Capital.GetName]? Möglichkeiten gibt es immer für jene, die danach suchen. Und außerdem – vielleicht wird ihr Passantrag abgelehnt oder ihre Transferpapiere verschwinden auf mysteriöse Weise?"

hanza_satellite_26_E: "Überholte Waffen"
hanza_satellite_26_E_desc: "Improvisierte Schusswaffen sind relativ leicht zu beschaffen, meist aus Teilen anderer Waffen zusammengebaut. Sie mögen schlicht und grob wirken, aber immerhin bekommt man, wofür man bezahlt."

hanza_satellite_26_F: "Viel Glück bei der Jagd, Stalker"
hanza_satellite_26_F_desc: "Manchmal schlagen umherziehende Stalker ihre Zelte vorübergehend an unserer Station auf und verkaufen die wenigen, aber wertvollen Dinge, die sie von der Oberfläche mitgebracht haben. Vielleicht bleiben sie sogar, wenn unser Angebot attraktiv genug ist."

hanza_satellite_27: "Wiederverwendeter Beton"
hanza_satellite_27_desc: "Unbeschädigte, luftdicht verschlossene Säcke mit Beton zu finden, ist nahezu unmöglich. Allerdings können wir Betonschutt aufbereiten und als Baumaterial wiederverwenden."

hanza_satellite_28: "Abbruchtrupps"
hanza_satellite_28_desc: "Da die meisten leicht zugänglichen Schrottquellen längst geplündert wurden, braucht es spezialisierte Teams, um Gebäude sicher zu demontieren und Maschinenteile aus Ruinen zu bergen."

hanza_satellite_29: "Elektronik-Recycling"
hanza_satellite_29_desc: "Für empfindliche Bauteile wie Leiterplatten braucht es geschickte Hände. Wir können nicht jeden Affen einen Prozessor oder gar einen Flux-Kondensator auseinanderreißen lassen – es sei denn, er möchte den Schaden von seinem Lohn bezahlen."

hanza_satellite_30: "Reparierter Holzvergaser"
hanza_satellite_30_desc: "Er ist sperrig, stinkt wie die Hölle und ruiniert deine Kleidung. Aber was ist dir lieber – klirrende Kälte oder ein bisschen Ruß?"

hanza_satellite_31: "Betonmischer"
hanza_satellite_31_desc: "Diese Maschinen sind außerordentlich selten und heiß begehrt. Sie sind unverzichtbar, wenn man stabile und langlebige Bauwerke errichten will."

hanza_satellite_32: "Schrottplätze"
hanza_satellite_32_desc: "Bergungstrupps und Gräber zerlegen rostende Waggons und verschlingen ganze Maschinen, nur um an deren metallische Eingeweide zu gelangen. Ach, wie sehr wir Kupferkabel lieben ..."

hanza_satellite_33: "Fest angestellte Spezialisten"
hanza_satellite_33_desc: "Hin und wieder findet sich noch ein ehemaliger Gelehrter, der in Armut lebt. Die meisten sind längst nach Polis gezogen. Mit etwas Überzeugungsarbeit lassen sie vielleicht ihre nihilistischen Monologe sein und setzen ihr verblassendes Wissen praktisch ein."

hanza_satellite_34: "Improvisierte Treibstoffe"
hanza_satellite_34_desc: "Der Großteil des Benzins hat sich längst in unbrauchbaren Lackschlamm verwandelt. Gelegentlich trifft man einen Händler mit ein paar Kanistern aus unbekannter Herkunft, doch meistens müssen die Menschen mit Handkurbel- oder alten Kohlegeneratoren auskommen."

hanza_satellite_34_A: "Wissen konzentrieren"
hanza_satellite_34_A_desc: "Bücher, technische Dokumente und praktische Handbücher sind unverzichtbar, um wenigstens einen Teil des Wissens der alten Welt zu bewahren. Eigentlich ein Wunder, dass sie nicht längst als Brennstoff verheizt wurden ... Gib einem Mann einen Fisch ..."

hanza_satellite_34_B: "Sägen und Bretter"
hanza_satellite_34_B_desc: "Holzbearbeitung gerät nicht so leicht in Vergessenheit. Und wirf das Sägemehl nicht weg – wie wäre es mit einer schönen Sägemehlsuppe?"

hanza_satellite_34_C: "Manuelle Bergung"
hanza_satellite_34_C_desc: "Elektrowerkzeuge sind nahezu unmöglich aufzutreiben, daher müssen die meisten mit dem arbeiten, was sie zur Hand haben. Ein gut ausgestatteter Werkzeugsatz zum Schneiden, Zerlegen und Aufbrechen von Schrott ist daher unerlässlich."

hanza_satellite_34_D: "Bügelsägen und Hämmer"
hanza_satellite_34_D: "Bügelsägen und Hämmer"
hanza_satellite_34_D_desc: "Mit dem richtigen Werkzeug lässt sich jede Arbeit erledigen."

hanza_satellite_34_E: "Werkzeugschmieden"
hanza_satellite_34_E_desc: "Schmiedeähnliche Werkstätten wurden eingerichtet, in denen Schrott eingeschmolzen und zu brauchbaren Bauteilen verarbeitet wird. Mag die Qualität auch bescheiden erscheinen – Eisen und Stahl lassen sich immer wieder neu schmieden."

hanza_satellite_34_F: "Lebensmittelkonservierung"
hanza_satellite_34_F_desc: "Einige abgelegene Stationen haben Methoden entwickelt, Lebensmittel über die langen Wintermonate haltbar zu machen. Räuchern, Einlegen und Fermentieren. Manche beherrschen sogar noch die Kunst des Einkochens. Doch Vorsicht vor aufgeblähten Konservendosen – irgendein gewiefter Händler versucht immer, einen ahnungslosen Trottel übers Ohr zu hauen."

hanza_satellite_34_G: "Geborgene Ambosse"
hanza_satellite_34_G_desc: "Schlage zu, solange das Eisen heiß ist!"

hanza_satellite_34_H: "Private Bibliothek"
hanza_satellite_34_H_desc: "Sicher ... es ist nur ein halb gefülltes Bücherregal voller zerfledderter Magazine und populärwissenschaftlicher Hefte. Aber du würdest nicht glauben, welchen Aufwand der Stationsverwalter betrieben hat, um all das zusammenzutragen. Für einen gebildeten Menschen ein Schatzhort. Für einen Idioten ein angenehm warmes Feuer."

hanza_satellite_35: "Aufstrebendes Handelszentrum"
hanza_satellite_35_desc: "Vielleicht mehr als wegen aller Waren strömen die Menschen auf unsere geschäftigen Märkte, weil hier Recht, Ordnung und Stabilität herrschen."

hanza_satellite_36: "Techniker aufnehmen"
hanza_satellite_36_desc: "Wo Wissen überlebt, dort bleibt auch die Fähigkeit erhalten, eine Gesellschaft zu bewaffnen. Zwar ist privater Waffenbesitz streng reglementiert und meist nur unabhängigen Karawanen oder Stationswachen gestattet, doch irgendwo findet sich immer ein technisch versierter Bastler, der aus rostigem Metall und Schrott eine funktionierende Schusswaffe herstellen kann."

hanza_satellite_37: "Integration in das Commonwealth"
hanza_satellite_37_desc: "Die Hanse strebt stets nach Wachstum, und selbst unsere bescheidene Station hat den neidischen Blick des Adlers auf sich gezogen. Für manche mag dies das größte Geschenk sein, für andere der schlimmste Albtraum. Die Hanse möchte unsere Station vollständig in das Commonwealth eingliedern. Damit erhalten wir einen festen Platz innerhalb der Liga. Die Vorteile sind zweifellos beträchtlich, doch unsere Eigenständigkeit wird dafür geopfert."

hanza_satellite_38: "Reservisten einziehen"
hanza_satellite_38_desc: "Wo Handel floriert, finden sich auch jene, die sich wie Parasiten daran bereichern wollen. Vielleicht gelingt es uns nicht immer, Banditen und Mutanten von den Karawanen fernzuhalten. Aber wir müssen zumindest dafür sorgen, dass sie nicht bis vor unsere Tore gelangen."

hanza_satellite_39: "Die großen Geschütze auffahren"
hanza_satellite_39_desc: "Denkt daran: Jedes Problem lässt sich mit einer Waffe lösen. Und wenn das Problem besonders groß ist ... dann braucht man eben mehr Waffe."

hanza_satellite_40: "Erste Hilfe zuerst"
hanza_satellite_40_desc: "Verletzen mag einfacher sein, aber Heilen ist weit lohnender."

hanza_satellite_41: "Hinterhof-Waffenschmiede"
hanza_satellite_41_desc: "Wenn wir den Technikern von Kusnezki Most nacheifern und unsere Waffen selbst aus Schrott herstellen, können wir ein Vermögen sparen. Vorausgesetzt natürlich, ein paar Fingerspitzen gehen dabei verloren."

hanza_satellite_42: "Gruppenunterstützungswaffen"
hanza_satellite_42_desc: "Leichte Maschinengewehre sind in engen Räumen erstaunlich tödlich. Wer hätte das nur gedacht?"

hanza_satellite_43: "Feldunterstützung"
hanza_satellite_43_desc: "Unsere Armee ist nur so effektiv wie ihre Ausrüstung und die Taktiken, die sie beherrscht."

hanza_satellite_44: "Schwere Bastardgewehre"
hanza_satellite_44_desc: "Trotz aller Nachteile dieses Alptraums eines Büchsenmachers ist es eine erstaunlich brauchbare Waffe. Ihre Vielseitigkeit und Anpassungsfähigkeit sollten nicht unterschätzt werden."

hanza_satellite_45: "Standardisierte Ausrüstung"
hanza_satellite_45_desc: "Sicher, wir werden nicht plötzlich Dutzende identische wattierte Mäntel und Helme aus einem Lager zaubern. Aber zumindest können wir gewährleisten, dass unsere Soldaten ein Paar Socken und Sohlen in ihren Stiefeln haben."

hanza_satellite_46: "Das Nötigste bereitstellen"
hanza_satellite_46_desc: "Tritt der Stationswache bei, haben sie gesagt. Du wirst die Tunnel sehen, haben sie gesagt. Ein warmes Essen und ein Bett erwarten dich, haben sie gesagt. Bekommen habe ich nur diese lächerliche Gürteltasche und ein Holster."

hanza_satellite_47: "Anreize für den Dienst"
hanza_satellite_47_desc: "Eine warme Mahlzeit, ein bequemes Bett ... was könnte sich ein Soldat noch wünschen? Ach ja, einen Lohn zum Leben. Wir betreiben hier schließlich keine Wohltätigkeitsorganisation."

hanza_satellite_48: "Erste Verteidigung des Rings"
hanza_satellite_48_desc: "Zwischen dem verwundbaren Herzen der Hanse und dem völligen Chaos der äußeren Linien steht nur unsere Station."

hanza_satellite_49: "Beschlagnahmte Werkstätten"
hanza_satellite_49_desc: "Um unsere stetig wachsenden Streitkräfte auszurüsten, müssen einige Werkstätten möglicherweise direkt in die Verwaltung eingegliedert werden, um die Nachfrage decken zu können."

hanza_satellite_50: "Der Ring aus Stahl"
hanza_satellite_50_desc: "Nahezu uneinnehmbar und für konventionelle Streitkräfte selbstmörderisch anzugreifen: Die Stationen der Kolzewaja-Linie sind mit Stacheldraht, Wachtürmen und professionellen Soldaten gesichert. Nichts gelangt hinein oder hinaus ohne das Wissen der Hanse."

hanza_satellite_51: "Unser Platz ist hier"
hanza_satellite_51_desc: "Für Sicherheit und Stabilität opfern wir einen Teil unserer Autonomie. Das muss nicht zwangsläufig schlecht sein. Solange die Hanse ihren Anteil erhält und wir verhindern, dass jeder dahergelaufene Taugenichts durch den Kontrollpunkt spaziert, lässt man uns weitgehend in Ruhe."

hanza_satellite_51_tooltip: "§YWähle mit Bedacht!§! Sobald ein Fokus abgeschlossen wurde, gibt es KEIN Zurück mehr."

hanza_satellite_51_A: "Für einen sicheren Ring"
hanza_satellite_51_A_desc: "Was auch immer geschieht – Sicherheit steht über allem."
hanza_satellite_51_A_tooltip: "Erlaubt es uns, bei der Hanse Waffenlieferungen anzufordern. Siehe Entscheidungen."

hanza_satellite_51_B: "Für einen stabilen Ring"
hanza_satellite_51_B_desc: "Stabilität. Um jeden Preis."
hanza_satellite_51_B_tooltip: "Erlaubt es uns, bei der Hanse Soldatenkontingente anzufordern. Siehe Entscheidungen."

hanza_satellite_51_C: "Für einen wohlhabenden Ring"
hanza_satellite_51_C_desc: "Wohlstand bedeutet mehr als Reichtum. Selbst unter Schutt und Staub der Oberfläche werden wir Wenigen unseren Weg finden."
hanza_satellite_51_C_tooltip: "Wir können die Hanse um eine großzügige Spende bitten, die jedoch später zurückgezahlt werden muss. Siehe Entscheidungen."

hanza_satellite_52: "Unsere Ausrichtung diskutieren"
hanza_satellite_52_desc: "Was hat die Hanse jemals für uns getan?"

hanza_satellite_break_free_flag: "Streben nach Eigenständigkeit"

hanza_satellite_52_A: "Hanseatischen Einfluss eindämmen"
hanza_satellite_52_A_desc: ""

hanza_satellite_52_B: "Unabhängigkeit festigen"
hanza_satellite_52_B_desc: ""

hanza_satellite_52_C: "Die Kette sprengen"