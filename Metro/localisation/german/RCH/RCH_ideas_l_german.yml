 RCH_reclusive_nazis:0 "Zurückgezogene Neonazis"
 RCH_reclusive_nazis_desc:0 "Verhasst und verachtet vom Rest der Metro, existiert das Reich verschanzt in seinen drei Stationen. Ihre Nachbarn behaupten sie nicht ernst zu nehmen und doch in Wahrheit bemannen sie vorsichtig ihre Grenzposten, wenn sie in den Tunneln den gleichmäßigen Rythmus der Stiefel des Reiches vernehmen."
 RCH_reclusive_state_tt:0 "£trigger_no kann Ruinen kolonisieren."

 RCH_reich_stirs:0 "Das Reich erwacht"
 RCH_reich_stirs_desc:0 "Es wird Zeit unseren rechtmäßigen Platz in der Metro einzunehmen."

 RCH_genetic_supremacy:0 "Genetische Überlegenheit"
 RCH_genetic_supremacy_desc:0 "Das Reich glaubt daran, das sie die letzten wahrhaftig §t'menschlichen'§! Menschen in der gesamten Metro sind, vielleicht sogar in der ganzen Welt. Die Bevölkerung des Reiches wird durch konstante Überwachung und Säuberung §t'reingehalten'§! und die Standards werden ständig angepasst. Jene mit Anomalien werden einfach ausradiert."

