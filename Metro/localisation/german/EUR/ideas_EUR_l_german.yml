 shrewd_diplomats:0 "Clevere Diplomaten"
 shrewd_diplomats_desc:0 "Der §YStationenbund§! verfügt über clevere Botschafter, die in der Lage sind, die Politische Landschaft der Metro zu ihren Gunsten zu gestalten und zu beeinflussen. Manchmal geht es dabei auch um die Beilegung von Streitigkeiten zwischen Stationen oder um Geheime Abkommen mit Außenstationen. Manchmal vergessen die Russen der umliegenden Stationen dann sogar, dass auch die Natoländer  WestEuropas am Dritten Weltkrieg teilgenommen haben."
 
