l_german:
 YAS_authoritarian_state:0 "Authoritärer Staat"
 YAS_authoritarian_state_desc:0 "Durch den Ausbruch am §YBittsevsky Park§! verwandelte sich die Gemeinschaft der §YYasenevskaya§! schnell in einen authoritären Staat. Auch wenn die Epidemie vorüber ist, so haben die Machthaber ihre weitreichenden Befugnisse dennoich nicht aufgegeben."

 YAS_organized_crime_issue:0 "Krieg gegen die Kriminalität"
 YAS_organized_crime_issue_desc:0 "Nördlich von uns liegen §YOrganisierte Banditen§!, bewaffnete Gauner die unsere Grenzen bedrohen.

 YAS_plague_legacy:0 "Erbe der Bittsevsky-Park-Epidemie"
 YAS_plague_legacy_desc:0 "Im Jahr 2021 brach an der §YNovoyasenevskaya§!-Station eine unbekannte Seuche aus. Von der Oberfläche durch unachtsame Stalker mitgebracht, verbreitete sich die mysteriöse Krankheit damals in der gesamten Gemeinschaft. Die Stationen §YNovoyasenevskaya§! und §YBittsevsky Park§! erklärten im Verlauf der Quarantäne zunächst ihre Unabhängigkeit, beide Gemeinschaften erlagen der Krankheit aber kurz darauf.\nSeit diesen Ereignissen vermeidet die Station allzugroßen Kontakt mit der Außenwelt."


 YAS_improved_defence:0 "Verbesserte Verteidigung"
