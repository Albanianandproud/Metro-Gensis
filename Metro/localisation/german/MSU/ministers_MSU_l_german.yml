l_german:
  MSU_rector:0 "Der Rektor"
  MSU_RECTOR_DESC:0 "Der Aufseher der Staatlichen universität zu Moskau, einbeschworen nach dem Vorfall am Vorobyovy Gory, viele Jahre zuvor. Der Rektor bleibt mysteriös und einsiedlerisch, doch trägt er nach wie vor die Verantwortung für die Universität und seine Studenten. Die von ihm angeordnete Isolation der Universität führte bisher zu einem dauerhaften Frieden."
  MSU_the_rector: "Vertrauenswürdiger Aufseher"