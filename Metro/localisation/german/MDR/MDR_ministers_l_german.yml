l_german:
  MDR_nikolay_seredin: "Nikolay Seredin"
  politics_MDR_seredin_desc: "Nikolay Seredin wurde irgendwann in den späten 70ern geboren und trat dann §YOMON§! bei; eine Sonderpolizeiabteilung der russischen Nationalgarde. Mit knapper Not entkam er dem nuklearen Armageddon und fand Zuflucht in der §YPervomayskaya§!. Zusammen mit seinem engen Freund §YSergei Balagurov§!, usurpierte er die Macht seines früheren Anführers und wurde Präsident der Republik.\n\nSeitdem erlebte die Pervomayskaya-Republik unter seiner wachsamen und distanzierten Herrschaft relativen Frieden und Stabilität. Er beschloß, die Gemeinde vom Rest der Metro fernzuhalten."
	MDR_acting_president: "President der Republik"
 
  MDR_igor_knyazev: "Igor Knyazev"
  MDR_igor_knyazev_desc: ""

  MDR_anton_knyazev: "Anton Knyazev"
  MDR_anton_knyazev_desc: ""
  MDR_neutral_anton_knyazev: "Bücherwurm"
  MDR_kidnapped: "Wurde entführt"

  MDR_sergei_balagurov: "Sergei Balagurov"
  MDR_sergei_balagurov_desc: "Sergei wurde irgendwann in den 1980er Jahren geboren und war vor dem Krieg ein ehemaliger Bereitschaftspolizist. Er war mit Nikolai Seredin befreundet und aus dieser Verbindung wurde er durch Zufall zum obersten Abgeordneten der Republik und damit zum zweitmächtigsten und angesehensten Mann."
  MDR_neutral_sergei_balagurov: "Stellvertretender Präsident"

  MDR_kalatozov: "Kalatozov"
  MDR_kalatozov_desc: "Kalatozov, ein ehemaliger Wissenschaftler, der zum Premierminister der Republik wurde, sorgt mit seinen Tätigkeiten dafür, dass die täglichen Aktivitäten der Republik reibungslos und fehlerfrei ablaufen."
  MDR_neutral_kalatozov: "Premierminister der Republik"

  MDR_vlad_baikaltsev: "Vlad Baikaltsev"
  MDR_vlad_baikaltsev_desc: "Sergeant Vladislav Baikaltsev ist ein Förster der Pervomayskaya-Republik und dient unter dem Kommando von Alexei Fedotov."
  MDR_forester_vlad_baikaltsev: "Soldat der Sondereinheit"

  MDR_alexei_fedotov: "Alexei Fedotov"
  MDR_alexei_fedotov_desc: "Alexei wurde zur Zeit der Sowjetunion in Moskau geboren, besuchte schon in seiner Jugend die Polizeiakademie und wurde so Polizist. Er flüchtete nach Pervomayskaya und wurde dank der Fähigkeiten, die er während seiner Zeit als Polizeibeamter und durch die Unterstützung der jungen Republik erlangte, bald zum Kommandeur der örtlichen Spetsnaz."
  MDR_forester_alexei_fedotov: "Kommandant der Sondereinheit"

  MDR_yitzhak_sidorsky: "Yitzhak Sidorsky"
  MDR_yitzhak_sidorsky_desc: "Wenn man das Dreifache des durchschnittlichen Arbeitslohns bekommt, weiß man, wie man den Mund hält. Yitzhak ist ein Mann Ende 50, der bei vielen täglichen Aktivitäten der Maulwürfe hilft. Wenn Sie hören, wie Sirenen heulen und nukleare Interkontinentalraketen Meter über Ihrem Kopf die Schallmauer durchbrechen, schließen Sie die Leiterluke und machen eine Mittagspause. Zentrales U-Bahn-Kommando, Mayday Republic, wie auch immer der Name lautet. Solange Rubel, Kugeln oder sogar Glasflaschenverschlüsse fließen, wird Sidorsky ohne Frage funktionieren."
  MDR_mole_berl_skaryna: "Maulwurf"

  MDR_berl_skaryna: "Berl Skaryna"
  MDR_berl_skaryna_desc: "Berl, ein krummer Mann Mitte Ende 40, ist einer unserer Chefingenieure; Die Aufgabe besteht darin, die unterirdischen Tunnelabschnitte davor zu bewahren, in sich selbst zusammenzubrechen. Er wurde in Russland geboren und war von Natur aus begabt in Naturwissenschaften und Mathematik.\nAnstatt eine gefeierte Karriere als Ingenieur an einer der vielen großen russischen Universitäten anzustreben, entschied sich Berl stattdessen für das Gegenteil und führte ein ruhiges Familienleben, sehr zum Entsetzen seiner Kollegen. Nach dem Krieg und nachdem die darauffolgenden nuklearen Winde das Leben, das er sich aufgebaut hatte, weggefegt hatten, nutzte er seine Energie, um die Reparaturbemühungen der [MDR.GetNameDef]-Station zu überwachen."
  MDR_mole_yitzhak_sidorsky: "Ehemaliger Ingenieur"














