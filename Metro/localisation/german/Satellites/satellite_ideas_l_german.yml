 satellite_domestics_focus_1:0 "Heimische Verbesserungen"
 satellite_domestics_focus_1_desc:0 "Wenn irgendwas, dann brauchen unsere Stationen dringend einen richtigen Besen. Wir können uns auf die hundegroßen Ratten konzentrieren, sobald die Menschen nicht über jedes Klumpen verrosteten Metalls und Schrotts entlang der Dachrinnen und Gehwege fallen"

 satellite_domestics_focus_2:0 "Heimischer Fokus"
 satellite_domestics_focus_2_desc:0 "Unsere Bevölkerung lebt im Elend und hungert von den kleinen Rationen. Wenn unsere politische Partei eine weitere Woche überleben und nicht zum Opfer des hungernden Mobs werden soll, sollten wir ihre Bedürfnisse in den Vordergrund stellen."

