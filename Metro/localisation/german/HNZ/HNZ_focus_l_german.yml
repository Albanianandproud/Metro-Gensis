HNZ_general_foreign_mercenary: "Ausländischer Söldner"
HNZ_general_foreign_mercenary_desc: "Wir könnten Rutger De Vries in den Militärrat berufen. Ein ausländischer Söldner, der bereits an zahlreichen Konflikten rund um den Globus teilgenommen hat. Er kennt den Krieg nur allzu gut."

HNZ_general_russian_badass: "Russischer Draufgänger"
HNZ_general_russian_badass_desc: "Wir könnten Viktorowitsch Botschkarew in den Militärrat berufen. Eine wahrhaft russische Legende. Seine beeindruckenden Taten und zweifelhaft ausgeschmückten Heldengeschichten bringen selbst den lautesten Trunkenbold zum Schweigen. Sein Ansehen ist unbestritten – die Verkörperung dessen, was sich jeder Soldat erträumt: mutig, furchtlos und süchtig nach dem Adrenalin des Gefechts."

HNZ_general_grizzled_veteran: "Kriegsveteran"
HNZ_general_grizzled_veteran_desc: "Wir könnten Sergei Jasnow in den Militärrat berufen. Ein Mann Ende fünfzig, der bereits lange vor dem Krieg zwischen Hansa und Roter Linie zahlreiche Konflikte erlebt hat. Die Grausamkeiten dieses Krieges zwangen ihn zum Rückzug aus dem aktiven Dienst. Nun möchte er in die Reihen zurückkehren."

