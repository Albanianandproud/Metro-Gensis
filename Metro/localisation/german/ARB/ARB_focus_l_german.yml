l_german:

### First steps ###

  ARB_economic_revitalisation: "Wirtschaftsanpassungen"
  ARB_economic_revitalisation_desc: "Die Arbat-Konföderation: Das schablonierte 'A' war einst ein stolzes Vermächtnis für diejenigen, die unter ihm dienten. Jetzt weckt es nur noch selten Eifer, jegliche Ideale der Vergangenheit scheinen vergessen."

  ARB_economic_revitalisation_2: "Mobilisiert unsere Arbeiter"
  ARB_economic_revitalisation_2_desc: "Wie kann es gleichzeitig so viel zu tun geben und so viele Arbeitslose? Lassen wir sie etwas Sinnvolles machen"

  ARB_economic_revitalisation_3: "Inventur"
  ARB_economic_revitalisation_3_desc: "Was genau besitzen wir? Solange wir das nicht wissen, können wir auch nicht unser volles Potentzial erreichen"
  ARB_recruited_arman: "Hat Arman rekrutiert"

  ARB_economic_revitalisation_4: "Arbeitsplattformen"
  ARB_economic_revitalisation_4_desc: "In der Metro kann man tatsächlich bis an die Decke bauen, man muss es nur wagen"

  ARB_economic_revitalisation_contact_hanza: "beziehungen mit der Hanse"
  ARB_economic_revitalisation_contact_hanza_desc: "Unser ältester Verbündeter, es wird Zeit die alte Freundschaft wiederzubeleben"

  ARB_economic_revitalisation_choice_1: "Geheimnisse eines Händlers"
  ARB_economic_revitalisation_choice_1_desc: "Sie erschaffen die Realität neu, schreiben ganze Kapitel um und die Leute verschlingen sie. Sie verbreiten ihre Waren so weit, wie sie ihre Handelsdraisinen nur befördern können. Wohlstand und Reichtum sind weitaus tödlichere Werkzeuge als eine Waffe, die Hanse weiß das und wir wussten es auch einmal. Frühere Kriege wurden mit Schießpulver und Stahl geführt, aber die Kriege von morgen werden ganz anders geführt. Zumal Geld hier unten ja auch Kugeln sind..."

  ARB_economic_revitalisation_choice_2: "Ehrlich und Integer"
  ARB_economic_revitalisation_choice_2_desc: "Auf lange Sicht sind die ehrlichen Händler die erfolgreichsten, und nicht die Trickbetrüger."

### Darkness has penetrated ###

  ARB_the_cover_up: "Die Vertuschung"
  ARB_the_cover_up_desc: "Die Toten erheben sich aus dem Park Pobedy? Unsinn! Lassen Sie die Bürger wissen, dass dies bloße Lügen sind die von Kindern oder, schlimmer noch, von Kommunisten erfunden wurden. Diese Gerüchte dürfen nicht außerhalb einiger wichtiger Mitglieder unserer Verwaltung verbreitet werden! Beenden Sie diese wilden spekulativen Gedanken, bevor sie die Chance haben, sich über unsere Stationen auszubreiten. Das ist eindeutig das Werk von Saboteuren, die unsere Autorität untergraben wollen."

  ARB_sedate_the_public: "Ein ruhiger Geist, eine ruhige Bevölkerung"
  ARB_sedate_the_public_desc: "Die Bevölkerung ist ersteinmal beruhigt, entweder weil etwas unternommen wird, oder weil dies gar nicht nötig ist"

  ARB_mandatory_draft: "Längere Rotationen"
  ARB_mandatory_draft_desc: "Unsere Soldaten müssen nicht so schnell wieder nach hause zurück, und dort müssen sie auch nicht so lange bleiben. Wichtiger ist es nun, erstmal wachsam zu bleiben und weitere Soldaten auszubilden"

  ARB_forfeit_arms: "Kooperation mit den Waffenschmieden"
  ARB_forfeit_arms_desc: "Unsere Waffenschmiede sind debattierbarerweise der wichtigste Teil unserer Nation, binden wir sie stärker an uns"

  ARB_crackdowns: "Defensiver Fokus"
  ARB_crackdowns_desc: "Arbat darf nicht weiter schrumpfen, den Boden den wir jetzt halten, werden wir für immer halten!"

  ARB_mitigate_travel: "Gefahren am Horizont"
  ARB_mitigate_travel_desc: "Jeder in Arbat spürt es, ein Gefühl des Unbehagens und der Bedrohung. Wir sollten von nun an besser kontrollieren wer bei uns ein und aus geht, nur zur Sicherheit"

  ARB_military_curfew: "Militärische Ausgangssperren"
  ARB_military_curfew_desc: "Die gerüchte sind wahr, Menschen verschwinden auf unerklärliche Art an der Kievskaya, doch nun schreitet unser Militär zur tat. Als erstes wird eine Ausgangssperre verhängt, niemand betritt oder verlässt die Station ohne unser wissen. Das Militär hat hier nun das sagen, solange bis wir der Sache auf den Grund gegangen sind."
  ARB_spawn_curfew_div: "1 Infanterie-Trupp wird in der Hauptstation ausgehoben\n"

  ARB_twenty_four_seven_lighting: "24-7-Beleuchtung"
  ARB_twenty_four_seven_lighting_desc: "Wir sind überzeugt davon, dass diese 'Entführungen' nur im Schutze der Dunkelheit stattfinden können, darum wird die Kievskaya absofort rund um die Uhr beleuchtet"

  ARB_curtail_activities: "Eingeschränkte Aktivitäten"
  ARB_curtail_activities_desc: "Wenn wir diese Entführungen stoppen wollen, darf es vorerst keine unnötigen Ausflüge aus den eigenen vier Wänden geben."

  ARB_manned_posts: "Verstärkte Wachposten"
  ARB_manned_posts_desc: "Wir werden jeglichen Angreifer aufspüren und aufhalten, in unsere Stationen dringt niemand unbemerkt ein"

  ARB_keep_watch_keep_guard: "Bleibt mutig, bleibt wachsam"
  ARB_keep_watch_keep_guard_desc: "Wir gehen jeden Hinweis seitens der Bevölkerung nach, wir nutzen jeden verfügbaren Mann"

  ARB_oh_its_on: "Stahl gegen Knochen"
  ARB_oh_its_on_desc: "Die Hinweise verdichten sich, am Park Pobedy lebt noch jemand. Wir wissen nicht was an den Gerüchten um Kannibalen und Mutanten dran ist, doch wir gehen der Sache nun nach."
  ARB_war_with_GWC_decisions: "\nErlaubt Kriegsentscheidungen zum Umgang mit dem großen Wurm-Kult!\n"

  ARB_do_or_die: "Die dunkle Bedrohung"
  ARB_do_or_die_desc: "Wir brauchen echte Helden, wenn wir das überleben wollen"

  ARB_cleanse_park_pobedy: "Säubert den Park Pobedy"
  ARB_cleanse_park_pobedy_desc: "Nun da die Station in unserer Hand liegt, ist es an uns dem Schrecken hier ein Ende zu bereiten. Tötet sie, tötet sie alle und schafft neue Kolonisten heran, der Park des Sieges verdient ein neues Zeitalter"

### Domestic policy ###

  ARB_stalker_civilian_prioritisation: "Ziviler Wiederaufbau"
  ARB_stalker_civilian_prioritisation_desc: "Eine Starke Nation braucht eine starke Wirtschaft, das war schon immer so und das wird auch immer so bleiben"

 ## Kill the Mutants ##
  ARB_that_pygmy_thing_in_smolensk: "Die Monster an der Smolenskaya"
  ARB_that_pygmy_thing_in_smolensk_desc: "Mutanten laufen in Smolenskaya Amok und selbst die Ranger konnten sie nicht erledigen. Geben Sie mir 15 gute Männer, mehrere Kisten mit Patronen, und diese Freaks werden am Ende der Woche auf einem Haufen brennen."
  
  ARB_that_pygmy_thing_in_smolensk_2: "Unser Stück Heimat"
  ARB_that_pygmy_thing_in_smolensk_2_desc: "Nun da diese Mutanten bewzungen wurden, können wir die Smolenskaya wieder bevölkern."
 
 ## Economy and Stalkers ##
  ARB_resurfacing_old_rooms: "Überdenkt die Raumaufteilung"
  ARB_resurfacing_old_rooms_desc: "Die Platzgestaltung an unseren Stationen ist auch ehern willkürlich und widersinnig gestaltet worden, Zeit mal intensiv damit aufzuräumen"

  ARB_kicking_in_the_generator: "Werft den alten Generator wieder an"
  ARB_kicking_in_the_generator_desc: "Wir haben hier noch irgendwo einen alten Generator rumstehen, um den sich aber seit Ewigkeiten keiner kümmern will. Zwingt die Techniker endlich mal dazu, sich das Teil anzusehen."

  ARB_kicking_in_the_generator_2: "Diesel-Strom"
  ARB_kicking_in_the_generator_2_desc: "Wir haben hier an unserer Station noch so einen alten Chemiker, der müsste doch wissen wie wir unseren Treibstoff noch effektiver machen können"

  ARB_scrapping_it_all: "Verschrottet den Müll"
  ARB_scrapping_it_all_desc: "So viel Müll liegt hier noch rum, Trümmer und andere Hinterlassenschafften. Schafft diesen Mist weg und seht, was ihr davon noch verwenden könnt"

  ARB_weapons_to_ploughs: "Waffen zu Pflugscharen"
  ARB_weapons_to_ploughs_desc: "Waffen sind toll und gut, doch gegen den Feind des Hungers richten sie trotzdem nichts aus. Unseren Soldaten gefällt dies vielleicht nicht, aber Nahrung ist ersteinmal wichtiger als ihr Stolz."

  ARB_keep_surface_wares: "Behaltet die Stalker-Beute"
  ARB_keep_surface_wares_desc: "Der Verkauf bringt uns einmalig etwas Geld, wenn wir sie richtig nutzen haben wir für immer etwas davon"

  ARB_improve_the_hearth: "Verbessert das Zentrum"
  ARB_improve_the_hearth_desc: "Unsere Konföderation besteht nur noch aus 3 Stationen, ein balsser Schimmer dessen, was wir einst waren. Doch dieses Zentrum wird zu einem neuen Herzen der Metro heranwachsen"

  ARB_use: "Stärkt die Gemeinschaft"
  ARB_use_desc: "unsere Gemeinschaft trägt ein ungeheures Potenzial in sich, auch wenn sie das noch nicht völlig begreift. Beginnen wir mit einer Initiative, in welcher jeder dazu aufgerufen wird, sich über den technischen Fortschritt an ihrer Arbeit Gedanken zu machen"

  ARB_use_2: "Wirtschaftlicher Neuanfang"
  ARB_use_2_desc: "Wir waren mal eine beeindruckende Wirtschaftsmacht in der Metro und die werden wir nun auch wieder sein"

  ARB_construction_refurbishments: "Bauerneuerungen"
  ARB_construction_refurbishments_desc: "Unsere Stationen wirken alt und heruntergekommen, und damit mein ich nicht nur die rissigen Wände. Es braucht eine umfassende Neubauinitiative"

  ARB_reclamation: "Wiederverwertung"
  ARB_reclamation_desc: "Das Überleben in der Metro ist ohne Recycling nicht möglich. Diese wichtige Lektion haben wir in der Vergangenheit zu sehr vernachlässigt"

  ARB_rail_vehicles: "Allzweckdraisinen"
  ARB_rail_vehicles_desc: "Wir brauchen Draisinen für den Krieg, den Waren- und den Personentransport. Möglichst billig und am besten schon gestern"

  ARB_reclamation_plots: "Labor zur Pilzzucht"
  ARB_reclamation_plots_desc: "Pilz ist nicht gleich Pilz, durch selektive Züchtung können wir das Meiste aus unserer Landwirtschaft herausholen"

  ARB_fed_populace: "Freie Landwirtschaft"
  ARB_fed_populace_desc: "Die Lehren des Kapitalismus kehren an die Smolenskaya zurück, doch keine Sorge, mit dem neu erwirtschafteten Wohlstand garantieren wir, das hier niemand verhungern wird"

  ARB_armories_of_the_west: "Waffenproduktion"
  ARB_armories_of_the_west_desc: "Noch immer herrscht in der Metro das Faustrecht, eine Nation ist nur so stark wie ihr Heer. Bewaffnen wir unseres"

  ARB_dedicated_stalkers: "Entschlossene Stalker-Einheiten"
  ARB_dedicated_stalkers_desc: "Wir sind mit überragend guten Stalker-Einheiten gesegnet, wir sollten nicht zögern sie auch zu nutzen"

  ARB_sell_surface_wares: "Verkauft Stalker-Beute"
  ARB_sell_surface_wares_desc: "Wir haben so viel von diesem Zeug, das uns nichts nützt, wofür andere jedoch ein Vermögen zahlen. Verkauft die Beute an den Höchstbietenden"

  ARB_peddle_wares: "Verkauft unsere Waren"
  ARB_peddle_wares_desc: "Wir sind eine Handelskonföderation, erinnern wir die Metro daran"

  ARB_peddle_wares2: "Schrottwaffen-Ausstattung"
  ARB_peddle_wares2_desc: "Wir brauchen Waffen, und wir werden sie aus allem fertigen, das wir in die Finger kriegen"

  ARB_peddle_wares3: "Verbesserte Läufe"
  ARB_peddle_wares3_desc: "Der Lauf einer Waffe ist mit sein wichtigster Teil, die meisten Waffenbauer unterschätzen seine Bedeutung. Wir jedoch nicht"

  ARB_peddle_wares4: "Waffenwerkzeuge"
  ARB_peddle_wares4_desc: "Eine Waffe zu haben reicht nicht, man muss sie auch Pflegen können, sonst kann man am Ende die Kugeln auch einfach spucken"

  ARB_bazaar_of_the_west: "Der Markt des Westens"
  ARB_bazaar_of_the_west_desc: "Genau auf der anderen Seite des Hanse-Ringes liegt der Prospekt Mira, der wohlmöglich größte Markt in der Metro. Wir sollten uns als Markt des Südwestens profilieren"

  ARB_scrounging_the_good_stuff: "Sucht nach dem guten Zeug"
  ARB_scrounging_the_good_stuff_desc: "Das Viertel über uns war früher einmal das Wohlhabenste in ganz Moskau. Dort muss es doch noch was Wertvolles geben!"

  ARB_scrounging_the_good_stuff3: "Metallarbeiten"
  ARB_scrounging_the_good_stuff3_desc: "Metall ist das A und O in der Metro, aus ihm wird fast alles gefertigt. Wer am meisten davon schnell und effizient verarbeiten kann, der wird reich"

  ARB_scrounging_option_1: "Priorisiert Waffenläden"
  ARB_scrounging_option_1_desc: "Tatsächlich gab es früher schon Waffenhändler in der Stadt, meist jedoch im geheimen und verborgenen. Wir können nach ihren Läden Ausschau halten"

  ARB_scrounging_option_2: "Priorisiert Militärlager"
  ARB_scrounging_option_2_desc: "Das Militär hatte überall Lager in der Stadt versteckt, man muss sie nur finden"

  ARB_scrounging_option_3: "Jeden Stein zweimal umdrehen"
  ARB_scrounging_option_3_desc: "Unseren Stalkern entgeht nichts, wenn es da oben etwas Wertvolles gibt, dann finden sie es"

  ARB_scrounging_option_4: "Durchsucht die Fabriken"
  ARB_scrounging_option_4_desc: "Einige Fabriken liegen ganz in unserer Nähe, dort finden wir sicherlich etwas Nützliches"

  ARB_scrounging_option_5: "Durchsucht die Labore"
  ARB_scrounging_option_5_desc: "Vorkriegslabore haben im vergleich zu unseren bescheidenen Stuben von heute nahezu unbegrenzte Mittel zu verfügung gehabt. Vielleicht sind einige dieser Mittel dort noch zu finden"


### Foreign Policy ###

  ARB_political: "Politische Vorgänge"
  ARB_political_desc: "Nicht nur unsere Wirtschaft und unser Militär braucht eine Wiederbelebung, unsere Politik braucht ebenfalls dringend neue Ansätze"

 ## Cooperation with Hanza ##
  ARB_hanza_alignment: "Hanse-Anbindung"
  ARB_hanza_alignment_desc: "Die Hanse ist unser ältester Freund und Verbündeter, stellen wir diese alte Freundschaft wieder her"

  ARB_liason_surveyor: "Abstandsmesser"
  ARB_liason_surveyor_desc: "Eine clevere Sache die die Hanse da entwickelt hat, ein kleiner Laser, der dir auf den Zentimeter genau sagt, wie weit dein Ziel noch entfernt ist"

  ARB_worthwhile_allies: "Nützliche Allianz"
  ARB_worthwhile_allies_desc: "Es ist ein paar Wochen her seitdem wir unsere Beziehungen zur Hanse erneuert haben, doch schon ernten wir die ersten Früchte"

  ARB_hiring_economic_expertise: "Heuert Wirtschaftsexperten an"
  ARB_hiring_economic_expertise_desc: "Die Hanse ist das kapitalistische Zentrum der Metro, hier gibt es noch echte Vorkriegs-Ökonomen, die wirtschaftliche Zusammenhänge erläutern und vorhersehen können. Wir sollten und eninge von ihnen für eine Zeit ausleihen"

  ARB_hiring_technical_expertise: "Heuert Techniker an"
  ARB_hiring_technical_expertise_desc: "Die Hanse beschäftigt auch Unmengen an Technikern, von denen wir sicherlich einige abwerben könnten"

  ARB_heavy_soldiers: "Schweres Gerät"
  ARB_heavy_soldiers_desc: "Ein Sonderangebot der Hanse, auf das wir dringend eingehen sollten"

  ARB_heavy_soldiers_2: "Setzt auf schwere Stalker"
  ARB_heavy_soldiers_2_desc: "Das Equipment das wir vor kurzem eingekauft haben ist wirklich interessant, wir sollten unsere eigenen Kopien davon erstellen"

  ARB_worthwhile_allies_2: "Militärische Berater"
  ARB_worthwhile_allies_2_desc: "Die Hanse leidet tatsächlich darunter zu viele Militärberater mit unterschiedlichen Ansichten zu haben. Sie wären froh wenn sie einige an uns einfach abgeben könnten."

  ARB_worthwhile_allies_4: "Militär-Reformen"
  ARB_worthwhile_allies_4_desc: "Wir haben im Ersten Metrorkeig fast nichts lernen können, da unsere Verluste einfach zu hoch warebn. Die eigentliche Hauptarbeit hat die Hanse geleistet und sie wäre bereit uns an ihrem Wissen teilhaben zu lassen"

  ARB_worthwhile_allies_3: "Hanse-Komitee"
  ARB_worthwhile_allies_3_desc: "Wir wurden eingeladen gemeinsam unsere gebündelten Kräfte zu organisieren, ein großer Tag für uns"

  ARB_worthwhile_allies_5: "Eisernes Bollwerk"
  ARB_worthwhile_allies_5_desc: "Unsere Stalker haben Schlimmeres überlebt als die Rote Armee, sie werden unser undurchdringliches Bollwerk gegen den Bolschewismus"

  ARB_worthwhile_allies_6: "Ein neuer Metrokrieg"
  ARB_worthwhile_allies_6_desc: "Es ist soweit, der Krieg ist da. Zeigen wir, was wir gelernt haben"

  ARB_worthwhile_allies_final: "Gleichberechtigtes Mitglied der Liga"
  ARB_worthwhile_allies_final_desc: "Wir sind nun ein Teil der Hanse-Handelsliga, eine große Ehre für uns. Doch auch eine Ehre für unsere Verbündeten, denn unsere Stalker sind die Besten des gesamten Bundes. Wir sind nun voneinander abhängig, was uns gleichberechtigt macht"

 ## Revanchism ##
  ARB_revaunchism: "Revanchismus"
  ARB_revaunchism_desc: "Die Verluste des ersten Metrokrieges haben wir nicht vergessen. Wer unser Feind ist haben wir nicht vergessen. Was unser ist haben wir nicht vergessen"

  ARB_bargain_state_1: "Kauft die Kurskaya"
  ARB_bargain_state_1_desc: "Ein ungewöhnliches Angebot, doch durch unsere Verbindung einmal quer durch die Metro für uns eine sinnvolle Option"

  ARB_bargain_state_2: "Kurskaya gesichert"
  ARB_bargain_state_2_desc: "Die Kurskaya ist unser, damit haben wir nun eine Ost-West Verbindung durch die gesamte innere Metro"

  ARB_bargain_state_3: "Fordert die Unterwerfung der Baumansky Allianz"
  ARB_bargain_state_3_desc: "Früher waren wir enge 'Verbündete' und führten gemeinsam Krieg. Können wir denn nicht wieder zueinander finden?"

  ARB_war_against_hanza: "Krieg gegen die Hanse"
  ARB_war_against_hanza_desc: "Ein Messer, direkt in den Rücken und wir werden der Herr des Ringes sein!"

  ARB_war_against_polis: "Krieg gegen die Polis"
  ARB_war_against_polis_desc: "Unterstützte uns die Polis im ersten Metrokrieg? Nein, aber nachdem alles vorbei war und wir die Leninbibliothek erhielten, nahmen sie sie uns wieder ab, unter dem Vorwand, dass wir die Station unmöglich halten könnten. Reine Erpressung war das damals, doch nun holen wir uns zurück, wofür so viele unserer Brüder ihr Blut gegeben haben"

  ARB_expand_east: "Expansion nach Osten"
  ARB_expand_east_desc: "Der Platz der Revolution, wir geben nichts auf den Roten Symbolismus, aber die Station war eins unser, und sie wird nun auch wieder unser sein. Es wird Zeit, den roten Dreck entgültig zu beseitigen"

  ARB_bargain_reds: "Verhandlungen mit den Roten"
  ARB_bargain_reds_desc: "Wir glauben nicht dass das was bringen wird, doch vielleicht haben wir ja glück. Vielleicht wäre die Rote Linie daran interessiert, die Bibliothek wieder gegen den Platz der Revolution zurück zu tauschen"

  ARB_revival_of_an_empire: "Wiedergeburt einer Großmacht"
  ARB_revival_of_an_empire_desc: "Wir waren mal ein Großreich in der Metro, fast so mächtig wie die Hanse oder die Rote Linie. Und dies werden wir auch wieder werden, oder wir gehen bei dem Versuch zugrunde"

  ARB_expand_west: "Expedition nach Westen"
  ARB_expand_west_desc: "Im Westen liegt, passenderweise, Europa, der Stationenbund aus Menschen größtenteils europäischer Abstammung. Eine isolierte Nation ohne Freunde oder Verbündete, ein leichtes Ziel"

 ## Caucasian path ###
  ARB_revive_caucasian_movement: "Die kaukasische Bewegung"
  ARB_revive_caucasian_movement_desc: "Viele in Arbat sind von kaukasischer Abstammung und wissen, dass sie wohl sonst in der Metro nirgends willkommen wären. Wir sollten uns endgültig zu einer Nation der ethnischen Minderheiten Moskaus erklären"

  ARB_reverence_to_old_world: "Verehrung der alten Welt"
  ARB_reverence_to_old_world_desc: "Der Glanz der alten Welt, der alten Heimat, ihn wollen wir wiederbeleben, hier in der Metro. Hier ist unser Zuhause und hier sollen wir uns auch wie zuhause fühlen"

  ARB_house_refugees: "Nehmt Flüchtlinge auf"
  ARB_house_refugees_desc: "In der gesamten Metro gibt es Minderheiten, die wegen ihrer Nichtrussischen Herkunft unterdrückt werden. Ruft sie zu uns und lasst niemanden zurück!"

  ARB_a_new_age_people: "Das Volk einer neuen Ära"
  ARB_a_new_age_people_desc: "Unser Volk wird nicht durch Abstammung oder herkunft definiert, sondern durch gemeinsame Ideale. Arbat steht offen für jeden, der diese Ideale teilt"

  ARB_a_construction: "´Wiederaufbau"
  ARB_a_construction_desc: "Ein neuer Staat wird entstehen, eine neue Nation, beseelt von einem neuen Geist"

  ARB_ethnonationalism: "Ethnonationalism"
  ARB_ethnonationalism_desc: "Wir sind eine Nation von Kaukasen, daran kann nun keiner mehr was ändern, ein Staat von Kaukasen für Kaukasen. Und unser Volk wird zusammenhalten"

  ARB_promote_an_identity: "Eine gemeinsame Identität"
  ARB_promote_an_identity_desc: "Wir sind verwundbar, nur wenige Angehörige unseres Volkes sind noch am Leben. Unsere Identität, unsere Kultur muss um jeden Preis beschützt werden"

  ARB_faction_with_europa: "Ein Bündniss mit Europa"
  ARB_faction_with_europa_desc: "Wir und Europa sind in einer ähnlichesn Situation, zwei Gruppen von Nicht-Russen inmitten der Moskauer Metro. Es ist nur logisch, dass wir beide uns verbünden"

  ARB_up_and_coming: "Eine neue alte Großmacht"
  ARB_up_and_coming_desc: "Großmacht wird man nicht von heute auf morgen, doch man sollte besser schon heute anfangen, eine seien zu wollen"

 ## Free Stalkers ##
  ARB_our_slice_of_home: "Unser Stück Heimat"
  ARB_our_slice_of_home_desc: "Arbat ist unsere Heimat, und wir haben vor, auch hier zu bleiben"

  ARB_free_stalker_authority: "Gemeinschaft freier Stalker"
  ARB_free_stalker_authority_desc: "Konzentrieren wir uns auf das, was wir wirklich gut können. Arbat wird ein Paradies für Stalker werden!"

  ARB_stalker_council: "Gründet einen Stalker-Rat"
  ARB_stalker_council_desc: "Die Stalker haben jetzt hier das Sagen und regieren gleichberechtigt über die Nation. Verkündet dies in der ganzen Metro, und die Besten der Besten werden zu uns strömen"
  ARB_recruit_mercenaries_tt: "\n§GErlaubt§! einmalige §GEntscheidungen§! um Soldaten aus der ganzen Metro zu rekrutieren.\n\n"

  ARB_come_near_come_far: "Von Nah, von Fern"
  ARB_come_near_come_far_desc: "Sie wurden gerufen und sie kamen, Stalker aus der ganzen MEtro lassen sich nun bei uns neider"

  ARB_stalker_free_zone: "Eine Nation freier Stalker"
  ARB_stalker_free_zone_desc: "Nun da das wichtigste Problem beseitigt ist, können wir uns ganz dem Erkunden der Oberfläche widmen"
  ARB_free_stalker_authority_formable_tt: "£trigger_yes Erlaubt Gründung: §CFreie Stalker-Gemeinschaft§!"

  ARB_neutral_grounds_2: "Neutraler Boden"
  ARB_neutral_grounds_2_desc: "Stalker interessieren sich in der Regel nicht groß für Politik, weshalb wir nun eine Politik der Neuralität an den Tag gelegt haben. Doch auch die Neutralität muss verteidigt werden"
  expert_scavengers_tt: "\nStalker-Expeditionen sind nun kostenlos!"

  ARB_neutral_grounds_3: "Waffenverwertung"
  ARB_neutral_grounds_3_desc: "Selbst alte und kaputte Waffen kann man in der Regel noch gebrauchen. Stalker sind erfinderisch"

  ARB_ce: "Erweitertes Suchgebiet"
  ARB_ce_desc: "Nun mit so vielen neuen Stalkern können wir unseren Suchradius an der Oberfläche deutlich erweitern"

  ARB_accommodate_new_folks: "Beherbergt die neuen Mitbürger"
  ARB_accommodate_new_folks_desc: "Die Stalker kamen, und sie brachten auch ihre Familien mit. Nun müssen wir auch ihren Ansprüchen gerecht werden und sie alle behausen"

  ARB_sb1: "Eine Basis an der Studencheskaya"
  ARB_sb1_desc: "Mit so vielen neuen Mitbürgern lohnt es sich nach Osten zu expandieren, wo es noch viel ungenutzten Raum gibt"

  ARB_sb2: "Eine weitere Basis an der Kutuzovskaya"
  ARB_sb2_desc: "Noch hat uns niemand aufgehalten, also nehmen wir uns diese Station einfach"

  ARB_sb3: "Expansion an den Filovsky Park"
  ARB_sb3_desc: "Legt die Stationen hier frei, das ist viel bisher ungenutztes Land"

  ARB_sb4: "Unsere Basis an der Kuntsevskaya"
  ARB_sb4_desc: "Eine weitere bisher ungenutzte Station, die nun uns gehören wird"

  ARB_depot: "Depot Fili"
  ARB_depot_desc: "Das Depot Fili wurde vermutlich noch nie geplündert und wir fragen uns was wir wohl dort finden werden..."

 ## Cooperation with the Order and Polis ##
  ARB_polis: "Verbündet mit der Polis"
  ARB_polis_desc: "In Wahrheit ist die Polis doch unser stärkster Verbündeter, nicht direkt im militärischen Sinne, doch sie gilt als letzte Bastion der Menschlichkeit und des Fortschrittes. Ihnen die Leninbibliothek zu überlassen war uns eine Ehre, doch nun wird es an der Zeit unser Bündniss offiziell zu machen"

  ARB_tech_sharing: "Gemeinsame Forschung"
  ARB_tech_sharing_desc: "Nun da wir die Polis zu unseren Verbündeten zählen können, wird es Zeit die Früchte eines solchen Bündnisses zu ernten"

  ARB_assist_the_rangers: "Unterstützt die Ranger"
  ARB_assist_the_rangers_desc: "Was die Polis zu einer wahrlich gefürchteten Macht in der Metro macht ist nichteinmal ihr eigenes Militär, sondern das ihrer Verbündeten. Der Spartanerorden stellt die beeindruckenste Armee von Spezialeinheiten in der Metro dar und nun sind sie auch unsere Verbündeten. Stärken wir sie noch weiter, indem wir unsere Stalker-Fähigkeiten mit ihnen teilen. Sicherlich werden sie sich dafür revanchieren"

  ARB_ranger_polis_collaboration: "Verteidigung der Polis"
  ARB_ranger_polis_collaboration_desc: "Die Polis ist die wohlmöglich letzte Stadt auf Erden, der letzte ziviliserte Ort auf der Welt, von dem wir wissen. Sie ist wichtiger als alles andere, solange sie existiert haben wir eine Keimzelle für einen Neubeginn der Menschheit. Sie darf nicht fallen, unter keinen Umständen und dieser heiligen Aufgabe werden wir uns verpflichten"

  ARB_intergrate_industries: "Technische Zusammenarbeit"
  ARB_intergrate_industries_desc: "Ihr glaubt gar nicht was Polis und Orden bereits alles ausgetüftelt haben"

  ARB_assistance_against_GWC: "Unterstützung gegen die Barbarei"
  ARB_assistance_against_GWC_desc: "Die Polis wird uns sicherlich unterstützen, sollten wir uns im Krieg befinden"

  ARB_technical_application: "Technische Anwendungen"
  ARB_technical_application_desc: "Die Polis ist bereit uns einen ihrer klügsten Köpfe zu stellen, sollten wir Interesse haben"

  ARB_ranger_initialisation: "Ordens-Beitritt"
  ARB_ranger_initialisation_desc: "Es wird Zeit nun unserer wahren Bestimmung zu folgen, unter Führung des Spartanerordens werden auch wir zu einem Bollwerk der Menschheit heranreifen."
  ARB_path_of_ranger: "\nDieser Pfad führt uns dazu, ein §Gvollwertiges§! integriertes Mitglied des Ordens zu werden. Dies wird uns auch ermöglichen/zwingen, exclusive §CRanger-Gesetze§! anzunehmen.\n\n"

  ARB_ranger_spec_ops: "Spartanerausrüstung"
  ARB_ranger_spec_ops_desc: "Der Orden ehrt uns, er erlaubt uns die gleiche Ausrüstung zu tragen wie er selbst"

  ARB_bastion_of_humanity: "Bastion der Menschheit"
  ARB_bastion_of_humanity_desc: "Wir müssen besser sein, besser werden, wenn wir die Menschen beschützen wollen"

  ARB_equal_amongst_peers: "Gleicher unter Gleichen"
  ARB_equal_amongst_peers_desc: "Mehr und mehr, Stück um Stück werden wir ein gleichberechtigtes Mitglied der Polis-Verteidigung. Dem Orden stehen wir inzwischen kaum noch in etwas nach"

  ARB_allow_orderly_recruitment: "Erlaubt die erweiterte Rekrutierung"
  ARB_allow_orderly_recruitment_desc: "Unsere Streitkräfte müssen erweitert werden, wenn wir eine relevante militärische Stärke aufbauen wollen"

  ARB_draw_from_the_commoners: "Rekruten aus allen Stationen"
  ARB_draw_from_the_commoners_desc: "Wer sich der Sache der menschheit verschrieben hat, der wird von uns nicht abgewiesen werden"

  ARB_stalker_intergration: "Stalker-Integration"
  ARB_stalker_intergration_desc: "Unsere Stalker wissen was sie tun, sie sind nun den Rangern des Ordens ebenbürtig. Behandeln wir sie auch so"

### Against Darkness ###

  ARB_claim_GWC: "Kampf gegen die Finsternis"
  ARB_claim_GWC_desc: "Wir haben den geheimen Zugang entdeckt, aus welchem diese mysteriösen Entführer in unsere Station gelangen. Es wird Zeit abzurechnen"

  ARB_what_of_them: "Der Horror im Park Pobedy"
  ARB_what_of_them_desc: "Wir wissen nun wer hinter den Entführungen an der Kievskaya steht, eine Bande degenerierter Kannibalen, die an einen großen Wurm glauben und Technologie verabscheuen. Nun da wir die Station erobert haben müssen wir noch entscheiden, was wir mit den Gefangenen machen "

  ARB_what_of_them2: "Reintegriert den Park Pobedy"
  ARB_what_of_them2_desc: "Der Park steht unter unserer Kontrolle, niemand wird dies noch lange anzweifeln können"

### ??? ###

  ARB_restore_tunnel: "Räumt den Tunnel zwischen Kievskaya und Park Pobedy frei"
  ARB_restore_tunnel_desc: "Der Tunnel wurde vor langer Zeit von uns gesprengt und das hatte für den Park ehern, naja, sagen wir mal negative Folgen. Stellen wir die Verbindung lieber wieder her, ansonsten verlieren die Menschen dort wieder den Verstand"

### Human-Mutant ##

  ARB_question_of_HMS_1: "Mutanten-Ausrottung"
  ARB_question_of_HMS_1_desc: "Die Mutanten sind unzweifelhaft eine existenzielle Bredrohung für die gesamte Menschheit, wir müssen sie ausrotten entschlossen"

  ARB_question_of_HMS_2: "Bietet ihnen unsere Freundschaft an"
  ARB_question_of_HMS_2_desc: "Ihre einzigartige Lebensweise könnte uns früher oder später nochmal nützlich werden"

### Military ###

  ARB_standing_guard: "Verstärkt unsere Truppen"
  ARB_standing_guard_desc: "Unsere Armee braucht dringend eine Generalüberholung, fangen wir am besten mal bei dem Equipment an"

  ARB_deploy_conscripts: "Hebt neue Einheiten aus"
  ARB_deploy_conscripts_desc: "Es gibt noch viele Veteranen und sonstige Menschen mit Kampferfarhung an unserer Station, wir müssen sie nur zur Waffe rufen und sie werden folgen"

  ARB_emergency_mobilization: "Verstärkt unsere Rekrutierungsbemühungen"
  ARB_emergency_mobilization_desc: "Wir müssen uns bereit machen, unsere Streitkräfte umfassend auszubauen"

  ARB_military_branch_4: "Erbe des ersten Metrokrieges"
  ARB_military_branch_4_desc: "Technisch gesehen haben wir bereits jede Menge an Kampferfahrung im ersten metrokrieg gesammelt. Wir sollten über die Kämpfe damals nochmal ausgiebig reflektieren"

  ARB_military_branch_5: "Gründet das Komitee"
  ARB_military_branch_5_desc: "Im ersten Metrokrieg hatten wir ein Militärkomitee, dieses sollten wir wiederbeleben. Viele ehemalige Mitglieder leben sogar noch"

  ARB_military_branch_6: "Beförderung für erfahrene Leutnants"
  ARB_military_branch_6_desc: "An Veteranen mangelt es uns nicht, sie werden die neue Spitze unseres Heeres stellen"

  ARB_military_branch_6a: "Die Disziplin der Hanse"
  ARB_military_branch_6a_desc: "Die Hanse hat uns im ersten Metrokrieg ziemlich alt aussehen lassen, wir vermuten dass es vor allem an der beindruckenden Disziplin ihrer Soldaten gelegen hat, dass sie der Roten Flut besser standhalten konnten als wir. Wir müssen von ihnen lernen, und zwar schnell"

  ARB_military_branch_6b: "Nachtsicht-Taktiken"
  ARB_military_branch_6b_desc: "Wer im Dunkeln sehen kann ist in der Metro klar im Vorteil. Wir holen uns diesen Vorteil"

  ARB_military_branch_6c: "Heuert Techniker an"
  ARB_military_branch_6c_desc: "Wir brauchen moderne Waffen und davon jede Menge. Sicherlich können uns einige Techniker dabei helfen, wenn wir sie gut bezahlen"

  ARB_military_branch_7: "Einberufungsreform"
  ARB_military_branch_7_desc: "Unsere Armeen brauchen zuverlässliche Männer an der Front und nicht irgendwelche dahergelaufenen penner. Erhöht die Einberufungsstandards"

  ARB_military_branch_7a: "Konzentrierte Kraft"
  ARB_military_branch_7a_desc: "Viele Soldaten braucht es nicht, eine kleinere Zahl guter Soldaten reicht bereits um unsere Tunnel zu sichern. Die Betonung liegt aber auf auf 'guter'"

  ARB_military_branch_7b: "Flankensicherung"
  ARB_military_branch_7b_desc: "Einkesselungen sind um jeden Presi zu verhindern"

  ARB_military_branch_8: "Eine neue Doktrin"
  ARB_military_branch_8_desc: "Wir wissen nun wie wir unsere Armee führen und gestalten müssen. Und so werden wir sie auch führen und gestalten. Der Krieg von Morgen kann kommen" 
