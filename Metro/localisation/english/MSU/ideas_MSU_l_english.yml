l_english:
 MSU_mythical_city: "Emerald City"
 MSU_mythical_city_desc: "University, Prospekt Vernadskogo and Yugo-Zapadnaya stations form the illusive Emerald City. The subsequent destruction of Vorobyovy Gory station and the collapsed bridge over the Moskva river has isolated the University from the rest of the Metro.\n\nIts known current extent only existing in rumors told through tall tales; accounts from friends of a friend, or gossip by travelling traders; which have devolved into half-true truths and incomplete stories. Though reports exist of stalkers encountering scientific expeditions sent from Emerald City on the surface.\n\n Whether they exist or not is up for debate."

MSU_isolation_tt: "£trigger_no Reclaim Abandoned States."

MSU_science_directorate: "Nation of Scientists"
MSU_science_directorate_desc: ""
MSU_free_scavenging_tt: "\n§YScavenging Decisions are Free§!"

MSU_isolationism: "Isolationist"
MSU_isolationism_desc: "Partitioned across the Moskva river, [MSU.GetName] has secured itself a impregnable bulwark against any potential threats from the rest Metro. Whether that be man, beast or anything else entirely. Revealing themselves at this current point in time would ultimately give up their safety and security."

MSU_stalkers: "Experienced Stalkers"