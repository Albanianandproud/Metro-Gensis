 EUR_ostalgie: "Ostalgie"
 EUR_ostalgie_desc: "Es gibt ein Wort für die wehmütigen Erinnerungen an den Sozialismus: Ostalgie – Nostalgie für den Osten. Während sich in unserer Gemeinschaft nur wenige an die Tage Ostdeutschlands erinnern, sehnen sich viele unserer deutschen und sogar europäischen Bürger nach der vergangenen Stabilität und Ordnung.\n\n"

