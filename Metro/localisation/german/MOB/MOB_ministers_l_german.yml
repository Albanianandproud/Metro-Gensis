l_german:
  MOB_mob: "Uneinige Führung"
  MOB_mob_desc: "Auch wenn es das organisierte Verbrechen ist, so ist es doch weniger organisiert als man glauben mag. Es gibt keine vereinte Führung und die Stationen überfallen sich auch oft gegenseitig."
  MOB_jolly_roger: "Jolly Roger"
  MOB_jolly_roger_desc: "Der Boss der Shabolovskaya, der sich selbst zum Piraten aufspielt. In seinem Quartier sind eine Piratenflagge und ein Steuerrad zu finden uns selbst seinen Namen hat er aus seiner Obsession."
