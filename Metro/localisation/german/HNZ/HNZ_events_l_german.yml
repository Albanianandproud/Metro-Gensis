 ### Generic Events ###

 HNZ_random_event.1.t:0 "Hinterhältiger Händler"
 HNZ_random_event.1.d:0 "Ein ziemlich gerissener Händler auf einer unserer Stationen wurde beim Verkauf illegaler Waren ertappt. Er bot unter anderem Drogen und illegale Schusswaffen an, vermischt mit anderen, eher zwielichtigen Artikeln. Derzeit wird er von den Stationsbehörden zur Rechenschaft gezogen; die Frage ist jedoch, wie mit ihm weiter verfahren werden soll."
 HNZ_random_event.1.a:0 "Seine Waren gehören jetzt der Hanse."
 HNZ_random_event.1.b:0 "Wir können nicht zulassen, dass er Drogen sieht – wirft ihn raus."
 HNZ_random_event.1.a_tt:0 "§gWir werden nicht zulassen, dass ihre Waren in unserem Gebiet verkauft werden, aber wir können sie an benachbarte Stationen verkaufen und dabei Gewinn erzielen.§!"

 HNZ_random_event.2.t:0 "Händlern der Zutritt verwehrt"
 HNZ_random_event.2.d:0 "An einer unserer Ringstationen wurde einer Karawane die Einfahrt in die Hanza verwehrt, da sie keine Reisepässe bereithielt. Sie stammen aus der weit entfernten Region der Metro und beteuern, noch nie von Passkontrollen oder einer Ausweispflicht gehört zu haben. Ihre Absichten scheinen redlich zu sein; sie wollen lediglich ihre Waren verkaufen, um genügend Munition zu erwirtschaften und ihre Station zu versorgen, die derzeit unter Pilzknappheit leidet und hungert."
 HNZ_random_event.2.a:0 "Kein Pass? Kein Zutritt."
 HNZ_random_event.2.b:0 "Machen Sie eine Ausnahme – lassen Sie sie während des Handels von einer Wache genau beobachten."

 HNZ_random_event.3.t: "Banditenüberfall!"
 HNZ_random_event.3.d: "Vor Kurzem wurde einer der Tunnel von Banditen überfallen. Sie rauben Karawanen aus und lassen alles spurlos verschwinden, selbst wenn dabei niemand erschossen wird. Handel und Verkehr durch diesen Tunnel erfolgen nun auf eigene Gefahr. Die Lage spitzt sich jedoch immer weiter zu, da mittlerweile selbst alltägliche Fahrten von und zur Hanse eingestellt wurden – aus Sorge, dass sich die Banditengruppe auch auf andere, ähnliche Tunnel in der Umgebung ausbreiten könnte."
 HNZ_random_event.3.a: "Schick einen Trupp, um sich um sie zu kümmern."
 HNZ_random_event.3.b: "Unterbreiten Sie ihnen ein ... vielversprechendes Angebot."
 HNZ_random_event.3.c: "Bezahl sie dafür, dass sie sich woandershin verpissen."

 HNZ_random_event.4.t:0 "Erfolgreich rekrutieren"
 HNZ_random_event.4.d:0 "Das Angebot, das wir ihnen im Gegenzug für das Einstellen der Überfälle auf Karawanen unterbreitet haben, war erfolgreich. Ihr Anführer bot an, gegen reichliche Bezahlung für uns zu arbeiten. Sie sind jedoch keine gewöhnlichen, tumben Schläger; sie sind mit Waffenarsenalen ausgerüstet, die sie zuvor von vorbeiziehenden Karawanen geraubt hatten. Ich bin mir allerdings sicher, dass wir sie einfach in irgendeinen Anomalie-Tunnel in den Tod schicken und die Waren wieder an uns nehmen können ..."
 HNZ_random_event.4.a:0 "Nice"
 HNZ_random_event.4.a_tt:0 "§gZwei Banditendivisionen erscheinen in unserer Hauptstadt.§!"
 
 HNZ_random_event.5.t:0 "Rohre haben meine Karawane gefressen!"
 HNZ_random_event.5.d:0 "Ein Mann stürmt in die Station; Schweiß und Tränen laufen ihm über das Gesicht. Er behauptet, die Rohre hätten seinen gesamten Handelszug verschluckt. Er sei der einzige Überlebende dieses Vorfalls. Vor Angst schlotternd scheut er davor zurück, sich erneut dorthin hinauszuwagen, um die Waren zu bergen; nur die Kleidung am Leib ist ihm geblieben, als er seinen erschöpften Körper zur Station schleppte. Ob die Rohre den Handelszug nun tatsächlich verschlungen haben oder nicht – die Angelegenheit könnte enorme Auswirkungen auf den Handel haben. Der Mann wurde vorerst zurechtgewiesen, und ein Erkundungstrupp wurde in den Tunnel entsandt. Das Expeditionsteam stieß auf den Handelszug. Es gab keine Leichen, kein Blut und keinerlei Anzeichen eines Kampfes; lediglich der beißende Geruch von Rost und Rauch lag schwer in der Luft. Als Ausgleich für den Vorfall soll die Station verstärkt patrouilliert werden, doch die Soldaten zeigen sich wenig begeistert von diesem Einsatz."
 HNZ_random_event.5.a:0 "Diese Waren gehören jetzt der Hanse"

 HNZ_random_event.6.t:0 "Unfall einer Karawane der Roten"
 HNZ_random_event.6.d:0 "Bei einem kürzlichen Massenunfall in einem der Tunnel, die von der „Roten Linie“ wegführen, ist eine ihrer Handelskarawanen verunglückt. Als wir auf das Wrack stießen, konnten wir leider keinen der Karawanenleute retten oder aufgrund der Unfallverletzungen identifizieren. Ihre Waren blieben jedoch seltsamerweise weitgehend unbeschadet. Wir könnten uns diese Waren unter den Nagel reißen oder den Vorfall der „Roten Linie“ melden und die Güter freundlicherweise zurückgeben."
 HNZ_random_event.6.a:0 "Ich bin sicher, sie hätten nichts dagegen, wenn wir ihre Güter umverteilen würden."
 HNZ_random_event.6.a_tt:0 "§gIch bin sicher, die Bürokratie der Roten Linie wird bald vergessen, dass sie überhaupt jemals eine Karawane losgeschickt hat.§!"
 HNZ_random_event.6.b:0 "Gebt ihnen die Ressourcen zurück."
 HNZ_random_event.6.b_tt:0 "§gAuch wenn sie sich anfangs unangenehm und misstrauisch verhielten, sind sie dankbar, dass wir die Waren in ihre Hände zurückgegeben haben.§!"

 HNZ_random_event.7.t:0 "Stationsleiter äußert sich kritisch zur Hanse"
 HNZ_random_event.7.d:0 "Vor Kurzem äußerte sich einer unserer Stationsleiter kritisch über das hanseatische Regime. Er bemängelte dessen Unzulänglichkeit beim Schutz der Rechte der Bewohner und kritisierte, die Liga sei lediglich zur „Gewinnmaximierung“ gegründet worden – sie sei eher eine korrupte Oligarchie als eine Regierung. Seine Kritik blieb jedoch nicht ungehört, denn die Bewohner der besagten Station stellten sich hinter ihn und seine Aussagen."
 HNZ_random_event.7.a:0 "Ok"
 HNZ_random_event.7.b:0 "Bringt ihn zum Schweigen."
 HNZ_random_event.7.b_tt:0 "§g Wir schicken jemanden, der ihn „persönlich“ zum Schweigen bringt."

 HNZ_random_event.8.t:0 "Einstellung fehlgeschlagen"
 HNZ_random_event.8.d:0 "Sie lehnten unser Angebot ab und prahlten damit, dass die Ehre eines Banditen mehr wert sei als jeder Tand oder Nippes, den wir ihnen hätten bieten können. Ein Wort gab das andere, und es kam zu einer Schlägerei zwischen den Unterhändlern und den Banditen. Schließlich räumten sie jedoch das Gebiet und flohen tiefer in die Tunnel außerhalb unseres Territoriums."
 HNZ_random_event.8.a:0 "Ich schätze, es hat zumindest funktioniert."