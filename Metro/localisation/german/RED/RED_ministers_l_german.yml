  ### Donator Exclusives ###

  RED_sergei:0 "Held des Koalitionskrieges"
  RED_sergei_name:0 "Sergei Antonov"
  RED_sergei_desc:0 "Als Held, der sich im §YKoalitions-Krieg§! zahlreiche Auszeichnungen erkämpft hat, war Sergei mit seinem Trupp ruhmreicher Kämpfer nach einem Gegenangriff der §YHanse§ hinter den feindlichen Linien gestrandet! Als Soldat im Alleingang wurde Sergei für seinen Mut und seine Tapferkeit ausgezeichnet. Ein wahrer Mustersoldat."
  
