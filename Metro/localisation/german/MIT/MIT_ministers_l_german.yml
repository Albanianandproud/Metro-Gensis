l_german:
  MIT_valentinovich:0 "Semyon Valentinovich"
  politics_MIT_valentinovich_desc:0 "Der Anführer der Mitino-Station, Semyon, wurde irgendwann in den 60ern geboren und schaffte es gerade so, in die Metro zu fliehen, als die Bomben fielen. Von außen wirkt er wie ein kräftiger Mann, doch in seinem Inneren ist er schon lange gebrochen. Im großen Krieg verlor er viel, zu viel und der Tod seiner gesamten Familie trieb ihn in die Depression. Nun ist die Flasche seine einzige Familie.\n\nAll dies änderte sich jedoch, als er zum ersten Mal die Stalker an die Oberfläche begleitete. Ein Wissen um die alte Stadt Moskau sowie seine scharfen Augen brachten die Mission zu einem Erfolg.\n\nDer Ausflug an die Oberfläche brachte das Leben in Valentinovich wieder zum Vorschein und bald schon wurde er durch sein Alter uns seine Weisheit zum Anführer des Mitino-Stationenbundes."