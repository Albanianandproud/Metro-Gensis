l_german:
  KRY_vishin:0 "Vishin"
  politics_KRY_vishin_desc:0 "Bevor die Bomben fielen, musste Vishin von einer Beschäftigung zur nächsten wechseln. Als Sohn eines ehemaligen Obersten der Sowjetarmee hatte er nie das Gefühl, etwas zu haben, dem er wirklich gerecht werden konnte, da er nicht in die Fußstapfen seines Vaters treten konnte.\n\nDoch Jetzt? Er lebt das Leben mit einem klaren Ziel; §Yseine§! Station verteidigen! §YSeine§! Familie. §YSein§! Heim. Er wird persönlich dafür sorgen, dass die §YKrylatskoye§! sicher und vor äußeren Bedrohungen geschützt bleibt. Und mit Berichten über §RMutanten§! in den Tunneln im Süden wird er alles tun, um dem Erbe seines Vaters gerecht zu werden."
  KRY_jean: "Jean"
  politics_KRY_jean_desc: "Nach der Erstürmung der Station Strogino haben er und seine Jungs eine Idee entwickelt: Warum die armen Trottel der Metro nur einmal häuten, wenn man sie einfach für den Rest ihres Lebens auch melken kann? Noch ist es nicht das Banditendreieck, aber mit etwas Spucke und Ellenbogenfett wird das hier sein Revier."