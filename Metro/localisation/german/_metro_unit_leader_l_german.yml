l_german:
brave_personality_trait: "Mutig"
brave_personality_trait_desc: "Dieser Kommandeur hat bewiesen, dass er selbst angesichts großer Gefahren standhaft bleibt."

bright_personality_trait: "Klug"
bright_personality_trait_desc: "Dieser Kommandeur besitzt einen natürlichen Scharfsinn und eine ausgeprägte Auffassungsgabe."

craven_personality_trait: "Feige"
craven_personality_trait_desc: "Diesem Kommandeur fehlt es an Mut; er würde lieber fliehen, als sich einer Herausforderung zu stellen."

stoic_personality_trait: "Stoisch"
stoic_personality_trait_desc: "Unbeeinflusst von Emotionen trifft dieser Kommandeur seine Entscheidungen auf Grundlage von Vernunft und Logik."

cruel_personality_trait: "Grausam"
cruel_personality_trait_desc: "Von dem Wunsch getrieben, seinen Feinden Leid zuzufügen, ist dieser Kommandeur für seine brutalen Methoden berüchtigt."

pompous_personality_trait: "Selbstgefällig"
pompous_personality_trait_desc: "Vorstellungen von eigener Größe treiben diesen Kommandeur bei der Erfüllung seiner Pflichten an."

determined_personality_trait: "Entschlossen"
determined_personality_trait_desc: "Hat dieser Kommandeur einmal eine Entscheidung getroffen, verfolgt er sie bis zum bitteren Ende."

fainthearted_personality_trait: "Ängstlich"
fainthearted_personality_trait_desc: "Diesem Kommandeur fehlt es an Entschlossenheit und er lässt sich leicht einschüchtern."

fearless_personality_trait: "Furchtlos"
fearless_personality_trait_desc: "Dieser Kommandeur hat bewiesen, dass er Herausforderungen mutig entgegentritt."

impatient_personality_trait: "Ungeduldig"
impatient_personality_trait_desc: "Leicht reizbar und ungeduldig neigt dieser Kommandeur zu überstürzten Entscheidungen ohne ausreichende Planung."

paranoid_personality_trait: "Paranoid"
paranoid_personality_trait_desc: "Dieser Kommandeur ist ständig auf der Hut und hegt ein tief verwurzeltes Misstrauen gegenüber anderen."

irrational_personality_trait: "Irrational"
irrational_personality_trait_desc: "Logik und Vernunft spielen bei den Entscheidungen dieses Kommandeurs nur eine geringe Rolle."

loyal_personality_trait: "Loyal"
loyal_personality_trait_desc: "Dieser Kommandeur hat den herrschenden Mächten unverbrüchliche Treue geschworen."

stubborn_personality_trait: "Stur"
stubborn_personality_trait_desc: "Dieser Kommandeur ist so sehr von seinen Ansichten überzeugt, dass er neue Strategien oder Taktiken nur widerwillig annimmt."

insecure_personality_trait: "Unsicher"
insecure_personality_trait_desc: "Diesem Kommandeur fehlt das Vertrauen in die eigenen Fähigkeiten."

spineless_personality_trait: "Rückgratlos"
spineless_personality_trait_desc: "Diesem Kommandeur mangelt es an Mut, Entschlossenheit und Tatkraft."

lively_personality_trait: "Tatkräftig"
lively_personality_trait_desc: "Dieser Kommandeur ist gesund, kräftig und voller Energie."

adaptable_commander_trait: "Anpassungsfähig"
adaptable_commander_trait_desc: "Dieser Kommandeur findet selbst in schwierigen Situationen schnell Lösungen und überwindet Hindernisse mühelos."

brazen_commander_trait: "Draufgängerisch"
brazen_commander_trait_desc: "Frei von Furcht verlässt sich dieser Kommandeur im Gefecht auf schnelles Denken und entschlossenes Handeln."

educated_commander_trait: "Gebildet"
educated_commander_trait_desc: "Mit einer großen Leidenschaft für Literatur und Wissen verfügt dieser Kommandeur über eine ausgezeichnete Bildung."

resilient_commander_trait: "Widerstandsfähig"
resilient_commander_trait_desc: "Dieser Anführer erholt sich schnell von Rückschlägen und kehrt rasch wieder ins Geschehen zurück."

gifted_commander_trait: "Begabt"
gifted_commander_trait_desc: "Mit außergewöhnlichem Talent gesegnet, versteht es dieser Kommandeur, seine Fähigkeiten optimal einzusetzen."

grizzled_commander_trait: "Kampferprobt"
grizzled_commander_trait_desc: "Gezeichnet von zahllosen Prüfungen und Narben hat dieser Anführer gelernt, jeder Herausforderung standzuhalten."

fearsome_commander_trait: "Furchteinflößend"
fearsome_commander_trait_desc: "Die vergangenen Taten dieses Kommandeurs haben ihm einen Ruf eingebracht, der Freund wie Feind gleichermaßen einschüchtert."

indomitable_commander_trait: "Unbeugsam"
indomitable_commander_trait_desc: "Hartnäckig und entschlossen lässt sich dieser Anführer selbst durch größte Widrigkeiten nicht brechen."

indomitable_commander_trait_tooltip: "Einheiten gewinnen Gefechte während der Verteidigung"

charismatic_commander_trait: "Charismatisch"
charismatic_commander_trait_desc: "Dieser Kommandeur besitzt eine natürliche Ausstrahlung, die seine Untergebenen instinktiv anzieht."

charismatic_commander_trait_tooltip: "Kämpft mit mindestens 8 Trupps"

insightful_commander_trait: "Weitsichtig"
insightful_commander_trait_desc: "Dieser Kommandeur verfügt über ein ausgeprägtes Gespür für Situationen und Entscheidungen."

guileful_commander_trait: "Listig"
guileful_commander_trait_desc: "Dieser Kommandeur zeichnet sich durch außergewöhnliche Gerissenheit und Cleverness aus."

guileful_commander_trait_tooltip: "Hat feindliche Trupps flankiert"

organized_commander_trait: "Organisiert"
organized_commander_trait_desc: "Dieser Kommandeur besitzt ein natürliches Talent für die effiziente Organisation seiner Soldaten."

organized_commander_trait_tooltip: "Mindestens 10 % durchschnittliche Planung"

methodical_assign_trait: "Methodisch"
methodical_assign_trait_desc: "Dieser Kommandeur setzt auf sorgfältige Planung und eine strukturierte Umsetzung seiner Befehle."

stalwart_assign_trait: "Standhaft"
stalwart_assign_trait_desc: "Pflichtbewusst und verlässlich kann diesem Kommandeur jede Aufgabe anvertraut werden."

rigorous_assign_trait: "Gewissenhaft"
rigorous_assign_trait_desc: "Dieser Kommandeur arbeitet äußerst gründlich und legt großen Wert auf Genauigkeit."

vigilant_assign_trait: "Wachsam"
vigilant_assign_trait_desc: "Stets aufmerksam berücksichtigt dieser Kommandeur jede noch so kleine Einzelheit."

zealous_assign_trait: "Eifrig"
zealous_assign_trait_desc: "Dieser Kommandeur erfüllt seine Aufgaben mit großem Einsatz und leidenschaftlichem Enthusiasmus."

unorthodox_assign_trait: "Unkonventionell"
unorthodox_assign_trait_desc: "Dieser Kommandeur lässt sich nicht von traditionellen Denkweisen oder Doktrinen einschränken."

unyielding_assign_trait: "Unnachgiebig"
unyielding_assign_trait_desc: "Selbst schwierigste Hindernisse können diesen Kommandeur kaum von seinem Weg abbringen."

coordinated_assign_trait: "Koordiniert"
coordinated_assign_trait_desc: "Dieser Kommandeur versteht es hervorragend, seine Untergebenen zu koordinieren und zu führen."

decisive_assign_trait: "Entschlussfreudig"
decisive_assign_trait_desc: "Dieser Kommandeur besitzt die Fähigkeit, schnell klare und endgültige Entscheidungen zu treffen."

tough_assign_trait: "Zäh"
tough_assign_trait_desc: "Dieser Kommandeur beweist sowohl körperliche als auch geistige Stärke angesichts von Widrigkeiten."

innovative_assign_trait: "Innovativ"
innovative_assign_trait_desc: "Dieser Kommandeur denkt über den Tellerrand hinaus und integriert neue Ideen und Methoden in seine Befehle."

flexible_assign_trait: "Flexibel"
flexible_assign_trait_desc: "Dieser Kommandeur passt seine Taktiken mühelos an wechselnde Situationen an und organisiert seine Kräfte entsprechend neu."

spartan_personality_trait: "Spartaner"
spartan_personality_trait_desc: "Dieser Kommandeur ist ein Ranger – ein Spartaner des Ordens."

named_character: "Einzigartiger Charakter"
named_character_desc: "Nicht von zufälligen Charakterereignissen betroffen. Das Schicksal scheint noch Pläne für diese Person zu haben."

supersoldaten_personality_trait: "Supersoldaten-Stimulanzien"
supersoldaten_personality_trait_desc: "Vollgepumpt mit großen Mengen an Stimulanzien und Chemikalien hat dieser Anführer eine erhöhte Effektivität bei der Führung seiner Truppen bewiesen."

supersoldaten_personality_trait_2: "$supersoldaten_personality_trait$"
supersoldaten_personality_trait_2_desc: "$supersoldaten_personality_trait_desc$"

supersoldaten_personality_trait_3A: "$supersoldaten_personality_trait$"
supersoldaten_personality_trait_3A_desc: "$supersoldaten_personality_trait_desc$"

supersoldaten_personality_trait_3B: "$supersoldaten_personality_trait$"
supersoldaten_personality_trait_3B_desc: "$supersoldaten_personality_trait_desc$"

former_OMON_personality_trait: "Ehemaliges OMON-Mitglied"
former_OMON_personality_trait_desc: "Dieser Kommandeur war einst Mitglied der OMON – der Spezialeinheit der Miliz."

