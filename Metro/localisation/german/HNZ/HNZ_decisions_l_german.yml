## Agendas Decisions ## 
  HNZ_agenda_failure: "Die Nichteinhaltung der erforderlichen Agenda führt zu politischen Strafen! Wir riskieren, dass unsere Oberschicht mit der aktuellen Regierung unzufrieden sein wird!"

  HNZ_agendas: "Hanseatische Agenden"
  HNZ_agendas_desc: "Seitdem wir die §YRinglinie§! vereint haben, sind unsere Macht und unser Einfluss dramatisch angewachsen. Allerdings ist unsere §YLiga§! nur unter dem Deckmantel der gegenseitigen Verteidigung und des Profites geeint. Die Zentralisierung der §Y[HNZ.GetFlag][HNZ.GetName]§! wird keine leichte Aufgabe sein.\n\n§YZeitlich begrenzte Agenden§! abzuschließen wird uns die Unterstützung der Händler- und Verwaltungsgruppen gewinnen und uns helfen, unsere Autorität weiter zu festigen.\n\nUnsere aktuelle £political_authority_texticon §OPolitische Autorität§! : £political_authority_texticon §O[?HNZ_political_authority]§!\n\nWir können §OPolitical Authority§! eintauschen für Boni und Buffs für unsere Stationen."

  HNZ_mission_defensive_priority: "Priorität auf Verteidigung"
  HNZ_mission_defensive_priority_desc: "Die Ringlinie ist der zentrale Handelsknotenpunkt der gesamten Metro und der Handel ist das Lebenselixier der Handelsliga. Wir müssen alle Bedrohungen davon abhalten, von innerhalb oder von außerhalb in den Ring einzudringen."

  HNZ_mission_defence_condition: "Konstruieren Sie §C10§! Bunker oder Stacheldrahtstellungen."

  HNZ_mission_economic_priority: "Wirtschaftliche Priorität"
  HNZ_mission_economic_priority_desc: "Die Hanse übt ihre politische Macht hauptsächlich durch ihre riesige Wirtschaft aus. Wirtschaftssanktionen und Embargos sind das wichtigste Instrument zur Abwehr feindlicher Bedrohungen des eigenen Regimes."

  HNZ_mission_neutrality_priority: "Neutralitätspriorität"
  HNZ_mission_neutrality_priority_desc: "Der Stationenbund ist sowohl in wirtschaftlicher als auch in politischer Hinsicht führend. Da die Kommunisten auf die Sokol-Linie beschränkt sind, bleibt die Hanse ein unangefochtener Gigant. Solange der aktuelle Zustand der Metro anhält ..."
 
  HNZ_mission_neutrality_condition: "Bleiben Sie für die Dauer der Agenda eine neutrale Macht in der Metro. Dulden sie keine aktiven Kriegserklärungen oder Spannungen in der Metro."

  HNZ_mission_military_priority: "Militärischer Aufbau"
  HNZ_mission_military_priority_desc: "Die Hanse ist zwar eine Wirtschaftsmacht, verfügt aber auch über eines der größten stehenden Heere in der Metro. Bereit, jegliche Bedrohungen gegen Loginovs Regierung einzudämmen und zurückzudrängen."

  HNZ_mission_military_condition: "Besitzen Sie ein stehendes Heer, bestehend aus mindestens §Y60§! Divisionen oder eine Streitmacht mit mehr als §Y1500§! Soldaten."

  HNZ_mission_armament_priority: "Rüstungsbevorratung"
  HNZ_mission_armament_priority_desc: "Obwohl das Militär der Hanse nicht aktiv an bewaffneten Konflikten beteiligt ist, ist es die am besten versorgte und am besten ausgerüstete Streitmacht in der Metro. Dank der enormen Wirtschaftlichkeit der Liga sind viele der Waffen und Munition, die den Soldaten zur Verfügung gestellt werden, überall sonst heiß begehrt."

  HNZ_infantry_equipment_priority: "Mehr als §Y400 Infanterie-Ausrüstung§! in der Armee\n\n"
  HNZ_support_equipment_priority: "Mehr als §Y400 Unterstützungs-Ausrüstung§! in der Armee\n\n"
HNZ_flamethrower_equipment_priority: "Mehr als §Y400 Flammenwerfer-Ausrüstung§! in der Armee\n\n"
