l_german:
 STB_stortbekers_brigands:0 "Stortbeker's Bande"
 STB_stortbekers_brigands_desc:0 "Einst ein Team von unvergleichlichen Stalkern, sind diese Männer durch ihre Isolation und ihre ahrte Umgebung zu kaum mehr als Banditen verkommen. Stehlen, Rauben, Morden, um zu überleben schrecken sie vor nichts zurück. Stortbeker ist wohl der einzige der sie davon abhält, völlig zu Tieren zu werden."

 STB_divide_against_fuhrer:0 "Der Gefallene"
 STB_divide_against_fuhrer_desc:0 "Durch ihre unrühmliche Verbannung ist die Beziehung zwischen beiden Nationen stark getrübt."

 STB_genetic_supremacy:0 "Genetische Überlegenheit...?"
 STB_genetic_supremacy_desc:0 "Diese Nation glaubt eine der letzten echten "menschlichen" Gruppen in der Metro zu sein. Wer weiß schon so genau wie verseucht und mutiert der Rest der Metro wirklich ist? Normalerweise wird mit fragwürdigen Individuen kurzer Prozess gemacht.\n\nJedoch, so weit entfernt vom Reich und seiner reinen Bevölkerung... woher sollen sonst die neuen Rekruten kommen? Diese Nation sah sich gezwungen, ihre Kräfte aus der örtlichen Population zu ziehen."
 
