 reclaim_state_remove_isolationism: "Expandiert nach außen"
 reclaim_state_remove_isolationism_desc: "Über Jahre hinweg waren wir isoliert und unsere Bevölkerung war auf einen viel zu kleinen Lebensraum eingezwängt. Das hat nun ein Ende."

 scavenging_expeditions: "Oberflächenexpeditionen"
scavenging_expeditions_desc: "\n\n\n\n\n\n\n §GErfolgschance§!: [?Root.scavenge_success_chance_display_var] §RMisserfolgschance§!: [?Root.scavenge_fail_chance_display_var] §OPOI-Chance§!: [?Root.scavenge_poi_chance_display_var]\n\nJede Option erhält einen Wert, der angibt, wie wahrscheinlich ihre Auswahl ist. Je höher der Wert, desto größer die Chance. Eine Option mit §Y20§! hat doppelt so hohe Chancen ausgewählt zu werden wie eine Option mit §Y10§!."

establish_stalking_group: "Ein Stalker-Team aufstellen"
establish_stalking_group_desc: "In der Metro besitzen nur wenige den Mut, die Oberfläche auf der Suche nach lebenswichtigen Gütern zu betreten. Militärische Ausrüstung, Ersatzteile, Treibstoff. Diejenigen, die dieses Risiko eingehen, und die noch kleinere Zahl, die man auf ihre Rückkehr zählen kann, sind ihr Gewicht in Gold wert."

scavenging_disabled: " Keine Oberflächenexpeditionen möglich"
scavenging_been_disabled_tt: "Plünderungssystem aktiviert"

allow_to_conduct_scavenging_mission_tt: "\nSobald ein Stalker-Team organisiert wurde, können wir Expeditionen an die Oberfläche entsenden, um nach wertvollen militärischen Vorräten, Ausrüstung oder Ressourcen zu suchen."

scavenger_team_mission_countdown: "Expeditionseinsatz"
scavenger_team_mission_countdown_desc: "Es wird einige Zeit dauern, bis unsere Stalker zurückkehren."

scavenge_success_tt: ": §YErfolgreicher Einsatz§!"
scavenge_failure_tt: ": §YErfolgloser Einsatz§!"
scavenge_failure_no_reward_tt: "Unsere Stalker kehren mit leeren Händen zurück."
scavenge_colossal_failure_tt: ": §YStalker-Team verschwunden§!"
scavenge_horror_tt: ": §YStalker-Team in einen Hinterhalt geraten!§!"
scavenge_poi_tt: ": §YInteressanter Ort entdeckt§!"

launch_scavenging_team_mission: "Einsatz starten"
launch_scavenging_team_mission_desc: "Wenn ein Kind in einer Welt geboren wird, in der es keinen Grund mehr gibt zu fliegen oder zu segeln, verlieren die Worte „Pilot“ und „Seemann“ allmählich ihre Bedeutung. Diese Kinder wollen Stalker werden."

active_scavenger_mission_tt: "\nWir werden wiederholt Stalker-Trupps an die Oberfläche entsenden. Sie werden mit Wertgegenständen, militärischer Ausrüstung oder Informationen über noch unerforschte Orte zurückkehren."

scavenger_team_mission_establish_surface_waypoints: "Oberflächen-Wegpunkte errichten"
scavenger_team_mission_establish_surface_waypoints_desc: "Eine von Menschen geschaffene Struktur oder ein Außenposten – ein Hafen im Sturm. Diese strategisch platzierten Wegpunkte dienen unseren Stalkern als Orientierungshilfe bei der Navigation über die Oberfläche."

place_surface_waypoint_tt: "\nErhöht das §GErfolgsgewicht§! unserer Bergungseinsätze."

scavenger_team_mission_equip_support_weapons: "Stalker ausrüsten"
scavenger_team_mission_equip_support_weapons_desc: "Falls nötig, können wir unsere Stalker-Teams mit besserer Ausrüstung versehen. Zwar wird ihre Beweglichkeit darunter leiden, doch sie werden deutlich besser in der Lage sein, mit Bedrohungen fertigzuwerden, auf die sie stoßen könnten ... oder die auf sie stoßen."

give_stalkers_support_weapons_tt: "Erhöht unser §GErfolgsgewicht§!, falls unsere Stalker auf Feinde treffen."

scavenger_team_recall: "Expedition zurückrufen"
scavenger_team_recall_desc: "Falls erforderlich, können wir eine dringende Anweisung senden, um unseren Einsatz von der Oberfläche zurückzuholen."

active_scavenger_mission: "Expedition aktiv"

scavenger_mission_rescue: "Rettungsmission starten"
scavenger_mission_rescue_desc: "Mit sofortiger Wirkung stellen wir ein improvisiertes Rettungsteam zusammen, um unsere vermisste Stalker-Einheit an der Oberfläche zu suchen. Hoffen wir, dass wir sie finden, bevor der Tod – oder Schlimmeres – sie erreicht."

scavenger_mission_needs_rescue: "Wir haben unser verschwundenes Stalker-Team lokalisiert."

scavenger_team_mission_parkinglot: "Überlebende eskortieren"
scavenger_team_mission_parkinglot_desc: "Nachdem ihr Anführer uns angefleht hat, sie in die vergleichsweise sichere Metro zu begleiten, bleibt uns nur wenig Zeit, ihnen eine sichere Passage zu gewähren."

scavenger_team_mission_establish_surface_outpost: "Oberflächenaußenposten errichten"
scavenger_team_mission_establish_surface_outpost_desc: "Unsere Stalker haben kürzlich eine gut verteidigbare Position entdeckt, die sich hervorragend als vorgeschobener Außenposten eignet. Lassen wir einige Ressourcen in dieses Vorhaben fließen. Dadurch werden routinemäßige Reisen an die Oberfläche deutlich erleichtert."

scavenge_has_surface_outpost_tt: "Erhöht das §GErfolgsgewicht§!, wenn unsere Stalker an der Oberfläche auf §OInteressante Orte§! stoßen."

launch_scavenging_poi_team_mission: "§OInteressanter-Ort§!-Expedition starten"
launch_scavenging_poi_team_mission_desc: "Die Geheimnisse der alten Welt liegen in greifbarer Nähe. Wir müssen den Moment nutzen, bevor er uns entgleitet."

active_scavenger_mission_poi_tt: "Ein weiteres Stalker-Team wird entsandt, um diesen entdeckten Ort zu untersuchen."

scavenger_team_mission_poi_countdown: "§OInteressanter-Ort§!-Einsatz"
scavenger_team_mission_poi_countdown_desc: "So nah ... Die Geheimnisse der alten Welt werden bald uns gehören."

