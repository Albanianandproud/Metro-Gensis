  RED_hero_of_the_revolution_desc:0 "Und Lenin war ein guter Anführer. Und alle anderen, so scheiße..."

  ### ANDREY ###

  RED_andrey_moskvin:0 "Andrey Moskvin"
  RED_ANDREY_MOSKVIN_DESC:0 "§9«Diese revolutionäre Zweckmäßigkeit ist immer noch eine abscheuliche Sache. Ich hasse Blutvergießen... aber um höhere Ziele zu erreichen...»§!\n\nEr erbt die Hartnäckigkeit und List von Iljitsch selbst, folgt dem gleichen Weg wie ein wahrer bolschewistischer Revolutionär und bringt eine Renaissance der kommunistischen Nostalgie auf die Rote Linie und anschließend auf die Metro selbst. Unter seiner ruhigen Hand und seiner eisernen Stirn entzündete sich die Flamme des Kommunismus und sorgte dafür, dass die Moskauer auf den Ruhm der russischen Vergangenheit blickten, um zu überleben und die Nöte der Gegenwart zu ertragen. Vom Proletariat energisch gefeiert; Ob aus echter Liebe zu seiner Herrschaft oder aus höflicher Verpflichtung durch den Lauf eines Gewehrs, Moskwin wird dafür sorgen, dass der standhafte Wille Lenins selbst noch nicht erstickt wird, bis auch der letzte Moskauer Luft holt."
 
  RED_andrey_war_support:0 "Symbol der Revolution"
  RED_andrey_stability:0 "Hardliner-Leninist"
  RED_champion_of_the_proletariat:0 "Vorkämpfer des Proletariats"
  RED_champion_of_the_party:0 "Held der Partei"
  RED_andrey_just_and_fair:0 "Gerechter Herrscher"
  
  ### MAXIM ### 

  RED_moskvin:0 "Maxim Moskvin"
  RED_moskvin_desc:0 "Ein ehemaliger §RRRoter Armee§! Offizier aus Russlands glorreicher, aber dennoch düsterer sozialistischer Vergangenheit. Er trat dem kurzlebigen §GMetrozentralkommando§! bei, vor seinem endgültigen Zerfall. Er begann seine politische Karriere nicht aus Pflichtgefühl, sondern dank seines ältesten Bruders §YAndrey§! - dem bevorzugten Sohn. §YAndreys§! Errungenschaften in der Bildung und der politischen Aufklärung der §RRRoten Linie§! hat Maxim mit einem bitteren Hass auf seinen erfolgreicheren Bruder zurückgelassen. Maxim wurde durch den natürlichen Charme und Intellekt seines Bruders und vor allem durch seinen Erfolg in den Schatten gestellt; Geliebt und respektiert von den Menschen der §RRoten Linie§!.\n\n§R.Sie können Maxim Moskvin nur durch Fokusse oder Ereignisse entfernen§!“"
  
