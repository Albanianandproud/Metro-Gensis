l_german:
 nf_hanza_satellite.1.t: "Menschen im Flug!"
 nf_hanza_satellite.1.d: "Während sich die Sturmwolken stetig verdunklen und die Metro in Ungewissheit hüllen, suchen viele Schutz; ganze Scharen erschöpfter Flüchtlinge – fest umklammernd, was an spärlichem Hab und Gut sie nur tragen konnten – ziehen sich endlos durch die Tunnel hin, die zu unseren Grenzen führen; ihre Gesichter gezeichnet von Erschöpfung und Angst..\n\nUnsere Grenzverwaltung ist von den Bitten um Einreise – dem Flehen um Schutz – schier überwältigt. Ein unidentifizierbares Problem, das so bald nicht verschwinden wird."
 nf_hanza_satellite.1.a: "Untätigkeit wird dazu führen, dass diese Krise wächst."
 nf_hanza_satellite.1.b: "Wir werden ihnen Asyl gewähren. Es ist das Humanste, was wir tun können."
 nf_hanza_satellite.1.b_tooltip: "Die Stationsordnung wird sicherlich zurückgehen – vielleicht ist dies auf lange Sicht sogar das Beste?"
 nf_hanza_satellite.2.t: "Flüchtlingszustrom"
 nf_hanza_satellite.2.d: "Mit jedem verstreichenden Monat schwillt das Rinnsal an Einwanderern zu einem unruhigen Strom an. Es sind Flüchtlinge – nicht bloß Versehrte oder jene, die dem Wehrdienst entfliehen, sondern ganze Familien: vertrieben, entmutigt und darauf bedacht, ihre verlorene Existenz wiederaufzubauen. In den tieferen Tunneln der Einwandererlager stehen Zelte, und Lagerfeuer leuchten hell, während unsere Behörden darum ringen, die Ordnung aufrechtzuerhalten."
 nf_hanza_satellite.2.a: "Sie dürfen eintreten, jedoch nicht an unserer Station verweilen. Sie müssen weiterziehen."
 nf_hanza_satellite.2.b: "Gewährt dem Verirrten vorübergehendes Asyl auf unserer Station."
 nf_hanza_satellite.2.c: "Gewährt ihnen die Staatsbürgerschaft, vorausgesetzt, sie verdienen ihren Lebensunterhalt."
 nf_hanza_satellite.3.t: "Verstärkte Sicherheit"
 nf_hanza_satellite.3.d: "Angesichts der derzeit abebbenden Einwanderungswellen – während sich unsere Verwaltung noch immer mit den Neuankömmlingen abmüht – haben sich unsere Sicherheitskräfte gründlich mit dem Dasein schäbiger Wachmänner vertraut gemacht. „Stell dich hierher“, „geh hinüber zu jener Schlange“ und „unterschreib das – oder gib dem Chef 20 Patronen“. Es scheint, als fänden unsere Sicherheitskräfte Gefallen an ihrer neuen Rolle."
 nf_hanza_satellite.3.a: "Das ist gut zu hören."

 nf_hanza_satellite.4.t: "[FROM.GetName] fordert Bewaffnungsshuttles an."
 nf_hanza_satellite.4.d: "Da es der Stationsverwaltung der [FROM.GetName] nicht gelungen ist, ausreichend Ausrüstung zur angemessenen Ausstattung ihrer Wache zu beschaffen, hat sie einen Gesandten entsandt, um bei der Hanse die Entsendung eines Rüstungsshuttles mit Infanterieausrüstung anzufordern."
 nf_hanza_satellite.4.a: "Alles für unsere treuen Untertanen der Hanzse."
 nf_hanza_satellite.4.b: "Nicht aus unserem eigenen Bestand, aber wir können die Kosten für die Ausrüstung sicherlich übernehmen."
 nf_hanza_satellite.4.c: "Wir würden sehr gerne, aber leider können wir im Moment nicht."

 nf_hanza_satellite.5.t: "[FROM.GetName] fordert Shuttles für Unterstützungsausrüstung an."
 nf_hanza_satellite.5.d: "Da es der Stationsverwaltung von [FROM.GetName] nicht gelungen ist, ausreichend Ausrüstung zur angemessenen Ausstattung ihrer Wache zu beschaffen, hat sie einen Gesandten entsandt, um bei der Hanse die Entsendung eines militärischen Shuttles mit Unterstützungsausrüstung anzufordern."
 nf_hanza_satellite.5.a: "Ja, natürlich – alles für die Mitglieder der Liga."
 nf_hanza_satellite.5.b: "Nicht aus unserem eigenen Bestand, aber wir können die Kosten für die Ausrüstung sicherlich übernehmen."
 nf_hanza_satellite.5.c: "Wir würden sehr gerne helfen – Sie werden jedoch auf alternative Bezugsquellen zurückgreifen müssen."

 nf_hanza_satellite.6.t: "[FROM.GetName] fordert freiwillige Reservisten an."
 nf_hanza_satellite.6.d: "Da es [FROM.GetName] an einsatzbereitem Personal mangelt, hat man uns eine dringende Nachricht gesandt, um uns um jegliche verfügbaren Truppen zu bitten, die wir zur Verstärkung ihrer dezimierten Garnison entbehren können. [FROM.GetName] fällt es zunehmend schwer, neue Kräfte ordnungsgemäß für die eigenen Streitkräfte zu rekrutieren."
 nf_hanza_satellite.6.a: "Wir können die zusätzlichen Soldaten für sie entbehren."
 nf_hanza_satellite.6.b: "Wir können die Mannstärke nicht entbehren; wir können jedoch Söldner für sie einstellen."
 nf_hanza_satellite.6.c: "Du wirst einfach ausreichen müssen. Wir können es uns nicht leisten, Soldaten abzuziehen."

 nf_hanza_satellite.7.t: "[FROM.GetName] bittet um Verteidigungsunterstützung"
 nf_hanza_satellite.7.d: "Da sie die Verteidigungsanlagen ihrer Station dringend überholen müssen, hat [FROM.GetName] die Hanse dazu gedrängt, sich um Unterstützung für die Stärkung ihrer Verteidigung zu bemühen. Wenn wir einige Patronen entbehren, können wir ihnen die notwendige Zuwendung gewähren, um ihre Verteidigung zu verbessern."
 nf_hanza_satellite.7.a: "Wir können einige Kugeln entbehren, um zu helfen."
 nf_hanza_satellite.7.b: "Leider können wir nicht helfen."

 nf_hanza_satellite.8.t: "[FROM.GetName] fordert Ausrüstungsunterstützung an."
 nf_hanza_satellite.8.d: "Da eine dringende Überholung der ausgerüsteten Geschütze und Waffen erforderlich ist, hat [FROM.GetName] die Hanse dazu gedrängt, sich für Unterstützung einzusetzen, um die eigenen Techniker zu verstärken. Indem wir einige Munitionseinheiten sowie einige unserer eigenen technischen Handbücher zur Verfügung stellen, könnten wir dazu beitragen, ihre militärische Infrastruktur wieder voll funktionsfähig zu machen."
 nf_hanza_satellite.8.a: "Wir können ihnen helfen."
 nf_hanza_satellite.8.b: "Leider können wir nicht helfen."

 nf_hanza_satellite.9.t: "[HNZ.GetName] verweigert die Hilfeleistung"
 nf_hanza_satellite.9.d: "Ob unser Gesuch um Entsendung eines Gesandten auf taube Ohren stieß oder schlicht ignoriert wurde – die Hanse hat sich geweigert, unserem Hilferuf Folge zu leisten. Vorerst werden wir wohl auf uns allein gestellt sein."
 nf_hanza_satellite.9.a: "Das ist bedauerlich."

 nf_hanza_satellite_trade.1.t: "[FROM.GetName] sendet Karawane"
 nf_hanza_satellite_trade.1.d: "Eine Karawane von [FROM.GetName] ist direkt vor unserer Haustür eingetroffen. Ganz gleich, ob wir von ihrem Kurs zu unserer Station wussten oder nicht – sie bieten eine Auswahl an Waren und Gütern direkt aus der Hanse an ... und das zu bemerkenswert günstigen Preisen."
 nf_hanza_satellite_trade.1.a: "Wir benötigen diese Waren"
 nf_hanza_satellite_trade.2.t: "[FROM.GetName] sendet Karawane"
 nf_hanza_satellite_trade.2.d: "Eine Karawane von [FROM.GetName] ist direkt vor unserer Tür eingetroffen. Unabhängig davon, ob wir von ihrem Kurs zu unserer Station wussten oder nicht, bieten sie eine umfangreiche, wenn auch eher oberflächliche Auswahl an Kleidung und diversen anderen Waren an – gewissermaßen ausrangierte Stücke der Hanse. Und das obendrein zu einem bemerkenswert niedrigen Preis."
 nf_hanza_satellite_trade.2.a: "Wir benötigen diese Waren"
 nf_hanza_satellite_trade.3.t: "[FROM.GetName] sendet Karawane"
 nf_hanza_satellite_trade.3.d: "Eine Karawane von [FROM.GetName] ist direkt vor unserer Tür eingetroffen. Unabhängig davon, ob wir von ihrem Kurs zu unserer Station wussten oder nicht, bieten sie eine umfangreiche, wenn auch eher oberflächliche Auswahl an Kleidung und diversen anderen Waren an – gewissermaßen ausrangierte Stücke der Hanse. Und das obendrein zu einem bemerkenswert niedrigen Preis."
 nf_hanza_satellite_trade.3.a: "Wir benötigen diese Waren"
 nf_hanza_satellite_trade.1.b: "Wenn ich es mir recht überlege: Nein, danke, wir brauchen nichts."      ## Intentional, only having 1 alt option
 nf_hanza_satellite_trade.4.t: "Mit leeren Händen zurückkehren"
 nf_hanza_satellite_trade.4.d: "Unsere Karawane ist zur [ROOT.Capital.GetName] zurückgekehrt. Leider kehren sie diesmal mit leeren Händen zurück. Kaum etwas von ihren Waren wurde verkauft. Angesichts der Kosten für die Bezahlung der Karawanenhelfer wird es unmöglich sein, mit diesem Unterfangen einen Gewinn zu erzielen."
 nf_hanza_satellite_trade.4.a: "Beim nächsten Mal mehr Glück."
 nf_hanza_satellite_puppet.1.t: "Schatten über der[ROOT.Capital.GetName]"
 nf_hanza_satellite_puppet.1.d: "Berichten zufolge ist es Elementen des organisierten Verbrechens gelungen, ihren Einfluss über die Händler auszuweiten, die unsere Station aufsuchen. Der Schmuggel von Drogen, der Ausbau zwielichtiger Schwarzmarktgeschäfte und die Machenschaften von Händlern illegaler Waren sind unserer Verwaltung zunehmend ein Dorn im Auge. Besonders besorgniserregend ist dabei, dass unsere örtlichen Sicherheitskräfte verdächtig bereitwillig kooperieren und die Ausbreitung dieser Netzwerke zulassen. Der offizielle Standpunkt der Hanse lautet, dass sämtliche Banditen gnadenlos eliminiert werden müssen – gut, dass wir technisch gesehen nicht zur Hanza gehören. Diese Banditen machen uns durchaus verlockende Angebote. Und mal ehrlich: Sie müssen es ja nicht erfahren, oder?"
 nf_hanza_satellite_puppet.1.a: "Mit Schlägertrupps gibt es keine Kompromisse. Gehen Sie hart gegen ihre Machenschaften vor."
 nf_hanza_satellite_puppet.1.b: "Vielleicht könnte ihre Hilfe nützlich sein."
 nf_hanza_satellite_puppet.2.t: "Das ist unser Ding"
 nf_hanza_satellite_puppet.2.d: "Selbst einflussreiche Gestalten aus diesen zwielichtigen Unterweltgruppierungen treten direkt an unsere Verwaltung heran und bieten „Hilfe“ bei unseren wachsenden Problemen an. Sie wollen ihre Schmuggelware ungehindert durch unsere Station schleusen – gegen einen Anteil am Gewinn – und dabei unter dem Radar der Hanse bleiben. Dass sich unsere Beamten so leicht mit der Aussicht auf Waren ködern lassen, ist höchst bedenklich ... Allerdings."
 nf_hanza_satellite_puppet.2.a: "Reich mir mal eine Flasche Scotch, ja?"
 nf_hanza_satellite_puppet.2.a.tt: "Die Hanse wird diese Maßnahme aufs Schärfste missbilligen."
 nf_hanza_satellite_puppet.2.b: "Wir werden keine Kompromisse bei unseren Prinzipien eingehen. Werft sie sofort raus!"
 nf_hanza_satellite_puppet.3.t: "Korruption in der [OKT.Capital.GetName]"
 nf_hanza_satellite_puppet.3.d: "Kürzlich aufgekommene Gerüchte haben sich zu einer Schlagzeile ausgeweitet: Investigative Berichte haben massive Korruption innerhalb der Station [406.GetName] aufgedeckt: Funktionäre ließen sich bestechen, zweigten Hanse-Gelder ab und kooperierten mit lokalen Tunnelbanden, die von illegalen Handelsrouten direkt durch das Hanse-Gebiet profitierten. \n\nUnsere Verwaltung ist empört; die Stationsfunktionäre des Commonwealth machen ihrem Unmut Luft und fordern Gerechtigkeit sowie eine Rechenschaftspflicht angesichts dieses moralischen Verfalls. Die Zeit für bloße Schadensbegrenzung ist vorbei – es müssen Taten folgen."
 nf_hanza_satellite_puppet.3.a: "Anfragen bringen nichts. Taten müssen sprechen."
 nf_hanza_satellite_puppet.3.b: "Unterdrücke die Berichte – wir können uns damit im Moment nicht befassen."
 nf_hanza_satellite_puppet.4.t: "Eine Station, die eines Königs würdig ist"
 nf_hanza_satellite_puppet.4.d: "Uns sind Berichte zu Ohren gekommen, wonach sich derzeit ein berüchtigter Bandit auf unserer Station aufhält. Dass unsere eigenen Sicherheitskräfte von seinem Ruf wussten und ihn dennoch durch die Sicherheitskontrolle schlüpfen ließen, ist an sich schon höchst bedenklich. Noch besorgniserregender ist jedoch, dass ein Großteil der Bewohner ihn kennt – und das aus gutem Grund. Angesichts seiner zahlreichen Bekanntschaften sowie der vielen Gefälligkeiten und Schulden, die ihn mit anderen verbinden, ist davon auszugehen, dass er nichts als Ärger mit sich bringen wird, sollte er länger hier bleiben."
 nf_hanza_satellite_puppet.4.a: "Er darf bleiben, vorausgesetzt, er hält seine Bar-Rechnung im Rahmen!"
 nf_hanza_satellite_puppet.4.b: "Wirf ihn raus."
 nf_hanza_satellite_puppet.5.t: "Iss nicht den gelben Schnee!"
 nf_hanza_satellite_puppet.5.d: "Ob es nun eine wirklich gute Ausrede ist, um vor der wachsenden Menge an Bewohnern zu fliehen, bei denen er Schulden hat, oder ein eigenartiger Akt des Altruismus – die Person, der wir vorübergehend Unterschlupf auf unserer Station gewährt haben, bietet ihre Dienste als echter Stalker an. Seine Dienste werden zweifellos nicht billig sein und mit zahlreichen Bedingungen einhergehen. Doch sie könnten sich als nützlich erweisen..."
 nf_hanza_satellite_puppet.5.a: "Sicher."
 nf_hanza_satellite_puppet.5.b: "Nein. Du reizt dein Glück aus, mein Junge."
