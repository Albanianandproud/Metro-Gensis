 RCH_april_fools_focus_1: "Pandora's Box"
 RCH_april_fools_focus_1_desc: "Heute wurde bei 0800 unter der Schillerowskaja eine seismische Störung festgestellt. Der Geheimdienst war sich sicher, dass es sich hierbei um einen neuen heimtückischen Trick der Kommunisten handelte, und evakuierte den Führer sofort, während er die Einheiten der Metromarcht in Bereitschaft schickte. Um 0930 wurde diese Störung mobil; sie bewegte sich mit besorgniserregender Geschwindigkeit auf die Oberfläche zu und hatte um 0932 in einer Explosion die Oberfläche durchbrochen. [Aufzeichnungen aus diesem Zeitraum wurden geschwärzt] Bis [geschwärzt] wurde die anwesende Metromarcht-Einheit neutralisiert. Um 10:21 Uhr gab sich das als Sigismund bekannte Wesen als Führer bekannt, nachdem der Kontakt mit dem Wagen des vorherigen Führers zwischen den Tunneln Schillerowskaja und Wagnerowskaja verloren gegangen war. „Was zum Teufel? Dann ist das jetzt wohl so.“ -Wolkow bei der Annahme der neuen Regierung. „Ich bin mir ziemlich sicher, dass es kommunistische Außerirdische oder so etwas sind“ – Unbekanntes Mitglied des Ahnenerbes."

 RCH_april_fools_focus_2: "Neuer Führer"
 RCH_april_fools_focus_2_desc: "Während das Vierte Reich noch damit kämpfte, zu verstehen, was gerade geschehen war, hatte der neue Führer gerade eine Pflichtrede angekündigt, bei der er entweder persönlich anwesend sein oder die Sendung übertragen musste, wenn er nicht in der Lage war, persönlich dabei zu sein. Während der Rede übte Sigismund etwas aus, was spätere Schriftgelehrte nur so beschreiben konnten: „Aryan as Fuck“-Energie. Unnötig zu erwähnen, dass Sigismunds Herrschaft nach dieser legendären Machtdemonstration unbestritten ist, und Ahnenerbe-Kultanhänger prophezeiten schnell, dass Sigismund das Wesen aus Agartha war, das ausgesandt wurde, um die arischen Völker zu wahrer Größe zu erheben, und die SS sich bald darauf zu ihrer Unterstützung zusammenschloss und später an diesem Tag auch die Metromacht das Handtuch warf."

 RCH_april_fools_focus_3a: "Pandora's Box two, electric Boogaloo"
 RCH_april_fools_focus_3a_desc: "Trotz Sigismunds Erfolgen in so kurzer Zeit war er oft einsam, da er das einzige humanoide Wesen ist, das in allen Metro-Stationen völlig fremd blieb. Durch Methoden, die man nur als „unfassbaren Schrecken“ bezeichnen kann und über die nicht einmal die Gestapo Einblick gewinnen konnte, schien unser Führer nun einige neue Freunde gewonnen zu haben."

 RCH_april_fools_focus_3b: "Totale industrielle Mobilisierung"
 RCH_april_fools_focus_3b_desc: "Um Sigismunds Ambitionen rechtzeitig zu erfüllen, hatte der Führer verlangt, dass eine ausreichende Menge an militärischen Produktionskapazitäten aufgebaut werden müsse, damit, und ich zitiere: „Wir endlich Meta-Divisionen einsetzen können“. Das Reich wird nun alles Nötige unternehmen, um diese neuen Divisionen auszurüsten. Während wir hier sprechen, wird die letzte Toilettenpapierwerkstatt auf die Massenproduktion von Bastardwaffen umgerüstet, viele andere „nicht unbedingt notwendige“ Produktionen werden bald folgen."

 RCH_april_fools_focus_3c: "Pandora's Box three, Electri boogalee"
 RCH_april_fools_focus_3c_desc: "Die ersten Neuankömmlinge scheinen sich inzwischen in der Metromacht-Armee etabliert zu haben, und obwohl einige Dissidenten bezweifelten, dass es wirklich „arisch“ sei, von dieser „Anime-Mädchen“-Einheit angeführt zu werden, wurden diese kritischen Stimmen nun endgültig zum Schweigen gebracht. Um ihre Position weiter zu festigen, wird Sigismund das [Geschwärzte] noch einmal öffnen, um kompetentere Hilfe für seine Herrschaft zu gewinnen."

 RCH_april_fools_focus_4: "Operation Fall Rot"
 RCH_april_fools_focus_4_desc: "Unser Führer entschied, dass es jetzt an der Zeit sei und erklärte der roten Bedrohung im Osten den totalen Krieg. Dank der glorreichen Führung unseres großen Führers steht ihre Ausrottung nun unmittelbar bevor. Während wir hier sprechen, beeilen sich die neugerüsteten Werkstätten, unsere Soldaten mit den besten Waffen zu versorgen, die die Menschheit seit dem großen Krieg je gesehn hat, und die neu eingesetzten Generäle versammeln die Metromarcht an den Grenzen zu einer großen Schlacht, um den Sieg zu erringen und diesem viel zu lange andauernden Kampf endlich ein Ende zu setzen."

 RCH_april_fools_focus_4a: "AKTIVIERE ARISCHEN GEIST VRIL"
 RCH_april_fools_focus_4a_desc: "Jeder Arier muss nun seinen inneren hyperboreanischen Geist entfesseln. Wenn wir die Welt umgestalten wollen, dann müssen auch Sie spüren, wie ihre nordische Kraft in ihnen aufkocht. Wieso? Weil der Führer es befiehlt!"

 RCH_april_fools_focus_4aa: "Masse des Jahrhunderts"
 RCH_april_fools_focus_4aa_desc: "Wir haben von einer anderen Person erfahren, die den wahren VRIL-Geist besitzt. Weit entfernt von der inneren Metro lebt dieses Individuum nördlich der Konföderation von 1905. Sigismund ist beharrlich auf der Suche nach dieser Figur."

 RCH_april_fools_focus_4b: "WIE BEWEGE ICH DIE SCHWARZE SONNE?"
 RCH_april_fools_focus_4b_desc: "Unser Propagandaministerium ist dabei, die neue Rhetorik unseres Führers in die Tat umzusetzen. Plakate, Flugblätter und Broschüren werden unserer Bevölkerung zum Lesen ausgehändigt. Allerdings gibt es ein Problem, das unseren Dienst behindert. Wie genau bringen wir die Sonne dazu, sich zu bewegen und so zu flackern, wie in diesen lustigen Tik-Tok-Edits??"

 RCH_april_fools_focus_4ba: "My little Dark Age-Edit"
 RCH_april_fools_focus_4ba_desc: "Nach peinlich langer Zeit ist es uns endlich gelungen, das Propagandaministerium dazu zu bringen, das Symbol auf unsere Broschüren zu schablonieren. EVROPA ist wach – Trye Arier haben keine Schlafenszeiten, Mama."

 RCH_april_fools_focus_5a: "Aryan as fuck"
 RCH_april_fools_focus_5a_desc: "Nachdem Sigismund und seine Mannschaft nun genug Zeit hatten, sich zu etablieren und sich an ihr neues Leben zu gewöhnen, wobei sie nur leichte Probleme hatten, den Überfluss an Pilzen in ihrer Ernährung zu überwinden, ist es an der Zeit, der Welt ihre wahren Kräfte zu offenbaren. Warum haben sie das nicht gleich zu Beginn gemacht? Halts Maul, deshalb."

 RCH_april_fools_focus_5b: "Die neue Metromacht"
 RCH_april_fools_focus_5b_desc: "Da diese mongolischen Malermädchen bereits die Verwaltung und die Institution des Reiches leiten, als Führer fungieren und das militärische Kommando übernommen haben, könnte Sigismund genauso gut eine eigene Armee mit ihnen aufstellen. Was hält ihn schließlich davon ab? Das Raum-Zeit-Kontinuum? In anderen Nachrichten: Metromacht- und SS-Offiziere in Trümmern bei der Nachricht ihrer Ablösung."

 RCH_april_fools_focus_5c: "Wie kann ich den Fokus über den Text lenken??"
 RCH_april_fools_focus_5c_desc: "Leute, bitte helft mir, ich bin neu bei Hoi4. Okay, ich brauche Hilfe für meine TNO-Submod."

 RCH_april_fools_focus_5d: "Hier Titel einfügen"
 RCH_april_fools_focus_5d_desc: "Hier Text einfügen, bitte bitte bitte"

 RCH_april_fools_focus_6: "Unmenschliche Ausdauer"
 RCH_april_fools_focus_6_desc: "Schon bei der ersten Machtübernahme des Reiches fielen die unterschiedlichen Stärken und körperlichen Merkmale dieser mysteriösen Wesen aus einer anderen Welt auf; Sie verfügten über ein ungewöhnliches Maß an Widerstandsfähigkeit gegen Körperverletzung, was ihnen im Kampf enorme Vorteile verschaffte, dies jedoch angeblich nur bei bestimmten Personen und in unterschiedlichem Ausmaß. Unbestimmte Quellen bezeichnen diese Fähigkeit als etwas, das als „Plot-Armor“ bekannt ist; Woraus genau diese Rüstung besteht, ist wohl eine Frage des Alters. "

 RCH_april_fools_focus_6b: "Billions must listen"
 RCH_april_fools_focus_6b_desc: "Millionen, ach was, Milliarden müssen zuhören, selbst wenn es nicht einmal eine Milliarden Menschen mehr auf dem Planeten gibt. Steinhauser startet einen Podcast mithilfe eines reparierten Amateurfunkgeräts. Was auch immer ein Podcast sein mag – unser Führer ist offenbar fest entschlossen, den Rest der Metro an seinen Worten teilhaben zu lassen."

 RCH_april_fools_focus_6a: "RCH_finish_this_focus_later"
 RCH_april_fools_focus_6a_desc: "Igor, denk daran, die Lokalisierung und die Effekte für den Fokus abzuschließen, bevor wir das Update veröffentlichen.\n\n\nAch, verdammt, scheiß drauf. Ist ja nicht so, als würden wir uns bei der Scheiße groß anstrengen."

 RCH_april_fools_focus_7: "Operation Fall Südwesten"
 RCH_april_fools_focus_7_desc: "Während Miller zu viel "300" gesehen hat und nun glaubt einen Trupp von leicht-bekleideten Elitekriegern zu kommenadieren, werden wir ihm zeigen, dass Zack Snyder-Filme und nicht vorhandene Rüstungen wenig zählen, wenn man im Verhältnis 15 zu 1 unterlegen ist. Außerdem sind auch wir ideologisch absolut gefestigt. Was die Polis betrifft: Sie wird das Prunkstück des neuen Reiches sein, das sich bald formieren wird. „Sind die Griechen oder so? Die machen beschissenen Joghurt.“ – Sigismund, als sie (er?) nach ihrer (seiner?) Haltung zur Polis gefragt wurde. "

 RCH_april_fools_focus_7b: "Große Belagerung"
 RCH_april_fools_focus_7b_desc: "Wir sind uns nicht sicher, wie er es geschafft hat, durch das Portal zu passen, aber sein Eifer, den Führer zu unterstützen, ist unbestritten. Wir sollten ihn sinnvoll einsetzen, bevor er unsere gesamten Pilzvorräte verschlingt."

 RCH_april_fools_focus_7a: "Scheiß drauf, gemeinsamer Kampf."
 RCH_april_fools_focus_7a_desc: "Eine Solidarität.\n\n\n\n\n\n\n\nBitte helfen Sie mir."

 RCH_april_fools_focus_8a: "Das Jelwl- Jewul- ... verdammt, wie schreibt man das?"
 RCH_april_fools_focus_8a_desc: "Während der letzte Widerstand in Polis allmählich erlischt, zeichnet sich unmissverständlich ab, dass Sigismund bald alle Stationen vereinen wird – und dass es in dieser neuen Zukunft nur zwei Möglichkeiten gibt: den Tod oder den Anschluss an ihre Reihen. Die vernünftigen Bewohner der Polis werden gewiss die vernünftige Entscheidung treffen. Je nach Stimmung der Führerin könnten zudem Pläne zur Verlegung der Hauptstadt in das ehemalige Zentrum von Polis in die Tat umgesetzt werden, um sich eine beherrschende Stellung im Herzen der Metro-Stationen zu sichern. "

 RCH_april_fools_focus_8b: "Die gezähmten Spartaner"
 RCH_april_fools_focus_8b_desc: "Angesichts des erwarteten Sieges über die Sparta-Stationen ist das Vertrauen in Sigismunds Führung auf einem historischen Höchststand, da eine derart rasche Abfolge von Siegen bislang beispiellos war. Unabhängig davon scheinen im gesamten Reich – bis hinein in die neuen Gebiete – neue Kulte entstanden zu sein, die Sigismund verehren und sie als eine Art „Übermenschen-Waifu“ stilisieren; dies beschleunigt den Integrationsprozess erheblich. Dissidenten bezeichnen diese Anhänger zwar als „Weebs“, doch dürften sie inzwischen allesamt durch Erschießungskommandos hingerichtet worden sein – wegen Verleumdung des Führers. "

  RCH_april_fools_focus_8d: "Kleiner Knitler"
  RCH_april_fools_focus_8d_desc: "Ein Kind des Reiches hat eine kleine Figur des großen AH gestrickt. Ist er nicht niedlich? Ist er nicht allerliebst?\n\n\nAlter, das ist buchstäblich nur ein Fokus-Effekt, der aus dem Standard-Baum geklaut wurde. Dieses Aprilscherz-Update ist mies."

 RCH_april_fools_focus_8c: "Eigenartiges Geschöpf"
 RCH_april_fools_focus_8c_desc: "Ich habe keine Lust, eine Beschreibung zu schreiben. Also hier: irgendein völlig überpowerter Scheiß."

 RCH_april_fools_focus_9: "Pax Germanica"
 RCH_april_fools_focus_9_desc: "Mit der Niederlage der kommunistischen „Roten Linie“, Spartas und der Polis steht nur noch ein letzter Sieg über die Hanse aus. Dieser wird die unangefochtene Stellung des Reiches als vorherrschende Macht und künftiger Einiger der Metro festigen und eine Ära des Friedens einläuten, wie sie die Metro noch nie zuvor erlebt hat. All dies ist unserem Kriegsherrn zu verdanken: Führer Sigismund!"

 RCH_april_fools_focus_10: "Agartha entdeckt"
 RCH_april_fools_focus_10_desc: "'Hier läuft pausenlos Musik, Echt jetzt.' -t. Anon"

