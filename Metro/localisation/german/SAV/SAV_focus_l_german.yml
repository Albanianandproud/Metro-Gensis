l_german:
 SAV_focus_joint_station_committee: "Ausschuss unabhängiger Stationen"
 SAV_focus_joint_station_committee_desc: "Die 15 Jahre seit der Gründung der Savyolovskaya-Allianz waren – gelinde gesagt – turbulent. Die Verbindung zu Mendeleyevskaya wurde gekappt, und die Station befindet sich nun im Besitz der perfiden Hanse. Doch mit der jüngsten Wiederbesiedlung von Dimitrovskaya stehen die Zeichen wieder auf Besserung."
 SAV_focus_joint_station_committee_tooltip: "\nDieser Fokus ermöglicht eine Reihe zeitlich begrenzter Entscheidungen in unserem „Machtgleichgewicht“-Fenster. Diese zeitlich begrenzten Entscheidungen müssen abgeschlossen werden, bevor die jeweiligen Timer ablaufen.\n\nEs wäre vielleicht besser, sich darauf zu konzentrieren, einige wenige Entscheidungen zum Abschluss zu bringen, anstatt zu versuchen, alle auf einmal zu erledigen und unsere Kräfte zu verzetteln."
 SAV_focus_kindle_an_identity: "Eine Identität entfachen."
 SAV_focus_kindle_an_identity_desc: "Das vielleicht größte Problem für das Überleben der Allianz ist zugleich ihre größte Stärke und Schwäche. Sie ist erbittert unabhängig angesichts des zunehmenden Vordringens der Hanse – und nun auch der Nazis aus der Twerskaja. Es handelt sich um zwei unabhängige Stationen mit völlig eigenständigen Identitäten und Weltanschauungen. Es bedarf gemeinsamer Anstrengungen, um unsere Ansichten und Ziele aufeinander abzustimmen."
 SAV_focus_kindle_an_identity_tt: "Dieser Fokus-Zweig wird unsere Rate der Stationszentralisierung verbessern, solange wir den  §YIdentitätsbildung§! Nationalgeist besitzen."
 SAV_focus_trubnaya_exert_influence: "Einfluss auf die Trubnaja ausüben"
 SAV_focus_trubnaya_exert_influence_desc: "Die Trubnaja ist eine weitere Station, die in einer Zwickmühle steckt; sie befindet sich in einer prekären Lage zwischen den Fronten und der „Roten Linie“ – einer Fraktion, die zutiefst paranoid und zugleich stets von aggressivem Chauvinismus geprägt ist. Vielleicht ließen sie sich ja überzeugen, sich uns anzuschließen, um ihre Unabhängigkeit zu wahren?"
 SAV_has_chosen_leader: "Hat einen Anführer gewählt"
 SAV_focus_colonize_east_wings: "Kolonisieren Sie die Linie Lyublinsko-Dmitrovskaya"
 SAV_focus_colonize_east_wings_desc: "Der nördliche Abschnitt der Ljublinsko-Dimitrowskaja-Linie liegt verwaist da und ist reif für unsere Besiedlungsbemühungen."
 SAV_is_unified_tooltip: "In der Savyolovskaya besteht derzeit keine Gefahr einer Zersplitterung."
 SAV_focus_consolidation_1: "Bringen Sie lokale Selbstverwaltung zur Dimitrowskaja."
 SAV_focus_consolidation_1_desc: "Nach der kürzlichen Besiedlung patrouillieren unsere Trupps vorsichtig in den Tunneln rund um Dimitrowskaja; dabei achten sie darauf, nicht weiter als 70 Meter in Richtung der Timirjasewskaja vorzudringen. Da das Gebiet frei von Mutanten ist und auch der Rattenbefall nur gering ausfällt, ist es womöglich an der Zeit, Bürgern die Ansiedlung in der Station zu gestatten."
 SAV_focus_consolidation_2: "Recht und Ordnung am Tsvetnoy Boulevard."
 SAV_focus_consolidation_2_desc: "Schon vor dem Krieg schien auf dem Tsvetnoy-Boulevard ein Zustand ständiger Gesetzlosigkeit und Verwahrlosung zu herrschen. Die gesamte Station wurde in ein Bordell, ein Spielhaus und eine Kneipe verwandelt, in denen sich allerlei zwielichtiges Gesindel tummelt. Die eigentlichen Machthaber reichen von Zuhältern bis hin zu jenen, die bei der auf ewig verschuldeten Bevölkerung genügend Schuldscheine angehäuft haben. Der derzeitige Anführer, ein Gangster namens Abramov, zeigt sich unserer Allianz gegenüber durchaus kooperativ – solange wir bei den Ausschweifungen, die in seinem Herrschaftsbereich stattfinden, ein Auge zudrücken."
 SAV_focus_broker_administration: "Broker-Einheit"
 SAV_focus_broker_administration_desc: "Selbst die Anführer und Aushängeschilder der Savyolovskaya zögern und murren oft über die Hilfspakete, die an den Tsvetnoy Boulevard und nach Dimitrovskaya geschickt werden. Doch sie müssen bald einsehen, dass wir mehr sind als die bloße Summe unserer Einzelteile."
 SAV_focus_screams_from_timiryazevskaya: "Schreie aus der Timirjasewskaja"
 SAV_focus_screams_from_timiryazevskaya_desc: "Die wenigen Familien, die auf der Station Dimitrowskaja Fuß fassen und sich dort eine neue Existenz aufbauen wollen, drängen sich dicht um die wenigen verbliebenen Feuer in Ölfässern – weit entfernt, am anderen Ende der Station. Sie schwören, tief in den Tunneln Richtung Timirjasewskaja wirres Geschrei und unverständliche Sprechchöre hören zu können. Unsere eigenen Soldaten scheuen sich davor, sich auch nur ein Stück weit über die Stationsausgänge hinauszuwagen. Was auch immer – oder wer auch immer – diese Geräusche verursacht: Sie werden von Woche zu Woche lauter."
 SAV_satanist_country_flag: "Die Bewohner von Dimitrowskaja sind in Not."
 SAV_focus_timiryazevskaya_lockdown: "Am Fuße des Wahnsinns"
 SAV_focus_timiryazevskaya_lockdown_desc: "Timirjasewskaja ist bewohnt; die schlurfenden Rufe weniger sind mittlerweile zu einer verstörenden Kakophonie aus Dutzenden – wenn nicht mehr – Stimmen angeschwollen. Blutige Fußspuren zeugen von der wachsenden Angst, dass Timirjasewskaja bewohnt ist, und selbst die größten Skeptiker unter unseren Wachen sind als geistig umnachtete Wracks aus den Tunneln zurückgekehrt und schwören, dass ein unheimliches Licht aus jener verfluchten Station dringt."
 SAV_focus_saint_nor_sinner_left: "Vertreibe die Dunkelheit"
 SAV_focus_saint_nor_sinner_left_desc: "Nach dem Verschwinden von mehr als einem Dutzend unserer Leute ist in der gesamten Allianz ein Sturm der Wut entbrannt. Scharen von Männern versammeln sich an der Station Dimitrowskaja – so gut wie jeder wehrfähige Mann der Allianz ist dort. Fackeln sowie das Schimmern von Gewehren und Hämmern sind zu sehen. Die Sprechchöre aus der Station Timirjasewskaja schwollen immer weiter an, und selbst von hier aus war der unheimliche Schein der dahinterliegenden Station zu erkennen – fast so, als würde man dem bevorstehenden Blutbad bereits entgegenfiebern."
 SAV_satanist_disappearance_country_flag: "Es ist zu Entführungen an der Dimitrowskaja gekommen."
 SAV_focus_convene_upon_dire_times: "Auf den unheilvollen Fluten"
 SAV_focus_convene_upon_dire_times_desc: "Die Allianz hat Bestand – vielleicht nicht auf dem solidesten Fundament, aber sie hat dennoch standgehalten. Doch am Horizont scheinen sich Probleme abzuzeichnen, die weit über bloße politische Streitigkeiten oder Korruption hinausgehen."
 SAV_focus_imperishable_alliance: "Unvergängliches Bündnis"
 SAV_focus_imperishable_alliance_desc: "Trotz aller Härten und Herausforderungen hat die Allianz die Bewährungsprobe der Zeit bestanden. Auch wenn wir nicht mit Gewissheit wissen, was die Zukunft – so gleichgültig sie auch sein mag – bereithält, können wir zumindest aufatmen in der Gewissheit, dass die Allianz vorerst fest zu ihren Prinzipien steht und ihr Volk unserem Regime treu bleibt."
 SAV_focus_steady_hand_and_guidance: "Sichere Hand und Führung"
 SAV_focus_steady_hand_and_guidance_desc: "Wassjurkow hat seine Hand offenbart, und seinen eisernen Griff. Er hat bewiesen, dass er in der Lage ist, die Allianz voranzubringen."
 SAV_focus_change_of_leadership: "Führungswechsel"
 SAV_focus_change_of_leadership_desc: "Wassjurkow hat seine Absichten offenbart und gezeigt, dass er nicht bereit ist, die Allianz voranzubringen. Soll dieses Experiment Früchte tragen, muss eine neue Führungskraft das Ruder übernehmen."
 SAV_focus_change_of_leadership_tt: "Die Allianz könnte negativ auf den erneuten Führungswechsel reagieren."
 SAV_leadership_doubt_country_flag: "Es wurde die Frage nach der Führung gestellt"
 SAV_focus_wary_of_the_hanza: "Misstrauisch gegenüber der Hanse"
 SAV_focus_wary_of_the_hanza_desc: "Es ist nach wie vor am besten, der Hanse mit derselben Ambivalenz zu begegnen, die sie uns entgegenbringt. Sich als Verbündeter auf die Hanse zu verlassen, ist ein schwerwiegender Fehler, wie sich immer wieder gezeigt hat."
 SAV_focus_cordiality_diplomacy: "Herzliche Diplomatie"
 SAV_focus_cordiality_diplomacy_desc: "Die Allianz ist nicht in der Lage, weitreichende Entscheidungen zu treffen oder bedeutende politische Schritte gegenüber dem übrigen Metro-Gebiet zu unternehmen. Viele Stationen halten unsere Allianz für nichts weiter als ein Täuschungsmanöver. Wenn wir das Bild einer festen Allianz vermitteln wollen, müssen unsere beiden Stationen als Einheit handeln."
 SAV_focus_joint_station_committee6: "Savyolovskaya Prosper"
 SAV_focus_joint_station_committee6_desc: "Schweinezucht und Pilzanbau haben den Bürgern von Sawjolowskaja einen gewissen Wohlstand beschert. Vielleicht trägt dazu auch der Umstand bei, dass die Verwaltung in umfunktionierten Überresten alter U-Bahn-Wagen untergebracht ist – Räumlichkeiten, die sich zu florierenden Büros und Tagungsorten für die Verwaltung entwickelt haben."
 SAV_focus_joint_station_committee7: "Die Grenze der Zivilisation"
 SAV_focus_joint_station_committee7_desc: "Die Station – bisweilen, und womöglich nicht zu Unrecht, als „nördliche Grenze der Zivilisation“ bezeichnet – wird von weit her kommenden Handelskarawanen so gut wie nie aufgesucht. Und wer dies dennoch tut, der eilt stets hastig wieder von dannen. Anders verhält es sich jedoch mit den Exportkaufleuten; wenngleich es sich noch um eine kleine Gruppe handelt, so wächst dieser Stand doch stetig und entwickelt sich zu einer lebendigen Gemeinschaft. Bald schon werden ihre Waren Begehrlichkeiten wecken und die Blicke vermehrt auf diese kleine nördliche Bastion lenken."
 SAV_focus_joint_station_committee8: "In den Seilen"
 SAV_focus_joint_station_committee8_desc: "Angesichts zweier gleichermaßen unerwünschter Nachbarn können wir entweder untergehen oder versuchen, mit dem Wenigen auszukommen, das wir haben."
 SAV_focus_joint_station_committee9: "Kriegsproduktion im Notfall"
 SAV_focus_joint_station_committee9_desc: "Wir müssen bereit sein, einen gewaltigen Kampf um den Erhalt unserer Lebensweise zu führen – andernfalls laufen wir Gefahr, unter die Knute von Tyrannen zu geraten oder auf dem Müllhaufen der Geschichte zu landen."
 SAV_focus_defense: "Guerilla-Taktiken"
 SAV_focus_defense_desc: "Wir werden nicht still und leise abtreten; wie grimmige Bären werden wir jeden Meter unserer Nation verteidigen. Bis zum letzten Mann."
 SAV_focus_defense2: "Zwangsrekrutierungskampagnen"
 SAV_focus_defense2_desc: "Falls nötig, müssen wir körperlich fähige Personen zum Militärdienst verpflichten. Auch wenn dies ein umstrittenes Thema bleibt, das in der Bevölkerung leicht auf Ablehnung stoßen dürfte, ist es ein notwendiges Übel, das wir umsetzen müssen."
 SAV_administrative_centralized: "Zentralisieren Sie die Verwaltung."
 SAV_administrative_centralized_desc: "Es müssen größere Anstrengungen unternommen werden, um die lokale Verwaltung mit unserer eigenen zu verflechten."
 SAV_a_new_power_rises: "Eine neue Macht erhebt sich"
 SAV_a_new_power_rises_desc: ""
 SAV_flamethrower_experts: "Flammenwerfer-Experten"
 SAV_flamethrower_experts_desc: "Von Savyolovskaya aus kamen die ersten selbstgebauten Flammenwerfer zum Einsatz – mit erschreckender Wirkung. Die Waffenschmiede, die diese Waffen fertigten, sind längst verschwunden oder in den vergangenen Jahren ums Leben gekommen; doch einer von ihnen lebt noch immer auf unserer Station. Vielleicht lässt er sich überreden, uns noch einmal zu unterstützen."
 SAV_ratmen_menace: "Die Bedrohung durch die Rattenmenschen"
 SAV_ratmen_menace_desc: "Da Timirjasewskaja nun unter unserer Kontrolle steht, können wir uns keine weiteren Katastrophen leisten. Wir müssen als Erste die Initiative ergreifen. Ob Rattenmenschen oder Mutanten – wer auch immer in den nördlichen Tunneln lauert, muss aufgespürt und vertrieben werden.."
 SAV_fascist_menace: "Das faschistischen Schweine"
 SAV_fascist_menace_desc: "Die Faschisten des Reiches waren uns stets ein Dorn im Auge – doch nun hat sich das Blatt gewendet. Wir werden den Kampf zu ihrem Volk, in ihr Land und in ihr Blut tragen."
 SAV_if_community_leader_tt: "§YFalls Wasjurkow oder Resnizyn bei Sawjolowskaja in Führung liegen:§!"
 SAV_if_council_leader_tt: "§YWenn Makharadze Savyolovskaya führt:§!"
 SAV_if_oligarch_leader_tt: "§YWenn Ishchuk Savyolovskaya führt:§!"