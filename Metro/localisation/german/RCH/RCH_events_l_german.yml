l_german:
 nf_RCH.1:0 "Stalags des Reichs"
 nf_RCH.1.t:0 "Mutanten-Arbeit"
 nf_RCH.1.d:0 "Eigentlich verdienen diese Mutanten nicht einmal die süße Erlösung des Todes, stattdessen könnten wir sie doch ganz nach unseren Wünschen zur Arbeit einsetzen. Somit könnten wir weitere menschliche Arbeitskräfte für unsere Streitkräfte abziehen ..."
 nf_RCH.1.a:0 "Sie werden unsere Tunnels ausbauen"
 nf_RCH.1.b:0 "Sie werden für uns Waffen bauen"

 nf_RCH.2.t:0 "Die Ulitsa-Konföderation kapituliert!"
 nf_RCH.2.d:0 "Die Konföderation hat sich nach ihren Niederlagen dazu entschlossen, zu kapitulieren. Sie treten ihren inneren Teil der Metro an uns ab und ein Waffenstillstand tritt sofort in Kraft. Damit erhalten wir größere Kontrolle über den inneren Kreis der Metro."
 nf_RCH.2.a:0 "Ein großer Tag für das Reich!"
 
 nf_RCH.4.t:0 "Die Dimitrovskaya-Allianz hat kapituliert!"
 nf_RCH.4.d:0 "Einflussreiche Persönlichkeiten der Dimitrovskaya-Allianz haben heute ihre Kapitulation angekündigt. Sie werden das gesamte von uns besetzte Territorium an uns abtreten und gleichzeitig einem dauerhaften Friedensabkommen zustimmen. Dadurch haben wir nun eine bessere Kontrolle über das Zentrum der Metro."
 nf_RCH.4.a:0 "Ein großer Tag für das Reich!"

 nf_RCH.6:0 "Faschistische Unterwanderung"
 nf_RCH.6.t:0 "Faschisten vor unseren Toren"
 nf_RCH.6.d:0 "Mehr als nur die Mutanten lauern in unseren Tunneln. Stalker des Reiches sind gesichtet worden und den Berichten zufolge kommen sie näher. Wir müssen uns zum Kampf bereit machen, oder versuchen mit ihnen zu verhandeln."
 
 nf_RCH.6.a:0 "Despite best efforts, our forces were unmatched!"
 nf_RCH.6.b:0 "Somehow, for whatever reason, the Hole showed hospitality to the Stalkers, who were grateful"
 nf_RCH.6.c:0 "The Reich Hit-teams, with pure grit and determination, were fought off by our militia"

 nf_RCH.7.t:0 "Karawane aus Venedig"
 nf_RCH.7.d:0 "Das Reich verhält sich gegenüber Außenstehenden oft distanziert, insbesondere gegenüber den Mutanten, von denen es in der Metro nur so wimmelt. Venedig hat sich jedoch in unserer Notlage als nützlicher Kontakt erwiesen: Sie stellen uns dringend benötigte Ressourcen zur Verfügung und versuchen im Gegenzug, einen Teil unseres militärischen Wissens zu erlernen. Wir bezweifeln jedoch, dass dieser mutierte Abschaum je begreifen wird, wie man ein Gewehr richtig abfeuert, geschweige denn, wie man es richtig sauber hält."
 nf_RCH.7.a:0 "Diese Güter können wir gut gebrauchen."

 nf_RCH.8.t:0 "Entdeckung eines Luftschachtes"
 nf_RCH.8.d:0 "Wir haben einen bisher unbekannten Lüftungsschacht nahe der Twerskaya entdeckt."
 nf_RCH.8.a:0 "Ok?"

 nf_RCH.9.t:0 "Die Frage externer Rekrutierung"
 nf_RCH.9.d:0 ""
 nf_RCH.9.a:0 "Dies gewinnt uns den Krieg, also macht es"
 nf_RCH.9.b:0 "Nur eine Handvoll..."
 nf_RCH.9.c:0 "Das Reich duldet keine Mutanten oder sonstige Außenseiter"

 nf_RCH.10.t:0 "Der Abschaum der Mayakovskaya"
 nf_RCH.10.d:0 "Die Mayakovskaya liegt nicht weit von unseren Hauptstationen, dennoch wissen wir fast nichts über die Bedingungen dort. Wir wissen jedoch, dass die Station als Absteige der gesamten Metro benutzt wird, jene die nirgendwoanders hinkönnen, gehen an die Mayakovskaya. Was wird uns dort erwarten, wenn wir unsere Soldaten entsenden?"
 nf_RCH.10.a:0 "Die Station ist voll von degeneriertem Abschaum. Zu den Waffen, schnell!"
 nf_RCH.10.b:0 "Als unsere Soldaten die Station erreichten, da war sie bereits leer."

 nf_RCH.11.t:0 "Die Verstoßenen"
 nf_RCH.11.d:0 "Nun da unsere Autorität innerhalb des Reiches gesichtert ist, ist es jetzt an der Zeit, unsere Macht nach außen zu projizieren. Überall um uns herum lauern Feinde; Mutanten, Banditen und Schlimmeres: Kommunisten. Uns bleiben jedoch einige wertvolle Verbündete, so wie Stortbeker und seine zusammengewürfelte Miliz. Vor vielen Jahren wurde er wegen seiner Rücksichtslosigkeit und seines extremen Sadismus aus dem Reiches verbannt. In der Zeit seit seinem hat er seine eigene treue Gruppe anderer Verbannter oder Fanatiker zusammengestellt und bis zum heutigen Tage überlebt.\nStortbeker gilt als fähiger Befehlshaber und gerissener Anführer, der dem Führer sogar im Exil die Treue hielt. Wir wissen, dass er seit seiner Vertreibung aus dem Reich vor einigen Jahren in die südliche Metro geflohen ist, und dort Jagd auf Mutantenkarawanen macht und kommunistische Aktivitäten vereitelt. Die Frage ist, ob wir bereit sind ihn wieder in unsere Reihen aufzunehmen?"
 nf_RCH.11.a:0 "Stortbeker hat, trotz seiner Praktiken, noch immer Wert für uns."
 nf_RCH.11.b:0 "Gerüchte hin oder her, er wurde nicht ohne Grund verbannt..."
 nf_RCH.11.c: "Wir sterben wie die alten Piraten, heute trinken wir, morgen sterben wir!"
 nf_RCH.11.c.tt: "§YDie Entscheidung kann nicht rückgängig gemacht werden§!\n\n(Eine fehlerhafte Niederlage wird angezeigt werden, auf "Beobachten" klicken um weiter zu spielen."
 
 nf_RCH.12.t: "Stortbeker"
 nf_RCH.12.d: "Da ihm die Wiedereinreise ins Reich verweigert wurde, beschloss Stortbeker im Süden der Metro ein eigenes Territorium zu errichten. Er hat das Reich und unseren derzeit amtierenden Führer abgeschworen und behauptet, er und seine Getreuen seien die Vertreter des wahren Faschismus. Unser Propagandaministerium hat seine Agitatoren schnell davon abgehalten, ihre Desinformation unter unseren Bürgern zu verbreiten."
 nf_RCH.12.a: "Diese Ratte, wenigstens zeigt er nun sein wahres Gesicht!"
 nf_RCH.12.b: "Die Herrschaft der Twerskaya wird schon bald enden."

 nf_RCH.15.t:0 "Absolute Autorität - Nachtrag"
 nf_RCH.15.d:0 "Heil dem Reich, Heil dem Führer! Ihre Position ist nun gefestigt und Ihr Engagement für das Reich ist unter den Soldaten unbestritten. Jetzt ist es an der Zeit, mit der Planung unserer unvermeidlichen Eroberung der Metro zu beginnen! Unsere Sache muss im Reichsvolk jedoch gestärkt werden; Alle Facetten der Gesellschaft müssen vereint werden, wenn wir den Untergrund von den Mutanten befreien wollen! Wenn wir unsere Wirtschaft, unser Militär und unsere Gesellschaft zu einer eisernen Faust vereinen, dann wird unser Militär in der Lage sein, jeden einzelnen unserer zahlreichen Feinde zu vernichten.\n\nWir müssen unsere Expansion jedoch auch mit Vorsicht planen. Die träge Hanse beobachtet unsere Expansionsbemühungen zwar zögerlich, aber wir können nicht sicher sein, dass sie ihre kapitalistischen Finger aus unseren Plänen raushält. Und dabei sind die Entarteten der Roten Linie noch nicht einmal berücksichtigt, jene die jeden Versuch unternehmen werden, unser Volk zu verderben und zu vergiften, geistig und körperlich.\n\nWir sind die letzte Gruppe reiner Menschen auf der ganzen Welt. Wo es unseren Vorfahren nicht gelungen ist, unserem Volk eine Zukunft zu sichern, dürfen wir uns diese Chance nicht entgehen lassen. Das Reich wird unter unserer Aufsicht gedeihen oder es wird gar nicht gedeihen. Ich vertraue darauf, dass Sie uns gut führen werden, mein Führer."
 nf_RCH.15.a:0 "Heil dem Reich!"
 RCH_tutorial_1_tt: "\nWenn wir expandieren wollen, benötigen wir die größtmögliche Unterstützung unseres Volkes. Unsere £war_support_modifiericons_texticon §YKriegsunterstützung§! muss §Y100%§! betragen!"

 nf_RCH.20.t: "Das Wie der Produktion"
 nf_RCH.20.d: "Unsere Bemühungen die Waffensysteme weiterzuentwickeln waren erfolgreich, aber wir stehen derzeit vor einer Hürde. Unser leitender Maschinist ist zwischen zwei Lager mit gegensätzlichen Ideen gespalten. Ein Lager argumentiert, dass wir uns mit allen Mitteln auf eine reine Steigerung der Waffenproduktion konzentrieren müssen, um zu verhindern, dass unseren Männern die Kugeln für die unbegrenzte Anzahl von Mutanten ausgehen, mit denen wir konfrontiert sind. Das andere Lager argumentiert, dass wir uns darauf konzentrieren müssen, unsere Waffen zu leistungsfähigeren Tötungswaffen weiterzuentwickeln, damit jede Kugel mit Sicherheit trifft und tötet. Diese Verbesserungen könnten sich auf lange Sicht auszahlen. Da beide Lager gleich groß sind, wird diese Blockade noch einige Zeit anhalten, es sei denn, wir greifen ein und treffen eine Entscheidung. Was sind Ihre Befehle?"
 nf_RCH.20.a: "Erhöhen Sie die Waffenmenge."
 nf_RCH.20.b: "Erhöhen Sie die Qualität der Waffen."
 RCH_economies_of_scale_choice: "Schaltet Nationalen Fokus frei: §Y$RCH_economies_of_scale$§!"
 RCH_german_authenticity_choice: "Schaltet Nationalen Fokus frei: §Y$RCH_german_authenticity$§!"

 nf_RCH.21.t: "Antikommunistischer Pakt"
 nf_RCH.21.d: "Das Reich kommt zu uns und sucht einen weiteren Verbündeten, der sich gegen die schwärende Fäulnis der Roten Linie wehren kann. Nur gemeinsam, vereint als eine antibolschewistische Kraft, kann die Metro von dieser roten Bedrohung befreit werden. Wenn wir zustimmen, werden wir eng mit dem Reich zusammenarbeiten und Informationen über die kommunistische Bedrohung weitergeben.
 nf_RCH.21.a: "Akzeptiert"
 nf_RCH_21.b: "Abgelehnt"

 nf_RCH.22.t: "Zugeständnisse an Außenstehende"
 nf_RCH.22.d: "Das Reich schickt Gesandte zu uns. "Die Metro ist für die Russen!" "Räumt den mutierten Dreck weg". Während ihre genozidale Rhetorik gegenüber Nichtweißen und ethnischen Minderheiten in letzter Zeit nachgelassen hat, bleibt es noch abzuwarten, ob sie an ihrem Weg festhalten werden oder nicht. Unabhängig davon versucht das Reich, seine inneren Sphären zu öffnen, und ist nicht länger ein hermetischer Staat, der wie eine in die Enge getriebene Ratte von Feinden umgeben ist."
 nf_RCH.22.a: "Das Reich ist vielversprechend"
 nf_RCH.22.b: "Einmal Faschist, immer Faschist"

 nf_RCH.23.t: "[FROM.GetNameDefCap] bietet uns ein Handelsabkommen an"
 nf_RCH.23.d: "Das Reich, ein verschlossener Staat mitten in der Metro, hat seine Türen bisher immer für Außenstehende verschlossen. Allerdings sind sie nun zu uns gekommen und haben uns ein Handelsabkommen vorgeschlagen, bei dem sie als Gegenleistung für Nahrung und Ressourcen Waren von uns kaufen werden. Ein vernünftiger Vorschlag, oder nicht?"
 nf_RCH.23.a: "Davon werden wir beide profitieren"
 nf_RCH.23.b: "Wir haben nichts mit Faschisten zu tun"

 nf_RCH.24.t: "[FROM.GetNameDefCap] hat unseren Handelsvorschlag akzeptiert"
 nf_RCH.24.d: "Nach reiflicher Überlegung hat die Hanse unseren Handelsvorschlag angenommen."
 nf_RCH.24.a: "Großartig"

 nf_RCH.25.t: "Die Hanse lehnt unsere Handelsanfrage ab"
 nf_RCH.25.d: "Nach Prüfung hat die Hanse unseren Antrag auf Handelszugang abgelehnt. Es scheint, dass wir für sie kein würdiger Handelspartner sind."
 nf_RCH.25.a: "Sehr gut. Dafür bezahlen sie noch"

 nf_RCH.26.t: "Die Entnazifizierung scheitert"
 nf_RCH.26.d: "Die SS-Einheiten haben auf unsere Reihe von Änderungen zur Entnazifizierung unseres Landes reagiert: Während sie mit Gewalt Wagen und Menschen daran hindern, die Stationen zu verlassen, gerät das ganze Reich in Stillstand, Wut und Aufruhr. Unsere Ziele sind in die Luft gesprengt und die Autorität des Reiches wird von seinem eigenen Militär in Frage gestellt."
 nf_RCH.26.a: "Das Große Reich zerfällt..."

 nf_RCH.27.t: "Toleranz gegenüber den Nicht-Weißen"
 nf_RCH.27.d: "Jetzt, wo wir das Reich langsam öffnen, bleibt die Frage der Nichtweißenbestehen. Nur wenige im oberen Kreis der Regierung wollen die dunklen Rassen im Reich wirklich zulassen, aber nur wenige wollen sich immer noch für ihre völlige Ausrottung einsetzen. Viele Stationen sind Enklaven von Minderheiten, und der Versuch, diese Gebiete von ihrer Bevölkerung zu befreien, ist nahezu unmöglich und auch kein Faktor, den wir erreichen möchten."
 nf_RCH.27.a: "Untermenschen verdienen keinen Platz im Reich"
 nf_RCH.27.b: "Wir können ihre Art vorerst „tolerieren“."

 nf_RCH.28.t: "Blut im Reich"
 nf_RCH.28.d: "Was haben wir uns nur gedacht? Das Bündnis mit den abscheulichen Mutanten hat nur dazu geführt, dass das Reich gegen Sie rebelliert. Sie spucken und verfluchen deinen Namen und erklären, dass wir nicht besser sind als die Mutanten selbst!"
 nf_RCH.28.a: "Meine Gedanken sind für Sie unverständlich."

 nf_RCH.29.t: "Die Mutanten setzen sich durch..?"
 nf_RCH.29.d: "Die Niederlage rückt näher, unsere Bevölkerung wird kriegsmüde und unsere Niederlage erschüttert den Kern unserer Ideologie. Das Vertrauen unserer Kommandostruktur in den Führer liegt in Trümmern."
 nf_RCH.29.a: "Unsere Arroganz ist unser Verderben"

 nf_RCH.30.t: "Das Reich erhebt sich"
 nf_RCH.30.d: "Offenbar sind Mutanten nicht die einzige Bedrohung, die von den Tunneln ausgeht. Unsere faschistischen Nachbarn in der Tverskaya werden von Tag zu Tag mutiger. Durch die Rhetorik ihres Führers sind die drei Stationen vor Ort im Fanatismus versunken, sie scheinen sich nicht mehr damit zufrieden zu geben, untätig in ihrer Festung zu sitzen, sondern versuchen nun, sich nach außen auszudehnen – das Bedürfnis nach Lebensraum, wie sie es nennen, und unsere Stationen fallen unter ihre neidischen Blicke."
 nf_RCH.30.a: "Wenn ein Faschist blutet, dann kann ein Faschist auch sterben"

 nf_RCH_terror_campaign.1.t: "Kampagnen des Schreckens"
 nf_RCH_terror_campaign.1.d: "Es ist an der Zeit, unsere Bevölkerung von den Kranken und Anormalen zu befreien. Wir müssen frei von genetischen Einflüssen und den gescheiterten Experimenten von Mutter Natur sein. Wenn das Reich frei sein und schließlich die Erde beanspruchen will, müssen wir uns auf das Überleben unserer Reinblüter konzentrieren. Ärzte sollen jeden einzelnen unserer Bürger untersuchen, niemand ist davon ausgenommen "
 nf_RCH_terror_campaign.1.a: "Für eine reine Zukunft"
 nf_RCH_terror_campaign.1.a.tt: "Wenn entweder die £stability_modifiericons_texticon §YStabilität§!, oder die £war_support_modifiericons_texticon §YKriegsunterstützung§! unter §Y35%§! fallen, wird es zu Unruhen kommen"

 nf_RCH_terror_campaign.2.t: "Inspektionen im Heer"
 nf_RCH_terror_campaign.2.d: "Unsere Inspektionsberichte sind zurückgekehrt und haben damit aufgedeckt, dass mehrere Soldaten unserer Armee die Standards nicht eingehalten haben und schnell als Mutanten entlarvt wurden."
 nf_RCH_terror_campaign.2.a: "Mutierter Abschaum"
 nf_RCH_terror_campaign.2.b: "Diesmal könnten Ausnahmen für die Armee gemacht werden"

 nf_RCH_terror_campaign.3.t: "Inspektionen in der Bevölkerung"
 nf_RCH_terror_campaign.3.d: "Unsere Inspektionsberichte sind zurückgekehrt und offenbar haben wir mehrere Mutanten in der Bevölkerung aufgedeckt.  Der genetische Dreck wurde aufgelistet und wird bald zur Ausrottung zusammengetrieben, um unsere Bürger ein für alle Mal zu befreien und uns einem reinen Reich näher zu bringen."
 nf_RCH_terror_campaign.3.a: "Vernichtet sie"

 nf_RCH_terror_campaign.4.t: "Inspektionen in der Verwaltung"
 nf_RCH_terror_campaign.4.d: "Bei der Inspektion unseres Verwaltungsapparats haben einige unserer Beamten die erwarteten Standards nicht erfüllt und festgestellt, dass sie genetisch unrein sind und unter unserer Nase herumlungern, während sie fortwährend die Ermordung Ihresgleichen unterstützten."
 nf_RCH_terror_campaign.4.a: "Mit dem mutierten Abschaum muss schnell fertig geworden werden"
 nf_RCH_terror_campaign.4.b: "Sicherlich. In diesem Fall können Ausnahmen gewährt werden"

 nf_RCH_fuhrer.1.t: "Der Personenkult"
 nf_RCH_fuhrer.1.d: "Die Menschen blicken erfürchtig zum Großen Führer des Reiches auf. Reihenweise stehen Offiziere, Generäle, Soldaten und Bürger in Reih und Glied und warten auf ihre Befehle. Der Führer ist mittlerweile mehr als nur eine Person, er ist eine Ikone, eine, die das Reich und das Schicksal der menschheit selbst auf ihren Schultern trägt. Sie wurden zu einer Personifikation des Faschismus, der mutierten Säuberungen und des Zieles, die kommunistische Bedrohung zu besiegen. Es wäre zu spät und zu gefährlich, ihnen jetzt den Rücken zu kehren und über die eigenen Moralvorstellungen nachzudenken."
 nf_RCH_fuhrer.1.a: "Lobet und liebe mich! Ich bin der Führer und ich werde unser Volk zurück unter den Himmel bringen!"
 nf_RCH_fuhrer.1.a.tt: "Ihre Führung ist gesichert, aber wir dürfen nicht zu selbstgefällig werden. Im Reich gibt es viele Fraktionen, jede mit ihren eigenen Zielen und Wünschen. Aber alle streben die Vernichtung abscheulicher Kommunisten und stinkender Mutanten an. Es wäre ratsam vorsichtig vorzugehen und sicherzustellen, dass alle Parteien mit Ihrer Herrschaft zufrieden bleiben."

 nf_RCH_fuhrer.2.t: "Feierlichkeiten"
 nf_RCH_fuhrer.2.d: "Heute werden den Bürgern des Reiches großartige Neuigkeiten überbracht: Der Bericht über die Schwangerschaft Ihrer Frau wurde öffentlich bekannt gegeben, und viele gratulierten Ihnen und Ihrer Frau und wünschen Ihrem Kind guten Gesundheit. Das Reich wünscht sich, dass Ihr neugeborenes Kind irgendwann erwachsen sein, und in einer schöneren, friedlicheren Zeit leben wird."
 nf_RCH_fuhrer.2.a: "Unser gemeinsames Kind wird ein Vorbild slawischer Reinheit darstellen"

 nf_RCH_fuhrer.3.t: "Erwarteter Nachwuchs"
 nf_RCH_fuhrer.3.d: "Ihre Frau bekommt die Wehen und bringt Ihr erstes Kind zur Welt ... doch sein Kopf ist seltsam geformt und es scheint, als hätte er ernste Schwierigkeiten beim Atmen. Die Ärzte zögern, Ihnen die Nachricht zu überbringen, aber schließlich kategorisieren sie Ihren Sohn ehrlich einen Mutanten. Diese Information ist derzeit geheim, nur die Vertrauenswürdigsten aus dem inneren Kreis des Führers wissen Bescheid. Wie sollen wir mit diesen Informationen nun fortfahren?"
 RCH_you_monster: "..§RIhr Monster§!"
 nf_RCH_fuhrer.3.a: "Das ist mein Sohn... Niemand darf etwas über seine wahre Natur erfahren. Auch wenn die Leute Gerüchte verbreiten"
 nf_RCH_fuhrer.3.b: "Dies ist nicht mein Sohn, es ist ein Mutant"

 nf_RCH_fuhrer.4.t: "Befehlsketten"
 nf_RCH_fuhrer.4.d: "Da sowohl die SS als auch die Metromacht nun ihre Differenzen beigelegt haben und nicht mehr darum kämpfen, die Vorherrschaft übereinander aufrechtzuerhalten, dürfen wir nicht zulassen, dass sich eine solche Chance noch einmal ergibt. Der Führer hat die Wahl, indirekt die eine oder andere Fraktion zu bevorzugen. Auch wenn man es nicht offen zugibt, wäre es gut, sich die Loyalität beider Seiten zu sichern, nicht nur, um die unbestrittene Macht der Führer über alle Befehlsketten hinweg zu legitimieren, sondern auch, um sie im Auge zu behalten. "
 nf_RCH_fuhrer.4.a: "Nur der SS können wir vertrauen"
 nf_RCH_fuhrer.4.b: "Das Militär gehört der Metromacht"

 nf_RCH_disgruntlement.1.t: "Unruhen im Reich"
 nf_RCH_disgruntlement.1.d: "In jüngster Zeit sind wir auf eine wachsende Besorgnis über das Vorgehen des Führers aufmerksam geworden. Während die internen Fraktionen des Reiches Treue schwören und es niemals wagen würden, gegen ihn vorzugehen, ist es doch klar, dass seine jüngsten Aktionen wachsenden Unmut über die Entwicklung, die das Reich einschlägt, ausgelöst haben.\n\nDie Situation könnte im Laufe der Zeit nur noch schwieriger werden. Uneinigkeit spaltet das Reich und wir können nicht zulassen, dass die degenerierten Untermenschen unsere Position ausnutzen."
 nf_RCH_disgruntlement.1.a: "Die Gestapo scheint sich doch immer über etwas zu beschweren"
 nf_RCH_disgruntlement.1.b: "Die Soldaten des Reiches werden nie am Führer zweifeln."
