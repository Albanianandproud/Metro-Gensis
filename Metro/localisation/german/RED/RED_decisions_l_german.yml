 RED_politburo_category:0 "Das Politbüro"
 RED_politburo_category_desc:0 "Das Politbüro ist das wichtigste zentrale Leitungsgremium der Kommunistischen Partei und der Roten Linie. Bestehend aus Oldtimern, die einst Parteimitglieder in der sozialistischen Zeit Russlands waren. Sie bestimmen die Politik der Roten Linie als Ganzes, nichts geht ohne ihre direkte Erlaubnis. Am besten wäre es, das Büro zufrieden zu stellen und ihre Wut nicht zu riskieren.\n\n Je zufriedener das Politbüro ist, desto einfacher wird es sein, unsere nationale Stellung zu reformieren oder zu ändern.\n\n Derzeit ist das Politbüro  §C[?politburo_happiness]§! Zufrieden"

