HNZ_year_3_mutant_purge_priority_desc: ""
HNZ_agenda_mutant_purge_priority: "Um diese §CAgenda§! abzuschließen, dürfen keine §YMutanten§! oder §YWilden§! die §YRinglinie§! bedrohen.\n"

HNZ_year_3_polis_priority: "§2Jahr 3§! Die Existenz von Polis sichern"
HNZ_year_3_polis_priority_desc: ""
HNZ_agenda_polis_priority: "Um diese §CAgenda§! abzuschließen, müssen wir die Existenz von §CPolis§! sichern und unsere §YUnterstützung§! fortsetzen.\n"

HNZ_year_4_generals_priority: "§3Jahr 4§! Einen neuen Militärstab aufstellen"
HNZ_year_4_generals_priority_desc: ""
HNZ_agenda_generals_priority: "Um diese §CAgenda§! abzuschließen, muss unser §OMilitärkommando§! modernisiert und §Yerweitert§! werden.\n"

HNZ_year_4_containment_priority: "§3Jahr 4§! Eindämmung der Bedrohungen"
HNZ_year_4_containment_priority_desc: ""
HNZ_agenda_containment_priority: "Um diese §CAgenda§! abzuschließen, müssen wir die Expansion der §RRoten Linie§! und des §CVierten Reiches§! eindämmen.\n"

HNZ_year_4_puppet_priority: "§3Jahr 4§! Unseren Einfluss ausweiten"
HNZ_year_4_puppet_priority_desc: ""
HNZ_agenda_puppet_priority: "Um diese §CAgenda§! abzuschließen, müssen wir unseren §YEinfluss§! auf eine andere Station ausdehnen und sie zu einem Vasallen des Bundes machen.\n"

HNZ_year_4_industry_priority: "§3Jahr 4§! Industrieproduktion"
HNZ_year_4_industry_priority_desc: ""
HNZ_agenda_industry_priority: "Um diese §CAgenda§! abzuschließen, müssen wir sicherstellen, dass unsere §YIndustrie§! die größte im gesamten Metro ist – unerreicht von jeder anderen Macht.\n"

HNZ_year_5_hegemony_priority: "§4Jahr 5§! Den Bund erweitern"
HNZ_year_5_hegemony_priority_desc: ""
HNZ_agenda_hegemony_priority: "Um diese §CAgenda§! abzuschließen, müssen wir den §YBund§! erweitern und weitere Stationen in die Liga aufnehmen.\n"

HNZ_year_5_expansion_priority: "§4Jahr 5§! Der Blick nach außen"
HNZ_year_5_expansion_priority_desc: ""
HNZ_agenda_expansion_priority: "Um diese §CAgenda§! abzuschließen, müssen wir eine weitere Station dem §YBund§! unterwerfen.\n"

