 ## Bandit Laws ##

 bandit_law_1:0 "Gopnik Gangbanger"
 bandit_law_1_desc:0 "Die niedrigste Stufe in der Hierarchie des organisierten Verbrechens"

 bandit_law_2:0 "Bratok-Banden"
 bandit_law_2_desc:0 "Oft auch Patsan oder Brodyaga genannt. bartoks sind die unentbehrlichen Mitarbeiter die jede Verbrecherbande benötigt um funktionieren zu können. Zuständig fürs Grobe sind sie nicht gerade die Hellsten, wissen aber wie man eine Waffe halten muss."

 bandit_law_3:0 "Avtoriet"
 bandit_law_3_desc:0 "Erfahrene Schläger, die sich nun von der Gewalt zurückziehen und stattdessen die Geschäfte im Hintergrund verwalten."

 bandit_law_4:0 "A vor v zakone"
 bandit_law_4_desc:0 "Der höchste Rang auf den man mit normalen Mitteln aufsteigen kann, in der Welt des Verbrechens. Höher geht es nur noch mit Gewalt.\n\nDie Mächtigeren von ihnen gründen teilweise auch ihre eigenen Syndikate und vergrößern so das Netzwerk ihres Bosses."

 bandit_law_5:0 "Könige der Tiefe"
 bandit_law_5_desc:0 "Die Bratva sind recht lose organisiert was sie eine lange Zeit davor bewahrt hat, mit einem Schlag ausradiert zu werden.\n\nDoch jene die sie trotz allem miteinander verbinden sind die Könige der Tiefe, eine Klasse von geradezu feudalistisch auftretenden Räuberbaronen." 

