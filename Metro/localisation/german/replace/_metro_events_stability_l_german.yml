l_german:
 stability.21.t:0 "Dienstvermeidung"
 stability.21.desc.a:0 "Ein neuer Bericht des Kriegsministeriums zeigt einen deutlichen Rückgang der verfügbaren Rekruten. Es scheint, dass die jüngste Gruppe viel kleiner ist als zunächst erwartet. Die Diskrepanz wird derzeit untersucht, aber erste Hinweise deuten darauf hin, dass es einer großen Anzahl technisch dienstfähiger Personen gelingt, der Wehrpflicht auf verschiedene Weise zu entgehen. 18-jährige Studenten sind plötzlich Facharbeiter, die in der wichtigen Kriegsindustrie beschäftigt sind, ehemalige Sportler fallen bei ihren Fitnesstests durch und in einigen Fällen sind Rekruten einfach spurlos verschwunden.\n\nWenn Menschen gefasst und verhört werden, verweisen sie auf die schlechten Bedingungen in der Armee, die gleichgültigen Offiziere und den Wunsch, nicht für eine verlorene Sache zu sterben. Militärführer fordern ein hartes Vorgehen gegen diejenigen die sich der Einberufung entziehen, doch viele in der Regierung glauben, dass eine Verbesserung der Lebensbedingungen der eingezogenen Soldaten der bessere Ansatz sein könnte."
 stability.21.desc.b:0 "Die ineffektive offizielle Reaktion auf die weit verbreitete Ablehnung des Entwurfs hat das Problem nur noch verschlimmert. Immer mehr Rekruten erscheinen nach Erhalt ihres Bewerbungsschreibens nicht mehr. Die Spionageabwehr hat eine professionell erstellte Broschüre abgefangen, in der Menschen darüber informiert werden, wie sie der Einberufung entgehen können, und in der Dinge wie die Bestechung von Ärzten vorgeschlagen werden, um dem Rekruten zu bescheinigen, dass er medizinisch nicht tauglich ist. Ausnahmen für Familienväter haben dazu geführt, dass Kriegswitwen mit Kindern mit Heiratsanträgen überhäuft werden, während die Zahl der Menschen, die aus ethischen Gründen Ausnahmen beantragen, Rekordzahlen erreicht hat.\n\nMilitärführer haben vorgeschlagen, die letzten Ausnahmen zu streichen und an einigen gefassten Drückebergern ein Exempel zu statuieren. Andere in der Regierung haben vorgeschlagen, dass wir an das Bürgerpflichtgefühl unserer Bürger appellieren und auf die Folgen einer Niederlage in diesem Krieg hinweisen sollten."
 stability.21.desc.c:0 "Da die Reaktionen der Regierung auf Wehrdienstverweigerung überhaupt keine positiven Auswirkungen hatten, fragen sich immer mehr Menschen, warum sie sich selbst einem Risiko aussetzen sollten, während andere in Sicherheit bleiben. Rekruten, die auftauchen, berichten oft, dass sie auf der Straße belästigt oder verspottet wurden, als seien sie Narren, die für eine zum Scheitern verurteilte Sache kämpften. Berichte von Müttern, die ihren Kindern verbieten auf den Einberufungsbefehl zu antworten, kursieren überall, und das Kriegsministerium hat einen Bericht vorgelegt, in dem es behauptet, dass sie nicht mehr sicher seien, wie viele Leute sie einberufen sollen, da ihre Bürokratie unter der Belastung, all diese vermissten Soldaten zu bearbeiten, zusammenzubrechen begonnen habe."
 stability.21.a:0 "Es gibt nichts was wir tun können."
 stability.21.d:0 "Wir sollten jeden verhaften, der sich der Wehrpflicht entzieht!"
 stability.21.e:0 "Eine Gehaltserhöhung für die Soldaten wäre vielleicht angebracht."
 stability.21.f:0 "Es ist Zeit für härtere Maßnahmen."
 stability.21.g:0 "Appell an das Pflichtbewusstsein der Menschen."
 stability.21.h:0 "Wir müssen ein Exempel statuieren."
 stability.21.i:0 "Wir müssen den Menschen etwas geben, wofür sie kämpfen können."
 stability.22.t:0 "Streiks!"
 stability.22.desc.a:0 "Die Produktion an mehreren Arbeitsplätzen ist in den letzten Tagen dramatisch zurückgegangen, da die Arbeiter einen Streik gegen die gesamte Kriegsproduktion erklärt haben. Mit der Forderung „Frieden und Brot!“ lehnten sie bisher alle Versuche ab, eine Einigung auszuhandeln. Einige in der Regierung befürworteten eine scharfe militärische Reaktion, gefolgt von einer raschen Hinrichtung der Rädelsführer als feindliche Agenten und Verräter. Andere im öffentlichen Dienst haben jedoch ein maßvolleres Vorgehen empfohlen und darauf hingewiesen, dass eine harte Reaktion durchaus nach hinten losgehen kann, wenn die beteiligten Soldaten nicht so loyal sind, wie wir bisher dachten."
 stability.22.desc.b:0 "Die Verwaltungsbemühungen, die Streikenden davon zu überzeugen, an ihren Arbeitsplatz zurückzukehren, scheinen keinerlei Wirkung gehabt zu haben. Vielmehr wurde von Streiks an weiteren Arbeitsplätzen berichtet, und auch die letzten Verweigerer auf den ursprünglich betroffenen Arbeitsplätzen legten aufgrund der Wut ihrer Kollegen ihr Werkzeug nieder. Bisher konnten die Vorräte zwar den Rückschlag für die Versorgung an vorderster Front einigermaßen abfedern, aber es ist nur eine Frage der Zeit, bis die Produktionsausfälle unsere Fähigkeit, den Krieg weiterzuführen, beeinträchtigen.\n\nDas Kriegsministerium hat die Regierung erneut aufgefordert, eine unnachgiebige Linie gegenüber den Streikenden einzunehmen, aber andere Fraktionen innerhalb der Regierung haben angedeutet, dass das Angebot, den Arbeitern auf halbem Weg entgegenzukommen, ausreichen könnte, um sie davon zu überzeugen, an die Arbeit zurückzukehren."
 stability.22.desc.c:0 "Was als Arbeitskampf an einigen abgelegenen Orten begann, hat sich mittlerweile auf das ganze Land ausgeweitet und betrifft sogar Industrien, die nur auf tertiärer Ebene mit den Kriegsanstrengungen verbunden sind. Sogar die Arbeitsweise der Verwaltung selbst wurde beeinträchtigt, da immer mehr Angestellte, Boten und Fahrer auf niedriger Ebene sich weigerten, zur Arbeit zu erscheinen. \n\nVielerorts haben Arbeiterräte die Technikerbezirke übernommen. Berichte der Geheimpolizei deuten darauf hin, dass einige Orte offenbar wieder mit der Waffenproduktion begonnen haben – für einen großen Aufstand gegen das, was als „Kriegsregime“ bezeichnet wird.\n\nDas Militärische Oberkommando geht davon aus, dass entschlossenes Vorgehen loyaler Truppen immer noch den Sieg davontragen könnte, während die zivile Seite der Regierung argumentiert, dass dadurch ein Bürgerkrieg und eine sichere Niederlage droht."
 stability.22.a:0 "Das geht vorrüber."
 stability.22.b:0 "Führen Sie in den Städten eine Demonstration militärischer Gewalt durch."
 stability.22.c:0 "Machen Sie aus den noch arbeitswilligen Menschen Propagandahelden."
 stability.22.d:0 "Ziehen Sie die Arbeiter zum Militärdienst ein und stellen Sie die Arbeitsplätze unter militärische Kontrolle."
 stability.22.e:0 "Angebot zur Erhöhung der Lebensmittelrationen der Arbeiter."
 stability.22.f:0 "Schicken Sie die Truppen, verhaften Sie die Streikenden, richten Sie die Rädelsführer hin."
 stability.22.g:0 "Schlagen Sie neue Wohlfahrtsgesetze vor."
 stability.23.t:0 "Meutereien in der Armee"
 stability.23.desc.a:0 "Das Militärische Oberkommando hat alarmierende Nachrichten über eine Reihe von Einheiten unserer Armee erreicht, die Befehle von Vorgesetzten verweigern. Obwohl keine der Einheiten ihre Position in der Linie verlassen hat, haben Vertreter der Soldaten deutlich gemacht, dass sie keinem Befehl zum Angriff auf den Feind Folge leisten werden.\n\nDer Aufstand konnte bisher auf eine kleine Anzahl von Bataillonen und eine Handvoll Ausbildungs- und Unterstützungseinheiten begrenzt werden, aber viele im Kriegsministerium befürchten, dass dieser Aufstand bald auf andere Einheiten übergreifen wird und uns letztendlich daran hindern könnte, den Krieg fortzusetzen. Es ist entschlossenes Handeln erforderlich."
 stability.23.desc.b:0 "Die Bemühungen, gegen die Meutereien in der Armee vorzugehen, zeigten keine Wirkung. Ermutigt durch das Fehlen einer wirksamen Reaktion der Regierung haben die Meuterer ihre Forderungsliste um einen sofortigen Waffenstillstand, gefolgt von einem umfassenden Friedensvertrag und einer Demobilisierung erweitert.\n\nDas Kriegsministerium empfiehlt dringend, dass wir ein starkes Signal an die Meuterer senden, um weitere Maßnahmen ihrerseits abzuschrecken."
 stability.23.desc.c:0 "Da die Regierung offensichtlich nicht willens oder nicht in der Lage war, ihre Probleme anzugehen, haben die Meuterer beschlossen, die Maßnahmen selbst in die Hand zu nehmen. Es wurden Wahlen für „Arbeiter- und Soldatenräte“ angekündigt, mit dem ausdrücklichen Ziel, die Nation zu übernehmen und Frieden mit dem Feind zu schließen.\n\nWenn nicht schnell gehandelt wird, könnten diese Räte am Ende unsere Verwaltung in einigen Teilen des Landes ersetzen und uns unfähig machen, den Krieg fortzusetzen."
 stability.23.a:0 "Daran können wir jetzt nichts ändern."
 stability.23.b:0 "Umzingeln Sie die meuternden Einheiten mit Loyalisten und befehlen Sie ihnen, sich zu ergeben."
 stability.23.c:0 "Halten Sie eine patriotische Rede vor den Meuterern."
 stability.23.d:0 "Geben Sie öffentlich bekannt, dass jeder, der die Meuterer unterstützt, wegen Hochverrats angeklagt wird."
 stability.23.e:0 "Kündigen Sie eine Friedensinitiative an. Stellen Sie sicher, dass es für den Feind inakzeptabel ist."
 stability.23.f:0 "Mobilisieren Sie loyalistische Milizen und verhaften Sie alle Soldaten, die nicht an ihrem Dienstort sind."
 stability.23.g:0 "Bieten Sie den Soldaten an, ihnen zu erlauben, ihre eigenen Offiziere zu wählen."
 15_days_tt:0 "Dies wird ungefähr §Y15 Tage§! dauern.\n"
 30_days_tt:0 "Dies wird ungefähr §Y30 Tage§! dauern.\n"
 45_days_tt:0 "Dies wird ungefähr §Y45 Tage§! dauern.\n"
 stability.31.t:0 "Das militärische Vorgehen ist erfolgreich"
 stability.31.desc:0 "Unsere schnelle Reaktion hat sich als sehr effektiv erwiesen. Militärpolizeieinheiten, unterstützt von örtlichen Strafverfolgungsbehörden und patriotischen Freiwilligen, schwärmten in einer gut koordinierten Operation aus, um jeden vermissten Wehrpflichtigen zu besuchen. Die meisten waren bereit, dem Anruf zu folgen, als sie über die Folgen einer Nichterscheinung zum Dienst informiert wurden. Das Militärische Oberkommando hat öffentlich erklärt, dass jeder, der an seinem Dienstort erscheint, nicht wegen eines Verbrechens angeklagt oder bestraft wird, wenn er dies in der Vergangenheit nicht getan hat. Dennoch weigern sich eine Reihe von Menschen kategorisch, für ihr Land zu den Waffen zu greifen, und wurden verhaftet."
 stability.31.a:0 "Unser entschlossenes Handeln verhinderte Schlimmeres."
 stability.32.t:0 "Unruhen bei der Einberufung"
 stability.32.desc:0 "Unsere Versuche, die Situation mit militärischer Gewalt zu lösen, waren erfolglos. Es scheint, dass jemand in unserer Verwaltung unsere geplante Operation an die Öffentlichkeit weitergegeben hat, die schnell reagiert hat. Als die Militärpolizei und andere Strafverfolgungsbehörden versuchten, bekannte Wehrdienstverweigerer festzunehmen, wurde ihnen der Weg von wütenden Mobs versperrt, die ein Ende des Krieges und der Zwangsrekrutierung forderten. In mehreren Fällen kam es zu Straßenschlachten zwischen der Polizei und den Demonstranten, bei denen es zu zahlreichen Todesopfern kam, als die Soldaten gezwungen wurden, ihre Waffen zur Selbstverteidigung einzusetzen. Es dauerte mehrere Stunden, bis die Polizei die Situation vollständig unter Kontrolle hatte.\n\nEine hässliche Stimmung breitete sich über die Hauptstation aus, als die Barrikaden beseitigt und die Toten begraben wurden. Berichte des Kriegsministeriums zeigen keine Veränderung in der Zahl der Rekruten, die sich zum Dienst melden. Viele in der Regierung fragen sich, wie lange wir unter diesen Umständen noch weiterkämpfen können."
 stability.32.a:0 "Die Situation hat sich nicht unbedingt zu unserem Vorteil entwickelt."
 stability.33.t:0 "Der Wehrpflichtaufstand"
 stability.33.desc:0 "Unsere Versuche, die Situation mit militärischer Gewalt zu lösen, waren erfolglos. Es scheint, dass jemand in unserer Verwaltung unsere geplante Operation an die Öffentlichkeit weitergegeben hat, die schnell reagiert hat. Als die Militärpolizei und andere Strafverfolgungsbehörden versuchten, bekannte Wehrdienstverweigerer festzunehmen, wurde ihnen der Weg von wütenden Mobs versperrt, die ein Ende des Krieges und die Zwangsrekrutierung forderten. In mehreren Fällen kam es zu Straßenschlachten zwischen der Polizei und den Demonstranten, bei denen es zu zahlreichen Todesopfern kam, als die Soldaten gezwungen wurden, ihre Waffen zur Selbstverteidigung einzusetzen. \n\nDie Situation geriet danach schnell außer Kontrolle, als Bürger auf die Soldaten losgingen und Polizeistationen stürmten, um sich zu bewaffnen. In mehreren Städten des Landes herrscht derzeit ein bewaffneter Aufstand gegen die Regierung. Ironischerweise scheinen die Rebellen kein Problem damit zu haben, Soldaten zu finden, die bereit sind, zu den Waffen zu greifen."
 stability.33.a:0 "Oh, also wollen sie JETZT kämpfen!?"
 stability.34.t:0 "Der Reformentwurf erweist sich als wirksam"
 stability.34.desc:0 "Die von der Regierung im Rahmen eines umfassenderen Reformprozesses der militärischen Rekrutierungspolitik verabschiedeten Sozialmaßnahmen erwiesen sich als überraschend beliebt. Höhere Löhne und häufigere Urlaubstage werden oft als die größten neuen Vorteile genannt, aber viele verweisen auch auf die neuen Verwaltungsprogramme zur Unterstützung von Kriegswitwen und -waisen. Immer weniger Männer können es rechtfertigen, den Aufruf ihres Landes zu den Fahnen abzulehnen, und die öffentliche Unterstützung für Wehrdienstverweigerer ist so gut wie verschwunden.\n\nTatsächlich hat die öffentliche Unterstützung für die Regierung in letzter Zeit zugenommen, da immer mehr Menschen erkennen, dass die [Root.GetAdjective]-Lebensweise angegriffen wird."
 stability.34.a:0 "Eine weise Entscheidung."
 stability.35.t:0 "Das 591. Strafbataillon"
 stability.35.desc:0 "Angesichts der Ernsthaftigkeit der Lage hat das Militärische Oberkommando entschieden, dass drastischere Maßnahmen erforderlich sind, um zu zeigen, dass die Umgehung der Bürgerpflicht zur Verteidigung der eigenen Nation nicht toleriert wird. Im Morgengrauen durchsuchte die Militärpolizei die Häuser einer Reihe sorgfältig ausgewählter, bekannter und vernetzter Personen, die ihren Einfluss genutzt hatten, um anderen zu ermöglichen, der Einberufung zu entgehen. Noch in ihren Nachthemden wurden sie zum Militärdienst eingezogen und unter bewaffneter Bewachung in die Kaserne eskortiert, wo sie zu einer separaten Einheit zusammengefasst werden, um zu verhindern, dass ihr subversiver Einfluss auf andere Einheiten übergreift. \n\nDie Nachricht darüber verbreitete sich schnell, und es scheint, dass die meisten Menschen, die bisher geglaubt hatten, sie könnten damit durchkommen, ihren Kündigungsentwurf zu ignorieren, ihre Meinung geändert haben. Rekrutierungsstellen im ganzen Land berichten, dass immer mehr Menschen vorbeikommen und fragen, was genau die Konsequenzen wären, wenn sich ein „Freund“ von ihnen, der versucht hatte, der Einberufung zu entgehen, melden würde."
 stability.35.a:0 "Sie können sich vielleicht noch retten."
 stability.36.t:0 "Die Lokalen Eliten äußern ihren Protest"
 stability.36.desc:0 "Angesichts der Ernsthaftigkeit der Lage hat das Militärische Oberkommando entschieden, dass drastischere Maßnahmen erforderlich sind, um zu zeigen, dass die Umgehung der Bürgerpflicht zur Verteidigung des eigenen Landes nicht toleriert wird. Im Morgengrauen durchsuchte die Militärpolizei die Häuser einer Reihe sorgfältig ausgewählter, bekannter und vernetzter Personen, die ihren Einfluss genutzt hatten, um anderen zu ermöglichen, der Einberufung zu entgehen. Immer noch in ihren Nachthemden wurden sie zum Militär eingezogen. Ihre Familien haben ihre umfangreichen Unterstützungsnetzwerke mobilisiert, um gegen diese Entscheidung zu protestieren. Das Kriegsministerium wurde mit Anrufen und Briefen einfacher Arbeiter überschwemmt, die ihren Fabrikleiter zurück an Unterstaatssekretäre in verschiedenen anderen Ministerien fordern wollten und wissen wollten, warum Menschen, die in kriegskritischen Bereichen arbeiten, von ihrer Arbeit entfernt wurden. Es scheint, dass sogar einige Kabinettsmitglieder über den Krieg nachdenken – vielleicht aus Angst um die Sicherheit ihrer eigenen Söhne."
 stability.36.a:0 "Sie haben kein Pflichtgefühl?"
 stability.37.t:0 ""Eine düstere und eine heilige Pflicht""
 stability.37.desc:0 "„Natürlich möchte ich leben. Ich möchte die Schule abschließen, ich möchte Mädchen kennenlernen, ich möchte eine Familie gründen – aber wenn wir diesen Krieg verlieren, werde ich diese Dinge auch nicht tun können. Also kämpfe ich.“\n\nDer Brief, der anonym an jede große Zeitung des Landes geschickt wurde, hat große Wellen geschlagen. Die Behauptung, von einem Soldaten zu stammen, der zunächst versuchte, der Einberufung zu entgehen, dann aber erkannte, dass er für die Rettung seiner Nation kämpfen musste, hat offenbar bei vielen anderen, denen es ähnlich ging, einen Nerv getroffen. Einberufungsausschüsse im ganzen Land berichten, dass die Zahl der Menschen, die sich immer noch weigern, ihrer Vorladung zu folgen, durch neue Freiwillige mehr als wettgemacht wurde, die nicht länger warten, bis sie gerufen werden, während andere für die Rettung ihrer Nation und ihrer Lebensweise kämpfen."
 stability.37.a:0 "Wir werden nicht zulassen, dass ihr Leben umsonst ist."
 stability.38.t:0 "Das Ende eines Feiglings"
 stability.38.desc:0 "„Im Morgengrauen führten sie ihn zur Mauer. Er lehnte eine letzte Zigarette ab, akzeptierte aber die Augenbinde. Seine letzten Worte waren eine Entschuldigung an seine Mutter, weil er ihr so ​​viel Schmerz zugefügt hatte. Angesichts der ernsten Situation, in der wir uns befinden, hat das Kriegsministerium beschlossen, dass diese Männer nach Militärrecht wegen Nichterscheinens zum Dienst vor Gericht gestellt werden. Die erste Serie von Todesurteilen wurde verhängt und die Verurteilten wurden durch ein Erschießungskommando erschossen." Diese Maßnahmen haben offenbar die gewünschte Wirkung gezeigt. Es scheint, dass sich die meisten Menschen dafür entschieden haben, die Möglichkeit des Todes auf dem Schlachtfeld der Gewissheit eines unehrenhaften Todes als Feigling vorzuziehen."
 stability.38.a:0 "Schade, dass es so weit kommen musste."
 stability.39.t:0 "Ein Märtyrer für den Frieden"
 stability.39.desc:0 "„Im Morgengrauen führten sie ihn zur Mauer. Eine letzte Zigarette verweigerte er, akzeptierte aber die Augenbinde. Seine letzten Worte waren eine Entschuldigung an seine Mutter, weil er ihr so ​​viel Schmerz zugefügt hatte. Anstatt die Menschen aus Angst vor den Konsequenzen zu den Bannern zurückzuholen, hat sie die Hingerichteten zu unmittelbaren Märtyrern der Friedensbewegung gemacht. Ihre Namen und Lebensgeschichten wurden veröffentlicht und sehr übersichtlich aufbereitet, um sie im besten Licht erscheinen zu lassen. In mehreren Großstädten begannen Massenfriedensdemonstrationen, die ein Ende des Krieges forderten. Das Kriegsministerium berichtet, dass sie eine Reihe von Briefen von Wehrpflichtigen erhalten haben, in denen sie offen erklärten, dass sie nicht zum Dienst erscheinen würden und dass sie unter keinen Umständen an einer weiteren Hinrichtung beteiligt sein würden, außer als die Person, die hingerichtet werden soll."
 stability.39.a:0 "Die Dinge haben sich nicht unbedingt verbessert."
 stability.40.t:0 "Ein neuer Deal für [Root.GetNameDef]"
 stability.40.desc:0 "In einer heute im Radio übertragenen Rede kündigte [Root.GetLeader] an, was er eine „Soziale Revolution“ nannte. Im Laufe der nächsten Stunde legte er ein Reformsystem vor, das alle Bereiche des gesellschaftlichen Lebens berührte und jedem heimkehrenden Soldaten eine Ausbildung, einen gut bezahlten Job und eine großzügige Rente versprach. Er kündigte außerdem ein umfangreiches Bauprogramm für bezahlbaren Wohnraum für junge Familien an, das am Tag der Unterzeichnung eines Waffenstillstands beginnen soll. Dies scheint erhebliche Auswirkungen auf die allgemeine Moral gehabt zu haben. Rekrutierungsbüros im ganzen Land berichten, dass Wehrpflichtige auftauchen und nach Möglichkeiten fragen, ihren Dienst über den aktuellen Konflikt hinaus zu verlängern, während andere beinahe eine Entsendung zu Fronteinheiten fordern, um sich zusätzliche Vorteile zu sichern."
 stability.40.a:0 "Und wie bezahlen wir das alles...?"
 strikes_event.1.t:0 "Bestellung wiederhergestellt"
 strikes_event.1.desc:0 "Das Militärische Oberkommando mobilisierte schnell eine Reihe von Ausbildungseinheiten für den Dienst und bildete Ad-hoc-Gruppen beurlaubter Soldaten. Das Vorbeimarschieren dieser Formationen an den Toren der Arbeitsstationen hatte den gewünschten Effekt, da die meisten Streikenden keine Konfrontation mit potenziell tödlichen Folgen erzwingen wollten. Die wenigen, die versuchten, die Soldaten zu einer gemeinsamen Sache zu überreden, stellten fest, dass ihre Worte kaum Wirkung zeigten, als die Soldaten fragten, warum es den Arbeitern im gemütlichen Hinterland erlaubt sein sollte, die kämpfenden Männer an der Front im Stich zu lassen."
 strikes_event.1.a:0 "Ja, Warum eigentlich?."
 strikes_event.2.t:0 "Ein blutiger Montag"
 strikes_event.2.desc:0 "Das Militärische Oberkommando mobilisierte schnell eine Reihe von Ausbildungseinheiten für den Dienst und bildete Ad-hoc-Gruppen beurlaubter Soldaten. Der Umzug dieser Formationen in die betroffenen Städte erwies sich jedoch als weitaus schwieriger als erwartet, da die Streikenden Eisenbahnlinien blockierten und die Truppen zum Einmarsch zu Fuß zwangen, was ihnen ausreichend Zeit zur Vorbereitung gab. Als unsere Truppen die verbarrikadierten Arbeitsplätze erreichten, fanden sie die Streikenden bereit. Versuche, Straßen freizumachen, wurden von den Arbeitern heftig angegriffen, indem sie Steine ​​und Flaschen auf die Soldaten warfen. \n\nIn mehreren Fällen eröffneten die Truppen das Feuer, um sich zu verteidigen, wobei mehrere Streikende getötet und zahlreiche weitere verletzt wurden. Dies erzürnte den Mob nur noch mehr und rief „Mörder!“ Füllen Sie die Luft von Umstehenden. Die Stimmung in der Hauptstation drehte sich dramatisch zugunsten der Streikenden. Bei Einbruch der Dunkelheit zogen sich die Soldaten zurück und ließen die Barrikaden intakt.\n\nEs gab keine weiteren Versuche, die Situation zu erzwingen. Die Streikenden behalten die Kontrolle über die Arbeitsplätze und es wird nicht gearbeitet."
 strikes_event.2.a:0 "Nicht wie geplant."
 strikes_event.3.t:0 "Helden an der Produktionsfront"
 strikes_event.3.desc:0 "„Ein Industriekrieg ist mehr als nur marschierende Divisionen und bombardierende Flugzeuge. Es ist mehr als nur die Pflicht eines Soldaten, für seine Nation zu kämpfen und zu sterben. Ein Industriekrieg wird zuallererst an den Arbeitsplätzen und in den Gießereien gewonnen. Den Kampf am Fließband aufzugeben ist nicht besser, als ihn an der Front aufzugeben. Und die Siege am Fließband sollten genauso gefeiert werden wie die, die an der Front errungen wurden.“\n\nAlle verfügbaren Propagandaressourcen wurden verwendet umgeleitet, um die Arbeit der Rüstungsarbeiter im besten Licht zu zeigen. [Root.GetLeader] hat persönlich einer neuen Auszeichnung zugestimmt, die an Arbeiter vergeben wird, die ihre Quote um mehr als 100 % überschritten haben, und die ersten Empfänger wurden auf Touren durch das Land geschickt, um andere Arbeiter in ihre Methoden einzuweisen.\n\nEs scheint, dass dies viele Streikende dazu gebracht hat, ihre Haltung zu überdenken. Die Arbeit an allen zuvor betroffenen Arbeitsplätzen wurde wieder aufgenommen."
 strikes_event.3.a:0 "Allesamt Helden."
 strikes_event.4.t:0 "Das Ministerium für Kriegsproduktion"
 strikes_event.4.desc:0 "[Root.GetLeader] hat heute einige kleine Änderungen am Entwurf angekündigt. Während zuvor Facharbeiter von der Wehrpflicht ausgenommen waren, wurde diese Ausnahme nun aufgehoben und alle von der Wehrpflicht befreiten Männer sofort eingezogen. Gleichzeitig wurde das Kriegsministerium ermächtigt, die direkte Kontrolle über jede Fabrik zu übernehmen, die kriegsrelevante Güter herstellt, wenn die Führung dieser Arbeitsplätze mangelnde Fähigkeiten gezeigt hat.\n\nDie Ankündigung stieß in den betroffenen Städten auf stille Resignation, insbesondere als bekannt wurde, dass jeder, der sich widersetzt, genauso behandelt wird wie ein Soldat, der sich weigert, Befehlen zu folgen. Während die Arbeitsmoral unter den Arbeitern am Boden ist, wurde die Produktion wieder aufgenommen."
 strikes_event.4.a:0 "Das hätten wir von anfang an tuen sollen."
 strikes_event.5.t:0 "Eine Nation im Trotz"
 strikes_event.5.desc:0 "[Root.GetLeader] hat heute einige kleine Änderungen am Entwurf angekündigt. Während zuvor Facharbeiter von der Wehrpflicht ausgenommen waren, wurde diese Ausnahme nun aufgehoben und alle von der Wehrpflicht befreiten Männer sofort eingezogen. Gleichzeitig wurde das Kriegsministerium ermächtigt, die direkte Kontrolle über jede Fabrik zu übernehmen, die kriegsrelevante Güter herstellt, wenn die Führung dieser Arbeitsplätze mangelnde Fähigkeiten gezeigt hat.\n\nDie Ankündigung löste in den betroffenen Städten große Bestürzung aus, insbesondere als bekannt wurde, dass jeder, der sich widersetzt, genauso behandelt wird wie ein Soldat, der sich weigert, Befehlen zu folgen. Polizisten, die den Arbeitern die Einberufungsbescheide überbringen sollten, wurden angewiesen, mit mehr als nur Tinte auf Papier zurückzukommen."
 strikes_event.5.a:0 "Vielleicht sollten wir das auch tun."
 strikes_event.6.t:0 "Nützliche Arbeiter"
 strikes_event.6.desc:0 "Ohne die stattfindenden Streiks zu erwähnen, kündigte [Root.GetLeader] heute an, dass Arbeiter in kriegsrelevanten Industrien zusätzliche Rationen an Zucker, Kaffee und Fleisch erhalten werden, um ihre Kräfte zu erhalten. Leider erwiesen sich die Gerüchte, dass die Regierung bereit sei, zusätzliche Schokolade zu verteilen, als falsch.\n\nWährend die Rädelsführer des Streiks versuchen, die Arbeiter von der Rückkehr zur Arbeit abzuhalten, scheinen die meisten akzeptiert zu haben, dass „Frieden und Brot“ niemals stattfinden würden, und sind nur mit dem Brot zufrieden."
 strikes_event.6.a:0 "Nur wer arbeitet soll auch essen."
 strikes_event.7.t:0 "Operation schwarze Eiche"
 strikes_event.7.desc:0 "Die Truppen versammelten sich über Nacht vor den Städten und hielten Lärm und leichte Disziplin aufrecht, um den Überraschungseffekt zu wahren. Als die Sonne über den Horizont kroch und die Arbeiter, die die Barrikaden an den Arbeitsplätzen besetzten, sich auf Ablösung durch die Tagesschicht freuten, rückten die Angriffskolonnen an. Den müden Arbeitern fiel es schwer, den Widerstand zu organisieren, und sie überwanden ihn schnell. Die Truppen ließen eine kleine Abteilung zur Bewachung der Gefangenen zurück, fegten durch die Stadt und verhafteten jeden, der auf der Liste der bekannten Fabrikarbeiter stand. Gegen Mittag hatte das Militär die vollständige Kontrolle über die Stationen übernommen und eine Ausgangssperre verhängt. Es ist kein weiterer Widerstand zu erwarten. Die Mehrheit der Arbeiter wird bald unter der Bedingung entlassen, dass sie an ihren Arbeitsplatz zurückkehren, die Anführer der Gruppe werden festgehalten und vor Gericht gestellt. Es wird erwartet, dass Todesurteile verhängt werden."
 strikes_event.7.a:0 "Die Ordnung ist wiederhergestellt."
 strikes_event.8.t:0 "Die Schlacht an der Eich-Straße"
 strikes_event.8.desc:0 "Die Truppen versammelten sich über Nacht vor den Städten, aber schlechte Licht- und Lärmdisziplin verriet die Überraschung. Als die Truppen einrückten, fanden sie die Arbeiter wachsam und einsatzbereit vor. Der erste Angriff endete in einem Hagel aus geworfenen Steinen. Ein zweiter Angriff mit aufgepflanzten Bajonetten wurde im brutalen Nahkampf abgewehrt und hinterließ Dutzende Tote und Sterbende auf den Straßen.\n\nDie verantwortlichen Offiziere haben sich zurückgezogen, um ihre Kräfte zu konsolidieren, während die Arbeiter ihre Befestigungen ausbauen und sich mit den beim Rückzug zurückgelassenen Waffen bewaffnen. Für morgen wird mit einem zweiten Kampftag gerechnet, doch das Militärische Oberkommando geht nicht mehr davon aus, dass ein Sieg wahrscheinlich ist."
 strikes_event.8.a:0 "Uns gehen schnell die Möglichkeiten aus."
 strikes_event.9.t:0 "Das Gesetz zum Schutz der Arbeitnehmerrechte"
 strikes_event.9.desc:0 "Angesichts der hohen Spannungen in der gesamten Hauptstation kündigte [Root.GetLeader] ein neues Gesetz an, um die Rechte der Arbeitnehmer auch in Kriegszeiten zu schützen. Die umfassende Gesetzgebung schreibt unbeschränkten bezahlten Krankenurlaub, eine obligatorische Unfallversicherung für jeden Arbeitnehmer, das Recht, einer Gewerkschaft beizutreten, sowie zum ersten Mal das Recht aller erwerbstätigen Frauen auf Mutterschaftsurlaub nach der Geburt eines Kindes vor.\n\nWährend viele in der Verwaltung dies für nichts weniger als eine völlige Kapitulation vor den Streikenden halten, sind die Ergebnisse eindeutig: Die Arbeit wurde an allen Arbeitsplätzen wieder aufgenommen."
 strikes_event.9.a:0 "Hoffentlich wird das ausreichen."
 mutiny_event.1.t:0 "Meuterei niedergeschlagen"
 mutiny_event.1.desc:0 "Nach einigen Stunden angespannter Verhandlungen vor den Kasernentoren und in den Unterständen an der Front ist die Meuterei in unserer Armee vorbei. Angesichts der Aussicht auf einen Kampf, den sie nicht gewinnen konnten, beschlossen die Meuterer schnell, sich zurückzuziehen. \n\nDas Hauptproblem war dann das Schicksal derjenigen, die die Befehle verweigert hatten. Das Militärische Oberkommando hat sich für Gnade entschieden und den Meuterern versichert, dass sie nicht hart bestraft werden würden. Es wurden einige Beispiele angeführt, in denen einige Soldaten auf einen niedrigeren Dienstgrad herabgestuft und zu einer anderen Einheit versetzt wurden."
 mutiny_event.1.a:0 "Hoffen wir, dass das das letzte Mal ist."
 mutiny_event.2.t:0 "Eine leere Drohung"
 mutiny_event.2.desc:0 "Versuche, die Meuterer einzuschüchtern und zur Unterwerfung zu zwingen, schlugen spektakulär fehl, da die Truppen kaum Angst vor den Einheiten zeigten, die zu ihrer Unterdrückung entsandt wurden. Mithilfe ihrer an der Front erworbenen Fähigkeiten organisierten sie schnell eine Verteidigung ihrer Stellungen, die jeden Versuch, sie zu besiegen, sehr kostspielig machen würde. \n\nDie für die loyalistischen Einheiten verantwortlichen Offiziere haben sich zurückgezogen und warten auf weitere Befehle, aber dieser kleine Erfolg hat zweifellos die Entschlossenheit der Meuterer gestärkt."
 mutiny_event.2.a:0 "Niemand hätte das vorhersagen können."
 mutiny_event.3.t:0 "„Wofür kämpfen wir überhaupt?“"
 mutiny_event.3.desc:0 "„Es ist nicht ungewöhnlich, dass ein Soldat daran zweifelt, ob sich das, was er tut, wirklich lohnt. Kann irgendetwas die Opfer rechtfertigen, die wir von Ihnen verlangen? Können wir wirklich verlangen, dass Sie möglicherweise sterben, um ein Ziel zu erreichen, das Sie nie sehen werden?\n\nEs ist eine bedauerliche Tatsache, dass wir in der Zeit leben müssen, in der wir geboren wurden. Das Schicksal hat entschieden, dass wir im Krieg sein müssen, um unsere Freiheit, unsere Häuser, unsere [Root.GetAdjective] Lebensweise zu schützen! Wir haben nicht gewählt Dieser Krieg wurde uns aufgezwungen! Sie wissen, dass ich nichts von Ihnen verlangen würde, was ich nicht auch selbst zu tun bereit wäre, und ich weiß, dass Sie alles Notwendige tun werden, um den Sieg zu sichern.“\n\nDie Rede von [Root.GetLeader] vor den Truppen schien die gewünschte Wirkung gehabt zu haben, da die Soldaten in spontanen Jubel ausbrachen und ohne mehr als das übliche Maß an Klagen zu ihren Pflichten zurückkehrten."
 mutiny_event.3.a:0 "Gute Rede."
 mutiny_event.4.t:0 "Das Gesetz gegen Verrat im Kampf"
 mutiny_event.4.desc:0 "Während das Kriegsministerium sein Möglichstes tut, um zu verhindern, dass die aktuelle Meuterei in der Armee weithin bekannt wird, kann die Zensur von Briefen nur bis zu einem gewissen Grad reichen. Beurlaubte Soldaten verbreiteten schnell die Nachricht, dass die Armee nicht länger bereit sei, in diesem Krieg unnötig zu bluten.\n\nOhne die Meuterei ausdrücklich zu erwähnen, gab [Root.GetLeader] heute bekannt, dass die Regierung nun jede Handlung, die ein mangelndes Engagement für den Krieg widerspiegelt, als Hochverrat betrachten werde.\n\nDie Strafe für Hochverrat ist bekannt und die öffentliche Unterstützung für die Meuterer ist so gut wie verflogen. Die Nachricht darüber verbreitete sich natürlich weithin. Angesichts der geringen Unterstützung der Bevölkerung haben die Soldaten stillschweigend ihren Dienst wieder aufgenommen."
 mutiny_event.4.a:0 "Wir sollten das nicht ausbuchstabieren müssen."
 mutiny_event.5.t:0 "Durchgreifender Versuch scheitert"
 mutiny_event.5.desc:0 "Während das Kriegsministerium sein Möglichstes tut, um zu verhindern, dass die aktuelle Meuterei in der Armee weithin bekannt wird, kann die Zensur von Briefen nur bis zu einem gewissen Grad reichen. Beurlaubte Soldaten verbreiteten schnell die Botschaft, dass die Armee nicht länger bereit sei, in diesem Krieg unnötig zu bluten.\n\nVersuche der Regierung, die Flut einzudämmen, sind völlig gescheitert. Berichte der Geheimpolizei deuten darauf hin, dass die Meuterer einen starken Rückhalt in der Öffentlichkeit haben, sodass es unwahrscheinlich ist, dass wir sie isolieren und unterdrücken können."
 mutiny_event.5.a:0 "Diese Missachtung der Gesetze ist zutiefst besorgniserregend."
 mutiny_event.6.t:0 "Das [Root.GetAdjective] Friedensangebot"
 mutiny_event.6.desc:0 "[Root.GetLeader] gab heute gegenüber der Presse bekannt, dass sein jüngstes Friedensangebot gescheitert sei. Während die Ursachen für diese unglückliche Wendung der Ereignisse sehr komplex sind, könnte die [Root.GetAdjective]-Forderung, dass die Gegenseite für alle verursachten Schäden aufkommt, die Waffen vollständig entwaffnet und öffentlich anerkennt, dass sie den Krieg begonnen haben, das Fass zum Überlaufen gebracht haben.\n\nUnsere Feinde haben in gleicher Weise reagiert und unsere vernünftigen Forderungen als Forderung nach bedingungsloser Kapitulation bezeichnet. Sie haben versprochen, dass sie diesen Krieg bis zum bitteren Ende weiterführen werden. \n\nDa unsere Feinde offensichtlich keine Vernunft erkennen wollten und versprachen, weiterzukämpfen, sind die Versuche der Meuterer, eine Friedensregelung zu erzwingen, gescheitert."
 mutiny_event.6.a:0 "Eine schreckliche Schande."
 mutiny_event.7.t:0 "Das militärische Vorgehen ist erfolgreich."
 mutiny_event.7.desc:0 "Trotz einiger Fälle, in denen kleine Gruppen von Meuterern beschlossen, daraus einen Kampf zu machen, war unsere Operation zur Niederschlagung der Rebellion ein überwältigender Erfolg. Loyalisten-Milizen verließen sich eher auf ihre Anzahl als auf ihr Können, umzingelten die Hochburgen der Meuterer und forderten ihre Kapitulation. Die meisten Soldaten beschlossen, nicht zu den Waffen gegen ihre eigenen Landsleute zu greifen und ergaben sich friedlich. \n\nDen Rädelsführern wird in geheimen Kriegsgerichtsverfahren der Prozess gemacht, aber der durchschnittliche Soldat wird an die Front zurückgeschickt, wenn auch in einer anderen Einheit, um zu verhindern, dass Meuterer neue Zellen bilden."
 mutiny_event.7.a:0 "Gut gemacht."
 mutiny_event.8.t:0 "Bruder gegen Bruder"
 mutiny_event.8.desc:0 "Unsere Versuche, die Wahlen für die Arbeiter- und Soldatenräte zu verhindern, haben die Situation über die pessimistischsten Schätzungen hinaus eskalieren lassen. Anstatt sich zu ergeben, haben die Meuterer provisorische Räte gebildet, Feldkommandanten gewählt und Verteidigungsanlagen auf den Straßen errichtet. Es ist klar, dass sie darauf abzielen, daraus einen Kampf zu machen.\n\nDie Gräben in der Armee ziehen sich mittlerweile durch jede Einheit und oft sogar zwischen Mitgliedern derselben Familie. [Root.GetNameDefCap] steht am Rande eines Bürgerkriegs."
 mutiny_event.8.a:0 "Das wird ja immer schlimmer."
 mutiny_event.9.t:0 "Eine neue Art von Offizieren"
 mutiny_event.9.desc:0 "Trotz heftiger Einwände des Militärs führte jede Einheit der [Root.GetAdjective]-Armee Wahlen durch, um ihren Kommandeur zu wählen. Die Ergebnisse waren sehr überraschend, da die meisten der Gewählten versierte Soldaten mit viel Erfahrung auf diesem Gebiet sind. Während viele Berufsoffiziere dies immer noch als persönliche Beleidigung betrachten, besteht kaum ein Zweifel daran, dass die meisten Soldaten diese Situation dramatisch bevorzugen."
 mutiny_event.9.a:0 "Das sollte nicht funktionieren, oder?"
