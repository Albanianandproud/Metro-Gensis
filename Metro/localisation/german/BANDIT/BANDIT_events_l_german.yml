l_german:
bandit_event.1.t: "[FROM.GetName] sucht den Beitritt zu unserer Fraktion"
bandit_event.1.d: "[FROM.GetName] bietet uns seine Loyalität an – Partner, mehr oder weniger. Sie schlagen vor, unsere Ziele zu vereinen und unsere Beziehungen zu stärken, damit der Rest der Metro es sich zweimal überlegt, sich mit uns anzulegen."
bandit_event.1.a: "Gemeinsam sind wir stärker."
bandit_event.1.b: "Als Einheit sind wir stärker."
bandit_event.1.c: "Wir brauchen sie nicht."

bandit_event.2.t: "[FROM.GetName] sucht engere Beziehungen"
bandit_event.2.d: "Gesandte von [FROM.GetName] sind in [ROOT.Capital.GetName] eingetroffen, mit einem Vorschlag, verpackt in zweischneidige Worte aus Drohungen und Versprechungen.\n\nSie schlagen vor, dass unsere Kräfte enger zusammenarbeiten und dabei kriminelle Netzwerke, Schmuggelrouten und den Zugang zu Schwarzmarktwaren teilen. Statt um denselben Kuchen zu kämpfen, sollten wir ihn wie jede anständige, zivilisierte Bande aufteilen und gerecht teilen.\n\nDer Umgang mit [FROM.GetName] birgt Risiken. Ihnen zu erlauben, mit unseren Plünderern zusammenzuarbeiten und Informationen auszutauschen, könnte sich langfristig als katastrophal erweisen."
bandit_event.2.a: "Wir helfen gerne."
bandit_event.2.b: "Wir arbeiten nicht mit Parasiten zusammen."

bandit_event.4.t: "[TRT.GetName] akzeptiert unsere Anfrage"
bandit_event.4.d: "Nach dem Besuch unseres Gesandten hat [TRT.GetName] unserer Bitte zugestimmt, dass unsere Milizen enger zusammenarbeiten."
bandit_event.4.a: "Das hören wir gerne."

bandit_event.3.t: "[TRT.GetName] lehnt unsere Anfrage ab"
bandit_event.3.d: "Nach eingehender Beratung über unseren Vorschlag einer engeren Zusammenarbeit hat [TRT.GetName] beschlossen, uns die Unterstützung zu verweigern."
bandit_event.3.a: "Verdammt. Wir brauchen eure Hilfe sowieso nicht..."

bandit_event.5.t: "Organisiertes Banditentum"
bandit_event.5.d: "Die Tage des ungeordneten Banditentums sind vorbei. Was einst ein Haufen Säufer und schmutziger Halsabschneider war, wurde zu einer weit gefährlicheren Organisation geformt.\nSchmuggelrouten werden kartiert, unsere Jungs planen ihre Überfälle und erstellen Listen der Personen, die man erpressen kann. Vom kleinen Gauner bis hin zur rechten Hand des Bosses kennt inzwischen jeder seinen Platz.\nDie Metro wird lernen, uns zu respektieren – oder die Konsequenzen tragen!"
bandit_event.5.a: "Unsere Ordnung oder gar keine!"

bandit_event_internal.1.t: "Wo eine Peitsche ist..."
bandit_event_internal.1.d: "Die Jungs sind faul geworden – zu beschäftigt damit, Röcken hinterherzujagen oder die Bürger von [ROOT.Capital.GetName] zu terrorisieren, statt Geld einzubringen. Sie sitzen lieber an ihren Lagerfeuern in den improvisierten Verstecken herum.\n\nWenn wir in dieser Welt voller Hunde, die einander fressen, überleben und wirklich gefürchtet werden wollen, muss ihnen diese Selbstzufriedenheit ausgetrieben werden.\n\nKlare Befehle sind nötig. Disziplin muss eingeprügelt werden. Ob es ihnen gefällt oder nicht. Jeder wird seinen Platz kennen und sich einreihen."
bandit_event_internal.1.a: "Die Jungs auf Linie zu bringen wäre ein guter Anfang..."
bandit_event_internal.1.a.tt: "Abhängig vom gewählten Fokuspfad müssen wir einen ausreichend hohen Kriegswillen oder Stabilitätswert erreichen."

bandit_event_coercion.1.t: "[FROM.GetName] fordert Tribut!"
bandit_event_coercion.1.d: "Die Banditen von [FROM.GetName] sind mit ihrer üblichen Mischung aus Muskeln statt Worten und ihrem Schlägergehabe zu uns gekommen und verlangen, dass wir Tribut an [FROM.GetLeader] zahlen.\nSie sind gut bewaffnet, und niemand kann sagen, welche militärischen Konsequenzen eine Ablehnung ihres Ultimatums nach sich ziehen würde."
bandit_event_coercion.1.a: "Uns bleibt keine andere Wahl."
bandit_event_coercion.1.b: "Verzieht euch. Wir verhandeln nicht mit Schlägern."

bandit_event_coercion.2.t: "[FROM.GetName] zahlt Tribut"
bandit_event_coercion.2.d: "Unsere Jungs haben wohl genügend einschüchternde Gesichter gezogen, oder Igor hat diese armen Schweine erfolgreich über den Tisch gezogen. Wie auch immer – die Kugeln fließen, und [FROM.GetLeader] wird mit den Neuigkeiten zufrieden sein."
bandit_event_coercion.2.a: "Gut."

bandit_event_coercion.3.t: "[FROM.GetName] lehnt unsere Forderungen ab!"
bandit_event_coercion.3.d: "[FROM.GetName] hat unser Ultimatum zurückgewiesen. Gut, dass die Jungs ohnehin auf eine ordentliche Prügelei aus waren."
bandit_event_coercion.3.a: "Selbst schuld. Igor! Hol die Duplet!"
bandit_event_coercion.3.b: "Bei genauerem Nachdenken haben wir wichtigere Probleme."

bandit_event_coercion.4.t: "[FROM.GetName] fordert unsere Unterwerfung!"
bandit_event_coercion.4.d: "Die Banditen von [FROM.GetName] sind zurückgekehrt. Diesmal sind ihre Forderungen einfach: Unsere Station soll sich ihrer Herrschaft unterwerfen. Ihr angeblicher „Schutz“ soll ihnen dafür uneingeschränkten Zugang gewähren.\nUnter anderen Umständen würde man über ein solches Angebot lachen. Doch sie besitzen die Stärke und die Mannstärke, um ihren Forderungen Nachdruck zu verleihen. Darüber hinaus scheint es, als wären sie bereit, mit Gewalt nachzuhelfen, sollten wir ihr Ultimatum ablehnen."
bandit_event_coercion.4.a: "Wir haben keine andere Wahl."
bandit_event_coercion.4.b: "Dann sollen sie es sich holen kommen!"

bandit_border_conflict_won_attacker.1.t: "[FROM.GetName] Grenzkonflikt: Sieg"
bandit_border_conflict_won_attacker.1.d: "Nach einem entscheidenden Durchbruch durch die Verteidigungslinie rückten unsere Truppen vor und machten kurzen Prozess mit den Verteidigern, die bereits in den ersten Stunden des Gefechts auseinandergerissen wurden. Dieser Sieg wird unseren Truppen großen Ruhm einbringen."
bandit_border_conflict_won_attacker.1.a: "Dem Sieger gehört die Beute!"

bandit_border_conflict_won_defender.1.t: "[FROM.GetName] Grenzkonflikt: Sieg"
bandit_border_conflict_won_defender.1.d: "Unsere Verteidiger gruben sich tief ein und kämpften mit Zähnen und Klauen. Am Ende behielten sie die Oberhand. Die Angreifer wurden niedergeschlagen, als sie versuchten tiefer vorzudringen, verloren schließlich ihren Kampfgeist und zogen sich zurück. Die Tunnel bleiben in unserer Hand, und dieser Sieg sendet eine klare Botschaft: Mit unseren Soldaten legt man sich nicht an."
bandit_border_conflict_won_defender.1.a: "Ein flüchtiger Sieg – sie werden wiederkommen."

bandit_border_conflict_lost_attacker.1.t: "[FROM.GetName] Grenzkonflikt: Niederlage"
bandit_border_conflict_lost_attacker.1.d: "Trotz aller Anstrengungen unserer Soldaten hielten die Verteidiger stand. Innerhalb weniger Minuten verlor unser Angriff an Schwung, und wir waren zum Rückzug gezwungen."
bandit_border_conflict_lost_attacker.1.a: "Wir kommen wieder."

bandit_border_conflict_lost_defender.1.t: "[FROM.GetName] Grenzkonflikt: Niederlage"
bandit_border_conflict_lost_defender.1.d: "Unsere Truppen wurden schließlich vom Feind geschlagen und zerschlagen. Die Überlebenden flohen zu weiter hinten gelegenen Verteidigungsstellungen. So tapfer der Widerstand auch war, er reichte nicht aus, um den Feind aufzuhalten."
bandit_border_conflict_lost_defender.1.a: "Nächstes Mal kriegen wir sie."