  ### KORBUT ###

  RED_korbut:0 "Cheslav Korbut"
  RED_korbut_desc:0 "Der Vorsitzende des §YKGB§! und Leiter der §YIntelligentsia§! der §RRRoten Linie§!. Korbut war gerissen und umsichtig und stieg skrupellos in den Rängen auf, um seine jetzige Position zu erreichen. Er machte sich damit selbst zu einer der wichtigsten Figuren in der §R!Roten Linie§!; Von Natur aus kalt und amoralisch – aber mit der Gabe gesegnet, abweichende Meinungen hart zu unterdrücken. Sein manipulativer Griff, seine verdeckten Machenschaften und seine grandiosen Ambitionen kennen keine Grenzen.\n\n§R Sie können Korbut nur durch Fokusse oder Ereignisse entfernen§!"
  
