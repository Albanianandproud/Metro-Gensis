l_german:
infantry_gear_equipment: "Infanterieausrüstung"
  infantry_gear_equipment_1: "Grundlegende Infanterieausrüstung"
  infantry_gear_equipment_1_desc: "Auch wenn diese bunt zusammengewürfelte Ausrüstung und Bekleidung selbst nach unseren Maßstäben eher primitiv anmutet, dürfte sie unseren Streitkräften gute Dienste leisten. Sie ist allemal besser als das, womit sich unsere Rekruten begnügen müssen – diese sind gezwungen, sich ihre eigene, klapprige Ausrüstung mühsam zusammenzusuchen."
  infantry_gear_equipment_1_short:0 "Grundausrüstung"

  infantry_gear_equipment_2: "Verbesserte Infanterieausrüstung"
  infantry_gear_equipment_2_desc: "Standardisierte Ausrüstung für eine Standardisierte Armee. Passende Stiefel, Handschuhe und sogar Socken – das gilt in der Metro tatsächlich als mehr als angemessen, ja sogar als professionell."
  infantry_gear_equipment_2_short:0 "Verbesserte Ausrüstung"

  infantry_gear_equipment_3: "Fortschrittliche Infanterieausrüstung"
  infantry_gear_equipment_3_desc: "Geeignete militärische Ausrüstung, Koppeltragesysteme und diverses Zubehör, wie sie jede ernstzunehmende Kampftruppe der Metro für die effektive Durchführung ihrer Einsätze benötigt – ob daheim oder im Außeneinsatz."
  infantry_gear_equipment_3_short:0 "Hochwertige Ausrüstung"
  flamethrower_equipment_0:0 "Flammenwerfer-Ausrüstung"
  flamethrower_equipment_0_desc:0 "Ausrüstung die Flammen wirft"
  flamethrower_equipment_0_short:0 "Flammenwerfer"

  explosive_equipment_0:0 "Sprengstoff-Ausrüstung"
  explosive_equipment_0_desc:0 "Ausrüstung die explodiert"
  explosive_equipment_0_short:0 "Sprengstoff"

  gatling_equipment_0:0 "Maschinengewehr-Ausrüstung"
  gatling_equipment_0_desc:0 "Maschinengewehr-Ausrüstung"
  gatling_equipment_0_short:0 "MG"

  piercing_equipment_0:0 "Panzerbrechende Ausrüstung"
  piercing_equipment_desc:0 "Ausrüstung um in genauen Schüssen feindliche Panzerung zu durchdringen"
  piercing_equipment_short:0 "Panzerbrechend"

  basic_infantry_equipment: "Revolver"
  basic_infantry_equipment_desc: "Eine einfache und wirkungsvolle Waffe, hergestellt in der Metro. Ausgestattet mit enormer Kraft hat sie jedoch ein kleines Magazin, hohen Rückstoß und hohe Nachladezeit."
  basic_infantry_equipment_short: "Revolver"

  scrap_infantry_equipment_1: "Bastard-Pistole"
  scrap_infantry_equipment_1_desc: "Eine Maschinenpistole des Kalibers 5.45, hergestellt ind er Waffenkammer der Metro. Die Feuerkraft ist ehern traurig und sie überhitzt wie die Hölle, jedoch kann sie echtes Unterdrückungsfeuer abgeben."
  scrap_infantry_equipment_1_short: "Bastard-MP"

  scrap_infantry_equipment_2: "Schwere Bastard"
  scrap_infantry_equipment_2_desc: "Auch wenn das Design etwas klobig ist und die Waffe nochimmer überhitzt, so ist dieses Modell doch fortschrittlicher als die normale Bastard-Kanone. Ein erweitertes Magazin und eine große Modifizierbarkeit machen sie beliebt in der Metro. Selbst die Soldaten des Ordens fürchten diese Waffe."
  scrap_infantry_equipment_2_short: "Schwere Bastard"

  shotgun_infantry_equipment_1: "Duplet"
  shotgun_infantry_equipment_1_desc: "Eine recht einfache doppelläufige Schrotflinte die Kaliber 12 feuert. Die geringe Magazingröße ist natürlich ein Problem, doch nichts stoppt Mutanten besser als ein Schrot-Schuss aus der Nähe."
  shotgun_infantry_equipment_1_short: "Duplet"

  shotgun_infantry_equipment_2: "Ubonik"
  shotgun_infantry_equipment_2_desc: "Eine Schrotflinte mit nur einem Lauf, jedoch einer Magazingröße von 6 Schuss. Endlich eine Waffe, die auch Horden von Feinden aufhalten kann. Allein die Nachladezeit ist noch zu lang."
  shotgun_infantry_equipment_2_short: "Ubonik"

  conventional_infantry_equipment_1: "AKS-74U"
  conventional_infantry_equipment_1_desc: "Kürzer als seine Brüder der Kalschnikow-Familie, womit sie zwar die Feuerrate, aber nicht die Genauigkeit fortgeschrittener Vollautomaten erhält. Die AKS-74U ist eine kompakte Waffe, gut zu verbergen und perfekt zum Kampf in den engen Tunnels."
  conventional_infantry_equipment_1_short: "AKS-74U"

conventional_infantry_equipment_2: "AK-74M"
  conventional_infantry_equipment_2_desc: "Ein legendäres Sturmgewehr. Seine über Jahre hinweg bewiesene Kampfkraft erfüllt den Besitzer mit Stolz und flößt den Gegnern Respekt ein. In einer Welt nach der Apokalypse sind seine außergewöhnliche Zuverlässigkeit, die einfache Konstruktion und die Fähigkeit, selbst unter widrigsten Bedingungen zu funktionieren, von unschätzbarem Wert. Auch seine Vielseitigkeit kann gar nicht genug hervorgehoben werden."
  conventional_infantry_equipment_2_short: "AK-74M"

  conventional_infantry_equipment_2: "VSK-94"
  conventional_infantry_equipment_2_desc: "Ein genaues Sturmgewehr mit mächtiger Feuerkraft, früher oft von der Polizei getragen. Die Waffe wurde darauf optimiert wenig Geräusche und Mündungsfeuer zu erzeugen, womit sie perfekt für heimliche Operationen geeignet ist."
  conventional_infantry_equipment_2_short: "VSK-94"

  conventional_infantry_equipment_3: "Kalash 2012"
  conventional_infantry_equipment_3_desc: "In der gesamten Metro wird diese Waffe bewundert und begehrt, die letzte Version von Vorkriegs-Kalaschnikows. Sie vereint Feuerkraft, Genauigkeit und Zuverlässlichkeit, womit sie für jede Kampfsituation geeignet ist."
  conventional_infantry_equipment_3_short: "Kalash 2012"

  pneumatic_infantry_equipment_1: "Tihar"
  pneumatic_infantry_equipment_1_desc: "Ein Luftdruckgewehr, eine eindrucksvolle, wenn auch seltsame Waffe. Durch den ständigen Ressourcenmangel ist man in der Metro erfinderisch geworden, das Tihar nichts als Luft und Stahlkugeln, um jemanden töten zu können. Dafür muss die Waffe auch doppelt nachgeladen werden."
  pneumatic_infantry_equipment_1_short: "Tihar"

  pneumatic_infantry_equipment_2: "Helsing"
  pneumatic_infantry_equipment_2_desc: "Eine weitergedachte Version des Tihar. Die Bolzen sind wieder einsammelbar, was der Waffe geradezu unbegrenzte Munition im Feld gibt."
  pneumatic_infantry_equipment_2_short: "Helsing"

  #-# Support Weaponry #-#

  basic_flamethrower_equipment: "Molotov Cocktail"
  basic_flamethrower_equipment_desc: "EinE Flasche mit Brennbarem gefüllt, dazu eine Lunte, sehr effektiv um Regierungen die Meinung zu geigen."
  basic_flamethrower_equipment_short: "Molotov"

  flamethrower_equipment_1: "Einfacher Flammenwerfer"
  flamethrower_equipment_1_desc: "In der Metro hoch verehrt, und das aus gutem Grund. Der enge, klaustrophobische Zustand der Tunnel macht einen Flammenwerfer zu einer äußerst tödlichen und verheerenden Waffe. Kann sowohl mutierte als auch menschliche Feinde verbrennen und vernichten. Trotz seines offenen Designs neigt es bei längerem Gebrauch zur Überhitzung. Es ist immer noch eine effektive Tötungsmaschine."
  flamethrower_equipment_1_short: "Flammenwerfer"

  flamethrower_equipment_2: "Verbesserter Flammenwerfer"
  flamethrower_equipment_2_desc: "Sehr effektiv, sogar so effektiv, dass man aufpassen muss, das er einen nicht den gesamten Suaerstoff verbrennt. "
  flamethrower_equipment_2_short: "Flammenwerfer MK2"

  basic_explosive_equipment: "Nagelgranate"
  basic_explosive_equipment_desc: "Eine Granate mit einer bösen Überraschung gefüllt."
  basic_explosive_equipment_short: "Granate"

  explosive_equipment_1: "Medved"
  explosive_equipment_1_desc: "Ein einfacher selbstgebauter Granatenwerfer, ideal zum Einsatz gegen größere Feindgruppen. "
  explosive_equipment_1_short: "Medved"

  explosive_equipment_2: "Granatwerfer"
  explosive_equipment_2_desc: "Nur nicht gegen die Decke feuern, oder wir sterben hier alle."
  explosive_equipment_2_short: "Granatwerfer"

  basic_gatling_equipment: "Einfaches Maschinengewehr"
  basic_gatling_equipment_desc: "Verwendet 12.7x108mm-Kugeln und davon nicht zu wenige."
  basic_gatling_equipment_short: "Einfaches Maschinengewehr"

  gatling_equipment_1: "Verbessertes Maschinengewehr"
  gatling_equipment_1_desc: "Verbessert das Grundkonzept in jeder Hinsicht."
  gatling_equipment_1_short: "Verbessertes Maschinengewehr"

  gatling_equipment_2: "DShK 12.7mm Maschinengewehr""
  gatling_equipment_2_desc: "Unglaubliche Feuerkraft, mit der man allein eine ganze Armee aufhalten kann, solange man genügend Munition hat. Einziges Problem ist die Überhitzung."
  gatling_equipment_2_short: "DShK Maschinengewehr""

  basic_piercing_equipment: "Schrott-Panzerbüchse"
  basic_piercing_equipment_desc: "basierend auf dem KSVK "Degtyarev Scharfschützengewehr ist das Preved eine der stärksten Waffen in der Metro. Die Waffe ist sehr genau und schießt panzerbrechende Munition, für den Fall dass man an die gepanzerten Ziele nicht nah genug heran kommt."
  basic_piercing_equipment_short: "Preved"

  piercing_equipment_1: "Verbesserte Panzerbüchse"
  piercing_equipment_1_desc: "Nach dem Krieg wurden Scharfschützengewehre sehr selten, doch in der Metro werden sie wieder gebraucht. Wer an das andere Ende eines 100 Meter langen Tunnels feuern kann ist klar im Vorteil."
  piercing_equipment_1_short: "Valve"

  gatling_equipment: "Maschinengewehr-Ausrüstung "
  explosive_equipment: "Sprengstoff-Ausrüstung"
  flamethrower_equipment: "Flammenwerfer-Ausrüstung"
  piercing_equipment: "Panzerbrechende-Ausrüstung"

  nkvd_equipment_1: "NKVD-Ausrüstung"
  nkvd_equipment_1_desc:0 "Das Volkskommisariat für innere Angelegenheiten hat großartige Erfahrung darin, Zivilisten unter Kontrolle zu behalten. Dies brauchen wir auch für unsere wichtigen Soldaten."
  nkvd_equipment_1_short: "NKVD-Ausrüstung"

  #### Rail Equipment ####

  rail_car_equipment: "Draisinen-Ausrüstung."
  rail_cart_equipment: "Schienenwagen-Ausrüstung."
  rail_panzer_equipment: "Schienanpanzer-Ausrüstung."
  
  supplies_equipment_1: "Supply Equipment"
  supplies_equipment_desc: "Various assortments of munitions, first aid supplies and a mishmash of other vital equipment our troops need when in combat. Our forces need a stockpile of these supplies to actively engage in combat duties."
  supplies_equipment_1_short: "Supplies"

  rail_cart_equipment_1: "Handbetriebene Draisine"
  rail_cart_equipment_1_desc: "Unüberraschend ungeeignet für Kampfsituationen, doch mit etwas Panzerung bieten sie geringen Schutz für die Soldaten im Inneren. Am Wichtigsten ist jedoch ihre Verwendung für die Logistik."
  rail_cart_equipment_1_short: "Hand-Draisine"

  rail_cart_equipment_2: "Motorisierte Draisine"
  rail_cart_equipment_2_desc: "Durch die Verwendung eines Motors ist die Draisine nicht nur schneller, sie belastet auch die Soldaten nicht und alle Soldaten in ihr können feuern, während die Draisine fährt."
  rail_cart_equipment_2_short: "Motorisierte Draisine"

  rail_cart_equipment_3: "Allzweckwagen"
  rail_cart_equipment_3_desc: "Eine Vorkriegsdraisine, umgebaut zum motorisierten Allzweckwagen. Ausgestattet mit guter Panzerung und großem Stauraum ist er perfekt für den Dienst in der Armee."
  rail_cart_equipment_3_short: "Allzweckwagen"

  rail_car_equipment_1: "Motorrad-Draisine"
  rail_car_equipment_1_desc: "Gebaut aus erbeuteten Motorrädern von der Oberfläche sind diese Draisinen zwar für den Kmapf ungeeignet, doch Nichts transportiert Munition und Soldaten schneller durch die Tunnels."
  rail_car_equipment_1_short: "Schienenrad"

  rail_car_equipment_2: "Geschütz-Wagen"
  rail_car_equipment_2_desc: "Eine Weiterentwicklung der Motorrad-Draisine, nun bewaffnet mit einem DShK-MG-Geschützturm und zu allen Seiten gepanzert."
  rail_car_equipment_2_short: "MG-Wagen"

  rail_panzer_equipment_1: "Schrottpanzer"
  rail_panzer_equipment_1_desc: "Eine motorisierte Draisine mit massiver Panzerung zu allen Seiten. Dazu ein frei rotierender Turm und mehrere MG-Anbauten. Diese Panzer ähneln ihren Vorbildern von der Oberfläche und in der Metro sind sie beinahe unaufhaltbar."
  rail_panzer_equipment_1_short: "Schrottpanzer"

  rail_panzer_equipment_2: "Verbesserter Panzer"
  rail_panzer_equipment_2_desc: "Stärkere geneigte Panzerung, sowie ein echtes Panzerkaliber mit Explosiv-Munition. Viele Teile hiervon stammen ursprünglich aus echten Panzern oder aus Lokomotiven."
  rail_panzer_equipment_2_short: "Verbesserter Panzer"

  rail_panzer_equipment_3: "Schienenpanzer"
  rail_panzer_equipment_3_desc: "Elegant und schwer gepanzert ist dieses Fahrzeug bestens geeignet, die feindlichen Stellungen zu überrollen. Sie werden in der ganzen Metro gefürchtet.\n\nDas vierte Reich verfolgt die Blitzkriegsstrategie von Hitlers drittem Reich und setzt deshalb stark auf schwere Panzer."
  rail_panzer_equipment_3_short: "Panzer"

  rail_cart_equipment_4: "Schienenbuggy"
  rail_cart_equipment_4_desc: "Es geht nicht zum Strand, es geht zur Front"
  rail_cart_equipment_4_short: "Buggy"

  rail_car_equipment_3: "Gepanzerter Schienenwagen"
  rail_car_equipment_3_desc: "Ursprünglich entwickelt um Flüchtlinge aus der Roten Linie zu schleusen, schwer gepanzert und doch ziemlich schnell."
  rail_car_equipment_3_short: "Regina"

  rail_armored_train_equipment_1: "Gepanzerter Zug"
  rail_armored_train_equipment_1_desc: "Ein ganzer Zug, wiederhergestellt und fahrbereit um Tod und Zerstörung zu bringen. Dieser Zug ist ein Panzer, eine fahrende Festung und ein mobiles Hauptquartier zugleich."
  rail_armored_train_equipment_1_short: "Panzerzug"

  rail_armored_train_equipment_2: "Wurmbrut"
  rail_armored_train_equipment_2_desc: "Der Wurm hat uns allein zu den Erben der Tiefe bestimmt. Uns steht es zu seine Gestalt nachzuahmen und in seiner Form in den Krieg zu ziehen. Unsere Feinde sollen glauben, der Wurm höchstselbst kommt um sie zu vernichten."
  rail_armored_train_equipment_2_short: "Wurmbrut"
  ##    Special Forces    ##

  special_forces_equipment: "Spezialeinheiten-Ausrüstung"

  special_forces_equipment_1: "Spezialeinheiten-Ausrüstung"
  special_forces_equipment_1_desc: "Nur die Besten bekommen dies"
  special_forces_equipment_1_short: "Spec-Ops Eq."

  special_forces_equipment_2: "Verbesserte Spezialeinheiten-Ausrüstung"
  special_forces_equipment_2_desc: "Bessere Filter, Gummianzüge, Schutzwesten..."
  special_forces_equipment_2_short: "Verbessertes Spec-Ops Eq."

  special_forces_equipment_3: "Fortgeschrittene Spezialeinheiten-Ausrüstung"
  special_forces_equipment_3_desc: "Zu den Weiterentwicklungen der Stalker-Ausrüstung in dieser Phase gehören Vollhelme, kugelsichere Westen, Aluminiumhalterungen zur Montage von Rucksäcken und größere Rationen."
  special_forces_equipment_3_short: "Fortgeschrittenes Spec-Ops Eq."

  special_forces_equipment_heavy: "Schwere Spezialeinheiten-Ausrüstung"
  special_forces_equipment_heavy_desc: "Spec-Ops-Ausrüstung kann so spezialisiert werden, dass sie sich ausschließlich auf den Schutz des Trägers konzentriert. Sperrigere, schwerere und weitaus imposantere Spec-Ops-Ausrüstung macht den Träger zu einem wandelnden Panzer."
  special_forces_equipment_heavy_short: "Schweres Spec-Ops Eq."
  
  special_forces_equipment_heavy_2: "Verbesserte schwere Spezialeinheiten-Ausrüstung"
  special_forces_equipment_heavy_2_desc: "Stärkere, leichtere Legierungen, die bei der Herstellung schwerer Spec-Ops-Rüstungen verwendet werden, sorgen dafür, dass der Träger sowohl besser geschützt als auch mobiler ist."
  special_forces_equipment_heavy_2_short: "Verbessertes schweres Spec-Ops Eq."

  special_forces_equipment_light: "Taktische Spezialeinheiten-Ausrüstung"
  special_forces_equipment_light_desc: "Spec-Ops-Ausrüstung kann spezialisiert werden, um sich auf die taktischen Aspekte des Kampfes zu konzentrieren. Durch das Hinzufügen von Dingen wie Nachtsicht, IR-Visieren und einem geringen Gewicht können Stalker in Bewegung bleiben."
  special_forces_equipment_light_short: "Taktisches Spec-Ops Eq."

  special_forces_equipment_light_2: "Verbesserte Taktische Spezialeinheiten-Ausrüstung"
  special_forces_equipment_light_2_desc: "Zu den Weiterentwicklungen der taktischen Stalker-Ausrüstung gehören ultraleichte Körperpanzerung, Standard-Schalldämpfer und Munition in Militärqualität."
  special_forces_equipment_light_2_short: "Verbesserte Taktische Spezialeinheiten-Ausrüstung"


  ## Unique ## 

  shotgun_infantry_equipment_3: "Saiga-12 Automatische Schrotflinte"
  shotgun_infantry_equipment_3_desc: "Eine Automatik-Schrotflinte aus der Vorkriegszeit. Löst das Problem der geringen Schussfolge bei Schrotflinten, perfekt um Horden von Mutanten niederzustrecken."
  shotgun_infantry_equipment_3_short: "Saiga"

  shotgun_infantry_equipment_4: "Schwere automatische Schrotflinte"
  shotgun_infantry_equipment_4_desc: "Entwickelt von den Technikern der Waffenkammer, ist dies eine der mächtigsten Waffen der gesamten Metro, gemssen an ihrer Feuerkraft. Selbst stärkste Mutanten werden durch sie in Sekundenbruchteilen gefällt."
  shotgun_infantry_equipment_4_short: "Abzats"

  conventional_infantry_equipment_4: "Kalashnikov RPK-74"
  conventional_infantry_equipment_4_desc: "Hohe Genauigkeit ist bei dieser Waffe alles, dafür hat sie eine deutliche geringere Nachladegeschwindigkeit als der Rest der Kalsch-Familie."
  conventional_infantry_equipment_4_short: "RPK-74"

  laser_infantry_equipment_1: "Hellbreath Voltkanone"
  laser_infantry_equipment_1_desc: "Diese Schienenkanone feuert Stahlkugeln durch Elektromagnetismus in unglaublicher Geschwindigkeit ab. Selbst härteste Mutantenpanzer können damit geknackt werden, ganz zu schweigen von menschlichen Schädeln."
  laser_infantry_equipment_1_short: "Hellbreath"

  special_forces_equipment_spartan: "Spartaner-Ausrüstung"
  special_forces_equipment_spartan_desc: "Spartaner-Ausrüstung"
  special_forces_equipment_spartan_short: "Spartaner-Ausrüstung"

  special_forces_spartan_equipment_tech: "Spartaner-Ausrüstung"
  special_forces_spartan_equipment_tech_desc: "Spartaner-Ausrüstung"

  special_forces_equipment_spetsnaz: "Spetsnaz-Ausrüstung"
  special_forces_equipment_spetsnaz_desc: "Spetsnaz-Ausrüstung"
  special_forces_equipment_spetsnaz_short: "Spetsnaz-Ausrüstung"

  riot_shield_equipment_1: "OMON-Polizeiausrüstung"
  riot_shield_equipment_1_desc: "Otdel Milicii Osobogo Naznacheniya-Ausrüstung"
  riot_shield_equipment_1_short: "Polizeiausrüstung"


  ## Unique Equipment Variants 

  ARB_gatling_equipment: "FN M249 SAW"
  ARB_gatling_equipment_desc: "M249 ist ein amerikanisches leichtes Maschinengewehr mit einer Feuerkraft von 100 Schuss/Minute. Ungewöhnlich, eine ausländische Waffe in der Metro zu haben, doch am Ende interessieren hier nur die Ergebnisse."
  ARB_gatling_equipment_short: "M249 SAW"

  HNZ_conventional_infantry_equipment_1: "AN-94"
  HNZ_conventional_infantry_equipment_1_desc: "Ein schweres Sturmgewehr, entwickelt im Zweiten Weltkrieg, doch noch immer von beeindruckender Leistung früher waren sie selten, nun können wir sie selbst produzieren."
  HNZ_conventional_infantry_equipment_1_short: "AN-94"

  HNZ_gatling_equipment: "Pecheneg"
  HNZ_gatling_equipment_desc: "Ein schweres Maschinengewehr, welches vor dem 3. Weltkrieg weite Verbreitung fand. Es hat ein großes Magazin, ist zuverlässlich und hat große Feuerkraft."
  HNZ_gatling_equipment_short: "Pecheneg"

  RCH_basic_infantry_equipment: "Lolife"
  RCH_basic_infantry_equipment_desc: "Eine selbstgebaute, halbautomatische Pistole, beliebt durch ihren geringen Preis und ihre hohe Modifizierbarkeit. Sie benutzt das Kaliber .44 Magnum , welches überall in der Metro hergestellt wird, darum findet man eigentlich immer Munition für sie."
  RCH_basic_infantry_equipment_short: "Lolife"

  RCH_conventional_infantry_equipment_4: "Sturmgewehr 33"
  RCH_conventional_infantry_equipment_4_desc: "Unsere Bemühungen unsere Feinde technologisch zu übertrumpfen trägt nun endlich Früchte: Das Sturmgewehr 2033. basierend auf dem exzellenten STG44 der Wehrmacht, welches selbst die Hauptinspiration für die Kalaschnikow war, ist diese Waffe der Gipfel deutscher Qualität. Sie vereint enorme Feuerkraft mit Genauigkeit und hoher Zuverlässlichkeit. Und das Beste ist, unsere Werkstätten können sie vollkommen selbstständig produzieren."
  RCH_conventional_infantry_equipment_4_short: "Sturmgewehr"

  RCH_scrap_infantry_equipment_2: "Volkssturmgewehr 33"
  RCH_scrap_infantry_equipment_2_desc: "Einer der letzten Versuche des dritten Reiches, den Krieg zu gewinnen. Eine einfache, billige Feuerwaffe für das Volk, leicht in großen Mengen herzustellen und benötigt nur wenige Ressourcen. Ein paar Anpassungen waren nötig, doch dann konnte das Reich die Waffe für die Metro replizieren."
  RCH_scrap_infantry_equipment_2_short: "Volkssturmgewehr 33"

  RCH_gatling_equipment: "M134"
  RCH_gatling_equipment_desc: "Mäht die Feinde des Reiches nieder"
  RCH_gatling_equipment_short: "M134"

  RCH_gatling_equipment_2: " Kord-12.7mm Schweres MG"
  RCH_gatling_equipment_2_desc: "Die Roten werden versuchen uns zu überschwämmen, doch wir haben genug Kugeln für sie bereit liegen"
  RCH_gatling_equipment_2_short: "Kord"

  RED_basic_infantry_equipment: "Makarov PM"
  RED_basic_infantry_equipment_desc: "Eine Legendäre Waffe, genau wie die Kalsch oder die PPSH. Robust, zuverlässig und leicht zu produzieren. Die Makarov wird die Soviet-Union zum Sieg führen!"
  RED_basic_infantry_equipment_short: "Makarov"

  RED_scrap_infantry_equipment_2: "PPSh-41 Maschinenpistole"
  RED_scrap_infantry_equipment_2_desc: "Eine der bekanntesten Waffen des Zweiten Weltkrieges, doch auch noch 100 Jahre später verteidigt sie die Soviet-Union. Nicht sonderlich zuverlässlich, doch ihr enormes Magazin macht sie bei Soldaten dennoch beliebt." 
  RED_scrap_infantry_equipment_2_short: "PPSh-41"

  TRT_basic_infantry_equipment: "Ashot"
  TRT_basic_infantry_equipment_desc: "Eine der einfachsten und folglich auch verbreitetsten Waffen in der Metro, eine einfache doppelläufige Schrotflinte. Ein Schrotschuss aus nächster Nähe tötet nahezu alles mit einem Schuss, auch wenn die geringe Kapazität ein Problem darstellt."
  TRT_basic_infantry_equipment_short: "Ashot"

  PEC_basic_infantry_equipment: "Stechkin Automatik-Pistole"
  PEC_basic_infantry_equipment_desc: "Von vielen wegen seines schnellen Nachladens, der großen Magazingröße und des flexiblen Gewichts geschätzt. Ursprünglich an die Sowjetarmee ausgegeben und später auch für nicht-kämpferische Zwecke eingesetzt."
  PEC_basic_infantry_equipment_short: "APS"

  PEC_conventional_infantry_equipment_2: "Bulldog"
  PEC_conventional_infantry_equipment_2_desc: "Eine spezialisierte Form der Kalsch, darauf ausgelegt weniger, aber dafür präzisere Schüsse abzugeben. leider macht sie dies jedoch auch Wartungsintensiv."
  PEC_conventional_infantry_equipment_2_short: "Bulldog"

  PEC_basic_explosive_equipment: "Dynamit"
  PEC_basic_explosive_equipment_desc: "Eine Stange Dynamit, du zündest sie an, sie explodiert. Eigentlich ganz einfach"
  PEC_basic_explosive_equipment_short: "Dynamit"

  PEC_gatling_equipment_2: "NSV Maschinengewehr"
  PEC_gatling_equipment_2_desc: "Das 12,7-mm-Großkaliber-Maschinengewehr „Utes“, ursprünglich ein auf Fahrzeugen montiertes Maschinengewehr, findet nun aber in den schmuddeligen Tiefen der Moskauer U-Bahn einen neuen Zweck. Entwickelt, um das veraltete DshK-Maschinengewehr zu ersetzen und wurde in den 70er Jahren von der Sowjetarmee übernommen."
  PEC_gatling_equipment_2_short: "NSV-12.7 'Utes'"

  PEC_shotgun_infantry_equipment_1: "Repetierflinte"
  PEC_shotgun_infantry_equipment_1_desc: "Eine einläufige 20-Gauge-Schrotflinte mit verschiebbarem Verschluss. Ursprünglich war es für die Jagd vorgesehen, aber sowohl Landwirte als auch Reisende und Kriminelle erfreuten sich aufgrund seines kompakten Designs großer Beliebtheit. Nun erfreut sich „Der Tod des Vorsitzenden“ bei denselben mittellosen Menschen neuer Beliebtheit."
  PEC_shotgun_infantry_equipment_1_short: "TOZ-106"

# conventional_infantry_equipment_2: "AK-103"
# conventional_infantry_equipment_2_desc: "Die AK-103 wurde seit 2001 mehrfach in Konflikte verwickelt und baut auf seinem Vorgänger mit verbesserter Anpassbarkeit auf. Anstatt Holz oder Metall zu verwenden, werden Kunststoffkomponenten verwendet, z. B. am Pistolengriff und am Handschutz. Verbesserte Zuverlässigkeit, obwohl es im Vergleich zu moderneren Waffen seiner Zeit immer noch schlechter abschneidet. Dennoch handelt es sich immer noch um eine kompetente, wenn auch an sich robuste Schusswaffe, die für Russland typisch ist."
# conventional_infantry_equipment_2_short: "AK-103"


