  AVT_political_focus_1: "Expansion nach Außen"
  AVT_political_focus_1_desc: "Nachdem unsere internen Probleme nun gelöst sind, ist es an der Zeit in die Ferne zu blicken. Um eine weltweite Revolution herbeizuführen müssen wir uns in der Metro weiter ausbreiten. Wir sollten so in der Lage sein, abgelegene Stationen in verlassenem Gebiet ordnungsgemäß zu bevölkern."

  AVT_colonization_system: "§YSchaltet die Fähigkeit frei, Ruinen-Staaten zu kolonisieren. Um die Staaten zum Kern zu machen, müssen hierfür Entscheidungen innerhalb des angezeigten Timers getroffen werden!"