l_german:
 nf_ULI.2.t: "Berichte von der Oktyabr'skoe Pole"
 nf_ULI.2.d: "Wir sind auf Berichte aufmerksam geworden, dass die Absperrung bei der Polezhaevskaya durchbrochen wurde! Eine Abteilung von über 100 Soldaten und bewaffnete Milizen von der Begovaya wurden an die Polezhaevskaya geschickt, aber was sie entdeckten, war noch verstörender, als sie sich jemals vorstellen konnten. Die Gesamtheit der Bürger in der Polezhaevskaya-Station ist verschwunden! Keine Spuren von Menschen, keine Spur von Blut oder Patronenhülsen oder auch nur ein Zeichen eines Kampfes! Als wären sie einfach verschwunden."
 nf_ULI.2.a: "Sprengt die Tunnel, wir geben den Norden auf"

 nf_ULI.3.t: "Gebt den Norden auf"
 nf_ULI.3.d: "Die Späher, die nach Norden geschickt wurden, um den verbleibenden Abschnitt der Tagansko-Krasnopresnenskaya zu untersuchen, sind auf mysteriöse Weise verschwunden. Man ging davon aus, dass die erste Gruppe, die entsandt wurde, einfach desertiert war, und man erließ den Befehl, sich nicht auf die Suche nach ihnen zu machen.\nDiese Informationen sind streng geheim und müssen vor dem Rest der Bevölkerung geheim gehalten werden, aus Angst vor einer Massenpanik. Unabhängig davon, ob es sich um eine Bedrohung durch Menschen, Tiere oder etwas anderes handelt, ist offensichtlich klar, dass die Polezhaevskaya möglicherweise dem nächsten paranormalen Verschwinden ausgeliefert ist. Möglicherweise versuchen wir auf subtile Weise, die Station zu „evakuieren“, um die Auswirkungen abzumildern. Oder überlassen Sie die Entscheidung einfach dem Schicksal."
 nf_ULI.3.a: "Seltsame Dinge geschehen dort"
 nf_ULI.3.a.tt: "Die Stationen der §YPolezhaevskaya§! und des §YOktyabr'skoe Pole§! werden früher oder später unbewohnbar werden.\nWir könnten beschließen, eine sichere Evakuierung einzuleiten, ohne unsere Bevölkerung zu beunruhigen, oder versuchen, uns gegen die im Dunkeln lauernde Bedrohung zu wehren."

 nf_ULI.4.t: "Stich in das Herz"
 nf_ULI.4.d: "Unsere Soldaten wurden in die Dunkelheit der Tunnels geschickt. Dreihundert Meter und weitere dreihundert Meter dahinter bewegten sich unsere Soldaten vorwärts. Ihr Marsch ließ nicht nach, bis im Tunnel ein donnerndes Beben ausbrach. Aus Angst vor einem Tunneleinsturz stürmten die Soldaten zurück an die Polezhaevskaya, wo die Bevölkerung in Panik geriet. Als sich die Bevölkerung zu sammeln begann, um von der Station zu fliehen, gelang es den heimkehrenden Soldaten, die verzweifelte Menge zu organisieren. Schließlich gelang es ihnen, die Disziplin unter dem Mob wiederherzustellen."
 nf_ULI.4.a: "Die Bedrohung scheint neutralisiert worden zu sein, gute Arbeit, Soldaten!"

 nf_ULI.5.t: "Fraktionismus in der Konföderation"
 nf_ULI.5.d: "Die Konföderation besteht fast nur noch in ihrem Namen. Früher gab es tatsächlich eine Konföderation, doch mittlerweile ist zwischen den einzelnen Stationen ein Fraktionskonflikt entstanden. Zu ihnen zählen vor allem die Indigos und die Ameisen. Individualistische bzw. kollektivistische Sekten, die sich die Mehrheit der stillen Macht innerhalb der Konföderation teilen. Jede Station herrscht mit einem gewissen Maß an Autonomie voneinander. Die nun zunehmenden Meinungsverschiedenheiten führen auch manchmal dazu führen, dass die gesamte Nation in einer Sackgasse steckt.\n\nDie Ameisen sind gemäß den Prinzipien des Kommunismus stark kollektiviert. Sie glauben, dass ihr ultimatives Ziel darin besteht, auf jede erdenkliche Weise zum Wohlergehen der Station beizutragen.\n\nDie Indigos sind jedoch ein Clan von Dissidenten, die sich zusammengeschlossen haben, um der Aggression der Ameisen zu widerstehen. Jedes ihrer Mitglieder verfügt über seine eigenen einzigartigen Fähigkeiten und glaubt, dass die anstrengende „gemeinsame Arbeit“ nichts für sie ist."
 nf_ULI.5.a: "Die Konföderation muss bestand haben!"
 nf_ULI.5.a.tt: "Wenn unsere §YStabilität§! unter §Y20%§! sinkt, wird eine der §YFraktionen§! sicherlich versuchen, die Macht in der §YKonföderation§! zu übernehmen."

 nf_ULI.6.t: "Die Frage der Führerschaft"
 nf_ULI.6.d: "Die Konföderation hat eine schwierige Zeit hinter sich. Noch drängender sind jedoch die aktuellen Probleme, vor denen der Bund in naher Zukunft steht. Viele Menschen zweifeln als solche an unserem derzeitigen Führer und fordern daher einen Führungswechsel. So sehr, dass diese Bedenken nicht einfach ignoriert werden können."
 nf_ULI.6.a: "Kollektivierung ist unser einziger Weg"
 nf_ULI.6.b: "Individualismus über alles"
 nf_ULI.6.c: "Zotov hat sich als fähiger Anführer erwiesen"

 nf_ULI.10.t: "Eine Konföderation jenseits des Abgrunds"
 nf_ULI.10.d: "Die Konföderation hat einen Wendepunkt erreicht. Interne Streitigkeiten drohen, das Gefüge unserer Gewerkschaft in zwei Teile zu reißen. Einige Seiten beginnen ihre Pläne auszuarbeiten und versuchen nun, unser Regime zu stürzen."
 nf_ULI.10.a: "Die Konföderation muss bestehen bleiben"

 ## Semi Random Events
 nf_ULI.7.t: "Energiemangel"
 nf_ULI.7.d: "Die Bürger der Begovaya wurden kürzlich von unserer Verwaltung darauf aufmerksam gemacht, dass sie der übrigen Bevölkerung die von ihnen entdeckten Treibstoffreserven vorenthalten. Sie weigern sich komplett, es an benachbarte Stationen der Koalition weiterzugeben oder gar zu verkaufen, und sie verkaufen es stattdessen zum doppelten oder dreifachen Preis an Außenstehende, um dadurch Gewinn zu machen."
 nf_ULI.7.a: "Sie haben das Recht, den Kraftstoff nach Belieben zu verkaufen"
 nf_ULI.7.b: "Dieser Treibstoff gehört allen, insbesondere der Konföderation"

 nf_ULI.8.t: "Gerüchte gehen um"
 nf_ULI.8.d: "Die Bürger der Barrikadnaya genießen im Vergleich zu den übrigen Bürgern der Konföderation von 1905 einen hohen Lebensstandard, dank ihrer unmittelbaren Nähe zur reichen Hanse, die an ihrer Station grenzt. Allerdings gibt es in der Konföderation Gerüchte, dass die Hanse nur offen mit den Bürgern von Barrikadnaya Handel treibt, um ihre Station in naher Zukunft friedlich zu untergraben und zu annektieren. Ob das wahr ist, bleibt abzuwarten, auch wenn viele in unserer Verwaltung der Meinung sind, dass die Bürger der Barrikadnaya mit den Grundsätzen, auf denen die Konföderation gegründet wurde, nicht einverstanden sind."
 nf_ULI.8.a: "Verhindert diese Unterwanderung"
 nf_ULI.8.b: "Alles nur Gerüchte"

 nf_ULI.9.t: "Der Begovtsy-Zoll"
 nf_ULI.9.d: "Schon vor langer Zeit ist aufgefallen, dass unsere beiden streitenden Fraktionen nicht miteinander auskommen. Allerdings scheinen die jüngsten Maßnahmen im Vergleich dazu verblasst zu sein. Einwohner der Begovaya fordern nun, dass andere Bürger einen „Zoll“ zahlen müssen, um durch ihr Gebiet zu reisen. Der Preis dieses Zolls kann stark schwanken, vom Entladen aller Kugeln einer Person bis hin zum Verlust der Hälfte der Waren, die sie transportieren möchte."
 nf_ULI.9.a: "Unterbinden wir das, sofort"
 nf_ULI.9.b: "Wir sollten das beenden. Es sei denn..."