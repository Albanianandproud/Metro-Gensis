### Emerald City Interactions ###

 RED_emerald_city_category: "Die sagenumwobene Stadt"
 RED_MSU_vorobyovy_gory_bridge: "Erobern Sie die Worobjowy-Gory-Brücke"
 RED_MSU_vorobyovy_gory_bridge_desc: "Senden Sie eine Truppe Stalker, um die Sparrow Hills-Brücke von Mutanten zu säubern und ein vorläufiges Hauptquartier einzurichten, um weitere Expeditionen über die Brücke zu schicken. Wir werden alles finden, was dahinter liegt, was auch immer sie sind."
 
 RED_MSU_radio_jammers: "Setzen Sie Funkstörsender ein"
 RED_MSU_radio_jammers_desc: "Setzen Sie eine Reserve von Funkstörsendern ein, um die Kommunikation zwischen der Smaragdenen Stadt und den Stalker-Teams am Boden vollständig zu unterbrechen. Während ihre Kommunikation zusammenbricht, können wir uns auf einen Angriff vorbereiten!"

 RED_defend_sparrow_hills: "Verteidigt [288.GetName]"
 RED_defend_sparrow_hills_desc: "Nun da [288.GetName] unter unserer Kontrolle steht, sollten wir ein paar Ressourcen bereitstellen um einen permanenten Brückenkopf einzurichten, eine Position die wir auch halten können."

 RED_MSU_stalker_hit_squads: "Testet die Verteidigung"
 RED_MSU_stalker_hit_squads_desc: "Wenn es unweigerlich zu einem Krieg kommt, so wird es hilfreich sein, unsere eigenen Spezialeinheiten zu entsenden, um vorteilhafte Punkte auszukundschaften."

 RED_MSU_launch_border_skirmish: "Beginnen sie einen Grenzkonflikt"
 RED_MSU_launch_border_skirmish_desc: "Jetzt, da wir wissen, dass das Gebiet jenseits des Flusses tatsächlich bewohnt ist und wir die Notlage ihre Proletariats erkennen, bleibt uns nur noch eine Option."

 RED_MSU_escalate_war: "Eskaliert den §RKrieg!§! mit der Smaragdenen Stadt"

## Minister Departments ##

 RED_ministry_departments: "Die Ministerien der [RED.GetName]"
 RED_ministry_departments_desc: "§R[RED.GetNameDef]§! versucht den Hammer und die Sichel über die gesamte Welt zu bringen. Indem wir £pol_power_icon §YPolitische Macht§! nutzen, können wir interne §YMinisterien§! gründen, um unseren Staat zu verwalten. Einzigartige  Pfade werden freigeschaltet durch  §YFokusbäume§! oder §YEvents§!."
 ##The higher tier a department is, the more political power it will cost to maintain. You may scale-down or outright purge departments back to Tier I if necessary, however this will put said ministry out of commission for a short time. Be wary of giving certain departments to much power quickly however.


