 YAS_britvin:0 "Pyotr Ivanovich Britvin"
 YAS_BRITVIN_DESC:0 "§Y...Ein kahler Schädel, eine große Stirn, dicke Augenbrauen, ein stählerner Blick und ein schweres Kinn mit Narbe, um den Hals ein Kreuz neben einer Hundemarke...§!\n\nNach dem Ausbruch am Bittsevsky Park ergriff Pyotr Britvin die Nachfolge des verstorbenen Anführers und wurde schnell der unangefochtene Despot der Station. Mit Disziplin und Militarismus hält er die strenge Ordnung aufrecht und meidet den Kontakt mit der Außenwelt, um so einer weiteren Seuche zu entgehen."
 
 YAS_isolationist:0 "Sturer Isolationist"