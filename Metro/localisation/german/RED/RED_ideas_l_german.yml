l_german:

 communist_fascist_aggression: "Kommunistisch-Faschistischer Konflikt"
 communist_fascist_aggression_desc: "Die Rote Linie und das Reich befinden sich im Gemetzel eines ewigen Krieges gegeneinander.\n\n§RSolange beide stehen, wird es keinen Frieden geben§!"
 
 red_line:0 "Die Rote Linie"
 red_line_desc:0 "§RDas einfache Volk der Roten Linie ist bereit zu sterben, um die Ideale Lenins und des Vorsitzenden zu bewahren, wenn es nötig ist!§!\n\n"

 RED_disintegrating_military:0 "Zerfallendes Militär"
 RED_disintegrating_military_desc:0 "Unsere Streitkräfte liegen zerschmettert da; Erschöpft vom Koalitionskrieg, der vor nicht einmal einem Jahrzehnt geführt wurde. Unsere Streitkräfte benötigen mehr als nur neue Waffen und neue Rekruten, sondern eine vollständige Umstrukturierung von oben bis unten, wenn wir das Banner der Sowjetunion verteidigen wollen.\n\n"

 RED_exhausted_economy_tt:0 "Erschöpfte Wirtschaft"
 RED_exhausted_economy_tt_desc:0 "Trotz unseres „Sieges“ gegen die Kapitalisten der Hanse liegt unsere Wirtschaft in Trümmern. Wir müssen uns die Zeit nehmen wenn wir eine Industriemacht wie die ehemalige Sovietunion werden wollen!\n"

 RED_mutinies:0 "Meutereien in der Armee"
 RED_mutinies_desc:0 "Der verheerende §2Koalitionskrieges§! und seine Auswirkungen sind deutlich innerhalb der neuen §YRoten Armee§! zu spüren. Viele Soldaten murren und zeigen ihre Unzufriedenheit nach außen. Viele von ihnen glauben, dass Andrej den Idealen Lenins und des Marxismus in den Rücken gefallen ist, indem er Frieden mit den kapitalistischen Schweinen der §YHanse§! geschlossen hat. Eine vollständige Überarbeitung des Militärs wird Zeit brauchen."

 revolutionist_plot_1:0 "Revolutionäre Verschwörungen"
 revolutionist_plot_1_desc:0 "Gedämpfte Stimmen und ein Flüstern in den Schatten sprechen von einem zugrunde liegenden Plan, die Rote Linie von ihren derzeitigen „rückgratlosen“ Anführern zu befreien. Viele Stationsbeamte lachen darüber und blicken dennoch unbehaglich auf ihre eigenen Schatten. Niemandem kann richtig vertraut werden, bis die Verschwörung aufgedeckt wird, ob nun ein Trugschluss oder nicht.\n\nDie §RGulyai-Pole-Republik§! darf nicht existieren, dann wird der Nationalgeist beseitigt!\nOder..."

 RED_intra_stational_socialism: "Innerstationärer Sozialismus"
 RED_intra_stational_socialism_desc: "Derzeit hält die Rote Linie an der Politik des „Aufbaus des Sozialismus in einer Linie“ fest. Die permanente Revolution ist nach der Pattsituation, in der sich Sokolnitscheskaja während des §2Koalitionskrieges§! befand, in den Hintergrund getreten. Das ultimative Ziel bleibt jedoch die Befreiung der gesamten Metro unter dem Banner des Sozialismus."
 RED_intra_stational_socialism_tt: "Legt Regel fest: £trigger_no Kann Freiwillige entsenden."

 RED_intra_stational_socialism_reformed: "Metroweiter Sozialismus"

 RED_fragmented_military:0 "Fragmentiertes Militär"
 RED_fragmented_military_desc:0 "Während des §CKoalitionskrieges§!, wurden unsere Streitkräfte überlastet, Missverständnisse und eine nichtvorhandene kohärente, einheitliche Planung führten zum Aufstieg eines aufgeblasenen Militärkommandos. Ihre Geschichten und Heldentaten sind bekannter als ihre tatsächlichen Leistungen. Sie dominieren jetzt die Oberbefehlsstruktur der §YRoten Armee§!. Unser aufgeblähtes Kommando loszuwerden, wird eine gewaltige Herausforderung sein, und ihre Macht wird von Tag zu Tag immer größer."

 RED_bastion_of_socialism_idea:0 "Bastion des Sozialismus"
 RED_bastion_of_socialism_idea_desc:0 "Geboren aus dem heruntergekommenen Kadaver des §CZentralen Metro-Kommandos§!, auf der §RSokolnicheskaya-Linie§! - das bleibende Erbe, die Macht und der Glanz der §YUdSSR§!. Die Aura sowjetischen Ruhms, die von den Fassaden und Gebäuden der Linien ausging, löste eine Welle sozialistischer Nostalgie aus – ein Neuanfang zur Schaffung einer sozialistischen Utopie."

 RED_reforming_military:0 "Reform des Militärs"
 RED_reforming_military_desc:0 "Unser Militär hat sein volles Potenzial noch lange nicht erreicht, der korrupte Führungsstab ist voll von Oligarchen, die das Militär zur Wahrung ihrer eigenen Interessen nutzen und die tapferen Soldaten dazu zwingen, gegen den Willen der Massen zu handeln. Dies kann nicht länger toleriert werden, unsere Armee ist der Nachfolger der stolzen Roten Armee und durch die Reform des Militärs werden wir die Oligarchen auslöschen und unsere stolze Armee befreien."

 RED_commanders_short_supply:0 "Kommandeure sind Mangelware"
 RED_commanders_short_supply_desc:0 "Die Befreiung der Armee führte zu einem Mangel an effektiven Kommandeuren zur Führung der Armee. Mit der Zeit wird dieses Problem gelöst und es werden mutige Kommandeure auftauchen, die bereit sind, ihr Leben für die Union zu geben."

 RED_generals_siphoning_manpower:0 "Arbeitskräfte abgezogen"
 RED_generals_siphoning_manpower_desc:0 "Die Armee befindet sich in einer kritischen Situation, da sich die Soldaten der Fraktion der Oligarchen-Verräter anschließen. Wir müssen dieses Problem lösen, bevor es zu spät ist."

 RED_soldiers_siphoning_equipment:0 "Entzogene Ausrüstung"
 RED_soldiers_siphoning_equipment_desc:0 "Die Oligarchen im Stab geben den Großteil unserer modernen Ausrüstung an ihre loyalen Kräfte weiter. Wenn das so weitergeht, werden die Kräfte der Oligarchen ausreichen, um mit denen der Regierung zu konkurrieren ..."

 RED_de_kulakization:0 "De-Kulakisierung"
 RED_de_kulakization_desc:0 "Die Klasse der Kulaken muss vernichtet werden, um die Gleichheit und Armut wiederherzustellen, für die die Union kämpft. Wir werden alle ihre Güter beschlagnahmen, um sie an die Bevölkerung weiterzuverteilen."

 RED_economy_improve_line:0 "Verbessern Sie die Sokolnicheskaya"
 RED_economy_improve_line_desc:0 ""

 RED_economy_improve_living:0 "Lebensbedingungen verbessern"
 RED_economy_improve_living_desc:0 "Mit zunehmenden Investitionen in die Erforschung gesünderer Formen der Lebensmittelproduktion und besserer Medikamente werden sich die Lebensbedingungen in der Union schnell verbessern und wir werden zu einem besseren Ort zum Leben in diesen dunklen Tunnels."

 RED_mushroom_revolt:0 "Pilzaufstände"
 RED_mushroom_revolt_desc:0 "Unsere Arbeiter werden manipuliert und wir müssen ihnen zeigen, dass wir versuchen, sie zu schützen und dass die Gewerkschaft für sie da ist."

 RED_protests:0 "Massenproteste"
 RED_protests_desc:0 "Menschen übernehmen unsere Stationen, was den Verkehr und Handel zwischen unseren Stationen erheblich erschwert. Wir müssen dieses Problem lösen, bevor eine Konterrevolution beginnt ..."

 RED_military_mutinies:0 "Militärische Meutereien"
 RED_military_mutinies_desc:0 "Die Oligarchen nutzen ihre Macht, um die Armee zu manipulieren, um gegen die Union vorzugehen. Unsere Reformen missbilligten sie und sie versuchen nun einen Putsch zu starten. Wir müssen verhindern, dass sie genug Macht ergreifen, um die Revolution zu zerstören und die Kontrolle über unsere Kameraden zurückzugewinnen, und natürlich die Verräter bestrafen ..."

 RED_military_mutinies_2:0 "Nachlassende militärische Meutereien"
 RED_military_mutinies_2_desc:0 "Die Oligarchen verlieren dank unserer Aktionen ihre Macht, wir gewinnen das Vertrauen unserer Soldaten zurück, in ein paar Monaten werden wir die Verräter bestrafen."

 RED_military_mutinies_3:0 "Zerbröckelnde militärische Meutereien"
 RED_military_mutinies_3_desc:0 "Wir haben es geschafft, das Vertrauen unserer Soldaten zurückzugewinnen. Sie führen Meutereien durch, um sich dem korrupten Personal entgegenzustellen. Es ist an uns, unseren Kameraden zu helfen und diese Bastarde zu vernichten, die es gegen die Union versucht haben."

 RED_mass_protests:0 "Massendemonstrationen"
 RED_mass_protests_desc:0 "Das Volk wird von unseren Feinden dazu manipuliert, gegen die Union vorzugehen. Wir müssen ihnen ihre Fehler zeigen, und wenn sie es nicht akzeptieren, werden wir sie dazu zwingen, nachzugeben"

 RED_staff_purge_idea:0 "Personalsäuberung"
 RED_staff_purge_idea_desc:0 "Wir haben unsere tapfere Armee endlich von der Kontrolle der Oligarchen befreit, aber das hat zu einem Mangel an Generälen geführt, um das Verschwinden der Oligarchen herbeizuführen. Es wird einige Zeit dauern, bis sich unser Personal erholt, aber wenn es soweit ist, wird die Sowjetunion nicht mehr aufzuhalten sein."

 RED_polis_treaty_2:0 "Der Zweite Vertrag der Polis"
 RED_polis_treaty_2_desc:0 ""

 RED_militarization_scale_back: "Reduzieren Sie das Militär"
 RED_workers_councils: "Arbeiterräte"

 RED_sovkhozes_farms:0 "Sovkhozes"
 RED_sovkhozes_farms_desc:0 "Die Sowchosen waren kleinere Bauernhöfe als die Kolchosen, die Sowchosen waren ebenfalls vom Staat abhängig, waren aber billiger, weil sie weniger Arbeitskräfte brauchten, die Geräte dieser Bauernhöfe konnten den Bedarf unserer Bevölkerung decken und benötigten weniger Platz als die Kolchosen."

 RED_kolkhozes_farm:0 "Kolchosen"
 RED_kolkhozes_farm_desc:0 "Die Kolchosen waren vom Staat verwaltete Kollektivwirtschaften, die 1929 gegründet wurden und in denen verschiedene Bauern auf derselben Farm arbeiteten, um Getreide zu produzieren. Die Einrichtung solcher Farmen würde genug Nahrungsmittel für unsere Bevölkerung produzieren und wir könnten sie sogar an andere Stationen exportieren. Dies würde jedoch weniger Platz für die Entwicklung anderer Sektoren und höhere Ausgaben als die Sowchosen kosten."

 RED_quotas_production:0 "Produktionsquoten"
 RED_quotas_production_desc:0 "Die Produktionsquoten sind für unsere Existenz notwendig, ohne sie werden die Bedürfnisse der Armee und der Bevölkerung nicht gedeckt und würden letztendlich zu einer großen Katastrophe führen. Vielleicht werden die hohen Produktionsquoten gehasst, aber sie sind im Moment notwendig ..."

 RED_cutting_edge:0 "Modernste Entwicklungen"
 RED_cutting_edge_desc:0 "Wenn sich die Union durchsetzen muss, müssen unsere Forscher Innovationen bei den Produktionsmethoden und der Kriegsmaschinerie hervorbringen. Wir werden dafür sorgen, dass unsere Technologie die fortschrittlichste in der gesamten Metro wird."

 RED_socialist_radio_idea:0 "Sozialistisches Radio"
 RED_socialist_radio_idea_desc:0 "In diesen dunklen Zeiten findet unser Volk keine Motivation, alles was es sieht ist Tod und ein ständiger Kampf ums Überleben. Wenn wir aber das Funksystem der Moskauer Metro reparieren können, könnten wir es nutzen, um unserem Volk die sozialistische Botschaft zu übermitteln, die vorübergehend Hoffnung und einen Grund gibt, am Leben zu bleiben."

 RED_socialist_radio_2_idea:0 "Radiokampagnen"
 RED_socialist_radio_2_idea_desc:0 "Unsere Regierung ist stark, aber nicht stark genug. Wenn wir die Revolution ausweiten wollen, brauchen wir eine Regierung die in der Lage ist den verschiedenen Ideologien in der Moskauer Metro zu widerstehen und sie auszurotten. Dafür werden wir verschiedene Radiokampagnen einsetzen, um die Loyalität unseres Volkes zu stärken. Wir werden als Nachfolger der Sowjetunion alles Notwendige für die Revolution tun."

 RED_propaganda_tune_radio:0 "Radio Propaganda"
 RED_propaganda_tune_radio_desc:0 "Propaganda spielte in der sowjetischen Geschichte eine Schlüsselrolle, da sie dazu diente, die Menschen zu motivieren für die Revolution zu arbeiten und zu kämpfen. Wenn wir derNachfolger der Sowjetunion werden wollen, müssen wir die sozialistische Propaganda als einen Schritt in die Zukunft meistern."

 RED_propaganda_tune_radio_relations:0 "Verdienste der Sowjetunion"
 RED_propaganda_tune_radio_relations_desc:0 "Die Errungenschaften der Sowjetunion stehen außer Frage, Zerstörer des Nationalsozialismus, Retter der Welt und Retter der Menschheit. Wir müssen unserem Volk zeigen, was die Union gewonnen hat und wofür sie steht..."

 RED_propaganda_tune_radio_subversion:0 "Radio-Subversion"
 RED_propaganda_tune_radio_subversion_desc:0 "Wir können das Radio nutzen, um unserem Volk die Absichten unserer Feinde mitzuteilen. Wir müssen ihnen die Bedrohungen aufzeigen, die die Union umgeben und ihnen zeigen, dass wir zuerst angreifen müssen, wenn wir die Union schützen wollen."

 RED_project_soviet_ism:0 "Projekt `Sowjet-Nostalgie`"
 RED_project_soviet_ism_desc:0 "Die dunkle Atmosphäre, die Strahlung und die Gefahren der Welt schwächen die Moral unseres Volkes, aber wenn wir ihnen die goldenen Tage der Sowjetunion näherbringen, könnten wir ihnen Hoffnung geben, Hoffnung auf eine neue Welt. Eine goldene, rote neue Welt."

 RED_prioritise_art_and_culture_big:0 "Fördern Sie die Künste"
 RED_prioritise_art_and_culture_big_desc:0 "In diesen dunklen Zeiten haben die Menschen keine Ablenkung von all der Grausamkeit der Welt, wir müssen dies ändern, indem wir die Künste anregen, wir werden ihnen eine Ablenkung geben und vielleicht können wir sie auch nutzen, um die Moral unseres Volkes zu stärken ..."

 RED_prioritise_art_and_culture_small:0 "Mittel für die Künste"
 RED_prioritise_art_and_culture_small_desc:0 "Die Kunstförderung war äußerst effektiv, aber wir müssen mehr Mittel bereitstellen, dass die Kunst auch wirklich die Herzen der Menschen erreicht."

 RED_conscription_reforms:0 "Wehrpflichtreformen"
 RED_conscription_reforms_desc:0 "Wenn wir die Metro vereinen wollen, müssen wir genügend Männer haben um den Bedarf unserer Armee zu decken. Durch Propagandabemühungen und wirtschaftliche Anreize werden wir unsere Männer dazu bringen, der Armee beizutreten."

 RED_adaptable_force:0 "Eine anpassungsfähige Kraft"
 RED_adaptable_force_desc:0 "Wenn wir die Union in dieser dunklen Welt retten wollen, müssen wir unsere Armee in die Lage versetzen, auf jede mögliche Taktik des Feindes angemessen zu reagieren und einen geeigneten Gegenangriff zu formulieren."

 RED_gun_production_boost:0 "Verbesserte Feuerkraft"
 RED_gun_production_boost_desc:0 "Bei unserer wachsenden Armee hat sich gezeigt, dass es an hochwertiger Ausrüstung für die Bewaffnung unserer tapferen Soldaten mangelt. Als Nachfolger der Sowjetunion müssen wir in der Lage sein, jeden Soldaten mit den fortschrittlichsten Waffen in unserem Arsenal auszustatten."

 RED_coordination_efforts:0 "Koordinationsstrategien"
 RED_coordination_efforts_desc:0 "Eine unkoordinierte Armee ist eine schwache Armee. Unsere Armee wird in der Lage sein, Operationen mit perfekter Koordination durchzuführen, um die feindlichen Streitkräfte mit dem geringstmöglichen Risiko zu vernichten. Wir werden nicht die Fehler unserer Vorfahren begehen ..."

 RED_outside_volunteers:0 "Externe Freiwillige"
 RED_outside_volunteers_desc:0 "Die Menschen in der Metro haben die Revolution als ihre wahre Zukunft gesehen, als einen Kampf für die Menschlichkeit. Sie schließen sich der Armee an, um der Union bei der Verbreitung der Botschaft der wahren Revolution zu helfen."

 RED_recruitment_campaigns:0 "Rekrutierungskampagnen"
 RED_recruitment_campaigns_desc:0 "Das Mutterland ruft seine Kinder dazu auf, das zurückzuerobern, was ihnen gehört. Niemand kann diesen Aufruf ignorieren. Unsere Männer müssen sich der Armee anschließen, um das sowjetische Land zurückzuerobern, angefangen bei der Metro. Das Mutterland wird dafür sorgen, dass ihre Kinder noch am Leben sind und bereit sind, sie zu retten."

 RED_human_waves:0 "Taktiken der menschlichen Welle"
 RED_human_waves_desc:0 "Das was die Rote Linie auszeichnet ist ihre große Bevölkerung und ihre zahlreichen Feinde. Wir müssen unsere große Bevölkerung ausnutzen, um eine riesige Armee aufzustellen, die in der Lage ist, alle unsere feindlichen Armeen zahlenmäßig zu überwältigen, um sie zu besiegen und die Union zu verteidigen."

 RED_heroic_deeds:0 "Heldentaten"
 RED_heroic_deeds_desc:0 "Unsere tapferen Soldaten sind die einzigen, die in der Lage sind, die verschiedenen Schrecken in der Metro zu stoppen, die unermüdlich versuchen die Union zu zerstören. Unsere Soldaten werden alles tun um unsere Feinde aufzuhalten, selbst wenn sie für die Sowjetunion sterben sollten ..."

 RED_ura_uraa:0 "Ura! Uraa!"
 RED_ura_uraa_desc:0 "Unsere Feinde sind geschwächt, die Helden der Verteidigung haben es möglich gemacht, sich selbst einzuschüchtern, es ist Zeit, Rache zu üben, es ist Zeit anzugreifen! URAA!"

 RED_flamethrowers:0 "Flammenwerfer"
 RED_flamethrowers_desc:0 "Die Flammenwerfer haben sich in der Metro als nützliche Waffen erwiesen, die engen Tunnel und ihre große Feuerkraft sind die Hauptgründe für den wachsenden Nutzen dieser Waffe im Kampf. Wir müssen die besten Flammenwerfer in der Metro entwickeln, um die Flammen der Revolution zu verbreiten"

 RED_army_maxims:0 "Maximen für die Armee"
 RED_army_maxims_desc:0 "Die Gatling-Geschütze sind sehr starke Waffen, die ein Bataillon besiegen können, wenn sie gut eingesetzt werden. Wir können bei der Entwicklung dieser Waffe im Krieg nicht hinter unseren Feinden zurückbleiben, wir müssen unseren Feinden die Macht der Union zeigen."

 RED_spec_ops_hardness:0 "Verbesserte Spec-Ops-Ausrüstung"
 RED_spec_ops_hardness_desc:0 "Die Spezialeinheiten sind zu einem der wichtigsten Faktoren im Krieg der Metro geworden. Von der Aufklärungsmission bis zum gezielten Angriff sind sie sehr nützlich und der Schlüssel zum Sieg in einem Krieg. Unsere Spezialeinheiten müssen leuchten wie das Herz der Linie."

 RED_technicians_1_idea:0 "Technikerhandwerk"
 RED_technicians_1_idea_desc:0 "Wir werden unsere Waffenproduktion nutzen, um jeden Soldaten der Union mit der fortschrittlichsten Ausrüstung der gesamten Metro auszustatten. Unsere Techniker werden die Verantwortung für diese schwere, aber nicht unmögliche Aufgabe tragen."

 RED_technicians_2_idea:0 "Fachwissen der Techniker"
 RED_technicians_2_idea_desc:0 "Mit der Zeit entwickeln unsere Techniker schnellere und produktivere Methoden, um die besten Waffen für die Sowjetunion zu bauen."

 RED_technicians_3a_idea:0 "Technicians Knowledge"
 RED_technicians_3a_idea_desc:0 "Most of our technicians are already experts in the constructions of our arms,faster and more productive production lines have been developed and our army is receiving the benefits."

 RED_technicians_3b_idea:0 "Techniker-Stärke"
 RED_technicians_3b_idea_desc:0 "Die Techniker der Union sind die produktivsten und effizientesten in der gesamten Metro. Mit den Waffen, die in der Lage sind, die Anforderungen der Armee zu erfüllen, ist der Sieg der Revolution so nah wie noch nie zuvor."

 RED_frontline_aggressive:0 "Aggressive Operationen"
 RED_frontline_aggressive_desc:0 "Es ist an der Zeit, dass das Reich fällt. Wir müssen unsere stärkere Armee ausnutzen, um ihre Armee zu vernichten und ihre Arbeiter zu befreien."

 RED_frontline_defensive:0 "Verteidigungsbewegung"
 RED_frontline_defensive_desc:0 "Selbst mit unserer starken Armee müssen wir Vorsichtsmaßnahmen gegenüber dem Reich treffen. Wir werden unsere Frontlinie mit starken Verteidigungsstellungen sichern und nicht die Fehler der Vergangenheit begehen ..."

 RED_frontline_reinforce:0 "Verstärkungskoordination"
 RED_frontline_reinforce_desc:0 "Eine effiziente Verstärkung ist der Schlüssel, um den Vorstoß zum Herzen des Feindes fortzusetzen und unsere Frontlinie aufrechtzuerhalten."

 RED_frontline_AT:0 "Panzerabwehrkanonen"
 RED_frontline_AT_desc:0 "Sogar in der Metro haben sich Panzer als Schlüsselelement für den Fortgang des Krieges erwiesen. Wir müssen unsere Infanterie mit Waffen ausstatten, die in der Lage sind, diese Schrott-Monster zu bekämpfen."

 RED_fight_against_fascism:0 "Kampf gegen den Faschismus"
 RED_fight_against_fascism_desc:0 "Seit der Geburt der Sowjetunion im Jahr 1922 haben die Faschisten immer wieder versucht uns zu zerstören. Unser ewiger Feind hat uns bis ans Ende der Welt verfolgt, doch wir müssen ihn hier und jetzt zerstören und wir werden dafür sorgen, dass er nie zurückkehrt. Die neue Welt braucht keine vergangene Krankheit."

 RED_aggressive_containment:0 "Aggressive Eindämmung"
 RED_aggressive_containment_desc:0 "Wir werden die Armee des Vierten Reiches zerschlagen, so wie es die Sowjetunion mit der Armee des Dritten Reiches getan hat ..."

 RED_MSU_battering_rams:0 "Rammböcke"
 RED_MSU_battering_rams_desc:0 "Wie der Hammer der Arbeiter schlägt unsere Armee auf den Feind ein. Ein Schlag und das Reich fällt"

 RED_hit_squads:0 "Oberflächenscharfschützen"
 RED_hit_squads_desc:0 "Unsere Spezialeinheiten werden darauf trainiert, geeignete Stellungen für Scharfschützen zu finden und sie im Kampf einzusetzen, um den Feind zu schwächen, bevor die Hauptschlacht überhaupt erst beginnt. Diese Schulung beinhaltet auch den perfekten Einsatz der fortschrittlichsten Scharfschützen der Sowjetunion."

 RED_radio_jamming:0 "Störsender"
 RED_radio_jamming_desc:0 "Die Einführung von Funkstörsendern im Kampf hat dazu geführt, dass unsere Streitkräfte nicht mehr so ​​effektiv sind, wenn es um die Planung geht. Dies führt auch dazu, dass unsere Truppen weniger effektiv sind, wenn es um Angriffs- oder Verteidigungsentscheidungen geht."

 RED_special_research:0 "Die Geburt des sowjetischen Wissenschaftsbüros"
 RED_special_research_desc:0 "Die technologischen Fortschritte sind entscheidend für das korrekte Funktionieren einer Fraktion innerhalb der Metro. Davon hängen die Armee und die industrielle Effizienz ab. Wir werden das Sowjetische Wissenschaftliche Büro (SWB) gründen, um die Sowjetunion an der Spitze der Metro zu halten."

 RED_special_research_volunteers:0 "Unwillige Freiwillige"
 RED_special_research_volunteers_desc:0 "Unsere Bevölkerung unterstützt unsere Bemühungen in der technologischen Entwicklung der Union am meisten, wir werden nach fähigen Personen suchen und sie zur Teilnahme an SWB zwingen."

 RED_special_research_volunteers_breakthrough:0 "Wissenschaftliche Durchbrüche"
 RED_special_research_volunteers_breakthrough_desc:0 "Dank der Einrichtung einer Wehrpflichtstelle möchten die meisten unserer Männer lieber Wissenschaftler als Soldat werden, was für die SWB ein Erfolg, für die Armee jedoch ein Desaster ist."

 RED_special_research_funding:0 "Spezialisierte Forschungsförderung"
 RED_special_research_funding_desc:0 "Durch eine Ausweitung der Finanzierung des SWB wurden ihre Mittel und Methoden verbessert, um die Entwicklung neuer Produkte und Waffen zur Unterstützung der Sowjetunion voran zu treiben."

 RED_special_research_funding_breakthrough:0 "Durchbrüche des sowjetischen Wissenschaftsbüros"
 RED_special_research_funding_breakthrough_desc:0 "Unsere Bemühungen im SWB zeigen erste Ergebnisse, ein wichtiger Forschungsboom beginnt und verspricht, uns an die Spitze der Wissenschaft in der Metro zu bringen."

 NKVD_secret_police_1:0 "Geheim-Polizei"
 NKVD_secret_police_1_desc:0 "Mit unseren neuen Territorien ist ein neuer Bedarf entstanden, der Bedarf nach einer Polizei, die in der Lage ist, die Kontrolle in den Stationen mit anderen Ideologien aufrechtzuerhalten. Sie ist für das Leben der Union von wesentlicher Bedeutung."

 NKVD_secret_police_2:0 "Geheimpolizei"
 NKVD_secret_police_2_desc:0 "Wenn wir die Sicherheit der Union aufrechterhalten wollen, müssen wir ihre Bevölkerung unter Kontrolle halten. Wir werden eine Geheimpolizei schaffen, die in der Lage ist, subversive Elemente in der Gesellschaft zu zerstören, bevor sie die Union zerstören."

 NKVD_administration_roles:0 "Verwaltungsrollen für das NKWD"
 NKVD_administration_roles_desc:0 "Wenn wir in der Union mehr Macht konzentrieren wollen, müssen wir die wichtigsten Aufgaben im Verwaltungssektor übernehmen."

 RED_nkvd_anti_corruption_force:0 "Anti-Korruptions-Einheit"
 RED_nkvd_anti_corruption_force_desc:0 "Die große Krankheit der sozialistischen Gesellschaft war schon immer die Korruption. Um die Existenz der Union zu sichern, werden wir Kräfte entwickeln, die in der Lage sind die Korruption zu bekämpfen und auszurotten."

 RED_nkvd_spy_networks:0 "Spionagenetzwerke"
 RED_nkvd_spy_networks_desc:0 "Der NKWD wurde schon immer für seine Arbeit in der Spionage gewürdigt, doch nun ist es an der Zeit unser wahres Potenzial zur Verteidigung der Sowjetunion auszuschöpfen."

 RED_building_the_world_for_tomorrow:0 "Bauen für die Welt von morgen"
 RED_building_the_world_for_tomorrow_desc:0 "Diese dunklen Tunnel werden der Ort sein, an dem die Grundlagen einer neuen Welt errichtet wurden. Wir müssen sie darauf vorbereiten, die goldene Welt zu errichten, die auf uns warten soll."

 RED_for_the_world_tomorrow:0 "Für die Welt von morgen"
 RED_for_the_world_tomorrow_desc:0 "Wir sind die Einzigen, die in der Lage sind, diese dunkle Welt wieder aufzubauen. Die Wiederherstellung alter Technologien wird der erste Schritt zum Aufbau einer neuen Welt sein, einer Welt ohne Monster, einer Welt, in der man ein Leben an der Oberfläche führen kann, einer Welt mit sicherer Nahrung für die gesamte Bevölkerung. Mit dem Gestern werden wir die Welt von morgen erkaufen."

 RED_spy_networks:0 "Spionagenetzwerke"
 RED_spy_networks_desc:0 "Die Entwicklung der Spionagekunst ist für die Verteidigung der Sowjetunion von entscheidender Bedeutung. Wir werden unsere Feinde erkennen, bevor sie angreifen, um sie zuerst zu vernichten."

 RED_terror:0 "Der große Terror"
 RED_terror_desc:0 "Wie Stalin es eines Tages tat, so werden wir alle Feinde der Union eliminieren, denen es gelungen ist, uns zu infizieren und zu korrumpieren und sie zu ihrer gerechten Strafe zu führen."

 RED_lenin_fist:0 "Die Faust Lenins"
 RED_lenin_fist_desc:0 "Sogar in der Metro haben sich die Panzer als wichtiges Element im modernen Krieg erwiesen. Wir werden Panzer entwickeln, die in der Lage sind, jede Station in der Metro zu erreichen um ihren Feinden die Botschaft der Linie zu übermitteln."

 RED_cult_of_personality_idea:0 "Personenkult"
 RED_cult_of_personality_idea_desc:0 "Wir werden unseren Anführer als den Haupthelden der Sowjetunion feiern, der uns aus den Klauen des Reichs und der Hanse gerettet und bald auch den Rest der Metro befreien wird ..."

 RED_NKVD_court_martial_roles:0 "Das Recht auf Kriegsgerichten des NKWD"
 RED_NKVD_court_martial_roles_desc:0 "Um maximale Effizienz innerhalb des Personals unserer Armee zu gewährleisten, werden wir NKWD-Agenten innerhalb der Armee befördern, um sicherzustellen, dass alle unsere Befehle ohne Änderungen ausgeführt werden "

 NKVD_military_units_buff:0 "NKWD-Integrationsbemühungen"
 NKVD_military_units_buff_desc:0 "Eine Vereinigung zwischen der Armee und dem NKWD ist der beste Weg, unsere Macht durch die Armee zu festigen und unsere Herrschaft in der Union zu sichern."

 RED_heroes_of_the_workforce:0 "Helden der Arbeit"
 RED_heroes_of_the_workforce_desc:0 "Wir müssen uns daran erinnern, wofür der Kommunismus kämpft. Die Arbeitskräfte waren schon immer das Hauptziel des Kommunismus. Jetzt, wo er allein steht, dürfen wir sie nicht vergessen. Die Helden der Arbeitskräfte werden die Werkzeuge zum Aufbau der neuen Welt herstellen."

 RED_heroes_of_the_reconstruction:0 "Helden des Wiederaufbaus"
 RED_heroes_of_the_reconstruction_desc:0 "Die Metro befindet sich in einer beklagenswerten Situation, der Krieg hat Chaos und Zerstörung in die dunklen Stationen gebracht, mit der Sicherung der Position der Sowjetunion werden wir den Menschen einen Anreiz geben, die Tunnel wieder aufzubauen, die Helden des Wiederaufbaus werden Hoffnung und Glanz in dieses zerstörte Loch bringen."

 RED_heroes_of_the_revolution:0 "Helden der Sowjetunion"
 RED_heroes_of_the_revolution_desc:0 "Nachdem wir alle Bedrohungen der Union besiegt haben, dürfen wir nicht vergessen, dass nur unsere Soldaten die tapfer gekämpft haben, dies möglich gemacht haben. Sie müssen an die Helden der Sowjetunion erinnert werden, die die Grundlagen der neuen Welt gelegt haben."

 RED_the_loyal_conscript: "Die treuen Wehrpflichtigen"

 RED_gun_production_boost_kuznetsky_most: "Standardisierte Designmuster"
 RED_gun_production_boost_kuznetsky_most_desc: ""

 RED_LR_transmission_data: "Funkinfiltration"
 RED_LR_transmission_data_desc: ""

 RED_kuznetsky_technicians_assistance: "Kuznetsky sympathisiert"
 RED_kuznetsky_technicians_assistance_desc: "Die Bürger von §Y[KUZ.GetFlag][KUZ.GetName]§! hegen tiefe Sympathien für das Banner der Revolution und unterstützen uns häufig bei der Förderung unserer Sache. Solange §Y[KUZ.GetFlag][KUZ.GetName]§! weiterhin in unserem Einflussbereich bleibt, werden sie unsere Techniker weiterhin unterstützen."

 RED_NKVD_reformed: "Reformierte Tschekisten"