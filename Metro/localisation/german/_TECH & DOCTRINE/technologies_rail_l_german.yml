l_german:
   ### Rail Technologies ###
  rail_folder: "Schienenfahrzeuge"
  rail_folder_desc: "Die Forschung und Produktion von Schienenfahrzeugen."
 ##   Rail Folder    ##
  rail_cart_tech_2029: "Verstärkter Rumpf"
  rail_cart_tech_2029_desc: "Normale Draisinen sind für den Kampf eigentlich nicht zu gebrauchen, doch mit ein paar Panzerungen hier und da machen wir aus ihnen eine mobile Festung!"
	rail_cart_tech_2032: "Verbesserte Räder"
  rail_cart_tech_2032_desc: "Zusätzliche Räder und eine stabilere Aufhängung verringern das Risiko einer Entgleisung, im Krieg nicht zu unterschätzen."
	rail_cart_tech_2035: "Verstärkte Hülle"
  rail_cart_tech_2035_desc: "Stärkere Legierungen bringen stärkere Fahrzeuge, bringen größere Kampfleistung."
	rail_salvaging_2020: "Automobil-Teile"
  rail_salvaging_2020_desc: "Eine etwas aufwendige Mission für unsere Stalker, doch die zahllosen Automobile auf den Straßen Moskaus enthalten für uns wertvolle Teile und Erkenntnisse."
	rail_salvaging_2030: "Militär-Teile"
  rail_salvaging_2030_desc: "Von ihnen gibt es nur wenige an der Oberfläche, doch die Militärfahrzeuge der Vergangenheit enthalten das Wissen der Vorkriegszeit, für uns von unschätzbarem Wert."
	rail_salvaging_2033: "Industrie-Teile"
  rail_salvaging_2033_desc: "Züge, Lastwagen, Nutzfahrzeuge, sie alle mussten höchsten Anforderungen gerecht werden, perfekt für uns um etwas zu lernen."
	rail_bike_tech_2032: "Panzerglas"
  rail_bike_tech_2032_desc: "Nicht viel existiert mehr davon, doch was wir finden werden wir einsetzen. Immerhin kann es kaum kaputt gehen."
	rail_bike_tech_2034: "Montiertes Extramagazin"
  rail_bike_tech_2034_desc: "Anstatt die Munition nur zu lagern und manuell nachzuladen, warum vergrößern wir nicht einfach das Magazin und nutzen dieses als Lagerraum?"
	rail_bike_tech_2035: "Drehturm"
  rail_bike_tech_2035_desc: "Im Tunnel geht es zwar nur vor und zurück, doch in Stationen sieht dies anders aus. Unsere Geschütztürme müssen sich frei drehen können."
	rail_panzer_tech_2034: "Überlappende Panzerung"
  rail_panzer_tech_2034_desc: "Eine Schicht Panzerung reicht nicht, doch wenn man zwei kombiniert sind sie zusammen stärker als beide einzeln."
	rail_panzer_tech_2035: "Periskop"
  rail_panzer_tech_2035_desc: "Sich im Feuer des Gefechtes risikolos in alle Seiten umsehen zu können ist ein wahrer Segen."
	rail_engine_tech_2028: "Handkurbel"
  rail_engine_tech_2028_desc: "Auf wenn das Bedienen einer Handkurbel kraftintensiv ist und Soldatenkräfte bindet, so kostet es doch wenigstens keinen kostbaren Strom."
	rail_engine_tech_2030: "Einfacher Motor"
  rail_engine_tech_2030_desc: "Langsam und unzuverlässlich, doch eine Entlastung für unsere Soldaten."
	rail_engine_tech_2033: "Moderner Motor"
  rail_engine_tech_2033_desc: "Ein echter Elektromotor aus einem Fahrzeug von der Oberfläche. Leistungsstark und schnell."
	rail_armament_tech_2028: "Montierte Bewaffnung"
  rail_armament_tech_2028_desc: "Eine fixierte Waffe und festgeschraubte Munitionsdepots machen aus diesen Draisinen bereits echte Kriegsfahrzeuge."
	rail_armament_tech_2029: "Rundum-Panzerung"
  rail_armament_tech_2029_desc: "Wie es aussieht sind unsere Schützen an den fixierten MGs ein beliebtes Ziel für den Feind. Es wird Zeit sie besser zu schützen."
	rail_armament_tech_2032: "Verbesserte Panzer-Anordnung"
  rail_armament_tech_2032_desc: "Wenn sich der Geschützturm frei drehen sollt, muss die Anordnung der Panzerung durchdacht werden."
	rail_armament_tech_2035: "Gurtzuführsysteme"
  rail_armament_tech_2035_desc: "Kein manuelles Nachladen mehr, die langen Patronengurte geben dem Schützen nahezu unbegrenzte Feuerkraft."
	rail_armor_tech_2028: "Grundlegende Panzerung"
  rail_armor_tech_2028_desc: "Sandsäcke, Schrott und alles Mögliche. ist es effizient? Nein, aber jede Panzerung ist besser als keine Panzerung."
	rail_armor_tech_2029: "Schrottpanzerung"
  rail_armor_tech_2029_desc: "Zusammengezurrter Schrott ist beinahe schon sowas wie eine echte Stahlpanzerung. Hoffentlich."
	rail_armor_tech_2032: "Geneigte Panzerung
  rail_armor_tech_2032_desc: "Die beste Panzerung ist die, die feindliches Feuer einfach ablenkt, anstatt den Schaden aufzuehmen."
	rail_armor_tech_2035: "Metallguss"
  rail_armor_tech_2035_desc: "Anstatt krude Teile zusammenzuschweißen, haben wir nun die Mittel den gesamten Rahmen einfach in einem oder wenigen Güssen herzustellen."
	rail_storage_tech_2028: "Universalstauraum"
  rail_storage_tech_2028_desc: "Dieser Stauraum kann alles aufnehmen, was gerade an der Front benötigt wird."
	rail_storage_tech_2030: "Verbesserter Stauraum"
  rail_storage_tech_2030_desc: "Es nützt nichts, Dinge nur einzulagern, sie müssen im Stauraum auf sicher sein."
	rail_storage_tech_2033: "Vergrößerter Tank"
  rail_storage_tech_2033_desc: "Je größer der Tank, desto seltener muss nachgefüllt werden."

